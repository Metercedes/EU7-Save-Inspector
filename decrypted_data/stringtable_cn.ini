battle_talk_3010201=让农民把麦田毁掉，一粒粮食都不要留给诺曼人
battle_talk_3010202=粮食不够了，我们请求与教皇谈判
battle_talk_3010203=让他们过来吧，就这么一小队人不会有事的
battle_talk_3010204=教皇的部队毫无防备，趁现在突袭他们！
battle_talk_3010205=我在此请求教皇的宽恕
battle_talk_3010206=虽然诺曼人对战败的教皇礼数有加，但教皇成为诺曼人阶下囚的消息还是传遍了欧洲。
battle_talk_3010301=阿普利亚真是好地方，物产丰富应有尽有
battle_talk_3010302=罗伯特！你为什么一直在阿普利亚享乐，不肯返回自己的领地！
battle_talk_3010303=你是在指责我故意拖延？等着吧，我会把卡拉布里亚收入囊中的！
battle_talk_3010304=我的时间不多了，诺曼人不能只靠征战来生存
battle_talk_3010305=罗伯特近年来的表现证明他是一个优秀的政治家，诺曼人的未来就交给他吧！
battle_talk_3010401=进攻拜占庭的据点，把他们赶出卡拉布里亚！
battle_talk_3010402=击溃拜占庭帝国之后，我们就可以向西西里进军了
battle_talk_3010403=这座城市十分坚固，但是我们可以用围城来迫使它投降
battle_talk_3010404=拜占庭军队已被驱逐，是时候征服西西里了
battle_talk_3010405=是诺曼人！快，快集结部队迎战！
battle_talk_3010601=之前因为拜占庭军队的干扰而没能占领墨西拿，这次夜间突袭一定能成功
battle_talk_3010602=加固城防，这里将是我们征服西西里的起点
battle_talk_3010603=诺曼人，如果你们需要盟友，那我们可以坐下来谈谈
battle_talk_3010604=非常感谢您的合作，我正需要像您这样的盟友
battle_talk_3010701=巴里是拜占庭最后的据点，只要击败他们，南意大利就将完全属于我们诺曼人!
battle_talk_3010702=坚持住，我已经派人去求援了，帝国的援军很快就到！
battle_talk_3010703=如果能在您获得城市之后给我足够的回报，我愿意帮助您
battle_talk_3010704=增援巴里城！
battle_talk_3010705=拦截他们的援军！
battle_talk_3010801=巴里已经沦陷，吉斯卡尔下一个目标就会是我们
battle_talk_3010802=我们要团结起来抵抗他
battle_talk_3010803=乌合之众！哪怕人再多也无法阻止我的脚步！
battle_talk_3010804=接下来就该让拜占庭感受一下诺曼人的力量了
battle_talk_3010805=萨勒诺沦陷后不到2年，贝内文托也被吉斯卡尔征服。
battle_talk_3011001=威尼斯人袭击了我们海上的舰队，我们遭受了不小的损失
battle_talk_3011002=皇帝命令我们死守城市，他一定会带兵来支援我们的！
battle_talk_3011003=英勇的瓦兰吉卫队击溃了敌人！跟我冲！
battle_talk_3011004=皇帝的援军到了！随我出击！
battle_talk_3011005=优先消灭瓦兰吉卫队，分割包围敌人！
battle_talk_3011006=我需要重新集结部队！撤退！撤退！
battle_talk_3011007=阿莱克修斯贿赂了教皇，发动突袭，烧毁了诺曼人的船只。而且他们遭遇了最强大的瓦兰吉卫队，这些都是1066年黑斯廷斯战役之后逃向君堡的昂撒人
battle_talk_3011101=教皇被亨利四世围困在圣天使堡，需要救援
battle_talk_3011102=感谢您的救助，我的盟友
battle_talk_3011103=继续进军，把亨利四世赶出罗马！

