general_desc_Tancred=他是一位诺曼小领主，关于他的信息不多。但他的十二个儿子们在欧洲创造了许多传奇故事。
general_desc_William Iron Arm=他是坦克雷德·德·欧特维尔和妻子穆里尔的长子，也是欧特维尔家族财富的创始人。在锡拉库萨的围城战中，他单枪匹马杀死了锡拉库萨的埃米尔，因此获得了“铁臂”这一绰号。
general_desc_Drogo=他是坦克雷德·德·欧特维尔和妻子穆里尔的儿子，威廉的弟弟，一位诺曼领导人。他与威廉共同参与了西西里岛的战役，最终成为了一位领主。
general_desc_Humphrey=他是坦克雷德·德·欧特维尔和妻子穆里尔的儿子，威廉的弟弟。在威廉和德罗戈去世后，他将自己的儿子的监护权交给了吉斯卡尔。
general_desc_Roger Bosso=他是坦克雷德·德·欧特维尔和妻子弗雷森达的最小的儿子，他协助哥哥吉斯卡尔征服了南意大利和西西里岛，是西西里岛王国的奠基人。
general_desc_Emma of Hauteville=她是罗伯特·吉斯卡尔和阿尔贝拉达的女儿，她的两个儿子都参加十字军东征。
general_desc_Bohemond I=他是罗伯特·吉斯卡尔与阿尔贝拉达的儿子。是第一次十字军东征的领袖，也是十字军国家安条克公国的建立者。
general_desc_Roger Borsa=他是罗伯特·吉斯卡尔和西婕盖塔的儿子。 他的雄心勃勃的母亲安排他继承父亲的位置，他与哥哥博希蒙德为继承权争斗了很久。
general_desc_Roger II=他是西西里王国的建立者，他在位期间抵御了多个帝国的进攻，是一位杰出的君主。西西里王国存续了七个世纪。
general_desc_Tancred Prince of Galilee=他是欧特维尔的艾玛和奥多的儿子，在博希蒙德不在期间担任安条克公国的摄政王。
general_desc_William I the Bad=他是罗杰二世的第四个儿子，被称为“恶人”或“邪恶者”。
general_desc_Constance I=她是罗杰二世的女儿，在欧特维尔最终占领西西里岛的过程中发挥了重要作用。她后来与神圣罗马帝国皇帝亨利六世结婚，成为皇太后。
general_desc_William II the Good=他是恶人威廉的儿子，他的统治时期被誉为和平与正义的黄金时代。
general_desc_Frederick II=他是霍亨施陶芬王朝皇帝亨利六世和康斯坦斯王后的儿子。他统治的领土从西西里岛延伸至德国，参与了十字军东征并征服了耶路撒冷。

