general_desc_Jean de Dunois=奥尔良公爵的私生子，作战英勇，让奥尔良一直固若金汤，之后跟随圣女贞德征战四方。
general_desc_Gilles de Rais=吉尔斯是百年战争时期的法国元帅，是追随圣女贞德最早的将军之一，曾被誉为民族英雄，但之后残害儿童被施与火刑。
general_desc_La Hire=拉海尔是追随圣女贞德的一名所向披靡的将领，为法国赢得最后的胜利做出了杰出的贡献。
general_desc_Henry V=亨利五世是一位出色的战士，他在阿金库尔战役中展现了他出色的领导能力，1420年的特鲁瓦条约，确认这位英王对法国王位的权利。
general_desc_Olga2=奥尔加是第一个皈依基督教的罗斯统治者，她将基督教传播到了基辅罗斯。她去世后，被教廷追认为“圣奥尔加”。
general_desc_Richard I2=狮心王理查是第三次十字军东征的领导人之一，他强大的战斗力让萨拉丁也避其锋芒，凭借理查的力挽狂澜，耶路撒冷王国又延续了一个世纪。

Olga2=圣奥尔加
Richard I2=十字军狮心王

