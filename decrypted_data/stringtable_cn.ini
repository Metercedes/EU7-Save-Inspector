stage_intro_4821=1249年，法王路易九世发动十字军东征入侵埃及，阿尤布王朝的苏丹萨利赫率兵前往曼苏拉迎战却因急病去世。拜巴尔一世临危受命，在曼苏拉城大败十字军。
stage_intro_4823=十字军在曼苏拉城战败，补给即将耗尽。拜巴尔一世敏锐地抓住了机会，在法里斯库尔追上了撤退的十字军并俘虏了路易九世。
stage_intro_4825=1260年，蒙古军队在大将怯的不花的率领下占领了叙利亚并继续向西进军。拜巴尔一世率领埃及军队在艾因贾鲁特与蒙古军队展开决战。
stage_intro_4827=1266年，拜巴尔一世打败了奇里乞亚亚美尼亚，极大削弱了蒙古在中东地区的力量。
stage_intro_4829=1268年，拜巴尔一世消灭了十字军在中东地区建立的最强大政权——安条克公国。自此十字军势力在中东地区的覆灭已成定局。
stage_intro_4831=1271年，英格兰王子长腿爱德华（后来的爱德华一世）组织了第九次十字军东征，拜巴尔一世成功将其击退。

