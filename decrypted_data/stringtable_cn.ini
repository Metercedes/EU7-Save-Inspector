general_desc_Charles VII=在法国最危急的时刻任命了圣女贞德，从而走向了胜利。胜利者查理在位期间进行了一系列改革，建立了常备军，最终结束了百年战争。
general_desc_Jan Zizka=胡斯战争爆发后他参加了起义军并成为首领，他采取的“战车堡垒”战术让敌人闻风丧胆，他的评价是“在战场上，永远是胜利者“。




