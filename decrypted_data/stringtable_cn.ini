;兵种描述

troop_desc_101=手持剑盾的部队，缺乏战斗技巧，无法和职业军人相提并论。
troop_desc_102=手持剑盾的部队，受过一定的军事训练，拥有基础战斗力。
troop_desc_103=受过标准军事训练的人而组成的部队，但依旧无法与职业士兵相比。
troop_desc_104=手持剑盾的部队，坚固的盾牌是他们最大的特征。
troop_desc_105=装备精良，军事素养极高的作战部队，是军队中的精锐。
troop_desc_107=手持双手大剑，擅长近战的部队，面对任何敌人都能发挥出极高的战斗力。
troop_desc_108=神圣罗马帝国的武装集团，拥有着强大战斗力的步兵部队。
troop_desc_109=坚持传统作战方式，是生性好战的猛士，在任何军队中都堪称精锐。
troop_desc_110=巨大的斧头是他们的象征，卓越的装备表示他们无疑都是战士中的精英。
troop_desc_111=进攻强劲的重步兵，装甲厚重并且士气高昂。
troop_desc_112=装备极为精良的精锐部队，装备制式武器，拥有极高的战斗素养。
troop_desc_113=拜占庭帝国禁军编制中最为显赫的部队，由各地最为精锐的战士所组成。
troop_desc_114=重新锻造后的盔甲在阳光下仿佛黄金一般，沉重的装备只有最强大的战士才能穿戴。
troop_desc_115=唐朝精锐部队，他们携带的横刀刀刃极长，刀身笔直，锋锐无比，是破甲利器。
troop_desc_201=随处可见的，通过征召当地平民而组成的民兵部队，主要负责城市防御和支援。
troop_desc_202=手持长枪的部队，对骑兵能造成可观的伤害。
troop_desc_203=受过标准军事训练的人而组成的部队，但依旧无法与职业士兵相比。
troop_desc_204=手持枪盾的部队，坚固的盾牌是他们最大的特征。
troop_desc_205=精锐的战士可以有效击伤敌军的骑兵，也可以作为主力步兵使用。
troop_desc_206=苏格兰长枪兵拥有着其他部队无法比拟的纪律性。
troop_desc_207=拥有高度的警觉性，通常被赋予重要的任务。
troop_desc_208=继承自罗马帝国的作战军团，手持长枪，无惧敌人的冲锋。
troop_desc_209=密集排列的阵型可以应对各种敌人的进攻。
troop_desc_210=面对敌人进攻时能展现强大的防御能力，进攻时也极为骁勇善战。
troop_desc_211=战场上的多面手，是步兵军团的重要组成部分，在战争中屡建战功。
troop_desc_212=唐朝精锐部队，他们携带的陌刀长约3米，威力极大，是骑兵部队的噩梦。
troop_desc_301=灵动迅捷的骑兵斥候，是战场上侦查敌方动向的能手。
troop_desc_302=攻守兼备的骑兵部队，是骑兵作战中的主力之一。
troop_desc_303=护卫贵族作战的骑兵部队，冲锋时能对敌人造成巨大伤害。
troop_desc_304=装备精良的重骑兵，是骑兵部队中的精锐。
troop_desc_305=尽管已经适应了骑马作战，但依旧能看出步行作战的影子。
troop_desc_306=擅长利用速度突击敌方阵线的部队，是冲锋攻击的好手。
troop_desc_307=精锐的沙漠骑兵部队，在沙漠地区作战拥有着极大的优势。
troop_desc_308=身形庞大的野兽，战场上能带给敌人毁灭性的打击。
troop_desc_309=三大骑士团之一，是战法娴熟实力强大的骑兵部队。
troop_desc_310=三大骑士团之一，是拥有着强大战斗力的骑兵部队。
troop_desc_311=圣墓的守护者，一支信仰坚定的骑士团组织。
troop_desc_312=蒙古骑兵是一支训练有素、纪律严明令人生畏的部队，建立了世界上规模空前的宏伟帝国。
troop_desc_313=作为唐朝皇帝李世民的一支亲卫部队，战斗力超群，他们身披黑甲纪律严明，从不畏死。
troop_desc_401=手持长枪的骑兵部队，冲锋时能对敌人造成巨大伤害。
troop_desc_402=封建体制下的中世纪欧洲，从小接受军事训练的骑士们令敌人闻风丧胆。
troop_desc_403=身披重甲的骑兵部队，只有经过严格训练才能承受装备的重量。
troop_desc_404=出身贵族的精锐骑兵，人和战马都使用着最为精良的装备。
troop_desc_405=身穿重甲但是在作战时仍能保持灵活的部队，几乎没有任何对手。
troop_desc_406=出身贵族的精锐骑兵，人和战马都使用着最为精良的装备。
troop_desc_407=精通各种战法的骑兵部队，极为擅长冲锋，是战场上的王者。
troop_desc_408=勇猛而强大的骑兵部队，身后巨大的羽翼是他们最大的特征。
troop_desc_409=身穿重甲的骑士能够发起排山倒海一般的冲锋，带给敌人毁灭性的打击。
troop_desc_410=三大骑士团之一，是作战风格极为彪悍的骑兵部队。
troop_desc_411=由贵族阶层组织训练而来的骑兵，拥有着精良的装备，通常作为大公的亲卫队而活跃在战场之上。
troop_desc_412=军士作为骑士团的主力，尽管在职阶上低于骑士，但是他们在战场上的重要性毋庸置疑。
troop_desc_413=唐朝皇家部队，他们连同马匹身披黑甲脸戴面具，犹如乌云一般压向敌人。
troop_desc_414=东罗马帝国的王牌部队，他们代表着帝国的荣耀，身着重甲，刀枪不入，拥有极大的破坏力和冲击力。
troop_desc_501=能熟练运用投掷武器的部队，装备简陋但依旧拥有较为可观的战斗力。
troop_desc_502=投掷标枪的部队，尽管战斗力有限，但是扰乱敌阵的效果很好。
troop_desc_503=普通的轻装部队，只能进行远程攻击，无法与正规部队近身作战。
troop_desc_504=极易上手的远程武器，能快速形成战斗力且提供密集的火力。
troop_desc_505=身穿盔甲，使用着强劲的复合弓的部队。
troop_desc_506=装备有火绳枪的部队，射击命中后能给敌人造成巨大伤害。
troop_desc_507=极难掌控的武器，只有从小接受专门训练的人才能完成射击。
troop_desc_508=通常由雇佣军组成的部队，装备简陋。
troop_desc_509=西班牙王国征服美洲大陆的部队，贪婪无比但战斗力惊人。
troop_desc_510=装备精良的火绳枪部队，射击时弥漫的硝烟和巨大的声响令敌人闻风丧胆。
troop_desc_511=射术精湛的弩手在战场上会无情地收割敌人的生命。
troop_desc_512=背负巨盾的弩兵部队，在需要装填时会背对敌人，形成有效的防护。
troop_desc_513=身体涂抹蓝色颜料的战士，是游击战的专家，在树林中的战斗力极高。
troop_desc_514=由长弓兵转职而来，齐射而出的火焰箭矢能对敌人造成极大的威胁。
troop_desc_515=唐朝精锐部队，他们携带诸葛连弩，射出弓箭的遮天蔽日让人闻风丧胆。
troop_desc_601=骑术精湛的骑兵部队，能在颠簸的马背上精准地投掷标枪。
troop_desc_602=装备强弓的骑兵部队，擅长骑射且射术精湛，但不精通近身作战。
troop_desc_603=封建体制下的中世纪欧洲，从小接受军事训练的骑士们令敌人闻风丧胆。
troop_desc_604=尽管启动缓慢，但身穿重甲的骑士在冲锋时投掷出的标枪威力十分巨大。
troop_desc_605=擅长骑射的骑兵部队，在沙漠地区作战拥有着极大的优势。
troop_desc_606=战象巨大的身躯在击败敌人的同时，也为射手提供了良好的保护。
troop_desc_607=草原上的战士从小在马背上长大，擅长各种突袭作战。
troop_desc_608=极为精锐的职业骑兵部队，从小便接受各种严格的训练。
troop_desc_609=极具战斗素养的机动部队，是帖木儿帝国战斗力的保证，他们在草原上的奔袭能让敌人胆寒。
troop_desc_314=爱德华三世组建的骑士团，只有最尊贵的皇室成员才可以加入，他们是忠诚和荣誉的象征。
troop_desc_315=西辽最强壮的战士和最优良的草原马组成的队伍，他们骁勇善战，久经沙场，无论到哪都所向披靡。
troop_desc_415=敕令骑士是法国的常备骑兵，这是一支装备精良的队伍，比贵族的封建骑士更有组织性和纪律性。

