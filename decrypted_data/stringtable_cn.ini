stage_intro_30001=法国北边的诺曼人欧特维尔家族已经在破产边缘，坦克雷德生了十二个儿子两个女儿，他实在无力分配更多的财产，长子威廉跟随着其他诺曼人前往耶路撒冷朝圣，然后去意大利半岛碰碰运气。
stage_intro_30002=1025年“保加利亚屠夫”巴西尔二世去世，尽管继位者软弱无能，但巴西尔二世缔造的军队依然强大，为了获得更多的粮食、棉花和糖，皇帝选定了乔治曼尼亚科斯作为主将征服富裕的西西里岛，而欧特维尔的威廉带领300骑士以雇佣军的身份加入了这支队伍。
stage_intro_30003=虽然墨西拿的撒拉逊人根本无力抵抗强大希腊人和诺曼雇佣军，但联军士气并不高涨，东罗马主将乔治曼尼亚科斯身高10英尺，脾气极其暴躁，经常体罚士兵
stage_intro_30004=西西里岛的一座一座城池被希腊人犹如摧枯拉朽一般占领，死亡的气息占据了整个西西里岛。
stage_intro_30005=2年来已经有12座城池和要塞被希腊人占领，但在锡拉库萨他们并没有那么走运，驻扎的埃米尔发动了强烈的抵抗，抵御住了希腊人一轮又一轮的进攻。
stage_intro_30006=东罗马皇室对于曼尼亚科斯的胜利心存担忧，害怕他功高盖主并入主君士但丁堡，于是开始减少补给并暂停了雇佣军的酬金。又一次曼尼亚科斯公开羞辱了诺曼人，威廉和诺曼雇佣军决定离开远征军。
stage_intro_30007=伦巴第人夹在神圣罗马帝国以及东罗马帝国的夹缝之中，他们不堪剥削发动了起义。在前一个伦巴第领袖被刺杀后，诺曼人和伦巴第人推举了贝内文托的阿特努尔夫成为他们的领袖。
stage_intro_30008=东罗马人对于诺曼人和伦巴第人的联合感到愤怒，在诺曼人与东罗马在意大利的将领迈克尔·多基亚诺斯谈判失败后，战争已经无可避免。
stage_intro_30009=诺曼人在意大利地区的强悍逐渐被伦巴第人的认可，越来越多的诺曼骑士来到这片土地，寻求一战成名的机会，这也让威廉的力量越来越强。
stage_intro_30010=东罗马军队越来越无法在正面战场战胜诺曼人，他们收买了很多人，包括伦巴第人的首领阿特努尔夫，诺曼人愈发觉得胜利变得如此遥不可及。
stage_intro_30011=伦巴第贵族萨勒诺大公瓜伊马尔四世答应给诺曼人封地，将自己的侄女嫁给了威廉。大公正式将威廉封为“阿普利亚公爵”，并将该地区分封给了12名最有权势诺曼领袖。
stage_intro_30012=1044年，瓜伊马尔邀请威廉征服意大利南部的卡拉布里亚，并承诺征服下来的土地归诺曼人所有，诺曼人再次踏上征途。
stage_intro_30013=1045年，威廉和瓜伊马尔准备再次发动远征的前夕，威廉突发高烧并去世，时年36岁。

family_letter=记载
family_letter_desc_101=亲爱的父亲，我已经从耶路撒冷离开，并和叔叔前往意大利，托您的福，我们一路十分顺利，地中海的气候比诺曼底好很多，我一定能在这里闯出一番天地，荣誉胜过生命！……最后问母亲和弟弟妹妹们安。……
family_letter_desc_102=……亲爱的父亲，我们在西西里岛艰苦的战争中，比起撒拉逊人该死的希腊人曼尼亚科斯才是我们最大的敌人，他丝毫不在乎人命，要不是上帝保佑，要不是我和兄弟们勇猛，十条命都不够填在西西里……
family_letter_desc_103=……亲爱的父亲，我们已经帮希腊人连续打工了2年，经历了数百场战斗，身上的伤疤添了一道又一道，但佣金却越来越少了，真不知道是否还有命回去？上帝保佑你安康。……
family_letter_desc_104=亲爱的父亲，我们已经3个月没有拿到任何酬劳了。在这里我们除了伤疤和伤痛，既获得不到财富也获得不到名誉，是时候离开了……
family_letter_desc_105=亲爱的父亲……曼尼亚科斯被希腊皇帝召回后，意大利地区的希腊人已经不足为惧，我愿意成为像“无畏者”查理一样的人，成为新的开拓者！可诺曼人还在为着一点点蝇头小利争斗不已，荣耀和名誉对他们而言一文不值。……
family_letter_desc_106=亲爱的父亲……我正前往坎尼的路上，那个受到诅咒的地方，20年前我们的同胞在这里被希腊人击败，但这里同样是希腊人的诅咒之地，汉尼拔在那里让罗马人受到了最耻辱的战败。愿上帝保佑我，……
family_letter_desc_107=亲爱的父亲……虽然你已经在天堂，但是我想让你知道，我终于做到了，我获得了封号和封地，我会让诺曼人成为意大利新的主人。……

