battle_talk_2301=这是……哪里？我明明死于本能寺，怎么……我怎么会在这片陌生的土地上？这片土地的语言我听不懂，衣着风格也完全不同。是……异界？
battle_talk_2302=不可能，我的武士道与命运岂能如此轻易被颠覆？不管这是什么地方，既然我已然来到此地，那便是征服的命运。
battle_talk_2303=士兵们！即使身处异乡，战场依旧是我们证明自己力量的地方。进入这座城市，打破他们的防线！我们要让这片土地也感受到‘织田’的威名！

最后一次更新
