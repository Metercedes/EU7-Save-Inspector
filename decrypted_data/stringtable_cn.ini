stage_intro_4221=《特鲁瓦条约》签署之后，法兰西陷入了最黑暗的时刻，大半的法兰西领土被英格兰人占领，此时贞德犹如神迹一般出现在了法兰西人民面前。
stage_intro_4223=英格兰人在奥尔良之外修建城堡，意图困死奥尔良的守军。查理王子授予贞德“战争总指挥”的头衔，贞德手持王子赠予的宝剑，统率数千名法军，开始向奥尔良城逼进。
stage_intro_4225=贞德决定不再固守奥尔良，并率军主动出击，她挥舞着旗帜爬上了堡垒，贞德身先士卒的举动极大地打击了敌人的士气，这让法兰西人成功解放了奥尔良。
stage_intro_4227=奥尔良解围后，仍有一部分英格兰军队驻守在奥尔良不远处的雅尔若。法兰西需要快速攻破雅尔若，以解除奥尔良东南方向的威胁，粉碎英格兰卷土重来的可能。
stage_intro_4229=收复雅尔若后，贞德迅速将她的军队转移到卢瓦尔河畔默恩。在那里，她发动袭击，这有效的阻碍了英格兰军队在卢瓦尔河南部的行军进程。
stage_intro_4231=夺取通往卢瓦尔河畔默恩的桥梁后，贞德并没有直接攻击默恩的城镇或城堡。反而在隔日攻击了附近的博让西，迅捷之势让英格兰军队放弃城镇撤退到城堡中。
stage_intro_4233=博让西的一日陷落让英格兰援军士气大降，几经苦战的英军不得不撤往巴黎。贞德则拍板决定加快行军速度，全力追击，双方最终在帕提相遇。
stage_intro_4235=帕提战役的胜利终结了英格兰一统法兰西的野心，胜利一扫法兰西军队百年来的颓势，贞德率领骑兵开赴兰斯为太子夺取加冕所需的教堂。
stage_intro_4237=在军队的强烈请求下，查理七世下令进攻巴黎，贞德率领法兰西军队在巴黎与英格兰主力展开了激烈的对战，贞德仍旧身先士卒，即使受伤也坚持作战。
stage_intro_4239=在法军强攻巴黎的关键时刻，法兰西王室却命令军队撤出战斗。随后贞德被派往围攻拉沙里泰，可是在深冬时节缺兵少粮的情况下，战斗异常艰难。
stage_intro_4255=贞德获知贡比涅被勃艮第公国攻打，决定前去救援，但因为被敌军包围而被俘。之后，这位民族英雄被勃艮第人卖给了英格兰人。
stage_intro_4257=英格兰将贞德作为异教徒审判，贞德始终没有屈服，并坚称自己无罪。十五世纪法兰西的历史，因一位少女的意志而完全改写。

