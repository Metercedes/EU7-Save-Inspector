battle_talk_120506=看来拜占庭没有任何通过武力夺回城市的想法，既然如此那我们便主动出击。
battle_talk_120507=拜占庭军队如今虚弱不堪，是时候扩大我们的疆土了！
battle_talk_120508=哼，狡猾的家伙，竟然以筹措钱财为借口，向我们的城市发动攻击。
battle_talk_120509=我们遭到了攻击，敌人的目的不仅仅是加里波利一座城市！
battle_talk_120601=阿德里安堡作为拜占庭帝国的第三大城市，是我们扩张势力的重要目标。
battle_talk_120602=夺取这座城市，能为我们将来进攻君士坦丁堡提供源源不断的补给。
battle_talk_120603=准备迎战，奥斯曼军队绝对不会轻易撤退，必须坚守城市！
battle_talk_120604=我会宽容地留给你们考虑投降的时间，并承诺赋予你们安定的生活！
battle_talk_120605=我的耐心是有限的，士兵们，做好准备！
battle_talk_120606=我们的援军源源不断，你们还想负隅顽抗吗？
battle_talk_120607=做好准备迎接你们的失败了吗？
battle_talk_120608=我的耐心用尽了，现在，给我攻破这座城市。
battle_talk_120609=不能坐看阿德里安堡陷入危机，派出军队，援助他们。
battle_talk_120610=我们的后方遭到了攻击，为何敌人会出现在那里？
battle_talk_120701=帝国如今已经无法维持其他城市的防御，将塞萨洛尼卡交由威尼斯人来管理是最佳的选择。
battle_talk_120702=这座城市应当属于奥斯曼，现在你们还有投降的机会。
battle_talk_120703=既然这座城市已经归属于我们，那就断然没有放弃的可能。
battle_talk_120704=奥斯曼对塞萨洛尼卡发动了攻击，尽管这减轻了君士坦丁堡的压力，但情况依旧不乐观。
battle_talk_120705=现在，这座城市归属于奥斯曼，威尼斯的舰队也无法阻止我们。
battle_talk_120706=塞萨洛尼卡陷入了危机，但是我的舰队遭到了奥斯曼舰队的封锁，现在急需打破封锁援助塞萨洛尼卡。
battle_talk_120707=拜占庭妄图发动进攻以缓解威尼斯人的压力，这样的行动毫无意义。
battle_talk_120708=敌人发动了反击，派出我们的后备力量。
battle_talk_120709=封锁海域的奥斯曼舰队被击溃了，舰队继续前进！
battle_talk_120801=眼前的这座城市，号称拥有当今世上最坚固、最雄伟的城墙。
battle_talk_120802=如今我们获得了新的攻城利器，这座城市必将被攻破，然后成为帝国领土的一部分！
battle_talk_120803=敌人已经兵临城下，我们现在别无选择，只能尽全力战斗到最后一刻。
battle_talk_120804=敌人应该还没有来得及封锁海域，现在乘船离开应该还来得及。
battle_talk_120805=城墙已经被攻破，进入城市，准备迎接我们的胜利！
battle_talk_120806=外部防御已经被彻底瓦解，我们已经无路可退。
battle_talk_120807=我们的后方怎么会有敌人，消灭他们，不能让攻城计划受到影响。
battle_talk_120808=成功突破了敌人的海面封锁，现在尽快撤离，安全第一！
battle_talk_120809=愚蠢的家伙，你的失败影响到了帝国的行动，你居然让敌人成功逃离了战场！
battle_talk_120810=君士坦丁堡正在遭到攻击，我们不能坐视不理，尽快出海，希望不会太迟。
battle_talk_120811=今天起，这座城市将归属于奥斯曼帝国！
battle_talk_120812=君士坦丁堡被占领了，我们彻底失败了。
battle_talk_120901=我本无意皇位只是受命于罗马危难之际，将女儿嫁给你还和你共治天下，你又何必苦苦相逼。
battle_talk_120902=君士坦丁堡本就应该是我的，你的皇位是篡夺而来，罗马本不应该出现两个皇帝。
battle_talk_120903=先救我的儿子，我会筹钱给你！
battle_talk_120904=既然已经收到佣金，我必为你清除叛乱！
battle_talk_120905=你还雇佣突厥人，无疑是引狼入室！必定后患无穷。
battle_talk_120906=我不会坐视不理！清除异己！
battle_talk_120907=好的，我们也会提供支援！
battle_talk_120908=看来需要切断塞尔维亚和保加利亚的支援，帕列奥列格自然会败退！
battle_talk_120909=突厥人太强了！但是我们还会回来的！
battle_talk_121001=我们要继续巩固在巴尔干半岛的地盘！继续掠夺前方的村庄！
battle_talk_121002=我们的村庄正在被烧毁！我们的人民正在被杀害！忍无可忍，我们冲呀！
battle_talk_121003=冲击他们后方！别让他们回到自己营地！
battle_talk_121004=不好，我中箭了！
battle_talk_121005=不！我的儿子战死，我的帝国还有什么前途！我还有什么希望！
battle_talk_130101=现在我方处于逆流逆光，实在不适合海上作战，看来天不助我！
battle_talk_130102=我们处于上风区，而且铁索连船，我看英国人怎么战胜我们！
battle_talk_130103=我们是不是应该派一些船在海口外面，这样形成钳形攻势？
battle_talk_130104=没有必要分散兵力，且看英国人如何全军覆没！
battle_talk_130105=哎，没必要和蠢货们一起送死，我就在后方观察吧。
battle_talk_130106=太好了！水流方向改变了！顺水而下！把他们封锁在海口里面！
battle_talk_130107=我们的船无法行动，快解开铁索！
battle_talk_130108=啊！一切完了！
battle_talk_130201=我们人数三倍于英军，还有最精锐的重骑兵，面对一群疲惫之师，胜利只在唾手可得。
battle_talk_130202=占领优势地形！不要慌！太子注意右翼，不要被他们的骑兵抄了后方！
battle_talk_130203=好的！我会让他们有来无回！
battle_talk_130204=热那亚弩兵看来根本射不到英军，骑士们跟着我冲！
battle_talk_130205=太混乱了，我的士兵在哪里！
battle_talk_130206=顶住他们最后的冲锋！这将是一场伟大的胜利！
battle_talk_130301=不知不觉我们已经围城快一年了，没想到加莱的城池如此坚固！
battle_talk_130302=低地国家增援的士兵快来了，我们需要前去接应！
battle_talk_130303=切断他们的海上补给线！
battle_talk_130304=保护好增援船只，这会给加莱守军沉重打击。
battle_talk_130305=大家再咬咬牙坚持坚持，我们的补给即将到来！
battle_talk_130306=不能让他们再切断我们陆地的补给线，否则加莱真的不保。
battle_talk_130307=堵住法军的陆地补给线，这是他们最后的抵抗了。
battle_talk_130401=英国人的兵力都在大陆，后方空虚，这次我们配合法国人必可以给他们沉重一击！
battle_talk_130402=果然不出所料，苏格兰人终究还是反叛了。我们需要尽快集结更多长弓兵！
battle_talk_130403=我们已经占领多个城镇，是否应该见好就收？
battle_talk_130404=不用担心，英国人根本无暇顾及我们。
battle_talk_130405=没想到这么快就占领了，让我们再向南进发！
battle_talk_130406=把敌人吸引到峡谷后攻击，注意不要被绕后！他们是敌不过我们手中的长弓！
battle_talk_130407=夺回我们的领地！活捉大卫二世，人人有赏！
battle_talk_130408=不好，我中箭了，速速撤退！
battle_talk_130501=冲击他们右翼！让他们的长弓兵无法形成有效攻势！
battle_talk_130502=不好，右翼被击穿，我们这次危险了。不要分散队形！！我们边撤离边攻击。
battle_talk_130503=绕后占据高地！那里是我们的反击机会！
battle_talk_130504=我们终究错失了最佳进攻时机！撤退！
battle_talk_130601=看来我们等不到北面的援军了，这里就是我们决战的地方！迅速布防，我们要在这里击败这些傲慢的法国佬！
battle_talk_130602=我们已经将他们堵在这里，他们只是刀板上的鱼肉！只要一次冲锋就可以让他们溃散！活捉英国王长子！人人都有重赏！
battle_talk_130603=不要为暂时的挫败后退！我将和你们站在一起！直至战死！冲呀！我们会赢得战争的最终胜利！
battle_talk_130604=从侧翼包抄！给他们致命一击！
battle_talk_130605=难道他们的后援来了？我们被包围了！
battle_talk_130606=不好被发现了！
battle_talk_130607=策马冲锋吧！殿下，敌人已经溃退！上帝与我们同在！
battle_talk_130701=我将在兰斯加冕为法国国王，成为英格兰最伟大的国王！
battle_talk_130702=我是不会让英国人得逞的，即使我们没有国王，我们也是不会屈服的！
battle_talk_130703=兰斯看来没办法攻破，我们必须往前掠夺，来获得更多补给！
battle_talk_130704=英国人应该不在大本营，我们去收回加莱！
battle_talk_130801=探查一下情报，据说查理王子要去兰斯加冕。
battle_talk_130802=我们一路小心，说不定会有英军阻拦。
battle_talk_130803=拦击住他们！
battle_talk_130804=果然有埋伏！
battle_talk_130805=他们阵型已乱！骑兵们冲呀！
battle_talk_130806=依旧要当心沿途的伏兵，保护我安全到兰斯加冕！
battle_talk_130901=准备了如此之久，今天没有人可以阻挡我获得继承权！
battle_talk_130902=我等得已经太久了，再也没有下次机会了，这场战斗将决定鹿死谁手！
battle_talk_130903=决一死战吧！
battle_talk_131001=虽然我们连续行军非常疲惫，但此时的英军毫无准备，冲击他们！
battle_talk_131002=什么？这些法国人从哪里来的？这该死的大冷天还要打仗！都给我打起精神！否则你们面对的只是有死亡。
battle_talk_131003=英国人擅长打阵地战，那我们就采用突击战术和游走战术，让他们无法组织起有效攻击！
battle_talk_131004=撤退！如果能撤退到城堡，我们就可以获胜！
battle_talk_131005=别给他们机会逃跑！乘胜追击！
battle_talk_131101=法军的进攻越来越犀利，如果还没有援军，前方的城堡就要失守了。
battle_talk_131102=让英国人知道我们西班牙人的厉害，阻挡他们，不能让他们上岸！
battle_talk_131103=他们的船只比我们高，吃水还比我们浅，我们真的无力抵抗！快逃吧！
battle_talk_131104=彻底摧毁英国的舰船！我们是无敌的！
battle_talk_131201=不要和法国人纠缠，我们的目的就是抢掠，让战火烧遍法国！用最快的速度行军！
battle_talk_131202=这些强盗！我们必须组织起阻击行动！不能让他们一路劫掠！
battle_talk_131203=我们只要回到波尔多就可以安全了，速速行军！
battle_talk_140101=在阿芙勒尔失去了三分之一的战士，但我不会退缩的。我们需要尽快和加莱的援军汇合！
battle_talk_140102=敌人的数量越来越多了，看来他们想要一举歼灭我们！架好木栅！做好防御！
battle_talk_140103=依照计划冲锋！我们的人数远远多于他们！注意两侧埋伏的长弓兵。
battle_talk_140104=不好！下雨导致地面太泥泞了。我们根本无法冲锋！
battle_talk_140105=圣乔治！我们反击！
battle_talk_140201=占领鲁昂就可以占领整个诺曼底！他们两个党派争斗越发激烈，看来他们的救援也不会及时，机不可失时不再来。
battle_talk_140202=我们还是避其锋芒吧，和英国人拼命只会给勃艮第人占便宜。
battle_talk_140203=鲁昂缺衣少食，城内的百姓已经快饿死了。不知道救援什么时候才能到来。
battle_talk_140204=我们需要尽快打通补给通道，否则鲁昂不保，不过如果我全力出动，可能会导致阿马尼亚克党的反扑。
battle_talk_140205=不要给他们获得补给的机会。
battle_talk_140301=今日是复活节，苏格兰人和法国人肯定防守松懈，让我们直接冲锋过去，必然杀他们个措手不及！
battle_talk_140302=英国佬冲过来了！大家赶紧穿上衣服！
battle_talk_140303=他们的骑兵和后面严重脱节了！拦住后面的部队！
battle_talk_140304=我们太突进了！啊！
battle_talk_140401=法国人的攻势很强，我们从侧面攻击莫城，切断援助巴黎的供给。
battle_talk_140402=尽管来吧，别说两万人，二十万人也别想攻陷我守的城池！
battle_talk_140403=收复更多的据点！让英国人知道我们苏格兰人的厉害！
battle_talk_140404=我的病似乎无法康复了，我的征途可能就要停止，我未尽之夙愿只能后人帮我完成了。
battle_talk_140501=多年的追逐战让我厌烦。法苏联军的主力在前方按兵不动，这是我们一次性消灭他们的好时机！
battle_talk_140502=保持队形！旗帜前进！
battle_talk_140503=圣乔治！贝德福德！
battle_talk_140504=圣德尼！蒙茹瓦！
battle_talk_140505=队伍不要分散！骑兵绕后！给他们沉重一击！
battle_talk_140506=我们会战斗到最后一刻！即使全军覆没！
battle_talk_140601=坚持住，国王已经派援军来了！
battle_talk_140602=别再妄想了。我们已经三面围城，尽快投降！
battle_talk_140603=我军虽然被围困，但敌人已经围困多日毫无士气，大家和我一起冲呀！
battle_talk_140604=侧翼已经被突破，当心城中的人反过来包围我们！
battle_talk_140605=乘胜占领其他据点！英国人溃退了！
battle_talk_140701=让我们去拯救城内士兵和民众！
battle_talk_140702=终于顺利入城，这次奥尔良或许有救了！
battle_talk_140703=希望英军能自行撤离，我并不希望也不喜欢杀戮。
battle_talk_140704=要战便战，让手中的剑来决定这座城市的命运吧！
battle_talk_140705=让我们拔取奥尔良周边的据点，让我们彻底解放这座城市！
battle_talk_140801=我脑海的声音告诉我要前进！去解救更多法国苦难的民众！
battle_talk_140802=我们将誓死追随你的左右！
battle_talk_140803=快去救援我们的部队，法军不知道吃了什么药？怎么士气如此高昂！
battle_talk_140804=不要被面前的坚城吓倒，上帝已经把他们交由我们处置！即使他们悬浮在云中，我们也能击败他们！
battle_talk_140805=不！我们怎么会输！
battle_talk_140901=吹响号角！跟随高贵的国王查理一起前往兰斯加冕的时刻到来了！
battle_talk_140902=抽调精兵包围他们，决不能让他们达到兰斯！
battle_talk_140903=出击！粉碎一切挡在我们行径道路上的敌人！
battle_talk_140904=我应上帝的启示加冕为王！
battle_talk_141001=我俘虏了贞德！
battle_talk_141002=上帝抛弃我了么？
battle_talk_141003=为贞德复仇！让我们踏平这片土地！
battle_talk_141004=我要把战火烧向整个英国国土！
battle_talk_141005=圣德尼！我会让贞德的意志传遍法国！
battle_talk_141101=清除巴黎周边的据点，收复首都！贞德的遗愿由我来完成！
battle_talk_141102=收复巴黎！让鸢尾花重新绽放在巴黎！
battle_talk_141103=救援巴黎！法军来势凶猛！不知道这次城主能否守住。
battle_talk_141104=看来无法守住了，快逃吧。
battle_talk_141201=占领加莱！算是送给查理七世的礼物！
battle_talk_141202=这座城市已经在我们手上经营了百年，怎么能让你如此轻易攻陷！
battle_talk_141203=海上的部队由我来清理！
battle_talk_141301=夺回诺曼底，把英国人赶到海峡那边去！
battle_talk_141302=我们分头并进，势必一次性解放诺曼底！
battle_talk_141303=好！这一刻我已经等待很久了。
battle_talk_141304=希望还来得及吧。我们不会败的！
battle_talk_141305=是时候和我父亲一样担起重任了！这座城由我来守护！
battle_talk_141306=让荣耀回归法国，让我们凯旋而归！是时候让英国人离开法国了！
battle_talk_141307=我们是时候离开法国了。

;史诗战役对话
battle_talk_200001=我终将把战火点燃到罗马，占领高卢只是我的第一步，这里将是我喂养战马的所在。
battle_talk_200002=我们乘机夺走他们的土地，法兰克将会被我统一！
battle_talk_200003=放马过来吧！我会把你们都送入坟墓！
battle_talk_200004=战士们，为了你们的家人为了你们的土地，我们不能再后退一步了，冲呀！
battle_talk_200005=冲呀！让我们杀入羊群！
battle_talk_200006=杀呀！
battle_talk_200007=终于赶上了，我们要夺回被匈人夺走的一切！
battle_talk_200008=誓死保卫家园！
battle_talk_200009=决战开始了！帝国存亡在此一战！
battle_talk_200010=我们终于抵御住了匈人的入侵！罗马万岁！
battle_talk_200011=罗马的大军已经被我消灭，罗马终将被我征服！
battle_talk_200101=战士们磨好你们的利刃，喂饱你们的马匹。让法兰克人在我们的铁骑之下颤抖吧！
battle_talk_200102=真主保佑！这场战斗胜利后，我们将把教义传播得更广！
battle_talk_200103=难道你们还没吸取上次的教训么？这次你们依旧会大败而归的！
battle_talk_200104=不好，图卢兹不保！我必须向查理求援了。
battle_talk_200105=我将向您臣服我的国王，请您务必前来救援。
battle_talk_200106=我接受你的臣服，我将尽快集结部队前往救援。
battle_talk_200107=如果阻挡不住这些骑骆驼的人，不光是阿基坦地区，整个法兰克王国都将灭亡！
battle_talk_200108=图卢兹已经占领！趁冬天还未到来迅速北上！
battle_talk_200109=集结骑兵！
battle_talk_200110=用防卫步兵防守，用长矛让他们不能再前进一步！
battle_talk_200111=不！我竟然失败了。好不甘心呀！
battle_talk_200112=法兰克万岁！
battle_talk_200113=真主保佑。胜利还是属于我们！我们将把铁骑踏遍整个欧洲！
battle_talk_200114=天冷下来了！我们没有足够的冬衣！速战速决！
battle_talk_700301=高仙芝占我城池掳我父母和公主，欺人太甚，我只能反叛了。
battle_talk_700302=这石国王子竟然还不臣服，看来我只能耗费点时间将石国在地图上抹杀了。
battle_talk_700303=虽说我军刚刚打完仗回来，但比之远征而来的疲惫唐军却有很大的优势，让我们看看唐军到底有多大能耐。
battle_talk_700304=没想到唐军竟然如此凶猛，幸好我还有后手。
battle_talk_700305=收钱办事！高仙芝，你可不要怪我！
battle_talk_700306=不好，葛逻禄竟然反叛，我们被包围了。
battle_talk_700307=真主保佑，这次大胜，我的声望必然大盛。
battle_talk_700308=大唐威武！就算两面夹击依旧无法抵挡我铁骑的攻击！
battle_talk_700309=我族城池与臣民愿意归降于大唐。
battle_talk_700310=识时务者为俊杰。
battle_talk_700401=英国的王位只属于我，既然我们能战胜强大的挪威人也一样能赶走诺曼人！
battle_talk_700402=他们刚刚不久才打了一场大战，还未修整，我们的骑兵可以轻易撕碎他们的防守！
battle_talk_700403=占领高地！用长矛抵御住骑兵的冲击！
battle_talk_700404=威廉已死！诺曼人速速投降！
battle_talk_700405=不要撤退！我还活着！我们身后就是大海，无路可退，让我们重新组织进攻！
battle_talk_700406=哈罗德已死！英格兰王位终究属于我！新的时代到来了！
battle_talk_700407=诺曼人终于败退！英格兰王位不属于任何外来者！

;引导对话
tutorial_talk_1001=我认为我们需要进行一场新手教程。
tutorial_talk_1101=接下来，我将引导您进入英雄传奇！
tutorial_talk_1102=要进入英雄传奇的将领，必须要有自己的私人部队。所以，我们要先进入[#F4d181#指挥部]，为将领招募私人部队！
tutorial_talk_1201=由于通过了第一章，我们的将领已经可以招募私人部队了，请点击[#F4d181#将领头像右侧招募区]！
tutorial_talk_1301=这次，我们先招募[#F4d181#军团大队]，选中他，然后点击[#F4d181#招募]按钮！
tutorial_talk_1501=现在，我们可以点击左上角的[#F4d181#×]离开指挥部！
tutorial_talk_1601=[#F4d181#英雄传奇]正在召唤我们，请点击它！
tutorial_talk_1701=最后，点击[#F4d181#进入]按钮，进入到英雄传奇吧！
tutorial_talk_2101=消耗[#F4d181#佣兵令]或[#F4d181#图纸]，可以得到[#F4d181#招募令]或[#F4d181#器械碎片]，当[#F4d181#招募令]或[#F4d181#器械碎片]达到一定数量，即可招募对应的部队或合成对应的器械。
tutorial_talk_2201=点击红框处，可以查看目前能够得到的[#F4d181#招募令]或[#F4d181#器械碎片]，以及暂未解锁的[#F4d181#招募令]或[#F4d181#器械碎片]。

