stage_group_desc_20008=1302年，不断扩张的奥斯曼帝国与拜占庭帝国发生了边境冲突，拜占庭皇帝米海尔九世亲自率军前往却兵败而回。米海尔的父亲命乔治·莫札隆 率兵前往支援。7月27日，拜占庭军队在巴菲乌斯平原遭遇了奥斯曼一世率领的奥斯曼帝国骑兵。

