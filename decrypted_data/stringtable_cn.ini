battle_talk_700501=让我们重建罗马的辉煌，赶走这些突厥人！
battle_talk_700502=夺回要塞，4万兵马填也要把这里填满！
battle_talk_700503=我们背面的要塞被敌人占领了，看来罗马人想撕毁合约！
battle_talk_700504=4万人又如何，这些乌合之众，都是临时雇佣军，诱敌深入！让我们歼灭他们！
battle_talk_700505=他们的箭矢实在太猛烈了，我们撤回要塞！
battle_talk_700506=我们的左右翼怎么奔溃了！不，我不会失败的！
battle_talk_700507=虽然终于抵御住了这些突厥人的进攻，但是我们在这片地域的控制力已经大不如前了！
battle_talk_700508=圣主保佑！活捉了罗马皇帝！塞尔柱帝国万岁！

