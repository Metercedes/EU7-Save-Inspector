;战役介绍
stage_intro_1=初级教程关卡，以入门操作为主，对移动、攻击等基础操作进行教学。
stage_intro_2=进阶教程关卡，以进阶操作为主，对招募、解散、补充和混编部队等操作进行教学。
stage_intro_3=中级教程关卡，对城市、城堡的建设操作，雇佣军的招募等操作进行教学。
stage_intro_4=高级教程关卡，以器械的装载使用，辅助建筑的功能介绍为主。
stage_intro_101=公元376年，西哥特人向罗马帝国寻求庇护，希望以此躲避匈人的侵袭，但渡过多瑙河后却与境内的罗马人爆发了诸多冲突，最终双方在马尔恰诺波利斯展开了战斗。
stage_intro_102=公元378年，反叛的哥特人在洗劫多瑙河各省后，准备联合其他蛮族入侵巴尔干半岛。罗马皇帝瓦伦斯决定亲自出征，但其麾下士兵的战力参差不齐，是这次镇压叛乱作战的最大隐患。
stage_intro_103=公元402年，西哥特人在国王阿拉里克的带领下，持续入侵西罗马帝国腹地，不久之后更是包围了重镇米兰，这让皇帝霍诺留寝食难安，因此急令正在帝国北部的斯提里科率兵南下。
stage_intro_104=公元410年，阿拉里克在与霍诺留约定的会面地点遭到了罗马军队的袭击，这次袭击让他决定放弃与西罗马帝国谈判，并再一次围攻罗马城，这座“永恒之城”在被多次围攻之后显得摇摇欲坠。
stage_intro_105=公元419年，刚与西罗马帝国签订盟约的苏维汇王国便因边境归属问题，频频与邻国汪达尔王国爆发冲突，有着极强征服欲的苏维汇国王赫默里克决定主动入侵汪达尔人的领地。
stage_intro_106=公元439年，盖萨里克率领军队横穿直布罗陀海峡并占据西罗马帝国北非大半领地已经8年。在与西罗马帝国保持近5年的和平后，盖萨里克再次盯上了迦太基城——罗马帝国的第三名城。
stage_intro_107=公元451年，野心勃勃的匈王阿提拉决定借着西罗马宫廷丑闻的机会出兵入侵高卢地区。身在高卢的罗马将军埃提乌斯也趁机联络高卢地区的蛮族王国组成联军，准备抗击匈人的侵略。
stage_intro_108=公元455年，马克西穆斯通过谋害皇帝瓦伦提尼安三世篡位，这破坏了汪达尔国王盖萨里克与后者的联盟，在收到欧多西娅皇后的求援后，盖萨里克决定出兵进攻意大利。
stage_intro_201=公元6世纪，欧洲各国已经逐渐认识到骑兵的重要性。530年，波斯人向拜占庭帝国发动了攻击，达拉城外，萨珊王朝的精锐骑兵已经全部就位。
stage_intro_202=查士丁尼一世无时无刻不想重现罗马昔日的辉煌，而盖利摩的篡位夺权恰好给了他出兵北非的借口。公元533年，贝利撒留带领部队登陆北非，向迦太基进军。
stage_intro_203=拜占庭在十里会战中取得巨大胜利后，贝利撒留和他的军队占领了迦太基。身处迦太基以西的盖利摩则向他的兄弟求援，准备重新集结军队，夺回迦太基。
stage_intro_204=重新征服北非后，查士丁尼一世将目光投向了意大利地区。公元535年，贝利撒留带领他的军队再一次出征，为他的皇帝占领罗马，夺回意大利地区。
stage_intro_205=占领罗马后，通往拉文纳的道路对拜占庭来说几乎畅通无阻。贝利撒留带领着他的部队继续进军，东哥特王国的首都即将面对拜占庭军队的大举进攻。
stage_intro_206=由于东哥特国王托提拉的活跃，查士丁尼一世不得不将贝利撒留重新派往意大利地区。公元546年，托提拉的部队来到罗马，并包围了这座城市。
stage_intro_207=托提拉在意大利地区的持续侵略令帝国损失惨重，他还计划利用舰队封锁海域，防止帝国军队轻易进入意大利地区，这些举动让查士丁尼一世十分不满。
stage_intro_208=为了夺回意大利的控制权，查士丁尼一世决定派遣纳尔西斯前往意大利。与纳尔西斯相遇后，尽管兵力处于劣势，但作为传统哥特人的托提拉依旧选择主动发起进攻。
stage_intro_209=纳尔西斯的进攻让哥特人难以抵挡，东哥特国王决定向法兰克人和阿勒曼尼人求援，希望他们能进入意大利地区，阻止拜占庭军队的进攻。
stage_intro_210=公元559年，一群匈人越过边境，在君士坦丁堡城郊肆意作恶，这对查士丁尼一世来说简直是奇耻大辱。他再一次将贝利撒留召到面前，赋予他最后一项使命。
stage_intro_301=盎格鲁-撒克逊人的到来让不列颠的原住民恐慌不已，面对装备精良且训练有素的敌人，不列颠人不得不拿起武器抗击盎格鲁-撒克逊人的入侵。
stage_intro_302=南撒克逊部落首领埃尔率领其部民在不列颠岛南海岸成功登陆，但向内陆的进军并不顺利，他们遭到了当地人的顽强抵抗，这让埃尔意识到自己兵力的不足，并向仍在本土的部落请求增援。
stage_intro_303=连年战乱的影响下，不列颠散乱的部族开始整合并建立起各自的王国，但这并未给不列颠带来和平和稳定，部族间的战斗逐渐演变为以诺森布里亚王国为首的王国间更大规模且残酷的战争。
stage_intro_304=公元633年，埃德温治理下的诺森布里亚王国是当时英格兰地区最为强盛的国家，这引起了邻国的忌惮，格温内斯国王卡德瓦龙决定与麦西亚王国结盟，并组建联军入侵诺森布里亚王国。
stage_intro_305=虽然成功抵御了格温内斯王国与麦西亚王国联军的入侵，但诺森布里亚王国也遭受了极其严重的破坏，王国更是一度分裂。公元634年，格温内斯国王卡德瓦龙再次出兵进犯诺森布里亚王国。
stage_intro_306=奥斯瓦尔德的回归与继位，使诺森布里亚军队得以战胜格温内斯王国，王国再次得到了和平与稳定。公元644年，随着十年来国力逐渐恢复，奥斯瓦尔德决定主动进攻麦西亚王国。
stage_intro_307=奥斯瓦尔德对麦西亚的入侵以惨败告终，彭达决定趁此机会联合东盎格利亚王国与格温内斯王国将战火引向诺森布里亚本土。公元655年，诺森布里亚王国只剩伯尼西亚还未被联军攻占。
stage_intro_308=长久以来，麦西亚王国通过强行控制英格兰南部的诸多王国来维持其霸主地位。公元825年，贝恩沃夫为了巩固自己的权威，亲自率军入侵威塞克斯王国，威塞克斯国王埃格伯特奋起反击。
stage_intro_401=由于使者被伽珊尼德所害，阿拉伯人决定发起报复行动，而这一行动的计划却被拜占庭得知，并立刻集结了要塞的驻军。在强大的拜占庭军队面前，阿拉伯人的行动似乎注定会失败。
stage_intro_402=哈立德带领部队来到玛吉·拉希特时，伽珊尼德人认为阿拉伯人无法对他们构成威胁，但阿拉伯人很快就用行动证明了他们的战力是无与伦比的强大。
stage_intro_403=阿布成为阿拉伯第一位哈里发后，开始试图将势力扩展到阿拉伯半岛以外。阿拉伯军队一路向北推进，并对大马士革发起了进攻。
stage_intro_404=为了阻止阿拉伯人前进，夺回失去的领土，希拉克略决定向黎凡特派遣一支大规模的军队。随着敌人的逼近，阿拉伯人从大马士革撤退，并在雅尔穆克重新集结了部队。
stage_intro_405=在雅尔穆克平原与拜占庭军队交战后，阿拉伯人决定继续推进，并占领更多的城市。公元636年末，阿拉伯军队来到了耶路撒冷，并包围了这座城市。
stage_intro_406=阿拉伯人的征服依然在继续，他们的部队在安纳托利亚半岛上所向披靡。接连的战败和城市的丢失让拜占庭帝国感到了恐慌，他们急需战胜这一强敌的办法。
stage_intro_407=战胜了萨珊王朝后，奥马尔决定带领他的阿拉伯战士们向非洲进军。阿拉伯人计划以埃及为起点，占领更多的非洲土地作为自己的领土。
stage_intro_408=在彻底结束了萨珊王朝的统治后，阿拉伯人将拜占庭帝国列为了主要的敌对目标，为此，他们建立了一支强大的海军，来支持他们在地中海地区对抗拜占庭帝国的行动。
stage_intro_501=公元865年，一支维京人大军跨过大海，在不列颠的土地上登陆，并对沿海的修道院等财富中心进行了突袭和劫掠。
stage_intro_502=维京人入侵以来，东盎格利亚和诺森布里亚两大王国已经接连被占领，而维京人的下一个目标，则是占领威塞克斯王国。
stage_intro_503=在雷丁战役中获得优势的维京部队继续向前推进，并在阿什当地区再次与威塞克斯军队发生了战斗。
stage_intro_504=经过长达数十年的入侵和劫掠，只有包括威塞克斯王国在内的为数不多的势力依旧在阿尔弗雷德的带领下抵抗着维京人的入侵。
stage_intro_505=公元893年，重新登陆不列颠的维京人再一次与盎格鲁-撒克逊人发生了冲突，而随着战术的改变，维京人的入侵已经鲜有成效。
stage_intro_506=公元937年，北方三王国结成联盟，希望摧毁英格兰不断增长的力量。面对敌人的入侵，埃塞尔斯坦国王集结了一支军队并向北进军。
stage_intro_507=为了争夺英格兰的王位，挪威国王哈罗德·哈拉尔与他的盟友决定集结军队向约克郡进军。
stage_intro_508=由于英格兰国王忏悔者爱德华的去世，觊觎王座的人开始躁动不安，其中来自挪威的哈拉尔便带领自己的部队，向英格兰发动了进攻。
stage_intro_601=拜占庭帝国和保加利亚帝国的战事连年不断。公元811年，尼基弗鲁斯一世率军攻打保加利亚，在连续取得胜利后，他决定向普利斯卡进军。
stage_intro_602=普利斯卡战役之后，拜占庭帝国和保加利亚帝国双方都遭受了重大的损失，但是保加利亚帝国依旧保持着激进的攻势。尽管损失惨重，拜占庭帝国依旧拒绝签署和平协议。
stage_intro_603=米海尔二世继位后，一位名叫托马斯的军官决定反抗他的统治，这一举动赢得了很多人的支持，在众人的支持下，他联合阿拉伯人向君士坦丁堡发动了攻击。
stage_intro_604=为了报复拜占庭教士被驱逐的行为，利奥六世决定将保加利亚商人驱逐出君士坦丁堡。这给了西蒙一世发动战争的借口，而此时拜占庭军队的主力正在东线抗击阿拉伯人。
stage_intro_605=成为摄政王后，佐伊决定不再对保加利亚帝国让步，这一举动再次让西蒙一世向拜占庭帝国发动攻击。由于西蒙一世的一系列举措，拜占庭人被迫独自作战。
stage_intro_606=公元922年，保加利亚人已经控制了大半个巴尔干地区，但由于缺乏海军，无法对君士坦丁堡造成威胁。保加利亚人决定联合阿拉伯人，但却被拜占庭人的及时出兵阻止了。
stage_intro_607=在结束了与阿拉伯人的战斗后，拜占庭帝国在短时间内恢复了实力，并迅速击败了保加利亚帝国。但是这却让基辅罗斯趁虚而入，巴尔干半岛再次出现了一个新的强大的敌人。
stage_intro_608=公元971年，保加利亚人的战败使得拜占庭人得以占据了大片保加利亚土地，为了夺回自己的土地，多年以来保加利亚人持续发动着进攻。
stage_intro_609=图拉真之门战役后，拜占庭帝国爆发了内战。塞缪尔决定利用这一局势对拜占庭帝国发动攻击。公元996年，塞缪尔击败了塞萨洛尼卡的拜占庭军队，并开始向南进军。
stage_intro_610=从1000年开始，拜占庭皇帝巴西尔二世开始发兵保加利亚。尽管双方互有胜负，但拜占庭还是打到了两国边界。一场中兴的拜占庭帝国和衰落的保加利亚之间的恶战不可避免。
stage_intro_701=1066年，诺曼底公爵为了取得英格兰王位，带领部队跨过海峡，在英格兰登陆。当哈罗德二世得知消息后，立刻召集军队南下，在黑斯廷斯附近，布置守军。
stage_intro_702=在黑斯廷斯战胜哈罗德二世后，威廉带领部队来到了伦敦。为了保证伦敦的安全，他派遣一支队伍来到了南华克，希望能够消灭那里的抵抗势力。
stage_intro_703=成功征服英格兰后，身处埃克塞特的人们宣布拒绝向威廉效忠。为了让埃克塞特人服从他的统治，威廉带领部队包围了这座城市，但却遭到了强烈的抵抗。
stage_intro_704=尽管得到了大多数人的支持，但依旧存在抵抗势力，反抗着威廉的统治，他们大多集中在北方。威廉决定带领部队北上，他认为无法通过和平的方式取得这些人的效忠。
stage_intro_705=1075年，回到诺曼底的威廉拒绝承认艾玛和拉尔夫的婚姻，他的这一举动引起了三位伯爵的反抗起义运动，他们决定趁威廉身处诺曼底，抵抗并推翻他的统治。
stage_intro_706=1105年，亨利一世带领部队入侵诺曼底公爵罗贝尔的领地，并占领了巴约和卡昂。次年，亨利一世返回诺曼底，莫尔坦伯爵作为效忠罗贝尔的贵族之一，成为了他的首要目标。
stage_intro_707=1119年，法兰西国王路易六世带领部队进攻诺曼底。为了捍卫自己在诺曼底的财产与领土，亨利一世被迫与法兰西交战。
stage_intro_708=1135年，亨利一世的突然病亡让英格兰陷入了无政府的混乱状态。斯蒂芬和亨利一世的女儿玛蒂尔达带领各自的势力，为了争夺英格兰王位而展开了斗争。
stage_intro_801=1048年，一支由塞尔柱王子带领的军队进入了拜占庭帝国统治的亚美尼亚地区，由于自身兵力不足，拜占庭人决定采用保守的策略，并等待援军的到来。
stage_intro_802=1071年，逐渐弱势的拜占庭帝国决定利用塞尔柱专心对抗埃及法蒂玛军队的机会，让拜占庭大军突袭亚美尼亚，收付先前所失去的土地和要塞。
stage_intro_803=塞尔柱帝国在爱琴海地区的活动持续威胁着拜占庭帝国，阿莱克修斯决定组建一支舰队来对抗塞尔柱帝国的海军，重新夺回爱琴海地区的控制权。
stage_intro_804=强势的塞尔柱人让拜占庭帝国无法抵挡，皇帝阿莱克修斯决定向西方求援。在拜占庭军队的协助下，东征大军跨过大海，将首战的目标指向了尼西亚。
stage_intro_805=随着更多拜占庭援军的加入，东征军队的战斗力愈发强大，此时的东征大军正在赶往安条克，这座城市位于君士坦丁堡至耶路撒冷半程的位置上。
stage_intro_806=为了加强安纳托利亚前线的防御，病情好转的阿莱克修斯决定亲自前往战场。他的军队多次击败了塞尔柱人，并在获得增援后，再次向敌人发起了进攻。
stage_intro_807=1176年，拜占庭皇帝曼努埃尔一世在解除匈牙利和塞尔维亚的西方威胁之后，决定集中精力对付东方的罗姆苏丹国，并希望能收复安纳托里亚草原。
stage_intro_808=曼努埃尔一世失去了一个收复安纳托利亚的绝佳机会，并失去了大批攻城器械。此时，一支劫掠后正在返程的塞尔柱人军队让他看到了胜利的希望。
stage_intro_901=在攻克了塞尔柱人的首都尼西亚后，远征军遭到了猛烈的反攻。阿尔斯兰一世带领大量的部队，将博希蒙德一世的部队团团包围。
stage_intro_902=在成功占领了安条克后，东征大军一路高歌猛进，继续向着耶路撒冷前进。同时驻守耶路撒冷的阿拉伯将领道拉也早已做好了防守的准备。
stage_intro_903=第一次东征的胜利让西方领主们品尝到了胜利的喜悦，并决定再次发起东征行动，这一次，他们的首要目标则是大马士革。
stage_intro_904=阿卡地理位置优越，是萨拉丁统治范围内一座非常重要的城市，当萨拉丁得知居伊再次集结部队来到阿卡城外时，他立刻集结了军队前往拦截。
stage_intro_905=为了夺回被萨拉丁夺取的耶路撒冷，西欧领主们再一次组织起了东征军队，当大军进入安纳托利亚时，却遭到了塞尔柱人的猛烈攻击。
stage_intro_906=狮心王理查从耶路撒冷撤军后，萨拉丁决定向雅法发动攻击，他认为这是一个复仇的机会。得知消息的狮心王再次集结了军队，向萨拉丁发起了进攻。
stage_intro_907=当东征军队为前往耶路撒冷做准备时，他们的领导人答应了阿莱克修斯四世的请求，决定前往君士坦丁堡，帮助他的父亲夺回皇位。作为报酬，拜占庭帝国将会为他们提供经济和军事上的援助。
stage_intro_908=经过长期的战斗，东征军开始认为埃及是阻碍他们重新夺回耶路撒冷的最大障碍。于是，他们决定组织军队，穿越地中海，向埃及发动攻击。
stage_intro_1001=由于威尔士的公开叛乱行为，亨利二世不得不从诺曼底返回英格兰。为了惩罚和阻止威尔士人，1165年，亨利二世集结了一支庞大的军队，向威尔士人发起了进攻。
stage_intro_1002=为了争夺英格兰王位的继承权，亚瑟和约翰进行了长期的斗争。在约翰决定与伊莎贝拉结婚后，这一平衡被逐渐打破，休十世和腓力二世的加入使得局面变得混乱不堪。
stage_intro_1003=由于约翰的拒不配合，腓力二世表示要亲手夺回诺曼底的土地，不久之后便开始了他的行动。1203年，腓力二世出兵盖拉德城堡，他认为这是控制整个诺曼底的关键。
stage_intro_1004=1213年，由威廉·朗格斯佩率领的英格兰舰队在偶然之下发现了一支法兰西舰队，而法兰西的船员们则早已登陆并开始了他们的劫掠。面对无人舰队，英格兰的胜利仿佛唾手可得。
stage_intro_1005=1214年，一支由英格兰王国、神圣罗马帝国、弗兰德伯国所组成的联军向法兰西王国发起了进攻，匆忙之下腓力二世迅速集结了大军。尽管联军声势浩大，但训练有素的法兰西骑兵似乎并不落下风。
stage_intro_1006=亨利三世统治时期，英格兰国内的饥荒日益加剧，这使得贵族们对亨利三世的不满也日益加剧。一场由西蒙·德孟福尔所领导的反抗亨利三世统治的战争即将到来。
stage_intro_1007=在爱德华一世的监督之下，苏格兰选出了新的国王。爱德华一世认为苏格兰应成为英格兰统治之下的侯国，并要求帮助英格兰对抗法兰西，而苏格兰人则反对了这一要求，并与法兰西结盟。
stage_intro_1008=在威廉·华莱士的带领下，苏格兰军队持续向英格兰发动攻击。1298年，爱德华一世决定与法兰西王国休战，并返回英格兰专心对抗苏格兰军队。
stage_intro_1009=福尔柯克战役获得胜利之后，苏格兰几乎被英格兰所征服。1306年，罗伯特·布鲁斯取得苏格兰王位，在爱德华一世病逝后，爱德华二世的领导能力并不如人意，这使得整个战局发生了逆转。
stage_intro_1010=1323年，罗杰·莫蒂默从伦敦塔逃离后与伊莎贝拉相识。双方都对爱德华二世十分不满，并决定反抗他的统治。1326年，伊莎贝拉与莫蒂默秘密返回英格兰，并开始了他们的反抗行动。
stage_intro_1101=君士坦丁堡沦陷后，尼西亚帝国和伊庇鲁斯专治国成为了最大的两个拜占庭流亡政权，并且他们都希望能够率先光复拜占庭帝国，但这一共同的目标却成为了两个政权冲突的根源。
stage_intro_1102=尼西亚帝国在与伊庇鲁斯专治国的争夺中获得了最后的胜利，在雄心勃勃的米海尔八世的带领下，尼西亚帝国将目光投向了盘踞在君士坦丁堡的拉丁帝国。
stage_intro_1103=1261年，尼西亚帝国与热那亚共和国结为同盟，并准备再一次向君士坦丁堡发起进攻。当发现拉丁驻军和威尼斯舰队远征未归时，他们决定不能浪费如此千载难逢的机会。
stage_intro_1104=重新建立拜占庭帝国后，米海尔八世力求肃清周边拉丁帝国的残余势力。1263年，拜占庭军队向亚该亚侯国发动了进攻，在占领其首都时，却遭到了顽强的抵抗。
stage_intro_1105=普里尼察战役的失败使得拜占庭帝国在摩里亚的战事愈发被动，雇佣军叛逃、部队分散的问题十分严重。1264年，在威廉二世带领下，拉丁帝国军队对分散的拜占庭军队发起了进攻。
stage_intro_1106=1274年，拜占庭帝国对色萨利的约翰发起了进攻，面对庞大的拜占庭军队，约翰·杜卡斯只能选择向外求援。
stage_intro_1107=为了维持帝国对爱琴海的控制权，拜占庭帝国重新组建了海军。但摩里亚和塞特波兹战役的失败让军队遭到了沉重的打击，这也使得拉丁贵族决定进攻德米特里阿斯港口的拜占庭海军。
stage_intro_1108=对安茹西西里王国来说，培拉特是一座极具战略意义的要塞城市。1280年，为了防止敌人能够轻易进入拜占庭帝国的重要地带，拜占庭帝国派出军队对培拉特发起了进攻。
stage_intro_1201=1302年，米海尔九世的军队因畏惧奥斯曼人而宣告解散，这迫使安德洛尼卡二世派遣一支军队渡过博斯普鲁斯海峡，前去支援尼科米底亚正面临的严峻局势。
stage_intro_1202=1321年，年轻的安德洛尼卡三世认为祖父过于老迈，应该由自己来接掌皇帝的宝座，祖孙二人随即展开内战。奥斯曼人决定趁此机会攻占普鲁萨城。
stage_intro_1203=从拉丁帝国手中夺回君士坦丁堡后，拜占庭人集中了太多精力用以恢复对希腊地区的控制，并为此召回了安纳托利亚东部前线的部队，这一举动使得奥斯曼帝国向其发动了新一轮的攻击。
stage_intro_1204=1329年，拜占庭在安纳托利亚的控制区域已经急剧缩水，为了稳定周边区域，安德洛尼卡三世决定派遣军队前往尼科米底亚，但军队在佩莱卡农却遭到了奥斯曼军队的拦截和攻击。
stage_intro_1205=拜占庭的内乱几乎让拜占庭土崩瓦解，约翰六世为了营救自己儿子向奥斯曼帝国求助，而他们将要面对的是塞尔维亚帝国以及保加利亚第二帝国的联军。
stage_intro_1206=1352年，拜占庭再次陷入内战，作为雇佣军的奥斯曼人获得了加里波利附近的要塞控制权。1354年，一场地震彻底改变了加里波利的局面。
stage_intro_1207=奥斯曼帝国在1352年在巴尔干半岛占领了第一个堡垒后开始迅速扩张在欧洲的土地，保加利亚皇帝伊凡亚历山大决定阻击这支军队进攻的步伐。
stage_intro_1208=占领加里波利后，奥斯曼帝国在巴尔干南部的扩张更为迅速。在经过了一系列动荡和修整后，奥斯曼帝国决定向拜占庭帝国的第三大城市阿德里安堡发起进攻。
stage_intro_1301=1337年，法兰西议会决定从英格兰手中收回阿基坦公国，双方的矛盾一触即发。为了夺取英吉利海峡的制海权，爱德华三世亲自率领舰队，向法兰西海军的舰队发动攻击。
stage_intro_1302=在夺取制海权后，爱德华三世带领部队从朴茨茅斯出发，在到达法国北岸后开始进攻。强大的法军已经做好了防守的准备，双方军队即将在克雷西周边遭遇。
stage_intro_1303=克雷西会战的胜利让爱德华三世欣喜不已，英军乘胜追击决定占领加莱，攻下这里就获得了欧洲大陆的桥头堡，但没有想到战事如此艰难。
stage_intro_1304=1346年9月，在英格兰大军围攻加莱之时，腓力六世急请大卫二世出兵进攻英格兰，希望能迫使爱德华三世分兵回救本土。大卫面对着与法国长期的老同盟关系，决定出兵侵略英格兰。
stage_intro_1305=布列塔尼处于非常重要的地理位置，布列塔尼的继承权之战让英法两国都牵扯到了里面，谁都想布列塔尼倾向自己，来获得战场上的优势。
stage_intro_1306=1356年，黑太子爱德华成为了英军的骑兵统帅，带领英军在法国的土地上施行焦土政策，并获得了相当大的成功。约翰二世为了向黑太子报复，决定增加行军速度，以追上英军。
stage_intro_1307=法国国王约翰二世在普瓦捷战役中被俘，之后割让了大片领土给英格兰，而爱德华三世的野心不止于此，他决定发动远征，在兰斯加冕为法国国王！
stage_intro_1308=虽然法国已经满目疮痍，但国不可一日无君，查理王子决定前往兰斯加冕为王，爱德华三世决定切断巴黎至兰斯之间的道路，来阻止这次加冕之礼。
stage_intro_1309=莫龙战役后，布列塔尼继承者之间停战了很久，但双方在英法的支持下蓄力已久，他们都做好了决战的准备。
stage_intro_1310=1369年10月非高级贵族的贝特朗被查理五世任命为新陆军统帅，这个打破惯例的举动让法王获得了回报！随着冬季的到来，英军内部就如何过冬的问题再度产生了争执。法国军队趁此机会，向英军发动了进攻。
stage_intro_1311=1372年，为了回应1368年建立的法兰西-卡斯提利亚同盟，卡斯提利亚国王派遣舰队前往阿基坦协助法军。舰队在拉罗歇尔外海遭遇了正在前往法兰西的英格兰舰队。
stage_intro_1312=晚年的爱德华三世无心战事，黑太子爱德华的去世更让他失去了信心，他的另一个儿子冈特的约翰担任了司令官，在法国进行了多次骑行烧掠，给法国民众带来了极大损失。
stage_intro_1401=查理六世已成疯王，王室之间斗争也愈演愈烈，法国权力归属的不稳定，让年轻的亨利五世获得了机会，1415年他决定沿袭曾祖父进攻的路线征服法国，成为两国国王。
stage_intro_1402=亨利五世在法国的胜利并没有给英国带来多少实际收益，国会给予的支持越来越少，他决定占领鲁昂获得更多法国的领地。
stage_intro_1403=两党的斗争让法国彻底分裂，无畏的约翰被刺杀，让勃艮第公国彻底倒向了英国，《特鲁瓦条约》的签署也让亨利五世成为名义上的法王继承人。而此时查理王储获得了苏格兰的支援，大战在不经意间触发。
stage_intro_1404=博热战役的胜利，让查理王储欣喜，法国贵族们准备乘胜夺回更多失地。而亨利五世此时也计划着新一轮的进攻。
stage_intro_1405=亨利五世和查理六世已经去世2年，查理七世还未加冕，而亨利六世因为年幼，由贝德福德公爵摄政。2年间双方冲突不断，各有胜负，都意图将对方主力一次性消灭。
stage_intro_1406=与英军凌厉攻势形成鲜明对比的是法国政府的迟钝反应，缺乏战斗资金，贵族各自为政，胜利的天平始终没有倾向法国，连续的打击几乎让查理七世绝望。
stage_intro_1407=奥尔良如果被英军攻占，那法国中部最后一道屏障将被打破，这是查理七世的至暗时刻，但上帝给予了这个岌岌可危的国家一束光，一位名叫贞德的少女站了出来。
stage_intro_1408=奥尔良成功解围的消息振奋了整个法国，法军在圣女贞德的激励下厉兵秣马准备清除整个卢瓦尔河谷的所有英军据点。
stage_intro_1409=圣女贞德希望查理七世放弃进攻诺曼底的计划，前往兰斯加冕。从而进一步削弱英军的士气。英军调集了原先援助胡斯战争的精兵前来阻击。
stage_intro_1410=因为支援不足，圣女贞德在贡比涅之战中被俘并在2年后牺牲，这激起了她战友的复仇，就连法国底层民众也参与到这场斗争之中。
stage_intro_1411=1435年，摄政王贝德福德公爵的去世让英国失去了勃艮第公国这个盟友，诺曼底的领地处于混乱状态，查理七世决定乘此机会收复巴黎。
stage_intro_1412=尽管1435-1436年间对法战争中付出了巨大的代价，英国依然不愿意和勃艮第修好，勃艮第公爵决定站到了英国的对立面，攻占加莱。
stage_intro_1413=英国人在法兰西最后的领土只剩下吉耶讷-加斯科涅地区，这块领土已经丢失超过百年。英军决定背水一战，从本土支援了大量兵力前往波尔多。
stage_intro_4001=阿提拉被作为人质在罗马受到过良好的教育，当他回到部族后，开始带领他强悍的部族走向更旷阔的土地。
stage_intro_4003=拜占庭似乎打错了算盘，想用纳贡让阿提拉停止进攻，但是狼是喂不饱的，胃口只会越来越大。阿提拉的大军沿途烧杀抢掠，他被当时的人称为“上帝之鞭”。
stage_intro_4005=匈人的铁骑在横扫巴尔干半岛后对君士坦丁堡进行了围攻，但这两层城墙似乎牢不可破。
stage_intro_4007=罗马皇帝的妹妹竟然想要用帝国一半的疆域作为嫁妆嫁给阿提拉，虽未成功，但这让阿提拉有了进攻罗马的借口。
stage_intro_4009=阿提拉带着号称50万匈人大军渡过莱茵河，面对他的是罗马最强的将领埃提乌斯。他遭遇了他人生中最大的惨败。
stage_intro_4011=阿提拉并未放弃，他翻越阿尔比斯山直接进攻了罗马。阿提拉的大军如何被教皇利奥一世劝退依旧是个谜团，但也让阿提拉成为了一个传奇。
stage_intro_4021=年纪不到24岁的贝利撒留已经担任了地方总督一职，除了他的妻子和皇后交情甚厚以外，他的带兵能力也极其出色。
stage_intro_4023=贝利撒留在尼卡起义中的举动让查士丁尼一世对他信任有加，为了给帝国带来更高的荣誉，贝利撒留接受了皇帝的命令，向迦太基出发。
stage_intro_4025=汪达尔人被征服后，贝利撒留的目标只剩下罗马城，让这个沦陷了百年的城市重回帝国的怀抱。
stage_intro_4027=查士丁尼一世在皇后的撺掇下对贝利撒留愈发不信任，贝利撒留只能用少量的士兵和补给为帝国夺回曾经失去的土地。
stage_intro_4029=意大利回到拜占庭疆域后，皇帝对贝利撒留的戒心更加强烈。为了让他远离帝国的政治中心，查士丁尼一世再一次下令，命令他对萨珊帝国发动战争。
stage_intro_4031=东哥特人重新夺取了罗马以及意大利大部分的土地，而贝利撒留在饱受皇帝猜忌的情况下，只能再一次带领少量的部队前去收复失地。而这位战神最终凄凉的黯然病逝。
stage_intro_4041=罗马的衰落让他们再也无力保卫自己的领土，撒克逊人崛起后，入侵了不列颠，而亚瑟和他的骑士们是唯一一支救民于水火的部队。
stage_intro_4043=亚瑟带着他的骑士们开始拔除海岸线上撒克逊的据点，势如破竹的攻势让人们觉得他们拥有魔法。
stage_intro_4045=亚瑟身强力壮但温文尔雅，他和他手下的圆桌骑士骁勇善战，为凯尔特人以及威尔士人带来了希望，在人民的拥护下加冕为国王。
stage_intro_4047=兰斯洛特、高文、杰兰特等圆桌骑士追随着亚瑟王一路征战，但兰斯洛特和王后桂妮维亚却传出了绯闻，亚瑟选择相信桂妮维亚。
stage_intro_4049=撒克逊人决定集中兵力和亚瑟王决一死战，亚瑟王也带领他的150多名骑士和当地的反抗军到达了战场。
stage_intro_4051=骑士莫德雷德在亚瑟王前去法兰西时篡位，亚瑟王赶回不列颠和莫德雷德展开了大战。双方两败俱伤，亚瑟王在留下了诸多传说后悄然而去。
stage_intro_4061=伦巴第王国将部队集结在罗马城下，教皇急忙向查理曼请求救援，查理曼决定分兵多路，奇袭伦巴第王国。
stage_intro_4063=让蛮族归于王国的版图，查理曼为了传播教义决定对萨克森地区进行征服。这里民族众多民风彪悍，并不是那么容易臣服的。
stage_intro_4065=除了北面，西面的安达卢斯王国也是查理曼希望征服的疆域，查理曼的军队在这里遭遇了伏击，他手下无畏的骑士罗兰牺牲于此。
stage_intro_4067=查理曼建立了大量的教堂，强迫萨克森人信教。但萨克森地区的叛乱让查理曼怒不可遏，为了一劳永逸，查理曼再次派遣了大批军队。
stage_intro_4069=帝国疆域在不断扩大，除了向西对布列塔尼地区进行了惩罚性战争，查理曼对东面的巴伐利亚也进行了征服。
stage_intro_4071=800年圣诞节，查理曼在圣彼得大教堂加冕为“罗马人的皇帝”。之后查理曼又对东面的拜占庭、波西米亚、斯拉夫以及丹麦进行了征服，帝国的疆域到达了顶峰。
stage_intro_4241=维京人如暴风一般席卷了不列颠，这股凶残的暴风带走了大量的财富和生命，不列颠急需一位英雄来力挽狂澜。
stage_intro_4243=雷丁战役的失利并未击溃人们的斗志，在吸取了之前战败的经验后，阿尔弗雷德用盾墙战术击败了凶狠的维京人。
stage_intro_4245=老谋深算的维京人新领袖古斯伦以奇袭的方式直捣黄龙，攻击了阿尔弗雷德的宫廷，获得了大量补给，这让阿尔弗雷德陷入了绝境。
stage_intro_4247=数月后阿尔弗雷德重振旗鼓，并调集了多地的军队对维京人的主力进行了报复，十字架和战锤的决战在埃丁顿一触即发。
stage_intro_4249=阿尔弗雷德借鉴了维京长船的优点制造了新型战舰，并组建了英格兰历史上第一支正规海军，至此英格兰海岸获得了绝对防御。
stage_intro_4251=892年，维京大军再次进攻了英格兰，但这次他们面对的是坚固的城堡。阿尔弗雷德大帝执政期间颁布了法典，创建了学校，为英格兰的统一奠定了基础。
stage_intro_4261=基辅罗斯大公伊戈尔率军攻打君士坦丁堡，作为维京人，他们历来都是从海上进攻这座巨大的城市，但喷火战船让他们有来无回。
stage_intro_4263=基辅罗斯的失败让归顺他们的部落蠢蠢欲动，德列夫利安人首领马尔偷袭并杀死了麻痹大意的伊戈尔，这也给自己带来了灭顶之灾。
stage_intro_4265=伊戈尔的遗孀奥尔加假意愿意嫁给马尔，马尔信以为真，立刻迎娶了奥尔加，在婚礼最热闹非凡之时，奥尔加下令血洗婚礼。
stage_intro_4267=奥尔加并未放过其他的德列夫利安人，她火烧了他们的住所，并率领大军攻占了伊科罗斯城。
stage_intro_4269=奥尔加接受了洗礼皈依了东正教，并将东正教带入了基辅罗斯，但信奉雷神托尔的维京人并不领情，她的儿子斯维亚托斯拉夫进攻了拜占庭。
stage_intro_4271=奥尔加将东正教的种子种在了基辅罗斯，她还用石头建造了基辅、诺夫哥罗德等大城市，基辅罗斯也从部落渐变为了王国。
stage_intro_4361=法兰克王国在查理曼去世后分裂成三个王国，936年位于东法兰克王国的奥托加冕为萨克森公爵和德意志国王。但他必须平定叛乱才能统一德意志。
stage_intro_4363=同父异母的兄弟亨利在被巴伐利亚公爵蛊惑后反叛，宽厚的奥托一世在击败他们后并赦免了他们，但这群人并没有吸取教训。
stage_intro_4365=奥托在和新的妻子生下孩子后，剥夺了长子鲁道夫的王位继承权，这让德意志王国再次陷入了内战。鲁道夫甚至邀请了马尔扎人一起袭击父亲。
stage_intro_4367=匈牙利的马尔扎人趁德意志内战，954年对欧洲进行了大规模的入侵，奥托一世立刻停止了内战势必要阻止这群入侵者。
stage_intro_4369=955年，马尔扎人的主力和德意志的主力在莱赫费尔德相遇，这是一场生死存亡的大战，战败的一方将成为历史的尘埃。
stage_intro_4371=961年，教皇向奥托一世求援，奥托用1000骑兵击败意大利王国大军，之后在罗马加冕为神圣罗马帝国皇帝。
stage_intro_4281=蓝牙王哈拉尔之孙，丹麦王斯维恩之子克努特带领着10000人驾驶着200艘长船从斯堪的纳维亚半岛前往英国，在那里他要建立自己的王国。
stage_intro_4283=英格兰国王埃德蒙的妹夫“贪婪者”伊德里克背叛了英格兰人，投靠了克努特，这让埃德蒙一直避免正面战争，在你追我赶的交锋中双方互有胜负。
stage_intro_4285=克努特3次尝试进攻伦敦，在来回的拉锯战之中，让丹麦人消耗很大，而埃德蒙却从威尔塞斯获得了新军，伊德里克于是重新回到了英格兰阵营。
stage_intro_4287=克努特决定回到海上，但前路被埃德蒙拦住，丹麦人在兵力弱势的情况下发挥出了强大的战斗力，而“贪婪者”伊德里克的再次背叛，让克努特反败为胜。
stage_intro_4289=“刚勇者”埃德蒙在不久后因伤去世，克努特获得了英国王位，而他的兄弟哈拉尔二世在丹麦去世，于是他带领着英格兰人去争夺本属于他的丹麦王位。
stage_intro_4291=如日中天的克努特大帝又发动大军前往挪威和瑞典，甚至连苏格兰和爱尔兰王也臣服于他。自此克努特大帝建立了从波罗的海到爱尔兰的北海帝国。
stage_intro_4301=国王费尔南德一世去世，将自己的领地分给了3个儿子和2个女儿。长子桑乔在罗德里戈的辅佐下发动了对其他兄弟的战争，罗德里戈骁勇善战被摩尔人尊称为：“熙德”。
stage_intro_4303=虽然迅速击败了众兄弟，但桑乔意外身亡，他的弟弟加冕为阿方索六世，熙德只得效忠于他。但他功高震主的功绩让阿方索六世颇为忌惮。
stage_intro_4305=熙德因为过错被阿方索六世流放，然而熙德的声望获得了不同宗教多支部队的投靠，于是他带着这支部队，效力于萨拉戈萨君主穆塔命，并获得了诸多胜利。
stage_intro_4307=阿方索六世意图将国土扩张至整个伊比利亚半岛，却在萨拉卡大战之中失败。此时他想到了熙德，并赦免了他，熙德也重新回到了旧主身边。
stage_intro_4309=熙德因为救援不及时被阿方索六世没收了封地并囚禁了妻儿，这让熙德决心夺取一块自己的领地。熙德在瓦伦西亚达到了自己声望的顶峰。
stage_intro_4311=穆拉比特王朝的统治者优素福希望夺回一统西班牙，却在瓦伦西亚久攻不下，他的士兵畏惧于这位战神，即使熙德中箭重伤，只要他骑在马上，就无人可挡。
stage_intro_4381=玛蒂尔达出生高贵，她身上有着苏格兰王族、诺曼贵族、威塞克斯贵族的血脉，在她很小的时候就被亨利一世嫁给了神圣罗马帝国的国王亨利五世，从而加冕为罗马皇后。
stage_intro_4383=玛蒂尔达23岁的时候，丈夫去世，她不得不回到故土诺曼底。1120年白船灾难后，英格兰王位的继承权变得扑朔迷离。1127年，玛蒂尔达再婚，嫁给了安茹伯爵杰弗里。
stage_intro_4385=1135年亨利一世的去世让英格兰王位变成了空王座，拥有继承权的长女玛蒂尔达和她的丈夫杰弗里决定夺回诺曼底，并惩罚那些乘机反叛的诺曼贵族。
stage_intro_4387=玛蒂尔达的堂兄斯蒂芬在英格兰获得诺曼贵族的支持登上了王位，而格罗斯特的罗伯特支持他的妹妹在苏格兰起义，一场内战开始了。
stage_intro_4389=斯蒂芬围攻了玛蒂尔达皇后所在的城堡，而罗伯特的救援也迅速赶来，并俘虏了斯蒂芬。1141年复活节后，玛蒂尔达皇后成为了英格兰的实际掌权者。
stage_intro_4391=玛蒂尔达的加冕典礼尚未举行，却遭到了斯蒂芬和其他贵族的反叛，玛蒂尔达在温切斯特溃败，之后回到诺曼底。而英格兰王位最终由她的儿子亨利二世夺回。
stage_intro_4081=赞吉王朝在努尔丁父亲的努力下已经初具规模，在赞吉遇刺后，安条克亲王意图在这个混乱的局势下夺取阿勒颇。
stage_intro_4083=埃德萨伯国在获知阿勒颇被安条克公国攻击后，意图夺回自己失去的领土，得到消息的努尔丁带领部队迅速前往埃德萨进行救援。
stage_intro_4085=赞吉王朝在努尔丁的努力下日益繁荣，努尔丁决定扩大他在叙利亚北部的领土，那么切断安条克和埃德萨之间的要道变得顺理成章。
stage_intro_4087=大马士革领主乌努尔病逝后，大马士革变为众人口中的一块肉，无论是努尔丁还是耶路撒冷王国都想得到这块土地。
stage_intro_4089=努尔丁在叙利亚的一系列活动再次震动了基督国家，这促使西方国家发起了第二次东征。而这次东征因为努尔丁的存在必然无法像第一次那样顺利。
stage_intro_4091=远征军前往占领埃及，努尔丁毫不犹豫的派出自己的大将前去支援，同去的还有年轻的萨拉丁。英主努尔丁在之后不久病逝，赞吉帝国也因此灭亡。
stage_intro_4101=罗马爆发的起义使教皇尤金三世不得不向腓特烈一世求援，作为神圣罗马帝国的皇帝自然是义不容辞。
stage_intro_4103=由于波兰公爵列斯拉夫四世拒绝交纳年金，这让腓特烈一世忍无可忍，并决定发兵渡过奥德河进攻波兰。
stage_intro_4105=腓特烈一世在意大利的血腥暴政激怒了意大利民众，威尼斯、维罗纳等城邦组成了“伦巴第同盟”，共同反抗皇帝的统治。
stage_intro_4107=腓特烈一世的封臣“狮子”亨利拒绝向意大利出兵，这让腓特烈一世怒不可遏，并决定出兵征讨亨利。
stage_intro_4109=“狮心王”理查、“狐狸”腓力二世和腓特烈一世发动了第三次东征分兵三路前往耶路撒冷，神圣罗马的军队在经过拜占庭时和当地军队发生了冲突。
stage_intro_4111=在经过安纳托利亚高原时，东征的军队受到了罗姆苏丹国的攻击，这支强敌是东征途中最大的障碍。腓特烈一世在获胜后意外落水身亡，这支东征部队黯然收场。
stage_intro_4121=努尔丁的病逝让赞吉王朝处于分裂之中，而身处埃及的萨拉丁则逐渐站稳了脚跟，阿尤布王朝就此诞生。
stage_intro_4123=萨拉丁一路北上占领了大马士革，又占领了霍姆斯和哈马，将部队稍加整顿之后，他决定前往并占领赞吉王朝的首都阿勒颇。
stage_intro_4125=叙利亚的伊斯兰世界得到了统一，这让耶路撒冷王国的形势岌岌可危，鲍德温四世不得不率领数千士兵前往阿斯卡伦加强防御。
stage_intro_4127=鲍德温四世试图切断萨拉丁的补给路线，并在雅各布渡口建造城堡。为了保证补给线，萨拉丁率领军队向城堡发动了进攻，以阻止城堡的建立。
stage_intro_4129=鲍德温四世的去世让耶路撒冷王国陷入了混乱，法兰西的雷纳尔德无视合约多次袭击埃及的商队，大战无可避免地爆发了。
stage_intro_4131=耶路撒冷王国的大军在哈丁全军覆没，挡在萨拉丁面前的仅剩下厚厚的城墙，这位仁慈之王在这里获得了双方的尊重，被人们称为：“阿拉伯骑士”。
stage_intro_4141=金雀花王室内部的争权夺利不断，并且有愈演愈烈的趋势。同时，法兰西的属地也是叛乱不断，这让年仅16岁的理查不得不参与平叛。
stage_intro_4143=在法王“狐狸”腓力二世的煽风点火下，父子双方再一次产生了冲突，并且在勒芒进行了大战。
stage_intro_4145=理查一世加冕为英王后，决定应教皇的请求发动第三次东征，“红胡子”腓特烈一世和腓力二世将一同参与，分三路出发。
stage_intro_4147=腓特烈一世意外身亡，攻陷阿卡后的腓力二世决定率军回国，并因为战斗中的芥蒂伺机对理查一世进行报复，现在只有理查一世仍在向耶路撒冷进发。
stage_intro_4149=“狮心王”理查一世虽然和萨拉丁是敌对关系，但两人惺惺相惜，时常通信。“狮心王”是如此骁勇善战，如果不是弟弟篡位的举动，耶路撒冷极有可能易主。
stage_intro_4151=理查一世因为得罪法兰西王国和神圣罗马帝国，在回归途中被囚禁，直到他母亲用大笔赎金将他赎回。愤怒的“狮心王”对腓力二世发动了进攻。狮心王也因此中箭身亡。
stage_intro_4161=铁木真的才干让他的部族逐渐崭露头角，这也让昔日的伙伴变成了敌人。
stage_intro_4163=铁木真势力的日益壮大让他的义父愈发忌惮，既然铁木真无法臣服，那就只有决一死战了。
stage_intro_4165=一个多世纪前差点被灭族的蒙古人如今已经无比强盛，而草原之中只能有一个霸主，铁木真发动了对西辽、西夏和金的战争。
stage_intro_4167=一统草原后，铁木真尊号“成吉思汗”，现在他的目光转向了西方辽阔的土地，成吉思汗分兵4路率领20万大军进军西域。
stage_intro_4169=1227年，一代天骄成吉思汗在攻城掠地的途中去世，但是他的精神还在延续，蒙古帝国的疆域还在扩大。
stage_intro_4171=遵照成吉思汗的遗愿，蒙古帝国发动了第三次西征，他们将要面对的是阿拔斯王朝和阿尤布王朝的铁骑。
stage_intro_4181=亨利三世的败家和懦弱行为让英格兰陷入了内战，金雀花王朝岌岌可危，爱德华王子决定力挽狂澜。
stage_intro_4183=爱德华王子热爱他的军事生活并希望征战四方，路易九世发动了新的东征，爱德华抛开了英格兰的烦恼投身其中。
stage_intro_4185=1274年，爱德华一世加冕，醉心于亚瑟王传说的他决定一统大不列颠王国，威尔士便是爱德华一世第一个目标。
stage_intro_4187=由于爱德华一世对威尔士的残暴统治，在卢埃林的带领下，威尔士爆发了大规模的叛乱。
stage_intro_4189=威尔士臣服后，爱德华一世把目光瞄向了更北的苏格兰，1296年，爱德华一世带领着长弓兵和骑兵部队前往苏格兰。
stage_intro_4191=苏格兰的贵族占领了邓巴坚固的城堡，意图在这里阻挡住爱德华一世的进攻。爱德华一世在这里击败了他们并带走了苏格兰国宝：加冕石。
stage_intro_4201=英格兰人在苏格兰的血腥统治让华莱士奋起抗争，不仅仅出于对自由的信念，更有让苏格兰独立的决心。
stage_intro_4203=华莱士的反抗行为激发了饱受压榨的苏格兰人民，于是华莱士身边迅速聚集了大量志同道合之人。
stage_intro_4205=英格兰终于开始正视威廉华莱士，决定派遣数千正规军剿灭这支农民起义军。
stage_intro_4207=在斯特林桥战役胜利后，华莱士决定乘胜追击，解放更多苏格兰土地和人民，他的游击战术取得了极大的成功。
stage_intro_4209=威廉华莱士终于获得了苏格兰贵族的认可，被任命为苏格兰护国公。爱德华一世对手下的无能感到愤怒，他决定亲率大军迎击威廉华莱士。
stage_intro_4211=威廉华莱士重新组织军队发动了进攻，但却因为伙伴的出卖而被俘虏。虽然华莱士被斩首于伦敦，但是他的血让更多苏格兰人觉醒。
stage_intro_4321=苏格兰贵族们在邓巴战役失败后，对爱德华一世俯首称臣。1297年，威廉华莱士在苏格兰发动独立运动，罗伯特布鲁斯也顺势加入其中。
stage_intro_4323=作为苏格兰王位合法竞争者之一的罗伯特布鲁斯在教堂杀死了另一个竞争者约翰康明后，在斯康加冕为王，被爱德华一世通缉悬赏，并派遣部队追杀。
stage_intro_4325=罗伯特布鲁斯的妻女被俘，自己则流落四方。第二年罗伯特布鲁斯带领他在爱尔兰招募的新兵登陆不列颠进行反击。
stage_intro_4327=罗伯特布鲁斯充分吸取了在梅斯文战役中失败的教训，充分利用自己熟知家乡地形地貌，对英军进行反击。
stage_intro_4329=爱德华一世在获知劳顿山战役失利后不顾年迈的身躯御驾亲征，结果病逝途中。不到3年时间，罗伯特布鲁斯占领了英格兰北部大部分土地。
stage_intro_4331=虽然苏格兰人的数量不抵英格兰的一半，而且没有长弓兵和重骑兵，但是他们士气高昂，战略得当，大败爱德华二世。从此英格兰再也无法阻止苏格兰的独立。
stage_intro_4341=布列塔尼公爵家族爆发了继承人之争，英格兰和法兰西都试图扶持自己的候选人，双方冲突愈演愈烈，最终在莫龙附近爆发了遭遇战。
stage_intro_4343=1345年，爱德华三世三路并进，派出英军在布列塔尼和加斯科涅两地展开攻势，同时自己率大军向欧洲内陆进军，兵锋直指巴黎。
stage_intro_4345=在经过漫长的追击之后，法兰西同盟军在克雷西附近追上了几乎精疲力尽的英军。英格兰军队被迫展开阵型与其决一死战。
stage_intro_4347=1355年，察觉到加斯科涅地区兵力不足，爱德华三世计划对法兰西南部进行一次突袭式扫荡，这个任务的最佳人选就是在克雷西战役中崭露头角的黑太子爱德华。
stage_intro_4349=1356年，法王约翰二世率领大军意图追剿在加斯科涅地区扫荡的英军，双方在多次擦肩而过后终于在9月17日正式遭遇，百年战争第一阶段的决战就此拉开序幕。
stage_intro_4351=1367年，英法双方介入了西班牙斯提尔王国的内战，正式打响了百年战争第二阶段的第一场大战。
stage_intro_4401=聪颖的鲍德温在很小就表现出了坚定和乐观等优良品质，可惜却得了绝症麻风病。9岁的他加冕为耶路撒冷王国国王，这让这个国家处于岌岌可危之中。
stage_intro_4403=1176年刚成年并掌权的鲍德温四世就发动了对埃及的全面进攻，在萨拉丁和刺客组织战斗时，鲍德温四世突袭了萨拉丁。
stage_intro_4405=鲍德温四世获得了拜占庭帝国曼努埃尔皇帝的支援，从海上发动了对埃及的入侵，但由于耶路撒冷王国派系争端导致了失败。
stage_intro_4407=萨拉丁带领着众多部队到达了阿斯卡隆，在发现兵力很少的鲍德温四世军队后，决定突袭耶路撒冷。却没想到被这16岁的国王以少胜多差点丢了性命。
stage_intro_4409=两年中，双方的战斗不断，萨拉丁再也无法轻视这年少的君主，而重病缠身的鲍德温四世让法兰克人的军队陷入了隐患。
stage_intro_4411=疾病带来的痛苦围绕着国王，他不得不采取防守姿态，力求保住耶路撒冷的疆域。再一次次阻拦住萨拉丁的进攻后，鲍德温四世也燃烧尽了他最后的生命。
stage_intro_4421=瑞典封建主乘蒙古入侵罗斯之机，意图进军诺夫哥罗德大公国以夺取其领土。亚历山大率领精锐部队在涅瓦河畔突袭并击溃了来犯的敌人。因其在此战中表现出统帅艺术和作战精神，被誉为涅夫斯基。
stage_intro_4423=在涅瓦河战役之后，涅夫斯基在诺夫哥罗德市民会议的请求下率军抵抗来犯的十字军骑士团。为保障罗斯西北边境安全，收复普斯科夫公国便是当务之急。
stage_intro_4425=收复普什科夫只是计划的第一步，想要一劳永逸地保障边境安全，主动出击是明智的选择。涅夫斯基率军主动进入了骑士团的领地以寻求击溃敌人，他派出的侦查部队在哈马斯特与敌军先头部队遭遇了。
stage_intro_4427=侦察部队确认了骑士团的动向，涅夫斯基遂调集部队转向阻击敌人。双方在楚德湖遭遇，爆发了最终的决战。这一场战斗为罗斯人的边境带来了短暂的和平。
stage_intro_4429=蒙古人的骑兵踏上了俄罗斯的土地，在他们势不可挡的攻势面前，涅夫斯基的父亲雅罗斯拉夫大公被迫向蒙古人投降，但在回程途中身亡。涅夫斯基和弟弟安德烈展开了争夺大公宝座的斗争。
stage_intro_4431=涅夫斯基在执政后期多次平定了国内的骚乱，有力地维护了国家的统一和稳定。在他死后，俄罗斯迅速分裂为许多互相争吵不休的公国。
stage_intro_4441=诺曼人的势力在西西里逐渐崛起，对拜占庭帝国的威胁也与日俱增。终于，在1081年，双方在巴尔干西部展开了会战。
stage_intro_4443=在经历底拉西乌姆会战的惨败后，阿莱克修斯一世向神圣罗马帝国寻求帮助，并在后者的帮助下成功使诺曼人的军队投降。
stage_intro_4445=一个自称“君士坦丁·迪奥真尼斯”的人觊觎阿莱克修斯一世的拜占庭皇位，他联合库曼人对拜占庭北方边境发起了进攻。
stage_intro_4447=为了从塞尔柱人手里收复安纳托利亚，阿莱克修斯一世向罗马教皇求援，第一次十字军东征就此在教皇的号召下开始了。
stage_intro_4449=阿莱克修斯一世的宿敌之子博希蒙德一世建立了安条克公国并向拜占庭帝国发起了进攻。经过两年的战争，拜占庭帝国取得了胜利并将安条克公国收为附庸。
stage_intro_4451=1110年后，阿莱克修斯一世开始对塞尔柱人发起进攻，在经过数年的战争之后最终成功收复了小亚细亚沿海地区。
stage_intro_4461=苏定方少年时便以骁勇善战而闻名，但唐朝初年一直未被重用。直到630年唐太宗李世民下令清除帝国北方的边防隐患--突厥，苏定方跟随李靖出师征讨，善用奇兵的苏定方在阴山一役大获全胜，活捉突厥首领颉利可汗。
stage_intro_4463=655年援救新罗之后，唐高宗李治又让苏定方进军西突厥，沙钵罗可汗亲率十万骑兵前来迎战，在曳咥河边被苏定方带领少许兵马绕后突袭后大败而逃。
stage_intro_4465=突降暴雪，西突厥残部逃往自己驻地，沙钵罗可汗放松警惕认为唐军不会再追击，而苏定方却一直紧随其后并发动了突袭，西突厥因此灭亡。丝绸之路从此开辟，唐朝走向巅峰。
stage_intro_4467=吐蕃国日趋强盛，且不断骚扰边境，逐渐成为唐朝西部的心腹大患，659年唐高宗让苏定方前往凉州全力负责对吐蕃的防御。他以一千兵力击溃吐蕃八万大军并击杀大将达延莽布支，这让吐蕃之后十多年再无东进之意。
stage_intro_4469=西突厥的残余部落思结俟斤首领都曼被吐蕃挑拨后联合了其他三个国家一起反叛唐朝，刚刚平定吐蕃的苏定方率领1万多士兵一昼夜强行军150公里翻越4000-7000米的高原迅速击溃了都曼，这让唐朝的领土达到了前所未有之辽阔。
stage_intro_4471=萨珊帝国被阿拉伯帝国灭国，流亡的波斯王子卑路斯向唐朝救援，唐高宗派使者去边境迎接波斯王子，并和阿拉伯帝国发生了冲突。660年唐高宗又派老将苏定方跨海东征先后灭了百济和高句丽，这让他成为了欧亚大陆当之无愧的最强将领。
stage_intro_4501=帖木儿年轻时凭借自身过人的能力得到了东察合台大汗秃忽鲁帖木儿的赏识，被任命为渴石城的统治者。
stage_intro_4503=帖木儿由于私自释放了无辜的宗教首领被诬陷为反叛，被迫逃亡。他逃往了阿富汗南部去投奔姻亲兄弟忽辛。
stage_intro_4505=在东察合台大汗秃忽鲁帖木儿逝世后，帖木儿起兵击败了河中总督也里牙思火者，重新获得了渴石城的控制权。
stage_intro_4507=在势力逐渐稳固后，帖木儿与忽辛之间产生了矛盾并逐渐恶化。忽辛多次试图消灭帖木儿，帖木儿也多次予以回击，在数年的拉锯之后，帖木儿获得了最终的胜利。
stage_intro_4509=击败忽辛之后，帖木儿总揽了西察合台的军政大权并扶持了一个傀儡苏丹，后世将之视为帖木儿汗国建立的标志。
stage_intro_4511=东察合台汗国在经过数年的政变动荡后，由哈马鲁丁继位，他在继位后多次袭击帖木儿汗国的边境，最终帖木儿在22年的战争之后将其彻底消灭。
stage_intro_4513=钦察汗国的脱脱迷失和帖木儿对波斯地区都有着野心，双方的摩擦冲突很快演变为两国的战争，帖木儿用两次远征重创了钦察汗国。
stage_intro_4515=在建国十年后，帖木儿发动了西征，其中第一个目标便是在呼罗珊的卡尔提德王朝，由于其内部意见不和，帖木儿很快便将其击溃。
stage_intro_4517=帖木儿西征的最后一个目标是格鲁吉亚王国，但他在征服这里之后，他保留了原有的政权，这为后来的多次反叛埋下了隐患。
stage_intro_4519=为了掠夺富庶的北印度地区，帖木儿以印度德里苏丹国对异教徒太过宽容为借口，发动大军对印度进行了征伐。
stage_intro_4521=1399年，马穆鲁克新任苏丹法拉吉拒绝承认帖木儿汗国为宗主国，并拒绝交出帖木儿的敌人，这招来了帖木儿的怒火。
stage_intro_4523=奥斯曼帝国是与帖木儿汗国同时存在于中东地区的另一个强大帝国，双方的不断扩张导致了冲突，最终冲突演变为了大规模的战争。
stage_intro_4541=约翰一世·齐米斯基斯出生于亚美尼亚的一个军事贵族家庭,他的舅舅是拜占庭名将尼基弗鲁斯·福卡斯。他很早就跟随舅舅一同征战，二十多岁就在萨莫萨特战役中崭露头角。
stage_intro_4543=963年，尼基弗鲁斯·福卡斯趁皇帝病逝夺得帝位。969年，约翰一世与皇后塞奥法诺将尼基弗鲁斯暗杀，自立为帝。尼基弗鲁斯的侄子巴尔达斯·福卡斯试图起兵为叔叔报仇，但很快便被约翰一世镇压。
stage_intro_4545=970年，罗斯大公斯维亚托斯拉夫率领军队开始进犯拜占庭帝国北部，此时的约翰一世正处于与福卡斯家族的内战之中，无暇支援，负责保卫色雷斯地区的将领是他的心腹爱将巴达斯·斯科莱鲁。
stage_intro_4547=971年，斯维亚托斯拉夫率三万军队重新南下进犯拜占庭帝国边境，约翰一世在解决国内内乱问题后，率领精锐部队前往迎战。经过多次激战，约翰一世将斯维亚托斯拉夫围困在多罗斯托隆城中。
stage_intro_4549=972年，在结束了与罗斯的战争之后，约翰一世将目光投向了东方。起初拜占庭方面取得了一定的东征成果，但在后来与摩苏尔酋长国的战斗中，东部战区将军米利阿斯兵败被俘，使得此次东征被迫结束。
stage_intro_4551=974年，约翰一世发动了第二、第三次东征，将摩苏尔酋长国完全击溃并迫使其称臣。期间约翰一世一路东进，将整个幼发拉底河中游以西的地区全部纳入了帝国版图中，占领了大马士革，的黎波里等城市。


