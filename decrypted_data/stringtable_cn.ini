;战役章节开篇
;__font_type[font_text_]
campaign_desc_1=多方敌人的入侵让本就虚弱不堪的罗马帝国雪上加霜，二十年间皇位的不断更迭更是加剧了帝国的动荡，罗马帝国似乎正不可避免地走向灭亡。
campaign_desc_2=在外族的多番入侵之下，西罗马帝国的灭亡已成定局，而身处东方的君士坦丁堡则迎来了两位带领拜占庭帝国走向辉煌的人物，查士丁尼一世和贝利撒留。
campaign_desc_3=随着罗马帝国国力的不断衰弱，其对不列颠岛的控制越来越显得力不从心，来自日耳曼地区的盎格鲁-撒克逊人趁机大举向不列颠岛迁徙，失去帝国庇护的岛民不得不独自面对这些入侵者。
campaign_desc_4=公元7世纪起，阿拉伯人四处征战，而拜占庭帝国便是阿拉伯人最为强大的敌人之一。
campaign_desc_5=自公元8世纪起，蓬勃发展的不列颠积累了大量的财富，人们相信大海对于英格兰是天然的屏障，但却从来没有想过，有一天袭击居然会从海上发起。
campaign_desc_6=巴西尔一世称帝掀开了拜占庭帝国马其顿王朝的篇章，马其顿王朝统治期间是拜占庭帝国的全盛时代。
campaign_desc_7=1066年，宣信者爱德华驾崩前举荐了哈罗德成为国王，同时诺曼底公爵认为自己也拥有继承权。当哈罗德二世即位的消息传到诺曼底时，威廉大怒，并立即宣布出兵英格兰。
campaign_desc_8=马其顿王朝于1057年结束后，拜占庭帝国经历了数十年的萧条与衰落，直到1081年阿莱克修斯一世登基后，这一局面最终才得以结束，拜占庭帝国在科穆宁家族的统治下，正在逐步复苏。
campaign_desc_9=在教皇的准许下，西欧领主和骑士们带领着军队，向着地中海东岸进发。他们以耶路撒冷为目标，希望能够收复这座被敌人占据的城市。
campaign_desc_10=1135年内战后，玛蒂尔达皇后成功为他的儿子亨利二世争取到了英格兰王位的继承权。1154年，亨利二世于威斯敏斯特教堂加冕继位，金雀花王朝的时代就此到来。
campaign_desc_11=第四次东征之后，君士坦丁堡被远征军所占领，拜占庭帝国成为了流亡的尼西亚帝国，拉丁帝国的存在成为了所有拜占庭人心中挥之不去的阴影。
campaign_desc_12=十三世纪末，塞尔柱帝国灭亡后，奥斯曼帝国随之建立。奥斯曼帝国的建立，使得原本分散的安纳托利亚侯国联合了起来，与奥斯曼一同对抗拜占庭帝国。
campaign_desc_13=英法两国自威廉征服英格兰以来，就有着诸多矛盾和冲突，法王腓力逝世后国王继承权的无法确定让整个法国产生了巨大危机。1337年，爱德华三世正式自称为法兰西国王，同时腓力六世则宣布收回爱德华三世在法国的所有土地，就此英法两国全面开战。
campaign_desc_14=英格兰政局的逐渐稳定，1413年亨利五世在威斯敏斯特教堂加冕，这位伟大的战士重新燃起了对欧洲大陆征服的野心，亨利五世想要完成祖辈未完成的愿望，建立“英法帝国”。
campaign_desc_15=在奥斯曼帝国的扩张的道路上，一代代苏丹耗尽自己一生的精力对抗着整个西方世界，他们面前有一座坚城，它叫君士坦丁堡。
campaign_desc_16=随着理查二世被推翻，为了争夺英格兰王位，爱德华三世的两支后裔，兰开斯特家族和约克家族展开了战斗。
campaign_desc_51=多方敌人的入侵让本就虚弱不堪的罗马帝国雪上加霜，二十年间皇位的不断更迭更是加剧了帝国的动荡，罗马帝国似乎正不可避免地走向灭亡。
