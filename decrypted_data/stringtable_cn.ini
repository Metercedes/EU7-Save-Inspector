stage_intro_1601=在疯病发作一年后，亨利六世恢复了清醒。在王后安茹的玛格丽特的支持下，萨默赛特公爵官复原职，而约克公爵理查则失去护国公之位被迫离开宫廷。1455年，对萨默赛特公爵不满的约克公爵理查联合内维尔家族集结军队向伦敦挺进，意图将萨默赛特公爵一举铲除。
stage_intro_1602=随着第一次圣奥尔本斯战役的落幕，约克公爵扫清了他在宫廷中的大部分对手，重新回到了护国公的位置上。可惜好景不长，1456年初，约克公爵提出为王室收回土地的法案被议会否决，本人也被迫辞去护国主之位。与此同时，王后玛格丽特也在暗中组织力量，试图夺回王室的权力。1459年，双方矛盾激化，约克派的索尔兹伯里伯爵整兵南下，意图与约克公爵会师；玛格丽特当即派兵前往拦截，双方在布洛希思爆发了遭遇战。
stage_intro_1603=约克公爵在与索尔兹伯里伯爵成功会师后并未能够继续向前推进多远，一支打着国王亨利六世旗号的军队挡住了他们，这支军队的数量大约是他们的两到三倍。双方兵力的差距使得约克公爵不得不暂时命令部队后退扎营，并写信给国王表示自己的忠诚。但此前在布洛希思发生的战斗使他已经失去了国王的信任，一场大战在所难免。
stage_intro_1604=拉德福德桥战役的失利使约克家族在宫廷中的地位一落千丈，兰开斯特家族的势力逐步扩大并获得了部分原约克家族的领地。虽然名义上萨默赛特公爵获得了原属于造王者沃里克的加莱作为领地，但加莱当地拒绝接受萨默赛特公爵的统治。1460年1月，沃里克先发制人偷袭了驻扎于桑威治，正准备进攻加莱地区的兰开斯特军队，并一路向西攻入伦敦。兰开斯特家族的军队在得知此消息后，迅速在北安普顿建立了防御阵地以阻挡来势汹汹的约克家族军队。
stage_intro_1605=北安普顿战役之后，约克公爵理查通过了一项法案。该法案内容为“当国王去世时，理查及其子嗣可以继承王位”，这意味着他离权力的顶峰只差一步。但在这一步之前还有最后一个障碍：原王后玛格丽特号召兰开斯特家族的盟友向赫尔河畔金斯顿集结，试图南下进军伦敦。约克公爵理查在收到消息后迅速组建一支部队北上迎击。由于出兵仓促，这支部队不仅人数少于对手，补给也十分匮乏。约克公爵理查在第一次交手时便落入了下风，不得不退守桑德尔城堡等待支援。
stage_intro_1606=约克公爵理查在韦克菲尔德平原战败后被杀，他的儿子爱德华四世继承了他的爵位。尽管爱德华四世此时只有18岁，但是他却展现出了超出年龄的领导与指挥能力。在约克公爵理查败亡仅仅一个月后，爱德华四世便率领军队在莫蒂默十字与兰开斯特家族的军队发生了激战。
stage_intro_1607=莫蒂默十字战役结束后，趁着爱德华四世在赫里福德重整部队的当口，玛格丽特王后的盟友们迅速指挥部队由北向南进攻。仅仅半个月的时间，这支数万人的大军便已逼近伦敦，造王者沃里克率兵前往迎战。巧合的是，与六年前约克家族和兰开斯特家族的第一次兵戎相见一样，这场大战的发生地也是这个名为圣奥尔本斯的小镇，不过这次对阵的结局，却与六年前完全不同。
stage_intro_1608=尽管玛格丽特的军队在圣奥尔本斯取得了胜利，但是由于军队在战后的一系列暴行，伦敦的市民们拒绝迎接他们进城，无奈的玛格丽特只能退回北方。此后不久，在伦敦深得民心的爱德华四世被推举为国王，原国王亨利六世则被废黜。得知消息的玛格丽特召集了英格兰北部地区几乎所有反对约克家族的势力，试图将爱德华四世彻底消灭，一场英国本土最为残酷的战役即将打响。
stage_intro_1609=陶顿战役中，爱德华四世击败了大多数反对他的兰开斯特派。在接下来的数年中，爱德华四世通过多种手段试图和以前的敌人化敌为友，其中包括他曾经的死敌，第三代萨默赛特公爵亨利·博福特。1463年底，萨默赛特公爵秘密与被废黜的亨利六世见面，不久便再次掀起反叛。愤怒的爱德华四世命令约翰·内维尔前往平叛，这一次，他要将萨默赛特公爵彻底消灭。
stage_intro_1610=在赫奇利沼泽战败的萨默赛特公爵撤退到了赫克瑟姆沿岸。他将军队分成了三处，试图修筑工事来将追兵挡在赫克瑟姆以南。但是约翰·内维尔的追击速度非常快，他并不打算给萨默赛特公爵喘息的机会。

campaign_desc_16=1453年7月，卡斯蒂永战役失利的消息使英王亨利六世在震惊中疯病发作，失去了治国能力。英格兰国内的兰开斯特和约克两大家族为了争夺最高权力发生冲突，进而演变为战争。由于两大家族的徽章分别为红玫瑰和白玫瑰，因此这场战争也被称为“玫瑰战争”。
campaign_desc_17=爱德华四世成为英格兰国王之后，努力与曾经的敌人们和解，为英格兰带来了短暂的和平。但是爱德华四世的和解政策使他和原来的盟友们的关系产生了裂痕。1469年，爱德华四世曾经最忠实的部下——造王者沃里克起兵反叛，给英格兰带来了新一轮的动荡。

campaign_end_desc_16=经赫克瑟姆一役，兰开斯特家族的军事力量基本被消灭殆尽，约克家族成为了英格兰的统治者。与以往不同的是，爱德华四世并没有亲自上阵指挥这场战斗，因为此时的他还有更重要的事情——暗中筹备和一位女子的婚礼。这位女子的名字叫做伊丽莎白·伍德维尔，后来人们通常称呼她为“白皇后”。
campaign_end_desc_17=战争结束的同时，也结束了金雀花王朝在英格兰的统治，开启了威尔士人的都铎王朝。这也标志着在英格兰中世纪时期的结束，并走向新的文艺复兴时代。

general_desc_Manuel I=十二世纪时的拜占庭帝国皇帝，在其统治期间，科穆宁王朝迎来了最后一次兴盛，帝国的军事和经济实力得到恢复，文化也走向繁荣。

