battle_talk_3000403=继续进攻，只要拿下锡拉库萨，西西里岛就是我们的了！
battle_talk_3000404=乔治曼尼亚克斯拖欠了我们的军饷，只能从敌人身上想办法了
battle_talk_3000501=锡拉库萨久攻不下，部队士气低迷
battle_talk_3000502=这次攻城又失败了，只能先撤回营地修整了
battle_talk_3000503=敌人军心涣散，该吹响我们反击的号角了！
battle_talk_3000504=敌人的反击怎么这么快？快撤退！
battle_talk_3000505=前几天的筹备就是为了此刻！欧特维尔家族的荣光将从此处开始！
battle_talk_3000506=天！这个诺曼人竟然把敌人砍成了两半！
battle_talk_3000507=威廉将锡拉库萨献给了东罗马帝国，而他因为把敌将一劈两半而名声大噪，获得了“铁臂威廉”的称号。
battle_talk_3000801=我们人数占优，你们可以自行选择是要血战到底还是就此离去
battle_talk_3000802=诺曼人从不后退！
battle_talk_3000803=那你们就在这里流尽最后一滴血吧！
battle_talk_3000804=我军败了！撤退！快撤退！
battle_talk_3000901=我们的军队有数万之众，优势在我！
battle_talk_3000902=虽然身体不适，但是我依然会保持对战场的关注
battle_talk_3000903=敌人的第一道防线已被击破！
battle_talk_3000904=精彩的战斗！病痛也无法阻止我加入这荣耀的战场！
battle_talk_3000905=威廉的强悍让他逐渐成为南方诺曼人的实际领袖。
battle_talk_3001001=包围梅尔菲！我们要拿下这座城市！
battle_talk_3001002=我们可以趁机攻击他们在蒙特佩洛索的营地
battle_talk_3001003=敌人在要塞内坚守不出，强攻不是明智的选择
battle_talk_3001004=可以尝试截断他们的补给线，逼他们出城作战
battle_talk_3001201=进攻，进攻！卡拉布里亚终将成为我们诺曼人的领土！
battle_talk_3001202=迂回包抄敌人
battle_talk_3001203=后方出现了敌军，再不撤退可能就没机会了
battle_talk_3001204=这场战役最终以失败而告终，威廉决定明年再来征服。

