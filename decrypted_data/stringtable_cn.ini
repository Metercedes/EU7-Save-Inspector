general_desc_Henry Beaufort2=第三代萨默赛特公爵，第二代萨默赛特公爵艾德蒙·博福特之子
general_desc_John Neville1=内维尔男爵
general_desc_Edward IV=约克公爵理查之子
general_desc_John Neville2=第一代蒙塔古勋爵
general_desc_John Grey of Groby=兰开斯特家族的骑士，伊丽莎白·伍德维尔的丈夫。
general_desc_Elizabeth Woodville=爱德华四世的妻子，被称为“白皇后”。她的女儿嫁给了后来的亨利七世，成为了都铎王朝的开创者之一。
general_desc_Li Shimin=唐朝的第二位皇帝，在位期间大力改革内政，为唐朝数百年的繁荣奠定了坚实的基础；同时对外开疆拓土，平定了周边的势力，被尊称为“天可汗”。
general_desc_Michael VIII=拜占庭巴列奥略王朝的奠基人，在位期间积极采取外交手段解决拜占庭帝国的外部威胁，使原本岌岌可危的拜占庭帝国又延续了两个世纪。

