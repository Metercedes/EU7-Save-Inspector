stage_intro_4661=1410年，扬杰式卡以雇佣兵的身份参与了条顿战争，并在格林瓦尔德战役中表现出色。
stage_intro_4663=1419年，胡斯战争爆发，扬杰式卡积极参与并领导了布拉格起义，成为了起义军中的一名重要指挥官。
stage_intro_4665=1420年，在苏多梅热战场上，胡斯战车首次大放异彩，扬杰式卡指挥的数百起义军在车阵的帮助下战胜了上千名骑士。
stage_intro_4667=1420年，神圣罗马帝国皇帝西吉斯蒙德发动了对捷克地区的第一次十字军远征，但在维特科夫山战役中被扬杰式卡击败。
stage_intro_4669=1421年冬，西吉斯蒙德在库特纳霍拉包围了起义军。但在扬杰式卡灵活的战术指挥下，起义军不仅成功突围，还在后续的缠斗中击溃了敌人。
stage_intro_4671=1422年1月，扬杰式卡率领部队追上了在库特纳霍拉战场上败退的十字军并发动了歼灭战，将十字军的第二次远征彻底粉碎。

