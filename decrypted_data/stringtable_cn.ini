battle_talk_3020201=阿莱克修斯的精锐中军几乎不可撼动，但不断击破外围部队或许就能引发溃散。
battle_talk_3020202=敌人的瓦兰吉卫队过于深入了，击溃他们的士气！
battle_talk_3020203=哦，我应该离开这。
battle_talk_3020204=懦夫！
battle_talk_3020301=那些希腊人又来了。
battle_talk_3020302=有伏击！
battle_talk_3020303=我们的物资给养都还留在那边，不能让他们占领营地。
battle_talk_3020304=军心在溃散，撤退。
battle_talk_3020305=博希蒙德在以为自己又一次获胜之时，补给品和战利品全部被阿莱克修斯抢走，这让这支远征军迅速被瓦解，博希蒙德不得不回到意大利再做打算。
battle_talk_3020501=那不勒斯给我们进贡了不少钱，他们的要求只有置身事外。
battle_talk_3020502=虽然赢得了战争的胜利，但博希蒙德无力与教廷为敌，在多方妥协之后他为自己争取到了塔兰托伯爵的头衔，但贪婪的博希蒙德不会满足于此，他誓要建立属于自己的王国。
battle_talk_3020801=我的人在建造一座攻城塔，大概3天后完工，直接强攻占领两侧的城门也可以让我们突破城墙。
battle_talk_3020802=我的坑道也准备好了，大概2天后就能挖到南面的城墙，或者你们先突破南边，我的人会直接挖到内墙。
battle_talk_3020803=这些家伙和上次那些乌合之众不一样，我得重新集结部队。
battle_talk_3020804=我们无力继续抵抗，告诉希腊人我们同意投降了。
battle_talk_3020805=塞尔柱突厥人秘密谈判后，这座城市被阿莱克修斯的军队占领。正因为如此，坦克雷德对拜占庭人非常不信任。
battle_talk_3020901=放箭，趁这些野蛮人立足未稳干掉他们。
battle_talk_3020902=我们来了，坚持住。
battle_talk_3020903=掠夺这些村庄能让我们获得补充，同时可以抓一些当地人做向导，揭示一些隐藏的山路，必要时利用山路绕开敌军。
battle_talk_3021001=我们对高墙束手无策，而敌人蠢蠢欲动，圣西蒙港的运输队是我们的唯一稳定的物资来源，守住他们。
battle_talk_3021002=不能让凯尔波加继续骑在我们这些小埃米尔头上了，趁着他和那些外来者激战干掉他！
battle_talk_3021003=凯尔波加的突然离世让塞尔柱人决定撤退，博希蒙德终于获得了安条克。
battle_talk_3021201=有伏击！
battle_talk_3021202=哦，天哪，博希蒙德被土库曼人俘虏了！
battle_talk_3021203=博希蒙德因为他的鲁莽而受到了惩罚，他被敌人俘虏。
battle_talk_3021301=敌人的援军，附近肯定还有大部队。
battle_talk_3021302=黎凡特人居然团结起来对付我们，我们没有胜算，撤退。
battle_talk_3021303=非常遗憾的是这次战役最终以失败而告终，博希蒙德既没有获得领土扩展也没有掠夺到资源。
battle_talk_3021501=再待在这我们的人都会饿死，没必要陪着博希蒙德一起陪葬。
battle_talk_3021502=我听说你收了阿莱克修斯的50万枚金币，现在看来是真的。
battle_talk_3021503=整个帝国的精锐几乎都汇聚于此，还要先挑动他们内斗，陛下对那个诺曼人如此上心。
battle_talk_3021504=你输了，我的瓦兰吉卫队还没有正式参战，劝你不要有什么想法。
battle_talk_3021505=如果我们当初没帮助你对付那些突厥人！
battle_talk_3021506=战场没有如果，回家吧我的老对手，而我该去下一个战场了。
battle_talk_3021507=或许阿莱克修斯太熟悉这位宿敌了，博希蒙德再一次被这位东罗马皇帝击败。

