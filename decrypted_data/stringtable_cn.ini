battle_talk_150101=听说他们的军队正在离开欧洲，这是我们最佳的机会！发动夜袭，让我们赶走侵略者！
battle_talk_150102=好！我们要冲进他们的营地，让他们措手不及！
battle_talk_150103=我们决不能让营地失陷！即使兵力不足也要打回来！让他们知道奥斯曼帝国的强大。
battle_talk_150201=这真是可悲，你们为了打败我，把奥斯曼人引入国境内。你难道不知道，他们才是我们真正的敌人吗？
battle_talk_150202=我宁愿先消灭你们，我不想让你们再侵蚀我们的领土！
battle_talk_150203=看来我们入侵整个巴尔干已经只是时间问题了！
battle_talk_150204=敌人已经进入河谷，让我们冲杀出去！
battle_talk_150205=不好有伏兵！
battle_talk_150301=我们必须团结起来，才能够抵御异教徒的扩张。否则，只需要几年时间，我们在巴尔干地区就将失去立足之地。
battle_talk_150302=为了自由！让我们赶走侵略者！
battle_talk_150303=这些手下败将怎么敢再发起战争？这次，我们必须彻底消灭你们！
battle_talk_150304=让我们与他们协同作战！
battle_talk_150305=不要直接迎击他们的攻势，守住最后的防御点，我们一定会回来反攻的！
battle_talk_150401=苏丹即将归来，我们必须发动反击！让这些反叛者为他们的行为付出代价！
battle_talk_150402=这些附属国的挑衅行为让我感到耻辱。我的怒火已经迫不及待地要踏遍他们的土地！
battle_talk_150403=奥斯曼人进攻的速度太快了，如果我还想保住我的王位，也许只有投降了。
battle_talk_150404=如果我们再不去支援我们的兄弟国家，巴尔干地区就可能会被夺走。让我们赶快去解救他们！
battle_talk_150501=科索沃是我们民族的发源地，也是重要的战略要地。如果我们失去它，就意味着我们将失去立足之本。
battle_talk_150502=我们必须组成联盟，不能让突厥人再向前进一步！
battle_talk_150503=没有人可以阻挡我们的脚步！安拉保佑！
battle_talk_150504=我们要勇往直前，突破这片区域！我们可以把领土扩展到更西边！
battle_talk_150505=即使付出生命代价，我也必须捍卫这片土地。
battle_talk_150506=我投降！请让我向苏丹投降！
battle_talk_150507=让他靠近一点，我想看看他的模样。
battle_talk_150508=为了国王！为了塞尔维亚！杀！
battle_talk_150509=不！
battle_talk_150601=让上帝的荣光重新照耀着这片土地！在这里，我只看到了黑暗与绝望！
battle_talk_150602=我们要拯救被压迫的基督徒和罗马帝国！冲啊！
battle_talk_150603=不要担心！他们只是临时集结的乌合之众！
battle_talk_150604=但他们的重骑兵实力很强，我们必须坚决抵御他们的第一波进攻！
battle_talk_150605=没想到我们居然会失败！我们太过自信了。
battle_talk_150701=我的帝国需要你的土地，我们的旗帜将飘扬到世界的边缘！
battle_talk_150702=不好，安纳托利亚的城市防御空虚，我们必须赶紧前往救援！
battle_talk_150703=全军压上！安卡拉是我的！
battle_talk_150704=不，我的失误将会导致帝国的灭亡！
battle_talk_150801=攻占君士坦丁堡！我们将成为巴尔干地区真正的主人！
battle_talk_150802=大军压境，我们必须坚守不移，才能保家卫国！
battle_talk_150803=奥斯曼帝国迎来了他们的新领导者，根基不稳。这是我们反抗的最佳机会！出击！
battle_talk_150804=看来我们只能暂时放弃攻打君士坦丁堡的计划，让我们先消灭这些反抗者！
battle_talk_150901=帝国如今已经无法维持其他城市的防御，将塞萨洛尼基交由威尼斯人管理是最佳之选。
battle_talk_150902=这座城市应该属于奥斯曼，现在你们还有投降的机会。
battle_talk_150903=既然这座城市已经归属于我们，那就断然没有放弃的可能。
battle_talk_150904=奥斯曼对塞萨洛尼基发动了攻击，尽管这减轻了君士坦丁堡的压力，但情况依旧不容乐观。
battle_talk_150905=现在，这座城市归属于奥斯曼，威尼斯的舰队也无法阻止我们。
battle_talk_150906=塞萨洛尼基陷入了危机，但是我的舰队遭到了奥斯曼舰队的封锁，现在急需打破封锁援助塞萨洛尼基。
battle_talk_150907=罗马人妄图发动进攻以缓解威尼斯人的压力，这样的行动毫无意义。
battle_talk_150908=封锁海域的奥斯曼舰队被击败了，舰队继续前进！
battle_talk_150909=敌人发动了反击，派出我们的后备力量。
battle_talk_151001=现在奥斯曼是年幼的苏丹在领导，他们的军队势必会军心涣散，我们应该趁机发动攻势，以期取得胜利！
battle_talk_151002=可恶的基督徒，竟然阻碍了我的退位生活！进攻！
battle_talk_151003=展开防线！我们必须坚守住阵地，抵御他们的进攻！身后只有大海，已无任何退路！
battle_talk_151004=国王已经牺牲了，撤退！但是我会为他复仇的！
battle_talk_151101=为了国王！为了匈牙利！我回来了，为国王报仇！复仇！复仇！
battle_talk_151102=他们的重骑兵虽然强大，但他们抵挡不了我们的利剑和火枪！奥斯曼帝国的未来掌握在你的手中，你需要认真观察今天的战斗过程。
battle_talk_151103=是的，父王！
battle_talk_151104=敌人已经被我们击退！反击！
battle_talk_151201=用火炮轰开罗马的大门，占领罗马帝国的首都，这片土地应该是我们的！
battle_talk_151202=将士们，我们必须坚守这座城市。这里是我们的家园，有我们的家人和信仰。我们将战斗到最后一刻！
battle_talk_151203=炮火只能埋葬我的血肉，但他们永远不能埋葬我们的信仰和决心！
battle_talk_151204=终于，我完成了先祖的愿望！真主必定保佑我们，我将让您的教义在整个欧洲传扬开来！

battle_talk_700601=我们的策略是先包围太巴列，引诱这些法兰克人前来救援。我们的优势在于野战，而不是攻城和守城。
battle_talk_700602=我们这样前往救援是不是太危险，或许我似乎嗅到了阴谋的味道。
battle_talk_700603=无论如何，我们必须前往救援。出发吧！相信神会保佑我们！
battle_talk_700604=圣殿骑士团殿后，防止萨拉丁从后面包抄我们。
battle_talk_700605=我们必须尽快赶到加利利湖，以补充我们的水和物资。我们的队伍缺水已经到了无法继续的地步。
battle_talk_700606=也许我们应该考虑撤退了，因为我们无法突破前方萨拉丁的防线。
battle_talk_700607=只有突围才有一线生机！天啊，我们都会死在这里！整个王国也将被毁灭！
battle_talk_700608=阻止他们接近水源！法兰克人已经疲惫不堪，没有战斗力，我们可以趁机消灭他们。
battle_talk_700609=这支不团结的法兰克军队注定会失败，耶路撒冷似乎也应该换主人了。
battle_talk_700610=上帝呀，只有我逃了出来，也许这场战役从一开始就是一个错误。

battle_talk_56=将士们，随我冲锋，胜利就在眼前，荣耀属于我们。
battle_talk_57=稳住阵形，真主与我们同在！
battle_talk_58=奥斯曼人不断蚕食周边土地，终有一日会来报昔日之仇，不可坐视他们继续壮大实力，趁其深陷巴尔干泥沼之时，我们主动出击！
battle_talk_59=奥斯曼的巨炮已架到城下，君士坦丁堡危在旦夕，请诸位随我前去支援。
battle_talk_60=我们的城墙虽已倒塌，但我们的心仍然坚定，想要占领这座城市，除非踏过我的尸体！
battle_talk_61=所有人都不可轻易相信，现如今既已拿回本属于我的一切，那所有的仇恨就用鲜血来偿还吧。
battle_talk_62=采佩什助我夺回大公之位，那就由我来助他一臂之力。
battle_talk_63=拜占庭帝国的辉煌将由我们继承，从今日起，我们便是拜占庭帝国！
battle_talk_64=黑羊王朝已灭，西方世界的援军也从海上出发，整顿兵力全力进攻奥斯曼。

general_desc_Murad I=穆拉德一世是奥斯曼帝国的苏丹，他在位期间全力推行领土扩张政策，征服了东南欧和西亚的许多国家，为奥斯曼土耳其帝国的崛起奠定了基础，但他在科索沃战役中遇刺身亡。
general_desc_Bayezid I=穆拉德一世之子，著名的军事统帅，别称“闪电”，他统治期间对土耳其的领土扩张做出了巨大贡献，在尼科堡击败了数十万的十字军，然而在安哥拉之战中被俘虏。
general_desc_Murad II=穆拉德二世在位期间振兴国力，整顿军备，挽救了即将分裂的奥斯曼帝国，为之后的奥斯曼帝国的辉煌打下了坚实基础。
general_desc_John Hunyadi=匈牙利王国的民族英雄，绰号“白骑士”。虽然屡战屡败，但他不畏奥斯曼帝国的强大，长期阻挡了奥斯曼帝国扩张。
general_desc_Princess Sophia=君士坦丁十一世的侄女，她嫁给了莫斯科大公伊凡三世，并帮助伊凡三世带领着俄罗斯人彻底摆脱了金帐汗国几个世纪的统治。
general_desc_Stephen the Great=他在位期间维护国家生存，争取民族独立的精神，鼓舞了后世的罗马尼亚人民。之后被教会追封为圣徒，称“伟大而神圣的斯特凡”。
general_desc_Vlad III=瓦拉几亚公国的大公，他勇猛无比，守卫罗马尼亚的英雄，但他也因为对自己国家的贵族以及百姓施行穿刺之刑而被称为“穿刺公”，他也是吸血鬼的原型人物。
general_desc_Charlemagne2=查理大帝是法兰克王国最伟大的国王之一，也是中世纪欧洲最具有影响力的人物之一。他征服了大半个欧洲，被罗马教皇加冕为“罗马人的皇帝”。
general_desc_Arthur2=据说只有拔出石中剑的人才能成为英格兰之王，亚瑟王成功拔出了石中剑后，成为了人们心中的“永恒之王”，他代表着英雄主义、骑士精神和正义！
general_desc_Mehmed the Conqueror2=因为他的勇气、领导力和文化成就，穆罕默德二世被尊为“征服者苏丹”和“欧洲征服者”。他成为后来苏丹们的榜样和灵感来源。
general_desc_Candarli Halil=哈利勒帕夏是奥斯曼帝国的一位著名政治家和军事将领，他曾经在15世纪中期担任过大维齐尔和奥斯曼帝国的总司令。他因为他的勇敢、智慧和领导能力而备受尊敬，被誉为“土耳其的智囊”和“哈利勒大师”。

