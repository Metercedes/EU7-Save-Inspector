stage_intro_4721=1146年，对于突厥人屡次骚扰帝国边境的行为，曼努埃尔一世决定集结军队，发动一场针对罗姆苏丹国的远征。
stage_intro_4723=1147年，十字军第二次东征时需要穿过拜占庭帝国的领土，曼努埃尔一世担忧拜占庭军队会与之爆发冲突，而他的担心很快在君士坦丁堡城外变成了现实。
stage_intro_4725=1155年，为了重新收复帝国的领土，曼努埃尔一世派遣两位将军带着军队和大量金币前往意大利，发动了一场针对诺曼人的远征。
stage_intro_4727=1159年，安条克亲王沙蒂永的雷纳德洗劫了拜占庭帝国的塞浦路斯岛，愤怒的曼努埃尔一世率领军队出征，将安条克公国彻底变成了拜占庭的附庸。
stage_intro_4729=1167年，曼努埃尔一世在瑟乌姆战役中战胜了匈牙利人，将亚得里亚海东岸的大片领土都归入拜占庭帝国的版图中。
stage_intro_4731=1171年，曼努埃尔一世与威尼斯断交并没收了帝国境内威尼斯商人的船只与货物，这引来了威尼斯报复性的劫掠。

