stage_intro_4601=耶律大石1087年出生于辽国上京，年轻时曾考中进士进入翰林院，因此被称为“大石林牙”。1125年辽国灭亡，耶律大石率200骑西行至可敦城自立为王，后于1132年称帝，正式建立西辽国。
stage_intro_4603=为了增强西辽的实力，耶律大石决定向西扩张。1131年，耶律大石借道高昌回鹘，对东喀喇汗国发起了进攻。
stage_intro_4605=东喀喇汗国的阿赫马德汗去世后，他的儿子易卜拉欣继位，同时下辖的葛逻禄等势力也趁机发起了叛乱。易卜拉欣在镇压无果后不得不向耶律大石发出了求助。
stage_intro_4607=1137年，西辽再一次向西扩张，这次他们的目标是已经向塞尔柱帝国称臣的西喀喇汗国。西辽军队在费尔干纳谷地和敌军发生了遭遇战。
stage_intro_4609=1141年，马赫穆德汗向塞尔柱苏丹桑贾尔求援，桑贾尔带领十万大军东进，在卡特万草原与耶律大石的军队相遇。
stage_intro_4611=在征服西喀喇汗国之后，耶律大石又派出大将额儿布思征服了花喇子模，自此西辽开始进入鼎盛时期。

