stage_intro_4741=继位不久的苏莱曼一世遇到了大马士革总督领导的叛乱，苏莱曼一世镇压了这场叛乱，这也代表着他一系列军事征服的开始。
stage_intro_4743=在1521年，匈牙利人是阻止奥斯曼向欧洲扩展的唯一难以对付的力量。为了击败匈牙利，苏莱曼一世带领大军将贝尔格莱德团团围住，并占领了这座城市。
stage_intro_4745=在攻克贝尔格莱德之后，苏莱曼一世将矛头对准了罗德岛上的医院骑士团，但这场战斗将无比艰辛。
stage_intro_4747=匈牙利寻求与哈布斯堡王朝的同盟，苏莱曼一世担心这对奥斯曼造成的影响，在匈牙利拒绝了苏莱曼一世的提议后，苏莱曼一世决定出兵干预。
stage_intro_4749=奥斯曼与萨菲王朝领土争端逐渐升温，随着比特利斯贝伊寻求波斯庇护，巴格达总督遇刺。苏莱曼决定向波斯开战，开启了三百年的奥斯曼-波斯战争。
stage_intro_4751=1553年，苏莱曼一世开启了他对波斯的第三次也是最后一次远征。双方在互有胜负后，最终达成阿马西亚合约，此后双方在二十年间一直相安无事。

