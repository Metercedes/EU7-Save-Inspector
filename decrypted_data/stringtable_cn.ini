general_retreat_1=为了反击，我们必须保存实力,暂时的撤退并不代表失败。
general_retreat_2=也许是我突进的太快了，目前除了撤退没有其他选择。
general_retreat_3=我已经奋战到了最后一刻，但是仍然无法击退敌军。
general_retreat_4=敌军的顽强超出了我的预期，我需要重新制定战术。
general_retreat_5=我的部队损失惨重，在我进攻的时候为什么没有人为我掩护？
general_retreat_6=我的军队已经无法适应目前的战局，现在必须到后方进行休整。

general_job_desc={0}{1}
general_desc_Khalid=阿拉伯最杰出的将领之一，带领阿拉伯战士勇猛作战，从未失败。穆罕默德为了表彰他的英勇，赐予他“安拉之剑”的称号。
general_desc_Belisarius=拜占庭皇帝查士丁尼一世麾下名将，北非和意大利的征服者，军旅生涯后期遭到皇帝的猜忌，被称为“最后的罗马人”之一。
general_desc_Frederick I=红胡子巴巴罗萨，罗马人民的国王，神圣罗马帝国皇帝，他与英国国王狮心王理查、法国国王腓力二世一起领导了第三次东征，后在东征途中因溺水而亡。
general_desc_Constantine I=罗马帝国皇帝，拜占庭帝国的创立者，他在拜占庭建立新皇宫，并将之命名为新罗马，但人民为尊君士坦丁之名，将此地称作君士坦丁堡。
general_desc_Uthman=穆罕穆德的追随者和女婿，是第三任正统哈里发。在他执政期内，阿拉伯骑兵所向无敌，晚年被人刺杀。
general_desc_Heraclius=拜占庭帝国皇帝，希拉克略带领帝国军队击败了波斯人，夺回了失去的领土。但在面对阿拉伯人的入侵时，拜占庭帝国一败再败，直到他去世。
general_desc_Gilles de Rais=本名为吉尔·德·蒙莫朗西·拉瓦尔，百年战争时期的法国元帅，也是著名的黑巫术师，蓝胡子的原型人物。他是贞德的战友，曾被誉为民族英雄。
general_desc_Sikelgaita=伦巴第公主，罗伯特·吉斯卡尔的第二任妻子，与罗伯特一同参与并指挥了对抗拜占庭帝国的战争。
general_desc_Harald=挪威国王，在成为国王之前，他曾担任基辅罗斯的雇佣兵，后在拜占庭帝国的瓦兰吉卫队中任职。
general_desc_Alp Arslan=塞尔柱帝国的第二任苏丹，在任内屡次与埃及的法蒂玛王朝、拜占庭帝国交战并取胜。后世尊称他为“阿尔普·阿尔斯兰”，意为“英勇之狮”。
general_desc_Alfred the Great=威塞克斯王国国王，也是英国历史上第一个以“盎格鲁-撒克逊人的国王”自称之人。他率众抗击维京人的侵略，使英格兰大部分地区回归盎格鲁-撒克逊人的统治，故得享“大帝”尊称。
general_desc_Alaric I=西哥特国王，也是西哥特王国的缔造者。在断绝了与罗马帝国的关系后，他带领西哥特人攻陷了罗马，成为了第一批能够攻克“永恒之城”的人。
general_desc_Aetius=“最后的罗马人”，他曾带领军队在沙隆战役中击败匈人，这场胜利也被成为“西罗马帝国的最后一次胜利”，后因被诬告谋反而被瓦伦蒂尼安三世刺杀。
general_desc_Athelstan=长者爱德华之子，威塞克斯王朝的建立者，他被认为是首任英格兰国王以及一位最伟大的盎格鲁-撒克逊人之王。
general_desc_Sophronius=耶路撒冷的领导者，在此之前，他是一位修道士和神学家。
general_desc_Michael the Stammerer=拜占庭帝国皇帝，绰号“结巴者”，在位期间，他联合保加利亚人镇压了托马斯的叛乱，但这也使得帝国的实力遭到削弱。
general_desc_Fausta=罗马帝国皇后，君士坦丁大帝的第二任妻子。
general_desc_Tostig=哈罗德·戈德温森的兄弟，无情者哈拉尔的支持者，后于斯坦福桥战役中丧生。
general_desc_Leopold V=奥地利公爵和施蒂里亚公爵，有着“贤者利奥波德”称号，他参与了第三次东征。
general_desc_Theodoric I=西哥特国王，在位期间，对法兰克人和汪达尔人用兵，并与西罗马帝国结盟。
general_desc_Gytha=丹麦贵族，哈罗德·戈德温森和伊迪丝的母亲。
general_desc_John Chandos=中世纪英国骑士，他被认为是百年战争时期，英格兰最重要的三场战争胜利背后的策划者，他最终在一场小规模冲突中死亡。
general_desc_Gunderic=汪达尔人和阿兰人的国王，曾带领军队入侵西罗马帝国。
general_desc_Saladin=埃及阿尤布王朝的第一位苏丹及叙利亚的第一位苏丹，埃及历史的民族英雄，他因在阿拉伯人对抗东征军的过程中，表现出卓越的领袖作为、骑士风度和军事才能而闻名于世。
general_desc_Narses=与贝利撒留一样，是拜占庭帝国皇帝查士丁尼一世麾下的大将，他因曾经灭亡东哥特王国而被称为“哥特人之槌”。
general_desc_Charlemagne=欧洲之父，法兰克和伦巴第的国王，罗马人的皇帝。自罗马帝国以来，查理曼首度统一了西欧大部分地区，他所建立的大法兰克被称为加洛林帝国。
general_desc_William the Conqueror=征服者威廉，维京掠夺者罗洛的后裔。1035年成为诺曼底公爵，1066年征服并统治了英格兰，成为了第一位诺曼英格兰国王。
general_desc_Attila=古代欧亚大陆匈人最为人熟知的领袖，史学家称之为“上帝之鞭”，曾多次率领大军入侵拜占庭帝国和西罗马帝国。
general_desc_Richard I=英格兰王国的国王，因勇猛善战而有“狮心王”的称号。他与神圣罗马帝国皇帝腓特烈一世、法兰西国王腓力二世一起领导了第三次东征。
general_desc_Edward the Black Prince=英格兰国王爱德华三世的长子，历史上被称作黑太子，英法百年战争中最成功的英国指挥官之一，同时也是当时最伟大的骑士之一。
general_desc_Charles Martel=又称铁锤查理，法兰克王国宫相，军事领导人。丕平二世的私生子，查理曼的祖父。
general_desc_William I of Sicily=原名古列尔莫一世，是西西里王国的第二任国王。
general_desc_Harold=又称哈罗德二世。威塞克斯伯爵戈德温之子，宣信者爱德华王后伊迪丝的兄长，英国盎格鲁-撒克逊时代最后一位无争议的国王。
general_desc_Matilda of Boulogne=英格兰王后，布洛涅女伯爵，她的丈夫是英格兰国王斯蒂芬。
general_desc_Eleanor of Provence=英格兰金雀花王朝国王亨利三世的王后。
general_desc_Baldwin IV=耶路撒冷王国国王，尽管身患麻风病，他依然率领部队在蒙吉萨战役中击败了萨拉丁的三万大军。
general_desc_Khawlah=穆罕默德时期的一位传奇战士，后来成为军事领袖。她被描述为历史上最伟大的女性军事领导人之一，曾被对手与哈立德进行过比较。
general_desc_Sunicas=匈人，查士丁尼一世统治早期，在拜占庭军队中服役。
general_desc_Mehmed the Conqueror=“征服者”穆罕默德，奥斯曼帝国苏丹，带领奥斯曼大军攻陷了君士坦丁堡，消灭了拜占庭帝国，为日后奥斯曼帝国的百年霸业奠下了稳固的基石。
general_desc_Philip II=卡佩王朝国王，法兰西名君之一，因为饶富谋略与政治手腕而有“尊严王”的美称。
general_desc_Henry II of England=英格兰国王，同时他也是诺曼底公爵。他所创立的金雀花王朝是英格兰中世纪最强大的一个封建王朝。
general_desc_Genghis Khan=蒙古国可汗，蒙古帝国的奠基者。他发动了蒙古入侵并征服了欧洲大陆的大部分地区。由于其出色的军事成就，成吉思汗经常被认为是有史以来最伟大的征服者。
general_desc_Edward I=俗称“长腿爱德华”、又称“苏格兰人之锤”，因征服威尔士和几乎征服苏格兰而闻名，他的母亲就是普罗旺斯的埃莉诺。
general_desc_Justinian I=拜占庭帝国皇帝，由于他功勋卓著，也被称为查士丁尼大帝，查士丁尼一世是古罗马时代末期最重要的一位统治者。
general_desc_Empress Matilda=亨利一世的女儿，亨利二世的母亲。被斯蒂芬篡夺王位后，她积蓄力量对其发起挑战，最后帮助她的儿子成功夺得了英格兰王位的继承权。
general_desc_Philip the Good=好人菲利普，第三代勃艮第公爵，在百年战争末期也有着诸多表现，为低地国家的发展做出了重大贡献。
general_desc_Eleanor of Aquitaine=亨利二世的妻子，阿基坦女公爵及普瓦捷女伯爵。先嫁给法国国王路易七世，婚姻被宣判无效后和英格兰国王亨利二世结婚。
general_desc_Isabella=她是法兰西的公主，法王腓力四世的女儿。英格兰爱德华二世的王后，爱德华三世的母亲。她因个性坚毅果敢，被称为“法兰西母狼”。
general_desc_Nikephoros I=拜占庭帝国皇帝，原为伊琳娜女皇任命的财政大臣，在与保加利亚首领克鲁姆作战中战死。
general_desc_Malik Shah=罗姆苏丹国的苏丹，他的名字意为“王中之王”。
general_desc_Timur=帖木儿汗国的创始人，他击败了西亚、南亚和中亚的其他国家，是帖木儿帝国的奠基人。
general_desc_Lady Margaret Beaufort=爱德华三世的后裔，玫瑰战争中的重要人物，都铎王朝开国之君亨利七世的母亲。
general_desc_Elizabeth Woodville=英格兰爱德华四世的王后，她凭借美貌，以两个孩子母亲的寡妇身份，嫁给了爱德华四世，并引起轩然大波。
general_desc_Fatimah=穆罕默德与海迪彻之女，是阿拉伯帝国五大杰出女性之一。
general_desc_Antonina=拜占庭帝国将军贝利撒留的妻子，狄奥多拉皇后行使权力时的“右臂”，她对丈夫有着巨大的影响，同时也是一个颇具争议的人物。
general_desc_Theodora=拜占庭帝国皇帝查士丁尼一世的妻子和皇后，拥有过人的智慧，在查士丁尼统治期间对他有着巨大的影响，曾在尼卡暴动中令查士丁尼恢复勇气。
general_desc_Robert Curthose=诺曼底公爵，绰号“短袜罗贝尔”，他是第一位诺曼英格兰国王征服者威廉的长子，也是第一次东征的参与者。
general_desc_Suleiman Baltoghlu=奥斯曼帝国海军司令，曾参与围攻君士坦丁堡。但因攻城不力被穆罕默德二世下令处决，虽然幸免一死，但仍被剥夺军衔、土地和财富，最终死于默默无闻和贫穷中。
general_desc_Ambrosio Boccanegra=1341年他随舰队前往卡斯蒂利亚支持阿方索十一世，后带卡斯蒂利亚-法国军队在拉罗歇尔战役中击败英国人。
general_desc_Aisha=“信士之母”，穆罕默德的第三任妻子，在阿里成为哈里发后，她加入了反叛阿里的势力，并与阿里发生战争。
general_desc_Hermeric=苏维汇王国的国王，终生与罗马帝国为敌。
general_desc_Simeon I of Bulgaria=保加利亚沙皇，鲍里斯一世的第三子。他在位时期是保加利亚第一帝国国势最强盛的时期。
general_desc_Constantine XI=拜占庭帝国的最后一位皇帝，在穆罕默德二世围城时，他放弃了投降，城墙被攻破后，他脱下皇袍冲入敌阵后失踪。
general_desc_Samuel of Bulgaria=保加利亚第一帝国沙皇，在他的统治期间，保加利亚控制了大部分巴尔干地区，最远可到达希腊南部。
general_desc_Aethelred I=威塞克斯国王，865年，他接替他的三哥埃塞尔伯特成为威塞克斯和肯特的国王。
general_desc_Halfdan Ragnarsson=诺桑比亚的首位维京籍国王，维京人的领袖，维京侵略盎格鲁-撒克逊英格兰王国的指挥官之一。
general_desc_Edward III=英格兰国王，他在位期间将英格兰打造成了当时欧洲最强大的军事强国之一，黑太子爱德华是他的长子。
general_desc_Richard of York=英格兰领衔贵族巨头，爱德华三世的曾孙，曾试图夺取王位，但最终被劝止。
general_desc_Alle=第一位南萨克逊人的国王，他所统治的地区现在也被称为萨塞克斯。
general_desc_Robert the Bruce=苏格兰历史中重要的国王，王号“罗伯特一世”。他领导苏格兰人打败英格兰军队，确保王国独立。
general_desc_Zubayr=穆罕穆德的同伴，在穆罕穆德死后，成为了军事领导人，并于骆驼之战中阵亡。
general_desc_Trithyrius=拜占庭帝国著名将领，希拉克略统治时期的重要军事指挥官。
general_desc_Edmund=东盎格利亚王国国王，在维京大军入侵时，曾带领部队与敌人作战，并于战斗中阵亡。
general_desc_Totila=东哥特王国国王，是一位相当有能力的军事和政治领袖。
general_desc_Athelred=麦西亚人的领主，也被称作麦西亚的埃塞尔雷德郡长。
general_desc_Ivar=维京人的领袖，他是著名维京首领拉格纳·洛德布罗克和亚丝拉琪的儿子，白衫哈夫丹的兄弟。
general_desc_Vortimer=沃蒂根的儿子，因反对父亲与盎格鲁-撒克逊人联盟而被人所知。
general_desc_Catigern=沃蒂默的兄弟，他因与盎格鲁-撒克逊人交战而闻名。
general_desc_Alexios I=拜占庭皇帝，科穆宁王朝的开创者，他统治期间其家族真正达到了拜占庭帝国的权力巅峰。同时，他向西方求援的行为也成为了引发东征的缘由之一。
general_desc_Basil II=绰号保加利亚屠夫，拜占庭帝国的皇帝，统治帝国接近半个世纪。巴西尔二世是希腊民族英雄，但在保加利亚人中被鄙视。
general_desc_Roland=查理曼麾下的法兰克军事领导人，也是许多作品中多次登场的人物角色，曾替法兰克王国抵抗布列塔尼人的进攻。最终罗兰的形象变成了查理曼的首席骑士。
general_desc_Bessas=拜占庭帝国将领，曾与贝利撒留一同参与对抗哥特和萨珊波斯人的战争，是贝利撒留的副官。
general_desc_Vitiges=东哥特王国国王，是一位相当有能力的军事和政治领袖。
general_desc_Batu Khan=铁木真之孙，术赤的次子，蒙古钦察汗国的开创者，因他对部下的宽容，称他撒因汗。
general_desc_Jebe=哲别是臣服于铁木真后被赐予的名字，意为“箭头”。有蒙古第一猛将的称号，是四犬之一。
general_desc_Godfrey=下洛林公爵、布永伯爵，第一次东征将领。他的弟弟布洛涅的鲍德温是耶路撒冷国王，即鲍德温一世。
general_desc_Leo VI the Wise=拜占庭帝国皇帝，人称“智者”，在位期间编纂完成了《巴西利卡法典》，成为拜占庭帝国的法典。
general_desc_Pepin the Short=查理·马特之子，加洛林王朝的创建者，751年，他推翻了墨洛温王朝，成为了法兰克国王。
general_desc_Valens=罗马帝国东部皇帝。
general_desc_Nur Din=塞尔柱帝国赞吉王朝的君主，是第二次东征过程中的主要人物之一。
general_desc_Gelimer=汪达尔-阿兰王国最后一代日耳曼人国王，在被贝利撒留所击败后，向拜占庭帝国投降。
general_desc_Stilicho=拥有半蛮族血统的高级将领，贵族和西罗马帝国执政官。
general_desc_El Cid=卡斯提尔贵族，瓦伦西亚的征服者和城主，西班牙民族英雄，他是提泽纳和科拉达这两把的著名武器的拥有者。
general_desc_Arthur=不列颠传说中的国王，也是凯尔特英雄谱中最受欢迎的圆桌骑士团的骑士首领。传说他在罗马帝国瓦解、罗马军队撤出不列颠之后，率领圆桌骑士统一了不列颠群岛。
general_desc_Guinevere=亚瑟王的妻子，亚瑟执政时期卡美洛王国的王后，传说她与圆桌骑士兰斯洛特之间的私情致使国家走向了灭亡。
general_desc_Lancelot=圆桌骑士团的成员之一，也是亚瑟王最伟大最受信任的骑士，为亚瑟王的诸多胜利做出了贡献。
general_desc_Joan of Arc=出生于农村的少女，法国的民族英雄，在英法百年战争期间她带领法兰西王国对抗英格兰王国的入侵，最后被捕并处以火刑。
general_desc_William Wallace=苏格兰的骑士、贵族、爱国人士，他在苏格兰独立战争中领导了一支反抗武装力量。
general_desc_Olga=基辅罗斯国女领导人，大公伊戈尔的夫人，斯维亚托斯拉夫的母亲，并在其成年前参与摄政。
general_desc_Caesar=罗马共和国独裁者、执政官，是罗马帝国的奠基人。
general_desc_Robin Hood=英国民间传说中的侠盗，他武艺出众、机智勇敢，仇视官吏和教士，是一位劫富济贫、行侠仗义的绿林英雄。
general_desc_Beowulf=斯堪的纳维亚半岛上的传说人物，他曾经与巨人、海怪和巨龙英勇战斗。
general_desc_Otto I=东法兰克国王，神圣罗马帝国皇帝，他是最早侵略斯拉夫人的条顿君主之一，并迫使波西米亚公爵波列斯拉夫一世称臣。
general_desc_Knud=继承了丹麦国王斯温的王位，对英格兰、丹麦、挪威及部分瑞典进行统治，其辖境享有北海帝国之称。
general_desc_Zengi=赞吉王朝的创立者，他曾为摩苏尔、阿勒颇、哈马、埃德萨的总督。
general_desc_Alexander Nevsky=原名亚历山大·雅罗斯拉维奇，在瑞典人入侵罗斯时，他带领部队于涅瓦河畔附近击溃了瑞典军队，他因而得到称号：“涅夫斯基”。
general_desc_Subutai=是上古至中古时代在世界征战范围最广的将领，欧亚板块大多数历史中都有速不台的威名。他以骁勇善战著称，享有“把阿秃儿”的称号。
general_desc_Su Dingfang=唐朝初年名将，他擅长以少胜多，曾有过千人胜八万的骄人战绩，灭突厥，御吐蕃、伐高丽，一生未有败绩。
general_desc_Li Jing=唐朝第一名将，一生东征西战，为唐朝的建立、巩固到繁荣都做出了极其重要的贡献。
general_desc_Li Shimin=唐太宗，唐朝第二任皇帝、首位天可汗，他是唐代乃至中国历史上最享负盛名的皇帝之一。
general_desc_Yelu Dashi=又称大石林牙或林牙大石，他在军事等诸多领域都有成就，他的事迹在欧洲广为流传，他的名字也成为西辽帝国的代称。
general_desc_Suleiman I=他是奥斯曼帝国在位时间最长的苏丹，在他的统治下，奥斯曼帝国的发展进入全盛时期。因为苏莱曼一世的功勋，他被西方普遍称为苏莱曼大帝。
general_desc_John I Tzimiskes=拥有极高军事才能的罗马皇帝，他在位时向北击败罗斯人和保加利亚人，向东进行了多次东征，极大的增强了东罗马的军事实力并扩展了它的疆域。
general_desc_Giovanni=热那亚雇佣军将领，“切不可使罗马亡于我手！”虽然他未曾阻挡住奥斯曼帝国占领君士坦丁堡，但他坚毅的意志和无畏的精神被一同留在了那废墟之下！
general_desc_Gao Xianzhi=高仙芝是唐玄宗时期的名将。他镇守安西，为维护唐西陲的安全、加强与西域的联系作出了贡献。

