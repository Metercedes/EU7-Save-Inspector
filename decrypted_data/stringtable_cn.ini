general_desc_Warwick the Kingmaker=第十六代沃里克伯爵，原名理查德·内维尔，在玫瑰战争中因扶持多位贵族登上王位而被称为“造王者”
general_desc_Edmund Beaufort=第二代萨默赛特公爵，约克公爵理查的政敌
general_desc_Richard of York=第三代约克公爵，原名理查·金雀花。作为金雀花家族的后裔，他拥有王位的继承权。
general_desc_Margaret of Anjou=亨利六世的妻子，兰开斯特家族的核心人物。在软弱的亨利六世执政期间，拉拢萨默赛特公爵作为政治盟友，成为了国家实际上的治理者。
general_desc_Henry VI=英格兰国王，性格软弱。对国家缺乏治理能力，且无力统治臣民。在位期间大臣相互争夺权利，最终导致了玫瑰战争的爆发。
general_desc_Richard Neville=第五代索尔兹伯里伯爵，造王者沃里克的父亲
