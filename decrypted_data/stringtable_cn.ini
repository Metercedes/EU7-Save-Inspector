conquest_faction_desc_11=失去罗马帝国庇护的不列颠正遭受蛮族的侵略，凶残的日耳曼蛮族在不列颠岛上四处肆虐。不列颠人团结在英勇善战的亚瑟王麾下，誓要将这些入侵者赶出不列颠。

conquest_faction_desc_101=自凯撒征服不列颠以来，罗马人对不列颠的统治长达4个世纪之久，如今的西罗马帝国早已不复往日强盛，只能将不列颠的军团撤回本土。失去西罗马帝国庇护的不列颠人不得不拿起武器，独自面对入侵者。
conquest_faction_desc_102=盎格鲁-撒克逊人骁勇善战，经常乘着战船沿海岸线劫掠西罗马帝国北部诸省。当其他蛮族部落正为争夺高卢地区而打的头破血流之时，盎格鲁-撒克逊人却把目光转向了失去西罗马帝国庇护的大不列颠岛。
conquest_faction_desc_103=西哥特人曾为罗马帝国戍边，处于抵御匈人的最前线，但却得不到罗马人的善待。忍无可忍的西哥特人奋起反抗，并在西罗马境内建立了西哥特王国，这意味着其与西罗马帝国的全面冲突已不可避免。
conquest_faction_desc_104=西罗马帝国目前危机不断，日渐衰落的国力使其无法有效应对蛮族迁徙带来的边境动荡，曾经辉煌的帝国如今摇摇欲坠。但危机通常伴随着机遇，且帝国的底蕴犹存，只要矢志复兴或许能重现罗马帝国的荣光。
conquest_faction_desc_105=布列塔尼人主要由从大不列颠岛迁徙过来的凯尔特人组成，“布列塔尼”的意思就是小不列颠。当前高卢地区陷入混乱、局势不明，布列塔尼人需要更有智慧地与强国相处，才能在高卢存续下去。
conquest_faction_desc_106=萨利安法兰克人是法兰克人中的一支，被罗马帝国允许以蛮盟的形式定居在边境地区。面对逐渐没落的西罗马帝国，萨利安人需要做出决策，是继续忠实地守卫帝国边境，还是去继承西罗马帝国在高卢的权力。
conquest_faction_desc_107=长久以来，法兰克人渴望进入富饶的高卢地区，但一直被罗马帝国强大的军事力量所阻止。如今西罗马帝国正陷入内忧外患之中，这对法兰克人来说是一个绝佳的机会。
conquest_faction_desc_108=众多从东北欧迁徙来的日耳曼部落之一。勃艮第人首先察觉到西罗马帝国的衰弱和军备松弛之后，果断跨越莱茵河进入西罗马境内，但这势必会遭到西罗马帝国的疯狂围攻。
conquest_faction_desc_109=阿勒曼尼的意思是“全体人”，这表明了这个民族是由无数大大小小的日耳曼部落组成的，所以阿勒曼尼人视自己为日耳曼人的领导者，有义务带领日耳曼各民族对抗强大的西罗马帝国。
conquest_faction_desc_110=作为萨尔马提亚人的后裔，阿兰人曾是草原上最为强大的游牧民族，然而在遭到更加凶残的匈人袭击后，阿兰人只能落荒而逃。与其他迁徙民族一样，阿兰人如今也在西罗马帝国边境寻找机会。
conquest_faction_desc_111=东哥特人曾定居在黑海沿岸，是最早遭受匈人入侵的日耳曼人，面对这些强悍且陌生的匈人，他们只能选择暂时屈服。但东哥特人不是甘居人下的民族，他们在等一个机会，一个可以彻底摆脱匈人压迫的机会。

conquest_faction_desc_201=自由与独立是布列塔尼人的信念，即便是面对如日中天的西法兰克王国，布列塔尼人也没有选择屈服，他们拥护骁勇善战的埃里斯波为“布列塔尼之王”，决心与西法兰克王国斗争到底。
conquest_faction_desc_202=在法兰克王国被《凡尔登条约》一分为三之后，查理二世次以原王国的西部领土为基础建立了西法兰克王国。西法兰克王国继承了原法兰克王国的核心地区，同样也继承了原王国的隐患：动荡不安的边境与强势的贵族阶层。
conquest_faction_desc_203=在法兰克王国被《凡尔登条约》一分为三之后，洛泰尔一世以原王国的中部领土为基础建立了中法兰克王国。相比较其他两个王国，中法兰克王国虽然面积较小，但拥有着最为富裕的意大利地区，以及“罗马人的皇帝”的头衔。
conquest_faction_desc_204=在法兰克王国被《凡尔登条约》一分为三之后，日耳曼人路易以原王国的东部领土为基础建立了东法兰克王国。东法兰克王国大部分领土为刚征服不久且比较贫穷的日耳曼地区，但这也意味着王国有着极强的武力和发展潜力。
conquest_faction_desc_205=盎格鲁-撒克逊人的七王国之一，在先王埃格伯特的励精图治下，威塞克斯王国曾有机会统一全英格兰，然而随着维京人的到来，威塞克斯不得不暂缓统一的步伐，并把更多的精力放在防御维京人的入侵上。
conquest_faction_desc_206=盎格鲁-撒克逊人的七王国之一，麦西亚王国曾是不列颠最强盛的王国，其霸权可以追溯到彭达统治时期。但往日辉煌不再，现在的麦西亚王国不光要防备维京人，还要提防虎视眈眈的威塞克斯王国。
conquest_faction_desc_207=盎格鲁-撒克逊人的七王国之一，东盎格利亚王国国土不大且多处于沼泽之中，这使其很难做强，历史上长期沦为麦西亚的附庸国。如今麦西亚王国无暇他顾，这是东盎格利亚王国崛起的最后机会。
conquest_faction_desc_208=格温内斯王国是不列颠人建立的罗马帝国继承国之一，其国王通常享有“不列颠之王”的称号。格温内斯现任国王为罗德里大帝，在这位明君的治理下，格温内斯王国繁荣强盛，几乎统一威尔士全境。
conquest_faction_desc_209=盎格鲁-撒克逊人的七王国之一，诺森布里亚王国是由两个独立的小王国合并而成的，这导致这个国家在政治上长期处于倾轧和争吵之中。当此维京人在不列颠作乱之时，诺森布里亚王国更加需要团结。
conquest_faction_desc_210=阿尔巴王国是由盖尔人与皮克特人联合组建的王国，现任国王正是王国的开创者，有着“征服者”之称的肯尼思一世。在这位能征善战的国王带领下，阿尔巴王国击退了各种来犯之敌，成为不列颠北方的霸主。
conquest_faction_desc_211=盖尔王国是由爱尔兰诸多小王国组成的联合王国，其领袖被称为爱尔兰至高王。虽然爱尔兰偏居一隅，但仍然没能免遭维京人的侵袭，盖尔王国需要团结在至高王的麾下，才能将这些入侵者赶出爱尔兰。
conquest_faction_desc_212=斯拉夫人的扩张最早可以追溯至公元5世纪，也许西斯拉夫人就是在那个时候从斯拉夫部落中分离出来，成为了一个独立的民族。生活在苦寒之地的西斯拉夫人具有吃苦耐劳的品质，但也拥有顽强的战斗意志。

conquest_faction_desc_301=拜占庭帝国皇帝查士丁尼一世矢志复兴罗马帝国，意图收复所有被蛮族染指的帝国故土。作为皇帝最为信任的大将，贝利撒留肩负复国重任，他将率领一支帝国最精锐的军团远赴北非，从那里开启恢复罗马帝国荣光的征程。
conquest_faction_desc_302=汪达尔人曾是日耳曼蛮族部落之一，在经过漫长而又艰苦的迁徙之后，最后侵占罗马帝国的北非行省并以此建立了汪达尔王国。自王国建立以来，汪达尔人就多次挫败拜占庭帝国收复北非故土的企图，想必此次也不会例外。
conquest_faction_desc_303=西罗马帝国衰亡后，狄奥多里克大帝率领东哥特人迁入亚平宁半岛，并在这原帝国的核心领土上建立了东哥特王国。如今东哥特王国正因狄奥多里克大帝的逝世而陷入内乱的泥沼之中，外部又有强敌环伺，王国的处境已十分艰难。
conquest_faction_desc_304=在西罗马帝国因蛮族入侵而灭亡后，作为原罗马帝国东部继承者的拜占庭帝国，也经历了长达半个世纪的沉寂和衰落。如今拜占庭帝国在皇帝查士丁尼一世的励精图治下，终于再次强盛起来，并朝着复兴罗马帝国的方向前进。
conquest_faction_desc_305=西哥特王国作为最早在高卢建立的日耳曼人王国，却被崛起的法兰克王国击败，不得已放弃高卢，向南翻越比利牛斯山脉。经过多年的蛰伏，国力得到恢复的西哥特王国又将目光投向高卢，誓要再与法兰克人一较高下。
conquest_faction_desc_306=当诸多日耳曼迁徙民族正为了瓜分西罗马帝国的领土而打的头破血流之际，明智的苏维汇人选择前往伊比利亚建立苏维汇王国。但好景不长，随着西哥特人也迁入伊比利亚半岛，苏维汇王国与西哥特王国的冲突已不可避免。
conquest_faction_desc_307=作为伊比利亚土著民族，瓦斯科人总是在奋力抵抗各样的入侵者，从当年的罗马帝国到如今的诸多日耳曼蛮族，不管面对的敌人如何强大、如何善战，瓦斯科人从没有放弃抗争和独立自主的决心。
conquest_faction_desc_308=法兰克王国是由萨利安法兰克人的首领克洛维一世统一所有法兰克部落而建立的日耳曼人王国。作为西罗马帝国曾经的蛮族盟友，法兰克王国很顺利地继承了帝国在高卢地区的权力和遗产，快速崛起为高卢地区的霸主。
conquest_faction_desc_309=勃艮第人的迁徙之路充满了坎坷，刚跨越莱茵河便先后遭到罗马人和匈人的阻击，在历经千难万险之后，终于在高卢建立了勃艮第王国。但勃艮第人依然不能掉以轻心，相邻的法兰克王国似乎对他们的领土有所企图。
conquest_faction_desc_310=布列塔尼人主要由从大不列颠岛迁徙过来的凯尔特人组成。不管是当年的西罗马帝国，还是如今的法兰克王国，布列塔尼人总是要和国力远胜自己的强国相处，但布列塔尼人从来没有屈服过。
conquest_faction_desc_311=日耳曼迁徙民族建立的王国之一，与其他日耳曼人王国不同的是，图林根王国在匈人帝国崩溃后积极吸纳了许多匈人奴隶，因此王国有着出众的军事实力，但这使得图林根王国成为周边其他国家忌惮的对象。
conquest_faction_desc_312=日耳曼迁徙民族之一，当伦巴第人历经磨难终于找到一处安全之所时，西罗马帝国富裕的领土早已被其他迁徙民族瓜分殆尽。伦巴第人只能把期望寄托在拜占庭帝国和东哥特王国上，尽管在两个强国间周旋无异于火中取栗。
conquest_faction_desc_313=起源于东日耳曼哥特族的格皮德人十分骁勇善战，在匈王阿提拉去世后，格皮德人率先起兵反抗匈人，并最终覆灭了匈人帝国。如今格皮德王国与拜占庭帝国相邻，格皮德人需要小心应对这个极具智慧的古老帝国。

conquest_faction_desc_401=自阿莱克修斯一世皇帝登基以来，科穆宁家族已持续统治拜占庭帝国一个多世纪。经过前几任科穆宁皇帝的励精图治，拜占庭帝国止衰转盛，一扫突厥人入侵后的颓势，并有望收复安纳托利亚故土，重现罗马帝国的辉煌。
conquest_faction_desc_402=塞尔柱帝国分裂后，基利杰阿尔斯兰一世继承其在安纳托利亚的政权而建立的国家。罗姆苏丹国与拜占庭帝国为了争夺安纳托利亚而多次交战，虽然目前两国保持着难得的和平，但绝不可忽视拜占庭帝国收复故土的决心。
conquest_faction_desc_403=由那些因塞尔柱帝国入侵而逃难到奇里乞亚的亚美尼亚人建立的国家，全称“奇里乞亚亚美尼亚王国”。奇里乞亚王国若想要在强敌环伺的安纳托利亚生存下去，就需要交好十字军国家并借助他们的力量。
conquest_faction_desc_404=“贝伊”突厥语中“首领”、“酋长”的意思，拜占庭帝国因塞尔柱帝国的入侵而失去了对安纳托利亚的掌控，诸多突厥部落趁机迁入该地区，建立了由各部落首领联合统治的安纳托利亚贝伊国。
conquest_faction_desc_405=长久以来，格鲁吉亚地区存在着许多相互敌对的割据势力，格鲁吉亚王国的建立终结了这一混乱的局面。如今在塔玛尔女王的统治下，格鲁吉亚王国繁荣强盛，若能趁此时机向南扩张，或许能建立一个强大的外高加索帝国。
conquest_faction_desc_406=塞尔柱帝国原阿塞拜疆总督伊尔迪尼兹建立的王朝，埃尔迪古兹的统治者世袭“阿塔贝格”这一头衔，即“藩王”和“苏丹辅政大臣”。当塞尔柱帝国因内乱而衰弱时，埃尔迪古兹的阿塔贝格趁机控住了苏丹，以此来掌控帝国的政权。
conquest_faction_desc_407=赞吉王朝是抗击十字军东征最为坚决的国家，先王努尔丁就曾多次率军战胜十字军，有效遏制了十字军国家对西亚地区的侵蚀。如今同时面对十字军国家和新晋的阿尤布王朝的挑战，王朝需要更加谨慎处理外交，切不可多面受敌。
conquest_faction_desc_408=继倭马亚王朝后，阿拉伯帝国的第二个世袭王朝。时过境迁，曾经繁荣昌盛的阿拔斯王朝如今国力衰微偏居一隅，甚至沦为突厥人操控的傀儡。阿拔斯王朝若想重现昔日荣光，必须趁塞尔柱帝国四分五裂之际，彻底摆脱突厥人控制。
conquest_faction_desc_409=十字军国家之一，第一次十字军东征时期塔兰托的博希蒙德夺取安条克城后建立的公国。安条克城作为十字军东征路线上的战略重镇，也是十字军与拜占庭帝国联系的重要枢纽，因此完善城防是安条克公国的首要任务。
conquest_faction_desc_410=十字军国家之一，由耶路撒冷王国扶持图卢兹的贝特朗以的黎波里城为中心建立的伯国。的黎波里伯国地处耶路撒冷王国和安条克公国之间，只有处理好与这两国的关系并结成牢固的攻守同盟，才能抵御住阿尤布王朝的冲击。
conquest_faction_desc_411=十字军国家之一，当前耶路撒冷国王鲍德温四世年虽然年轻且身患恶疾，但其治国和用兵颇具章法，既能平衡国内诸派纷争使王国政局稳定，又能亲自领兵击退如日中天的萨拉丁。耶路撒冷王国在鲍德温四世的治理下日益强盛，正成为十字军诸国的中心。
conquest_faction_desc_412=库尔德人萨拉丁解散法蒂玛王朝后，以埃及为统治中心建立的帝国。萨拉丁在率军反击十字军入侵时，就表现出卓越的军事才能和领袖风范。如今在这位雄主统治下的埃及帝国正大举扩张，大有一统整个伊斯兰世界的趋势。
conquest_faction_desc_413=阿基坦公爵理查是英格兰国王亨利二世的次子，也是其王位的唯一继承人，理查有着极高的军事组织能力且骁勇善战。在厌倦了与父兄们无休止的内战之后，理查决定响应教廷的号召，率领远征军支援远在东方的十字军国家。

conquest_faction_desc_501=自维京人入侵不列颠以来，偏居于爱尔兰岛的盖尔人也没能免遭这些海盗的侵扰。如今盖尔人正团结在至高王的麾下，誓要将维京人赶出家园，统一爱尔兰。
conquest_faction_desc_502=从斯堪的纳维亚迁入不列颠的维京人的一支，占据了英格兰北部和爱尔兰东部沿海地区。随着原住民的抵抗越来越坚决，这支维京人对不列颠的征服变得十分艰难。
conquest_faction_desc_503=又称盎格鲁-撒克逊英格兰，是由威塞克斯王国统一英格兰地区后建立的王国。当此王国王位交接之际，维京人再度侵入诺森布里亚，埃德蒙一世需要驱逐这些入侵者来重新统一英格兰。
conquest_faction_desc_504=不列颠人建立的罗马帝国继承国之一，格温内斯王国的每一位国王都致力于发展国力，期望有朝一日能够重新掌控不列颠，使“不列颠之王”的称号名副其实。
conquest_faction_desc_505=由达尔里阿达国王肯尼思一世兼并皮克特人后建立的王国。阿尔巴王国自建立起，就顽强抗击着各路入侵者，无论是维京人还是英格兰人，都没能使阿尔巴王国屈服。
conquest_faction_desc_506=阿斯图里亚斯王国的继承者，以莱昂为首都的基督教王国。作为西班牙半岛上最大的王国，莱昂王国肩负着领导其他基督教国家一起抵抗科尔多瓦哈里发国的扩张。
conquest_faction_desc_507=巴斯克人以潘普洛纳为中心建立的独立王国。潘普洛纳王国建立之初便成功抵御住法兰克王国的侵扰，如今面对同样强盛的科尔多瓦哈里发国，王国的人民依然不会退缩。
conquest_faction_desc_508=巴塞罗那伯国最初是法兰克王国以巴塞罗那为中心建立的边境伯爵领，但随着西法兰克王国内部争斗不休，王国越来越无力支援巴塞罗那伯爵，伯国与法兰克王国的联系日益衰弱。
conquest_faction_desc_509=倭马亚王朝的后裔在伊比利亚半岛建立的伊斯兰教王国，阿卜杜拉赫曼三世自立为哈里发后，遂被称作科尔多瓦哈里发国。目前帝国在这位“常胜者”的治理下日益强盛，大有一统整个伊比利亚半岛的趋势。
conquest_faction_desc_510=阿拉伯贵族伊德里斯整合当地的柏柏尔部落后建立的王朝。如今王国国力衰落、内乱不止，又遭北方强邻窥视，王国需要谨慎处理外交，否则有亡国之险。
conquest_faction_desc_513=伟大的艾伦一世逝世后，维京人卷土重来，侵占了布列塔尼大部分地区。在与维京人抗争了近30年后，艾伦二世成功驱逐了这些北欧海盗，重新建立了布列塔尼公国。
conquest_faction_desc_514=法兰克王国被《凡尔登条约》一分为三之后，西法兰克王国继承了原王国的西部领土。如今加洛林王朝王权旁落，国内的诸侯们纷纷做大，更有如于格那样的逆贼，竟敢攻占王室领地，西法兰克王国的中兴之路显得极其艰难。
conquest_faction_desc_515=长久以来，塞纳河下游地区经常遭到维京人的袭击，西法兰克王国于是将该地区封予维京人首领罗洛，换取和平及这支维京部落的效忠，罗洛便以鲁昂为中心建立了诺曼底公国。
conquest_faction_desc_516=法兰克公爵兼巴黎伯爵于格虽然曾拥立路易四世继承西法兰克王位，但其家族拥有的实力还是遭到一心加强王权的路易四世的猜忌和忌惮，经过多次交锋和争斗，这对君臣最终反目成仇、兵戎相见。
conquest_faction_desc_517=阿基坦这一名称可以追溯至罗马帝国时期的阿基坦高卢行省，阿基坦地区盛行的罗马文化使其在西法兰克王国中显得与众不同，阿基坦公国因此保留有一定的独立自主性。
conquest_faction_desc_518=加洛林王朝以图卢兹为中心建立的伯爵领。如今加洛林王朝衰落，图卢兹伯国虽然名义上臣属于西法兰克王国，但西法兰克王国已无法对图卢兹伯国进行有效的干预。
conquest_faction_desc_519=由上、下勃艮第王国合并而成的王国，所以又被称作两勃艮第王国，因首都设在阿尔勒而得名。阿尔勒王国地处东、西法兰克王国之间，需要谨慎的与这两个大国相处。
conquest_faction_desc_520=东法兰克国王奥托一世自继位起便致力于加强王权，坚持国王对诸侯们的权力，这导致王国与公国间矛盾重重，甚至多次引发叛乱。但奥托一世坚信，只有将王国所有的力量团结在自己的麾下，才能重现法兰克王国的辉煌。
conquest_faction_desc_521=《凡尔登条约》将法兰克王国分成了西、中、东三个王国，但仅隔12年后中法兰克王国再被一分为三，洛塔林吉亚公国由此诞生。公国因继承了法兰克人兴起之地奥斯特拉西亚地区而遭到西、东两个王国的觊觎。
conquest_faction_desc_522=又称法兰克尼亚公国，是东法兰克王国自治公国之一。东法兰克的加洛林王室绝嗣后，弗兰肯公爵曾短暂掌控过东法兰克的王位，或许因此弗兰肯公国不甘愿臣服于来自萨克森的奥托一世。
conquest_faction_desc_523=东法兰克王国自治公国之一，巴伐利亚这一名称可以追溯至罗马帝国时期对当地部落的称呼，意为“来自波希米亚的人”。加洛林王朝衰落后，不得不设立一个新的巴伐利亚公国，以此延续王朝对当地的统治。
conquest_faction_desc_524=公元774年，查理曼征服伦巴第王国并将其北部地区直接并入法兰克王国，后来这部分地区被设立为意大利王国。如今法兰克王国早已分崩离析，意大利王国终于取得独立，不在受制于他国。
conquest_faction_desc_526=贝内文托公国起源于伦巴第人征服意大利后，在意大利南部建立的以贝内文托为中心的公国。伦巴第王国被法兰克王国吞并后，贝内文托公国则因教皇国的分隔而得以独立存活。
conquest_faction_desc_527=当西罗马帝国遭蛮族入侵而灭亡后，意大利北部沿海地区的居民纷纷逃往泻湖并在此建立了定居点，威尼斯共和国便由此发展起来。作为因海上贸易而繁荣的城邦国家，威尼斯需要一支强大的海军来维护自己的海上利益。
conquest_faction_desc_528=自查士丁尼大帝中兴以来，拜占庭帝国仿佛用尽了气运，之后的近400年里，帝国内忧外患不断，国土接连沦丧。但伟大的国家不会一直沉沦，经过前几任马其顿皇帝的治理，拜占庭帝国国力得到恢复，并准备收复失地。
conquest_faction_desc_529=公元7世纪，拜占庭帝国邀请克罗地亚人迁入达尔马提亚地区，以此来共同对抗在当地肆掠的阿瓦尔人，于是克罗地亚人在达尔马提亚建立了政权并逐步发展为克罗地亚公国。
conquest_faction_desc_530=塞尔维亚人在达尔马提亚地区建立的政权，塞尔维亚公国这一新兴政权正面临保加利亚人入侵的威胁，也许与正和保加利亚人陷入苦战的拜占庭帝国合作是个不错的选项。
conquest_faction_desc_531=保加利亚帝国自立国以来，便与拜占庭帝国连年交战，即使如拜占庭这样的古老强国，也不得不屈服于帝国的兵锋之下。但盛极必衰，如今保加利亚帝国正因内战而元气大伤，周边的手下败将们纷纷串联，似乎要趁机反攻。
conquest_faction_desc_532=即丹麦日耳曼人，通常指居住在斯堪的那维亚南部的维京人部落。相比于其他维京人部落热衷于出海劫掠，这群留守本土的维京人更愿意积极发展故乡，但这样就得直面强大的东法兰克王国。
conquest_faction_desc_533=萨克森贵族吉罗一世在东法兰克王国东部设立的边境侯爵领。作为东法兰克国王奥托一世最信任的部下，吉罗一世负责守卫王国东部边境的安稳，并尽可能的向东方扩展王国的疆域。
conquest_faction_desc_534=又称捷克公国，是由大摩拉维亚公国的捷克人建立的政权。尽管波西米亚公国曾为了从大摩拉维亚公国独立出来而与东法兰克王国亲密合作过，但最终波西米亚公国仍然为了独立而与东法兰克王国交恶。
conquest_faction_desc_535=波兰一词源自古斯拉夫语，意为平原人，很形象的表达了波兰人所生存的环境。面对东法兰克王国不断的东扩，波兰人若想要家园不被侵占，唯有团结一致才能抵抗住这个庞然大物。
conquest_faction_desc_536=公元9世纪，马扎尔人从东欧草原迁入喀尔巴阡盆地，刚进入中欧的马扎尔人靠四处劫掠为生，周边各国不堪其扰。如今随着各国对这个新邻居的防范越来越严密，马扎尔人需要改变他们从草原带来的生存习性。
conquest_faction_desc_538=佩切涅格人起源于西突厥乌古斯部落，曾短暂从属于可萨汗国。公元10世纪初，佩切涅格人西迁至顿河流域，接管了可萨汗国在该地区的政权。
conquest_faction_desc_539=伊比利亚王国曾是拜占庭帝国的附属国，后因阿拉伯帝国的兴起和入侵，伊比利亚王国被迫向阿拉伯帝国效忠。如今阿拉伯帝国正因内乱而无暇他顾，伊比利亚王国若能抓住时机交好旧主，便能彻底摆脱阿拉伯人的控制。
conquest_faction_desc_540=作为一个公元前便存在的古老王国，亚美尼亚王国的历史充满了坎坷，其国土先后被波斯人、罗马人和阿拉伯人侵占和统治。但即便如此，亚美尼亚人依然不会放过任何可以使国家独立的机会。
conquest_faction_desc_541=阿拉伯帝国分裂出来的王国之一，原阿拉伯帝国摩苏尔总督阿卜杜拉在认清阿拔斯王朝的衰落后，便割据摩苏尔自立，随后建立摩苏尔埃米尔国并自称埃米尔，由此开创了哈姆达尼王朝。
conquest_faction_desc_542=阿拉伯帝国分裂出来的王国之一，由阿拔斯王朝的突厥将领伊赫什德建立的埃及王朝。目前伊赫什德王朝正与哈姆达尼王朝争夺叙利亚的控制权，叙利亚的归属将决定两个王国在阿拉伯世界的权威。

