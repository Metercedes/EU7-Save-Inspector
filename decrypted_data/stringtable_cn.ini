stage_intro_4701=哈立德是公元7世纪时阿拉伯的优秀指挥官，在他追随穆罕默德之后获得了“安拉之剑”的称号。
stage_intro_4703=633年，穆罕默德的继任者拉西顿哈里发与萨珊波斯王朝发生边境冲突，哈立德受命出击。由于战役中波斯军队使用锁链将骑兵相连，因此这场战役也被称为“锁链之战”。
stage_intro_4705=锁链之战的失利使萨珊王朝不再轻敌，他们派出了两支大军试图将哈立德一举歼灭。但是哈立德抢在两支军队会合之前包围了其中一部，获得了战场的主动权。
stage_intro_4707=634年，连战连捷的哈立德受命回撤，转而向西进军。他的新对手是被称为拜占庭帝国中兴之主的希拉克略。
stage_intro_4709=636年，此前战败的希拉克略重新集结一支大军逼近叙利亚，哈立德率兵前往迎战。双方在耶尔穆克河附近展开了长达6天的残酷战斗。
stage_intro_4711=耶尔穆克战役胜利后，哈立德乘胜追击，成功包围并占领了军事重镇阿勒颇，这也意味着希拉克略远征的彻底失败。

