battle_talk_160101=萨默赛特公爵这种战场败逃的人竟敢染指军政大权，为了国家，我必须消灭他！
battle_talk_160102=为国王而战！
battle_talk_160103=前进！消灭这个叛徒！
battle_talk_160104=敌人的正面防线十分强大，我们可以尝试从侧面迂回！
battle_talk_160201=水流太急了，强行渡河会使部队遭受巨大损失，要想办法吸引敌人追击。
battle_talk_160202=王后命令我支援奥德利男爵，但我不会下没有把握的赌注。
battle_talk_160203=追上去，别让他们跑了！
battle_talk_160204=他们中计了，弓箭手，放箭截击渡河的敌人！
battle_talk_160205=战局已然明了，动手吧！
battle_talk_160301=约克的士兵们，放下武器，国王将会宽恕你们！
battle_talk_160302=不要被他蒙骗，国王已经死了！
battle_talk_160303=我愿意向国王效力，我有约克军的情报！
battle_talk_160304=军队的士气已经崩溃，事已至此，只能分头突围了。
battle_talk_160401=大雨让火炮无法使用，形式对我们不利！
battle_talk_160402=敌人拒绝与我们谈判，那么我们就在战场上分胜负吧
battle_talk_160403=约克家族承诺给我足够的利益，我将为他们提供帮助
battle_talk_160404=敌人正在溃逃！这是追击的好机会！
battle_talk_160405=所有人都不准伤害国王和平民，我们的目标是贵族，骑士及其侍从！
battle_talk_160501=虽然我们现在被敌人围困，但是只要等到援军到来，一切都会好起来的
battle_talk_160502=我要让约克公爵血债血偿！
battle_talk_160503=他们竟敢攻击我的运粮队！随我出击！消灭他们！
battle_talk_160504=出击！包围约克公爵！
battle_talk_160505=把约克公爵的头颅戴上纸王冠挂出去示众！让那些王位觊觎者知道自己的下场！
battle_talk_160601=加快行军速度！我们要截住兰开斯特军队！
battle_talk_160602=军队长途跋涉，已经十分疲惫，我们需要鼓舞他们的士气！
battle_talk_160603=天哪！那是什么？天上为什么会有三个太阳？
battle_talk_160604=不要害怕战士们！这意味着上帝与我们同在！我们必将获得胜利！
battle_talk_160701=包围城镇！消灭他们的弓箭手！
battle_talk_160702=向西北迂回！包抄他们！
battle_talk_160703=该死！火药被打湿了！我们需要支援！
battle_talk_160704=敌人越来越多，我们需要找机会撤出战场！
battle_talk_160801=暴风雪使得弓箭手们睁不开眼睛，天气对我们不利！
battle_talk_160802=我们正处于上风，弓箭手保持压制！
battle_talk_160803=不能一直这样被箭雨压制下去，骑兵冲锋！
battle_talk_160804=是兰开斯特的伏兵！我们需要收缩阵型减少伤亡！
battle_talk_160805=谢天谢地！我没有来晚！
battle_talk_160901=纽斯卡尔附近的山地有利于士兵们藏身，我们可以在那里伏击敌人
battle_talk_160902=盟友在等待我们，我认为应当从北方进军
battle_talk_160903=左翼损失惨重，我得重新集结部队。
battle_talk_161001=稳固阵地，修筑工事挡住敌人。
battle_talk_161002=发起突袭！不要给他们准备的时间！
battle_talk_161003=稳住！不要后退！
battle_talk_161004=萨默赛特公爵已死！你们不要再做无谓的抵抗了！

