general_desc_Roger II1=西西里王国的奠基者，一位兼具智慧与雄心的伟大君主。他超越了宗教和文化的分歧，以开阔的胸怀与非凡的手段，将不同的民族与信仰融合在他的王国之下。
general_desc_Li Shimin1=唐王朝的战神，凭借无与伦比的军事才能征战四方、所向披靡。然而，正是这份耀眼的锋芒，使他成为父亲与兄弟眼中不可忽视的威胁。在权力的漩涡中，他成长为一位令人敬畏又难以揣测的雄才。
general_desc_Wu Zetian1=如同初绽的花朵，少女时期的武则天美丽而灵动，举手投足间透着一抹青春的温婉与纯真。此时的她，尚未被权谋与野心侵染，内心仍怀抱着少女的天真与憧憬，宛若风华正茂的画卷一角，令人驻足难忘。
general_desc_ZhiTianXinChang=日本战国时期的杰出领袖，以聪明才智和军事策略而著名。他统一了日本中部地区，建立了强大的势力，与丰臣秀吉、德川家康两人并称为"战国三杰"。
general_desc_ZhiTianXinChang1=本能寺之变后，包括明智光秀在内的众人都认为织田信长已死。而逃出生天的织田信长却在鲜血和烈焰之中获得了新生，并以魔王之姿归来！
general_desc_Pope Gregory IX=他是天主教会的领袖，也是教皇国的统治者。

