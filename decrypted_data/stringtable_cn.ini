stage_intro_2151=公元376年，西哥特人向罗马帝国寻求庇护，希望以此躲避匈人的侵袭，但渡过多瑙河后却与境内的罗马人爆发了诸多冲突，最终双方在马尔恰诺波利斯展开了战斗。
stage_intro_2152=公元378年，反叛的哥特人在洗劫多瑙河各省后，准备联合其他蛮族入侵巴尔干半岛。罗马皇帝瓦伦斯决定亲自出征，但其麾下士兵的战力参差不齐，是这次镇压叛乱作战的最大隐患。
stage_intro_2153=公元402年，西哥特人在国王阿拉里克的带领下，持续入侵西罗马帝国腹地，不久之后更是包围了重镇米兰，这让皇帝霍诺留寝食难安，因此急令正在帝国北部的斯提里科率兵南下。
stage_intro_2154=公元410年，阿拉里克在与霍诺留约定的会面地点遭到了罗马军队的袭击，这次袭击让他决定放弃与西罗马帝国谈判，并再一次围攻罗马城，这座“永恒之城”在被多次围攻之后显得摇摇欲坠。
stage_intro_2155=公元419年，刚与西罗马帝国签订盟约的苏维汇王国便因边境归属问题，频频与邻国汪达尔王国爆发冲突，有着极强征服欲的苏维汇国王赫默里克决定主动入侵汪达尔人的领地。
stage_intro_2156=公元439年，盖萨里克率领军队横穿直布罗陀海峡并占据西罗马帝国北非大半领地已经8年。在与西罗马帝国保持近5年的和平后，盖萨里克再次盯上了迦太基城——罗马帝国的第三名城。
stage_intro_2157=公元451年，野心勃勃的匈王阿提拉决定借着西罗马宫廷丑闻的机会出兵入侵高卢地区。身在高卢的罗马将军埃提乌斯也趁机联络高卢地区的蛮族王国组成联军，准备抗击匈人的侵略。
stage_intro_2158=公元455年，马克西穆斯通过谋害皇帝瓦伦提尼安三世篡位，这破坏了汪达尔国王盖萨里克与后者的联盟，在收到欧多西娅皇后的求援后，盖萨里克决定出兵进攻意大利。
stage_intro_2251=公元6世纪，欧洲各国已经逐渐认识到骑兵的重要性。530年，波斯人向拜占庭帝国发动了攻击，达拉城外，萨珊王朝的精锐骑兵已经全部就位。
stage_intro_2252=查士丁尼一世无时无刻不想重现罗马昔日的辉煌，而盖利摩的篡位夺权恰好给了他出兵北非的借口。公元533年，贝利撒留带领部队登陆北非，向迦太基进军。
stage_intro_2253=拜占庭在十里会战中取得巨大胜利后，贝利撒留和他的军队占领了迦太基。身处迦太基以西的盖利摩则向他的兄弟求援，准备重新集结军队，夺回迦太基。
stage_intro_2254=重新征服北非后，查士丁尼一世将目光投向了意大利地区。公元535年，贝利撒留带领他的军队再一次出征，为他的皇帝占领罗马，夺回意大利地区。
stage_intro_2255=占领罗马后，通往拉文纳的道路对拜占庭来说几乎畅通无阻。贝利撒留带领着他的部队继续进军，东哥特王国的首都即将面对拜占庭军队的大举进攻。
stage_intro_2256=由于东哥特国王托提拉的活跃，查士丁尼一世不得不将贝利撒留重新派往意大利地区。公元546年，托提拉的部队来到罗马，并包围了这座城市。
stage_intro_2257=托提拉在意大利地区的持续侵略令帝国损失惨重，他还计划利用舰队封锁海域，防止帝国军队轻易进入意大利地区，这些举动让查士丁尼一世十分不满。
stage_intro_2258=为了夺回意大利的控制权，查士丁尼一世决定派遣纳尔西斯前往意大利。与纳尔西斯相遇后，尽管兵力处于劣势，但作为传统哥特人的托提拉依旧选择主动发起进攻。
stage_intro_2259=纳尔西斯的进攻让哥特人难以抵挡，东哥特国王决定向法兰克人和阿勒曼尼人求援，希望他们能进入意大利地区，阻止拜占庭军队的进攻。
stage_intro_2260=公元559年，一群匈人越过边境，在君士坦丁堡城郊肆意作恶，这对查士丁尼一世来说简直是奇耻大辱。他再一次将贝利撒留召到面前，赋予他最后一项使命。
stage_intro_2351=盎格鲁-撒克逊人的到来让不列颠的原住民恐慌不已，面对装备精良且训练有素的敌人，不列颠人不得不拿起武器抗击盎格鲁-撒克逊人的入侵。
stage_intro_2352=南撒克逊部落首领埃尔率领其部民在不列颠岛南海岸成功登陆，但向内陆的进军并不顺利，他们遭到了当地人的顽强抵抗，这让埃尔意识到自己兵力的不足，并向仍在本土的部落请求增援。
stage_intro_2353=连年战乱的影响下，不列颠散乱的部族开始整合并建立起各自的王国，但这并未给不列颠带来和平和稳定，部族间的战斗逐渐演变为以诺森布里亚王国为首的王国间更大规模且残酷的战争。
stage_intro_2354=公元633年，埃德温治理下的诺森布里亚王国是当时英格兰地区最为强盛的国家，这引起了邻国的忌惮，格温内斯国王卡德瓦龙决定与麦西亚王国结盟，并组建联军入侵诺森布里亚王国。
stage_intro_2355=虽然成功抵御了格温内斯王国与麦西亚王国联军的入侵，但诺森布里亚王国也遭受了极其严重的破坏，王国更是一度分裂。公元634年，格温内斯国王卡德瓦龙再次出兵进犯诺森布里亚王国。
stage_intro_2356=奥斯瓦尔德的回归与继位，使诺森布里亚军队得以战胜格温内斯王国，王国再次得到了和平与稳定。公元644年，随着十年来国力逐渐恢复，奥斯瓦尔德决定主动进攻麦西亚王国。
stage_intro_2357=奥斯瓦尔德对麦西亚的入侵以惨败告终，彭达决定趁此机会联合东盎格利亚王国与格温内斯王国将战火引向诺森布里亚本土。公元655年，诺森布里亚王国只剩伯尼西亚还未被联军攻占。
stage_intro_2358=长久以来，麦西亚王国通过强行控制英格兰南部的诸多王国来维持其霸主地位。公元825年，贝恩沃夫为了巩固自己的权威，亲自率军入侵威塞克斯王国，威塞克斯国王埃格伯特奋起反击。
stage_intro_2451=由于使者被伽珊尼德所害，阿拉伯人决定发起报复行动，而这一行动的计划却被拜占庭得知，并立刻集结了要塞的驻军。在强大的拜占庭军队面前，阿拉伯人的行动似乎注定会失败。
stage_intro_2452=哈立德带领部队来到玛吉·拉希特时，伽珊尼德人认为阿拉伯人无法对他们构成威胁，但阿拉伯人很快就用行动证明了他们的战力是无与伦比的强大。
stage_intro_2453=阿布成为阿拉伯第一位哈里发后，开始试图将势力扩展到阿拉伯半岛以外。阿拉伯军队一路向北推进，并对大马士革发起了进攻。
stage_intro_2454=为了阻止阿拉伯人前进，夺回失去的领土，希拉克略决定向黎凡特派遣一支大规模的军队。随着敌人的逼近，阿拉伯人从大马士革撤退，并在雅尔穆克重新集结了部队。
stage_intro_2455=在雅尔穆克平原与拜占庭军队交战后，阿拉伯人决定继续推进，并占领更多的城市。公元636年末，阿拉伯军队来到了耶路撒冷，并包围了这座城市。
stage_intro_2456=阿拉伯人的征服依然在继续，他们的部队在安纳托利亚半岛上所向披靡。接连的战败和城市的丢失让拜占庭帝国感到了恐慌，他们急需战胜这一强敌的办法。
stage_intro_2457=战胜了萨珊王朝后，奥马尔决定带领他的阿拉伯战士们向非洲进军。阿拉伯人计划以埃及为起点，占领更多的非洲土地作为自己的领土。
stage_intro_2458=在彻底结束了萨珊王朝的统治后，阿拉伯人将拜占庭帝国列为了主要的敌对目标，为此，他们建立了一支强大的海军，来支持他们在地中海地区对抗拜占庭帝国的行动。
stage_intro_2551=公元865年，一支维京人大军跨过大海，在不列颠的土地上登陆，并对沿海的修道院等财富中心进行了突袭和劫掠。
stage_intro_2552=维京人入侵以来，东盎格利亚和诺森布里亚两大王国已经接连被占领，而维京人的下一个目标，则是占领威塞克斯王国。
stage_intro_2553=在雷丁战役中获得优势的维京部队继续向前推进，并在阿什当地区再次与威塞克斯军队发生了战斗。
stage_intro_2554=经过长达数十年的入侵和劫掠，只有包括威塞克斯王国在内的为数不多的势力依旧在阿尔弗雷德的带领下抵抗着维京人的入侵。
stage_intro_2555=公元893年，重新登陆不列颠的维京人再一次与盎格鲁-撒克逊人发生了冲突，而随着战术的改变，维京人的入侵已经鲜有成效。
stage_intro_2556=公元937年，北方三王国结成联盟，希望摧毁英格兰不断增长的力量。面对敌人的入侵，埃塞尔斯坦国王集结了一支军队并向北进军。
stage_intro_2557=为了争夺英格兰的王位，挪威国王哈罗德·哈拉尔与他的盟友决定集结军队向约克郡进军。
stage_intro_2558=由于英格兰国王忏悔者爱德华的去世，觊觎王座的人开始躁动不安，其中来自挪威的哈拉尔便带领自己的部队，向英格兰发动了进攻。
stage_intro_2651=拜占庭帝国和保加利亚帝国的战事连年不断。公元811年，尼基弗鲁斯一世率军攻打保加利亚，在连续取得胜利后，他决定向普利斯卡进军。
stage_intro_2652=普利斯卡战役之后，拜占庭帝国和保加利亚帝国双方都遭受了重大的损失，但是保加利亚帝国依旧保持着激进的攻势。尽管损失惨重，拜占庭帝国依旧拒绝签署和平协议。
stage_intro_2653=米海尔二世继位后，一位名叫托马斯的军官决定反抗他的统治，这一举动赢得了很多人的支持，在众人的支持下，他联合阿拉伯人向君士坦丁堡发动了攻击。
stage_intro_2654=为了报复拜占庭教士被驱逐的行为，利奥六世决定将保加利亚商人驱逐出君士坦丁堡。这给了西蒙一世发动战争的借口，而此时拜占庭军队的主力正在东线抗击阿拉伯人。
stage_intro_2655=成为摄政王后，佐伊决定不再对保加利亚帝国让步，这一举动再次让西蒙一世向拜占庭帝国发动攻击。由于西蒙一世的一系列举措，拜占庭人被迫独自作战。
stage_intro_2656=公元922年，保加利亚人已经控制了大半个巴尔干地区，但由于缺乏海军，无法对君士坦丁堡造成威胁。保加利亚人决定联合阿拉伯人，但却被拜占庭人的及时出兵阻止了。
stage_intro_2657=在结束了与阿拉伯人的战斗后，拜占庭帝国在短时间内恢复了实力，并迅速击败了保加利亚帝国。但是这却让基辅罗斯趁虚而入，巴尔干半岛再次出现了一个新的强大的敌人。
stage_intro_2658=公元971年，保加利亚人的战败使得拜占庭人得以占据了大片保加利亚土地，为了夺回自己的土地，多年以来保加利亚人持续发动着进攻。
stage_intro_2659=图拉真之门战役后，拜占庭帝国爆发了内战。塞缪尔决定利用这一局势对拜占庭帝国发动攻击。公元996年，塞缪尔击败了塞萨洛尼卡的拜占庭军队，并开始向南进军。
stage_intro_2660=从1000年开始，拜占庭皇帝巴西尔二世开始发兵保加利亚。尽管双方互有胜负，但拜占庭还是打到了两国边界。一场中兴的拜占庭帝国和衰落的保加利亚之间的恶战不可避免。
stage_intro_2751=1066年，诺曼底公爵为了取得英格兰王位，带领部队跨过海峡，在英格兰登陆。当哈罗德二世得知消息后，立刻召集军队南下，在黑斯廷斯附近，布置守军。
stage_intro_2752=在黑斯廷斯战胜哈罗德二世后，威廉带领部队来到了伦敦。为了保证伦敦的安全，他派遣一支队伍来到了南华克，希望能够消灭那里的抵抗势力。
stage_intro_2753=成功征服英格兰后，身处埃克塞特的人们宣布拒绝向威廉效忠。为了让埃克塞特人服从他的统治，威廉带领部队包围了这座城市，但却遭到了强烈的抵抗。
stage_intro_2754=尽管得到了大多数人的支持，但依旧存在抵抗势力，反抗着威廉的统治，他们大多集中在北方。威廉决定带领部队北上，他认为无法通过和平的方式取得这些人的效忠。
stage_intro_2755=1075年，回到诺曼底的威廉拒绝承认艾玛和拉尔夫的婚姻，他的这一举动引起了三位伯爵的反抗起义运动，他们决定趁威廉身处诺曼底，抵抗并推翻他的统治。
stage_intro_2756=1105年，亨利一世带领部队入侵诺曼底公爵罗贝尔的领地，并占领了巴约和卡昂。次年，亨利一世返回诺曼底，莫尔坦伯爵作为效忠罗贝尔的贵族之一，成为了他的首要目标。
stage_intro_2757=1119年，法兰西国王路易六世带领部队进攻诺曼底。为了捍卫自己在诺曼底的财产与领土，亨利一世被迫与法兰西交战。
stage_intro_2758=1135年，亨利一世的突然病亡让英格兰陷入了无政府的混乱状态。斯蒂芬和亨利一世的女儿玛蒂尔达带领各自的势力，为了争夺英格兰王位而展开了斗争。
stage_intro_2851=1048年，一支由塞尔柱王子带领的军队进入了拜占庭帝国统治的亚美尼亚地区，由于自身兵力不足，拜占庭人决定采用保守的策略，并等待援军的到来。
stage_intro_2852=1071年，逐渐弱势的拜占庭帝国决定利用塞尔柱专心对抗埃及法蒂玛军队的机会，让拜占庭大军突袭亚美尼亚，收付先前所失去的土地和要塞。
stage_intro_2853=塞尔柱帝国在爱琴海地区的活动持续威胁着拜占庭帝国，阿莱克修斯决定组建一支舰队来对抗塞尔柱帝国的海军，重新夺回爱琴海地区的控制权。
stage_intro_2854=强势的塞尔柱人让拜占庭帝国无法抵挡，皇帝阿莱克修斯决定向西方求援。在拜占庭军队的协助下，东征大军跨过大海，将首战的目标指向了尼西亚。
stage_intro_2855=随着更多拜占庭援军的加入，东征军队的战斗力愈发强大，此时的东征大军正在赶往安条克，这座城市位于君士坦丁堡至耶路撒冷半程的位置上。
stage_intro_2856=为了加强安纳托利亚前线的防御，病情好转的阿莱克修斯决定亲自前往战场。他的军队多次击败了塞尔柱人，并在获得增援后，再次向敌人发起了进攻。
stage_intro_2857=1176年，拜占庭皇帝曼努埃尔一世在解除匈牙利和塞尔维亚的西方威胁之后，决定集中精力对付东方的罗姆苏丹国，并希望能收复安纳托里亚草原。
stage_intro_2858=曼努埃尔一世失去了一个收复安纳托利亚的绝佳机会，并失去了大批攻城器械。此时，一支劫掠后正在返程的塞尔柱人军队让他看到了胜利的希望。
stage_intro_2951=在攻克了塞尔柱人的首都尼西亚后，远征军遭到了猛烈的反攻。阿尔斯兰一世带领大量的部队，将博希蒙德一世的部队团团包围。
stage_intro_2952=在成功占领了安条克后，东征大军一路高歌猛进，继续向着耶路撒冷前进。同时驻守耶路撒冷的阿拉伯将领道拉也早已做好了防守的准备。
stage_intro_2953=第一次东征的胜利让西方领主们品尝到了胜利的喜悦，并决定再次发起东征行动，这一次，他们的首要目标则是大马士革。
stage_intro_2954=阿卡地理位置优越，是萨拉丁统治范围内一座非常重要的城市，当萨拉丁得知居伊再次集结部队来到阿卡城外时，他立刻集结了军队前往拦截。
stage_intro_2955=为了夺回被萨拉丁夺取的耶路撒冷，西欧领主们再一次组织起了东征军队，当大军进入安纳托利亚时，却遭到了塞尔柱人的猛烈攻击。
stage_intro_2956=狮心王理查从耶路撒冷撤军后，萨拉丁决定向雅法发动攻击，他认为这是一个复仇的机会。得知消息的狮心王再次集结了军队，向萨拉丁发起了进攻。
stage_intro_2957=当东征军队为前往耶路撒冷做准备时，他们的领导人答应了阿莱克修斯四世的请求，决定前往君士坦丁堡，帮助他的父亲夺回皇位。作为报酬，拜占庭帝国将会为他们提供经济和军事上的援助。
stage_intro_2958=经过长期的战斗，东征军开始认为埃及是阻碍他们重新夺回耶路撒冷的最大障碍。于是，他们决定组织军队，穿越地中海，向埃及发动攻击。
stage_intro_3051=由于威尔士的公开叛乱行为，亨利二世不得不从诺曼底返回英格兰。为了惩罚和阻止威尔士人，1165年，亨利二世集结了一支庞大的军队，向威尔士人发起了进攻。
stage_intro_3052=为了争夺英格兰王位的继承权，亚瑟和约翰进行了长期的斗争。在约翰决定与伊莎贝拉结婚后，这一平衡被逐渐打破，休十世和腓力二世的加入使得局面变得混乱不堪。
stage_intro_3053=由于约翰的拒不配合，腓力二世表示要亲手夺回诺曼底的土地，不久之后便开始了他的行动。1203年，腓力二世出兵盖拉德城堡，他认为这是控制整个诺曼底的关键。
stage_intro_3054=1213年，由威廉·朗格斯佩率领的英格兰舰队在偶然之下发现了一支法兰西舰队，而法兰西的船员们则早已登陆并开始了他们的劫掠。面对无人舰队，英格兰的胜利仿佛唾手可得。
stage_intro_3055=1214年，一支由英格兰王国、神圣罗马帝国、弗兰德伯国所组成的联军向法兰西王国发起了进攻，匆忙之下腓力二世迅速集结了大军。尽管联军声势浩大，但训练有素的法兰西骑兵似乎并不落下风。
stage_intro_3056=亨利三世统治时期，英格兰国内的饥荒日益加剧，这使得贵族们对亨利三世的不满也日益加剧。一场由西蒙·德孟福尔所领导的反抗亨利三世统治的战争即将到来。
stage_intro_3057=在爱德华一世的监督之下，苏格兰选出了新的国王。爱德华一世认为苏格兰应成为英格兰统治之下的侯国，并要求帮助英格兰对抗法兰西，而苏格兰人则反对了这一要求，并与法兰西结盟。
stage_intro_3058=在威廉·华莱士的带领下，苏格兰军队持续向英格兰发动攻击。1298年，爱德华一世决定与法兰西王国休战，并返回英格兰专心对抗苏格兰军队。
stage_intro_3059=福尔柯克战役获得胜利之后，苏格兰几乎被英格兰所征服。1306年，罗伯特·布鲁斯取得苏格兰王位，在爱德华一世病逝后，爱德华二世的领导能力并不如人意，这使得整个战局发生了逆转。
stage_intro_3060=1323年，罗杰·莫蒂默从伦敦塔逃离后与伊莎贝拉相识。双方都对爱德华二世十分不满，并决定反抗他的统治。1326年，伊莎贝拉与莫蒂默秘密返回英格兰，并开始了他们的反抗行动。
stage_intro_3151=君士坦丁堡沦陷后，尼西亚帝国和伊庇鲁斯专治国成为了最大的两个拜占庭流亡政权，并且他们都希望能够率先光复拜占庭帝国，但这一共同的目标却成为了两个政权冲突的根源。
stage_intro_3152=尼西亚帝国在与伊庇鲁斯专治国的争夺中获得了最后的胜利，在雄心勃勃的米海尔八世的带领下，尼西亚帝国将目光投向了盘踞在君士坦丁堡的拉丁帝国。
stage_intro_3153=1261年，尼西亚帝国与热那亚共和国结为同盟，并准备再一次向君士坦丁堡发起进攻。当发现拉丁驻军和威尼斯舰队远征未归时，他们决定不能浪费如此千载难逢的机会。
stage_intro_3154=重新建立拜占庭帝国后，米海尔八世力求肃清周边拉丁帝国的残余势力。1263年，拜占庭军队向亚该亚侯国发动了进攻，在占领其首都时，却遭到了顽强的抵抗。
stage_intro_3155=普里尼察战役的失败使得拜占庭帝国在摩里亚的战事愈发被动，雇佣军叛逃、部队分散的问题十分严重。1264年，在威廉二世带领下，拉丁帝国军队对分散的拜占庭军队发起了进攻。
stage_intro_3156=1274年，拜占庭帝国对色萨利的约翰发起了进攻，面对庞大的拜占庭军队，约翰·杜卡斯只能选择向外求援。
stage_intro_3157=为了维持帝国对爱琴海的控制权，拜占庭帝国重新组建了海军。但摩里亚和塞特波兹战役的失败让军队遭到了沉重的打击，这也使得拉丁贵族决定进攻德米特里阿斯港口的拜占庭海军。
stage_intro_3158=对安茹西西里王国来说，培拉特是一座极具战略意义的要塞城市。1280年，为了防止敌人能够轻易进入拜占庭帝国的重要地带，拜占庭帝国派出军队对培拉特发起了进攻。
stage_intro_3251=1302年，米海尔九世的军队因畏惧奥斯曼人而宣告解散，这迫使安德洛尼卡二世派遣一支军队渡过博斯普鲁斯海峡，前去支援尼科米底亚正面临的严峻局势。
stage_intro_3252=1321年，年轻的安德洛尼卡三世认为祖父过于老迈，应该由自己来接掌皇帝的宝座，祖孙二人随即展开内战。奥斯曼人决定趁此机会攻占普鲁萨城。
stage_intro_3253=从拉丁帝国手中夺回君士坦丁堡后，拜占庭人集中了太多精力用以恢复对希腊地区的控制，并为此召回了安纳托利亚东部前线的部队，这一举动使得奥斯曼帝国向其发动了新一轮的攻击。
stage_intro_3254=1329年，拜占庭在安纳托利亚的控制区域已经急剧缩水，为了稳定周边区域，安德洛尼卡三世决定派遣军队前往尼科米底亚，但军队在佩莱卡农却遭到了奥斯曼军队的拦截和攻击。
stage_intro_3255=拜占庭的内乱几乎让拜占庭土崩瓦解，约翰六世为了营救自己儿子向奥斯曼帝国求助，而他们将要面对的是塞尔维亚帝国以及保加利亚第二帝国的联军。
stage_intro_3256=1352年，拜占庭再次陷入内战，作为雇佣军的奥斯曼人获得了加里波利附近的要塞控制权。1354年，一场地震彻底改变了加里波利的局面。
stage_intro_3257=奥斯曼帝国在1352年在巴尔干半岛占领了第一个堡垒后开始迅速扩张在欧洲的土地，保加利亚皇帝伊凡亚历山大决定阻击这支军队进攻的步伐。
stage_intro_3258=占领加里波利后，奥斯曼帝国在巴尔干南部的扩张更为迅速。在经过了一系列动荡和修整后，奥斯曼帝国决定向拜占庭帝国的第三大城市阿德里安堡发起进攻。
stage_intro_3351=1337年，法兰西议会决定从英格兰手中收回阿基坦公国，双方的矛盾一触即发。为了夺取英吉利海峡的制海权，爱德华三世亲自率领舰队，向法兰西海军的舰队发动攻击。
stage_intro_3352=在夺取制海权后，爱德华三世带领部队从朴茨茅斯出发，在到达法国北岸后开始进攻。强大的法军已经做好了防守的准备，双方军队即将在克雷西周边遭遇。
stage_intro_3353=克雷西会战的胜利让爱德华三世欣喜不已，英军乘胜追击决定占领加莱，攻下这里就获得了欧洲大陆的桥头堡，但没有想到战事如此艰难。
stage_intro_3354=1346年9月，在英格兰大军围攻加莱之时，腓力六世急请大卫二世出兵进攻英格兰，希望能迫使爱德华三世分兵回救本土。大卫面对着与法国长期的老同盟关系，决定出兵侵略英格兰。
stage_intro_3355=布列塔尼处于非常重要的地理位置，布列塔尼的继承权之战让英法两国都牵扯到了里面，谁都想布列塔尼倾向自己，来获得战场上的优势。
stage_intro_3356=1356年，黑太子爱德华成为了英军的骑兵统帅，带领英军在法国的土地上施行焦土政策，并获得了相当大的成功。约翰二世为了向黑太子报复，决定增加行军速度，以追上英军。
stage_intro_3357=法国国王约翰二世在普瓦捷战役中被俘，之后割让了大片领土给英格兰，而爱德华三世的野心不止于此，他决定发动远征，在兰斯加冕为法国国王！
stage_intro_3358=虽然法国已经满目疮痍，但国不可一日无君，查理王子决定前往兰斯加冕为王，爱德华三世决定切断巴黎至兰斯之间的道路，来阻止这次加冕之礼。
stage_intro_3359=莫龙战役后，布列塔尼继承者之间停战了很久，但双方在英法的支持下蓄力已久，他们都做好了决战的准备。
stage_intro_3360=1369年10月非高级贵族的贝特朗被查理五世任命为新陆军统帅，这个打破惯例的举动让法王获得了回报！随着冬季的到来，英军内部就如何过冬的问题再度产生了争执。法国军队趁此机会，向英军发动了进攻。
stage_intro_3361=1372年，为了回应1368年建立的法兰西-卡斯提利亚同盟，卡斯提利亚国王派遣舰队前往阿基坦协助法军。舰队在拉罗歇尔外海遭遇了正在前往法兰西的英格兰舰队。
stage_intro_3362=晚年的爱德华三世无心战事，黑太子爱德华的去世更让他失去了信心，他的另一个儿子冈特的约翰担任了司令官，在法国进行了多次骑行烧掠，给法国民众带来了极大损失。
stage_intro_3451=查理六世已成疯王，王室之间斗争也愈演愈烈，法国权力归属的不稳定，让年轻的亨利五世获得了机会，1415年他决定沿袭曾祖父进攻的路线征服法国，成为两国国王。
stage_intro_3452=亨利五世在法国的胜利并没有给英国带来多少实际收益，国会给予的支持越来越少，他决定占领鲁昂获得更多法国的领地。
stage_intro_3453=两党的斗争让法国彻底分裂，无畏的约翰被刺杀，让勃艮第公国彻底倒向了英国，《特鲁瓦条约》的签署也让亨利五世成为名义上的法王继承人。而此时查理王储获得了苏格兰的支援，大战在不经意间触发。
stage_intro_3454=博热战役的胜利，让查理王储欣喜，法国贵族们准备乘胜夺回更多失地。而亨利五世此时也计划着新一轮的进攻。
stage_intro_3455=亨利五世和查理六世已经去世2年，查理七世还未加冕，而亨利六世因为年幼，由贝德福德公爵摄政。2年间双方冲突不断，各有胜负，都意图将对方主力一次性消灭。
stage_intro_3456=与英军凌厉攻势形成鲜明对比的是法国政府的迟钝反应，缺乏战斗资金，贵族各自为政，胜利的天平始终没有倾向法国，连续的打击几乎让查理七世绝望。
stage_intro_3457=奥尔良如果被英军攻占，那法国中部最后一道屏障将被打破，这是查理七世的至暗时刻，但上帝给予了这个岌岌可危的国家一束光，一位名叫贞德的少女站了出来。
stage_intro_3458=奥尔良成功解围的消息振奋了整个法国，法军在圣女贞德的激励下厉兵秣马准备清除整个卢瓦尔河谷的所有英军据点。
stage_intro_3459=圣女贞德希望查理七世放弃进攻诺曼底的计划，前往兰斯加冕。从而进一步削弱英军的士气。英军调集了原先援助胡斯战争的精兵前来阻击。
stage_intro_3460=因为支援不足，圣女贞德在贡比涅之战中被俘并在2年后牺牲，这激起了她战友的复仇，就连法国底层民众也参与到这场斗争之中。
stage_intro_3461=1435年，摄政王贝德福德公爵的去世让英国失去了勃艮第公国这个盟友，诺曼底的领地处于混乱状态，查理七世决定乘此机会收复巴黎。
stage_intro_3462=尽管1435-1436年间对法战争中付出了巨大的代价，英国依然不愿意和勃艮第修好，勃艮第公爵决定站到了英国的对立面，攻占加莱。
stage_intro_3463=英国人在法兰西最后的领土只剩下吉耶讷-加斯科涅地区，这块领土已经丢失超过百年。英军决定背水一战，从本土支援了大量兵力前往波尔多。
stage_intro_3551=乌格列沙得到消息，奥斯曼帝国的大部分军队正在离开欧洲，向着安纳托利亚进军，这是清除奥斯曼帝国在巴尔干半岛势力的最佳时机，因此他们发动了一场突然的奇袭。
stage_intro_3552=托皮亚家族的卡洛托皮亚对巴尔沙二世通过联姻扩大版图的做法感到不满，因此邀请奥斯曼帝国对泽塔公国发动了攻击，而穆拉德一世则欣然同意了这一邀请。
stage_intro_3553=穆拉德一世于1387年离开巴尔干，以应对安那托利亚的事务，而巴尔干的附庸势力试图摆脱奥斯曼帝国的统治，并组建联盟以挑战其权威。
stage_intro_3554=穆拉德一世于1388年从安纳托利亚返回，立即对保加利亚发动了一场闪电战。波斯尼亚统治者也立刻向保加利亚发动了援助。
stage_intro_3555=科索沃连接了马其顿和塞尔维亚两片区域，如果奥斯曼人占领这里，将会进一步蚕食塞尔维亚大片领土，而拉扎尔大公组织的联军在科索沃地区与奥斯曼人展开了一场激烈的交锋。
stage_intro_3556=穆拉德一世在意外被刺杀后，他的儿子巴耶济德一世继位，而此时英法百年战争已经进入休战时期，为了挽救濒临灭亡的东罗马，西方的骑士们联合起来发动了十字军东征。
stage_intro_3557=当巴耶塞特一世准备给拜占庭最后一击的时候，来自东方的帖木儿率领十五万大军兵临城下，奥斯曼帝国的生死存亡只在一瞬之间，这让拜占庭得以喘息。
stage_intro_3558=安卡拉战役巴耶塞特一世被俘并抑郁而终，随后奥斯曼帝国内部经历了一场斗争，最终迎来了新的苏丹穆拉德二世，但由于帝国的暂时虚弱，仍然引发了从属国的反叛！
stage_intro_3559=威尼斯人为了获得塞萨洛尼基地区的完全自治权，不惜向奥斯曼帝国宣战，苏丹对此无法容忍，于是派出大军围攻！
stage_intro_3560=教皇尤金四世召集了波兰、匈牙利等多个国家的军队，发动了一场新一轮的十字军东征，而当时已经退位的穆拉德二世不得不重新组织军队，以抗击这一来势汹汹的十字军。
stage_intro_3561=摄政王约翰·匈雅提为战死的国王而复仇准备了4年，1448年，他率领着匈牙利、瓦拉几亚联军，向奥斯曼帝国发动了突袭。
stage_intro_3562=1451年，穆罕默德二世继位，他花费了两年的时间准备，定制了巨炮、火枪；建立了海岸要塞；封锁了海峡，君士坦丁堡这座矗立了千年的城市迎来了最强大的敌人。
stage_intro_3651=在疯病发作一年后，亨利六世恢复了清醒。在王后安茹的玛格丽特的支持下，萨默赛特公爵官复原职，而约克公爵理查则失去护国公之位被迫离开宫廷。1455年，对萨默赛特公爵不满的约克公爵理查联合内维尔家族集结军队向伦敦挺进，意图将萨默赛特公爵一举铲除。
stage_intro_3652=随着第一次圣奥尔本斯战役的落幕，约克公爵扫清了他在宫廷中的大部分对手，重新回到了护国公的位置上。可惜好景不长，1456年初，约克公爵提出为王室收回土地的法案被议会否决，本人也被迫辞去护国主之位。与此同时，王后玛格丽特也在暗中组织力量，试图夺回王室的权力。1459年，双方矛盾激化，约克派的索尔兹伯里伯爵整兵南下，意图与约克公爵会师；玛格丽特当即派兵前往拦截，双方在布洛希思爆发了遭遇战。
stage_intro_3653=约克公爵在与索尔兹伯里伯爵成功会师后并未能够继续向前推进多远，一支打着国王亨利六世旗号的军队挡住了他们，这支军队的数量大约是他们的两到三倍。双方兵力的差距使得约克公爵不得不暂时命令部队后退扎营，并写信给国王表示自己的忠诚。但此前在布洛希思发生的战斗使他已经失去了国王的信任，一场大战在所难免。
stage_intro_3654=拉德福德桥战役的失利使约克家族在宫廷中的地位一落千丈，兰开斯特家族的势力逐步扩大并获得了部分原约克家族的领地。虽然名义上萨默赛特公爵获得了原属于造王者沃里克的加莱作为领地，但加莱当地拒绝接受萨默赛特公爵的统治。1460年1月，沃里克先发制人偷袭了驻扎于桑威治，正准备进攻加莱地区的兰开斯特军队，并一路向西攻入伦敦。兰开斯特家族的军队在得知此消息后，迅速在北安普顿建立了防御阵地以阻挡来势汹汹的约克家族军队。
stage_intro_3655=北安普顿战役之后，约克公爵理查通过了一项法案。该法案内容为“当国王去世时，理查及其子嗣可以继承王位”，这意味着他离权力的顶峰只差一步。但在这一步之前还有最后一个障碍：原王后玛格丽特号召兰开斯特家族的盟友向赫尔河畔金斯顿集结，试图南下进军伦敦。约克公爵理查在收到消息后迅速组建一支部队北上迎击。由于出兵仓促，这支部队不仅人数少于对手，补给也十分匮乏。约克公爵理查在第一次交手时便落入了下风，不得不退守桑德尔城堡等待支援。
stage_intro_3656=约克公爵理查在韦克菲尔德平原战败后被杀，他的儿子爱德华四世继承了他的爵位。尽管爱德华四世此时只有18岁，但是他却展现出了超出年龄的领导与指挥能力。在约克公爵理查败亡仅仅一个月后，爱德华四世便率领军队在莫蒂默十字与兰开斯特家族的军队发生了激战。
stage_intro_3657=莫蒂默十字战役结束后，趁着爱德华四世在赫里福德重整部队的当口，玛格丽特王后的盟友们迅速指挥部队由北向南进攻。仅仅半个月的时间，这支数万人的大军便已逼近伦敦，造王者沃里克率兵前往迎战。巧合的是，与六年前约克家族和兰开斯特家族的第一次兵戎相见一样，这场大战的发生地也是这个名为圣奥尔本斯的小镇，不过这次对阵的结局，却与六年前完全不同。
stage_intro_3658=尽管玛格丽特的军队在圣奥尔本斯取得了胜利，但是由于军队在战后的一系列暴行，伦敦的市民们拒绝迎接他们进城，无奈的玛格丽特只能退回北方。此后不久，在伦敦深得民心的爱德华四世被推举为国王，原国王亨利六世则被废黜。得知消息的玛格丽特召集了英格兰北部地区几乎所有反对约克家族的势力，试图将爱德华四世彻底消灭，一场英国本土最为残酷的战役即将打响。
stage_intro_3659=陶顿战役中，爱德华四世击败了大多数反对他的兰开斯特派。在接下来的数年中，爱德华四世通过多种手段试图和以前的敌人化敌为友，其中包括他曾经的死敌，第三代萨默赛特公爵亨利·博福特。1463年底，萨默赛特公爵秘密与被废黜的亨利六世见面，不久便再次掀起反叛。愤怒的爱德华四世命令约翰·内维尔前往平叛，这一次，他要将萨默赛特公爵彻底消灭。
stage_intro_3660=在赫奇利沼泽战败的萨默赛特公爵撤退到了赫克瑟姆沿岸。他将军队分成了三处，试图修筑工事来将追兵挡在赫克瑟姆以南。但是约翰·内维尔的追击速度非常快，他并不打算给萨默赛特公爵喘息的机会。
stage_intro_3751=1469年，一位名叫“里兹代尔的罗宾”的人在英格兰北部多次掀起叛乱，此前与爱德华四世积怨已久的造王者沃里克也趁势反叛，并在埃奇科特袭击了前来平叛的军队。
stage_intro_3752=1470年，沃里克试图再次煽动叛乱，爱德华四世先发制人，在霍恩菲尔德击溃了叛军，由于很多叛军在逃散时脱去了带标志的衣服，因此也被称为“丢衣战役”。
stage_intro_3753=在丢衣战役过后，造王者沃里克逃亡海外并与安茹的玛格丽特结盟，以此换取兰开斯特家族的支持。1471年4月，在一个浓雾弥漫的清晨，爱德华四世和造王者沃里克这对曾经的战友走向了他们最后的战场。
stage_intro_3754=在巴内特战役发生的同时，安茹的玛格丽特率领兰开斯特家族的海外力量登陆了英格兰岛，并开始向伦敦进军。爱德华四世在巴内特战役结束后得知了这个消息，尽管军队已十分疲惫，但他依然率军和玛格丽特展开了决战。
stage_intro_3755=1483年4月，爱德华四世因病去世，他的弟弟理查被任命为护国公。6月，爱德华五世失踪，理查加冕为王，史称“理查三世”。爱德华四世的旧盟友认为这是篡权，他们转而支持亨利·都铎登上王位。不久之后，英格兰国内再次爆发了叛乱。
stage_intro_3756=1483年圣诞节，兰开斯特家族的亨利·都铎迎娶了约克家族伊丽莎白·伍德维尔的女儿，两大家族联合成为了都铎家族，只为了对付一个共同的敌人——理查三世。1485年8月22日，亨利·都铎和理查三世在博斯沃思平原展开了决战。

