stage_name_30216=遗憾和屈辱

stage_intro_30101=铁臂威廉去世后，德罗戈成为了阿普利亚公爵。坦克雷德和第二个妻子所生的儿子罗伯特来到了意大利。德罗戈并不喜欢这个弟弟，他将罗伯特派遣到卡拉布里亚，这个贫瘠的地方不欢迎诺曼人，罗伯特凭借狡猾伎俩压榨着百姓们，这里人都称他为“吉斯卡尔”，即“狡猾者”。
stage_intro_30102=伦巴第人逐渐开始厌恶诺曼人的贪婪，暴乱四起。东罗马人乘机派出了间谍和刺客。1051年德罗戈遇袭身亡，整个阿普利亚陷入混乱。与诺曼人有仇的罗马教皇利奥九世立刻联络了东罗马皇帝、神圣罗马皇帝以及当地贵族形成了反诺曼联盟。汉弗莱不得不紧急召集了罗伯特。
stage_intro_30103=东西教廷走向了分裂，诺曼人的危机旋即消失。现在唯一的威胁反倒变成了手足之间的对立。汉弗莱在饱受疟疾和精神衰竭的折磨后，决定和罗伯特和解，确认了罗伯特的继承权。罗伯特带着他最年幼的弟弟罗杰开始了对卡拉布里亚的征服。
stage_intro_30104=罗伯特和罗杰在卡拉布里亚征战了5年，这5年的战争使他们都成为了成熟的领袖。
stage_intro_30105=改革派教皇与神圣罗马帝国皇帝和贵族们不和，为了确保自己在教廷的地位，教皇冒险承认诺曼人在意大利的地位并确保他们成为盟友。 1059 年 8 月 23 日的《梅尔菲条约》中，教皇尼古拉斯二世任命吉斯卡尔为阿普利亚、卡拉布里亚和西西里岛的公爵。
stage_intro_30106=自从铁臂威廉的离开后，西西里岛重新成为撒拉逊人的地盘，1060年，兄弟俩越过海峡登陆西西里，开始了新的征服之路。
stage_intro_30107=随着胜利越来越多，兄弟俩为了战利品和指挥权而反目，两个人做了一个尴尬的决定-共同统治，之后罗伯特就很少待在西西里岛，他的目标开始转向东方，他决心夺取东罗马在意大利半岛最后的地盘。
stage_intro_30108=巴里沦陷后，罗伯特愈发贪婪，向伦巴第公国发动了进攻。阿马尔菲、萨勒诺和那不勒斯相继被吉斯卡尔攻击。
stage_intro_30109=65岁的罗伯特丝毫没有倦意，他热爱战场热爱权力，他开始觊觎东罗马帝国的土地，甚至穿上仿制的罗马皇帝皇袍。塞尔柱东突厥进犯东罗马，罗马皇帝米海尔七世为了寻求盟友同意和罗伯特联姻，迎娶了罗伯特的女儿海伦娜，只可惜还未抵达君士坦丁堡，皇帝就被他的将军推翻了。
stage_intro_30110=公元1081年春，虽然新的皇帝阿莱克修斯答应了罗伯特的所有请求，但他又怎么可能错过发动战争的借口，率领着早就准备好的150艘战船和2万名士兵进军君士坦丁堡。
stage_intro_30111=当罗伯特的儿子博希蒙德在东罗马高歌猛进之时，阿莱克修斯给了德皇亨利送去了一封信和几袋黄金，让他进军防卫薄弱的罗马。亨利四世和教皇的矛盾由来已久，又岂会错过如此良机，教皇大惊失色向罗伯特呼救。
stage_intro_30112=罗伯特在平息了意大利叛乱后，终于将所有精力转向东边。70岁高龄的吉斯卡尔招募了一支大军准备完成他罗马皇帝的夙愿。但在登陆凯法利尼亚岛时，染上了瘟疫，并在1年后去世。他的墓碑上刻着：“这里安息着吉斯卡尔，这个世界的恐慌……”

stage_intro_30201=吉斯卡尔拥有两段婚姻，并育有十多个孩子，而最有能力的儿子却是一个私生子。他继承了维京先祖的金发和高大的身材，和他父亲一样鲁莽、勇敢且活力十足。
stage_intro_30202=博希蒙德成年之后就在父亲吉斯卡尔的麾下战斗，在西西里岛积累了很多战斗经验，但直到父亲开始进攻东罗马，他才真正展现出自己真正的实力。1081年罗伯特吉斯卡尔带领着150艘战船和2万名士兵前往君士坦丁堡，然而因为被教皇伏击，诺曼人损失了大部分主力战船。
stage_intro_30203=博希蒙德开始夺取东罗马在马其顿和色萨利地区的堡垒，但他被困在了拉里萨，因为东罗马人的坚守以及威尼斯人的捣乱让他的后勤补给一直无法顺畅。
stage_intro_30204=1084年博希蒙德再次陪同父亲前往东罗马，虽然击败了威尼斯舰队并占领了科孚岛，但一场瘟疫袭击了诺曼人，吉斯卡尔和博希蒙德同时身患重病，不得不再次中断征服东罗马的计划。
stage_intro_30205=罗伯特吉斯卡尔于1085年去世，同父异母的弟弟罗杰博尔萨在其母以及叔父西西里的罗杰的帮助下剥夺了博希蒙德的继承权。争夺继承权和土地的内战在意大利持续了10年。
stage_intro_30206=1096年乌尔班二世发动了十字军东征，招募十字军去收复圣地，博希蒙德决定不再理会继承权，通过他的号召力，迅速获得了一支强大的十字军。
stage_intro_30207=昔日的对手阿莱克修斯用最盛大的典礼迎接了博希蒙德，但要求博希蒙德对他宣誓效忠，且承诺归还诺曼人占领的帝国领土。博希蒙德思考后答应，但他要求皇帝册封他为：“东方统帅”，以便他可以获得整个十字军的领导权，但被狡猾的皇帝托词婉拒。
stage_intro_30208=博希蒙德带领着他的侄子坦克雷德横渡博斯普鲁斯海峡进军尼西亚，图卢兹的雷蒙德四世紧随其后，作为十字军的第一场战斗，谁都想一战成名而成为真正的领袖。
stage_intro_30209=十字军队伍中只有法兰克人雷蒙德四世能与博希蒙德一较高下，他们分兵两路，都想着能在对手之前获得更多战果。
stage_intro_30210=前往耶路撒冷的道路上，安条克城的占领成为了十字军覆灭与否的关键，如果在卡布卡大军压境之前占领下安条克那么十字军还有机会能在城内防守，否则只能在城外直面塞尔柱人的数万大军，而此时的十字军已经如同强弩之末。
stage_intro_30211=安条克被十字军攻陷后，博希蒙德和雷蒙德达成协议，博希蒙德获得安条克的所有权，但承认雷蒙德为十字军的最高统帅。博希蒙德获得了他梦寐以求的领土和名誉，成为了一位名副其实的亲王，但也因此得罪了罗马皇帝阿莱克修斯。
stage_intro_30212=1100年夏，博希蒙德留下侄子坦克雷德驻守安条克，自己带领着300名将士前往幼发拉底河扩展土地。
stage_intro_30213=博希蒙德被囚禁了3年，这3年间他的侄子坦克雷德为他扩展了公国的版图，刚刚获释的博希蒙德为了名誉挥兵南下。
stage_intro_30214=安条克公国位于东罗马帝国和塞尔柱之间，军队和金钱的损耗让博希蒙德难以自持，更不用说扩张。博希蒙德不得不前往欧洲募集资金和佣兵。让他意外的是无论他在意大利还是法国，都被视为十字军东征的英雄，法王腓力将他召为女婿，人气之高，甚至让英王亨利阻止他前往英国。
stage_intro_30215=在巨大名望的加持下，博希蒙德再一次回想起父亲的夙愿，他募集了35000精兵良将决定再次进攻东罗马。
stage_intro_30216=在瘟疫和围攻之下，博希蒙德屈辱地签下了停战协议，尽管他还拥有安条克公国，但他似乎无法原谅自己的失败，乘船前往西西里岛，三年后他在绝望潦倒中去世，并被安葬在卡诺萨迪普利亚。安条克公国在坦克雷德的摄政下得以延续。

stage_group_name_30002=博希蒙德的日记
stage_group_name_30003=博希蒙德的日记

family_letter_desc_201=我父亲靠放火和救火获得了财富，这也让他获得了那个外号。但他也经常捐钱给教会，所以他在教会的人脉和名声一直很好。---博希蒙德一世
family_letter_desc_202=父亲年轻的时候被叔叔排挤了多年，所以他对罗杰也是一样，但这并不是最好的办法。
family_letter_desc_203=我的父亲终于获得了家族中最高地位-公爵，这是家族最荣耀的一天，也是他在教会经营多年的结果。
family_letter_desc_204=西西里岛一直是我们家族的信念，那个富饶而美丽的岛屿，让威廉叔叔之后的每一个人都会为这座岛去战斗。
family_letter_desc_205=或许我父亲并不想和罗杰叔叔在西西里岛的领导权上做纠缠，他的梦想更为遥远。
family_letter_desc_206=父亲一直不服气于征服者威廉，他说都没有战胜过希腊人怎么能够称自己是征服者？
family_letter_desc_207=有一天我们家族只要有任何一个人坐上君士坦丁堡的皇座那就真的无愧于“最高领袖”这个称谓，名誉胜过生命，生命不息战斗不止！
family_letter_desc_208=父亲回到了意大利，但愿他能迅速平定事端后再回来。狡猾多端的阿莱克修斯并不是那么好对付。

family_letter_desc_301=我还记得那一天10月18日，父亲在攻城，阿莱克修斯突然出现在附近，如果让他突进到城市下，那么我们必将战败，我冲了出去。
family_letter_desc_302=不是希腊人击败了我们，是瘟疫，是诅咒，或许是神站在了希腊人那一边，从那一年起父亲一病不起。
family_letter_desc_303=是谁陪伴在父亲的左右，是谁打下如此多疆域，而他却因为仅仅是拥有一个好母亲和叔父就偷走了我的一切。这不公平！
family_letter_desc_304=既然这里没有容身之所，那就让我走向东方！
family_letter_desc_305=虚伪的罗马皇帝根本不想给我任何承诺，安娜公主虽然年纪很小待我却很真诚。所谓的十字军东征也不过是为了罗马皇帝收复失地，看来希腊人越来越虚弱了。
family_letter_desc_306=我们没有猜错，阿莱克修斯根本没有想过给予我们任何的帮助以及赏赐，这就怪不得我们不仁不义了，战斗获取的就是我们的。
family_letter_desc_307=7个月了，我们的补给已经枯竭，只能相信奇迹了。愿上帝保佑我们。
family_letter_desc_308=上帝保佑，父亲，我终于成功了。安条克，这里将是我们家族新的开始。
family_letter_desc_309=3年了，我已经都快忘记黄沙扑面的感觉，安条克还是犹如孤岛一般，被多面夹击，我需要扩张领土。
family_letter_desc_310=是的，没有我的坚持，撒拉逊人、塞尔柱人早就占领了君士坦丁堡，一切荣誉都是我应得的！
family_letter_desc_311=仇恨我从未忘记，父亲，我必将用希腊皇帝的头颅来祭奠你。战斗吧！名誉胜过生命！

