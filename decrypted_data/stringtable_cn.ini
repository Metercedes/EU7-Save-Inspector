conquest_faction_desc_603=自兰开斯特公爵亨利谋取英格兰王位并重新开启与法兰西王国的战争后，这场战争已经持续了近10年，两国百姓早已苦不堪言。面对国内不断爆发的农民起义，英格兰王国急需一个妥善解决与法兰西王国争端的方法。
conquest_faction_desc_602=英格兰王国入侵爱尔兰岛后建立的附庸政权，每任爱尔兰领地的总督需要由英格兰国王册封。时至今日，英格兰王国政权不稳，爱尔兰领地因而获得了较大的自治权，领地的领主们越来越不愿服从英格兰王国的统治。
conquest_faction_desc_601=由不愿被英格兰王国统治的盖尔人建立的王国。作为爱尔兰岛上硕果仅存的盖尔人势力，埃尓尤克王国绝不会屈服于英格兰王国，将英格兰人驱逐出爱尔兰，收复爱尔兰全境是每位埃尓尤克国王的心愿。
conquest_faction_desc_604=苏格兰王国自建立起，便与他的南方邻居-英格兰王国争斗不休，双方都渴望征服对方进而统一整个大不列颠。如今英格兰王国在对法兰西王国的战争中取得了巨大的优势，苏格兰王国必须投入更多的力量来牵制英格兰王国。
conquest_faction_desc_605=卡佩王朝解体后，英格兰国王爱德华三世图谋法兰西王位而开启了英法间近百年的战争。如今在英军的攻势下，法兰西王国接连丢城失地，甚至连首都巴黎也已沦陷，瓦卢瓦王朝的统治似乎正不可避免地走向灭亡，除非发生奇迹。
conquest_faction_desc_606=布列塔尼公国地处法兰西王国和英格兰王国之间，往往因公爵爵位继承问题而成为这两个大国的角力场，从而使公国内部动荡不安。如今英法战争再起，布列塔尼公国需要更加小心以避免陷入大国争端的泥潭。
conquest_faction_desc_607=勃艮第公国是法兰西王国的附庸公国政权，最早可以追溯至蛮族大迁徙时勃艮第人建立的勃艮第王国。当英法两国因法兰西王位而陷入战争的泥淖时，勃艮第公国趁机扩张领土，逐步成为欧洲大陆上一支强大的势力。
conquest_faction_desc_608=由斯堪的纳维亚的丹麦王国、挪威王国和瑞典王国组成的共主邦联，这三个王国共同拥戴一个君主。卡尔马联盟的建立使得斯堪的纳维亚的维京后裔们能够团结一致，对抗他们南方的强大邻居-神圣罗马帝国。
conquest_faction_desc_609=由东法兰克王国国王奥托一世在罗马加冕为罗马人的皇帝后建立的帝国。虽然神圣罗马帝国建立之初强盛无比，但经历大空位时期的混乱后，帝国中央权力下降，帝国也逐渐演变为数百个诸侯国组成的松散联盟。
conquest_faction_desc_610=神圣罗马帝国的诸侯国之一，由曾今捷克人建立的波西米亚公国升格而来。由于神圣罗马帝国支持天主教会而残酷镇压支持或同情胡斯党人的波西米亚民众，波西米亚人民不得不起兵反抗神圣罗马帝国的暴政。
conquest_faction_desc_611=神圣罗马帝国的诸侯国之一，由巴伐利亚公国的藩属国升格而成独立的公国。奥地利公爵阿尔布雷希特二世作为神圣罗马帝国皇帝西吉斯蒙德的女婿而被他指定为继承人，这也许是哈布斯堡家族染指帝国皇位的绝佳机遇。
conquest_faction_desc_612=神圣罗马帝国的诸侯国之一，起源于东法兰克王国建立的自治公国。统治巴伐利亚公国的维特尔斯巴赫家族曾多次获得神圣罗马帝国的皇位，如今帝国内部动荡不安，巴伐利亚公国正摩拳擦掌，试图重新掌控帝国大权。
conquest_faction_desc_613=条顿骑士团征服普鲁士地区后建立的基督教国家。条顿骑士团曾是受到波兰王国的邀请才进入普鲁士地区，但在条顿骑士团国建立后，双方迅速反目成仇，如今更是兵戎相见，视彼此为心腹大患。
conquest_faction_desc_614=或称波兰王国王冠领地，指波兰人掌控政权并实际控制的地区。自从条顿骑士团征服普鲁士地区后，这群贪得无厌的豺狼便开始入侵波兰王国，如果不能将这群日耳曼人赶出普鲁士，波兰王国将永无宁日。
conquest_faction_desc_615=阿尔勒王国崩溃后，萨伏依家族在意大利西北部和法国的东南部地区建立的独立公国。萨伏依公国地处东、西法兰克王国之间，需要谨慎的与这两个大国相处。
conquest_faction_desc_616=米兰公国位于意大利伦巴底地区，虽然名义上隶属神圣罗马帝国，但公国具有极高的独立自主性。阿尔卑斯山脉为米兰公国提供了天然北部屏障，公国可以积极向南方发展，优先统一意大利北部地区。
conquest_faction_desc_617=原是位于意大利西北海岸利古里亚地区的商业城邦，藉由十字军东征而繁荣，并逐渐发展成西地中海最强盛的海洋共和国。后在与威尼斯共和国争夺利润高昂的香料贸易时，热那亚没能击败威尼斯共和国，如今只能选择暂时蛰伏。
conquest_faction_desc_618=当西罗马帝国遭蛮族入侵而灭亡后，意大利北部沿海地区的居民纷纷逃往泻湖并在此建立了定居点，威尼斯共和国便由此发展起来。经过多次威尼斯-热那亚战争，威尼斯人彻底击败热那亚共和国，宣示了自己海上霸主的地位。
conquest_faction_desc_619=西西里晚祷战争后，阿拉贡联合王国将西西里岛从原西西里王国分离，而原王国意大利部分的领土则被称作那不勒斯王国。那不勒斯王国绝不承认西西里岛的分裂，并矢志收复失地。
conquest_faction_desc_620=由原隶属于卡斯蒂利亚王国的葡萄牙伯国独立后建立的王国。葡萄牙王国位于欧洲大陆的最西端，虽然地处偏僻，但若葡萄牙王国选择积极进取的扩张政策，独特的地理位置也会使王国免于多面受敌的窘境。
conquest_faction_desc_621=卡斯蒂利亚王国吞并莱昂王国而建立的复合君主国，卡斯蒂利亚联合王国是伊比利亚半岛收复失地运动的主要推手。如今伊比利亚半岛所剩的伊斯兰势力羸弱不堪，卡斯蒂利亚联合王国或可尝试统一整个伊比利亚半岛。
conquest_faction_desc_622=由阿拉贡王国及巴塞罗那伯国合并而成的复合君主国，阿拉贡联合王国牢牢控制着西地中海海域主要的岛屿，有着极强的制海权，这些广泛分布的岛屿是王国介入欧洲大陆事务极佳的跳板。
conquest_faction_desc_623=后倭马亚王朝解体后的伊比利亚半岛现存的最后一个伊斯兰王国，面对重新占据伊比利亚绝大部分领土的基督教势力，格拉纳达酋长国的处境显得岌岌可危，所幸这些基督教国家并不是团结一致，王国仍有一线生机。

