general_desc_WuTianXinXuan=日本战国时期的杰出武将，被誉为战国时代最具军事才华的统帅之一。所举“风林火山”军旗，虽然出自《孙子兵法》，但也成为了武田军的一种象征。
general_desc_WuTianXinXuan1=原名武田晴信，拥有“战国第一名将”、“战国第一兵法家”的美称，且因任甲斐守，被称为“甲斐之虎”。他的军团也因源自《孙子兵法》的“风林火山”而无往不利、名声大噪。
general_desc_ShangShanQianXin=日本战国时代大名，后世誉为越后之龙、战国军神。频频与武田信玄、北条氏康、织田信长等人作战，后应足利将军家邀请而上洛，但最终壮志未酬而去世。
general_desc_ShangShanQianXin1=越后国长尾为景的幼子，成年后称长尾景虎。由于继承了关东管领“上杉”姓氏，并先后得到关东管领上杉宪政和将军足利义辉的赐名，故又称上杉政虎、上杉辉虎。是与武田信玄以“龙虎”并称的战国英豪。
general_desc_Scanderbeg=阿尔巴尼亚民族英雄，为了保障阿尔巴尼亚的独立，以游击战的形式与强大的奥斯曼帝国对抗，多次击退奥斯曼帝国的进攻。
general_desc_Matthias Corvinus=匈雅提·亚诺什之子，15岁正式登基成为匈牙利国王，在位期间平定了贵族的叛乱，组建匈牙利黑军，多次打败奥斯曼帝国，使匈牙利走向鼎盛。
general_desc_Ivan the Terrible=莫斯科大公，俄罗斯第一任沙皇。在任期间进行了多项改革，极大的发展了俄国的军事力量。晚年误杀了自己的儿子，最终导致留里克王朝走向没落。
general_desc_Gonzalo de Cordoba=西班牙帝国名将，西班牙大方阵的创建者。1503年在切里尼奥拉战役中以劣势兵力击败法军，经此一役，西班牙陆军成为了欧洲大陆的最强陆军。
general_desc_Stefan Dusan=塞尔维亚国王，在位期间利用拜占庭内讧，征服了阿尔巴尼亚和马其顿大部分地区，编制了《杜尚法典》
general_desc_Bertrand du Guesclin=法国民族英雄，被称为“布列塔尼之鹰”，其貌不扬。在百年战争初期作战英勇，很快得到赏识和重用，为法王效力终生。
general_desc_Clovis I=法兰克王国奠基人，上任之后成功统一了法兰克各部落，征服了高卢地区，使法兰克人进入了君主制时代。
general_desc_Casimir III the Great=波兰国王，力图以外交手段而非战争来达成目标，大大增强了波兰的民族团结，使波兰成为了14世纪中欧地区的强国。
general_desc_Vytautas=立陶宛大公，龙骑士团成员，在任期间不断扩张，最终获得了立陶宛国王的头衔，但因王冠波兰人阻截而未能完成加冕。
general_desc_Afonso Henriques=葡萄牙独立后的第一任国王，1139年使葡萄牙成为了独立王国，此后他一直与摩尔人进行斗争，以此扩张葡萄牙王国的领土。
general_desc_John II of Byzantium=全名约翰二世·科穆宁，拜占庭科穆宁王朝的第二位皇帝，被称为“好人约翰”，在位时以虔诚与和善而闻名。
general_desc_Barbarossa Hayreddin=15世纪土耳其海盗，在奥斯曼苏丹的支持下整合了地中海的海盗，对地中海沿岸的城市不断进行袭扰，在海上终其一生都未尝一败。
general_desc_YueFei=抗金名将，一生致力于光复故土，多次率领部队以少胜多。其所率”岳家军“以军纪闻名，号称”冻死不拆屋，饿死不掳掠“。
general_desc_JinWuZhu=金朝名将，本名完颜宗弼，金太祖完颜阿骨打的第四子。先后击败辽国和宋国军队，一路南下所向披靡，直至遇到宿命中的对手岳飞…

