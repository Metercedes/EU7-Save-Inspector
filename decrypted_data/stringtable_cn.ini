item_desc_9201=腓特烈二世视这件护手如珍宝，甚至胜过他的王冠和权杖。这副护手被他用来训练猎鹰，坚韧的皮革上留存着无数次猎鹰振翅起飞的痕迹。每只猎鹰都曾在它的护佑下学会忠诚与锐利，而它也成为腓特烈智慧与掌控力的象征。
