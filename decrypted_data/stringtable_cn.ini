stage_name_1705=白金汉的叛乱
stage_name_1706=博斯沃斯平原战役

stage_intro_1701=1469年，一位名叫“里兹代尔的罗宾”的人在英格兰北部多次掀起叛乱，此前与爱德华四世积怨已久的造王者沃里克也趁势反叛，并在埃奇科特袭击了前来平叛的军队。
stage_intro_1702=1470年，沃里克试图再次煽动叛乱，爱德华四世先发制人，在霍恩菲尔德击溃了叛军，由于很多叛军在逃散时脱去了带标志的衣服，因此也被称为“丢衣战役”。
stage_intro_1703=在丢衣战役过后，造王者沃里克逃亡海外并与安茹的玛格丽特结盟，以此换取兰开斯特家族的支持。1471年4月，在一个浓雾弥漫的清晨，爱德华四世和造王者沃里克这对曾经的战友走向了他们最后的战场。
stage_intro_1704=在巴内特战役发生的同时，安茹的玛格丽特率领兰开斯特家族的海外力量登陆了英格兰岛，并开始向伦敦进军。爱德华四世在巴内特战役结束后得知了这个消息，尽管军队已十分疲惫，但他依然率军和玛格丽特展开了决战。
stage_intro_1705=1483年4月，爱德华四世因病去世，他的弟弟理查被任命为护国公。6月，爱德华五世失踪，理查加冕为王，史称“理查三世”。爱德华四世的旧盟友认为这是篡权，他们转而支持亨利·都铎登上王位。不久之后，英格兰国内再次爆发了叛乱。
stage_intro_1706=1483年圣诞节，兰开斯特家族的亨利·都铎迎娶了约克家族伊丽莎白·伍德维尔的女儿，两大家族联合成为了都铎家族，只为了对付一个共同的敌人——理查三世。1485年8月22日，亨利·都铎和理查三世在博斯沃思平原展开了决战。

