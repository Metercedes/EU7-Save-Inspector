;defeated_event_desc
battle_talk_thankgift0=放下礼物，你可以走了！
battle_talk_thankgift1=礼物我收下了，愿两国保持和平！
battle_talk_thankgift2=感谢贵国的礼物，愿两国保持良好的关系！
battle_talk_thankgift3=十分感谢贵国的礼物，不论贵国有何请求，我们一定鼎力相助！
battle_talk_acceptagreement1=为了两国的百姓，我同意休战！
battle_talk_acceptagreement2=我同意签署通行协议，与贵国互通有无！
battle_talk_acceptagreement3=从今天开始，我们就是盟友啦！
battle_talk_refuseagreement1=打不过想求饶，门都没有！
battle_talk_refuseagreement2=对不起，我们的关系还没到签署通行协议的程度！
battle_talk_refuseagreement3=我国也希望与贵国结盟，可现在不是最好的时机！
battle_talk_tearagreement2=通行协议到此为止，请贵国军队尽快离开我国领土！
battle_talk_tearagreement3=从今往后，我们不再是盟友！
battle_talk_declarewar=以后相见就是敌人了，准备接受正义的制裁吧！
battle_talk_acceptexhort=真不甘心，但事到如今也只能投降了！
battle_talk_refuseexhort=我们宁可玉石俱焚，也决不投降！
battle_talk_warninvade=领土主权不容侵犯，请贵国军队立刻离开！
battle_talk_1=部落的勇士们，富饶的高卢应该由我们匈人拥有！骑上你们的战马，跟着我向高卢进军，摧毁一切胆敢阻拦我们的敌人。
battle_talk_2=英格兰人残忍地杀害了我们的父亲，我们拉格纳之子要团结起来，让英格兰人血债血偿。
battle_talk_3=我们终于建立了自己的王国！相信过不了多久，整个北海都将被强盛的丹麦王国征服！
battle_talk_4=汪达尔王国和拜占庭帝国正在交战，这是我们将汪达尔人和罗马人赶出北非的机会，这里本就是我们毛里人的领土。
battle_talk_5=真是一片富饶的土地，草原的勇士们，我们面前有着数不清的财富，就等着我们用战马和弓箭去获取！
battle_talk_6=贝利撒留灭亡汪达尔王国之后，又在意大利连败东哥特王国的军队，甚至收复了拉文纳城。如今他在军中的威望如日中天，需要小心提防。
tutorial_talk_101=欢迎来到中世纪，在这里，我将为你展示一些征服模式的系统和玩法。现在，请选择你所需要扮演的势力。
battle_talk_8=点击左上角的政策图标，可以打开政策界面。
battle_talk_9=征服模式中，你需要花费资源研究政策，对应的政策才能生效。
battle_talk_10=你也可以在政策界面中更换执政官，执政官的内政技能会为你所在的势力提供多种多样的加成。
battle_talk_11=执政官的内政能力也能减少研究政策所需的资源。
battle_talk_12=请注意，每回合只能更换一次执政官。
battle_talk_13=每个势力开局时都有自己的任务链，完成当前任务就会获得对应的奖励。
battle_talk_14=征服模式下，每个势力都有各自的胜利条件，完成所有胜利条件即可获胜，并得到对应的奖励。
battle_talk_15=当达成既定条件后，你可以在胜利结算界面中，选择退出征服，或者继续征战。
battle_talk_16=你目前还有一个胜利条件未达成，请尝试占领撒克逊人的首都：温彻斯特。
battle_talk_17=你可以通过城堡的酒馆招募自己在指挥部中预先配置好的部队。
battle_talk_18=请注意，只有第一次招募是免费的。
battle_talk_19=征服模式下，你可以与其他势力进行外交互动。
battle_talk_20=你现在可以查看与其他势力间的外交关系、外交值以及外交值变化趋势。
battle_talk_21=你目前正与撒克逊人、盎格鲁人交战，与朱特人保持和平。
battle_talk_22=你与撒克逊人的外交值呈现下降趋势，与盎格鲁人的呈现上升趋势，与朱特人的则保持不变。
battle_talk_23=两面作战不是明智之举，以你当前与盎格鲁人的外交值，可以尝试与其停战。
battle_talk_24=在该外交界面中，你可以查看双方当前的执政官，各自所剩的资源，以及与其他势力的外交关系。
battle_talk_25=同样也能看到双方的外交关系、外交值以及外交值变化趋势。
battle_talk_26=当代表当前外交值的游标处于“战争”和“停战”之间时，双方就可以签订停战协议。
battle_talk_27=外交值游标越靠近“停战”，成功签订停战协议的概率就越高。
battle_talk_28=在与对方谈判时，可以通过赠送礼物来提高双方的外交值。
battle_talk_29=赠送礼物花费的资源越多，增加的外交值就越高。
battle_talk_30=你与盎格鲁人的外交值已满足签订停战协议的需要，请与盎格鲁人签订停战协议。
battle_talk_31=签订通行协议、同盟协议的步骤与签订停战协议类似。
battle_talk_32=需要注意的是，签订了停战协议后才能签订通行协议，签订通行协议后才能签订同盟协议。
battle_talk_33=当占领交战方的首都时，可以要求对方投降。
battle_talk_34=你现在占领了温彻斯特，可以尝试劝降撒克逊人。
battle_talk_35=劝降成功概率受到你当前实力和对方剩余实力的影响。
battle_talk_36=在征服模式中，时代会限制招募部队的品阶。
battle_talk_37=当条件满足时，下一回合便会自动进行时代升级。
battle_talk_38=根据条件所示，不列颠人到达黑暗时代需要2个二级城市。
battle_talk_39=征服模式的教程已全部结束。
battle_talk_40=东方的十字军诸国发来了求援信，他们正在敌人袭击中苦不堪言。神圣罗马帝国的战士们，跟着我向东方进军，去支援我们的十字军兄弟。
battle_talk_41=法兰西王国的战士们，我决意响应教廷组建军队支援十字军诸国的号召，带领你们前往东方支援耶路撒冷，去获取无上的荣耀！
battle_talk_42=伊斯兰世界正遭受欧洲十字军的侵略，塞尔柱帝国应该担负起领导西亚人民反击并驱逐十字军的重任，让世人再次见识到塞尔柱帝国的强大。
battle_talk_43=战乱是野心家的天堂，中东的这些国家和势力打的不可开交之际，正是我们库曼-钦察人南下的时机。
battle_talk_44=耶路撒冷已被我军收复，荣耀属于我们！
battle_talk_45=王朝的战士们，如今阿拔斯王朝费拉不堪，是时候让所有阿拉伯人认识到，只有我们法蒂玛王朝才能重建阿拉伯帝国的辉煌！
battle_talk_46=拜占庭帝国邀请我们一同进攻保加利亚帝国，这群自作聪明的希腊人想把我们当刀用呢。哈哈，岂不知我们正缺借口进入富饶的巴尔干地区。
battle_talk_47=阿拔斯王朝的时代已经成为过去，接下来将由我们白益王朝来领导伊斯兰世界。
battle_talk_48=这是对上帝的亵渎和背叛！我以教宗的名义呼吁，所有信仰基督的人都应该拿起武器，讨伐这个大逆不道的叛贼。
battle_talk_49=将士们，教宗刚刚加冕我为“神圣罗马帝国的皇帝”，西罗马帝国的法统将由我们继承，从今日起，我们便是新的罗马帝国！
battle_talk_50=区区日耳曼蛮夷也敢妄称罗马人的皇帝？这是对拜占庭帝国的羞辱，若不出兵讨伐这个僭越者，我们有何脸面称自己为罗马人？
battle_talk_51=将士们，西吉斯蒙德当了神圣罗马帝国皇帝后就弃我们匈牙利不顾，甚至出卖王国来维持他那一盘散沙的帝国，他已不配担任匈牙利国王。
battle_talk_52=神对英格兰人是爱是恶，本人一概不知。本人仅知除了死者外，所有英格兰人将会被赶出法兰西。
battle_talk_53=法兰西的将士们，跟着我向兰斯进军，王太子将会在兰斯加冕为法兰西国王，神与我们同在。
battle_talk_54=除叛国之外,我无所畏惧。为了法兰西，我视死如归！
battle_talk_55=匈牙利的战士们，如今神圣罗马帝国境内叛乱不断，我们需要帮助帝国尽快稳定局势，如此才能在帝国的支援下抵御住来自东方的侵略。
battle_talk_101=欢迎来到中世纪，在这里，我会教导你一些基础的作战知识
battle_talk_102=选择箭头指示的部队，选择目标区域，可以进行移动
battle_talk_103=你也可以连续选择多个区域进行多次连续移动，但总的行径路程是固定的
battle_talk_104=当你发现该区域不是你想到达的目标地点时，可以选择撤回，来重新选择想到抵达的区域
battle_talk_105=当部队到达目标区域并耗尽所有行动力时，部队将无法再进行攻击。
battle_talk_106=选择你的部队，到达目标单位附近后若还有剩余行动力，即可发动攻击
battle_talk_107=若行动力剩余较多，则可以发动多次攻击
battle_talk_108=你可以为你所需要的部队部署将领，部署后能大大提高部队的战斗力
battle_talk_109=将领拥有一个主动技能，不同将领的主动技能效果不尽相同
battle_talk_110=这是一个关键目标区域，占领这里，符合胜利条件后，即可获得胜利
battle_talk_111=现在你已经了解了基础的战斗知识，战争也即将到来
battle_talk_112=一般情况下，每次攻击会消耗6点行动力，若剩余行动力大于0，则可连续攻击，直至行动力为0。
battle_talk_201=你可以在城市中招募一些部队来为你作战
battle_talk_202=即使是不同种类的部队，也能整合成一个小队
battle_talk_203=点击右下角的按钮，进入下一回合
battle_talk_204=当场地中还有未行动完成的部队时，你会收到提示
battle_talk_205=你有一支部队遭受了攻击，我们可遣散其中兵力较少的一队
battle_talk_206=一支部队的队伍数量不足三队时，我们可以为其进行补充
battle_talk_207=补充的部队同样不限制部队种类
battle_talk_208=现在，你只需要在规定的回合内取胜即可
battle_talk_209=当你补充部队时，可以查看该支部队在军团中的位置，以及混合后军团的士气、行动力和特性
battle_talk_301=下面我们来进行一些建设相关的操作
battle_talk_302=点击城市按钮，可以对城市内的一些设施进行升级
battle_talk_303=不同的设施拥有不同的效果
battle_talk_304=这里是一个村庄，村庄可以升级为城堡
battle_talk_305=城堡可以招募一些城市中招募不到的部队
battle_talk_306=城堡的等级可以进行提升，升级城堡可以让你招募到更高等级的部队
battle_talk_307=这支部队的士气在被攻击后降低了，补充部队可以回复一定量的士气
battle_talk_308=现在，我们需要防守关键区域。当然，你也可以选择消灭所有敌人
battle_talk_401=地图上散落着一些建筑
battle_talk_402=银矿可以带来银币的收入
battle_talk_403=铁矿厂可以带来铁矿的收入
battle_talk_404=奇观可以为你所在的势力带来一些特殊效果，不同国家的奇观效果不同
battle_talk_405=部队需要装配船只才能进入河流或者海洋
battle_talk_406=运输船和骑兵在水面作战时的战斗力会大打折扣
battle_talk_407=因此请尽量避免用骑兵作为装备船只的载体
battle_talk_408=基础教程已教学完毕
battle_talk_501=不同的地形会有不同的行动力消耗，复合地形会有更高的行动力消耗
battle_talk_502=这里可以查看你所在势力的政策
battle_talk_503=但只有在征服模式下，才可以自行对政策进行研究
battle_talk_504=这里可以查看你的人口、野心和经济情况
battle_talk_505=注意，过高的人口负担会增大你的野心，并对经济造成影响
battle_talk_506=每回合开始时，都会默认获得一点科技点数，科技点数可以用来装配器械
battle_talk_507=请合理分配现有的科技点数
battle_talk_10101=哥特人终于露出贪婪的嘴脸，妄图侵占我们富饶的土地，将士们，把野蛮人从我们的领土上赶出去！
battle_talk_10102=罗马人伪善至极，他们想要奴役驱使我们，让我们去对付匈人，却不愿意多给一点食物。哥特的勇士们，拿起武器反抗吧！
battle_talk_10201=刚刚前线的塞巴斯蒂安纳斯将军传回捷报，哥特人的先锋部队已经被击退，是时候一鼓作气消灭这些作乱的蛮族了！
battle_talk_10202=稳住！罗马人的进攻软弱无力，只要坚持到阿拉西斯率领骑兵返回，就是我们反击的时刻。
battle_talk_10203=很好，罗马士兵已经筋疲力尽，我们从背后冲击他们军阵的左翼，给罗马人最后一击，活捉罗马皇帝！
battle_talk_10301=皇帝陛下正被西哥特人围困，全军加速前进，支援米兰守军。
battle_talk_10302=阿拉里克的主力部队就在前方，将西哥特人彻底歼灭在那！
battle_talk_10303=身为罗马帝国的皇帝，不应该置身这么危险的地方。
battle_talk_10304=战士们，罗马人的皇帝就在米兰。只要攻破米兰，俘虏罗马皇帝，那么整个富裕的意大利就是我们的囊中之物。
battle_talk_10401=罗马城坚持不了多久，不能让罗马城被攻破，非洲行省的援军就快到了。
battle_talk_10402=阿拉里克洗劫了罗马城，一定阻止他向拉文纳发动攻击。
battle_talk_10403=阿拉里克，这次我一定会击败你，让世人知道谁才应该是西哥特的王！
battle_talk_10404=卑鄙的罗马人偷袭了我们，看来谈判只是他们拖延时间的借口，霍诺留不愿意支付赎金来换取罗马城的和平。既然如此，那么我们就自己去取！
battle_talk_10405=萨鲁斯，你背叛了自己的族人。
battle_talk_10406=不好，罗马人的援军到了。
battle_talk_10501=赫默里克，这里地形复杂，需要探明敌军部署后再进军。
battle_talk_10502=懦弱的汪达尔人不配拥有伊比利亚富饶的土地，他们的领地该归我们苏维汇王国所有！冲啊，苏维汇的勇士们。
battle_talk_10503=不要与苏维汇人正面作战，他们不熟悉这里的地形，把他们诱进我们的伏击圈中。
battle_talk_10601=我们不该相信汪达尔人会遵守条约，战士们，帝国的援军正在赶来的路上。
battle_talk_10602=勇士们，只要攻下迦太基城，不光能获得巨量的财富，整个北非最富裕的土地都将是我们的！
battle_talk_10603=罗马人的援军到了，阻止他们登陆！
battle_talk_10701=各位国王、首领，匈人的残暴各位有目共睹。我们必须同心协力，将敌人彻底击败。
battle_talk_10702=从匈人出现的那刻起，我们就被不断地攻击，从多瑙河被驱赶到莱茵河。阿兰的勇士们，我们已无路可退，只有击败匈人。
battle_talk_10703=罗马人联合了西哥特人、法兰克人和阿兰人，以为这样就能和我的军队对抗？真是不自量力。
battle_talk_10704=不要慌乱，所有人向我集结，重新组建防线。
battle_talk_10705=狼不在乎有多少只羊。
battle_talk_10801=汪达尔人长期觊觎着罗马的财富，盖萨里克此次出兵的目的绝不像他说的那样冠冕堂皇。
battle_talk_10802=马克西穆斯是个篡位的小人，他不配作为罗马帝国的皇帝。
battle_talk_10803=作为瓦伦提尼安三世的盟友，我们应该帮助皇后把马克西穆斯这个篡位者从罗马城赶出去。
battle_talk_10804=大名鼎鼎的“永恒之城”就在眼前，只要攻下罗马城，城内的宝藏任由英勇的汪达尔战士获取。
battle_talk_20101=我们西方的邻居拥有着无尽的财富，但很快那这些财富就将是我们的了！
battle_talk_20102=进攻！那些罗马贵族只会用钱财来购买自己的人身安全。
battle_talk_20103=我们的骑兵远不是那些波斯人的对手，但不会惧怕它们。
battle_talk_20201=皇帝不能容忍非洲正在发生的叛乱，大量涌入的难民让君士坦丁堡的秩序发生了混乱。
battle_talk_20202=士兵们，消灭那些叛军，他们的首领是我们的主要目标，尽量避免不必要的战斗！
battle_talk_20203=汪达尔王国必须彻底摆脱罗马帝国的统治。
battle_talk_20204=消灭那些海上来的敌人。
battle_talk_20301=守住阵线，不要被骑兵的冲锋吓倒。
battle_talk_20302=为我的撤退争取时间，只要我及时撤退，敌人的目的就无法达成！
battle_talk_20304=我已经到达了最近的沿海城市，入海之后，敌人就再也追不上我了。
battle_talk_20303=进攻，敌人正在节节败退，没有什么能阻挡帝国前进的脚步！
battle_talk_20401=意大利地区必须重新回归帝国的统治，将入侵者全部赶出去。
battle_talk_20402=敌人直接从海上发起进攻，对我们来说不是一个好消息。
battle_talk_20403=借助城防器械坚守城池，他们的进攻坚持不了多久。
battle_talk_20501=敌人集结了大量的部队向拉文纳发起了进攻，他们的后方必然十分空虚。
battle_talk_20502=罗马既然已经被占领，就不会有丢失的可能！
battle_talk_20601=我们的粮食短缺，已经无法继续坚守罗马，撤退或许是更好的选择。
battle_talk_20602=敌人源源不断地出现，我只能尽量减缓他们追击的步伐。
battle_talk_20603=把敌人赶出意大利，这片土地现在属于我们。
battle_talk_20701=罗马帝国在意大利的势力并未被我们彻底清除，他们依旧可以通过海洋调动军队。
battle_talk_20702=英多尔夫，率领你集结的舰队向安科纳前进，占领那里，这是罗马人在意大利最重要的基地！
battle_talk_20801=我们的目标只有罗马，不能被路遇的敌人拖慢了前进的脚步。
battle_talk_20802=尽快消灭敌人，帝国的疆域将再次覆盖意大利！
battle_talk_20803=全军出击，消灭看到的所有敌人！
battle_talk_20901=哥特人得到了来自法兰克的援军，虽然他们大多是乌合之众，但是依然有法兰克精锐在部队之中。
battle_talk_20902=不用在意那些野蛮人，集中对抗法兰克步兵！
battle_talk_21001=罗马人的主力一直在意大利作战，本土一定战斗力薄弱。
battle_talk_21002=兄弟们，随我向君士坦丁堡进军。
battle_talk_21003=这群贪得无厌的野蛮人，居然再次踏上了这片土地。
battle_talk_21004=贝利撒留，带领部队消灭他们！
battle_talk_30101=罗马人可以轻易放弃如此富饶的不列颠岛，但我们可不能错过这次机会。
battle_talk_30102=不列颠岛这么大，容得下我们盎格鲁-撒克逊人。
battle_talk_30103=早说过盎格鲁-撒克逊人不可信，不列颠的勇士们，把敌人从我们的家乡赶出去！
battle_talk_30201=不列颠人本土作战，人多势众，仅凭我们目前的兵力是很难攻下敌人所有城镇的。
battle_talk_30202=我已联系到一支在附近海域的友军部队，先控制沿海城市，引导友军登陆，然后再集中兵力向内陆进军。
battle_talk_30203=必须在敌人增援赶到之前，将这支盎格鲁-撒克逊人的军队彻底歼灭。
battle_talk_30301=这次要彻底征服懦弱不堪的不列颠人，把他们的土地纳入我们诺森布里亚王国。
battle_talk_30302=我会让你为这次背叛付出代价。
battle_talk_30303=诺森布里亚的军队虽然来势汹汹，但只要我们不列颠人团结一致就能打败这些入侵者。
battle_talk_30304=盎格鲁-撒克逊人并非团结一致，麦西亚王国也忌惮诺森布里亚王国的扩张，他们会寻找机会给埃塞尔弗里斯狠狠一击。
battle_talk_30305=不能继续坐视诺森布里亚王国的壮大，他们的野心永无止境。
battle_talk_30401=格温内斯的战士们，这次和麦西亚王国结盟是我们反抗诺森布里亚王国最后的机会，一定要全力以赴。
battle_talk_30402=不要惊慌，一群手下败将的反扑而已，只要抵抗住这次进攻，诺森布里亚王国的崛起将无人可挡！
battle_talk_30403=此战我们和格温内斯王国都已倾尽全力，若还无法击败埃德温，诺森布里亚王国必将称霸不列颠。
battle_talk_30404=连番的胜利已经让埃德温变得自大起来，诺森布里亚的防线到处都是漏洞！
battle_talk_30501=诸位，我是先王埃塞尔弗里斯之子奥斯瓦尔德。国家已经到了生死存亡的时候，我选择此时回来，就是要带领大家战胜入侵者，复兴诺森布里亚王国。
battle_talk_30502=奥斯威，刚刚圣人托梦于我，说此战我军必胜！
battle_talk_30503=战士们，卡德瓦龙已经被我击败，一鼓作气，收复剩下的领土。
battle_talk_30504=士兵们需要一位国王来率领，大家都支持你加冕为诺森布里亚的国王。
battle_talk_30505=没想到诺森布里亚王室还有着这样一位人物，但是他的事业必将在此结束！
battle_talk_30601=麦西亚王国屡次联合格温内斯王国、波伊斯王国侵犯我国，他们是诺森布里亚王国发展的阻碍，必须将他们彻底清除。
battle_talk_30602=彭达果然来救波伊斯了，按照我和埃奥瓦的约定，一旦彭达率军离开麦西亚，他就起兵争夺麦西亚的王位。
battle_talk_30603=我军侧翼出现大量来自格温内斯王国的军队，我们时刻有被包围的危险。
battle_talk_30604=诺森布里亚刚安稳发展几年，奥斯瓦尔德就迫不及待地发起战争。埃奥瓦，你负责守卫后方，我率军去支援波伊斯王国。
battle_talk_30605=埃奥瓦，你的背叛并没有让我感到意外，我正可以趁此机会除掉所有隐患。
battle_talk_30606=彭达，我不会再受你任意摆布了，我才应该是麦西亚的国王。
battle_talk_30701=战士们，敌军虽然人多势众，但补给困难。我们只要依靠城市防守，敌军必然会撤退。
battle_talk_30702=只要击败奥斯威，诺森布里亚王国就没有可以反抗我们的军队了，到时整个王国的财富都将由我们支配！
battle_talk_30801=卢达卡，威塞克斯王国一直不服从我们麦西亚王国的统治，这次出兵就是要彻底征服威塞克斯，也以此来震慑其它王国。
battle_talk_30802=我会让敌人明白得罪麦西亚王国会有什么样的下场。
battle_talk_30803=战士们，只要我们能挫败麦西亚王国的进攻，其他对麦西亚不满的王国一定会援助我们，威塞克斯并不是孤立无援。
battle_talk_30804=反击的时刻到了，麦西亚王国的霸权将在此被终结。
battle_talk_40101=徒有其表的罗马人不堪一击！让我们为使者报仇！
battle_talk_40102=可笑！冒犯者必须付出代价，让他们知道罗马的强大。
battle_talk_40103=死伤太严重了，撤退！我们必将重新回到这里，但目前还不是时候。
battle_talk_40201=敌人的数量不到我们十分之一，我要让他们有来无回！
battle_talk_40202=这些乌合之众也就够让我练个兵，在踏入罗马人领地前还无人可以阻挡我。
battle_talk_40203=撤往后方，哈立德的军队确实勇猛。
battle_talk_40301=罗马人已经在这里盘踞了太长时间了，现在是时候让我们的马匹和骆驼走到更远的地方了。
battle_talk_40302=大马士革是一座坚城，但要看守城的人有多大决心。
battle_talk_40303=对方人数确实很多，但是他们也只能速战速决，只要我们坚守他们就必然会退兵。
battle_talk_40304=我们需要求援。
battle_talk_40401=这是我们最后的阵地，愿坚固的城池能带给我胜利的希望。
battle_talk_40402=这是我们将势力向外扩张的最好机会，战士们，英勇战斗吧。
battle_talk_40403=现在的罗马人，最擅长的是撤退和投降！
battle_talk_40501=夺回耶路撒冷，这座城市已经沦陷太久了！
battle_talk_40502=我们被彻底包围了，这种情况下我们根本支撑不了多久。
battle_talk_40503=为了人民我愿意献出这座城市，我不希望出现更多的死亡。
battle_talk_40504=耶路撒冷已经回归，现在是时候向北夺取更多的城市了！
battle_talk_40601=是时候将罗马人彻底赶出整个叙利亚地区了，虚弱的罗马人已经无力回天。
battle_talk_40602=我们已经组织了一支实力空前强大的部队前来支援，时间才是我们最大的敌人！
battle_talk_40603=我们的援军到了，很庆幸我们及时赶到了战场！
battle_talk_40701=罗马人应该猜不到我们会穿越如此大片沙漠奔袭而来！
battle_talk_40702=阿拉伯人攻占了叙利亚，现在还想染指非洲区，不能让他们轻易得逞。
battle_talk_40801=扬帆，全速前进！在敌人组织起反击部队之前打垮他们。
battle_talk_40802=敌人来的太过突然，我们的战船没有足够的船员，我会尽力拖延时间。
battle_talk_40803=敌人的反抗异常激烈，后援部队必须加入战斗了。
battle_talk_40804=支援舰队到了，夺回属于我们的海洋。
battle_talk_50101=迅速登陆！这里沿岸的城市拥有大量的财富，这正是我们需要的。
battle_talk_50102=夺走一切能看到的东西！
battle_talk_50103=这些强盗又来袭击我们的城市，我们根本不是他们的对手。
battle_talk_50201=他们的防御不堪一击，占领这里，把这些城市变成我们的新家。
battle_talk_50202=我们无法正面击败他们，保存有生力量等待反击的时机才是我们现在最需要做的。
battle_talk_50301=部队分散开来，各自寻找敌人，乘胜追击！
battle_talk_50302=斥候传来消息，敌人分散了兵力，这是一个可以将敌人逐个击破的好机会。
battle_talk_50303=我的部队遭到了敌人的围困，如果救援无法及时赶来，局势将对我们十分不利。
battle_talk_50401=维京人对守城十分在行，这让我们在攻城战中几乎无法战胜他们。
battle_talk_50402=将敌人引诱到旷野上，失去了城墙的保护，敌人不堪一击。
battle_talk_50501=我们已经围困了敌人相当长一段时间，他们撤退只是时间问题。
battle_talk_50502=当心敌人的反扑，全力作战，在敌人完成撤退前消灭他们。
battle_talk_50601=我们得到了来自都柏林的帮助，他们将会与我们一同作战。
battle_talk_50602=今天的战斗将决定我们以及这个国家的命运，士兵们，拿起武器，和我一同作战！
battle_talk_50603=我们的友军正在遭到攻击，上前援助他们。
battle_talk_50701=敌人的数量远低于我们，这是消灭他们的大好机会。
battle_talk_50702=士兵们，冲锋，消灭所有人！
battle_talk_50703=后续部队还未到达，想尽办法抵挡敌人的攻击。
battle_talk_50704=我们需要一个反攻的契机。
battle_talk_50801=入侵者，你们的长久以来的入侵行动将在今天被终结。
battle_talk_50802=虽然敌人经过上一次战役已经大伤元气，但是依然保留着很高的战斗力。
battle_talk_50803=消灭他们，我就可以成为这片土地的国王！
battle_talk_60101=这座城市的防御不堪一击，进攻，城市里的财富都将是我们的战利品。
battle_talk_60102=攻破城市后我们应及时撤退，现在撤退路线上已经出现了零星的敌人。
