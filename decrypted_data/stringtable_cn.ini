stage_intro_30301=如果没有美丽的朱迪思出现，24岁的罗杰·博索或许会永远留守在诺曼底那座空荡的家中。他们一见钟情，然而身份地位悬殊。朱迪思是征服者威廉的堂姐，而罗杰则一无所有，既无土地也无财产。为了追求爱情，罗杰决定前往意大利，投奔他的哥哥罗伯特·吉斯卡尔。
stage_intro_30302=罗伯特·吉斯卡尔继承了已故兄弟汉弗莱在意大利的土地和头衔，他的做法与哥哥类似，但不同的是，他并不打算分给年幼16岁的弟弟任何土地。然而，罗伯特需要这个弟弟的帮助征服更多土地。在接下来的5年里，罗杰协助哥哥征服了整个卡拉布里亚地区。
stage_intro_30303=西西里岛自9世纪起一直处于撒拉逊人的统治下，但他们并非铁板一块。伊本·提姆纳杀死了前任长官并霸占了遗孀。遗孀的哥哥——墨西拿的埃米尔下令通缉伊本·提姆纳。为了逃避追捕，伊本·提姆纳逃往意大利，最终寻求罗杰的帮助，这为罗杰进军西西里提供了契机。
stage_intro_30304=罗杰决定比哥哥罗伯特先一步登陆西西里岛，因为他对财富和土地的渴望远超一切。
stage_intro_30305=在西西里岛站稳脚跟后，罗杰的目标是攻占恩纳要塞，以给埃米尔致命一击。然而，他们兵临城下时才发现要塞防御异常坚固。更糟糕的是，埃米尔召集了所有部队准备反击，意图将孤立无援的诺曼人一网打尽。
stage_intro_30306=在大获成功后，罗伯特与罗杰之间的关系日渐紧张。占领特罗伊纳后，顾全大局的罗杰撤回意大利，见到了他魂牵梦萦的朱迪思。原来，朱迪思的父亲与诺曼底的威廉公爵发生了矛盾，举家迁至意大利。罗杰向朱迪思求婚并获得了她父亲的同意，但吉斯卡尔依然拒绝为弟弟分封土地。
stage_intro_30307=罗杰已不再是那个稚嫩的少年，他与哥哥在卡拉布里亚展开决战。尽管狡猾的罗伯特最终被弟弟击败，罗杰仍与哥哥和解，随后一同前往西西里岛。
stage_intro_30308=罗杰与朱迪思夫人回到了西西里岛，保护遭受撒拉逊人威胁的特罗伊纳居民。然而，1062年底，当罗杰前往占领尼科西亚时，伊本·哈瓦斯发动突袭，试图抓住留守在特罗伊纳的朱迪思夫人。罗杰心急如焚，立即回头营救妻子。
stage_intro_30309=罗杰开始努力迎合当地人，不再区分信仰和种族。然而，北非的撒拉逊人重申了自己对西西里岛的统治权，并命令其子阿尤布王子率领3.5万大军进攻西西里岛。在塞拉米，罗杰带领仅有130名骑士和300名步兵的部队与庞大的敌军正面交锋。
stage_intro_30310=罗杰在1064年尝试占领巴勒莫时失败，此时阿尤布王子再次集结军队挑战诺曼人。在行军过程中，罗杰与阿尤布王子再次相遇，双方兵力差距依旧悬殊。
stage_intro_30311=当罗伯特·吉斯卡尔占领巴里后，他将精力转向西西里岛。1071年，罗杰被授予西西里伯爵头衔，罗伯特自己则保留了墨西拿和瓦尔德蒙。1072年，罗杰与哥哥联合进攻巴勒莫。
stage_intro_30312=1077年，罗杰围攻特拉帕尼，这是西西里岛西部仅存的两个撒拉逊据点之一。1079年，陶尔米纳被围困，1081年，罗杰征服了卡塔尼亚。唯一的遗憾是，他心爱的人朱迪思在1080年去世。
stage_intro_30313=吉斯卡尔去世时，诺曼人征服西西里岛的事业尚未完成。他的儿子们为争夺继承权发动内战，导致西西里的征服重任最终落到了罗杰的肩上。
stage_intro_30314=1091年，为了躲避北非撒拉逊人的袭击，罗杰率领舰队征服了马耳他岛。
stage_intro_30315=罗杰在西西里岛的统治极为成功。他宣称保持中立、精简政府，推行宽松的宗教政策，成为当时唯一一个未参与十字军东征的欧洲领主。在他的治理下，西西里岛前所未有地稳定与繁荣，西西里人民亲切地称他为“伟大的伯爵”。

stage_intro_30401=老罗杰去世后，西西里岛的政局十分稳定。大儿子西蒙年仅8岁，由母亲阿德莱德摄政。然而，4年后12岁的西蒙意外去世，继承权转交给年仅10岁的罗杰二世。16岁时，阿德莱德正式让位，自己则嫁给了耶路撒冷国王鲍德温一世。
stage_intro_30402=罗杰二世继承了父亲带来的繁荣，野心勃勃，开始打造一支强大的海军用于防卫和扩张。他只等一个借口。马赫迪耶的埃米尔攻击了尼科泰拉并摧毁了这座城市，罗杰二世找到了侵略的理由。
stage_intro_30403=在权力斗争中，耶路撒冷的牧首宣布罗杰母亲阿德莱德与鲍德温一世的婚姻无效，阿德莱德被迫回到西西里。这让罗杰二世深感羞辱。
stage_intro_30404=罗杰二世的父亲曾入侵马耳他，但未完全占领该岛。罗杰二世不能容忍西西里附近还有撒拉逊人的势力，因此在1127年决定消除这一威胁。
stage_intro_30405=在意大利阿普利亚，威廉二世突然去世，按继承权，罗杰二世继承了卡拉布里亚。然而，教皇并不希望一个诺曼人完全统治西西里和意大利西部。1127年底，教皇发动了一场针对罗杰二世的十字军东征。德伦戈特家族的拉努夫二世趁机反叛。
stage_intro_30406=罗杰二世并非嗜杀之人，更像东罗马皇帝一样倾向于通过外交手段取胜。罗杰的部队纪律严明、行动迅速，敌军则松散且同盟脆弱。1128年，在罗杰二世军队的震慑下，联军撤退，教皇被迫在贝内文托城外封他为阿普利亚、卡拉布里亚、西西里公爵。
stage_intro_30407=教皇去世后，罗马出现了两大对立阵营。为了获得政治支持，改革者阿那克莱图斯决定为罗杰二世加冕为王。1130年圣诞节那天，巴勒莫的市民第一次见到了这位新王。
stage_intro_30408=1132年7月24日，诺曼人的贪婪导致拉努夫与卡普阿的罗伯特二世以及那不勒斯的塞尔吉乌斯七世结盟，共同对抗罗杰二世。
stage_intro_30409=不论罗杰二世登上王位的手段如何华丽，他支持伪教皇的行为得罪了支持另一个教皇英诺森的基督徒，导致更多势力加入英诺森的阵营。1133年，神圣罗马帝国皇帝洛泰尔终于抵达意大利。
stage_intro_30410=洛泰尔加冕后，神圣罗马帝国的内政局势大为改善。他用一年的时间召集军队，再次越过阿尔卑斯山，进军北意大利，当地几乎没有反抗。英诺森教皇率领教廷加入了洛泰尔的阵营，联合拜占庭皇帝约翰二世以及威尼斯王国进攻西西里。
stage_intro_30411=1137年10月30日，新任命的普利亚公爵拉努夫率领一支从洛泰尔皇帝处借来的德国特遣队对罗杰二世发起攻击。罗杰的敌人不仅是拉努夫，还有他昔日的盟友塞尔吉乌斯。
stage_intro_30412=几个月后，罗杰二世支持的教皇阿那克莱图斯二世也去世。英诺森顺理成章地成为合法教皇。罗杰二世试图与新教皇媾和，然而英诺森教皇亲自集结军队发起进攻。
stage_intro_30413=罗杰二世经过10年奋斗，战胜了两个皇帝和一个教皇，最终没有再遭遇严重的阻力。他开始统一律法，构建了一个强大的中央集权国家。
stage_intro_30414=神圣罗马帝国和东罗马帝国并未忘记曾经的耻辱，多次联合出征西西里。然而，似乎神明并未偏袒他们，西西里岛在罗杰二世的统治下愈加繁荣。1154年，罗杰二世在巴勒莫安详去世，剑身上刻着：“阿普利亚、卡拉布里亚、西西里和非洲都唯我是从。”

stage_intro_30501=西西里岛的女王康斯坦斯与神圣罗马帝国的皇帝亨利六世结婚九年后才怀孕。1194年，亨利六世前往西西里岛进行加冕典礼时，腓特烈二世就在圣诞节第二天的旅程中诞生。这个在帐幔下出生的婴儿，注定要改变欧洲的历史。
stage_intro_30502=腓特烈二世直到两岁才接受洗礼，这一幕成为他与父亲亨利六世唯一的亲密接触。亨利六世在腓特烈出生后不久突然去世，腓特烈成为了唯一的继承人。然而，父亲的死引发了权力斗争，除了腓特烈之外，还有两个竞争者：父亲的兄弟菲利普和教皇支持的萨克森公爵奥拓布伦瑞克。腓特烈的母亲康斯坦斯选择将儿子带离德意志，暂时掌控西西里王国。1198年，康斯坦斯也去世，腓特烈的命运变得更加扑朔迷离。
stage_intro_30503=孤独的少年腓特烈并未在一个安宁的环境中成长。西西里王国被各方势力所控制，他只是政治棋盘上的一个棋子。14岁时，腓特烈被教皇安排了一场婚姻，这个年长他十岁的妻子带来了500名骑士，成为他走向权力巅峰的关键。
stage_intro_30504=在腓特烈16岁时，德意志的叔父菲利普被刺杀，教皇英诺森三世决定支持腓特烈成为德意志国王。腓特烈的王位之路并不平坦，奥拓试图在意大利北部阻止他的加冕，然而腓特烈成功逃脱敌人的追击，最终在美因茨大教堂接受加冕，成为神圣罗马帝国的合法继承人。
stage_intro_30505=教皇英诺森三世在腓特烈二世宣布不接管西西里王国后终于松了一口气，不久便去世。教皇去世后的几个月，腓特烈二世迅速将自己的妻子和儿子接到身边，加强了自己在德国的统治地位。
stage_intro_30506=英国的狮心王理查战死后，法兰西国王腓力二世趁机扫除英国势力，邀请腓特烈二世参与解决香槟王位继承战争。腓特烈二世欣然接受，为战斗的胜利奠定了基础。
stage_intro_30507=1220年11月20日，腓特烈二世在罗马举行盛大的加冕典礼，成为神圣罗马帝国的皇帝。他举起皇冠，右手持剑，左手执笏，庄严宣誓要成为基督教会的守护者，进行十字军东征，并消灭异端。康斯坦斯作为皇后在丈夫身后跪下，接受了加冕。
stage_intro_30508=腓特烈二世致力于改革与建设，巡视意大利南部和西西里岛。他颁布了《卡普亚宪章》，建设了福贾的皇宫，并复兴了西西里海军。腓特烈二世还创办了欧洲第一个国立大学——那不勒斯大学，推动了文化与学术的复兴。
stage_intro_30509=尽管腓特烈二世忙于巩固自己的王权，教皇依旧责难他未参与第五次十字军东征的战斗。腓特烈与伊斯兰世界的统治者保持联系，最终与埃及苏丹达成和谈，成功收复耶路撒冷。腓特烈二世在1229年加冕为耶路撒冷国王，这一壮举令教皇极为不满。
stage_intro_30510=教皇格列高利九世因腓特烈二世与“无信仰之徒”达成和约而愤怒异常。教皇授意前耶路撒冷王入侵西西里，腓特烈二世不得不回国保卫家园。
stage_intro_30511=腓特烈二世在1231年颁布了《梅尔菲宪章》，这部中世纪的宪章标志着神圣罗马帝国向君主制体制的转变。教皇对此强烈反对，认为腓特烈的举措是对教皇权威的挑战。此举也为腓特烈与教会之间的长期冲突埋下了伏笔。
stage_intro_30512=意大利北部的伦巴第同盟一直未能完全纳入神圣罗马帝国的统治，这一地区的自治城邦由米兰领导，是西西里王国与德意志王国之间的障碍。教皇的支持使得伦巴第同盟再度与腓特烈二世对立。
stage_intro_30513=通过前一年的胜利，腓特烈二世成功使意大利北部的东部地区归顺于他。腓特烈的下一个目标是占领曼托瓦，这一胜利将确保与德意志的联系，并为进攻意大利西北部的同盟根据地铺平道路。
stage_intro_30514=布雷西亚地处从维罗纳到贝加莫大道的交通要道，腓特烈二世将其作为切断伦巴第同盟补给线的关键目标。虽然攻城力量强大，但守军的顽强抵抗和出乎意料的战术让腓特烈二世吃到了苦头。
stage_intro_30515=1239年，腓特烈三度被开除教籍，而教皇格列高利九世联合热那亚和威尼斯从海上进攻西西里王国，腓特烈不得不面对这场与教皇的战争。最终腓特烈的军队赢得了胜利，并开始向罗马进军。
stage_intro_30516=1243年，新教皇英诺森四世上任，但他与腓特烈二世的矛盾并未缓解。英诺森四世不仅剥夺了腓特烈的帝位和西西里王位，还试图扩展教会对德意志和伦巴第地区的控制。1246年，教皇甚至策划了刺杀腓特烈及其儿子的阴谋。
stage_intro_30517=随着腓特烈二世的新体制逐渐稳固，他决定再次出手，打压意大利北部的伦巴第同盟。然而，腓特烈已年过五十，时间成为了他最大的敌人。1247年夏，教皇支持的帕尔马政变爆发，腓特烈迅速行动，为了围困帕尔马，他在周边地区建立了维多利亚基地，准备进行长期的军事斗争。
stage_intro_30518=仅仅三个月后，腓特烈与其儿子恩佐重新控制了帕尔马附近的地区。1248年夏，腓特烈决定采取行动，巩固领土并掠夺俘虏。此时，皇帝军在兰齐亚指挥下与教皇军发生了决定性的冲突。两军的命运将在这场战斗中决定。
stage_intro_30519=在1249年的福萨尔塔战役中，腓特烈二世的儿子恩佐被博洛尼亚军俘虏，北方战线失去了其重要的指挥官。随着关键战役的接连失败，布雷西亚陷落，帕维亚投降，皮亚琴察也向敌人打开了城门，腓特烈面临着前所未有的困境。1250年11月，腓特烈在一次鹰猎后身体突然病倒。经过一段时间的沉默，他于同年12月13日去世，标志着他那传奇的一生画上了句号。

stage_group_name_30004=罗杰博索的日记
stage_group_name_30005=穆罕默德·伊德里西的日记
stage_group_name_30006=巴勒莫大主教贝拉尔德的日记

family_letter_desc_401=……朱迪思，我会回来的，我很快就会迎娶你，一切都会好起来的。……
family_letter_desc_402=……亲爱的朱迪思，你还好吗？我已经为哥哥征服了大片土地，尽管不知何时能回去，但上帝保佑你和我。……
family_letter_desc_403=朱迪思，我即将踏上西西里岛的征途，这是我获得封地的最佳时机。愿一切顺利。……
family_letter_desc_404=好运似乎不再眷顾我。若非你的信，我恐怕早已支撑不下去。我不知道是否还能再见到你，朱迪思。
family_letter_desc_405=仿佛一场梦，没想到竟然能够见到你——我日日思念的爱人。上帝真是安排了这一切。
family_letter_desc_406=家族的分裂让我们更显脆弱，但西西里才是我的归宿，是我与爱人共度一生的家园。
family_letter_desc_407=朱迪思，如果你有任何不测，我将失去活下去的勇气。
family_letter_desc_408=撒拉逊人以为人数多就能战胜我？他们简直小觑了诺曼人！我们可不是泥土捏成的。
family_letter_desc_409=终于，我得到了封地。除了哥哥的认可，这也实现了我对朱迪思的承诺。
family_letter_desc_410=朱迪思，我的爱人，是你成就了今天的我。我祈求你继续在天堂保佑我和我的领土。
family_letter_desc_411=哥哥未能实现他成为罗马皇帝的梦想，而我，只想脚踏实地，守护自己的王国。
family_letter_desc_412=愿西西里的希腊人、撒拉逊人、诺曼人在此能和平共处，希望战争永远不会靠近我的子嗣。

family_letter_desc_501=少年时期，我四处漂泊，曾在西班牙、葡萄牙、法国南部等地游历。每到一地，常遭受歧视与仇视，但我也目睹了百姓们在贫苦中艰难求生。
family_letter_desc_502=那时的种族仇恨弥漫四方。16岁的我已经学会了如何躲避法兰克铁骑的追击。那一年，我回到了安达卢斯。
family_letter_desc_503=我听说在地中海上有一个神奇的国度，那里没有战争，希腊人、阿拉伯人、法兰克人和其他各族群都能和睦共处。我决定亲自去看看。
family_letter_desc_504=最终，我抵达了西西里岛，找到了这片理想中的土地。遇见了我的导师阿布·萨尔特，在他身边我学习了药理学、几何学与天文学。
family_letter_desc_505=30岁那年，我见证了一个如梦似幻的日子。漫天玫瑰花瓣飘落，罗杰二世戴着高贵的王冠，披着华丽的披风，微笑着向我们挥手。
family_letter_desc_506=西西里岛比我经历过的任何地方都自由。这里有来自世界各地的物品，阿拉伯香料、法兰克羊毛，甚至有来自中国的丝绸。
family_letter_desc_507=西西里岛的信息流通异常便利。我们能够搜集世界各地的学术著作——阿拉伯的医典、东罗马的数学、埃及的神话。我将这些翻译成拉丁文和阿拉伯文。
family_letter_desc_508=我经常为罗杰二世的王子们讲课。他们是名副其实的西西里人，始终对撒拉逊学者表现出尊敬与礼貌。
family_letter_desc_509=那一年是我最荣耀的一年。罗杰国王请我为他编写一本书，绘制出我们所知的所有国度与土地，我们称之为《罗杰之书》。
family_letter_desc_510=罗杰二世安葬在切法卢大教堂，这座教堂融合了东罗马、穆斯林和诺曼风格。而国王的画像，身着拜占庭皇帝礼服与阿拉伯礼服，端坐于其中，仿佛一位“受洗的苏丹”。

family_letter_desc_601=我必须承认，当第一次见到这位少年时，我就深深被他吸引。他身上融合了霍亨施陶芬与欧特维尔家族的气质，他擅长骑马、猎鹰、下棋，掌握五国语言，读书的数量甚至超越了许多学者。
family_letter_desc_602=腓特烈犹如黑夜中的烈火，吸引着所有人的目光。条顿骑士团团长赫尔曼见过他后，也将自己的余生奉献给了他。
family_letter_desc_603=康斯坦斯的离世令腓特烈心碎。她是那位始终帮助他掌握权力的公主，尽管腓特烈在外有许多情人，但康斯坦斯从未因此抱怨。
family_letter_desc_604=我们的队伍行进在基督徒的质疑中。自第一次十字军东征以来已经过了130年，我们没有流血，没有战斗，就收回了圣城。当我看到腓特烈与阿尔卡米勒用阿拉伯语在帐篷里签订十年合约，当我看到腓特烈走进圣城，受到各信仰民众的欢呼，我不再怀疑，和平真的是上帝的旨意。
family_letter_desc_605=腓特烈对新技术与新学科充满好奇心。埃及苏丹阿尔卡米勒虽然没有赠送财宝与美女，却送来许多新奇的东西——比如精巧的机械钟。腓特烈还资助了数学家斐波那契，斐波那契的《算盘全书》及后续著作都献给了他。
family_letter_desc_606=腓特烈刚正不阿，法治至上。即使是他的大儿子亨利叛乱，他也毫不手软，将其终身囚禁。他将自己与教皇之间的信件公开发给全欧洲的王侯，表明自己始终保持清白。教皇“是太阳，皇帝是月亮”的信条开始在王侯们之间崩塌，他们渐渐接受了耶稣基督的教诲：“皇帝的归皇帝，上帝的归上帝。”
family_letter_desc_607=腓特烈被开除教籍的那天，他也收到了赫尔曼去世的消息。赫尔曼是条顿骑士团的团长，这位忠诚的战士，为腓特烈和上帝尽忠二十载，终于离开了我们。
family_letter_desc_608=腓特烈在得知自己被判决的消息后勃然大怒。他大声喊道：“我曾对他表示尊敬，但从今以后，我不再客气！我要变成铁锤！”
family_letter_desc_609=“对法治近乎执拗的热情，彻底公正的言行，对知性不倦的探求心，多方面的丰富才能，与生俱来的真正高贵，如果这些不会随肉体的死亡而消失，那么腓特烈将继续活在我们的心中。”——曼弗雷迪对父亲的评价。

battle_talk_3030401=趁现在进攻墨西拿，胜利已经触手可及！
battle_talk_3030402=进攻受阻，先撤回去再做打算
battle_talk_3030403=？？我们的船呢？被暴风雨吹走了吗？
battle_talk_3030404=守住阵地，等新一批运输船抵达
battle_talk_3030501=我们拿下了墨西拿，可以向西西里中部进军
battle_talk_3030502=恩纳要塞防守严密，我们恐怕有场硬仗要打
battle_talk_3030503=阿拉伯骑兵正在冲击我们的阵线，诺曼骑士，亮出枪刃！
battle_talk_3030801=伊本·哈瓦斯发动了无耻的偷袭，我们必须尽快回援特罗伊纳
battle_talk_3030802=加快进攻！我们要趁罗杰·博索回来之前拿下这座城市！
battle_talk_3030803=他们的援军来了，准备迎击！
battle_talk_3030901=敌军人数众多，我们可以先占据地形优势
battle_talk_3030902=我们兵力充足，分批冲锋，消耗诺曼人的军力！
battle_talk_3030903=敌人的士气越来越低，是时候发起反击了
battle_talk_3030904=稳住！不要后退！
battle_talk_3031001=上次进攻巴勒莫失败，这次一定能成功
battle_talk_3031002=上次被诺曼人打败，这次一定要雪耻
battle_talk_3031003=有敌人！我们的计划被发现了吗？
battle_talk_3031004=诺曼人！他们怎么发现我的计划的？
battle_talk_3031005=冲锋！不要给敌人列阵的机会！
battle_talk_3031101=他们的援军已经被我击退
battle_talk_3031102=我的舰队也准备好了，让我们拿下这座城市吧
battle_talk_3031301=投降吧，你们已经没有援军了，我也不会亏待你的家人
battle_talk_3031302=我不是高尚的人，但我手下的将士都是善战之辈
battle_talk_3031303=我明白了，我会精心设计一个陷阱
battle_talk_3031304=这是个圈套！我们走投无路了！
battle_talk_3031401=敌人总是依托马耳他来袭击我们
battle_talk_3031402=我们必须将这座岛拿下以绝后患
battle_talk_3040301=风暴摧毁了我们的舰队，虽然不知道现在在哪但必须就近找个落脚点。
battle_talk_3040302=重新集结舰队保护我们的人撤回西西里。
battle_talk_3040303=年轻的罗杰第一次展示力量时却遭遇了痛苦的回击，威望受到了严重打击。
battle_talk_3040401=瓦莱塔的平坦海滩适合登陆但是有重兵防守，我们应该直接从西北部登陆。
battle_talk_3040402=或者绕道从南侧登陆，穿过复杂的山地直取马耳他城。
battle_talk_3040403=马耳他城陷落了，敌军随时会出现在我们背后，我们该怎么办？
battle_talk_3040501=周围的领主对我们争夺阿普利亚的态度不一，但都不怎么好。
battle_talk_3040502=所以我准备了礼物来与周边的领主交好，但只能交好一家，可以预见我们会收获各不相同的结果。
battle_talk_3040801=我军败了，在萨勒诺建立防线，我们的敢死队可以破坏萨尔诺河上的桥梁阻挡北面袭来的敌军。
battle_talk_3040802=兰恰诺的驻防部队可以为我们分担火力，大部队正在从巴里赶来，届时发起反攻，消灭叛军。
battle_talk_3040901=北意大利全部归顺了洛泰尔，神圣罗马帝国的官员正在接管城市的路上，我们可以先发制人攻占城市。
battle_talk_3040902=我们终究无法与帝国军队正面对抗，但可以洗劫城市获得物资强化我们的防线，但最好不要尝试攻击已经被接管的城市。
battle_talk_3040903=同时叛军领袖在与洛泰尔谈判，我们应该尽快消灭叛军的势力，让洛泰尔打消现在就协助他们发动进攻的心思。
battle_talk_3041001=敌人从四面八方袭来，护送后勤车队前往防线，尽可能的拖延洛泰尔的主力部队，至少要守住萨勒诺。
battle_talk_3041002=我亲自去北非集结穆斯林军队，到时候就发动反攻。
battle_talk_3041101=我们投降。
battle_talk_3041102=冲锋，消灭这些叛匪！
battle_talk_3041103=你差得远，孩子。
battle_talk_3041104=不，罗杰，我的长子！
battle_talk_3041201=现在能坐下好好谈谈了，教皇陛下。
battle_talk_3041202=我承认你是南意大利唯一的统治者，快放我回去吧。
battle_talk_3050401=罗马皇帝？那只是罗马那个老头的施舍，现在他居然想把它给一个毛头小子？他根本不配！
battle_talk_3050402=把各个山口都守牢，让那个老头明白，他的决定是大错特错。
battle_talk_3050403=必须找到条隐蔽小路穿越阿尔卑斯山，绝不能让奥托察觉。
battle_talk_3050601=埃拉德，你这个背信弃义的叛徒，手下败将！今天在法王和众位诸侯的帮助下，非取你首级不可！
battle_talk_3050602=少废话！凭人多就想胜过我吗？
battle_talk_3050603=防守住！绝不能再给叛军增援的机会！
battle_talk_3051001=教皇站在我这边，神也站在我这边！而他？一个被教会逐出的人，凭什么自称皇帝！
battle_talk_3051002=夺回上帝的封地！攻陷异教徒的巢穴！为上帝伸张正义！
battle_talk_3051003=我们的故乡正遭侵略，而侵略者竟是那个让我们远赴异国，与萨拉森人血战的教皇。真是可笑！
battle_talk_3051004=在罗马接近一场“重归于好”的庆祝时，教皇与腓特烈的纷争暂时得到平息，腓特烈被恢复了帝位。
battle_talk_3051201=我们伦巴第人从不惧怕什么罗马皇帝！无论是红胡子腓特烈，还是这位黄发的腓特烈，伦巴第永不屈服！
battle_talk_3051202=赫尔曼大团长，有时我会想，这些伦巴第人是真的有独立精神，还是一群没脑子的逐利之徒？
battle_talk_3051203=伦巴第人屡次挑衅，休怪我们的刀剑无情！突袭他们的防线，占领维琴察！
battle_talk_3051301=我绝不允许这些老鼠继续窃取我的国土！散布消息，我们撤退至克雷莫纳过冬，吸引他们进入伏击圈！
battle_talk_3051302=看来他们也不愿在这冰冷的意大利沼泽中抗衡我们，那就回冬季营地吧。
battle_talk_3051303=糟了！中计了。
battle_talk_3051401=没有盟友，没有援军！唯有自救！举起你们的草叉，守护我们的孩子！
battle_talk_3051402=若两个月内还未攻陷此地，冬天就会降临，到时我们将陷入不利之境。但各城镇相互支援我们似乎毫无办法。
battle_talk_3051403=撤退，我们会回来的！
battle_talk_3051404=守军坚定的意志和出乎意料的战术，让腓特烈二世最终未能获得任何战果。
battle_talk_3051501=腓特烈又攻占了法恩扎！这让我寝食难安啊。让热那亚人从海上发动攻击！直取西西里岛。
battle_talk_3051502=起帆！立刻驰援西西里！
battle_talk_3051503=战争胜利后，皇帝军队向罗马进发。然而，离罗马仅13公里时，8月22日，教廷公布了罗马教皇格列高利去世的消息。腓特烈命令撤退。
battle_talk_3051701=腓特烈的要塞正环绕我们增多，必须立刻突围，否则只能坐以待毙！
battle_talk_3051702=就让维多利亚成为他们的牢笼，我倒要看看教皇如何应对。
battle_talk_3051703=竟然连维多利亚的要塞也困不住这些暴民，我确实低估了他们。
battle_talk_3051704=腓特烈这位强大的皇帝最终却被一个意大利北方的小城邦击败，且败得毫无反击之力，帕尔马的维多利亚基地在敌人攻占后化为灰烬。
battle_talk_3051801=贪婪的教皇一再攻掠，却只让百姓流血受苦，难道这些人不是他的子民？
battle_talk_3051802=也许明天我再难上战马，不知这场争斗还要延续多久？但今天，击退敌军！
battle_talk_3051803=他们袭击了我们后方的营地！撤退！恩佐你指挥军队缓慢撤退！不能形成溃退！


