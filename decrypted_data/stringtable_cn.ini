agreement_info=用户协议[br]更新日期：2021年9月30日[br][br]第一部分重要提示[br]本《游戏最终用户使用许可协议》（以下简称“协议”）是用户（个人或单一实体，以下简称“用户”）与苏州EasyTech软件科技有限公司（以下简称“EasyTech”、“运营商”）之间有关EasyTech旗下游戏（亦应包括该游戏之任何修改、更新、全部前期版本及后续版本等，以下简称“游戏”）适用的法律协议。[br][br]主要条款[br]1.权利的许可[br]1.1用户可在许可生效的时间内将游戏客户端软件安装在自己使用的联网移动设备上，并以客户端软件指定的方式运行本“游戏”的一份副本。其他任何形式的未经许可的安装、使用、访问、显示、运行以及转让，都将被视为对协议的违反。[br]2.行为的禁止[br]2.1禁止用户进行以下侵害本游戏公平性的行为，包括但不限于：[br]2.1.1利用反向工程、编译或反向编译、反汇编等技术手段制作软件对游戏进行分析、修改、攻击，最终达到作弊的目的；[br]2.1.2使用任何外挂程序或游戏修改程序（本协议所称“外挂程序”是指独立于游戏软件之外的，能够在游戏运行的同时影响游戏操作的所有程序，包括但不限于模拟键盘鼠标操作、改变操作环境、修改数据等一切类型。如国家有关法律、法规及政府主管部门的规章或规范性文件规定的外挂定义与本协议有冲突，则以法律、法规、部门规章或规范性文件规定的为准），对本游戏软件进行还原工程、编译、解码或修改，包括但不限于修改本软件所使用的任何专有通讯协议、对动态随机存取内存（RAM）中数据进行修改或锁定；[br]2.1.3使用异常的方法登录游戏、使用加速器等外挂软件或机器人程序等恶意破坏服务设施、扰乱正常服务秩序的行为；[br]2.1.4制作、传播或使用外挂、封包、加速软件，及其它各种作弊程序，或组织、教唆他人使用此类软件程序，或销售此类软件程序而为私人或组织谋取经济利益；[br]2.1.5使用任何方式或方法，试图攻击提供游戏服务的相关服务器、路由器、交换机以及其他设备，以达到非法获得或修改未经授权的数据资料、影响正常游戏服务，以及其他危害性目的的任何行为；[br]2.1.6利用游戏系统可能存在的技术缺陷或漏洞而以各种形式为自己及他人牟利（包括但不限于复制游戏中的虚拟物品等）。[br][br]用户守则[br]请相信，因为用户违反下述守则而对用户的游戏角色采取限制措施，也是为了广大用户的最大利益。[br]1.行为：利用系统的BUG、漏洞为自己及他人牟利。处罚措施：一经发现或经用户举报查证属实后，提出严厉警告；经警告后再犯者删除其相关虚拟物品等，并交由国家有关机构处理。[br]2.行为：利用游戏提供的功能进行非法实物交易等违反国家法律法规的行为。处罚措施：上述行为一经发现，立即交由国家有关机构处理。[br][br]苏州EasyTech软件科技有限公司[br]二零一九年六月一日[br]*请访问EasyTech官方网站以阅读全部用户协议内容。
