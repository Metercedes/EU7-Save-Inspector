stage_intro_4761=985年，两位安纳托利亚将军试图架空刚登基的巴西尔二世，巴西尔二世需要击败他们才能真正掌控这个国家。
stage_intro_4765=拜占庭的长期内战削弱了帝国对东部地区的掌控，为了应对法蒂玛王朝的不断袭扰，巴西尔二世亲自率兵进军叙利亚。
stage_intro_4767=998年，拜占庭帝国在与法蒂玛王朝的边境战争失利，巴西尔二世再次亲自率兵坐镇边境，清扫了一系列敌军的据点，捍卫了帝国的领土。
stage_intro_4763=公元986年，巴西尔二世皇帝亲率军队进攻保加利亚，在撤退途中遭遇了保加利亚军队的伏击。
stage_intro_4769=1014年，巴西尔二世在经过长期的作战之后成功将保加利亚军队主力逼退至爱琴海北岸，双方多年的冲突将再次画下句号。
stage_intro_4771=1020年，亚美尼亚国王趁巴西尔二世对意大利用兵时联合法蒂玛王朝进攻拜占庭边境，愤怒的巴西尔立即率兵返回，并在后续的战役中占领了亚美尼亚地区。

