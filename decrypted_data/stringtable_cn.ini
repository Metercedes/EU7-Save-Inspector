stage_intro_4681=匈雅提·亚诺什出生于匈牙利的一个贵族家庭，一生都致力于抵御奥斯曼帝国对欧洲的扩张与入侵，被称为“白骑士”
stage_intro_4683=1442年，匈雅提在首战不利的情况下坚持奋战数日，最终于久拉费赫尔城消灭了前来进犯的奥斯曼军队。
stage_intro_4685=1443年起，在教皇的支持下，匈雅提对塞尔维亚地区发起了远征，数次以少胜多，几乎将奥斯曼在此地的势力扫荡一空。
stage_intro_4687=1444年，匈牙利国王瓦迪斯瓦夫三世亲自率兵与奥斯曼帝国军队在瓦尔纳港附近展开会战。但由于瓦迪斯瓦夫三世在战斗中过于激进，其本人在乱军中被杀死，匈牙利军队也遭受了一场溃败。
stage_intro_4689=1448年，匈雅提带领一小股精锐部队试图进入科索沃地区与当地抵抗奥斯曼军队的势力会合，但由于计划泄露，此次行动以失败告终。
stage_intro_4691=1456年，奥斯曼苏丹穆罕默德二世集结重兵围攻贝尔格莱德。匈雅提临危受命，率领部队英勇作战，最终战胜了数倍于匈牙利守军的奥斯曼军队。

