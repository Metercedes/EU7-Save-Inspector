stage_intro_1501=乌格列沙得到消息，奥斯曼帝国的大部分军队正在离开欧洲，向着安纳托利亚进军，这是清除奥斯曼帝国在巴尔干半岛势力的最佳时机，因此他们发动了一场突然的奇袭。
stage_intro_1502=托皮亚家族的卡洛托皮亚对巴尔沙二世通过联姻扩大版图的做法感到不满，因此邀请奥斯曼帝国对泽塔公国发动了攻击，而穆拉德一世则欣然同意了这一邀请。
stage_intro_1503=穆拉德一世于1387年离开巴尔干，以应对安那托利亚的事务，而巴尔干的附庸势力试图摆脱奥斯曼帝国的统治，并组建联盟以挑战其权威。
stage_intro_1504=穆拉德一世于1388年从安纳托利亚返回，立即对保加利亚发动了一场闪电战。波斯尼亚统治者也立刻向保加利亚发动了援助。
stage_intro_1505=科索沃连接了马其顿和塞尔维亚两片区域，如果奥斯曼人占领这里，将会进一步蚕食塞尔维亚大片领土，而拉扎尔大公组织的联军在科索沃地区与奥斯曼人展开了一场激烈的交锋。
stage_intro_1506=穆拉德一世在意外被刺杀后，他的儿子巴耶济德一世继位，而此时英法百年战争已经进入休战时期，为了挽救濒临灭亡的东罗马，西方的骑士们联合起来发动了十字军东征。
stage_intro_1507=当巴耶塞特一世准备给拜占庭最后一击的时候，来自东方的帖木儿率领十五万大军兵临城下，奥斯曼帝国的生死存亡只在一瞬之间，这让拜占庭得以喘息。
stage_intro_1508=安卡拉战役巴耶塞特一世被俘并抑郁而终，随后奥斯曼帝国内部经历了一场斗争，最终迎来了新的苏丹穆拉德二世，但由于帝国的暂时虚弱，仍然引发了从属国的反叛！
stage_intro_1509=威尼斯人为了获得塞萨洛尼基地区的完全自治权，不惜向奥斯曼帝国宣战，苏丹对此无法容忍，于是派出大军围攻！
stage_intro_1510=教皇尤金四世召集了波兰、匈牙利等多个国家的军队，发动了一场新一轮的十字军东征，而当时已经退位的穆拉德二世不得不重新组织军队，以抗击这一来势汹汹的十字军。
stage_intro_1511=摄政王约翰·匈雅提为战死的国王而复仇准备了4年，1448年，他率领着匈牙利、瓦拉几亚联军，向奥斯曼帝国发动了突袭。
stage_intro_1512=1451年，穆罕默德二世继位，他花费了两年的时间准备，定制了巨炮、火枪；建立了海岸要塞；封锁了海峡，君士坦丁堡这座矗立了千年的城市迎来了最强大的敌人。

