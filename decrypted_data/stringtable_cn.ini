stage_intro_4801=哈拉尔为了发展自己的地位和资历，加入了拜占庭的瓦兰吉卫队。在接下来的十多年中，他将留下一段传奇的历史。
stage_intro_4803=1035年，哈拉尔成为瓦兰吉卫队的队长。同年，哈拉尔带领瓦兰吉卫队进攻并占领了小亚细亚，迫使阿拉伯帝国与拜占庭帝国签订了和平条约。
stage_intro_4805=哈拉尔被命令去镇压保加利亚地区。在这场镇压中，哈拉尔没有丝毫留情，因此他得到了“保加利亚焚烧者”的称号。
stage_intro_4807=在东部战事告一段落后，哈拉尔被派往了西西里岛。这次他将用他的武力和智慧，为拜占庭重新光复西西里岛。
stage_intro_4809=1047年哈拉尔在马格努斯一世死后，成为了挪威的国王，随后他对丹麦发起了进攻，试图将丹麦完全占领。
stage_intro_4811=1062年，哈拉尔与丹麦国王斯文二世约定在尼萨河河口用海战决出胜负，尽管哈拉尔获胜，但由于挪威国内发生动荡，双方最终在两年后达成了和平协定。

