campaign_desc_66=随着理查二世被推翻，为了争夺英格兰王位，爱德华三世的两支后裔，兰开斯特家族和约克家族展开了战斗。
campaign_desc_301=传说中法老王宝藏埋藏地的消息在民间不胫而走，无数的稀世珍宝，价值连城，让人垂涎不已。
campaign_desc_302=一直以来，无地王约翰的宝藏是无数探险家心驰神往的对象，但是想要找到这批宝藏却一点也不容易。
campaign_desc_303=所罗门王藏于耶路撒冷的宝藏一度下落不明，并逐渐被人所遗忘。如今宝藏的消息再次出现，无数人为了得到宝藏做好了出发的准备。
campaign_desc_304=圣殿骑士团自成立开始，征战沙场并积累了大量的财富。在其解散之后，为了防止被人觊觎，他们将这些财富埋藏了起来，至今没有被人找到。
stage_group_desc_20001=罗马帝国的衰弱让蛮族们蠢蠢欲动。匈人首领阿提拉集结了东哥特人、格皮德人、法兰克人向高卢进发，罗马帝国意识到了危险，埃提乌斯也集结了大量部队和阿提拉在平原进行大决战。
stage_group_desc_20002=阿拉伯帝国的扩张势不可挡，他们已经占领了整个北非和伊比利亚半岛，法兰克王国如果阻挡不了这支阿拉伯军队，那么整个欧洲都会被阿拉伯征服。
stage_group_desc_20003=阿拉伯帝国和大唐都扩展至中亚地区，因为波斯帝国的灭亡，中间缓冲地带已经不复存在，两大帝国之间不可避免的发生了冲突。
stage_group_desc_20004=诺曼底公爵为了取得英格兰王位，带领部队跨过海峡，在英格兰登陆。当哈罗德二世得知消息后，立刻召集军队南下，在黑斯廷斯附近，布置守军。
stage_group_desc_20005=突厥人塞尔柱王朝的崛起势必向两河流域以及更西边扩张，阿拉伯帝国因为内乱避其锋芒，曼齐刻尔特被占领后，拜占庭皇帝震怒，他从希腊抽调兵力决定给塞尔柱人致命一击！
stage_group_desc_20006=鲍德温四世的去世让耶路撒冷王国陷入更大的危机之中，内部的不团结以及主动的挑衅，让萨拉丁获得了收复圣地的机会。一场东西方的交战已经不可避免。

;战役章节结束
;__font_type[font_text_]
campaign_end_desc_1=西罗马帝国在外敌的不断入侵下走向了灭亡，这一古老帝国的毁灭仿佛早已注定，但又十分突然，这使得罗马帝国的疆域大幅缩水。而此时，作为拜占庭帝国首都的君士坦丁堡，则是另一番景象。
campaign_end_desc_2=查士丁尼一世和贝利撒留堪称明君贤臣的典范，他们为拜占庭的崛起和发展打下了坚实的基础，为千年帝国的延续，做出了不可磨灭的贡献。
campaign_end_desc_3=盎格鲁-撒克逊人的入侵使得不列颠原本分裂的地区势力逐渐整合，最终形成了七大王国的格局，这也是后来的英格兰王国的雏形。
campaign_end_desc_4=拜占庭帝国在强大的阿拉伯人的攻势下苦苦支撑，与此同时，巴尔干半岛又发生了新的战事。庞大的拜占庭帝国腹背受敌，仿佛随时都会击垮。
campaign_end_desc_5=维京人是著名的航海家，他们不仅入侵了欧洲各个国家，并且在美洲、冰岛等多个地区都有他们活动的身影，而维京人扩张的这一时期，则被人们称之为“维京时代”。
campaign_end_desc_6=马其顿王朝开创了拜占庭帝国历史上第二个最辉煌的时期，在这段被称为“黄金时期”的几个世纪里，马其顿王朝的疆域达到了查士丁尼一世之后从未有过的规模，但最终却因为子嗣断绝而终结。
campaign_end_desc_7=诺曼底王朝先后经历了四位国王的统治，并且由亨利一世缔造了英格兰的长期和平时期，诺曼底王朝的结束也意味着英格兰即将迎来一个全新的时代。
campaign_end_desc_8=阿莱克修斯一世带来的军队为拜占庭帝国击败了强大的敌人，但也使得拜占庭帝国的百年基业近乎毁于一旦。君士坦丁堡被占领，拉丁帝国的崛起，仿佛意味着拜占庭帝国即将成为历史。
campaign_end_desc_9=长期的远征最终以失败而告终，耶路撒冷依旧被他们的敌人所占领着。在耗费了大量的人力和财力后，远征军洗劫了君士坦丁堡，拉丁帝国就此诞生。
campaign_end_desc_10=伊莎贝拉和罗杰的行动迫使爱德华二世同意放弃王位，并让他的儿子爱德华三世继任。爱德华三世的继位不仅促使了第二次苏格兰战争的爆发，也使英格兰和法兰西开始了长达百年的战争。
campaign_end_desc_11=君士坦丁堡的陷落和重建让拜占庭人认识到了西方拉丁世界对他们的巨大威胁。与此同时，东方的安纳托利亚半岛之上，一个新生帝国正对拜占庭帝国蠢蠢欲动。
campaign_end_desc_12=虽然奥斯曼帝国的崛起已经无法阻挡，但是拜占庭帝国不会甘心俯首称臣，西方各基督教国家也不会坐视拜占庭的灭亡，而此时东方的一支突厥部落也在逐渐崛起，奥斯曼帝国的扩张之路势必不会一帆风顺。
campaign_end_desc_13=爱德华三世终究没有加冕成法国国王，但两国的战事还在继续，这场旷日持久的战争把英法两国都拖入了无尽的深渊，巨额的负债和肆虐的瘟疫让两国都暂时无力再战。
campaign_end_desc_14=虽然战争最终由法兰西获胜，但长达百年的战争使英格兰和法兰西人民都遭受了巨大的磨难，战后的英格兰失去了他们在欧洲大陆上的大部分领土。
campaign_end_desc_15=君士坦丁堡的陷落标志着拜占庭帝国的灭亡，千年帝国的辉煌终究还是离人们远去。拜占庭帝国的灭亡标志着中世纪的结束，也意味着新的欧洲霸主即将诞生。
campaign_end_desc_51=西罗马帝国在外敌的不断入侵下走向了灭亡，这一古老帝国的毁灭仿佛早已注定，但又十分突然，这使得罗马帝国的疆域大幅缩水。而此时，作为拜占庭帝国首都的君士坦丁堡，则是另一番景象。
campaign_end_desc_52=查士丁尼一世和贝利撒留堪称明君贤臣的典范，他们为拜占庭的崛起和发展打下了坚实的基础，为千年帝国的延续，做出了不可磨灭的贡献。
campaign_end_desc_53=盎格鲁-撒克逊人的入侵使得不列颠原本分裂的地区势力逐渐整合，最终形成了七大王国的格局，这也是后来的英格兰王国的雏形。
campaign_end_desc_54=拜占庭帝国在强大的阿拉伯人的攻势下苦苦支撑，与此同时，巴尔干半岛又发生了新的战事。庞大的拜占庭帝国腹背受敌，仿佛随时都会击垮。
campaign_end_desc_55=维京人是著名的航海家，他们不仅入侵了欧洲各个国家，并且在美洲、冰岛等多个地区都有他们活动的身影，而维京人扩张的这一时期，则被人们称之为“维京时代”。
campaign_end_desc_56=马其顿王朝开创了拜占庭帝国历史上第二个最辉煌的时期，在这段被称为“黄金时期”的几个世纪里，马其顿王朝的疆域达到了查士丁尼一世之后从未有过的规模，但最终却因为子嗣断绝而终结。
campaign_end_desc_57=诺曼底王朝先后经历了四位国王的统治，并且由亨利一世缔造了英格兰的长期和平时期，诺曼底王朝的结束也意味着英格兰即将迎来一个全新的时代。
