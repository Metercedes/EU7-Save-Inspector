stage_group_desc_20007=1214年，神圣罗马帝国皇帝奥托四世为遏制法兰西国王腓力二世的扩张，与英格兰国王约翰等反对腓力二世的势力组成联合军队，对法兰西本土展开了进攻。得知消息的腓力二世迅速组织军队前往拦截。

general_skin_20442=战斗天使贞德
Joan of Arc2=战斗天使贞德
general_desc_Joan of Arc2=贞德虽然出身于农村，但是在战场上却是一名极具天赋的指挥官。在战斗中，她尤其擅长以身先士卒的方式鼓舞士气，英勇作战的身姿给战士们留下了深刻的印象。
general_skin_20172=雄鹰崛起成吉思汗
Genghis Khan2=雄鹰崛起成吉思汗
general_desc_Genghis Khan2=成吉思汗在发迹前曾多次被逼入绝境甚至命悬一线，但是他坚韧不拔的性格支持他挺过了一个个的难关。现在，他已统一了蒙古各部，整个欧亚大陆都将面临这位新兴霸主的挑战。
general_skin_20175=少女玛蒂尔达
Empress Matilda2=少女玛蒂尔达
general_desc_Empress Matilda2=玛蒂尔达是英国国王亨利一世的女儿，由于兄长去世较早，她成为了王位的唯一合法继承人。年轻的玛蒂尔达此时尚未意识到前方会有怎样的腥风血雨。

