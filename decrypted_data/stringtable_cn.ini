troop_desc_518=拜占庭掷弹兵们将铁蒺藜和希腊火封装装在陶罐里掷向敌人。当陶罐破碎后，夹杂着铁蒺藜和碎陶片的希腊火能对集群的敌人带来可观的杀伤。

