troop_desc_118=在地中海上巡弋的海盗，是往来船只的梦魇
troop_desc_213=在方阵中负责抵御冲击的前排战士，能够为后方的火枪手提供安全的射击条件
troop_desc_214=岳飞组建的部队，由步兵和骑兵组成，在对抗金军骑兵的战斗中屡建奇功
troop_desc_317=立陶宛大公的亲卫骑兵，装备精良，以战锤作为武器，即使面对重甲敌人也能造成可观的杀伤
troop_desc_417=一支盔甲、旗帜甚至武器都是红色涂装的骑兵部队。他们身着红色铁甲，训练有素，威风凛凛，在战场上是一支不可忽视的力量。
troop_desc_418=以武士阶层为核心组成的一支部队，他们忠诚、勇敢，装备精良且训练有素，具有出色的战斗力和协同作战能力。
troop_desc_419=由匈雅提·马加什组建的精锐雇佣军团，在与奥斯曼的战争中发挥了举足轻重的作用
troop_desc_420=以长柄斧作为武器，斧枪的设计兼顾了刺击与劈砍，是一种较为全能的骑兵
troop_desc_421=金兀术的精锐重装骑兵，士气高昂时有着恐怖的冲击力
troop_desc_520=伊凡雷帝组建的精锐卫戍部队，常使用月刃斧作为火枪射击时的支撑
troop_desc_612=使用飞斧作为攻击手段的远程骑兵，能够对近程骑兵造成极强的扰乱效果
troop_desc_613=使用弩箭杀伤敌人的远程骑兵，通常用于袭扰打开方阵缺口，为重骑兵的冲击创造条件

