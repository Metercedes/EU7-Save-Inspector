stage_intro_4641=从14岁第一次登基开始，穆罕默德二世心中就有一个宏图壮志——攻陷君士坦丁堡，灭亡拜占庭帝国！1451年，当他他再次成为奥斯曼帝国的苏丹之时，他终于有机会将此计划付诸实施。
stage_intro_4643=君士坦丁堡的陷落，并不是穆罕默德二世征服之路的终点，事实上随着康斯坦丁尼耶的重建，这位年轻气盛的苏丹征服扩张的帷幕才刚刚拉开......1456年，士气高昂的奥斯曼大军向着贝尔格莱德进发。
stage_intro_4645=鉴于贝尔格莱德之战的失利，整个1457年穆罕默德二世都没有发动大规模的战争，一直等到1458年穆罕默德二世觉得恢复元气后，才继续开始了他的征服之战，而这一次周边诸国将要面对的是更加成熟老练的穆罕默德二世。
stage_intro_4647=当奥斯曼帝国正在全力西扩时，经常被东方亚洲的事务所打断，特别是当白羊王朝的乌宗·哈桑在埃尔津詹集结大军进犯帝国领土之后，穆罕默德二世不得不从巴尔干抽身，好好教训一下这个不安分的东方邻居....... 
stage_intro_4649=奥斯曼帝国大败白羊王朝后，穆罕默德二世完成了安纳托利亚地区的统一，确立了帝国在该地区的支配地位，此时他终于能腾出手来全力征服巴尔干，首当其冲的就是阻碍奥斯曼帝国一统巴尔干的最硬骨头——阿尔巴尼亚！
stage_intro_4651=战火逐渐蔓延到意大利半岛，为了对抗奥斯曼帝国的威胁，教皇向各方势力求援，但实际上穆罕默德二世已经把他的注意力转向了罗德岛，只有拿下罗德岛才能彻底控制东地中海的海面。而这位伟大的征服者也即将迎来自己的落幕。

