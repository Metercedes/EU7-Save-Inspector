conquest_faction_desc_801=西罗马帝国是古罗马帝国的继承者之一，它曾经辉煌，但现在陷入危机和衰落。帝国面临着蛮族迁徙带来的边境动荡，无法有效应对。然而，帝国仍保留着悠久的历史底蕴。只要有矢志复兴的决心，或许可以重塑罗马帝国的荣光。
conquest_faction_desc_802=拜占庭帝国，又称东罗马帝国，是古罗马帝国的继承者之一，它的首都君士坦丁堡位于战略要地，帝国不但继承了古罗马的政治、文化和传统，也发展出了独特的拜占庭艺术、建筑和体系。当前帝国主要目标的就是收复罗马的失地。
conquest_faction_desc_803=盖尔人是古代欧洲的一个凯尔特部族，居住在现今的爱尔兰、苏格兰和威尔士地区。盖尔人信奉多神教，崇拜大自然和祖先。他们生性勇猛，极为好战，是古代罗马帝国的强大对手。
conquest_faction_desc_804=不列颠人是古代欧洲的一个凯尔特部族，居住在不列颠群岛。他们具有凯尔特文化的特征，信仰多神教。不列颠人与罗马帝国进行过长期的接触和冲突，随着时间的推移，其文化逐渐融合了罗马和其他外来文化。
conquest_faction_desc_805=萨克森人是德国北部的古日耳曼民族，在欧洲历史上具有重要地位。作为日耳曼部落的一支，他们以勇敢和军事实力著称。萨克森人在中世纪时期经历了诸多征服、定居和政治演变，对地区的政治和军事格局产生了影响。
conquest_faction_desc_806=丹人作为北欧日耳曼民族的一支，具有丰富的历史和文化传统。他们在北欧的铁器时代和维京时代存在并发展。丹人在历史上扮演了重要角色，尤其是在维京时代，他们的船队勇敢无畏，不断向周边海域发起征服。
conquest_faction_desc_807=波罗的人是居住在波罗的海周边地区的古代人群。他们在历史上受到斯拉夫、日耳曼等文化的影响。其中重要分支古普鲁士人以勇敢和战斗力强而闻名，与周围的斯拉夫人和日耳曼人展开了不断的交流和冲突。
conquest_faction_desc_808=苏维汇人是古代日耳曼人的一个支族，居住在莱茵河沿岸地区。他们是古罗马时期勇猛的战士和远征者。苏维汇人在部分时期建立了自己的王国，并参与了与罗马帝国的冲突。
conquest_faction_desc_809=伦巴第人是日耳曼民族的一支，在公元6世纪初，他们迁移到意大利北部，并建立了伦巴第王国。伦巴第人也拥有着不错的军事实力。他们统治了意大利北部长达两个世纪，深深地影响了当地的政治、社会和文化。
conquest_faction_desc_810=斯拉夫人是一个广泛分布在欧洲的民族群体，分为西斯拉夫人、东斯拉夫人和南斯拉夫人三个主要分支。他们拥有独特的语言、文化和传统，在历史上形成了许多独立的国家，也在展现出了不同程度的战斗能力。
conquest_faction_desc_811=法兰克人是历史上居住在法兰西亚地区的原住民族，也是日耳曼人的一个重要分支。他们在5至8世纪期间建立了一个强大的王国，称为法兰克王国。法兰克人有着勇猛的战士和重于军事扩张的决心，对欧洲历史产生了深远影响。
conquest_faction_desc_812=勃艮第人是古代日耳曼民族的一个分支，主要居住在法国东部的勃艮第地区。勃艮第人在历史上建立了勃艮第王国，并与周边的国家进行了政治和军事的交锋，是欧洲中世纪的重要势力之一。
conquest_faction_desc_813=东哥特人是古代日耳曼民族的一个分支，面对外族的入侵，他们只能选择迁徙至东欧和巴尔干半岛，并在此建立了自己的王国。东哥特人在罗马帝国的边境地区发展强大，并与罗马帝国展开多次冲突。
conquest_faction_desc_814=起源于东日耳曼哥特族的格皮德人十分骁勇善战。他们在历史上与其他民族发生过多次战争，特别是与匈人和东哥特人之间的冲突较为著名。他们曾建立自己的王国，并在一段时间内对周围地区施加影响力。
conquest_faction_desc_815=匈人是古代欧亚草原地区的游牧民族，擅长骑射，由阿提拉领导的匈人帝国在5世纪末至6世纪初达到鼎盛。他们对罗马帝国和其他民族构成了威胁，频繁进行掠夺和征服。
conquest_faction_desc_816=马扎尔人是匈牙利的主要民族。他们起源于亚洲的乌拉尔山脉地区，在9世纪初迁徙至现在的匈牙利地区，并建立了匈牙利王国。马扎尔人在中世纪扩张势力，并与周边国家进行了多次战争和领土争夺。
conquest_faction_desc_817=瓦斯科人是居住在西欧的一个民族群体，主要分布在西班牙和法国的巴斯克地区。他们拥有独特的语言和文化传统，被认为是欧洲最古老的民族之一。瓦斯科人在历史上一直以来都保持着独立意识和文化特征，并在西欧历史上发挥了重要作用
conquest_faction_desc_818=西哥特人是古代日耳曼民族的一个分支，其起源可追溯到古代的哥特人部落。在5世纪中叶，他们迁移到西班牙和南法地区，并建立了西哥特王国，统治着今天的西班牙和葡萄牙大部分地区，成为西欧最重要的王国之一
conquest_faction_desc_819=保加利亚人是巴尔干半岛的原始居住族群。他们有着自己的语言、宗教和民俗传统。保加利亚人在历史上曾建立了强大的保加利亚第一帝国，其拥有强大的军队、发达的城市和繁荣的经济，并对巴尔干地区产生了深远影响。
conquest_faction_desc_820=希腊人是居住在希腊地区的民族群体，他们是古希腊文明的创造者和传承者。希腊人以其城邦制度和民主政治而闻名，其中最著名的是雅典。他们在中世纪时期面临诸多外来征服和统治，不过这些并无法磨灭他们对独立和自由的渴望。
conquest_faction_desc_821=土耳其人的历史根源可以追溯到古代突厥人。他们在历史上经历了多次迁徙和扩张，并建立了强大的帝国。他们在军事、文化和政治领域都有显著的贡献，在中世纪和近代时期征服了广大领土。
conquest_faction_desc_822=亚美尼亚人是世界上最古老的民族之一，其宗教和文化遗产深深影响了地区的生活方式和价值观。亚美尼亚人在历史上曾建立过强大的亚美尼亚王国，并经历了许多挑战和困境。
conquest_faction_desc_823=蒙古人是源自蒙古草原的游牧族群，有着卓越的骑射技巧和战略谋略。他们善于利用草原的优势进行迅速的袭击和机动作战。在成吉思汗的领导下，他们在欧亚大陆迅速扩张，并最终建立了庞大的蒙古帝国。
conquest_faction_desc_824=东方人是从遥远的东方迁徙而来的民族。他们怀揣着和西方诸国沟通交流的目的，踏上了未知的征程。面对西方各种势力可能带来的挑战和机遇，东方人展现出无畏和坚毅的精神，决心以勇敢和智谋开拓新的家园。
conquest_faction_desc_825=柏柏尔人是北非地区的一个民族群体。他们是北非原住民族，为了保卫自己的领土和文化，柏柏尔人曾经进行过多次抵抗外来入侵的战斗。柏柏尔人虽然时而独立，时而受他族统治，但他们一直保留了许多传统习俗和信仰。
conquest_faction_desc_826=汪达尔人是古代日耳曼部落之一，在经过漫长而又艰苦的迁徙之后，最后侵占罗马帝国的北非行省并以此建立了汪达尔王国。汪达尔人在海上有着不可小觑的军事实力，对罗马城的劫掠更是给罗马帝国带来了不可估量的破坏。
conquest_faction_desc_827=埃及人是古老文明的创造者，居住在非洲东北部的埃及地区，发展出了令人叹为观止的文化和文明。他们有着伟大的建筑工程、复杂的宗教体系和象形文字。固然经历了外来征服者的统治，但他们的文化和传统仍然得以保留。
conquest_faction_desc_828=阿拉伯人是一支主要分布在阿拉伯半岛和中东地区的民族。他们使用阿拉伯语，信仰伊斯兰教，对于伊斯兰教的传播和发展起到了重要的作用。他们曾经建立过众多伟大的帝国和王国，也在贸易、农业、工艺等领域取得了重要的成就。
conquest_faction_desc_829=波斯人是古代伊朗高原的民族，创立了伟大的波斯帝国。波斯帝国以阿契美尼德王朝最为著名，统一了伊朗高原各部族，极大的扩张了帝国领土。波斯帝国的文明和成就对后世产生了深远的影响，是人类历史上重要的帝国之一。
conquest_faction_desc_830=地中海海盗是活动在地中海地区的海盗团伙。他们在历史上多个时期出现，如古代希腊和罗马时期、中世纪时期等。他们以袭击商船、劫掠财物为目标，给海上贸易和沿海居民带来威胁。因此他们也成为许多国家打击的对象。

