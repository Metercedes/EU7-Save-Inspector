campaign_name_601=欧特维尔家族
campaign_desc_601=新的千年开始了，不断扩张的伊斯兰帝国似乎将要统治世界，东罗马帝国也在蠢蠢欲动，而欧洲各国在瘟疫的重创下走向崩溃。此时维京人的后裔令西欧四分五裂的同时，也将成为未来崛起的推手。他们中的一部分人登陆了不列颠海岸，而一个卑微家族将在地中海地区展开一系列传奇的故事，这个家族叫做欧特维尔家族。
campaign_name_307=特洛伊的宝藏
campaign_desc_307=在特洛伊旧址的底下，他们发现无与伦比，精美绝伦的古希腊宝藏。但这里同样危险重重，似乎这批宝藏受到了复仇女神的诅咒。


