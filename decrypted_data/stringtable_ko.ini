battle_talk_3020201=알렉시오스의 정예 중군은 건드리기 어렵지만, 외곽 부대를 계속 격파하면 혼란을 일으킬 수 있을지도 모른다.
battle_talk_3020202=적의 바랑기아 호위대가 너무 깊숙이 들어왔다. 그들의 사기를 꺾어라!
battle_talk_3020203=아, 여기서 떠나야 한다.
battle_talk_3020204=겁쟁이다!
battle_talk_3020301=그리스인들이 또 왔다.
battle_talk_3020302=매복 공격이다!
battle_talk_3020303=우리의 모든 보급품이 아직 그곳에 남아있으니 적들이 캠프를 점령하지 못하게 막아라.
battle_talk_3020304=군심이 동요되고 있으니 철수하라.
battle_talk_3020305=보에몽이 또 한 번의 승리를 거뒀다고 생각할 때 모든 보급품과 전리품은 알렉시오스에게 빼앗겼다. 이로 인해 원정군은 빠르게 와해되었고, 보에몽은 어쩔 수 없이 이탈리아로 돌아가 다시 계획을 세워야 했다.
battle_talk_3020501=나폴리는 단지 이 일에 전혀 관여하지 않겠다는 조건으로 우리에게 많은 재물을 지불했다.
battle_talk_3020502=전쟁에서 승리했지만, 보에몽은 교황청과 맞설 힘이 없는 상황에서 다방면의 타협 끝에 자신을 위해 타란토 백작의 작위를 쟁취했다. 그러나 욕심 많은 보에몽은 이에 만족하지 않고 자신만의 왕국을 세우겠다고 맹세했다.
battle_talk_3020801=내 부하들이 공성탑을 건설 중인데, 약 3일 후에 완공할 것이다. 직접 양쪽의 성문을 강공하여 점령해도 성벽을 돌파할 수 있다.
battle_talk_3020802=나의 땅굴도 준비되어 약 2일 후면 남쪽 성벽까지 팔 수 있을 것이다. 당신들이 먼저 남쪽을 돌파하면 내 부하들은 성벽 내부까지 파고 들어갈 것이다.
battle_talk_3020803=이녀석들은 지난번 그 오합지졸들과는 달라 병력을 재집결해야 한다.
battle_talk_3020804=우리는 더 이상 저항할 힘이 없다. 그리스군에게 항복하겠다고 전하라.
battle_talk_3020805=셀주크 튀르크족과 비밀 협상 후, 이 도시는 알렉시오스의 군대에게 점령되었다. 이 때문에 탕크레드는 비잔티움을 매우 불신했다.
battle_talk_3020901=활을 쏴라. 이 야만인들이 발을 붙이기 전에 그들을 섬멸하라.
battle_talk_3020902=우리가 왔다. 버텨라.
battle_talk_3020903=이 마을들을 약탈하면 보급품을 얻을 수 있고, 현지인을 잡아서 길잡이로 이용하면 숨겨진 산길을 발견할 수 있다. 필요 시 산길을 이용하여 적군을 우회할 수 있다.
battle_talk_3021001=우리는 높은 성벽에 속수무책이고, 적군은 수시로 공격할 준비를 하고 있다. 성 시메온 항구의 수송대는 우리의 유일한 안정적인 보급처인 만큼, 그들을 지켜야 한다.
battle_talk_3021002=카르부가 우리와 같은 작은 토후국을 계속 괴롭히게 놔둘 수는 없다. 그가 외부 세력과 격전을 벌이는 틈을 타서 그를 없애라!
battle_talk_3021003=카르부가의 갑작스러운 죽음으로 셀주크족이 철수하기로 결정하자 보에몽은 마침내 안티오키아를 손에 넣었다.
battle_talk_3021201=매복 공격이다!
battle_talk_3021202=이런, 보에몽이 투르크멘인에게 붙잡혔다!
battle_talk_3021203=보에몽은 그의 무모한 행동으로 인해 적에게 붙잡혀 벌을 받았다.
battle_talk_3021301=적의 지원군이다. 근처에 분명 대부대가 있을 것이다.
battle_talk_3021302=레반트인들이 연합해서 우리와 맞서다니. 우리는 승산이 없다. 후퇴하라.
battle_talk_3021303=매우 유감스럽게도 이번 전투는 결국 실패로 끝났고, 보에몽은 영토나 자원을 얻지 못했다.
battle_talk_3021501=여기에 더 있으면 우리는 모두 굶어 죽을 것이다. 보에몽과 함께 죽을 필요는 없다.
battle_talk_3021502=알렉시오스로부터 50만 금화를 받았다고 들었는데, 이제 생각해보니 사실인 것 같네.
battle_talk_3021503=제국의 거의 모든 정예 부대가 이곳에 모였으니 그들을 먼저 내분으로 몰아넣어야 한다. 폐하께서는 그 노르만인에게 너무 신경을 쓰신다.
battle_talk_3021504=네가 졌다. 나의 바랑기아 호위대는 아직 본격적으로 참전하지 않았다. 그러니 아무 생각도 하지 말아라.
battle_talk_3021505=애초에 우리가 너를 도와 튀르크족을 상대하지 않았다면!
battle_talk_3021506=전쟁터에는 만약이 없다. 나의 오랜 적수여, 집으로 돌아가라. 나는 다음 전쟁터로 갈 것이다.
battle_talk_3021507=알렉시오스는 이 숙적을 너무 잘 알기 때문인지 보에몽은 이 동로마 황제에게 다시 한 번 패배했다.

stage_30209_goal_1={8}부가 목표 구역 점령{9}
stage_30210_goal_3={8}승리 전까지 부가 목표 생존{9}
stage_30212_goal_4={8}부가 목표 구역 점령{9}
stage_30215_goal_1={8}목표 대상이 목표 지역에 도달{9}

battle_talk_3010201=농민에게 밀밭을 파괴하라고 전하라. 노르만족에게 곡물 한 알도 남기지 말아라.
battle_talk_3010202=식량이 부족해서 교황과 협상을 요청합니다.
battle_talk_3010203=그들이 오게 보내줘라. 사람이 적으니까 괜찮을 것이다. 
battle_talk_3010204=교황의 부대는 무방비 상태이다. 지금 그들을 습격하라!
battle_talk_3010205=교황의 용서를 구합니다.
battle_talk_3010206=노르만족은 패배한 교황에게 예의를 갖추었지만, 교황이 노르만족의 포로가 되었다는 소식은 유럽 전역에 퍼졌다.
battle_talk_3010301=아풀리아는 물산이 풍부하고 모든 것을 갖춘 좋은 곳이다.
battle_talk_3010302=로베르! 왜 계속 아풀리아에서 즐거운 시간을 보내면서 자기 영지로 돌아가지 않으려고 하는 건가!
battle_talk_3010303=지금 내가 일부러 지연시키고 있다고 비난하는 건가? 기다려라. 칼라브리아를 수중에 넣을 것이다!
battle_talk_3010304=나에게 남겨진 시간은 많지 않다. 노르만족은 정복만으로 살아남을 수 없다.
battle_talk_3010305=로베르는 최근 몇 년간의 활약으로 그가 훌륭한 정치인이라는 것을 입증했다. 노르만족의 미래를 그에게 맡기자!
battle_talk_3010401=비잔티움의 거점을 공격하여 그들을 칼라브리아에서 몰아내라!
battle_talk_3010402=비잔티움 제국을 무너뜨린 후, 우리는 시칠리아로 진군할 수 있다.
battle_talk_3010403=이 도시는 매우 견고하지만, 포위 공격으로 항복하게 할 수 있다.
battle_talk_3010404=비잔티움 군대가 쫓겨났다. 시칠리아를 정복할 때가 되었다.
battle_talk_3010405=노르만족이다! 빨리, 빨리 군대를 집결하여 싸워라!
battle_talk_3010601=전에는 비잔티움 군대의 방해로 메시나를 점령하지 못했지만, 이번 야간 급습은 반드시 성공할 것이다.
battle_talk_3010602=도시 방어를 강화하라. 이곳은 시칠리아 정복의 시작점이 될 것이다.
battle_talk_3010603=노르만인들아, 동맹이 필요하다면 앉아서 협상할 수 있다.
battle_talk_3010604=협조해 줘서 대단히 감사하다. 나는 당신과 같은 동맹이 필요하다.
battle_talk_3010701=바리는 비잔티움의 마지막 거점이다. 그들을 격파하기만 하면 남부 이탈리아는 완전히 우리 노르만족의 것이다!
battle_talk_3010702=조금만 버텨라. 지원을 요청했으니 제국의 지원군이 곧 도착할 것이다!
battle_talk_3010703=도시를 점령한 후, 나에게 충분한 보답을 줄 수 있다면 기꺼이 도와드리겠습니다.
battle_talk_3010704=바리성을 지원하라!
battle_talk_3010705=그들의 지원군을 가로막아라!
battle_talk_3010801=바리가 함락되었다. 기스카르의 다음 목표는 우리일 것이다.
battle_talk_3010802=우리는 힘을 합쳐 그에 맞서 싸워야 한다.
battle_talk_3010803=오합지중들이다! 아무리 사람이 많더라도 나의 발걸음을 막을 수 없다!
battle_talk_3010804=비잔티움에게 노르만족의 힘을 보여줄 때가 되었다.
battle_talk_3010805=살레르노가 함락된 지 2년도 채 지나지 않아 베네벤토도 기스카르에 의해 정복되었다.
battle_talk_3011001=베네치아인들이 해상에서 우리 함대를 공격했는데, 우리는 상당한 손실을 입었다.
battle_talk_3011002=황제는 우리에게 도시를 사수하라고 명령하셨다. 그는 반드시 군대를 데리고 와서 우리를 지원할 것이다!
battle_talk_3011003=용맹한 바랑기아 호위대는 적군을 물리쳤다. 나와 함께 돌격하라!
battle_talk_3011004=황제의 지원군이 도착했다! 나를 따라 출격하라!
battle_talk_3011005=우선적으로 바랑기아 호위대를 섬멸하고, 적을 분할하여 포위하라!
battle_talk_3011006=군대를 재집결해야 한다! 철수! 철수하라!
battle_talk_3011007=알렉시오스는 교황에게 뇌물을 주고 기습을 감행하여 노르만족의 배를 불태워버렸다. 그리고 그들은 1066년 헤이스팅스 전투 이후 콘스탄티노플로 도망친 앵글로 색슨족으로 구성된 가장 강력한 바랑기아 호위대와 마주쳤다.
battle_talk_3011101=교황은 하인리히 4세에 의해 산탄젤로성에 포위되어 구조가 필요하다.
battle_talk_3011102=도와줘서 고맙다. 나의 맹우여.
battle_talk_3011103=계속 진군하여 하인리히 4세를 로마에서 몰아내라!

