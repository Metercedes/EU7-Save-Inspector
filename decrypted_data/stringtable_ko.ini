Stephen  III=스티븐 3세
Nicholas II Garai=미클로시 2세 거러이

conquest_faction_desc_603=랭커스터 공작 헨리가 잉글랜드의 왕위에 오른 후, 프랑스 왕국과의 전쟁을 재개하였다. 이번 전투는 10년 가까이 지속되어 양국의 백성들은 고통에 시달리고 있었다. 국내에서 농민 봉기가 끊임없이 벌어지는 잉글랜드 왕국은 프랑스 왕국과의 분쟁을 적절하게 해결할 방법이 절실히 필요하게 되었다.
conquest_faction_desc_602=잉글랜드 왕국이 아일랜드 섬을 침공한 이후 수립한 종속 정권인 아일랜드 영지는 총독이 바뀔 때마다 잉글랜드 국왕에게 책봉 되어왔다. 현재 잉글랜드 왕국의 불안정한 정권으로 인해 아일랜드 영지는 비교적 큰 자치권을 갖추게 되었고, 영지의 영주들은 점차 잉글랜드 왕국의 지배에 복종하지 않으려 한다.
conquest_faction_desc_601=잉글랜드 왕국의 지배에 복종하지 않으려는 게일인들이 수립한 왕국이다. 아일랜드섬에 남아있는 유일한 게일인 세력으로서 아일레흐 왕국은 결코 잉글랜드 왕국에 굴복하지 않을 것이다. 잉글랜드인을 아일랜드에서 몰아내고, 아일랜드 전역을 수복하는 것은 역대 아일레흐 국왕의 염원이다.
conquest_faction_desc_604=스코틀랜드 왕국은 수립된 후부터 그의 남쪽 이웃인 잉글랜드 왕국과 분쟁이 끊이지 않았고, 양측은 서로를 정복하여 브리타니아 전체를 통일하고자 하는 열망을 품고 있다. 현재 잉글랜드 왕국은 프랑스 왕국을 상대로 한 전투에서 큰 우위를 점하게 되었으니 잉글랜드 왕국을 견제하기 위해 스코틀랜드 왕국은 더 많은 힘을 투입해야 한다.
conquest_faction_desc_605=카페 왕조가 해체된 후, 잉글랜드의 왕 에드워드 3세는 프랑스의 왕위를 도모하여 영국과 프랑스 간 거의 100년 동안 지속해온 전쟁을 일으켰다. 현재 잉글랜드군의 공세로 프랑스 왕국은 여러 도시와 땅을 잃고, 심지어 수도 파리마저 함락되었다. 발루아 왕조의 지배는 기적이 일어나지 않는 한 멸망을 면치 못하게 되었다.
conquest_faction_desc_606=프랑스 왕국과 잉글랜드 왕국 사이에 위치한 브르타뉴 공국은 종종 공작 작위 계승 문제로 이 두 강대국이 힘을 겨루는 장이 되었으며, 국정이 불안해졌다. 현재 영국과 프랑스의 전쟁이 다시 시작된 상황에서 브르타뉴 공국은 강대국 사이의 분쟁에 휘말리지 않도록 더욱 조심해야 한다.
conquest_faction_desc_607=부르고뉴 공국은 프랑스 왕국에 종속된 공국으로, 그 역사는 야만족 대이동 시기 부르군트족이 세운 부르고뉴 왕국까지 거슬러 올라갈 수 있다. 프랑스의 왕위를 놓고 영국과 프랑스가 전쟁의 수렁에 빠졌을 때, 부르고뉴 공국은 기회를 타 영토를 확장하여 점차 유럽 대륙에서 강력한 세력으로 부상하였다.
conquest_faction_desc_608=스칸디나비아의 덴마크 왕국, 노르웨이 왕국, 스웨덴 왕국으로 구성된 동군연합으로, 이 세 왕국은 공동으로 한 군주를 옹립하였다. 칼마르 동맹의 수립은 스칸디나비아의 바이킹 후예들이 하나로 뭉쳐 남쪽의 강력한 이웃인 신성 로마 제국에 맞설 수 있게 하였다.
conquest_faction_desc_609=동프랑크 왕국의 왕 오토 1세가 로마에서 로마인의 황제로 대관식을 치른 후 세운 제국이다. 신성 로마 제국 수립 초기에는 국력이 매우 강했지만, 대공위 시대의 혼란을 겪으면서 제국의 중앙 권력은 점차 약화되었고, 제국은 수백 개의 제후국들로 구성된 느슨한 연방이 되었다.
conquest_faction_desc_610=신성 로마 제국의 제후국 중 하나로, 체코인들이 세운 보헤미아 공국에서 비롯되었다. 신성 로마 제국이 가톨릭 교회를 지지하여 후스파를 지지하거나 동정하는 보헤미아인들을 가혹하게 탄압했기 때문에 보헤미아인들은 어쩔 수 없이 군사를 일으켜 신성 로마 제국의 폭정에 반항해야 했다.
conquest_faction_desc_611=신성 로마 제국의 제후국 중 하나로, 바이에른 공국의 종속국에서 격상되어 독립된 공국이 되었다. 오스트리아 공작 알브레히트 2세는 신성 로마 제국의 황제 지기스문트의 사위로서 후계자로 지명되었는데, 이는 합스부르크 가문이 제국 황위에 손을 댈 수 있는 절호의 기회이다.
conquest_faction_desc_612=신성 로마 제국의 제후국 중 하나로, 동프랑크 왕국이 세운 자치 공국에서 비롯되었다. 바이에른 공국을 다스리던 비텔스바흐 가문은 여러 차례 신성 로마 제국의 황위를 취득했던 적이 있는데, 제국 내부가 불안정한 현재, 바이에른 공국은 제국의 대권을 다시 장악하려고 단단히 벼르고 있다.
conquest_faction_desc_613=튜턴 기사단이 프로이센 지역을 정복한 후 세운 기독교 국가이다. 튜턴 기사단은 한때 폴란드 왕국의 초청을 받고 프로이센 지역에 들어갔으나, 튜턴 기사단국이 세워진 이후 급속히 반목하였으며, 현재는 무장 충돌이 빈번하고 서로를 눈엣가시로 여기고 있다.
conquest_faction_desc_614=폴란드 왕관령이라고도 불리며, 폴란드 국왕이 실제로 지배하는 지역을 가리킨다. 튜턴 기사단이 프로이센 지역을 정복한 이후 이 욕심 많은 늑대들은 폴란드 왕국을 침공하기 시작하였다. 이 게르만족들을 프로이센에서 몰아내지 못한다면 폴란드 왕국은 영원히 평화를 되찾을 수 없을 것이다.
conquest_faction_desc_615=아를 왕국이 붕괴된 후, 사보이 가문이 이탈리아 북서부와 프랑스의 남동부 지역에 세운 독립 공국이다. 동·서 프랑크 왕국 사이에 위치한 사보이 공국은 두 강대국과 신중하게 지내야 한다.
conquest_faction_desc_616=이탈리아 롬바르디아 지역에 위치한 밀라노 공국은 명목상 신성 로마 제국 소속이지만, 공국의 독립성과 자주성은 매우 높았다. 알프스 산맥은 밀라노 공국에 천연 북부 방벽을 제공하여 공국은 이탈리아 북부 지역을 우선적으로 통일하기 위해 적극적으로 남진하려 한다.
conquest_faction_desc_617=원래는 이탈리아 북서쪽 해안 리구리아 지역에 위치한 상업 도시국가였는데, 십자군 전쟁으로 번창해졌고, 점차 서지중해의 가장 강성한 해양 공화국으로 발전하였다. 후에 이윤이 높은 향신료 무역을 놓고 베네치아 공화국과 쟁탈전을 벌일 때 제노바는 베네치아 공화국을 격파하지 못하여 현재는 잠시 침묵을 지킬 수밖에 없게 되었다.
conquest_faction_desc_618=서로마 제국이 야만족의 침입으로 멸망하자 이탈리아 북부 해안 지역의 주민들은 석호로 도망쳐 이곳에 정착지를 건립하였는데, 후에 이곳은 베네치아 공화국으로 발전하였다. 여러 차례의 베네치아-제노바 전쟁을 통하여 베네치아인은 제노바 공화국을 완전히 격파하고 자신들의 해상 패자로서의 실력을 과시하였다.
conquest_faction_desc_619=시칠리아 섬의 만종 전투 이후 아라곤 연합 왕국은 시칠리아 섬을 옛 시칠리아 왕국으로부터 분리했고, 옛 왕국의 이탈리아 영토는 나폴리 왕국으로 불리게 되었다. 나폴리 왕국은 시칠리아 섬의 분열을 절대 인정하지 않았고, 잃어버린 땅을 수복하려 하였다.
conquest_faction_desc_620=카스티야 왕국에 소속되었던 포르투갈 백국이 독립하여 세운 왕국이다. 유럽 대륙의 최서단에 위치한 포르투갈 왕국은 비록 외진 곳이지만, 포르투갈 왕국이 적극적인 확장 정책을 선택한다면, 독특한 지리적 위치 덕분에 여러 방향에서 적의 공격을 받는 궁지에서 벗어날 수 있다.
conquest_faction_desc_621=카스티야 왕국이 레온 왕국을 합병하여 세운 복합 군주국인 카스티야 연합 왕국은 레콩키스타 운동의 주요 추진자이다. 현재 이베리아 반도에 남아 있는 이슬람 세력은 매우 쇠약해졌으니 카스티야 연합 왕국은 이베리아 반도 전체를 통일하려 할지도 모른다.
conquest_faction_desc_622=아라곤 왕국과 바르셀로나 백국이 합병하여 세워진 복합 군주국인 아라곤 연합 왕국은 서지중해 해역의 주요 섬들을 장악하고 있었으며, 매우 강한 제해권을 갖추었다. 그리고 널리 분포된 이 섬들은 왕국이 유럽 대륙의 문제에 개입하는 훌륭한 발판이었다.
conquest_faction_desc_623=후우마이야 왕조가 해체된 후, 이베리아 반도에 현존하는 마지막 이슬람 왕국이다. 대부분의 이베리아 영토를 다시 장악한 기독교 세력에 직면한 그라나다 토후국의 처지는 매우 위태로워졌다. 다행히 이 기독교 국가들은 단결하지 않아 왕국은 여전히 한 가닥 삶의 희망이 남아 있다.

