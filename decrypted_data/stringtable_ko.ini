campaign_desc_601=새로운 천년이 시작된 시점에 끊임없이 확장하는 이슬람 제국은 세계를 지배할 경향을 보였고, 동로마 제국도 꿈틀거리고 있으며, 유럽 각국은 전염병의 타격으로 쇠퇴하고 있다. 이 시기 바이킹의 후예들은 서유럽을 분열시킨 동시에 미래 굴기의 추진자가 되었다. 그들 중 일부는 브리튼 해안에 상륙했고, 오트빌이라는 비천한 가문은 지중해에서 일련의 전설적인 이야기를 펼칠 것이다.
campaign_name_307=트로이의 보물
campaign_desc_307=트로이의 옛 유적지 아래에서 그들은 정교하고 아름다운 고대 그리스 보물을 발견했다. 그러나 여기는 여전히 위험하다. 이 보물들은 복수의 여신의 저주를 받은 것 같다.


