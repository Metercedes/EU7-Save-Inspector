general_desc_WuTianXinXuan=일본 전국 시대의 걸출한 무장으로서 전국 시대에서 가장 뛰어난 군사적 재능을 지닌 통수권자 중 한 사람으로 칭송받았다. 그가 든 '풍림화산' 군기는 <손자병법>에서 비롯된 것이지만, 다케다군의 상징이 되었다.
general_desc_WuTianXinXuan1=본명은 다케다 하루노부이고, '전국 최강의 명장', '전국 최고의 병법가'로 불리며, 가이노카미를 맡았기 때문에 '가이의 호랑이'라는 별칭도 있다. 그의 군단은 <손자병법>에서 유래한 '풍림화산' 전술로 무적의 명성을 얻었다.
general_desc_ShangShanQianXin=일본 전국 시대의 다이묘로서 후세에게 '에치고의 용', '전국 시대의 군신'으로 불린다. 그는 다케다 신겐, 호조 우지야스, 오다 노부나가 등과 자주 싸웠고, 이후 아시카가 쇼군가의 요청으로 상경했으나 결국 뜻을 이루지 못하고 죽었다.
general_desc_ShangShanQianXin1=에치고국의 나가오 다메카게의 막내아들로, 성인이 된 후 나가오 가게토라라고 불렀다. 간토 간레이인 '우에스기' 성씨를 계승하고, 우에스기 노리마사 및 쇼군 아시카가 요시테루로부터 각각 이름을 하사받아 '우에스기 마사토라', '우에스기 테루토라'라는 이름으로도 불렸다. 다케다 신겐과 함께 '용과 호랑이'로 불리는 전국시대의 영웅이다.
general_desc_Scanderbeg=알바니아 민족 영웅으로, 알바니아의 독립을 보장하기 위해 게릴라전의 형태로 강력한 오스만 제국에 맞서 싸워 여러 차례 오스만 제국의 공격을 물리쳤다.
general_desc_Matthias Corvinus=야노시 후냐디의 아들로, 15세에 공식적으로 헝가리 국왕으로 즉위했다. 재위 기간 동안 귀족들의 반란을 진압하고, 헝가리 흑군을 조직하여 오스만 제국을 여러 차례 격파하여 헝가리를 전성기로 이끌었다.
general_desc_Ivan the Terrible=모스크바 대공, 러시아의 첫 번째 차르. 재위 기간 동안 여러 개혁을 시행하여 러시아의 군사력을 크게 발전시켰다. 말년에 자신의 아들을 실수로 죽여, 결국 류릭 왕조의 쇠퇴를 초래했다.
general_desc_Gonzalo de Cordoba=스페인 제국의 명장, 스페인 방진의 창시자. 1503년 체리뇰라 전투에서 열세한 병력으로 프랑스군을 격파했으며, 이 전투 이후 스페인 육군은 유럽 대륙의 최강 육군이 되었다.
general_desc_Stefan Dusan=세르비아 국왕으로, 재위 기간 동안 비잔틴 제국의 내분을 이용하여 알바니아와 마케도니아 대부분 지역을 정복하고 '두샨 법전'을 편찬했다
general_desc_Bertrand du Guesclin=프랑스의 민족 영웅으로, '브르타뉴의 독수리'로 알려졌으며, 외모는 평범했다. 백년 전쟁 초기에 용감하게 싸워 빠르게 인정받고 중용되었으며, 평생 프랑스 왕을 위해 봉사했다.
general_desc_Clovis I=프랑크 왕국의 창시자로, 즉위 후 프랑크 부족들을 성공적으로 통일하고 골 지역을 정복하여 프랑크인들을 군주제 시대로 이끌었다.
general_desc_Casimir III the Great=전쟁이 아닌 외교적 수단으로 목표를 달성하고자 했던 폴란드 국왕으로, 폴란드의 민족 단결을 크게 강화하여 14세기 중부 유럽 지역의 강국으로 만들었다.
general_desc_Vytautas=리투아니아 대공, 드래곤 기사단 회원, 재임 기간 동안 끊임없이 영토를 확장하고 결국 리투아니아 국왕의 칭호를 얻었지만 폴란드인이 왕관을 가로막아 대관식을 완료하지 못했다.
general_desc_Afonso Henriques=포르투갈 독립 이후 첫 번째 왕으로, 1139년 포르투갈을 독립 왕국으로 만들었으며, 이후 무어인들과 계속 싸워 포르투갈 왕국의 영토를 확장했다.
general_desc_John II of Byzantium=비잔틴 제국 콤네노스 왕조의 두 번째 황제로, '선한 요한'으로 불렸으며, 재위 기간 동안 경건함과 친절함으로 유명했다.
general_desc_Barbarossa Hayreddin=15세기 터키 해적으로, 오스만 술탄의 지원을 받아 지중해의 해적들을 통합하고 지중해 연안 도시들을 끊임없이 습격하며, 일생 동안 바다에서 단 한 번도 패배하지 않았다.
general_desc_YueFei=금나라에 항거한 명장으로, 평생을 잃어버린 영토 회복에 바쳤으며, 여러 차례 소수의 군대로 다수의 적을 물리쳤다. 그가 이끈 '악가군'은 엄격한 군율로 유명했으며, '얼어 죽어도 집을 부수지 않고, 굶어 죽어도 약탈하지 않는다'는 말로 알려졌다.
general_desc_JinWuZhu=금나라의 명장으로, 본명은 완안종필이며, 금태조 완안아골타의 네 번째 아들이다. 요나라와 송나라 군대를 연이어 격파하고 남하하는 과정에서 모든 적을 제압했으나, 운명의 상대인 악비를 만날 때까지...

