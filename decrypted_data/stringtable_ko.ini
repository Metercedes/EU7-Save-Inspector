item_desc_3105=짧고 작은 도끼로 흔히 나무를 자르는 데 사용하지만, 필요 시 사람을 공격하는 데 사용할 수도 있다.
item_desc_3106=갑옷을 부수는 데 사용되는 짧은 무기로, 무게 중심이 앞으로 쏠려 있어 사용 시 쉽게 손에서 벗어날 수 있다.
item_desc_3154=숙련된 장인이 만든 매우 날카로운 곡도이다.
item_desc_3155=판갑에도 상당한 피해를 줄 수 있는 무기이지만, 사용자는 일정한 기술이 필요하다.
item_desc_3164=인도에서 유래한 군마로 추위와 더위를 잘 견디고 적응성이 뛰어나다.
item_desc_3199=신의 축복을 받았다고 전해지는 복잡한 무늬가 있는 대형 방패.
item_desc_3202=소가죽으로 만든 부츠로 가볍고 내마모성이 뛰어나다.
item_desc_3203=귀족들이 사냥할 때 신는 부츠로 아름다움과 실용성을 동시에 갖추었다.
item_desc_3204=기사가 전장에서 신는 부츠로 제작 공예가 복잡하지만, 유연성과 방어력이 뛰어나다.
item_desc_3205=저렴한 나무 방패지만, 사용하기 매우 편리하다.
item_desc_3206=제작 공예가 간단한 헬멧으로 필요 시 다른 용도로도 사용할 수 있다...
item_desc_3207=고대 그리스 헬멧을 개량한 헬멧으로 흔히 사슬 갑옷과 함께 사용한다.
item_desc_3208=보호 효과가 뛰어난 헬멧이지만, 시야가 약간 나쁘다…
item_desc_3209=철사로 만든 갑옷으로 주로 베기 무기의 공격을 막는 데 사용된다.
item_desc_3230=매우 위협적인 갑옷 파괴 무기로 맞으면 죽거나 심한 부상을 입게 된다.
item_desc_3264=베기 및 찌르기가 모두 가능한 무기로 다양한 상황에 사용할 수 있다.

