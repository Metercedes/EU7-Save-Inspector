battle_talk_150101=그들의 군대가 유럽을 떠난다는 소식을 들었다. 지금이 최고의 기회이다! 야습을 감행하여 침략자들을 몰아내자!
battle_talk_150102=좋아! 놈들이 손 쓸 새 없이 그들의 야영지를 습격하자!
battle_talk_150103=야영지가 함락돼서는 안 된다! 병력이 부족하더라도 탈환해야 한다! 오스만 제국이 얼마나 강한지 보여줘라.
battle_talk_150201=나를 물리치기 위해 오스만군을 경내로 끌어들이다니, 정말 한심하기 짝이 없군. 그들이야말로 우리의 진정한 적이라는 것을 너는 설마 모르느냐?
battle_talk_150202=나는 너희들이 다시는 우리의 영토를 침범하지 못하도록 우선 너희들을 섬멸할 것이다!
battle_talk_150203=우리가 발칸 반도 전체를 침공하는 것은 시간문제인 것 같다!
battle_talk_150204=적군이 계곡에 진입했다. 돌격하라!
battle_talk_150205=앗, 복병이 있다!
battle_talk_150301=이교도들의 세력 확장에 저항하기 위해 우리는 단결해야 한다. 그렇지 않으면 몇 년 내로 우리는 발칸 반도에서 설 자리를 잃게 될 것이다.
battle_talk_150302=자유를 위해! 침략자들을 몰아내자!
battle_talk_150303=이 패배한 자들이 어떻게 감히 또 다시 전쟁을 벌인단 말인가? 이번에는 너희를 완전히 없앨 것이다!
battle_talk_150304=그들과 함께 싸웁시다!
battle_talk_150305=그들의 공세에 직접 맞서지 말고, 마지막 방어지점을 지키면, 우리는 반드시 돌아와서 반격에 나설 것이다!
battle_talk_150401=술탄이 곧 돌아올 것이니 반격을 시작해야 한다! 반란군들이 죗값을 치르게 하라!
battle_talk_150402=나는 이 속국들의 도발적인 행동에 수치심을 느꼈다. 그들의 땅을 밟고 싶은 분노가 치밀어 오른다!
battle_talk_150403=오스만 제국의 공격 속도가 너무 빠르다. 왕좌를 지키고 싶다면 항복하는 수밖에 없다.
battle_talk_150404=우리가 우리의 형제 국가를 지원하지 않는다면 발칸 지역을 빼앗길 수도 있다. 빨리 가서 그들을 구출하자!
battle_talk_150501=코소보는 우리 민족의 발상지이자 매우 중요한 전략적 요충지이다. 코소보를 잃는다는 것은 우리의 발판을 잃는다는 것과 마찬가지이다.
battle_talk_150502=우리는 동맹을 맺어 튀르크족의 진격을 막아야 한다.
battle_talk_150503=아무도 우리를 막을 수 없다! 알라의 가호가 있기를!
battle_talk_150504=우리는 용감하게 전진해서 이 지역을 돌파해야 한다! 우리는 서쪽으로 영토를 더 확장할 수 있다!
battle_talk_150505=목숨을 바쳐서라도 나는 이 땅을 지킬 것이다.
battle_talk_150506=항복한다! 술탄에게 항복하게 해줘라!
battle_talk_150507=가까이 오게 하거라. 어떻게 생겼는지 보고 싶다.
battle_talk_150508=왕을 위하여! 세르비아를 위하여! 죽여라!
battle_talk_150509=안 돼!
battle_talk_150601=하나님의 영광이 다시 이 땅을 비추게 하소서! 여기에는 어둠과 절망만 보인다!
battle_talk_150602=우리는 억압받는 기독교인들과 로마 제국을 구원해야 한다! 돌격하라!
battle_talk_150603=걱정하지 마라! 그들은 그냥 임시로 모인 오합지졸일 뿐이다!
battle_talk_150604=그러나 그들의 중기병은 매우 강력하므로 우리는 그들의 첫 번째 공격을 막아내야 한다!
battle_talk_150605=우리가 실패할 거라고는 생각지도 못했다! 우리는 너무 자만했다.
battle_talk_150701=나의 제국은 당신의 땅이 필요하고, 우리의 깃발은 세계의 가장자리에 펄럭일 것이다!
battle_talk_150702=아참, 아나톨리아의 도시 방어가 허전하다. 어서 구원해야 한다!
battle_talk_150703=모두 힘을 합쳐 제압하라! 앙카라는 내 것이다!
battle_talk_150704=안 돼, 나의 실수는 제국의 멸앙을 초래할 것이다!
battle_talk_150801=콘스탄티노플을 공략하라! 우리는 발칸 반도의 진정한 주인이 될 것이다!
battle_talk_150802=대군이 국경을 덮치고 있다. 우리는 반드시 끝까지 고수해야 나라를 지킬 수 있다!
battle_talk_150803=오스만 제국은 새로운 지도자를 맞이하여 흔들리고 있다. 지금이 반격할 수 있는 최고의 기회이다! 공격하라!
battle_talk_150804=당분간 콘스탄티노플 공격 계획을 포기해야 할 것 같다. 우선 이 저항자들을 제거하자!
battle_talk_150901=제국은 더 이상 다른 도시의 방어를 유지할 수 없게 되었다. 테살로니키를 베네치아인에게 맡기는 것이 가장 좋은 선택이다.
battle_talk_150902=이 도시는 오스만에 속해야 한다. 아직까지 너희들에게는 항복할 기회가 있다.
battle_talk_150903=이 도시가 우리에게 귀속된 이상, 포기할 가능성은 전혀 없다.
battle_talk_150904=오스만 제국이 테살로니키를 공격하여 콘스탄티노플의 압력이 줄어들었지만, 상황은 여전히 낙관적이지 않다.
battle_talk_150905=이 도시는 이제 오스만 제국에 속하게 되었다. 베네치아 함대도 우리를 막을 수 없을 것이다.
battle_talk_150906=테살로니키가 위기에 빠졌지만, 우리 함대는 오스만 함대에 의해 봉쇄되었다. 테살로니키를 돕기 위해서는 즉시 봉쇄를 뚫어야 한다.
battle_talk_150907=로마인들은 베네치아인들이 받는 압력을 완화하기 위해 공격을 감행하려고 함부로 시도했다. 그러나 이러한 행동은 아무런 의미가 없다.
battle_talk_150908=해역을 봉쇄한 오스만 함대가 격파되었다. 함대는 계속 전진하라!
battle_talk_150909=적이 반격을 발동했다. 우리의 예비 병력을 보내라.
battle_talk_151001=현재 오스만 제국은 어린 술탄이 이끌고 있으니 그들의 군대는 혼란스러울 수밖에 없다. 우리는 이 기회를 이용하여 승리를 위해 공세를 실시해야 한다!
battle_talk_151002=몹쓸 기독교인들이 나의 퇴위 생활을 방해하다니! 공격하라!
battle_talk_151003=방어선을 펼쳐라! 우리는 적의 공격에 끝까지 맞서 진지를 지켜내야 한다! 우리 뒤에는 바다뿐이고, 더 이상 물러설 곳이 없다.
battle_talk_151004=왕이 희생되었다. 후퇴하라! 내가 복수할 것이다!
battle_talk_151101=왕을 위하여! 헝가리를 위하여! 왕의 복수를 위하여! 내가 다시 돌아왔다. 복수! 복수!
battle_talk_151102=그들의 중기병은 강력하지만, 우리의 예리한 검과 화승총을 막을 수는 없다! 오스만 제국의 미래는 너한테 달려 있으니 오늘 전투 상황을 주의 깊게 지켜봐야 한다.
battle_talk_151103=네, 아버지!
battle_talk_151104=우리는 적을 격퇴했다! 반격하라!
battle_talk_151201=화포로 로마의 문을 열고, 로마 제국의 수도를 점령하라! 이 땅은 우리의 것이어야 한다.
battle_talk_151202=장병들이여, 우리는 이 도시를 끝까지 지켜야 한다. 이곳은 우리 가족과 신앙이 있는 우리의 고향이다. 우리는 끝까지 싸울 것이다!
battle_talk_151203=대포는 내 살과 피를 묻을 수 있지만, 우리의 신앙과 결심은 결코 묻을 수 없다!
battle_talk_151204=마침내 선조의 소원을 이루었다! 알라신은 반드시 우리를 지켜 주시리라. 나는 당신의 교리를 온 유럽에 널리 전파할 것이다!

battle_talk_700601=우리의 전략은 티베리아스를 포위하여 프랑크군이 구원하러 오도록 유인하는 것이다. 우리의 강점은 공성과 수성이 아니라 야전에 있다.
battle_talk_700602=우리가 이런 식으로 구조하러 가는 것은 너무 위험하지 않은가. 어쩌면 음모의 냄새가 나는 것 같다.
battle_talk_700603=어쨌든 우리는 구조하러 가야 한다. 가자! 신이 우리를 수호하실 것이다!
battle_talk_700604=성전 기사단은 살라딘이 뒤에서 우리를 포위하지 못하도록 후방을 지켜라.
battle_talk_700605=우리는 가능한 한 빨리 갈릴리 호수로 가서 물과 보급품을 보충해야 한다. 우리 부대는 물이 부족해서 더 이상 버틸 수 없는 지경에 이르렀다.
battle_talk_700606=전방 살라딘의 방어선을 뚫을 수 없으니 후퇴를 고려해야 할 것 같다.
battle_talk_700607=포위망을 뚫어야 한 가닥 삶의 희망이 있다! 맙소사, 우리 모두 여기서 죽을 것이다! 왕국 전체도 멸망할 것이다!
battle_talk_700608=놈들이 물가에 접근하지 못하도록 막아라! 프랑크족은 지쳐서 싸울 힘이 없게 되었다. 이 기회를 틈타 그들을 섬멸할 수 있다.
battle_talk_700609=단결되지 못한 이 프랑크 군대는 실패할 수밖에 없고, 예루살렘도 이제 주인을 바꿀 때가 된 것 같다.
battle_talk_700610=맙소사, 나만 탈출했네. 어쩌면 이 전투는 처음부터 실수였을 지도 몰라.

battle_talk_56=장병들이여, 나를 따라 돌격하라. 승리는 눈앞에 있고, 영광은 우리의 것이다.
battle_talk_57=진형을 유지하라, 알라께서 우리와 함께하신다!
battle_talk_58=오스만군은 끊임없이 주변 토지를 침범하고 있으며, 언젠가는 지난날의 원수를 갚으러 올 것이다. 그들이 계속 실력을 키우는 것을 지켜만 볼 수 없다. 그들이 발칸의 수렁에 빠져 있는 동안, 그들을 공격하라!
battle_talk_59=오스만 제국의 대포가 도시 성벽 아래에 설치되어 콘스탄티노플이 위태로워졌으니, 나를 따라 지원하러 갑시다.
battle_talk_60=우리의 성벽은 무너졌지만, 우리의 마음은 여전히 굳건하다. 놈들은 내 시체를 밟지 않는 한 이 도시를 차지하지 못할 것이다.
battle_talk_61=모든 사람은 쉽게 믿어서는 안 된다. 이제 내 모든 것을 되찾았으니 모든 원한을 피로 갚아라.
battle_talk_62=체페슈가 나를 도와 대공의 자리를 되찾았으니, 내가 그를 도와 주겠다.
battle_talk_63=비잔티움 제국의 영광은 우리가 계승할 것이다. 오늘부터 우리가 바로 비잔티움 제국이다!
battle_talk_64=카라 코윤루 왕조가 멸망하자, 서방 세계의 지원군도 바다에서 출발하여 전력을 다해 오스만을 공격했다.

general_desc_Murad I=무라트 1세는 오스만 제국의 술탄으로 재위 기간 동안 영토 확장 정책을 추진하여 동남유럽과 서아시아의 많은 국가를 정복하고 오스만 튀르크 제국의 부흥의 토대를 마련했지만 코소보 전투에서 암살당했다.
general_desc_Bayezid I=무라트 1세의 아들로서 '번개'라고 불리는 유명한 군 통수권자이다. 그는 재위 동안 니코폴리스에서 수십만 명의 십자군을 물리치며 오스만 영토 확장에 크게 기여했지만 앙카라 전투에서 포로로 잡혔다.
general_desc_Murad II=무라트 2세는 통치 기간 동안 국가를 부흥시키고 군대를 재정비했으며 오스만 제국의 분열을 막고 이후 오스만 제국의 영광을 위해 튼튼한 기반을 닦았다.
general_desc_John Hunyadi=헝가리 왕국의 국민 영웅이자 "백기사"라는 별명을 가졌다. 그는 거듭된 패배에도 불구하고 오스만 제국의 힘에 맞서 오랫동안 오스만 제국의 확장을 막아왔다.
general_desc_Princess Sophia=콘스탄티노스 11세의 조카딸인 그녀는 모스크바 대공 이반 3세와 결혼하였으며, 이반 3세를 도와 러시아인들을 이끌고 수 세기에 걸친 킵차크 칸국의 통치에서 완전히 벗어나게 하였다.
general_desc_Stephen the Great=그는 재위 기간 동안 국가의 안정을 유지했고 후대 루마니아인들에게 그의 민족 독립 정신을 따르도록 영감을 주었다. 수백년 후 그는 교회에 의해 "위대하고 거룩한 슈테판"으로 시성되었다.
general_desc_Vlad III=왈라키아 공국의 대공으로, 매우 용맹했고 루마니아를 수호한 영웅이지만, 귀족과 백성들에게 꼬챙이형을 가해 '가시공'으로도 불린다. 그는 뱀파이어의 모델이기도 하다. 
general_desc_Charlemagne2=샤를마뉴 대제는 프랑크 왕국의 가장 위대한 왕 중 한 명이자 중세 유럽에서 가장 영향력 있는 인물 중 한 명이었다. 그는 유럽의 절반 이상을 정복하고 교황에 의해 '로마인의 황제'라는 대관식을 받았다.
general_desc_Arthur2=바위에 꼽힌 칼을 뽑는 사람만이 잉글랜드의 왕이 될 수 있다는 전설이 있었는데, 아서왕은 성공적으로 검을 뽑아낸 후 국민의 '영원한 왕'이 되었으며, 영웅주의와 기사도 정신 및 정의를 대표하게 되었다.
general_desc_Mehmed the Conqueror2=그의 용기, 지도력, 문화적 업적 때문에 메흐메트 2세는 '술탄의 정복자'이자 '유럽의 정복자'로 추앙받았다. 그는 후대 술탄의 모범이자 영감의 원천이 되었다.
general_desc_Candarli Halil=할릴 파샤는 오스만 제국의 저명한 정치가이자 장군으로서 15세기 중반에 오스만 제국의 재상과 총사령관을 역임했다. 그는 용감하고, 뛰어난 지혜와 지도력을 갖췄기 때문에 '튀르크의 두뇌'와 '할릴 대가'로 불렸고 존경 받았다.

