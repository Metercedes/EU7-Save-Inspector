stage_name_4689=코소보 진격
stage_name_4690=코소보 진격
stage_name_4691=베오그라드 방어전
stage_name_4692=베오그라드 방어전

stage_intro_4681=헝가리 귀족 가문에서 태어난 후녀디 야노시는 오스만 제국의 확장과 침략에 맞서 유럽을 지키는 데 평생을 바쳤으며 '백기사'로 불렸다.
stage_intro_4683=1442년, 후녀디는 오스만 군대와의 첫 싸움에서 패배한 불리한 상황에서도 수일 동안 싸워 최종적으로 줄러페헤르바르에서 진격해오는 오스만 군대를 격파했다.
stage_intro_4685=1443년부터 교황의 지원을 받은 후녀디는 세르비아 원정을 시작했고, 여러 차례 자신보다 더 많은 수량의 오스만 군대를 이겨 오스만 제국을 거의 전멸시킬 뻔했다.
stage_intro_4687=1444년, 헝가리 왕 브와디스와프 3세가 직접 군대를 이끌고 바르나 항구 근처에서 오스만 제국군과 전투를 벌였다. 그러나 브와디스와프 3세는 전투에서 너무 급진적이었기 때문에 난군 중에 목숨을 잃었고 헝가리군도 패배를 당했다.
stage_intro_4689=1448년, 후녀디는 오스만 군대에 저항하는 현지 세력과 합류하기 위해 소규모 정예 부대를 이끌고 코소보 지역으로 진입하려 했으나 계획이 유출되어 실패했다.
stage_intro_4691=1456년, 오스만 술탄 메흐메트 2세는 베오그라드를 포위하기 위해 군대를 집결하였다. 위기에 처한 후녀디는 군대를 이끌고 용감하게 싸웠고, 결국 헝가리 수비군의 몇 배에 달하는 오스만 군대와 싸워 이겼다.

