general_source_10=기간 한정 콜라보 이벤트!

general_desc_Roger II1=시칠리아 왕국의 창시자이자 지혜와 야망을 겸비한 위대한 군주. 그는 문화적, 종교적 차이를 초월하여 넓은 가슴과 뛰어난 능력으로 왕국 내에서 다양한 민족과 신앙을 통합했다.
general_desc_Li Shimin1=당나라 전쟁의 신, 탁월한 군사적 재능으로 사방을 정복하며 무적의 능력을 자랑했다. 그러나 그의 눈부신 광채는 그의 아버지와 형제들에게 있어 무시할 수 없는 위협이 되었다. 권력의 소용돌이 속에서 그는 경외의 대상이자 헤아릴 수 없는 천재였다.
general_desc_Wu Zetian1=마치 막 피기 시작한 꽃처럼, 소녀 시절의 무측천은 아름답고 영리했으며, 그녀의 몸짓과 행동에는 젊음의 우아함과 순수함이 묻어났다. 이 시기 그녀는 권력과 야망에 물들지 않았고, 가슴속에 소녀의 순수함과 동경을 품고 있었다. 그 모습은 마치 한 폭의 아름다운 그림처럼 사람들을 매료시켰다.
general_desc_ZhiTianXinChang=일본 전국 시대의 뛰어난 지도자로서 뛰어난 지혜와 군사 전략으로 유명하다. 그는 일본 중부 지방을 통일하고 강력한 세력을 구축했으며 도요토미 히데요시, 도쿠가와 이에야스와 함께 '전국 3영걸'로 불렸다. 
general_desc_ZhiTianXinChang1=혼노지의 변 이후, 아케치 미쓰히데를 포함한 모든 사람은 오다 노부나가가 죽은 줄 알았다. 하지만 도망쳐 나온 오다 노부나가는 피와 화염 속에서 다시 태어나 마왕이 되어 돌아왔다!
general_desc_Pope Gregory IX=그는 가톨릭 교회의 지도자이자 교황령의 통치자이다.

