stage_intro_4821=1249년, 프랑스 왕 루이 9세가 이집트를 침공하기 위해 십자군 원정을 일으키자, 아이유브 왕조의 술탄 살리흐가 군대를 이끌고 만수라로 가서 싸웠으나 급병으로 사망했다. 이 위난의 시기에 임명 받은 바이바르스는 만수라에서 십자군을 격파했다.
stage_intro_4823=십자군이 만수라에서 패배하여 보급품이 곧 바닥날 지경이 되자 바이바르스는 기회를 예리하게 포착하여 파리스크르에서 후퇴하는 십자군을 따라잡고 루이 9세를 포로로 잡았다.
stage_intro_4825=1260년, 장군 키트부카의 지휘 아래 몽골군은 시리아를 점령하고 계속해서 서쪽으로 진군했다. 바이바르스는 이집트 군대를 이끌고 아인 잘루트에서 몽골군과 싸웠다.
stage_intro_4827=1266년, 바이바르스는 킬리키아 아르메니아를 물리쳐 중동에서 몽골의 세력을 크게 약화시켰다.
stage_intro_4829=1268년, 바이바르스는 십자군이 중동에서 세운 가장 강력한 정권인 안티오키아 공국을 멸망시켰다. 그 이후로 중동 지역에서 십자군 세력은 쇠퇴하기 시작했다.
stage_intro_4831=1271년, 잉글랜드 왕자 장경왕 에드워드(훗날 에드워드 1세)는 제9차 십자군을 조직했고, 바이바르스는 그를 격퇴하는 데 성공했다.

