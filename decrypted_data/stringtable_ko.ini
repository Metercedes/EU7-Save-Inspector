stage_intro_30301=아름다운 주디엔이 나타나지 않았다면, 24살의 루제루 보소는 노르망디의 텅 빈 집에 영원히 남았을지도 모른다. 그들은 첫눈에 서로 반했지만 신분과 지위의 차이가 너무나 컸다. 주디엔은 정복자 윌리엄의 사촌 누이였지만, 로제는 땅도 재산도 없는 젊은이였다. 사랑을 이루기 위해 로제는 이탈리아로 가서 그의 형인 로베르 기스카르에게 몸을 의탁하기로 결정했다.
stage_intro_30302=이미 죽은 형 옹프루아의 이탈리아의 땅과 작위를 물려받은 로베르 기스카르는 형과 비슷한 방식으로 행동했지만, 한 가지 다른 점이라면 16살 어린 동생에게 아무런 땅도 나눠줄 생각이 없다는 것이었다. 하지만 로베르는 더 많은 땅을 정복하기 위해 이 동생의 도움이 필요했다. 그 후 5년 동안, 로제는 형을 도와 칼라브리아 전역을 정복했다.
stage_intro_30303=시칠리아는 9세기부터 사라센족의 지배를 받아왔지만, 그들은 철통같은 존재는 아니었다. 이븐 툼나는 전 총독을 죽이고 그의 미망인을 차지했다. 미망인의 오빠인 메시나의 아미르는 이븐 툼나를 공개 수배했다. 추격을 피하기 위해 이븐 툼나는 이탈리아로 도망쳤고, 결국 루제루에게 도움을 요청하여 루제루가 시칠리아로 진군할 수 있는 기회를 제공했다.
stage_intro_30304=부와 땅에 대한 욕망이 몹시 큰 루제루는 형 로베르보다 먼저 시칠리아에 상륙하기로 결심했다.
stage_intro_30305=시칠리아에서 발판을 마련한 루제루는 아미르에게 치명적인 타격을 가하기 위해 엔나 요새를 점령하는 것을 다음 목표로 삼았다. 그러나 그들은 성에 도착했을 때 요새의 방어력이 매우 견고하다는 것을 발견했다. 설상가상으로 아미르는 모든 병력을 결집해 고립된 노르만족을 전멸시키려는 반격을 준비하고 있었다.
stage_intro_30306=큰 승리를 거둔 후, 로베르 기스카르와 루제루 사이에는 점차 긴장감이 감돌았다. 트로이나를 점령한 후, 상황을 고려한 루제루는 이탈리아로 돌아갔고, 그토록 그리워하던 주디엔을 다시 만났다. 알고 보니, 주디엔의 아버지는 노르망디 윌리엄 공작과 갈등을 빚어 가족과 함께 이탈리아로 이주한 것이다. 루제루는 주디엔에게 청혼했고, 그녀의 아버지로부터 허락을 받았으나, 기스카르는 여전히 동생에게 토지를 나눠줄 것을 거부했다.
stage_intro_30307=더 이상 어린 소년이 아닌 루제루는 칼라브리아에서 그의 형인 로베르 기스카르와 결전을 벌였다. 비록 로베르가 교활한 동생을 물리쳤지만, 루제루는 형과 화해하고 함께 시칠리아로 향했다.
stage_intro_30308=루제루와 부인 주디엔은 다시 시칠리아로 돌아와 사라센족의 위협에 시달리던 트로이나 주민들을 보호하기 시작했다. 하지만 1062년 말, 루제루가 니코시아를 점령하기 위해 떠난 사이 이븐 하와스는 기습을 감행해 트로이나에 남아 있던 주디엔 부인을 잡으려 했다. 이 소식을 들은 루제루는 애타는 마음으로 아내를 구하기 위해 곧바로 돌아갔다.
stage_intro_30309=루제루는 신앙과 인종을 구분하지 않고 현지 주민들과의 화합에 힘썼다. 하지만 북아프리카의 사라센족은 시칠리아에 대한 지배권을 다시 주장하며, 아이유브 왕자에게 3만 5천 명의 군대를 이끌고 시칠리아를 공격하라고 명령했다. 루제루는 살라미에서 기사 130명과 보병 300명으로 강력한 적군과 정면으로 맞섰다.
stage_intro_30310=루제루는 1064년에 팔레르모를 점령하려다 실패했고, 이때 아이유브 왕자는 다시 군대를 집결하여 노르만족에 도전했다. 행군 도중, 루제루와 아이유브 왕자는 다시 마주쳤고, 양군의 병력 차이는 여전히 매우 컸다.
stage_intro_30311=로베르 기스카르는 바리를 점령한 후, 시선을 시칠리아로 돌렸다. 1071년, 루제루는 시칠리아 백작의 칭호를 받았고, 로베르는 메시나와 발몽을 보유했다. 1072년, 루제루는 형과 함께 팔레르모를 공격했다.
stage_intro_30312=1077년, 루제루는 시칠리아 서부에 남은 두 개의 사라센 거점 중 하나인 트라파니를 포위했다. 1079년, 타오르미나가 포위되었고, 1081년에 루제루는 카타니아를 정복했다. 유일한 아쉬움은, 그가 사랑하는 사람 주디엔이 1080년에 세상을 떠난 것이다.
stage_intro_30313=기스카르가 세상을 떠났을 때, 노르만족의 시칠리아 정복은 아직 완료되지 않은 상태였고, 그의 아들들은 상속권을 놓고 내전을 벌였다. 이로 인해 시칠리아 정복의 중책은 루제루의 어깨에 맡겨지게 되었다.
stage_intro_30314=1091년, 북아프리카 사라센족의 공격을 피하기 위해 루제루는 함대를 이끌고 몰타 섬을 정복했다.
stage_intro_30315=루제루의 시칠리아 통치는 매우 성공적이었다. 그는 중립을 선언하고 정부를 간소화했으며 자유로운 종교 정책을 시행했고 당시 유일하게 십자군 원정에 참여하지 않은 유럽 군주가 되었다. 그의 통치 아래 시칠리아는 전례 없는 안정과 번영을 누렸고, 시칠리아의 백성은 그를 '위대한 백작'이라 부르며 존경했다.

stage_intro_30401=루제루 1세가 죽은 후, 시칠리아의 정세는 매우 안정적이었다. 그의 장남 시모네가 불과 8살로 즉위했고, 어머니 아델라시아가 섭정을 맡았다. 하지만 4년 후, 12살의 시모네가 갑작스럽게 사망하자 왕위는 10살인 루제루 2세에게로 넘어갔고, 그가 16살이 되던 해에 아델라시아는 섭정을 포기하고 예루살렘의 왕 보두앵 1세와 결혼했다.
stage_intro_30402=루제루 2세는 아버지가 이룩한 번영을 물려받고 야망을 불태우며 방어와 확장을 위해 강력한 해군을 건설하기 시작했다. 그는 단지 명분만을 기다리고 있었다. 그러던 중 마디아의 아미르가 니코테라를 공격해 도시를 파괴하자 루제루 2세에게 침략의 명분을 제공했다.
stage_intro_30403=권력 투쟁의 와중에 예루살렘의 족장은 루제루의 어머니 아델라시아와 보두앵 1세의 혼인을 무효로 선언하자, 아델라시아는 어쩔 수 없이 시칠리아로 돌아가야 했다. 이 사건으로 루제루 2세는 깊은 굴욕감을 느꼈다.
stage_intro_30404=루제루 2세의 아버지는 몰타를 침공했지만, 섬을 완전히 점령하지는 못했다. 루제루 2세는 시칠리아 근처에 사라센족의 존재를 용납할 수 없어 1127년에 사라센족의 위협을 철저히 제거하기로 결심했다.
stage_intro_30405=이탈리아 아풀리아에서 윌리엄 2세가 갑작스럽게 세상을 떠나자, 루제루 2세는 계승권에 따라 칼라브리아를 상속받게 되었다. 그러나 교황은 노르만인이 시칠리아와 이탈리아 서부를 완전히 지배하는 것을 원치 않았기 때문에 1127년 말, 교황은 루제루 2세에 대한 십자군 원정을 선포했다. 드렝고 가문의 라눌프 2세는 이 상황을 이용해 반란을 일으켰다.
stage_intro_30406=루제루 2세는 잔혹한 학살자가 아니라, 동로마 황제들처럼 외교적 수단을 통해 승리를 거두는 것을 선호했다. 루제루의 군대가 규율이 엄격하고 기동력이 뛰어난 것에 비해, 적군은 조직력과 응집력이 약했다. 1128년, 루제루 2세의 군대에 압도당한 동맹군은 철수했고, 교황은 베네벤토 성 외곽에서 그를 아풀리아, 칼라브리아, 시칠리아의 공작으로 임명할 수밖에 없었다.
stage_intro_30407=교황이 죽은 후, 로마에는 두 개의 대립 세력이 나타났다. 개혁파 아나클레투스는 정치적 지지를 얻기 위해 루제루 2세를 왕으로 즉위시키기로 결정했다. 1130년 크리스마스 날, 팔레르모 시민들은 처음으로 새로운 왕을 만나게 되었다.
stage_intro_30408=1132년 7월 24일, 노르만족의 탐욕으로 인해 라눌프는 카푸아의 로베르 2세, 나폴리의 세르지오 7세와 동맹을 맺고 루제루 2세에 대항하기로 했다.
stage_intro_30409=루제루 2세가 화려한 방식으로 왕위에 올랐지만, 그가 가짜 교황을 지지한 일은 다른 교황 인노켄티우스를 지지하는 기독교인들의 불만을 샀고, 이로 인해 더 많은 세력이 인노켄티우스 진영에 가입하게 되었다. 1133년, 신성 로마 황제 로타르가 마침내 이탈리아에 도착했다.
stage_intro_30410=로타르가 대관식을 치른 후, 신성 로마 제국의 내정은 크게 개선되었다. 그는 1년 동안 군대를 모아 다시 알프스를 넘어 북부 이탈리아로 진군했는데, 그곳에서는 거의 저항이 없었다. 인노켄티우스 교황은 교황청을 이끌고 로타르의 진영에 합류했으며, 비잔티움의 요안니스 2세 황제 및 베네치아 왕국과 연합하여 시칠리아를 공격했다.
stage_intro_30411=1137년 10월 30일, 새로 임명된 아풀리아 공작 라눌프는 로타르 황제에게 빌린 독일군을 이끌고 루제루 2세를 공격했다. 루제루의 적은 라눌프뿐만 아니라 그의 전 동맹이었던 세르지오도 포함되었다.
stage_intro_30412=몇 달 후, 루제루 2세가 지지하던 아나클레투스 2세 교황도 죽자 인노켄티우스 교황이 논리적으로 정당한 교황이 되었다. 루제루 2세는 새로운 교황과의 화해를 시도했지만, 인노켄티우스 교황은 직접 군대를 모아 공격을 감행했다.
stage_intro_30413=루제루 2세는 10년 동안 분투하고, 두 황제와 한 교황을 물리치면서 큰 걸림돌들을 제거했다. 그는 법률을 통합하고 강력한 중앙집권 국가를 건설하기 시작했다.
stage_intro_30414=신성 로마 제국과 동로마 제국은 과거의 치욕을 잊지 않고, 여러 차례 힘을 합쳐 시칠리아를 공격했다. 그러나 그들에게 신의 가호가 없었던 듯, 시칠리아는 루제루 2세의 통치 아래 번영을 이루었으며, 1154년에 루제루 2세는 팔레르모에서 평화롭게 죽음을 맞이했다. 그의 검에는 '아풀리아, 칼라브리아, 시칠리아, 아프리카는 모두 내 것이다'라는 문구가 새겨져 있었다.

stage_intro_30501=시칠리아 여왕 쿠스탄차는 신성 로마 제국의 황제 하인리히 6세와 결혼한지 9년 만에 임신하게 되었다. 1194년, 하인리히 6세가 대관식을 위해 시칠리아로 갔을 때 프리드리히 2세는 크리스마스 둘째 날에 태어났다. 천막에서 태어난 이 아이는 유럽의 역사를 뒤바꿀 운명이었다.
stage_intro_30502=프리드리히 2세는 두 살이 되어서야 세례를 받았는데, 이는 그가 아버지 하인리히 6세와 친밀하게 접촉한 유일한 순간이 되었다. 프리드리히가 태어난 지 얼마 지나지 않아 하인리히 6세는 갑작스럽게 세상을 떠났고, 프리드리히는 유일한 후계자가 되었다. 그러나 아버지의 죽음은 곧바로 권력 투쟁을 촉발시켰는데, 프리드리히 외에도 그의 삼촌 필리프와 교황의 지원을 받는 작센 공작 브라운슈바이크의 오토 등 두 명의 경쟁자가 있었다. 프리드리히의 어머니 쿠스탄차 여왕은 아들을 데리고 독일을 떠나 시칠리아 왕국을 임시로 통치하기로 결정했다. 그러나 1198년에 쿠스탄차마저 사망하면서 프리드리히의 운명은 한층 더 불확실해졌다.
stage_intro_30503=외로운 소년 프리드리히는 평화로운 환경 속에서 자라지 못했다. 시칠리아 왕국은 여러 세력에 의해 지배되었고, 프리드리히는 단지 여러 세력의 바둑알에 불과했다. 14세의 나이에 프리드리히는 교황에 의해 정략 결혼을 하게 되었고, 그보다 10살 연상의 아내가 데려온 기사 500명은 그가 권력의 정점에 오르는 데 결정적인 열쇠가 되었다.
stage_intro_30504=프리드리히가 16세 때, 그의 삼촌인 독일의 필리프가 암살당했다. 이 사건을 계기로 교황 인노켄티우스 3세는 프리드리히를 독일 왕으로 세우기로 결정했다. 하지만 프리드리히가 왕위에 오르는 길은 결코 순탄치 않았다. 오토는 북이탈리아에서 그의 즉위를 막으려 했지만, 프리드리히는 능숙하게 적의 추격을 피했고, 결국 마인츠 대성당에서 대관식을 치르고 신성 로마 제국의 정당한 후계자로 거듭났다.
stage_intro_30505=프리드리히 2세가 시칠리아 왕국을 물려받지 않겠다고 선언하자 교황 이노켄티우스 3세는 안도의 한숨을 내쉬었지만, 교황은 얼마 지나지 않아 죽었다. 교황이 죽은 지 몇 달 후, 프리드리히 2세는 아내와 아들을 자신의 곁으로 불러들여 독일에서의 통치 기반을 강화했다.
stage_intro_30506=잉글랜드의 사자심왕 리처드가 전사한 후, 프랑스 왕 필리프 2세는 이 기회를 틈타 잉글랜드의 세력을 제거하기 위해 프리드리히 2세를 초청해 샹파뉴 계승 전쟁의 해결에 참여시키기로 했다. 프리드리히 2세는 이 제안을 흔쾌히 받아들여 전쟁 승리의 발판을 마련했다.
stage_intro_30507=1220년 11월 20일, 프리드리히 2세는 로마에서 성대한 대관식을 열고 신성 로마 제국의 황제가 되었다. 그는 왕관을 높이 들고 오른손에는 검을, 왼손에는 홀을 들고 기독교 교회의 수호자가 되어 십자군 원정을 수행하고 이단을 근절할 것을 엄숙히 맹세했다. 황후 쿠스탄차는 남편의 뒤에 무릎을 꿇고 함께 대관식을 받았다.
stage_intro_30508=프리드리히 2세는 개혁과 건설에 전념하며, 이탈리아 남부와 시칠리아를 순찰했다. 그는 '카푸아 헌장'을 반포하고 포자에 황궁을 건설하는 한편, 시칠리아 해군을 재건했다. 또한 유럽 최초의 국립대학인 나폴리대학을 설립해 문화와 학문의 부흥을 도모했다.
stage_intro_30509=프리드리히 2세는 왕권 강화에 몰두했지만, 교황은 그가 제5차 십자군 전쟁에 참여하지 않은 것을 계속 비난했다. 한편, 프리드리히 2세는 이슬람 세계의 통치자들과 꾸준히 접촉했고, 결국 이집트 술탄과 평화 협상에 성공하여 예루살렘을 탈환하는 데 성공했다. 1229년, 프리드리히 2세는 예루살렘 왕으로 즉위했는데, 이 업적은 교황의 큰 불만을 불러일으켰다.
stage_intro_30510=교황 그레고리오 9세는 프리드리히 2세가 '불신자'와 평화를 맺은 것에 분노했다. 교황은 전 예루살렘 왕에게 시칠리아 침공을 명령했고, 프리드리히 2세는 고향을 지키기 위해 귀국할 수밖에 없었다.
stage_intro_30511=1231년, 프리드리히 2세는 '멜피 헌장'을 공포했다. 이 중세 헌장은 신성 로마 제국이 군주제 체제로 전환하는 것을 상징하는 획기적인 것이었다. 그러나 교황은 이를 강력히 비난하며 프리드리히의 조치를 교황의 권위에 대한 도전으로 간주했다. 이 결정은 프리드리히와 교회와의 장기적인 대립의 불씨가 되었다.
stage_intro_30512=이탈리아 북부의 롬바르디아 동맹은 신성 로마 제국의 통치하에 완전히 편입되지 않았고, 밀라노가 이끄는 이 지역의 자치 도시국가들은 시칠리아 왕국과 독일 왕국 사이의 장벽 역할을 했다. 교황의 지원을 받은 롬바르디아 동맹은 다시 한 번 프리드리히 2세와 대립하게 되었다.
stage_intro_30513=지난해의 승리로 프리드리히 2세는 이탈리아 북부의 동부 지역을 정복하는 데 성공했다. 프리드리히의 다음 목표는 만토바를 점령하는 것이며, 이 승리는 독일과의 연결을 확보하고 북서이탈리아의 동맹 세력에 대한 공격을 위한 기반을 마련했다.
stage_intro_30514=브레시아는 베로나와 베르가모를 연결하는 주요 교통로에 위치해 있으며, 프리드리히 2세는 이곳을 롬바르디아 동맹의 보급로를 차단하는 데 매우 중요한 목표로 삼았다. 공성 부대는 강력했지만, 수비군의 완강한 저항과 예상치 못한 전술로 인해 프리드리히 2세는 고전을 면치 못했다.
stage_intro_30515=1239년, 프리드리히는 세 번이나 파문당했으며, 교황 그레고리오 9세가 제노바와 베네치아를 연합하여 해상에서 시칠리아 왕국을 공격하자 프리드리히는 교황과의 전쟁에 직면하게 되었다. 결국 프리드리히의 군대는 승리를 거두고 로마로 진군하기 시작했다.
stage_intro_30516=1243년, 새로운 교황 인노첸시오 4세가 즉위했지만, 프리드리히 2세와의 갈등은 완화되지 않았다. 인노첸시오 4세는 프리드리히의 왕위와 시칠리아를 박탈했을 뿐만 아니라, 교회의 권력을 독일과 롬바르디아 지역까지 확장하려 했고, 1246년에는 프리드리히와 그의 아들을 암살하려는 음모까지 꾸몄다.
stage_intro_30517=프리드리히 2세의 새로운 체제가 점차 안정되자, 그는 다시 한 번 이탈리아 북부의 롬바르디아 동맹을 진압하기로 결심했다. 그러나 이미 50세가 넘은 프리드리히에게 시간은 가장 큰 적이 되었다. 1247년 여름, 교황이 지지하는 팔마 쿠데타가 발발하자 프리드리히는 신속히 행동에 나서 팔마를 포위하기 위해 주변 지역에 빅토리아 기지를 건설하고 장기전을 준비했다.
stage_intro_30518=불과 3개월 후, 프리드리히와 그의 아들 엔초는 다시 파르마 인근 지역을 탈환했다. 1248년 여름, 프리드리히는 영토를 공고히 하고 포로를 약탈하기로 결정했다. 이때 황제군은 란치아의 지휘 아래 교황군과 결정적인 전투를 벌이게 되었고, 이 전투는 양군의 운명을 좌우하게 될 것이다.
stage_intro_30519=1249년, 포살타 전투에서 프리드리히 2세의 아들 엔초가 볼로냐 군에게 포로로 잡히면서 북부 전선은 중요한 지휘관을 잃게 되었다. 이어진 주요 전투에서의 연패, 브레시아의 함락, 파비아의 항복, 피아첸차의 항구 개방은 프리드리히를 전례 없는 곤경에 빠뜨렸다. 1250년 11월, 독수리 사냥 후 갑작스러운 건강 악화로 고통받던 프리드리히는 한동안 침묵을 지켰고, 그해 12월 13일에 세상을 떠나며 전설적인 생애는 막을 내렸다.

stage_group_name_30004=루제루 보소의 일기
stage_group_name_30005=무함마드 알 이드리시의 일기
stage_group_name_30006=팔레르모 대주교 베르나르도의 일기

family_letter_desc_401=......주디엔, 반드시 돌아갈게. 곧 너와 결혼하고, 모든 게 다 잘 될 거야......
family_letter_desc_402=......사랑하는 주디엔, 잘 지내고 있니? 나는 형을 위해 넓은 땅을 정복했어. 언제 돌아갈 수 있을지 모르겠지만, 신의 축복이 당신과 나와 함께하길......
family_letter_desc_403=주디엔, 나는 곧 시칠리아로 원정을 떠날 것인데, 이것은 봉지를 얻을 수 있는 좋은 기회다. 모든 일이 순조롭게 풀리기를 기도한다......
family_letter_desc_404=행운이 나를 외면한 것 같다. 당신의 편지가 아니었다면 벌써 포기했을 것이다. 당신을 다시 만날 날이 올지 모르겠구나, 주디안.
family_letter_desc_405=마치 꿈만 같다. 설마 매일 그리워하던 사랑하는 당신을 만날 수 있을 거라곤 생각지도 못했다. 이 모든 것은 하나님이 계획하신 게 틀림없다.
family_letter_desc_406=가문의 분열은 우리를 더욱 취약하게 만들었지만, 시칠리아야말로 내가 돌아가야 할 곳이고, 사랑하는 사람과 함께 인생을 보낼 곳이다.
family_letter_desc_407=주디엔, 만약 당신에게 무슨 일이 생기면, 나에게는 더 이상 살아갈 이유가 없을 것이다.
family_letter_desc_408=사라센족은 병력만으로 나를 이길 수 있다고 생각하는가? 그들은 노르만족을 얕보고 있다!우리는 진흙으로 빚어진 존재가 아니다!
family_letter_desc_409=드디어 나는 봉지를 얻었다. 형의 인정을 받았을 뿐만 아니라, 주디엔과의 약속도 지킬 수 있게 되었다.
family_letter_desc_410=주디엔, 내 사랑. 오늘날 내가 이 자리에 있을 수 있는 건 모두 당신 덕분이다. 부디 하늘에서 나와 내 영토를 지켜봐 주길 바란다.
family_letter_desc_411=형은 로마 황제의 꿈을 이루지 못했지만, 나의 소망은 내 왕국을 지키는 것뿐이다.
family_letter_desc_412=시칠리아의 그리스인, 사라센인, 노르만인이 평화롭게 공존하고, 전쟁이 내 후손에게 다가오지 않기를 기도한다.

family_letter_desc_501=소년 시절 나는 스페인, 포르투갈, 프랑스 남부 등을 떠돌며 방랑했다. 가는 곳마다 차별과 적대감에 직면했지만, 동시에 가난 속에서 필사적으로 살아남기 위해 애쓰는 사람들의 모습을 목격했다.
family_letter_desc_502=그 시절, 인종 간 증오가 만연했다. 16살 때 나는 프랑크 기사들의 추격을 피하는 법을 배웠고, 그 해에 안달루시아로 돌아갔다.
family_letter_desc_503=그때 나는 지중해에 전쟁이 없고 그리스인, 아랍인, 프랑크인, 그리고 다양한 민족이 평화롭게 공존하고 있는 신비로운 나라가 있다는 이야기를 들었다. 그래서 그 땅을 직접 눈으로 확인하고 싶어 여행을 떠나기로 결심했다.
family_letter_desc_504=결국 나는 시칠리아에 도착했고, 그 이상향을 찾았다. 그리고 그곳에서 내 스승 아부 아스 솔트를 그의 밑에서 만나 약리학, 기하학, 그리고 천문학을 배웠다.
family_letter_desc_505=서른 살 때 나는 꿈만 같은 날을 목격했다. 하늘에는 수많은 장미꽃잎이 흩날리고, 고귀한 왕관을 쓴 루제루 2세가 화려한 망토를 입고 우리에게 미소를 지으며 손을 흔들고 있었다.
family_letter_desc_506=시칠리아는 내가 가본 그 어떤 곳보다 자유로웠다. 그리고 이곳에는 아라비아의 향신료, 프랑크의 양모, 심지어 중국의 비단까지 세계 각지에서 온 물품이 넘쳐났다.
family_letter_desc_507=시칠리아는 정보 유통이 놀라울 정도로 편리한 곳이다. 우리는 아랍의 의학서적, 동로마의 수학, 이집트의 신화책 등 세계 각지의 학술 서적을 수집할 수 있었다. 나는 그것들을 라틴어와 아랍어로 번역했다.
family_letter_desc_508=나는 종종 루제루 2세의 왕자들을 가르쳤다. 그들은 진정한 시칠리아인이었고, 항상 사라센 학자들에게 존경과 예의를 지켰다.
family_letter_desc_509=그 해는 내 인생에서 가장 영광스러운 한 해였다. 루제루 왕이 나에게 우리가 알고 있는 모든 나라와 땅을 그린 책을 편찬해 달라고 요청했는데, 우리는 이 책을 '루제루의 책'이라는 이름으로 완성했다.
family_letter_desc_510=루제루 2세는 동로마, 이슬람, 그리고 노르만 양식이 융합된 체팔루 대성당에 묻혔다. 왕의 초상화는 비잔티움 황제의 예복과 아라비아 예복을 입고 앉아 있는 모습으로 '세례를 받은 술탄'을 연상케 했다.

family_letter_desc_601=처음 이 청년을 만났을 때 나는 그에게 깊이 매료되었다. 그에게는 호엔슈타우펜 가문과 오트빌 가문의 기품이 잘 어우러져 있었다. 그는 승마, 매사냥, 체스에 뛰어났고, 다섯 가지 언어에 능통했으며, 독서량은 많은 학자들을 능가하는 수준이었다.
family_letter_desc_602=프리드리히는 어두운 밤에 타오르는 불길처럼 모두의 시선을 사로잡았다. 심지어 튜턴 기사단의 단장 헤르만조차도 그를 만난 후, 평생을 그에게 바쳤다.
family_letter_desc_603=쿠스탄차의 죽음으로 프리드리히는 매우 가슴 아팠다. 그녀는 그가 권력을 장악하는 데 있어 항상 든든한 버팀목이 되어준 공주였다. 그리고 리드리히에게는 많은 애인이 있었지만, 쿠스탄차는 이를 탓하지 않고 그의 곁을 지켰다.
family_letter_desc_604=우리 대열은 기독교인들의 의심을 받으며 행진하고 있었다. 제1차 십자군 원정 이후 130년이 지났지만, 이번에는 피 한 방울 흘리지 않고 성도를 탈환했다. 프리드리히가 아랍어로 알카밀과 장막 안에서 10년 협정에 서명하는 것을 목격했을 때, 그리고 그가 성지에 입성했을 때 다양한 종교를 가진 사람들이 환호하는 장면을 보았을 때, 나는 모든 의심을 버렸다. 평화야말로 진정 하나님의 뜻이었다.
family_letter_desc_605=프리드리히는 새로운 기술과 새로운 학문에 대한 호기심이 넘쳤다. 이집트의 술탄 알카밀은 보물과 미녀를 선물하는 대신 정교한 기계식 시계와 같은 신기한 물건들을 그에게 선물했다. 프리드리히는 또한 수학자 피보나치를 지원했는데, 피보나치는 '산술의 책'과 그 이후의 저서를 모두 그에게 바쳤다.
family_letter_desc_606=프리드리히는 불굴의 정의와 법치주의를 옹호했다. 심지어 그의 장남 헨리가 반란을 일으켰을 때조차, 그는 단호하게 행동하여 헨리를 종신형에 처했다. 또한 교황과의 서신을 유럽의 왕실에 공개하며 자신의 명예를 지켰다. '교황은 태양, 황제는 달'이라는 신조는 점차 무너지기 시작했고, '황제의 것은 황제에게, 하나님의 것은 하나님께 바치라'는 예수 그리스도의 가르침을 받아들이기 시작했다.
family_letter_desc_607=프리드리히가 파문을 선고받던 날, 그는 헬만의 사망 소식도 들었다. 튜턴 기사단의 단장 헬만은 20년 동안 프리드리히와 하나님을 위해 헌신하다 세상을 떠났다.
family_letter_desc_608=파문 판결을 통보받은 프리드리히는 분노했고, '나는 한때 그를 존중했으나, 이제부터는 용서하지 않겠다! 망치가 되리라!'라고 큰 소리로 외쳤다.
family_letter_desc_609=“법치에 대한 집착에 가까운 열정, 절대적인 공정함, 지식에 대한 끊임없는 탐구, 다재다능함과 타고난 고결함 - 만약 이것들이 육신의 죽음과 함께 사라지지 않는다면, 프리드리히는 우리 마음속에 영원히 살아있을 것이다.” -- 만프레드가 아버지에 대한 평가.

battle_talk_3030401=지급 마로 메시나를 공격하라. 승리는 우리의 손에 있다!
battle_talk_3030402=공격이 막혔으니 일단 후퇴하고 전략을 다시 세워라.
battle_talk_3030403=?? 우리 배는 어디 있지? 폭풍에 휘말려 사라진 건가?
battle_talk_3030404=새로운 수송선이 도착할 때까지 진지를 지켜라.
battle_talk_3030501=메시나를 정복했다. 이제 시칠리아 중부로 진격할 수 있게 되었다.
battle_talk_3030502=엔나 요새는 매우 견고하다. 전투가 매우 치열할 것이다.
battle_talk_3030503=아랍 기병들이 우리를 향해 돌격하고 있다. 노르만 기사들이여, 창과 검을 뽑아라!
battle_talk_3030801=이븐 하와스가 비열한 기습 공격을 감행했다. 즉시 트로이나를 지원하러 가야 한다.
battle_talk_3030802=서둘러 공격하라! 루제루 보소가 돌아오기 전에 이 도시를 점령해야 한다!
battle_talk_3030803=적의 지원군이 도착했다. 맞설 준비를 하라!
battle_talk_3030901=적군의 수가 많으니, 우선 유리한 지형을 확보하자.
battle_talk_3030902=병력이 충분하니 몇 차례로 나누어 돌격하여 노르만족의 병력을 소모하라!
battle_talk_3030903=적의 사기가 떨어지고 있다. 반격할 때가 왔다.
battle_talk_3030904=진정하라! 후퇴하지 마라!
battle_talk_3031001=지난번 팔레르모 공격은 실패했지만, 이번에는 반드시 성공할 것이다.
battle_talk_3031002=지난번에 노르만족에게 패배했지만, 이번엔 꼭 복수할 것이다.
battle_talk_3031003=적이다! 우리의 계획이 들통났나?
battle_talk_3031004=노르만인이다! 어떻게 내 계획을 알아챘지?
battle_talk_3031005=돌격하라! 적에게 진을 칠 틈을 주지 마라!
battle_talk_3031101=적의 지원군을 물리쳤다.
battle_talk_3031102=우리 함대가 준비됐다. 이 도시를 정복하자!
battle_talk_3031301=항복하라. 더 이상 지원군이 없다. 네 가족의 안전을 보장하겠다.
battle_talk_3031302=나는 고결한 사람은 아니지만, 내 병사들은 사나운 전사들이다.
battle_talk_3031303=알겠다. 정교한 함정을 설치하겠다.
battle_talk_3031304=함정이다! 우리는 완전히 궁지에 몰렸다!
battle_talk_3031401=적들은 항상 몰타를 거점으로 우리를 공격한다.
battle_talk_3031402=우리는 위협을 철저히 제거하기 위해 반드시 이 섬을 점령해야 한다.
battle_talk_3040301=폭풍이 함대를 파괴했다. 지금 어디에 있는지 모르겠지만, 우선 근처에서 거점을 찾아야 한다.
battle_talk_3040302=함대를 재편성하여 우리 병사를 시칠리아로 철수시켜라.
battle_talk_3040303=젊은 루제루는 처음으로 자신의 능력을 보여주려 했을 때 강력한 반격을 받아 위신에 큰 타격을 입었다.
battle_talk_3040401=발레타의 평평한 해안은 상륙에 적합하지만 중병이 지키고 있다. 우리는 북서쪽에서 직접 상륙해야 한다.
battle_talk_3040402=혹은 남쪽으로 우회하여 복잡한 산악지대를 지나 몰타 성을 공략하는 방법도 있다.
battle_talk_3040403=몰타 성이 함락되어 적은 언제든지 우리 뒤에서 나타날 수 있다. 어떻게 해야 할까?
battle_talk_3040501=주변 영주들은 우리의 아풀리아 쟁탈전에 대해 대체로 부정적인 태도를 보이고 있다.
battle_talk_3040502=주변 영주들과 우호적인 관계를 맺기 위해 선물을 준비했지만, 우리는 오직 한 가문과 동맹을 맺을 수 있어 결과가 다양할 것이다.
battle_talk_3040801=우리 군대는 패배했다. 살레르노에 방어선을 구축하라. 우리의 돌격대는 사르노 강의 다리를 파괴하여 북쪽 적군의 진격을 차단할 수 있다.
battle_talk_3040802=란치아노의 주둔군은 화력을 분산시켜 줄 수 있으며, 주력군은 바리에서 다가오고 있다. 주력군이 도착하면 반격을 개시하여 반란군을 처치하라.
battle_talk_3040901=북이탈리아 전역은 로타르에게 충성을 맹세했다. 신성 로마 제국의 관료들이 도시들을 장악하기 위해 오고 있는데, 우리는 선제 공격을 통해 도시를 점령할 수 있다.
battle_talk_3040902=제국군과 정면으로 싸우는 것은 불가능하지만, 도시를 약탈해 물자를 얻어 방어선을 강화할 수는 있다. 단, 이미 점령된 도시에 대한 공격은 피하는 것이 좋다.
battle_talk_3040903=한편, 반란군 우두머리는 로타르와 협상 중이다. 우리는 반란군을 신속하게 처치하여 로타르가 즉시 그들의 공격을 지원할 생각을 포기하게 만들어야 한다.
battle_talk_3041001=적들은 사방에서 공격해오고 있다. 보급 차량을 방어선으로 호송하고, 로타르의 주력을 최대한 견제하라. 최소한 살레르노를 지켜야 한다.
battle_talk_3041002=나는 직접 북아프리카로 가서 무슬림 군대를 집결하여 반격을 개시할 것이다.
battle_talk_3041101=항복하겠다.
battle_talk_3041102=돌격하라. 반란군들을 처치하라!
battle_talk_3041103=넌 아직 어림없다. 어린 놈아.
battle_talk_3041104=안돼. 루제루. 내 장남!
battle_talk_3041201=자, 이제 앉아서 이야기합시다. 성하.
battle_talk_3041202=당신이 남부 이탈리아의 유일한 통치자임을 인정합니다. 그러니 빨리 저를 돌려보내 주십시오.
battle_talk_3050401=로마 황제? 그건 로마의 늙은이가 베푼 은혜에 불과한데, 이제 그걸 어린 놈에게 주겠다고? 그놈은 자격이 없다!
battle_talk_3050402=모든 산맥의 입구를 지켜라. 그 늙은이가 얼마나 큰 실수를 저질렀는지를 일깨워 줘야 한다.
battle_talk_3050403=알프스 산맥을 은밀하게 넘을 수 있는 길을 찾아야 한다. 오토에게 들키지 않도록 하라.
battle_talk_3050601=에라르, 이 배신자! 수하의 패장! 오늘, 프랑스 왕과 제후들의 도움으로 네 목을 치겠다!
battle_talk_3050602=헛소리 하지 마라! 병력이 많으면 이길 수 있다고 생각하나?
battle_talk_3050603=지켜라! 반란군에게 더 이상 지원 받을 기회를 주지 마라!
battle_talk_3051001=교황도 하나님도 모두 내 편이다! 그런데 저 녀석은? 교회에서 추방당한 자가 스스로 황제라 자칭하다니!
battle_talk_3051002=하나님의 영토를 되찾아라! 이교도들의 소굴을 무너뜨려라! 신의 정의를 펼쳐라!
battle_talk_3051003=우리의 고향이 침략당하고 있다. 그 침략자는 바로 사라센족과 피비린내 나는 전쟁을 치르라고 우리를 이국 땅으로 보낸 교황이다. 정말 어처구니없다!
battle_talk_3051004=로마에서 '화해'의 축제를 준비하는 동안, 교황과 프리드리히의 갈등은 일시적으로 평온해졌고, 프리드리히는 왕위를 되찾았다.
battle_talk_3051201=우리 롬바르디아족은 어떤 로마 황제도 두려워하지 않는다! 붉은 수염의 프리드리히든, 이 금발의 프리드리히든, 롬바르디아는 절대 굴복하지 않는다!
battle_talk_3051202=헤르만 대단장, 가끔 이 롬바르디아족은 진정 독립적인 정신을 가지고 있는 것인지? 아니면 그저 이익에 눈이 먼 바보들인지 궁금하다.
battle_talk_3051203=롬바르디아족은 계속 우리를 도발했으니 우리의 칼날에 자비는 없다! 그들의 방어를 급습하고 비첸자를 점령하라!
battle_talk_3051301=이 쥐들이 내 영토를 계속 도둑질하는 것을 용납하지 않겠다! 우리가 겨울을 보내기 위해 크레모나로 철수했다고 소문을 퍼뜨려 적을 매복에 끌어들여라!
battle_talk_3051302=그들도 이 얼어붙은 이탈리아의 늪에서 우리와 싸우고 싶지 않은 모양이다. 겨울 진지로 돌아가자.
battle_talk_3051303=젠장, 계략에 빠졌다!
battle_talk_3051401=동맹도, 지원도 없다! 의지할 수 있는 건 우리뿐이다! 갈퀴를 들고 우리 아이들을 지켜라!
battle_talk_3051402=두 달 내에 이 땅을 점령하지 못하면 겨울이 오고 우리는 불리한 상황에 처하게 될 것이다. 그러나 마을 간의 상호 지원에 대해 우리는 속수무책인 것 같다.
battle_talk_3051403=철수하라. 우리는 다시 돌아올 것이다!
battle_talk_3051404=수비군의 확고한 의지와 예상치 못한 전술로 인해 프리드리히 2세는 결국 아무런 성과도 거두지 못했다.
battle_talk_3051501=프리드리히가 다시 파엔차를 점령했다! 이로 인해 나는 지금 잠도 잘 수 없고 밥도 먹을 수 없다. 제노바인에게 바다에서 공격을 감행하여 시칠리아를 점령하라고 전하라!
battle_talk_3051502=돛을 올려라! 즉시 시칠리아를 지원하라!
battle_talk_3051503=전쟁에서 승리한 황제군은 로마로 진군했다. 그러나 로마에서 겨우 13킬로미터 떨어진 곳에서, 8월 22일, 교황 그레고리오의 사망 소식이 발표되자 프리드리히는 후퇴를 명령했다.
battle_talk_3051701=프리드리히의 요새가 우리 주변에서 늘어나고 있다. 우리는 즉시 돌파하지 않으면, 섬멸될 것이다.
battle_talk_3051702=빅토리아를 그들의 감옥으로 만들어 주겠다. 교황이 어떻게 대응할지 지켜보자.
battle_talk_3051703=빅토리아의 요새가 이 폭도들을 가두지 못할 줄은 몰랐다.
battle_talk_3051704=강력한 황제 프리드리히는 결국 북이탈리아의 작은 도시 국가에 의해 패배했으며, 반격의 여지조차 없이 철저히 패배했다. 파르마의 빅토리아 기지는 적에게 점령당한 후 잿더미가 되었다.
battle_talk_3051801=탐욕스러운 교황은 침략을 멈추지 않으며 백성들을 피로 물들였다. 이 사람들은 그의 백성이 아닌가?
battle_talk_3051802=아마 내일, 나는 더 이상 말을 탈 수 없게 될지도 모른다. 이 전쟁이 언제까지 계속될지 알 수 없지만, 오늘은 적을 물리쳐라!
battle_talk_3051803=놈들이 우리 후방 진지를 습격했다! 철수하라! 엔조, 군대를 지휘하여 천천히 철수하라! 붕괴를 초래해서는 안 된다!


