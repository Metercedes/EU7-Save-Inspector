stage_intro_2151=서기 376년, 서고트족은 훈족의 침공을 피하기 위해 로마 제국에 비호를 요청했지만, 도나우 강을 건넌 후 국경 내의 로마인들과 많은 충돌이 일어났고, 결국 양측은 마르시아노플에서 전투를 벌였다.
stage_intro_2152=서기 378년, 반란을 일으킨 고트족은 도나우강 각 지역을 약탈한 후, 다른 야만족과 연합하여 발칸 반도를 침공할 준비를 하였다. 로마 황제 발렌스는 직접 출정하기로 결정하였으나, 휘하 병사들의 전력이 들쭉날쭉한 것이 이 반란 진압 작전의 가장 큰 골칫거리가 되었다.
stage_intro_2153=서기 402년, 서고트족은 알라리크 국왕의 인솔하에 서로마 제국의 중심지를 지속적으로 침공하였고, 얼마 지나지 않아 요충지인 밀라노를 포위하였다. 이 때문에 황제 호노리우스는 침식을 취하지 못하게 되자 제국 북부에 있던 스틸리코에게 군사를 이끌고 남쪽으로 진군하도록 지시하였다.
stage_intro_2154=서기 410년, 알라리크는 호노리우스와 약속한 장소에서 로마군의 공격을 받았다. 이 공격으로 그는 서로마 제국과의 협상을 포기하고, 다시 로마를 포위하였다. 여러 차례의 포위전으로 이 '영원의 성'은 흔들리게 되었다.
stage_intro_2155=서기 419년, 서로마 제국과 맹약을 맺은 수에비 왕국은 국경 귀속 문제로 이웃 왕국인 반달 왕국과 자주 충돌하게 되었다. 정복욕이 강한 수에비 왕 헤르메리크는 자발적으로 반달족의 영토를 침공하기로 결정하였다.
stage_intro_2156=서기 439년, 가이세리크는 군대를 이끌고 지브롤터 해협을 가로질러 서로마 제국의 북아프리카 영토 대부분을 차지한 지 8년이 되었다. 하지만 거의 5년 동안 서로마 제국과 평화를 유지한 후, 가이세리크는 다시 로마 제국의 세 번째 중요 도시인 카르타고를 노렸다.
stage_intro_2157=서기 451년, 야심 찬 훈족 왕 아틸라는 서로마 궁정의 스캔들을 틈타 갈리아 지역을 침공하기로 결정했다. 갈리아에 있던 로마 장군 아에티우스는 갈리아 지역의 야만족 왕국과 연락하여 연합군을 결성하고 훈족의 침략에 맞서 싸울 준비를 하였다.
stage_intro_2158=서기 455년, 막시무스는 황제 발렌티니아누스 3세를 모해하여 왕위를 찬탈하였다. 이 일로 인해 반달 왕 가이세리크와 후자의 동맹이 깨졌다. 가이세리크는 에우도키아 황후로부터 구원받은 후, 이탈리아를 공격하기로 결정했다.
stage_intro_2251=6세기부터 유럽 각국은 기병의 중요성을 점차 인식하게 되었다. 서기 530년, 페르시아인들은 비잔티움 제국을 공격하였다. 다라성 밖에는 사산 왕조의 정예 기병대가 배치되었다.
stage_intro_2252=유스티니아누스 1세는 시시각각 로마의 예전 영광을 재현하려고 했다. 겔리메르의 왕위 찬탈 사건은 그에게 북아프리카로 출병할 구실을 제공하였다. 서기 533년, 벨리사리우스는 군대를 이끌고 북아프리카에 상륙하여 카르타고로 진군하였다.
stage_intro_2253=비잔티움이 아드 데키미움 전투에서 큰 승리를 거둔 후, 벨리사리우스와 그의 군대는 카르타고를 점령하였다. 카르타고 서쪽에 있는 겔리메르는 카르타고를 탈환하기 위해 그의 형제에게 지원을 요청하였으며, 군대를 다시 집결시키려고 한다.
stage_intro_2254=북아프리카를 다시 정복한 후, 유스티니아누스 1세는 이탈리아 지역으로 눈을 돌렸다. 서기 535년, 벨리사리우스는 그의 황제를 위해 로마를 점령하고, 이탈리아를 되찾기 위해 다시 군대를 이끌고 출정하였다.
stage_intro_2255=로마를 점령한 후, 비잔티움에 라벤나로 가는 길은 활짝 열렸다. 벨리사리우스는 그의 부대를 이끌고 계속 진군하였다. 동고트 왕국의 수도는 비잔티움 군대의 대대적인 공격을 맞이하게 되었다.
stage_intro_2256=동고트 왕 토틸라의 활약으로 유스티니아누스 1세는 어쩔 수 없이 벨리사리우스를 이탈리아 지역으로 다시 파견해야 했다. 서기 546년, 토틸라의 군대는 로마에 도착하여 도시를 포위하였다.
stage_intro_2257=이탈리아 지역에 대한 토틸라의 지속적인 침공으로 제국은 큰 피해를 보았으며, 그는 또한 제국 군대가 이탈리아 지역에 쉽게 진입하지 못하도록 함대를 이용하여 해역을 봉쇄하려고 한다. 이러한 행동은 유스티니아누스 1세를 매우 불만스럽게 만들었다.
stage_intro_2258=이탈리아의 지배권을 되찾기 위해 유스티니아누스 1세는 나르세스를 이탈리아로 보내기로 결정하였다. 나르세스를 만난 후, 전통 고트족인 토틸라는 병력의 열세에도 불구하고 선제 공격을 감행하기로 하였다.
stage_intro_2259=고트족은 나르세스의 공격을 막아내기 어려웠다. 동고트 왕은 프랑크족과 알레만니족에게 구조를 요청하기로 하였으며, 그들이 이탈리아 지역으로 진입하여 비잔티움 군대의 공격을 막아주기를 바랐다.
stage_intro_2260=559년, 한 무리의 훈족이 국경을 넘어 콘스탄티노플 외곽에서 악행을 저질렀다. 이는 유스티니아누스 1세에게 있어서 그야말로 수치였다. 그는 다시 벨리사리우스를 면전에 불러들여 마지막 임무를 부여했다.
stage_intro_2351=앵글로-색슨족의 도래는 브리튼의 원주민들을 공포에 떨게 하였다. 잘 장비되고 잘 훈련된 적들에 맞서 브리튼족은 어쩔 수 없이 무기를 들고 앵글로-색슨족의 침공에 맞서 싸워야 했다.
stage_intro_2352=남색슨 부족의 왕 에를은 부하들을 이끌고 브리튼 섬의 남쪽 해안에 성공적으로 상륙하였으나, 내륙으로의 진군은 순조롭지 않았다. 그들은 원주민들의 완강한 저항에 부딪혔고, 이로 인해 에를은 병력이 부족하다는 점을 깨닫고, 아직 본토에 있는 부족에게 증원을 요청하게 되었다.
stage_intro_2353=여러 해 계속되는 전란의 영향으로, 브리튼에 흩어진 부족들은 서로 통합하여 각자의 왕국을 건립하기 시작했지만, 이는 브리튼에 평화와 안정을 가져다주지 못하였다. 부족 간의 전투는 점차 노섬브리아 왕국을 비롯한 왕국 간 규모가 더 크고, 더 잔혹한 전쟁으로 번져갔다.
stage_intro_2354=633년, 에드윈의 통치하에 노섬브리아 왕국은 당시 잉글랜드에서 국력이 가장 강성한 나라가 되었다. 이로 인하여 이웃 국가들이 두려워하자 귀네드의 왕 카드와슬론은 머시아 왕국과 동맹을 맺고 연합군을 조직하여 노섬브리아 왕국을 침공하기로 결정했다.
stage_intro_2355=비록 귀네드 왕국과 머시아 왕국의 연합군의 침공을 성공적으로 막아냈지만, 노섬브리아 왕국은 매우 심각한 피해를 보았고, 심지어 왕국은 한때 분열되었다. 서기 634년, 귀네드의 왕 카드와슬론은 또 다시 군사를 파견하여 노섬브리아 왕국을 침공하였다.
stage_intro_2356=오스왈드의 복귀과 왕위 계승으로 노섬브리아 왕국의 군대는 귀네드 왕국을 이길 수 있었고, 왕국은 다시 평화와 안정을 되찾을 수 있었다. 서기 644년, 10년 동안 국력이 점차 회복되자 오스왈드는 머시아 왕국을 공격하기로 결정했다.
stage_intro_2357=오스왈드의 머시아 침공은 참패로 끝났다. 펜다는 이 기회를 틈타 동앵글리아 왕국과 귀네드 왕국을 연합하여 노섬브리아 본토를 공격하기로 결정했다. 서기 655년, 노섬브리아 왕국은 베르니시아 외의 모든 지역이 연합군에 의해 함락되었다.
stage_intro_2358=오랫동안, 머시아 왕국은 잉글랜드 남부의 여러 왕국들을 강제로 통제함으로써 왕국의 지위를 유지해 왔다. 서기 825년, 베오른울프는 자신의 권위를 확고히 하기 위해 직접 군대를 이끌고 웨식스 왕국을 침공했고, 웨식스 왕 에그버트는 반격에 나섰다.
stage_intro_2451=파견한 사자가 가산족에 의해 피살되었기 때문에 아랍인들은 보복 작전을 전개하기로 결정하였다. 하지만 그 작전 계획은 비잔티움에 알려졌고, 즉시 요새의 주둔군을 집결시켰다. 강력한 비잔티움 군대 앞에서 아랍인들의 작전은 실패할 수밖에 없는 것 같았다.
stage_intro_2452=할리드가 군대를 이끌고 마르즈 라힛에 도착했을 때, 가산족은 아랍인들이 자신들에게 위협이 될 수 없다고 생각하였다. 하지만 아랍인들은 곧 실제 행동으로 그들의 전력이 비교할 수 없을 만큼 강하다는 것을 증명하였다.
stage_intro_2453=아부는 아랍 최초의 칼리파가 된 후, 세력을 아라비아 반도 너머로 확장하려고 하였다. 아랍 군대는 북쪽으로 진격하여 다마스쿠스를 공격했다.
stage_intro_2454=아랍인들의 전진을 막고, 잃어버린 영토를 되찾기 위해 이라클리오스는 레반트에 대규모 군대를 파견하기로 결정했다. 적의 접근에 따라 아랍인들은 다마스쿠스에서 철수하고, 야르무크에 군대를 다시 집결시켰다.
stage_intro_2455=비잔티움 군대와 야르무크 평원에서 교전 후, 아랍인들은 계속 진격하여 더 많은 도시를 점령하기로 결정했다. 서기 636년 말, 아랍 군대는 예루살렘에 도착하여 도시를 포위하였다.
stage_intro_2456=아랍인들의 정복은 여전히 계속되고 있다. 그들의 군대는 아나톨리아 반도를 휩쓸었다. 잇따른 패전과 도시의 손실로 비잔티움 제국은 위기감을 느꼈고, 이 강적을 격파할 방법을 모색하고 있다.
stage_intro_2457=사산 왕조를 격파한 후, 오마르는 아랍 병사들을 이끌고 아프리카로 진군하기로 결정하였다. 아랍인들은 이집트를 시작으로 더 많은 아프리카 땅을 자신들의 영토로 차지할 계획이다.
stage_intro_2458=사산 왕조를 철저히 격파한 후, 아랍인들은 비잔티움 제국을 주요 적대 대상으로 삼았고, 그들은 지중해 지역에서 비잔티움 제국에 대항하기 위해 강력한 해군을 구축하였다.
stage_intro_2551=865년, 한 무리의 바이킹 군대가 바다를 건너 브리튼 땅에 상륙하여 해안의 수도원 등 부유한 지역들을 급습하고 약탈하였다.
stage_intro_2552=바이킹 침공 이후, 동앵글리아와 노섬브리아 두 왕국이 연이어 점령되었다. 바이킹의 다음 목표는 웨식스 왕국을 점령하는 것이다.
stage_intro_2553=레딩 전투에서 우위를 차지한 바이킹 부대는 계속 전진하여 애쉬다운 지역에서 웨식스 군과 다시 전투를 벌였다.
stage_intro_2554=수십 년에 걸친 침략과 약탈 끝에 웨식스 왕국을 비롯한 소수 세력만이 여전히 알프레드의 인솔하에 바이킹의 침입에 저항하고 있다.
stage_intro_2555=893년, 브리튼에 다시 상륙한 바이킹은 다시 앵글로-색슨족과 전투를 벌였다. 하지만 전술의 변화로 인하여 바이킹의 침입은 거의 효과를 보지 못하였다.
stage_intro_2556=937년, 북부의 세 왕국은 급속히 발전하고 있는 잉글랜드의 세력을 파괴하기 위해 동맹을 맺었다. 적의 침공에 직면한 애설스탠 왕은 군대를 모아 북쪽으로 진군했다.
stage_intro_2557=잉글랜드의 왕위를 놓고 경쟁하기 위해 노르웨이의 하랄드 하드라다 왕과 그의 동맹들은 군대를 모아 요크셔로 진군하기로 결정했다.
stage_intro_2558=잉글랜드 왕 참회자 에드워드의 죽음으로 왕좌를 노리는 사람들이 불안해졌다. 그중 노르웨이에서 온 하랄드가 자신의 부대를 이끌고 잉글랜드로 진격했다.
stage_intro_2651=비잔티움 제국과 불가리아 제국의 전쟁이 수년 동안 지속되었다. 서기 811년, 니키포로스 1세는 군대를 이끌고 불가리아를 공격하였고, 연이어 승리를 거둔 후 플리스카로 진군하기로 결정했다.
stage_intro_2652=플리스카 전투 이후, 비잔티움 제국과 불가리아 제국은 모두 큰 피해를 보았지만, 불가리아 제국은 여전히 급진적인 공세를 유지하였다. 큰 손실에도 불구하고 비잔티움 제국은 평화 협정 체결을 거부했다.
stage_intro_2653=미하일 2세가 즉위하자 토마스라는 장군은 그의 통치에 저항하기로 결심했는데, 이는 많은 사람들의 지지를 얻었다. 그는 아랍인들과 연합하여 콘스탄티노플을 향해 진공하였다.
stage_intro_2654=레온 6세는 비잔티움 성직자들의 추방에 대한 보복으로 불가리아 상인들을 콘스탄티노플에서 추방하기로 결정했다. 이는 시메온 1세에게 전쟁을 발동할 구실을 제공하였다. 하지만 이때 비잔티움의 주력 군대는 동부 전선에서 아랍인에 맞서 싸우고 있었다.
stage_intro_2655=섭정이 된 후 조이 자우치나는 불가리아 제국에 더 이상 양보하지 않기로 하였다. 이를 핑계로 시메온 1세는 다시 비잔티움 제국을 공격하게 되었다. 시메온 1세의 일련의 조치로 인해 비잔티움인들은 어쩔 수 없이 홀로 싸워야 했다.
stage_intro_2656=922년, 불가리아는 발칸 지역의 대부분을 장악하였지만, 해군 부족으로 콘스탄티노플을 위협할 수 없었다. 그래서 불가리아인은 아랍인과 연합하기로 하였으나, 비잔티움인의 출병으로 저지되었다.
stage_intro_2657=아랍인과의 전투를 마친 후, 비잔티움 제국은 짧은 시간에 국력을 회복하여 불가리아 제국을 빠르게 격파하였다. 그러나 키예프 루스는 이러한 공백을 이용했고, 발칸 반도에는 새로운 강적이 나타났다.
stage_intro_2658=971년, 불가리아의 패배로 비잔티움은 불가리아의 광대한 땅을 차지할 수 있었고, 불가리아인은 자신들의 땅을 되찾기 위해 수년간 지속적으로 공격을 감행해 왔다.
stage_intro_2659=트라야누스의 문 전투 이후, 비잔티움 제국에 내전이 일어났다. 사무일은 이 기회를 이용해 비잔티움 제국을 공격하기로 하였다. 서기 996년, 사무일은 테살로니키 지방의 비잔티움 군대를 격파하고 남쪽으로 진군하기 시작하였다.
stage_intro_2660=1000년부터 비잔티움 황제 바실리오스 2세는 불가리아에 군대를 파견하기 시작하였다. 하지만 비잔티움은 여전히 양국의 국경까지 치고 나갔다. 중흥하는 비잔티움 제국과 쇠퇴하는 불가리아 사이에 맹렬한 전투가 불가피하게 되었다.
stage_intro_2751=1066년, 노르망디 공작은 잉글랜드 왕위를 차지하기 위해 부대를 이끌고 해협을 건너 잉글랜드에 상륙하였다. 해럴드 2세는 소식을 듣고 즉시 군대를 소집하여 남쪽으로 내려가 헤이스팅스 부근에 수비군을 배치했다.
stage_intro_2752=헤이스팅스 전투에서 해럴드 2세를 격파한 후, 윌리엄은 부대를 이끌고 런던으로 왔다. 그는 런던의 안전을 보장하기 위해 서더크로 부대를 파견하여 그곳의 저항 세력을 섬멸하기로 하였다.
stage_intro_2753=잉글랜드를 성공적으로 정복한 후, 엑서터에 사는 사람들은 윌리엄에게 충성을 바칠 것을 거부하였다. 윌리엄은 엑서터 사람들을 그의 통치에 복종시키기 위해 군대를 이끌고 도시를 포위했지만, 격렬한 저항에 부딪혔다.
stage_intro_2754=대다수 사람의 지지를 받았지만, 여전히 윌리엄의 통치에 저항하는 저항 세력이 존재하며, 그들 대부분은 북쪽에 집중되어 있다. 평화적인 방법으로 그들의 충성을 얻을 수 없다고 판단한 윌리엄은 군대를 이끌고 북쪽으로 올라가기로 하였다.
stage_intro_2755=1075년, 노르망디로 돌아온 윌리엄은 엠마와 랄프의 결혼을 인정하지 않았다. 이는 세 백작의 반란을 불러일으켰고, 그들은 윌리엄이 노르망디에 있는 틈을 타 그의 통치를 무너뜨리기로 하였다.
stage_intro_2756=1105년, 헨리 1세는 군대를 이끌고 노르망디 공작 로베르의 영지를 침공하고, 바욘와 카앙을 점령하였다. 이듬해, 헨리 1세는 노르망디로 돌아갔고, 모르탱 백작은 로베르에게 충성하는 귀족 중 하나로서 그의 최우선 목표가 되었다.
stage_intro_2757=1119년, 프랑스 왕 루이 6세는 부대를 이끌고 노르망디를 공격하였다. 헨리 1세는 노르망디에서 자신의 재산과 영토를 지키기 위해 프랑스와 교전할 수밖에 없었다.
stage_intro_2758=1135년, 헨리 1세의 갑작스러운 죽음으로 잉글랜드는 무정부 상태에 빠지게 되었다. 스티븐과 헨리 1세의 딸인 마틸다는 각자 세력을 이끌고 잉글랜드 왕위를 차지하기 위해 싸웠다.
stage_intro_2851=1048년, 셀주크 왕자가 부대를 이끌고 비잔티움 제국이 지배하는 아르메니아로 들어왔다. 비잔티움 군대는 병력이 부족했기 때문에 방어적인 전략을 채택하기로 결정하고 원군이 오기를 기다렸다.
stage_intro_2852=1071년, 점차 쇠퇴해가는 비잔티움 제국은 셀주크가 이집트의 파티마 군대에 대항하는 데 전념하는 기회를 이용하여 아르메니아를 기습하여 이전에 잃었던 토지와 요새를 탈환하기로 하였다.
stage_intro_2853=에게 해 지역에서 활약하는 셀주크 제국의 세력은 지속적으로 비잔티움 제국을 위협하였다. 알렉시오스는 셀주크 제국의 해군에 대항하기 위해 함대를 편성하고, 에게 해 지역의 통제권을 탈환하기로 하였다.
stage_intro_2854=비잔티움 제국은 강력한 셀주크를 감당할 수 없게 되자 알렉시오스는 서방에 지원을 요청하기로 하였다. 비잔티움 군대의 협조 하에, 십자군은 바다를 건너 니케아를 첫 번째 목표로 삼았다.
stage_intro_2855=더 많은 비잔티움의 원군이 합류함에 따라, 십자군의 전력은 더욱 강해졌다. 십자군은 콘스탄티노플에서 예루살렘까지의 중간 지점에 위치한 안티오키아로 진군하였다.
stage_intro_2856=병세가 호전된 알렉시오스는 아나톨리아 전선의 방어를 강화하기 위해 직접 전쟁터로 나가기로 결정하였다. 그의 군대는 셀주크를 여러 차례 격파했고, 추가 대비책을 얻은 후 다시 적을 공격하였다.
stage_intro_2857=1176년, 비잔티움 황제 마누일 1세는 헝가리와 세르비아의 서쪽 위협을 제거한 후, 동쪽의 룸 술탄국에 집중하기로 하고, 아나톨리아 초원을 점령하기를 희망했다.
stage_intro_2858=아나톨리아를 되찾을 수 있는 절호의 기회를 놓친 마누일 1세는 많은 공성 기구까지 잃었다. 하지만 약탈을 마치고 돌아오는 셀주크 군대는 그에게 다시 승리의 희망을 주었다.
stage_intro_2951=셀주크의 수도인 니케아를 점령한 후 원정군은 맹렬한 반격을 받았다. 아르슬란 1세는 많은 부대를 이끌고 보에몽 1세의 부대를 포위했다.
stage_intro_2952=안티오키아를 성공적으로 점령한 후, 십자군은 예루살렘을 향해 계속 진군하였다. 예루살렘을 지키고 있는 아랍 장군 다울라 역시 수비 태세를 갖추고 있었다.
stage_intro_2953=1차 십자군의 승리로 유럽의 영주들은 승리의 기쁨을 맛보았고, 2차 십자군을 시작하기로 하였다. 이번에 그들의 첫 목표는 다마스쿠스이다.
stage_intro_2954=아크레는 지리적으로 우월하고 살라딘의 통치 범위 내에서 매우 중요한 도시였다. 살라딘은 기 드 뤼지냥이 아크레 외곽으로 다시 군대를 집결했다는 소식을 듣고 즉시 군대를 집결시켜 요격하였다.
stage_intro_2955=서유럽 영주들은 살라딘에게 빼앗긴 예루살렘을 되찾기 위해 다시 한번 십자군을 조직하였다. 대군은 아나톨리아에 진입했을 때 셀주크의 맹렬한 공격을 받았다.
stage_intro_2956=사자심왕 리처드가 예루살렘에서 철수하자 살라딘은 야파를 공격하기로 하였다. 그는 이를 복수의 기회로 삼았다. 소식을 들은 사자심왕은 다시 군대를 집결하여 살라딘을 공격하였다.
stage_intro_2957=십자군이 예루살렘으로 진군할 준비를 하고 있을 때, 그들의 지도자는 알렉시오스 4세의 요구를 받아들여 그의 아버지를 도와 왕위를 되찾기 위해 콘스탄티노플로 진군하기로 하였다. 그 대가로 비잔티움 제국은 그들에게 경제적, 군사적 지원을 제공할 것이다.
stage_intro_2958=오랜 전투 끝에, 십자군은 예루살렘을 되찾는 데 가장 큰 장애가 이집트라는 것을 깨닫게 되었다. 그래서 그들은 군대를 조직하여 지중해를 건너 이집트를 공격하기로 하였다.
stage_intro_3051=웨일스의 공공연한 반란 행위 때문에 헨리 2세는 어쩔 수 없이 노르망디에서 잉글랜드로 돌아와야 했다. 1165년, 헨리 2세는 웨일스인들을 징벌하고 조직하기 위해 거대한 군대를 모아 웨일스를 공격하였다.
stage_intro_3052=아서와 존은 잉글랜드 왕위 계승권을 쟁탈하기 위해 오랫동안 싸웠다. 존이 이사벨라와 결혼하기로 결정한 후, 그 균형은 서서히 깨졌으며, 위그 10세와 필리프 2세의 합류로 더욱 혼란스러워졌다.
stage_intro_3053=존의 협조 거부로 필리프 2세는 노르망디 땅을 직접 되찾겠다고 밝혔고, 얼마 지나지 않아 그의 행동을 개시하였다. 1203년, 필리프 2세는 가이야르 성으로 출병하였다. 그는 가이야르 성은 노르망디 전체를 통제할 수 있는 열쇠라고 여겼다.
stage_intro_3054=1213년, 윌리엄 롱제스페가 인솔한 잉글랜드 함대는 우연히 프랑스 함대를 발견했고, 프랑스 선원들은 이미 상륙하여 약탈하고 있었다. 무인 함대를 상대로 잉글랜드의 승리는 식은 죽 먹기였다.
stage_intro_3055=1214년, 잉글랜드 왕국, 신성 로마 제국, 플랑드르 백국으로 구성된 연합군이 프랑스 왕국을 공격하자 필리프 2세는 즉시 대군을 집결시켰다. 연합군의 기세에도 불구하고 잘 훈련된 프랑스 기병대는 결코 밀리지 않았다.
stage_intro_3056=헨리 3세 통치 시기 잉글랜드 내의 기근은 날이 갈수록 심해졌고, 이로 인해 헨리 3세에 대한 귀족들의 불만도 날로 심해졌다. 시몽이 이끈 헨리 3세의 지배에 대항하는 전쟁이 임박하였다.
stage_intro_3057=에드워드 1세의 감독하에 스코틀랜드의 새로운 왕이 선출되었다. 에드워드 1세는 스코틀랜드가 잉글랜드 통치하의 후국이 되어야 한다고 여겼으며, 잉글랜드가 프랑스에 대항할 수 있도록 도와달라고 요구했으나, 스코틀랜드인은 이에 반대하고 프랑스와 동맹을 맺었다.
stage_intro_3058=윌리엄 월리스의 인솔하에 스코틀랜드군은 지속적으로 잉글랜드를 공격하였다. 1298년, 에드워드 1세는 프랑스 왕국과 휴전하기로 결정하고, 잉글랜드로 돌아가 스코틀랜드의 진공을 막는 데 전념했다.
stage_intro_3059=폴커크 전투 후, 스코틀랜드는 잉글랜드에 거의 정복당하였다. 1306년, 로버트 브루스가 스코틀랜드의 왕위를 차지했는데, 에드워드 1세가 병사한 후 에드워드 2세의 지도력이 뜻대로 되지 않아 전세가 역전되었다.
stage_intro_3060=1323년, 로저 모티머는 런던탑에서 탈출한 후, 이사벨라를 만났다. 양측 모두 에드워드 2세에 대해 큰 불만을 품었고, 그의 통치에 반항하기로 하였다. 1326년, 이사벨라와 모티머는 비밀리에 잉글랜드로 돌아갔고, 그들의 저항을 시작하였다.
stage_intro_3151=콘스탄티노플이 함락된 후, 니케아 제국과 에피루스 전제군주국은 가장 큰 두 비잔티움 망명 정권이 되었다. 그들 모두 먼저 비잔티움 제국을 부활 시킬 수 있기를 바랐으나, 이러한 공통의 목표는 오히려 두 정권 충돌의 근원이 되었다.
stage_intro_3152=에피루스 전제군주국과의 쟁탈전에서 최후의 승리를 거둔 니케아 제국은 야심찬 미하일 8세의 지휘하에 콘스탄티노플에 있는 라틴 제국에 눈을 돌렸다.
stage_intro_3153=1261년, 니케아 제국은 제노바 공화국과 동맹을 맺고 다시 콘스탄티노플을 공격할 준비를 했다. 라틴 주둔군과 베네치아 함대가 원정에서 아직 돌아오지 않았다는 것을 발견하였을 때, 그들은 이번 절호의 기회를 놓치지 않기로 하였다.
stage_intro_3154=비잔티움 제국을 재건한 후, 미하일 8세는 주변의 라틴 제국의 잔당을 숙청하려고 애썼다. 1263년, 비잔티움 군대는 아카이아 공국을 공격하였는데, 수도를 점령할 때 완강한 저항을 받았다.
stage_intro_3155=프리니차 전투의 패배로 인하여 모레아에서의 비잔티움 제국의 전세는 더 피동적인 상황에 빠졌고, 용병들이 도망치거나 군대가 분산되는 문제가 심각해졌다. 1264년, 기욤 2세가 이끈 라틴 제국군은 흩어진 비잔티움 군대를 공격했다.
stage_intro_3156=1274년, 비잔티움 제국은 테살리아의 요안니스를 공격하였고, 요안니스 두카스는 거대한 비잔티움 군대에 맞서 외부에 지원을 요청할 수밖에 없었다.
stage_intro_3157=에게 해에 대한 제국의 지배권을 유지하기 위해 비잔티움 제국은 해군을 재편성하였다. 그러나 모레아와 세테포치 전투의 패배로 군대는 큰 타격을 입었고, 이로 인해 라틴 귀족들은 데메트리아스 항구의 비잔티움 해군을 공격하기로 하였다.
stage_intro_3158=앙주 시칠리아 왕국에 있어서 베라트는 전략적으로 매우 중요한 요새 도시였다. 1280년, 비잔티움 제국은 적들이 비잔티움 제국의 중요한 지역에 쉽게 진입할 수 없도록 군대를 보내 베라트를 공격했다.
stage_intro_3251=1302년, 미하일 9세의 군대가 오스만군의 기세에 눌려 해산되었다. 안드로니코스 2세는 니코메디아가 직면하고 있는 심각한 상황을 지원하기 위해 보스포루스 해협을 건너 군대를 파견하게 되었다.
stage_intro_3252=1321년, 젊은 안드로니코스 3세는 할아버지가 너무 늙었기 때문에 자신이 황제의 자리를 맡아야 한다고 생각하여 조손 두 사람은 내전을 벌였다. 오스만 군은 이 기회에 부르사 성을 공략하기로 하였다.
stage_intro_3253=라틴 제국으로부터 콘스탄티노플을 탈환한 후, 비잔티움은 그리스 지역에 대한 지배를 회복하기 위해 너무 많은 노력을 기울였고, 아나톨리아 동부 전선의 부대를 불러들였다. 이러한 움직임으로 오스만 제국은 새로운 공격을 감행하게 되었다.
stage_intro_3254=1329년, 아나톨리아에 있는 비잔티움의 지배 구역이 급격히 줄어들었다. 주변 지역을 안정시키기 위해 안드로니코스 3세는 니코메디아로 군대를 파견하기로 결정했지만, 군대는 펠레카논에서 오스만군의 요격과 공격을 받았다.
stage_intro_3255=비잔티움의 내란은 비잔티움을 거의 붕괴시켰다. 요안니스 6세는 자신의 아들을 구출하기 위해 오스만 제국에 도움을 청했다. 그들은 세르비아 제국과 불가리아 제2제국의 연합군을 상대하게 될 것이다.
stage_intro_3256=1352년, 비잔티움은 다시 내전에 휩싸였고, 오스만군은 용병으로 갈리폴리 근처의 요새를 점령하였다. 1354년, 한 차례의 지진이 갈리폴리의 상황을 완전히 바꾸어 놓았다.
stage_intro_3257=1352년, 오스만 제국이 발칸 반도에서 첫 번째 요새를 점령한 이후, 유럽에서 급속히 확장하기 시작하자 불가리아의 황제 이반 알렉산더르는 이 군대의 진격을 저지하기로 결정했다.
stage_intro_3258=갈리폴리를 점령한 후, 오스만 제국의 발칸 남부에서의 확장 속도는 더욱 빨라졌다. 일련의 불안과 정돈을 거친 후, 오스만 제국은 비잔티움 제국의 세 번째 주요 도시인 아드리아노플을 공격하기로 하였다.
stage_intro_3351=1337년, 프랑스 의회가 잉글랜드로부터 아키텐 공국을 되찾기로 결정하면서 양측의 갈등은 일촉즉발의 상황에 치달았다. 영국 해협의 제해권을 되찾기 위해 에드워드 3세는 직접 함대를 이끌고 프랑스 해군을 공격하였다.
stage_intro_3352=제해권을 탈취한 후, 에드워드 3세는 부대를 이끌고 포츠머스에서 출발하여 프랑스 북안에 도달한 후 공격을 개시했다. 강력한 프랑스군은 수비 태세를 갖추고 있었고, 양측 군대는 크레시 주변에서 곧 부딪칠 것이다.
stage_intro_3353=크레시 전투의 승리로 에드워드 3세는 몹시 기뻐했고, 영국군은 승승장구하여 칼레를 점령하기로 결정했다. 이곳을 점령하면 유럽 대륙의 교두보를 확보할 수 있지만, 전투가 이렇게 어려워질 줄은 몰랐다.
stage_intro_3354=1346년 9월, 잉글랜드의 대군이 칼레를 포위 공격하고 있을 때, 필리프 6세는 에드워드 3세가 군대를 나누어 본토를 구원하도록 데이비드 2세에게 잉글랜드를 공격할 것을 요청하였다. 데이비드는 프랑스와의 오랜 동맹 관계를 고려하여 잉글랜드를 침공하기로 결정하였다.
stage_intro_3355=브르타뉴는 매우 중요한 위치에 자리 잡고 있다. 그러므로 브르타뉴의 계승권 분쟁에 영국과 프랑스 양국은 모두 참여하게 되었고, 모두 브르타뉴가 자국의 편을 들기를 원해 전장에서 우위를 차지하려고 하였다.
stage_intro_3356=1356년, 흑태자 에드워드는 영국군의 기병 사령관이 된 후, 영국군을 이끌고 프랑스 땅에서 초토화 정책을 시행하여 상당한 성공을 거두었다. 장 2세는 흑태자에게 복수하기 위해 행군 속도를 늘리기로 결정하였다.
stage_intro_3357=프랑스 왕 장 2세는 푸아티에 전투에서 포로로 잡힌 후, 잉글랜드에 넓은 영토를 할양하였다. 하지만 에드워드 3세의 야심은 여기서 그치지 않았고, 그는 원정을 일으켜 랭스에서 프랑스 왕으로 대관식을 치르기로 결심하였다!
stage_intro_3358=프랑스는 만신창이가 되었지만, 하루도 왕이 없어서는 안 되었다. 샤를 왕세자는 랭스로 가서 왕으로 대관식을 치르기로 결정했고, 에드워드 3세는 파리와 랭스 사이의 도로를 차단하여 대관식을 저지하기로 하였다.
stage_intro_3359=모롱 전투 이후 브르타뉴 계승자들 사이에는 오랫동안 휴전하였지만, 양측은 영국과 프랑스의 지원 아래 오랫동안 힘을 축적해 왔으며, 그들은 모두 결전의 준비를 하고 있었다.
stage_intro_3360=1369년 10월, 고급 귀족이 아닌 베르트랑은 샤를 5세에 의해 새 육군 통수권자로 임명되었는데, 관례를 깬 이 행동은 결국 프랑스 왕에게 보답을 가져다주었다! 겨울이 다가옴에 따라 영국군 내부에서는 어떻게 겨울을 지낼 것인가에 대한 논쟁이 다시 일어났다. 프랑스 군대는 이 기회를 틈타 영국군을 향해 공격을 개시하였다.
stage_intro_3361=1372년, 카스티야 왕은 1368년에 결성된 프랑스-카스티야 동맹 협약에 따라 프랑스군을 돕기 위해 아키텐으로 함대를 파견하였다. 함대는 라 로셸 외해에서 프랑스로 향하던 잉글랜드 함대와 만났다.
stage_intro_3362=만년의 에드워드 3세는 전쟁할 마음이 없었다. 흑태자 에드워드의 죽음으로 그는 자신감을 잃게 되었다. 그의 또 다른 아들 곤트의 존은 사령관이 되었지만, 프랑스에서 여러 차례 약탈하여 프랑스 민중에게 큰 피해를 가져다주었다.
stage_intro_3451=샤를 6세는 이미 미친 왕이 되었고, 왕실 간의 투쟁은 갈수록 더욱 심해졌다. 프랑스의 불안정한 국정은 젊은 헨리 5세에게 기회를 주었다. 1415년에 헨리 5세는 그의 증조부의 진격로를 따라 프랑스를 정복하고, 양국의 왕이 되기로 결정하였다.
stage_intro_3452=헨리 5세가 프랑스에서 거둔 승리는 영국에게 실질적인 이익을 가져다주지 못했고, 의회가 제공하는 지원도 점점 줄어들자 그는 루앙을 점령하여 더 많은 프랑스 영지를 탈취하기로 결정했다.
stage_intro_3453=양 세력의 투쟁은 프랑스를 완전히 분열시켰고, 용맹공 장이 암살당하게 되자 부르고뉴 공국은 완전히 영국 쪽으로 기울어졌다. 게다가 <트루아 조약>의 체결로 헨리 5세는 명목상 프랑스의 왕위 후계자가 되었다. 이때 샤를 왕세자는 스코틀랜드의 지원을 받게 되면서 대전은 의도치 않게 촉발되었다.
stage_intro_3454=샤를 왕세자는 보제 전투의 승리로 매우 기뻐했고, 프랑스 귀족들은 승세를 몰아 잃었던 국토를 더 많이 되찾으려고 한다. 그러나 헨리 5세는 새로운 공격을 계획하고 있다.
stage_intro_3455=헨리 5세와 샤를 6세는 죽은 지 2년이 지났고, 샤를 7세는 아직 대관식을 치르지 않았으며, 헨리 6세는 아직 어리기 때문에 베드퍼드 공작이 섭정하고 있다. 2년 동안 서로 승패가 엇갈리면서 모두 상대의 주력 부대를 단번에 섬멸하려고 기회를 노리고 있다.
stage_intro_3456=영국군의 신속하고 맹렬한 공세에 비해 프랑스 정부의 대응은 매우 둔하고, 전투 자금이 부족하고, 귀족들은 각자 자기 멋대로 일을 처리하여 승리의 저울은 결국 프랑스 쪽으로 기울지 않았다. 게다가 연속적인 타격은 샤를 7세를 거의 절망에 빠뜨렸다.
stage_intro_3457=오를레앙이 영국군에게 공략당한다면 프랑스 중부의 마지막 장벽이 무너질 것이다. 이는 샤를 7세의 가장 암울한 시기지만, 신은 이 위태로운 나라에 한 줄기 빛을 하사하였는데, 잔 다르크라는 소녀가 나섰다.
stage_intro_3458=오를레앙이 포위를 성공적으로 뚫었다는 소식은 프랑스 전역을 진작시켰다. 프랑스군은 잔 다르크의 격려로 전쟁 준비를 강화하여 루아르 계곡의 모든 영국군 거점을 제거할 준비를 하고 있다.
stage_intro_3459=잔 다르크는 샤를 7세가 노르망디 침공 계획을 포기하고, 랭스로 가서 대관식을 치름으로써 영국군의 사기를 더욱 약화시키기를 바랐다. 영국군은 후스 전쟁을 지원하던 정예병을 집결하여 저격하러 왔다.
stage_intro_3460=지원이 부족했기 때문에 잔 다르크는 콩피에뉴 전투에서 포로가 되었고, 2년 후에 사망하였다. 이는 그녀의 전우들의 복수를 불러일으켰고, 심지어 프랑스 하층민들마저 이 전투에 참여하게 되었다.
stage_intro_3461=1435년, 섭정왕 베드퍼드 공작의 죽음으로 영국은 부르고뉴 공국이라는 동맹을 잃게 되었고, 노르망디의 영지가 혼란 상태에 빠지게 되자 샤를 7세는 이 틈을 타서 파리를 수복하기로 결정하였다.
stage_intro_3462=1435-1436년 사이 대프랑스 전쟁에서 엄청난 대가를 치렀지만, 영국은 여전히 부르고뉴와 우호 관계를 맺으려고 하지 않았다. 그러므로 부르고뉴 공작은 영국에 맞서 칼레를 공략하기로 하였다.
stage_intro_3463=프랑스는 샤를 7세의 지배로 크게 회복된 반면, 영국인은 프랑스에서 노르망디와 기옌-가스코뉴 지역의 영지밖에 남지 않았다. 이에 잉글랜드는 본토로부터 많은 병력을 보내 배수진을 치기로 하였다.
stage_intro_3551=우글레샤는 대부분의 오스만 군대가 유럽을 떠나 아나톨리아로 진군하고 있다는 소식을 듣고, 발칸 반도에서 오스만 제국의 세력을 제거하기에 완벽한 시기라고 판단하여 기습 공격을 감행했다.
stage_intro_3552=결혼을 통한 발샤 2세의 영토 확장에 불만을 품은 토피아 가문의 카를 토피아는 오스만 제국에 제타 공국을 공격할 것을 요청했고, 무라트 1세는 이에 흔쾌히 동의했다.
stage_intro_3553=무라트 1세는 1387년 아나톨리아 문제를 처리하기 위해 발칸 반도를 떠났고, 발칸 반도의 봉신 세력은 오스만 제국의 통치에서 벗어나기 위해 동맹을 결성하여 오스만 제국의 권위에 도전했다.
stage_intro_3554=1388년 아나톨리아에서 돌아온 무라트 1세는 즉시 불가리아에 대한 전격전을 개시했다. 보스니아의 통치자들도 즉시 불가리아를 원조했다.
stage_intro_3555=코소보는 마케도니아와 세르비아 두 지역을 연결하는 지역으로, 오스만 제국이 이곳을 점령하면 세르비아의 상당 부분을 잠식할 수 있기 때문에 라자르 대공이 조직한 연합군은 코소보 지역에서 오스만 제국에 맞서 치열한 전투를 벌였다.
stage_intro_3556=무라트 1세가 뜻밖에 암살당한 후, 그의 아들 바예지트 1세가 왕위에 올랐다. 이때 영국과 프랑스 간의 백년전쟁은 이미 휴전기에 접어들었고, 멸망해가는 동로마를 구하기 위해 서방의 기사들이 연합하여 십자군을 일으켰다.
stage_intro_3557=바예지트 1세가 비잔티움에게 최후의 일격을 가하려고 할 때, 동방의 티무르가 15만 대군을 이끌고 성 앞에 도착해 오스만 제국이 생사의 갈림길에 봉착하게 되자 비잔티움은 숨을 돌릴 수 있었다.
stage_intro_3558=앙카라 전투에서 바예지트 1세가 포로로 잡혀 우울하게 사망한 후, 오스만 제국 내부의 투쟁이 이어져 결국 새로운 술탄 무라트 2세가 탄생했지만, 제국의 국력이 일시적으로 허약해졌기 때문에 종속국들이 반란을 일으켰다.
stage_intro_3559=베네치아인들은 테살로니키 지역에 대한 완전한 자치권을 얻기 위해 오스만 제국에 전쟁을 선포했고, 술탄은 이를 용납할 수 없어 대군을 파견하여 포위 공격했다!
stage_intro_3560=교황 에우제니오 4세는 폴란드와 헝가리를 포함한 여러 국가의 군대를 소집하여 새로운 십자군 원정을 시작했고, 당시 퇴위했던 무라트 2세는 기세등등한 십자군의 공격에 맞서기 위해 군대를 재편성해야 했다.
stage_intro_3561=섭정왕 후녀디 야노시는 전사한 왕의 복수를 위해 4년간 준비한 끝에 1448년 헝가리 왈라키아 연합군을 이끌고 오스만 제국을 기습 공격했다.
stage_intro_3562=1451년 메흐메트 2세는 왕위를 계승한 후 2년 동안 거대한 대포와 화승총을 개조하고, 해안 요새를 건설하고, 해협을 봉쇄하는 등 만반의 준비를 했고, 천 년을 지켜온 도시 콘스탄티노플은 가장 강력한 적을 맞이하게 되었다.
stage_intro_3651=정신병이 발작한 지 1년 후, 헨리 6세는 건강을 회복하였다. 왕후 마거릿 앙주의 지지로 서머싯 공작은 복직하게 되었고, 요크 공작 리처드는 호국경의 지위를 잃고 궁정을 떠나야 했다. 1455년, 서머싯 공작에게 불만을 품은 요크 공작 리처드는 서머싯 공작을 단번에 제거하기 위해 네빌 가문과 힘을 합쳐 군대를 이끌고 런던으로 진군했다.
stage_intro_3652=제1차 세인트알반스 전투가 막을 내리면서 요크 공작은 궁정에서 자신의 적수를 대부분 제거하고, 호국경의 자리를 되찾았다. 그러나 얼마 지나지 않은 1456년 초, 왕실을 위해 토지를 탈환하려는 요크 공작의 법안이 의회에서 부결되면서 본인도 호국경의 자리에서 물러나야 했다. 이와 동시에 왕비 마거릿도 왕가의 권력을 되찾기 위해 비밀리에 힘을 모으고 있었다. 1459년, 양측의 갈등이 격화되자 요크파의 솔즈베리 백작은 요크 공작과 합류하기 위해 군대를 이끌고 남하하였다. 마거릿은 즉시 군대를 파견하고 요격했고, 양측은 블로어 히스에서 조우전을 벌였다.
stage_intro_3653=요크 공작은 솔즈베리 백작과 성공적으로 합류한 후에도 멀리 진격하지 못하였다. 헨리 6세 국왕의 깃발을 내건 군대가 그들을 가로막았는데, 이 부대의 규모는 그들의 2~3배에 달했다. 양측 군력의 격차로 인해 요크 공작은 일시적으로 부대를 후퇴시켜 주둔하고, 왕에게 자신의 충성을 표하는 편지를 보냈다. 그러나 블로어 히스에서 벌어진 전투로 인해 그는 왕의 믿음을 잃었고, 대전이 불가피하게 되었다.
stage_intro_3654=러드포드 브릿지 전투의 패배로 궁정에서 요크 가문의 지위는 급락하게 되었고, 랭커스터 가문은 점차 세력을 넓혀 요크 가문의 영지 일부를 획득했다. 비록 명목상 서머싯 공작은 원래 킹메이커 워릭의 영지였던 칼레를 얻었지만, 칼레 지역은 서머싯 공작의 지배를 거부했다. 1460년 1월, 워릭은 칼레 지역을 공격하려고 샌드위치에 주둔하고 있던 랭커스터 군대를 선제 공격하고, 서쪽으로 진격하여 런던까지 쳐들어갔다. 랭커스터 가문의 군대는 이 소식을 듣고 몰아치는 요크 가문의 군대를 막기 위해 재빨리 노샘프턴에 방어선을 구축했다.
stage_intro_3655=노샘프턴 전투 이후, 리처드 요크 공작은 한 법안을 통과시켰다. 이 법안은 "국왕이 사망할 경우, 리처드와 그의 자손이 왕위를 상속할 수 있다"는 내용이었는데, 이는 그가 권력의 정상에 거의 도달했다는 것을 의미한다. 그러나 그의 앞에는 마지막 장애물이 남아있었다. 즉, 원래의 왕후 마거릿은 랭커스터 가문의 동맹들을 킹스턴어폰헐에 집결시켜 런던으로 남하하려 했다. 요크 공작 리처드는 이 소식을 듣고 신속히 부대를 편성하고 북상하여 그들과 맞섰다. 하지만 급히 출병한 탓에 이 부대는 상대보다 규모가 작을 뿐만 아니라 보급도 부족했다. 요크 공작 리처드는 첫 교전에서 밀려 지원을 기다리기 위해 어쩔 수 없이 샌들 성으로 철수해야 했다.
stage_intro_3656=요크 공작 리처드는 웨이크필드 전투에서 패배한 후 사망했고, 그의 아들 에드워드 4세가 그의 작위를 상속하게 되었다. 당시 에드워드 4세는 겨우 18세였지만 나이를 뛰어넘는 리더십과 지휘 능력을 과시했다. 요크 공작 리처드가 패배한 지 불과 한 달 후, 에드워드 4세는 군대를 이끌고 모티머스 크로스에서 랭커스터 군대와 격전을 벌였다.
stage_intro_3657=모티머스 크로스 전투 이후, 에드워드 4세가 헤리퍼드에서 군대를 재정비하는 동안 마거릿 왕후의 동맹군은 즉시 북쪽에서 남쪽으로 진격하였다. 불과 보름 만에 수만 명에 달하는 이 군대는 런던으로 접근했고, 킹메이커 워릭은 군대를 이끌고 그들과 맞섰다. 공교롭게도 6년 전 요크 가문과 랭커스터 가문의 첫 전투와 마찬가지로 이번 전투 역시 세인트알반스라는 작은 마을이었다. 그러나 이번 대결의 결과는 6년 전과 완전히 달랐다.
stage_intro_3658=마거릿의 군대가 세인트 알반스 전투에서 승리했지만, 전투 이후 군대가 저지른 일련의 폭행으로 인해 런던 시민들은 그들을 환영하지 않았고, 마거릿은 어쩔 수 없이 북쪽으로 철수할 수밖에 없었다. 그 후 얼마 지나지 않아 런던에서 인심을 얻은 에드워드 4세가 왕으로 추대되었고, 원래 왕이었던 헨리 6세는 폐위되었다. 이 소식을 알게 된 마거릿은 에드워드 4세를 완전히 소멸하기 위해 잉글랜드 북부에서 요크 가문을 반대하는 거의 모든 세력을 소집하였는데, 이로부터 잉글랜드 본토에서 가장 잔혹한 전투가 시작되었다.
stage_intro_3659=타우턴 전투에서 에드워드 4세는 자신을 반대하는 랭커스터파를 대부분 물리쳤다. 그 후 몇 년 동안 에드워드 4세는 이전의 적들과 화해하기 위해 다양한 수단을 동원했는데, 그 중에는 그의 원수였던 제3대 서머싯 공작인 헨리 보퍼트도 포함되었다. 1463년 말, 서머싯 공작은 폐위된 헨리 6세를 비밀리에 만났고, 곧 다시 반란을 일으켰다. 분노한 에드워드 4세는 서머싯 공작을 완전히 멸망시키기 위해 존 네빌에게 반란을 진압하도록 명령했다.
stage_intro_3660=해츨리 습지에서 패배한 서머싯 공작은 헥삼 해안으로 철수했다. 그는 군대를 세 갈래로 나누어 방어 시설을 건설함으로써 추격자들을 헥삼의 남쪽에 막으려 했다. 그러나 존 네빌은 서머싯 공작에게 숨 돌릴 틈을 주지 않기 위해 신속히 추격하였다.
stage_intro_3751=1469년, 잉글랜드 북부에서 '레데스데일의 로빈'이라는 사람이 여러 차례 반란을 일으켰고, 에드워드 4세에게 오랜 원한을 품고 있던 킹메이커 워릭도 이번 기회에 반란을 일으켜 에지코트에서 반란을 진압하러 온 군대를 공격하였다.
stage_intro_3752=1470년, 워릭은 또 다른 반란을 일으키려 했지만, 에드워드 4세는 혼필드에서 반란군을 몰아냈다. 많은 반란군들은 도망갈 때 마크가 달린 옷을 벗었기 때문에 이번 전투는 '루즈코트 필드 전투'라고도 불렸다.
stage_intro_3753=루즈코트 필드 전투 이후, 킹메이커 워릭은 해외로 도망가서 앙주 가문의 마거릿과 동맹을 맺음으로써 랭커스터 가문의 지원을 받았다. 1471년 4월, 안개가 자욱한 아침에 전우였던 에드워드 4세와 킹메이커 워릭은 최후의 전투에 나섰다.
stage_intro_3754=바넷 전투와 동시에 앙주 가문의 마거릿은 랭커스터 가문의 해외 군대를 이끌고 잉글랜드에 상륙하여 런던으로 진군하기 시작했다. 에드워드 4세는 바넷 전투가 끝나갈 무렵 이 사실을 알게 되었고, 군대가 매우 지쳐 있었음에도 불구하고 마거릿과 전투를 벌였다.
stage_intro_3755=1483년 4월, 에드워드 4세가 병으로 사망한 후, 그의 동생 리처드가 호국경으로 임명되었다. 그리고 에드워드 5세가 실종 되고, 리처드가 왕위에 올라 '리처드 3세'로 불렸다. 에드워드 4세의 옛 동맹들은 이를 권력 찬탈로 간주하고, 헨리 튜더를 지지하였다. 얼마 지나지 않아 영국에서 다시 반란이 일어났다.
stage_intro_3756=1483년 크리스마스에 랭커스터 가문의 헨리 튜더는 요크 가문의 엘리자베스 우드빌의 딸과 결혼했고, 두 가문은 공동의 적인 리처드 3세와 맞서기 위해 튜더 가문으로 통합되었다. 1485년 8월 22일, 헨리 튜더와 리처드 3세는 보즈워스 평원에서 전투를 벌였다.

