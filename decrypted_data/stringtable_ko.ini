stage_intro_4801=하랄드는 자신의 지위와 명성을 쌓기 위해 비잔티움의 바랑기아 호위대에 입대하였다. 그 후 10여 년 동안 그는 전설적인 업적을 남길 것이다.
stage_intro_4803=1035년, 하랄드는 바랑기아 호위대의 대장이 되었다. 같은 해 그는 바랑기아 호위대를 이끌고 소아시아를 점령하고, 아랍 제국으로 하여금 비잔티움 제국과 평화 조약을 체결하도록 했다.
stage_intro_4805=하랄드는 불가리아 지역을 진압하라는 명령을 받았다. 이번 진압에서 하랄드는 매우 잔혹했기 때문에 '불가리아 소각자'라는 칭호를 얻었다.
stage_intro_4807=동부의 전투가 일단락된 후, 하랄드는 시칠리아로 파견되었다. 이번에 그는 자신의 무력과 지혜를 통해 비잔티움을 도와 시칠리아를 되찾을 것이다.
stage_intro_4809=1047년, 망누스 1세가 죽은 후 하랄드는 노르웨이의 왕이 되었고, 그는 덴마크를 완전히 점령하기 위해 덴마크를 공격하기 시작했다.
stage_intro_4811=1062년, 하랄드와 덴마크 왕 스벤 2세는 니소 강 하구에서 해전으로 승부를 겨루기로 하였다. 이 전투에서 하랄드는 승리하였지만, 노르웨이 국내의 불안정한 국면으로 인해 양측은 결국 2년 뒤 평화협정을 체결하게 되었다.

stage_name_1701=에지코트 전투
stage_name_1702=루즈코트 필드 전투
stage_name_1703=바넷 전투
stage_name_1704=튜크스베리 전투
stage_name_1705=버킹엄의 반란
stage_name_1706=보즈워스 필드 전투

stage_intro_1701=1469년, 잉글랜드 북부에서 '레데스데일의 로빈'이라는 사람이 여러 차례 반란을 일으켰고, 에드워드 4세에게 오랜 원한을 품고 있던 킹메이커 워릭도 이번 기회에 반란을 일으켜 에지코트에서 반란을 진압하러 온 군대를 공격하였다.
stage_intro_1702=1470년, 워릭은 또 다른 반란을 일으키려 했지만, 에드워드 4세는 혼필드에서 반란군을 몰아냈다. 많은 반란군들은 도망갈 때 마크가 달린 옷을 벗었기 때문에 이번 전투는 '루즈코트 필드 전투'라고도 불렸다.
stage_intro_1703=루즈코트 필드 전투 이후, 킹메이커 워릭은 해외로 도망가서 앙주 가문의 마거릿과 동맹을 맺음으로써 랭커스터 가문의 지원을 받았다. 1471년 4월, 안개가 자욱한 아침에 전우였던 에드워드 4세와 킹메이커 워릭은 최후의 전투에 나섰다.
stage_intro_1704=바넷 전투와 동시에 앙주 가문의 마거릿은 랭커스터 가문의 해외 군대를 이끌고 잉글랜드에 상륙하여 런던으로 진군하기 시작했다. 에드워드 4세는 바넷 전투가 끝나갈 무렵 이 사실을 알게 되었고, 군대가 매우 지쳐 있었음에도 불구하고 마거릿과 전투를 벌였다.
stage_intro_1705=1483년 4월, 에드워드 4세가 병으로 사망한 후, 그의 동생 리처드가 호국경으로 임명되었다. 그리고 에드워드 5세가 실종 되고, 리처드가 왕위에 올라 '리처드 3세'로 불렸다. 에드워드 4세의 옛 동맹들은 이를 권력 찬탈로 간주하고, 헨리 튜더를 지지하였다. 얼마 지나지 않아 영국에서 다시 반란이 일어났다.
stage_intro_1706=1483년 크리스마스에 랭커스터 가문의 헨리 튜더는 요크 가문의 엘리자베스 우드빌의 딸과 결혼했고, 두 가문은 공동의 적인 리처드 3세와 맞서기 위해 튜더 가문으로 통합되었다. 1485년 8월 22일, 헨리 튜더와 리처드 3세는 보즈워스 평원에서 전투를 벌였다.

rome_17=XVII

