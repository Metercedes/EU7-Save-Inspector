stage_group_desc_20008=1302년, 끊임없이 팽창하던 오스만 제국은 결국 비잔티움 제국과 국경에서 충돌이 일어났는데, 비잔티움 황제 미하일 9세는 직접 군대를 이끌고 출정했다가 패배하여 돌아왔다. 미하일의 아버지는 요르요스 무잘론에게 군대를 이끌고 지원하라고 명령하였다. 7월 27일, 비잔티움 군대는 바페오스 평원에서 오스만 1세가 이끄는 오스만 제국 기병대와 마주쳤다.

