skill_desc_52001=군단 정원이 차지 않았을 경우, 매 라운드마다 {0}30%{1} 확률로 한 팀의 튜턴 기사단 도끼병 또는 튜턴 기사단 보충됨
skill_desc_52002=군단 정원이 차지 않았을 경우, 매 라운드마다 {0}50%{1} 확률로 한 팀의 튜턴 기사단 도끼병 또는 튜턴 기사단 보충됨
