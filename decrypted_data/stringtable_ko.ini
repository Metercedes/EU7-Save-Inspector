skill_desc_50923=군단의 정원이 차지 않았을 경우 라운드당 {0}70%{1} 확률로 장다름 기사 한 팀 보충됨.
skill_desc_51251=선택한 대상과 주변의 적 유닛을 공격하여 부분 피해를 입힘, 쿨타임 {0}2{1} 라운드.(스킬 피해는 양측 장군의 기병과 원거리 능력의 영향을 받음)
skill_desc_51252=선택한 대상과 주변의 적 유닛을 공격하여 부분 피해를 입힘, 쿨타임 {0}1{1} 라운드.(스킬 피해는 양측 장군의 기병과 원거리 능력의 영향을 받음)
skill_desc_51261=적 유닛 하나를 섬멸할 때마다 사기 {0}1{1}과 병력 {0}1%{1} 회복.
skill_desc_51262=적 유닛 하나를 섬멸할 때마다 사기 {0}2{1}과 병력 {0}2%{1} 회복.
skill_desc_51272=1단계 스킬: 아군 부대의 정원이 차지 않았을 경우, 적군의 가장 앞줄의 부대를 강제로 모집하여 아군으로 만듬, 쿨타임 {0}1{1} 라운드. [br]2단계 스킬: 아군의 가장 앞줄의 부대를 정원이 차지 않은 아군 군단에 파견.(1단계 스킬을 사용할 수 없을 때 효력 발생, 라운드당 1회 사용 가능)
skill_desc_51282=1단계 스킬: 아군 부대의 정원이 차지 않았을 경우, 적군의 가장 앞줄의 부대를 강제로 모집하여 아군으로 만듬, 쿨타임 {0}1{1} 라운드. [br]2단계 스킬: 아군의 가장 앞줄의 부대를 정원이 차지 않은 아군 군단에 파견.(1단계 스킬을 사용할 수 없을 때 효력 발생, 라운드당 1회 사용 가능)
skill_desc_51291=내정 능력이 높을수록 아군 부대가 받는 피해가 낮음. 내정 능력이 100 이상일 경우 효력 발생.
skill_desc_51292=내정 능력이 높을수록 아군 부대가 받는 피해가 낮음. 내정 능력이 100 이상일 경우 효력 발생.
skill_desc_51301=선택한 대상과 랜덤으로 주변의 적 유닛 {0}2{1} 개를 공격하여 부분 피해를 입히고, 주변 아군의 사기 {0}10{1} 포인트 회복. 해당 스킬로 적 유닛 섬멸 시 추가로 주변 아군 사기 {0}10{1} 포인트 회복, 쿨타임 {0}2{1} 라운드.(스킬 피해는 양측 장군의 기병 능력의 영향을 받음)
skill_desc_51302=선택한 대상과 랜덤으로 주변의 적 유닛 {0}2{1} 개를 공격하여 부분 피해를 입히고, 주변 아군의 사기 {0}20{1} 포인트 회복. 해당 스킬로 적 유닛 섬멸 시 추가로 주변 아군 사기 {0}20{1} 포인트 회복, 쿨타임 {0}1{1} 라운드.(스킬 피해는 양측 장군의 기병 능력의 영향을 받음)

