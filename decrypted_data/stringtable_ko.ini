stage_intro_4221=<트루아 조약>이 체결된 후, 프랑스는 가장 암울한 시기에 빠졌다. 프랑스 영토의 절반 이상이 잉글랜드인들에게 점령당했다. 이 때 잔 다르크는 마치 기적처럼 프랑스 사람들 앞에 나타났다.
stage_intro_4223=잉글랜드인들은 오를레앙 밖에 성을 쌓아 오를레앙의 수비군을 가두어 죽이려고 했다. 잔 다르크는 더 이상 오를레앙을 고수하지 않고, 군대를 이끌고 선제 공격을 개시하였다. 그녀는 깃발을 흔들며 요새에 올라갔다.
stage_intro_4225=잔 다르크는 더 이상 오를레앙을 고수하지 않기로 결정하고 군대를 이끌고 주동적으로 공격에 나섰으며, 깃발을 휘날리며 요새에 올라갔다. 잔 다르크가 앞장 서서 부대를 이끄는 행위는 적군의 사기를 크게 떨어뜨렸고, 이로 인해 프랑스인은 오를레앙을 해방시키는 데 성공하였다.
stage_intro_4227=오를레앙의 포위가 뚫린 후에도 일부 잉글랜드군은 오를레앙에서 멀지 않은 자르조에 주둔하고 있었다. 프랑스는 오를레앙의 남동쪽 위협을 제거하고 잉글랜드의 역습을 분쇄하기 위해서는 자르조를 빠르게 공략해야 한다.
stage_intro_4229=자르조를 수복한 후, 잔 다르크는 그녀의 군대를 루아르 강변의 묑쉬르루아르로 재빨리 이동시켰다. 그녀는 그곳에서 공격을 감행하였는데, 이는 루아르 강 남부에 있는 잉글랜드군의 행군을 효과적으로 저해하였다.
stage_intro_4231=루아르 강가로 통하는 다리를 탈취한 후, 잔 다르크는 묑쉬르루아르의 도시나 성을 직접 공격하지 않고, 오히려 이튿날에 근처의 보장시를 공격하였다. 빠른 기세로 잉글랜드군은 도시를 포기하고 성곽으로 후퇴하였다.
stage_intro_4233=보장시가 하루만에 함락되자 잉글랜드 원군의 사기가 크게 떨어졌고, 여러 차례 고전한 잉글랜드군은 어쩔 수 없이 파리로 철수하였다. 잔 다르크는 행군 속도를 올리고, 전력으로 추격하기로 결정하여 양측은 결국 파테에서 마주치게 되었다.
stage_intro_4235=파테 전투의 승리는 프랑스를 통합하려는 잉글랜드의 야망을 종식했고, 프랑스 군대의 백년간의 쇠퇴를 씻어낸 승리가 되었다. 왕세자의 대관식에 필요한 교회를 탈취하기 위해 중장기병들이 랭스로 진군하였다.
stage_intro_4237=군대의 강력한 요청으로 샤를 7세는 파리 침공을 명령하였고, 잔 다르크는 프랑스군을 이끌고 파리에서 잉글랜드의 주력과 치열한 대전을 펼쳤다. 이번 전투에서 잔 다르크는 부상을 입었음에도 불구하고 가장 먼저 싸웠다.
stage_intro_4239=프랑스군이 파리를 강공하는 결정적인 순간에 프랑스 왕실은 오히려 군대에게 전투에서 철수할 것을 명령하였다. 뒤이어 잔 다르크는 라 샤리테로 파견되어 포위 공격을 감행하였지만, 한겨울에 군대와 식량이 부족한 상황에서 전투가 매우 어려웠다.
stage_intro_4255=잔 다르크는 콩피에뉴가 부르고뉴 공국에게 공격당했다는 소식을 듣고, 구원하러 가던 도중 적군에게 포위당하여 포로가 되었다. 그 후 이 민족 영웅은 부르고뉴 공국에 의해 잉글랜드 측에 팔려 루앙에서 화형당했다.
stage_intro_4257=잉글랜드는 잔 다르크를 이단으로 심판하였지만, 잔 다르크는 끝까지 굴하지 않고 자신이 무죄라고 굳게 주장하였다. 15세기 프랑스의 역사는 한 소녀의 의지로 인해 완전히 바뀌었다.

