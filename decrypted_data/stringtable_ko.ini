stage_intro_1501=우글레샤는 대부분의 오스만 군대가 유럽을 떠나 아나톨리아로 진군하고 있다는 소식을 듣고, 발칸 반도에서 오스만 제국의 세력을 제거하기에 완벽한 시기라고 판단하여 기습 공격을 감행했다.
stage_intro_1502=결혼을 통한 발샤 2세의 영토 확장에 불만을 품은 토피아 가문의 카를 토피아는 오스만 제국에 제타 공국을 공격할 것을 요청했고, 무라트 1세는 이에 흔쾌히 동의했다.
stage_intro_1503=무라트 1세는 1387년 아나톨리아 문제를 처리하기 위해 발칸 반도를 떠났고, 발칸 반도의 봉신 세력은 오스만 제국의 통치에서 벗어나기 위해 동맹을 결성하여 오스만 제국의 권위에 도전했다.
stage_intro_1504=1388년 아나톨리아에서 돌아온 무라트 1세는 즉시 불가리아에 대한 전격전을 개시했다. 보스니아의 통치자들도 즉시 불가리아를 원조했다.
stage_intro_1505=코소보는 마케도니아와 세르비아 두 지역을 연결하는 지역으로, 오스만 제국이 이곳을 점령하면 세르비아의 상당 부분을 잠식할 수 있기 때문에 라자르 대공이 조직한 연합군은 코소보 지역에서 오스만 제국에 맞서 치열한 전투를 벌였다.
stage_intro_1506=무라트 1세가 뜻밖에 암살당한 후, 그의 아들 바예지트 1세가 왕위에 올랐다. 이때 영국과 프랑스 간의 백년전쟁은 이미 휴전기에 접어들었고, 멸망해가는 동로마를 구하기 위해 서방의 기사들이 연합하여 십자군을 일으켰다.
stage_intro_1507=바예지트 1세가 비잔티움에게 최후의 일격을 가하려고 할 때, 동방의 티무르가 15만 대군을 이끌고 성 앞에 도착해 오스만 제국이 생사의 갈림길에 봉착하게 되자 비잔티움은 숨을 돌릴 수 있었다.
stage_intro_1508=앙카라 전투에서 바예지트 1세가 포로로 잡혀 우울하게 사망한 후, 오스만 제국 내부의 투쟁이 이어져 결국 새로운 술탄 무라트 2세가 탄생했지만, 제국의 국력이 일시적으로 허약해졌기 때문에 종속국들이 반란을 일으켰다.
stage_intro_1509=베네치아인들은 테살로니키 지역에 대한 완전한 자치권을 얻기 위해 오스만 제국에 전쟁을 선포했고, 술탄은 이를 용납할 수 없어 대군을 파견하여 포위 공격했다!
stage_intro_1510=교황 에우제니오 4세는 폴란드와 헝가리를 포함한 여러 국가의 군대를 소집하여 새로운 십자군 원정을 시작했고, 당시 퇴위했던 무라트 2세는 기세등등한 십자군의 공격에 맞서기 위해 군대를 재편성해야 했다.
stage_intro_1511=섭정왕 후녀디 야노시는 전사한 왕의 복수를 위해 4년간 준비한 끝에 1448년 헝가리 왈라키아 연합군을 이끌고 오스만 제국을 기습 공격했다.
stage_intro_1512=1451년 메흐메트 2세는 왕위를 계승한 후 2년 동안 거대한 대포와 화승총을 개조하고, 해안 요새를 건설하고, 해협을 봉쇄하는 등 만반의 준비를 했고, 천 년을 지켜온 도시 콘스탄티노플은 가장 강력한 적을 맞이하게 되었다.

campaign_name_129=콘스탄티노플의 정복자 
campaign_name_130=보헤미아의 구세주
campaign_name_131=동유럽의 백기사
campaign_name_305=실크로드의 보물
campaign_name_306=안드바리의 보물

campaign_desc_305=실크로드의 보물은 동서양을 관통하는 무역의 중요한 상징으로서, 아랍의 부유한 상인들이 이 곳에서 왕래하며 무역을 하면서 많은 진귀한 문물과 보물을 남긴 동시에 동서양 문화 교류의 역사도 목격하였다.
campaign_desc_306=북유럽 신화에 나오는 '안드바라나우트 반지'라는 마법 반지이다. 이 반지는 신비로운 힘을 가지고 있어 착용자가 무궁무진한 부와 힘을 얻을 수 있다고 전해진다.

