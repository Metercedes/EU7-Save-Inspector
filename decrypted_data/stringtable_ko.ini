stage_group_desc_20007=1214년, 신성 로마 제국 황제 오토 4세는 프랑스 왕 필리프 2세의 확장을 억제하기 위해 잉글랜드 왕 존을 비롯한 필리프 2세의 반대 세력들과 연합군을 구성하여 프랑스 본토를 공격했다. 이 소식을 들은 필리프 2세는 그들의 공격을 막기 위해 신속히 군대를 이끌고 나섰다.

general_skin_20442=전투 천사 잔 다르크
Joan of Arc2=전투 천사 잔 다르크
general_desc_Joan of Arc2=잔 다르크는 시골 출신이지만, 전장에서 뛰어난 지휘관으로 활약했다. 전투에서 그녀는 특히 병사들의 앞에 서서 용감하게 싸우는 방식으로 사기를 북돋는데 능숙하며, 용맹한 모습은 병사들에게 깊은 인상을 남겼다.
general_skin_20172=부상하는 독수리 칭기즈 칸
Genghis Khan2=부상하는 독수리 칭기즈 칸
general_desc_Genghis Khan2=징기스칸은 권력을 잡기 전까지 여러 번 멸망의 위기에 몰렸지만, 그의 강하고 굳건한 의지는 모든 장애물을 극복하는 데 도움이 되었다. 현재 그는 몽골의 각 부족을 통일하였으며, 유라시아 대륙 전체가 이 새로운 군주의 도전을 마주하게 될 것이다.
general_skin_20175=소녀 마틸다
Empress Matilda2=소녀 마틸다
general_desc_Empress Matilda2=마틸다는 잉글랜드 왕 헨리 1세의 딸이며, 오빠의 사망으로 인해 왕위의 유일한 합법적 상속자가 되었다. 어린 마틸다는 아직 앞날에 펼쳐질 참혹한 살육을 깨닫지 못하고 있다.

battle_talk_700701=필리프 2세의 탐욕에 종지부를 찍을 때가 되었다.
battle_talk_700702=제왕의 깃발은 우리를 인도할 것이다!
battle_talk_700703=왕이 말에서 떨어졌다! 왕을 보호하라!
battle_talk_700704=오토 4세가 무모하게 돌진했다! 이것은 기습 공격을 위한 완벽한 기회이다!
battle_talk_700705=전장이 너무 위험하다. 잠시 후방으로 철수해야겠다.
battle_talk_700706=필리프 2세는 탐욕의 대가를 치르게 될 것이다.
battle_talk_700707=제왕의 깃발은 우리를 지켜주고 있다!
battle_talk_700708=필리프 2세가 말에서 떨어졌다! 그를 잡아라!
battle_talk_700709=폐하, 너무 무턱대고 돌진하지 마시고, 적의 매복 공격을 조심하십시오.
battle_talk_700710=적의 매복 계획은 수포로 돌아갔다. 계속 추격하여 모든 적을 섬멸하라!

