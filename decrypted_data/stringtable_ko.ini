general_skin_20140=고귀한 기사 살라딘
Saladin2=고귀한 기사 살라딘
general_desc_Saladin2=살라딘은 뛰어난 군사 지휘관일 뿐만 아니라 뛰어난 성품을 지닌 기사이기도 하다. 너그럽고 인자한 그는 전쟁 후 잔혹한 환경으로부터 많은 사람을 구출하였으며, 그의 적들조차도 그의 고귀한 성품에 감명을 받았다.
general_skin_20169=정복자 메흐메트
Mehmed II 2=정복자 메흐메트
general_desc_Mehmed II 2=무라트 2세가 죽은 후, 메흐메트 2세는 두 번째로 오스만 술탄의 자리에 올랐다. 그리고 그 후 30년 동안 오스만 주변의 세력들은 모두 그에게 패배할 것이다.
Wu Zetian=측천무후
general_desc_Wu Zetian=당나라 여제는 통치 기간 동안 교육과 문화를 발전시키기 위해 많은 노력을 기울였고 많은 인재를 선발했다. 그녀의 통치 아래 당나라의 경제는 더욱더 번영하고, 사회도 크게 발전하였다.




battle_talk_170101=반란군 우두머리를 처치하라!
battle_talk_170102=우리는 협공을 받게 되었다. 어서 윌리엄 허버트에게 구원을 요청하라!
battle_talk_170103=에드워드 4세의 지원군을 막아라! 아무도 통과시키지 마라!
battle_talk_170104=지원군이 모두 격파되었다. 총공격을 시작하라!
battle_talk_170201=배신자들이 어떤 운명을 맞는지 보여줄 시간이다.
battle_talk_170202=에드워드 4세가 내 아버지를 죽였다! 아버지를 위해 복수할 것이다!
battle_talk_170203=적이 패주하고 있다! 그들의 우두머리를 잡아라!
battle_talk_170204=로버트는 이미 죽었다! 저항을 포기하라!
battle_talk_170301=안개가 너무 짙어서 아군의 표지조차 보이지 않는다.
battle_talk_170302=우리가 우위를 점했다! 전진하라! 적군을 격파하라!
battle_talk_170303=전장으로 돌아가서 아군을 지원해야겠다.
battle_talk_170304=에드워드의 군대다! 그들을 섬멸하라!
battle_talk_170305=실패를 만회할 수 없으니, 후퇴할 방법을 생각해야 한다.
battle_talk_170306=워릭을 잡아라! 그를 놓치지 마라!
battle_talk_170401=우리 군대는 지쳤지만, 적군은 멀리서 와서 준비가 잘 되어 있지 않을 수도 있다.
battle_talk_170402=서둘러 요새를 건설하라. 요크의 군대가 도착하기 전에 준비를 마쳐야 한다.
battle_talk_170403=왼쪽 측면에서 적군이 발견되었다! 적의 기습 공격을 막아라!
battle_talk_170404=전장을 정리하라! 단 한 명의 적도 놓치지 마라!
battle_talk_170501=잉글랜드의 왕위는 리처드 3세가 차지해서는 안 된다! 헨리 튜더가 가장 적합한 사람이다!
battle_talk_170502=뻔뻔한 반역자! 반드시 대가를 치르게 할 것이다!
battle_talk_170503=리처드 3세의 세력이 너무 커졌다. 우리는 그의 세력을 약화시켜야 한다.
battle_talk_170504=버킹엄 공작을 잡아라! 그의 목을 잘라버릴 것이다.
battle_talk_170601=리처드 3세의 잔인한 통치는 오늘 종지부를 찍게 될 것이다.
battle_talk_170602=잉글랜드의 왕위는 오직 나의 것이다!
battle_talk_170603=전군 돌격! 목표는 리처드 3세이다!
battle_talk_170604=리처드 3세는 죽었다. 왕이여 만세!
battle_talk_700801=적이 발견되었다! 전투 준비!
battle_talk_700802=적의 수가 우리보다 많다. 전군은 후퇴하여 도시에 의지하여 방어하라!
battle_talk_700803=우리의 알란족 원군은 사기가 떨어져서 출전을 꺼리고 있다. 그들의 사기를 북돋울 방법을 찾아야 한다.
battle_talk_700804=알란족의 도움이 있으면, 우리는 반드시 적을 물리칠 수 있을 것이다.
battle_talk_700805=전세가 역전되어 우리가 밀리게 되었다.
battle_talk_700806=적군이 있다! 전투 대형으로 흩어져라!
battle_talk_700807=적은 주로 보병이므로, 우리는 기동력을 발휘하여 그들을 포위하는 것이 바람직하다.
battle_talk_700808=우선적으로 도시를 점령하여 그들의 퇴로를 차단하라!
battle_talk_700809=즉시 알란족에게 사람을 파견하여 구원을 요청하라!
battle_talk_700810=지원군이 있다고 해도 나는 그들을 모두 격파할 것이다!

