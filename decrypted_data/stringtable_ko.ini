stage_intro_30001=프랑스 북부의 노르만인 오트빌 가문은 파산 위기에 처했다. 열두 명의 아들과 두 딸을 둔 탕크레드는 더 많은 재산을 분배할 여유가 없었고, 장남 기욤은 다른 노르만인을 따라 예루살렘으로 순례한 다음 이탈리아 반도에 가서 기회를 찾았다.
stage_intro_30002=1025년 '불가리아 도살자' 바실리오스 2세가 사망했다. 후계자는 무능하지만, 바실리오스 2세가 창립한 군대는 여전히 강했다. 더 많은 식량, 면화, 설탕을 얻기 위해 황제는 요르요스 마니아키스를 주장으로 하여 부유한 시칠리아를 정복하기로 했다. 기욤 드 오트빌은 300명의 기사를 이끌고 용병으로 이 대열에 합류했다.
stage_intro_30003=메시나의 사라센족은 강력한 그리스인과 노르만 용병에 저항할 능력이 없었지만, 연합군의 사기는 높지 않았다. 키가 10피트에 달하는 동로마의 주장 요르요스 마니아키스는 성질이 매우 급하여 자주 병사들에게 체벌을 가했다.
stage_intro_30004=시칠리아 섬의 도시는 그리스인에게 식은 죽 먹기로 점령당했고, 죽음의 숨결이 시칠리아 전체를 뒤덮었다.
stage_intro_30005=2년 동안 그리스인은 12개의 도시와 요새를 점령했지만, 시라쿠사에서는 그렇게 운이 좋지 않았다. 주둔하고 있던 아미르는 강력하게 저항하여 그리스인의 공격을 여러 번 막아냈다.
stage_intro_30006=동로마 왕실은 마니아키스가 승리한 후 왕실을 배신하고 콘스탄티노폴리스를 점령할까봐 우려하여 보급품을 줄이고 용병들의 급여를 중단하기 시작했다. 마니아키스는 다시 한 번 노르만인을 공개적으로 모욕하고, 기욤과 노르만 용병은 원정군에서 벗어나기로 결정했다.
stage_intro_30007=롬바르디아인은 신성로마 제국과 동로마 제국의 틈새에 끼어 착취를 견디지 못해 봉기를 일으켰다. 이전 롬바르디아 지도자가 암살당한 후, 노르만족과 롬바르디아인은 베네벤토의 아테눌프를 지도자로 추천했다.
stage_intro_30008=동로마인은 노르만인과 롬바르디아인의 연합에 분노했다. 노르만인과 이탈리아의 동로마 장군 미하일 도키아노스의 협상이 실패한 후 전쟁은 불가피하게 되었다.
stage_intro_30009=롬바르디아인은 이탈리아 지역에서 노르만족의 강력함을 점차 인정하자 점점 더 많은 노르만 기사들이 이 땅에 와서 성공할 기회를 모색했다. 이것은 기욤의 힘을 점점 더 강하게 만들었다.
stage_intro_30010=동로마 군대는 점점 정면 전투에서 노르만족을 이길 수 없게 되었다. 그들은 롬바르디아인의 수령 아테눌프를 비롯한 많은 사람들을 뇌물로 매수했으며, 노르만인은 점점 승리가 불가능하다고 느꼈다.
stage_intro_30011=롬바르디아 귀족 살레르노 대공 과이마르 4세는 노르만족에게 봉지를 주겠다고 약속하고 자신의 조카딸을 기욤과 결혼시켰다. 대공은 기욤을 공식적으로 '아풀리아 공작'으로 봉하고 그 지역을 가장 권력있는 노르만 지도자 12명에게 분봉했다.
stage_intro_30012=1044년, 과이마르는 기욤에게 이탈리아 남부의 칼라브리아를 정복하라고 요청하고, 정복한 땅은 노르만족에게 주겠다고 약속했다. 이러한 상황에서 노르만족은 다시 탐험을 시작했다.
stage_intro_30013=1045년, 기욤과 과이마르가 다시 원정을 시작하려고 하던 직전에 기욤은 갑자기 열병에 걸려 36세의 나이로 사망했다.

family_letter=기재
family_letter_desc_101=사랑하는 아버지, 저는 예루살렘을 떠나 삼촌과 함께 이탈리아로 갔고, 아버지 덕분에 저희 일행은 매우 순주로웠습니다. 지중해의 기후는 노르망디보다 훨씬 좋습니다. 저는 반드시 여기서 성공할 수 있을 것입니다. 영예는 생명보다 소중합니다! … 마지막으로 어머니와 동생들에게 안부를 여쭙니다…
family_letter_desc_102=…사랑하는 아버지, 저희는 시칠리아에서 힘든 전쟁 중입니다. 사라센보다 빌어먹을 그리스인 마니아키스가 우리의 가장 큰 적입니다. 그는 인간의 목숨에 전혀 신경 쓰지 않습니다. 하느님의 보우가 아니었다면, 저와 형제들이 용맹하지 않았다면, 10개의 목숨이 있더라도 부족했을 것입니다…
family_letter_desc_103=…사랑하는 아버지, 우리는 2년 동안 그리스인을 위해 일해왔고, 수백 번의 전투를 겪으면서 몸에 흉터가 점점 많아졌지만, 수수료는 점점 줄어들고, 다시 돌아갈 목숨이 있을지도 모르겠습니다. 아버지의 건강을 기원합니다…
family_letter_desc_104=사랑하는 아버지, 우리는 이미 3개월 동안 아무런 보수도 받지 못했습니다. 여기서 우리는 흉터와 아픔을 제외하고 부도 명예도 얻을 수 없습니다. 떠날 때가 되었습니다…
family_letter_desc_105=사랑하는 아버지… 마니아키스가 그리스 황제에 의해 소환된 후, 이탈리아 지역의 그리스인은 더 이상 두려워할 대상이 아닙니다. 저는 '두려움 없는 사람' 찰리 같은 사람이 되어 새로운 개척자가 되고 싶습니다! 그러나 노르만족은 여전히 작은 이익을 위해 싸우고 있고, 영광과 명예는 그들에게 아무런 의미가 없습니다…
family_letter_desc_106=사랑하는 아버지… 저는 저주 받은 곳 칸나이로 가고 있습니다. 20년 전에 우리 동포들이 여기서 그리스인에게 패배했지만, 이곳은 그리스인에게도 저주받은 곳입니다. 한니발은 그곳에서 로마인에게 가장 치욕적인 패배를 선사했습니다. 하나님이 나를 도와주시길…
family_letter_desc_107=사랑하는 아버지… 아버지께서는 이미 천국에 계시지만, 제가 마침내 작위와 영지를 얻었다는 사실을 알려드리고 싶습니다. 저는 노르만인이 이탈리아의 새로운 주인으로 되게 할 것입니다…

