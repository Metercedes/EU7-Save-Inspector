stage_name_4731=베네치아와의 대립
stage_name_4732=베네치아와의 대립

stage_intro_4721=1146년, 마누일 1세는 튀르크족이 제국의 국경을 반복해서 공격하자 군대를 모아 룸 술탄국을 상대로 원정을 벌이기로 결정했다.
stage_intro_4723=1147년, 제2차 십자군 원정은 비잔티움 제국의 영토를 통과해야 했는데, 마누일 1세는 십자군과 비잔티움 군대와의 충돌을 우려했으며, 그의 이 우려는 곧 콘스탄티노플 교외에서 현실이 되었다.
stage_intro_4725=1155년, 제국의 영토를 회복하기 위해 마누일 1세는 대규모 군대와 많은 금화를 두 명의 장군에게 맡긴 후 그들을 이탈리아로 파견하여 노르만인을 상대로 하는 원정을 시작하였다.
stage_intro_4727=1159년, 안티오키아 공주의 남편 르노가 비잔티움 제국의 키프로스 섬을 약탈하자, 분노한 마누일 1세는 군대를 이끌고 출정하여 안티오키아 공국을 완전히 비잔티움의 종속국으로 만들었다.
stage_intro_4729=1167년, 마누일 1세는 시르미움 전투에서 헝가리군을 이기고, 아드리아 해 동해안의 많은 영토를 비잔티움 제국의 판도에 포함시켰다.
stage_intro_4731=1171년, 마누일 1세는 베네치아와 단교하고, 제국 내 베네치아 상인들의 선박과 화물을 압수했는데, 이는 베네치아의 보복적인 약탈을 불러왔다.

stage_name_4741=반란 진압
stage_name_4742=반란 진압
stage_name_4743=헝가리를 향한 서부 원정
