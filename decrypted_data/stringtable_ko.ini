;兵种描述

troop_desc_101=검과 방패를 든 부대로 전투 기술이 부족하여 직업 군인과 비교할 수 없다.
troop_desc_102=검과 방패를 든 부대로 일정한 군사 훈련을 받고 기초 전력을 갖추었다.
troop_desc_103=표준 군사 훈련을 받은 사람들로 구성된 부대이지만, 여전히 직업 병사들과 비교할 수 없다.
troop_desc_104=검과 방패를 든 부대로 견고한 방패가 그들의 가장 큰 특징이다.
troop_desc_105=장비가 뛰어나고 군사적 소양이 매우 높은 작전 부대로 군대 중의 정예이다.
troop_desc_107=양손에 대검을 들고 근접전에 능한 부대로 어떤 적을 상대해도 뛰어난 전투력을 발휘할 수 있다.
troop_desc_108=3대 기사단 중 하나로 강력한 전투력을 자랑하는 보병 부대이다.
troop_desc_109=전통적인 작전 방식을 고수하는 천성이 호전적인 용사로 어떤 군대에 두어도 정예라고 할 수 있다.
troop_desc_110=거대한 도끼가 그들의 상징이며, 탁월한 장비는 그들이 전사 중의 엘리트라는 것을 증명한다.
troop_desc_111=공격력이 뛰어난 중보병으로 장갑이 두껍고 사기가 드높다.
troop_desc_112=제식 무기로 무장하여 장비가 매우 훌륭한 정예 부대로 전투 소양이 매우 높다.
troop_desc_113=비잔티움 제국의 금위군 편제 중 가장 유명한 부대로 각지의 가장 정예한 전사들로 구성되었다.
troop_desc_114=재단조된 갑옷은 햇빛 아래서 황금처럼 보이고, 무거운 장비는 가장 강력한 전사만이 입을 수 있다.
troop_desc_115=당나라 정예부대로, 칼날이 매우 길고, 칼몸은 곧으며, 매우 예리한 횡도를 착용한 그들은 갑옷을 쉽게 뚫을 수 있다.
troop_desc_201=현지 평민을 모집하여 구성한 민병 부대로 흔히 볼 수 있으며, 주로 도시 방어와 지원을 담당한다.
troop_desc_202=창을 든 부대로 기병에게 상당한 피해를 줄 수 있다.
troop_desc_203=표준 군사 훈련을 받은 사람들로 구성된 부대이지만, 여전히 직업 병사들과 비교할 수 없다.
troop_desc_204=손에 창과 방패를 든 부대로 견고한 방패가 그들의 가장 큰 특징이다.
troop_desc_205=정예 전사는 적군의 기병을 효과적으로 격파할 수 있다. 주력 보병으로 사용할 수도 있다.
troop_desc_206=스코틀랜드 장창병은 다른 부대가 비교할 수 없는 규율을 자랑한다.
troop_desc_207=경각심이 높기 때문에 흔히 중요한 임무를 부여받는다.
troop_desc_208=로마 제국에서 비롯된 작전 군단으로 창을 무기로 하며, 적의 돌격을 두려워하지 않는다.
troop_desc_209=밀접하게 배열된 진형은 적의 다양한 공격에 대처할 수 있다.
troop_desc_210=적의 공격에 맞서 강력한 방어 능력을 발휘할 수 있으며, 공격할 때도 용맹하다.
troop_desc_211=전장의 만능 부대이자 보병 군단의 중요한 구성 부분으로 전쟁에서 여러 차례 전공을 세웠다.
troop_desc_212=당나라 정예부대로, 길이가 약 3미터에 달하고, 엄청난 위력을 지닌 맥도를 착용한 그들은 기병 부대의 악몽이다.
troop_desc_301=날렵하고 재빠른 기병의 척후는 전장에서 적의 동향을 정찰하는 명수이다.
troop_desc_302=공수를 겸비한 기병 부대로 기병 작전에서 주력 중의 하나이다.
troop_desc_303=귀족을 호위하는 기병 부대로 돌격할 때 적에게 큰 피해를 줄 수 있다.
troop_desc_304=장비가 뛰어난 중기병으로 기병 부대 중의 정예이다.
troop_desc_305=승마 작전에 적응하였지만, 여전히 보행 작전의 그림자가 보인다.
troop_desc_306=속도를 이용하여 적의 전선을 돌격하는 데 능한 부대로 돌격 공격의 명수이다.
troop_desc_307=정예 사막 기병 부대로 사막 지역에서 싸우는 능력이 매우 강하다.
troop_desc_308=몸집이 큰 짐승으로 전장에서 적에게 파괴적인 타격을 줄 수 있다.
troop_desc_309=3대 기사단 중 하나로, 전술에 능숙하고 실력이 강한 기병 부대이다.
troop_desc_310=3대 기사단 중 하나로 강력한 전투력을 자랑하는 기병 부대이다.
troop_desc_311=성묘의 수호자이며, 신앙심이 깊은 기사단 조직이다.
troop_desc_312=몽골 기병대는 훈련이 잘되어 있고, 규율이 엄격하여 무시무시한 부대로, 세계에서 유례없는 규모의 방대한 제국을 건립하였다.
troop_desc_313=당나라 황제 이세민의 친위부대로서, 전투력이 뛰어나다. 그들은 몸에 검은 갑옷을 걸치고, 규율이 엄격하며, 죽음을 전혀 두려워하지 않는다.
troop_desc_401=장창을 든 기병 부대로 돌격할 때 적에게 큰 피해를 줄 수 있다.
troop_desc_402=봉건 중세 유럽에서 어려서부터 군사 훈련을 받은 기사로 적들의 간담을 서늘하게 한다.
troop_desc_403=몸에 무거운 갑옷을 두른 기병 부대이다. 엄격한 훈련을 거쳐야만 장비의 무게를 견딜 수 있다.
troop_desc_404=귀족 출신의 정예 기병으로 전사와 군마는 모두 가장 훌륭한 장비를 사용한다.
troop_desc_405=무거운 갑옷을 입고도 전투에서 유연성을 유지할 수 있는 부대로 적수가 거의 없다.
troop_desc_406=귀족 출신의 정예 기병으로 전사와 군마는 모두 가장 훌륭한 장비를 사용한다.
troop_desc_407=각종 전법에 능통한 기병 부대로 돌격에 매우 능하기에 전장의 왕이다.
troop_desc_408=용맹하고 강력한 기병대로 뒤의 거대한 날개가 그들의 가장 큰 특징이다.
troop_desc_409=무거운 갑옷을 입은 기사로 적에게 치명적인 타격을 줄 수 있는 돌격을 감행할 수 있었다.
troop_desc_410=3대 기사단 중의 하나로, 작전이 매우 용맹스러운 기병 부대이다.
troop_desc_411=귀족 계층에서 조직하고 훈련된 기병으로, 훌륭한 장비를 갖추었다. 보통 대공의 친위대로서 전장에서 활약했다.
troop_desc_412=기사단의 주력인 서전트는 계급이 기사보다 낮지만, 전쟁터에서 그들의 중요성은 의심할 여지가 없다.
troop_desc_413=당나라 황실 부대로, 말과 함께 검은 갑옷을 입고 얼굴에 가면을 쓴 그들은 먹구름처럼 적을 덮칠 수 있다.
troop_desc_414=동로마 제국의 영광을 상징하는 정예부대로서 칼과 총알이 꿰뚫을 수 없는 무거운 갑옷에 엄청난 파괴력과 충격력을 지닌 군대
troop_desc_501=투척 무기를 능숙하게 다룰 수 있는 부대로 장비는 초라해 보이지만 상당한 전투력을 보유하고 있다.
troop_desc_502=창을 투척하는 부대로 비록 전투력이 강하지 않지만, 적진을 효과적으로 교란할 수 있다.
troop_desc_503=일반 경장 부대로 원거리 공격만 할 수 있고, 정규 부대와 근접 전투를 벌일 수 없다.
troop_desc_504=사용하기 편이한 원거리 무기를 사용하는 부대로 전투력을 빠르게 형성하고 밀접한 화력을 제공할 수 있다.
troop_desc_505=갑옷을 입고, 강력한 컴파운드 활을 사용하는 부대이다.
troop_desc_506=화승총으로 무장한 부대로 사격이 명중하면 적에게 큰 피해를 줄 수 있다.
troop_desc_507=어려서부터 전문적인 훈련을 받은 사람만이 사격을 할 수 있을 정도로 다루기 어려운 무기이다.
troop_desc_508=보통 용병으로 구성된 부대로 장비가 초라하다.
troop_desc_509=스페인 왕국이 아메리카 대륙을 정복한 부대로 탐욕스럽지만 엄청난 전투력을 갖추었다.
troop_desc_510=훌륭한 장비를 갖춘 화승총 부대로 사격할 때 생기는 자욱한 포연과 거대한 소리는 간담이 서늘해지게 한다.
troop_desc_511=사격술이 뛰어난 석궁수로 전쟁터에서 무자비하게 적의 목숨을 앗아갈 수 있다.
troop_desc_512=거대 방패를 짊어진 석궁 부대로 장전이 필요할 때는 적을 등져 효과적인 방어를 이룰 수 있다.
troop_desc_513=몸에 파란 물감을 칠한 전사로 게릴라전의 전문가이며, 숲에서의 전투력이 매우 높다.
troop_desc_514=장궁병이 전직한 부대로 일제히 쏘아 올린 화염 화살은 적에게 큰 피해를 입힐 수 있다.
troop_desc_515=당나라 정예부대로, 제갈연노를 장비한 그들은 하늘을 가릴 수 있을 정도의 어마어마한 화살을 쏠 수 있다.
troop_desc_601=기마술이 뛰어난 기병 부대로 달리는 말 위에서도 정확하게 창을 던질 수 있다.
troop_desc_602=강한 활을 장착한 기병 부대로 기사에 능하고, 사격술이 뛰어나지만 근접 전투에는 정통하지 못하다.
troop_desc_603=봉건 중세 유럽에서 어려서부터 군사 훈련을 받은 기사로 적들의 간담을 서늘하게 한다.
troop_desc_604=비록 작동이 느리지만, 무거운 갑옷을 입은 기사가 돌격할 때 던지는 투창의 위력은 매우 크다.
troop_desc_605=기승과 사격에 능한 기병 부대로 사막 지역에서 싸울 때 큰 우세를 발휘할 수 있다.
troop_desc_606=전투 코끼리의 거대한 몸집은 적을 격파하는 동시에 사수에게도 양호한 보호를 제공할 수 있다.
troop_desc_607=초원의 전사로 어릴 때부터 말 위에서 자랐으며, 각종 기습 작전에 능하다.
troop_desc_608=엘리트 직업 기병 부대로 어릴 때부터 각종 엄격한 훈련을 받았다.
troop_desc_609=전투 소양이 뛰어난 기동 부대로, 티무르 제국의 전투력을 확보하는 부대이다. 초원에서 그들의 돌격은 적을 오싹하게 할 수 있다.
troop_desc_314=에드워드 3세가 조직한 기사단으로 가장 존귀한 왕족만이 가입할 수 있으며 충성과 명예의 상징이다.
troop_desc_315=서요에서 가장 강한 전사와 가장 우수한 초원의 말들로 이루어진 부대로 용맹하고 싸움에 능하며, 오랫동안 전쟁터를 누벼 가는 곳마다 적을 무너뜨릴 수 있다.
troop_desc_415=장다름 기사는 프랑스의 상비 기병으로서, 귀족들의 봉건 기사보다 더 조직적이고 규율적으로 잘 무장된 대열이다.

