general_desc_Charles VII=프랑스가 가장 위급한 순간에 잔 다르크를 임명하여 승리를 이끌었다. 승리왕 샤를은 재위기간 동안 일련의 개혁을 진행하고, 상비군을 설립하여 최종적으로 백년전쟁을 종결시켰다.
general_desc_Jan Zizka=후스 전쟁 발발 후 그는 후스파에 가담하여 지도자가 되었다. 그가 사용한 '바겐부르크' 전술은 적들의 간담을 서늘하게 했으며, '전장의 영원한 승리자'라는 평가를 받았다.




