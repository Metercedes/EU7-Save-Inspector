stage_name_4708=비잔티움 침공
stage_name_4709=야르무크 전투
stage_name_4710=야르무크 전투
stage_name_4711=알레포 포위전
stage_name_4712=알레포 포위전

stage_intro_4701=할리드는 7세기 당시 이슬람 초기의 훌륭한 지휘관이었으며, 무함마드의 휘하에 든 후 '알라의 검'이라는 별명을 얻었다.
stage_intro_4703=633년, 무함마드의 후임인 라시돈 칼리프가 사산 페르시아 왕조와 국경 충돌이 발생하자 할리드는 출격하라는 명령을 받았다. 전투에서 페르시아군이 쇠사슬을 이용하여 기병대를 연결했기 때문에 이번 전투는 '사슬 전투'라고도 불린다.
stage_intro_4705=사슬 전투의 패배로 사산 왕조는 적에 대한 경계심을 키우게 되었고, 그들은 할리드를 섬멸하기 위해 두 갈래의 대군을 파견하였다. 그러나 할리드는 두 군대가 합류하기 전에 한 갈래의 부대를 포위하여 전장의 주도권을 확보했다.
stage_intro_4707=634년, 연승을 거둔 할리드는 철수하여 서쪽으로 진군하라는 명령을 받았다. 그의 새로운 상대는 비잔티움 제국의 중흥의 주인이라 불리는 이라클리오스 였다.
stage_intro_4709=636년, 전에 패배했던 이라클리오스 가 다시 대군을 집결하여 시리아로 접근하자 할리드는 군사를 이끌로 맞서 싸웠다. 양측은 야르무크 강 주변에서 6일간 잔혹한 전투를 벌였다.
stage_intro_4711=야르무크 전투에서 승리한 후, 할리드는 승승장구하여 군사 요충지인 알레포를 포위하고 점령하는 데 성공했는데, 이는 이라클리오스 의 원정이 완전히 실패했다는 것을 의미했다.

