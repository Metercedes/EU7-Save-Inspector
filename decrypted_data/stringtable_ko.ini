campaign_desc_65=오스만 제국 확장의 길에서 술탄마다 서방세계 전체에 대항하기 위해 일생의 정력을 다 해왔으며, 그들 앞에는 콘스탄티노플이라는 단단한 도시가 있었다.
campaign_desc_66=리처드 2세가 전복되자 에드워드 3세의 두 후손인 랭커스터 가문과 요크 가문은 잉글랜드의 왕위를 차지하기 위해 전투를 벌였다.
campaign_desc_301=전설에 나오는 파라오 왕의 보물에 관한 소식이 민간에서 널리 퍼졌다. 수많은 진귀한 보물들은 사람들이 침을 삼키게 만들었다.
campaign_desc_302=그동안 실지왕 존의 보물은 수많은 탐험가들의 마음을 사로잡았지만, 그 보물을 찾는 것은 결코 쉽지 않았다.
campaign_desc_303=예루살렘 성전 안에 숨겨둔 솔로몬 왕의 보물은 한동안 행방불명되었고 점차 잊혀 갔다. 하지만 현재 보물에 관한 소식이 다시 나타나면서 수많은 사람들은 보물을 찾기 위해 출발할 준비를 하고 있다.
campaign_desc_304=성전 기사단은 창립 때부터 사방으로 출정하여 대량의 재물을 축적했다. 해산 후, 그들은 남들이 노리는 것을 방지하기 위해 보물들을 묻어 두었는데, 지금까지 발견되지 않았다.
stage_group_desc_20001=로마 제국의 쇠퇴로 야만족들이 꿈틀거리고 있다. 훈족의 수장 아틸라는 동고트족, 게피드족, 프랑크족을 집결시켜 갈리아로 향하고 있다. 로마 제국은 위협을 느꼈고, 아에티우스도 많은 부대를 집결시켜 아틸라와 평원에서 대결전을 벌였다.
stage_group_desc_20002=아랍 제국의 확장 기세는 막아낼 수 없을 정도이다. 그들은 이미 북아프리카와 이베리아 반도 전체를 점령했다. 프랑크 왕국이 이 아랍 군대를 막아내지 못한다면 유럽 전체가 아랍에 정복될 것이다.
stage_group_desc_20003=아랍 제국과 당나라는 모두 중앙아시아 지역까지 확장하였다. 페르시아 제국의 멸망으로 중간 완충지대가 사라졌기 때문에 두 제국 사이에는 불가피하게 충돌이 벌어졌다.
stage_group_desc_20004=1066년, 노르망디 공작은 잉글랜드 왕위를 차지하기 위해 부대를 이끌고 해협을 건너 잉글랜드에 상륙하였다. 해럴드 2세는 소식을 듣고 즉시 군대를 소집하여 남쪽으로 내려가 헤이스팅스 부근에 수비군을 배치했다.
stage_group_desc_20005=셀주크 튀르크 제국의 부상은 메소포타미아 및 서쪽의 더 넓은 지역으로의 확장으로 이어졌는데, 아랍 제국은 내란으로 인해 이를 무시하였다. 만지케르트가 점령당하자 비잔티움 황제는 진노하여 그리스에서 병력을 조직하여 셀주크에게 치명적인 일격을 가하기로 결정했다!
stage_group_desc_20006=보두앵 4세의 죽음은 예루살렘 왕국을 더욱 큰 위기에 빠뜨렸다. 그들은 내부의 분열과 원치 않는 도발로 살라딘에게 성지를 수복할 기회를 주었다. 이로 인해 동서 간의 교전이 불가피하게 되었다.

;战役章节结束
;__font_type[font_text_]
campaign_end_desc_1=서로마 제국은 외적의 끊임없는 침공으로 멸망의 길을 걷게 되었다. 이 오래된 제국의 멸망은 마치 이미 정해져 있는 것 같았으나, 또한 매우 갑작스러웠고, 로마 제국의 강역은 대폭 축소되었다. 하지만 비잔티움 제국의 수도였던 콘스탄티노플은 완전히 다른 모습이었다.
campaign_end_desc_2=유스티니아누스 1세와 벨리사리우스는 명군과 현신의 모범이라고 할 수 있다. 그들은 비잔티움의 부상과 발전에 튼튼한 기초를 닦았고, 천년 제국의 발전에 지울 수 없는 공헌을 하였다.
campaign_end_desc_3=앵글로-색슨족의 침입으로 브리튼은 분열되어 있던 각 지역의 세력이 점차 통합되어 마침내 7왕국의 구도를 형성하게 되었는데, 이는 훗날 잉글랜드 왕국의 초기 형태이기도 하다.
campaign_end_desc_4=비잔티움 제국이 강력한 아랍인들과 싸우고 있는 동안 발칸 반도에서는 새로운 전쟁이 일어났다. 앞뒤로 적의 공격을 받는 거대한 비잔티움 제국은 언제든 무너질 것 같다.
campaign_end_desc_5=바이킹은 유명한 항해가이다. 그들은 유럽 각 나라를 침공했을 뿐만 아니라 아메리카, 아이슬란드 등 여러 지역에서도 활동하였다. 사람들은 바이킹이 확장한 시기를 '바이킹 시대'라고도 부른다.
campaign_end_desc_6=마케도니아 왕조는 비잔티움 제국 역사상 두 번째 전성기이다. '황금기'라 불리는 몇 세기 동안 마케도니아 왕조의 강역은 유스티니아누스 1세 이후로 볼 수 없었던 규모에 달하였다. 하지만 결국 후손이 끊어지면서 종말을 고했다.
campaign_end_desc_7=노르망디 왕조는 총 네 명의 국왕의 통치를 경험했고, 헨리 1세에 의해 잉글랜드에 장기적인 평화기가 유지되었다. 노르망디 왕조의 종말은 잉글랜드가 곧 새로운 시대를 맞이한다는 것을 의미하기도 한다.
campaign_end_desc_8=알렉시오스 1세가 데려온 십자군은 비잔티움 제국을 도와 강력한 적들을 격파했지만, 비잔티움 제국의 수세기에 이르는 토대를 무너뜨렸다. 콘스탄티노플의 함락과 라틴 제국의 부상은 비잔티움 제국의 종말을 알리는 종소리 같다.
campaign_end_desc_9=오랜 원정은 결국 실패로 끝났고, 예루살렘은 여전히 적의 점령하에 있다. 많은 인력과 재력을 소모한 후, 원정군은 콘스탄티노플을 약탈하였고, 라틴 제국도 이때 탄생하였다.
campaign_end_desc_10=이사벨라와 로저 모티머의 행동으로 에드워드 2세는 어쩔 수 없이 왕위를 포기해야 했고, 그의 아들 에드워드 3세에게 왕위를 물려주었다. 에드워드 3세의 즉위는 제2차 스코틀랜드 전쟁을 촉발했을 뿐만 아니라 잉글랜드와 프랑스 사이의 백년에 걸친 전쟁의 막을 열었다.
campaign_end_desc_11=콘스탄티노플의 함락과 재건으로 비잔티움 사람들은 서방 라틴 세계가 자신들에게 엄청난 위협을 가하고 있다는 것을 깨달았다. 한편, 동쪽의 아나톨리아 반도에는 한 신생 제국이 비잔티움 제국을 향해 침을 흘리고 있다.
campaign_end_desc_12=오스만 제국의 부상은 막을 수 없게 되었지만, 비잔티움 제국은 쉽게 고개를 숙여 굴복하지 않을 것이며, 서방의 여러 기독교 국가들도 비잔티움의 멸망을 보고만 있지 않을 것이다. 또한, 이 와중에 동방의 한 튀르크 부족도 점차 궐기하고 있어 오스만 제국의 확장은 결코 순탄치 않을 것이다.
campaign_end_desc_13=에드워드 3세는 결국 프랑스 왕으로 대관식을 치르지 못했지만, 양국의 전쟁은 계속되었다. 오래 지속된 이 전쟁은 영국과 프랑스 모두를 끝없는 심연으로 끌어들였으며, 막대한 부채와 전염병이 양국을 일시적으로 더 이상 싸울 수 없게 만들었다.
campaign_end_desc_14=비록 전쟁은 결국 프랑스가 승리하였지만, 100년에 걸친 전쟁으로 잉글랜드와 프랑스의 모든 국민은 큰 고난을 겪었고, 전쟁 후 잉글랜드는 유럽 대륙에서 그들의 대부분 영토를 잃었다.
campaign_end_desc_15=콘스탄티노플의 함락은 비잔티움 제국의 멸망을 의미했고, 천년 제국의 영광은 결국 사람들로부터 멀어져 갔다. 비잔티움 제국의 멸망은 중세의 종말과 유럽에 새로운 패자가 등장할 것임을 의미한다.
campaign_end_desc_51=서로마 제국은 외적의 끊임없는 침공으로 멸망의 길을 걷게 되었다. 이 오래된 제국의 멸망은 마치 이미 정해져 있는 것 같았으나, 또한 매우 갑작스러웠고, 로마 제국의 강역은 대폭 축소되었다. 하지만 비잔티움 제국의 수도였던 콘스탄티노플은 완전히 다른 모습이었다.
campaign_end_desc_52=유스티니아누스 1세와 벨리사리우스는 명군과 현신의 모범이라고 할 수 있다. 그들은 비잔티움의 부상과 발전에 튼튼한 기초를 닦았고, 천년 제국의 발전에 지울 수 없는 공헌을 하였다.
campaign_end_desc_53=앵글로-색슨족의 침입으로 브리튼은 분열되어 있던 각 지역의 세력이 점차 통합되어 마침내 7왕국의 구도를 형성하게 되었는데, 이는 훗날 잉글랜드 왕국의 초기 형태이기도 하다.
campaign_end_desc_54=비잔티움 제국이 강력한 아랍인들과 싸우고 있는 동안 발칸 반도에서는 새로운 전쟁이 일어났다. 앞뒤로 적의 공격을 받는 거대한 비잔티움 제국은 언제든 무너질 것 같다.
campaign_end_desc_55=바이킹은 유명한 항해가이다. 그들은 유럽 각 나라를 침공했을 뿐만 아니라 아메리카, 아이슬란드 등 여러 지역에서도 활동하였다. 사람들은 바이킹이 확장한 시기를 '바이킹 시대'라고도 부른다.
