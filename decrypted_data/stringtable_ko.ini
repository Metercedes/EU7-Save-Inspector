general_desc_Jean de Dunois=오를레앙 공작의 사생아로 작전에 용맹하여 오를레앙을 철통처럼 굳게 지키고, 잔 다르크를 따라 사방으로 출정하였다.
general_desc_Gilles de Rais=질 드 레는 백년전쟁 당시 프랑스 원수이며, 잔 다르크를 추종한 최초의 장군 중 한 명으로 민족의 영웅으로 추앙받았으나, 이후 아이들을 무참히 죽여 화형을 당했다.
general_desc_La Hire=라 이르는 잔 다르크를 따른 무적의 장군으로서 프랑스가 최후의 승리를 거두는 데 뛰어난 공헌을 하였다.
general_desc_Henry V=헨리 5세는 걸출한 전사로 아쟁쿠르 전투에서 뛰어난 지도력을 보여주었다. 1420년의 트루아 조약으로 이 영국의 왕은 프랑스 왕위에 대한 권리를 확보하였다.
general_desc_Olga2=올가는 기독교로 개종한 최초의 루스 통치자이다. 그녀는 기독교를 키예프 대공국까지 전파하였다. 그녀는 죽은 후 교황청으로부터 '성 올가'로 추인되었다.
general_desc_Richard I2=사자심왕 리처드는 제3차 십자군의 지도자 중 한 명이었는데, 그의 막강한 전투력은 살라딘도 그를 피하게 하였다. 리처드의 뛰어난 재능으로 예루살렘 왕국은 한 세기 더 지속되었다.

