battle_talk_700501=로마의 영광을 되찾고, 이 튀르크족을 몰아내자!
battle_talk_700502=4만 군대가 이곳을 메워서라도 요새를 탈환하라!
battle_talk_700503=우리 뒷쪽의 요새가 적에게 점령당했다. 로마인들은 계약을 파기하려는 것 같다.
battle_talk_700504=4만 명인들 어떤가. 이 오합지졸들은 모두 임시 용병이니 적을 깊숙이 유인하라! 그리고 그들을 섬멸하자!
battle_talk_700505=그들의 화살이 너무 세다. 요새로 철수하라!
battle_talk_700506=우리의 좌우 양측이 어떻게 격파되었단 말인가! 이럴 수 없다, 나는 결코 실패하지 않을 것이다!
battle_talk_700507=드디어 튀르크의 공격을 막아냈지만, 이 지역에 대한 우리의 통제력은 예전보다 훨씬 떨어졌다.
battle_talk_700508=알라의 가호가 있기를! 로마 황제를 생포했다! 셀주크 제국 만세!

