battle_talk_3000402=우리의 공격을 막을 수 있는 적은 없다!
battle_talk_3000403=계속 공격하라! 시라쿠사를 점령하면 시칠리아는 우리 것이다!
battle_talk_3000404=요르요스 마니아키스는 우리의 군급을 체납하고 있으니 적에게서 방법을 생각할 수밖에 없다.
battle_talk_3000501=시라쿠사를 오랫동안 격파하지 못해서 부대의 사기가 침체되었다.
battle_talk_3000502=이번의 공성전이 또 실패했다. 먼저 진영으로 철수할 수밖에 없다.
battle_talk_3000503=적의 군심이 산만해졌다. 지금이 바로 반격을 개시할 때이다!
battle_talk_3000504=적의 반격이 이렇게 빠르니! 빨리 철수하라!
battle_talk_3000505=며칠 전의 준비는 바로 지금 순간을 위해서이다! 오트빌 가문의 영광은 여기서 시작될 것이다!
battle_talk_3000506=세상에! 이 노르만인은 적을 반으로 잘랐다!
battle_talk_3000507=윌리엄은 시라쿠사를 동로마 제국에 바쳤고, 적 장군을 반으로 잘라 명성을 얻으며 '무쇠팔뚝 윌리엄'이라는 별명을 얻었다.
battle_talk_3000801=우리의 병력이 더 많으니 너희들은 스스로 끝까지 싸울지, 아니면 떠날지를 선택할 수 있다.
battle_talk_3000802=노르만인은 결코 물러서지 않는다!
battle_talk_3000803=그럼 여기서 마지막 피를 흘려라!
battle_talk_3000804=아군이 패배했다! 철수하라! 빨리 철수하라!
battle_talk_3000901=우리 군대는 수만 명에 달한다. 유리한 측은 아군이다!
battle_talk_3000902=몸은 불편하지만, 여전히 전장을 지켜볼 것이다.
battle_talk_3000903=적의 첫 번째 방어선이 격파되었다!
battle_talk_3000904=멋진 전투다! 어떤 병도 내가 이 영광스러운 전투에 참전하는 것을 막을 수 없다!
battle_talk_3000905=윌리엄의 강인함은 그를 점차 남부 노르만족의 실질적인 지도자로 부상하게 하였다.
battle_talk_3001001=멜피를 포위하라! 우리는 이 도시를 점령해야 한다!
battle_talk_3001002=우리는 틈타 몬테펠로소에 있는 적의 주둔지를 공격할 수 있다.
battle_talk_3001003=적은 요새 안에서 방어하고 나오지 않는다. 강제적으로 공격하는 것은 현명하지 않다.
battle_talk_3001004=그들이 도시 밖으로 나오도록 그들의 보급선을 차단할 수 있다.
battle_talk_3001201=공격, 공격하라! 칼라브리아는 결국 우리 노르만족의 영토가 될 것이다!
battle_talk_3001202=우회하여 적을 포위공격하라.
battle_talk_3001203=후방에 적군이 나타났다. 더 이상 철수하지 않으면 기회가 없을 수도 있다.
battle_talk_3001204=이번 전투는 결국 실패로 끝났다. 윌리엄은 내년에 다시 정복하기로 결정했다.

