conquest_faction_desc_801=고대 로마 제국의 계승국 중 하나인 서로마 제국은 한때 번성했지만, 지금은 위기와 쇠퇴에 빠졌다. 제국은 야만족의 이주로 인한 국경 불안에 직면하게 되었으며, 이를 효과적으로 대처하지 못하고 있다. 그러나 제국은 여전히 유구한 역사를 자랑하고 있다. 제국을 부흥하려는 의지만 있다면 로마 제국의 영광을 되찾을 수도 있을 것이다.
conquest_faction_desc_802=동로마 제국이라고도 불리는 비잔티움 제국은 고대 로마 제국의 계승국 중 하이다. 수도인 콘스탄티노플은 전략적 요충지에 위치하고 있으며, 제국은 고대 로마의 정치, 문화, 전통을 계승했을 뿐만 아니라 독특한 비잔티움 예술 및 건축 체계를 발전시켰다. 현재 제국의 주요 목표는 로마의 잃어버린 영토를 수복하는 것이다.
conquest_faction_desc_803=게일족은 고대 유럽의 켈트 부족으로 오늘날의 아일랜드, 스코틀랜드, 웨일스 지역에 거주했다. 게일족은 다신교를 믿으며, 자연과 조상을 숭배한다. 그들은 용맹하고 매우 호전적이며 고대 로마 제국의 강력한 적수였다.
conquest_faction_desc_804=브리튼인은 고대 유럽의 켈트 부족으로 브리튼 제도에 거주했다. 그들은 켈트 문화의 특징을 지녔으며, 다신교를 믿는다. 브리튼인들은 로마 제국과 오랫동안 접촉하고 갈등을 겪었으며, 시간이 지남에 따라 로마 및 기타 외래 문화를 융합시켰다.
conquest_faction_desc_805=색슨족은 독일 북부의 고대 게르만 민족으로 유럽 역사에서 중요한 지위를 가지고 있다. 그들은 게르만 부족 중 하나로서 용감하고 뛰어난 군사적 실력으로 유명하다. 색슨족은 중세 시대에 많은 정복과 정착, 정치적 변천을 겪으면서 지역의 정치적, 군사적 구도에 영향을 끼쳤다.
conquest_faction_desc_806=데인족은 북유럽 게르만 민족의 한 파로서 유구한 역사와 풍부한 문화 및 전통을 가지고 있다. 그들은 북유럽의 철기 시대와 바이킹 시대에 존재하여 발전했다. 데인족은 역사적으로 매우 중요한 지위를 차지했는데, 특히 바이킹 시대 때 용맹한 함대를 이끌고 주변 바다를 정복하였다.
conquest_faction_desc_807=발트족은 발트해 주변 지역에 살던 고대 민족이다. 그들은 역사적으로 슬라브, 게르만 등 문화의 영향을 받았다. 그 중 중요한 분파인 고대 프로이센인들은 용감하고 전투력이 강하기로 유명했으며, 주변의 슬라브인 및 게르만인과 끊임없이 교류하고 충돌했다.
conquest_faction_desc_808=수에비족은 고대 게르만족의 한 파로 라인강 연안 지역에 거주했다. 그들은 고대 로마 시대의 용맹한 전사이자 원정자들이다. 수에비족은 한동안 자신들의 왕국을 세웠으며, 로마 제국과 갈등을 빛기도 했다.
conquest_faction_desc_809=롬바르디아족은 6세기 초에 이탈리아 북부로 이주하여 랑고바르드 왕국을 세운 게르만 민족이다. 롬바르디아족 역시 뛰어난 군사력을 가지고 있다. 그들은 2세기 동안 이탈리아 북부를 통치하면서 현지의 정치, 사회, 문화에 깊은 영향을 미쳤다.
conquest_faction_desc_810=슬라브족은 유럽 전역에 널리 분포되어 있는 민족으로, 세 개의 주요 분파로 나뉜다: 서슬라브, 동슬라브, 남슬라브. 그들은 독특한 언어, 문화, 전통을 가지고 있으며, 역사적으로 많은 독립국가를 형성했을 뿐만 아니라 다양한 수준의 전투능력을 보여주었다.
conquest_faction_desc_811=프랑크족은 역사적으로 프랑크 지역에 거주했던 원주민이며, 게르만족의 중요한 분파이기도 하다. 그들은 5~8세기에 프랑크 왕국이라 불리는 강력한 왕국을 세웠다. 프랑크인들은 용맹한 전사와 군사적 확장을 하려는 강한 의지를 가지고 있어 유럽의 역사에 지대한 영향을 미쳤다.
conquest_faction_desc_812=부르고뉴족은 고대 게르만족의 한 분파로서 주로 프랑스 동부의 부르고뉴 지방에 거주했다. 부르고뉴족은 역사적으로 부르고뉴 왕국을 세웠으며, 주변 국가들과 정치적, 군사적 교전을 벌인 유럽 중세의 중요한 세력 중 하나이다.
conquest_faction_desc_813=동고트족은 고대 게르만족의 한 분파이다. 그들은 다른 민족의 침입으로 어쩔 수 없이 동유럽과 발칸 반도 지역으로 이주하고 그곳에서 자신들의 왕국을 세웠다. 동고트족은 로마 제국의 국경 지역에서 급속히 발전하였으며, 로마 제국과 여러 차례 충돌했다.
conquest_faction_desc_814=동게르만 고트족에서 유래한 게피드족은 용맹하다. 그들은 역사적으로 다른 민족들과 여러 차례 전쟁을 벌였는데, 특히 훈족 및 동고트족과의 충돌이 매우 유명하다. 그들은 자신들의 왕국을 세우고 한동안 주변 지역에 영향을 미쳤다.
conquest_faction_desc_815=훈족은 고대 유라시아 초원 지역의 유목민으로 기마와 활쏘기에 능숙한 민족이다. 아틸라가 이끈 훈족의 제국은 5세기 말과 6세기 초에 전성기를 누렸는데, 그들은 로마 제국과 다른 민족을 위협하였으며 약탈과 정복을 자주 진행하였다.
conquest_faction_desc_816=마자르족은 헝가리의 주요 민족이다. 아시아의 우랄 산맥 지역에서 발원된 그들은 9세기 초에 현재의 헝가리 지역으로 이주하여 헝가리 왕국을 세웠다. 마자르족은 중세 시대에 세력을 확장하여 주변 국가들과 여러 차례 전쟁과 영토 다툼을 벌였다.
conquest_faction_desc_817=바스크인은 서유럽에 거주하는 민족으로, 주로 스페인과 프랑스의 바스크 지역에 거주한다. 그들은 독특한 언어와 문화 전통을 가지고 있으며, 유럽에서 가장 오래된 민족 중 하나이다. 바스코인은 역사적으로 줄곧 독립성과 문화적 정체성을 유지해 왔으며, 서유럽 역사에서 중요한 영향을 미쳤다.
conquest_faction_desc_818=서고트족은 고대 게르만족의 한 분파로 그들의 기원은 고대 고트족 부족으로 거슬러 올라갈 수 있다. 5세기 중엽에는 스페인과 남프랑스 지역으로 이주하여 서고트 왕국을 세워 오늘날 스페인과 포르투갈의 대부분 지역을 지배했고 서유럽에서 가장 중요한 왕국 중 하나가 되었다.
conquest_faction_desc_819=불가리아인은 발칸 반도에 거주하는 민족으로, 그들은 자신만의 언어, 종교, 전통을 가지고 있다. 불가리아인은 역사적으로 강력한 군대, 발달된 도시, 번영된 경제를 자랑하는 강대한 불가리아 제1제국을 세웠으며, 발칸 지역에 큰 영향을 미쳤다.
conquest_faction_desc_820=그리스인은 그리스 지역에 거주하는 민족으로, 고대 그리스 문명의 창조자이자 전승자이다. 그리스인은 도시 국가 체제와 민주 정치로 유명한데, 그 중 가장 유명한 것은 아테네이다. 그들은 중세 시대에 많은 외부의 정복과 통치에 직면했지만, 결코 독립과 자유에 대한 그들의 열망을 꺾지 못했다.
conquest_faction_desc_821=튀르크족의 역사적 기원은 고대 튀르크족으로 거슬러 올라갈 수 있다. 그들은 역사적으로 여러 차례의 이주와 확장을 거쳐 강력한 제국을 세우고 군사, 문화, 정치 분야에서 주목할 만한 업적을 남겼으며, 중세와 근대에 걸쳐 광대한 영토를 정복하였다.
conquest_faction_desc_822=아르메니아인은 세계에서 가장 오래된 민족 중 하나이며, 그들의 종교와 문화 유산은 지역의 생활 방식과 가치관에 깊은 영향을 미쳤다. 아르메니아인들은 역사적으로 강력한 아르메니아 왕국을 세웠고, 많은 도전과 곤경을 겪었다.
conquest_faction_desc_823=몽골족은 몽골 초원에서 유래한 유목민으로, 탁월한 기마술과 전략 전술을 가지고 있다. 그들은 초원의 우위를 이용하여 신속한 습격과 기동 작전을 수행하는 데 능숙하다. 그들은 칭기즈 칸의 지도 아래 유라시아 전역으로 빠르게 세력을 확장하여 광대한 몽골 제국을 세웠다.
conquest_faction_desc_824=동방인은 먼 동방에서 이주해 온 민족이다. 그들은 서양의 여러 나라와 소통하고 교류하기 위해 미지의 여정을 떠났다. 서양 여러 세력의 도전과 기회에 직면한 동방인은 용감하고 강인한 모습을 선보였으며, 용기와 지혜로 새로운 보금자리를 개척하기로 결심하였다.
conquest_faction_desc_825=베르베르족은 북아프리카 지역의 민족 중 하나이다. 그들은 북아프리카의 원주민이며, 자신들의 영토와 문화를 지키기 위해 외부의 침략에 맞서 여러 차례 싸웠다. 베르베르족은 때로는 독립하고, 때로는 다른 민족의 지배를 받았지만, 많은 전통 관습과 신앙을 유지해 왔다.
conquest_faction_desc_826=반달족은 고대 게르만족의 한 파로, 길고 고된 이주 끝에 최종적으로 로마 제국의 북아프리카를 침범하여 반달 왕국을 세웠다. 반달족은 바다에서 뛰어난 군사력을 가지고 있었고, 그들의 로마 시에 대한 약탈은 로마 제국에 막대한 피해를 입혔다.
conquest_faction_desc_827=이집트인은 고대 문명의 창시자로 아프리카 북동부 이집트 지역에 거주하면서 감탄할 만한 문화와 문명을 발전시켰다. 그들은 훌륭한 건축 공학, 복잡한 종교 체계, 상형 문자를 가지고 있었다. 비록 외부 정복자들의 통치를 겪었지만, 그들의 문화와 전통은 여전히 보존되었다.
conquest_faction_desc_828=아랍인은 주로 아라비아 반도와 중동 지역에 거주하는 민족이다. 그들은 아랍어를 사용하고 이슬람교를 믿으며 이슬람교의 전파와 발전에 중요한 역할을 했다. 그들은 수많은 위대한 제국과 왕국을 세웠으며 무역, 농업, 공예 등 분야에서 중요한 성과를 거두었다.
conquest_faction_desc_829=페르시아인은 고대 이란 고원에 거주하던 민족이며, 페르시아 제국을 세웠다. 아케메네스 왕조로 가장 잘 알려진 페르시아 제국은 이란 고원의 각 부족을 통일하고 제국의 영토를 크게 확장했다. 페르시아 제국의 문명과 업적은 후세에 지대한 영향을 미쳤으며, 인류 역사상 중요한 제국 중 하나이다.
conquest_faction_desc_830=지중해 해적은 지중해 지역에서 활동하는 해적 무리이다. 그들은 고대 그리스와 로마 시대, 중세 시대 등 여러 역사 시대에 등장했다. 그들은 상선을 습격하고, 재물을 약탈하는 것을 목표로 하여 해상 무역과 연안 주민의 생활을 위협했다. 그 결과, 그들은 많은 국가의 공격 대상이 되었다.

