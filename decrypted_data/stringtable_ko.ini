item_desc_3101=평범한 사브르로 매우 날카롭게 다듬었지만, 쉽게 부러질 수 있다.
item_desc_3102=반복적으로 단조를 해야만 비교적 긴 검신을 지탱할 수 있다
item_desc_3103=견고하면서도 날카롭기에 평범한 병사들이 꿈꾸는 무기이다.
item_desc_3104=양손으로 잡아야 휘두를 수 있는 무기로 날카롭고 무겁다
item_desc_3110=좋은 재료로 단조하여 무겁지만 견고하고 날카롭다
item_desc_3111=기병을 위해 특별 제조한 무기로 말을 타고 싸울 때 아주 좋은 선택이다.
item_desc_3112=초원의 전사들이 흔히 사용하는 무기로 그들은 날카로운 무기와 말의 충격력을 완벽하게 결합했다.
item_desc_3113=정성껏 키운 말로 뛰어난 지구력과 순발력을 가지고 있다
item_desc_3120=대나무로 만든 활로 탄성이 뛰어나다.
item_desc_3121=가볍고 빠른 쇠뇌로 휴대하기 편리하지만, 위력이 다소 약하다.
item_desc_3122=잘 만들어진 단궁으로 내구력과 위력이 뛰어나다.
item_desc_3123=뛰어난 재료를 사용하여 제작된 무기로 매우 무겁지만, 데미지와 정확도가 크게 향상되었다.
item_desc_3130=용기가 돋보이는 군기로 전장에서 병사들의 사기를 고무시킬 수 있다.
item_desc_3131=나팔의 소리는 사병들의 사기를 크게 고무시킬 수 있다.
item_desc_3140=로마 제국 문무 관리의 관위표이다.
item_desc_3141=앵글로-색슨족의 초기 법률이다.
item_desc_3150=정성껏 만든 제식 장검으로 최정예 부대만이 장비할 수 있다.
item_desc_3151=정성껏 만든 제식 서양 도검으로 최정예 부대만이 장비할 수 있다.
item_desc_3152=가장 노련한 전사만이 다룰 수 있는 무기이다.
item_desc_3153=반복적인 단조를 거쳐 만들어낸 도끼로 무겁고 거대하다.
item_desc_3160=제국의 정예 기병에게 배급된 제식 무기이다.
item_desc_3161=노르만 기사를 태우고 용감하게 돌격할 수 있는 말로 기사들의 강력한 전력을 보장할 수 있다.
item_desc_3162=초원 유목민들이 정성껏 기른 말로 뛰어난 지구력과 순발력을 갖추었다.
item_desc_3163=니세안 지역의 군마로 강한 몸집이 가장 두드러진 특징이다.
item_desc_3170=유목민족이 흔히 사용하는 무기이다.
item_desc_3171=위력이 매우 큰 무기이지만 사용하기가 매우 어렵다.
item_desc_3172=품질이 뛰어난 무기로 위력이 크고 사정거리가 멀지만, 이를 사용하려면 반드시 장기간의 훈련을 거쳐야 한다.
item_desc_3173=금속으로 감싼 쇠뇌로 무기의 내구성이 크게 향상되었다.
item_desc_3180=타이탄 창공에서 들려오는 큰 소리로 사람들의 마음을 격려할 수 있다.
item_desc_3181=용의 포효는 적을 두려움에 떨게 할 수 있을 뿐만 아니라 자신도 격려할 수 있다.
item_desc_3190=군왕이 일방을 다스리려면 반드시 어울리는 기개와 자세를 갖춰야 한다.
item_desc_3191=세상에 존재하지 않는 보물로 전설에 따르면 군주의 통치에 큰 도움을 줄 수 있다.
item_desc_3200=마우리키우스의 군사 저작으로 로마 군대의 작전 방식을 소개하였다.
item_desc_3201=비잔티움 황제 레온 6세의 저서로 비잔티움 제국의 군사 전술을 소개하였다.
item_desc_3210=제국의 정예 전사에게 배급하는 제식 장비이다.
item_desc_3220=제국의 정예 전사에게 배급하는 제식 장비이다.
item_desc_3231=옛사람이 저술한 의서로, 다양한 의학 이론을 담았다.
item_desc_3232=카이사르의 저작집으로, <갈리아 전기>와 <내전기> 등이 포함되었다.
item_desc_3233=양가죽에 기재된 독약 제조법으로, 출처를 찾을 수 없다.
item_desc_3234=동로마 제국이 발명한 액체 연소제로, 제조 방법은 비밀이다.
item_desc_3235=도시 수비 병력과 기구 병력 배치도이지만, 소지자는 수비군이 아니다.
item_desc_3236=독을 바른 단도로, 암살에 흔히 사용된다.
item_desc_3237=기병이 사용하는 투구로, 방호력이 뛰어나다.
item_desc_3238=궁기병이 입는 가죽 갑옷으로, 기동성에 영향을 주지 않는 동시에 일정한 방어력을 제공할 수 있다.
item_desc_3239=수비 부대가 사용하는 긴 창으로, 기병에게 큰 피해를 입힐 수 있다.
item_desc_3240=초라하고 작은 둥근 방패로, 일정한 보호 역할을 할 수 있다.
item_desc_3241=북방 전사가 사용하는 투구로, 용왕매진의 용기를 상징한다.
item_desc_3242=결투용 도검으로, 뛰어난 관통력을 갖추었다.
item_desc_3243=주인이 오랫동안 신고 다녀서 닳은 가죽 부츠.
item_desc_3244=초원 기병들이 흔히 사용하는 장비로, 많은 유럽 기사들을 고통에 빠뜨렸다.
item_desc_3245=화살촉이 개량된 중형 석궁 화살로, 사격 속도를 희생하는 대가로 더 뛰어난 관통력을 얻었다.
item_desc_3246=기병이 흔히 사용하는 가벼운 방패로, 주로 몸을 보호하는 데 사용된다.
item_desc_3247=유목민족이 사용하는 군마로, 속도가 매우 빠르다.
item_desc_3248=별자리가 그려진 긴 두루마리로, 경험이 풍부한 선원은 별자리의 인도로 길을 정확하게 찾을 수 있다.
item_desc_3249=사막에서 기병들이 사용하는 휘어진 칼로, 몹시 날카롭다.
item_desc_3250=고대 그리스 영웅의 이름을 딴 거대 방패로, 무겁지만 뛰어난 방어력을 갖추었다.
item_desc_3251=역대 전쟁 중 공성 전술을 분석한 내용이 기록된 병서.
item_desc_3252=뾰족한 모양의 헬멧으로, 제국의 엄격한 군기의 상징이기도 하다.
item_desc_3253=좁고 긴 양손 대검으로, 주로 용맹한 선봉 기사들이 적군의 방어선을 뚫는 데 사용하는 검이다.
item_desc_3254=대륙 부근의 수문 정보를 기록한 해도로, 항해자들이 항해하는 데 매우 중요한 아이템이다.
item_desc_3255=전임 지휘관이 착용했던 투구로, 그의 발자취를 기록하였다.
item_desc_3256=설계도를 그릴 때 필요한 도구로, 기술자들에 의해 수많은 불가사의한 기구를 설계해냈다.
item_desc_3257=무거운 망치로, 완력이 뛰어나야 사용할 수 있는 무기이다.
item_desc_3258=지휘관이 착용하는 장검으로, 실용성보다 장식 작용이 더 크다.
item_desc_3259=기병들이 흔히 사용하는 도끼로, 중갑을 입은 적을 상대해도 상당한 피해를 줄 수 있다.
item_desc_3260=관통력이 뛰어난 투창이지만, 사용자의 팔 힘에 대한 요구가 비교적 높다.
