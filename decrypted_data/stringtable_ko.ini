skill_desc_50931=대상 군단과 자기 군단의 부대 병력이 {0}50%{1} 이하 시, 즉시 군단 총 병력의 {0}50%{1} 회복. 라운드당 1회, {0}2{1} 라운드 지속, 쿨타임 {0}5{1} 라운드.
