skill_desc_51041=스킬 1단계: 현재 라운드 이동 시 소모되는 이동력 {0}1{1} 감소, 지속시간 {0}3{1}라운드, 쿨 타임 {0}5{1}라운드. [br]스킬 2단계: 이동력 {0}1{1} 회복.(1단계 스킬을 사용할 수 없을 때 효력 발생, 라운드당 1회 사용 가능)
