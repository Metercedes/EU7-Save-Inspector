general_desc_Guiscard=그는 탕크레드 드 오트빌과 아내 프레센다의 여섯 번째 아들로 ‘교활한 로베르’로 불렸다. 그는 이탈리아와 시칠리아 섬을 정복하는 데 평생을 바친 노르만족의 영웅이다.

