conquest_faction_desc_701=오스만 제국은 유럽으로 계속 확장했다. 동시에 제국 내부에서는 중앙 정부의 통제력을 강화하는 새로운 법령을 도입하는 개혁이 진행 중이다. 비록 오스만 제국이 국내외로부터의 도전에 직면했지만, 여전히 당시 가장 강력한 국가 중 하나였으며, 막강한 군사력과 문화적 영향력을 가지고 있었다.
conquest_faction_desc_702=비잔티움 제국은 영토 축소, 심각한 내부 부패, 경제 침체 등으로 인해 과거의 영광을 잃게 되었다. 오스만 제국은 비잔티움에 대한 일련의 공격을 감행하여 비잔티움의 영토를 침식하고 그들을 멸망으로 몰아 넣었다.
conquest_faction_desc_703=헝가리 왕국은 발칸 반도로 이주한 이래 계속 전쟁의 세례를 받았다. 후에 세게드에 대한 국왕의 통치를 통해 나라가 다시 번영해졌지만, 내부적으로는 귀족과 중앙 집권의 모순에 직면했다. 한편, 오스만 제국의 위협이 계속되자 헝가리 왕국은 국토의 완전성과 안전을 지키기 위해 군비 증강이 시급했다.
conquest_faction_desc_704=왈라키아 공국은 헝가리 왕국과 오스만 제국으로부터 이중 위협을 받았다. 공국의 지도자 블라드 2세는 공국의 독립을 수호하기 위해 강력한 조치를 취했으며, 폭력으로 폭력을 진압하는 것을 주저하지 않았다. 그러나 그는 헝가리 왕국의 침공에 패배하고 굴욕적인 평화 조약을 체결해야 했다.
conquest_faction_desc_705=몰다비아 공국은 헝가리 왕국 및 왈라키아 공국과 인접한 젊은 공국이며, 국내는 불안과 갈등으로 가득 차 있다. 슈테판 대공은 이웃 국가들과의 분쟁을 평화적으로 해결하는 등 자신의 통치력을 다지는 데 많은 노력을 기울였으며, 동시에 국제적인 지지를 적극적으로 구했다.
conquest_faction_desc_706=보스니아 왕국은 여러 민족이 살고 있는 다문화, 다민족 국가이다. 왕국 내부로는 귀족들 간의 다툼이 끊이지 않았고, 밖으로는 헝가리와 오스만 제국의 위협을 받았다.
conquest_faction_desc_707=이 시기 세르비아 전제군주국은 내부와 외부의 위협에 시달렸다. 세르비아는 강력한 통치자를 갖추었지만, 이러한 위협은 이 나라의 미래를 불확실하게 만들었다.
conquest_faction_desc_708=베네치아 공화국은 동부 지중해의 무역 패권을 차지하기 위해 각종 도전에 직면해야 했다. 그들은 기독교 라이벌인 제노바 공화국과 금각만의 지배권을 놓고 다투었다. 이러한 긴장 상태 속에서 베네치아인들은 지중해에서 자신들의 이익과 영향력을 보장하기 위해 적대적인 선박에 대한 공격과 군사 개입을 포함한 강력한 조치를 취해야 했다.
conquest_faction_desc_709=알바니아는 여러 부분으로 분할되었다. 알바니아 국내의 귀족들은 오스만 제국의 침략을 막기 위해 알바니아 연맹을 결성했다. 스칸데르베그 공작이 이끈 연맹은 일련의 전투에서 오스만군을 격파하여 알바니아의 독립을 확고히 하는 핵심 세력이 되었다.
conquest_faction_desc_710=에피루스 전제군주국은 카를로 2세가 이끄는 그리스 지역의 강력한 정권이다. 비잔티움 제국과 영토 분쟁이 있음에도 불구하고, 에피루스 전제군주국은 전쟁에서 막강한 군사력과 지도력을 보여 그리스 지역의 중요한 세력으로 간주되었다.
conquest_faction_desc_711=모레아 전제군주국은 비잔티움 제국의 유일한 분리 정권이다. 이 나라의 지도자 토마스 팔레올로고스는 오스만 제국의 위협에 맞서 자신의 통치를 공고히 하려고 애쓰고 있다.
conquest_faction_desc_712=아라곤 연합 왕국이 이탈리아 남부의 나폴리 왕국을 정복하고 교황과 마찰이 생겼다. 그 지역은 정치적 불안, 군사적 충돌, 질병의 확산 등으로 인해 고통을 겪고 있지만, 아라곤의 문화적, 경제적 영향력은 여전히 커지고 있다.
conquest_faction_desc_713=카라만 베이국은 이웃 오스만 제국과의 끊임없는 충돌과 압박에 직면해 있으며, 독립과 발전을 유지하기도 점점 더 어려워지고 있다.
conquest_faction_desc_714=구호 기사단과 키프로스 왕국이 연합하여 키프로스-구호 기사단 연맹을 결성했다. 그들은 동지중해 지역의 해적과 싸웠다. 비록 연맹은 오스만 제국의 압력을 받고 있지만, 그들은 강력한 해상 역량과 뛰어난 전술을 이용하여 지역에서의 영향력을 유지하고 있다.
conquest_faction_desc_716=폴란드와 헝가리의 왕 브와디스와프 3세가 이끈 십자군 연합군은 왈라키아 공국의 미르체아 2세의 도움으로 불가리아의 항구 도시 바르나를 점령하고, 오스만 제국의 중심지로 진군했다.

