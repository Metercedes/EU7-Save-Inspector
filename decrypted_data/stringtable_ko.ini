stage_intro_30101=기욤 드 오트빌이 죽은 후, 드로고는 아풀리아 공작이 되었다. 탕크레드와 두 번째 아내가 낳은 아들 로베르가 이탈리아로 왔지만, 드로고는 이 동생을 좋아하지 않아 그를 칼라브리아로 보냈다. 이 척박한 곳은 노르만족을 환영하지 않으며, 로베르는 교활한 수단으로 백성을 억압했기 때문에 현지인들은 그를 '기스카르', 즉 '교활한 자'라고 불렀다.
stage_intro_30102=롬바르디아족은 점차 노르만족의 탐욕을 혐오하여 여기저기서 폭동이 일어나기 시작했다. 동로마인은 기회를 틈타 간첩과 암살자를 파견했다. 1051년에 드로고가 암살당하자 아풀리아 전체가 혼란에 빠졌다. 노르만족에 원한을 품고 있던 교황 레오 9세는 즉시 동로마 황제, 신성로마 황제, 현지 귀족 등과 함께 반노르만족 동맹을 결성했다. 옹프루아는 어쩔 수 없이 급히 로베르를 불러들였다.
stage_intro_30103=동서 교황청이 분열되자 노르만족의 위기는 즉시 사라졌다. 이제 유일한 위협은 오히려 민족 내부의 대립으로 바뀌었다. 말라리아와 정신부전에 시달리던 옹프루아는 로베르와 화해하기로 결정하고, 로베르의 상속권을 인정했다. 로베르는 막내 동생 로제를 데리고 칼라브리아 정복을 시작했다.
stage_intro_30104=로베르와 로제는 칼라브리아에서 5년 동안 싸웠고, 이 5년 동안의 전쟁은 두 사람을 성숙한 지도자로 만들었다.
stage_intro_30105=개혁파 교황은 신성 로마 제국의 황제 및 귀족들과 사이가 좋지 않았다. 교황은 교황청에서의 지위를 확보하기 위해 위험을 무릅쓰고 이탈리아에서 노르만족의 지위를 인정하고, 그들과 동맹 관계를 맺었다. 1059년 8월 23일의 <멜피헌장>에서 교황 니콜라오 2세는 기스카르를 아풀리아, 칼라브리아, 시칠리아 공작으로 임명했다.
stage_intro_30106=기욤 드 오트빌이 떠난 이후 시칠리아는 다시 사라센족의 영토가 되었고, 1060년에 두 형제는 해협을 건너 시칠리아에 상륙하여 새로운 정복을 시작했다.
stage_intro_30107=점점 더 많은 승리를 거두면서 두 형제는 전리품과 지휘권을 놓고 서로에게 등을 돌리게 되었고, 결국 두 사람은 공동 통치라는 어색한 결정을 내렸다. 그 후 로베르는 시칠리아에 거의 머물지 않았고, 목표를 점차 동쪽으로 돌리기 시작했다. 그는 이탈리아 반도의 마지막 동로마 영토를 점령하기로 결심했다.
stage_intro_30108=바리가 함락된 후 로베르는 점점 더 탐욕스러워져 롬바르디아 공국을 공격하기 시작했다. 아말피, 살레르노, 나폴리 등은 연이어 공격을 받았다.
stage_intro_30109=전혀 피곤함이 없고 전쟁터와 권력을 사랑하는 65세의 로베르는 동로마 제국의 땅을 탐내기 시작했고, 심지어 로마 황제의 예복을 입기도 했다. 셀주크 튀르크가 동로마를 침범하자 로마 황제 미하일 7세는 동맹국을 확보하기 위해 로베르와 혼인 관계를 맺기로 하고 로베르의 딸 헬레나와 결혼했다. 그러나 안타깝게도 콘스탄티노폴리스에 도착하기도 전에 황제는 그의 장군에 의해 전복되었다.
stage_intro_30110=서기 1081년 봄, 새 황제 알렉시오스는 로베르의 모든 요청을 승낙했지만, 전쟁의 기회를 놓칠 순 없었다. 그는 미리 준비해둔 150척의 전함과 2만명의 병사를 이끌고 콘스탄티노폴리스로 진군했다.
stage_intro_30111=로베르의 아들 보에몽이 동로마에서 승승장구하고 있을 때, 알렉시오스는 독일 황제 하인리히에게 편지 한 통과 황금 몇 보따리를 보내 방어가 취약한 로마로 진군하라고 요청했다. 하인리히 4세와 교황의 갈등은 오래전부터 존재해왔으므로 이런 좋은 기회를 놓칠 순 없다. 이에 교황은 놀라 로베르에게 도움을 요청했다.
stage_intro_30112=로베르는 이탈리아 반란을 진압한 후, 모든 정력을 동쪽으로 돌렸다. 70세의 기스카르는 로마 황제의 꿈을 이루기 위해 대군을 모집했다. 그러나 케팔로니아 섬에 상륙할 때 역병에 걸려 1년 후 사망했다. 그의 묘비에는 '이곳에 기스카르가 안식하고 있으며, 이 세상의 공포…'라고 새겨져 있다.

stage_intro_30201=기스카르는 두 번 결혼하고, 열 명 이상의 자녀를 두었지만, 가장 유능한 아들은 사생아이다. 그는 바이킹 선조의 금발과 큰 키를 물려받았고, 그의 아버지처럼 무모하고 용감하며 활기차다.
stage_intro_30202=보에몽은 성인이 된 후, 아버지 기스카르의 휘하에서 싸우며 시칠리아 섬에서 많은 전투 경험을 쌓았지만, 아버지가 동로마를 공격하기 시작하고서야 진정한 실력을 드러내기 시작했다. 1081년, 로베르 기스카르는 150척의 전함과 2만명의 병사를 이끌고 콘스탄티노폴리스로 향했지만, 교황의 매복 공격으로 노르만족은 대부분의 주력 전함을 잃었다.
stage_intro_30203=보에몽은 마케도니아와 테살리아 지역에 있는 동로마의 요새를 탈취하기 시작했지만, 동로마인의 고수와 베네치아인의 방해로 인해 병참 보급이 원활하지 못했기 때문에 라리사에 갇히게 되었다.
stage_intro_30204=1084년, 보에몽은 다시 아버지를 따라 동로마로 진군하여 베네치아 함대를 격파하고 코르푸 섬을 점령하였으나, 역병이 노르만족을 습격하여 기스카르와 보에몽은 동시에 중병에 걸려 동로마 정복 계획을 다시 중단해야 했다.
stage_intro_30205=로베르 기스카르는 1085년에 사망하였고, 이복동생 루제루 보르사는 그의 어머니와 숙부 시칠리아의 루제루의 도움으로 보에몽의 상속권을 빼앗았다. 상속권과 토지를 둘러싼 내전은 이탈리아에서 10년 동안 지속되었다.
stage_intro_30206=1096년, 우르바노 2세는 성지를 수복하기 위해 십자군을 모집하여 동정했고, 보에몽은 상속권을 무시하고 그의 호소력을 통해 신속히 강력한 십자군을 확보했다.
stage_intro_30207=오랜 라이벌이었던 알렉시오스는 가장 성대한 의식으로 보에몽을 맞이했지만, 보에몽에게 충성을 맹세하고 노르만족이 점령한 제국 영토를 반환할 것을 요구했다. 보에몽은 고민 끝에 이러한 요구를 받아들였지만, 전체 십자군의 지도권을 장악하기 위해 황제에게 그를 '동방의 통수권자'로 책봉해줄 것을 요구했지만, 교활한 황제는 핑계로 원활하게 거절했다.
stage_intro_30208=보에몽은 조카 탕크레드를 데리고 보스포러스 해협을 건너 니케아로 향했고, 툴루즈의 레몽 4세는 십자군 전쟁의 첫 전투에서 자신의 이름을 알리고 진정한 지도자가 되고자 뒤를 바짝 따랐다.
stage_intro_30209=십자군 대열에서는 오직 프랑크인 레몽 4세만이 보에몽과 경쟁할 수 있었다. 두 갈래로 나뉘어 싸운 그들은 서로 상대보다 더 많은 전과를 얻으려 애썼다.
stage_intro_30210=예루살렘으로 향하는 길에서 안티오키아 성을 점령하는 것은 십자군 멸망 여부의 관건이 되었다. 만약 카부카 대군이 국경을 침공하기 전에 안티오키아를 점령한다면 십자군은 성 안에서 방어할 수 있고, 그렇지 않으면 성 밖에서 셀주크족의 수만 대군과 마주할 수밖에 없다. 이때 십자군은 이미 힘이 다 빠진 상태이다.
stage_intro_30211=십자군이 안티오키아를 점령한 후, 보에몽과 레몽은 보에몽이 안티오키아의 소유권을 가지고, 레몽이 십자군의 최고 통수권자임을 인정하기로 합의했다. 보에몽은 그가 꿈꾸던 영토와 명예를 얻어 명실상부한 친왕이 되었지만, 그로 인해 로마 황제 알렉시오스의 미움을 샀다.
stage_intro_30212=1100년 여름, 보에몽은 조카 탕크레드를 안티오키아에 주둔시키고, 자신은 300명의 장병을 이끌고 유프라테스 강으로 진군하여 영토를 확장했다.
stage_intro_30213=보에몽은 3년 동안 구금되었다. 이 3년 동안 그의 조카 탕크레드는 그를 위해 공국의 영토를 확장했다. 방금 풀려난 보에몽은 명예를 위해 군대를 이끌고 남하했다.
stage_intro_30214=안티오키아 공국은 동로마 제국과 셀주크 사이에 위치해 있고, 군대와 자금의 소모로 보에몽은 확장은 커녕 유지하기도 어려웠다. 보에몽은 유럽에 가서 자금과 용병을 모집해야 했다. 놀랍게도 그는 이탈리아와 프랑스에서 십자군 전쟁의 영웅으로 여겨졌고, 프랑스의 왕 필리프는 그를 사위로 맞았다. 심지어 그의 인기가 너무 높아서 영국 왕 헨리는 그가 영국에 오지 못하게 막았다.
stage_intro_30215=큰 명성을 얻은 보에몽은 다시 아버지의 소원을 떠올리며 35,000명의 정예 병사와 장수를 모집하여 동로마를 다시 공격하기로 결정했다.
stage_intro_30216=역병과 포위 공격으로 굴욕적으로 휴전협정에 서명한 보에몽은 안티오키아 공국을 소유하고 있음에도 불구하고 자신의 패배를 용서할 수 없었는지 배를 타고 시칠리아로 향했고, 3년 후 절망 속에서 사망하여 카노사 디 풀리아에 안장되었다. 안티오키아 공국은 탕크레드의 섭정으로 살아남았다.

stage_group_name_30002=보에몽의 일기
stage_group_name_30003=보에몽의 일기

family_letter_desc_201=나의 아버지는 불을 지르고 불을 끄는 것으로 부를 쌓았으며, 이로 인해 그런 별명을 얻게 되었다. 그러나 그는 교회에 자주 헌금도 했기 때문에 교회에서의 인맥과 명성은 늘 좋았다. --- 보에몽 1세
family_letter_desc_202=그는 어렸을 때 수년간 삼촌에게 배척당했기 때문에 로제에게도 같은 짓을 했지만, 그게 최선의 방법은 아니었다.
family_letter_desc_203=아버지는 마침내 가문에서 가장 높은 자리인 공작 작위를 얻었다. 이는 가족의 가장 영광스러운 날이자 그가 수년간 교회에서 관계를 운영한 결과이다.
family_letter_desc_204=시칠리아는 우리 가족의 신념이다. 윌리엄 삼촌 이후 모든 사람은 이 풍요롭고 아름다운 섬을 위해 싸웠다.
family_letter_desc_205=아마도 아버지는 시칠리아 섬의 지배권을 놓고 루제루 삼촌과 다투고 싶지 않았을 것이다. 그의 꿈은 더 먼 곳에 있었다.
family_letter_desc_206=아버지는 정복자 윌리엄에게 승복하지 않았다. 그는 그리스인조차 이기지 못한 자는 자신을 정복자라고 할 수 없다고 했다.
family_letter_desc_207=언젠가 우리 가문에 어떤 사람이 콘스탄티노폴리스의 왕좌에 앉으면, 진정한 '최고 지도자'가 될 것이다. 명예는 생명보다 더 소중하며, 생명이 있으면 전투는 멈추지 않을 것이다!
family_letter_desc_208=아버지는 이탈리아로 돌아왔는데, 신속하게 사건을 평정한 후 다시 돌아오기를 바란다. 교활한 알렉시오스는 상대하기가 쉽지 않을 것이다.

family_letter_desc_301=10월 18일, 아버지가 성을 공격하고 있을 때 알렉시오스는 갑자기 근처에 나타났고, 그가 도시 아래까지 쳐들어오게 놔두면 우리는 반드시 패배할 상황이었으며, 이런 상황에 나는 돌진했다.
family_letter_desc_302=그리스인이 우리를 격파한 것이 아니라 역병, 저주, 그리고 어쩌면 신이 그리스인의 편에 섰을지도 모른다. 그 해부터 아버지는 병에 걸려 일어설 수 없게 되었다.
family_letter_desc_303=누가 아버지의 곁에 있었고, 누가 이렇게 많은 영토를 확보했는가? 그러나 단지 어머니와 숙부의 도움으로 나의 모든 것을 훔쳤다. 이건 불공평하다!
family_letter_desc_304=이곳에 머물 곳이 없으니 동쪽으로 향할 것이다!
family_letter_desc_305=가식적인 로마 황제는 나에게 아무런 약속을 하지 않으려고 했고, 안나 공주는 나이가 어리지만 나를 진심으로 대했다. 이른바 십자군은 로마 황제가 잃어버린 땅을 되찾기 위한 전쟁에 불과하고, 그리스인은 점점 더 약해지고 있는 것 같다.
family_letter_desc_306=알렉시오스는 우리에게 어떤 도움이나 보상을 줄 생각을 하지 않았다. 그렇다면 전투에서 얻은 것은 당연히 모두 우리의 것이다.
family_letter_desc_307=7개월이 지났다. 우리의 보급품은 바닥 났으니 기적을 믿을 수밖에 없다. 하느님이 보우하사.
family_letter_desc_308=아버지, 신의 가호가 있어 나는 마침내 성공했다. 안티오키아는 우리 가족의 새로운 시작이 될 것이다.
family_letter_desc_309=3년이 지났다. 나는 황사가 얼굴을 덮치는 느낌을 거의 잊어버렸다. 안티오키아는 여전히 외딴 섬처럼 여러 면에서 협공당하고 있으니 영토를 확장해야 한다.
family_letter_desc_310=그렇다. 나의 견지가 없었더라면 사라센족과 셀주크족은 오래 전에 콘스탄티노폴리스를 점령했을 것이니 모든 영광은 나에게 있는 것이 마땅하다.
family_letter_desc_311=나는 원한을 잊은 적이 없습니다. 아버지, 반드시 그리스 황제의 목을 제물로 바치겠나이다. 싸워라! 명예는 목숨보다 더 소중하다!

