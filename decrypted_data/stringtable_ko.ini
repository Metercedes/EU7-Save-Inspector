general_retreat_1=반격을 위해 잠시 후퇴하는 것이지 결코 실패한 것이 아니다.
general_retreat_2=아마도 돌격을 너무 서두른 것 같다. 현재 후퇴의 길밖에 없다.
general_retreat_3=마지막 순간까지 싸우고 있지만 여전히 적을 물리칠 수 없다.
general_retreat_4=적군이 너무 완강하다. 반드시 전술을 다시 작성하여야 한다.
general_retreat_5=나의 군대는 손실이 막중하다. 왜 아무도 공격할때 엄호하지 않았는가?
general_retreat_6=현재 상황에 적응하지 못함으로 후방에서의 정돈이 필요하다.

general_job_desc={0} {1}
general_desc_Khalid=아랍의 가장 뛰어난 장군 중 한 명으로, 아랍 전사들을 이끌고 용맹하게 싸워 한 번도 실패한 적이 없다. 무함마드는 그의 용맹을 표창하기 위해 그에게 '알라의 검'이라는 칭호를 하사하였다.
general_desc_Belisarius=비잔티움 황제 유스티니아누스 1세 휘하의 명장이자 북아프리카와 이탈리아의 정복자로서 군대 생활 후반기에 황제의 의심을 받았다. 그는 '최후의 로마인'이라고 불린 사람 중 한 사람이다.
general_desc_Frederick I=붉은 수염 바르바로사라고도 불리며, 로마의 왕이자 신성 로마 제국의 황제이다. 그는 영국의 '사자심왕' 리처드, 프랑스 왕 필리프 2세와 함께 제3차 십자군 원정을 이끌었으나 원정 도중 물에 빠져 죽었다.
general_desc_Constantine I=로마 제국의 황제이자 비잔티움 제국의 창립자이다. 그는 비잔티움에 새 황궁을 세우고, 이를 노바 로마라고 명명하였지만, 사람들은 콘스탄티누스의 이름을 따서 이곳을 콘스탄티노플이라고 불렀다.
general_desc_Uthman=무함마드의 추종자이자 사위이며, 제3대 정통 칼리파이다. 그의 집권 기간 아랍 기병대는 가는 곳마다 당할 자가 없었으며, 말년에는 암살당하였다.
general_desc_Heraclius=비잔티움 제국의 황제이다. 이라클리오스는 제국군을 이끌고 페르시아인들을 격파하고 잃어버린 영토를 되찾았다. 그러나 아랍인의 침략에 직면한 비잔티움 제국은 그가 죽을 때까지 패배를 거듭했다.
general_desc_Gilles de Rais=본명은 질 드 몽모랑시라발이다. 그는 백년전쟁 당시 프랑스 원수이자 유명한 흑마술사 였으며, 푸른 수염의 모델이다. 그는 잔 다르크의 전우로 민족 영웅으로 칭송받았다.
general_desc_Sikelgaita=랑고바르드 공주이자 로베르 기스카르의 두 번째 부인이며, 로베르와 함께 비잔티움 제국에 대항하는 전투를 지휘하였다.
general_desc_Harald=노르웨이의 왕. 왕이 되기 전, 그는 키예프 루스의 용병이자 비잔티움 제국의 바랑기아 호위대의 군사 지휘관이었다.
general_desc_Alp Arslan=셀주크 제국의 두 번째 술탄이다. 재임 중 이집트의 파티마 왕조, 비잔티움 제국과 여러 번 교전하여 승리하였다. 후세는 그를 '알프 아르슬란'이라고 불렀는데, '용감한 사자'라는 뜻이다.
general_desc_Alfred the Great=웨식스 왕국의 왕이자, 영국 역사상 최초로 '앵글로-색슨족의 왕'이라고 자칭한 사람이다. 그는 부대를 이끌고 바이킹의 침략에 맞서 싸워 잉글랜드의 대부분 국토를 앵글로-색슨족의 지배로 회복시켰기 때문에 "대왕"이라는 존칭을 얻었다.
general_desc_Alaric I=서고트의 왕으로 서고트 왕국의 창건자이기도 하다. 로마 제국과의 관계를 끊은 후, 그는 서고트족을 이끌고 로마를 함락시켰고, 최초로 '영원의 도시'를 정복한 사람이 되었다.
general_desc_Aetius='최후의 로마인'이라 불리는 그는 카탈라우눔 전투에서 군대를 이끌고 훈족군을 격파하였는데, 이번 승리는 '서로마 제국의 마지막 승리'로 불리게 되었다. 후에 모반을 꾀했다는 무고를 받고 발렌티니아누스 3세에게 암살당했다.
general_desc_Athelstan=장형왕 에드워드의 아들이며, 웨식스 왕조의 창건자이다. 그는 초대 잉글랜드 왕이자 가장 위대한 앵글로-색슨 왕으로 여겨진다.
general_desc_Sophronius=예루살렘의 지도자이다. 이전에는 수도사이자 신학자였다.
general_desc_Michael the Stammerer=비잔티움 제국의 황제이며, 별명이 '말더듬이'이다. 재위 중에 그는 불가리아인들과 연합하여 토마스의 반란을 진압했지만, 이는 제국의 힘을 약화시켰다.
general_desc_Fausta=로마 제국의 황후이자 콘스탄티누스 대제의 두 번째 부인이다.
general_desc_Tostig=해럴드 고드윈슨의 형제이자 무자비자 하랄드의 지지자이다. 스탬퍼드 브리지 전투에서 사망하였다.
general_desc_Leopold V=오스트리아 공작이자 슈타이어마르크 공작이며, '현자 레오폴트'라는 칭호를 가진 그는 제3차 십자군 원정에 참여하였다.
general_desc_Theodoric I=서고트 왕이다. 재위 중 프랑크족과 반달족을 상대로 전투를 벌였고, 서로마 제국과 동맹을 맺었다.
general_desc_Gytha=덴마크의 귀족이자 해럴드 고드윈슨과 이디스의 어머니이다.
general_desc_John Chandos=중세 영국 기사이다. 백년전쟁 당시 잉글랜드의 가장 중요한 세 차례 승전의 기획자로 여겨졌지만, 최종적으로 소규모 충돌로 사망하였다.
general_desc_Gunderic=반달족과 알란족의 왕으로 군대를 이끌고 서로마 제국을 침공했었다.
general_desc_Saladin=이집트 아이유브 왕조의 첫 번째 술탄이자 시리아의 첫 번째 술탄이며, 이집트 역사의 민족 영웅이다. 그는 아랍인들이 십자군에 대항하는 과정에서 탁월한 지도력과 기사도, 군사적 재능을 나타내 명성을 떨쳤다.
general_desc_Narses=벨리사리우스와 마찬가지로 비잔티움 제국의 황제 유스티니아누스 1세 휘하의 대장이었다. 그는 동고트 왕국을 멸망시켰기 때문에 '고트족의 망치'라고 불렸다.
general_desc_Charlemagne=유럽의 아버지, 프랑크와 롬바르디아의 왕, 로마의 황제이다. 로마 제국 수립 이래 샤를마뉴는 처음으로 서유럽 대부분을 통일했으며, 그가 세운 프랑크 왕국은 카롤링거 제국이라고도 불렸다.
general_desc_William the Conqueror=정복자 윌리엄은 바이킹 약탈자 롤로의 후손이다. 1035년에 노르망디 공작이 되었고, 1066년에 잉글랜드를 정복하여 통치함으로써 최초의 노르만 잉글랜드 왕이 되었다.
general_desc_Attila=고대 유라시아 대륙에서 가장 유명한 지도자로 사학자들은 그를 '신의 채찍'이라 불렀다. 그는 여러 차례 대군을 이끌고 비잔티움 제국과 서로마 제국을 침공했다.
general_desc_Richard I=잉글랜드의 왕으로 용맹하고 싸움을 잘하여 ‘사자심왕’이라고도 불렸다. 그는 신성 로마 제국 황제 프리드리히 1세, 프랑스 왕 필리프 2세와 함께 제3차 십자군 원정을 이끌었다.
general_desc_Edward the Black Prince=잉글랜드 국왕 에드워드 3세의 장남으로 역사적으로 흑태자로 불렸다. 영국-프랑스 백년전쟁에서 가장 성공적인 영국 지휘관 중 한 명이자 당시 가장 위대한 기사 중 한 명이다.
general_desc_Charles Martel=망치 샤를이라고도 불리는 그는 프랑크 왕국의 궁재이자 군사 지도자이다. 그는 아키텐의 피핀 2세의 사생아이자 샤를마뉴 대제의 할아버지이다.
general_desc_William I of Sicily=본명은 구기에르무 1세이며, 시칠리아 왕국의 두 번째 국왕이다.
general_desc_Harold=해럴드 2세라고도 불린다. 그는 웨식스 백작 고드윈의 아들이자 에드워드 여왕 이디스의 오빠이며, 영국 앵글로-색슨계 최후의 왕이다.
general_desc_Matilda of Boulogne=잉글랜드의 왕비이자 불로뉴 여백작이다. 그녀의 남편은 잉글랜드의 왕 스티븐이다.
general_desc_Eleanor of Provence=잉글랜드 앙주 왕조의 왕 헨리 3세의 왕비이다.
general_desc_Baldwin IV=예루살렘 왕국의 국왕이다. 그는 나병에도 불구하고 몽기사르 전투에서 살라딘의 3만 대군을 격파했다.
general_desc_Khawlah=무함마드 시대의 전설적인 전사로 후에 군사 지도자가 되었다. 그녀는 역사상 가장 위대한 여성 군사 지도자 중 한 명으로 전해졌으며, 적으로부터 할리드와 비교되기도 했다.
general_desc_Sunicas=훈족으로 유스티니아누스 1세 통치 초기에 비잔티움 군대에서 복무하였다.
general_desc_Mehmed the Conqueror='정복자' 메흐메트는 오스만 제국의 술탄이다. 그는 오스만 군대를 이끌고 콘스탄티노플을 함락시키고, 비잔티움 제국을 멸망시켜 오스만 제국의 백년 패업을 위한 확고한 초석을 마련하였다.
general_desc_Philip II=카페 왕조의 왕이며, 프랑스의 명군 중 한 명이다. 그는 풍부한 전략을 갖추었기 때문에 '존엄왕'이라고도 불렸다.
general_desc_Henry II of England=잉글랜드 국왕이자 노르망디 공작이다. 그가 창립한 앙주 왕조는 중세시대 가장 강대한 잉글랜드 봉건 왕조이다.
general_desc_Genghis Khan=몽골 제국의 기초를 닦은 몽골 대칸이다. 그는 몽골 원정을 시작하여 대부분의 유라시아 대륙을 정복하였다. 그의 뛰어난 군사적 업적으로 인하여 칭기즈 칸은 역사상 가장 위대한 정복자로 여겨진다.
general_desc_Edward I='장경왕 에드워드', '스코틀랜드인의 망치'라고도 불린다. 그는 웨일스를 정복하고, 스코틀랜드를 거의 정복하여 명성을 떨쳤다. 그의 어머니는 프로방스의 엘리너이다.
general_desc_Justinian I=비잔티움 제국의 황제이다. 그는 공훈이 뛰어나기 때문에 유스티니아누스 대제라고도 불린다. 유스티니아누스 1세는 고대 로마 시대 말기의 중요한 통치자이다.
general_desc_Empress Matilda=헨리 1세의 딸이자 헨리 2세의 어머니이다. 스티븐에게 왕위를 빼앗긴 후, 다시 힘을 모아 그에게 도전했고, 최종적으로 아들을 잉글랜드 왕위에 올리는 데 성공하였다.
general_desc_Philip the Good=선량공 필리프는 3대 부르고뉴 공작이다. 백년전쟁 말기에 활약하였으며, 저지대의 발전에 큰 공헌을 하였다.
general_desc_Eleanor of Aquitaine=헨리 2세의 아내이며, 아키텐 여공작이자 푸아티에 여백작이다. 먼저 프랑스 국왕 루이 7세와 결혼하였다가, 결혼 무효 판결을 받은 후 잉글랜드 국왕 헨리 2세와 결혼하였다.
general_desc_Isabella=프랑스의 공주이자 프랑스 왕 필리프 4세의 딸이다. 또한, 잉글랜드 에드워드 2세의 왕비이자 에드워드 3세의 어머니이다. 그녀는 의연하고 과감한 성격 때문에 "프랑스의 어미 늑대"라고 불렸다.
general_desc_Nikephoros I=비잔티움 제국의 황제이다. 이리니 여제가 임명한 재무장관이었던 그는 불가리아의 수장 크룸과의 전투에서 전사하였다.
general_desc_Malik Shah=룸 술탄국의 술탄으로, 그의 이름은 '왕 중의 왕'이라는 뜻이다.
general_desc_Timur=티무르 제국의 창시자이다. 그는 티무르 왕조를 세웠고 서아시아, 남아시아, 중앙아시아의 여러 나라들을 격파하였다.
general_desc_Lady Margaret Beaufort=에드워드 3세의 후손이자 장미 전쟁의 중요한 인물이며, 튜더 왕조 개국 군주 헨리 7세의 어머니이다.
general_desc_Elizabeth Woodville=잉글랜드의 에드워드 4세의 왕비이다. 그녀는 자신의 미모를 통해 두 아이의 엄마의 과부 신분으로 에드워드 4세와 결혼하여 큰 파문을 일으켰다.
general_desc_Fatimah=무함마드와 하이디처의 딸로, 아랍 제국의 5대 걸출한 여성 중 한 명이며, ‘성모'라고 추앙받기도 하였다.
general_desc_Antonina=비잔티움 제국의 장군 벨리사리우스의 아내이자 테오도라 황후가 권력을 행사할 때의 '오른팔'이었던 그녀는 남편에게 큰 영향을 끼친 동시에 논쟁적인 인물이었다.
general_desc_Theodora=비잔티움 제국의 황제 유스티니아누스 1세의 아내이자 황후로서 뛰어난 지혜를 갖추었다. 유스티니아누스의 통치 기간에 그에게 큰 영향을 끼쳤으며, 니카 반란에서 유스티니아누스로 하여금 용기를 되찾게 하였다.
general_desc_Robert Curthose=짧은 로베르라는 별명을 가진 노르망디 공작이다. 그는 최초의 노르만 잉글랜드 왕 정복자 윌리엄의 장남이며, 제1차 십자군 전쟁에 참여하였다.
general_desc_Suleiman Baltoghlu=콘스탄티노플 포위 공격에 참여했던 오스만 제국 해군 사령관이다. 그러나 성을 순조롭게 공략하지 못한 이유로 메흐메트 2세로부터 사형 집행 명령이 내려졌고, 최종적으로 죽음은 면했지만, 계급과 토지, 재물 등이 박탈당했고, 결국 무명과 가난 속에서 죽었다.
general_desc_Ambrosio Boccanegra=1341년에 그는 알폰소 11세를 지지하기 위해 카스티야로 떠났고, 후에 라로셸 전투에서 영국군을 격파하였다.
general_desc_Aisha=신자의 어머니로 불리는 무함마드의 세 번째 아내이다. 알리가 칼리파가 된 후 알리를 반대하는 세력에 가입했고, 최종적으로 알리와 전쟁을 벌였다.
general_desc_Hermeric=수에비 왕국의 국왕이다. 그는 로마 제국을 평생 적으로 삼았다.
general_desc_Simeon I of Bulgaria=불가리아의 차르로서 보리스 1세의 셋째 아들이다. 그가 재위할 때는 불가리아 제1제국의 국세가 가장 강성했던 시기였다.
general_desc_Constantine XI=비잔티움 제국의 마지막 황제이다. 그는 메흐메트 2세가 도시를 포위하였을 때 항복을 포기했고, 성벽이 무너지자 황복을 벗고 적진에 뛰어든 후 실종되었다.
general_desc_Samuel of Bulgaria=불가리아 제1제국의 차르이다. 그의 통치 기간 동안 불가리아는 대부분의 발칸 지역을 장악했고, 가장 멀리 그리스 남부까지 이르렀다.
general_desc_Aethelred I=웨식스의 국왕이다. 865년, 그는 그의 셋째 형 애설버트의 뒤를 이어 웨식스와 켄트의 왕이 되었다.
general_desc_Halfdan Ragnarsson=노섬브리아의 첫 바이킹계 국왕으로 바이킹의 지도자이자 앵글로색슨 왕국을 침략한 바이킹의 지휘관 중 한 명이다.
general_desc_Edward III=잉글랜드의 국왕으로 재위 기간에 잉글랜드를 당시 유럽에서 가장 강력한 군사 강국 중 하나로 만들었다. 흑태자 에드워드는 그의 장남이다.
general_desc_Richard of York=잉글랜드의 거두 귀족으로 에드워드 3세의 증손자이다. 그는 왕위를 탈취하려다 결국 권고로 그만두었다.
general_desc_Alle=남색슨족의 첫 왕이며 그가 다스렸던 지역은 현재 서식스라고도 불린다.
general_desc_Robert the Bruce=스코틀랜드 역사에서 중요한 국왕이며, 칭호가 "로버트 브루스"였다. 그는 스코틀랜드인을 이끌고 잉글랜드군을 물리치고, 왕국의 독립을 확보하였다.
general_desc_Zubayr=무함마드의 동반자이다. 무함마드가 죽은 후 군사 지도자가 되었으며, 낙타 전투에서 전사하였다.
general_desc_Trithyrius=비잔티움 제국의 유명한 장군이자 이라클리오스 통치 시대의 중요한 군사 지휘관이다.
general_desc_Edmund=동앵글리아 왕국의 국왕이다. 바이킹 대군이 침공했을 때, 부대를 이끌고 적과 싸워 전투에서 전사하였다.
general_desc_Totila=동고트 왕국의 국왕으로 상당히 유능한 군사 및 정치 지도자이다.
general_desc_Athelred=머시아의 영주로서 머시아의 에셀레드 군장으로도 불렸다.
general_desc_Ivar=바이킹의 지도자이다. 그는 바이킹의 유명한 수장 라그나르 로스브로크과 아스라치의 아들이며, '흰 옷' 할프단의 형제이다.
general_desc_Vortimer=보티건의 아들로 아버지가 앵글로 색슨족과의 동맹에 반대하여 널리 알려졌다.
general_desc_Catigern=보르티머의 형제로 그는 앵글로 색슨족과 싸워 유명해졌다.
general_desc_Alexios I=비잔티움 황제이자 콤니노스 왕조의 창립자이다. 그가 통치하는 기간에 그의 가문은 비잔티움 제국 권력의 정점에 도달하였다. 동시에 그가 서방에 구원을 요청한 것도 십자군을 유발한 원인 중 하나가 되었다.
general_desc_Basil II=별명이 불가리아의 도살자인 그는 비잔티움 제국의 황제로 반세기 가까이 제국을 지배하였다. 바실리오스 2세는 그리스의 국민 영웅이지만, 불가리아인에게는 경멸받는다.
general_desc_Roland=샤를마뉴 휘하의 프랑크 군사 지도자이자, 여러 작품에 자주 등장하는 인물로서 프랑크 왕국을 대신하여 브르타뉴족의 침략에 저항하였다. 결국 롤랑의 이미지는 샤를마뉴의 최고 성기사가 되었다.
general_desc_Bessas=비잔티움 제국의 장군으로 벨리사리우스와 함께 고트 및 사산 페르시아에 대항하는 전쟁에 참여하였고, 벨리사리우스의 부관이었다.
general_desc_Vitiges=동고트 왕국의 국왕으로 상당히 유능한 군사 및 정치 지도자이다.
general_desc_Batu Khan=테무진의 손자이자 주치의 둘째 아들이며 킵차크 칸국의 창립자이다. 부하들을 너그럽게 대하였기 때문에 그를 사인한이라 불렀다.
general_desc_Jebe=제베는 테무진에게 복종한 후에 하사받은 이름으로 "화살촉"을 뜻한다. 그는 몽골 제일의 맹장이라는 칭호를 가지고 있으며, 사준사구 중의 하나이다.
general_desc_Godfrey=하 로렌 공작, 불로뉴 백작, 제1차 십자군 전쟁의 장군이다. 그의 동생 불로뉴의 보두앵은 예루살렘의 왕, 즉 보두앵 1세였다.
general_desc_Leo VI the Wise=비잔티움 제국의 황제로 "현자"라고 불렸으며, 재위 기간에 <바실리카 법전>을 완성하여 비잔티움 제국의 법전이 되었다.
general_desc_Pepin the Short=카를 마르텔의 아들로 카롤루스 왕조의 창건자이다. 751년에 그는 메로빙거 왕조를 무너뜨리고 프랑크 국왕이 되었다.
general_desc_Valens=동부 로마 제국의 황제로 하드리아노플 전투에서 전사하였다.
general_desc_Nur Din=셀주크 제국 장기 왕조의 군주로 제2차 십자군 전쟁 과정에서 주요 인물 중 하나이다.
general_desc_Gelimer=반달-알란 왕국의 마지막 게르만계 국왕으로 벨리사리우스에게 패배한 후 비잔티움 제국에 항복하였다.
general_desc_Stilicho=절반이 야만족 혈통인 고위 장군으로 귀족이자 서로마 제국의 집정관이다.
general_desc_El Cid=카스티야 귀족, 발렌시아의 정복자이자 성주, 스페인의 영웅이다. 그는 유명한 무기인 티조나와 콜라다의 소유자이다.
general_desc_Arthur=브리튼의 전설적인 왕이자 켈트 영웅 중에서 가장 인기 있는 원탁의 기사단의 수장이다. 전설에 의하면 그는 로마 제국이 와해되고 로마 군대가 브리튼에서 철수하자 원탁의 기사들을 이끌고 브리튼 제도를 통일했다고 한다.
general_desc_Guinevere=아서 왕의 아내이자, 아서 왕 통치기 카멜롯 왕국의 왕비이다. 전설에 의하면 그녀와 원탁의 기사 란슬롯 사이의 은밀한 정이 나라를 멸망으로 이끌었다고 한다.
general_desc_Lancelot=원탁의 기사단 중 한 사람이자 아서 왕의 가장 위대하고 신뢰받는 기사로서 아서 왕의 많은 승리에 기여했다.
general_desc_Joan of Arc=시골 출신의 소녀로 프랑스의 민족 영웅이다. 그녀는 영국과 프랑스 간의 백년 전쟁 때 프랑스 왕국을 이끌고 잉글랜드 왕국의 침공에 맞서 싸우다 체포되어 화형에 처해졌다.
general_desc_William Wallace=스코틀랜드의 기사, 귀족, 애국자이다. 그는 스코틀랜드 독립 전쟁에서 저항군을 이끌었다.
general_desc_Olga=키예프 공국의 여성 지도자, 이고리 대공의 부인, 스뱌토슬라프의 어머니이며 그가 성인이 되기 전에 섭정하였다.
general_desc_Caesar=로마 공화국의 독재관이자 집정관이며, 로마 제국의 기초를 닦은 사람이다.
general_desc_Robin Hood=영국 민간 전설에 나오는 의적이다. 그는 무예가 뛰어나고, 재치가 있고, 용감하며, 관리와 성직자를 적대시하고, 부자를 약탈하여 빈민을 구제하고, 의협심을 발휘하여 의로운 일을 행하는 푸른 숲의 영웅이다.
general_desc_Beowulf=스칸디나비아 반도의 전설적인 인물로 거인, 바다 괴물, 용과 용맹하게 싸웠다.
general_desc_Otto I=동프랑크의 왕이자 신성 로마 제국의 황제이다. 그는 최초로 슬라브인을 침략한 튜턴 군주 중 한 명이었고, 보헤미아 공작 볼레슬라프 1세를 신하로 삼았다.
general_desc_Knud=덴마크 왕 스벤의 왕위를 계승하여 잉글랜드, 덴마크, 노르웨이 및 스웨덴의 일부 지역을 통치하였으며, 그의 관할 지역은 북해 제국이라 불렸다.
general_desc_Zengi=장기 왕조의 설립자이다. 그는 모술, 알레포, 하마, 에데사의 총독이었다.
general_desc_Alexander Nevsky=본명은 알렉산드르 야로슬라비치이다. 스웨덴인들이 루스를 침공했을 때, 그는 부대를 이끌고 네바 강 근처에서 스웨덴 군대를 격파하여 '넵스키'라는 칭호를 얻었다.
general_desc_Subutai=상고시대부터 중고시대까지 세계에서 가장 광범위한 지역에서 전투를 벌인 장수로, 유라시아의 대부분 역사에는 수부타이의 이름이 기재되었다. 그는 용맹하고 전투에 능하기로 유명하여, '파아독아'라는 칭호를 누렸다.
general_desc_Su Dingfang=당나라 초기의 명장으로, 적은 병력으로 많은 병력을 이기는 데 능숙하다. 일찍이 천명의 병력으로 8만 적군을 이긴 눈부신 전적이 있었다. 그는 평생 돌궐, 토번, 고구려 등 여러 나라와 전투를 벌여 성과를 거두지 못한 적이 없다. 
general_desc_Li Jing=당나라 제1의 명장으로, 평생 전투를 벌이면서 당나라의 건립에서 안정, 번영에 이르기까지 모두 중요한 공헌을 하였다.
general_desc_Li Shimin=당나라의 두 번째 황제이자 첫 번째 천가한인 당 태종은 당나라 시기부터 중국 역사상 가장 유명한 황제 중 한 명이다.
general_desc_Yelu Dashi='대석임아' 또는 '임아대석'이라고도 불리는 그는 군사 등 여러 분야에서 업적을 쌓았다. 그의 사적이 유럽에 널리 알려지면서 그의 이름은 서요 제국의 대명사가 되었다. 
general_desc_Suleiman I=오스만 제국의 가장 오랜 기간 동안 재위한 술탄으로, 그의 치하에서 오스만 제국은 전성기에 접어들었다. 쉴레이만 1세의 공훈으로 서양에서는 그를 흔히 쉴레이만 대제라고 부른다.
general_desc_John I Tzimiskes=매우 뛰어난 군사적 능력을 지닌 로마 황제로서 재위 시기에 북쪽으로 루스와 불가리아를 격파하고, 동쪽으로 여러 차례 정벌에 나섰으며, 동로마의 군사력을 크게 강화하고 영토를 넓혔다.
general_desc_Giovanni=제노바 용병 장군으로서 "로마를 내 손에서 망하게 해서는 안 된다!"라고 했다. 비록 그는 오스만 제국의 콘스탄티노플 침공을 막아내지는 못했으나, 그의 강한 의지와 두려움 없는 정신은 영원히 그 폐허 아래에 함께 남았다.
general_desc_Gao Xianzhi=고선지는 당 현종 시기의 명장이다. 그는 안서를 지키면서 당나라 서쪽 변방의 안전을 지키고, 서역과의 연계를 강화하는데 기여하였다.

