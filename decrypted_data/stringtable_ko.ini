;defeated_event_desc
battle_talk_thankgift0=선물을 놓고, 당신은 돌아가십시오!
battle_talk_thankgift1=선물을 받았으니, 양국이 평화를 유지하길 바랍니다!
battle_talk_thankgift2=귀국의 선물에 감사드리며, 양국이 좋은 관계를 유지하기를 바랍니다!
battle_talk_thankgift3=귀국의 선물에 대단히 감사드리며, 귀국이 어떤 부탁을 하든 우리는 반드시 최선을 다해 도움을 제공할 것입니다!
battle_talk_acceptagreement1=양국의 백성을 위하여 나는 휴전에 동의합니다!
battle_talk_acceptagreement2=나는 귀국과 유무상통할 수 있는 통행 협정에 동의합니다!
battle_talk_acceptagreement3=오늘부터 우리는 동맹국입니다!
battle_talk_refuseagreement1=용서를 빌겠다고? 소용없다!
battle_talk_refuseagreement2=미안하지만, 우리의 관계는 아직 통행 협정에 서명할 정도가 아닙니다!
battle_talk_refuseagreement3=우리나라도 귀국과 동맹을 맺기를 희망하지만, 지금은 가장 좋은 시기가 아닙니다!
battle_talk_tearagreement2=통행 협정이 끝났습니다. 귀국 군대는 가능한 한 빨리 우리 영토를 떠나십시오!
battle_talk_tearagreement3=이제부터 우리는 더 이상 동맹국이 아니다!
battle_talk_declarewar=앞으로 만나면 적이니 정의의 심판을 받을 준비를 하거라!
battle_talk_acceptexhort=정말 달갑지 않지만, 지금 상황에서는 항복할 수밖에 없구나!
battle_talk_refuseexhort=우리는 죽을지언정 결코 항복하지 않을 것이다!
battle_talk_warninvade=당신은 우리의 주권 영역을 침범하고 있습니다. 즉시 군대를 이끌고 떠나십시오!
battle_talk_1=부족의 용사들이여, 풍요로운 갈리아는 우리 훈족이 가져야 한다! 너희들의 군마를 타고 나를 따라 갈리아로 진군하자. 감히 우리를 가로막는 적은 모두 섬멸하라.
battle_talk_2=잉글랜드인들은 우리의 아버지를 잔인하게 살해했다. 라그나르의 아들들은 단결하여 잉글랜드인들이 피로 이 빚을 갚게 해야 한다.
battle_talk_3=우리는 마침내 우리 자신의 왕국을 세웠다! 머지않아 북해 전체가 강성한 덴마크 왕국에 의해 정복될 것이다!
battle_talk_4=반달 왕국과 비잔티움 제국이 교전하고 있다. 지금은 반달족과 로마인을 북아프리카에서 몰아낼 좋은 기회이다. 이곳은 원래 우리 마우리족의 영토이다.
battle_talk_5=정말 풍요로운 땅이다. 초원의 용사들이여, 우리 눈앞에는 수없이 많은 재물들이 우리의 군마와 활의 정복을 기다리고 있다!
battle_talk_6=벨리사리우스는 반달 왕국을 멸망시킨 후, 이탈리아에서 동고트 왕국의 군대를 연파하고, 심지어 라벤나 성까지 되찾았다. 현재 군대 내 그의 명망은 하늘을 찌를 듯이 높기 때문에 그를 조심하고 경계해야 한다.
tutorial_talk_101=중세에 오신 것을 환영합니다. 제가 유저님께 정복 모드의 시스템과 플레이 방법에 대해 소개하겠습니다. 우선, 유저님께서 원하시는 세력을 선택하십시오.
battle_talk_8=왼쪽 상단의 정책 아이콘을 클릭하시면, 정책 인터페이스가 열립니다.
battle_talk_9=정복 모드에서 유저님께서는 자원을 투입하여 정책을 연구하셔야 해당 정책이 효과를 발휘할 수 있습니다.
battle_talk_10=또한, 정책 인터페이스에서 집정관을 교체하실 수 있습니다. 집정관이 지닌 내정 스킬은 유저님이 속한 세력에 다양한 부가 효과를 제공할 수 있습니다.
battle_talk_11=집정관의 내정 능력은 정책을 연구하는 데 필요한 자원을 줄일 수 있습니다.
battle_talk_12=단, 매 라운드마다 집정관은 한 번밖에 교체할 수 없습니다.
battle_talk_13=각 세력은 게임을 시작할 때 자신의 미션을 가지고 있으며, 해당 미션을 완성하면 그에 대응하는 보상을 획득하실 수 있습니다.
battle_talk_14=정복 모드에서는 각 세력마다 각자의 승리 조건이 있으며, 모든 승리 조건을 완성하면 승리하는 동시에 그에 대응하는 보상을 받으실 수 있습니다.
battle_talk_15=주어진 조건을 모두 완성하면, 유저님께서는 승리 결산 인터페이스에서 퇴장 또는 계속 진행을 선택하실 수 있습니다.
battle_talk_16=유저님께는 아직 승리 조건 하나가 남아있습니다. 색슨족의 수도인 윈체스터를 점령하십시오.
battle_talk_17=유저님께서는 성의 선술집을 통해 지휘부에서 미리 배치하신 부대를 모집할 수 있습니다.
battle_talk_18=첫 회 모집만 무료입니다. 주의하십시오.
battle_talk_19=유저님은 정복 모드에서 다른 세력과 외교적으로 상호작용할 수 있습니다.
battle_talk_20=이제 다른 세력과의 외교 관계, 외교 포인트, 외교 추세를 확인하실 수 있습니다.
battle_talk_21=유저님께서는 현재 색슨족, 앵글족과 교전 중이며, 주트족과 평화를 유지하고 있습니다.
battle_talk_22=색슨족과의 외교는 하락세를 보이고 있고, 앵글족과는 상승세를 보이고 있으며, 주트족과는 변화가 없습니다.
battle_talk_23=양면 전쟁은 바람직한 선택이 아닙니다. 현재 앵글족과의 외교 관계를 보면 그들과 휴전을 시도해보실 수 있습니다.
battle_talk_24=해당 외교 인터페이스에서 유저님은 양측의 현재 집정관, 남은 자원, 그리고 다른 세력과의 외교 관계를 확인하실 수 있습니다.
battle_talk_25=마찬가지로 양측의 외교 관계, 외교 포인트, 외교 추세를 확인하실 수 있습니다.
battle_talk_26=현재의 외교 포인트를 나타내는 커서가 '전쟁'과 '휴전' 사이에 위치할 경우, 양측은 휴전 협정을 체결할 수 있습니다.
battle_talk_27=외교 커서가 '휴전'에 가까울수록 휴전 협정 체결 성공 확률은 높아집니다.
battle_talk_28=상대방과 협상할 때, 선물을 주는 방식으로 양측의 외교 포인트를 높일 수 있습니다.
battle_talk_29=선물에 투입하는 자원이 많을수록 외교 증가량은 더 높습니다.
battle_talk_30=유저님과 앵글족의 외교 관계는 이미 휴전 협정을 체결하는데 필요한 수준에 도달하였습니다. 앵글족과 휴전 협정을 체결하십시오.
battle_talk_31=통행 협정, 동맹 협정의 체결 절차는 휴전 협정을 체결하는 절차와 비슷합니다.
battle_talk_32=주의해야 할 점은 휴전 협정을 체결한 후에야 통행 협정을 체결할 수 있고, 통행 협정을 체결한 후에야 동맹 협정을 체결할 수 있습니다.
battle_talk_33=교전 측의 수도를 점령하였을 경우 상대방에게 항복을 요구할 수 있습니다.
battle_talk_34=유저님은 현재 윈체스터를 점령하였습니다. 색슨족을 항복시켜 보십시오.
battle_talk_35=항복 권유 성공 확률은 현재 유저님의 강함과 상대방이 남은 강함의 영향을 받습니다.
battle_talk_36=정복 모드에서 시대는 모집하는 부대의 등급을 제한합니다.
battle_talk_37=조건이 충족되면 다음 라운드 때 시대가 자동으로 업그레이드됩니다.
battle_talk_38=조건에 따르면 브리튼이 암흑 시대에 도달하려면 2급 도시 두 개가 필요합니다.
battle_talk_39=정복 모드에 대한 소개가 모두 끝났습니다.
battle_talk_40=동방의 여러 십자군 나라에서 구원을 요청하는 편지를 보내왔다. 그들은 적의 습격으로 인해 말로 다 표현할 수 없는 고통을 겪고 있다. 신성 로마 제국의 전사들이여, 나를 따라 동방으로 진군하여 우리의 십자군 형제를 지원하자.
battle_talk_41=프랑스 왕국의 전사들이여, 나는 교황청의 군대를 편성하여 십자군을 지원하라는 호소에 호응하여 너희를 이끌고 동방으로 가서 예루살렘을 지원하고, 무상의 영광을 얻으러 가기로 결정하였다!
battle_talk_42=이슬람 세계는 유럽 십자군의 침략에 시달리고 있다. 셀주크 제국은 서아시아를 이끌고 십자군을 몰아내는 중책을 맡아야 한다. 셀주크 제국의 강대함을 다시 한번 세상에 알려라.
battle_talk_43=전란은 야심가들의 천국이다. 중동의 여러 나라와 세력들이 전쟁을 벌일 때가 바로 우리 킵차크 쿠만족이 남하할 때이다.
battle_talk_44=예루살렘은 아군에 의해 수복되었다. 영광은 우리의 것이다!
battle_talk_45=왕조의 전사들이여, 지금 아바스 왕조는 부패하기 짝이 없다. 모든 아랍인들에게 우리 파티마 왕조만이 아랍 제국의 영광을 다시 수립할 수 있다는 것을 인식하게 할 때이다!
battle_talk_46=비잔티움 제국은 불가리아 제국을 공격하기 위해 우리를 초대했다. 스스로 똑똑한 체하는 그리스인들은 우리를 이용하려고 한다. 하하. 우리가 풍요로운 발칸 지역에 발을 붙일 기회를 노리고 있었다는 것을 눈치채지 못하고 있는 모양이다.
battle_talk_47=아바스 왕조의 시대는 이미 과거가 되었다. 앞으로는 우리 부와이흐 왕조가 이슬람 세계를 이끌고 나갈 것이다. 
battle_talk_48=이건 신에 대한 모독이자 배신이다! 나는 교황의 명의로 그리스도를 믿는 모든 사람들이 무기를 들고 이 대역무도한 반역자를 토벌할 것을 호소한다.
battle_talk_49=병사들이여, 교황은 방금 나를 "신성 로마 제국의 황제"로 임명하였다. 서로마 제국의 법통은 우리가 이어갈 것이다. 오늘부터 우리는 새로운 로마 제국이다!
battle_talk_50=게르만 야만족이 어디서 감히 로마인의 황제라고 함부로 부르는가? 이것은 비잔티움 제국에 대한 모욕이다. 군사를 파견하여 이 참담한 자를 토벌하지 않는다면, 우리는 무슨 낯으로 스스로를 로마인이라 칭하겠는가?
battle_talk_51=장병들이여, 지기스문트가 신성 로마 제국의 황제가 된 후 우리 헝가리를 완전히 포기하였다. 심지어 왕국을 팔아 흩어진 그의 제국을 유지하려고 하니 그는 더 이상 헝가리 왕이 될 자격이 없다.
battle_talk_52=신이 잉글랜드인을 사랑하는지 여부는 모르겠다. 나는 단지 죽은자를 제외한 모든 잉글랜드인이 프랑스에서 쫓겨나리라는 것만 알고 있다.
battle_talk_53=프랑스의 장병들이여, 나를 따라 랭스로 진군하라. 왕태자는 랭스에서 프랑스의 왕으로 대관식을 치를 것이고, 신은 우리와 함께 있을 것이다.
battle_talk_54=반역을 제외하고는 두려울 것이 없다. 프랑스를 위해서라면, 나는 죽음도 두려워하지 않는다!
battle_talk_55=헝가리의 전사들이여, 오늘날 신성 로마 제국 내에 반란이 끊이지 않고 있으니, 우리는 제국을 도와 상황을 안정시켜야 한다. 그래야 제국의 지원을 받아 동방으로부터의 침략을 막아낼 수 있을 것이다.
battle_talk_101=중세에 오신 것을 환영합니다. 지금부터 기본적인 작전 지식에 대해 소개해드리겠습니다.
battle_talk_102=화살표로 표시된 부대를 선택한 후, 목표 지역을 선택하면 이동하실 수 있습니다.
battle_talk_103=여러 개의 구역을 연속적으로 선택하실 경우 여러 번 연속적으로 이동할 수 있지만, 전체 이동 거리는 고정되어 있습니다.
battle_talk_104=도달한 구역이 잘못되었을 경우, 취소를 선택하여 정확한 목표 구역을 다시 선택하실 수 있습니다.
battle_talk_105=부대가 모든 이동력을 소진하여 목표 구역에 도달하였을 경우, 부대는 공격할 수 없습니다.
battle_talk_106=부대를 선택하여 목표 유닛 근처로 이동시킨 후, 남은 이동력이 있다면 공격을 개시할 수 있습니다.
battle_talk_107=이동력이 많이 남았을 경우, 공격을 여러 차례 가할 수 있습니다.
battle_talk_108=필요한 부대에 장군을 배치할 수 있으며, 장군 배치 시 부대의 전투력이 크게 향상됩니다.
battle_talk_109=장군마다 서로 다른 효과의 액티브 스킬을 가지고 있습니다.
battle_talk_110=이곳은 주요 목표 구역입니다. 이곳을 점령하고, 승리 조건을 만족시키면 승리할 수 있습니다.
battle_talk_111=당신은 이미 전투에 대한 기초적인 지식을 장악하였습니다. 전쟁이 곧 다가올 것입니다.
battle_talk_112=일반적으로 매 공격 시 6포인트의 이동력이 소모되며, 남은 이동력이 0보다 클 경우 이동력이 0이 될 때까지 계속 공격할 수 있습니다.
battle_talk_201=도시에서 당신을 위해 싸울 군대를 모집할 수 있습니다.
battle_talk_202=다른 종류의 부대라도 하나의 분대로 통합시킬 수 있습니다.
battle_talk_203=우측 하단의 버튼을 클릭하여 다음 라운드로 이동하십시오.
battle_talk_204=아직 이동하지 않은 부대가 있을 시 알림을 받게 됩니다.
battle_talk_205=공격당한 부대가 있습니다. 병력이 적은 부대를 해산시킬 수 있습니다.
battle_talk_206=한 부대의 대열이 3개 이하일 경우, 인력을 보충하실 수 있습니다.
battle_talk_207=모집을 통해 보충될 부대 역시 부대 종류의 제한이 없습니다.
battle_talk_208=정해진 라운드 내에 이기시면 됩니다.
battle_talk_209=부대를 보충할 때, 당신은 해당 부대의 군단 내 위치와 혼합 후 군단의 사기, 이동력, 특성 등을 확인할 수 있습니다.
battle_talk_301=다음은 건설과 관련된 조작을 진행해보도록 보겠습니다.
battle_talk_302=도시 버튼을 클릭하시면 도시 내의 일부 건물을 업그레이드하실 수 있습니다.
battle_talk_303=건물마다 다른 효과를 가지고 있습니다.
battle_talk_304=이곳은 마을입니다. 마을을 성으로 업그레이드하실 수 있습니다.
battle_talk_305=성을 통해 도시에서 모집할 수 없는 부대를 모집할 수 있습니다.
battle_talk_306=성의 레벨을 업그레이드하실 수 있습니다. 성을 업그레이드시키면 더 높은 등급의 군대를 모집하실 수 있습니다.
battle_talk_307=이 부대의 사기는 공격을 받은 후 낮아졌습니다. 부대를 보충하시면 일정량의 사기를 회복하실 수 있습니다.
battle_talk_308=이제 우리는 목표 구역을 방어해야 합니다. 물론 모든 적을 섬멸하셔도 됩니다.
battle_talk_401=맵 위에 건물들이 흩어져 있습니다.
battle_talk_402=은광은 은화의 수입을 제공할 수 있습니다.
battle_talk_403=철광은 철광의 수입을 제공할 수 있습니다.
battle_talk_404=불가사의는 당신이 속한 세력에게 특별한 효과를 줄 수 있습니다. 나라별로 불가사의는 다릅니다.
battle_talk_405=부대에게 선박을 배치해야 강이나 바다에 들어갈 수 있습니다.
battle_talk_406=수송선과 기병은 해상에서 싸울 때 전투력이 크게 떨어집니다.
battle_talk_407=그러니 기병을 선박으로 사용하는 상황을 최대한 피하십시오.
battle_talk_408=기본 튜토리얼이 완료되었습니다.
battle_talk_501=각 지형에 따라 이동력 소모가 다를 수 있으며, 복합한 지형은 더 많은 이동력을 소모하게 됩니다.
battle_talk_502=이곳에서 당신이 소속한 세력의 정책을 확인하실 수 있습니다.
battle_talk_503=정복 모드에서만 스스로 정책을 연구하실 수 있습니다.
battle_talk_504=이곳에서 당신의 인구, 호전 등급, 경제 상황 등을 확인하실 수 있습니다.
battle_talk_505=주의하십시오. 인구 부담이 지나치게 클 경우 당신의 호전 등급도 증가되며, 경제에 영향을 미치게 됩니다.
battle_talk_506=매 라운드 시작 시 기본으로 1포인트의 과학기술 포인트가 할당됩니다. 과학기술 포인트는 기기 장착에 사용하실 수 있습니다.
battle_talk_507=현재 보유하고 있는 과학기술 포인트를 합리적으로 분배하십시오.
battle_talk_10101=고트족은 마침내 탐욕스러운 모습을 드러냈다. 그들은 우리의 풍요로운 땅을 침범하려 하고 있다. 장병들이여, 야만인들을 우리의 영토에서 몰아내라!
battle_talk_10102=로마인들은 너무 가식적이다. 그들은 우리를 노예로 부리고, 우리가 훈족을 상대하게 하고 싶어 하지만, 음식은 조금 더 주려고 하지 않는다. 고트의 용사들이여, 무기를 들고 저항하라!
battle_talk_10201=방금 전선의 세바스티안나스 장군이 승전보를 전해왔다. 고트족의 선봉 부대가 격퇴되었으니 단숨에 이 난폭한 야만족들을 없애라!
battle_talk_10202=진정하라! 로마군의 진격은 기력이 없다. 아라시스가 기병을 이끌고 돌아올 때까지 버티면, 우리가 반격할 차례이다.
battle_talk_10203=좋다. 로마 병사들은 이미 지쳤다. 뒤에서 그들의 좌익을 공격하여 로마군에게 최후의 일격을 가하고, 로마 황제를 사로잡아라!
battle_talk_10301=황제 폐하가 서고트족에게 포위당했다. 전군은 속도를 높여 밀라노 수비군을 지원하라.
battle_talk_10302=알라리크의 주력 부대가 바로 전방에 있다. 서고트족을 완전히 섬멸하라!
battle_talk_10303=로마 제국의 황제로서 이렇게 위험한 곳에 있어서는 안 됩니다.
battle_talk_10304=전사들이여, 로마의 황제가 밀라노에 있다. 밀라노를 쳐부수고 로마 황제를 포로로 잡기만 한다면, 부유한 이탈리아 전체가 우리의 것이다.
battle_talk_10401=로마 성은 얼마 버티지 못할 것이다. 로마 성이 무너지도록 내버려 둘 수 없다. 아프리카의 원군이 곧 도착할 것이다.
battle_talk_10402=알라리크는 로마를 약탈했다. 그가 라벤나를 공격하지 못하도록 반드시 막아야 한다.
battle_talk_10403=알라리크, 이번에는 반드시 너를 격파하여 서고트의 진정한 왕이 누구인지를 세상이 알일 것이다!
battle_talk_10404=비열한 로마인들이 우리를 기습했다. 보아하니 협상은 그들이 시간을 끌기 위한 핑계일 뿐이었다. 호노리우스는 로마의 평화를 위해 몸값을 지불하려 하지 않는다. 그렇다면 우리가 직접 받으러 가자!
battle_talk_10405=사루스, 너는 자신의 민족을 배신했다.
battle_talk_10406=로마인의 원군이 도착했다.
battle_talk_10501=헤르메리크, 이곳은 지형이 복잡해서 우선 적군의 배치를 확인한 후에 진군하는 것이 바람직하다.
battle_talk_10502=비겁한 반달족은 이베리아의 풍요로운 땅을 소유할 자격이 없다. 그들의 영토는 우리 수에비 왕국의 것이어야 한다! 수에비 왕국의 용사들이여, 돌격하라.
battle_talk_10503=수에비족과 정면으로 싸우지 말아라. 그들은 이곳의 지형을 잘 모르기 때문에 그들을 우리의 매복 속으로 유인하라.
battle_talk_10601=우리는 반달족이 조약을 준수할 거라고 믿지 말아야 한다. 전사들이여, 제국의 원군이 오고 있다.
battle_talk_10602=용사들이여, 카르타고를 함락시키기만 하면 막대한 재물을 얻을 수 있을 뿐 아니라 북아프리카에서 가장 부유한 땅은 모두 우리의 것이 될 것이다!
battle_talk_10603=로마군의 원군이 도착했다. 그들의 상륙을 막아라!
battle_talk_10701=왕들이여, 훈족군의 잔인함을 모두가 보았을 것이다. 우리는 힘을 합쳐 적을 격파해야 한다.
battle_talk_10702=훈족군이 나타난 때부터 우리는 끊임없이 공격을 받아 도나우 강에서 라인 강으로 쫓겨났다. 알란의 용사들이여, 우리는 더 이상 물러설 길이 없다. 오직 훈족군을 격파하는 것뿐이다.
battle_talk_10703=로마인들은 서고트족, 프랑크족, 알란족과 연합하면 나의 대군과 맞설 수 있을 거라고 생각하나? 정말 웃긴 생각이다.
battle_talk_10704=당황하지 마라. 모두 내게로 집결하여 방어선을 다시 짜라.
battle_talk_10705=늑대는 양이 몇 마리인지 상관하지 않는다.
battle_talk_10801=반달족은 오랫동안 로마의 부를 노려왔다. 가이세리크의 이번 출병 목적은 그가 말한 것처럼 당당하지 않을 것이다.
battle_talk_10802=막시무스는 왕위를 찬위한 소인으로 로마 제국의 황제가 될 자격이 없다.
battle_talk_10803=발렌티니아누스 3세의 동맹으로서, 우리는 황후를 도와 로마에서 찬탈자 막시무스를 쫓아내야 한다.
battle_talk_10804=유명한 '영원의 도시'가 바로 눈앞에 있다. 로마를 함락시키기만 하면 그 도시의 보물은 모두 용감한 반달 전사의 것이다.
battle_talk_20101=우리 서방의 이웃은 수없이 많은 재물을 가지고 있지만, 곧 그 재물은 우리의 것이 될 것이다!
battle_talk_20102=공격하라! 로마 귀족들은 그저 돈으로 자신의 안전을 살 줄밖에 모른다.
battle_talk_20103=우리의 기병대는 페르시아인들의 상대가 아니지만, 그들을 두려워하지 않을 것이다.
battle_talk_20201=황제는 아프리카에서 일어나고 있는 반란을 용납하지 않을 것이다. 엄청난 수의 난민으로 콘스탄티노플의 질서가 혼란스러워졌다.
battle_talk_20202=병사들이여, 반란군을 섬멸하라, 그들의 우두머리는 우리의 주요 목표이다. 불필요한 전투는 최대한 피하라!
battle_talk_20203=반달 왕국은 로마 제국의 지배로부터 완전히 벗어나야 한다.
battle_talk_20204=바다에서 오는 적들을 소멸시켜라.
battle_talk_20301=기병의 돌격에 놀라 쓰러지지 말고, 전선을 지켜라.
battle_talk_20302=나를 위해 후퇴할 시간을 쟁취하라. 내가 제때에 후퇴하기만 한다면 적의 목적은 달성할 수 없을 것이다!
battle_talk_20304=나는 이미 가장 가까운 연해 도시에 도착했다. 바다에 진입한 후 적들은 더 이상 나를 추격할 수 없을 것이다.
battle_talk_20303=공격하라, 적들은 점점 패퇴하고 있다. 그 무엇도 제국의 전진을 막을 수 없다!
battle_talk_20401=이탈리아 지역은 다시 제국의 지배로 복귀해야 한다. 침입자들을 모두 쫓아내라.
battle_talk_20402=적이 직접 해상에서 진공하는 것은 우리에게 좋은 소식이 아니다.
battle_talk_20403=도시 방어 기구의 힘을 빌려 성을 굳게 지켜라. 그들의 공격은 오래 버티지 못할 것이다.
battle_talk_20501=적은 대량의 부대를 집결시켜 라벤나를 공격했다. 그들의 후방은 비었을 것이다.
battle_talk_20502=로마가 이미 점령당했으니, 더 이상 잃어버릴 가능성은 없다!
battle_talk_20601=식량이 부족해서 로마를 계속 지킬 수 없게 되었다. 철수하는 것이 더 나은 선택일 수도 있다.
battle_talk_20602=적들이 끊임없이 나타나고 있다. 나는 가능한 한 그들의 추격의 속도를 늦출 수밖에 없다.
battle_talk_20603=적을 이탈리아에서 몰아내라. 이 땅은 현재 우리의 것이다.
battle_talk_20701=우리는 이탈리아의 로마 제국 세력을 완전히 제거하지 못했다. 그들은 여전히 바다를 통해 부대를 이동할 수 있다.
battle_talk_20702=인둘프, 네 함대를 이끌고 안코나로 진군하여 그곳을 점령하라. 그곳은 이탈리아에서 로마군의 가장 중요한 기지이다!
battle_talk_20801=우리의 목표는 오직 로마뿐이다. 길에서 만난 적들에 의해 전진의 발걸음이 늦추지 말아라.
battle_talk_20802=가능한 한 빨리 적을 섬멸하라. 제국의 강역은 다시 이탈리아를 뒤덮을 것이다!
battle_talk_20803=전군 출격. 보이는 모든 적을 제거하라!
battle_talk_20901=고트족은 프랑크로부터 원군을 얻었다. 비록 그들의 대부분은 오합지졸이었지만, 여전히 군대에 프랑크 정예가 있다.
battle_talk_20902=야만인들은 신경 쓸 필요가 없다. 집중하여 프랑크 보병을 공격하라!
battle_talk_21001=로마군의 주력은 계속 이탈리아에서 싸우고 있다. 본토의 전력은 아주 약할 것이다.
battle_talk_21002=형제들이여, 나를 따라 콘스탄티노플로 진군하자.
battle_talk_21003=이 욕심 많은 야만인들은 뜻밖에도 다시 이 땅을 밟았다.
battle_talk_21004=벨리사리우스, 부대를 이끌고 그들을 섬멸하라!
battle_talk_30101=로마인들은 이렇게 풍요로운 브리튼 섬을 쉽게 포기하지 않을 것이지만, 우리는 이번 기회를 놓쳐서는 안 된다.
battle_talk_30102=브리튼 섬은 앵글로-색슨족을 수용할 만큼 크다.
battle_talk_30103=앵글로-색슨족은 믿을 수 없다고 일찍이 말했다. 브리튼의 용사들이여, 우리의 고향에서 적을 몰아내라!
battle_talk_30201=브리튼인들은 본토에서 싸우기 때문에 인원 수가 아주 많다. 우리의 현재 병력으로서는 적의 모든 도시를 함락시키기 어렵다.
battle_talk_30202=나는 이미 부근 해역에 있는 아군 부대와 연락했다. 우선 연해 도시를 통제하고, 아군의 상륙을 인도한 후에 다시 병력을 집중하여 내륙으로 진군하라.
battle_talk_30203=적의 증원군이 도착하기 전에 이 앵글로-색슨족의 군대를 완전히 섬멸해야 한다.
battle_talk_30301=이번에는 비겁하기 짝이 없는 브리튼인들을 완전히 정복하여 그들의 땅을 우리 노섬브리아 왕국에 편입시킬 것이다.
battle_talk_30302=나는 네가 이 배신에 대한 대가를 치르게 할 것이다.
battle_talk_30303=노섬브리아의 군대는 기세가 등등하지만, 우리 브리튼인들이 뭉치면 침입자들을 물리칠 수 있다.
battle_talk_30304=앵글로-색슨족은 단결하지 않고, 머시아 왕국도 노섬브리아 왕국의 확장을 꺼려한다. 그들은 기회를 찾아 에셀프리스를 공격할 것이다.
battle_talk_30305=노섬브리아 왕국이 계속 강해지는 것을 지켜볼 수는 없다. 그들의 야심은 끝이 없다.
battle_talk_30401=귀네드의 병사들이여, 이번 머시아 왕국과의 동맹은 우리가 노섬브리아 왕국과 맞설 수 있는 마지막 기회이다. 반드시 최선을 다해야 한다.
battle_talk_30402=당황하지 마라. 패장들의 반격일 뿐이다. 이번 침공을 막아낼 수 있다면 그 누구도 노섬브리아 왕국의 부상을 막을 수 없을 것이다!
battle_talk_30403=우리와 귀네드 왕국은 이번 전투에 모든 것을 쏟아부었다. 만약 에드윈을 격파하지 못한다면 노섬브리아 왕국은 브리튼을 휩쓸 것이다.
battle_talk_30404=연이은 승리로 에드윈은 거만해졌고, 노섬브리아의 방어선은 곳곳에 구멍이 났다!
battle_talk_30501=국민들이여, 나는 선왕 에셀프리스의 아들 오스왈드이다. 왕국은 이미 생사가 걸린 시기에 이르렀다. 내가 이때 돌아오기로 한 이유는 바로 모두를 이끌고 침입자들을 물리치고, 노섬브리아 왕국을 부흥시키기 위해서이다.
battle_talk_30502=오스윈, 방금 성인이 내 꿈에 나타나 이 싸움에서 아군이 반드시 이길 것이라고 알려주었다!
battle_talk_30503=병사들이여, 카드왈론은 이미 나에게 패배하였다. 단숨에 남은 영토를 수복하라.
battle_talk_30504=군인들에게는 왕이 필요합니다. 모든 사람은 당신이 노섬브리아의 왕으로 대관식을 치르는 것을 지지합니다.
battle_talk_30505=노섬브리아 왕가에 이런 인물이 또 있을 줄은 몰랐지만, 그의 패업은 반드시 여기서 끝날 것이다!
battle_talk_30601=머시아 왕국은 귀네드 왕국, 포이스 왕국과 연합하여 여러 차례 우리나라를 침범하였다. 그들은 노섬브리아 왕국의 발전에 방해가 되고 있기 때문에 이들을 완전히 제거해야 한다.
battle_talk_30602=펜다는 과연 포이스를 구하러 왔다. 나와 에오바의 약속대로 펜다가 군대를 이끌고 머시아를 떠나면, 그는 머시아의 왕위를 차지하기 위해 군사를 일으킬 것이다.
battle_talk_30603=아군 측면에 귀네드 왕국에서 온 군대가 대량으로 나타났다. 우리는 언제든 포위당할 위험에 처해 있다.
battle_talk_30604=노섬브리아가 안정된 상태로 발전한 지 몇 년 안 되지만, 오스왈드는 전쟁을 준비하였다. 에오와, 나는 포이스 왕국을 지원하러 갈 터이니, 너는 후방을 지켜라. 
battle_talk_30605=에오와, 나는 너의 배신을 뜻밖의 일로 삼지 않았다. 나는 이 기회에 모든 위험을 제거할 수 있게 되었다.
battle_talk_30606=펜다, 나는 더 이상 너에게 복종하지 않을 것이다. 내가 머시아의 진정한 왕이다.
battle_talk_30701=전사들이여, 적군은 비록 사람이 많지만, 보급이 어렵다. 우리가 도시에서 수비한다면 적군은 반드시 철수할 것이다.
battle_talk_30702=오스윈을 격파하기만 하면, 노섬브리아 왕국은 우리에게 대항할 군대가 남지 않을 것이다. 그렇게 되면 왕국 전체의 재물을 우리가 지배하게 될 것이다!
battle_talk_30801=루다카, 웨식스 왕국은 우리 머시아 왕국의 지배에 복종하지 않는다. 이번 출병은 웨식스를 완전히 정복하고, 다른 왕국들을 위협하기 위한 것이다.
battle_talk_30802=머시아 왕국의 미움을 사게 되면 어떤 결과가 생길지 적들에게 보여주겠다.
battle_talk_30803=병사들이여, 우리가 머시아 왕국의 공격을 좌절시킬 수만 있다면, 머시아에 불만을 품은 다른 왕국들도 반드시 우리를 지원할 것이다. 웨식스는 혼자가 아니다.
battle_talk_30804=반격의 기회가 왔다. 머시아 왕국의 패권은 여기서 종말을 고하게 될 것이다. 
battle_talk_40101=저 가식적인 로마인들은 보기보다 약하다! 사자를 위해 복수하자!
battle_talk_40102=말도 안 돼! 범법자는 대가를 치러야 한다. 그들에게 로마의 힘을 보여줘라.
battle_talk_40103=사상자가 너무 많다. 후퇴하라! 우리는 반드시 다시 이곳에 돌아올 것이다. 그러나 아직은 때가 아니다.
battle_talk_40201=적의 수가 우리의 10분의 1도 안 된다. 그들을 모두 군단 제거할 것이다!
battle_talk_40202=이 오합지졸들은 기껏해야 내 부대를 훈련시키는 수준이다. 로마의 영토에 발을 디딜 때까지 아무도 나를 막을 수 없다.
battle_talk_40203=뒤로 물러나라. 할리드의 군대는 확실히 용맹하다.
battle_talk_40301=로마인들은 이곳에 너무 오랫동안 자리 잡고 있었다. 이제 우리의 말과 낙타가 더 멀리 갈 수 있도록 해야 할 때이다.
battle_talk_40302=다마스쿠스는 견고한 도시이지만, 그 도시를 지키려는 사람들이 얼마나 큰 결심을 하고 있는가에 달렸다.
battle_talk_40303=상대방의 수는 확실히 많지만, 그들은 반드시 속전속결 해야 한다. 우리가 끝까지 지키기만 하면 그들은 필연적으로 물러날 것이다.
battle_talk_40304=우리는 구원이 필요하다.
battle_talk_40401=이것은 우리의 마지막 요새이다. 견고한 성곽이 우리에게 승리의 희망을 가져다 주기를 바란다.
battle_talk_40402=이것은 우리가 세력을 밖으로 확장할 수 있는 가장 좋은 기회이다. 전사들이여, 용감하게 싸워라.
battle_talk_40403=오늘날의 로마인들은 후퇴와 항복에 가장 능숙하다!
battle_talk_40501=예루살렘을 탈환하라. 이 도시는 너무 오랫동안 점령당했다!
battle_talk_40502=우리는 완전히 포위당했다. 이런 상황에서 우리는 오래 버티지 못할 것이다.
battle_talk_40503=국민을 위해 나는 이 도시를 바치겠다. 나는 더 많은 사람이 죽기를 원하지 않는다.
battle_talk_40504=성도가 돌아왔으니 이제 북쪽으로 더 많은 도시를 탈환할 때이다!
battle_talk_40601=이제 시리아 전역에서 로마인들을 완전히 몰아낼 때가 되었다. 허약한 로마인들은 더 이상 회생할 힘이 없다.
battle_talk_40602=우리는 전례없이 강력한 부대를 조직하여 지원하였다. 시간이야말로 우리의 최대의 적이다!
battle_talk_40603=우리의 원군이 도착했다. 우리가 제때 전장에 도착해서 다행이다!
battle_talk_40701=로마인들은 우리가 이렇게 거대한 사막을 가로질러 달려올 줄 몰랐을 거다!
battle_talk_40702=아랍인들은 시리아를 침공했고, 이제는 아프리카까지 손을 대려 한다. 그들이 쉽게 이루도록 놔둘 수 없다.
battle_talk_40801=돛을 올리고 전속력으로 전진하라! 적이 반격 부대를 조직하기 전에 그들을 격파하라.
battle_talk_40802=적이 너무 갑작스럽게 와서, 우리의 군함에는 충분한 선원이 없다. 최대한 시간을 끌어야 한다.
battle_talk_40803=적의 반항이 매우 격렬하다. 예비 부대를 전투에 투입시켜야 한다.
battle_talk_40804=지원 함대가 도착했다. 우리의 바다를 탈환하라.
battle_talk_50101=빨리 상륙하라! 여기 해안의 도시들은 수많은 재물을 가지고 있다. 이것이 바로 우리가 필요한 것이다.
battle_talk_50102=보이는 모든 것은 모두 빼앗아라!
battle_talk_50103=이 강도들은 또 우리 도시를 습격하러 왔다. 우리는 전혀 그들의 적수가 아니다.
battle_talk_50201=그들의 방어는 아주 약하다. 이곳을 점령하여 이 도시들을 우리의 새집으로 만들어라.
battle_talk_50202=우리는 그들을 정면으로 격파할 수 없다. 힘을 보존하여 반격의 시기를 기다리는 것이야말로 지금 우리가 해야 할 일이다.
battle_talk_50301=부대는 흩어져 각자의 적을 찾아 승승장구하라!
battle_talk_50302=척후는 적이 병력을 분산시켰다는 소식을 전해왔다. 이는 적을 하나씩 격파할 좋은 기회이다.
battle_talk_50303=나의 부대는 적에게 포위당했다. 만약 구원이 제때 오지 못한다면, 상황은 우리에게 매우 불리하게 될 것이다.
battle_talk_50401=바이킹은 성을 지키는데 매우 능숙해서 공성전에서는 그들을 거의 이길 수 없다.
battle_talk_50402=적을 광야로 유인하라. 성벽의 보호가 없는 적들은 아주 취약하다.
battle_talk_50501=우리는 이미 상당 기간 적을 포위했다. 그들이 후퇴하는 것은 시간문제일 뿐이다.
battle_talk_50502=적의 반격을 조심하고, 전력을 다해 싸워 적이 퇴각하기 전에 그들을 없애라.
battle_talk_50601=우리는 더블린으로부터 도움을 받았다. 그들은 우리와 함께 싸울 것이다.
battle_talk_50602=오늘 전투는 우리와 이 나라의 운명을 결정할 것이다. 병사들이여, 무기를 들고 나와 함께 싸우자!
battle_talk_50603=우리의 아군이 공격받고 있다. 전진하여 그들을 지원하라.
battle_talk_50701=적의 수가 우리보다 훨씬 적다. 이것은 그들을 멸망시킬 수 있는 좋은 기회이다.
battle_talk_50702=병사들이여, 돌격하여 모든 적을 전멸하라!
battle_talk_50703=후속 부대가 아직 도착하지 않았다. 어떻게든 적의 공격을 막아라.
battle_talk_50704=우리는 반격의 기회가 필요하다.
battle_talk_50801=침략자들이여, 너희들의 오랜 침략 작전은 오늘 종결될 것이다.
battle_talk_50802=비록 적은 지난 전투에서 심한 피해를 보았지만, 여전히 매우 높은 전투력을 유지하고 있다.
battle_talk_50803=그들을 없애면 내가 이 땅의 왕이 될 수 있다!
battle_talk_60101=이 도시의 방어는 아주 약하다. 공격하라. 도시의 재산은 모두 우리의 전리품이 될 것이다.
battle_talk_60102=도시를 격파한 후, 우리는 즉시 후퇴해야 한다. 후퇴로에 벌써 소량의 적이 나타나고 있다.
battle_talk_60103=우리는 오랫동안 이 순간을 기다렸다! 다 죽여버려라!
battle_talk_60104=우리는 매복 공격을 당했다! 빨리 대피하라!
battle_talk_60201=우리의 부대 수는 적을 훨씬 초과하여 우세가 매우 뚜렷하다!
battle_talk_60202=기병대여, 나를 따라 돌격하라!
battle_talk_60203=태양이 사라졌다. 이것은 불길한 징조이다!
battle_talk_60204=공격하라. 적의 사기가 아주 낮다. 이 절호의 기회를 놓치지 마라!
battle_talk_60301=병사들이여, 우리의 전투는 정의롭다. 비잔티움 제국의 통치는 오늘로 종말을 고할 것이다!
battle_talk_60302=당신의 비현실적인 환상을 버려라. 콘스탄티노플의 성벽은 절대 무너지지 않을 것이다.
battle_talk_60303=프테로토스, 아직 네가 한 짓을 알아차리지 못했나?
battle_talk_60304=적들은 불가리아 원군을 찾아왔다. 우리는 지금 앞뒤로 공격받고 있다.
battle_talk_60401=마자르족은 더 이상 우리를 위협할 수 없게 되었다. 비잔티움 제국에 전력을 다하라!
battle_talk_60402=우리의 주력 부대는 먼 동부 변경에 있다. 우리는 눈앞의 힘에 의지하여 적의 침입을 막아낼 수밖에 없다.
battle_talk_60403=상황이 우리에게 매우 불리하다. 시메온 1세를 물리칠 방법을 구해야 한다.
battle_talk_60404=적이 반격하기 시작했다. 예비 부대가 어디에 있느냐!
battle_talk_60501=이것은 우리의 운명을 결정하는 전투일 것이다. 우리의 적은 전례없이 강대하다.
battle_talk_60502=우리 아군을 깜짝 놀라게 할 것이다. 병사들이여, 돌격하라!
battle_talk_60503=척후 부대는 이미 성공적으로 적의 후방에 도달하여 공격을 개시했다.
battle_talk_60504=우리 도시가 공격받았다. 그들은 어떻게 그곳에 갔을까. 전원은 철수하여 방어하라.
battle_talk_60505=예비 부대가 어디에 있느냐. 전부 파견하라. 지금 우세는 우리에게 있다. 이대로 망쳐서는 안 된다.
battle_talk_60601=아랍인들에게 지원을 요청하려던 우리의 계획은 비잔티움 제국에 의해 파괴되었다. 이제 우리는 스스로 그들과 맞설 수밖에 없다.
battle_talk_60602=우리는 그들의 주력이 도착하기 전에 적의 일부 군대를 신속히 해결해야 한다. 시간은 매우 촉박하다.
battle_talk_60603=콘스탄티노플이 눈앞에 있다. 이곳을 함락시키면 이 도시는 더 이상 최전방 방어 진지가 없을 것이다.
battle_talk_60604=우리는 적의 포위 공격을 받았다. 이것은 우리의 마지막 증원이다. 어서 서둘러야 한다.
battle_talk_60605=후속 부대를 전선으로 이동시키면, 적의 방어는 곧 격파될 것이다.
battle_talk_60701=우리는 루스 군의 부대와 마주쳤다. 지금 그들의 병력은 아주 강하기에 우리는 잠시 후퇴해야 한다.
battle_talk_60702=전진하라. 보이는 모든 적을 섬멸하라.
battle_talk_60703=원군이 곧 도착할 것이니, 제자리에서 방어 공사를 세워라.
battle_talk_60704=비잔티움인들은 내가 슬라브인들과 함께 공격을 감행하리라고는 생각하지 못했을 것이다.
battle_talk_60705=우리 부대는 전례 없는 위기에 봉착했다.
battle_talk_60801=나는 우리가 잃어버린 영토를 반드시 되찾을 것을 맹세한다! 병사들이여, 공격하라.
battle_talk_60802=오합지졸에 지나지 않는다. 우리는 한 치의 땅도 잃지 않을 것이다.
battle_talk_60803=우리의 도시가 공격받았다. 즉시 구원하러 가라.
battle_talk_60804=나의 부대는 계속 싸울 수 없다. 잠시 후퇴할 수밖에 없다.
battle_talk_60805=요새가 공격받았다. 방어를 강화하라!
battle_talk_60901=우리의 적들은 강 북쪽 기슭에 주둔하고 있다. 먼 행군으로 그들은 이미 지쳤다.
battle_talk_60902=우리는 은밀한 참수 작전이 필요하다. 여기서 끝없이 소모해서는 안 된다.
battle_talk_61001=병사들이여, 공격하라! 불가리아는 더 이상 정면으로 우리와 맞설 수 없다.
battle_talk_61002=적의 기세가 흉흉하다. 우리가 지금 할 수 있는 것은 수동적인 방어밖에 없다.
battle_talk_61003=원군을 파견하라. 이것은 우리의 마지막 전력이다.
battle_talk_61004=우리는 이미 성공적으로 적의 최전방 도시를 점령했다. 나를 따라 돌격하라!
battle_talk_70101=잉글랜드의 왕위는 내 것이어야 하고 앞으로도 그럴 것이다!
battle_talk_70102=황급히 집결된 부대는 기세등등한 적을 물리치기 어려울 것이다!
battle_talk_70103=그들이 런던에 들어오지 못하도록 막아야 한다.
battle_talk_70104=나는 이제 잉글랜드 땅을 소유하게 되었다!
battle_talk_70105=좋다! 계속하라! 누구도 내 군대를 막을 수 없다!
battle_talk_70106=우리는 기습당했다. 나는 지금 안전한 곳으로 후퇴해야 한다!
battle_talk_70201=잉글랜드의 모든 영토는 나의 보호를 받아야 한다. 지금 런던이 위협받고 있는 상황에서 나는 그냥 보고만 있을 수는 없다.
battle_talk_70202=서더크에는 많은 반란군이 도사리고 있다. 반드시 그들을 섬멸해야 한다.
battle_talk_70203=후방에 적군이 나타났다. 그들은 어떻게 그곳에 도달했을까!
battle_talk_70204=우리 부대의 손실은 막심하지만, 이렇게 물러설 수는 없다!
battle_talk_70205=우리 도시가 공격받았다. 원군은 어디에 있는가?
battle_talk_70301=엑서터에는 여전히 많은 반란군이 있다. 나는 왕으로서 내 땅 위에 반란군이 존재한다는 것을 용납할 수 없다.
battle_talk_70302=나는 강도가 이 나라의 왕이 되는 것을 받아들일 수 없다!
battle_talk_70303=나의 목표는 도시를 점령하는 것뿐이기 때문에 나는 너희들이 항복하는 것을 허락한다.
battle_talk_70304=반란군의 실력은 만만찮아서 도움이 필요할 것 같다.
battle_talk_70401=전진하라. 내 통치를 받아들이지 않으려는 자는 모두 나의 적으로 간주할 것이다!
battle_talk_70402=병사들이여, 두려워할 필요가 없다. 우리의 맹우는 우리를 도와줄 것이라고 약속하였다.
battle_talk_70403=우리의 원군이 도착했다!
battle_talk_70501=왕국의 영토에서 반란이 일어났다. 우리는 그 어떤 대가를 치르더라도 진압해야 한다.
battle_talk_70502=국왕 폐하는 지금 국내에 안 계시니, 우리 자신에게만 의지할 수밖에 없다.
battle_talk_70503=나는 이 새 국왕을 참을 만큼 참았다. 지금은 그의 통치를 무너뜨릴 가장 좋은 기회이다.
battle_talk_70504=그들의 선두 부대를 격파하라. 우리의 시간은 매우 넉넉하다.
battle_talk_70505=우리는 공격 받았다. 지원이 필요하다.
battle_talk_70506=현재 형세는 우리에게 매우 유리하다.
battle_talk_70601=나의 형제는 권력에 대한 욕망에 침식되었다. 그는 우리의 영토를 침공하고, 우리의 백성을 학살하였다. 우리는 반드시 반격해야 한다.
battle_talk_70602=나는 잉글랜드의 국왕이므로 노르망디는 당연히 나의 지배를 받아야 한다. 반항하는 자는 모두 적으로 간주할 것이다.
battle_talk_70603=적의 공세가 매우 맹렬하다. 예비대를 파견하라!
battle_talk_70604=몰탄 백작이 성공했다. 병사들이여, 돌격하라!
battle_talk_70605=우리의 원군이 도착했다. 그 어떤 대가를 치르더라도 적의 공격을 막아라!
battle_talk_70606=우리의 도착이 전세를 바꿀 수 있기를 바란다. 아직 늦지 않았을 것이다.
battle_talk_70701=프랑스인들은 공국의 주변 지역을 여러 차례 공격하였다. 더 이상 그들이 내 영토에서 행패를 부리게 해서는 안 된다!
battle_talk_70702=노르망디는 프랑스 왕국의 영토이므로, 계승자는 당연히 왕국이 결정해야 한다.
battle_talk_70703=멘은 다시 나의 지배하에 들어왔다. 반격할 때가 되었다.
battle_talk_70704=상황이 낙관적이지 않아서 잠시 뒤로 물러나야 할 것 같다.
battle_talk_70705=원군이 어디에 있는가? 보충하면 우리의 병력이 우위를 차지하게 될 것이다!
battle_talk_70801=북쪽의 적은 더 이상 우리를 위협할 수 없게 되었다. 런던 주변의 반란군을 섬멸하기만 한다면 나의 왕위를 흔들 수 있는 자는 아무도 없을 것이다.
battle_talk_70802=비열한 놈. 나의 아버지는 당신에게 왕위를 넘기지 않았다. 나는 나의 가문을 위해 왕위를 되찾을 것이다.
battle_talk_70803=잉글랜드 전체가 적에게 점령되었다. 상황은 우리에게 매우 불리하다.
battle_talk_70804=런던이 공격받았다. 즉시 지원하라!
battle_talk_80101=용사들이여, 우리는 제국을 위해 더 많은 땅과 도시를 점령해야 한다.
battle_talk_80102=예전에 강대했던 비잔티움 제국은 오늘날 매우 취약해졌다. 지금은 공격을 가할 절호의 기회이다!
battle_talk_80103=야만인들이 내 땅에서 행패를 부리는 것을 용납할 수 없다. 반드시 그들을 쫓아내고 땅을 되찾아야 한다.
battle_talk_80104=적들은 이미 우리에게 속한 도시를 탈환하려는 망상을 하고 있다. 용사들이여, 지원하러 가라.
battle_talk_80201=로마인들은 우리를 속였다. 그들은 진정한 평화를 원하지 않는다. 그들은 단지 우리에게 속한 이 땅을 빼앗으려 한다.
battle_talk_80202=황급히 몰려온 이 야만인들은 준비가 부족할 수밖에 없다. 병력의 우세를 이용하여 신속히 전과를 확대하라!
battle_talk_80203=비록 지금 국면이 우리에게 불리하지만, 결코 우리의 필승의 신념을 흔들 수 없다!
battle_talk_80204=원군은 어디에 있나? 나는 지원이 필요하다.
battle_talk_80205=용사들이여, 전투를 멈추지 말아라!
battle_talk_80301=말을 듣지 않는 야만인들은 또 우리를 공격하였다. 하지만 이번에는 바다에서 공격을 감행하였다.
battle_talk_80302=우리가 급하게 소집한 해군은 적의 방대한 수량 앞에서 우세를 차지하지 못할 수도 있다.
battle_talk_80303=용사들이여, 우리는 더 많은 땅과 더 많은 자원이 필요하다. 이 모든 것은 우리가 스스로 쟁취할 수밖에 없다.
battle_talk_80304=우리의 부대는 큰 타격을 입었다. 하지만 다행히 원군이 도착했다.
battle_talk_80305=우리는 반드시 이 해역을 통제해야 한다. 보이는 적을 모두 섬멸하라.
battle_talk_80401=황제 폐하께서 우리에게 강력한 원군을 보내주셨다. 지금은 우리가 잃어버린 땅을 되찾을 수 있는 가장 좋은 기회이다.
battle_talk_80402=이곳에는 수없이 많은 기회와 재물이 있다. 승리는 우리에게 모든 것을 가져다줄 것이다.
battle_talk_80403=눈앞의 도시를 점령하라. 이것은 우리의 정복 계획의 첫걸음이 될 것이다.
battle_talk_80404=도시를 지켜라. 우리는 결코 고군분투가 아니다.
battle_talk_80405=원군이 도착했다. 적의 공격은 효과적으로 억제되었다.
battle_talk_80406=더 많은 원군이 도착했다. 적의 계획은 반드시 수포로 돌아갈 것이다.
battle_talk_80501=이 도시는 난공불락의 도시일 뿐만 아니라 우리의 보급도 매우 부족하다.
battle_talk_80502=걱정하지 말아라. 알렉시오스의 원군은 이미 출발하였다(그러나 알렉시오스 1세의 부대는 출발 후 바로 되돌아갔고, 지원 작전을 취소하였다).
battle_talk_80503=성을 굳게 지켜라. 우리의 보급은 충분하며, 원군도 곧 도착할 것이다!
battle_talk_80504=안티오키아를 신속히 지원하라. 이 도시는 우리에게 매우 중요하다!
battle_talk_80505=반드시 안티오키아를 되찾고, 적을 우리의 땅 위에서 몰아내야 한다.
battle_talk_80506=보아하니 우리는 어떤 원군도 없을 것 같다.
battle_talk_80601=우리를 지원하러 온 군대는 우리를 도와 외적을 물리쳤다. 이제 우리는 스스로 잃어버린 땅을 되찾아야 한다.
battle_talk_80602=적의 궁수와 궁기병은 아주 강력하다. 우리는 경솔하게 맞서 싸워서는 안 된다.
battle_talk_80603=적군은 우리의 막강한 실력 앞에서 아무것도 아니다. 그들을 섬멸하라!
battle_talk_80604=적의 원군이 도착했다. 진형을 유지하라.
battle_talk_80701=적의 병력은 우리보다 훨씬 적다. 지금은 우리가 잃어버린 땅을 되찾는 절호의 기회이다.
battle_talk_80702=아나톨리아에서 야만인을 철저히 몰아내라!
battle_talk_80703=나의 병력은 적군보다 적으므로 적군을 하나씩 격파할 수밖에 없다.
battle_talk_80704=북쪽의 적군을 격파하여 많은 포로를 잡았다. 형세는 우리에게 매우 유리하다. 
battle_talk_80801=우리 땅을 또다시 침략한 야만인들은 만행을 저질렀다. 우리는 반드시 그들을 쫓아내야 한다.
battle_talk_80802=어서 서둘러라. 아직 수많은 물자와 땅이 우리를 기다리고 있다!
battle_talk_80803=적의 행동은 매우 민첩하다. 우리는 반드시 목표를 명확히 하여 우선적으로 영토를 탈환해야 한다.
battle_talk_80804=감히 반격하다니. 그들을 모조리 섬멸하라!
battle_talk_90101=우리는 포위당해서 장면이 매우 혼란스러워졌다. 포위를 뚫을 방법을 찾아야 한다.
battle_talk_90102=이 기수들은 틀림없이 부대의 지도자일 것이다. 우선적으로 그들을 섬멸하라.
battle_talk_90103=직접 우리를 향해 달려드는 이유도 우리가 말을 탔기 때문인가?
battle_talk_90104=용사들이여, 적들은 이미 우리의 포위 속에 빠져들었다. 우리의 원거리 우세를 발휘하여 공격하되 적과 정면으로는 맞서지 마라.
battle_talk_90105=드디어 교전 지역에 도착했다. 너무 늦지 않았길 바란다.
battle_talk_90106=새로운 원군이 도착했다. 적들은 지금 앞뒤로 공격받고 있다. 지금은 반격할 좋은 기회이다.
battle_talk_90201=눈앞의 이 도시는 이번 작전에서 가장 큰 목표이다!
battle_talk_90202=예루살렘 성 밖까지 왔으나, 우리에게는 더 이상 소모할 보급품이 없다.
battle_talk_90203=그들의 수비군을 섬멸하라. 수비군은 그들의 방어에서 가장 중요한 부분이다. 주변의 수비군을 섬멸하면 그들의 성벽은 단숨에 뚫을 수 있다.
battle_talk_90204=용사들이여, 우리는 수동적인 방어만 할 수밖에 없다. 지원군이 오기를 바란다.
battle_talk_90205=우리의 북부 방어선이 뚫렸다. 예루살렘은 적에게 완전히 노출되었다.
battle_talk_90206=그들의 방어는 매우 취약하다. 나는 우리가 이 도시를 점령할 수 있다는 계시를 얻었다!
battle_talk_90207=계속 방어하는 것은 무의미하기에 마지막 승부수를 던질 수밖에 없다.
battle_talk_90301=우리 부대는 행군 과정에서 큰 손해를 입어서 더 많은 소모를 견딜 수 없다.
battle_talk_90302=비록 목표를 다마스쿠스로 정했지만, 나는 여전히 그것이 좋은 선택이 아니라고 생각한다.
battle_talk_90303=예루살렘은 많은 물자를 제공할 수 없다. 우리는 속전속결 해야 한다.
battle_talk_90304=적군의 진영은 이미 심한 타격을 입었다. 우리는 성을 끝까지 지키기만 하면 승리를 얻을 수 있다.
battle_talk_90305=부대의 손실이 이미 한계에 이르러 계속 싸울 수 없게 되었다. 후퇴하라!
battle_talk_90306=우리는 적군을 격퇴하였다. 용사들이여, 승세를 몰아 추격하라!
battle_talk_90307=우리의 수비력이 부족하다. 끝까지 버텨라!
battle_talk_90401=눈앞의 이 도시는 우리의 후속 계획의 중요한 일환이 될 것이므로 반드시 이곳을 점령해야 한다.
battle_talk_90402=우리는 연해 지역을 통해 보급받을 수 있지만, 적들도 마찬가지이기 때문에 우리는 가능한 한 빨리 전투를 끝내야 한다.
battle_talk_90403=우리는 눈앞의 도시가 포위되는 것을 이대로 두고 볼 수 없다. 지원해야 한다.
battle_talk_90404=나의 부대는 곧 전선에 도착할 것이다.
battle_talk_90405=우리는 강력하고 중요한 동맹을 잃었다. 이는 작전에 매우 불리하다.
battle_talk_90406=우리의 수성 부대는 손실이 매우 크다. 반드시 적의 포위를 돌파해야 한다.
battle_talk_90407=수중의 무기를 내려놓고, 이 도시를 당신들에게 넘겨주겠다. 이번 전투는 당신들이 이겼다.
battle_talk_90501=적의 기세가 매우 세차다. 우리는 그들이 계속 전진하도록 내버려 둘 수 없다.
battle_talk_90502=콘야는 위협받아서는 안 된다. 여기서 그들을 섬멸하라.
battle_talk_90503=전방에 바로 주둔하고, 부대를 정비한 후 계속 전진하라!
battle_talk_90504=우리는 매복 공격을 당했다. 반드시 방법을 강구해서 포위를 돌파해야 한다!
battle_talk_90505=적이 접근하지 못하게 하고, 우리의 기동력 우세를 발휘해라.
battle_talk_90506=전선 수비군이 뚫렸다. 우리는 함께 방어를 할 수 있는 사람이 필요하다!
battle_talk_90507=콘야가 공격받았다. 방어 부대는 어디에 있는가?
battle_talk_90508=눈앞의 도시를 점령하라. 우리의 전쟁은 정의의 전쟁이다!
battle_talk_90601=십자군의 강력함은 의심할 여지가 없지만, 야파가 그들에게 점령당하도록 내버려 둘 수는 없다.
battle_talk_90602=이 도시를 다시 탈환하라. 이것은 우리의 복수이다!
battle_talk_90603=나는 멀리 떨어진 바다 위에서도 도시에 타오르는 불길을 볼 수 있다. 속도를 내라. 우리는 반드시 그곳을 지원해야 한다.
battle_talk_90604=이제 이 도시는 우리의 것이니 약탈은 금지될 것이다!
battle_talk_90605=적이 반격하기 시작했다. 성벽을 지켜라.
battle_talk_90606=우리는 공격받고 있다. 지원군은 어디에 있는가?
battle_talk_90607=잠시 뒤로 물러서서 힘을 모은 후에 다시 공격할 기회를 기다려라!
battle_talk_90701=서방의 야만인들이 마침내 그들의 정체를 드러냈다. 콘스탄티노플은 위태로웠다.
battle_talk_90702=쓸데없는 저항은 모두 포기하라. 우리의 사업은 정의로운 사업이다.
battle_talk_90703=우리는 베네치아로부터 지원받았다. 이것은 우리가 이 도시를 점령하는 데 가장 큰 도움이 될 것이다.
battle_talk_90704=해안의 수비군을 섬멸하라. 그래야만 우리의 원군에게 길을 열어줄 수 있다.
battle_talk_90705=해안 부대는 전함이 해협에 도착하지 못하도록 방어를 강화하라!
battle_talk_90706=콘스탄티노플은 적의 공격을 막을 수 없다. 이곳을 떠나는 것이 가장 현명한 선택이었다.
battle_talk_90707=남은 부대를 집결시켜라. 이 방법이 적의 진격을 지연시킬 수 있기를 바란다.
battle_talk_90708=나의 함대는 목표 지역으로 이동하고 있다. 하지만 해안의 수비군 때문에 전속력으로 전진할 수 없었다.
battle_talk_90709=적의 함대가 우리 도시에 다가오고 있다!
battle_talk_90710=콘스탄티노플의 성벽이 보인다!
battle_talk_90801=우리는 성공적으로 상륙하였다. 예루살렘 수복에 한 걸음 더 다가섰다.
battle_talk_90802=눈앞의 적은 우리가 예루살렘을 수복하는 데 가장 큰 걸림돌이다. 그들을 섬멸하라.
battle_talk_90803=이 녀석들은 방금 거센 파도를 겪었다. 이제 그들에게 우리의 힘을 보여주자.
battle_talk_90804=우리의 도시가 공격받고 있다. 적이 계속 전진하도록 내버려 둘 수 없다!
battle_talk_90805=최후의 방어선이 무너졌다. 카이로가 적들에게 노출되었다.
battle_talk_90806=우리의 후속 지원 부대가 도착했다. 이것은 우리에게 좋은 소식이다.
battle_talk_90807=카이로가 공격당하고 있다. 도시 방어를 강화하라!
battle_talk_90808=상륙 부대의 피해가 막심하다. 적의 전투력은 예상을 벗어났다.
battle_talk_100101=우리는 웨일스인들과 잘 지내고 있었는데, 그들은 내 통치를 무너뜨리기 위해 반란을 일으킬 준비를 하고 있다! 이건 참을 수 없는 일이다. 반드시 그들을 막아야 한다.
battle_talk_100102=이봐, 우리 왕이 군대를 데리고 이곳에 왔다. 나는 당장 항복해야 하는 건가?
battle_talk_100103=적의 기세는 무섭지만, 우리에게는 방벽으로 사용할 수 있는 견고한 도시가 있다. 적의 수량에 겁먹지 말아라!
battle_talk_100104=포이스 왕국이 방벽으로 전방에 막혀 있다. 우리는 직접 공격할지, 아니면 포이스 왕국을 우회할지 선택해야 한다.
battle_talk_100105=포이스 왕국이 공격받고 있다. 그들을 지원할 군대를 파견해야 한다.
battle_talk_100106=너희들은 언제까지 저항할 작정인가? 저항을 포기하고 즉시 항복하는 것이 옳은 선택이다.
battle_talk_100107=내 도시가 공격당하고 있다. 적들은 우리를 하나씩 격파하려고 한다.
battle_talk_100108=저항을 포기하라. 너희들의 왕은 자비로운 사람이다!
battle_talk_100109=감히 우리를 공격하는 모든 적을 격퇴하라. 우리는 결코 홀로 싸우고 있는 것이 아니다.
battle_talk_100110=이것은 무의미한 몸부림에 불과하다.
battle_talk_100111=우리는 포이스 왕국을 격파하였다. 이번 전쟁의 승리는 시간문제이다.
battle_talk_100201=비열한 브르타뉴인들이 감히 내 어머니의 안전을 볼모로 나를 위협하다니. 우리는 적에게 당하고만 있을 순 없다.
battle_talk_100202=목표물을 보호하는 것을 최우선으로 하고, 전속으로 남쪽을 향해 전진하라!
battle_talk_100203=프랑스인의 움직임을 주의하라. 꼭 필요한 경우가 아니라면 가능한 한 그들과 교전하지 말아라. 지금 그들의 입장은 매우 애매하다.
battle_talk_100204=우리의 계획이 파괴되지 않도록 부대를 파견하여 영국인을 막아라.
battle_talk_100205=선발대의 손실이 막심하다. 더 많은 부대를 투입하여 공격해야 한다.
battle_talk_100206=우리의 맹우가 곤경에 처해있다. 그들을 도와야 한다.
battle_talk_100207=영국인들은 엘레오노르 때문에 싸우려 하지 않는다. 이것은 우리에게 절호의 기회이다!
battle_talk_100208=영국인은 이곳에 많은 적을 세웠다. 그럼에도 불구하고, 감히 우리를 공격하다니. 병사들이여, 그들에게 우리의 본때를 보여 줘라!
battle_talk_100209=안 돼! 너희들은 내 어머니에게 무슨 짓을 했나!
battle_talk_100301=프랑스인들은 노르망디에서 우리의 영토를 차지하려고 한다. 이건 용납할 수 없는 일이다!
battle_talk_100302=비록 우리는 초기적으로 가이야르 성을 포위하였지만, 적의 보급선은 여전히 끊기지 않았다.
battle_talk_100303=우리는 가이야르 성의 보급을 철저히 차단해야 한다. 이는 우리가 노르망디를 되찾는 데 매우 중요하다.
battle_talk_100304=가이야르 성은 난공불락의 성이다. 적들이 쉽게 포위하지 못하도록 하라!
battle_talk_100305=가이야르 성 주변의 도시와 요새를 점령하면 성곽 안의 적들은 곧 항복할 것이다!
battle_talk_100306=전선을 전력으로 지원하라. 우리의 영토가 적의 공격을 받고 있다.
battle_talk_100307=전황은 우리에게 매우 불리하다!
battle_talk_100308=가이야르 성은 완전히 적에게 점령당했으니 후퇴할 수밖에 없다.
battle_talk_100309=이제 우리의 땅을 되찾기까지 한 걸음 더 나아갔다!
battle_talk_100310=프랑스인을 내 영토에서 쫓아내라!
battle_talk_100401=병사들이여, 우리의 왕은 곧 영국을 상대로 전쟁을 도발할 것이다. 그러나 플랑드르 백작이 왕의 호소를 거절하였다. 이는 일종의 배신이다.
battle_talk_100402=그렇다면 우리만의 방식으로 플랑드르 백작의 '도움'을 얻을 수밖에 없다.
battle_talk_100403=전방에 선박이 발견되었다. 하지만 배에 아무도 없는 것 같다. 무슨 상황인지 알아보자.
battle_talk_100404=항구에 정박 중인 아군의 배가 공격당한 것 같다. 빨라 사람을 파견하여 무슨 상황인지 확인하라!
battle_talk_100405=서둘러 우리가 필요한 재물을 수집하라. 우리의 적이 도착했다.
battle_talk_100406=우리는 이미 대량의 물자를 얻었다. 이 물자는 매우 충분하므로 국왕은 매우 만족해할 것이다.
battle_talk_100407=서둘러 방어물을 구축하라. 우리는 약탈을 위한 시간을 쟁취해야 한다.
battle_talk_100408=눈앞의 적이 거의 모두 소멸하였다. 이곳의 물자는 마음대로 약탈할 수 있게 되었다.
battle_talk_100501=연합군의 병사들이여, 그동안 프랑스인들은 그들에게 속하지 않는 영토를 노려왔다. 이는 용납할 수 없는 일이다.
battle_talk_100502=전선을 펼쳐라. 우리가 직면하게 될 적은 매우 강하다.
battle_talk_100503=비록 적의 연합군은 강하지만, 우리에게는 여전히 승리의 희망이 있다. 연합군의 양쪽은 혼란에 빠졌다. 그들을 섬멸하면 적군은 난장판이 될 것이다.
battle_talk_100504=나의 왕은 이미 남부에서 파리를 침공할 준비를 마쳤다. 곧 그의 승리의 소식을 받을 수 있을 것이다!
battle_talk_100505=양쪽의 연합군은 막심한 손상을 입었다. 병사들이여, 공격하라. 적이 측면으로 우리의 진지를 돌파하지 못하게 막아라.
battle_talk_100506=양쪽의 부대가 이미 격파되었다. 우리의 작전은 곧 실패하게 될 것이다.
battle_talk_100507=병사들이여, 공격하라. 적의 방어가 매우 약하다.
battle_talk_100508=우리에게 몹시 중요한 도시를 잃었다!
battle_talk_100601=내가 남작들의 무리한 요구를 완전히 거절하자 그들은 매우 과격하게 대응했다.
battle_talk_100602=이번 반란은 반드시 평정되어야 하며, 어떠한 협상 조건도 받아들이지 않을 것이다.
battle_talk_100603=이익과 상관없이 우리는 자신의 생존 공간을 위해 싸우는 것이다.
battle_talk_100604=국왕의 통치는 우리 영토의 정상적인 질서를 심각하게 위협하고 있다!
battle_talk_100605=헨리 3세는 우리에게 잡혔다. 런던의 새로운 질서는 우리가 정할 것이다.
battle_talk_100606=반란군이 사방을 파괴하도록 내버려 둘 수 없다. 즉시 그들을 섬멸하라.
battle_talk_100607=국왕은 성공적으로 구출되었다. 반란군의 계획은 완전히 실패하였다!
battle_talk_100608=병사들이여, 너희들의 왕을 위해 싸워라!
battle_talk_100609=우리는 공격당했다. 병사를 집결하여 반격을 가하라!
battle_talk_100701=겉과 속이 다른 스코틀랜드인들은 믿을 수 없다. 우리의 왕은 자비롭지 않아야 한다.
battle_talk_100702=이 도시의 방어는 우리에게 없는 것이나 마찬가지다. 너희들은 성을 격파한 후, 이곳의 재물을 마음껏 빼앗아라!
battle_talk_100703=우리의 영토는 침입을 당하고 있다. 적군은 우리가 맞설 수 없을 정도로 매우 강하다.
battle_talk_100704=지금은 다른 방법을 찾아 적의 공격을 견제할 수밖에 없다. 우리에게는 아직 반격의 기회가 있을 것이다.
battle_talk_100705=우리의 후방에 왜 적군이 나타났는가? 교활한 스코틀랜드인들은 도대체 어떻게 해냈을까?
battle_talk_100706=부대의 처지가 매우 수동적이다. 애초에 이렇게 중요한 임무를 너에게 맡겼던 것이 후회된다.
battle_talk_100707=스코틀랜드 국민들이여, 무기를 들고 침략자에 맞서 싸워라!
battle_talk_100801=프랑스는 이미 나와 협정을 체결했다. 우리는 이제 안심하고 스코틀랜드에 대처할 수 있게 되었다. 가능한 한 빨리 이 소동을 평정하여라.
battle_talk_100802=스털링 다리 전투의 실패가 아직 생생하다. 우리는 반드시 한 차례의 승리로 이 치욕을 씻어내야 한다!
battle_talk_100803=스코틀랜드인의 창을 조심해라. 우리 기병대는 이 무기에 대응하는 데 능숙하지 않다.
battle_talk_100804=이전 전투에서, 나는 이미 잉글랜드인은 우리의 자유 의지를 흔들 수 없다는 것을 증명했다!
battle_talk_100805=용사들이여, 두려움이 당신의 마음을 차지하게 하지 말아라!
battle_talk_100806=우리의 측면이 공격받았다. 측면이 무너지지 않도록 그들을 지원하라.
battle_talk_100807=돌격, 돌격하라! 적은 패배하여 퇴각하고 있다!
battle_talk_100808=나의 부대는 큰 피해를 입어 잠시 후퇴해야 한다.
battle_talk_100809=우리는 적의 지휘관을 격퇴했다. 지금은 반격할 시간이다!
battle_talk_100901=오랜 세월 동안 스코틀랜드인들은 우리의 토지를 착복해 왔으며, 지금 그들은 스털링 성까지 차지하려고 한다. 이는 용납할 수 없는 일이다.
battle_talk_100902=진군하라! 로버트 1세에게 잉글랜드 군대의 본때를 보여줘라.
battle_talk_100903=잉글랜드인들은 대량의 군대를 집결시켰다. 이는 우리에게 매우 심각한 위협이다.
battle_talk_100904=비록 적군의 수량이 매우 많지만, 스털링 성에 대한 포위를 늦춰서는 안 된다.
battle_talk_100905=이 적들을 섬멸하기만 하면, 성은 구조될 희망을 잃게 되어 우리에게 항복할 것이다.
battle_talk_100906=나의 도끼에는 적의 피가 가득 묻었다. 병사들이여, 용감하게 싸워라!
battle_talk_100907=우리의 진지가 공격받고 있다. 반드시 적의 진격을 막아야 한다!
battle_talk_101001=이사벨라가 한 짓은 분명 배신이다. 그녀는 잉글랜드와 나를 배신했다!
battle_talk_101002=그녀는 나의 권력을 빼앗으려 하다니, 그녀는 틀림없이 미쳤을 것이다!
battle_talk_101003=에드워드는 이미 디스펜서 부자에게 현혹되었다. 잉글랜드가 이대로 그들의 손에서 파멸되는 것을 보고만 있을 순 없다.
battle_talk_101004=불결한 배신자가 잉글랜드에 상륙했다. 그녀는 프랑스의 도움을 받았다!
battle_talk_101005=역적은 많은 도시를 점령하였다. 잉글랜드가 위태로워졌다.
battle_talk_101006=프랑스의 암늑대는 더 많은 군대의 지원을 받았다.
battle_talk_101007=왕국의 눈부신 진주, 황후 폐하께서 그녀에게 충성하는 잉글랜드를 통치할 것이다!
battle_talk_101008=잠시 철수하라. 우리는 그녀와 싸울 만큼 강하지 않다.
battle_talk_101009=잉글랜드의 왕위는 이렇게 빼앗겨서는 안 된다.
battle_talk_101010=우리에게는 아직 반격의 기회가 있다.
battle_talk_101011=배신자에게 최후의 공격을 가하라.
battle_talk_101012=황후 폐하, 제가 황후 폐하의 앞길을 닦아 드릴 수 있길 바랍니다.
battle_talk_101013=기꺼이 도와드리겠습니다. 폐하.
battle_talk_110101=순진한 적들은 라틴 제국의 비호를 받으면 우리와 겨룰 수 있다고 생각한다.
battle_talk_110102=적은 이미 허겁지겁 도망쳤지만, 추격할 때는 여전히 그들을 경시해서는 안 된다.
battle_talk_110103=미하일은 이미 그의 원군과 합류했다. 더 많은 원군이 올 것이다.
battle_talk_110104=날 지켜라! 전투에서 벗어날 수만 있다면 얼마든지 희망이 있다.
battle_talk_110105=적들이 나를 바짝 뒤쫓아 오고 있다. 나는 반드시 계속 후퇴해야 한다. 여기서 머물러 있을 수는 없다.
battle_talk_110106=내가 전쟁터에서 성공적으로 탈출하는 데 한 발짝 더 다가왔다. 원군은 어디에 있는가?!
battle_talk_110107=우리의 맹우는 머리를 감싸 쥐고 쥐처럼 도망치고 있다. 참으로 낭패스럽다.
battle_talk_110108=군대는 전투 의지가 느슨하고, 헛소문이 자자하고, 병사들은 싸울 힘을 잃었다. 나도 마찬가지이다.
battle_talk_110109=나는 이미 나의 탈출을 위해 충분한 시간을 쟁취해냈다. 너희들의 승리는 아무것도 아니다!
battle_talk_110201=콘스탄티노플이 내 눈앞에 있지만, 지금 이 도시는 교활한 야만인들이 차지하고 있다.
battle_talk_110202=우리 나라를 부활시키기 위해 우리는 반드시 이곳을 탈환해야 한다.
battle_talk_110203=주제넘은 녀석들. 아직도 콘스탄티노플로 다시 돌아가려는 생각을 버리지 못하고 있다.
battle_talk_110204=적이 성안으로 들어오지 못하도록 막아라. 적의 역량으로는 아직 성벽을 넘을 수 없다.
battle_talk_110205=금각만의 요새가 함락되었다! 수비대는 도대체 뭘 하고 있는 건가!?
battle_talk_110206=우리의 외곽 방어선이 곧 뚫릴 것이다. 적이 이 도시를 점령하게 해서는 안 된다.
battle_talk_110207=이 도시를 되찾을 수 있는 희망이 보이는 것 같다.
battle_talk_110208=이 도시를 탈환할 기회가 눈앞에 다가왔지만, 지금은 정돈하기 위해 어쩔 수 없이 후퇴해야 한다.
battle_talk_110209=우리의 병력이 부족하니 원군은 빨리 공격의 태세를 갖추어라!
battle_talk_110301=우리는 다시 한번 이 웅장한 도시 앞에 도착했다.
battle_talk_110302=이 도시를 탈환하려면, 우리는 우선 양쪽의 보초병 대대를 점령해야 한다. 이것은 매우 중요하다.
battle_talk_110303=보초병 대대를 해결하면 나에게는 이 도시에 들어갈 방법이 있다.
battle_talk_110304=성의 문이 열렸다. 이곳을 점령한 후, 이 도시의 절반은 우리의 손에 넘어올 것이다!
battle_talk_110305=성문이 함락되었다! 우리는 곧 성공할 것이다!
battle_talk_110306=베네치아인들의 움직임에 주의를 돌려야 한다. 그들은 우리의 이번 작전의 가장 큰 위협이다.
battle_talk_110307=도시 밖에 무슨 일이 일어났는가!
battle_talk_110308=우리는 공격을 받았다. 여기에 남아 있으면 생명을 잃게 될 것이다. 지금은 후퇴할 수밖에 없다!
battle_talk_110401=비록 제국이 과거의 영광을 되찾았지만, 아카이아 후국은 위험한 존재이다.
battle_talk_110402=그러기 위해서는 제국이 그리스 지역에 대한 지배권을 되찾아야 한다.
battle_talk_110403=비잔티움 군대는 쉽게 이길 수 있다고 생각하고 있다. 거만한 태도는 그들을 마비시켰다. 이것은 우리에게 가장 좋은 기회이다.
battle_talk_110404=우리는 성공적으로 적의 후방을 기습했다. 화가 잔뜩 난 적군은 정면 공격을 강화할 것이다.
battle_talk_110405=더 이상 미룰 수 없다. 총공격을 가하라!
battle_talk_110406=적은 바다와 육지에서 공격을 개시하였다. 우리의 후방은 매우 공허하다!
battle_talk_110501=이전의 작전으로 인해, 우리의 부대는 현재 여러 곳에 분산되어 있다.
battle_talk_110502=기욤 2세의 부대는 우리를 포위 공격할 준비를 하고 있다. 이는 우리에게 매우 불리하다.
battle_talk_110503=지금은 우리가 적을 몰아낼 수 있는 최적의 시기이다. 고립무원한 적군은 반격할 수 없을 것이다.
battle_talk_110504=대량의 용병이 도망갔다. 아군의 사기는 매우 저하되어 이미 싸울 힘이 없다.
battle_talk_110505=승리는 반드시 우리의 것이 될 것이다. 이 수비군 포로들을 모두 구속하라.
battle_talk_110506=우리는 적군으로부터 보잘것없는 공격을 받았다. 신경 쓸 필요 없다. 눈앞의 적에게 집중하라.
battle_talk_110601=우리는 아테네 공국으로부터 지원을 받았다. 더 이상 비잔티움 군대를 두려워할 필요가 없다.
battle_talk_110602=대량의 적군이 우리를 향해 밀려오고 있다. 어쩔 수 없이 후퇴해야 한다.
battle_talk_110603=해로를 따라 전진하면 대량의 적군을 피할 수 있고, 철수 지점에 도착할 수 있을 것이다.
battle_talk_110604=병사들이여, 진지를 지켜라. 도망간 부대의 영향을 받지 말아라!
battle_talk_110605=바다 위에도 적이 있다. 도움이 필요하다!
battle_talk_110606=뒤에서 또 새로운 적이 쫓아오고 있다. 철수 지점이 눈앞에 보이니 작전을 지속하라.
battle_talk_110607=남아 있는 부대는 지금 어떤 상황일까?
battle_talk_110608=공격하라. 지금은 우리가 적을 격파할 수 있는 가장 좋은 기회이다.
battle_talk_110609=나의 부대는 이미 출발 준비를 마쳤다.
battle_talk_110701=라틴 귀족들은 베네치아인들의 도움으로 다시 자리를 잡았다. 현재 상황은 우리에게 매우 불리하다.
battle_talk_110702=베네치아 해군의 실력은 매우 강대하다. 우리는 현재 지원을 기다리며 수비할 수밖에 없다.
battle_talk_110703=가능한 한 빨리 병력을 회복해야 한다. 나의 군단이 충분한 보급을 받기만 한다면, 나는 부대를 이끌고 모든 적을 격파할 수 있다!
battle_talk_110704=병사들이여, 나를 따라 돌격하라. 제국의 옛 영광을 회복할 기회가 눈앞에 있다!
battle_talk_110705=적의 수비에 큰 틈이 생겼다. 지금이 바로 공격하기에 좋은 시기이다.
battle_talk_110706=황급히 소집한 해군으로 베네치아에 맞서겠다니.
battle_talk_110801=베라트는 제국에게 매우 중요하다. 지금 이 도시는 적들이 제국을 공격하는 교두보가 되었다.
battle_talk_110802=그러나 이 도시는 수비하기 쉬우나 공격하기 어렵기 때문에 우선 이 도시의 모든 보급을 차단해야 한다.
battle_talk_110803=여러분, 제국을 부흥시킬 기회가 눈앞에 있다. 나와 함께 미련 없이 한번 싸웁시다!
battle_talk_110804=적들은 베라트 성을 포위 공격하려 한다. 전력으로 수비하고 보급을 보장하라!
battle_talk_110805=남쪽 전선의 부대가 큰 타격을 입었다. 빨리 가서 지원하라.
battle_talk_110806=북쪽 전선은 곧 함락될 것이다. 우리 부대는 이렇게 취약하단 말인가?
battle_talk_110807=베라트 성의 보급이 성공적으로 차단되었다. 지금은 공격하기에 좋은 기회이다.
battle_talk_110808=이 도시의 방어는 이미 뚫렸다. 전력을 다해 공격하라.
battle_talk_110809=우리는 승리를 눈앞에 두고 있다!
battle_talk_120101=우리의 군대는 오스만 대군과 정면으로 맞닥뜨렸다. 적군의 수가 방대하고 행동도 빨라서 그들을 이기기 어려울 것 같다.
battle_talk_120102=나약하고 무능한 비잔티움 군대는 우리에게 어떤 위협도 가할 수 없다. 병사들이여, 눈앞의 적을 섬멸하라.
battle_talk_120103=적의 공세가 매우 맹렬하지만, 우리는 반드시 적의 공격을 막아내고, 철수할 기회를 찾아야 한다.
battle_talk_120104=나는 외적이 제국의 영토를 침입하는 것을 보고만 있을 수 없다!
battle_talk_120105=우리는 지원받았지만, 이 정도의 지원으로 눈앞의 적을 이기기에는 부족하다.
battle_talk_120106=아군은 적의 맹렬한 반격을 당하고 있다. 인력을 추가 파견하여 공세를 강화하여라!
battle_talk_120107=측면에도 적이 나타났다. 어째서 적들은 끊임없이 우리 앞에 나타나는 걸까?
battle_talk_120108=철수할 기회가 나타났다. 지금이야말로 전투에서 벗어날 수 있는 절호의 기회이다.
battle_talk_120109=비잔티움 군대가 그러한 반격 능력을 갖추고 있을 줄은 몰랐다. 군대의 사기가 심각한 타격을 입었다.
battle_talk_120201=어리석은 비잔티움인들은 내전을 벌이고 있다. 지금은 우리가 계속 영토를 넓히고, 권력을 확고히 할 수 있는 가장 좋은 시기이다.
battle_talk_120202=부르사 성은 우리에게 매우 중요하다. 적들이 우리 땅에서 기승을 부리도록 내버려 두어서는 안 된다.
battle_talk_120203=이 도시를 포위하는 데 우리는 많은 시간과 물자를 투입하였다. 가능한 한 빨리 적의 방어를 와해시켜야 한다.
battle_talk_120204=도시 주변에 흩어져 있는 성곽을 점령하고 지켜라. 그러면 적의 보급을 차단할 수 있는 동시에 우리가 공격할 수 있는 조건을 마련할 수 있다.
battle_talk_120205=부르사의 외곽 방어선은 이미 적에게 뚫렸다. 이 도시는 곧 적의 공격에 직면할 것이다.
battle_talk_120206=좋다, 우리는 이 도시를 점령하는 데 한 걸음 더 가까워졌지만, 적의 지원군도 끊임없이 몰려오고 있다.
battle_talk_120207=방어선을 강화하여 적이 계속 전진하지 못하게 하여라!
battle_talk_120301=아나톨리아가 수비력이 부족하다는 것이 결국 적에게 들통나게 되었다.
battle_talk_120302=적군은 니케아를 공격하기 위해 대군을 결집하고 있다. 우리는 반드시 이곳을 굳게 지켜야 한다. 이 도시는 콘스탄티노플의 중요한 장벽이다.
battle_talk_120303=보급과 지원을 걱정하지 말고 전력으로 공격하라. 이 땅은 곧 우리의 것이 될 것이다.
battle_talk_120304=니케아가 함락되었다. 콘스탄티노플은 위태로워졌다.
battle_talk_120305=우리는 작은 부대와 연락을 취했는데, 우리에게 도움이 되기를 바란다.
battle_talk_120306=이런 상황에서 적들이 참수 작전을 감행하니 매우 과감하다고 할 수 있지만, 그들은 여전히 우리의 발걸음을 막을 수 없다.
battle_talk_120307=우리는 지속적으로 물자 보급을 받으면서 앞으로 밀고 나가고 있다.
battle_talk_120308=비잔티움인들의 생존 공간은 점점 좁아지고 있다. 우리는 반드시 최후의 승리를 거둘 것이다.
battle_talk_120401=아나톨리아는 점차 제국의 통제에서 벗어나고 있다. 우리는 반드시 적을 막아내야 한다.
battle_talk_120402=현재 우리가 보유한 전력은 더 이상의 손실을 용납할 수 없다. 이는 니케아를 탈환하는 데 매우 중요하다.
battle_talk_120403=비잔티움 군대는 아직도 현실을 인식하지 못하고 있다. 이 땅이 오스만의 땅임을 행동으로 그들에게 알리자.
battle_talk_120404=우리 군대는 점차 밀고 나가고 있지만, 적의 반격도 곧 시작될 것이다.
battle_talk_120405=우리 도시는 공격을 받았다. 더 많은 군대를 파견하여 적을 이 땅에서 몰아내라.
battle_talk_120406=적들이 우리의 후방을 점령하였다. 우리는 철저히 포위되었다.
battle_talk_120407=우리의 병력은 적보다 훨씬 적다. 어떠한 손실도 우리의 완전한 실패를 초래할 수 있으니, 우리의 군대를 잘 보호하라!
battle_talk_120501=강력한 지진으로 갈리폴리의 성벽과 수비력이 큰 손해를 입었다. 오스만군은 결코 이 천재일우의 기회를 놓치지 않을 것이다.
battle_talk_120502=지금 우리는 병력과 식량이 부족하니, 반드시 돈을 마련해서 이 도시를 되찾아야 한다.
battle_talk_120503=갈리폴리의 성벽은 이미 철저히 파괴되었다. 지금 이 도시를 점령하는 것은 우리에게 식은 죽 먹기이다!
battle_talk_120504=어리석은 비잔티움은 돈으로 이 도시를 사들이려 한다.
battle_talk_120505=뜻밖에 생각지도 못한 적이 나타났다. 바다 위의 적군을 조심하라.
battle_talk_120506=비잔티움 제국은 무력으로 도시를 탈환할 생각이 전혀 없는 것 같다. 그렇다면 우리가 먼저 나서서 공격하자.
battle_talk_120507=비잔티움 군대는 매우 쇠약하다. 지금이 바로 우리의 영토를 넓힐 때이다!
battle_talk_120508=교활한 놈들. 돈을 마련하는 핑계로 우리 도시를 공격하다니.
battle_talk_120509=우리는 공격받았다. 적의 목표는 갈리폴리 도시 뿐만이 아니다!
battle_talk_120601=아드리아노플은 비잔티움 제국의 세 번째로 큰 도시로서 우리의 세력 확장을 위한 중요한 목표이다.
battle_talk_120602=이 도시를 탈취하면, 앞으로 우리가 콘스탄티노플을 공격할 때 끊임없는 보급을 제공할 수 있다.
battle_talk_120603=전투를 준비하라. 오스만 군은 결코 쉽게 후퇴하지 않을 것이니, 도시를 굳게 지켜라!
battle_talk_120604=나는 너희들에게 항복을 고려할 시간을 줄 것이며, 안정된 생활을 부여할 것을 약속한다!
battle_talk_120605=내 인내심은 한계가 있다. 병사들이여, 준비하라!
battle_talk_120606=우리의 원군이 끊임없이 도착하고 있다. 너희들은 아직도 저항할 생각인가?
battle_talk_120607=너희들은 실패를 맞이할 준비가 되었는가?
battle_talk_120608=나의 인내심이 바닥났다. 이제 이 도시를 쳐부수어라.
battle_talk_120609=아드리아노플이 위기에 빠진 것을 보고만 있을 수 없다. 군대를 보내 그들을 지원하라.
battle_talk_120610=우리의 후방이 공격당했다. 왜 적이 그곳에 나타날 수 있을까?
battle_talk_120701=제국은 더 이상 다른 도시의 방어를 유지할 수 없게 되었으니, 테살로니키를 베네치아인들에게 맡기는 것이 최적의 선택이다.
battle_talk_120702=이 도시는 반드시 오스만에게 속해야 한다. 지금 너희에게는 투항할 기회가 있다.
battle_talk_120703=이 도시는 항상 우리의 것이었기 때문에 항복할 가능성은 전혀 없다.
battle_talk_120704=오스만이 테살로니키를 공격하기 시작하였다. 이는 콘스탄티노플의 압력을 어느 정도 완화하였으나, 상황은 여전히 낙관적이지 않다.
battle_talk_120705=이제 이 도시는 오스만 제국에 속한다. 베네치아의 함대도 우리를 막을 수 없다.
battle_talk_120706=테살로니키가 위기에 처했지만, 우리 함대는 오스만 함대에 봉쇄당했다. 즉시 봉쇄를 깨고 테살로니키를 지원해야 한다.
battle_talk_120707=비잔티움 제국은 베네치아인의 압력을 완화하기 위해 공세를 펼칠 준비를 하고 있지만, 이런 계획은 아무런 소용이 없다.
battle_talk_120708=적군이 반격을 개시하였다. 우리의 예비 병력을 파견하여라.
battle_talk_120709=해역을 봉쇄하는 오스만 함대가 격파되었다. 함대는 계속 전진하라!
battle_talk_120801=전해지는 바로는 눈앞의 이 도시는 오늘날 세계에서 가장 튼튼하고 웅장한 성벽을 보유하고 있다.
battle_talk_120802=우리는 새로운 공성 무기를 얻었으니, 이 도시는 반드시 함락되어 제국 영토의 일부가 될 것이다!
battle_talk_120803=적군이 성 밑까지 쳐들어왔다. 우리는 지금 마지막 순간까지 최선을 다해 싸울 수밖에 없다.
battle_talk_120804=적군은 아직 해역을 완전히 봉쇄하지 못했을 것이니, 지금 배를 타고 떠나기에는 아직 늦지 않았을 것이다.
battle_talk_120805=성벽이 뚫렸다. 도시 안으로 들어가 우리의 승리를 맞이할 준비를 하여라!
battle_talk_120806=외부 방어가 완전히 무너졌다. 우리는 물러설 길이 없다.
battle_talk_120807=우리의 후방에 어떻게 적이 나타날 수 있단 말인가. 우리의 공성 계획에 영향을 미치지 못하도록 즉시 그들을 섬멸하라.
battle_talk_120808=성공적으로 적군의 해상 봉쇄를 돌파하였다. 안전이 가장 중요하니 가능한 한 빨리 철수하라!
battle_talk_120809=어리석은 녀석, 너의 실패가 제국의 행동에 영향을 미쳤다. 적을 전쟁터에서 도망치게 했다니!
battle_talk_120810=콘스탄티노플이 공격받고 있다. 우리는 가만히 보고만 있을 수 없다. 즉시 바다로 진군하여라. 늦지 않기를 바란다.
battle_talk_120811=오늘부터 이 도시는 오스만 제국에 속할 것이다!
battle_talk_120812=콘스탄티노플이 점령당했다. 우리는 완전히 실패하였다.
battle_talk_120901=나는 본래 황위에 관심이 없었다. 단지 로마가 위태로울 때 딸을 당신에게 시집보내고 당신과 함께 다스리려고 했을 뿐인데, 당신은 어찌 이처럼 끝까지 핍박하는 것일까.
battle_talk_120902=콘스탄티노플은 원래 내 것이었어야 한다. 네 황위는 찬탈한 것이고, 로마에는 두 명의 황제가 나오지 말았어야 한다.
battle_talk_120903=내 아들을 먼저 구하라, 그리고 내가 돈을 모아 지급할 것이다!
battle_talk_120904=의뢰를 받았으니 당신을 위해 반란을 평정할 것이다!
battle_talk_120905=튀르크족을 고용하다니. 이건 틀림없이 늑대를 제집에 끌어들이는 짓이다! 앞으로 후환이 끝없을 것이다.
battle_talk_120906=나는 가만히 있지 않을 것이다! 반체제 인사를 숙청하라!
battle_talk_120907=그래, 우리도 지원할 것이다!
battle_talk_120908=세르비아와 불가리아의 지원을 막아야 할 것 같다. 그러면 팔레올로고스는 자연히 패퇴할 것이다!
battle_talk_120909=튀르크족은 너무 강하다! 하지만 우리는 다시 돌아올 것이다!
battle_talk_121001=우리는 발칸 반도에서의 세력 범위를 계속 공고히 해야 한다! 계속해서 앞쪽 마을을 약탈하라!
battle_talk_121002=우리 마을이 불타고 있다! 우리 백성들은 죽고 있다! 더 이상 참을 수 없다. 돌격합시다!
battle_talk_121003=적들이 그들의 근거지로 철수할 수 없도록, 그들의 후방을 습격하라!
battle_talk_121004=이런, 나는 화살에 맞았다!
battle_talk_121005=안 돼! 내 아들이 죽으면 내 제국은 무슨 앞길이 있겠는가! 나에게 무슨 희망이 있겠는가!
battle_talk_130101=지금 우리 측은 역류와 역광에 처해 있어, 해상 작전에 적합하지 않다. 하늘이 우리를 도와주지 않는 것 같다!
battle_talk_130102=우리는 순풍 지역에 있고, 쇠사슬로 배를 연결하였다. 영국군이 어떻게 우리를 이길 수 있단 말인가?
battle_talk_130103=해구 바깥으로 배를 파견하여 협공하는게 어떨까?
battle_talk_130104=병력을 분산시킬 필요가 없다. 영국군이 어떻게 전멸되는지 지켜보자!
battle_talk_130105=참, 멍청이들과 함께 죽을 필요가 없다. 뒤에서 지켜볼 것이다.
battle_talk_130106=너무 좋다! 해류 방향이 바뀌었다! 해류를 따라 내려가라! 그리고 해구 안으로 그들을 봉쇄하라!
battle_talk_130107=우리 배가 움직일 수 없으니 빨리 쇠사슬을 풀어라!
battle_talk_130108=아! 모든 것이 끝났다!
battle_talk_130201=우리의 부대 수는 영국군의 세 배에 달하고, 최정예 중기병까지 갖추었다. 지친 적군을 상대로 승리를 거두는 것은 식은 죽 먹기이다.
battle_talk_130202=우세 지형을 점령하라! 당황하지 마라! 태자는 우익을 조심하고, 그들의 기병에게 후방을 빼앗기지 마라!
battle_talk_130203=좋다! 적들이 살아서 돌아가지 못하게 할 것이다!
battle_talk_130204=제노바 석궁병들은 영국군을 쏠 수 없는 것 같다. 기사들이여, 나를 따라와라!
battle_talk_130205=너무 혼란스럽다. 내 병사들은 어디에 있느냐!
battle_talk_130206=그들의 마지막 돌격을 막아라! 위대한 승리가 될 것이다!
battle_talk_130301=어느덧 우리가 도시를 포위한 지 1년이 다 되어 간다. 칼레의 성이 이렇게 견고할 줄은 생각지 못했다!
battle_talk_130302=저지대 국가의 원군이 곧 올 것이다. 우리는 가서 그들을 맞이해야 한다!
battle_talk_130303=그들의 해상 보급로를 차단하라!
battle_talk_130304=증원 선박을 잘 보호하라. 칼레의 수비군에게 큰 타격을 줄 것이다.
battle_talk_130305=모두 이를 악물고 조금만 더 버텨라. 우리의 보급이 곧 도착할 것이다!
battle_talk_130306=그들이 우리 육지의 보급로를 차단하도록 더 이상 내버려 둬서는 안 된다. 그렇지 않으면 칼레는 정말 안전하지 않다.
battle_talk_130307=프랑스군의 육지 보급로를 차단하라. 이것이 그들의 마지막 저항이다.
battle_talk_130401=영국군의 병력은 모두 대륙에 있어 후방이 비었다. 이번에 우리는 프랑스인과 협력하면 반드시 그들에게 큰 타격을 줄 수 있을 것이다!
battle_talk_130402=아니나 다를까, 스코틀랜드인들은 결국 반란을 일으켰다. 우리는 가능한 한 빨리 더 많은 장궁병들을 집결시켜야 한다!
battle_talk_130403=우리는 이미 여러 도시를 점령했다. 좋을 때 그만두어야 하는가?
battle_talk_130404=걱정할 필요 없다. 영국인들은 전혀 우리를 돌볼 겨를이 없다.
battle_talk_130405=이렇게 빨리 점령할 줄은 몰랐다. 계속 남쪽으로 진격하자!
battle_talk_130406=적을 협곡에 끌어들인 후 공격하되 적군이 뒤로 돌지 못하도록 조심하라! 그들은 우리 손의 장궁을 감당할 수 없다!
battle_talk_130407=우리 영토를 탈환하라! 데이비드 2세를 사로잡으면 모든 사람에게 상을 줄 것이다!
battle_talk_130408=이런, 화살을 맞았다. 빨리 후퇴하라!
battle_talk_130501=그들의 우익을 공격하라! 그들의 장궁병이 효과적인 공세를 형성하지 못하게 하라!
battle_talk_130502=큰일이다, 우익이 뚫렸다. 우리는 위험해졌다. 대형을 흩뜨리지 마라!! 대피하면서 공격하라.
battle_talk_130503=뒤로 돌아서 고지를 차지하라! 저기가 우리의 반격의 기회이다!
battle_talk_130504=우리는 결국 최적의 공격 타이밍을 놓쳤다! 후퇴하라!
battle_talk_130601=우리는 북쪽의 지원군을 기다릴 수 없을 것 같다. 여기가 바로 우리가 결전할 곳이다! 어서 방어 병력을 배치하라. 우리는 여기서 이 오만한 프랑스놈들을 격파할 것이다!
battle_talk_130602=우리는 이미 그들을 여기에 가두었다. 그들은 그저 칼판 위의 생선일 뿐이다! 단 한 번의 돌격만으로도 그들을 흩어지게 할 수 있다! 영국 왕의 장남을 생포하라! 모든 사람에게 큰 보상이 주어질 것이다!
battle_talk_130603=일시적인 실패 때문에 물러서지 마라! 나는 너희와 함께 할 것이다! 전사할 때까지! 돌격하라! 우리는 최종적으로 전쟁에서 승리할 것이다!
battle_talk_130604=옆으로 포위 공격하라! 그들에게 치명타를 가하라!
battle_talk_130605=설마 그들의 원군이 도착했단 말인가? 우리는 포위당했다!
battle_talk_130606=이런, 들켰다!
battle_talk_130607=말을 채찍질하여 돌격하라! 전하, 적들은 이미 패주했습니다! 하나님께서 우리와 함께 계신다!
battle_talk_130701=나는 랭스에서 프랑스 왕으로 대관식을 치르고, 잉글랜드의 가장 위대한 왕이 될 것이다!
battle_talk_130702=나는 영국인들이 성공하도록 내버려 두지 않을 것이다. 비록 우리에게 왕이 없더라도 우리는 굴복하지 않을 것이다!
battle_talk_130703=랭스를 격파할 수 없을 것 같다. 우리는 전진하여 약탈해서 더 많은 보급을 얻어야 한다!
battle_talk_130704=영국군은 근거지에 없을 것이다. 칼레를 되찾으러 가자!
battle_talk_130801=정보를 수집해 보아라. 샤를 왕자가 대관식을 치르기 위해 랭스에 간다고 한다.
battle_talk_130802=영국군이 나타날 수도 있으니 항상 조심하라.
battle_talk_130803=놈들을 막아라!
battle_talk_130804=역시 매복이 있었다!
battle_talk_130805=그들의 진형은 이미 엉망이 되었다! 기병들이여 돌진하라!
battle_talk_130806=여전히 길의 복병들을 조심하고, 대관식을 치르도록 나를 랭스까지 안전하게 호송하라!
battle_talk_130901=이렇게 오랫동안 준비했으니 오늘은 아무도 나의 상속권 획득을 막을 수 없다!
battle_talk_130902=나는 너무 오랫동안 기다려왔다. 더 이상 다음 기회는 없다. 이 싸움은 승패를 결정지을 것이다!
battle_talk_130903=사생결단을 내자!
battle_talk_131001=비록 우리는 연속 행군으로 매우 지쳤지만, 현재 영국군은 아무런 준비도 없다. 그들을 향해 돌격하라!
battle_talk_131002=뭐? 이 프랑스인들은 어디서 온 것인가? 이 빌어먹을 추운 날씨에 또 전쟁을 치러야 하다니! 모두 정신 차려라! 그렇지 않으면 너희들은 죽음을 마주하게 될 것이다.
battle_talk_131003=영국인들은 진지전에 능숙하다. 돌격 전술과 이동 전술을 사용하여 그들이 효과적인 공격을 조직할 수 없게 하라!
battle_talk_131004=후퇴하라! 성곽 안으로 후퇴하면 우리는 승리할 수 있다!
battle_talk_131005=그들에게 도망갈 기회를 주지 마라! 승승장구하라!
battle_talk_131101=프랑스군의 공격이 갈수록 날카로워지고 있다. 만약 원군이 없다면 전방의 성곽은 함락될 것이다.
battle_talk_131102=영국인들에게 우리 스페인 사람들의 대단함을 알려주자. 그들이 육지로 상륙하지 못하게 막아라!
battle_talk_131103=그들의 배는 우리보다 높은데다 흘수도 우리보다 얕으니, 우리는 정말 저항할 힘이 없다! 도망가자!
battle_talk_131104=영국 함선을 완전히 분쇄하라! 우린 무적이다!
battle_talk_131201=프랑스군과 얽매이지 마라. 우리의 목적은 약탈과, 프랑스에 전쟁의 불길이 타오르게 하는 것이다! 가장 빠른 속도로 행군하라!
battle_talk_131202=이 강도들! 우리는 반드시 봉쇄 작전을 조직해야 한다! 그들이 계속 약탈하게 가만 놔둘 수는 없다!
battle_talk_131203=보르도로 돌아가기만 하면 안전하다. 빨리 행군하라!
battle_talk_140101=아르플뢰르에서 3분의 1의 전사를 잃었지만, 나는 물러서지 않을 것이다. 우리는 칼레의 원군과 빨리 합류해야 한다.
battle_talk_140102=적의 수가 갈수록 많아지는 걸 보니, 그들은 우리를 단숨에 섬멸하려고 하는 것 같다. 목책을 잘 설치하라! 방어 태세를 갖추어라!
battle_talk_140103=계획에 따라 돌격하라! 우리 부대 수는 그들보다 훨씬 더 많다! 양쪽에 매복한 장궁병을 주의하라.
battle_talk_140104=큰일 났다! 비가 와서 땅이 너무 질퍽거려 우리는 돌격할 수 없게 되었다!
battle_talk_140105=성 조지! 반격하자!
battle_talk_140201=루앙을 점령하면 노르망디 전체를 점령할 수 있습니다! 그들의 두 파벌은 점점 더 치열하게 싸우고 있으며 그들의 구조는 제시간에 이루어지지 않을 것 같고 기회를 잃지 않을 것입니다.
battle_talk_140202=그들을 피합시다. 영국과의 싸움은 부르고뉴군에게만 유리할 뿐입니다.
battle_talk_140203=루앙은 식량과 의복이 부족하여 도시 사람들이 굶어 죽고 있습니다. 언제 도움이 올지 모릅니다.
battle_talk_140204=우리는 가능한 한 빨리 보급로를 통과해야 합니다. 그렇지 않으면 루앙이 보호받지 못할 것입니다. 하지만 내가 전력을 다하면 아르마냑의 반격으로 이어질 수 있습니다.
battle_talk_140205=재보급 기회를 주지 마십시오.
battle_talk_140301=오늘은 부활절이니 스코틀랜드군과 프랑스군의 방어는 분명히 허술할 것이다. 그들이 미처 손을 쓸 새가 없도록 직접 돌격하라.
battle_talk_140302=영국놈들이 달려들었다! 모두 빨리 옷을 입어라!
battle_talk_140303=그들의 기병대는 뒤쪽 부대와 너무 멀리 떨어졌다! 뒤쪽 부대를 막아라!
battle_talk_140304=우린 너무 깊이 돌진했다! 앗!
battle_talk_140401=프랑스군의 공세가 매우 강하다. 모성을 측면으로 공격하여 파리를 지원하는 공급을 끊어라.
battle_talk_140402=얼마든지 덤벼라. 2만 명이 아니라 20만 명이라도 내가 지키는 성을 함락시킬 생각은 하지 마라.
battle_talk_140403=더 많은 거점을 수복하라! 영국인에게 우리 스코틀랜드인의 대단함을 알려줘라!
battle_talk_140404=나의 병은 회복할 수 없을 것 같으니 나의 여정은 곧 멈춰야 할 것이다. 내가 다 하지 못한 숙원은 후손들이 나를 도와 완수할 수밖에 없다.
battle_talk_140501=수년간의 추격전으로 너무 지쳤다. 프랑스-스코틀랜드 연합군의 주력이 전방에 주둔하고 있는데, 이것은 우리가 단숨에 그들을 섬멸할 좋은 기회이다.
battle_talk_140502=대형을 유지하라! 깃발 전진!
battle_talk_140503=성 조지! 베드퍼드!
battle_talk_140504=성 드니! 몽쥬아!
battle_talk_140505=대오를 분산시키지 마라! 기병은 뒤로 우회하라! 그들에게 힘차게 일격을 가하라!
battle_talk_140506=우리는 최후까지 싸울 것이다! 전멸할지라도!
battle_talk_140601=끝까지 지켜라. 국왕은 이미 원군을 파견했다!
battle_talk_140602=장대한 망상을 멈춰라. 우리는 도시를 삼면으로 포위했다. 가능한 한 빨리 항복하라!
battle_talk_140603=아군은 포위당했지만, 적은 여러 날 동안 포위를 하여 사기가 많이 떨어졌다. 모두 나와 함께 돌격합시다!
battle_talk_140604=옆은 이미 뚫렸다. 성 내의 적군이 우리를 포위하지 못하도록 조심하라!
battle_talk_140605=여세를 몰아 다른 거점을 점령하라! 영국은 패주했다!
battle_talk_140701=성 내의 군인과 백성을 구하러 갑시다!
battle_talk_140702=드디어 무사히 입성했다. 어쩌면 오를레앙을 지킬 수 있게 되었다!
battle_talk_140703=잉글랜드군이 스스로 철수하기를 바란다. 나는 살육을 원하지도, 좋아하지도 않는다.
battle_talk_140704=덤빌 테면 덤벼라. 손에 든 검이 이 도시의 운명을 결정하게 하자!
battle_talk_140705=오를레앙 주변의 거점을 점령하여 도시를 완전히 해방하자!
battle_talk_140801=내 머릿속 목소리는 나보고 앞으로 전진하라고 말한다! 더 많은 프랑스 민중들을 구하러 가자!
battle_talk_140802=우리는 죽어도 당신을 따를 것입니다!
battle_talk_140803=빨리 가서 우리 부대를 구원하라. 프랑스군은 무슨 약을 먹었는지 사기가 드높다!
battle_talk_140804=앞에 있는 견고한 성곽에 겁먹지 마라. 하나님께서는 이미 그들을 우리에게 맡겼다! 그들이 구름 속에 떠 있더라도, 우리는 그들을 격파할 수 있다!
battle_talk_140805=안 돼! 우리가 어떻게 질 수 있단 말인가!
battle_talk_140901=나팔을 불어라! 고귀한 왕 샤를을 따라 랭스에 가서 대관식을 치를 때가 되었다!
battle_talk_140902=정예병을 파견하여 그들을 포위하라. 그들이 랭스에 도착하게 해서는 안 된다!
battle_talk_140903=출격하라! 우리의 길을 가로막는 모든 적들을 섬멸하라!
battle_talk_140904=나는 신의 계시를 받아 왕으로 대관식을 치렀다!
battle_talk_141001=잔 다르크를 잡았다!
battle_talk_141002=하나님이여 나를 버리셨나이까?
battle_talk_141003=잔 다르크를 위해 복수하자! 이 땅을 철저히 정복해야 한다!
battle_talk_141004=영국 전역에 전쟁의 불길을 지필 것이다!
battle_talk_141005=성 드니! 잔 다르크의 의지를 프랑스 전역에 퍼지도록 할 것이다!
battle_talk_141101=파리 주변의 거점을 제거하고, 수도를 수복하라! 잔 다르크가 생전에 다하지 못했던 뜻은 내가 완성할 것이다!
battle_talk_141102=파리를 수복하자! 아이리스가 다시 파리에서 피어나게 하자!
battle_talk_141103=파리를 지원하라! 프랑스군의 기세가 맹렬하다! 이번에 성주가 지켜낼 수 있을지 모르겠다.
battle_talk_141104=성을 지키는 것은 불가능할 것 같으니, 빨리 도망가자.
battle_talk_141201=샤를 7세에게 선사하는 선물로 칼레를 점령하라!
battle_talk_141202=이 도시는 우리가 백년 동안 경영해온 도시이다. 그러니 어떻게 너희들에게 쉽게 넘겨줄 수 있단 말인가!
battle_talk_141203=바다에 있는 적군은 내가 섬멸할 것이다!
battle_talk_141301=노르망디를 탈환하고, 영국인을 해협 너머로 몰아내라!
battle_talk_141302=우리는 각자 동시에 공세를 펼쳐 노르망디를 단번에 해방시키자!
battle_talk_141303=좋다! 이 순간을 오랫동안 기다려왔다.
battle_talk_141304=늦지 않았길 바란다. 우리는 결코 패배하지 않을 것이다!
battle_talk_141305=나의 아버지처럼 중책을 맡아야 할 때다! 이 성은 내가 지킬 것이다!
battle_talk_141306=승리를 거두어 영광을 다시 프랑스로 복귀시키자! 영국인을 프랑스에서 몰아낼 때가 되었다!
battle_talk_141307=프랑스를 떠날 때가 되었다.

;史诗战役对话
battle_talk_200001=나는 최종적으로 로마에 전쟁의 불길을 지필 것이다. 갈리아를 점령하는 것은 시작일 뿐이다. 이곳은 내가 군마에게 먹이를 먹이는 곳이 될 것이다.
battle_talk_200002=기회를 노려 그들의 땅을 빼앗아라. 나는 프랑크를 통일시킬 것이다!
battle_talk_200003=덤벼라! 네놈들을 모두 무덤으로 보낼 것이다!
battle_talk_200004=병사들이여, 가족을 위하여, 땅을 위하여, 우리는 더 이상 한 걸음도 물러설 수 없다. 돌격하라!
battle_talk_200005=돌격하라! 양 떼 속으로 쳐들어가자!
battle_talk_200006=죽여버려라!
battle_talk_200007=마침내 따라잡았다. 우리는 훈족에게 빼앗긴 모든 것을 되찾을 것이다!
battle_talk_200008=고향을 사수할 것이다!
battle_talk_200009=결전이 시작되었다! 제국의 운명이 걸린 전투이다!
battle_talk_200010=우리는 드디어 훈족의 침입을 막아냈다! 로마 만세!
battle_talk_200011=로마의 대군은 이미 나에게 격파되었다. 로마는 결국 나에게 정복될 것이다!
battle_talk_200101=병사들이여, 너희들의 칼날을 날카롭게 갈고, 말을 배불리 먹여라. 프랑크족이 우리의 철기 아래서 부들부들 떨게 하자!
battle_talk_200102=알라신의 가호가 있기를! 이번 전투에서 승리한 후 우리는 교리를 더 널리 전파할 것이다!
battle_talk_200103=설마 너희들은 지난번의 교훈을 잊어버렸냐? 이번에도 너희들은 대패하고 돌아갈 것이다!
battle_talk_200104=큰일 났다, 툴루즈가 위태로워졌다! 카를에게 도움을 요청해야만 한다.
battle_talk_200105=나는 당신을 왕으로 삼고 복종할 것이오니, 꼭 와서 구원해 주십시오.
battle_talk_200106=나는 자네의 복종을 받아들인다. 가능한 한 빨리 부대를 집결하여 구원하러 갈 것이다.
battle_talk_200107=이 낙타를 탄 사람들을 막아내지 못한다면, 아키텐 지역뿐만 아니라 프랑크 왕국 전체가 멸망할 것이다!
battle_talk_200108=툴루즈가 점령되었다! 아직 겨울이 오지 않은 틈을 타 빨리 북상하라!
battle_talk_200109=기병대를 집결시켜라!
battle_talk_200110=방위 보병으로 방어하고, 창을 이용하여 적들이 더 이상 앞으로 다가오지 못하도록 하라!
battle_talk_200111=아! 내가 실패하다니. 너무 억울하다!
battle_talk_200112=프랑크 만세!
battle_talk_200113=알라신의 가호가 있기를. 승리는 역시 우리의 것이다! 우리는 철갑 기병으로 유럽 전역을 밟을 것이다!
battle_talk_200114=날씨가 추워졌다! 우리에게는 겨울옷이 충분하지 않다! 속전속결 하라!
battle_talk_700301=고선지는 나의 성을 점령하여 나의 부모님과 공주를 포로로 삼았으니 사람을 너무 업신여긴다. 나는 반란을 일으킬 수밖에 없다.
battle_talk_700302=이 석국의 왕자는 아직도 복종하지 않고 있다. 보아하니 나는 시간을 좀 들여 석국을 지도상에서 말살할 수밖에 없다.
battle_talk_700303=비록 아군이 방금 전투를 마치고 돌아왔지만, 원정에서 돌아와 지친 당군보다는 매우 큰 우세가 있다. 당나라 군대가 도대체 얼마나 큰 능력이 있는지 보자.
battle_talk_700304=당나라 군대가 이렇게 용맹할 줄은 생각지도 못했다. 다행히 나에게는 아직 다음 수가 있다.
battle_talk_700305=돈을 위해 일을 처리하는 것이다! 고선지, 나를 탓하지 마라!
battle_talk_700306=카를루크가 반란을 일으켜서 우리는 포위 당했다.
battle_talk_700307=신의 축복으로 이번에 대승을 거두면 나의 명성은 자자하게 될 것이다.
battle_talk_700308=당나라 만세! 양쪽에서 협공하더라도 내 철기의 공격을 막아낼 수 없을 것이다!
battle_talk_700309=우리 부족의 성곽과 신하들은 당나라에 귀항하기를 원한다.
battle_talk_700310=시대의 형세를 잘 알고 순응하는 자가 뛰어난 인물이다.
battle_talk_700401=영국의 왕위는 반드시 나의 것이다. 강력한 노르웨이를 이길 수 있는 우리는 노르만도 쫓아낼 수 있을 것이다!
battle_talk_700402=그들은 싸운 지 얼마 되지 않아 아직 정돈되지 않은 상태이다. 우리 기병대는 쉽게 그들의 수비를 갈기갈기 찢을 수 있을 것이다!
battle_talk_700403=고지를 점령하라! 그리고 창으로 기병대의 충격을 막아라!
battle_talk_700404=윌리엄은 죽었다! 노르만군은 즉시 항복하라!
battle_talk_700405=후퇴하지 마라! 난 살아있다! 우리 뒤에는 바다여서 물러설 길이 없으니 다시 공격을 조직하자!
battle_talk_700406=해럴드는 죽었다! 잉글랜드의 왕좌는 결국 내 것이다! 새로운 시대가 다가왔다!
battle_talk_700407=노르만군은 드디어 패퇴하였다! 잉글랜드의 왕위는 그 어떤 외래인의 것이 아니다!

;引导对话
tutorial_talk_1001=튜토리얼을 진행해 보시겠습니까?
tutorial_talk_1101=다음으로, 당신을 영웅의 전설로 안내할 것입니다!
tutorial_talk_1102=영웅 전설에 들어가시려면 반드시 자신의 개인 부대를 갖춰야 합니다. 그래서 우리는 먼저 [#F4d181#지휘부]에 들어가 장군들을 위해 개인 부대를 모집하셔야 합니다!
tutorial_talk_1201=제1장을 클리어하셨기 때문에, 우리 장군은 개인 부대를 모집할 수 있게 되었습니다. [#F4d181#장군 프로필 사진 오른쪽의 모집 구역]을 클릭하십시오!
tutorial_talk_1301=이번에는 먼저 [#F4d181#군단 대대]를 모집할 것입니다. 그를 선택한 다음 [#F4d181#모집] 버튼을 클릭하십시오!
tutorial_talk_1501=이제 좌측 상단에 있는 [#F4d181#×]를 클릭하여 지휘부를 떠날 수 있습니다!
tutorial_talk_1601=[#F4d181#영웅 전설]이 우리를 소환하고 있습니다. 이곳을 클릭하십시오!
tutorial_talk_1701=마지막으로 [#F4d181#들어가기] 버튼을 클릭하여 영웅 전설로 들어가십시오!
tutorial_talk_2101=[#F4d181#용병 모집령] 또는 [#F4d181#도면]을 소모하여, [#F4d181#모집령] 또는 [#F4d181#기기 조각]을 얻을 수 있으며, [#F4d181#모집령] 또는 [#F4d181#기기 조각]이 일정 수량에 도달 시, 부대를 모집하거나 해당 기기를 합성할 수 있습니다.
tutorial_talk_2201=표시된 위치 클릭 시, 현재 얻을 수 있는 [#F4d181#모집령] 또는 [#F4d181#기기 조각], 그리고 잠금이 해제되지 않은 [#F4d181#모집령] 또는 [#F4d181#기기 조각]을 확인할 수 있습니다.

speak_strong_attack_1=내 부대는 현재 파죽지세이다. 나를 따라 공격하라!
speak_strong_attack_2=적은 전혀 나의 상대가 아니다. 나는 전세를 장악하였다.
speak_weak_attack=온 힘을 다해 공격하여 모든 적을 없애라.
speak_destroy_building_1=적의 성벽은 아주 취약하다. 이 도시는 곧 뚫릴 것이다.
speak_destroy_building_2=아무리 견고한 성벽이라도 우리의 공격을 막을 수 없다.
speak_less_round_1=전투가 너무 길어지면 형세가 우리의 장악에서 벗어날 수도 있다.
speak_less_round_2=공격 속도를 높여라. 우리에게 주어진 시간이 얼마 남지 않았다.
speak_less_stength=나의 부대는 지원이 필요하다.
speak_need_hitback=나의 부대는 공격을 받았다.
speak_less_morale=부대의 사기가 침체되어 병사들은 싸울 마음을 잃었다.

speak_onwait_1=적은 어디에 있는가? 나의 칼은 전투를 갈망하고 있다.
speak_onwait_2=나는 이 전쟁이 끝나면 바로 고향으로 돌아갈 것이다.
speak_onwait_3=때로는 혼합 편성된 군단이 단일 병종의 부대보다 더 높은 전투력을 발휘할 수 있다.
speak_onwait_4=교착 상태에 빠졌는가? 전고로 군대를 격려해보았는가?
speak_onwait_5=정말 제대로 한 잔 마시고 싶다. 나는 이곳이 지긋지긋하다.
speak_onwait_6=적은 항상 뜬금없이 나타났다가 또 뜬금없이 사라졌다.
speak_onwait_7=나는 진정한 전투를 갈망한다.

battle_won_midway=승리를 이룩하고 보상을 받으셨습니다. 이제 게임을 끝내시겠습니까?

