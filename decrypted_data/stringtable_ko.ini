item_desc_9001=루제루 2세가 왕위에 오를 때 입었던 망토로, 비잔티움 제국에서 수입한 붉은 비단으로 만들어졌으며, 황금과 화려한 보석으로 장식되어 권력과 왕권을 상징한다. 한 땀 한 땀에 노르만인의 자부심과 책임감이 담겨 있다.
item_desc_9002=루제루 2세가 왕위에 오를 때 입었던 망토로, 비잔티움 제국에서 수입한 붉은 비단으로 만들어졌으며, 황금과 화려한 보석으로 장식되어 권력과 왕권을 상징한다. 한 땀 한 땀에 노르만인의 자부심과 책임감이 담겨 있다.
item_desc_9003=루제루 2세가 왕위에 오를 때 입었던 망토로, 비잔티움 제국에서 수입한 붉은 비단으로 만들어졌으며, 황금과 화려한 보석으로 장식되어 권력과 왕권을 상징한다. 한 땀 한 땀에 노르만인의 자부심과 책임감이 담겨 있다.
item_desc_9004=루제루 2세가 왕위에 오를 때 입었던 망토로, 비잔티움 제국에서 수입한 붉은 비단으로 만들어졌으며, 황금과 화려한 보석으로 장식되어 권력과 왕권을 상징한다. 한 땀 한 땀에 노르만인의 자부심과 책임감이 담겨 있다.
