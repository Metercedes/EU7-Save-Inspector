stage_intro_4601=1087년 요나라 상경에서 태어난 야율대석은 젊은 시절 진사에 급제하여 한림원에 들어갔기 때문에 대석임아라 불렸다. 1125년, 요나라가 멸망하자 야율대석은 200명의 기병을 거느리고 서행하여 가돈성에 이르러 스스로 왕위에 오르고, 그 후 1132년에 황제가 되어 정식으로 서요국을 수립하였다.
stage_intro_4603=서요의 실력을 강화하기 위해 야율대석은 서쪽으로 확장하기로 하였다. 1131년, 야율대석은 고창회골을 경유하여 동카라한 칸국에 대한 공격을 개사하였다.
stage_intro_4605=동카라한 칸국의 아흐마드 칸이 죽자 그의 아들 아브라함이 왕위를 계승했고, 동시에 관할하던 카를루크 등 세력도 이 틈을 타서 반란을 일으켰다. 아브라함은 진압이 성과를 거두지 못하자 어쩔 수 없이 야율대석에게 도움을 청했다.
stage_intro_4607=1137년, 서요는 다시 서쪽으로 확장하였는데, 이번에 그들은 이미 셀주크 제국에 신하로 칭하던 서카라한 칸국을 목표로 삼았다. 서요군은 페르가나 분지에서 적군과 조우전을 벌였다.
stage_intro_4609=1141년, 마흐무드 칸은 셀주크의 술탄 산자르에게 구원을 요청했고, 산자르는 10만 대군을 이끌고 동진하여 카트완 초원에서 야율대석의 군대와 마주쳤다.
stage_intro_4611=서카라한 칸국을 정복한 후, 야율대석은 또 대장 에르부즈를 파견하여 호라즘을 정복하였다. 이때부터 서요는 전성기에 접어들기 시작했다.

