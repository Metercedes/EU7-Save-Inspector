stage_name_4748=제1차 모하치 전투
stage_name_4749=페르시아를 향한 동부 원정
stage_name_4750=페르시아를 향한 동부 원정
stage_name_4751=2차 동부 원정
stage_name_4752=2차 동부 원정

stage_intro_4741=쉴레이만 1세는 즉위한 지 얼마되지 않아 다마스쿠스 총독이 주도한 반란에 직면했고, 그는 이번 반란을 진압하였는데, 이는 그의 일련의 군사 정복의 시작을 의미한다.
stage_intro_4743=1521년, 헝가리인들은 오스만 제국이 유럽으로 확장하는 데 유일한 걸림돌이 되었다. 헝가리를 타파하기 위해 쉴레이만 1세는 대군을 이끌고 베오그라드를 포위하고, 이 도시를 점령했다.
stage_intro_4745=베오그라드를 정복한 후, 쉴레이만 1세는 로도스의 구호 기사단을 겨냥했지만, 이 전투는 참으로 험난한 전투였다.
stage_intro_4747=헝가리는 합스부르크 왕가와의 동맹을 추구했고, 쉴레이만 1세는 이것이 오스만 제국에 미칠 영향을 우려했다. 헝가리가 쉴레이만 1세의 제안을 거절하자 쉴레이만 1세는 군사적 개입을 결정했다.
stage_intro_4749=오스만 제국과 사파비 왕조 사이의 영토 분쟁은 날이 갈수록 격화되었고, 비틀리스 베이가 페르시아의 비호를 요청하는 동안 바그다드 총독이 암살당했다. 이런 상황에서 쉴레이만은 페르시아에 대한 전쟁을 선포하였는데, 이로서 300년에 걸친 오스만-페르시아 전쟁이 시작되었다.
stage_intro_4751=1553년, 쉴레이만 1세는 페르시아를 향해 3차이자 마지막 원정을 시작했다. 양측은 서로 승패를 거듭한 끝에 마침내 아마시아 조약을 체결했고, 그 후 20년 동안 양측은 평화로운 시기를 보냈다.

stage_name_4701=알라의 검
stage_name_4702=알라의 검
