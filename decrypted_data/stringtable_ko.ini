battle_talk_2301=여기가 어디지? 분명 혼노지에서 죽었는데... 어떻게... 어떻게 이 낯선 땅에 있을 수 있지? 말도 안 통하고, 옷차림도 완전히 다르잖아. 이게... 이세계야?
battle_talk_2302= 말도 안 돼. 내 무사도와 운명이 그렇게 쉽게 바뀔 리 없어. 어디에 있든, 내가 여기 있으니까, 정복하는 게 내 운명이야.
battle_talk_2303=병사들! 타국 땅이라도, 전장은 우리의 힘을 보여주는 곳이야. 이 도시로 진격해서, 그들의 방어를 뚫어라! 우리는 이 땅에 '오다'라는 이름을 떨치게 할 거야!

