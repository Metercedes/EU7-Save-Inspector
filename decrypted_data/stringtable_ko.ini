troop_desc_416=발칸 중기병은 강력한 전마를 타고, 무거운 갑옷과 가운을 입고 전장에서 뛰어난 힘과 용기를 발휘하는 막강한 기병 부대이다.
troop_desc_316=시파히 중기병은 빠른 기동으로 유명한 큰 군마를 타고 중갑옷을 입고 해머를 든 용맹스러운 정예 부대이다.
troop_desc_116=비잔티움 중갑보병은 견고한 장비와 확실한 전투 기술로 유명한 부대이다. 병사들은 무거운 갑옷을 입고, 보통 창, 도끼, 검 등과 같은 강력한 무기를 사용한다.
troop_desc_516=술탄 근위 총병은 총기에 능숙한 부대로, 원거리에서 치명적인 피해를 입힐 수 있는 정교한 총을 사용했다. 그들은 고귀한 신분과 신앙에 대한 충성심을 나타내는 화려한 의상과 터번을 착용했다.
troop_desc_517=비잔티움 화염병은 근접에서 화염을 뿜어내 적을 공포에 질려 도망가게 만드는 신비한 무기를 사용하는 부대이다. 그들은 화염으로부터 자신을 보호하기 위해 보호복과 마스크를 착용했다.

