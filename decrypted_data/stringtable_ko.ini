;战役章节开篇
;__font_type[font_text_]
campaign_desc_1=여러 적대 세력의 침입은 허약한 로마 제국의 국력을 약화했고, 설상가상으로 20년간의 잦은 황위 교체는 제국을 더 불안정하게 만들었다. 로마 제국은 멸망을 면치 못하게 된 것 같다.
campaign_desc_2=외적의 여러 차례 침공으로 서로마 제국의 멸망은 시간문제가 되었지만, 동방의 콘스탄티노플은 비잔티움 제국을 찬란하게 이끌어갈 유스티니아누스 1세와 벨리사리우스라는 두 명의 인물을 맞이하게 되었다.
campaign_desc_3=로마 제국의 국력이 계속 쇠약해짐에 따라 브리튼 섬에 대한 지배력은 점점 약해졌다. 이 기회를 틈타 게르만 지역에서 온 앵글로-색슨족은 브리튼 섬으로 대거 이주했고, 제국의 비호를 잃은 섬 주민들은 홀로 침입자들을 상대해야 했다.
campaign_desc_4=7세기부터 아랍인들은 사방으로 출정하였는데, 비잔티움 제국은 아랍인들의 강력한 적 중 하나였다.
campaign_desc_5=8세기 이후, 번창한 브리튼은 많은 재물을 축적했다. 사람들은 바다가 잉글랜드의 천연 장벽이라고 믿었고, 언젠가 공격이 바다에서 시작될 줄은 상상도 못 했다.
campaign_desc_6=바실리오스 1세는 황제가 되어 비잔티움 제국의 마케도니아 왕조의 장을 열었다. 마케도니아 왕조는 비잔티움 제국의 전성기였다.
campaign_desc_7=1066년, 에드워드는 죽기 전에 해럴드를 왕으로 추천했지만, 이와 동시에 노르망디 공작도 자신이 계승권이 있다고 생각했다. 해럴드 2세의 즉위 소식이 노르망디에 전해지자 윌리엄은 격노하여 즉시 잉글랜드로 출병할 것을 선언했다.
campaign_desc_8=마케도니아 왕조가 1057년에 종결된 후, 비잔티움 제국은 수십 년 동안 불황과 쇠퇴를 겪었다. 하지만 1081년, 알렉시오스 1세가 왕위에 오르자 이런 상황은 마침내 끝났다. 비잔티움 제국은 콤니노스 가문의 지배하에 서서히 회복되었다.
campaign_desc_9=교황의 허락하에 서유럽 영주들과 기사들은 군대를 이끌고 지중해 동쪽 해안으로 진격했다. 그들은 예루살렘을 목표로 삼았으며, 적들이 점령하고 있는 이 성스러운 도시를 탈환하기를 희망하였다.
campaign_desc_10=1135년 내전 이후, 마틸다 황후는 그의 아들 헨리 2세를 위해 잉글랜드의 왕위 계승권을 쟁취하는 데 성공하였다. 1154년, 헨리 2세가 웨스트민스터 성당에서 왕위를 계승하게 되면서 앙주 왕조의 시대가 시작되었다.
campaign_desc_11=제4차 십자군 전쟁 이후, 콘스탄티노플은 십자군에게 점령당했고, 비잔티움 제국은 망명한 니케아 제국이 되었다. 라틴 제국의 존재는 모든 비잔티움 사람들의 마음속에 지워지지 않는 상처가 되었다.
campaign_desc_12=13세기 말, 셀주크 제국이 멸망한 후 오스만 제국이 세워졌다. 오스만 제국의 수립으로 흩어져 있던 아나톨리아 베이국들은 연합하여 오스만과 함께 비잔티움 제국에 대항하였다.
campaign_desc_13=영국과 프랑스는 윌리엄이 잉글랜드를 정복한 이래로 많은 갈등과 충돌을 빚어왔으며, 프랑스 왕 필리프가 서거한 후 왕위 계승권이 명확하지 않게 되어 프랑스 전체에 큰 위기를 초래했다. 1337년, 에드워드 3세가 공식적으로 프랑스의 왕이라고 자칭한 동시에 필리프 6세는 에드워드 3세의 프랑스 내 모든 토지를 회수하였다. 그로부터 영국과 프랑스 양국은 전면전을 개시한다고 선언하였다.
campaign_desc_14=잉글랜드의 정세가 점차 안정되자 헨리 5세는 1413년에 웨스트민스터 성당에서 대관식을 치렀다. 이 위대한 전사는 유럽 대륙 정복에 대한 야망을 되살렸다. 헨리 5세는 "영국-프랑스 제국"을 건립하려는 조상이 이루지 못한 소원을 달성하고자 하였다.
campaign_desc_15=오스만 제국 확장의 길에서 술탄마다 서방세계 전체에 대항하기 위해 일생의 정력을 다 해왔으며, 그들 앞에는 콘스탄티노플이라는 단단한 도시가 있었다.
campaign_desc_16=리처드 2세가 전복되자 에드워드 3세의 두 후손인 랭커스터 가문과 요크 가문은 잉글랜드의 왕위를 차지하기 위해 전투를 벌였다.
campaign_desc_51=여러 적대 세력의 침입은 허약한 로마 제국의 국력을 약화했고, 설상가상으로 20년간의 잦은 황위 교체는 제국을 더 불안정하게 만들었다. 로마 제국은 멸망을 면치 못하게 된 것 같다.
campaign_desc_52=외적의 여러 차례 침공으로 서로마 제국의 멸망은 시간문제가 되었지만, 동방의 콘스탄티노플은 비잔티움 제국을 찬란하게 이끌어갈 유스티니아누스 1세와 벨리사리우스라는 두 명의 인물을 맞이하게 되었다.
campaign_desc_53=로마 제국의 국력이 계속 쇠약해짐에 따라 브리튼 섬에 대한 지배력은 점점 약해졌다. 이 기회를 틈타 게르만 지역에서 온 앵글로-색슨족은 브리튼 섬으로 대거 이주했고, 제국의 비호를 잃은 섬 주민들은 홀로 침입자들을 상대해야 했다.
campaign_desc_54=7세기부터 아랍인들은 사방으로 출정하였는데, 비잔티움 제국은 아랍인들의 가장 강력한 적 중 하나였다.
campaign_desc_55=8세기 이후, 번창한 브리튼은 많은 재물을 축적했다. 사람들은 바다가 잉글랜드의 천연 장벽이라고 믿었고, 언젠가 공격이 바다에서 시작될 줄은 상상도 못 했다.
