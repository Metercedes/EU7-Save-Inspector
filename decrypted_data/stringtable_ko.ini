stage_name_4672=도이치브로트 전투

stage_intro_4661=1410년에 얀 지슈카는 튜턴 전쟁에 용병으로 참여했고, 타넨베르크 전투에서 활약했다.
stage_intro_4663=1419년에 후스 전쟁이 발발하자 얀 지슈카는 프라하 봉기에 적극 참여하여 봉기를 이끌었고, 봉기군의 중요한 지휘관이 되었다.
stage_intro_4665=1420년에 수도메르 전투에서 얀 지슈카의 지휘로 수백 명의 반란군은 전차 편대의 도움으로 수천 명의 기사를 물리치면서 후스 전차가 처음으로 이채를 뿜었다.
stage_intro_4667=1420년에 신성 로마 제국 황제 지기스문트는 체코 지역에 대한 첫 번째 십자군 원정을 감행했으나, 비트코프 언덕 전투에서 얀 지슈카에게 패배했다.
stage_intro_4669=1421년 겨울, 지기스문트는 쿠트나 호라에서 봉기군을 포위했다. 그러나 얀 지슈카의 뛰어난 전술 지휘로, 봉기군은 포위망을 뚫는 데 성공했을 뿐만 아니라 그 후 전투에서 적을 격파했다.
stage_intro_4671=1422년 1월, 얀 지슈카는 군대를 이끌고 쿠트나 호라 전투에서 패퇴한 십자군을 따라잡고 섬멸전을 감행하여 십자군의 두 번째 원정을 완전히 분쇄했다.

