campaign_end_desc_66=전쟁이 종결됨과 동시에 잉글랜드에 대한 앙주 왕조의 통치도 끝났고, 웨일스의 튜더 왕조가 시작되었다. 이것은 잉글랜드의 중세 시대의 종결과 새로운 르네상스 시대의 도래를 의미한다.

