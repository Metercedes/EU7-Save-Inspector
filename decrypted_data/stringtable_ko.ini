stage_name_4649=발칸 정복
stage_name_4650=발칸 정복
stage_name_4651=로도스의 비극
stage_name_4652=로도스의 비극

stage_intro_4641=14살에 처음 왕위에 오른 메흐메트 2세는 콘스탄티노플을 점령하고 비잔티움 제국을 멸망시키겠다는 야망을 품고 있다! 1451년, 다시 오스만 제국의 술탄이 된 그는 마침내 이 계획을 실행에 옮길 기회가 생겼다.
stage_intro_4643=콘스탄티노폴의 함락은 메흐메트 2세의 정복 여정의 종점이 아니었다. 콘스탄티니예의 재건과 함께 젊고 활기찬 술탄은 정복과 확장의 막을 올렸다. 1456년, 사기가 높은 오스만 군대는 베오그라드를 향해 진격했다.
stage_intro_4645=베오그라드 전투의 패배로 인해 1457년 내내 메흐메트 2세는 대규모 전쟁을 일으키지 않았다. 1458년에 이르러 국력이 회복되었다고 느낀 메흐메트 2세는 그의 정복을 계속했다. 이번에 주변 국가들은 더욱 성숙하고 노련한 메흐메트 2세를 상대하게 되었다.
stage_intro_4647=오스만 제국이 전력을 다해 서쪽으로 확장하고 있을 때, 아시아의 문제로 인해 자주 방해를 받았다. 특히 아크 코윤루의 우준 하산이 에르진잔에서 대군을 모아 제국 영토를 침범하자, 메흐메트 2세는 어쩔 수 없이 발칸에서 발을 빼서 불안한 동방의 이웃에게 교훈을 주어야 했다.
stage_intro_4649=오스만 제국이 아크 코윤루를 격파한 후, 메흐메트 2세는 아나톨리아 지역을 통일시켰고, 이 지역에서 제국의 지배적 지위를 확립했다. 그후 오스만 제국의 가장 어려운 골짜기였던 알바니아를 시작으로 발칸 반도를 전력으로 정복할 수 있게 되었다!
stage_intro_4651=전쟁은 점차 이탈리아 반도로 확산되었고, 오스만의 위협에 대응하기 위해 교황은 사방에 도움을 요청했지만, 메흐메트 2세는 이미 동지중해의 바다를 완전히 장악하기 위해 반드시 점령해야 하는 로도스로 관심을 돌렸다. 그리고 이 위대한 정복자는 곧 최후의 시각을 맞이하게 되었다.

