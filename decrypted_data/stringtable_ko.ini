skill_desc_52101=이동력 3 소모, 목표 아군에게 랜덤으로 다음 버프 중 하나를 부여: 이동력 {0}+3{1}; 사기 {0}+15{1}; 데미지 {0}15%{1} 증가; 받는 피해 {0}15%{1} 감소;지속 시간 {0}1{1} 턴
skill_desc_52111=적군 섬멸 후, 데미지 {0}+10%{1}증가, 지속 시간 {0}2{1} 턴, {0}각 중첩 효과는 독립적으로 계산됨{1}
skill_desc_52121=적군 섬멸 후, 목표 주변의 적군 사기 {0}-5{1}
skill_desc_52122=적군 섬멸 후, 목표 주변의 적군 사기 {0}-10{1}
skill_desc_52131=이동력 {0}+3{1}, 현재 턴에 오라 효과가 전장의 모든 아군 부대에게 적용, 자신과 주변 아군은 2배의 오라 효과 적용됨, 쿨타임 {0}2{1} 턴
skill_desc_52141=턴 시작 시, 편대에 보유하는 기병대 1개당 이동력 {0}+2{1}
skill_desc_52151=오라 효과, 편대에 보유하는 기병대 1개당 능동 공격 후 병력 {0}8%{1} 회복
skill_desc_52161=오라 효과, 편대에 보유하는 기병대 1개당 데미지 {0}8%{1} 증가
