item_desc_9201=프리드리히 2세는 이 건틀릿을 왕관이나 홀보다 더 소중한 보물로 여겼다. 이 건틀릿은 그가 매 사냥 훈련에 사용했던 것으로, 견고한 가죽에는 매가 날아오를 때 남긴 흔적이 새겨져 있다. 모든 매는 이 건틀렛의 수호 아래 충성심과 예리함을 배웠으며, 이는 프리드리히의 지혜와 통제력의 상장이 되었다.
