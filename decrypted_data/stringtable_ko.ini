skill_desc_51061=부대가 평원과 산악에서 전투할 경우, 데미지 {0}5%{1} 증가
skill_desc_51062=부대가 평원과 산악에서 전투할 경우, 데미지 {0}5%{1} 증가, 산에 있을 때 아군 부대의 돌격 확률이 {0}10%{1} 증가합니다. 평지에 있을 때 아군 부대의 우회 확률이 {0}10%{1} 증가합니다.
skill_desc_51071=적 유닛 1개 표기 시 해당 유닛이 받는 데미지 {0}15%{1} 증가, 표기 지속 시간 {0}1{1} 라운드. 표기된 유닛이 섬멸될 경우 섬멸자와 아군은 랜덤으로 버프 획득(현재 라운드에 유효하면 중복 획득 가능), 동시에 '정복자' 쿨 타임 즉시 초기화됨. 쿨 타임 {0}10{1} 라운드.
skill_desc_51072=적 유닛 1개 표기 시 해당 유닛이 받는 데미지 {0}30%{1} 증가, 표기 지속 시간 {0}2{1} 라운드. 표기된 유닛이 섬멸될 경우 섬멸자와 아군은 랜덤으로 버프 획득(현재 라운드에 유효하면 중복 획득 가능), 동시에 '정복자' 쿨 타임 즉시 초기화됨. 쿨 타임 {0}10{1} 라운드.
skill_desc_51081=공격 시, 주변의 적에게 현재 생명력의 {0}5%{1}에 해당하는 데미지 입힘. 사기 상승 상태인 경우 데미지 두 배로 증가.
skill_desc_51082=공격 시, 주변의 적에게 현재 생명력의 {0}10%{1}에 해당하는 데미지 입힘. 사기 상승 상태인 경우 데미지 두 배로 증가.
skill_desc_51091=주변 1칸 내의 적군 공성 장비 효력 상실, 지속 시간 {0}2{1} 라운드, 쿨 타임 {0}5{1} 라운드.
skill_desc_51092=주변 1칸 내의 적군 공성 장비 효력 상실, 지속 시간 {0}3{1} 라운드, 쿨 타임 {0}5{1} 라운드.
skill_desc_51101=반격 시, 아군 주변 적군에게 현재 생명력의 {0}5%{1}에 해당하는 데미지 입힘. 주변 적군 수량이 2개 이상일 경우 데미지 두 배로 증가.
skill_desc_51102=반격 시, 아군 주변 적군에게 현재 생명력의 {0}10%{1}에 해당하는 데미지 입힘. 주변 적군 수량이 2개 이상일 경우 데미지 두 배로 증가.
skill_desc_51111=목표 대상 및 주변 랜덤 {0}2{1}개 적 유닛은 현재 라운드에서 반격할 수 없음. 쿨 타임 {0}5{1} 라운드.
skill_desc_51112=목표 대상 및 주변 랜덤 {0}2{1}개 적 유닛은 현재 라운드에서 반격할 수 없음. 쿨 타임 {0}3{1} 라운드.
skill_desc_51121=공격 후 {0}10%{1} 병력 회복. 
skill_desc_51122=공격 후 {0}10%{1} 병력 회복. 적 유닛을 공격하여 섬멸할 경우 효과 두 배로 증가.
skill_desc_51131=주변 적군의 사기가 {0}1{1} 라운드 동안 저하될 확률 증가.
skill_desc_51132=주변 적군의 사기가 {0}2{1} 라운드 동안 저하될 확률 증가.
skill_desc_51141=매 라운드 첫 공격 시 우회 확률 {0}25%{1} 증가, 우회 데미지 {0}25%{1} 증가.
skill_desc_51142=매 라운드 첫 공격 시 우회 확률 {0}50%{1} 증가, 우회 데미지 {0}50%{1} 증가.
