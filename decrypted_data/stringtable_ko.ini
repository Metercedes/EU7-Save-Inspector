general_desc_Tancred=노르만의 작은 영주로 그에 대한 정보는 많지 않다. 하지만 그의 12명의 아들은 유럽에서 많은 전설을 만들어 냈다.
general_desc_William Iron Arm=탕크레드 드 오트빌과 아내 뮈리엘의 장남이자 오트빌 가문의 부를 쌓은 첫 인물이다. 시라쿠사의 포위전에서 그는 홀로 시라쿠사의 아미르를 죽여 '무쇠팔뚝'이라는 별명을 얻었다.
general_desc_Drogo=탕크레드 드 오트빌과 아내 뮈리엘의 아들이자 윌리엄의 동생이며 노르만의 지도자이다. 그는 윌리엄과 함께 시칠리아 전투에 참전하여 마침내 영주가 되었다.
general_desc_Humphrey=탕크레드 드 오트빌과 아내 뮈리엘의 아들이자 윌리엄의 동생이다. 윌리엄과 드로고가 죽은 후, 그는 자기 아들의 양육권을 기스카르에게 넘겼다.
general_desc_Roger Bosso=탕크레드 드 오트빌과 아내 프레센다의 막내아들로 형인 기스카르를 도와 남이탈리아와 시칠리아를 정복하였으며, 시칠리아 왕국의 창시자이다.
general_desc_Emma of Hauteville=기스카르와 알베라다의 딸이며, 그녀의 두 아들은 모두 십자군 전쟁에 참전했다.
general_desc_Bohemond I=로베르 기스카르와 알베라다의 아들이며, 제1차 십자군 전쟁의 지도자이이자 십자군 국가인 안티오키아 공국의 창시자이다.
general_desc_Roger Borsa=로베르 기스카르와 시켈가이타의 아들이다. 그의 야심 찬 어머니는 그를 상속자 자리에 올려놓으려고 애썼고, 그는 형인 보에몽과 상속권을 놓고 오랫동안 싸웠다.
general_desc_Roger II=시칠리아 왕국의 건국자로, 재위 동안 여러 제국의 공격을 막은 뛰어난 군주였다. 시칠리아 왕국은 7세기 동안 존속했다.
general_desc_Tancred Prince of Galilee=오트빌의 엠마와 오도 선량후의 아들이며, 보에몽이 없는 동안 안티오크 공국의 섭정을 맡았다.
general_desc_William I the Bad=루제루 2세의 네 번째 아들로 '악인왕' 또는 '악자'라고 불렸다.
general_desc_Constance I=루제루 2세의 딸로 오트빌이 시칠리아를 점령하는 데 중요한 역할을 했다. 후에 신성 로마 제국 황제 하인리히 6세와 결혼하여 황태후가 되었다.
general_desc_William II the Good=악인왕 구기에르무 1세의 아들로 그의 통치 시절은 평화와 정의의 황금시대로 불렸다.
general_desc_Frederick II=호엔슈타우펜 왕조의 황제 하인리히 6세와 쿠스탄차 여왕의 아들이다. 그가 지배한 영토는 시칠리아에서 독일까지 뻗어나갔고, 십자군에 참전하여 예루살렘을 정복했다.

