conquest_faction_desc_11=로마 제국의 비호를 잃은 브리튼은 야만족의 침략을 당했고, 잔인한 게르만 야만족은 브리튼 섬 도처에서 기승을 부리고 있다. 브리튼인들은 용감하고 선전한 아서 왕 휘하에 단결하여 침입자들을 브리튼에서 몰아낼 것을 맹세하였다.

conquest_faction_desc_101=카이사르가 브리튼을 정복한 이후, 로마인들은 4세기 동안 브리튼을 지배해 왔다. 하지만 오늘날의 서로마 제국은 예전의 강성함을 회복하지 못하고 브리튼 군단을 본토로 철수시킬 수밖에 없다. 서로마 제국의 비호를 잃은 브리튼인들은 무기를 들고 홀로 침입자들을 상대해야 한다.
conquest_faction_desc_102=용맹한 앵글로-색슨족은 자주 전함을 타고 해안선을 따라 서로마 제국의 북부를 약탈하였다. 다른 야만 부족이 갈리아 지역을 차지하기 위해 치열한 전투를 벌이고 있을 때 앵글로-색슨족은 서로마 제국의 비호를 잃은 브리튼 섬으로 눈길을 돌렸다.
conquest_faction_desc_103=고트족은 일찍이 로마 제국을 위해 변경을 지켰고, 훈족을 방어하는 최전선에 놓였지만, 로마인들로부터 좋은 대접을 받지 못하였다. 결국 참다못한 서고트족은 반란을 일으켰고, 서로마 경내에서 서고트 왕국을 세웠다. 이는 서로마 제국과의 전면적인 충돌이 불가피하게 되었음을 의미한다.
conquest_faction_desc_104=서로마 제국은 현재 위기에 처하게 되었다. 날로 쇠퇴하는 국력으로 인하여 야만족의 이주로 인한 국경 불안정에 대처할 수 없게 되었고, 한때 눈부셨던 제국은 현재 곧 무너질 듯하다. 그러나 위기에는 항상 기회가 동반하며, 제국이 쌓은 힘은 여전히 남아있다. 포부를 가지고 부흥을 도모한다면 로마 제국의 영광을 재현할 수도 있을 것이다.
conquest_faction_desc_105=브르타뉴족은 주로 브리튼 섬에서 이주해 온 켈트인으로 구성되어 있는데, '브르타뉴'는 바로 작은 브리튼이라는 뜻이다. 갈리아 지역이 혼란에 빠지고 형세가 불명확한 상태에서 브르타뉴 사람들은 더 지혜롭게 강대국들과 어울려야 갈리아에서 존속할 수 있다.
conquest_faction_desc_106=로마 제국은 프랑크족의 일파인 살리 프랑크족이 동맹의 형식으로 국경지대에 정착하는 것을 허락하였다. 몰락해가는 서로마 제국에 맞서 살리 프랑크족은 제국의 국경을 계속 충실히 지킬 것인지 아니면 갈리아에서 서로마 제국의 권력을 계승할 것인지를 결정해야 한다.
conquest_faction_desc_107=오랜 세월 동안 프랑크족은 풍요로운 갈리아 지역으로 진출하기를 갈망했지만, 로마 제국의 강력한 군사력에 의해 저지되었다. 하지만 서로마 제국이 내우외환에 빠져 있는 지금은 프랑크인들에게 절호의 기회이다.
conquest_faction_desc_108=북동유럽에서 이주해 온 많은 게르만 부족들 중 하나이다. 서로마 제국의 쇠퇴와 느슨해진 군비를 먼저 감지한 부르군트족은 과감히 라인강을 건너 서로마 영토로 진입하였다. 하지만 이런 행위는 서로마 제국의 맹렬한 포위 공격을 받을 수밖에 없었다.
conquest_faction_desc_109=알레만니는 "모든 사람"이라는 뜻인데, 이는 이 부족이 크고 작은 수많은 게르만 부족들로 구성되어 있다는 것을 보여준다. 그러므로 알레만니족은 자신들을 게르만족의 지도자로 여기고, 여러 게르만 부족을 이끌고 강대한 서로마 제국에 대항할 의무가 있다고 생각하였다.
conquest_faction_desc_110=사르마티아인의 후손인 알란족은 초원에서 가장 강력한 유목 민족이었으나, 그들보다 더욱 흉악한 훈족 군대의 습격을 받은 후 도망칠 수밖에 없었다. 다른 이주 민족과 마찬가지로 알란족도 서로마 제국의 국경에서 기회를 찾고 있다.
conquest_faction_desc_111=흑해 연안에 정착했던 동고트족은 최초로 훈족의 침입을 받은 게르만족이다. 강력하고 낯선 훈족에게 맞서 그들은 잠시 굴복할 수밖에 없다. 그러나 동고트족은 기꺼이 남의 밑에서 살아가는 것을 만족해하는 민족이 아니다. 그들은 훈족의 억압에서 완전히 벗어날 기회를 노리고 있다.

conquest_faction_desc_201=자유와 독립은 브르타뉴족의 신념이다. 하늘을 찌를 듯한 서프랑크 왕국에 맞서서도 브르타뉴족은 굴복하지 않았다. 그들은 용맹한 에리스포에를 '브르타뉴의 왕'으로 옹호했고, 서프랑크에 맞서 끝까지 싸우기로 결심하였다.
conquest_faction_desc_202=프랑크 왕국이 <베르됭 조약>으로 세 부분으로 갈라진 후, 카롤루스 2세는 프랑크 왕국의 서부 영토를 기초로 서프랑크 왕국을 세웠다. 서프랑크 왕국은 프랑크 왕국의 핵심 지역을 계승한 동시에 프랑크 왕국의 잠재적 위험인 불안정한 국경과 강력한 귀족층을 계승하였다.
conquest_faction_desc_203=프랑크 왕국이 <베르됭 조약>으로 세 부분으로 갈라진 후, 로타르 1세는 프랑크 왕국의 중부 영토를 기초로 중프랑크 왕국을 세웠다. 다른 두 왕국에 비해 중프랑크 왕국은 비록 면적은 작지만 가장 부유한 이탈리아 지역과 '로마의 황제'라는 타이틀을 보유하고 있다.
conquest_faction_desc_204=프랑크 왕국이 <베르됭 조약>으로 세 부분으로 갈라진 후, 독일인 루트비히는 프랑크 왕국의 동부 영토를 기반으로 동프랑크 왕국을 세웠다. 동프랑크 왕국의 대부분 영토는 정복된 지 얼마 되지 않은 비교적 가난한 독일 지역이지만, 이는 또한 왕국이 매우 강한 무력과 발전 잠재력을 가지고 있다는 것을 의미한다.
conquest_faction_desc_205=앵글로-색슨족의 일곱 왕국 중 하나이다. 선왕 에그버트의 뛰어난 치국 이념하에 웨식스 왕국은 전체 잉글랜드를 통일할 기회가 있었으나, 바이킹의 도래로 웨식스는 통일을 미루고 바이킹의 침입을 방어하는 데 더 많은 노력을 기울여야 하였다.
conquest_faction_desc_206=앵글로-색슨족의 일곱 왕국 중 하나이다. 머시아 왕국은 브리튼에서 가장 강성했던 왕국이며, 왕국의 패권은 펜다의 통치 시기로 거슬러 올라갈 수 있다. 그러나 과거의 영광이 이미 사라진 머시아 왕국은 이제 바이킹뿐만 아니라 항상 그들의 국토를 노리고 있는 웨식스 왕국도 경계해야 한다.
conquest_faction_desc_207=앵글로-색슨족의 일곱 왕국 중 하나이다. 동앵글리아 왕국은 국토가 크지 않은데다 높이 많기 때문에 국력이 비교적 약하며, 오랫동안 머시아의 종속국으로 전락하였다. 하지만 머시아 왕국은 지금 그를 돌볼 겨를이 없게 되었다. 이 기회는 동앵글리아 왕국이 부상할 수 있는 마지막 기회이다.
conquest_faction_desc_208=귀네드 왕국은 브리튼인들이 세운 로마 제국의 계승국 중의 하나이며, 국왕은 보통 '브리튼의 왕'이라는 칭호를 누린다. 귀네드 왕국의 현 국왕은 로드리 대왕이다. 귀네드 왕국은 그의 지배하에 번영을 이루었고, 웨일스 전역을 거의 통일하였다.
conquest_faction_desc_209=앵글로-색슨족의 일곱 왕국 중 하나이다. 노섬브리아 왕국은 두 개의 독립된 작은 왕국이 합쳐져서 형성된 것인데, 이 때문에 오랫동안 정치적으로 분쟁을 겪었다. 바이킹이 브리튼을 침공한 시점에서 노섬브리아 왕국은 더욱 단결해야 한다.
conquest_faction_desc_210=알바 왕국은 게일족과 픽트족이 연합하여 세운 왕국이다. 현 국왕은 바로 왕국을 개척한 케네스 1세이다. 용맹하고 전투에 뛰어난 국왕의 인솔하에 알바 왕국은 온갖 적들을 물리치고 브리튼 북부의 패자가 되었다.
conquest_faction_desc_211=게일 왕국은 아일랜드의 여러 작은 왕국들로 구성된 연합왕국이며, 그 지도자는 아일랜드 지고왕으로 불린다. 비록 아일랜드는 지리적으로 한쪽 구석에 위치하였지만, 여전히 바이킹의 침공을 피할 수 없었기 때문에, 게일 왕국은 그 침입자들을 아일랜드에서 쫓아내기 위해 지고왕의 휘하에 단결해야 했다.
conquest_faction_desc_212=슬라브인의 확장은 서기 5세기로 거슬러 올라갈 수 있는데, 그때부터 서슬라브인은 슬라브 부족에서 분리되어 독립된 민족이 되었을 것이다. 춥고 토지가 척박한 지역에서 살아온 서슬라브인들은 부지런한 품성과 완강한 전투 의지를 갖추었다.

conquest_faction_desc_301=비잔티움 제국의 황제인 유스티니아누스 1세는 로마 제국을 부흥시키고, 야만족에게 점령당한 제국의 모든 땅을 되찾으려는 포부를 가지고 있었다. 황제가 가장 신임하는 장군으로서 벨리사리우스는 무거운 사명을 지니고, 제국의 최정예 군단을 이끌고 멀리 떨어진 북아프리카에 가서 로마 제국의 영광을 회복하는 원정을 시작하게 되었다.
conquest_faction_desc_302=게르만 부족의 하나였던 반달족은 길고 험난한 이주 끝에 로마 제국의 북아프리카 속주를 점령하고 반달 왕국을 세웠다. 반달족은 왕국 설립 후, 비잔티움 제국이 북아프리카를 탈환하려는 시도를 여러 차례 좌절시켰는데, 이번에도 예외는 아닐 것이다.
conquest_faction_desc_303=서로마 제국이 멸망한 후, 테오도리크 대왕은 동고트족을 이끌고 이탈리아 반도로 이주하여 로마 제국의 핵심 영토에 동고트 왕국을 세웠다. 오늘날 동고트 왕국은 테오도리크 대왕의 서거로 내란의 늪에 빠지게 되었고, 외부는 강적에게 둘러싸여 왕국의 처지는 매우 위태로워졌다.
conquest_faction_desc_304=서로마 제국이 야만족의 침략으로 멸망한 후, 옛 로마 제국의 동부 계승자였던 비잔티움 제국도 반세기 동안의 쇠퇴기를 겪었다. 오늘날 비잔티움 제국은 황제 유스티니아누스 1세의 훌륭한 통치로 마침내 다시 강성해졌고, 로마 제국을 부흥시키는 길로 나아가게 되었다.
conquest_faction_desc_305=서고트 왕국은 게르만족이 최초로 갈리아에 세운 왕국이다. 하지만 서고트 왕국은 부상한 프랑크 왕국에 패배하여 어쩔 수 없이 갈리아를 포기하고 남쪽의 피레네 산맥을 넘어야 했다. 수년간의 발전 끝에 국력을 회복한 서고트 왕국은 다시 갈리아로 눈길을 돌려 프랑크족과 다시 한 번 겨루기로 하였다.
conquest_faction_desc_306=여러 게르만 부족이 서로마 제국의 영토를 분할하기 위해 서로 싸우고 있을 때, 현명한 수에비족은 이베리아로 이주하여 수에비 왕국을 세웠다. 그러나 서고트족이 이베리아 반도로 이주함에 따라 수에비 왕국과 서고트 왕국의 충돌은 피할 수 없게 되었다.
conquest_faction_desc_307=이베리아의 토착 민족으로서, 바스크인은 항상 최선을 다해 각종 침입자에 저항하였다. 예전의 로마 제국으로부터 오늘날의 여러 게르만 야만족에 이르기까지, 상대하는 적이 아무리 강하고, 아무리 잘 싸운다고 해도, 바스크인들은 항쟁과 자주독립의 결심을 포기한 적이 없다.
conquest_faction_desc_308=프랑크 왕국은 살리 프랑크족의 군주인 클로비스 1세가 모든 프랑크 부족을 통일하여 세운 게르만족의 왕국이다. 서로마 제국의 야만족 동맹국이었던 프랑크 왕국은 갈리아 지방에서 제국의 권력과 유산을 순조롭게 계승하여 갈리아 지방의 맹주로 급부상하게 되었다.
conquest_faction_desc_309=부르군트족의 이동은 몹시 험난했다. 라인강을 건너자마자 로마와 훈족의 공격을 받았고, 온갖 고난을 겪은 후 최종적으로 갈리아에 부르고뉴 왕국을 세웠다. 그러나 이웃한 프랑크 왕국이 그들의 영토를 노리고 있었기 때문에 부르군트인들은 여전히 방심할 수 없다.
conquest_faction_desc_310=브르타뉴족은 주로 브리튼 섬에서 이주해 온 켈트족으로 구성되었다. 예전의 서로마 제국이든, 지금의 프랑크 왕국이든, 브르타뉴 사람들은 항상 자신들보다 국력이 훨씬 뛰어난 강국들을 이웃에 두었지만 결코 굴복하지 않았다.
conquest_faction_desc_311=게르만 이주 민족이 세운 왕국 중 하나로, 다른 게르만 왕국과는 달리, 튀링겐 왕국은 훈족 제국이 멸망한 후 많은 훈족 노예를 적극적으로 받아들였기 때문에 뛰어난 군사 실력을 갖추게 되었지만, 이로 인해 튀링겐 왕국은 주변 다른 국가들이 두려워하는 대상이 되었다.
conquest_faction_desc_312=게르만 이주 민족 중 하나로, 롬바르디아족이 온갖 고난을 겪은 후 드디어 안전한 곳을 찾았을 때, 서로마 제국의 부유한 영토는 이미 다른 이주 민족들에 의해 분할되었다. 그러므로 롬바르디아족은 불 속에서 밤을 줍는 것과 다름없음에도 불구하고 두 강국인 비잔티움 제국과 동고트 왕국에 희망을 걸 수밖에 없었다.
conquest_faction_desc_313=동게르만 고트족에서 비롯된 게피드족은 매우 용맹하다. 훈족의 왕 아틸라가 죽자 게피드족은 가장 먼저 훈족에게 반항하였으며, 최종적으로 훈족 제국을 멸망시켰다. 오늘날 비잔티움 제국과 인접한 게피드 왕국은 반드시 조심스럽게 지혜가 넘치는 옛 제국에 대처해야 한다.

conquest_faction_desc_401=알렉시오스 1세가 즉위한 이래, 콤니노스 가문은 이미 비잔티움 제국을 1세기 넘게 통치해 왔다. 전임 콤니노스 황제가 전력으로 나라를 다스린 끝에 비잔티움 제국은 쇠퇴와 튀르크 침공 후의 퇴세를 일소하고, 아나톨리아의 옛 땅을 되찾아 로마 제국의 영광을 재현할 국력을 갖추었다.
conquest_faction_desc_402=셀주크 제국이 분열된 후, 킬리지 아르슬란 1세는 아나톨리아에서 그의 정권을 계승하였다. 룸 술탄국과 비잔티움 제국은 아나톨리아를 쟁탈하기 위해 여러 차례 교전을 벌였다. 비록 현재 두 나라는 잠시 평화를 유지하고 있지만, 비잔티움 제국의 본토를 되찾겠다는 결심을 결코 무시할 수 없다.
conquest_faction_desc_403=셀주크 제국의 침공으로 킬리키아로 피난한 아르메니아인들이 세운 나라로, 정식 명칭은 '킬리키아 아르메니아 왕국'이다. 킬리키아 왕국은 강적들이 지켜보는 아나톨리아에서 살아남으려면, 십자군 국가들과 친분을 맺어 그들의 힘을 빌려야 한다.
conquest_faction_desc_404=베이'는 튀르크어로 '수장', '추장'이라는 뜻이다. 비잔티움 제국이 셀주크 제국의 침공으로 아나톨리아를 잃게 되자, 여러 튀르크 부족들이 이 지역으로 이주하여 각 부족 지도자가 연합하여 통치하는 아나톨리아 베이국을 세웠다.
conquest_faction_desc_405=오랜 세월 동안 조지아 지역에는 여러 적대 세력이 존재해 왔으나, 조지아 왕국의 수립으로 혼란스러운 상황은 종식되었다. 현재 타마르 여왕의 통치 아래, 조지아 왕국은 번창해졌으니, 이때 남쪽으로 확장한다면 강대한 트랜스코카시아 제국을 세울 수도 있을 것이다.
conquest_faction_desc_406=셀주크 제국의 아제르바이잔 총독이었던 엘디귀즈가 세운 왕조로, 엘디귀즈의 통치자는 '아타벡'이라는 직함, 즉 '번왕'과 '술탄 보좌 대신'을 세습한다. 셀주크 제국이 내란으로 쇠약해졌을 때 엘디귀즈의 아타벡이 술탄을 지배하여 제국의 정권을 장악했다.
conquest_faction_desc_407=장기 왕조는 십자군에 맞서는 가장 단호한 나라로, 선왕 누르 앗딘은 여러 차례 군대를 이끌고 십자군에게 승리하여 서아시아 지역에 대한 십자군 국가들의 침입을 효과적으로 억제하였다. 십자군 국가들과 새로운 아이유브 왕조의 도전에 직면한 지금, 장기 왕조는 더욱 신중하게 외교를 다뤄야 하며, 여러 적을 동시에 상대해서는 안 된다.
conquest_faction_desc_408=우마이야 왕조에 이은 아랍 제국의 두 번째 세습 왕조이다. 오랜 세월이 지난 현재 한때 번창했던 아바스 왕조는 국력이 쇠퇴하여 튀르크의 꼭두각시가 되었다. 아바스 왕조가 과거의 영광을 회복하려면 셀주크 제국이 사분오열된 틈을 타서 튀르크족의 통제에서 완전히 벗어나야 한다.
conquest_faction_desc_409=십자군 국가 중 하나로, 제1차 십자군 전쟁 당시 타란토의 보에몽이 안티오키아 성을 빼앗은 후 세운 공국이다. 안티오키아 성은 십자군 전쟁 경로에 있는 전략적 요충지이며, 십자군과 비잔티움 제국이 연계하는 중요한 중추이기 때문에 도시 방어를 강화하는 것은 안티오키아 공국의 최우선 임무가 되었다.
conquest_faction_desc_410=십자군 국가 중 하나로, 예루살렘 왕국이 부축한 툴루즈의 베르트랑이 트리폴리 성을 중심으로 세운 백국이다. 트리폴리 백국은 예루살렘 왕국과 안티오키아 공국 사이에 위치해 있기 때문에 이 두 나라와의 관계를 잘 처리하고 공수 동맹을 맺어야만 아이유브 왕조의 공격을 막을 수 있다.
conquest_faction_desc_411=십자군 국가 중 하나로, 예루살렘의 국왕 보두앵 4세는 비록 젊고 건강 상태가 좋지 않지만, 그는 왕국의 정세를 안정시키기 위해 국내 여러 파벌의 균형을 맞추는 동시에 직접 군대를 이끌고 기세가 드높은 살라딘을 격퇴할 수 있는 능력을 갖췄다. 예루살렘 왕국은 보두앵 4세의 통치하에 점점 더 강성해져 십자군의 중심지로 자리 잡고 있다.
conquest_faction_desc_412=쿠르드족 살라딘이 파티마 왕조를 해체한 후, 이집트를 통치의 중심으로 건설한 제국이다. 살라딘은 십자군의 침공에 반격할 때 탁월한 군사적 재능과 카리스마를 보였다. 오늘날 국왕의 통치하에 이집트 제국은 대규모로 확장하여 전체 이슬람 세계를 통일하려는 기세를 보이고 있다.
conquest_faction_desc_413=아키텐 공작 리처드는 잉글랜드 국왕 헨리 2세의 둘째 아들이자 왕위의 유일한 계승자이다. 리처드는 뛰어난 군사 조직력을 갖춘 동시에 매우 용맹하다. 형제들과의 끝없는 내전에 지친 리처드는 교황청의 호소에 따라 원정군을 이끌고 멀리 떨어진 동방의 십자군 국가를 지원하기로 결심했다.

conquest_faction_desc_501=바이킹이 브리튼을 침공한 이래로 아일랜드 섬 주변에 거주하던 게일족도 해적들의 침입을 피할 수 없었다. 게일족은 지고 왕의 휘하에 뭉쳐 바이킹을 고향에서 몰아내고, 아일랜드를 통일시키겠다고 맹세하였다.
conquest_faction_desc_502=스칸디나비아에서 브리튼으로 이주한 바이킹의 한 부대가 잉글랜드 북부와 아일랜드 동부 해안을 차지했다. 원주민들의 저항이 점점 더 강해짐에 따라 바이킹의 브리튼 정복은 매우 어려워졌다.
conquest_faction_desc_503=앵글로-색슨 잉글랜드라고도 하며, 웨식스 왕국이 잉글랜드 지역을 통일하여 세운 왕국이다. 왕국의 왕위 계승 시점에 바이킹이 다시 노섬브리아에 침입하였다. 에드먼드 1세는 잉글랜드를 재통일하기 위해 침입자들을 몰아내야 한다.
conquest_faction_desc_504=브리튼인들이 세운 로마 제국의 계승국 중 하나이다. 귀네드 왕국의 모든 국왕은 언젠가 브리튼을 다시 지배하고, "브리튼의 왕"이라는 칭호를 명실상부하게 만들기 위해 국력을 발전시키는 데 전력해왔다.
conquest_faction_desc_505=달리어타의 왕 케네스 1세가 픽트족을 합병하여 세운 왕국이다. 알바 왕국은 건립 당시부터 침입자들과 완강히 맞서 싸워 왔다. 바이킹이든 잉글랜드든 모두 알바 왕국을 굴복시킬 수 없었다.
conquest_faction_desc_506=아스투리아스 왕국의 계승자이자 레온을 수도로 하는 기독교 왕국이다. 이베리아 반도에서 가장 큰 왕국으로서 레온 왕국은 다른 기독교 국가들을 이끌고 코르도바 칼리파국의 확장에 맞섰다.
conquest_faction_desc_507=바스크인이 팜플로나를 중심으로 세운 독립 왕국이다. 팜플로나 왕국 건립 초기에 프랑크 왕국의 침입을 성공적으로 막아냈으며, 지금도 마찬가지로 강성한 코르도바 칼리파국에 맞서 왕국의 국민들은 여전히 물러서지 않고 있다.
conquest_faction_desc_508=바르셀로나 백국은 처음에는 프랑크 왕국이 바르셀로나를 중심으로 세운 변경 백작령이었으나, 서프랑크 왕국은 내부의 투쟁이 계속되면서 점차 바르셀로나 백작을 지원할 능력을 상실하게 되었고, 백국과 프랑크 왕국의 연계는 점차 쇠약해졌다.
conquest_faction_desc_509=우마이야 왕조의 후손이 이베리아 반도에 세운 이슬람교 왕국이며, 아브드 알 라흐만 3세가 칼리파로 자립하면서 코르도바 칼리파국으로 불리게 되었다. 현재 제국은 이 "늘 승리하는 자"의 지배하에 나날이 강성해져 이베리아 반도 전체를 통일하려는 추세이다.
conquest_faction_desc_510=아랍 귀족인 이드리스가 현지 베르베르 부족을 통일하여 건립한 왕조이다. 지금 왕국의 국력이 쇠퇴하고, 내란이 그치지 않고, 또 북방의 강대한 이웃 나라의 눈치를 보고 있으니 왕국은 신중하게 외교를 처리해야 한다. 그렇지 않으면 나라를 잃을 위험이 있다.
conquest_faction_desc_513=위대한 앨런 1세가 죽자 바이킹이 다시 돌아와 브르타뉴의 대부분 지역을 점령했다. 앨런 2세는 바이킹과 30년 가까이 싸운 끝에 바이킹들을 몰아내고 브르타뉴 공국을 다시 세우는 데 성공했다.
conquest_faction_desc_514=프랑크 왕국이 <베르됭 조약>에 의해 셋으로 갈린 후, 서프랑크 왕국은 프랑크 왕국의 서부 영토를 상속받았다. 카롤루스 왕조의 왕권이 남의 손에 들어가자 국내의 제후들은 서로 세력을 키우고, 심지어 위그와 같은 왕가의 영지를 침범하는 역적이 생겼다. 서프랑크 왕국의 앞길은 극히 험난해 보인다.
conquest_faction_desc_515=오랜 세월 동안 센 강 하류 지역은 바이킹의 습격을 자주 받았기 때문에, 서프랑크 왕국은 이 지역을 바이킹의 수장 롤로에게 넘겨줌으로써 평화와 바이킹 부족의 충성을 얻었다. 그 후 롤로는 루앙을 중심으로 노르망디 공국을 세웠다.
conquest_faction_desc_516=프랑크 공작 겸 파리 백작인 위그는 루이 4세를 서프랑크 왕위 계승자로 옹립했었지만, 왕권 강화만을 꿈꾸던 루이 4세는 그의 가문의 실력을 의심하고 두려워했다. 결국 여러 차례 다툼 끝에 그들은 결국 반목하고, 전쟁이 일어났다.
conquest_faction_desc_517=아키텐이라는 명칭은 로마 제국 시대의 아키텐 갈리아 속주로 거슬러 올라갈 수 있다. 아키텐 지역에는 로마 문화가 성행했었기 때문에 이 지역은 서프랑크 왕국에서 유별나게 보였고, 이러한 이유로 아키텐 공국은 일정한 독립과 자주성을 유지하게 되었다.
conquest_faction_desc_518=카롤루스 왕조가 툴루즈를 중심으로 건립한 백작령이다. 현재 카롤루스 왕조가 쇠퇴하여 툴루즈 백국은 비록 명목상 여전히 서프랑크 왕국에 속해 있지만, 실제로 서프랑크 왕국은 툴루즈 백국에 대해 효과적인 지배를 할 수 없게 되었다.
conquest_faction_desc_519=상, 하 부르고뉴 왕국이 합병하여 건립된 왕국이기 때문에 양부르고뉴 왕국이라고도 불리며, 아를에 수도를 두었기 때문에 붙여진 이름이다. 아를 왕국은 동, 서 프랑크 왕국 사이에 위치하기 때문에 두 강대국과 신중하게 교섭해야 한다.
conquest_faction_desc_520=동프랑크의 국왕 오토 1세는 왕위를 계승했을 때부터 왕권 강화에 힘썼고, 제후들에 대한 왕의 권한을 강화해왔다. 이로 인해 왕국과 공국 간에 갈등이 심해졌고, 심지어는 여러 차례 반란이 발생하였다. 그러나 오토 1세는 자신이 왕국의 모든 힘을 장악해야만 프랑크 왕국의 영광을 재현할 수 있다고 굳게 믿었다.
conquest_faction_desc_521=<베르됭 조약>으로 프랑크 왕국은 서, 중, 동 세 왕국으로 나뉘어졌으나, 12년 만에 중 프랑크 왕국은 다시 세 개로 나뉘었고 로트링겐 공국이 탄생했다. 공국은 프랑크족의 발흥지인 아우스트라시아 지역을 계승했기 때문에 서쪽과 동쪽 두 왕국은 공국을 탐냈다.
conquest_faction_desc_522=프랑켄 공국이라고도 불리며, 동프랑크 왕국의 자치 공국 중 하나이다. 동프랑크의 카롤루스 왕조의 후계자가 끊긴 후, 프랑코니아 공작은 동프랑크의 왕위를 잠시 장악했었다. 그래서인지 프랑코니아 공국은 작센의 오토 1세에게 복종하는 것을 달가워하지 않았다.
conquest_faction_desc_523=동프랑크 왕국의 자치 공국 중 하나이다. 바이에른이라는 명칭은 로마 제국 시절 '보헤미아에서 온 사람들'이라는 뜻으로 현지 부족에 대한 지칭에서 비롯된 것이다. 카롤루스 왕조가 쇠퇴하자, 그 지역에 대한 왕조의 지배를 이어가기 위해 어쩔 수 없이 새로운 바이에른 공국을 건립하였다.
conquest_faction_desc_524=774년에 샤를마뉴는 랑고바르드 왕국을 정복하고, 북부 지역을 프랑크 왕국에 편입시켰는데, 후에 그 지역은 이탈리아 왕국이 되었다. 오늘날 프랑크 왕국은 이미 뿔뿔이 흩어져서 이탈리아 왕국은 마침내 독립을 이룩하여 더 이상 다른 나라에 얽매이지 않아도 된다.
conquest_faction_desc_526=베네벤토 공국은 랑고바르드 왕국이 이탈리아를 정복한 후 이탈리아 남부의 베네벤토를 중심으로 세운 공국이다. 랑고바르드 왕국이 프랑크 왕국에 병합된 후 베네벤토 공국은 교황령의 분리로 독립 상태를 유지할 수 있었다.
conquest_faction_desc_527=서로마 제국이 야만족의 침입으로 멸망한 후, 이탈리아 북부 해안 지역의 주민들은 잇달아 석호로 피난하였으며, 이곳에 정착지를 건설하여 베네치아 공화국을 건립하였다. 해상 무역으로 번영한 도시 국가인 베네치아는 자신들의 해상 이익을 지키기 위해 강력한 해군이 필요하다.
conquest_faction_desc_528=유스티니아누스 대제가 중흥한 이래 비잔티움 제국은 마치 기운을 소진한 것처럼 보였다. 그 후 거의 400년 동안 제국은 끊임없는 내우외환으로 국토를 잃었다. 그러나 위대한 국가는 계속 쇠퇴하고만 있지 않을 것이다. 전임 마케도니아 왕조 황제들의 통치하에 비잔티움 제국은 국력을 회복했고, 잃어버린 땅을 되찾을 준비를 하고 있다.
conquest_faction_desc_529=7세기에 비잔티움 제국은 달마티아 지역에서 기승을 부리는 아바르족에게 대항하기 위해 크로아티아인들을 이 지역으로 이주시켰다. 그 후 크로아티아인들은 달마티아에 정권을 세우고 점차 크로아티아 공국으로 발전하였다.
conquest_faction_desc_530=세르비아인들이 달마티아에 세운 정권이다. 세르비아 공국이라는 신흥 정권은 불가리아인들에 의한 침공의 위협에 직면했다. 어쩌면 불가리아인들과 싸우고 있는 비잔티움 제국과 협력하는 것이 좋은 선택일 수도 있다.
conquest_faction_desc_531=불가리아 제국은 건립한 이래로 비잔티움 제국과 여러 해 동안 교전을 벌였는데, 비잔티움 같은 오래된 강대국조차도 제국의 군사 역량에 굴복하지 않을 수 없었다. 그러나 차면 넘친다고 오늘날 불가리아 제국은 내전으로 인해 국력이 크게 쇠퇴하였다. 이 틈을 타서 반격하려는 듯 주변의 국가들은 줄줄이 연합하고 있다.
conquest_faction_desc_532=덴마크 게르만족으로서 흔히 스칸디나비아 남부에 사는 바이킹 부족을 가리킨다. 다른 바이킹 부족들이 약탈을 위해 바다로 나가는 데 열중하는 것에 비해 고향에 남아 있는 이 바이킹 무리는 고향을 발전시키는 데 더 열중한다. 하지만 그러기 위해서는 강력한 동프랑크 왕국을 직시해야 한다.
conquest_faction_desc_533=작센 귀족인 게로 1세가 동프랑크 왕국 동부에 건립한 변경 후작령이다. 동프랑크 왕 오토 1세가 가장 신임하는 부하로서 게로 1세는 왕국의 동부 국경을 지키고, 가능한 한 동쪽으로 왕국의 영지를 확장하는 임무를 맡았다.
conquest_faction_desc_534=체코 공국이라고도 불리며, 대모라비아 공국의 체코인들이 세운 정권이다. 비록 보헤미아 공국이 대모라비아 공국으로부터 독립하기 위해 동프랑크 왕국과 친밀하게 협력한 적이 있지만, 최종적으로 보헤미아 공국은 독립을 위해 동프랑크 왕국과 등을 돌리게 되었다.
conquest_faction_desc_535=폴란드라는 단어는 고대 슬라브어에서 유래한 것으로 평원 사람을 뜻하며, 폴란드인이 살아가고 있는 환경을 생생하게 표현하였다. 동프랑크 왕국의 끊임없는 동쪽 확장에 맞서 폴란드인들은 고향을 지키기 위해 오직 일치단결해야만 이 강대국을 막아낼 수 있다.
conquest_faction_desc_536=9세기에 마자르족은 동유럽 초원에서 카르파티아 분지로 이주하였다. 유럽 중부에 처음 들어온 마자르족은 사방으로 약탈하며 살았기 때문에 주변 각국은 더 이상 참을 수 없게 되었다. 현재 각국이 이 새로운 이웃에 대한 방비를 강화함에 따라, 마자르족은 초원에서 가져온 그들의 생존 습성을 바꿔야 한다.
conquest_faction_desc_538=페체네그족은 서돌궐의 우구스 부족에서 유래한 것이며, 하자르 칸국에 잠시 종속되어 있었다. 10세기 초에 페체네그족은 서쪽에 위치한 돈강 유역으로 이주하였으며, 그 지역에서 하자르 칸국의 정권을 접수했다.
conquest_faction_desc_539=이베리아 왕국은 비잔티움 제국의 속국이었다가 아랍 제국의 부상과 침공으로 어쩔 수 없이 아랍 제국에 충성을 바치기로 했다. 오늘날 아랍 제국은 내란으로 인해 다른 일을 돌아볼 겨를이 없게 되었다. 이베리아 왕국이 기회를 타서 옛 지배국과 친분을 맺는다면 아랍인의 통제에서 완전히 벗어날 수 있을 것이다.
conquest_faction_desc_540=기원전부터 존재해온 오래된 왕국으로서, 아르메니아 왕국의 역사는 매우 험난하다. 그들의 국토는 연이어 페르시아인, 로마인, 아랍인에 의해 점령되고 지배되었다. 그럼에도 불구하고 아르메니아인들은 나라를 독립시킬 어떤 기회도 놓치지 않았다.
conquest_faction_desc_541=아랍 제국이 분열되어 나온 왕국 중 하나로 아랍 제국의 모술 총독이었던 압둘라는 아바스 왕조의 쇠퇴를 깨닫고 모술을 독립시켰다. 그 후 모술 토후국을 건립하고 아미르로 자칭하며 함단 왕조를 개창하였다.
conquest_faction_desc_542=아랍 제국이 분열되어 나온 왕국 중 하나로 아바스 왕조의 튀르크 장군 이크시드가 세운 이집트 왕조이다. 현재 이크시드 왕조는 함단 왕조와 시리아의 지배권을 놓고 다투고 있으며, 시리아의 귀속은 결국 아랍 세계에서 두 왕국의 지위를 결정할 것이다.

