stage_name_1610=헥삼 전투

stage_intro_1601=정신병이 발작한 지 1년 후, 헨리 6세는 건강을 회복하였다. 왕후 마거릿 앙주의 지지로 서머싯 공작은 복직하게 되었고, 요크 공작 리처드는 호국경의 지위를 잃고 궁정을 떠나야 했다. 1455년, 서머싯 공작에게 불만을 품은 요크 공작 리처드는 서머싯 공작을 단번에 제거하기 위해 네빌 가문과 힘을 합쳐 군대를 이끌고 런던으로 진군했다.
stage_intro_1602=제1차 세인트알반스 전투가 막을 내리면서 요크 공작은 궁정에서 자신의 적수를 대부분 제거하고, 호국경의 자리를 되찾았다. 그러나 얼마 지나지 않은 1456년 초, 왕실을 위해 토지를 탈환하려는 요크 공작의 법안이 의회에서 부결되면서 본인도 호국경의 자리에서 물러나야 했다. 이와 동시에 왕비 마거릿도 왕가의 권력을 되찾기 위해 비밀리에 힘을 모으고 있었다. 1459년, 양측의 갈등이 격화되자 요크파의 솔즈베리 백작은 요크 공작과 합류하기 위해 군대를 이끌고 남하하였다. 마거릿은 즉시 군대를 파견하고 요격했고, 양측은 블로어 히스에서 조우전을 벌였다.
stage_intro_1603=요크 공작은 솔즈베리 백작과 성공적으로 합류한 후에도 멀리 진격하지 못하였다. 헨리 6세 국왕의 깃발을 내건 군대가 그들을 가로막았는데, 이 부대의 규모는 그들의 2~3배에 달했다. 양측 군력의 격차로 인해 요크 공작은 일시적으로 부대를 후퇴시켜 주둔하고, 왕에게 자신의 충성을 표하는 편지를 보냈다. 그러나 블로어 히스에서 벌어진 전투로 인해 그는 왕의 믿음을 잃었고, 대전이 불가피하게 되었다.
stage_intro_1604=러드포드 브릿지 전투의 패배로 궁정에서 요크 가문의 지위는 급락하게 되었고, 랭커스터 가문은 점차 세력을 넓혀 요크 가문의 영지 일부를 획득했다. 비록 명목상 서머싯 공작은 원래 킹메이커 워릭의 영지였던 칼레를 얻었지만, 칼레 지역은 서머싯 공작의 지배를 거부했다. 1460년 1월, 워릭은 칼레 지역을 공격하려고 샌드위치에 주둔하고 있던 랭커스터 군대를 선제 공격하고, 서쪽으로 진격하여 런던까지 쳐들어갔다. 랭커스터 가문의 군대는 이 소식을 듣고 몰아치는 요크 가문의 군대를 막기 위해 재빨리 노샘프턴에 방어선을 구축했다.
stage_intro_1605=노샘프턴 전투 이후, 리처드 요크 공작은 한 법안을 통과시켰다. 이 법안은 "국왕이 사망할 경우, 리처드와 그의 자손이 왕위를 상속할 수 있다"는 내용이었는데, 이는 그가 권력의 정상에 거의 도달했다는 것을 의미한다. 그러나 그의 앞에는 마지막 장애물이 남아있었다. 즉, 원래의 왕후 마거릿은 랭커스터 가문의 동맹들을 킹스턴어폰헐에 집결시켜 런던으로 남하하려 했다. 요크 공작 리처드는 이 소식을 듣고 신속히 부대를 편성하고 북상하여 그들과 맞섰다. 하지만 급히 출병한 탓에 이 부대는 상대보다 규모가 작을 뿐만 아니라 보급도 부족했다. 요크 공작 리처드는 첫 교전에서 밀려 지원을 기다리기 위해 어쩔 수 없이 샌들 성으로 철수해야 했다.
stage_intro_1606=요크 공작 리처드는 웨이크필드 전투에서 패배한 후 사망했고, 그의 아들 에드워드 4세가 그의 작위를 상속하게 되었다. 당시 에드워드 4세는 겨우 18세였지만 나이를 뛰어넘는 리더십과 지휘 능력을 과시했다. 요크 공작 리처드가 패배한 지 불과 한 달 후, 에드워드 4세는 군대를 이끌고 모티머스 크로스에서 랭커스터 군대와 격전을 벌였다.
stage_intro_1607=모티머스 크로스 전투 이후, 에드워드 4세가 헤리퍼드에서 군대를 재정비하는 동안 마거릿 왕후의 동맹군은 즉시 북쪽에서 남쪽으로 진격하였다. 불과 보름 만에 수만 명에 달하는 이 군대는 런던으로 접근했고, 킹메이커 워릭은 군대를 이끌고 그들과 맞섰다. 공교롭게도 6년 전 요크 가문과 랭커스터 가문의 첫 전투와 마찬가지로 이번 전투 역시 세인트알반스라는 작은 마을이었다. 그러나 이번 대결의 결과는 6년 전과 완전히 달랐다.
stage_intro_1608=마거릿의 군대가 세인트 알반스 전투에서 승리했지만, 전투 이후 군대가 저지른 일련의 폭행으로 인해 런던 시민들은 그들을 환영하지 않았고, 마거릿은 어쩔 수 없이 북쪽으로 철수할 수밖에 없었다. 그 후 얼마 지나지 않아 런던에서 인심을 얻은 에드워드 4세가 왕으로 추대되었고, 원래 왕이었던 헨리 6세는 폐위되었다. 이 소식을 알게 된 마거릿은 에드워드 4세를 완전히 소멸하기 위해 잉글랜드 북부에서 요크 가문을 반대하는 거의 모든 세력을 소집하였는데, 이로부터 잉글랜드 본토에서 가장 잔혹한 전투가 시작되었다.
stage_intro_1609=타우턴 전투에서 에드워드 4세는 자신을 반대하는 랭커스터파를 대부분 물리쳤다. 그 후 몇 년 동안 에드워드 4세는 이전의 적들과 화해하기 위해 다양한 수단을 동원했는데, 그 중에는 그의 원수였던 제3대 서머싯 공작인 헨리 보퍼트도 포함되었다. 1463년 말, 서머싯 공작은 폐위된 헨리 6세를 비밀리에 만났고, 곧 다시 반란을 일으켰다. 분노한 에드워드 4세는 서머싯 공작을 완전히 멸망시키기 위해 존 네빌에게 반란을 진압하도록 명령했다.
stage_intro_1610=해츨리 습지에서 패배한 서머싯 공작은 헥삼 해안으로 철수했다. 그는 군대를 세 갈래로 나누어 방어 시설을 건설함으로써 추격자들을 헥삼의 남쪽에 막으려 했다. 그러나 존 네빌은 서머싯 공작에게 숨 돌릴 틈을 주지 않기 위해 신속히 추격하였다.

campaign_desc_16=1453년 7월, 카스티용 전투에서 패배했다는 소식에 잉글랜드의 왕 헨리 6세는 충격을 받아 통치 능력을 상실하게 되었다. 잉글랜드 국내의 랭커스터와 요크 두 가문은 패권을 둘러싸고 충돌이 일어났고, 이는 결국 전쟁으로 번졌다. 두 가문의 배지는 각각 붉은 장미와 흰 장미였기 때문에 이번 전쟁은 "장미전쟁"이라고도 불렸다.
campaign_desc_17=에드워드 4세는 잉글랜드의 왕이 된 후, 이전의 적대 세력과 화해를 시도하여 잉글랜드에 잠시 동안의 평화를 가져다주었다. 그러나 에드워드 4세의 화해 정책은 그와 이전의 동맹들 사이에 갈등을 야기했다. 1469년, 에드워드 4세의 가장 충직한 부하였던 킹메이커 워릭이 반란을 일으켜 잉글랜드은 새로운 혼란에 빠지게 되었다.

campaign_end_desc_16=헥삼 전투 이후 랭커스터 가문의 군사력은 크게 약화되었고, 요크 가문이 잉글랜드의 지배자가 되었다. 이전과 달리 에드워드 4세는 몰래 한 여성과의 결혼을 준비해야 하는 더 중요한 일이 있었기 때문에 이번 전투를 직접 지휘하지 않았다. 그 여자의 이름은 엘리자베스 우드빌이었고, 후에 사람들은 흔히 그녀를 '화이트 퀸'이라고 불렀다.
campaign_end_desc_17=전쟁이 종결됨과 동시에 잉글랜드에 대한 앙주 왕조의 통치도 끝났고, 웨일스의 튜더 왕조가 시작되었다. 이것은 잉글랜드의 중세 시대의 종결과 새로운 르네상스 시대의 도래를 의미한다.

general_desc_Manuel I=12세기 비잔티움 제국의 황제로, 그의 통치 기간 동안 콤니노스 왕조는 마지막 전성기를 맞이했다. 제국의 군사력과 경제가 회복되었을 뿐만 아니라 문화도 번영했다.

