battle_talk_160101=서머싯 공작과 같은 전장에서 패하고 도망친 자가 군정 권력에 손을 대려고 하다니. 나는 반드시 국가를 위해 그를 제거할 것이다!
battle_talk_160102=왕을 위하여!
battle_talk_160103=전진하라! 이 반역자를 처치하라!
battle_talk_160104=적의 전면 방어선은 매우 강력하다. 우리는 측면으로 우회해볼 수 있다!
battle_talk_160201=물살이 너무 거세서 무리하게 강을 건너면 우리 부대가 큰 손해를 입을 수 있다. 적의 추격을 유인하는 방법을 찾아야 한다.
battle_talk_160202=왕비가 나에게 오들리 남작을 지원하라고 명령했지만, 확실한 자신이 없는 한 나는 출병하지 않을 것이다.
battle_talk_160203=그들이 도망가지 못하도록 추격하라!
battle_talk_160204=그들은 덫에 걸렸다. 궁수들이여, 화살을 날려 강을 건너는 적을 저격하라!
battle_talk_160205=전세가 분명해졌다. 공격하라!
battle_talk_160301=요크의 병사들이여, 무기를 내려놓아라. 왕은 너희들을 용서할 것이다!
battle_talk_160302=그들에게 속지 마라. 왕은 이미 죽었다!
battle_talk_160303=나는 왕에게 충성을 바칠 것이다. 나한테 요크 군대의 정보가 있다!
battle_talk_160304=군대의 사기가 붕괴되었다. 이제 우리는 제각기 흩어져서 탈출할 수밖에 없다.
battle_talk_160401=폭우로 인해 대포를 사용할 수 없게 되었다. 상황은 우리에게 불리하다!
battle_talk_160402=적은 우리와의 협상을 거부했으니 전장에서 승패를 가릴 수밖에 없다.
battle_talk_160403=요크 가문은 나에게 충분한 혜택을 약속했기 때문에 나는 그들을 도울 것이다.
battle_talk_160404=적이 도망치고 있다! 적을 추격할 절호의 기회이다!
battle_talk_160405=모든 사람은 왕과 백성을 공격하지 말아라. 우리의 목표는 귀족과 기사, 그리고 그들의 시종들이다!
battle_talk_160501=우리는 현재 적에게 포위당하고 있지만, 원군이 도착하면 모든 것이 잘 될 것이다.
battle_talk_160502=나는 요크 공작이 피로 죄값을 치르게 할 것이다.
battle_talk_160503=감히 내 보급 부대를 공격하다니! 나를 따라 공격하라! 놈들을 없애버려라!
battle_talk_160504=출격하라! 요크 공작을 포위하라!
battle_talk_160505=요크 공작의 머리에 종이 왕관을 씌워 전시하라! 왕위를 노리는 자들이 자신의 종말을 알도록 하라!
battle_talk_160601=행군 속도를 높여라! 랭커스터 군대를 가로막아야 한다!
battle_talk_160602=군대는 장거리 행군으로 매우 지쳤다. 그들의 사기를 북돋아줘야 한다!
battle_talk_160603=세상에! 저게 뭔가? 왜 하늘에 세 개의 태양이 떠 있는 건가?
battle_talk_160604=병사들이여, 두려워하지 말아라! 이것은 하나님이 우리와 함께 하신다는 의미다! 우리는 반드시 승리할 것이다!
battle_talk_160701=도시를 포위하라! 그들의 궁수들을 섬멸하라!
battle_talk_160702=북서쪽으로 우회하라! 그리고 적을 포위하여 공격하라!
battle_talk_160703=젠장! 화약이 젖었다! 우리는 지원이 필요하다!
battle_talk_160704=적이 점점 많아지고 있다. 우리는 전쟁터에서 철수할 기회를 찾아야 한다!
battle_talk_160801=폭풍우로 인해 궁수들은 눈을 뜰 수 없게 되었다. 날씨는 우리에게 불리하다!
battle_talk_160802=전세가 우리에게 유리하다. 궁수는 적에 대한 압박을 유지하라!
battle_talk_160803=계속 이처럼 궁병에게 억제당할 수는 없다. 기병대로 돌격하라!
battle_talk_160804=랭커스터의 복병이다! 대형을 축소하여 피해를 줄여야 한다!
battle_talk_160805=아직 늦지 않아서 다행이다!
battle_talk_160901=뉴캐슬 근처의 산악지형은 병사들이 몸을 숨기는 데 매우 유리하다. 우리는 그곳에 매복하여 적을 공격할 수 있다.
battle_talk_160902=동맹군은 우리를 기다리고 있다. 북쪽에서 진군해야 할 것 같다.
battle_talk_160903=좌익의 손실이 막심해서 병력을 재집결시켜야 한다.
battle_talk_161001=진지를 굳건히 다지고, 공사를 건설하여 적을 막아라.
battle_talk_161002=돌격하라! 적에게 준비할 시간을 주지 말아라!
battle_talk_161003=진정하라! 물러서지 말아라!
battle_talk_161004=서머싯 공작은 이미 죽었다! 더 이상 무의미한 저항을 하지 말아라!

