troop_desc_118=지중해를 순항하는 해적들은 오가는 배들의 악몽이었습니다.
troop_desc_213=방진에서 충격을 막는 역할을 맡은 전방의 전사들은 후방의 총병들에게 안전한 사격 조건을 제공할 수 있습니다.
troop_desc_214=악비가 조직한 부대는 보병과 기병으로 구성되었으며, 금나라 기병에 대항하는 전투에서 여러 차례 놀라운 공적을 세웠다.
troop_desc_317=리투아니아 대공의 친위 기병으로, 장비가 정교하며 전쟁 망치를 무기로 사용했다. 중장갑을 입은 적에게도 상당한 피해를 입힐 수 있었다.
troop_desc_417=갑옷과 깃발, 심지어 무기까지 붉은색으로 칠한 기병대. 붉은 철갑옷을 입고 잘 훈련된 기병은 위풍당당해 보이며, 전장에서 무시할 수 없는 존재이다.
troop_desc_418=사무라이 계급을 중심으로 구성된 부대. 충성심과 용기가 뛰어나고, 장비가 잘 갖추어져 있고, 훈련이 잘 되어 있으며, 전투력과 협동력이 매우 높다.
troop_desc_419=후냐디 마차시가 조직한 정예 용병단으로, 오스만 제국과의 전쟁에서 중추적인 역할을 했다.
troop_desc_420=긴 자루 도끼를 무기로 사용하며, 도끼창의 설계는 찌르기와 베기를 모두 겸비하여 장병도 기병은 비교적 다재다능한 기병이다.
troop_desc_421=금나라 완안골출 의 정예 중장기병은 사기가 높을 때 무시무시한 돌격력을 가지고 있었다.
troop_desc_520=이반 뇌제가 조직한 정예 수비대는 화승총을 발사할 때 지지대로 월인도끼를 자주 사용했다.
troop_desc_612=비도끼를 공격 수단으로 사용하는 원거리 기병으로, 근거리 기병에게 매우 강한 교란 효과를 줄 수 있습니다.
troop_desc_613=석궁을 사용하여 적을 살상하는 원거리 기병으로, 일반적으로 적의 진형을 교란하고 틈을 만들어 중기병의 돌격을 위한 조건을 마련하는 데 사용된다.

