general_desc_Warwick the Kingmaker=16대 워릭 백작으로, 본명은 리처드 네빌이다. 그는 장미 전쟁 때 여러 귀족을 왕위에 오르도록 지지하여 '킹메이커'로 불렸다.
general_desc_Edmund Beaufort=2대 서머싯 공작으로, 요크 공작 리처드의 정치적 적이다.
general_desc_Richard of York=3대 요크 공작으로, 본명은 리처드 플랜테저넷이다. 플랜태저넷 가문의 후손으로서 그는 왕위 상속권을 가지고 있다.
general_desc_Margaret of Anjou=헨리 6세의 아내이자 랭커스터 가문의 핵심 인물이었다. 나약한 헨리 6세의 통치 기간 동안 서머싯 공작을 정치적 동맹으로 끌어들여 실질적인 국가 통치자가 되었다.
general_desc_Henry VI=잉글랜드의 왕으로, 성격이 나약하다. 국가를 다스리는 능력이 부족했고, 신하들을 통치할 힘도 없었다. 그의 통치 기간 동안 대신들은 권력을 차지하기 위해 서로 다투었고, 최종적으로 장미 전쟁이 발발했다.
general_desc_Richard Neville=5대 솔즈베리 백작, 킹메이커 워릭의 아버지
general_desc_Henry Percy2=2대 노섬벌랜드 백작
general_desc_Henry Percy3=3대 노섬벌랜드 백작
general_desc_Henry Percy4=4대 노섬벌랜드 백작
general_desc_Henry Beaufort1=2대 서머싯 공작의 아들
general_desc_Henry Beaufort2=3대 서머싯 공작, 2대 서머싯 공작의 아들
general_desc_John Neville1=남작 네빌
general_desc_Edward IV=요크 공작 리처드의 아들
general_desc_John Neville2=1대 몬태규 경
general_desc_John Grey of Groby=엘리자베스 우드빌의 남편
general_desc_Elizabeth Woodville=에드워드 4세의 아내로, '화이트 퀸'으로 불렸다. 그녀의 딸은 후에 헨리 7세와 결혼하여 튜더 왕조의 창시자 중 한 명이 되었다.
general_desc_Li Shimin=당나라의 두 번째 황제로, 재임 기간 동안 국내 정치 개혁을 적극 추진하여 당나라의 수백 년 동안의 번영에 견고한 기반을 마련했다. 또한, 외부로 영토를 개척하고, 주변의 세력을 평정하였기에 '천가한'이라 불렸다.
general_desc_Michael VIII=비잔티움 팔레올로고스 왕조의 창시자로서, 재임 기간 동안 외교 수단을 적극적으로 활용하여 비잔티움 제국의 외부 위협을 해소함으로써 원래 위태로웠던 비잔티움 제국을 두 세기 동안 유지시켰다.

