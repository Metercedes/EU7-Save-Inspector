troop_desc_519=화승총이라기보다는 화포에 더 가까운 무기를 사용한다. 강력하지만 지나치게 큰 구경으로 인해 장전이 매우 번거로우며 기동성에 문제가 있다. 
troop_desc_611=그들은 사막의 지배자이자 전장의 유령이다. 그들은 낙타를 전마로 사용하여 광활한 모래바다를 바람처럼 빠르게 가로지르며 이동할 수 있고, 공격과 방어를 능숙하게 전환할 수 있다.

