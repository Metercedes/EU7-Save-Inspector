stage_intro_4761=985년, 아나톨리아 장군 두 명은 새로 즉위한 바실리오스 2세를 제압하려 하였다. 바실리오스 2세는 이 나라를 실질적으로 장악하기 위해 그들을 물리쳐야 했다.
stage_intro_4765=비잔티움의 내전이 장기화되면서 동부 지역에 대한 제국의 지배력이 약화되었다. 파티마 왕조의 끊임없는 습격에 대응하여 바실리오스 2세는 직접 군대를 이끌고 시리아로 향했다.
stage_intro_4767=998년, 비잔티움 제국이 파티마 왕조와의 국경 전쟁에서 패배하자 바실리오스 2세는 다시 한 번 자신의 군대를 이끌고 국경에서 적의 요새들을 소탕하고, 제국의 영토를 지켰다.
stage_intro_4763=서기 986년, 바실리오스 2세 황제는 직접 군대를 이끌고 불가리아를 침공한 후, 후퇴하는 도중 불가리아 군대의 매복 공격을 당했다.
stage_intro_4769=1014년, 바실리오스 2세는 오랜 전투 끝에 불가리아의 주력 부대를 에게해 북쪽 해안으로 몰아넣었고, 양측의 오랜 충돌은 다시 한 번 종지부를 찍게 되었다.
stage_intro_4771=1020년, 아르메니아 왕은 바실리오스 2세가 이탈리아를 공격하는 틈을 타서 파티마 왕조와 연합하여 비잔티움 국경을 침공하였다. 이에 분노한 바실리오스는 즉시 군대를 이끌고 돌아왔고, 이후 전투에서 아르메니아 지역을 점령했다.

