;战役介绍
stage_intro_1=초급 튜토리얼로서 주로 이동, 공격 등 기본 조작을 위주로 소개한다.
stage_intro_2=기본 튜토리얼로서 주로 부대의 모집, 해산, 보충, 혼합편성 등 조작에 대해 소개한다.
stage_intro_3=중급 튜토리얼로서 도시와 성의 건설 방법, 용병 모집 등 조작에 대해 소개한다.
stage_intro_4=고급 튜토리얼로서 주로 기기의 장착 및 사용, 보조 건물의 기능에 대해 소개한다.
stage_intro_101=서기 376년, 서고트족은 훈족의 침공을 피하기 위해 로마 제국에 비호를 요청했지만, 도나우 강을 건넌 후 국경 내의 로마인들과 많은 충돌이 일어났고, 결국 양측은 마르시아노플에서 전투를 벌였다.
stage_intro_102=서기 378년, 반란을 일으킨 고트족은 도나우강 각 지역을 약탈한 후, 다른 야만족과 연합하여 발칸 반도를 침공할 준비를 하였다. 로마 황제 발렌스는 직접 출정하기로 결정하였으나, 휘하 병사들의 전력이 들쭉날쭉한 것이 이 반란 진압 작전의 가장 큰 골칫거리가 되었다.
stage_intro_103=서기 402년, 서고트족은 알라리크 국왕의 인솔하에 서로마 제국의 중심지를 지속적으로 침공하였고, 얼마 지나지 않아 요충지인 밀라노를 포위하였다. 이 때문에 황제 호노리우스는 침식을 취하지 못하게 되자 제국 북부에 있던 스틸리코에게 군사를 이끌고 남쪽으로 진군하도록 지시하였다.
stage_intro_104=서기 410년, 알라리크는 호노리우스와 약속한 장소에서 로마군의 공격을 받았다. 이 공격으로 그는 서로마 제국과의 협상을 포기하고, 다시 로마를 포위하였다. 여러 차례의 포위전으로 이 '영원의 성'은 흔들리게 되었다.
stage_intro_105=서기 419년, 서로마 제국과 맹약을 맺은 수에비 왕국은 국경 귀속 문제로 이웃 왕국인 반달 왕국과 자주 충돌하게 되었다. 정복욕이 강한 수에비 왕 헤르메리크는 자발적으로 반달족의 영토를 침공하기로 결정하였다.
stage_intro_106=서기 439년, 가이세리크는 군대를 이끌고 지브롤터 해협을 가로질러 서로마 제국의 북아프리카 영토 대부분을 차지한 지 8년이 되었다. 하지만 거의 5년 동안 서로마 제국과 평화를 유지한 후, 가이세리크는 다시 로마 제국의 세 번째 중요 도시인 카르타고를 노렸다.
stage_intro_107=서기 451년, 야심 찬 훈족 왕 아틸라는 서로마 궁정의 스캔들을 틈타 갈리아 지역을 침공하기로 결정했다. 갈리아에 있던 로마 장군 아에티우스는 갈리아 지역의 야만족 왕국과 연락하여 연합군을 결성하고 훈족의 침략에 맞서 싸울 준비를 하였다.
stage_intro_108=서기 455년, 막시무스는 황제 발렌티니아누스 3세를 모해하여 왕위를 찬탈하였다. 이 일로 인해 반달 왕 가이세리크와 후자의 동맹이 깨졌다. 가이세리크는 에우도키아 황후로부터 구원받은 후, 이탈리아를 공격하기로 결정했다.
stage_intro_201=6세기부터 유럽 각국은 기병의 중요성을 점차 인식하게 되었다. 서기 530년, 페르시아인들은 비잔티움 제국을 공격하였다. 다라성 밖에는 사산 왕조의 정예 기병대가 배치되었다.
stage_intro_202=유스티니아누스 1세는 시시각각 로마의 예전 영광을 재현하려고 했다. 겔리메르의 왕위 찬탈 사건은 그에게 북아프리카로 출병할 구실을 제공하였다. 서기 533년, 벨리사리우스는 군대를 이끌고 북아프리카에 상륙하여 카르타고로 진군하였다.
stage_intro_203=비잔티움이 아드 데키미움 전투에서 큰 승리를 거둔 후, 벨리사리우스와 그의 군대는 카르타고를 점령하였다. 카르타고 서쪽에 있는 겔리메르는 카르타고를 탈환하기 위해 그의 형제에게 지원을 요청하였으며, 군대를 다시 집결시키려고 한다.
stage_intro_204=북아프리카를 다시 정복한 후, 유스티니아누스 1세는 이탈리아 지역으로 눈을 돌렸다. 서기 535년, 벨리사리우스는 그의 황제를 위해 로마를 점령하고, 이탈리아를 되찾기 위해 다시 군대를 이끌고 출정하였다.
stage_intro_205=로마를 점령한 후, 비잔티움에 라벤나로 가는 길은 활짝 열렸다. 벨리사리우스는 그의 부대를 이끌고 계속 진군하였다. 동고트 왕국의 수도는 비잔티움 군대의 대대적인 공격을 맞이하게 되었다.
stage_intro_206=동고트 왕 토틸라의 활약으로 유스티니아누스 1세는 어쩔 수 없이 벨리사리우스를 이탈리아 지역으로 다시 파견해야 했다. 서기 546년, 토틸라의 군대는 로마에 도착하여 도시를 포위하였다.
stage_intro_207=이탈리아 지역에 대한 토틸라의 지속적인 침공으로 제국은 큰 피해를 보았으며, 그는 또한 제국 군대가 이탈리아 지역에 쉽게 진입하지 못하도록 함대를 이용하여 해역을 봉쇄하려고 한다. 이러한 행동은 유스티니아누스 1세를 매우 불만스럽게 만들었다.
stage_intro_208=이탈리아의 지배권을 되찾기 위해 유스티니아누스 1세는 나르세스를 이탈리아로 보내기로 결정하였다. 나르세스를 만난 후, 전통 고트족인 토틸라는 병력의 열세에도 불구하고 선제 공격을 감행하기로 하였다.
stage_intro_209=고트족은 나르세스의 공격을 막아내기 어려웠다. 동고트 왕은 프랑크족과 알레만니족에게 구조를 요청하기로 하였으며, 그들이 이탈리아 지역으로 진입하여 비잔티움 군대의 공격을 막아주기를 바랐다.
stage_intro_210=559년, 한 무리의 훈족이 국경을 넘어 콘스탄티노플 외곽에서 악행을 저질렀다. 이는 유스티니아누스 1세에게 있어서 그야말로 수치였다. 그는 다시 벨리사리우스를 면전에 불러들여 마지막 임무를 부여했다.
stage_intro_301=앵글로-색슨족의 도래는 브리튼의 원주민들을 공포에 떨게 하였다. 잘 장비되고 잘 훈련된 적들에 맞서 브리튼족은 어쩔 수 없이 무기를 들고 앵글로-색슨족의 침공에 맞서 싸워야 했다.
stage_intro_302=남색슨 부족의 왕 에를은 부하들을 이끌고 브리튼 섬의 남쪽 해안에 성공적으로 상륙하였으나, 내륙으로의 진군은 순조롭지 않았다. 그들은 원주민들의 완강한 저항에 부딪혔고, 이로 인해 에를은 병력이 부족하다는 점을 깨닫고, 아직 본토에 있는 부족에게 증원을 요청하게 되었다.
stage_intro_303=여러 해 계속되는 전란의 영향으로, 브리튼에 흩어진 부족들은 서로 통합하여 각자의 왕국을 건립하기 시작했지만, 이는 브리튼에 평화와 안정을 가져다주지 못하였다. 부족 간의 전투는 점차 노섬브리아 왕국을 비롯한 왕국 간 규모가 더 크고, 더 잔혹한 전쟁으로 번져갔다.
stage_intro_304=633년, 에드윈의 통치하에 노섬브리아 왕국은 당시 잉글랜드에서 국력이 가장 강성한 나라가 되었다. 이로 인하여 이웃 국가들이 두려워하자 귀네드의 왕 카드와슬론은 머시아 왕국과 동맹을 맺고 연합군을 조직하여 노섬브리아 왕국을 침공하기로 결정했다.
stage_intro_305=비록 귀네드 왕국과 머시아 왕국의 연합군의 침공을 성공적으로 막아냈지만, 노섬브리아 왕국은 매우 심각한 피해를 보았고, 심지어 왕국은 한때 분열되었다. 서기 634년, 귀네드의 왕 카드와슬론은 또 다시 군사를 파견하여 노섬브리아 왕국을 침공하였다.
stage_intro_306=오스왈드의 복귀과 왕위 계승으로 노섬브리아 왕국의 군대는 귀네드 왕국을 이길 수 있었고, 왕국은 다시 평화와 안정을 되찾을 수 있었다. 서기 644년, 10년 동안 국력이 점차 회복되자 오스왈드는 머시아 왕국을 공격하기로 결정했다.
stage_intro_307=오스왈드의 머시아 침공은 참패로 끝났다. 펜다는 이 기회를 틈타 동앵글리아 왕국과 귀네드 왕국을 연합하여 노섬브리아 본토를 공격하기로 결정했다. 서기 655년, 노섬브리아 왕국은 베르니시아 외의 모든 지역이 연합군에 의해 함락되었다.
stage_intro_308=오랫동안, 머시아 왕국은 잉글랜드 남부의 여러 왕국들을 강제로 통제함으로써 왕국의 지위를 유지해 왔다. 서기 825년, 베오른울프는 자신의 권위를 확고히 하기 위해 직접 군대를 이끌고 웨식스 왕국을 침공했고, 웨식스 왕 에그버트는 반격에 나섰다.
stage_intro_401=파견한 사자가 가산족에 의해 피살되었기 때문에 아랍인들은 보복 작전을 전개하기로 결정하였다. 하지만 그 작전 계획은 비잔티움에 알려졌고, 즉시 요새의 주둔군을 집결시켰다. 강력한 비잔티움 군대 앞에서 아랍인들의 작전은 실패할 수밖에 없는 것 같았다.
stage_intro_402=할리드가 군대를 이끌고 마르즈 라힛에 도착했을 때, 가산족은 아랍인들이 자신들에게 위협이 될 수 없다고 생각하였다. 하지만 아랍인들은 곧 실제 행동으로 그들의 전력이 비교할 수 없을 만큼 강하다는 것을 증명하였다.
stage_intro_403=아부는 아랍 최초의 칼리파가 된 후, 세력을 아라비아 반도 너머로 확장하려고 하였다. 아랍 군대는 북쪽으로 진격하여 다마스쿠스를 공격했다.
stage_intro_404=아랍인들의 전진을 막고, 잃어버린 영토를 되찾기 위해 이라클리오스는 레반트에 대규모 군대를 파견하기로 결정했다. 적의 접근에 따라 아랍인들은 다마스쿠스에서 철수하고, 야르무크에 군대를 다시 집결시켰다.
stage_intro_405=비잔티움 군대와 야르무크 평원에서 교전 후, 아랍인들은 계속 진격하여 더 많은 도시를 점령하기로 결정했다. 서기 636년 말, 아랍 군대는 예루살렘에 도착하여 도시를 포위하였다.
stage_intro_406=아랍인들의 정복은 여전히 계속되고 있다. 그들의 군대는 아나톨리아 반도를 휩쓸었다. 잇따른 패전과 도시의 손실로 비잔티움 제국은 위기감을 느꼈고, 이 강적을 격파할 방법을 모색하고 있다.
stage_intro_407=사산 왕조를 격파한 후, 오마르는 아랍 병사들을 이끌고 아프리카로 진군하기로 결정하였다. 아랍인들은 이집트를 시작으로 더 많은 아프리카 땅을 자신들의 영토로 차지할 계획이다.
stage_intro_408=사산 왕조를 철저히 격파한 후, 아랍인들은 비잔티움 제국을 주요 적대 대상으로 삼았고, 그들은 지중해 지역에서 비잔티움 제국에 대항하기 위해 강력한 해군을 구축하였다.
stage_intro_501=865년, 한 무리의 바이킹 군대가 바다를 건너 브리튼 땅에 상륙하여 해안의 수도원 등 부유한 지역들을 급습하고 약탈하였다.
stage_intro_502=바이킹 침공 이후, 동앵글리아와 노섬브리아 두 왕국이 연이어 점령되었다. 바이킹의 다음 목표는 웨식스 왕국을 점령하는 것이다.
stage_intro_503=레딩 전투에서 우위를 차지한 바이킹 부대는 계속 전진하여 애쉬다운 지역에서 웨식스 군과 다시 전투를 벌였다.
stage_intro_504=수십 년에 걸친 침략과 약탈 끝에 웨식스 왕국을 비롯한 소수 세력만이 여전히 알프레드의 인솔하에 바이킹의 침입에 저항하고 있다.
stage_intro_505=893년, 브리튼에 다시 상륙한 바이킹은 다시 앵글로-색슨족과 전투를 벌였다. 하지만 전술의 변화로 인하여 바이킹의 침입은 거의 효과를 보지 못하였다.
stage_intro_506=937년, 북부의 세 왕국은 급속히 발전하고 있는 잉글랜드의 세력을 파괴하기 위해 동맹을 맺었다. 적의 침공에 직면한 애설스탠 왕은 군대를 모아 북쪽으로 진군했다.
stage_intro_507=잉글랜드의 왕위를 놓고 경쟁하기 위해 노르웨이의 하랄드 하드라다 왕과 그의 동맹들은 군대를 모아 요크셔로 진군하기로 결정했다.
stage_intro_508=잉글랜드 왕 참회자 에드워드의 죽음으로 왕좌를 노리는 사람들이 불안해졌다. 그중 노르웨이에서 온 하랄드가 자신의 부대를 이끌고 잉글랜드로 진격했다.
stage_intro_601=비잔티움 제국과 불가리아 제국의 전쟁이 수년 동안 지속되었다. 서기 811년, 니키포로스 1세는 군대를 이끌고 불가리아를 공격하였고, 연이어 승리를 거둔 후 플리스카로 진군하기로 결정했다.
stage_intro_602=플리스카 전투 이후, 비잔티움 제국과 불가리아 제국은 모두 큰 피해를 보았지만, 불가리아 제국은 여전히 급진적인 공세를 유지하였다. 큰 손실에도 불구하고 비잔티움 제국은 평화 협정 체결을 거부했다.
stage_intro_603=미하일 2세가 즉위하자 토마스라는 장군은 그의 통치에 저항하기로 결심했는데, 이는 많은 사람들의 지지를 얻었다. 그는 아랍인들과 연합하여 콘스탄티노플을 향해 진공하였다.
stage_intro_604=레온 6세는 비잔티움 성직자들의 추방에 대한 보복으로 불가리아 상인들을 콘스탄티노플에서 추방하기로 결정했다. 이는 시메온 1세에게 전쟁을 발동할 구실을 제공하였다. 하지만 이때 비잔티움의 주력 군대는 동부 전선에서 아랍인에 맞서 싸우고 있었다.
stage_intro_605=섭정이 된 후 조이 자우치나는 불가리아 제국에 더 이상 양보하지 않기로 하였다. 이를 핑계로 시메온 1세는 다시 비잔티움 제국을 공격하게 되었다. 시메온 1세의 일련의 조치로 인해 비잔티움인들은 어쩔 수 없이 홀로 싸워야 했다.
stage_intro_606=922년, 불가리아는 발칸 지역의 대부분을 장악하였지만, 해군 부족으로 콘스탄티노플을 위협할 수 없었다. 그래서 불가리아인은 아랍인과 연합하기로 하였으나, 비잔티움인의 출병으로 저지되었다.
stage_intro_607=아랍인과의 전투를 마친 후, 비잔티움 제국은 짧은 시간에 국력을 회복하여 불가리아 제국을 빠르게 격파하였다. 그러나 키예프 루스는 이러한 공백을 이용했고, 발칸 반도에는 새로운 강적이 나타났다.
stage_intro_608=971년, 불가리아의 패배로 비잔티움은 불가리아의 광대한 땅을 차지할 수 있었고, 불가리아인은 자신들의 땅을 되찾기 위해 수년간 지속적으로 공격을 감행해 왔다.
stage_intro_609=트라야누스의 문 전투 이후, 비잔티움 제국에 내전이 일어났다. 사무일은 이 기회를 이용해 비잔티움 제국을 공격하기로 하였다. 서기 996년, 사무일은 테살로니키 지방의 비잔티움 군대를 격파하고 남쪽으로 진군하기 시작하였다.
stage_intro_610=1000년부터 비잔티움 황제 바실리오스 2세는 불가리아에 군대를 파견하기 시작하였다. 하지만 비잔티움은 여전히 양국의 국경까지 치고 나갔다. 중흥하는 비잔티움 제국과 쇠퇴하는 불가리아 사이에 맹렬한 전투가 불가피하게 되었다.
stage_intro_701=1066년, 노르망디 공작은 잉글랜드 왕위를 차지하기 위해 부대를 이끌고 해협을 건너 잉글랜드에 상륙하였다. 해럴드 2세는 소식을 듣고 즉시 군대를 소집하여 남쪽으로 내려가 헤이스팅스 부근에 수비군을 배치했다.
stage_intro_702=헤이스팅스 전투에서 해럴드 2세를 격파한 후, 윌리엄은 부대를 이끌고 런던으로 왔다. 그는 런던의 안전을 보장하기 위해 서더크로 부대를 파견하여 그곳의 저항 세력을 섬멸하기로 하였다.
stage_intro_703=잉글랜드를 성공적으로 정복한 후, 엑서터에 사는 사람들은 윌리엄에게 충성을 바칠 것을 거부하였다. 윌리엄은 엑서터 사람들을 그의 통치에 복종시키기 위해 군대를 이끌고 도시를 포위했지만, 격렬한 저항에 부딪혔다.
stage_intro_704=대다수 사람의 지지를 받았지만, 여전히 윌리엄의 통치에 저항하는 저항 세력이 존재하며, 그들 대부분은 북쪽에 집중되어 있다. 평화적인 방법으로 그들의 충성을 얻을 수 없다고 판단한 윌리엄은 군대를 이끌고 북쪽으로 올라가기로 하였다.
stage_intro_705=1075년, 노르망디로 돌아온 윌리엄은 엠마와 랄프의 결혼을 인정하지 않았다. 이는 세 백작의 반란을 불러일으켰고, 그들은 윌리엄이 노르망디에 있는 틈을 타 그의 통치를 무너뜨리기로 하였다.
stage_intro_706=1105년, 헨리 1세는 군대를 이끌고 노르망디 공작 로베르의 영지를 침공하고, 바욘와 카앙을 점령하였다. 이듬해, 헨리 1세는 노르망디로 돌아갔고, 모르탱 백작은 로베르에게 충성하는 귀족 중 하나로서 그의 최우선 목표가 되었다.
stage_intro_707=1119년, 프랑스 왕 루이 6세는 부대를 이끌고 노르망디를 공격하였다. 헨리 1세는 노르망디에서 자신의 재산과 영토를 지키기 위해 프랑스와 교전할 수밖에 없었다.
stage_intro_708=1135년, 헨리 1세의 갑작스러운 죽음으로 잉글랜드는 무정부 상태에 빠지게 되었다. 스티븐과 헨리 1세의 딸인 마틸다는 각자 세력을 이끌고 잉글랜드 왕위를 차지하기 위해 싸웠다.
stage_intro_801=1048년, 셀주크 왕자가 부대를 이끌고 비잔티움 제국이 지배하는 아르메니아로 들어왔다. 비잔티움 군대는 병력이 부족했기 때문에 방어적인 전략을 채택하기로 결정하고 원군이 오기를 기다렸다.
stage_intro_802=1071년, 점차 쇠퇴해가는 비잔티움 제국은 셀주크가 이집트의 파티마 군대에 대항하는 데 전념하는 기회를 이용하여 아르메니아를 기습하여 이전에 잃었던 토지와 요새를 탈환하기로 하였다.
stage_intro_803=에게 해 지역에서 활약하는 셀주크 제국의 세력은 지속적으로 비잔티움 제국을 위협하였다. 알렉시오스는 셀주크 제국의 해군에 대항하기 위해 함대를 편성하고, 에게 해 지역의 통제권을 탈환하기로 하였다.
stage_intro_804=비잔티움 제국은 강력한 셀주크를 감당할 수 없게 되자 알렉시오스는 서방에 지원을 요청하기로 하였다. 비잔티움 군대의 협조 하에, 십자군은 바다를 건너 니케아를 첫 번째 목표로 삼았다.
stage_intro_805=더 많은 비잔티움의 원군이 합류함에 따라, 십자군의 전력은 더욱 강해졌다. 십자군은 콘스탄티노플에서 예루살렘까지의 중간 지점에 위치한 안티오키아로 진군하였다.
stage_intro_806=병세가 호전된 알렉시오스는 아나톨리아 전선의 방어를 강화하기 위해 직접 전쟁터로 나가기로 결정하였다. 그의 군대는 셀주크를 여러 차례 격파했고, 추가 대비책을 얻은 후 다시 적을 공격하였다.
stage_intro_807=1176년, 비잔티움 황제 마누일 1세는 헝가리와 세르비아의 서쪽 위협을 제거한 후, 동쪽의 룸 술탄국에 집중하기로 하고, 아나톨리아 초원을 점령하기를 희망했다.
stage_intro_808=아나톨리아를 되찾을 수 있는 절호의 기회를 놓친 마누일 1세는 많은 공성 기구까지 잃었다. 하지만 약탈을 마치고 돌아오는 셀주크 군대는 그에게 다시 승리의 희망을 주었다.
stage_intro_901=셀주크의 수도인 니케아를 점령한 후 원정군은 맹렬한 반격을 받았다. 아르슬란 1세는 많은 부대를 이끌고 보에몽 1세의 부대를 포위했다.
stage_intro_902=안티오키아를 성공적으로 점령한 후, 십자군은 예루살렘을 향해 계속 진군하였다. 예루살렘을 지키고 있는 아랍 장군 다울라 역시 수비 태세를 갖추고 있었다.
stage_intro_903=1차 십자군의 승리로 유럽의 영주들은 승리의 기쁨을 맛보았고, 2차 십자군을 시작하기로 하였다. 이번에 그들의 첫 목표는 다마스쿠스이다.
stage_intro_904=아크레는 지리적으로 우월하고 살라딘의 통치 범위 내에서 매우 중요한 도시였다. 살라딘은 기 드 뤼지냥이 아크레 외곽으로 다시 군대를 집결했다는 소식을 듣고 즉시 군대를 집결시켜 요격하였다.
stage_intro_905=서유럽 영주들은 살라딘에게 빼앗긴 예루살렘을 되찾기 위해 다시 한번 십자군을 조직하였다. 대군은 아나톨리아에 진입했을 때 셀주크의 맹렬한 공격을 받았다.
stage_intro_906=사자심왕 리처드가 예루살렘에서 철수하자 살라딘은 야파를 공격하기로 하였다. 그는 이를 복수의 기회로 삼았다. 소식을 들은 사자심왕은 다시 군대를 집결하여 살라딘을 공격하였다.
stage_intro_907=십자군이 예루살렘으로 진군할 준비를 하고 있을 때, 그들의 지도자는 알렉시오스 4세의 요구를 받아들여 그의 아버지를 도와 왕위를 되찾기 위해 콘스탄티노플로 진군하기로 하였다. 그 대가로 비잔티움 제국은 그들에게 경제적, 군사적 지원을 제공할 것이다.
stage_intro_908=오랜 전투 끝에, 십자군은 예루살렘을 되찾는 데 가장 큰 장애가 이집트라는 것을 깨닫게 되었다. 그래서 그들은 군대를 조직하여 지중해를 건너 이집트를 공격하기로 하였다.
stage_intro_1001=웨일스의 공공연한 반란 행위 때문에 헨리 2세는 어쩔 수 없이 노르망디에서 잉글랜드로 돌아와야 했다. 1165년, 헨리 2세는 웨일스인들을 징벌하고 조직하기 위해 거대한 군대를 모아 웨일스를 공격하였다.
stage_intro_1002=아서와 존은 잉글랜드 왕위 계승권을 쟁탈하기 위해 오랫동안 싸웠다. 존이 이사벨라와 결혼하기로 결정한 후, 그 균형은 서서히 깨졌으며, 위그 10세와 필리프 2세의 합류로 더욱 혼란스러워졌다.
stage_intro_1003=존의 협조 거부로 필리프 2세는 노르망디 땅을 직접 되찾겠다고 밝혔고, 얼마 지나지 않아 그의 행동을 개시하였다. 1203년, 필리프 2세는 가이야르 성으로 출병하였다. 그는 가이야르 성은 노르망디 전체를 통제할 수 있는 열쇠라고 여겼다.
stage_intro_1004=1213년, 윌리엄 롱제스페가 인솔한 잉글랜드 함대는 우연히 프랑스 함대를 발견했고, 프랑스 선원들은 이미 상륙하여 약탈하고 있었다. 무인 함대를 상대로 잉글랜드의 승리는 식은 죽 먹기였다.
stage_intro_1005=1214년, 잉글랜드 왕국, 신성 로마 제국, 플랑드르 백국으로 구성된 연합군이 프랑스 왕국을 공격하자 필리프 2세는 즉시 대군을 집결시켰다. 연합군의 기세에도 불구하고 잘 훈련된 프랑스 기병대는 결코 밀리지 않았다.
stage_intro_1006=헨리 3세 통치 시기 잉글랜드 내의 기근은 날이 갈수록 심해졌고, 이로 인해 헨리 3세에 대한 귀족들의 불만도 날로 심해졌다. 시몽이 이끈 헨리 3세의 지배에 대항하는 전쟁이 임박하였다.
stage_intro_1007=에드워드 1세의 감독하에 스코틀랜드의 새로운 왕이 선출되었다. 에드워드 1세는 스코틀랜드가 잉글랜드 통치하의 후국이 되어야 한다고 여겼으며, 잉글랜드가 프랑스에 대항할 수 있도록 도와달라고 요구했으나, 스코틀랜드인은 이에 반대하고 프랑스와 동맹을 맺었다.
stage_intro_1008=윌리엄 월리스의 인솔하에 스코틀랜드군은 지속적으로 잉글랜드를 공격하였다. 1298년, 에드워드 1세는 프랑스 왕국과 휴전하기로 결정하고, 잉글랜드로 돌아가 스코틀랜드의 진공을 막는 데 전념했다.
stage_intro_1009=폴커크 전투 후, 스코틀랜드는 잉글랜드에 거의 정복당하였다. 1306년, 로버트 브루스가 스코틀랜드의 왕위를 차지했는데, 에드워드 1세가 병사한 후 에드워드 2세의 지도력이 뜻대로 되지 않아 전세가 역전되었다.
stage_intro_1010=1323년, 로저 모티머는 런던탑에서 탈출한 후, 이사벨라를 만났다. 양측 모두 에드워드 2세에 대해 큰 불만을 품었고, 그의 통치에 반항하기로 하였다. 1326년, 이사벨라와 모티머는 비밀리에 잉글랜드로 돌아갔고, 그들의 저항을 시작하였다.
stage_intro_1101=콘스탄티노플이 함락된 후, 니케아 제국과 에피루스 전제군주국은 가장 큰 두 비잔티움 망명 정권이 되었다. 그들 모두 먼저 비잔티움 제국을 부활 시킬 수 있기를 바랐으나, 이러한 공통의 목표는 오히려 두 정권 충돌의 근원이 되었다.
stage_intro_1102=에피루스 전제군주국과의 쟁탈전에서 최후의 승리를 거둔 니케아 제국은 야심찬 미하일 8세의 지휘하에 콘스탄티노플에 있는 라틴 제국에 눈을 돌렸다.
stage_intro_1103=1261년, 니케아 제국은 제노바 공화국과 동맹을 맺고 다시 콘스탄티노플을 공격할 준비를 했다. 라틴 주둔군과 베네치아 함대가 원정에서 아직 돌아오지 않았다는 것을 발견하였을 때, 그들은 이번 절호의 기회를 놓치지 않기로 하였다.
stage_intro_1104=비잔티움 제국을 재건한 후, 미하일 8세는 주변의 라틴 제국의 잔당을 숙청하려고 애썼다. 1263년, 비잔티움 군대는 아카이아 공국을 공격하였는데, 수도를 점령할 때 완강한 저항을 받았다.
stage_intro_1105=프리니차 전투의 패배로 인하여 모레아에서의 비잔티움 제국의 전세는 더 피동적인 상황에 빠졌고, 용병들이 도망치거나 군대가 분산되는 문제가 심각해졌다. 1264년, 기욤 2세가 이끈 라틴 제국군은 흩어진 비잔티움 군대를 공격했다.
stage_intro_1106=1274년, 비잔티움 제국은 테살리아의 요안니스를 공격하였고, 요안니스 두카스는 거대한 비잔티움 군대에 맞서 외부에 지원을 요청할 수밖에 없었다.
stage_intro_1107=에게 해에 대한 제국의 지배권을 유지하기 위해 비잔티움 제국은 해군을 재편성하였다. 그러나 모레아와 세테포치 전투의 패배로 군대는 큰 타격을 입었고, 이로 인해 라틴 귀족들은 데메트리아스 항구의 비잔티움 해군을 공격하기로 하였다.
stage_intro_1108=앙주 시칠리아 왕국에 있어서 베라트는 전략적으로 매우 중요한 요새 도시였다. 1280년, 비잔티움 제국은 적들이 비잔티움 제국의 중요한 지역에 쉽게 진입할 수 없도록 군대를 보내 베라트를 공격했다.
stage_intro_1201=1302년, 미하일 9세의 군대가 오스만군의 기세에 눌려 해산되었다. 안드로니코스 2세는 니코메디아가 직면하고 있는 심각한 상황을 지원하기 위해 보스포루스 해협을 건너 군대를 파견하게 되었다.
stage_intro_1202=1321년, 젊은 안드로니코스 3세는 할아버지가 너무 늙었기 때문에 자신이 황제의 자리를 맡아야 한다고 생각하여 조손 두 사람은 내전을 벌였다. 오스만 군은 이 기회에 부르사 성을 공략하기로 하였다.
stage_intro_1203=라틴 제국으로부터 콘스탄티노플을 탈환한 후, 비잔티움은 그리스 지역에 대한 지배를 회복하기 위해 너무 많은 노력을 기울였고, 아나톨리아 동부 전선의 부대를 불러들였다. 이러한 움직임으로 오스만 제국은 새로운 공격을 감행하게 되었다.
stage_intro_1204=1329년, 아나톨리아에 있는 비잔티움의 지배 지역이 급격히 줄어들었다. 주변 지역을 안정시키기 위해 안드로니코스 3세는 니코메디아로 군대를 파견하기로 결정했지만, 군대는 펠레카논에서 오스만군의 요격과 공격을 받았다.
stage_intro_1205=비잔티움의 내란은 비잔티움을 거의 붕괴시켰다. 요안니스 6세는 자신의 아들을 구출하기 위해 오스만 제국에 도움을 청했다. 그들은 세르비아 제국과 불가리아 제2제국의 연합군을 상대하게 될 것이다.
stage_intro_1206=1352년, 비잔티움은 다시 내전에 휩싸였고, 오스만군은 용병으로 갈리폴리 근처의 요새를 점령하였다. 1354년, 한 차례의 지진이 갈리폴리의 상황을 완전히 바꾸어 놓았다.
stage_intro_1207=1352년, 오스만 제국이 발칸 반도에서 첫 번째 요새를 점령한 이후, 유럽에서 급속히 확장하기 시작하자 불가리아의 황제 이반 알렉산더르는 이 군대의 진격을 저지하기로 결정했다.
stage_intro_1208=갈리폴리를 점령한 후, 오스만 제국의 발칸 남부에서의 확장 속도는 더욱 빨라졌다. 일련의 불안과 정돈을 거친 후, 오스만 제국은 비잔티움 제국의 세 번째 주요 도시인 아드리아노플을 공격하기로 하였다.
stage_intro_1301=1337년, 프랑스 의회가 잉글랜드로부터 아키텐 공국을 되찾기로 결정하면서 양측의 갈등은 일촉즉발의 상황에 치달았다. 영국 해협의 제해권을 되찾기 위해 에드워드 3세는 직접 함대를 이끌고 프랑스 해군을 공격하였다.
stage_intro_1302=제해권을 탈취한 후, 에드워드 3세는 부대를 이끌고 포츠머스에서 출발하여 프랑스 북안에 도달한 후 공격을 개시했다. 강력한 프랑스군은 수비 태세를 갖추고 있었고, 양측 군대는 크레시 주변에서 곧 부딪칠 것이다.
stage_intro_1303=크레시 전투의 승리로 에드워드 3세는 몹시 기뻐했고, 영국군은 승승장구하여 칼레를 점령하기로 결정했다. 이곳을 점령하면 유럽 대륙의 교두보를 확보할 수 있지만, 전투가 이렇게 어려워질 줄은 몰랐다.
stage_intro_1304=1346년 9월, 잉글랜드의 대군이 칼레를 포위 공격하고 있을 때, 필리프 6세는 에드워드 3세가 군대를 나누어 본토를 구원하도록 데이비드 2세에게 잉글랜드를 공격할 것을 요청하였다. 데이비드는 프랑스와의 오랜 동맹 관계를 고려하여 잉글랜드를 침공하기로 결정하였다.
stage_intro_1305=브르타뉴는 매우 중요한 위치에 자리 잡고 있다. 그러므로 브르타뉴의 계승권 분쟁에 영국과 프랑스 양국은 모두 참여하게 되었고, 모두 브르타뉴가 자국의 편을 들기를 원해 전장에서 우위를 차지하려고 하였다.
stage_intro_1306=1356년, 흑태자 에드워드는 영국군의 기병 사령관이 된 후, 영국군을 이끌고 프랑스 땅에서 초토화 정책을 시행하여 상당한 성공을 거두었다. 장 2세는 흑태자에게 복수하기 위해 행군 속도를 늘리기로 결정하였다.
stage_intro_1307=프랑스 왕 장 2세는 푸아티에 전투에서 포로로 잡힌 후, 잉글랜드에 넓은 영토를 할양하였다. 하지만 에드워드 3세의 야심은 여기서 그치지 않았고, 그는 원정을 일으켜 랭스에서 프랑스 왕으로 대관식을 치르기로 결심하였다!
stage_intro_1308=프랑스는 만신창이가 되었지만, 하루도 왕이 없어서는 안 되었다. 샤를 왕세자는 랭스로 가서 왕으로 대관식을 치르기로 결정했고, 에드워드 3세는 파리와 랭스 사이의 도로를 차단하여 대관식을 저지하기로 하였다.
stage_intro_1309=모롱 전투 이후 브르타뉴 계승자들 사이에는 오랫동안 휴전하였지만, 양측은 영국과 프랑스의 지원 아래 오랫동안 힘을 축적해 왔으며, 그들은 모두 결전의 준비를 하고 있었다.
stage_intro_1310=1369년 10월, 고급 귀족이 아닌 베르트랑은 샤를 5세에 의해 새 육군 통수권자로 임명되었는데, 관례를 깬 이 행동은 결국 프랑스 왕에게 보답을 가져다주었다! 겨울이 다가옴에 따라 영국군 내부에서는 어떻게 겨울을 지낼 것인가에 대한 논쟁이 다시 일어났다. 프랑스 군대는 이 기회를 틈타 영국군을 향해 공격을 개시하였다.
stage_intro_1311=1372년, 카스티야 왕은 1368년에 결성된 프랑스-카스티야 동맹 협약에 따라 프랑스군을 돕기 위해 아키텐으로 함대를 파견하였다. 함대는 라 로셸 외해에서 프랑스로 향하던 잉글랜드 함대와 만났다.
stage_intro_1312=만년의 에드워드 3세는 전쟁할 마음이 없었다. 흑태자 에드워드의 죽음으로 그는 자신감을 잃게 되었다. 그의 또 다른 아들 곤트의 존은 사령관이 되었지만, 프랑스에서 여러 차례 약탈하여 프랑스 민중에게 큰 피해를 가져다주었다.
stage_intro_1401=샤를 6세는 이미 미친 왕이 되었고, 왕실 간의 투쟁은 갈수록 더욱 심해졌다. 프랑스의 불안정한 국정은 젊은 헨리 5세에게 기회를 주었다. 1415년에 헨리 5세는 그의 증조부의 진격로를 따라 프랑스를 정복하고, 양국의 왕이 되기로 결정하였다.
stage_intro_1402=헨리 5세가 프랑스에서 거둔 승리는 영국에게 실질적인 이익을 가져다주지 못했고, 의회가 제공하는 지원도 점점 줄어들자 그는 루앙을 점령하여 더 많은 프랑스 영지를 탈취하기로 결정했다.
stage_intro_1403=양 세력의 투쟁은 프랑스를 완전히 분열시켰고, 용맹공 장이 암살당하게 되자 부르고뉴 공국은 완전히 영국 쪽으로 기울어졌다. 게다가 <트루아 조약>의 체결로 헨리 5세는 명목상 프랑스의 왕위 후계자가 되었다. 이때 샤를 왕세자는 스코틀랜드의 지원을 받게 되면서 대전은 의도치 않게 촉발되었다.
stage_intro_1404=샤를 왕세자는 보제 전투의 승리로 매우 기뻐했고, 프랑스 귀족들은 승세를 몰아 잃었던 국토를 더 많이 되찾으려고 한다. 그러나 헨리 5세는 새로운 공격을 계획하고 있다.
stage_intro_1405=헨리 5세와 샤를 6세는 죽은 지 2년이 지났고, 샤를 7세는 아직 대관식을 치르지 않았으며, 헨리 6세는 아직 어리기 때문에 베드퍼드 공작이 섭정하고 있다. 2년 동안 서로 승패가 엇갈리면서 모두 상대의 주력 부대를 단번에 섬멸하려고 기회를 노리고 있다.
stage_intro_1406=영국군의 신속하고 맹렬한 공세에 비해 프랑스 정부의 대응은 매우 둔하고, 전투 자금이 부족하고, 귀족들은 각자 자기 멋대로 일을 처리하여 승리의 저울은 결국 프랑스 쪽으로 기울지 않았다. 게다가 연속적인 타격은 샤를 7세를 거의 절망에 빠뜨렸다.
stage_intro_1407=오를레앙이 영국군에게 공략당한다면 프랑스 중부의 마지막 장벽이 무너질 것이다. 이는 샤를 7세의 가장 암울한 시기지만, 신은 이 위태로운 나라에 한 줄기 빛을 하사하였는데, 잔 다르크라는 소녀가 나섰다.
stage_intro_1408=오를레앙이 포위를 성공적으로 뚫었다는 소식은 프랑스 전역을 진작시켰다. 프랑스군은 잔 다르크의 격려로 전쟁 준비를 강화하여 루아르 계곡의 모든 영국군 거점을 제거할 준비를 하고 있다.
stage_intro_1409=잔 다르크는 샤를 7세가 노르망디 침공 계획을 포기하고, 랭스로 가서 대관식을 치름으로써 영국군의 사기를 더욱 약화시키기를 바랐다. 영국군은 후스 전쟁을 지원하던 정예병을 집결하여 저격하러 왔다.
stage_intro_1410=지원이 부족했기 때문에 잔 다르크는 콩피에뉴 전투에서 포로가 되었고, 2년 후에 사망하였다. 이는 그녀의 전우들의 복수를 불러일으켰고, 심지어 프랑스 하층민들마저 이 전투에 참여하게 되었다.
stage_intro_1411=1435년, 섭정왕 베드퍼드 공작의 죽음으로 영국은 부르고뉴 공국이라는 동맹을 잃게 되었고, 노르망디의 영지가 혼란 상태에 빠지게 되자 샤를 7세는 이 틈을 타서 파리를 수복하기로 결정하였다.
stage_intro_1412=1435-1436년 사이 대프랑스 전쟁에서 엄청난 대가를 치렀지만, 영국은 여전히 부르고뉴와 우호 관계를 맺으려고 하지 않았다. 그러므로 부르고뉴 공작은 영국에 맞서 칼레를 공략하기로 하였다.
stage_intro_1413=프랑스는 샤를 7세의 지배로 크게 회복된 반면, 영국인은 프랑스에서 노르망디와 기옌-가스코뉴 지역의 영지밖에 남지 않았다. 이에 잉글랜드는 본토로부터 많은 병력을 보내 배수진을 치기로 하였다.
stage_intro_4001=아틸라는 로마에서 인질로 잡혀 좋은 교육을 받았다. 부족으로 돌아간 후, 그는 강력한 부족을 더 넓은 땅으로 이끌어 갔다.
stage_intro_4003=비잔티움은 아틸라가 공격을 멈추게 하기 위해 공물을 바치기로 하였지만, 이탈리아는 만족하기는커녕 욕심만 더 커졌다. 아틸라의 군대는 길을 따라 불태우고 약탈했는데, 그는 당시 사람들에게 '신의 채찍'이라고 불렸다.
stage_intro_4005=발칸 반도를 휩쓴 훈족의 기병은 콘스탄티노플을 포위 공격했지만, 두 겹의 성벽은 결코 쉽게 무너지지 않았다.
stage_intro_4007=로마 황제의 여동생은 제국 영토의 절반을 혼수로 아틸라에게 내주려고 했다. 비록 성공하지는 못했지만, 아틸라는 로마를 침공할 핑계를 가지게 되었다.
stage_intro_4009=아틸라는 50만 명의 훈족 군대를 이끌고 라인 강을 건넌 후, 로마의 가장 강력한 장수 아에티우스와 마주쳤다. 그는 인생에서 가장 큰 참패를 당했다.
stage_intro_4011=아틸라는 포기하지 않았다. 그는 알프스 산을 넘어 직접 로마를 공격하였다. 아틸라의 군대가 어떻게 교황 레오 1세의 권유로 물러났는지는 여전히 미스터리이지만, 이로 인해 아틸라는 전설이 되었다.
stage_intro_4021=24세가 채 안 되는 벨리사리우스는 지방 총독직을 맡았다. 그의 아내와 황후는 친분이 두터웠을 뿐 아니라 병사 인솔 능력도 뛰어났다.
stage_intro_4023=벨리사리우스는 니카 봉기 때의 표현으로 유스티니아누스 1세의 두터운 신임을 얻었다. 제국의 더 높은 영예를 위해 벨리사리우스는 황제의 명령을 받아들여 카르타고로 출발했다.
stage_intro_4025=반달족이 정복당한 후, 벨리사리우스의 목표는 백 년 동안 함락된 로마밖에 남지 않았다. 그는 로마를 제국의 품으로 되돌리기로 마음먹었다.
stage_intro_4027=유스티니아누스 1세는 황후의 권유로 벨리사리우스에 대한 불신이 커졌다. 그러므로 벨리사리우스는 아주 적은 병사와 보급품으로 제국이 잃어버렸던 땅을 되찾을 수밖에 없었다.
stage_intro_4029=이탈리아가 비잔티움의 영토로 복귀된 후, 벨리사리우스에 대한 황제의 경계심은 더욱 커졌다. 유스티니아누스 1세는 그를 제국의 정치 중심지에 접근하지 못하도록 그에게 다시 사산 제국을 공격하라는 명령을 내렸다.
stage_intro_4031=동고트족은 로마와 이탈리아 대부분의 땅을 다시 점령했다. 벨리사리우스는 황제의 시기심에 시달린 채 다시 적은 수의 부대를 이끌고 잃어버린 땅을 되찾기 위해 싸우러 갈 수밖에 없었다. 최종적으로 군신 벨리사리우스는 병에 걸려 쓸쓸하고 암울하게 죽었다.
stage_intro_4041=로마의 쇠퇴로 그들은 더 이상 자신들의 영토를 방어할 수 없게 되었고, 색슨족은 부상하여 브리튼을 침공하였다. 아서와 그의 기사들은 백성들을 구출한 유일한 부대였다.
stage_intro_4043=아서는 그의 기사들을 데리고 해안의 색슨 거점을 격파하기 시작했는데, 파죽지세의 공세는 그들이 마치 마법을 가지고 있는 것처럼 보이게 하였다.
stage_intro_4045=아서는 건장하지만 부드럽고 점잖았다. 그와 그의 부하 원탁의 기사들은 용맹하여 켈트족과 웨일스족에게 희망을 가져다주었고, 국민들의 지지를 받아 왕으로 되었다.
stage_intro_4047=란슬롯, 가웨인, 지레인트 등 원탁의 기사들은 아서 왕을 뒤쫓아 출정하였지만, 란슬롯과 왕비 귀네비어의 스캔들이 퍼졌고, 아서는 귀네비어를 믿었다.
stage_intro_4049=색슨족은 병력을 모아 아서 왕과 마지막 승부를 겨루기로 하였다. 아서 왕도 그의 기사 150여 명과 지역 저항군을 이끌고 전장에 도착하였다.
stage_intro_4051=기사 모드레드가 아서 왕이 프랑스에 간 틈을 타 제위를 찬탈하자, 아서 왕은 브리튼으로 돌아가 모드레드와 전투를 벌였다. 양쪽은 모두 큰 피해를 보았으며, 아서 왕은 많은 전설을 남긴 채 조용히 떠나버렸다.
stage_intro_4061=랑고바르드 왕국이 로마에 군대를 집결시키자 교황은 샤를마뉴에게 급히 구원을 요청했다. 샤를마뉴는 군대를 여러 갈래로 나누어 랑고바르드 왕국을 기습하기로 하였다.
stage_intro_4063=샤를마뉴는 야만족을 왕국의 영토에 귀속시키고, 교리를 전파하기 위해 작센 지역을 정복하기로 하였다. 이곳의 여러 민족은 민풍이 용맹스러워서 결코 쉽게 굴복시킬 수 없다.
stage_intro_4065=북쪽뿐만 아니라 서쪽의 안달루스 왕국도 샤를마뉴가 정복하기를 바랐던 강역이었다. 샤를마뉴의 군대는 이곳에서 매복을 당했고, 그의 부하인 성기사 롤랑이 희생되었다.
stage_intro_4067=샤를마뉴는 많은 교회를 세워 작센인들에게 종교를 강요했다. 그러나 샤를마뉴는 작센에서 일어난 반란에 분노를 참지 못했으며, 모든 것을 끝내기 위해 다시 많은 군대를 파견하였다.
stage_intro_4069=제국의 강역은 끊임없이 넓어졌다. 서쪽의 브르타뉴 지역에 대한 징벌적인 전쟁뿐만 아니라 샤를마뉴는 동쪽의 바이에른도 정복했다.
stage_intro_4071=서기 800년 성탄절에 샤를마뉴는 산피에트로 대성당에서 '로마인의 황제'로 대관식을 치렀다. 그 후, 샤를마뉴는 동쪽의 비잔티움, 보헤미아, 슬라브, 덴마크를 정복하여 제국의 강역을 정점에 이르게 하였다.
stage_intro_4241=바이킹이 폭풍처럼 브리튼을 휘몰아쳤다. 이 흉포한 폭풍은 엄청난 재산과 생명을 빼앗아 갔다. 브리튼은 그 광란을 이겨낼 수 있는 영웅이 절실히 필요했다.
stage_intro_4243=레딩 전투의 패배는 결코 투지를 꺾지 못했다. 알프레드는 이전 패전의 경험을 살려 방패벽 전술을 이용하여 악랄한 바이킹을 격파하였다.
stage_intro_4245=노련한 바이킹의 새 지도자 구슬런은 기습의 방식으로 알프레드의 궁정을 공격해 대량의 보급을 얻었다. 이는 알프레드를 궁지에 몰아넣었다.
stage_intro_4247=수개월 후 알프레드는 다시 부대를 소집하고, 각 지방의 군대를 집결시켜 바이킹 주력에 대한 복수를 가하였다. 에딩턴에서 십자가와 망치의 결전은 일촉즉발의 상황으로 치달았다.
stage_intro_4249=알프레드는 바이킹 롱십의 장점을 참고해 신형 전함을 만들었고, 잉글랜드 역사상 최초로 정규 해군을 창설하였다. 잉글랜드는 그 후로 자신의 해안을 철저히 방어할 수 있게 되었다.
stage_intro_4251=서기 892년, 바이킹 군대가 다시 잉글랜드를 공격했지만, 이번에는 견고한 성을 마주치게 되었다. 알프레드 대왕은 집정 기간에 법전을 반포하고, 학교를 설립하여 잉글랜드 통일의 기초를 닦았다.
stage_intro_4261=키예프 루스의 지도자 이고리는 군대를 이끌고 콘스탄티노플을 공격하였다. 그들은 예로부터 바다에서 이 거대한 도시를 공격해 왔으나, 불을 뿜는 군선에 의해 돌아올 수 없게 되었다.
stage_intro_4263=키예프 루스의 실패로 그들에게 귀순한 부족이 기회를 노리기 시작하였다. 드레블랴족의 우두머리 몰은 방심하던 이고리를 기습하여 그를 죽였지만, 자신에게 치명적인 재난을 가져왔다.
stage_intro_4265=이고리의 미망인 올가는 거짓으로 몰에게 시집가기로 했고, 몰은 그녀의 말을 믿어 올가를 맞이했다. 결혼식이 가장 시끌벅적할 때 올가는 결혼식을 피로 씻으라고 명령하였다.
stage_intro_4267=올가는 다른 드레블랴족을 그냥 두지 않았다. 그녀는 그들의 집을 불태우고 대군을 이끌고 이스코로스텐성을 점령하였다.
stage_intro_4269=올가는 세례를 받고 정교회로 개종하였고, 정교회를 키예프 대공국으로 도입했지만, 토르를 믿는 바이킹들은 이를 받아들이지 않았다. 그녀의 아들 스뱌토슬라프는 비잔티움을 침공하였다.
stage_intro_4271=올가는 키예프 대공국에 정교회의 씨를 심었으며, 돌을 이용하여 키예프와 노브고로드 등 대도시를 건설하였다. 그리하여 키예프 루스는 부족에서 왕국으로 변신하였다. 수백년 후, 그녀는 '성인'으로 봉해졌다.
stage_intro_4361=샤를마뉴가 죽은 후, 프랑크 왕국은 세 개의 왕국으로 분열되었고, 서기 936년에 동프랑크 왕국에 있던 오토가 작센 공작과 독일 왕으로 대관식을 치렀다. 그러나 그는 독일을 통일하기 위해 우선 반란을 평정해야 했다.
stage_intro_4363=이복형제 헨리는 바이에른 공작에게 현혹되어 반란을 일으켰고, 관대한 오토 1세는 그들을 격파한 후 그들의 죽을죄를 면하였지만, 그들은 정신을 차리지 못하였다.
stage_intro_4365=오토는 새 아내와 아이를 낳은 후, 장남 루돌프의 왕위 계승권을 박탈하였다. 이로 인하여 독일 왕국은 다시 내전에 빠졌다. 심지어 루돌프는 마자르족까지 요청하여 그의 아버지를 공격했다.
stage_intro_4367=헝가리의 마자르족은 독일의 내전을 틈타 서기 954년에 유럽을 대규모로 침공하자, 오토 1세는 내전을 중지하고 그들을 막으려 했다.
stage_intro_4369=서기 955년, 마자르족의 주력과 독일의 주력이 레흐펠트에서 마주쳤다. 이는 생사의 결전이며, 패배한 측은 역사에서 물러나게 될 것이다.
stage_intro_4371=서기 961년, 교황은 오토 1세에게 지원을 요청했고, 오토는 1,000명의 기병으로 이탈리아 왕국을 격파한 후, 로마에서 신성 로마 제국의 황제로 대관식을 치렀다.
stage_intro_4281=하랄 블로탄 왕의 손자이자 덴마크 왕 스벤의 아들인 크누트는 10,000명의 병사와 200척의 롱십을 이끌고 스칸디나비아에서 영국으로 진군하였다. 그는 그곳에서 왕국을 세울 생각이다.
stage_intro_4283=잉글랜드 왕 에드먼드의 매제인 '탐욕자' 이드릭이 잉글랜드인들을 배신하고, 크누트에게 항복하였다. 이로 인하여 에드먼드는 정면전을 피했고, 서로 쫓고 쫓기는 접전 과정에서 서로 승패가 났다.
stage_intro_4285=크누트는 세 번이나 런던을 침공하려고 시도했지만, 이리저리 밀고 당기는 일진일퇴의 과정에서 덴마크군은 많은 소모가 생긴 반면, 에드먼드는 윌세스로부터 새로운 군대를 얻었고, 이드릭은 다시 잉글랜드 진영으로 복귀하였다.
stage_intro_4287=크누트는 바다로 돌아가기로 했지만, 앞길이 에드먼드에게 막혔다. 덴마크군은 병력이 약해진 상황에서 막강한 전투력을 발휘하였다. '탐욕자' 이드릭의 또 한 차례의 배신으로 크누트는 패배를 승리로 바꾸었다.
stage_intro_4289='용감한 자' 에드먼드가 얼마 후 부상으로 사망하자 크누트가 영국 왕위를 차지했다. 그 후 그의 형제 하랄드 2세가 덴마크에서 사망하자, 그는 잉글랜드인을 이끌고 마땅히 자신에게 속하는 덴마크의 왕위를 쟁탈하러 떠났다.
stage_intro_4291=기세가 하늘을 찌를 듯한 크누트 대왕은 군대를 파견하여 노르웨이와 스웨덴, 심지어 스코틀랜드와 아일랜드 왕까지도 자신에게 신복시키려고 하였다. 이때부터 크누트 대왕은 발트해에서 아일랜드에 이르는 북해 제국을 건립하였다.
stage_intro_4301=페르난도 1세 국왕이 죽자 세 아들과 두 딸에게 영지를 나누어 주었다. 장남 산초는 무어인들이 '엘 시드'라고 부르는 용맹한 로드리고의 보좌 아래 다른 형제들을 상대로 전쟁을 벌였다.
stage_intro_4303=비록 신속하게 형제들을 격파했지만, 산초는 뜻밖에 죽었고, 그의 동생은 알폰소 6세로 대관식을 치렀다. 그러므로 엘 시드는 어쩔 수 없이 그에게 충성할 수밖에 없었다. 그러나 알폰소 6세는 그의 높은 공적을 매우 두려워했다.
stage_intro_4305=엘 시드는 잘못으로 인해 알폰소 6세에게 유배되었지만, 엘 시드의 명성으로 다른 종교의 여러 부대가 그의 진영에 가입하였다. 그는 이 부대를 이끌고 사라고사의 군주 무타만에게 충성하여 많은 승리를 거두었다.
stage_intro_4307=알폰소 6세는 국토를 이베리아 반도 전체로 확장하려 했으나 잘라카 전투에서 실패했다. 이때 그는 엘 시드가 생각나 엘 시드를 사면했고, 엘 시드는 옛 주인에게 다시 돌아갔다.
stage_intro_4309=엘 시드는 구원이 늦었다는 이유로 알폰소 6세에게 봉토를 몰수당하고 처자가 구금당했다. 이 때문에 엘 시드는 자신의 영지를 일부를 되찾기로 결심했다. 엘 시드는 발렌시아에서 명성이 정점에 이르렀다.
stage_intro_4311=무라비트 왕조의 지배자 유수프는 이베리아를 탈환하려고 했지만, 발렌시아에서 오랫동안 승리를 거두지 못하였다. 그의 병사는 군신 엘 시드를 몹시 두려워했다. 심지어 엘 시드가 화살을 맞아 중상을 입었더라도 그가 말 위에 올라타기만 하면 모든 병사가 두려워했다.
stage_intro_4381=마틸다는 스코틀랜드 왕족, 노르만 귀족, 웨식스 귀족의 피를 가지고 고귀하게 태어났다. 그녀는 아주 어린 나이에 헨리 1세에 의해 신성 로마 제국의 왕 헨리 5세와 결혼하여 로마의 황후로 대관식을 치렀다.
stage_intro_4383=마틸다는 23살 때 남편이 죽어서 어쩔 수 없이 고향 노르망디로 돌아갔다. 1120년 백선 침몰사고 이후 잉글랜드의 왕위 계승은 갈피를 잡을 수 없게 되었다. 마틸다는 1127년에 앙주 백작 조프루아와 재혼했다.
stage_intro_4385=1135년 헨리 1세가 죽은 후, 잉글랜드의 왕좌는 비어 있었다. 상속권을 가진 장녀 마틸다와 그녀의 남편 조프루아는 노르망디로 돌아와 기회를 틈타 반란을 일으킨 노르만 귀족들을 처벌하기로 결정했다.
stage_intro_4387=마틸다의 사촌인 스티븐은 노르만 귀족들의 지지를 얻어 잉글랜드에서 왕위에 올랐고, 글로스터의 로버트는 그의 여동생을 지지하여 스코틀랜드에서 봉기를 일으켜 내전이 시작되었다.
stage_intro_4389=스티븐은 마틸다 황후가 있는 성을 포위 공격했고, 로버트의 구원도 신속하게 도착하여 스티븐을 포로로 잡았다. 1141년 부활절 이후, 마틸다 황후는 잉글랜드의 실질적인 권력자가 되었다.
stage_intro_4391=스티븐과 다른 귀족들은 마틸다가 대관식을 치르기 전에 반란을 일으켰다. 마틸다는 윈체스터에서 패배하여 노르망디로 돌아갔고, 잉글랜드의 왕위는 결국 그녀의 아들 헨리 2세가 되찾았다.
stage_intro_4081=장기 왕조는 누르 앗딘의 부친인 장기의 노력으로 규모가 점차 커졌다. 장기가 암살된 후, 안티오키아 공작은 이 혼란스러운 상황에서 알레포를 점령하려 했다.
stage_intro_4083=에데사 백국은 알레포가 안티오키아 공국에게 공격당했다는 것을 알고 잃어버린 영토를 되찾으려 했다. 이 소식을 들은 누르 앗딘은 부대를 이끌고 신속하게 에데사로 가서 구원을 제공하였다.
stage_intro_4085=장기 왕조는 누르 앗딘의 노력으로 점차 번영하게 되었다. 누르 앗딘은 북부 시리아에서 자신의 영토를 넓히기로 결심하였다. 이런 상황에서 안티오키아와 에데사 사이의 길목을 차단하는 것은 순리가 되었다.
stage_intro_4087=다마스쿠스의 영주 우누르가 병사하자 누르 앗딘이나 예루살렘 왕국 등 주변 세력은 모두 다마스쿠스를 얻으려고 했다.
stage_intro_4089=시리아에서 누르 앗딘의 일련의 활동은 기독교 국가들을 또 다시 뒤흔들었다. 이러한 이유로 서방 국가들은 제2차 십자군 전쟁을 일으켰다. 하지만 이번 원정은 누르 앗딘의 존재로 처음처럼 순조로울 수 없게 되었다.
stage_intro_4091=십자군이 이집트를 점령하러 갔을 때, 누르 앗딘은 망설임 없이 자신의 고위 장군을 보내어 지원했고, 젊은 살라딘도 함께 갔다. 성왕 누르 앗딘은 그 직후에 병사했고, 장기 제국도 멸망했다.
stage_intro_4101=교황 에우제니오 3세는 로마에서 일어난 봉기로 인하여 어쩔 수 없이 프리드리히 1세에게 구원을 요청하였다. 이는 신성 로마 제국의 황제로서 당연히 해야 할 일이었다.
stage_intro_4103=폴란드 공작 볼레스와프 4세가 조공 납부를 거부했다. 이를 참지 못한 프리드리히 1세는 군사를 보내 오데르 강을 건너 폴란드를 침공하기로 하였다.
stage_intro_4105=프리드리히 1세가 이탈리아에서 행한 피비린내 나는 폭정에 이탈리아 민중들은 분노했고, 베네치아와 베로나 등 도시 국가들은 '롬바르디아 동맹'을 결성하여 함께 황제의 통치에 대항하였다.
stage_intro_4107=프리드리히 1세의 봉신 '사자공' 하인리히가 이탈리아 출병을 거부하자, 프리드리히 1세는 분노를 참지 못하고 헨리를 정벌하기 위해 출병하기로 하였다.
stage_intro_4109=사자심왕 리처드와 '여우' 필리프 2세, 프리드리히 1세는 세 갈래로 나뉘어 예루살렘으로 진군하여 제3차 십자군 전쟁을 일으켰다. 신성 로마 제국의 군대는 비잔티움을 지나면서 현지 군대와 전투를 벌였다.
stage_intro_4111=아나톨리아 고원을 지날 때, 원정군 부대는 룸 술탄의 공격을 받았는데, 이 강적은 원정 도중 가장 큰 장애였다. 프리드리히 1세가 승리를 거둔 후 뜻밖에도 물에 빠져 사망하게 되면서 이 십자군은 암울하게 후퇴하였다.
stage_intro_4121=누르 앗딘의 죽음으로 장기 왕조는 분열되었고, 이집트의 살라딘은 점차 자리를 잡아 아이유브 왕조가 탄생했다.
stage_intro_4123=살라딘은 북쪽으로 올라가 다마스쿠스를 점령하고, 홈스와 하마를 점령하여 부대를 약간 정돈한 후, 장기 왕조의 수도인 알레포를 점령하기로 하였다.
stage_intro_4125=시리아의 이슬람 세계가 통일됨에 따라 예루살렘 왕국의 상황이 위태로워졌다. 보두앵 4세는 수천 명의 군사를 이끌고 아스카론으로 가서 방어를 강화해야 했다.
stage_intro_4127=보두앵 4세는 살라딘의 보급로를 차단하고 제이콥스 포드에 성을 쌓으려 했다. 보급로를 확보하기 위해 살라딘은 성을 공격하였다.
stage_intro_4129=보두앵 4세의 죽음은 예루살렘 왕국을 혼란에 빠뜨렸고, 프랑스의 레이날드는 계약을 찢어버리고 이집트의 상대를 여러 차례 공격하였다. 대전은 더 이상 피할 수 없게 되었다.
stage_intro_4131=예루살렘 왕국의 군대는 하틴에서 전멸했고, 살라딘의 앞에는 두꺼운 성벽만 남았다. 이 인자한 왕은 여기서 쌍방의 존중을 받았으며, '아랍의 기사'라고 불렸다.
stage_intro_4141=앙주 왕가의 권력 다툼이 끊이지 않고 있으며, 점점 더 심각해지는 추세이다. 한편, 프랑스에서는 반란이 계속되어 16세의 리처드는 반란 평정에 가담하지 않을 수 없었다.
stage_intro_4143=프랑스 왕 '여우' 필리프 2세의 선동으로 부자는 또 다시 충돌했고 르망에서 전투를 벌였다.
stage_intro_4145=리처드 1세는 영국의 왕으로 대관식을 치른 후, 교황의 요청으로 제3차 십자군 전쟁을 일으키기로 하였다. '붉은 수염' 프리드리히 1세와 필리프 2세는 함께 참여하여 세 갈래로 출발하였다.
stage_intro_4147=프리드리히 1세가 뜻밖에 죽자 아크레를 함락시킨 필리프 2세는 군대를 이끌고 귀국하기로 하였다. 또한, 전투에서의 불만 때문에 리처드 1세에게 복수할 기회를 노렸다. 현재 예루살렘으로 진격하는 부대는 리처드 1세만 남았다.
stage_intro_4149=사자심왕 리처드 1세는 살라딘과 적대관계였지만 서로 존중하였기에 자주 편지를 주고받았다. 매우 용맹한 사자심왕 앞에서 동생의 왕위 찬탈이 없었더라면 예루살렘의 주인은 바뀌었을 것이다.
stage_intro_4151=리처드 1세는 프랑스 왕국과 신성 로마 제국의 미움을 사서 귀환 도중에 구금되었으며, 그의 어머니는 그를 위해 거액의 몸값을 지급하였다. 분노한 사자심왕은 필리프 2세를 공격하였고, 사자심왕도 이 때문에 화살에 맞아 죽었다.
stage_intro_4161=테무진의 재능은 그의 부족을 점차 두각을 나타나게 했고, 이는 옛 친구를 적으로 만들었다.
stage_intro_4163=테무진의 의부는 세력이 나날이 강대해지는 테무진을 두려워하게 되었다. 테무진이 복종할 수 없는 이상, 생사결단을 내려야 했다.
stage_intro_4165=1세기 전에 거의 멸족될 뻔했던 몽골인들은 지금 비할 데 없이 강성해졌다. 하지만 초원의 패자는 단 한 명이어야 했다. 테무진은 서요, 서하, 금나라와의 전쟁을 일으켰다.
stage_intro_4167=테무진은 초원을 통일한 후, '칭기즈 칸'이라고 불렸다. 이제 그의 시선은 서방의 광활한 땅으로 향했다. 칭기즈 칸은 4갈래로 나뉘어 20만 대군을 이끌고 서역으로 진군하였다.
stage_intro_4169=1227년, 칭기즈 칸이 전쟁 도중에 사망했지만, 그의 정신은 계승되었고, 몽골 제국의 강역은 더 넓어졌다.
stage_intro_4171=칭기즈 칸의 유지를 받들어 몽골 제국은 3차 서정을 일으켰다. 그들은 아바스 왕조와 아이유브 왕조의 기병과 마주하게 될 것이다.
stage_intro_4181=헨리 3세의 패가망신과 비겁한 행동은 잉글랜드를 내전으로 몰아넣었고, 앙주 왕가가 위태로워졌다. 최종적으로 에드워드 왕자는 이 위험한 국면을 만회하기로 하였다.
stage_intro_4183=에드워드 왕자는 그의 군 생활을 사랑하고 사방으로 출정하기를 원했다. 루이 9세가 새로운 십자군 전쟁을 시작하자 에드워드는 잉글랜드의 번뇌를 버리고 원정에 뛰어들었다.
stage_intro_4185=1274년, 에드워드 1세는 대관식을 치렀고, 아서 왕의 전설에 심취한 그는 그레이트브리튼 왕국을 통합하기로 결정하였다. 에드워드 1세의 첫 번째 목표는 웨일스였다.
stage_intro_4187=에드워드 1세의 잔인한 웨일스 통치 때문에, 루엘린의 지휘하에 웨일스에서는 대규모 반란이 일어났다.
stage_intro_4189=웨일스를 정복한 에드워드 1세는 더 북쪽의 스코틀랜드를 목표로 삼았다. 1296년, 에드워드 1세는 장궁병과 기병대를 이끌고 스코틀랜드로 진군하였다.
stage_intro_4191=스코틀랜드의 귀족들은 에드워드 1세의 공격을 막기 위해 던바의 견고한 성을 점령했다. 에드워드 1세는 이곳에서 그들을 격파하고 스코틀랜드의 국보인 대관석을 가져갔다.
stage_intro_4201=스코틀랜드에서 잉글랜드인들의 피비린내 나는 통치에 윌리스는 자유에 대한 신념과 스코틀랜드를 독립시키려는 의지로 반항을 일으켰다.
stage_intro_4203=월리스의 반항적인 행동은 억압과 착취를 받던 스코틀랜드 사람들을 자극하였다. 월리스는 빠르게 자신의 주변에 많은 같은 생각을 가진 사람들을 모을 수 있었다.
stage_intro_4205=잉글랜드는 마침내 윌리엄 월리스를 주목하기 시작했고, 수천 명의 정규군을 파견하여 이 농민 봉기군을 섬멸하기로 결정했다.
stage_intro_4207=스털링 브릿지 전투에서 승리한 후, 월리스는 승승장구하여 더 많은 스코틀랜드 땅과 국민을 해방시키기로 결심했다. 그의 게릴라 전술은 큰 성공을 거두었다.
stage_intro_4209=윌리엄 월리스는 마침내 스코틀랜드 귀족들의 인정을 받아 스코틀랜드 호국경으로 임명되었다. 에드워드 1세는 수하의 무능함에 분노하여 직접 대군을 이끌고 윌리엄 월리스와 전투를 벌이기로 하였다.
stage_intro_4211=윌리엄 월리스는 군대를 재조직하여 공격을 감행했으나 동료들의 배신으로 포로가 되었다. 비록 월리스가 런던에서 참수당했지만, 그의 피로 더 많은 스코틀랜드인들이 각성하게 되었다.
stage_intro_4321=스코틀랜드 귀족들은 던바 전투에서 패배한 후, 에드워드 1세에게 굴복했다. 1297년, 윌리엄 월리스가 스코틀랜드에서 독립운동을 벌이자 로버트 브루스도 이에 동참했다.
stage_intro_4323=스코틀랜드 왕위의 합법적인 경쟁자 중 한 사람인 로버트 브루스는 교회에서 또 다른 경쟁자 존 코민을 죽인 후, 스콘에서 왕으로 대관식을 치렀다. 에드워드 1세는 그를 지명 수배자로 정하고, 군대를 보내 그를 추격했다.
stage_intro_4325=로버트 브루스의 아내와 딸은 포로로 잡혔고, 자신은 사방으로 떠돌아다녔다. 이듬해 로버트 브루스는 아일랜드에서 모집한 신병들을 이끌고 반격을 위해 브리튼에 상륙했다.
stage_intro_4327=로버트 브루스는 메이번스 전투에서의 패배를 경험으로 삼고, 고향의 지형을 잘 알고 있는 우세를 충분히 이용하여 영국군에 반격을 가했다.
stage_intro_4329=에드워드 1세는 로우던 힐 전투의 패배 소식을 듣고, 직접 전투를 지휘하다가 병사했다. 3년이 지나지 않아 로버트 브루스는 잉글랜드의 북부 지역을 대부분 점령했다.
stage_intro_4331=비록 스코틀랜드인의 수가 잉글랜드의 절반에 못 미치고, 장궁병과 중기병도 없었지만, 그들은 사기가 높고 적절한 전술을 사용하여 에드워드 2세를 격파했다. 이로써 잉글랜드는 더 이상 스코틀랜드의 독립을 막을 수 없게 되었다.
stage_intro_4341=브르타뉴 공작 가문에서 후계자 다툼이 일어나자 잉글랜드와 프랑스는 모두 자신의 후보자를 지원하기 위해 충돌이 심해졌고, 결국 몰레 근처에서 조우전이 벌어졌다.
stage_intro_4343=1345년, 에드워드 3세는 부대를 세 갈래로 나누어 브르타뉴와 가스코뉴로 영국군을 파견하여 공세를 펼치는 동시에 자신은 대군을 이끌고 파리를 향해 유럽 내륙으로 진군했다.
stage_intro_4345=오랜 추격 끝에 프랑스 동맹군은 크레시 근처에서 거의 지친 영국군을 따라잡았다. 잉글랜드군은 어쩔 수 없이 생사를 걸고 마지막 승부를 겨루었다.
stage_intro_4347=1355년, 가스코뉴 지역의 병력이 부족하다는 것을 감지한 에드워드 3세는 프랑스 남부에 대한 기습 소탕을 계획하였는데, 이 임무의 최적임자는 크레시 전투에서 두각을 나타낸 흑태자 에드워드였다.
stage_intro_4349=1356년, 프랑스 왕 장 2세는 가스코뉴 지역을 소탕하던 영국군을 토벌하기 위해 대군을 이끌고 출정하였다. 쌍방은 여러 차례 스쳐 지나가다가 9월 17일에 본격적으로 부닥쳤다. 이로써 백년 전쟁의 첫 번째 단계의 결전이 시작되었다.
stage_intro_4351=1367년, 영국과 프랑스가 스페인 카스티야 왕국의 내전에 개입함으로써 백년 전쟁의 제2단계인 첫 번째 대전이 시작되었다.
stage_intro_4401=총명한 보두앵은 어려서부터 강인함과 낙천적인 훌륭한 품성을 갖추었지만, 불치병인 나병에 걸렸다. 그가 아홉 살의 나이에 예루살렘 왕국의 왕으로 대관식을 치르면서 예루살렘 왕국은 위태로워졌다.
stage_intro_4403=1176년, 갓 성인이 되어 권력을 장악한 보두앵 4세는 이집트를 침공하였다. 살라딘과 암살자 조직이 싸울 때, 보두앵 4세는 살라딘을 급습하였다.
stage_intro_4405=보두앵 4세는 비잔티움 제국의 마누일 황제의 지원을 받아 바다에서 이집트를 침공했으나, 예루살렘 왕국의 파벌 분쟁으로 실패하였다.
stage_intro_4407=수많은 부대를 이끌고 아스칼론에 도착한 살라딘은 병력이 적은 보두앵 4세의 군대를 발견하고 예루살렘을 급습하기로 결정했다. 하지만 16세의 왕에 의해 목숨을 잃을 뻔할 거라고는 생각지도 못했다.
stage_intro_4409=2년 동안 양측의 싸움이 계속되면서 살라딘은 더 이상 이 어린 군주를 무시할 수 없게 되었다. 하지만 중병에 걸린 보두앵 4세는 프랑크족의 군대를 위험에 빠뜨렸다.
stage_intro_4411=국왕이 질병으로 인한 고통을 겪고 있기 때문에 예루살렘은 영토를 지키기 위해 어쩔 수 없이 방어 자세를 취해야 한다. 보두앵 4세는 살라딘의 수차례 공격을 막아낸 후 그의 생명을 소진하였다.
stage_intro_4421=스웨덴의 영주는 몽골이 루스를 침공한 틈을 타서 노브고로드 대공국으로 진군하여 영토를 빼앗으려 했다. 알렉산드르는 정예 부대를 이끌고 네바 강변에서 침범한 적들을 무찔렀다. 이 전투에서 그는 뛰어난 통솔력과 작전 정신을 보여주었기 때문에 넵스키라는 칭송을 받았다.
stage_intro_4423=네바 강 전투 후에 넵스키는 노브고로드 시민 회의의 요청으로 군대를 이끌고 십자군 기사단의 침범을 막았다. 루스 북서쪽 국경의 안전을 확보하기 위해서는 우선 프스코프 공국을 되찾아야 한다.
stage_intro_4425=프스코프를 수복하는 것은 계획의 첫 번째 단계에 불과하며, 국경 안전을 영원히 확보하기 위해서는 주동적으로 공격하는 것이 현명한 선택이다. 넵스키는 적을 무찌르기 위해 군대를 이끌고 기사단의 영지로 쳐들어갔다. 그가 파견한 정찰 부대는 하마스트에서 적의 선두 부대와 맞닥뜨렸다.
stage_intro_4427=정찰부대가 기사단의 동향을 파악하자, 넵스키는 곧 부대를 소집하여 적을 저격하기 위해 방향을 돌렸다. 양측은 페이푸스 호에서 맞닥뜨려 최종 결전을 벌였다. 이 전투는 루스의 국경에 일시적인 평화를 가져왔다.
stage_intro_4429=몽골군의 기병대가 러시아 땅을 밟았다. 넵스키의 아버지 야로슬라프 대공은 몽골의 막강한 공세로 인해 어쩔 수 없이 항복했지만, 돌아오는 도중에 사망했다. 넵스키는 동생 안드레이와 대공의 자리를 놓고 싸우기 시작했다.
stage_intro_4431=넵스키는 집권 후기에 여러 번 국내 소란을 평정하여 국가의 통일과 안정을 강력하게 유지했다. 그가 죽은 후, 루스는 급속히 서로 적대적인 여러 공국으로 분열되었다.
stage_intro_4441=노르만족의 세력이 시칠리아에서 점차 부상하면서 비잔티움 제국에 대한 위협도 커지고 있다. 결국 1081년, 양측은 발칸 서부에서 전투를 벌였다.
stage_intro_4443=디라키움 전투에서 참패한 후, 알렉시오스 1세는 신성 로마 제국에 도움을 요청했고, 신성 로마 제국의 도움으로 그는 성공적으로 노르만족의 군대를 항복시켰다.
stage_intro_4445=알렉시오스 1세의 비잔티움 황위를 노리는 '콘스탄티노스 디오예니스'라고 자칭하는 사람이 쿠만족과 연합하여 비잔티움의 북방 국경을 공격하였다.
stage_intro_4447=셀주크로부터 아나톨리아를 수복하기 위해 알렉시오스 1세는 로마 교황에게 구원을 요청했고, 교황의 호소로 제1차 십자군의 동정이 시작되었다.
stage_intro_4449=알렉시오스 1세의 숙적의 아들인 보에몽 1세는 안티오키아 공국을 세우고 비잔티움 제국을 공격했다. 2년간의 전쟁 끝에 비잔티움 제국은 승리를 거두었고, 안티오키아 공국을 종속시켰다.
stage_intro_4451=1110년 후에 알렉시오스 1세는 셀주크를 공격하기 시작하였으며, 수년간의 전쟁 끝에 소아시아 연안 지역을 수복하는 데 성공했다.
stage_intro_4461=소정방은 소년 시기 용맹하고 싸움을 잘하기로 유명했지만, 당나라 초기 때 중용되지 않았다. 630년, 당 태종 이세민이 제국 북방 변방의 위험 요소인 돌궐을 제거하라는 명령을 내리자 소정방은 이정을 따라 출사하여 출정길에 나섰고, 기습부대를 잘 사용하는 소정방은 음산 전투에서 크게 승리하여 돌궐의 지도자 일릭 카간을 생포하였다.
stage_intro_4463=655년에 신라를 지원한 후, 당 고종 이치는 또 소정방에게 서돌궐로 진군하라는 명을 내렸다. 사발락 가한은 친히 10만 기병을 거느리고 와서 맞섰으나, 예질하의 강가에서 소정방이 거느린 적은 병사들에게 뒤쪽으로 급습당한 후, 크게 패배하여 철수하였다.
stage_intro_4465=갑자기 폭설이 내려 서돌궐의 잔당은 자신의 주둔지로 도망쳤다. 사발락 가한은 당나라 군대가 더 이상 추격하지 않을 것이라고 경계심을 늦췄지만, 소정방은 계속 뒤따르다가 기습을 감행하여 서돌궐을 멸망시켰다. 그 후 실크로드가 개척되었고, 당나라는 전성기에 접어들었다.
stage_intro_4467=토번이 나날이 강성해짐에 따라 끊임없이 변경을 괴롭혀 점차 당나라 서부의 심복지환이 되었다. 659년, 당 고종은 소정방을 량주로 파견하여 토번에 대한 방어를 책임지도록 하였다. 그는 불과 천 명의 병력으로 토번의 8만 대군을 격파하고, 대장 다옌망포지를 처치하여 토번은 그 후 10여 년 동안 동진할 계획을 포기하였다.
stage_intro_4469=서돌궐의 잔존 부족 스제스진의 수장 두만이 토번에게 이간 당한 후, 다른 세 나라와 연합하여 당나라에 대한 반란을 일으켰다. 막 토번을 평정한 소정방은 1만여 명의 군사를 이끌고 밤낮으로 해발 4000-7000m에 달하는 고원을 150km 강행군하여 도만을 격파함으로써 당나라의 영토를 유례없이 넓게 확장하였다.
stage_intro_4471=사산 제국이 아랍 제국에 의해 멸망하자, 망명하고 있던 페르시아 왕자 페로즈가 당나라에 원조를 요청하였다. 당 고종은 페르시아 왕자를 맞이하기 위해 국경으로 사자를 보냈으며, 아랍 제국과 충돌이 일어났다. 660년, 당 고종은 또 다시 노장 소정방을 바다 건너로 파견하여 백제와 고구려를 격파하였다. 이는 그를 유라시아 대륙에서 당대 최강의 장수로 만들었다.
stage_intro_4501=티무르는 젊었을 때 자신의 뛰어난 능력으로 동차가타이 칸인 투글루크 티무르의 믿음을 얻어 샤흐리삽스의 지배자로 임명되었다.
stage_intro_4503=티무르는 무고한 종교 지도자를 몰래 풀어주었기 때문에 반란으로 모함받아 어쩔 수 없이 망명하였다. 그는 당시 아프가니스탄 남부로 도망쳐 인척 관계에 있는 형제인 후사인을 찾아갔다.
stage_intro_4505=동차가타이의 칸 투글루크 티무르가 서거한 후, 티무르는 군사를 일으켜 트란스옥시아나의 총독 일리아스 호자를 격파하고, 샤흐리삽스의 통제권을 다시 얻었다.
stage_intro_4507=세력이 점차 확고해지자 티무르와 후사인 사이에 갈등이 생겼으며, 관계가 점점 악화하였다. 후사인은 티무르를 제거하려고 여러 번 시도했고, 티무르도 여러 번 반격을 가했다. 수년간의 공방전 끝에 티무르가 최종적인 승리를 거두었다.
stage_intro_4509=후사인을 격파한 후, 티무르는 서차가타이의 군권을 완전히 장악하고, 괴뢰 술탄을 옹립하였다. 후세 사람들은 이를 티무르 칸국 수립의 상징으로 여긴다.
stage_intro_4511=동차가타이 칸국은 수년간의 쿠데타로 혼란스러운 국면을 겪은 후, 최종적으로 카마르 웃딘이 왕위를 계승하였다. 그는 왕위를 계승한 후, 티무르 칸국의 국경을 여러 차례 습격하였는데, 결국 티무르가 22년간의 전쟁 끝에 그를 멸망시켰다.
stage_intro_4513=킵차크 칸국의 토크타미시 칸과 티무르는 모두 페르시아 지역에 대한 야심을 가지고 있었기 때문에 양측의 마찰과 충돌은 곧 양국의 전쟁으로 번지게 되었다. 티무르는 두 번의 원정으로 킵차크 칸국에 큰 타격을 입혔다.
stage_intro_4515=건국 10년 후, 티무르는 서쪽 원정을 일으켰는데, 그 중 첫 번째 목표는 호라산에 위차한 카르트 왕조였다. 내부의 분쟁으로 티무르는 그들을 쉽게 격파하였다.
stage_intro_4517=티무르의 서정의 마지막 목표는 조지아 왕국이었다. 그는 이곳을 정복한 후, 기존의 정권을 유지하였는데, 이는 이후 수차례의 반란의 원인이 되었다.
stage_intro_4519=티무르는 부유한 북인도 지역을 약탈하기 위해 인도 델리 술탄 왕조가 이교도를 너무 너그럽게 받아들인다는 핑계로 군사를 일으켜 인도를 정벌하였다.
stage_intro_4521=1399년 맘루크의 새 술탄 파라즈가 티무르 칸국을 종주국으로 인정하지 않고, 티무르의 적을 넘겨주지 않자 티무르는 잔뜩 화가 치밀었다.
stage_intro_4523=오스만 제국은 티무르 칸국과 함께 중동 지역에 존재했던 또 다른 강력한 제국이다. 양측의 끊임없는 확장은 결국 충돌과 대규모 전쟁으로 이어졌다.
stage_intro_4541=요안니스 1세 치미스키스는 아르메니아의 군사 귀족 가문에서 태어났는데, 그의 외삼촌은 비잔티움의 명장 니키포로스 포카스이다. 그는 일찍부터 외삼촌을 따라 함께 출정했고, 20살 초반에 사모사타 전투에서 두각을 나타냈다.
stage_intro_4543=963년, 니키포로스 포카스는 황제가 병사한 틈을 타 제위를 차지했다. 969년, 요안니스 1세는 황후 세파노와 함께 니키포로스를 암살하고 스스로 왕위에 올랐다. 니키포로스의 조카 바르다스 포카스는 삼촌의 원수를 갚기 위해 반란을 일으키려 했으나 곧 요안니스 1세에 의해 진압되었다.
stage_intro_4545=970년, 루스 대공 스뱌토슬라프는 군대를 이끌고 비잔티움 제국 북부를 침공하기 시작했지만, 이때 요안니스 1세는 포카스 가문과의 내전 중이었기 때문에 지원할 겨를이 없었다. 트라키아 지역 방어 임무를 맡은 장군은 그의 심복인 바르다스 스클리로스였다.
stage_intro_4547=971년, 스뱌토슬라프는 3만 군대를 이끌고 다시 남하하여 비잔티움 제국의 국경을 침공했다. 요안니스 1세는 국내 내란 문제를 해결한 후, 정예 부대를 이끌고 그와 맞섰다. 여러 차례의 격전 끝에 스뱌토슬라프는 도로스톨론에서 요안니스 1세에게 포위되었다.
stage_intro_4549=972년, 루스와의 전쟁을 끝낸 후, 요안니스 1세는 동쪽으로 눈길을 돌렸다. 처음에는 비잔티움 측이 어느 정도 성과를 거두었으나, 모술 토후국과의 전투에서 동부 전투 구역의 장군 밀리아스가 패전하여 포로가 되면서 이번 토벌은 종결되었다.
stage_intro_4551=974년, 요안니스 1세는 제2차, 제3차 원정을 감행하여 모술 토후국을 완전히 격파하고 그들을 굴복시켰다. 그 기간에 요안니스 1세는 계속 동진하여 유프라테스 강 중류 서쪽 지역을 모두 차지했고, 다마스쿠스와 트리폴리 등 도시를 점령하였다.


