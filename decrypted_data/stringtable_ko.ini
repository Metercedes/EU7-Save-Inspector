general_desc_Edward the Black Prince1=에드워드는 늘 검은 갑옷을 입어 적군을 위협하였다. 백년전쟁 당시 이 검은 갑옷은 프랑스 지휘관들이 가장 보고 싶지 않은 옷차림이었다.
general_desc_Su Dingfang1=소정방은 평생 북쪽으로는 동돌궐과 싸우고, 서쪽으로는 돌궐을 멸망시키고, 동쪽으로는 백제를 평정하고, 남쪽으로는 토번을 진압하였다. 일흔의 나이에도 여전히 전장을 누비며, 당나라의 명장으로서 명성을 떨쳤다.

