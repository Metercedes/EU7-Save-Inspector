stage_intro_4701=Khalid war ein herausragender arabischer Feldherr im 7. Jahrhundert n. Chr., der den Titel „Sayf Allah“ erhielt, nachdem er Mohammed gefolgt war.
stage_intro_4703=Im Jahr 633 kam es unter Mohammeds Nachfolger, dem Rashidun-Kalifat, zu Grenzkonflikten mit dem Sasaniden-Perserreich und Khalid erhielt den Befehl zum Angriff. Die Schlacht wird auch „Kettenschlacht“ genannt, da die persische Armee die Kavallerie mit Ketten verband.
stage_intro_4705=Die Niederlage in der Kettenschlacht hinderte das Sassanidenreich daran, den Feind auf die leichte Schulter zu nehmen und schickte zwei große Armeen mit dem Versuch, Khalid auf einen Schlag zu vernichten. Doch Khalid umzingelte eine der beiden Armeen, bevor sie sich treffen konnten und erlangte auf dem Schlachtfeld die Initiative.
stage_intro_4707=Im Jahr 634 erhielt Khalid, der eine Reihe von Schlachten gewonnen hatte, den Befehl, sich zurückzuziehen und seinen Marsch nach Westen zu richten. Sein neuer Gegner war Heraklius, der als aufstrebender Herrscher des Byzantinischen Reiches bekannt war.
stage_intro_4709=Im Jahr 636 stellte der zuvor besiegte Heraklius eine große Armee wieder zusammen und näherte sich Syrien. Khalid führte seine Truppen in die Schlacht. Die beiden Seiten lieferten sich eine brutale sechstägige Schlacht in der Nähe des Yarmouk-Flusses.
stage_intro_4711=Nach dem Sieg bei Yarmouk nutzte Khalid die Situation aus und es gelang ihm, die Militärstadt Aleppo zu umzingeln und zu besetzen, was die völlige Niederlage von Heraklius' Expedition bedeutete.

