troop_prop_desc_1=HP: Lebenspunkte der Truppe
troop_prop_desc_2=Bevölkerungskosten: Erhöht den Truppenzähler um die angegebenen Punkte. Bei Überschreiten des maximalen Truppenlimits kommt es zu Steuereinbußen.
troop_prop_desc_3=Schaden: Gibt den maximalen und minimalen Schaden der Truppe an.
troop_prop_desc_4=Verteidigung: Reduziert den erlittenen Schaden.
troop_prop_desc_5=Ansturm: Chance, beim Angriff gleichzeitig jede Truppe der feindlichen Einheit anzugreifen.
troop_prop_desc_6=Schildblock: Chance, dass eine Defensivinfanterie-Truppe beim Gegenangriff nachfolgende Truppen derselben Einheit vor Schaden schützt.
troop_prop_desc_7=Ausweichen: Chance, Fernkampfangriffen auszuweichen.
troop_prop_desc_8=Mobilität: Angriff und Bewegung der Einheiten kosten Mobilität.
troop_prop_desc_9=Zangenangriff: Chance, beim Angriff gleichzeitig der ersten und letzten Truppe einer Einheit Schaden zuzufügen.

