skill_desc_52101=Verbraucht 3 Mobilität und gewährt einer verbündeten Legion zufällig einen der folgenden Buffs: Mobilität {0}+3{1}; Moral {0}+15{1}; Zugefügter Schaden {0}+15%{1}; Erlittener Schaden um {0}15%{1} reduziert. Hält {0}1{1} Runden an
skill_desc_52111=Nach der Eliminierung einer feindlichen Legion erhöht sich der Zugefügter Schaden {0}10%{1}; hält {0}2{1} Runden an. {0}Der Effekt ist stapelbar und wird jeweils unabhängig berechnet{1}.
skill_desc_52121=Nach der Eliminierung einer feindlichen Legion wird die Moral von Feinden, die sich im unmittelbaren Umfeld um das Ziel befinden, um {0}-5{1} gesenkt.
skill_desc_52122=Nach der Eliminierung einer feindlichen Legion wird die Moral von Feinden, die sich im unmittelbaren Umfeld um das Ziel befinden, um {0}-10{1} gesenkt.
skill_desc_52131=Mobilität {0}+3{1} für alle verbündeten Legionen auf dem Schlachtfeld, wobei die eigene Legion sowie verbündete Legionen im unmittelbaren Umfeld den doppelten Omni-Aura-Effekt erhalten; 1 Runde lang wirksam; Abklingzeit beträgt {0}2{1} Runden.
skill_desc_52141=Für jede Kavallerie-Einheit in der Legion erhöht sich am Anfang der Runde die Mobilität um {0}+2{1}.
skill_desc_52151=Omni-Aura: Bei allen befreundeten Legionen auf dem Schlachtfeld wird nach einem aktiven Angriff wird bei jeder Kavallerie-Einheit {0}8%{1} der Truppenstärke wiederhergestellt.
skill_desc_52161=Omni-Aura: Bei allen befreundeten Legionen auf dem Schlachtfeld erhöht sich für jede Kavallerie-Einheit der verursachte Schaden um {0}8%{1}.
skill_desc_52171=Omni-Aura: Bei allen befreundeten Legionen auf dem Schlachtfeld wird für jede Kavallerie-Einheit der erlittene Schaden um {0}8%{1} reduziert.
skill_desc_52181=Fügt umstehenden Feinden Schaden zu. Für jeden geschädigten Feind wird erlittener Schaden um {0}10%{1} reduziert; Abklingzeit beträgt 3 Runden.
skill_desc_52191=Im Zustand Hohe Moral wird erlittener Schaden um {0}15%{1} reduziert.
skill_desc_52192=Im Zustand Hohe Moral wird erlittener Schaden um {0}30%{1} reduziert.
skill_desc_52201=Nach der Eliminierung einer feindlichen Legion erhöht sich die eigene Moral um {0}+10{1}.
skill_desc_52211=Macht das Ziel sowie {0}2{1} zufällig ausgewählte Gegner in dessen Umfeld bewegungsunfähig. Erlittener Schaden wird pro betroffenem Gegner um {0}20%{1} reduziert; wirksam für {0}2{1} Runden; Abklingzeit beträgt {0}3{1} Runden.
skill_desc_52221=In jeder Runde werden {0}4{1} Moralpunkte für die eigene sowie nahegelegene verbündete Legionen wiederhergestellt. Bei jedem Angriff erhalten umliegende Verbündete {0}+4{1} Moral.
skill_desc_52231=Nach der Eliminierung einer feindlichen Legion erhöht sich die eigene Moral um {0}+10{1}. Falls die Legion zu Beginn der Runde bereits im Zustand Hohe Moral ist, werden nach der Eliminierung eines Feindes mit Niedrige Moral {0}2{1} Mobilität wiederhergestellt. Der Effekt verdoppelt sich, wenn beim Feind zerschlagene Moral vorliegt.
skill_desc_52241=Kann nach Erhalt von {0}3{1} Angriffen verwendet werden. Erhöht den Schaden des nächsten eigenen aktiven Angriffs um {0}20%{1} und verringert erlittenen Schaden um {0}20%{1}, bis dieser Angriff gestartet wird.
skill_desc_52242=Kann nach Erhalt von {0}2{1} Angriffen verwendet werden. Erhöht den Schaden des nächsten eigenen aktiven Angriffs um {0}40%{1} und verringert erlittenen Schaden um {0}40%{1}, bis dieser Angriff gestartet wird.
skill_desc_52251=Wenn die Legion nicht vollständig besetzt ist, wird jede Runde eine Basis-Kavallerieeinheit hinzugefügt.
skill_desc_52261=Der Einfluss von Wäldern und Bergen auf die Bewegungskosten wird ignoriert.
skill_desc_52271=In der aktuellen Runde kann ein aktiver Angriff die Moral der feindlichen Legion um {0}-5{1} senken und der Effekt verdoppelt sich, falls ein Sturmangriff ausgelöst wird; Abklingzeit beträgt {0}3{1} Runden.
skill_desc_52272=In der aktuellen Runde kann ein aktiver Angriff die Moral der feindlichen Legion um {0}-10{1} senken und der Effekt verdoppelt sich, falls ein Sturmangriff ausgelöst wird; Abklingzeit beträgt {0}2{1} Runden.
skill_desc_52281=Wenn keine Verbündeten in der Nähe sind, verringert sich der von Kavallerie-Einheiten in der Legion erlittene Schaden um {0}25%{1}.
skill_desc_52291=Reduziert erlittenen Schaden um {0}20%{1} und erhöht den Schaden eigener Gegenangriffe um {0}20%{1} sowie die Moral um {0}+10{1}; Abklingzeit beträgt {0}3{1} Runden.
skill_desc_52292=Reduziert erlittenen Schaden um {0}30%{1} und erhöht den Schaden eigener Gegenangriffe um {0}30%{1} sowie die Moral um {0}+20{1}; Abklingzeit beträgt {0}2{1} Runden.
skill_desc_52301=Mobilität {0}+1{1} am Anfang der Runde.
skill_desc_52302=Mobilität {0}+2{1} am Anfang der Runde.
skill_desc_52303=Mobilität {0}+3{1} am Anfang der Runde.
skill_desc_52304=Mobilität {0}+4{1} am Anfang der Runde.
skill_desc_52311=Beim Angriff auf eine Stadt wird {0}30%{1} zusätzlicher Schaden verursacht, außerdem werden {0}15%{1} der Truppenstärke wiederhergestellt und die Moral erhöht sich um {0}+8{1}.
skill_desc_52321=Bewirkt, dass die anvisierte feindliche Legion in der aktuellen Runde bei jedem Angriff auf sie zusätzlich {0}12%{1} Schaden erleidet (basierend auf der aktuellen Truppenstärke); Abklingzeit beträgt {0}3{1} Runden.
skill_desc_52331=Wenn die aktuelle Truppenstärke unter dem Maximum liegt, wird in jeder Runde {0}8%{1} der Truppenstärke wiederhergestellt. Wenn die Moral unter 100 liegt, werden in jeder Runde {0}6{1} Moralpunkte wiederhergestellt.
skill_desc_52332=Wenn die aktuelle Truppenstärke unter dem Maximum liegt, wird in jeder Runde {0}16%{1} der Truppenstärke wiederhergestellt. Wenn die Moral unter 100 liegt, werden in jeder Runde {0}12{1} Moralpunkte wiederhergestellt.
skill_desc_52341=Steckt eine feindliche Stadt in Brand und reduziert ihre Haltbarkeit um {0}30%{1}; Abklingzeit beträgt {0}3{1} Runden.
skill_desc_52342=Steckt eine feindliche Stadt in Brand und reduziert ihre Haltbarkeit um {0}50%{1}; Abklingzeit beträgt {0}3{2} Runden.
skill_desc_52351=Wenn sich die Legion zu Beginn einer Runde auf feindlichem Gebiet befindet, beträgt die Mobilität {0}+3{1} und der verursachte Schaden erhöht sich während der aktuellen Runde um {0}20%{1}.
skill_desc_52361=Wähle eine gegnerische Legion aus, um ein Duell zu beginnen, wobei verursachter und erlittener Schaden beider teilnehmenden Legionen um {0}99%{1} verringert werden. Auf der Siegerseite steigt anschließend die Moral aller Legionen um {0}+10{1} und der zugefügte Schaden erhöht sich um {0}10%{1}. Der Buff hält {0}3{1} Runden lang an; Abklingzeit beträgt {0}5{1} Runden.
skill_desc_52371=Wenn beim Angreifen ein Sturmangriff ausgelöst wird, erhöht sich bei verbündeten Legionen im Umfeld die Moral um {0}+8{1}.
skill_desc_52381=Beim Angreifen werden der gegnerischen Legion {0}2{1} Mobilität gestohlen und der Angriff des Gegners verbraucht fortan {0}+20{1} Mobilität. Pro gegnerische Legion kann der Effekt nur 1 Mal ausgelöst werden; Abklingzeit beträgt {0}3{1} Runden.
skill_desc_52391=Die Zerstörung einer Stadtmauer bringt {0}+50{1} Silbermünzen und Mobilität {0}+3{1} für die Legion.
skill_desc_52401=Feindliche Infanterie-Einheiten können deinen Angriffen nicht ausweichen. Nach der Eliminierung einer feindlichen Legion erhöht sich die Mobilität um {0}+1{1} (Bis zu {0}3{1} Mal pro Runde möglich).
skill_desc_52411=Der durch feindliche Sturmangriffe und Zangenangriffe erlittene Schaden wird um {0}30%{1} reduziert, und der Schaden eigener Gegenangriffen wird um {0}30%{1} erhöht.
skill_desc_52421=Senkt nach einem Zangenangriff die Moral der angegriffenen Legion sowie aller sich in dessen Umfeld befindlichen Feinde um {0}5{1} und stellt {0}15%{1} der eigenen Truppenstärke wieder her; Abklingzeit beträgt {0}3{1} Runden.
skill_desc_52431=Bei Nahkampf-Infanterie- und Nahkampf-Kavallerie-Einheiten in der Legion erhöht sich die Chance auf Zangenangriff um {0}30%{1} und der zugefügte Schaden durch Zangenangriffe wird um {0}30%{1} erhöht.
skill_desc_52441=Für Infanterie-Einheiten in der Legion erhöht sich die Chance auf Sturmangriff, Zangenangriff und Ausweichen um {0}25%{1} und verursachter Schaden erhöht sich um {0}20%{1}.
skill_desc_52451=Wenn sich die Legion zu Beginn einer Runde auf eigenem Gebiet befindet, werden {0}20%{1} der Truppenstärke wiederhergestellt und erlittener Schaden um {0}20%{1} reduziert.
skill_desc_52461=Wenn zum Konsul ernannt: Die Mobilität aller Truppen ist um {0}+1{1} erhöht und die Rekrutierungskosten sind um {0}-15%{1} gesenkt.
skill_desc_52462=Wenn zum Konsul ernannt: Die Mobilität aller Truppen ist um {0}+2{1} erhöht und die Rekrutierungskosten sind um {0}-30%{1} gesenkt.
skill_desc_52471=Wenn zum Konsul ernannt: Erhöht verursachten Schaden aller Legionen um {0}10%{1} und den Schaden gegen Städte um {0}15%{1}.
skill_desc_52472=Wenn zum Konsul ernannt: Erhöht verursachten Schaden aller Legionen um {0}20%{1} und den Schaden gegen Städte um {0}30%{1}.
skill_desc_52481=Wenn zum Konsul ernannt: Jede Eliminierung einer feindlichen Legion bringt {0}8{1} Silbermünzen.
skill_desc_52482=Wenn zum Konsul ernannt: Jede Eliminierung einer feindlichen Legion bringt {0}16{1} Silbermünzen.
skill_desc_52491=Auf dem Wasser verbraucht ein Angriff {0}-1{1} Mobilität und an Land verbraucht ein Angriff +1 zusätzliche Mobilität
skill_desc_52501=Erhöht in Seeschlachten zugefügten Schaden um {0}5%{1} und verringert erlittenen Schaden um {0}5%{1}.
skill_desc_52502=Erhöht in Seeschlachten zugefügten Schaden um {0}10%{1} und verringert erlittenen Schaden um {0}10%{1}.
skill_desc_52503=Erhöht in Seeschlachten zugefügten Schaden um {0}15%{1} und verringert erlittenen Schaden um {0}15%{1}.
skill_desc_52504=Erhöht in Seeschlachten zugefügten Schaden um {0}20%{1} und verringert erlittenen Schaden um {0}20%{1}.
skill_desc_52511=Wenn sich die Legion zu Beginn der Runde auf dem Wasser befindet, verbrauchen Bewegungen {0}-1{1} Mobilität. Wenn sie sich an Land befindet, verbrauchen Bewegungen +1 zusätzliche Mobilität.
skill_desc_52521=Kann nach 3 erlittenen Angriffen eingesetzt werden. Für Verteidigungsinfanterie-Einheiten der Legion erhöht sich der Angriffswert um {0}30{1} und die Verteidigung um {0}30{1}; {0}Unbegrenzt stapelbar{1}.
skill_desc_52531=Verteidigungsinfanterie-Einheiten in der Legion erhalten eine {0}25%{1} Chance auf Sturmangriff und Zangenangriff, wobei sich der Effekt im Zustand Hohe Moral verdoppelt.
skill_desc_52541=Befindet sich die Legion auf eigenem Gebiet, erhöht sich zugefügter Schaden um {0}30%{1} und die Moral steigt um {0}+5{1} nach dem Angreifen.
skill_desc_52551=Nach dem Aktivieren bewirkt die Fertigkeit, dass wenn die Legion angegriffen wird und sofern keine Niedrige Moral vorliegt, {0}8{1} Moralpunkte verbraucht werden, um den erlittenen Schaden um {0}40%{1} zu reduzieren; Die Fertigkeit kann jederzeit abgebrochen werden.
skill_desc_52561=Beendet die Wirkung von Stammesfürst.
skill_desc_52571=Nach dem Auslösen eines Zangenangriffs wird der durch Fernkampf-Einheiten erlittene Schaden um {0}30%{1} reduziert.
skill_desc_52581=Nach dem Auslösen eines Zangenangriffs steigt die eigene Moral um {0}+5{1} und verbündete Legionen im Umfeld regenerieren {0}+10%{1} ihrer Truppenstärke.

