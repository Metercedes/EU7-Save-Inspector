general_desc_Warwick the Kingmaker=Der 16. Earl of Warwick, ehemals Richard Neville, war als „Königsmacher“ bekannt, da er während der Rosenkriege mehrere Adlige auf den Thron brachte.
general_desc_Edmund Beaufort=Der 2. Herzog von Somerset, der politische Rivale von Richard, Herzog von York.
general_desc_Richard of York=Der 3. Herzog von York, früher bekannt als Richard Plantagenet. Als Nachkomme der Familie Plantagenet hatte er Anspruch auf den Thron.
general_desc_Margaret of Anjou=Ehefrau von Heinrich VI. und Kern der Familie Lancaster. Während der Herrschaft des schwachen Heinrich VI. wurde der Herzog von Somerset von ihr als politischer Verbündeter herangezogen und wurde später de facto Gouverneur des Landes.
general_desc_Henry VI=König von England, charakterschwach. Ihm fehlte die Fähigkeit, sein Land zu verwalten und es gelang ihm nicht, seine Untertanen zu regieren. Während seiner Herrschaft konkurrierten seine Minister untereinander um die Macht, was schließlich zum Ausbruch der Rosenkriege führte.
general_desc_Richard Neville=Richard Neville, 5. Earl of Salisbury，Der Vater von Warwick der Königsmacher
