stage_intro_4801=Harald trat der byzantinischen Varangischen Garde bei, um seine Position und Qualifikationen weiterzuentwickeln. Im Laufe des nächsten Jahrzehnts hinterließ er ein legendäres Erbe.
stage_intro_4803=Im Jahr 1035 wurde Harald Hauptmann der Varangischen Garde. Harald führte die Varangische Garde im selben Jahr beim Angriff und der Besetzung Kleinasiens an und zwang das Arabische Reich, einen Friedensvertrag mit dem Byzantinischen Reich zu unterzeichnen.
stage_intro_4805=Harald wurde befohlen, die bulgarische Region zu unterdrücken. Harald zeigte bei dieser Unterdrückung keine Gnade, was ihm den Titel „Bulgarenbrenner“ einbrachte.
stage_intro_4807=Nach dem Ende des Krieges im Osten wurde Harald nach Sizilien geschickt. Dieses Mal würde er seine Kraft und Intelligenz einsetzen, um Sizilien für Byzanz zurückzugewinnen.
stage_intro_4809=Im Jahr 1047 wurde Harald nach dem Tod von Magnus I. König von Norwegen. Anschließend startete er einen Angriff auf Dänemark, um es vollständig zu erobern.
stage_intro_4811=Im Jahr 1062 einigten sich Harald und König Sweyn II. von Dänemark auf eine Seeschlacht an der Mündung des Flusses Nisa, um den Sieger zu ermitteln. Trotz Haralds Sieg einigten sich beide Seiten zwei Jahre später aufgrund der Unruhen in Norwegen schließlich auf ein Friedensabkommen.

