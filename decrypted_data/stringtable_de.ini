stage_intro_30101=Nach dem Tod von Wilhelm Eisenarm wurde sein Bruder Drogo Graf von Apulien. Robert, erster Sohn der zweiten Frau Tankreds, kam 1047 nach Italien. Drogo mochte seinen Halbbruder nicht besonders und gab ihm ein kleines Lehen im unwirtlichen Nordkalabrien. Zunächst verdingte Robert sich als Anführer einer Banditenbande und erhielt während dieser Zeit den Beinamen "Guiskard", was soviel wie "der Listige" bedeutet.
stage_intro_30102=Die lokale Bevölkerung hatte in zunehmendem Maße unter der Herrschaft der Normannen zu leiden. 1051 fiel Drogo einem Attentat zum Opfer und es kam zu landesweiten Ausschreitungen in Apulien. Papst Leo IX., der schon früher Konflikte mit den räuberischen Normannen schlichten musste, formte eine Allianz aus kaiserlichen sowie langobardischen Truppen, um gegen die als Ungläubige gebrandmarkten Normannen vorzugehen. Humfred, der neue Anführer der apulischen Normannen, bat umgehend Robert um Hilfe.
stage_intro_30103=Kirchliche Verhandlungen, unter anderem mit dem Ziel, dass auch Byzanz dem anti-normannischen Bündnis beitreten sollte, gipfelten jedoch in der Spaltung der christlichen Kirche, was auch als "Großes Schisma" bezeichnet wird. Im Schatten dieses Ereignisses konnte sich Robert ungehindert in Kalabrien weiter ausbreiten. Dem gegenüber stand Humfred, welcher die Erfolge seines Halbbruders neidisch beäugte. Er starb 1057 und war gezwungen, Robert zu seinem Nachfolger zu machen. Etwa zur gleichen Zeit kam auch Roger, Roberts jüngster Bruder nach Italien. Gemeinsam stellten sie sich der Eroberung Kalabriens.
stage_intro_30104=Während der Zeit in Kalabrien entwickelten sich Robert und Roger zu erfahrenen Anführern.
stage_intro_30105=1059 wurde im Rahmen des sogenannten Papstwahldekrets ein Gegenpapst ernannt, der sich vom weltlichen Einfluss durch Kaiser und Adel lösen wollte. Gegen solch mächtige Feinde benötigt man einen starken Verbündeten. Im selben Jahr, bei der Synode von Melfi, ernannete Papst Nikolaus II. deshalb Robert Guiskard zum Herzog von Apulien, Kalabrien und des zukünftigen Sizilien.
stage_intro_30106=Sizilien war nach dem Abzug von Wilhelm Eisenarm zurück an die Sarzenen gefallen. 1060 überquerten die Brüder die Straße von Messina und begannen einen neuen Eroberungsfeldzug.
stage_intro_30107=Die Brüder konnten eine Reihe von Siegen erringen. Dabei konzentrierte sich Roger auf Sizilien, während Robert sich um die Hafenstadt Bari kümmerte, in der ein von Byzantinern angezettelter Aufständ tobte. Roger wurde zum Graf von Sizilien ernannt, aber es gab eine Regelung zur gemeinschaftlichen Herrschaft.
stage_intro_30108=Nach dem Fall von Bari nutzte Robert den Investiturstreit zwischen Papst Gregor VII. und dem deutschen König Heinrich IV. zu seinem Vorteil. Amalfi, Salerno und Neapel wurden erfolgreich angegriffen.
stage_intro_30109=1080, im Alter von 65 Jahren und noch voller Tatendrang, wandte sich Robert gegen das Byzantinische Reich. Zuvor, als die Seldschuken in das Oströmische Reich drangen, hatte er mittels der Verlobung seiner Tochter Helena mit Konstantin, Sohn des Kaisers Michael VII. Dukas versucht, sich einzuheiraten. Wenig später wurde der oströmische Kaiser jedoch abgesetzt und durch Alexios I. Komnenos ersetzt. 
stage_intro_30110=Robert rekrutierte einen Mönch, der sich fortan als Michael VII. ausgab, und behauptete, in dessen Namen den Kaiserthron zurückzuerobern. Unter diesem Vorwand marschierte Robert gegen Alexios I. mit 150 Schiffen und einem 20.000 Mann starken Heer.
stage_intro_30111=Während Robert und sein Sohn Behemund ihren Feldzug in Makedonien fortsetzten, ergab sich für Alexios' Bündnispartner Heinrich IV. die Möglichkeit, Rom anzugreifen und den verhassten Papst Gregor VII. zu stürzen. Robert musste auf diese Notlage reagieren und kehrte nach Italien zurück.
stage_intro_30112=Die Unruhen endeten mit der Plünderung und großflächigen Zerstörung Roms und Robert konnte sich endlich voll und ganz Ostrom widmen. Er hob neue Truppen aus und eilte zurück nach Griechenland um dort, im Alter von mittlerweile 70 Jahren, seine Ambitionen auf den oströmische Kaiserthron zu verwirklichen. Während der Landung auf Kefalonia, einer Insel im Ionischen Meer, verstarb Robert an einer Infektionskrankheit. Auf seinem Grabstein seht: "Hier liegt Guiskard, der Schrecken der Welt".

stage_intro_30201=Robert Guiskard war zweimal verheiratet. Seine erste Ehe mit Alberada war annuliert worden, was zur Folge hatte, dass Behemund, der erste und fähigste Nachkomme Guiskards als Bastard galt. Aussehen und Statur des blonden und blauäugigen Hünen Behemund werden ausführlichst von der zeitgenössischen Historikerin Anna Komnenos beschrieben. In Sachen Waghalsigkeit, Mut und Tatkraft, stand er seinem Vater in nichts nach.
stage_intro_30202=Da er an den Feldzügen seines Vaters beteiligt war, konnte Behemund bereits in Sizilien Kampferfahrung sammeln. Doch erst 1081 bei dem Angriff auf das oströmische Reich konnte er seine Fähigkeiten unter Beweis stellen. Mit 150 Kriegsschiffen wollte Robert Guiskard sein 20.000 Mann starkes Heer über das Adriatische Meer verlegen, doch die Venezianer durchkreuzten seine Pläne und die meisten seiner Schiffe wurden versenkt.
stage_intro_30203=Behemund setzte den Feldzug in Makedonien und Thessalien erfolgreich fort. Jedoch musste er die Belagerung von Larissa aufgrund von Nachschubproblemen abbrechen und sich zurückziehen. Deserteure wurden von den Byzantiners reichlich beschenkt und die Venezianer hatten Korfu und Dyrrachium zurückerobert.
stage_intro_30204=1084 zogen Behemund und sein Vater erneut gegen Ostrom und es gelang ihnen, die venezianische Flotte zu besiegen und Korfu einzunehmen. Etwa zur selben Zeit wütete eine Epedemie im Lager der Normannen. Sowohl Guiskard als auch Behemund wurden schwer krank, was zum Ende des Feldzugs gegen Ostrom führte.
stage_intro_30205=1085 verstarb Robert Guiskard. Unter Einwirkung seiner Mutter Sichelgaita wurde Roger Borsa als Erbe bestimmt. Er war Roberts erster Sohn aus seiner zweiten Ehe und damit Behemunds Halbbruder. Behemund sah jedoch sich als rechtmäßigen Nachfolger an und es kam zu einem 10 Jahre langen Erbfolgekrieg in Italien.
stage_intro_30206=Als Papst Urban II. 1096 zu einem Kreuzzug ins Heilige Land aufrief, entschied sich Behemund, seine Erbansprüche aufzugeben und stattdessen diese Chance auf Ruhm und Reichtum wahrzunehmen. Dabei konnte er auf ein Heer aus erfahrenen und kriegserprobten Normannen zurückgreifen.
stage_intro_30207=Alexios I. empfing seinen früheren Rivalen mit einer großen Zeremonie, verlangte aber auch einen Lehnseid, was bedeutet, dass alle von den Normannen eroberten Ländereien in den Besitz des Kaisers übergehen würden. Alexios deutete an, dass es für Behemund möglicherweise einen Posten als Gouverneur dieser Ländereien geben könnte. Es blieb ihm also vorerst nichts anderes übrig, als den Eid abzulegen und seine Loyalität gegenüber Alexios unter Beweis zu stellen.
stage_intro_30208=Behemund und sein Neffe Tankred überschritten den Bosporus und attackierten Nicäa, gefolgt von Raimund IV. von Toulouse. Bei dieser ersten Schlacht der Kreuzfahrer wollte sich jeder der Anführer durch seine Erfolge im Kampf hervortun.
stage_intro_30209=Raimond IV. war der einzige, der Behemund ebenbürtig war. Die Kreuzfahrer wurden daher in zwei Heereszüge aufgeteilt, da beide Anführer hofften, so bessere Ergebnisse für sich zu erzielen.
stage_intro_30210=Antiochia war eine strategisch bedeutende Stadt auf dem Weg nach Jerusalem. Sollte es den Kreuzfahrern gelingen, die Stadt vor dem Eintreffen von Kerboga's Entsatzarmee einzunehmen, könnten sie die starken Befestigungsanlagen zu ihrem Vorteil nutzen. Andernfalls müssten sie mit 20.000 Mann eine etwa doppelt so starke Armee in einer offenen Feldschlacht besiegen.
stage_intro_30211=Nach der Eroberung und anschließenden Verteidigung Antiochias einigten sich Behemund und Raimund darauf, dass Behemund die Stadt samt Umbgeung bekommt und Raimund fortan das Oberkommando über die Kreuzfahrer innehat. Damit wurde Behemunds Traum vom eigenen Fürstentum erfüllt, gleichzeitig brach er damit den Lehnseid gegenüber Alexios.
stage_intro_30212=1100 ergab sich für Behemund die Möglichkeit, sein Gebiet zu erweitern, indem einem benachbarten Anführer der Armenier zu Hilfe eilt. Er ließ seinen Neffen Tankred mit einer Garnison in Antiochia zurück und brach mit nur 300 Rittern auf.
stage_intro_30213=Behemund wurde 3 Jahre gefangen gehalten. Während dieser Zeit konnte Tankred das Territorium für seinen Onkel erweitern. Kurz nach seiner Freilassung marschierte Behemund mit seinen Truppen gen Süden.
stage_intro_30214=Das Fürstentum Antiochia lag zwischen dem Byzantinischen Reich und dem Reich der Seldschuken. Durch den Verlust seiner Truppen war es schwierig, sich neben den Großmächten zu behaupten und an Expansion war erst gar nicht zu denken. Behemund musste also nach Europa reisen, um Geldgeber und zusätzliche Soldaten anzuwerben. Sehr zu seiner Überraschung wurde er in Italien und Frankreich als Held der Kreuzfahrer empfangen. König Philipp I. von Frankreich bot ihm die Hand seiner Tochter an und viele Adelige wollten sich Behemunds Kampf für Ruhm und Ehre anschließen. Aus Furcht vor dieser Wirkung verweigerte ihm König Heinrich I. sogar die Einreise nach England.
stage_intro_30215=Geblendet durch diesen Erfolg entschloss sich Behemund, seine neue, 35.000 Mann starke Armee gegen Byzanz einzusetzen, um jenen Traum zu erfüllen, der Vater und Sohn bisher verwehrt blieb.
stage_intro_30216=Ausgezehrt durch Hunger und Krankheit musste Behemund sich den Belagerern ergeben und die von Alexios I. diktierten Bedingungen des Vertrags von Devol annehmen. Behemund war seitdem ein gebrochener Mann und obwohl ihm als Vasall das Fürstentum Antiochia zustand, beschloss er, nicht dorthin zurückzukehren. Er starb drei Jahre später und wurde in Canosa in Apulien begraben. Das Fürstentum Antiochia überlebte unter der Regentschaft Tankreds.

stage_group_name_30002=Behemunds Tagebuch
stage_group_name_30003=Behemunds Tagebuch

family_letter_desc_201=Mein Vater erlangte sein Vermögen, indem er geschickt Feuer legte und löschte, was ihm seinen Spitznamen einbrachte. Da er der Kirche aber auch oft Geld spendete, hatte er stets einen guten Ruf und ebenso gute Verbindungen zur Kirche. ---Bohemund I.
family_letter_desc_202=Als er noch jünger war, wurde er von seinem Bruder jahrelang ausgegrenzt. Jetzt macht er anscheinend das gleiche mit Roger, dabei müsste er es besser wissen.
family_letter_desc_203=Mein Vater erlangte schließlich den höchsten Status in der Familie – Herzog. Dies war der glorreichste Tag für die Familie und das Ergebnis seiner langjährigen Beziehungen zur Kirche.
family_letter_desc_204=Es ist schon immer die Überzeugung eines jeden Mannes in unserer Familie, es Onkel Wilhelm gleichzutun und um Sizilien, diese reiche und schöne Insel, zu kämpfen.
family_letter_desc_205=Vielleicht wollte sich mein Vater nicht mit Onkel Roger um die Herrschaft über Sizilien streiten, weil er größere Ziele verfolgte.
family_letter_desc_206=Mein Vater war nie ganz überzeugt von den Lobliedern auf Wilhelm den Eroberer. Er meinte, wie kann er sich Eroberer nennen, wenn er noch nicht einmal die Byzantiner besiegt hat?
family_letter_desc_207=Eines Tages, wenn einer aus unserer Familie auf dem Thron von Konstantinopel sitzt, darf er sich wahrhaft "oberster Anführer" nennen. Ruhm und Ehre sind wichtiger als das Leben, und das Leben ist ein ewiger Kampf.
family_letter_desc_208=Mein Vater ist nach Italien zurückgekehrt, in der Hoffnung, die Lage dort schnellstmöglich zu beruhigen, ehe er wieder zurück kommt. Alexios ist schlau und listenreich und alles andere als ein leichter Gegner. 

family_letter_desc_301=Ich kann mich noch gut an jenen Tag erinnern, es war der 18. Oktober, als mein Vater die Stadt angriff und Alexios plötzlich erschien. Wenn er es schaffen würde, zur Stadt zu gelangen, wäre die Schlacht für uns verloren. Also trat ich ihm entgegen, um das zu verhindern.
family_letter_desc_302=Nicht die Byzantiner haben uns besiegt, sondern diese verdammte Krankheit, ein Fluch, vielleicht war Gott auf ihrer Seite. Mein Vater ist immer noch krank.
family_letter_desc_303=Wer war die ganzen Jahre über an der Seite meines Vaters, wer hat so viele Länder erobert? Und wer hat mir alles genommen, ohne sich zu beweisen, nur mit der richtigen Mutter und einem guten Onkel? Das ist nicht gerecht!
family_letter_desc_304=Hier gibt es nichts mehr für mich. Es ist an der Zeit, Richtung Osten aufzubrechen!
family_letter_desc_305=Der heuchlerische Kaiser hat sich darum gewunden, mir feste Zusagen zu machen. Selbst die junge Prinzessin Anna hat mich aufrichtig und mit Respekt behandelt. Diese sogenannten Kreuzzüge sind lediglich dafür da, dem oströmischen Kaiser seine verlorenen Territorien zurückzugeben. Es scheint als würden die Byzantiner immer schwächer.
family_letter_desc_306=Wie wir vermuteten, denkt Alexios noch nicht einmal daran, uns für unsere Mühen zu belohnen, geschweige denn uns zu helfen. Er kann es uns nicht verübeln, dass wir uns das nehmen, was wir uns erkämpfen.
family_letter_desc_307=Es sind jetzt 7 Monate, und unsere Vorräte gehen zur Neige. Wir können nur noch auf ein Wunder hoffen. Möge Gott uns erhören.
family_letter_desc_308=Gott sei gepriesen. Vater, ich habe es endlich geschafft. Antiochia wird ein Neubeginn für unsere Familie.
family_letter_desc_309=3 Jahre sind vergangen und ich habe fast vergessen, wie es sich anfühlt, wenn der Wüstensand in mein Gesicht weht. Antiochia ist wie eine einsame Insel, die droht, vom sie umgebenden Meer an Feinden verschlungen zu werden. Ich muss mein Land erweitern.
family_letter_desc_310=Ja, ohne meine Beharrlichkeit wäre Konstantinopel schon längst and die Sarazenen und Seldschuken gefallen. Dies ist allein mein Verdienst!
family_letter_desc_311=Ich habe diesen Hass nie vergessen. Vater, ich werde dir den Kopf des Byzantinischen Kaisers als Opfergabe bringen. Auf in den Kampf! Ehre ist wertvoller als das Leben!

