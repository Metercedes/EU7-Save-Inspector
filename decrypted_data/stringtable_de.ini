stage_intro_4661=Im Jahr 1410 nahm Jan Žižka als Söldner am Polnisch-Litauisch-Teutonischen Krieg teil und schlug sich in der Schlacht bei Grunwald wacker.
stage_intro_4663=Als 1419 der Hussitenkrieg ausbrach, nahm Jan Žižka aktiv am Prager Aufstand teil, führte ihn an und wurde zu einem wichtigen Befehlshaber der aufständischen Armee.
stage_intro_4665=Im Jahr 1420 hatte der hussitische Streitwagen seinen ersten Auftritt auf dem Schlachtfeld von Sudoměř, wo Hunderte von aufständischen Soldaten unter dem Kommando von Jan Žižka mit Hilfe einer Streitwagenformation Tausende von Rittern besiegten.
stage_intro_4667=Im Jahr 1420 startete der römische Kaiser Sigismund den ersten Kreuzzug gegen die böhmische Region, wurde aber von Jan Žižka in der Schlacht auf dem Vitkov-Berg besiegt.
stage_intro_4669=Im Winter 1421 umzingelte Sigismund das aufständische Heer bei Kutná Hora (Kuttenberg). Unter den flexiblen taktischen Befehlen von Jan Žižka gelang es den Aufständischen jedoch, auszubrechen und den Feind in der folgenden Verwicklung zu besiegen.
stage_intro_4671=Im Januar 1422 führte Jan Žižka seine Einheiten an, um die besiegten Kreuzfahrer auf dem Schlachtfeld von Kutná Hora zu verfolgen und einen Vernichtungskrieg zu beginnen, der die zweite Expedition der Kreuzfahrer vernichtete.

