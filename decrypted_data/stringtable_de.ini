conquest_faction_desc_801=Das Weströmische Reich, einer der Nachfolger des antiken Römischen Reiches, war einst glorreich, befindet sich jedoch heute in einer Krise und im Niedergang. Das Reich war mit Grenzunruhen konfrontiert, die durch die Migration der Barbaren verursacht wurden und war nicht in der Lage, effektiv darauf zu reagieren. Das Reich verfügt jedoch noch immer über ein langes historisches Erbe. Mit der Entschlossenheit, es wiederzubeleben, könnte es möglich sein, den Ruhm des Römischen Reiches wiederherzustellen.
conquest_faction_desc_802=Das Byzantinische Reich, auch Oströmisches Reich genannt, war einer der Nachfolger des antiken Römischen Reiches. Seine Hauptstadt Konstantinopel war strategisch günstig gelegen und das Reich übernahm nicht nur die Politik, Kultur und Traditionen der alten Römer, sondern entwickelte auch eine einzigartige byzantinische Kunst, Architektur und ein einzigartiges byzantinisches System. Das Hauptziel des Imperiums besteht derzeit darin, die verlorenen Gebiete Roms wieder zu erlangen.
conquest_faction_desc_803=Das gälische Volk war ein keltischer Stamm im alten Europa, der die Gebiete des heutigen Irland, Schottland und Wales bewohnte. Das gälische Volk war polytheistisch und verehrte die Natur und ihre Vorfahren. Sie waren von Natur aus mutig und äußerst kriegerisch und mächtige Gegner des antiken Römischen Reiches.
conquest_faction_desc_804=Die Briten waren ein keltischer Stamm im alten Europa, der die britischen Inseln bewohnte. Sie zeichneten sich durch eine keltische Kultur und einen polytheistischen Glauben aus. Die Briten hatten eine lange Geschichte von Kontakten und Konflikten mit dem Römischen Reich und im Laufe der Zeit vermischte sich ihre Kultur allmählich mit der römischen und anderen fremden Kulturen.
conquest_faction_desc_805=Die Sachsen waren ein altes germanisches Volk im Norden Deutschlands, das einen wichtigen Platz in der europäischen Geschichte einnahm. Als germanischer Stamm waren sie für ihren Mut und ihre militärische Stärke bekannt. Die Sachsen erlebten im Mittelalter viele Eroberungen, Siedlungen und politische Entwicklungen, die die politische und militärische Landschaft der Region beeinflussten.
conquest_faction_desc_806=Die Dänen haben als Teil des nordisch-germanischen Volkes eine reiche Geschichte und kulturelle Tradition. Sie existierten und entwickelten sich während der Eisen- und Wikingerzeit in Nordeuropa. Die Dänen spielten eine wichtige Rolle in der Geschichte, insbesondere während der Wikingerzeit, als ihre Flotten aus mutigen und furchtlosen Schiffen weiterhin Eroberungszüge in die umliegenden Meere unternahmen.
conquest_faction_desc_807=Die Balten waren eine alte Völkergruppe, die das Gebiet um die Ostsee bewohnte. Sie wurden historisch von slawischen und germanischen Kulturen beeinflusst. Ein wichtiger Zweig von ihnen, die alten Preußen, waren für ihre Tapferkeit und Kampfkraft bekannt und lieferten sich ständigen Austausch und Konflikte mit den umliegenden Slawen und Deutschen.
conquest_faction_desc_808=Die Sueben waren eine Untergruppe der alten germanischen Völker, die das Gebiet entlang des Rheins bewohnten. Sie waren tapfere Krieger und Expeditionäre zur Zeit des antiken Roms. Die Sueben gründeten während eines Teils dieser Zeit ihre eigenen Königreiche und waren in Konflikte mit dem Römischen Reich verwickelt.
conquest_faction_desc_809=Die Lombarden waren ein germanisches Volk, das im frühen 6. Jahrhundert n. Chr. nach Norditalien einwanderte und das Königreich Lombardei gründete. Die Lombarden verfügten auch über eine gute militärische Macht. Sie herrschten zwei Jahrhunderte lang über Norditalien und hatten großen Einfluss auf die lokale Politik, Gesellschaft und Kultur.
conquest_faction_desc_810=Die Slawen sind eine weit verstreute ethnische Gruppe in Europa, die in drei Hauptzweige unterteilt ist: die Westslawen, die Ostslawen und die Südslawen. Sie verfügen über einzigartige Sprachen, Kulturen und Traditionen, haben im Laufe der Geschichte viele unabhängige Staaten gegründet und weisen unterschiedliche Grade an Kampffähigkeiten auf.
conquest_faction_desc_811=Die Franken waren ein Ureinwohnervolk, das historisch in der Region Franken lebte und einen wichtigen Zweig der Germanen darstellte. Sie gründeten zwischen dem 5. und 8. Jahrhundert ein mächtiges Königreich, das als Frankenreich bekannt ist. Mit ihren wilden Kriegern und ihrer großen Entschlossenheit zur militärischen Expansion hatten die Franken einen tiefgreifenden Einfluss auf die europäische Geschichte.
conquest_faction_desc_812=Die Burgunder waren ein Zweig der alten germanischen Völker, die hauptsächlich in der Region Burgund im Osten Frankreichs lebten. Die Burgunder gründeten im Laufe der Geschichte das Königreich Burgund und lieferten sich politische und militärische Auseinandersetzungen mit Nachbarländern, was sie zu einer der wichtigsten Kräfte im mittelalterlichen Europa machte.
conquest_faction_desc_813=Die Ostgoten waren ein Zweig der alten germanischen Völker, die angesichts ausländischer Invasionen keine andere Wahl hatten, als nach Osteuropa und auf den Balkan auszuwandern, wo sie ihre eigenen Königreiche gründeten. Die Ostgoten erstarkten in den Grenzgebieten des Römischen Reiches und lieferten sich zahlreiche Konflikte mit dem Römischen Reich.
conquest_faction_desc_814=Die Gepiden, die von den ostgermanischen Goten abstammten, waren sehr tapfer und kriegerisch. Sie haben im Laufe ihrer Geschichte viele Kriege mit anderen Völkern geführt und sind besonders berühmt für ihre Konflikte mit den Hunnen und Ostgoten. Sie gründeten ihre eigenen Königreiche und übten im Laufe der Zeit Einfluss auf die umliegenden Regionen aus.
conquest_faction_desc_815=Die Hunnen waren ein Nomadenvolk der alten eurasischen Steppenregion, das sich auf Reiten und Bogenschießen spezialisiert hatte. Unter der Führung von Attila erreichte ihr Reich seinen Höhepunkt im späten 5. und frühen 6. Jahrhundert. Sie stellten eine Bedrohung für das Römische Reich und andere Völker dar und führten häufig Plünderungen und Eroberungen durch.
conquest_faction_desc_816=Die Magyaren sind die wichtigste ethnische Gruppe in Ungarn. Ursprünglich aus der Region des Uralgebirges in Asien stammend, wanderten sie zu Beginn des 9. Jahrhunderts in das Gebiet des heutigen Ungarn aus und gründeten das Königreich Ungarn. Die Magyaren weiteten im Mittelalter ihre Macht aus und führten viele Kriege und Territorialstreitigkeiten mit den Nachbarländern.
conquest_faction_desc_817=Das Volk der Vasco ist eine ethnische Gruppe, die in Westeuropa, hauptsächlich im Baskenland in Spanien und Frankreich, lebt. Sie verfügen über eine einzigartige Sprach- und Kulturtradition und gelten als eines der ältesten Völker Europas. Das Volk der Vasco hat im Laufe der Geschichte ein Gefühl der Unabhängigkeit und kulturellen Identität bewahrt und eine wichtige Rolle in der Geschichte Westeuropas gespielt.
conquest_faction_desc_818=Die Westgoten waren ein Zweig der alten germanischen Völker, deren Ursprünge auf die alten gotischen Stämme zurückgehen. Mitte des 5. Jahrhunderts wanderten sie nach Spanien und Südfrankreich aus und gründeten das Königreich der Westgoten, das weite Teile des heutigen Spaniens und Portugals beherrschte und zu einem der wichtigsten Königreiche Westeuropas wurde
conquest_faction_desc_819=Die Bulgaren sind die ursprünglich bewohnte Gemeinschaft des Balkans. Sie haben ihre eigene Sprache, Religion und Volkstraditionen. Historisch gesehen gründeten die Bulgaren das mächtige Erste Bulgarische Reich, das über eine starke Armee, entwickelte Städte und eine florierende Wirtschaft verfügte und einen tiefgreifenden Einfluss auf die Balkanregion hatte.
conquest_faction_desc_820=Die Griechen sind eine in der Region Griechenland lebende ethnische Gruppe, die die Schöpfer und Erben der antiken griechischen Zivilisation sind. Die Griechen sind für ihr Stadtstaatssystem und ihre demokratische Politik bekannt, allen voran Athen. Während des Mittelalters erlebten sie viele Eroberungen und Herrschaften durch Fremde, die jedoch ihren Wunsch nach Unabhängigkeit und Freiheit nicht dämpften.
conquest_faction_desc_821=Die historischen Wurzeln der Türken lassen sich bis zu den alten Turkvölkern zurückverfolgen. Sie haben im Laufe ihrer Geschichte viele Migrationen und Expansionen erlebt und mächtige Imperien aufgebaut. Sie haben bemerkenswerte Beiträge im militärischen, kulturellen und politischen Bereich geleistet und im Mittelalter und in der Neuzeit weite Gebiete erobert.
conquest_faction_desc_822=Die Armenier gehören zu den ältesten Völkern der Welt und ihr religiöses und kulturelles Erbe hat die regionalen Lebensstile und Werte tiefgreifend beeinflusst. Im Laufe ihrer Geschichte haben die Armenier mächtige armenische Königreiche aufgebaut und viele Herausforderungen und Nöte erlebt.
conquest_faction_desc_823=Die Mongolen waren eine aus der mongolischen Steppe stammende Nomadengruppe mit hervorragenden Reitkünsten und strategischen Taktiken. Sie waren geschickt darin, die Steppe für schnelle Überfälle und Manövrieroperationen zu nutzen. Unter der Führung von Dschingis Khan expandierten sie rasch über den gesamten eurasischen Kontinent und gründeten schließlich das riesige Mongolenreich.
conquest_faction_desc_824=Die Orientalen waren ein Volk, das aus dem Fernen Osten einwanderte. Sie begaben sich auf eine unbekannte Reise mit dem Ziel, mit den westlichen Nationen zu kommunizieren. Angesichts der Herausforderungen und Chancen, die die verschiedenen Kräfte des Westens mit sich bringen könnten, zeigten die Orientalen Furchtlosigkeit und Ausdauer und waren entschlossen, mit Mut und Einfallsreichtum ein neues Heimatland zu eröffnen.
conquest_faction_desc_825=Die Berber sind eine ethnische Gruppe in Nordafrika. Sie sind die Ureinwohner Nordafrikas und haben viele Schlachten zur Verteidigung ihres Territoriums und ihrer Kultur gegen ausländische Invasionen geführt. Die Berber haben viele ihrer traditionellen Bräuche und Glaubensvorstellungen beibehalten, obwohl sie manchmal unabhängig waren und manchmal von anderen regiert wurden.
conquest_faction_desc_826=Die Vandalen waren einer der alten germanischen Stämme, die nach einer langen und beschwerlichen Wanderung schließlich in die nordafrikanischen Provinzen des Römischen Reiches einfielen und das Königreich der Vandalen gründeten. Die Vandalen verfügten über eine unübertroffene militärische Macht zur See und ihre Plünderung der Stadt Rom verursachte unermesslichen Schaden für das Römische Reich.
conquest_faction_desc_827=Die Ägypter, die Schöpfer einer alten Zivilisation, die in der ägyptischen Region im Nordosten Afrikas lebten, entwickelten eine atemberaubende Kultur und Zivilisation. Sie verfügten über großartige architektonische Werke, ein komplexes religiöses System und Hieroglyphenschriften. Obwohl sie sicherlich die Herrschaft ausländischer Eroberer erlebten, blieben ihre Kultur und Traditionen dennoch erhalten.
conquest_faction_desc_828=Die Araber sind eine ethnische Gruppe, die hauptsächlich auf der Arabischen Halbinsel und im Nahen Osten vorkommt. Sie verwenden die arabische Sprache, glauben an den Islam und haben eine wichtige Rolle bei der Verbreitung und Entwicklung des Islam gespielt. Sie haben zahlreiche große Reiche und Königreiche gegründet und auch in den Bereichen Handel, Landwirtschaft und Handwerk wichtige Erfolge erzielt.
conquest_faction_desc_829=Die Perser waren ein altes Volk der iranischen Hochebene, das das große Persische Reich gründete. Das Persische Reich, das vor allem für die Achämeniden-Dynastie bekannt ist, vereinte die Stämme der iranischen Hochebene und erweiterte das Reichsgebiet erheblich. Die Zivilisation und Errungenschaften des Persischen Reiches hatten einen tiefgreifenden Einfluss auf spätere Generationen und sind eines der wichtigsten Reiche der Menschheitsgeschichte.
conquest_faction_desc_830=Mittelmeerpiraten sind Piratengruppen, die im Mittelmeer operieren. Sie sind in verschiedenen historischen Epochen aufgetaucht, beispielsweise in der antiken griechischen und römischen Zeit sowie im Mittelalter. Sie nahmen Handelsschiffe ins Visier und plünderten Eigentum, was eine Bedrohung für den Seehandel und die Küstenbewohner darstellte. Infolgedessen gerieten sie ins Visier vieler Länder.

