stage_intro_4681=Der aus einer ungarischen Adelsfamilie stammende Johannes Hunyadi widmete sein Leben der Verteidigung Europas gegen die Expansion und Invasion des Osmanischen Reiches und wurde als "Weißer Ritter" bekannt.
stage_intro_4683=Im Jahr 1442 kämpfte Hunyadi trotz der ersten Niederlage mehrere Tage lang und vernichtete schließlich die vorrückende osmanische Armee bei Gyulafehérvár.
stage_intro_4685=Ab 1443 unternahm Hunyadi mit Unterstützung des Papstes einen Feldzug gegen die serbische Region, bei dem er mehrere Siege errang und die wenigen gegen die vielen einsetzte. Die osmanische Macht war in diesem Gebiet fast ausgelöscht worden.
stage_intro_4687=Im Jahr 1444 führte König Vladislav III. von Ungarn seine Einheiten persönlich in eine Schlacht gegen die osmanische Armee in der Nähe des Hafens von Varna. Vladislav III. ging jedoch zu aggressiv in den Kampf und ließ sich in dem Chaos töten, so dass die ungarischen Einheiten eine Niederlage erlitten.
stage_intro_4689=Im Jahr 1448 versuchte Hunyadi mit einer kleinen Gruppe von EliteEinheiten in die Region Kosovo einzudringen, um sich den lokalen Widerstandskräften gegen die osmanische Armee anzuschließen. Die Operation scheiterte jedoch, da der Plan durchgesickert war.
stage_intro_4691=1456 stellte Mehmed der Eroberer, Sultan der Osmanen, ein schweres Heer auf, um Belgrad zu belagern. Hunyadi wurde sofort mit der Verteidigung beauftragt. Er führte seine Einheiten zu einem tapferen Kampf und besiegte schließlich das osmanische Heer, das um ein Vielfaches größer war als die ungarischen Verteidiger.

