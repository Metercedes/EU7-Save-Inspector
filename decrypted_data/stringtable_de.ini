troop_desc_101=Sie ist ungeübt im Kampf und nicht vergleichbar mit Berufssoldaten.
troop_desc_102=Sie besitzen eine militärische Ausbildung und grundlegende Kampffähigkeiten.
troop_desc_103=Sie verfügen über eine militärische Ausbildung und einige Kampferfahrung.
troop_desc_104=Diese Krieger beherrschen das Gefecht mit Schwert und Schild meisterlich.
troop_desc_105=Eliteeinheiten, die gut ausgerüstet sind und über hohe militärische Fähigkeiten verfügen.
troop_desc_107=Bewaffnet mit Zweihandschwertern und gut im Nahkampf. In Kämpfen unübertroffen.
troop_desc_108=Einer der drei Ritterorden. Starke Infanterie-Einheit.
troop_desc_109=Traditioneller Kämpfer, geborener Krieger. Herausragende Kämpfer für alle Einheiten.
troop_desc_110=Nordische Elitesoldaten mit riesigen Äxten und ausgezeichneter Ausrüstung.
troop_desc_111=Schwerbewaffnete Infanterie mit starker Angriffskraft und hoher Moral.
troop_desc_112=Eliteeinheit mit exquisiter Ausrüstung, standardisierten Waffen und extrem hohen militärischen Fähigkeiten.
troop_desc_113=Byzantinisches Regiment, das sich aus Elitesoldaten unterschiedlicher Herkunft zusammensetzt.
troop_desc_114=Die neugeschmiedete Rüstung glänzte im Sonnenlicht wie Gold, eine schwere Ausrüstung, die nur die mächtigsten Krieger tragen konnten.
troop_desc_115=Elitetruppen der Tang-Dynastie trugen gekreuzte Schwerter mit extrem langen, geraden und scharfen Klingen, die mit Leichtigkeit gegnerische Panzerung durchdrung.
troop_desc_201=Sie rekrutierten sich hauptsächlich aus lokalen Zivilisten und waren für die Verteidigung und Unterstützung der Städte zuständig.
troop_desc_202=Bewaffnet mit einfachen Speeren und gefährlich für feindliche Kavallerie. Dennoch mangelt es ihnen an Ausbildung.
troop_desc_203=Sie verfügen über eine militärische Ausbildung und einige Kampferfahrung.
troop_desc_204=Bewaffnet mit Eisenspeeren und massiven Schilden, sind sie ein Bollwerk gegen feindliche Angriffe.
troop_desc_205=Elitesoldaten, die der gegnerischen Kavallerie äußerst wirksam zusetzen können. Kann auch als Hauptinfanterie eingesetzt werden.
troop_desc_206=Die disziplinierten schottischen Langspeerträger stellen sich unbeugsam ihren Feinden.
troop_desc_207=Soldaten mit einem hohem Grad an Wachsamkeit. Meist mit wichtigen Aufgaben im Bereich der Verteidigung betraut.
troop_desc_208=Mit Lanzen bewaffnete Legionen aus dem Römischen Reich. Sie stellen sich ohne Furcht feindlichen Angreifern.
troop_desc_209=Die dichte Formation der Phalanx kann mit allen Arten von Angriffen fertig werden.
troop_desc_210=Enorm widerstandsfähige Soldaten. Sie kämpfen geschickt und tapfer, wenn sie angegriffen werden.
troop_desc_211=Durch ihre Wandlungsfähigkeit auf dem Schlachtfeld sind sie ein wichtiger Teil der Infanterie.
troop_desc_212=Elitetruppen der Tang-Dynastie, die etwa 3 Meter lange Würgeschwerter trugen, waren extrem mächtig und ein Albtraum für Feindeskavallerie.
troop_desc_301=Wendiger und schneller Kavallerie-Späher. Ein Experte im Aufspüren feindlicher Bewegungen auf dem Schlachtfeld.
troop_desc_302=Kavallerietruppen mit offensiven und defensiven Fähigkeiten, eine der berittenen Hauptkräfte.
troop_desc_303=Kavallerieeinheit, die die Adligen eskortiert. Durch ihre militärische Erfahrung und besondere Ausrüstung ist sie für jeglichen Kampf bestens geeignet.
troop_desc_304=Elite-Kavallerieeinheit, gut ausgerüstet und schwer bewaffnet.
troop_desc_305=Obwohl sie sich an den Kampf zu Pferd gewöhnt haben, ist ihre Gewohnheit, zu Fuß zu kämpfen, immer noch offensichtlich.
troop_desc_306=Sie sind gut im Durchbrechen der gegnerische Frontlinie und im Sturmangriff.
troop_desc_307=Eliteeinheit der Wüstenkavallerie mit großen Vorteilen im Kampf in der Wüste.
troop_desc_308=Mächtige Kavallerieeinheit, die dem Feind auf dem Schlachtfeld verheerenden Schaden zufügt.
troop_desc_309=Einer der drei Ritterorden. Sie verbinden gute Taktik mit großer Stärke.
troop_desc_310=Einer der drei Ritterorden. Diese Reiter besitzen eine mächtige Schlagkraft.
troop_desc_311=Diese Reiter repräsentieren eine Organisation von Rittern mit unerschütterlichen Glauben.
troop_desc_312=Die mongolische Kavallerie ist eine gut ausgebildete, disziplinierte und einschüchternde Streitmacht, die ein prächtiges Reich von beispielloser Größe in der Welt aufgebaut hat.
troop_desc_313=Als persönliche Wacheinheit von Kaiser Li Shimin der Tang-Dynastie waren ihre Kampffähigkeiten hervorragend und sie trugen schwarze Rüstungen und fürchteten nie den Tod.
troop_desc_401=Kavallerie, die mit einer Lanze ausgerüstet ist und schnelle Angriffe durchführen kann. 
troop_desc_402=Im mittelalterlichen feudalen Europa erhielten diese Ritter von Kindheit an eine militärische Ausbildung.
troop_desc_403=Schwer gepanzerte Kavallerie-Einheit. Nur durch strenges Training sind sie imstande das Gewicht ihrer schweren Rüstung zu tragen.
troop_desc_404=Im Sturmangriff ist die Hellebarde des bestens ausgerüsteten Reiters eine gefürchtete und äußerst effektive Waffe.
troop_desc_405=Schwer gepanzerte Einheit, die dennoch über große Agilität und auch über große Durchschlagskraft verfügt.
troop_desc_406=Sowohl Reiter als auch Pferd dieser Einheit sind mit den erlesensten Ausrüstungen ausgestattet.
troop_desc_407=Geschickte Kavallerie-Einheit für alle Schlachten und bestens für jegliche Angriffe geeignet. 
troop_desc_408=Kühne und mächtige Kavallerieeinheit. Die riesigen Schwingen hinter ihnen sind ihr Symbol.
troop_desc_409=Schwer gepanzerter Ritter. Mit ihren Speeren führen sie verheerende Angriffe aus, die ihre Feinde vernichten.
troop_desc_410=Einer der drei Ritterorden mit einem extrem wilden Kampfstil.
troop_desc_411=Sie wurden von der Adelsklasse ausgebildet sowie ausgerüstet und waren normalerweise als Leibgarde des Erzherzogs im Feld aktiv.
troop_desc_412=Die Unteroffiziere bilden die Hauptstreitmacht des Ordens und sind im Rang niedriger als die Ritter, aber ihre Bedeutung auf dem Schlachtfeld steht außer Frage.
troop_desc_413=Die königlichen Truppen der Tang-Dynastie drängten sich mit ihren Pferden in schwarzer Rüstung und Masken auf den Gesichtern wie dunkle Wolken gegen den Feind.
troop_desc_414=Die Asse des Oströmischen Reiches repräsentierten den Ruhm des Reiches. Sie trugen schwere Rüstungen, waren beinahe unverwundbar durch Schwerter und Speere und verfügten über große Schlagkraft.
troop_desc_501=Geschickte Schleudereinheit mit schlechter Ausrüstung.
troop_desc_502=Speerwerfer-Einheit mit begrenzter Kampfkraft.
troop_desc_503=Ordinäre, leicht gepanzerte Einheit. Sie eignen sich bestens für den Fernkampf, sind aber für den Nahkampf ungeeignet.
troop_desc_504=Mit ihren Armbrüsten sind sie gefürchtete Gegner in jedem Kampf.
troop_desc_505=Gepanzerte Einheit mit starken Kompositbögen.
troop_desc_506=Bewaffnet mit Musketen können sie jede Panzerung durchlöchern.
troop_desc_507=Diese Einheit kämpft mit einer Waffe, die extrem schwer zu beherrschen ist. Nur Personen, die seit ihrer Kindheit eine spezielle Ausbildung erhalten, können damit schießen.
troop_desc_508=Einheit, die normalerweise aus Söldnern besteht. Schlecht ausgerüstet.
troop_desc_509=Einheit des spanischen Königs, die den amerikanischen Kontinent erobert hat. Ihre Kampfkraft ist getrieben durch ihre Gier nach Schätzen.
troop_desc_510=Furchteinflößende, gut ausgerüstete Musketiere. Massiver Schießpulverrauch und -lärm sind ihre ständigen Begleiter.
troop_desc_511=Ein erfahrener Armbrustschütze, der dem Feind auf dem Schlachtfeld gnadenlos das Leben nimmt.
troop_desc_512=Armbrustschützen mit riesigen Schilden. Während des Nachladens bietet ihr Schild einen wirksamen Schutz.
troop_desc_513=Soldat, dessen Körper blau gefärbt ist. Guerilla-Experte mit hoher Kampfkraft in den Wäldern.
troop_desc_514=Die von den Langbogenschützen abgefeuerten Brandpfeile können eine große Gefahr für den Feind darstellen, insbesondere wenn sie im Einklang abgefeuert werden.
troop_desc_515=Elitetruppen der Tang-Dynastie, die Zhuge-Repetierarmbrüste trugen, schossen Pfeile, die den Himmel bedeckten und von ihren Feinden gefürchtet waren.
troop_desc_601=Geschickte Kavallerieeinheit mit ausgezeichneter Reitkunst. Kann während des Galoppierens präzise mit Speeren schießen.
troop_desc_602=Kavallerieeinheit, die mit starken Bögen ausgerüstet ist. Gut im Reiten und Schießen, aber schlecht im Nahkampf.
troop_desc_603=Diese berittenen Bogenschützen können dem Feind schwere Verluste zufügen, ohne selbst getroffen zu werden.
troop_desc_604=Diese schwer gepanzerte Kavallerie schleudert dem Feind massive Speere entgegen.
troop_desc_605=Kavallerieeinheit, die gut reiten und schießen kann und bestens für den Kampf in der Wüste geeignet ist.
troop_desc_606=Diese riesigen Tiere trampeln ihre Feinde nieder und bieten zugleich ihren Reitern einen guten Schutz.
troop_desc_607=Grasland-Soldaten, die quasi auf Pferderücken aufgewachsen sind. Schnelle Überfälle sind ihr Spezialgebiet.
troop_desc_608=Eine extrem elitäre, professionelle Kavallerieeinheit, die von Kindheit an streng trainiert wird.
troop_desc_609=Diese äußerst mobilen und kampfbereiten Truppen waren der Garant für die Militärstärke der Timuriden und ihr Galopp durch die Steppe konnte den Feind vor Angst erstarren lassen.
troop_desc_314=Dem von Edward III. gegründeten Orden konnten nur die angesehensten Mitglieder der königlichen Familie beitreten und sie waren ein Symbol für Loyalität und Ehre.
troop_desc_315=Die stärksten Krieger und die besten Graslandpferde der westlichen Liao bildeten das Team. Sie waren mutig und erfahren auf dem Schlachtfeld und unbesiegbar, wohin sie auch kamen.
troop_desc_415=Die Compagnie d'ordonnance war die stehende Kavallerie Frankreichs, eine gut ausgerüstete Truppe, die besser organisiert und disziplinierter war als die feudale Ritterschaft des Adels.

