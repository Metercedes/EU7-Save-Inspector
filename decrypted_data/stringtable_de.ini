stage_name_4651=Die Tragödie von Rhodos
stage_name_4652=Die Tragödie von Rhodos

stage_intro_4641=Seit seiner ersten Thronbesteigung im Alter von 14 Jahren hatte Mehmed II. ein Ziel: Konstantinopel zu erobern und das Byzantinische Reich zu zerstören! Als er 1451 erneut Sultan des Osmanischen Reiches wurde, hatte er endlich die Gelegenheit, diesen Plan in die Tat umzusetzen.
stage_intro_4643=Der Fall von Konstantinopel war für Mehmed II. nicht das Ende seines Eroberungszuges. Vielmehr hatte sich mit dem Wiederaufbau Konstantinopels der Vorhang für die Eroberungs- und Expansionsbestrebungen des jungen und übermütigen Sultans gerade geöffnet...... Im Jahr 1456 marschierte die hochmoralisierte osmanische Armee auf Belgrad zu.
stage_intro_4645=Angesichts der Niederlage in der Schlacht von Belgrad verzichtete Mehmed II. im Jahr 1457 auf einen groß angelegten Krieg. Erst 1458 fühlte sich Mehmed II. verjüngt, um seinen Eroberungskrieg fortzusetzen. Diesmal sahen sich die Nachbarländer einem reiferen und raffinierteren Mohammed II. gegenüber.
stage_intro_4647=Als das Osmanische Reich mit voller Kraft nach Westen expandierte, wurde es häufig durch die Angelegenheiten Ostasiens unterbrochen, insbesondere nachdem Uzon Hassan von Aq Qoyunlu in Erzincan ein großes Heer versammelt hatte, um in die kaiserlichen Gebiete einzufallen. Mehmed II. musste sich vom Balkan zurückziehen, um diesem unruhigen östlichen Nachbarn eine gute Lektion zu erteilen .......
stage_intro_4649=Nach dem Sieg des Osmanischen Reiches über die Widder-Dynastie gelang Mehmed II. die Einigung Anatoliens, und die Vorherrschaft des Osmanischen Reiches in der Region war gesichert. Zu diesem Zeitpunkt hatte er endlich freie Hand, um den Balkan zu erobern, dessen erster steifer Knochen das Osmanische Reich daran hinderte, den Balkan zu vereinen - Albanien!
stage_intro_4651=Der Krieg weitete sich nach und nach auf die italienische Halbinsel aus. Um die osmanische Bedrohung zu bekämpfen, bat der Papst verschiedene Mächte um Hilfe. Doch Mehmed II. hatte sein Augenmerk bereits auf die Insel Rhodos gerichtet, die er erobern musste, um die vollständige Kontrolle über das östliche Mittelmeer zu erlangen. Und der große Eroberer war im Begriff, seinen letzten Akt zu vollziehen.

