general_desc_Tancred=Er war ein niederer normannischer Adeliger, über den nicht viel bekannt ist. Seine 12 Söhne jedoch legten die Grundsteine für viele europäische Legenden.
general_desc_William Iron Arm=Er war der Erstgeborene des Tankred von Hauteville und vergrößerte das Vermögen der Familie um ein vielfaches. Während der Belagerung von Syrakus tötete er eigenhändig den Emir von Syrakus, was ihm den Spitznamen "Eisenarm" verlieh.
general_desc_Drogo=Er war der son des Tankred von Hauteville, Wilhelms Bruder und ein normannischer Anführer. In der Schlacht um Sizilien kämpfte er Seite an Seite mit seinem Bruder und nach einiger Zeit wurde er sogar Lehensherr. 
general_desc_Humphrey=Er war der Sohn des Tankred von Hauteville und er war Wilhelms Bruder. Nach dem Tod von Wilhelm und Drogo übergab er Guiscard das Sorgerecht für seinen Sohn. 
general_desc_Roger Bosso=Der jüngste Sohn des Tankred von Hauteville und seiner Frau Fressenda. Er 
general_desc_Emma of Hauteville=Sie war die Tochter von Guiscard und Alberada. Ihre beiden Söhne nahmen an den Kreuzzügen teil.
general_desc_Bohemond I=Er war der Sohn von Robert Guiscard und Alberada und der Anführer des ersten Kreuzzuges. Außerdem war er der Gründer des Fürstentums Antiochia.
general_desc_Roger Borsa=Er war der Sohn von Robert Giscard und Sikelgaita. Seine ambitionierte Mutter wollte, dass er der Thronfolger seines Vaters wird, doch darum musste er mit seinem Bruder Bohemond kämpfen.
general_desc_Roger II=Er war der Gründer des Königreich Siziliens. Unter seiner Herrschaft wehrte das Königreich sich erfolgreich gegen viele Invasoren und überlebte so 7 Jahrhunderte. 
general_desc_Tancred Prince of Galilee=Er war Tancred, Sohn von Emma de Hauteville und Odo, dem guten Marquis, und diente als Regent des Fürstentums Antiochia während Bohemunds Abwesenheit.
general_desc_William I the Bad=Er war der vierte Sohn von Roger II und war bekannt als "der Schlechte", oder "der Böse".
general_desc_Constance I=Sie war die Tochter von Roger II und spielte eine wichtige Rolle in der Besetzung Siziliens durch das Haus Hauteville. Später heiratete sie den Heiligen Römischen Kaiser Heinrich VI und wurde somit zur Kaiserin.
general_desc_William II the Good=Er war der Sohn Wilhelm des Schlechten. Seine Regierungszeit wird als ein goldenes Zeitalter des Friedens und der Gerechtigkeit gesehen.
general_desc_Frederick II=Er war der Sohn von Kaiser Heinrich VI von Hohenstaufen und Königin Constance. Er regierte ein Reich, das sich von Sizilien bis nach Deutschland erstreckte. An den Kreuzzügen nahm er auch Teil, wo er sogar Jerusalem einnahm.

