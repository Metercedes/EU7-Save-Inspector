general_skin_20140=Erhabene Ritter Saladin
Saladin2=Erhabene Ritter Saladin
general_desc_Saladin2=Saladin war nicht nur ein ausgezeichneter Militärbefehlshaber, sondern auch ein Ritter von großer Persönlichkeit. Seine Nachsicht und Barmherzigkeit retteten viele vor den grausamen Verwüstungen des Krieges und selbst seine Gegner waren von seinem edlen Charakter bewegt.
general_skin_20169=Mehmed II. der Eroberer
Mehmed II 2=Mehmed II. der Eroberer
general_desc_Mehmed II 2=Nach dem Tod von Murad II. wurde Mehmed II. zum zweiten Mal Sultan der Osmanen. In den nächsten dreißig Jahren würden unter ihm alle Mächte um die Osmanen herum besiegt werden.
Wu Zetian=Wu Zetian
general_desc_Wu Zetian=Die Kaiserin der Tang-Dynastie legte während ihrer Herrschaft großen Wert auf die Entwicklung von Bildung und kulturellen Angelegenheiten und wählte eine große Anzahl talentierter Persönlichkeiten aus. Unter ihrer Herrschaft wurde die Wirtschaft der Tang-Dynastie immer wohlhabender und die Gesellschaft erlebte ein Wachstum und entwickelte sich stark.




battle_talk_170101=Eliminiere den Rebellenführer!
battle_talk_170102=Wir gerieten ins Kreuzfeuer und baten William Herbert um Hilfe!
battle_talk_170103=Haltet an und tötet die Verstärkung von Edward IV.! Lasst niemanden passieren!
battle_talk_170104=Die Verstärkungen wurden alle in die Flucht geschlagen! Startet den Hauptangriff!
battle_talk_170201=Es ist Zeit, ihnen zu zeigen, was mit Verrätern passiert.
battle_talk_170202=Edward IV. hat meinen Vater ermordet! Ich werde den Tod meines Vaters rächen!
battle_talk_170203=Der Feind ist auf der Flucht. Nehme ihren Anführer gefangen !
battle_talk_170204=Robert ist tot. Gib den Widerstand auf!
battle_talk_170301=Der Nebel war so dicht, dass ich nicht einmal die Anzeichen alliierter Truppen erkennen konnte.
battle_talk_170302=Wir haben uns einen Vorteil verschafft! Nach vorne! Zerschmettere den Feind!
battle_talk_170303=Ich denke, ich sollte auf das Schlachtfeld zurückkehren und meine Verbündeten unterstützen.
battle_talk_170304=Es ist Edwards Armee! Zerstöre sie!
battle_talk_170305=Es gibt keine Möglichkeit, diese Niederlage rückgängig zu machen. Wir müssen einen Ausweg finden, um uns zurückzuziehen.
battle_talk_170306=Holen Sie sich Warwick! Lass ihn nicht entkommen!
battle_talk_170401=Obwohl unsere Truppen müde sind, hat der Feind auch eine weite Reise hinter sich und ist möglicherweise nicht gut vorbereitet.
battle_talk_170402=Beeilen Sie sich mit den Befestigungen. Wir müssen bereit sein, bevor Yorks Armee eintrifft.
battle_talk_170403=Auf der linken Flanke wurden feindliche Truppen gesichtet! Wehrt ihren Überraschungsangriff ab!
battle_talk_170404=Verschone keinen einzigen Feind!
battle_talk_170501=Der Thron von England sollte nicht Richard III. gehören! Henry Tudor ist der beste Mann für den Thron!
battle_talk_170502=Schamloser Verräter! Dafür wirst du bezahlen!
battle_talk_170503=Die Macht von Richard III. ist zu groß. Wir müssen einen Weg finden, seinen Einflussbereich zu schwächen.
battle_talk_170504=Nehmen Sie den Herzog von Buckingham gefangen! Ich werde ihn enthaupten lassen!
battle_talk_170601=Die brutale Herrschaft von Richard III. wird heute enden.
battle_talk_170602=Der Thron von England wird nur mir gehören!
battle_talk_170603=Alle Truppen zum Angriff! Ziel: Richard III!
battle_talk_170604=Richard III. ist tot. Lang lebe der König!
battle_talk_700801=Finde den Feind! Bereitmachen zu kämpfen!
battle_talk_700802=Der Feind ist uns zahlenmäßig überlegen. Befehlen Sie der gesamten Armee, sich zurückzuziehen und verlassen Sie sich auf die Verteidigungsanlagen der Stadt!
battle_talk_700803=Unsere Alanen Verstärkungen sind demoralisiert und nicht kampfbereit. Wir müssen einen Weg finden, ihre Moral zu stärken.
battle_talk_700804=Mit Hilfe der Alanen werden wir in der Lage sein, den Feind abzuwehren.
battle_talk_700805=Das Schlachtfeld wurde umgekehrt. Wir sind die Außenseiter.
battle_talk_700806=Feinde gesichtet! Verteilt euch in Kampfformation!
battle_talk_700807=Der Feind besteht überwiegend aus Infanterie. Wir sollten unseren Manövervorteil nutzen, um sie einzukesseln.
battle_talk_700808=Priorisieren Sie die Eroberung von Städten und die Blockierung ihres Rückzugs!
battle_talk_700809=Schicke sofort jemanden zu den Alanen und erbitte sie um Hilfe!
battle_talk_700810=Selbst wenn Verstärkung kommt, werde ich sie alle vernichten!

