stage_intro_4221=Nach der Unterzeichnung des Vertrags von Troyes fiel Frankreich in seine dunkelste Zeit. Der größte Teil des französischen Territoriums war von den Engländern besetzt, als Jeanne d'Arc dem französischen Volk wie ein Wunder erschien.
stage_intro_4223=Die Engländer errichteten eine Burg außerhalb von Orléans, um die Verteidiger in die Falle zu locken. Jeanne d'Arc beschloss die Initiative zu ergreifen, schwenkte ihre Banner und kletterte auf den Festungswall.
stage_intro_4225=Jeanne d'Arc beschloss, Orléans nicht zu halten und veranlasste die Armee die Initiative zu ergreifen. Sie kletterte mit ihrem Banner auf die Festung und Jeanne d'Arcs Aktion, als erste zu kämpfen, demoralisierte den Feind stark, was es den Franzosen ermöglichte, Orléans erfolgreich zu befreien.
stage_intro_4227=Nachdem Orléans befreit worden war, war noch immer ein Teil der englischen Armee in Jareau unweit von Orléans stationiert. Frankreich musste Yarrow schnell brechen, um die Bedrohung im Südosten von Orleans zu entschärfen und die Möglichkeit eines englischen Gegenangriffs zu verhindern.
stage_intro_4229=Nachdem sie Jargeau zurückgewonnen hatte, verlegte Jeanne d'Arc ihre Armee schnell nach Meune-sur-Loire. Dort startete sie einen Angriff, der den Marsch der englischen Armee südlich der Loire in unmittelbarer Nähe effektiv behinderte.
stage_intro_4231=Nach der Eroberung der Brücke nach Meune-sur-Loire griff Jeanne d'Arc die Stadt oder das Schloss von Meune-sur-Loire nicht direkt an. Stattdessen griff sie am nächsten Tag das nahe gelegene Beaugency an und brachte die englische Armee schnell dazu, die Stadt zu verlassen und sich auf die Burg zurückzuziehen.
stage_intro_4233=Der schnelle Fall von Beaugency demoralisierte die englischen Verstärkungen und nach mehreren harten Kämpfen musste sich die englische Armee nach Paris zurückziehen. Jeanne d'Arc hingegen traf die Entscheidung, den Marsch zu beschleunigen und die volle Verfolgung aufzunehmen, und die beiden Seiten trafen sich schließlich in Parthie.
stage_intro_4235=Der Sieg in der Schlacht bei Patay beendete Englands Bestreben, Frankreich unter seiner Herrschaft zu vereinen und beendete ebenso den Niedergang Frankreichs. In Folge wurde schwere Kavallerie nach Reims geschickt, um die Kirche für die Krönung des Prinzen zu erobern.
stage_intro_4237=Auf dringenden Wunsch der Armee befahl Karl VII. einen Angriff auf Paris, wo Jeanne d'Arc die französische Armee in einem erbitterten Kampf gegen die englische Hauptstreitmacht anführte und Jeanne d'Arc als erste kämpfte, obwohl sie verwundet war.
stage_intro_4239=In dem kritischen Moment, als die französische Armee in Paris eindrang, befahl die französische Krone der Armee, sich aus der Schlacht zurückzuziehen. Jeanne d'Arc wurde dann ausgesandt, um La Charité zu belagern. Diese aber war äußerst schwierig, da die Schlacht  im tiefsten Winter statt fand und es an Truppen und Nahrung mangelte.
stage_intro_4255=Jeanne erfuhr, dass Compiègne vom Fürstentum Burgund angegriffen wurde und beschloss, der Stadt zu Hilfe zu eilen. Jedoch wurde sie gefangen genommen, nachdem sie vom Feind umzingelt war. Später wurde die Nationalheldin von den Burgundern an die Engländer verkauft und in Rouen am Scheiterhaufen hingerichtet.
stage_intro_4257=England stellte Jeanne d'Arc als Ketzerin vor Gericht, die niemals nachgab und ihre Unschuld beteuerte. Die Geschichte Frankreichs im fünfzehnten Jahrhundert wurde durch den Willen eines jungen Mädchens komplett neu geschrieben.

