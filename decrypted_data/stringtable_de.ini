battle_talk_3020201=Die Elitetruppen im Zentrum von Alexios' Heer sind nahezu unbesiegbar. Wir sollten die umliegenden Einheiten in die Flucht schlagen, dann wird hoffentlich auch das Zentrum zusammenbrechen.
battle_talk_3020202=Die gegnerische Warägergarde ist zu weit vorgedrungen. Wir müssen ihre Moral brechen!
battle_talk_3020203=Oh, ich sollte mich aus dem Staub machen.
battle_talk_3020204=Feigling!
battle_talk_3020301=Da sind die Byzantiner wieder.
battle_talk_3020302=Es ist ein Hinterhalt!
battle_talk_3020303=Unser Versorgungstross ist noch im Lager. Wir können es nicht in die Hände des Feindes fallen lassen.
battle_talk_3020304=Die Moral unserer Truppen droht zu brechen. Rückzug.
battle_talk_3020305=Behemund glaubte, einen weiteren Sieg errungen zu haben. Da es Alexios jedoch gelungen war, die Beute und Vorräte der Normannen zu entwenden, musste sich Behemund trotzdem vorerst nach Italien zurückziehen.
battle_talk_3020501=Neapel zahlt uns eine Menge Geld damit wir sie in Ruhe lassen.
battle_talk_3020502=Trotz siegreicher Schlachten gegen Roger Borsa und seine Unterstützer konnte Behemund seinen Anspruch auf des Erbe nicht geltend machen. Nach vielen Kompromissen konnte er sich den Titel Graf von Tarent sichern. Aber Behemund war damit nicht zufrieden. Er beschloss, sich ein eigenes Königreich aufzubauen.
battle_talk_3020801=Meine Männer bauen einen Belagerungsturm; er sollte in 3 Tagen fertig sein. Auch ein Sturmangriff auf eines der seitlichen Tore ermöglicht es uns, die Mauern zu durchbrechen.
battle_talk_3020802=Die Tunnel sind gebaut. Wir können innerhalb von 2 Tagen einen Stollen unter die südliche Mauer treiben. Falls Ihr zuvor auf der Südseite durchbrecht, können wir direkt die innere Mauer untergraben.
battle_talk_3020803=Diese Krieger sind deutlich stärker als der Mob zuvor. Wir müssen uns neu formieren.
battle_talk_3020804=Wir haben keine Kraft mehr. Sagt den Byzantinern, dass wir aufgeben.
battle_talk_3020805=Es fanden geheime Verhandlungen mit den Seldschuken statt und Nicäa wurde beim anschließenden Sturmangriff überraschend schnell von Alexios's Heer erobert. Tankred war von da an sehr misstrauisch gegenüber den Byzantinern.
battle_talk_3020901=Regnet Pfeile auf diese Barbaren und löscht sie aus, bevor sie sich hier einen Vorposten aufbauen.
battle_talk_3020902=Wir kommen, haltet durch.
battle_talk_3020903=Wenn wir diese Dörfer plündern, können wir unsere Vorräte aufstocken und einheimsche Bergführer gefangen nehmen, um so die feindlichen Truppen auf Bergpfaden zu umgehen.
battle_talk_3021001=Wir können nichts gegen die hohen Mauern ausrichten. Für das Aufrechterhalten der Belagerung müssen wir unsere einzige Nachschubquelle, die Schiffe im Hafen St. Simeon, unbedingt verteidigen.
battle_talk_3021002=Wir lassen uns nicht länger von Kerboga herumkommandieren! Erledigt ihn, während er mit diesen Eindringlingen beschäftigt ist!
battle_talk_3021003=Durch den plötzlichen Tod Kerbogas waren die Seldschuken zum Rückzug gezwungen und Antiocha gehörte nun Behemund.
battle_talk_3021201=Hinterhalt!
battle_talk_3021202=Gütiger Gott! Die Seldschuken haben Behemund gefangen.
battle_talk_3021203=Behemund wurde für seinen Übermut bestraft und geriet in Gefangenschaft.
battle_talk_3021301=Feindliche Verstärkungstruppen. Es muss eine großes Heer in der Nähe sein.
battle_talk_3021302=Das gesamte Morgenland hat sich gegen uns vereint, wir haben keine Chance auf einen Sieg. Rückzug!
battle_talk_3021303=Die Schlacht war eine bedeutende Niederlage der Kreuzfahrer und Behemund konnte weder sein Gebiet erweitern noch neue Ressourcen akquirieren.
battle_talk_3021501=Wenn wir hier bleiben, werden wir verhungern. Es gibt Schöneres, als mit Behemund begraben zu werden.
battle_talk_3021502=Ich hörte das Gerücht, dass Ihr 500.000 Goldmünzen von Alexios bekommen habt. Anscheinend ist es wahr.
battle_talk_3021503=Obwohl wir die besten Krieger unseres Reichs versammelt haben, müssen wir abwarten, bis sich die Feinde untereinander bekriegen. Eure Majestät scheint eine wahre Obsession mit diesem Normannen zu haben.
battle_talk_3021504=Ihr habt verloren und meine Warägergarde kam noch nicht einmal zum Einsatz. Es ist aussichtslos.
battle_talk_3021505=Hätten wir Euch mal besser nicht gegen die Seldschuken geholfen!
battle_talk_3021506=Hätte, hätte, ... Es ist, wie es ist! Kehrt zurück nach Hause, alter Rivale, ich werde auf dem nächsten Schlachtfeld gebraucht.
battle_talk_3021507=Alexios wusste um die Schwächen und Fähigkeiten seines Erzfeindes und ging keine Risiken ein. Behemund wurde erneut vom oströmischen Kaiser besiegt.

stage_30209_goal_1={8}Nebenzielgebiet besetzen{9}
stage_30210_goal_3={8}Zieleinheit muss bis zum Sieg überleben{9}
stage_30212_goal_4={8}Nebenzielgebiet besetzen{9}
stage_30215_goal_1={8}Schlüsseleinheiten erreichen das Zielgebiet {9}

battle_talk_3010201=Befehlt den Bauern, die Felder anzuzünden. Es darf kein einziges Weizenkorn in die Hände der Normannen fallen.
battle_talk_3010202=Es gibt nicht genug zu essen. Wir bitten darum, mit dem Papst zu verhandeln zu dürfen.
battle_talk_3010203=Lasst sie kommen. Von einer so kleinen Gruppe geht keine Gefahr aus.
battle_talk_3010204=Die päspstlichen Truppen sind wehrlos, nutzt diesen Moment für einen Überfall!
battle_talk_3010205=Hiermit bitte ich den Papst unterwürfigst um Vergebung.
battle_talk_3010206=Die Nachricht, dass der Papst von den Normannen besiegt und gefangen wurde, verbreitete sich wie ein Lauffeuer in Europa.
battle_talk_3010301=Apulien ist ein toller Ort. Hier gibt es alles was man braucht.
battle_talk_3010302=Robert! Warum vergnügst du dich in Apulien, anstatt zu deiner eigenen Burg zurückzukehren?
battle_talk_3010303=Beschuldigst du mich des Müßiggangs? Du wirst schon sehen, bald werde ich ganz Kalabrien erobern!
battle_talk_3010304=Mir läuft die Zeit davon. Die Normannen kommen nicht weit, wenn sie nur alleine kämpfen.
battle_talk_3010305=In den vergangenen Jahren hat Robert enormes politisches Geschick bewiesen. In seine Hände legen wir die Zukunft der Normannen!
battle_talk_3010401=Attackiert die byantinischen Festungen und verteibt sie aus Kalabrien!
battle_talk_3010402=Haben wir erst einmal die Byzantiner erledigt, können wir nach Sizilien marschieren.
battle_talk_3010403=Diese Stadt hat starke Verteidigungsanlagen, aber eine Belagerung wird sie in die Knie zwingen.
battle_talk_3010404=Die Byzantiner wurden vertrieben, jetzt ist die Gelegenheit, Sizilien zu erobern.
battle_talk_3010405=Die Normannen! Schnell, sammelt die Truppen und tretet ihnen entgegen!
battle_talk_3010601=Letztes Mal konnten die Byzantiner die Eroberung von Messina vereiteln, doch bei diesem nächtliche Überfall stehen die Chancen besser.
battle_talk_3010602=Befestigt die Stadt! Das wird unser Ausgangspunkt für die Eroberung Siziliens.
battle_talk_3010603=Normannen, falls ihr Verbündete benötigt, dann sind wir bereit, zu vehandeln.
battle_talk_3010604=Vielen Dank für eure Kooperation. Solche Verbündeten können wir in der Tat gebrauchen.
battle_talk_3010701=Bari ist die letzte Festung der Oströmer. Sobald wir sie besiegen, wird ganz Süditalien uns Normannen gehören!
battle_talk_3010702=Haltet durch! Kaiserliche Verstärkung ist auf dem Weg zu uns!
battle_talk_3010703=Für eine entsprechende Gegenleistung könnte ich behilflich sein.
battle_talk_3010704=Bari braucht uns!
battle_talk_3010705=Die Verstärkung darf die Stadt nicht erreichen!
battle_talk_3010801=Bari ist gefallen und wir werden Guiskards nächstes Ziel sein.
battle_talk_3010802=Wir müssen uns gegen ihn vereinigen.
battle_talk_3010803=Unorganisierter Haufen! Egal wie viel ihr schickt, ihr könnt mich nicht aufhalten!
battle_talk_3010804=Ostrom wir als nächstes die Macht der Normannen zu spüren bekommen.
battle_talk_3010805=Weniger als zwei Jahre nach dem Fall Salernos wurde auch Benevento von Guiskard erobert.
battle_talk_3011001=Die Venezianer haben einen Großteil unserer Flotte versenkt.
battle_talk_3011002=Der Kaiser hat uns befohlen, die Stadt bis zum Tod zu verteidigen. Verstärkungstruppen werden bestimmt bald kommen!
battle_talk_3011003=Die heldenhafte Warägergarde hat den Feind in die Flucht geschlagen! Folgt mir!
battle_talk_3011004=Die kaiserlichen Verstärkungstruppen sind eingetroffen! Zum Angriff!
battle_talk_3011005=Die Bekämpfung der Warägergarde hat oberste Priorität! Brecht ihre Linien auf und umzingelt den Feind!
battle_talk_3011006=Wir müssen uns neu aufstellen! Rückzug! Rückzug!
battle_talk_3011007=Alexios verbündete sich mit dem Gegenpapst Clemens III. und den Veneziern. Diese führten einen Überraschungsangriff durch, bei dem viele normannischen Schiffe versenkt wurden. Außerdem hatten sich zahlreiche Angelsachsen, die 1066 nach der Schlacht von Hastings nach Konstantinopel geflohen waren, Alexios' Warägergarde angeschlossen.
battle_talk_3011101=Der Papst hat sich in der Engelsburg verschanzt und wird von Heinrich IV. belagert. Er benötigt unsere sofortige Hilfe.
battle_talk_3011102=Danke für Euren Beistand, mein geschätzer Vasall.
battle_talk_3011103=Marschiert weiter und vertreibt Heinrich IV. aus Rom!

