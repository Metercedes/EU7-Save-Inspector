conquest_faction_desc_603=Seit Henry, Herzog von Lancaster, den englischen Thron bestieg und den Krieg mit dem Königreich Frankreich wiedereröffnete, hatte der Krieg fast 10 Jahre gedauert und die Menschen beider Länder hatten lange gelitten. Angesichts des anhaltenden Ausbruchs von Bauernaufständen im Land braucht das Königreich England dringend eine angemessene Lösung des Streits mit dem Königreich Frankreich.
conquest_faction_desc_602=Als Vasallenregime, das vom Königreich England nach seiner Invasion der Insel Irland errichtet wurde, musste jeder Gouverneur der irischen Dominions vom König von England geadelt werden. Bis heute hat das instabile Regime des Königreichs England den irischen Territorien eine größere Autonomie verliehen und die Lords der Territorien zögern zunehmend, sich der Herrschaft des Königreichs England zu unterwerfen.
conquest_faction_desc_601=Das Königreich wurde von den Gaels gegründet, die nicht vom Königreich England regiert werden wollten. Als einzige verbliebene gälische Macht auf der Insel Irland würde sich das Königreich El Youk niemals dem Königreich England unterwerfen.
conquest_faction_desc_604=Seit seiner Gründung befindet sich das Königreich Schottland im Krieg mit seinem südlichen Nachbarn England und beide Seiten streben danach, sich gegenseitig zu erobern und ganz Großbritannien zu vereinen. Nachdem das Königreich England im Krieg gegen das Königreich Frankreich einen enormen Vorteil erlangt hat, muss das Königreich Schottland mehr Kräfte aufwenden, um das Königreich England in Schach zu halten.
conquest_faction_desc_605=Nach dem Zerfall der kapetischen Dynastie begann König Eduard III. von England fast ein Jahrhundert Krieg zwischen England und Frankreich, als er den Thron Frankreichs anstrebte. Jetzt hat das Königreich Frankreich unter der britischen Offensive Städte verloren und sogar die Hauptstadt Paris ist gefallen und die Herrschaft der Valois-Dynastie scheint unweigerlich zu Ende zu gehen, es sei denn, es geschieht ein Wunder.
conquest_faction_desc_606=Das zwischen dem Königreich Frankreich und dem Königreich England gelegene Herzogtum Bretagne ist oft zu einem Schlachtfeld zwischen diesen beiden Mächten um die Nachfolge der Herzöge geworden und hat so zu Unruhen innerhalb des Herzogtums geführt. Jetzt, da der Krieg zwischen Frankreich und England wieder aufgenommen wurde, muss das Herzogtum Bretagne vorsichtiger sein, um nicht in den Sumpf des Streits zwischen den beiden Mächten zu geraten.
conquest_faction_desc_607=Das Herzogtum Burgund war eine herzogliche Vasallenmacht des Königreichs Frankreich, die auf die Gründung des Königreichs Burgund durch die Burgunder während der großen Barbarenmigration zurückgeht. Als Großbritannien und Frankreich in den Sumpf des Krieges um den französischen Thron gerieten, nutzte das Herzogtum Burgund die Gelegenheit, sein Territorium zu erweitern, und wurde allmählich zu einer mächtigen Kraft auf dem europäischen Kontinent.
conquest_faction_desc_608=Als synkretistische Konföderation, bestehend aus den skandinavischen Königreichen Dänemark, Norwegen und Schweden, teilten sich alle drei Königreiche einen einzigen Monarchen. Die Gründung der Kalmar Union ermöglichte es den Wikinger-Nachkommen Skandinavien, sich gegen ihren mächtigen Nachbarn im Süden, das Heilige Römische Reich, zu vereinen.
conquest_faction_desc_609=Ein Reich, das von König Otto I. des Ostfränkischen Reiches nach seiner Krönung zum Kaiser der Römer in Rom gegründet wurde. Obwohl das Heilige Römische Reich zu Beginn stark war, schwand die zentrale Macht des Reiches nach dem Chaos des Großen Leeren Throns und das Reich entwickelte sich allmählich zu einer losen Konföderation von Hunderten von Vasallenstaaten.
conquest_faction_desc_610=Das böhmische Fürstentum, einer der Vasallenstaaten des Heiligen Römischen Reiches, entstand aus dem einst tschechisch gegründeten Fürstentum Böhmen. Das böhmische Volk musste sich wegen seiner Unterstützung der katholischen Kirche und seiner brutalen Unterdrückung des böhmischen Volkes, das die Hussiten unterstützte oder mit ihnen sympathisierte, gegen die Tyrannei des Heiligen Römischen Reiches erheben.
conquest_faction_desc_611=Als einer der Vasallenstaaten des Heiligen Römischen Reiches wurde das Herzogtum Bayern von einem Vasallenstaat zu einem unabhängigen Herzogtum erhoben. Herzog Albrecht II. von Österreich wurde als Schwiegersohn des Heiligen Römischen Kaisers Sigismund zu seinem Nachfolger ernannt und dies war vielleicht die perfekte Gelegenheit für die Habsburger, den Kaiserthron zu beanspruchen.
conquest_faction_desc_612=Das Herzogtum Bayern, einer der Vasallenstaaten des Heiligen Römischen Reiches, entstand als autonomes Herzogtum, das vom Ostfränkischen Königreich gegründet wurde. Die Familie der Wittelsbacher, die das Herzogtum Bayern regierte, hatte mehrmals den Thron des Heiligen Römischen Reiches bestiegen, und nun versuchte das Herzogtum Bayern angesichts der inneren Unruhen des Reiches, die Kontrolle über das Reich zurückzugewinnen.
conquest_faction_desc_613=Die Deutschen Ritter eroberten das preußische Land und errichteten einen christlichen Staat. Die Deutschen Ritter wurden vom Königreich Polen eingeladen, nach Preußen zukommen aber nach der Gründung des Deutschen Staates wandten sich die beiden Seiten schnell gegeneinander und jetzt befinden sie sich im Krieg und sehen sich gegenseitig als großes Problem an.
conquest_faction_desc_614=Oder die Kronländer des Königreichs Polen, was sich auf das Gebiet bezieht, in dem die Polen an der Macht sind und tatsächlich kontrollieren. Seit die Deutschen Ritter Preußen eroberten, begannen diese unersättlichen Wölfe, in das Königreich Polen einzudringen, und wenn die Deutschen nicht aus Preußen vertrieben würden, würde es im Königreich Polen keinen Frieden geben.
conquest_faction_desc_615=Nach dem Zusammenbruch des Königreichs Arles errichtete das Haus Savoyen ein unabhängiges Herzogtum im Nordwesten Italiens und im Südosten Frankreichs. Das Herzogtum Savoyen lag zwischen dem östlichen und dem westlichen Frankenreich und musste mit diesen beiden Großmächten vorsichtig sein.
conquest_faction_desc_616=Das Herzogtum Mailand liegt in der Region Lombardei in Italien. Obwohl das Herzogtum nominell dem Heiligen Römischen Reich untergeordnet ist, verfügt es über ein hohes Maß an Unabhängigkeit und Autonomie. Die Alpen bilden eine natürliche nördliche Barriere für das Herzogtum Mailand, und das Fürstentum kann sich aktiv nach Süden entwickeln, wobei der Vereinigung der nördlichen Regionen Italiens Vorrang eingeräumt wird.
conquest_faction_desc_617=Ursprünglich ein kommerzieller Stadtstaat in der Region Ligurien an der Nordwestküste Italiens, blühte es während der Kreuzzüge auf und entwickelte sich allmählich zur mächtigsten Seerepublik im westlichen Mittelmeerraum. Später, als Genua mit der Republik Venedig um den lukrativen Gewürzhandel konkurrierte, konnte es die Republik Venedig nicht besiegen und hat nun keine andere Wahl, als vorerst zu ruhen.
conquest_faction_desc_618=Als das Weströmische Reich durch die Invasion der Barbaren fiel, flohen die Bewohner der Nordküste Italiens in die Lagune und gründeten dort Siedlungen und die Venezianische Republik entwickelte sich. Nach mehreren venezianisch-genuesischen Kriegen besiegten die Venezianer die genuesische Republik vollständig und behaupteten ihre maritime Vormachtstellung.
conquest_faction_desc_619=Nach dem sizilianischen Vesperkrieg trennte das Vereinigte Königreich Aragon Sizilien vom ehemaligen Königreich Sizilien und das Gebiet des italienischen Teils des ehemaligen Königreichs wurde Königreich Neapel genannt. Das Königreich Neapel hat die Teilung Siziliens nie anerkannt und war entschlossen, die verlorenen Gebiete zurückzugewinnen.
conquest_faction_desc_620=Das Königreich Portugal wurde nach der Unabhängigkeit des portugiesischen Burgh gegründet, das ursprünglich Teil des Königreichs Kastilien war. Das Königreich Portugal befand sich am westlichsten Punkt des europäischen Kontinents und obwohl es isoliert war, hätte seine einzigartige geografische Lage das Königreich vor dem Dilemma mehrerer Feinde bewahrt, wenn es sich für eine aggressive Expansionspolitik entschieden hätte.
conquest_faction_desc_621=Das Vereinigte Königreich Kastilien, eine zusammengesetzte Monarchie, die durch die Annexion des Königreichs Leon geschaffen wurde, ist die wichtigste treibende Kraft hinter der Bewegung zur Wiedererlangung der verlorenen Gebiete auf der Iberischen Halbinsel. Jetzt, da die verbleibenden islamischen Kräfte auf der Iberischen Halbinsel schwach sind, könnte das Vereinigte Königreich Kastilien versuchen, die gesamte Iberische Halbinsel zu vereinen.
conquest_faction_desc_622=Als zusammengesetzte Monarchie, die durch den Zusammenschluss des Königreichs Aragon und des Königreichs Barcelona entstanden ist, kontrolliert das Vereinigte Königreich Aragon fest die Hauptinseln im westlichen Mittelmeer und hat eine starke Kontrolle über das Meer. Diese weit verbreiteten Inseln sind ein hervorragendes Sprungbrett für das Königreich, sich in die Angelegenheiten des europäischen Kontinents einzumischen.
conquest_faction_desc_623=Das Emirat Granada, das letzte verbliebene islamische Königreich auf der Iberischen Halbinsel nach der Auflösung der Post-Omayyaden-Dynastie, befand sich in einer prekären Lage angesichts der christlichen Streitkräfte, die den Großteil des iberischen Territoriums zurückerobert hatten. Glücklicherweise aber waren diese christlichen Nationen nicht vereint und das Königreich hatte noch eine Überlebenschance.

