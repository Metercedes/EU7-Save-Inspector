battle_talk_150101=Ich habe gehört, dass ihre Armeen Europa verlassen, und das ist unsere beste Chance! Starten Sie einen Nachtangriff, damit wir die Eindringlinge vertreiben können!
battle_talk_150102=Gut so! Wir werden ihr Lager stürmen und sie überraschen!
battle_talk_150103=Wir dürfen das Lager nicht fallen lassen! Wir müssen zurückschlagen, auch wenn unsere Einheiten nicht stark genug sind! Lasst sie die Macht des Osmanischen Reiches spüren.
battle_talk_150201=Das ist so erbärmlich, dass du die Osmanen ins Land geholt hast, um mich zu besiegen. Wisst ihr denn nicht, dass sie unsere wahren Feinde sind?
battle_talk_150202=Ich würde sie lieber zuerst vernichten. Ich will nicht, dass ihr wieder in unser Gebiet eindringt!
battle_talk_150203=Es scheint nur noch eine Frage der Zeit zu sein, bis wir auf dem gesamten Balkan einmarschieren!
battle_talk_150204=Der Feind hat das Flusstal erreicht. Lasst uns angreifen!
battle_talk_150205=So ein Mist! Es gibt Hinterhalte!
battle_talk_150301=Wir müssen uns zusammenschließen, um der Expansion der Ungläubigen widerstehen zu können. Sonst dauert es nur noch wenige Jahre, bis wir auf dem Balkan nicht mehr Fuß fassen können.
battle_talk_150302=Für die Freiheit! Lasst uns die Eindringlinge vertreiben!
battle_talk_150303=Wie können diese Besiegten es wagen, einen neuen Krieg anzufangen? Diesmal müssen wir sie vernichten!
battle_talk_150304=Verbünden wir uns mit ihnen im Kampf!
battle_talk_150305=Trefft ihren Angriff nicht direkt, sondern haltet den letzten Verteidigungspunkt. Wir werden zum Gegenangriff zurückkommen!
battle_talk_150401=Der Sultan ist im Begriff, zurückzukehren. Wir müssen einen Gegenangriff starten! Lasst diese Rebellen für ihre Taten bezahlen!
battle_talk_150402=Das provokative Verhalten dieser Vasallenstaaten hat mir Schande gebracht. Mein Zorn kann es kaum erwarten, ihre Ländereien zu zertrampeln!
battle_talk_150403=Die Osmanen greifen so schnell an. Wenn ich meinen Thron noch behalten will, ist vielleicht der einzige Weg die Kapitulation.
battle_talk_150404=Der Balkan könnte uns genommen werden, wenn wir nichts tun, um unser Bruderland zu unterstützen. Beeilen wir uns, sie zu retten!
battle_talk_150501=Der Kosovo ist der Geburtsort unserer Nation und ein wichtiger strategischer Standort. Wenn wir ihn verlieren, verlieren wir unser Standbein.
battle_talk_150502=Wir müssen uns verbünden. Die Türken dürfen nicht weiter vorrücken!
battle_talk_150503=Niemand darf sich uns in den Weg stellen! Inshallah!
battle_talk_150504=Wir müssen vorrücken und dieses Gebiet durchbrechen! Wir können euer Gebiet weiter nach Westen ausdehnen!
battle_talk_150505=Ich muss dieses Land verteidigen, auch wenn es mich das Leben kostet.
battle_talk_150506=Ich ergebe mich! Bitte erlaubt mir, dass ich mich dem Sultan ergebe!
battle_talk_150507=Lasst ihn näher kommen. Ich will sehen, wie er aussieht.
battle_talk_150508=Für den König! Für Serbien! Tötet ihn!
battle_talk_150509=Nein!
battle_talk_150601=Lasst die Herrlichkeit Gottes wieder auf dieses Land scheinen! Hier kann ich nur Dunkelheit und Verzweiflung sehen!
battle_talk_150602=Wir werden die unterdrückten Christen und das Römische Reich retten! Ladet auf!
battle_talk_150603=Habt keine Angst! Sie sind nur eine vorübergehende Ansammlung von Pöbel!
battle_talk_150604=Aber ihre schwere Kavallerie ist stark. Wir müssen ihre erste Angriffswelle entschlossen abwehren!
battle_talk_150605=Ich hätte nie gedacht, dass wir scheitern würden! Wir waren zu zuversichtlich.
battle_talk_150701=Mein Imperium braucht Euer Land. Unsere Fahnen werden bis an den Rand der Welt wehen!
battle_talk_150702=Nein! Die Verteidigungsanlagen der Städte Anatoliens sind verwundbar. Wir müssen ihnen zu Hilfe eilen!
battle_talk_150703=Alle Einheiten in Marsch! Ankara gehört mir!
battle_talk_150704=Nein, mein Fehler wird zum Untergang des Reiches führen!
battle_talk_150801=Nehmt Konstantinopel ein! Wir werden die wahren Herrscher des Balkans sein!
battle_talk_150802=Die Armee des Feindes ist überwältigend. Wir müssen standhaft bleiben, um unser Land zu schützen!
battle_talk_150803=Ein neuer Herrscher hat das Osmanische Reich auf wacklige Beine gestellt. Dies ist unsere beste Chance, zurückzuschlagen! Schlagt zu!
battle_talk_150804=Es sieht so aus, als müssten wir den Plan, Konstantinopel anzugreifen, verschieben. Lasst uns zuerst diese Rebellen vernichten!
battle_talk_150901=Das Imperium ist derzeit nicht in der Lage, die Verteidigung anderer Städte zu finanzieren. Am besten ist es, wenn Thessaloniki in den Händen der Venezianer bleibt.
battle_talk_150902=Diese Stadt sollte den Osmanen gehören. Jetzt habt ihr alle noch die Chance, euch zu ergeben.
battle_talk_150903=Da diese Stadt bereits uns gehört, gibt es definitiv keine Möglichkeit, sich zu ergeben.
battle_talk_150904=Die Osmanen haben einen Angriff auf Thessaloniki gestartet. Das hat zwar den Druck auf Konstantinopel gemildert, aber die Lage ist immer noch nicht optimistisch.
battle_talk_150905=Jetzt gehört die Stadt den Osmanen. Auch die venezianische Flotte kann uns nicht aufhalten.
battle_talk_150906=Thessaloniki befindet sich in einer Krise, aber meine Flotte wurde von der osmanischen Flotte blockiert. Es ist dringend notwendig, die Blockade zu durchbrechen, um Thessaloniki zu helfen.
battle_talk_150907=Die Römer haben versucht, eine Offensive zu starten, um den Druck auf die Venezianer zu mindern. Ein solcher Versuch war sinnlos.
battle_talk_150908=Die osmanische Flotte, die das Meer blockierte, wurde besiegt. Unsere Flotte fährt weiter!
battle_talk_150909=Der Feind hat einen Gegenangriff gestartet. Schickt unsere VerstärkungsEinheiten.
battle_talk_151001=Das Osmanische Reich wird nun von einem sehr jungen Sultan geführt. Der Geist seiner Armee wird zwangsläufig zersplittert sein. Wir sollten diese Gelegenheit nutzen und eine Offensive starten, um den Sieg zu erringen!
battle_talk_151002=Blutige Christen! Sie wagen es, sich meinem Leben nach der Abdankung in den Weg zu stellen! Greift an!
battle_talk_151003=Verbreitet die Verteidigungslinie! Wir müssen unseren Boden gegen ihren Angriff verteidigen! Nur das Meer ist das, was wir hinter uns hatten, und es gibt keinen Weg zurück!
battle_talk_151004=Der König ist geopfert worden. Rückzug! Aber ich werde ihn rächen!
battle_talk_151101=Für den König! Für Ungarn! Ich bin zurückgekommen, um den König zu rächen! Rache! Rache! Rache!
battle_talk_151102=Ihre schwere Kavallerie mag stark sein, aber unseren scharfen Schwertern und Musketen können sie nicht widerstehen! Die Zukunft des Osmanischen Reiches liegt in euren Händen. Ich möchte, dass du dir den Verlauf der heutigen Schlacht genau ansiehst.
battle_talk_151103=Ja, Vater!
battle_talk_151104=Der Feind ist von uns zurückgeschlagen worden! Gegenangriff!
battle_talk_151201=Sprengt die Tore Roms mit der Artillerie auf und nehmt die Hauptstadt des Römischen Reiches ein. Dieses Land sollte unser sein!
battle_talk_151202=Soldaten, wir müssen diese Stadt verteidigen. Dies ist unsere Heimat, in der unsere Familien und unser Glaube leben. Wir werden bis zur letzten Minute kämpfen!
battle_talk_151203=Das Kanonenfeuer kann nur mein Fleisch und Blut begraben, aber niemals unseren Glauben und unsere Entschlossenheit!
battle_talk_151204=Endlich habe ich den Wunsch meiner Vorfahren erfüllt! Allah wird uns zweifelsohne segnen. Ich werde Deine Lehren in ganz Europa verbreiten!

battle_talk_700601=Unsere Strategie ist es, zuerst Tiberias zu umzingeln und die Franken zur Rettung zu locken. Unsere Stärke liegt in Feldschlachten, nicht in Belagerungen und Verteidigungen.
battle_talk_700602=Ist es zu gefährlich für uns, auf diese Weise zur Rettung zu gehen? Ich habe das Gefühl, dass ich vielleicht eine Verschwörung wittere.
battle_talk_700603=Wie auch immer, wir müssen zur Rettung gehen. Los geht's! Möge Gott uns segnen!
battle_talk_700604=Die Tempelritter gehen hinterher, falls Saladin uns von hinten einwickelt.
battle_talk_700605=Wir müssen so schnell wie möglich zum See Genezareth, um unser Wasser und unsere Vorräte wieder aufzufüllen. Unsere Mannschaft ist so knapp an Wasser, dass wir nicht mehr weitermachen können.
battle_talk_700606=Vielleicht sollten wir einen Rückzug in Erwägung ziehen, da es uns nicht gelingt, Saladins Verteidigungslinie vor uns zu durchbrechen.
battle_talk_700607=Die einzige Möglichkeit zu überleben ist, die Belagerung zu durchbrechen! Oh Gott, wir werden alle hier sterben! Und das ganze Königreich wird zerstört werden!
battle_talk_700608=Haltet sie davon ab, sich der Wasserquelle zu nähern! Die Franken sind erschöpft und kampfunfähig. Wir können die Gelegenheit nutzen, um sie zu töten.
battle_talk_700609=Diese uneinige fränkische Armee ist zum Scheitern verurteilt. Für Jerusalem scheint es an der Zeit zu sein, den Herrscher zu wechseln.
battle_talk_700610=Gott, ich bin der Einzige, der entkommen ist. Vielleicht war diese Schlacht von Anfang an ein Fehler.

battle_talk_56=Soldaten, stürmt mit mir! Der Sieg ist zum Greifen nahe. Der Ruhm gehört uns.
battle_talk_57=Bleibt in Formation! Allah ist mit uns!
battle_talk_58=Die Osmanen dringen weiter in die umliegenden Gebiete ein. Eines Tages werden sie kommen, um sich für die Vergangenheit zu rächen. Wir können nicht stillsitzen und zusehen, wie sie immer stärker werden. Während sie tief auf dem Balkan festsitzen, sollten wir die Initiative ergreifen und angreifen.
battle_talk_59=Die osmanischen Kanonen sind bereits unter der Zitadelle aufgestellt. Konstantinopel ist in Gefahr, deshalb bitte ich euch alle, mit mir dorthin zu ziehen und es zu unterstützen.
battle_talk_60=Auch wenn unsere Mauern gefallen sind, bleiben unsere Herzen fest. Diejenigen, die diese Stadt einnehmen wollen, werden keinen Erfolg haben, es sei denn, sie gehen über meinen toten Körper!
battle_talk_61=Man kann niemandem so leicht trauen. Jetzt, da ich alles zurückerobert habe, was mir gehörte, soll der Hass mit Blut vergolten werden.
battle_talk_62=Țepeș hat mir geholfen, den Thron wieder zu besteigen. Dann werde ich ihm Beistand leisten.
battle_talk_63=Der Ruhm des Byzantinischen Reiches wird von uns abgelöst werden. Von diesem Tag an sind wir das Byzantinische Reich!
battle_talk_64=Die Dynastie von Qara Qoyunlu war vernichtet worden. Die Verstärkungen aus dem Westen fuhren ebenfalls vom Meer aus los und bündelten ihre Kräfte, um die Osmanen mit voller Wucht anzugreifen.

general_desc_Murad I=Murad I. war der Sultan des Osmanischen Reiches. Während seiner Herrschaft verfolgte er eine Politik der territorialen Expansion, eroberte viele Länder in Südosteuropa und Westasien und legte den Grundstein für den Aufstieg des Osmanischen Reiches. Er wurde jedoch während der Schlacht am Kosovo ermordet.
general_desc_Bayezid I=Bayezid I., Sohn von Murad I., einem berühmten Feldherrn, der auch als "Blitz" bekannt war, trug während seiner Herrschaft wesentlich zur Ausdehnung des türkischen Territoriums bei. Er besiegte Hunderttausende von Kreuzrittern bei Nikopolis, wurde aber später in der Schlacht von Ankara gefangen genommen.
general_desc_Murad II=Während seiner Herrschaft erneuerte Murad II. das Land, reorganisierte die Rüstung, rettete das Osmanische Reich, das kurz vor der Teilung stand, und legte ein solides Fundament für den späteren Ruhm des Osmanischen Reiches.
general_desc_John Hunyadi=Ein Nationalheld des Königreichs Ungarn, der den Spitznamen "Weißer Ritter" erhielt. Trotz wiederholter Niederlagen trotzte er der Macht des Osmanischen Reiches und verhinderte dessen Expansion für lange Zeit.
general_desc_Princess Sophia=Nichte von Konstantin XI. Sie heiratete Iwan III. den Großen von Moskau und half ihm, die Russen von der jahrhundertelangen Herrschaft der Goldenen Horde zu befreien.
general_desc_Stephen the Great=Während seiner Herrschaft sorgte er für nationale Stabilität und inspirierte das rumänische Volk über Generationen hinweg, seinem Geist der nationalen Unabhängigkeit zu folgen. Später wurde er posthum von der Kirche als "der große und heilige Stephan" heiliggesprochen.
general_desc_Vlad III=Der Woiwode der Walachei war ein heldenhafter Verteidiger Rumäniens, aber er war auch als "Vlad der Pfähler" bekannt, weil er die Adligen und das Volk seines Landes pfählte, und er war auch der Prototyp des Vampirs.
general_desc_Charlemagne2=Karl der Große war einer der größten Könige des fränkischen Königreichs und eine der einflussreichsten Persönlichkeiten des mittelalterlichen Europas. Er eroberte halb Europa und wurde vom römischen Papst zum "Kaiser des römischen Volkes" gekrönt.
general_desc_Arthur2=Es heißt, dass nur derjenige König von England werden kann, der das Schwert aus dem Stein zieht. König Artus zog erfolgreich das Schwert aus dem Stein und wurde in den Herzen der Menschen zum "Ewigen König", er steht für Heldentum, Ritterlichkeit und Gerechtigkeit!
general_desc_Mehmed the Conqueror2=Aufgrund seines Mutes, seiner Führungsqualitäten und seiner kulturellen Leistungen wurde Mehmed II. als "Sultan der Eroberung" und "Eroberer Europas" verehrt. Er wurde zum Vorbild für spätere Sultane.
general_desc_Candarli Halil=Çandarlı II. Halil Pascha war ein prominenter osmanischer Staatsmann und Militärgeneral, der Mitte des 15. Jahrhunderts als Oberbefehlshaber des Großwesirs und des Osmanischen Reiches diente. Er war hoch angesehen für seine Tapferkeit, Weisheit und Führungsqualitäten und war bekannt als die "Weisheit der Türkei" und der "Meister von Halil".

