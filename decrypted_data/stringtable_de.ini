general_desc_Roger II1=Der Gründer des Königreichs Sizilien, ein großer Monarch mit sowohl Weisheit als auch Ehrgeiz. Er überwand kulturelle und religiöse Unterschiede und integrierte verschiedene ethnische Gruppen und Glaubensrichtungen in sein Königreich.
general_desc_Li Shimin1=Der Kriegsgott der Tang-Dynastie, der sich auf unvergleichliches militärisches Talent verließ, um in alle Richtungen zu erobern und unbesiegbar zu sein. Doch gerade diese blendende Schärfe machte ihn zu einer Kraft, die weder von seinem Vater noch von seinen Brüdern ignoriert werden konnte. Im Strudel der Macht ist er ein furchterregendes und unberechenbares Talent.
general_desc_Wu Zetian1=Wie eine blühende Blume war Wu Zetian schön und klug, mit einem Hauch jugendlicher Sanftheit und Unschuld in ihren Gesten. Zu dieser Zeit war sie noch nicht von Macht- und Ehrgeizgedanken infiziert und trug die Unschuld und Sehnsucht eines Mädchens in ihrem Herzen. Sie anzusehen ist wie der erste Blick auf ein Handrollen-Bild, ein unvergesslicher Moment.
general_desc_ZhiTianXinChang=Er war ein herausragender Anführer Japans während der Sengoku-Periode, berühmt für seine Intelligenz und militärische Strategie. Er vereinte Zentraljapan und etablierte eine starke Macht und zählt zu den "Drei Großen" der Sengoku-Periode, zusammen mit Toyotomi Hideyoshi und Tokugawa Ieyasu.
general_desc_ZhiTianXinChang1=Nach dem Honnoji-Vorfall dachten alle, einschließlich Akechi Mitsuhide, dass Oda Nobunaga tot sei. Stattdessen entkam Oda Nobunaga dem Tod, wurde inmitten von Blut und Flammen wiedergeboren und kehrte als Teufelskönig zurück!
general_desc_Pope Gregory IX=Er ist das Oberhaupt der katholischen Kirche und Herrscher des Kirchenstaates.

