general_desc_Guiscard=Er war der sechste Sohn von Tankred de Hauteville und seiner Frau Fressenda, bekannt als „Robert der Listige“. Er war ein Held der Normannen und verbrachte sein ganzes Leben damit, Italien und Sizilien zu erobern.

