item_desc_3105=Eine kurze Axt, die normalerweise bei der Holzverarbeitung eingesetzt wird. Sie kann aber auch zum Kämpfen verwendet werden.
item_desc_3106=Eine kurze Wuchtwaffe, die auch effektiv gegen Rüstungen ist. Die ungünstige Lage des Schwerpunkts macht sie allerdings schwer zu handhaben.
item_desc_3154=Dieser Säbel zeugt von höchster Schmiedekunst und weist eine extrem scharfe Klinge auf.
item_desc_3155=Diese Waffe kann Rüstungen deformieren oder punktuell durchschlagen, wenn man die nötige Kraft dazu aufbringt.
item_desc_3164=Ein Kriegspferd aus der Großen Indischen Wüste, das sehr robust, schnell und widerstandfähig gegen Hitze und Kälte ist.
item_desc_3199=Ein schwerer Schild mit aufwändigen sakralen Verzierungen.
item_desc_3202=Modische Schuhe aus Kuhleder, die leicht und stapazierfähig sind.
item_desc_3203=Diese Stiefel sind sowohl funktional als auch ästhetisch ansprechend und wurden von Adeligen bei der Jagd getragen.
item_desc_3204=Oft mit der Beinröhre kombiniert, waren diese Schuhe Teil einer Ritterrüstung. Sie sind aufwändig herzustellen, bieten aber guten Schutz bei gleichzeitig relativ hoher Beweglichkeit.
item_desc_3205=Ein günstiger Holzschild, der aber seinen Zweck erfüllt.
item_desc_3206=Ein einfach herzustellender Helm, der auch für andere Zwecke verwendet werden kann.
item_desc_3207=Dieser Helm weist eine gewisse Ähnlichkeit mit dem antiken Korinthischen Helm auf und wurde oft zusammen mit einer Kettenrüstung getragen.
item_desc_3208=Dieser Helm bietet einen Rundumschutz, allerdings ist das Sichtfeld entsprechend eingeschränkt.
item_desc_3209=Eine Rüstung aus einer Vielzahl an Drahtringen, die vor allem gegen Hieb- und Stichwaffen schützt.
item_desc_3230=Eine äußerst gefährliche Wuchtwaffe, die auch gegen Plattenpanzer wirksam ist. Die gesamte kinetische Energie wird bei einem Treffer auf einen kleinen Punkt konzentriert, was zu schweren Verletzungen bis hin zum Tod führen kann.
item_desc_3264=Eine Mischung aus Hieb- und Stichwaffe, die vielseitig eingesetzt werden kann.

