;战役介绍
stage_intro_1=Anfänger-Tutorial. Hier lernen Sie die Grundlagen der Bewegung und des Angriffs.
stage_intro_2=Grundlagen-Tutorial. Hier lernen Sie die grundlegenden Funktionen wie Rekrutierung, Auflösung, Nachschub und den Einsatz gemischter Einheiten.
stage_intro_3=Fortgeschrittenen-Tutorial. Hier lernen Sie den Bau und die Funktionen von Städten und Burgen sowie die Rekrutierung von Söldnern.
stage_intro_4=Erweitertes Tutorial. Hier lernen Sie den Aufbau und die Verwendung von Kriegsausrüstung sowie unterstützender Gebäude kennen.
stage_intro_101=Im Jahr 376 n. Chr. suchten die Westgoten Zuflucht vor den einfallenden Hunnen im Römischen Reich. Nachdem sie die Donau überquert hatten, kam es jedoch zu zahlreichen Konflikten mit den Römern. Schließlich kämpften die beiden Seiten in Marcianopolis gegeneinander.
stage_intro_102=Nach der Plünderung der Donauprovinzen bereiteten sich die aufständischen Goten 378 n. Chr. darauf vor, gemeinsam mit anderen Barbaren in den Balkan einzufallen. Der römische Kaiser Valens beschloss, den Kampf selbst in die Hand zu nehmen, um der Rebellion Herr zu werden. Doch mangelnder Zusammenhalt unter seinen Soldaten gefährdete die Niederschlagung erheblich.
stage_intro_103=Im Jahr 402 n. Chr. drangen die Westgoten unter der Führung von König Alarich weiter in das Hinterland des Weströmischen Reiches ein. Bald darauf umzingelten sie die wichtige Stadt Mailand, in der Kaiser Honorius residierte. In großer Bedrängnis befahl Honorius seinem Feldherrn Stilicho, der sich zu dieser Zeit im Norden aufhielt, seine Truppen nach Süden zu führen und das Reich zu verteidigen.
stage_intro_104=Im Jahr 410 n. Chr. wurde Alarich am zur Verhandlung mit Kaiser Honorius vereinbarten Treffpunkt von römischen Truppen angegriffen. Diese Tat veranlasste ihn, die Verhandlungen mit dem Weströmischen Reich abzubrechen und die Stadt Rom zu belagern, die nun kurz vor dem Zusammenbruch zu stehen schien.
stage_intro_105=Im Jahr 419 n. Chr. geriet das Königreich der Sueben, das seit kurzem mit dem Weströmischen Reich verbündet war, häufig mit dem benachbarten Vandalenreich wegen territorialer Ansprüche an der Grenze aneinander. In seinem starken Eroberungsdrang beschloss König Hermeric von Sueben, die Initiative zu ergreifen und in das Gebiet der Vandalen einzudringen.
stage_intro_106=Im Jahr 439 n. Chr. führte Gaiserich seine Armee über die Straße von Gibraltar und besetzte acht Jahre lang den größten Teil des Territoriums des Weströmischen Reiches in Nordafrika. Nach fast fünf Jahren des Friedens mit dem Weströmischen Reich nahm Gaiserich Karthago ins Visier, die drittgrößte Stadt des Römischen Reiches.
stage_intro_107=Im Jahr 451 n. Chr. nutzte der ehrgeizige Hunnenkönig Attila einen Skandal am weströmischen Hof aus, um Truppen zur Invasion Galliens zu entsenden. Der römische Feldherr Aetius hielt sich zu dieser Zeit in Gallien auf und nutzte diese Gelegenheit zur Bildung einer Koalition mit den barbarischen Königreichen Galliens, um gegen Attila bestehen zu können.
stage_intro_108=Im Jahr 455 n. Chr. usurpierte Maximus den Thron, indem er Kaiser Valentinian III. ermordete, wodurch das Bündnis zwischen Westrom und dem Vandalen-König Gaiserich zerbrach. Nachdem Gaiserich von Eudoxia, der Witwe Valentinians III., einen Hilferuf erhalten hatte, schickte der Vandalen-König Truppen zum Angriff gegen Italien.
stage_intro_201=Im Laufe des 6. Jahrhunderts erkannten die europäischen Länder die Bedeutung der Kavallerie. Im Jahr 530 griffen die Perser das Byzantinische Reich an. Außerhalb der Stadt Dara zog die schwer gepanzerte Kavallerie der sassanidischen Armee ihre Schlachtreihen auf.
stage_intro_202=Justinian I. versuchte, Roms früheren Ruhm wiederherzustellen. Nachdem Gelimer den Thron bestiegen und sich zum Herrscher des Vandalenreiches aufgeschwungen hatte, erklärte Justinian I. den Vandalen den Krieg. Im Jahr 533 n. Chr. führte Belisarius Truppen nach Nordafrika und marschierte in Richtung Karthago.
stage_intro_203=Nach dem großen Sieg von Byzanz in der Schlacht von Ad Decimum besetzten Belisarius und sein Heer Karthago. König Gelimer, der sich westlich von Karthago aufhielt, suchte Hilfe bei seinem Bruder und sammelte sein Heer, um Karthago zurückzuerobern.
stage_intro_204=Nach der Rückeroberung Nordafrikas wandte Justinian I. seine Aufmerksamkeit dem italienischen Raum zu. Im Jahr 535 n. Chr. führte Belisarius sein Heer zu einem weiteren Feldzug, um Rom einzunehmen und die italienische Region für seinen Kaiser zurückzuerobern.
stage_intro_205=Nach der Eroberung Roms marschierte Belisarius mit seinen Truppen nach Ravenna. Die Hauptstadt des ostgotischen Königreichs würde bald einem massiven Angriff des byzantinischen Heeres ausgesetzt sein.
stage_intro_206=Aufgrund der Expansion der Ostgoten unter ihrem König Totila, schickte Justinian I. Belisarius zurück nach Italien. Im Jahr 546 n. Chr. drangen die Truppen Totilas nach Rom vor und umzingelten die Stadt.
stage_intro_207=Totilas fortgesetzte Aggression in Italien fügte Byzanz schwere Verluste zu. Außerdem plante er eine Seeblockade, um eine weitere Einflussnahme und Versorgung aus Byzanz zu verhindern. Dieses Vorgehen verärgerte Justinian I. zutiefst.
stage_intro_208=Um die Kontrolle über Italien wiederzuerlangen, beschloss Justinian I., seinen Feldherren Narses nach Italien zu schicken. Obwohl Totila in der Unterzahl war, ergriff er die Initiative und griff Narses' Truppen an.
stage_intro_209=Es erwies sich für die Goten als schwierig, den von Narses befehligten Truppen Widerstand zu leisten. Der Ostgotenkönig beschloss, die Franken und Alemannen um Hilfe zu bitten, in der Hoffnung, dass sie nach Italien eindringen und weitere Vorstöße der byzantinischen Armee verhindern könnten.
stage_intro_210=Im Jahr 559 n. Chr. überschritt eine Gruppe von Hunnen die Grenze und verübte in den Außenbezirken von Konstantinopel mutwillig Gräueltaten, was für König Justinian I. eine große Demütigung darstellte. Er rief Belisarius noch einmal zu sich und gab ihm einen letzten Auftrag.
stage_intro_301=Die Ankunft der Angelsachsen versetzte die Ureinwohner Britanniens in Panik, die sich gezwungen sahen, gegen einen gut bewaffneten und gut ausgebildeten Feind zu den Waffen zu greifen.
stage_intro_302=El, der Anführer des südsächsischen Stammes, führte sein Volk erfolgreich an die Südküste der britischen Inseln, doch ihr Marsch ins Landesinnere verlief nicht reibungslos. Sie stießen auf den hartnäckigen Widerstand der Einheimischen, so dass es El bald an Truppen mangelte und er um Verstärkung von den Stämmen in der Heimat bat.
stage_intro_303=Unter dem Einfluss des jahrelangen Konflikts begannen sich die verstreuten Stämme Britanniens zu vereinigen und ihre eigenen Königreiche zu gründen, was jedoch nicht zu Frieden und Stabilität führte. Die Zwietracht entwickelte sich allmählich zu einem großen und brutalen Krieg zwischen Königreichen, der vom Königreich Northumbria ausgelöst wurde.
stage_intro_304=Im Jahr 633 n. Chr. war das Königreich Northumbria unter Edwin der mächtigste Staat in England. Dies beunruhigte dessen Nachbarn und veranlasste König Cadwallon von Gwyneth dazu, ein Bündnis mit dem Königreich Mercia einzugehen und in das Königreich Northumbria einzufallen.
stage_intro_305=Auch wenn die Invasion der Königreiche Gwyneth und Mercia zunächst erfolgreich abgewehrt wurde, wurde das Königreich Northumbria verwüstet und eine Zeit lang geteilt. Im Jahr 634 n. Chr. fiel König Cadwallon von Gwyneth erneut in das Königreich Northumbria ein.
stage_intro_306=Oswalds Rückkehr und seine Nachfolge ermöglichten es der nordhumbrischen Armee, das Königreich Gwynedd zu besiegen und Frieden und Stabilität in Northumbria wiederherzustellen. Im Jahr 644 n. Chr., nach einem Jahrzehnt der Erholung seiner Streitkräfte, ergriff Oswald die Initiative und griff das Königreich Mercia an.
stage_intro_307=Oswalds Invasion in Mercia endete mit einer katastrophalen Niederlage. Penda beschloss, diese Gelegenheit zu nutzen und die Königreiche Ostanglien und Gwynedd zu vereinen, um Krieg gegen Northumbria zu führen. Im Jahr 655 n. Chr. gehörte nur noch Bernicia zum Königreich Northumbria, während das restliche Gebiet von den Koalitionsstreitkräften erobert wurde.
stage_intro_308= Lange Zeit behauptete das Königreich Mercia seine Vorherrschaft, indem es viele Königreiche in Südengland gewaltsam kontrollierte. Um seine Macht zu festigen, führte Beornwulf von Mercia 825 n. Chr. persönlich ein Heer an, um in das Königreich Wessex einzumarschieren. Dies veranlasste König Egbert von Wessex zur Vergeltung.
stage_intro_401=Die Araber planten, sich für die Ermordung ihres Abgesandten durch die Ghassaniden zu rächen. Ihr Plan wurde jedoch von Byzanz aufgedeckt, das sofort seine militärische Verteidigung aufbaute. Angesichts der mächtigen byzantinischen Armee schien der arabische Plan zum Scheitern verurteilt zu sein.
stage_intro_402=Als Khalid seine Truppen nach Marj Rahit führte, sahen die Ghassaniden die muslimischen Araber nicht als Bedrohung an. Doch schon bald bewiesen die Araber, dass ihre Kampfkraft unübertroffen war.
stage_intro_403=Nachdem Abu der erste arabische Kalif geworden war, versuchte er, seine Macht über die arabische Halbinsel hinaus auszudehnen. Seine Armee stieß bis in den Norden vor und griff schließlich Damaskus an.
stage_intro_404=Um die Araber am Vormarsch zu hindern und das verlorene Gebiet zurückzuerobern, beschloss Heraklius, ein großes Heer in die Levante zu schicken. Als sich der Feind näherte, zogen sich die Araber aus Damaskus zurück und gruppierten ihre Kräfte in Yarmouk neu.
stage_intro_405=Nach dem Kampf gegen das byzantinische Heer in der Ebene von Yarmouk beschlossen die Araber, weiter vorzurücken und weitere Städte einzunehmen. Ende 636 n. Chr. erreichten die arabischen Truppen Jerusalem und umzingelten die Stadt.
stage_intro_406=Die arabische Eroberung auf der anatolischen Halbinsel ging weiter und ihre Truppen blieben unbesiegt. Die aufeinanderfolgenden Niederlagen und der Verlust mehrerer Städte versetzten das Byzantinische Reich in Panik. Es musste dringend eine Möglichkeit finden, diesen mächtigen Feind aufzuhalten.
stage_intro_407=Nach dem Sieg über die Sassaniden beschloss Omar, seine arabischen Soldaten nach Afrika zu führen. Dort sollte Ägypten der Ausgangspunkt zur Eroberung weiterer afrikanischer Gebiete werden.
stage_intro_408=Nachdem sie die Herrschaft der Sassaniden ausgelöscht hatten, sahen die Araber das Byzantinische Reich als ihr Hauptangriffsziel an. Aus diesem Grund gründeten sie eine mächtige Flotte, um ihre Angriffe gegen das Byzantinische Reich im Mittelmeer zu verstärken.
stage_intro_501=Im Jahr 865 n. Chr. überquerte ein Heer von Wikingern das Meer, landete auf britischem Boden und verübte Überfälle auf Klöster und Siedlungen an der Küste.
stage_intro_502=Nach dem Beginn ihrer Invasion besetzten die Wikinger in rascher Folge die beiden Königreiche East Anglia und Northumbria. Als Nächstes richteten die Wikinger ihre Aufmerksamkeit auf die Eroberung des Königreichs Wessex.
stage_intro_503=Die Wikinger hatten in der Schlacht von Reading die Oberhand gewonnen und rückten weiter vor. In Ashdown kämpften sie erneut mit den Truppen von Wessex.
stage_intro_504=Nach Jahrzehnten der Invasion und des Plünderns waren nur eine Handvoll Mächte in der Lage, den Wikingern weiterhin Widerstand zu leisten. Eines von diesen war das Königreich Wessex unter der Führung von Alfred.
stage_intro_505=Im Jahr 893 n. Chr. gerieten die Wikinger, die wieder in Britannien gelandet waren, erneut mit den Angelsachsen aneinander. Aufgrund der gesammelten Erfahrungen und der dadurch veränderten Taktik waren die Invasionen der Wikinger nur noch selten erfolgreich.
stage_intro_506=Im Jahr 937 n. Chr. schlossen die drei nördlichen Königreiche ein Bündnis, um die wachsende Macht Englands zu zerstören. Angesichts der feindlichen Invasion stellte König Athelstan ein Heer zusammen und marschierte nach Norden.
stage_intro_507=Um sich um den englischen Thron zu bewerben, beschlossen König Harald Hardrada von Norwegen und seine Verbündeten, Truppen aufzustellen und nach Yorkshire zu marschieren.
stage_intro_508=Nach dem Tod von König Edward dem Bekenner von England begannen diejenigen, die den Thron begehrten, ihre Ansprüche zu erheben. Einer von ihnen, Harald von Norwegen, führte seine Truppen nach England und machte so seinen Anspruch geltend.
stage_intro_601=Das byzantinische Reich und das bulgarische Reich befanden sich viele Jahre lang im Krieg. Im Jahr 811 n. Chr. führte Nikephoros I. einen Angriff auf Bulgarien an und fasste nach mehreren Siegen den Entschluss, nach Pliska zu marschieren.
stage_intro_602=Während der Schlacht von Pliska erlitten sowohl das byzantinische als auch das bulgarische Reich große Verluste, dennoch blieb das bulgarische Reich in der Offensive. Trotz der schweren Verluste weigerte sich das Byzantinische Reich, einen Friedensvertrag zu unterzeichnen.
stage_intro_603=Nach der Thronbesteigung Michails II. beschloss ein Offizier namens Thomas, gegen seine Herrschaft zu rebellieren, was auf große Unterstützung stieß. Er verbündete sich mit den Arabern, um einen Angriff auf Konstantinopel zu starten.
stage_intro_604= Als Vergeltung für die Vertreibung des byzantinischen Klerus beschloss Leo VI. die Ausweisung bulgarischer Kaufleute aus Konstantinopel. Dies gab Simeon I. einen Kriegsgrund, als die Hauptkräfte der byzantinischen Armee im Osten gegen die Araber kämpften.
stage_intro_605=Nachdem Zoe Zaoutzaina Regentin geworden war, beschloss sie, dem bulgarischen Reich keine Zugeständnisse mehr zu machen. Dies veranlasste Simon I. zum Angriff auf das byzantinische Reich. Durch eine Reihe von Maßnahmen des bulgarischen Reiches waren die Byzantiner gezwungen, allein zu kämpfen.
stage_intro_606=Im Jahr 922 kontrollierten die Bulgaren mehr als die Hälfte des Balkans, konnten aber aufgrund ihrer unzureichenden Seemacht keine Bedrohung für Konstantinopel darstellen. Daher beschlossen die Bulgaren, sich mit den Arabern zu verbünden und gemeinsam anzugreifen. Doch ihr Plan wurde durch die rechtzeitige Entsendung byzantinischer Truppen vereitelt.
stage_intro_607=Nach der Beendigung des Krieges mit den Arabern erlangte das Byzantinische Reich bald wieder seine Stärke und besiegte das bulgarische Reich. Doch die Kiewer Rus nutzte dieses Machtvakuum, womit ein neuer mächtiger Feind auf dem Balkan erschien.
stage_intro_608=Mit der Niederlage der Bulgaren im Jahr 971 besetzten die Byzantiner einen großen Teil des bulgarischen Territoriums. Um ihr Land zurückzuerobern, setzten die Bulgaren den Krieg viele Jahre lang fort.
stage_intro_609=Nach der Schlacht am Trajanstor brach im Byzantinischen Reich ein Bürgerkrieg aus. Samuel beschloss, diese Gelegenheit zu nutzen und das byzantinische Reich anzugreifen. Im Jahr 996 besiegte Samuel die byzantinische Armee bei Thessaloniki und begann seinen Marsch nach Süden.
stage_intro_610=Ab 1.000 n. Chr. begann der byzantinische Kaiser Basil II. Truppen nach Bulgarien zu schicken. Obwohl es auf beiden Seiten Siege und Niederlagen gab, bedrohte der Vormarsch der Byzantiner die Existenz Bulgariens. Ein erbitterter Kampf zwischen dem wiedererstarkten Byzantinischen Reich und dem untergehenden Bulgarien schien unausweichlich.
stage_intro_701=Im Jahr 1066 führte der Herzog der Normandie seine Truppen über den Ärmelkanal und landete in England, um den englischen Thron zu beanspruchen. Als Harold II. davon erfuhr, rief er sofort sein Heer nach Süden, um die Invasoren bei Hastings abzufangen.
stage_intro_702=Nach der Schlacht mit Harold II. bei Hastings führte William seine Truppen nach London. Um die Besetzung Londons zu sichern, schickte er einen Teil seiner Streitmacht nach Southwark, um den dortigen Widerstand zu brechen.
stage_intro_703=Nach der erfolgreichen Eroberung Englands weigerte sich das Volk in Exeter, William die Treue zu halten. Um die Aufständischen unter seine Herrschaft zu bringen, führte William seine Truppen zur Belagerung der Stadt, stieß aber auf starken Widerstand.
stage_intro_704=Trotz der Unterstützung durch die Mehrheit des Volkes gab es immer noch Kräfte des Widerstands gegen Williams Herrschaft, die sich vor allem auf den Norden konzentrierten. William beschloss, seine Truppen nach Norden zu führen, da er der Meinung war, dass er die Gefolgschaft dieser Menschen nicht mit friedlichen Mitteln gewinnen konnte.
stage_intro_705=Im Jahr 1075 weigerte sich William, der in die Normandie zurückgekehrt war, die Ehe zwischen Emma de Breteuil und Ralph de Gael anzuerkennen. Dies führte zum Aufstand von drei Grafen. Sie beschlossen, sich aufzulehnen und die Herrschaft Williams zu stürzen, während er noch in der Normandie weilte.
stage_intro_706=Im Jahr 1105 führte Heinrich I. eine Invasion in das Gebiet von Robert, dem Herzog der Normandie, an und eroberte Bayeux und Caen. Im folgenden Jahr kehrte Heinrich I. in die Normandie zurück. Graf Morten, einer der Robert treu ergebenen Adligen, wurde infolge sein Hauptrivale.
stage_intro_707=Im Jahr 1119 führte König Ludwig VI. von Frankreich seine Truppen zum Angriff auf die Normandie. Um seinen Besitz und sein Territorium dort zu verteidigen, war Heinrich I. zum Kampf gegen Frankreich gezwungen.
stage_intro_708=Im Jahr 1135 stürzte die plötzliche Krankheit und der Tod von Heinrich I. England in Anarchie und Chaos. Stephen und die Tochter Heinrichs I., Mathilde, führten ihre jeweiligen Streitkräfte im Kampf um den englischen Thron an.
stage_intro_801=Im Jahr 1048 drang ein Heer unter der Führung eines seldschukischen Fürsten in das von Byzanz beherrschte Gebiet Armeniens ein. Die Byzantiner entschieden sich für eine konservative Strategie und warteten auf Verstärkung, da ihre eigenen Kräfte nicht ausreichten.
stage_intro_802=Im Jahr 1071 nutzte das geschwächte Byzantinische Reich die Gelegenheit des Konflikts zwischen den Seldschuken und den ägyptischen Fatimiden und beschloss, die verlorenen Gebiete in Armenien zurückzugewinnen.
stage_intro_803=Die Aktivitäten der Seldschuken in der Ägäis bedrohten das Byzantinische Reich weiterhin. Alexios beschloss, eine Flotte gegen die seldschukische Marine zu bilden und die Kontrolle über die Ägäis wiederzuerlangen.
stage_intro_804= Da er den mächtigen Seldschuken keinen Widerstand leisten konnte, beschloss Kaiser Alexios, Hilfe aus dem Westen zu suchen. Mit Unterstützung des byzantinischen Reiches segelten die Kreuzfahrer über das Meer und nahmen als erstes Ziel Nicäa ein.
stage_intro_805=Mit zusätzlicher Verstärkung durch die Byzantiner wurden die Kreuzfahrer zu einer schlagkräftigen Streitmacht. Das Kreuzfahrerheer marschierte auf Antiochia zu, eine Stadt auf halbem Weg zwischen Konstantinopel und Jerusalem.
stage_intro_806=Alexios, der sich von seiner Krankheit erholt hatte, begab sich persönlich auf das Schlachtfeld, um die vorderste Verteidigungslinie in Anatolien zu verstärken. Seine Armee besiegte sie die Seldschuken mehrmals und griff nach Erhalt von Verstärkung den Feind erneut an.
stage_intro_807=Im Jahr 1176 beschloss der byzantinische Kaiser Manuel I., sich auf das Sultanat Rum zu konzentrieren und die anatolische Steppe zurückzuerobern, nachdem er sich mit den Bedrohungen durch Ungarn und Serbien im Westen auseinandergesetzt hatte.
stage_intro_808=Manuel I. verlor eine große Anzahl von Belagerungsgeräten und verpasste eine perfekte Gelegenheit, Anatolien zurückzuerobern. Eine Begegnung mit einer Brigade seldschukischer Truppen, die von einer Plünderung zurückkehrte, gab ihm die Hoffnung auf einen Sieg.
stage_intro_901=Nach der Eroberung der seldschukischen Hauptstadt Nicaea wurde das Kreuzfahrerheer von einem heftigen Gegenangriff getroffen. Arslan I. führte eine große Anzahl von Truppen an und umzingelte die Truppen von Bohemond I.
stage_intro_902=Nach der erfolgreichen Einnahme von Antiochia rückten die Kreuzfahrer weiter vor und bewegten sich auf Jerusalem zu. Dort war der arabische General al-Dawla fest entschlossen, die Stadt mit allen Mitteln zu verteidigen.
stage_intro_903=Der Erfolg des ersten Kreuzzugs gab den europäischen Herrschern einen Vorgeschmack auf den Sieg und den Wunsch, eine weitere Expedition zu starten. Diesmal war ihr Hauptziel Damaskus.
stage_intro_904=Akkon war eine sehr wichtige Stadt unter Saladins Herrschaft. Als Saladin erfuhr, dass Guy de Lusignan die Belagerung der Stadt vorbereitete, schickte er sofort Truppen, um diesem Unterfangen zuvorzukommen.
stage_intro_905=Um Jerusalem von Saladin zurückzuerobern, starteten die westeuropäischen Herrscher erneut einen Kreuzzug. Als das Heer Anatolien erreichte, wurde es von den Seldschuken mit einem heftigen Angriff empfangen.
stage_intro_906=Nach dem Rückzug Richards Löwenherz aus Jerusalem beschloss Saladin einen Angriff auf Jaffa, den er als Gelegenheit zur Rache ansah. Als Löwenherz davon erfuhr, sammelte er erneut sein Heer und griff Saladin an.
stage_intro_907=Als sich die Kreuzfahrer auf den Vorstoß nach Jerusalem vorbereiteten, stimmten ihre Anführer der Bitte von Alexios IV. zu und beschlossen, nach Konstantinopel zu ziehen, um seinem Vater bei der Wiedererlangung des Throns zu helfen. Im Gegenzug würde das Byzantinische Reich ihnen wirtschaftliche und militärische Unterstützung gewähren.
stage_intro_908=Nach vielen Kriegsjahren wurde den Kreuzfahrern klar, dass Ägypten ihr größtes Hindernis bei der Rückeroberung Jerusalems war. Also beschlossen sie, eine Expedition zu organisieren und das Mittelmeer zu überqueren und Ägypten anzugreifen.
stage_intro_1001=Aufgrund der offenen Revolten in Wales musste Heinrich II. aus der Normandie nach England zurückkehren. Um die Waliser zu bestrafen und den Auftstand niederzuschlagen, stellte Heinrich II. ein großes Heer zusammen und startete 1165 einen Angriff auf sie.
stage_intro_1002=Arthur und Johann Ohneland hatten lange um das Recht auf den englischen Thron gestritten. Nachdem Johann sich entschlossen hatte, Isabella zu heiraten, wurde dieses Gleichgewicht allmählich gestört. Durch die Einmischung von Hugo X. und Philipp II. wurde die Situation jedoch sehr chaotisch.
stage_intro_1003=Aufgrund der Weigerung Johanns zu kooperieren, kündigte Philipp II. die Rückeroberung der Normandie an und begann bald zu handeln. Im Jahr 1203 schickte Philipp II. Truppen nach Château Gaillard, das er für den Schlüssel zur Kontrolle der gesamten Normandie hielt.
stage_intro_1004=Im Jahr 1213 traf die englische Flotte unter der Führung von William Longespée auf eine französische Flotte, die bereits gelandet war und zu plündern begann. Angesichts der unbesetzten französischen Schiffe schien der englische Sieg unausweichlich zu sein.
stage_intro_1005=Im Jahr 1214 griff eine Koalitionsarmee, bestehend aus den Engländern, dem Heiligen Römischen Reich und Flandern, das Königreich Frankreich an. In aller Eile stellte Philipp II. ein großes Heer zusammen. Trotz der großen Mannstärke der Koalitionstruppen schien die gut ausgebildete französische Kavallerie nicht an Boden zu verlieren.
stage_intro_1006=Während der Regierungszeit Heinrichs III. wurde die Hungersnot in England immer schlimmer, was die Adligen immer unzufriedener mit der Herrschaft Heinrichs machte. Ein von Simon de Montfort geführter Feldzug gegen die Herrschaft Heinrichs III. stand kurz bevor.
stage_intro_1007=Unter der Aufsicht von Edward I. wählte Schottland einen neuen König. Edward I. war der Meinung, dass Schottland eine Markgrafschaft unter englischer Herrschaft werden sollte und forderte seine Hilfe im Kampf gegen Frankreich. Die Schotten lehnten diese Forderung ab und verbündeten sich mit Frankreich.
stage_intro_1008=Unter der Führung von William Wallace griff die schottische Armee England weiterhin an. Im Jahr 1298 beschloss Edward I. einen Waffenstillstand mit dem Königreich Frankreich und kehrte nach England zurück, um sich auf den Kampf gegen die Schotten zu konzentrieren.
stage_intro_1009=Nach der Schlacht von Falkirk wurde Schottland fast vollständig von England erobert. Im Jahr 1306 bestieg Robert the Bruce den schottischen Thron. Unter der wenig zufriedenstellenden Führung Edwards II. stand der Krieg kurz vor der Wende.
stage_intro_1010=Roger Mortimer lernte Isabella kennen, nachdem er 1323 aus dem Tower of London geflohen war. Beide waren mit Edward II. sehr unzufrieden und beschlossen, gegen seine Herrschaft zu rebellieren. Im Jahr 1326 kehrten Isabella und Mortimer heimlich nach England zurück und begannen ihren Widerstand.
stage_intro_1101=Nach dem Verlust Konstantinopels an die Kreuzfahrer wurden das Reich von Nicäa und das Despotat von Epirus zu den beiden größten Regimen im zersplitterten Byzantinischen Reich. Beide strebten danach, als erste das Reich wiederzubeleben, doch dieses gemeinsame Ziel wurde zur Quelle der Konflikte zwischen den beiden.
stage_intro_1102=Das Reich von Nicäa errang schließlich den endgültigen Sieg in seinem Wettstreit mit Epirus um die alleinige Herrschaft über das Reich. Unter der Führung des ehrgeizigen Michael VIII. wandte das Reich von Nicäa seine Aufmerksamkeit nun dem Lateinischen Reich zu, das Konstantinopel besetzt hielt.
stage_intro_1103=Im Jahr 1261 schloss das Reich von Nizäa ein Bündnis mit der Republik Genua und bereitete einen weiteren Angriff auf Konstantinopel vor. Als sie feststellten, dass die lateinische Garnison und die venezianische Flotte noch nicht von ihrer Expedition zurückgekehrt waren, beschlossen sie, diese einmalige Gelegenheit nicht zu verpassen.
stage_intro_1104=Nach der Wiedererrichtung des Byzantinischen Reiches versuchte Michael VIII. die verbliebenen Kräfte in den umliegenden Gebieten des Lateinischen Reiches zu vernichten. Im Jahr 1263 griff das byzantinische Heer das Fürstentum Achäa an, stieß aber bei der Einnahme der Hauptstadt auf erbitterten Widerstand.
stage_intro_1105=Durch die Niederlage in der Schlacht von Prinitza geriet das Byzantinische Reich im Krieg in Morea in die Defensive. Zudem desertierten immer mehr Söldner und die Zerstreuung der Truppen wurde immer gravierender. Im Jahr 1264 griff das lateinische kaiserliche Heer unter der Führung von William II. die versprengten byzantinischen Truppen an.
stage_intro_1106=Im Jahr 1274 griff das Byzantinische Reich Johannes Doukas von Thessalien an. Angesichts des massiven Truppenaufgebotes der byzantinischen Armee hatte Johannes keine andere Wahl, als um Hilfe zu bitten.
stage_intro_1107=Um die Kontrolle des Reiches über die Ägäis aufrechtzuerhalten, reorganisierte das Byzantinische Reich seine Flotte. Die Niederlagen in den Schlachten von Morea und Settepozzi versetzten den byzantinischen Streitkräften jedoch einen schweren Schlag. Die lateinischen Herrscher nutzten die Gelegenheit und griffen die byzantinische Flotte an, die im Hafen von Demetrias vor Anker lag.
stage_intro_1108=Für das angevinische Königreich Sizilien ist Berat eine Stadt von großer strategischer Bedeutung. Um dem Feind den Zugang zu den Kerngebieten des byzantinischen Reiches zu versperren, schickte der Kaiser 1280 Truppen zum Angriff auf die Stadt.
stage_intro_1201=Im Jahr 1302 wurde das Heer Michaels IX. aus Angst vor den Osmanen aufgelöst. Dies zwang Andronikos II. dazu, ein Heer über den Bosporus zu schicken, um die Notlage in Nikomedien zu unterstützen.
stage_intro_1202=Im Jahr 1321 war der junge Andronikos III. der Meinung, dass sein Großvater zu alt sei und er selbst den Thron besteigen sollte. Das Zerwürfnis in der Familie löste einen Bürgerkrieg aus. Die Osmanen nutzen die Gelegenheit, um die Stadt Prusa zu erobern.
stage_intro_1203=Nach der Rückeroberung Konstantinopels vom Lateinischen Reich konzentrierten sich die Byzantiner zu sehr auf die Wiedererlangung der Kontrolle über Griechenland und zogen ihre Truppen von der ostanatolischen Front zurück. Dieser Abzug ermöglichte erneute Angriffe durch die Osmanen.
stage_intro_1204=Im Jahr 1329 war das von den Byzantinern kontrollierte Gebiet in Anatolien erheblich geschrumpft. Um das umliegende Gebiet zu sichern, beschloss Andronikos III., Truppen nach Nikomedien zu schicken. Jedoch wurde seine Armee von den Osmanen in Pelekanon abgefangen und angegriffen.
stage_intro_1205=Die Unruhen in Byzanz brachten das Reich fast zum Einsturz. Johannes VI. wandte sich an das Osmanische Reich, um seinen Sohn zu retten, der sich den vereinten Kräften des serbischen und des zweiten bulgarischen Reiches gegenübersah.
stage_intro_1206=Im Jahr 1352 versank das Byzantinische Reich erneut im Bürgerkrieg und die Osmanen erkauften sich wichtige Gebiete in der Nähe von Gallipoli. Im Jahr 1354 veränderte ein Erdbeben die Lage in Gallipoli völlig.
stage_intro_1207=Als das Osmanische Reich nach der Eroberung seiner ersten Festung auf dem Balkan im Jahr 1352 seine rasche Expansion in Europa begann, beschloss der bulgarische Kaiser Ivan Alexander, den Vormarsch dieser Armee aufzuhalten.
stage_intro_1208=Nach dem Erwerb von Gallipoli expandierte das Osmanische Reich schneller auf dem südlichen Balkan. Nach einer Reihe von Umwälzungen und Renovierungsarbeiten nach dem Erdbeben beschloss das Osmanische Reich Adrian anzugreifen, die drittgrößte Stadt des Byzantinischen Reiches.
stage_intro_1301=Im Jahr 1337 beschloss das französische Parlament, das Herzogtum Aquitanien von England zurückzufordern und der Konflikt zwischen den beiden Seiten entbrannte. Um die Kontrolle über den Ärmelkanal zu erlangen, führte Edward III. selbst eine Flotte an und startete einen Angriff auf die französische Marine.
stage_intro_1302=Nachdem Edward III. die Kontrolle über das Meer erlangt hatte, führte er seine Truppen von Portsmouth aus und begann seinen Angriff, nachdem er die Nordküste Frankreichs erreicht hatte. Die mächtige französische Armee war zur Verteidigung bereit und die beiden Armeen standen kurz davor, sich bei Crécy zu treffen.
stage_intro_1303=Nach dem Sieg in der Schlacht von Crécy nutzte die britische Armee nutzte die Gelegenheit und beschloss Calais zu erobern, um einen wichtigen Brückenkopf auf dem europäischen Kontinent zu gewinnen, erwartete jedoch nicht, dass die Schlacht so schwierig werden würde.
stage_intro_1304=Im September 1346, als die englische Armee Calais belagerte, forderte Philipp VI. David II. hastig auf England anzugreifen, in der Hoffnung  Edward III. dazu zu zwingen, seine Streitkräfte aufzuteilen und einen Teil wieder nach England zu senden, um sein Heimatland zu retten. Angesichts eines langjährigen und alten Bündnisses mit Frankreich beschloss David, eine Armee zur Invasion Englands zu entsenden.
stage_intro_1305=Die Bretagne befand sich in einer sehr wichtigen geografischen Position und der Kampf um die Thronfolge der Bretagne umfasste sowohl Großbritannien als auch Frankreich, die wollten, dass die Bretagne ihnen einen Vorteil auf dem Schlachtfeld verschafft wird.
stage_intro_1306=Im Jahr 1356 wurde Edward der Schwarze Prinz zum Befehlshaber der britischen Kavallerie ernannt. Nachdem er sein Heer nach Frankreich geführt hatte, verfolgte er eine Politik der verbrannten Erde und erzielte beachtliche Erfolge. König Johann II. von Frankreich erhöhte sein Marschtempo, um die englische Armee einzuholen und am Schwarzen Prinzen Rache üben zu können.
stage_intro_1307=König Johann II. von Frankreich wurde in der Schlacht von Poitiers gefangen genommen und trat später ein großes Territorium an England ab. Da die Ambitionen von Edward III. hier nicht aufhörten, er beschloss, eine Expedition zu starten und wurde in Reims zum König von Frankreich gekrönt!
stage_intro_1308=Obwohl Frankreich bereits verwüstet war, konnte das Land nicht ohne einen König leben. Prinz Charles beschloss, nach Reims zu reisen, um zum König gekrönt zu werden und Edward III. beschloss, die Krönung zu stoppen, indem er die Straße zwischen Paris und Reims blockierte.
stage_intro_1309=Nach der Schlacht von Mauron gab es einen langen Waffenstillstand zwischen den bretonischen Nachfolgern, aber beide Seiten hatten seit langem mit der Unterstützung von Großbritannien und Frankreich ihre Stärke aufgebaut und waren beide bereit für eine entscheidende Schlacht.
stage_intro_1310=Im Oktober 1369 wurde Bertrand, der kein hochrangiger Adliger war, von Karl V. zum neuen Oberbefehlshaber der Armee ernannt, ein Bruch mit der Konvention der sich für den französischen König auszahlte! Als der Winter nahte, kam es innerhalb der britischen Armee zu einem erneuten Streit darüber, wie man den Winter am besten überstehen sollte. Die französische Armee nutzte diese Gelegenheit, um die britische Armee anzugreifen.
stage_intro_1311=Als Reaktion auf das 1368 geschlossene französisch-kastilische Bündnis schickte der kastilische König 1372 eine Flotte nach Aquitanien, um den Franzosen zu helfen. Die Flotte traf vor La Rochelle auf die englische Flotte, die auf dem Weg nach Frankreich war.
stage_intro_1312=Im hohen Alter war Edward III. nicht mehr an Krieg interessiert und der Tod von Edward dem Schwarzen Prinzen ließ ihn noch mehr Selbstvertrauen verlieren. Sein anderer Sohn, John of Gaunt, wurde Kommandant und überfiel viele Male Frankreich, was der französischen Bevölkerung überwältigende Verluste bescherte.
stage_intro_1401=Karl VI. war ein verrückter König geworden, der Kampf zwischen den Adligen wurde immer heftiger und die Instabilität der Macht in Frankreich gab dem jungen Heinrich V. die Gelegenheit und 1415 beschloss er, den Angriffskurs seines Urgroßvaters zu verfolgen um Frankreich zu erobern und König beider Länder zu werden.
stage_intro_1402=Die Siege Heinrichs V. in Frankreich brachten England nicht viel wirklichen Gewinn, und die Unterstützung durch das Parlament wurde immer geringer, und er beschloss, Rouen zu besetzen, um mehr französische Gebiete erobern zu können.
stage_intro_1403=Der Kampf zwischen den beiden Parteien ließ Frankreich völlig gespalten zurück, die Ermordung von Johannes dem Furchtlosen ließ das Herzogtum Burgund vollständig an England falle, und die Unterzeichnung des Vertrags von Troyes machte Heinrich V. zum nominellen Erben des französischen Throns. Zu dieser Zeit gewann Dauphin Charles die Unterstützung Schottlands, wodurch der Große Krieg versehentlich ausgelöst wurde.
stage_intro_1404=Der Sieg in der Schlacht von Beaugency gefiel Dauphin Charles und die französischen Adligen waren bereit, den Sieg zu nutzen, um weitere verlorene Gebiete zurückzuerobern. Und Heinrich V. plante zu dieser Zeit eine neue Angriffsrunde.
stage_intro_1405=Heinrich V. und Karl VI. waren seit 2 Jahren tot, Karl VII. war noch nicht gekrönt worden und Heinrich VI. stand in jungen Jahren unter der Regentschaft des Herzogs von Bedford. 2 Jahre Konflikt zwischen den beiden Seiten, wobei jede Seite gewinnt und verliert und jede beabsichtigt, die Hauptstreitmacht der anderen endgültig zu vernichten.
stage_intro_1406=Im krassen Gegensatz zur britischen Offensive stand die träge Reaktion der französischen Regierung: Der Mangel an Geldern für den Krieg, die Aristokratie auf sich allein gestellt, die Waage des Sieges neigte sich nie zugunsten Frankreichs. Diese aufeinanderfolgende Schläge machten Karl VII. fast verzweifelt.
stage_intro_1407=Wenn Orléans von den Briten erobert würde, wäre die letzte Barriere in Zentralfrankreich gebrochen. Es war ein dunkler Moment für Karl VII., aber Gott gab diesem prekären Land Licht, und ein junges Mädchen namens Jeanne d'Arc trat vor.
stage_intro_1408=Die Nachricht von Sieg bei Orléans hob die Moral in ganz Frankreich und die französische Armee, inspiriert von Jeanne d'Arc, bereitete sich darauf vor, alle britischen Stellungen im gesamten Loire-Tal einzuehmen.
stage_intro_1409=Jeanne d'Arc wollte, dass Karl VII. seine Pläne aufgibt, die Normandie anzugreifen und nach Reims zu gehen, um gekrönt zu werden. Dies schwächte die Moral der britischen Armee weiter. Die britische Armee mobilisierte die Elitetruppen, die zuvor den Huss-Krieg unterstützt hatten, um den Angriff zu blockieren.
stage_intro_1410=Aufgrund unzureichender Unterstützung wurde Jeanne d'Arc in der Schlacht von Compiègne gefangen genommen und starb zwei Jahre später, was ihre Kameraden zur Rache provozierte und sogar die französische Unterschicht zum Kampf bewegte.
stage_intro_1411=1435 ließ der Tod des Regenten Duke of Bedford England ohne Verbündeten im Herzogtum Burgund zurück und da die Gebiete der Normandie sich im Chaos befanden, beschloss Karl VII. diese Gelegenheit zu nutzen, um Paris zurückzuerobern.
stage_intro_1412=Trotz der enormen Kosten des Krieges gegen Frankreich zwischen 1435 und 1436 war England immer noch nicht bereit, mit Burgund Frieden zu schließen. Daraufhin beschloss der Herzog von Burgund sich gegen England zu stellen und Calais zu erobern.
stage_intro_1413=Frankreich hatte sich unter Karl VII. stark erholt, während die letzten englische Gebiete in Frankreich nur die Normandie und Giennes-Gascogne waren und England beschloss, sich mit einer großen Unterstützung von Truppen aus der Heimat zu wehren.
stage_intro_4001=Attila erhielt als Geisel in Rom eine gute Ausbildung. Nach der Rückkehr in seine Heimat startete er mit seinem Stamm eine Invasion in umliegende Ländereien.
stage_intro_4003=Byzanz versuchte, Attilas Angriff mit Tributen zu stoppen. Eine Taktik, die sich als unwirksam erwies. Der Appetit der Wölfe wurde immer größer und Attilas Armee brandschatzte, tötete und plünderte auf dem Weg. Die Menschen nannten ihn damals die "Geißel Gottes".
stage_intro_4005=Nachdem sie den Balkan überquert hatten, belagerten die berüchtigten Reiter der Hunnen Konstantinopel. Doch die mächtigen Mauern der Stadt schienen ein unüberwindbares Hindernis zu sein.
stage_intro_4007=Honoria, die Schwester des römischen Kaisers, wollte Attila heiraten, der seinerseits die Hälfte des Reichsgebiets als Mitgift forderte. Der Antrag scheiterte zwar, gab Attila aber einen Vorwand, Rom anzugreifen.
stage_intro_4009=Attila überquerte den Rhein mit einem Heer von Zehntausenden Hunnen und ihrer Verbündeten. Ihm gegenüber stand Aetius, der stärkste Feldherr Roms. Attila erlitt hier die größte Niederlage seines Lebens.
stage_intro_4011=Attila gab nicht auf, er überquerte die Alpen und griff Rom direkt an. Wie Attilas Heer von Papst Leo I. zum Rückzug bewegt werden konnte, bleibt ein Rätsel, aber es machte Attila zu einer Legende.
stage_intro_4021=Belisarius, noch keine 24 Jahre alt, war zuvor als lokaler Statthalter tätig. Er war ein hervorragender militärischer Anführer und seine Frau eine Vertraute der Kaiserin.
stage_intro_4023=Belisarius' Taten während der Unruhen in Nika brachten ihm das Vertrauen von Justinian I. ein. Um dem Reich zu größerer Ehre zu verhelfen, nahm Belisarius den Befehl des Kaisers an und brach nach Karthago auf.
stage_intro_4025=Nach der Eroberung der Vandalen war es Belisarius' Ziel, die seit hundert Jahren besetzte Stadt wieder unter die Herrschaft des Reiches zu bringen.
stage_intro_4027=Justinian I. wurde unter dem Einfluss der Königin immer misstrauischer gegenüber Belisarius. Belisarius wurde nur eine kleine Menge an Soldaten und Nachschub zugestanden, um das verlorene Land des Reiches zurückzuerobern.
stage_intro_4029=Nachdem Italien wieder unter byzantinische Kontrolle gebracht worden war, wurde der Kaiser Belisarius gegenüber immer misstrauischer. Um ihn vom politischen Zentrum des Reiches fernzuhalten, befahl Justinian I. ihm erneut, Krieg gegen das Sassanidenreich zu führen.
stage_intro_4031=Die Ostgoten eroberten den größten Teil des Landes von Rom und Italien zurück. Unterdessen konnte Belisarius, der unter dem Misstrauen des Kaisers stand, nur eine kleine Truppe anführen, um das verlorene Land zurückzugewinnen. Am Ende starb der Kriegsgott in aller Stille an einer Krankheit.
stage_intro_4041=Das im Niedergang begriffene Rom war nicht in der Lage, sein Gebiet zu verteidigen. Nach dem Aufstieg der Sachsen fielen diese in Britannien ein. Arthur und seine Ritter waren die einzigen Truppen, die das Volk vor der Katastrophe bewahrten.
stage_intro_4043=Arthur und seine Ritter begannen, die sächsischen Hochburgen an der Küste zu zerstören. Ihre unaufhaltsame Offensive ließ die Menschen glauben, dass sie magische Fähigkeiten besaßen.
stage_intro_4045=Arthur war stark und kultiviert. Er und seine Ritter der Tafelrunde waren mutige und fähige Kämpfer. Sie brachten den Kelten und Walisern wieder Hoffnung. Schließlich wurde Arthur mit der Unterstützung des Volkes zum König gekrönt.
stage_intro_4047=Lancelot, Gawain, Galahad und andere Ritter der Tafelrunde folgten König Arthur auf seinem Weg. Lancelot und Königin Guinevere hatten jedoch insgeheim eine Liebesbeziehung, obwohl sich König Arthur weigerte, dies zu glauben.
stage_intro_4049=Die Sachsen vereinten ihre Kräfte gegen König Arthur, der seinerseits mehr als 150 seiner Ritter und lokale Rebellen auf das Schlachtfeld führte.
stage_intro_4051=Der Ritter Mordred bestieg den Thron, während König Arthur in Frankreich kämpfte. Arthur eilte zurück nach Britannien und kämpfte mit Mordred. Beide Männer starben in der Schlacht und beendeten damit die legendäre Geschichte von König Arthur.
stage_intro_4061=Das Königreich der Langobarden sammelte seine Truppen um die Stadt Rom. Der Papst bat Karl den Großen eilig um Hilfe. Karl beschloss, seine Truppen aufzuteilen und das Langobardenreich zu überfallen.
stage_intro_4063=Karl beschloss, Sachsen zu erobern, um seine Religion zu verbreiten. Die Menschen hier stammten aus vielen verschiedenen Völkern und besaßen einen kämpferischen Geist. Sie würden nicht so leicht aufgeben.
stage_intro_4065=Neben dem Norden hoffte Karl der Große, auch das Königreich Al-Andalus im Westen zu erobern. Hier geriet Karls Armee in einen Hinterhalt, der zum Tod seines furchtlosen Paladins Roland führte.
stage_intro_4067=Karl der Große ließ zahlreiche Kirchen errichten und zwang die Sachsen, zum Christentum überzutreten. Der Aufstand der Sachsen erzürnte den König. Er schickte eine große Anzahl von Truppen, um die Unruhen ein für alle Mal niederzuschlagen.
stage_intro_4069=Neben dem Strafkrieg gegen die Bretagne im Westen, eroberte Karl der Große auch Bayern im Osten.
stage_intro_4071= Am Weihnachtstag 800 wurde Karl im Petersdom zum Kaiser der Römer gekrönt. In der Folge eroberte Karl der Große Byzanz, Böhmen, das Slawenreich und Dänemark, womit das Reich seinen Höhepunkt erreichte.
stage_intro_4241=Die Wikinger fegten über Britannien wie ein Sturm. Sie raubten Britannien auf grausame Weise seinen Reichtum und den Bewohnern ihre Leben. Britannien brauchte dringend einen Helden, der das Blatt wendet.
stage_intro_4243=Die Niederlage bei Reading konnte den Kampfgeist des Volkes nicht auslöschen. Nachdem er aus der Erfahrung dieser Niederlage gelernt hatte, konnte Alfred die grimmigen Wikinger mit der Taktik des "Schildwalls" zurückschlagen.
stage_intro_4245=Der gerissene neue Wikingeranführer Guthrum startete einen Überraschungsangriff auf Alfreds Palast und erbeutete eine große Menge an Vorräten, was Alfred in eine verzweifelte Lage brachte.
stage_intro_4247=Einige Monate später kam Alfred wieder zu Kräften und versammelte seine Heere aus vielen Ländern, um sich an den Wikingern zu rächen. Der Kampf zwischen Kreuz und Kriegshammer spitzte sich schließlich bei Eddington zu.
stage_intro_4249=Alfred ließ sich von den Vorteilen der Langschiffe der Wikinger inspirieren, baute einen neuen Typ von Kriegsschiff und gründete die erste richtige Marine in der englischen Geschichte. Zum ersten Mal konnte die englische Küste selbst verteidigt werden.
stage_intro_4251=Im Jahr 892 griff das Heer der Wikinger England erneut an, doch dieses Mal sahen sie sich einer starken Verteidigung gegenüber. Alfred der Große erließ während seiner Herrschaft ein Gesetzbuch und richtete Schulen ein, womit er den Grundstein für die Einheit Englands legte.
stage_intro_4261=Igor, der Herrscher der Kiewer Rus, führte sein Heer zum Angriff auf Konstantinopel. Zuvor hatten die Wikinger die riesige Stadt immer vom Meer aus angegriffen, doch dieses Mal wurde der Angriff mit Hilfe des Griechischen Feuer der feindlichen Kriegsschiffe abgewehrt.
stage_intro_4263=Der Misserfolg der Kiewer Rus verleitete die Stämme, die sich ihnen unterworfen hatten, zum Aufstand. Mal, der Anführer der Drewlanen, griff den unvorsichtigen Igor an und tötete ihn, was schließlich zur Katastrophe für die Drewlanen führte.
stage_intro_4265=Igors Witwe Olga gab vor, einer Heirat mit Mal zuzustimmen. Mal glaubte ihr und heiratete Olga sofort. Auf dem Höhepunkt der Hochzeit befahl Olga ihren Männern, alle Anwesenden zu töten.
stage_intro_4267=Olga ließ die anderen Drewlanen nicht gehen. Sie zündete ihre Häuser an und führte ihre Armee zur Einnahme der Stadt Ikoros.
stage_intro_4269=Olga ließ sich taufen und trat zur orthodoxen Kirche über. Sie führte die orthodoxe Kirche auch in der Kiewer Rus ein. Doch die Wikinger lehnten diesen neuen Glauben ab und blieben den nordischen Göttern treu ergeben. Ihr Sohn Swjatoslaw griff schließlich Byzanz an.
stage_intro_4271=Olga pflanzte den Samen der orthodoxen Kirche in der Kiewer Rus. Sie ließ große Städte wie Kiew und Nowgorod errichten oder ausbauen sowie befestigen. Die Kiewer Rus wandelte sich infolge von einem Stamm zu einem Königreich. Viele Jahre später wurde sie posthum zu einer Heiligen erklärt.
stage_intro_4361=Nach dem Tod Karls des Großen spaltete sich das fränkische Reich in drei Königreiche auf. So wurde im Jahr 936 Otto, der im ostfränkischen Reich ansässig war, zum Herzog von Sachsen und zum König von Deutschland gekrönt. Um Deutschland zu vereinen, musste er zuerst eine Rebellion niederschlagen.
stage_intro_4363=Nachdem Ottos Halbbruder Heinrich vom Herzog von Bayern verführt worden war, rebellierte er   gegen die Herrschaft des Königs. Der großzügige Otto I. verschonte das Leben beider, nachdem er sie besiegt hatte. Doch sie lernten ihre Lektion nicht.
stage_intro_4365= Otto enterbte seinen ältesten Sohn Rudolf vom Thron, nachdem der König ein Kind mit seiner neuen Frau bekommen hatte, was das deutsche Königreich erneut in einen Bürgerkrieg stürzte. Rudolf lud die Magyaren sogar dazu ein, sich ihm beim Angriff auf seinen Vater anzuschließen.
stage_intro_4367=Die Magyaren von Ungarn nutzten den deutschen Bürgerkrieg und starteten 954 eine Masseninvasion in Europa. Otto I. brach den Bürgerkrieg sofort ab und war entschlossen, die Invasoren aufzuhalten.
stage_intro_4369=Im Jahr 955 trafen die Hauptstreitkräfte der ungarischen Magyaren und der Deutschen auf dem Lechfeld aufeinander. Es war eine Schlacht auf Leben und Tod, in der die Magyaren letztlich unterlagen, was ihren Untergang und den Aufstieg Deutschlands begründete. 
stage_intro_4371=Im Jahr 961 bat der Papst Otto I. um Hilfe. Otto besiegte das Heer des Königreichs Italien mit 1.000 schweren Reitern und wurde in Rom zum Kaiser des Heiligen Römischen Reiches gekrönt.
stage_intro_4281=Knut, der Enkel von König Harald Blauzahn und Sohn von König Sven Estridsson, führte 10.000 Menschen mit 200 Langschiffen von Skandinavien nach Britannien, wo er sein eigenes Königreich errichten wollte.
stage_intro_4283=Der Schwager Edmunds II., Eadric Streona, verriet die Engländer und verbündete sich mit Knut, mit dem er sein eigenes Land plünderte. Es kam zu mehreren Auseinandersetzungen mit Edmund, aus denen beide Seiten immer wieder als Sieger hervorgingen.
stage_intro_4285=Knut versuchte dreimal, London anzugreifen. Das Hin und Her der Kämpfe forderte jedoch seinen Tribut von den Dänen. Als Edmund ein neues Heer aus Wales erhielt, kehrte Eadric zu den Engländern zurück.
stage_intro_4287=Knut beschloss, sich zurückzuziehen, wurde aber von Edmund daran gehindert. Die Dänen schlugen sich in der Schlacht trotz ihrer geringen Truppenstärke wacker. Eadric Streona verriet schließlich die Engländer erneut und ermöglichte es Knut, den entscheidenden Sieg zu erringen.
stage_intro_4289=Kurz darauf starb Edmund II. an einer Verletzung und Knut gewann den englischen Thron. Zeitgleich starb sein Bruder Harald II. in Dänemark und ein Konflikt um die dortige Herrschaft brach aus. In Folge führte Knut die Engländer an, um seinen dänischen Thron zurückzuerobern.
stage_intro_4291=Auf dem Höhepunkt seines Ruhmes entsandte Knut der Große eine Armee nach Norwegen und Schweden. Sogar die Könige von Schottland und Irland unterwarfen sich ihm. Dann gründete Knut der Große das Nordseereich, das sich von der Ostsee bis nach Irland erstreckte.
stage_intro_4301=König Ferdinand I. starb und sein Gebiet wurde unter seinen drei Söhnen und zwei Töchtern aufgeteilt. Der Älteste, Sancho, führte Krieg gegen seine anderen Brüder, unterstützt von Rodrigo, der von den Mauren für seine Tapferkeit mit dem Beinamen "El Cid" - "der Herr" geehrt wurde.
stage_intro_4303=Obwohl er seine Brüder schnell besiegte, starb Sancho unerwartet. Sein jüngerer Bruder wurde zu Alfonso VI. gekrönt und El Cid wurde verpflichtet, ihm zu dienen. Alfonso VI. fürchtete jedoch den einflussreichen El Cid.
stage_intro_4305=El Cid wurde von Alfonso VI. ins Exil geschickt, nachdem er den König verärgert hatte. El Cids Ruf gewann jedoch die Unterstützung vieler Truppen verschiedener Religionen. Mit diesem Heer schloss er sich Yusuf al-Mutaman, dem Herrscher von Saragossa, an und errang viele Siege.
stage_intro_4307=Alfonso VI. beabsichtigte, sein Territorium auf die gesamte Iberische Halbinsel auszudehnen, erlitt jedoch eine Niederlage in der Schlacht bei Zallaqa. Zu diesem Zeitpunkt beschloss er, El Cid zu begnadigen, der infolge zu seinem früheren Herrn zurückkehrte.
stage_intro_4309=Die Tatsache, dass Alfonso VI. sein Lehen konfisziert und seine Frau und Kinder eingekerkert hatte, weil er ihn nicht rechtzeitig gerettet hatte, veranlasste El Cid dazu, ein eigenes Territorium für sich zu beanspruchen. El Cid erreichte den Höhepunkt seiner Popularität in Valencia.
stage_intro_4311=Yusuf, der Herrscher der Almoraviden-Dynastie, wollte Spanien zurückerobern und wiedervereinigen. Seine wiederholten Versuche, Valencia einzunehmen, scheiterten jedoch. Seine Soldaten hatten Angst vor El Cid, dem Gott des Krieges. Selbst als El Cid durch einen Pfeil schwer verletzt wurde, konnte ihn niemand aufhalten, solange er auf einem Pferd saß.
stage_intro_4381=Matilda wurde als Adlige geboren und stammte aus dem schottischen, normannischen und wessexischen Adel. Sie wurde schon in jungen Jahren zur Kaiserin des Heiligen Römischen Reiches gekrönt, als sie von Heinrich I. mit Heinrich V. verheiratet wurde.
stage_intro_4383=Im Alter von 23 Jahren starb ihr Mann und sie musste in ihre Heimat, die Normandie, zurückkehren. Im Jahr 1120, nach der Katastrophe des Weißen Schiffes, wurde die Nachfolge auf dem englischen Thron unsicher und es kam zum Erbfolgekrieg. Im Jahr 1127 heiratete Mathilda Gottfried Plantagenet, Graf von Anjou.
stage_intro_4385=Der Tod Heinrichs I. im Jahr 1135 ließ den englischen Thron unbesetzt zurück. Mathilda, die älteste erbberechtigte Tochter, und ihr Mann Gottfried beschlossen, die Normandie zurückzuerobern und die normannischen Adligen zu bestrafen, die die Gelegenheit zur Rebellion genutzt hatten.
stage_intro_4387=Ein Bürgerkrieg begann, als Mathildas Cousin Stephan die Unterstützung des normannischen Adels in England gewann, um den Thron zu besteigen. Robert von Gloucester unterstützte indes den Aufstand seiner Schwester in Schottland.
stage_intro_4389=Stephan belagerte schließlich die Burg von Königin Mathilda. Roberts Rettung kam jedoch schnell und Stephan wurde gefangen genommen. Nach Ostern 1141 wurde Königin Mathilda de facto die Herrscherin von England.
stage_intro_4391=Vor der Krönung wurde Mathilda von Stephan und anderen Adligen mit einer Rebellion konfrontiert. Sie wurde bei Winchester vernichtend geschlagen und kehrte dann in die Normandie zurück. Der englische Thron wurde letzten Endes von ihrem Sohn Heinrich II. zurückerobert.
stage_intro_4081=Dank der Bemühungen von Nur ad-Dins Vater nahm die Zengiden-Dynastie Gestalt an. Nach der Ermordung ihres Anführers wollte der Fürst von Antiochia das Chaos nutzen, um Aleppo einzunehmen.
stage_intro_4083= Nachdem die Grafschaft Edessa erfahren hatte, dass Aleppo vom Fürstentum Antiochia angegriffen worden war, wollte sie ihr verlorenes Gebiet zurückerobern. Als Nur ad-Din die Nachricht von der Invasion erhielt, führte er seine Truppen nach Edessa, um zu helfen.
stage_intro_4085=Dank Nur ad-Dins Bemühungen blühte die Zengiden-Dynastie auf. Er beschloss, sein Gebiet in Nordsyrien zu erweitern. Um dieses Ziel zu erreichen, musste die Verbindung zwischen Antiochia und Edessa abgeschnitten werden.
stage_intro_4087=Nach dem Tod von Unur, dem Herrscher von Damaskus, wurde die Stadt zu einer freien Stadt für alle. Sowohl Nur ad-Din als auch das Königreich Jerusalem wollten sie für sich beanspruchen.
stage_intro_4089=Nur ad-Dins Aktivitäten in Syrien schockierten die christlichen Staaten erneut und veranlassten die Länder des Westens, den Zweiten Kreuzzug zu starten. Aufgrund der Gerissenheit von Nur ad-Din verlief der Zweite Kreuzzug nicht so reibungslos wie der Erste.
stage_intro_4091=Als die Kreuzfahrer in Ägypten einfielen, schickte Nur ad-Din seinen obersten General und den jungen Saladin, um sich ihnen entgegenzustellen. Emir Nur ad-Din starb bald darauf und auch das Zengidenreich ging mit ihm unter. Daraufhin übernahm Saladin, Begründer der Dynastie der Ayyubiden, die Herrschaft.
stage_intro_4101=Der Aufstand in Rom zwang Papst Eugen III., Friedrich I. um Hilfe zu bitten. Als Kaiser des Heiligen Römischen Reiches war er dazu verpflichtet.
stage_intro_4103=Die Weigerung des polnischen Herzogs, Boleslaw IV., Tributzahlungen zu entsenden veranlasste Friedrich I., Truppen über die Oder zum Angriff auf Polen zu entsenden.
stage_intro_4105=Friedrichs I. brutale und tyrannische Herrschaft in Italien verärgerte die Italiener. Städte wie Venedig und Verona schlossen sich zum "Lombardenbund" zusammen, um gemeinsam Widerstand gegen die Herrschaft des Kaisers zu leisten.
stage_intro_4107=Heinrich der Löwe, ein Vasall Friedrichs I., weigerte sich, Truppen nach Italien zu schicken. Dies erzürnte Friedrich I. und er beschloss, einen Krieg gegen Heinrich zu beginnen.
stage_intro_4109=König Richard Löwenherz, Philipp II. und Friedrich I. starteten den Dritten Kreuzzug und schickten drei Heerscharen nach Jerusalem. Die Heilige Römische Armee stieß bei der Durchquerung von Byzanz mit der örtlichen Armee zusammen.
stage_intro_4111=Bei der Durchquerung der anatolischen Hochebene wurden die Kreuzfahrer vom Sultanat Rum angegriffen. Dieser mächtige Feind erwies sich als das größte Hindernis für die Kreuzfahrer. Nach einem Sieg ertrank Friedrich I., was die Expedition der Kreuzfahrer auf tragische Weise beendete.
stage_intro_4121=Nur ad-Dins Tod spaltete die Zengiden-Dynastie. Saladin fasste allmählich in Ägypten Fuß und begründete die Ayyubiden-Dynastie.
stage_intro_4123=Saladin zog ganz nach Norden und besetzte Damaskus, Homs und Hamah. Nach einer kurzen Ruhepause für seine Truppen machte er sich auf, um Aleppo, die Hauptstadt der Zengiden-Dynastie, einzunehmen.
stage_intro_4125=Die Vereinigung der islamischen Welt in Syrien gefährdete die Lage des Königreichs Jerusalem. Balduin IV. musste sich mit Tausenden von Soldaten nach Askalon begeben, um die Verteidigungsanlagen zu verstärken.
stage_intro_4127=Balduin IV. versuchte, Saladins Nachschublinien abzuschneiden und eine Festung bei der Jakobsfurt zu errichten. Um den Nachschub zu sichern, musste Saladin den Bau der Festung unbedingt verhindern.
stage_intro_4129=Der Tod von Balduin IV. stürzte das Königreich Jerusalem ins Chaos. Renaud de Chatillon ignorierte den Waffenstillstand mit Saladin und griff mehrmals muslimische Karawanen an, was unweigerlich zum Krieg mit den Ayyubiden führte.
stage_intro_4131=Die Armee des Königreichs Jerusalem wurde in Hattin vollständig vernichtet. Das Einzige, was Saladin aufhalten konnte, war die dicke Mauer. Hier gewann der gütige König den Respekt beider Seiten und wurde der "arabische Ritter" genannt.
stage_intro_4141=Der Wettbewerb um Macht und Eigeninteressen innerhalb der königlichen Familie der Anjou wurde immer härter. Währenddessen herrschte im französischen Territorium ein ständiger Zustand der Rebellion. Richard, der erst 16 Jahre alt war, musste bei der Niederschlagung des Aufstands helfen.
stage_intro_4143=Der französische König Philipp II. schürte das Feuer, sodass ein Konflikt zwischen Vater und Sohn ausbrach, der zu einer großen Schlacht in Le Mans führte.
stage_intro_4145=Richard I. wurde zum König von England gekrönt und beschloss, auf Geheiß des Papstes den Dritten Kreuzzug zu starten. Friedrich I. Barbarossa und Philipp II. nahmen ebenfalls daran teil, womit drei Heere der Christenheit in das Heilige Land zogen.
stage_intro_4147=Friedrich I. kam unerwartet bei einem Unfall ums Leben. Nach der Einnahme von Akkon beschloss Philipp II. sein Heer nach Hause zu führen. Aufgrund der Konflikte, die während der Kämpfe entstanden waren, suchte er nach einer Gelegenheit, sich an Richard I. zu rächen. Jetzt war nur noch Richard I. auf dem Weg nach Jerusalem.
stage_intro_4149=Trotz des feindlichen Verhältnisses zwischen Richard Löwenherz und Saladin standen sie oft in Kontakt und bewunderten sich gegenseitig. Richard Löwenherz war ein tapferer und geschickter Kämpfer. Hätte sein Bruder die Abwesenheit Richards nicht ausgenutzt und den englischen Thron nicht geraubt, wäre es in Jerusalem wahrscheinlich zu einem Führungswechsel gekommen.
stage_intro_4151=Richard I. wurde nach seiner Rückkehr vom Herzog von Österreich, Leopold V., gefangen genommen, weil er das französische Königreich und das Heilige Römische Reich beleidigt hatte. Nach über einem Jahr Gefangenschaft kam er erst durch horrende Lösegeldzahlungen der Briten frei. Richard Löwenherz war so wütend, dass er einen Angriff auf Philipp II. startete. Richard wurde schließlich tödlich verwundet, nachdem er von einem Armbrustbolzen getroffen worden war.
stage_intro_4161=Temujins Geschick brachte seinen Stamm allmählich immer mehr Macht, was auch seine früheren Partner zu seinen Feinden werden ließ.
stage_intro_4163=Temujins Adoptivvater war zunehmend beunruhigt über dessen wachsende Macht. Da Temujin sich ihm nicht beugen wollte, blieb ihm nichts anderes übrig, als zu kämpfen.
stage_intro_4165=Die Mongolen, die mehr als ein Jahrhundert zuvor fast ausgerottet worden waren, waren extrem mächtig geworden. In der Steppe konnte es nur einen Herrscher geben. Temujin begann einen Krieg gegen die westlichen Liao, die westlichen Xia und die Jin.
stage_intro_4167=Nachdem er die mongolische Steppe geeint hatte, nahm Temujin den Namen "Dschingis Khan" an. Von nun an richtete er sein Augenmerk auf das riesige Land im Westen. Dschingis Khan teilte seine Truppen in vier Heere auf und führte ein Heer von 200.000 Mann in die westlichen Regionen.
stage_intro_4169=Im Jahr 1227 starb Dschingis Khan auf seinem Weg in die Schlacht. Sein Geist lebte jedoch weiter und das Territorium des mongolischen Reiches dehnte sich weiter aus.
stage_intro_4171=Dem letzten Wunsch Dschingis Khans folgend, startete das Mongolische Reich die dritte Westexpedition. Es sollte gegen die eiserne Kavallerie des Abbasiden-Kalifats und der Ayyubiden-Dynastie antreten.
stage_intro_4181=Die Feigheit und Schwäche Heinrichs III. führte England in einen Bürgerkrieg und gefährdete die Anjou-Dynastie. Prinz Edward beschloss, die Dinge wieder in Ordnung zu bringen.
stage_intro_4183=Prinz Edward genoss das militärische Leben und liebte es zu kämpfen. Als Ludwig IX. einen neuen Kreuzzug startete, ließ Edward die Probleme Englands beiseite, um daran teilzunehmen.
stage_intro_4185=Im Jahr 1274 wurde Edward I. gekrönt. Besessen von der Legende von König Arthur, beschloss er, das Königreich Großbritannien zu vereinen. Zunächst wandte er sich Wales zu.
stage_intro_4187=Aufgrund der brutalen Herrschaft Edwards I. über Wales brach in dem Land eine Massenrebellion unter der Führung von Llywelyn aus.
stage_intro_4189=Nachdem Wales kapituliert hatte, nahm Edward I. Schottland ins Visier. Im Jahr 1296 führte er seine Langbogenschützen und seine Reiterei zur Invasion in den Norden.
stage_intro_4191=Schottische Adlige besetzten die Festung Dunbar in der Absicht, den Angriff Edwards I. zu vereiteln. Edward I. besiegte sie allerdings und nahm den schottischen Nationalschatz mit: den Stein von Scone.
stage_intro_4201=Die blutige Herrschaft der Engländer in Schottland trieb Wallace dazu, sich zu wehren. Er tat dies nicht nur aus seinem Glauben an die Freiheit heraus, sondern auch aus seiner Entschlossenheit, die schottische Unabhängigkeit zu erreichen.
stage_intro_4203=Wallace' Widerstand inspirierte das unterdrückte schottische Volk und ermöglichte es Wallace, schnell eine große Zahl von Gleichgesinnten um sich zu scharen.
stage_intro_4205=England begann schließlich, William Wallace die Stirn zu bieten und beschloss, Tausende von regulären Truppen zu schicken, um die Rebellion niederzuschlagen.
stage_intro_4207=Nach seinem Sieg in der Schlacht von Stirling Bridge machte sich Wallace daran, mehr schottisches Land und Volk zu befreien. Seine Guerillataktik erwies sich dabei als äußerst effektiv.
stage_intro_4209=William Wallace wurde schließlich von der schottischen Aristokratie anerkannt und zum Wächter Schottlands ernannt. Verärgert über die Unfähigkeit seiner Untergebenen beschloss Edward I., selbst eine Armee gegen Wallace zu führen.
stage_intro_4211=William Wallace reorganisierte seine Armee und startete einen Angriff, wurde aber von einem schottischen Ritter verraten und den englischen Truppen ausgeliefert. Obwohl der Freiheitskämpfer schließlich in London enthauptet wurde, entfachte sein Blut das Aufbegehren weiterer Schotten.
stage_intro_4321=Nach der Niederlage von Dunbar beugten sich die schottischen Adligen vor Edward I. 1297 führte William Wallace an der Seite von Robert the Bruce einen Feldzug zur Erlangung der schottischen Unabhängigkeit.
stage_intro_4323=Robert the Bruce, einer der legitimen Anwärter auf den schottischen Thron, tötete seinen Rivalen John Comyn in einer Kirche und wurde in Scone zum König gekrönt. Edward I. setzte ein Kopfgeld auf ihn aus und entsandte Truppen, um ihn zu jagen.
stage_intro_4325=Robert the Bruce wurde ins Exil gezwungen und seine Frau und Tochter gefangen genommen. Im folgenden Jahr landete er mit seinen irischen Rekruten in Großbritannien, um zurückzuschlagen.
stage_intro_4327=Robert the Bruce zog wertvolle Lehren aus seiner Niederlage in der Schlacht bei Methven. Er nutzte seine Vertrautheit mit der schottischen Landschaft, um sich gegen die englische Armee zur Wehr zu setzen.
stage_intro_4329=Edward I. starb an einer Krankheit, kurz nachdem er erfahren hatte, dass er die Schlacht am Loudoun Hill verloren hatte. In Folge konnte Robert the Bruce den größten Teil von Nordengland in weniger als drei Jahren erobern.
stage_intro_4331=Das schottische Heer war weniger als halb so groß wie das englische, zudem fehlte es an Langbögen und schwerer Kavallerie. Dennoch verfügten die Schotten über eine starke Moral und eine ausgeklügelte Strategie, die es ihnen dennoch ermöglichte, Edward II. zu besiegen. Von nun an konnte England der schottischen Unabhängigkeit nicht mehr im Wege stehen.
stage_intro_4341=Die Herzöge der Bretagne brachen in einen Streit um den Erben aus, wobei sowohl England als auch Frankreich versuchten, ihre Kandidaten zu unterstützen und der Konflikt verschärfte sich und gipfelte in einer Begegnung in der Nähe von Molay.
stage_intro_4343=1345 marschierte Eduard III. in drei Richtungen und schickte englische Truppen zum Angriff in die Bretagne und die Gascogne, während er selbst eine große Armee ins Innere Europas führte, mit dem Ziel Paris.
stage_intro_4345=Nach einer langen Verfolgungsjagd holten französische Truppen die fast erschöpfte englische Armee bei Crecy ein. Die englische Armee wurde in Formation gezwungen, um bis zum Tod zu kämpfen.
stage_intro_4347=Als Eduard III. 1355 den Truppenmangel in der Gascogne spürte, plante er einen Überfall auf Südfrankreich und der beste Mann für diese Aufgabe war Eduard der Schwarze Prinz, der sich in der Schlacht von Crécy einen Namen gemacht hatte.
stage_intro_4349=Im Jahr 1356 führte Johann II. von Frankreich eine große Armee mit der Absicht, die britische Armee in der Gascogne zu verfolgen, und die beiden Seiten trafen sich schließlich offiziell am 17. September nach vielen kleineren Konfrontationen und die ersten Phase des Hundertjährigen Krieges begann.
stage_intro_4351=1367 griffen England und Frankreich in den Bürgerkrieg im spanischen Königreich Steele ein und führten offiziell die erste große Schlacht der zweiten Phase des Hundertjährigen Krieges.
stage_intro_4401=Der aufgeweckte Balduin zeigte schon in jungen Jahren gute Eigenschaften wie Entschlossenheit und Optimismus. Leider litt er an Lepra, einer unheilbaren Krankheit. Im Alter von neun Jahren nahm er die Krone des Königreichs Jerusalem an sich, was das Land in Gefahr brachte.
stage_intro_4403=Balduin IV., der gerade volljährig war und 1176 an die Macht kam, startete einen Großangriff auf Ägypten. Balduin überfiel Saladin, während dieser mit internen Problemen zu kämpfen hatte.
stage_intro_4405=Mit der Unterstützung von Kaiser Manuel vom Byzantinischen Reich startete Balduin IV. eine Invasion Ägyptens auf dem Seeweg, doch diese Operation scheiterte an Fraktionsstreitigkeiten im Königreich Jerusalem.
stage_intro_4407=Saladin kam mit einer großen Anzahl von Truppen in Askalon an und beschloss, Jerusalem zu überfallen, nachdem er Balduin IV. mit nur wenigen Truppen angetroffen hatte. Zu seiner Überraschung verlor er fast sein Leben im Kampf gegen diesen 16-jährigen König mit seiner kleinen Armee und wurde vernichtend geschlagen.
stage_intro_4409=Zwei Jahre lang ging der Krieg auf beiden Seiten weiter. Saladin konnte den jungen Monarchen nicht mehr unterdrücken, obwohl die schwere Krankheit Balduin IV. immer handlungsunfähiger werden ließ.
stage_intro_4411=Die Schmerzen der Krankheit verfolgten den König, der eine defensive Haltung einnehmen musste, um die Grenzen Jerusalems zu schützen. Nachdem er die Angriffe Saladins ein weiteres Mal abgewehrt hatte, war Balduins Lebenskraft schließlich erschöpft.
stage_intro_4421=Die mongolische Invasion in der Rus ausnutzend, wollten die schwedischen Feudalherren in das Großherzogtum Nowgorod einmarschieren, um dessen Territorium zu erobern. Alexander führte seine Elitetruppen an, um den ankommenden Feind an den Ufern der Newa zu überfallen und zu besiegen. Für sein Führungstalent und seinen Kampfgeist in dieser Schlacht ist er als Newski bekannt.
stage_intro_4423=Nach der Schlacht an der Newa führte Newski die Armee auf Ersuchen der Novgoroder Bürgerversammlung gegen die anrückenden Kreuzfahrer an. Um die nordwestliche Grenze Russlands zu schützen, wurde die Rückgewinnung des Fürstentums Pskow zur obersten Priorität.
stage_intro_4425=Die Rückgewinnung von Pskow war nur der erste Schritt des Plans. Um die Grenze ein für alle Mal zu sichern, war es erforderlich, die Initiative zu ergreifen. Newski führte seine Armee in das Gebiet der Kreuzfahrer, um den Feind zu vernichten. Der von ihm ausgesandte Spähtrupp stieß in Hammarst auf die feindliche Speerspitze.
stage_intro_4427=Die Spähtrupps bestätigten die Bewegung der Kreuzfahrer. Newski mobilisierte seine Truppen, um den Feind aufzuhalten. Die beiden Seiten trafen am Peipussee aufeinander und es kam zum finalen Aufeinandertreffen. Diese Schlacht brachte einen kurzen Frieden an der Grenze der Rus.
stage_intro_4429=Die mongolische Kavallerie betrat russischen Boden. Angesichts ihrer überwältigenden Offensive musste sich Newskis Vater, Großfürst Jaroslaw, den Mongolen ergeben. Newski und sein Bruder Andrei begannen nach dem Tod ihres Vaters einen Kampf um den Thron des Großfürsten.
stage_intro_4431=Während der zweiten Hälfte seiner Regierungszeit schlug Newski viele innere Unruhen nieder und hielt die Einheit und Stabilität des Landes aufrecht. Nach seinem Tod wurde Russland schnell in eine Reihe von antagonistischen Fürstentümern aufgeteilt.
stage_intro_4441=Die Macht der Normannen in Sizilien wuchs und die Bedrohung für das byzantinische Reich wurde immer größer. Schließlich kam es im Jahr 1081 zu einer Schlacht zwischen den beiden Seiten auf dem westlichen Balkan.
stage_intro_4443=Nach einer katastrophalen Niederlage in der Schlacht von Dyrrhachium bat Alexius I. das Heilige Römische Reich um Hilfe und schaffte es mit dessen Hilfe, die normannische Armee zur Kapitulation zu bewegen.
stage_intro_4445=Ein Mann, der sich selbst "Konstantin Diogenes" nannte, begehrte den byzantinischen Thron von Alexius I. Er verbündete sich mit den Kumanen, um einen Angriff auf die byzantinische Nordgrenze zu starten.
stage_intro_4447=Um Anatolien von den Seldschuken zurückzuerobern, bat Alexius I. Papst Urban II. um Hilfe. Der Papst rief daraufhin 1095 zum 1. Kreuzzug auf. Allen Kriegern wurde im Austausch für den Kampf zum Schutz der Christenheit der Erlass aller Sünden sowie Ruhm und Ehre versprochen.
stage_intro_4449=Bohemond I., Sohn des Erzfeindes von Alexius I., gründete das Fürstentum Antiochia und griff das byzantinische Reich an. Nach zwei Jahren des Krieges war das Byzantinische Reich siegreich und nahm das Fürstentum Antiochia als Vasallen.
stage_intro_4451=Nach 1110 begann Alexius I. eine Offensive gegen die Seldschuken und konnte nach mehreren Jahren der Kriegsführung schließlich die Küstengebiete Kleinasiens zurückgewinnen.
stage_intro_4461=Als kleiner Junge war Su Dingfang für seine Tapferkeit und Kampfkraft bekannt, wurde aber in den frühen Jahren der Tang-Dynastie nie eingesetzt. Im Jahr 630 befahl Li Shimin, Kaiser Taizong der Tang-Dynastie, die Besetzung des Turkischen Reiches, einer verborgenen Gefahr im Norden des Reiches und Su Dingfang folgte Li Jing, um es zu erobern.
stage_intro_4463=Nach der Rettung von Silla im Jahr 655 schickte Kaiser Gaozong Li Zhi aus der Tang-Dynastie Su Dingfang aus, um die westliche türkische Region zu erobern. Shasharo Khan führte 100.000 Kavalleristen an, um ihn abzufangen, wurde aber von Su Dingfang besiegt, nachdem er bei einem Überraschungsangriff  am Hibao-Fluss eine kleine Anzahl von Truppen angeführt hatte.
stage_intro_4465=Als ein plötzlicher Schneesturm hereinbrach, flohen die Überreste der westtürkischen Armee in ihre Lager und Shasharo Khan wurde unachtsam, da er dachte, dass die Tang-Armee sie nicht verfolgen würde. Su Dingfang hingegen folgte ihm weiter und startete einen Überraschungsangriff, der zum Niedergang der westtürkischen Armee führte. Damit wurde die Seidenstraße wieder eröffnet und die Tang-Dynastie war auf ihrem Höhepunkt.
stage_intro_4467=Im Jahr 659 entsandte Kaiser Gaozong Su Dingfang nach Liangzhou, um die Verteidigung gegen Tubo zu übernehmen. Er besiegte 80.000 Tubo-Truppen mit nur 1.000 Soldaten und tötete den General Dayan Mangbuji, was Tubo für mehr als ein Jahrzehnt daran hinderte, nach Osten vorzudringen.
stage_intro_4469=Der Rest des westtürkischen Stammes Sijieqiqin, der Anführer von Duman, wurde von Tubo provoziert und schloss sich mit drei anderen Ländern zusammen, um gegen die Tang-Dynastie zu rebellieren. Su Dingfang, der Tubo gerade erst friedlich gemacht hatte, führte mehr als 10.000 Soldaten in einen Tag- und Nachtmarsch von 150 km an, der über ein Plateau von 4.000 bis 7.000 Metern führte und besiegte schnell Duman, wodurch das Gebiet der Tang-Dynastie so groß wie nie wurde.
stage_intro_4471=Als das Sassanidenreich vom Arabischen Reich zerstört wurde, kam der im Exil lebende persische Prinz Peirus zur Rettung der Tang-Dynastie. Der Tang-Kaiser schickte einen Abgesandten, um den persischen Prinzen an der Grenze zu treffen und stieß auf arabische Truppen. 660 schickte der Tang-Kaiser auch den Veteranen General Su Dingfang, um die Baekje und Goguryeo über das Meer zu erobern, was ihn zum mächtigsten General in Eurasien machte.
stage_intro_4501=Timur erhielt die Anerkennung des Khans von Ost-Chaghatai, Balukuru Timur, aufgrund seiner hervorragenden Fähigkeiten in seiner Jugend und wurde zum Herrscher von Shahrisabz ernannt.
stage_intro_4503=Timur musste fliehen, nachdem er fälschlicherweise der Rebellion beschuldigt worden war, weil er einen unschuldigen religiösen Führer freigelassen hatte. Er floh nach Südafghanistan zu seinem Schwager Kusin.
stage_intro_4505=Nach dem Tod des Großkhans von Ost-Chaghatai, Balukuru Timur, erhob sich Timur und besiegte den Gouverneur des Flusses und erlangte die Kontrolle über die Stadt Shahrisabz zurück.
stage_intro_4507=Nachdem Timur seine Macht gesichert war, verschlechterte sich der Konflikt zwischen Timur und Kusin allmählich. Kusin versuchte wiederholt, Timur zu zerstören und Timur versuchte sich zu wehren. Nach mehreren Jahren des Hinundhers errang Timur den endgültigen Sieg.
stage_intro_4509=Nach dem Sieg über Kusin übernahm Timur die militärische und politische Macht von West-Chaghatai und unterstützte einen Marionetten-Sultan, der in späterals Symbol für die Gründung des timuridischen Khanats galt.
stage_intro_4511=Nach mehreren Jahren des politischen Chaos wurde das östliche Chaghatai-Khanat von Hamaruddin übernohmen, der nach seiner Machtübernahme wiederholt die Grenzen des timuridischen Khanats angriff. Nach 22 Jahren Krieg wurde Hamaruddin schließlich von Timur besiegt.
stage_intro_4513=Sowohl der Tartarus des Chincha Khanates als auch Timur hatten Ambitionen für die persische Region und Reibungen und Konflikte zwischen den beiden Seiten eskalierten bald zu einem Krieg zwischen den beiden Ländern, wobei Timur das Chincha Khanate mit zwei Expeditionen vernichtend schlug.
stage_intro_4515=Zehn Jahre nach der Staatsgründung startete Timur eine westliche Expedition, deren erste Ziel die Kartid-Dynastie in Khorasan war, die Timur aufgrund ihrer internen Meinungsverschiedenheiten schnell besiegte.
stage_intro_4517=Das letzte Ziel von Timurs westlichen Feldzugs war das Königreich Georgien, aber nachdem er es erobert hatte, behielt er sein ursprüngliches Regime bei, was den Grundstein für viele nachfolgende Rebellionen legte.
stage_intro_4519=Um die reiche nordindische Region zu plündern, stellte Timur eine große Armee auf, um Indien unter dem Vorwand zu erobern, dass das indische Sultanat Delhi zu tolerant gegenüber den Heiden sei.
stage_intro_4521=1399 weigerte sich der neue mamlukische Sultan Faraj, das timuridische Khanat als Oberstaat anzuerkennen und weigerte sich, Timurs Feinde auszuliefern, was den Zorn von Timurs herauf beschwor.
stage_intro_4523=Das Osmanische Reich war ein weiteres mächtiges Reich, das zur gleichen Zeit wie das timuridische Khanat im Nahen Osten existierte und die anhaltende Expansion beider Seiten führte zu Konflikten, die sich schließlich in einen groß angelegten Krieg verwandelten.
stage_intro_4541=Johannes I. Tsimiskis wurde in Armenien in eine adlige Militärfamilie hineingeboren. Sein Onkel war der berühmte byzantinische General Nikephorous Phokas. Schon in jungen Jahren schloss er sich seinem Onkel im Krieg an und wurde in seinen Zwanzigern durch seine Erfolge in der Schlacht von Samosat berühmt.
stage_intro_4543=Im Jahr 963 nutzte Nikephoros Phokas die Krankheit des Kaisers aus, um den Thron zu besteigen. 969 ermordeten Johannes I. und seine Frau Theophano den Kaiser und eroberten so den Thron. Der Neffe von Nikephoros, Bardas Phokas, versuchte, den Tod seines Onkels zu rächen, wurde aber bald von Johannes I. unterdrückt.
stage_intro_4545=Im Jahr 970 begann Großfürst Sviatoslav von Rus mit seiner Armee eine Invasion in den nördlichen Teil des byzantinischen Reiches. Zu dieser Zeit befand sich Johannes I. mitten in einem Bürgerkrieg mit der Familie Phokas und hatte keine Zeit, seinem geliebten General Bardas Skleros, der die thrakische Region verteidigte, Unterstützung zu schicken.
stage_intro_4547=Im Jahr 971 nahm Sviatoslav seinen Vorstoß nach Süden an die Grenzen des Byzantinischen Reiches mit einem Heer von 30.000 Mann wieder auf. Johannes I. führte seine Elitetruppen gegen ihn an, nachdem die inneren Unruhen im Reich beigelegt waren. Nach vielen erbitterten Kämpfen belagerte Johannes I. Sviatoslav in der Stadt Dorostolon.
stage_intro_4549=Im Jahr 972, nach dem Ende des Krieges mit der Rus, wandte Johannes I. seine Aufmerksamkeit dem Osten zu. Zunächst erzielte die byzantinische Seite bei der Ostexpedition einige Erfolge, aber die Niederlage und Gefangennahme des östlichen Generals Mleh in der späteren Schlacht mit dem Emirat Mosul erzwang das Ende der Expedition.
stage_intro_4551=Im Jahr 974 startete Johannes I. seinen zweiten und dritten Feldzug, um das Emirat von Mosul zu zerschlagen und zur Unterwerfung zu zwingen. Während dieser Zeit rückte Johannes I. nach Osten vor und schloss das gesamte Gebiet westlich des mittleren Euphrat seinem Reich an, wobei er Damaskus, Tripolis und andere Städte eroberte.


