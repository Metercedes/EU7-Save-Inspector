conquest_faction_desc_701=Das Osmanische Reich setzte seine Expansion nach Europa fort. Gleichzeitig wurden innerhalb des Reiches Reformen eingeleitet. Neue Dekrete wurden eingeführt, die die Kontrolle der Zentralregierung stärkten. Obwohl das Osmanische Reich von innen und außen heraus herausgefordert wurde, blieb es einer der mächtigsten Staaten seiner Zeit mit großer militärischer Macht und kulturellem Einfluss.
conquest_faction_desc_702=Das Byzantinische Reich war nicht mehr in seinem alten Glanz, sein Territorium schrumpfte, die politische Korruption im Inneren war gravierend und die Wirtschaft lahmte. Das Osmanische Reich startete eine Reihe von Angriffen auf Byzanz, griff immer weiter in sein Gebiet ein und brachte es an den Rand der Zerstörung.
conquest_faction_desc_703=Seit seiner Verlegung auf den Balkan war das Königreich Ungarn von Kriegen heimgesucht worden. Nach der Herrschaft von König Szeged blühte das Land wieder auf. Es sah sich jedoch mit internen Konflikten zwischen dem Adel und der Zentralgewalt konfrontiert. Gleichzeitig stellte das Osmanische Reich eine ständige Bedrohung dar, und das Königreich Ungarn musste dringend seine Rüstung verstärken, um die Integrität und Sicherheit seines Territoriums zu wahren.
conquest_faction_desc_704=Das Fürstentum Walachei sah sich einer doppelten Bedrohung durch das Königreich Ungarn und das Osmanische Reich ausgesetzt. Der Anführer des Fürstentums, Vlad II., war hoch motiviert und ergriff energische Maßnahmen zur Verteidigung der Unabhängigkeit des Fürstentums, wobei er nicht zögerte, Gewalt mit Gewalt zu bekämpfen. Leider musste er sich jedoch einem Angriff des Königreichs Ungarn geschlagen geben und war gezwungen, einen demütigenden Friedensvertrag zu akzeptieren.
conquest_faction_desc_705=Das Fürstentum Moldau war ein relativ junges Fürstentum, ein kleines Land, das an das Königreich Ungarn und das Fürstentum Walachei grenzte und von inneren Unruhen und Konflikten geprägt war. Stephan der Große unternahm große Anstrengungen, um seine Herrschaft zu festigen. Dazu gehörten auch die friedliche Beilegung von Konflikten mit den Nachbarländern und das Bemühen um internationale Unterstützung.
conquest_faction_desc_706=Das Königreich Bosnien war ein multikultureller und multiethnischer Staat mit mehreren ethnischen Gruppen, die sich innerhalb seiner Grenzen niederließen. Innerhalb des Königreichs herrschte ständiger Streit unter den Adligen, während es von außen durch das ungarische und das osmanische Reich bedroht.
conquest_faction_desc_707=Während dieser Zeit war das serbische Despotat durch innere und äußere Bedrohungen gefährdet. Obwohl Serbien einen starken Herrscher hatte, machten diese Bedrohungen die Zukunft des Landes ungewiss.
conquest_faction_desc_708=Die Republik Venedig war herausgefordert, um die Vorherrschaft im Handel im östlichen Mittelmeerraum zu kämpfen. Sie konkurrierte mit ihrem christlichen Rivalen, der Republik Genua, um die Herrschaft über das Goldene Horn. In dieser angespannten Situation mussten die Venezianer harte Maßnahmen ergreifen, darunter Angriffe auf feindliche Schiffe und militärische Interventionen, um ihre Interessen und ihren Einfluss im Mittelmeerraum zu sichern.
conquest_faction_desc_709=Albanien wurde in mehrere Territorien aufgeteilt. Um sich gegen die osmanische Invasion zu wehren, gründeten die einheimischen albanischen Adligen den Albanischen Bund. Der Bund unter der Führung von Herzog Skare, dem Oberhaupt des Bündnisses, besiegte die osmanische Armee in einer Reihe von Schlachten und wurde zu einer wichtigen Kraft bei der Konsolidierung der Unabhängigkeit Albaniens.
conquest_faction_desc_710=Das Despotat von Epirus, ein starkes Regime in der griechischen Region, wurde von Carlo II. geführt. Trotz territorialer Streitigkeiten mit dem Byzantinischen Reich bewies das Despotat von Epirus im Krieg große militärische Stärke und Führungsqualitäten und wurde als wichtige Kraft in der griechischen Region angesehen.
conquest_faction_desc_711=Das Despotat von Morea war das einzige verbliebene sezessionistische Regime im Byzantinischen Reich. Der Führer des Landes, Thomas Paliologos, kämpfte um die Konsolidierung seiner Herrschaft angesichts der Bedrohung durch das Osmanische Reich.
conquest_faction_desc_712=Die Krone von Aragon eroberte das Königreich Neapel in Süditalien und geriet in Konflikt mit dem Papst. Die Region litt unter politischer Instabilität, militärischen Konflikten und Krankheitsepidemien, aber der kulturelle und wirtschaftliche Einfluss Aragons wuchs weiter.
conquest_faction_desc_713=Der Staat Karaman Bey sah sich ständigen Konflikten und Unterdrückung durch das benachbarte Osmanische Reich ausgesetzt, und die Suche nach einem Weg, unabhängig zu bleiben und zu gedeihen, wurde immer schwieriger.
conquest_faction_desc_714=Die Ritter des Hospitals und das Königreich Zypern schlossen sich zur Zypern-Hospital-Ritter-Allianz zusammen und nahmen den Kampf gegen die Piraten im östlichen Mittelmeer auf. Trotz des Drucks, dem die Allianz seitens des Osmanischen Reiches ausgesetzt war, konnten sie ihren Einfluss in der Region durch große Seestärke und taktischen Einfallsreichtum aufrechterhalten.
conquest_faction_desc_716=Die Kreuzritterkoalition unter der Führung von König Władysław III. von Polen und Ungarn. Mit Hilfe von Mircea II. von der Walachei eroberten sie die bulgarische Hafenstadt Varna und marschierten ins Osmanische Hinterland.

