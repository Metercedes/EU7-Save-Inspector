skill_desc_51821=Wenn eine Stadt erobert wird, wird eine Gruppe von niedrigstufigen Nahkampf-Infanteristen rekrutiert, um bei der Verteidigung zu helfen. Dies hält {0}3{1} Runden an und hat eine Abklingzeit von {0}3{1} Runden.
skill_desc_51822=Wenn die Stadt erobert wird, wird eine Gruppe von niedrigstufigen Nahkampf- und Verteidigungsinfanteristen rekrutiert, um bei der Verteidigung zu helfen. Dies hält {0}3{1} Runden an und hat eine Abklingzeit von {0}3{1} Runden.
skill_desc_51841=Wenn ein Angriff einen Sturmangriff auslöst, wird die Mobilität des Ziels auf Null gesetzt. Nach dem Angriff auf ein Ziel mit weniger als {0}10{1} Mobilität erhältst du {0}1{1} Mobilität zurück. Die Abklingzeit beträgt {0}4{1} Runden.
skill_desc_51842=Wenn ein Angriff einen Sturmangriff auslöst, wird die Mobilität des Ziels auf Null gesetzt. Nach dem Angriff auf ein Ziel mit weniger als {0}11{1} Mobilität erhältst du {0}2{1} Mobilität zurück. Die Abklingzeit beträgt {0}3{1} Runden.
skill_desc_51851=Die Mobilität der Teutonischen Axtkämpfer und Teutonischen Ritter in der Legion beträgt {0}13{1}, der Basis-Ausweichen-Chance wird zu {0}15%{1}, und die Chance auf Sturmangriff erhöht sich um {0}20%{1}.
skill_desc_51861=Zu Beginn der Runde, wenn du in einem Zustand hoher Moral bist, reduziert sich die Abklingzeit deiner aktiven Fähigkeit um {0}-2{1}, und der verursachte Schaden erhöht sich um {0}15%{1}. Andernfalls erhöht sich deine Moral um {0}+8{1}, und der erlittene Schaden verringert sich um {0}-15%{1}.
skill_desc_51881=Wenn als Konsul ernannt, erhöht sich das Bevölkerungslimit um {0}+100{1}, und die Kosten für Stadtverbesserungen werden um {0}30%{1} reduziert.
skill_desc_51891=Wenn als Konsul ernannt, betragen die Geschenkekosten +30%. Wenn es keinen Krieg mit einer anderen Macht gibt, wird das wirtschaftliche Einkommen um {0}30%{1} erhöht.
skill_desc_51901=Wenn als Konsul ernannt, kannst du nicht aktiv anderen Mächten den Krieg erklären. Bei Erpressung werden die Ressourcenkosten um {0}50%{1} reduziert. Nach Zahlung des Tributs steigt der diplomatische Wert um zusätzliche {0}30{1} Punkte.
skill_desc_51911=Stellt nach einem Angriff {0}3{1} Mobilität wieder her, hält {0}3{1} Angriffe lang an. Die Abklingzeit beträgt {0}3{1} Runden.
skill_desc_51921=Reduziert die Moral des ausgewählten Feindes sowie von {0}2{1} weiteren Feinden in der Umgebung des Ziels und entzündet das Feld, auf dem sich der Feind befindet. Jedes Mal wenn ein Feind getroffen wird, verringern sich die Mobilitätskosten für Angriffe um {0}-1{1}. Dieser Effekt kann nicht mit anderen Fähigkeiten zur Reduzierung der Mobilitätskosten kombiniert werden. Die Abklingzeit beträgt {0}3{1} Runden.
skill_desc_51931=Fernangriffe haben eine {0}30%{1} Chance, den verursachten Schaden um {0}30%{1} zu erhöhen.
skill_desc_51932=Fernangriffe haben eine {0}50%{1} Chance, den verursachten Schaden um {0}50%{1} zu erhöhen.
skill_desc_51941=Wenn sich keine feindlichen Truppen in der Umgebung des Ziels befinden, verringert der Angriff die Moral des Ziels um {0}-10{1}.
skill_desc_51951=Du verursachst {0}+25%{1} mehr Schaden, Stellt nach einem Angriff {0}2{1} Mobilität wieder her, hält {0}3{1} Angriffe lang an.
skill_desc_51961=Erhöht den Schaden, den umliegende feindliche Legionen erhalten, um {0}30%{1}, und verringert Schaden, den sie zufügen, um {0}30%{1}, {0}2{1} Runden Abklingzeit.
skill_desc_51971=Der von umliegenden Feinden verursachte Schaden wird um {0}15%{1} reduziert, Verringert einige Attribute von umliegenden feindlichen Einheiten, {0}2{1} Runden Abklingzeit.
skill_desc_51981=Der von allen freundlichen Spezialeinheiten der Tang-Dynastie auf dem Schlachtfeld zugefügte Schaden wird um {0}15%{1} erhöht, und der erlittene Schaden wird um {0}15%{1} verringert.
