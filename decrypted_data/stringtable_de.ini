stage_intro_30301=Wenn die schöne Judith nicht aufgetaucht wäre, wäre der 24-jährige Roger Bosso vielleicht für immer in seinem leeren Haus in der Normandie geblieben. Es war Liebe auf den ersten Blick, doch Herkunft und Status standen dem im Weg. Judith war Tochter eines Grafen und eine Cousine von Wilhelm dem Eroberer, während Roger nichts besaß, weder Land noch Titel. Für die Liebe beschloss Roger, nach Italien zu reisen, um sich seinem Bruder Robert Guiscard anzuschließen.
stage_intro_30302=Robert Guiskard erbte die Ländereien und Titel seines verstorbenen Bruders Humfred in Italien.  Robert hatte zunächst nicht die Absicht, seinem 16 Jahre jüngeren Bruder Land zu geben. Allerdings brauchte Robert die Hilfe Rogers, um weitere Länder zu erobern. In den nächsten fünf Jahren unterstützte Roger seinen Bruder bei der vollständigen Eroberung Kalabriens.
stage_intro_30303=Sizilien war seit dem 9. Jahrhundert unter muslimischer Herrschaft, die jedoch immer wieder durch innerdynastischen Streitigkeiten geprägt war. So wurde Sizilien 1044 in vier Bereiche aufgeteilt, die Rivalitäten gingen aber weiter. Ibn al-Thumna war einer dieser Machthaber. Er tötete einen anderen Gouverneur und nahm seine Witwe in Besitz. Ibn al-Hawwas, Bruder der Witwe und Emir von Messina, konnte seinen Rivalen in der Schlacht besiegen und setzte daraufhin ein Kopfgeld auf Ibn al-Thumna aus. Um der Gefangennahme zu entgehen, floh dieser nach Italien und suchte schließlich Rogers Hilfe. Dadurch ergab sich für Roger die Gelegenheit, nach Sizilien einzumarschieren.
stage_intro_30304=Roger beschloss, vor seinem Bruder Robert in Sizilien zu landen, da sein Wunsch nach Reichtum und Land alles andere überstieg.
stage_intro_30305=Nach der Landung auf Sizilien bestand Rogers Ziel darin, die strategisch wichtige Stadt Enna zu erobern, um so den Emir entscheidend zu schwächen. Als sich Rogers Truppen der Stadt näherten, stellten sie fest, dass die Verteidigung der Festung äußerst stark war. Um die Sache noch schlimmer zu machen, rief der Emir alle seine Truppen zusammen, um einen Gegenangriff vorzubereiten, der die isolierten Normannen auslöschen würde.
stage_intro_30306=Im Zuge dieser Erfolge wurde die Beziehung zwischen Robert und Roger immer angespannter. Nach der Besetzung Troinas ging Roger nach Kalabrien zurück, um dort Judith zu treffen, nach der er sich sehnte. Ihr Vater hatte sich mit Herzog William in der Normandie zerworfen und die Familie war gezwungen zu fliehen, woraufhin ihnen Robert Guiskard eine Bleibe in Kalabrien anbot. Roger, der nun über Macht und Ansehen verfügte, machte Judith umgehend einen Heiratsantrag und holte die Zustimmung ihres Vaters ein, doch Guiskard weigerte sich weiterhin, seinem Bruder eigenes Land zu geben.
stage_intro_30307=Roger ist nicht mehr der unreife Junge von einst. Er und sein Bruder beginnen eine entscheidende Schlacht in Kalabrien. Obwohl Robert seinen schlauen Bruder schließlich besiegte, versöhnte sich Roger mit seinem Bruder und beide reisten später gemeinsam nach Sizilien.
stage_intro_30308=Roger und Judith kehrten nach Sizilien zurück, um die von den Sarazenen bedrohten Bewohnern von Troina zu helfen. Doch Ende 1062, als Roger mit der Eroberung von Nicosia beschäftigt war, startete Ibn al-Hawwas, der sich inzwischen mit den Byzantinern verbündet hatte, einen Überraschungsangriff auf Troina, um Judith gefangen zu nehmen. Roger kehrte sofort um, um seine Frau zu retten.
stage_intro_30309=Roger begegnete den Einheimischen wohlwollend und obwohl er Oberhaupt der örtlichen lateinischen Kirche war, tolerierte er die sowohl die Araber als auch die Griechen hinsichtlich Glaubensausübung und ziviler Strukturen. Die Ziriden in Nordafrika wollten jedoch ihre Herrschaft über Sizilien nicht aufgeben und Prinz Ayyub, führte eine 35.000 Mann starke Armee nach Sizilien. Bei Cerami kam es zur Schlacht und Roger stand der feindlichen Übermacht mit nur 136 Rittern und 300 Infanteristen gegenüber.
stage_intro_30310=Roger scheiterte 1064 bei seinem Versuch, Palermo einzunehmen, woraufhin Prinz Ayyub erneut eine Armee aufstellte, um die Normannen herauszufordern. Roger und Prinz Ayyub trafen erneut aufeinander, und der Kräfteunterschied zwischen den beiden Seiten war immer noch riesig.
stage_intro_30311=Nachdem Robert Guiskard Bari erobert hatte, konzentrierte er sich wieder auf Sizilien. Im Jahr 1071 wurde Roger der Titel "Graf von Sizilien" für seine Dienste verliehen, während Robert Messina und Val Demone für sich behielt. Im Jahr 1072 griffen Roger und sein Bruder gemeinsam Palermo an.
stage_intro_30312=Im Jahr 1077 belagerte Roger Trapani, eine der beiden letzten verbliebenen Festungen der Sarazenen im Westen Siziliens. Im Jahr 1079 wurde Taormina belagert und im Jahr 1081 eroberte Roger Catania. Der einzige Rückschlag war, dass seine geliebte Judith im Jahr 1080 starb.
stage_intro_30313=Als Guiskard 1085 starb, war die normannische Eroberung Siziliens noch nicht abgeschlossen. Seine Söhne kämpften in einem Bürgerkrieg um die Nachfolge, was dazu führte, dass die Eroberung Siziliens zu Rogers Aufgabe wurde.
stage_intro_30314=Um sich vor weiteren Angriffen der Ziriden aus Nordafrika zu schützen, führte Roger im Jahr 1091 eine Flotte zur Eroberung der Insel Malta an.
stage_intro_30315=Rogers Herrschaft auf Sizilien war äußerst erfolgreich. Er strebte politische Neutralität an, verschlankte die Regierung, führte eine von Toleranz geprägte Religionspolitik und war zu dieser Zeit der einzige europäische Herrscher, der nicht an den Kreuzzügen teilnahm. Unter seiner Herrschaft wurde Sizilien stabiler und wohlhabender als je zuvor, und das sizilianische Volk nannte ihn liebevoll den „Großen Grafen“.

stage_intro_30401=Nach dem Tod von Roger I. war die politische Lage in Sizilien sehr stabil. Der älteste Sohn Simon ist erst 8 Jahre alt, daher übt seine Mutter Adelheid die Herrschaft aus. Vier Jahre später starb der 12-Jährige unerwartet und das Erbe ging auf den 10-jährigen Bruder Roger II. über. 1112, im Alter von 16 Jahren übernimmt er den Thron und die Regentin Adelheid dankt offiziell ab und heiratet König Balduin I. von Jerusalem.
stage_intro_30402=Roger II. erbte den Reichtum seines Vaters und begann mit dem Aufbau einer mächtigen Flotte zur Verteidigung und Expansion. Er wartete nur auf eine Gelegenheit, sie einzusetzen. Der Emir von Mahdia griff Nicotera an und zerstörte die Stadt, was Roger II. zum Anlass für einen groß angelegten Gegenangriff nahm.
stage_intro_30403=Im Zuge eines Machtkampfes annullierte der Patriarch von Jerusalem die Ehe von Rogers Mutter Adelheid mit König Balduin I. und Adelheid musste nach Sizilien zurückkehren. Dies demütigte Roger II. zutiefst.
stage_intro_30404=Der Vater von Roger II. fiel in Malta ein, eroberte die Insel jedoch nicht vollständig. Roger II. konnte die Anwesenheit von Sarazenen in der Nähe von Sizilien nicht dulden und beschloss daher im Jahr 1127, diese Bedrohung zu beseitigen.
stage_intro_30405=1127 starb Wilhelm II. von Apulien ohne Nachkommen und gemäß der Erbfolge sollte Roger II. Kalabrien sowie weitere Teile Süditaliens bekommen. Allerdings wollte Papst Honorius II. verhindern, dass es zu einer solch starken Machtkonzentration auf einen einzelnen Normannen kommt. Der Papst startete einen Kreuzzug gegen Roger II. und konnte dabei Ranulf II. aus der Familie Drengot für sich gewinnen, der diese Gelegenheit für einen Aufstand gegen seinen Schwager nutzte.
stage_intro_30406=Roger II. war zwar eher geneigt, seine Macht durch Diplomatie zu erweitern, wie die oströmischen Kaiser. Dennoch waren Rogers Truppen waren diszipliniert und schlagkräftig, während die feindlichen Truppen schlecht organisiert waren und nur durch brüchige Allianzen zusammengehalten wurden. Im Jahr 1128 zogen sich die Koalitionstruppen aus Angst vor der Armee Rogers II. zurück und der Papst war gezwungen, ihn zum Herzog von Apulien, Kalabrien und Sizilien zu machen.
stage_intro_30407=Nach dem Tod des Papstes Honorius erhoben zwei mögliche Nachfolger Anspruch auf den päpstlichen Thron. Roger II. unterstütze den Gegenpapst Anacletus und wurde im Gegenzug zum König von Sizilien gekrönt. Am Weihnachtstag 1130 sahen die Bürger von Palermo zum ersten Mal ihren neuen König.
stage_intro_30408=Enteignet und von seiner Frau verlassen, schloss Ranulf am 24. Juli 1132 ein Bündnis mit Robert II. von Capua und Sergius VII. von Neapel gegen Roger II.
stage_intro_30409=Die Krönungszeremonie, bei der Roger II. den Thron bestieg, war ein pompöses Spektakel, das weit über Sizilien hinausstrahlte. Ungeachtet dessen war seine Unterstützung für den falschen Papst eine Beleidigung für die Christen, die Innozenz II. als ihren einzig wahren Papst ansahen. So waren auch weitere Kräfte veranlasst, sich dem Lager Innozenz' anzuschließen. Im Jahr 1133 kam Lothar, Kaiser des Heiligen Römischen Reiches schließlich in Italien an.
stage_intro_30410=Nach der Krönung Lothars III. verbesserte sich die innenpolitische Lage des Heiligen Römischen Reiches erheblich. Er verbrachte ein Jahr damit, eine Armee aufzustellen, überquerte erneut die Alpen und marschierte nach Norditalien, wo es kaum Widerstand gab. Kaiser Lothar, der Heilige Stuhl unter Papst Innozenz, der byzantinische Kaiser Johannes II. und das Königreich Venedig schlossen sich alle zusammen, um Sizilien anzugreifen.
stage_intro_30411=Am 30. Oktober 1137 führte der neu ernannte Herzog Ranulf von Apulien ein von Kaiser Lothar geliehenes deutsches Kontingent an, um Roger II. anzugreifen. Rogers Feind ist nicht nur Ranulf, sondern auch sein ehemaliger Verbündeter, Sergius von Neapel.
stage_intro_30412=Einige Monate später starb der von Roger II. unterstützte Papst Anakletus II. Innozenz wurde damit einzig legitimer Papst und Roger II. versuchte, mit dem neuen Papst Frieden zu schließen. Papst Innozenz stellte jedoch eine Armee zusammen und startete einen Angriff.
stage_intro_30413=Nach zehnjährigem Kampf besiegte Roger II. zwei Kaiser und einen Papst und konnte damit jeglichen Widerstand überwinden. Er begann, die Gesetze zu vereinheitlichen und einen mächtigen Zentralstaat aufzubauen.
stage_intro_30414=Das Heilige Römische Reich und das Oströmische Reich vergaßen diese Demütigung nicht und starteten viele Male weitere Angriffe auf Sizilien. Es scheint jedoch, dass Gott sie nicht begünstigte und Sizilien unter Roger II. einen Aufschwung erlebte. Im Jahr 1154 starb Roger II. friedlich in Palermo. Auf dem Schwert, mit dem er begraben wurde, war Folgendes eingraviert: „Apulien, Kalabrien, Sizilien und Afrika sind alle mein.“

stage_intro_30501=Konstanze, Königin von Sizilien, wurde neun Jahre nach ihrer Heirat mit Heinrich VI., dem Kaiser des Heiligen Römischen Reiches, schwanger. Heinrich VI. reiste 1194 nach Sizilien zu seiner Krönung, als Friedrich II. auf seiner Reise am Tag nach Weihnachten geboren wurde. Dieses unter einem Zelt geborene Baby sollte die Geschichte Europas verändern.
stage_intro_30502=Friedrich II. wurde erst im Alter von zwei Jahren getauft, eine Szene, die zu seiner einzigen engen Begegnung mit seinem Vater, Heinrich VI., wurde. Heinrich VI. starb kurz nach Friedrichs Geburt plötzlich, was Friedrich zum alleinigen Erben machte. Der Tod seines Vaters löste jedoch einen Machtkampf aus, in dem neben Friedrich noch zwei weitere Anwärter waren: sein Onkel Philipp und der vom Papst unterstützte Herzog von Sachsen, Otto von Braunschweig. Friedrichs Mutter, Konstanze, entschied sich, ihren Sohn aus Deutschland wegzubringen und übernahm vorübergehend die Kontrolle über das Königreich Sizilien. Im Jahr 1198 starb auch Konstanze, und Friedrichs Schicksal wurde noch ungewisser.
stage_intro_30503=Der einsame Teenager Friedrich wuchs nicht in einer friedlichen Umgebung auf. Das Königreich Sizilien war von verschiedenen Mächten dominiert, und er war nur ein Bauer auf dem politischen Schachbrett. Im Alter von 14 Jahren wurde Friedrich vom Papst in eine arrangierte Ehe geschickt. Seine Frau, die zehn Jahre älter war als er, brachte 500 Ritter mit, die zum Schlüssel für seinen Aufstieg an die Spitze der Macht wurden.
stage_intro_30504=Als Friedrich 16 Jahre alt war, wurde sein deutscher Onkel Philipp ermordet und Papst Innozenz III. entschied, Friedrich zu unterstützen, um König von Deutschland zu werden. Friedrichs Weg zum Thron war jedoch nicht einfach, da Otto versuchte, seine Krönung in Norditalien zu verhindern. Doch Friedrich gelang es, seinen Feinden zu entkommen und schließlich wurde er im Mainzer Dom gekrönt und wurde so zum rechtmäßigen Erben des Heiligen Römischen Reiches.
stage_intro_30505=Papst Innozenz III. atmete schließlich erleichtert auf, nachdem Friedrich II. erklärt hatte, dass er das Königreich Sizilien nicht übernehmen würde, und starb kurz darauf. Einige Monate nach dem Tod des Papstes nahm Friedrich II. schnell seine Frau und seinen Sohn unter seine Obhut und stärkte seine Dominanz in Deutschland.
stage_intro_30506=Nach dem Tod von Richard Löwenherz von England in der Schlacht nutzte König Philipp II. von Frankreich die Gelegenheit, die englische Macht zu beseitigen, indem er Friedrich II. einlud, an der Beilegung des Erbfolgekriegs von Champagne teilzunehmen. Friedrich II. nahm die Einladung gerne an und bereitete den Weg für den Sieg in der Schlacht.
stage_intro_30507=Am 20. November 1220 wurde Friedrich II. in einer prunkvollen Krönungszeremonie in Rom zum Kaiser des Heiligen Römischen Reiches gekrönt. Er hob seine Krone, hielt ein Schwert in der rechten Hand und eine Tafel in der linken, und legte einen feierlichen Eid ab, der Beschützer der christlichen Kirche zu sein, Kreuzzüge durchzuführen und Ketzer zu vernichten. Konstanze, als Kaiserin, kniete hinter ihrem Ehemann und empfing die Krönung.
stage_intro_30508=Friedrich II. widmete sich Reformen und Bauprojekten und bereiste Süditalien und Sizilien. Er erließ die Capua-Charta, baute den Palast in Foggia und belebte die sizilianische Marine wieder. Friedrich II. gründete auch die Universität Neapel, die erste staatliche Universität Europas, die ein kulturelles und akademisches Wiederaufleben förderte.
stage_intro_30509=Obwohl Friedrich II. damit beschäftigt war, seine Herrschaft zu festigen, tadelte ihn der Papst weiterhin, weil er nicht an den Schlachten des Fünften Kreuzzugs teilnahm. Friedrich blieb mit den Herrschern der islamischen Welt in Kontakt und nahm schließlich Friedensgespräche mit dem Sultan von Ägypten auf, dem es gelungen war, Jerusalem zurückzuerobern. Friedrich II. wurde 1229 zum König von Jerusalem gekrönt, eine Leistung, die dem Papst sehr missfiel.
stage_intro_30510=Papst Gregor IX. war wütend darüber, dass Friedrich II. mit den „Ungläubigen“ Frieden geschlossen hatte. Der Papst autorisierte den ehemaligen König von Jerusalem, Sizilien anzugreifen, und Friedrich II. musste zurückkehren, um seine Heimat zu verteidigen.
stage_intro_30511=Friedrich II. erließ 1231 die Melfi-Charta, eine mittelalterliche Charta, die den Übergang des Heiligen Römischen Reiches zu einer weltlichen Monarchie markierte. Der Papst lehnte dies entschieden ab und sah Friedrichs Handlung als Herausforderung der päpstlichen Autorität. Dieser Schritt legte auch den Grundstein für einen langen Konflikt zwischen Friedrich und der Kirche.
stage_intro_30512=Die Lombardische Liga in Norditalien war nie vollständig in das Heilige Römische Reich integriert worden, und die autonomen Stadtstaaten in dieser Region, angeführt von Mailand, stellten eine Barriere zwischen dem Königreich Sizilien und dem Königreich Deutschland dar. Mit päpstlicher Unterstützung brachte sich die Lombardische Liga erneut gegen Friedrich II. in Stellung.
stage_intro_30513=Durch die Siege des Vorjahres war es Friedrich II. gelungen, den östlichen Teil Norditaliens unter seine Kontrolle zu bringen. Friedrichs nächstes Ziel war es, Mantua zu erobern. Ein Sieg dort würde die Verbindung mit Deutschland sichern und den Weg für einen Angriff auf die alliierten Festungen im nordwestlichen Italien ebnen.
stage_intro_30514=Brescia lag an der Hauptverkehrsroute von Verona zur Via Bergamo, und Friedrich II. machte es zu einem wichtigen Ziel, um die Nachschublinien der Lombardischen Liga abzuschneiden. Obwohl die Angriffsarmee stark war, litt Friedrich II. unter dem hartnäckigen Widerstand und den unerwarteten Taktiken der Verteidiger.
stage_intro_30515=Friedrich II. wurde 1239 dreimal exkommuniziert, und er musste eine Krieg gegen Papst Gregor IX. führen, der Genua und Venedig vereinte, um das Königreich Sizilien von See her anzugreifen. Schließlich siegte Friedrichs Armee und begann, auf Rom zu marschieren.
stage_intro_30516=Im Jahr 1243 trat ein neuer Papst, Innozenz IV., sein Amt an, doch der Konflikt mit Friedrich II. beruhigte sich nicht. Innozenz IV. entzog Friedrich nicht nur sein Reich und den sizilianischen Thron, sondern versuchte auch, die Kontrolle der Kirche über Deutschland und die Lombardei auszudehnen. Im Jahr 1246 schmiedete der Papst sogar ein Komplott, um Friedrich und seinen Sohn zu ermorden.
stage_intro_30517=Als Friedrichs neues Regime gefestigt war, beschloss er erneut, die Lombardische Liga in Norditalien zu unterdrücken. Doch Friedrich war bereits über fünfzig Jahre alt, und die Zeit wurde zu seinem schlimmsten Feind. Im Sommer 1247 brach in Parma ein vom Papst unterstützter Staatsstreich aus, und Friedrich handelte schnell, um Parma zu belagern. Er errichtete Stützpunkte bei Victoria und in der Umgebung, um sich auf einen langen militärischen Kampf vorzubereiten.
stage_intro_30518=Nur drei Monate später gelang es Friedrich und seinem Sohn Enzo, die Kontrolle über das Gebiet um Parma zurückzugewinnen. Im Sommer 1248 entschied Friedrich, das Gebiet zu konsolidieren und zu plündern. Zu dieser Zeit kam es unter dem Kommando von Lancia zu einem entscheidenden Zusammenstoß zwischen der Armee des Kaisers und der päpstlichen Armee. Das Schicksal beider Armeen sollte in dieser Schlacht entschieden werden.
stage_intro_30519=In der Schlacht von Fossalta im Jahr 1249 wurde Friedrichs Sohn Enzo von der Bologneser Armee gefangen genommen, und die Nordfront verlor ihren wichtigsten Befehlshaber. Mit aufeinanderfolgenden Niederlagen in wichtigen Schlachten, dem Fall von Brescia, der Kapitulation von Pavia und der Öffnung der Tore von Piacenza für den Feind stand Friedrich vor einem beispiellosen Dilemma. Im November 1250 erlitt Friedrich nach einer Adlerjagd plötzlich gesundheitliche Probleme. Nach einer Zeit der Stille starb er am 13. Dezember desselben Jahres und markierte das Ende seines legendären Lebens.

stage_group_name_30004=Briefe von Roger Bosso
stage_group_name_30005=Tagebuch von Muhammad al-Idrisi
stage_group_name_30006=Tagebuch von Berardo di Castagna

family_letter_desc_401=... Judith, ich werde zu dir zurückkommen, ich werde dich bald heiraten und alles wird gut. …
family_letter_desc_402=…Liebste Judith, bist du wohlauf? Ich habe für meinen Bruder ein großes Gebiet erobert. Ich weiß zwar nicht, wann ich zurückkehren kann, doch möge Gott dich und mich segnen. …
family_letter_desc_403=Judith, jeden Moment beginnt die Überfahrt nach Sizilien und dies ist für mich die beste Möglichkeit, ein Lehen zu erwerben. Hoffentlich geht alles gut. …
family_letter_desc_404=Das Glück scheint nicht mehr auf meiner Seite zu sein. Ohne deine Brief könnte ich wahrscheinlich nicht überleben. Ich weiß nicht, ob ich dich jemals wiedersehen werde, Judith.
family_letter_desc_405=Es ist wie ein Traum, ich hätte nicht erwartet, dich hier wiedersehen zu können – die Geliebte, die ich jeden Tag vermisse. Das muss alles Gottes Werk sein.
family_letter_desc_406=Es schmerzt, mich von meiner Familie zu trennen. Aber Sizilien ist mein verheißenes Land, die Heimat, in der ich mein Leben mit meiner Geliebten verbringen will.
family_letter_desc_407=Judith, falls dir etwas zustoßen sollte, so will ich nicht länger auf Erden sein.
family_letter_desc_408=Glauben die Sarazenen etwa, dass wir uns vor ihren vielen Soldaten fürchten? Da haben sie die Normannen unterschätzt! Wir sind aus einem anderen Holz geschnitzt.
family_letter_desc_409=Endlich hat mein Bruder mich mit einem eigenen Lehen entlohnt. Judith, damit geht auch mein Versprechen gegenüber dir in Erfüllung.
family_letter_desc_410=Judith, meine Liebe, du hast mich zu dem Mann gemacht, der ich heute bin. Auch wenn du nun im Himmel bist, bete ich, dass du unserem Reich weiterhin deinen Segen gibst.
family_letter_desc_411=Mein Bruder konnte seine Ambitionen, oströmischer Kaiser zu werden, nicht verwirklichen. Der Schutz und Erhalt meines Königreichs ist bereits eine würdige Aufgabe, die ich mit vollem Einsatz verfolgen werde.
family_letter_desc_412=Mögen die Griechen, Sarazenen und Normannen hier auf Sizilien friedlich zusammenleben und mögen meinen Nachkommen ein Leben frei von Krieg erfahren.

family_letter_desc_501=Während meiner Jugend wanderte ich weit umher und reiste durch Spanien, Portugal und Südfrankreich. Überall stieß ich auf Diskriminierung und Feindseligkeit, aber ich erlebte auch, wie die einfachen Leute ums Überleben in Armut kämpften.
family_letter_desc_502=Zu dieser Zeit war der Rassenhass weit verbreitet. Mit 16 Jahren hatte ich gelernt, wie man der Verfolgung durch fränkische Ritter entkommt. In jenem Jahr kehrte ich nach Andalusien zurück.
family_letter_desc_503=Ich hörte von einem magischen Land im Mittelmeer, wo es keinen Krieg gab und Griechen, Araber, Franken und andere Völker harmonisch zusammenlebten. Ich beschloss, es mit eigenen Augen zu sehen.
family_letter_desc_504=Schließlich kam ich nach Sizilien und fand dieses ideale Land. Ich traf meinen Mentor, Abu al-Salt, und unter seiner Anleitung studierte ich Pharmazie, Geometrie und Astronomie.
family_letter_desc_505=Mit 30 Jahren erlebte ich einen traumhaften Tag. Rosenblätter regneten aus dem grenzenlosen Himmel, während Roger II., mit einer edlen Krone und einem prächtigen Mantel bekleidet, lächelnd uns zuwinkte.
family_letter_desc_506=Sizilien war freier als jeder Ort, an dem ich je gewesen bin. Es gab Waren aus aller Welt—arabische Gewürze, fränkische Wolle und sogar Seide aus China.
family_letter_desc_507=Der Informationsfluss in Sizilien war außergewöhnlich bequem. Wir konnten wissenschaftliche Werke aus aller Welt sammeln—arabische medizinische Enzyklopädien, oströmische Mathematik und ägyptische Mythen. Ich übersetzte diese ins Lateinische und Arabische.
family_letter_desc_508=Ich unterrichtete oft die Prinzen von Roger II. Sie waren wahre Sizilianer und zeigten den sarazenischen Gelehrten immer Respekt und Höflichkeit.
family_letter_desc_509=Jenes Jahr war mein glorreichstes Jahr. König Roger bat mich, ein Buch für ihn zusammenzustellen, das alle uns bekannten Länder und Territorien kartierte. Wir nannten es "Tabula Rogeriana".
family_letter_desc_510=Roger II. wurde in der Kathedrale von Cefalù beigesetzt, einer Kirche, die östlich-römische, muslimische und normannische Stile vereinte. Sein Porträt, in byzantinisch-kaiserlicher und arabischer Kleidung, stand würdevoll in der Kirche und ähnelte einem "getauften Sultan."

family_letter_desc_601=Ich muss zugeben, dass ich von dem Moment an, als ich diesen jungen Mann zum ersten Mal sah, tief beeindruckt war. Er verkörpert das Wesen sowohl der Hohenstaufer als auch der Hauteville-Familie. Er glänzte im Reiten, der Falknerei und im Schach. Er sprach fließend fünf Sprachen, und seine Lektüre übertraf die vieler Gelehrter.
family_letter_desc_602=Friedrich ist wie ein loderndes Feuer in der Nacht, das die Aufmerksamkeit aller auf sich zieht. Nach dem Treffen mit ihm widmete Hermann, der Großmeister der Deutschritter, den Rest seines Lebens ihm.
family_letter_desc_603=Konstanzes Tod brach Friedrich das Herz. Sie war die Prinzessin, die ihm immer geholfen hatte, die Macht zu ergreifen. Obwohl Friedrich viele Geliebte hatte, beschwerte sich Konstanze nie.
family_letter_desc_604=Unsere Reise war von Zweifeln der Christen begleitet. Es sind 130 Jahre seit dem Ersten Kreuzzug vergangen, doch ohne Blutvergießen oder Kampf gewannen wir die Heilige Stadt zurück. Als ich Friedrich und Al-Kamil sah, wie sie in einem Zelt einen zehnjährigen Vertrag auf Arabisch unterzeichneten, und Friedrich die Heilige Stadt unter dem Jubel der Menschen aller Glaubensrichtungen betrat, zweifelte ich nicht mehr—Frieden ist wirklich Gottes Wille.
family_letter_desc_605=Friedrichs Neugier auf neue Technologien und Disziplinen ist unersättlich. Obwohl Sultan Al-Kamil von Ägypten keine Schätze oder Schönheiten schickte, schenkte er viele geniale Gegenstände, wie eine kunstvolle mechanische Uhr. Friedrich finanzierte auch den Mathematiker Fibonacci, dessen "Liber Abaci" und nachfolgende Werke ihm gewidmet waren.
family_letter_desc_606=Friedrich war unerschütterlich gerecht und ein entschiedener Verfechter der Rechtsstaatlichkeit. Selbst als sein ältester Sohn Heinrich rebellierte, zeigte Friedrich keine Gnade und sperrte ihn lebenslang ein. Er machte seine Korrespondenz mit dem Papst den europäischen Königshäusern öffentlich und bewahrte seine Integrität. Die Allegorie von "der Papst als Sonne und der Kaiser als Mond" begann unter den Königen zu bröckeln, die allmählich die Lehren Jesu Christi annahmen: "Gebt dem Kaiser, was des Kaisers ist, und Gott, was Gottes ist."
family_letter_desc_607=Am Tag, als Friedrich exkommuniziert wurde, erhielt er auch die Nachricht vom Tod Hermanns. Hermann, der Großmeister der Deutschritter, hatte Friedrich und Gott zwanzig Jahre lang treu gedient, bevor er verstarb.
family_letter_desc_608=Als Friedrich von seiner Exkommunikation erfuhr, war er wütend. Er rief: "Ich habe ihn einst respektiert, aber von nun an werde ich keine Gnade zeigen! Ich werde der Hammer sein!"
family_letter_desc_609="Eine fast obsessive Leidenschaft für die Rechtsstaatlichkeit, absolute Fairness im Handeln, eine unersättliche Suche nach Wissen, vielfältige Talente und angeborene Noblesse—wenn diese nicht mit dem Tod des Körpers verschwinden, dann wird Friedrich in unseren Herzen weiterleben." —Manfreds Hommage an seinen Vater.

battle_talk_3030401=Nutzt die Gunst der Stunde für einen schnellen Angriff auf Messina, der Sieg ist zum Greifen nah!
battle_talk_3030402=Der Angriff wurde abgewehrt, wir müssen uns zurückziehen und einen neuen Plan schmieden.
battle_talk_3030403=Was? Wo sind unsere Schiffe? Fortgetrieben vom Sturm?
battle_talk_3030404=Haltet unsere Stellung bis zur Ankunft weiterer Transportschiffe!
battle_talk_3030501=Wir haben Messina erobert und können jetzt ins Landesinnere von Sizilien marschieren.
battle_talk_3030502=Die Festung Enna ist gut verteidigt. Es könnte ein harter Kampf werden.
battle_talk_3030503=Die Kavallerie der Araber greift unsere Linien an. Normannische Ritter, auf in den Kampf!
battle_talk_3030801=Ibn al-Hawwas griff in schamloser Weise aus dem Hinterhalt an, wir müssen so schnell wie möglich nach Troina zurückkehren.
battle_talk_3030802=Schneller! Wir müssen diese Stadt einnehmen, ehe Roger Bosso zurückkommt!
battle_talk_3030803=Ihre Verstärkung kommt, bereitmachen zum Angriff!
battle_talk_3030901=Der Feind hat eine große Anzahl an Truppen, wir müssen das Gelände zu unseren Gunsten nutzen.
battle_talk_3030902=Wir haben genug Truppen, um in mehreren Wellen anzugreifen und die Normannen so zu vernichten!
battle_talk_3030903=Die Moral der Feinde scheint gebrochen. Es ist Zeit für einen Gegenangriff!
battle_talk_3030904=Haltet stand! Weicht keinen Schritt zurück!
battle_talk_3031001=Der letzte Angriff auf Palermo ist gescheitert, doch dieses Mal wird es uns gelingen.
battle_talk_3031002=Jetzt ist die Gelegenheit, sich an den Normannen zu rächen!
battle_talk_3031003=Feind gesichtet! Wurden unsere Pläne entdeckt?
battle_talk_3031004=Normannen! Wie haben sie von meinem Plan erfahren?
battle_talk_3031005=Sturmangriff! Gebt dem Feind keine Chance, eine Formation zu bilden!
battle_talk_3031101=Ihre Verstärkung wurde zurückgeschlagen.
battle_talk_3031102=Meine Flotte ist bereit, lasst uns diese Stadt einnehmen.
battle_talk_3031301=Es wird keine Verstärkung kommen. Ergebt euch, und ich werde für die Sicherheit eurer Familien garantieren.
battle_talk_3031302=Ich bin kein edler Mensch, aber meine Soldaten sind ausgezeichnete Krieger.
battle_talk_3031303=Verstehe. Ich werde wohl eine List benötigen.
battle_talk_3031304=Das ist eine Falle! Es ist aussichtslos!
battle_talk_3031401=Der Feind nutzt Malta als Basis für Angriffe gegen uns.
battle_talk_3031402=Wir müssen diese Insel einnehmen, um zukünftige Probleme zu vermeiden.
battle_talk_3040301=Der Sturm hat unsere Flotte zerstört. Wir wissen nicht, wo wir uns jetzt befinden, aber wir müssen einen nahegelegenen Landeplatz finden.
battle_talk_3040302=Wir müssen die Flotte neu gruppieren und unsere Truppen schützen, während sie sich nach Sizilien zurückziehen.
battle_talk_3040303=Der junge Roger erlitt bei seiner ersten Machtdemonstration einen schmerzhaften Rückschlag, was seinem Ruf erheblich schadete.
battle_talk_3040401=Die flachen Strände von Valletta sind zum Landen geeignet, aber stark verteidigt. Wir sollten direkt aus Nordwesten landen.
battle_talk_3040402=Oder wir könnten einen Umweg machen und von Süden her landen, um die komplexen Berge zu durchqueren und direkt die Burg Malta einzunehmen.
battle_talk_3040403=Die Burg Malta ist gefallen. Der Feind könnte jeden Moment hinter uns auftauchen. Was sollen wir tun?
battle_talk_3040501=Die lokalen Fürsten haben gemischte, meist negative Einstellungen zu unserem Kampf um Apulien.
battle_talk_3040502=Daher habe ich Geschenke vorbereitet, um ihre Gunst zu gewinnen. Wir können aber nur mit einem von ihnen ein Bündnis schließen können, was zu unterschiedlichen Ergebnissen führen wird.
battle_talk_3040801=Wir sind besiegt worden. Errichtet eine Verteidigungslinie in Salerno. Unsere Stoßtruppen können die Brücken über den Fluss Sarno zerstören, um die feindlichen Kräfte aus dem Norden zu blockieren.
battle_talk_3040802=Die Garnison in Lanciano kann die Hauptlast des Angriffs tragen, und die Hauptstreitkräfte kommen derzeit aus Bari, um eine Gegenoffensive zu starten und die Rebellen zu eliminieren.
battle_talk_3040901=Ganz Norditalien hat Lothar die Treue geschworen. Beamte des Heiligen Römischen Reiches sind auf dem Weg, um die Städte zu übernehmen. Wir können einen Präventivschlag durchführen und diese Städte erobern.
battle_talk_3040902=Wir können der kaiserlichen Armee nicht direkt gegenübertreten, stattdessen können wir einfach die Städte plündern, um Vorräte zu erhalten und unsere Verteidigung zu stärken. Es ist am besten, keine Städte anzugreifen, die bereits übernommen wurden.
battle_talk_3040903=Der Rebellenführer verhandelt gerade mit Lothar. Wir sollten währenddessen schnell die Rebellenkräfte zerstören, um Lothar davon abzuhalten, ihnen bei einem sofortigen Angriff zu helfen.
battle_talk_3041001=Feinde kommen aus allen Richtungen. Eskortiert den Versorgungskonvoi zur Verteidigungslinie und verzögert Lothars Hauptstreitmacht so lange wie möglich. Haltet zumindest Salerno.
battle_talk_3041002=Ich werde persönlich nach Nordafrika gehen, um muslimische Truppen für einen Gegenangriff.
battle_talk_3041101=Wir ergeben uns.
battle_talk_3041102=Angriff, beseitigt diese Rebellen!
battle_talk_3041103=Du hast keine Chance, Kind.
battle_talk_3041104=Nein, Roger, mein ältester Sohn!
battle_talk_3041201=Können wir uns jetzt hinsetzen und reden, Eure Heiligkeit?
battle_talk_3041202=Ich erkenne dich als den alleinigen Herrscher von Süditalien an, jetzt bitte erlaube mir zurückzugehen.
battle_talk_3050401=Der römische Kaiser? Das ist nur eine Almosen vom alten Mann in Rom, und jetzt will er es einem jungen Gör geben? Er verdient es nicht!
battle_talk_3050402=Bewacht alle Bergpässe und zeigt dem alten Mann, dass er sich schwer geirrt hat.
battle_talk_3050403=Wir müssen einen versteckten Pfad durch die Alpen finden und wir dürfen nicht von Otto entdeckt werden.
battle_talk_3050601=Erard, du verräterischer Überläufer, besiegter Narr! Mit der Hilfe des Königs von Frankreich und der Fürsten, werde ich dir heute den Kopf abschlagen!
battle_talk_3050602=Genug! Du denkst, du kannst mich nur mit einer zahlenmäßigen Überlegenheit besiegen?
battle_talk_3050603=Haltet die Linie! Gebt den Rebellen keine Chance auf Verstärkungen!
battle_talk_3051001=Der Papst ist auf meiner Seite, Gott ist auf meiner Seite! Und er? Ein von der Kirche verbannter Mann, der sich selbst Kaiser nennt—lächerlich!
battle_talk_3051002=Erobert Gottes Lehen zurück! Stürmt das Versteck der Ketzer! Bringt Gerechtigkeit im Namen des Herrn!
battle_talk_3051003=Unsere Heimat wird überfallen, und der Eindringling ist der Papst selbst, der uns in fremde Länder geschickt hat, um gegen die Sarazenen zu kämpfen. Wie lächerlich!
battle_talk_3051004=Während Rom sich auf eine Feier der „Versöhnung“ vorbereitet, lässt der Konflikt zwischen dem Papst und Friedrich vorübergehend nach, und Friedrich wird wieder als Kaiser eingesetzt.
battle_talk_3051201=Wir Lombarden haben uns noch nie vor einem römischen Kaiser gefürchtet! Ob Friedrich Barbarossa oder dieser blondhaarige Friedrich, die Lombardei wird sich niemals unterwerfen!
battle_talk_3051202=Großmeister Hermann, manchmal frage ich mich, ob diese Lombarden wirklich einen unabhängigen Geist haben oder ob sie nur hirnlose Profiteure sind.
battle_talk_3051203=Die Lombarden haben uns immer wieder provoziert. Zeigt kein Erbarmen mit unseren Schwertern! Stürmt ihre Verteidigung und nehmt Vicenza ein!
battle_talk_3051301=Ich werde nicht zulassen, dass diese Ratten weiterhin mein Land stehlen! Verbreitet die Nachricht, wir werden uns für den Winter nach Cremona zurückziehen. Lockt sie in unseren Hinterhalt!
battle_talk_3051302=Es scheint, dass sie auch nicht bereit sind, sich in den kalten italienischen Sümpfen mit uns zu messen. Lass uns zu unserem Winterlager zurückkehren.
battle_talk_3051303=Oh nein! Wir sind in eine Falle getappt.
battle_talk_3051401=Keine Verbündeten, keine Verstärkungen! Wir müssen uns selbst retten! Erhebt eure Heugabeln und schützt unsere Kinder!
battle_talk_3051402=Wenn wir diesen Ort nicht innerhalb von zwei Monaten einnehmen, wird der Winter hereinbrechen, und wir werden im Nachteil sein. Aber die gegenseitige Unterstützung der Städte lässt uns scheinbar ohne Lösung zurück.
battle_talk_3051403=Rückzug, aber wir werden zurückkommen!
battle_talk_3051404=Die standhafte Entschlossenheit und die unerwarteten Taktiken der Verteidiger verhinderten letztendlich, dass Friedrich II. auch nur den geringsten militärischen Erfolg erzielte.
battle_talk_3051501=Friedrich hat die Stadt Faenza wieder eingenommen! Das raubt mir den Schlaf und den Appetit. Lassen Sie die Genuesen einen Angriff zur See starten! Direkt auf Sizilien.
battle_talk_3051502=Setzt die Segel! Verstärkt sofort Sizilien!
battle_talk_3051503=Nach dem Sieg rückten die Truppen des Kaisers Richtung Rom vor. Doch nur 13 Kilometer vor Rom, am 22. August, verkündete der Vatikan die Nachricht vom Tod von Papst Gregor. Daraufhin befahl Friedrich den Rückzug.
battle_talk_3051701=Die Festungen von Friedrich mehren sich um uns herum. Wir müssen sofort durchbrechen, sonst sind wir verloren!
battle_talk_3051702=Lasst Victoria ihr Gefängnis sein. Ich möchte sehen, wie der Papst reagieren wird.
battle_talk_3051703=Selbst die Festung Victoria kann dieses Gesindel nicht festhalten. Ich habe sie wirklich unterschätzt.
battle_talk_3051704=Friedrich, der mächtige Kaiser, wurde schließlich von einem kleinen norditalienischen Stadtstaat besiegt, und so gründlich besiegt, dass es keine Vergeltung gab. Die Victoria-Basis von Parma wurde nach der Eroberung durch den Feind in Asche gelegt.
battle_talk_3051801=Der gierige Papst greift weiter an und bringt den Menschen nur Blut und Leid. Sind diese Menschen nicht seine Untertanen?
battle_talk_3051802=Vielleicht fällt es mir morgen schwer, wieder auf mein Pferd zu steigen. Ich weiß nicht, wie lange dieser Kampf noch weitergehen wird, aber heute, vertreibt den Feind!
battle_talk_3051803=Sie haben unser Lager im Rücken angegriffen! Rückzug! Enzo, befehle den Truppen, sich langsam zurückzuziehen! Wir dürfen keine Panik zulassen!


