battle_talk_2301=Wo bin ich? Ich bin eindeutig in Honnō-ji umgekommen. Wie... wie kann ich in diesem fremden Land sein? Ich verstehe die Sprache nicht, und die Kleidung ist völlig anders. Ist dies... eine andere Welt?
battle_talk_2302=Unmöglich. Mein Bushido und mein Schicksal können nicht so leicht zunichte gemacht werden. Egal wo ich bin, da ich hier bin, ist es mein Schicksal zu erobern. 
battle_talk_2303=Soldaten! Selbst in einem fremden Land ist das Schlachtfeld der Ort, an dem wir unsere Stärke beweisen. Betretet diese Stadt, brecht ihre Verteidigung! Wir werden dieses Land vor dem Namen 'Oda' erzittern lassen!

