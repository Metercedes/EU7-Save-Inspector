stage_intro_4821=Im Jahre 1249 startete König Ludwig IX von Frankreich einen Kreuzzug und marschierte in Ägypten ein. Sultan Salih der Ayyubid Dynastie führte seine Truppen nach Mansura um sich den Kreuzzüglern entgegenzustellen, doch er starb an einer akuten Krankheit. Folglich wurde Baybars I damit beauftragt die Kreuzzügler aufzuhalten, woraufhin er in Mansura einen vollständigen Sieg erreichte.
stage_intro_4823=Die Kreuzzügler wurden bei Mansura geschlagen und bald würden ihnen die Vorräte ausgehen. Baybars I nutzte diese Situation aus, verfolgte die fliehenden Kreuzzügler bei Fariskut und nahm sogar Ludwig IX gefangen.
stage_intro_4825=1260 übernahm General Kitbuqa das Kommando über die mongolische Armee. Daraufhim nahm er Syrien ein und marschierte weiter in Richtung Westen. Baybars I befehligte die ägyptische Armee, sich den Mongolen bei Ain Dschalut zu einer Schlacht zu stellen.
stage_intro_4827=1266 besiegte Baybars I das Königreich Kleinarmenien, was die Macht der Mongolen im Mittleren Osten stark schwächte.
stage_intro_4829=1268 zerschlug Baybars I das Fürstentum Antiochia, den stärksten Kreuzzüglerstaat im Mittleren Osten. Seitdem wurde das Ende der Macht der Kreuzzügler im Mittleren Osten besiegelt.
stage_intro_4831=Edward Longshanks (später Edward I), Prinz von England, organisierte 1271 den neunten Kreuzzug, welchen Baybars I ebenfalls erfolgteich zurückschlug.

