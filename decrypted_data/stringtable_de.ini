stage_intro_4761=Im Jahr 985 versuchten zwei anatolische Generäle, den frisch gekrönten Basileios II. zu überwältigen, der sie besiegen musste, um die tatsächliche Kontrolle über das Land zu erlangen.
stage_intro_4765=Anhaltende Bürgerkriege in Byzanz schwächten den Einfluss des Reiches in seinem östlichen Teil. Als Reaktion auf die ständigen Überfälle der Fatimiden-Dynastie führte Basil II. persönlich eine Armee nach Syrien.
stage_intro_4767=Als das Byzantinische Reich 998 einen Grenzkrieg mit der Fatimiden-Dynastie verlor, führte Basil II. erneut seine eigenen Truppen an die Grenze, eroberte eine Reihe feindlicher Festungen und verteidigte das Territorium des Reiches.
stage_intro_4763=Im Jahr 986 n. Chr. führte Kaiser Basil II. persönlich eine Armee zum Angriff auf Bulgarien und geriet auf seinem Rückzug in einen Hinterhalt der bulgarischen Armee.
stage_intro_4769=Im Jahr 1014 gelang es Basileios II. nach einem langen Feldzug, die Hauptarmee der Bulgaren an die Nordküste der Ägäis zurückzudrängen und der jahrelange Konflikt zwischen den beiden Seiten sollte erneut ein Ende finden.
stage_intro_4771=Während Basil II. einen Feldzug auf der italenischen Halbinsel führte, verbündete sich der armenische König im Jahr 1020 mit der Fatimiden-Dynastie bei einem Angriff auf die byzantinische Grenze. Der wütende Basilius kehrte sofort mit seinen Truppen zurück und eroberte in einem anschließenden Feldzug die armenische Region.

