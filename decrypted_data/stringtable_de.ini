stage_intro_1501=Ugljesa erhielt die Nachricht, dass der Großteil der osmanischen Armee Europa verließ und nach Anatolien marschierte. Es war der perfekte Zeitpunkt, um die osmanische Macht auf dem Balkan zu beseitigen, und so starteten sie einen plötzlichen Überfall.
stage_intro_1502=Unzufrieden mit der Ausweitung des Territoriums von Balsa II. durch Heirat, lud Carlotopia aus dem Hause Thopia das Osmanische Reich zu einem Angriff auf das Fürstentum Zeta ein, dem Murad I. bereitwillig zustimmte.
stage_intro_1503=Murad I. verließ 1387 den Balkan, um sich um die Angelegenheiten Anatoliens zu kümmern, während die Vasallen des Balkans versuchten, sich von der osmanischen Vorherrschaft zu lösen und Bündnisse zu schließen, um deren Autorität herauszufordern.
stage_intro_1504=Murad I. kehrte 1388 aus Anatolien zurück und begann sofort einen Blitzkrieg gegen Bulgarien. Der bosnische Herrscher leistete Bulgarien auch sofort Hilfe.
stage_intro_1505=Das Kosovo verband zwei Regionen, Mazedonien und Serbien. Wenn die Osmanen es erobern würden, würden sie weiter in das große Gebiet Serbiens eindringen. Die von Fürst Lazar organisierten verbündeten Einheiten lieferten den Osmanen in der Kosovo-Region einen erbitterten Kampf.
stage_intro_1506=Nachdem Murad I. versehentlich ermordet worden war, folgte sein Sohn Bayezid I. auf den Thron. Gleichzeitig trat der Hundertjährige Krieg zwischen England und Frankreich in eine Phase des Waffenstillstands ein. Um das im Sterben liegende östliche Rom zu retten, schlossen sich die Ritter des Westens zusammen und begannen die Kreuzzüge.
stage_intro_1507=Als Bayezid I. bereit war, Byzanz den finalen Schlag zu versetzen, führte Timur aus dem Osten 150.000 Einheiten in die Stadt. Das Überleben des Osmanischen Reiches war nur noch eine Frage von Sekunden, die Byzanz Luft zum Atmen ließen.
stage_intro_1508=Auf die Schlacht von Ankara, in der Bayezid I. gefangen genommen wurde und an Depressionen starb, folgte ein Kampf innerhalb des Osmanischen Reiches, der schließlich einen neuen Sultan, Murad II, hervorbrachte. Die vorübergehende Schwäche des Reiches führte jedoch zu Aufständen in den untergeordneten Staaten!
stage_intro_1509=Die Venezianer gingen über eine Kriegserklärung an das Osmanische Reich hinaus, um die volle Autonomie über die Region Thessaloniki zu erlangen, was der Sultan nicht dulden konnte, und schickten daher ein großes Heer zur Belagerung!
stage_intro_1510=Papst Eugen IV. rief die Armeen mehrerer Länder, darunter Polen und Ungarn, zu einem neuen Kreuzzug auf. Murad II., der zu diesem Zeitpunkt bereits abgedankt hatte, musste sein Heer neu aufstellen, um den Ansturm der Kreuzfahrer abzuwehren.
stage_intro_1511=Der Regent Johannes Hunyadi hatte sich vier Jahre lang darauf vorbereitet, den im Kampf gefallenen König zu rächen. Er führte 1448 die verbündeten ungarischen und walachischen Armeen an und startete einen Angriff auf das Osmanische Reich.
stage_intro_1512=Als Mehmed II. 1451 den Thron bestieg, verbrachte er zwei Jahre mit den Vorbereitungen: Er ließ riesige Kanonen und Musketen anfertigen, baute Festungen an der Küste und sperrte die Meerengen. Konstantinopel, eine Stadt, die seit tausend Jahren Bestand hatte, empfing ihren mächtigsten Feind.

