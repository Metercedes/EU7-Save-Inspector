stage_intro_1701=Im Jahr 1469 rebellierte ein Mann namens „Robin von Redesdale“ mehrmals im Norden Englands und Warwick, der Königsmacher, der seit langem einen Groll gegen Edward IV. hegte, nutzte die Rebellion aus. Er griff die königliche Armee an, die die Rebellion unterdrüvken sollte.
stage_intro_1702=Im Jahr 1470 versuchte Warwick, einen weiteren Aufstand auszulösen. Edward IV. kam ihm jedoch zuvor, indem er die Rebellen bei Hornfield in die Flucht schlug, was auch als Schlacht von Losecote Field bekannt ist, weil viele der Rebellen auf ihrer Flucht ihre markierten Kleider auszogen.
stage_intro_1703=Nach der Schlacht am Losecote floh Warwick der Königsmacher nach Übersee und verbündete sich mit Margarete von Anjou im Austausch für die Unterstützung des Hauses Lancaster. Im April 1471, an einem nebligen Morgen, trafen Edward IV. und Warwick, ehemalige Schlachtgefährten, in ihrem letzten Kampf aufeinader.
stage_intro_1704=Zur gleichen Zeit wie die Schlacht von Barnet landete Margarete von Anjou an der Spitze der Überseestreitkräfte des Hauses Lancaster auf der Insel England und begann, nach London zu marschieren. Eduard IV. erfuhr davon am Ende der Schlacht von Barnet und führte sie trotz der Tatsache, dass seine Armee sehr müde war, in ein Duell mit Margaret.
stage_intro_1705=Als Eduard IV. im April 1483 starb, wurde sein Bruder Richard zum Lordprotektor ernannt und im Juni, als Eduard V. verschwand, wurde Richard zum König gekrönt, bekannt als Richard III. Die alten Verbündeten Eduards IV. betrachteten dies als Machtübernahme und unterstützten Henry Tudor. Bald darauf brach in England erneut ein Aufstand aus.
stage_intro_1706=Am Weihnachtstag 1483 heiratete Henry Tudor aus dem Hause Lancaster die Tochter von Elizabeth Woodville aus dem Hause York, und die beiden Familien schlossen sich zum Haus Tudor zusammen, nur um gegen einen gemeinsamen Feind, Richard III., zu kämpfen. Am 22. August 1485 kämpften Henry Tudor und Richard III. in der Bosworth-Ebene in einem Duell.

