stage_intro_4721=Als Reaktion auf die wiederholte Verletzung der Grenzen des Reiches durch die Türken beschloss Manuel I. im Jahr 1146, seine Truppen zu sammeln und eine Expedition gegen das Sultanat Rum zu starten.
stage_intro_4723=Im Jahr 1147, als der Zweite Kreuzzug das Gebiet des Byzantinischen Reiches durchquerte, befürchtete Manuel I. einen Zusammenstoß zwischen byzantinischen Truppen und den Kreuzfahrern, und seine Befürchtungen wurden bald außerhalb von Konstantinopel Wirklichkeit.
stage_intro_4725=Um das Territorium des alten Imperiums zurückzugewinnen, schickte Manuel I. 1155 zwei Generäle mit einer Armee und einer großen Menge Goldmünzen nach Italien, um eine Expedition gegen die Normannen zu starten.
stage_intro_4727=Im Jahr 1159, als Renard von Châtillon, Fürst von Antiochia, die Insel Zypern des Byzantinischen Reiches plünderte, leitete ein wütender Manuel I. eine Expedition, um das Fürstentum Antiochia in einen vollständigen Vasallenstaat von Byzanz zu verwandeln.
stage_intro_4729=Im Jahr 1167 besiegte Manuel I. die Ungarn in der Schlacht von Sirmium und brachte einen großen Teil der östlichen Adriaküste unter das Byzantinische Reich.
stage_intro_4731=Im Jahr 1171 brach Manuel I. die diplomatischen Beziehungen zu Venedig ab und beschlagnahmte die Schiffe und Waren venezianischer Kaufleute im Reich, was zu Vergeltungsplünderungen der Venediger führte.

