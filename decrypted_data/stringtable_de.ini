stage_intro_4601=Yelü Dashi wurde 1087 in Shangjing, Liao, geboren und wurde "Dashi Linya" genannt, weil er ein erfolgreicher Kandidat war und in jungen Jahren in die Hanlin-Akademie eintrat.
stage_intro_4603=Um die Stärke von West-Liao zu stärken, beschloss Yelu Dashi, nach Westen zu expandieren. Im Jahr 1131 startete Yelu Dashi einen Angriff auf das östliche Khara Khanate über Gaochang Hui-Falken.
stage_intro_4605=Nach dem Tod von Ahmad Khan aus dem östlichen Karachanat folgte sein Sohn Ibrahim auf den Thron, während die andere unter ihm, wie Georgi, ebenfalls die Gelegenheit nutzten, um eine Rebellion zu starten. Ibrahim musste eine Bitte um Hilfe an Yelu Dashi senden, nachdem er die Rebellion nicht unterdrücken konnte.
stage_intro_4607=1137 expandierte Xiliao erneut nach Westen, diesmal war ihr Ziel das westliche Khara Khanate, das sich bereits dem Seldschukenreich unterworfen hatte. Die Xiliao-Armee hatte eine Begegnung mit dem Feind im Fergana-Tal.
stage_intro_4609=1141 bat Mahmud Khan den seldschukischen Sultan Sanjar um Hilfe und Sanjar führte eine Armee von 100.000 Mann nach Osten, um Yelu Dashis Armee in der Katwan-Steppe zu treffen.
stage_intro_4611=Nach der Eroberung des West-Khara-Khanats sandte Yelu Dashi seinen General Eirbusi, um Khwarezmia zu erobern, und von da an begann West-Liao in seine Blütezeit einzutreten.

