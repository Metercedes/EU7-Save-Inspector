stage_group_desc_20007=Um die Expansion von König Philipp II. von Frankreich einzudämmen, bildete Kaiser Otto IV. des Heiligen Römischen Reiches im Jahr 1214 eine vereinte Armee mit König Johann von England und anderen Gegnern Philipps II. und startete einen Angriff auf Frankreich. Als Philipp II. davon erfuhr, stellte er schnell eine Armee auf, um Otto IV. abzufangen.

general_skin_20442=Kriegsengel Jeanne d'Arc
Joan of Arc2=Kriegsengel Jeanne d'Arc
general_desc_Joan of Arc2=Trotz ihrer bäuerlichen Herkunft war Jeanne d'Arc eine begabte Feldherrin auf dem Schlachtfeld. Sie war besonders gut darin, die Moral im Kampf zu steigern, indem sie die Führung übernahm und die Soldaten mit ihrem heroischen Kampfstil beeindruckte.
general_skin_20172=Herrscher der Meere
Genghis Khan2=Herrscher der Meere
general_desc_Genghis Khan2=Dschingis Khan wurde vor seinem Aufstieg an die Macht viele Male an den Rand des Todes gedrängt, doch seine Widerstandskraft half ihm, ein Hindernis nach dem anderen zu überwinden. Nachdem er nun die mongolischen Königreiche vereint hatte, stand ganz Eurasien kurz davor, von diesem aufstrebenden Hegemon herausgefordert zu werden.
general_skin_20175=Jungfrau Matilda
Empress Matilda2=Jungfrau Matilda
general_desc_Empress Matilda2=Matilda war die Tochter von König Heinrich I. von England und wurde aufgrund des frühen Todes ihres älteren Bruders die einzige legitime Thronfolgerin. Die junge Matilda hatte den blutigen Sturm, der ihr bevorstand, noch nicht erkannt.

battle_talk_700701=Es ist Zeit, der Gier Philipps II. ein Ende zu setzen.
battle_talk_700702=Das Oriflamme-Banner wird uns führen!
battle_talk_700703=Der König ist vom Pferd gefallen! Beschütze den König!
battle_talk_700704=Rücksichtsloser Otto IV! Das ist die perfekte Gelegenheit für unseren Überfall!
battle_talk_700705=Das Schlachtfeld ist zu gefährlich. Ich muss mich für eine Weile von der Kontaktlinie zurückziehen.
battle_talk_700706=Philipp II. wird für seine Gier büßen.
battle_talk_700707=Das Oriflamme-Banner wird uns beschützen!
battle_talk_700708=Philipp II. ist vom Pferd gefallen! Lass ihn nicht entkommen!
battle_talk_700709=Eure Majestät, wagen Sie sich nicht zu weit. Hütet euch vor feindlichen Hinterhalten.
battle_talk_700710=Die versuchten Hinterhälte des Feindes wurden niedergeschlagen. Setze die Verfolgung fort und vernichte alle Feinde!

