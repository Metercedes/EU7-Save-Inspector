battle_talk_160101=Wie kann ein Mann wie der Herzog von Somerset, ein Deserteur vom Schlachtfeld, es wagen, militärische und politische Macht zu übernehmen? Ich muss ihn zum Wohle des Landes vernichten!
battle_talk_160102=Kämpft für den König!
battle_talk_160103=Vorwärts! Schlagt diesen Verräter!
battle_talk_160104=Die Frontverteidigung des Feindes ist gewaltig aber wir können versuchen, die Flanken zu umgehen!
battle_talk_160201=Die Strömung ist so stark, dass eine erzwungene Überquerung des Flusses zu schweren Verlusten für die Truppen führen würde. Es müssen Wege gefunden werden, den Feind in die Verfolgung zu locken.
battle_talk_160202=Die Königin hat mir befohlen, Baron Audleys Position zu verstärken, aber ich werde auf nichts machen, worüber ich mir nicht sicher bin.
battle_talk_160203=Ihnen hinterher! Lasst sie nicht entkommen!
battle_talk_160204=Sie haben sich täuschen lassen! Bogenschützen, schießt eure Pfeile, um den Feind im Fluss zu begrüßen!
battle_talk_160205=Der Ausgang der Schlacht ist klar, tut es!
battle_talk_160301=Soldaten von York, legt eure Waffen nieder und der König wird euch begnadigen!
battle_talk_160302=Lass dich nicht von ihm täuschen, unser König ist tot!
battle_talk_160303=Ich bin bereit, dem König zu dienen, und ich habe Informationen über Yorks Armee!
battle_talk_160304=Die Moral der Armee war zusammengebrochen und es kam so weit, dass wir uns aufteilen und ausbrechen mussten.
battle_talk_160401=Der starke Regen hat unsere Artillerie unbrauchbar gemacht. Die Situation ist damit nicht zu unseren Gunsten!
battle_talk_160402=Der Feind weigert sich, mit uns zu verhandeln. Entscheiden wir also den Gewinner auf dem Schlachtfeld.
battle_talk_160403=Das Haus York versprach mir ausreichende Leistungen, damit ich ihnen helfen würde.
battle_talk_160404=Der Feind ist auf der Flucht! Es ist eine großartige Gelegenheit, sie zu verfolgen!
battle_talk_160405=Niemand darf dem König oder de Bürgern Schaden zufügen. Unser Ziel sind die Adligen, die Ritter und ihre Gefolgsleute!
battle_talk_160501=Obwohl wir jetzt vom Feind belagert werden, wird alles gut, sobald Verstärkung eintrifft.
battle_talk_160502=Ich werde dafür sorgen, dass der Herzog von York sich mit Blut bezahlt!
battle_talk_160503=Wie können sie es wagen, meinen Getreidekonvoi anzugreifen! Komm mit mir! Zerstört sie!
battle_talk_160504=Angriff! Treibt den Herzog von York in die Enge!
battle_talk_160505=Hängt den Kopf des Herzogs von York mit einer Papierkrone in der Öffentlichkeit auf! Lasst diejenigen, die den Thron begehren, wissen, was mit ihnen geschehen wird!
battle_talk_160601=Beschleunigt den Marsch! Wir müssen die lancasterianische Armee abfangen!
battle_talk_160602=Die Armee ist von der langen Reise sehr müde und wir müssen ihre Moral heben!
battle_talk_160603=Ach du lieber Gott! Was ist das? Warum gibt es drei Sonnen am Himmel?
battle_talk_160604=Krieger! Fürchte dich nicht! Das bedeutet, dass Gott mit uns ist! Wir werden mit Sicherheit den Sieg erringen!
battle_talk_160701=Umzingelt die Stadt! Tötet ihre Bogenschützen!
battle_talk_160702=Marschiert nach Nordwesten! Flankiert sie!
battle_talk_160703=Verdammt! Das Scharzpulver ist nass! Wir brauchen Unterstützung!
battle_talk_160704=Der Feind wird immer zahlreicher und wir müssen eine Möglichkeit finden, uns vom Schlachtfeld zurückzuziehen!
battle_talk_160801=Der Schneesturm machte es den Bogenschützen unmöglich, die Augen zu öffnen, das Wetter ist für uns ungünstig!
battle_talk_160802=Wir gewinnen die Oberhand und die Bogenschützen machen weiter Druck!
battle_talk_160803=Wir können nicht weiter so von einem Pfeilhagel unterdrückt werden. Kavallerie, zum Angriff!
battle_talk_160804=Es ist Lancasters Hinterhalt! Wir müssen unsere Formation verstärken, um die Verluste zu reduzieren!
battle_talk_160805=Gott sei Dank! Ich bin noch nicht zu spät!
battle_talk_160901=Die Berge in der Nähe von Newcastle eignen sich gut für Soldaten, da sie sich dort gut verstecken können. Beste Voraussetzungen für einen Überfall auf den Feind.
battle_talk_160902=Unsere Verbündeten warten auf uns und ich denke, wir sollten von Norden aus marschieren.
battle_talk_160903=Die linke Flanke hatte schwere Verluste erlitten und ich musste meine Truppen neu gruppieren.
battle_talk_161001=Konsolidieren Sie Ihre Stellungen und bauen Sie Befestigungen, um den Feind in Schach zu halten.
battle_talk_161002=Startet den Überfall! Gebt ihnen keine Zeit, sich vorzubereiten!
battle_talk_161003=Vorwärts! Fallen Sie nicht zurück!
battle_talk_161004=Der Herzog von Somerset ist bereits tot! Ihr sollt keinen sinnlosen Widerstand mehr leisten!

