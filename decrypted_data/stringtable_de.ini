link_email_text=Um unseren Spielern ein besseres Spielerlebnis zu bieten und Ihre Kontosicherheit zu schützen, laden wir Sie ein, Ihr Konto mit ihrer E-Mail zu verbinden, damit wir Ihnen bei Problemen mit Ihrem Konto rechtzeitig helfen können.[br] Klicken Sie auf die Schaltfläche "E-Mail verbinden" unten und geben Sie die korrekte E-Mail-Adresse ein, die Sie für die Verbindung benötigen. Sie erhalten dann eine Bestätigungs-E-Mail. Bitte folgen Sie den Anweisungen in der E-Mail und schließen Sie die Verifizierung ab. Sollten Sie bei der Verbindung Ihrer Email auf Probleme stoßen, können Sie uns über den Abschnitt "Kontakt" auf der linken Seite kontaktieren.
