;__font_type[font_text_]
campaign_desc_1=Die Invasion zahlreicher Feinde verschlimmerte die Lage des ohnehin schon schwachen Römischen Reiches. Die ständigen Thronwechsel in den letzten zwanzig Jahren trugen zu den Wirren des Reiches bei, das unweigerlich seinem Ende entgegenzugehen scheint.
campaign_desc_2=Während der Untergang des Weströmischen Reiches von vornherein feststand, begrüßte Konstantinopel im Osten zwei Persönlichkeiten, die das Byzantinische Reich zu neuem Ruhm führen sollten: Justinian I. und Belisarius.
campaign_desc_3=Als die kaiserliche Macht des Römischen Reiches immer schwächer wurde, begann seine Kontrolle über die britische Insel zu schwinden. Die Angelsachsen aus dem germanischen Raum nutzten diese Gelegenheit und begannen in großer Zahl nach Britannien einzuwandern. Nun, ohne dem Schutz des untergehenden Reiches, müssen sich die Inselbewohner diesen Eindringlingen alleine stellen.
campaign_desc_4=Seit dem 7. Jahrhundert bedrohen die Araber die umliegenden Staaten. Einer ihrer mächtigsten Feinde ist das Byzantinische Reich.
campaign_desc_5=Seit dem 8. Jahrhundert floriert Großbritannien und hat Reichtum in Hülle und Fülle angehäuft. Man schrieb dem Meer zu, dass es England vor seinen Feinden schützte. Doch die Briten wogen sich in falscher Sicherheit.
campaign_desc_6=Die Thronbesteigung von Basil I. leitete die makedonische Dynastie ein, die als Blütezeit des byzantinischen Reiches gilt.
campaign_desc_7=Im Jahr 1066 empfahl Edward der Evangelist Harold vor seinem Tod als König. Zur gleichen Zeit glaubte auch der Herzog der Normandie, dass er das Recht auf den Thron habe. Als die Nachricht von der Thronbesteigung Harolds II. die Normandie erreichte, war William wütend und kündigte sofort an, Truppen nach England zu schicken.
campaign_desc_8=Nach dem Ende der makedonischen Dynastie im Jahr 1057 erlebte das Byzantinische Reich Jahrzehnte der Depression und des Niedergangs, bis Alexius I. im Jahr 1081 den Thron bestieg. Unter der Herrschaft der Familie Komnenos erholte sich das byzantinische Reich allmählich.
campaign_desc_9=Dem Ruf des Papstes folgend, führten westeuropäische Fürsten und Ritter ihre Truppen an die Ostküste des Mittelmeeres. Ihr Ziel war die Rückeroberung der vom Feind besetzten heiligen Stadt Jerusalem.
campaign_desc_10=Nach dem Bürgerkrieg von 1135 beanspruchte Königin Mathilde erfolgreich den englischen Thron für ihren Sohn Heinrich II. Im Jahr 1154 wurde Heinrich II. in der Westminster Abbey gekrönt, womit die Ära der Anjou-Dynastie begann.
campaign_desc_11=Nach dem Vierten Kreuzzug wurde Konstantinopel von den Kreuzfahrern besetzt und aus dem ehemaligen byzantinischen Reich wurde das Reich von Nizäa gegründet. Das Lateinische Reich wurde zu einem verweilenden Schatten in den Herzen aller Byzantiner.
campaign_desc_12=Das Osmanische Reich wurde Ende des 13. Jahrhunderts nach dem Untergang des Seldschukenreichs gegründet. Die Gründung des Osmanischen Reiches führte zur Vereinigung der zuvor verstreuten anatolischen Vasallenstaaten, die sich den Osmanen in ihrem Kampf gegen das Byzantinische Reich anschlossen.
campaign_desc_13=England und Frankreich hatten seit Wilhelms Eroberung Englands viele Konflikte und Uneinigkeiten und die Ungewissheit über die Erbschaftsfolge nach dem Tod von König Philipp von Frankreich führte zu einer großen Krise in ganz Frankreich. 1337 erklärte sich Edward III. offiziell zum König von Frankreich, während Philip VI. die Rückgewinnung aller Ländereien von Edward III. in Frankreich ankündigte, was zu einem umfassenden Krieg zwischen England und Frankreich führte.
campaign_desc_14=Mit der allmählichen Stabilisierung der politischen Lage in England, der Krönung Heinrichs V. in der Westminster Abbey im Jahr 1413 und dem neu entfachte Ehrgeiz, den europäischen Kontinent zu erobern, wollte Heinrich V. den unerfüllten Wunsch seiner Vorfahren erfüllen und das „Anglo -Französisches Reich" vollenden.
campaign_desc_15=Während der Expansion des Osmanischen Reiches verbrachten Generationen von Sultanen ihr Leben damit, gegen die gesamte westliche Welt zu kämpfen. Ihr nächstes Ziel war eine Stadt, die Konstantinopel hieß, die letzte Bastion der Christenheit in dieser Weltregion.
campaign_desc_16=Nach dem Sturz von Richard II. kämpften zwei von Edward III. abstammenden Familien um den englischen Thron. Die Familie Lancaster und die Familie York.
campaign_desc_51=Die Invasion zahlreicher Feinde verschlimmerte die Lage des ohnehin schon schwachen Römischen Reiches. Die ständigen Thronwechsel in den letzten zwanzig Jahren trugen zu den Wirren des Reiches bei, das unweigerlich seinem Ende entgegenzugehen scheint.
campaign_desc_52=Während der Untergang des Weströmischen Reiches von vornherein feststand, begrüßte Konstantinopel im Osten zwei Persönlichkeiten, die das Byzantinische Reich zu neuem Ruhm führen sollten: Justinian I. und Belisarius.
