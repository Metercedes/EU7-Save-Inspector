troop_desc_518=Byzantinische Grenadiere legten Krähenfuß und griechisches Feuer in Tonkanistern und warfen es auf den Feind. Wenn der Kanister zerbrochen war, konnte das griechische Feuer mit dem Krähenfuß und zerbrochenen Keramikstücken einer Gruppe von Feinden erheblichen Schaden zufügen.

