attr_desc_98601=Eigene sowie verbündete Sturmkavallerie-Einheiten im Umfeld erhalten eine {0}25%{1} Chance auf Ausweichen.
attr_desc_98701=Wenn sich im Umfeld befreundete Legionen befinden, erhöht sich der verursachte Schaden um {0}15%{1}.
attr_desc_98801=Wenn sich die Legion in einer Ebene befindet, erhöht sich der Sturmangriffs-Schaden um {0}30%{1}.
attr_desc_98901=Im Zustand Hohe Moral erhöht sich beim Angreifen der zugefügte Schaden um {0}20%{1}.
attr_desc_99001=Nach dem Angriff auf eine feindliche Legion mit Niedrige oder Zerschlagene Moral erhöht sich die eigene Mobilität um {0}+2{1} (1 Mal pro Runde möglich).
attr_desc_99101=Umliegende Kavallerie-Einheiten erleiden um {0}12%{1} reduzierten Schaden.
attr_desc_99201=Wenn die Legion stationiert ist oder in der aktuellen Runde keine Bewegung ausführte, erhöht sich der Schaden eigener Gegenangriffe um {0}25%{1}.
attr_desc_99301=Wenn die Legion stationiert ist oder in der aktuellen Runde keine Bewegung ausführte, erhält sie nach einem Angriff {0}+3{1} Mobilität (1 Mal pro Runde möglich).
attr_desc_99401=Der durch feindliche Zangenangriffe erlittene Schaden wird um {0}25%{1} reduziert.
attr_desc_99501=Umliegende Fernkampf-Einheiten erleiden um {0}15%{1} reduzierten Schaden.
attr_desc_99601=Jedem Gegner, der in einer Runde angegriffen wird, wird beim jeweils ersten Angriff um {0}20%{1} erhöhter Schaden zugefügt.
attr_desc_99701=Reduziert in einer Runde den erlittenen Schaden durch den jeweils ersten Angriff eines jeden Gegners um {0}25%{1}.
attr_desc_99801=Angriffe verringern die gegnerische Mobilität um {0}-2{1}.
attr_desc_99901=Reduziert beim Feind die Chance auf Zangenangriff um {0}20%{1} und die Chance auf Sturmangriff um {0}20%{1}.
attr_desc_60101=Der durch Infanterie-Einheiten erlittene Schaden wird um {0}20%{1} reduziert.
attr_desc_60201=Beim Angriff auf Einheiten ohne Schilde ist der zugefügte Schaden um {0}+30%{1} erhöht.
attr_desc_60301=Wenn sich im Umfeld befreundete Legionen befinden, verringert sich der erlittene Schaden um {0}15%{1}.
attr_desc_60401=Angriffe ignorieren {0}40{1} Verteidigungspunkte des Gegners, wobei sich der Effekt verdoppelt, wenn ein Zangenangriff ausgelöst wird.
attr_desc_60501=Ein Angriff auf einen Gegner, der sich auf dem Wasser befindet, senkt seine Moral um {0}-5{1}.
attr_desc_60601=Wenn sich die Legion auf dem Wasser befindet, stellt Angriff auf einen Gegner {0}3{1} Mobilität wieder her (1 Mal pro Runde möglich).
attr_desc_60701=Senkt die Moral des Gegners, wenn ein Gegenangriff ausgelöst wird.
attr_desc_60801=Erhöht den durch aktiven Angriffe verursachten Schaden von Verteidigungsinfanterie-Einheiten in der Legion um {0}30%{1}, wobei sich der Effekt im Zustand Hohe Moral verdoppelt.
attr_desc_60901=Bei einem Sturmangriff wird der Schaden, den Sturmkavallerie-Einheiten in der Legion erleiden, um {0}30%{1} reduziert.
attr_desc_61001=Sturmkavallerie-Einheiten in der Legion erhalten eine {0}25%{1} Chance auf Zangenangriff, wobei sich der Effekt im Zustand Hohe Moral verdoppelt.

