troop_name_416=Schwere Balkan-Kavallerie
troop_name_316=Schwere Sipahis-Kavallerie
troop_name_116=Byzantinische Hopliten
troop_name_516=Musketier der Sultansgarde
troop_name_517=Byzantinisches Feuergewehr

troop_desc_416=Die schwere Kavallerie des Balkans war eine gewaltige Streitmacht, die auf mächtigen Schlachtrössern ritt, schwere Rüstungen und Gewänder trug und auf dem Schlachtfeld unvergleichliche Stärke und Mut bewies.
troop_desc_316=Die schwere Kavallerie der Sipahi war eine Eliteeinheit von Soldaten mit unvergleichlicher Tapferkeit, die auf großen Schlachtrössern ritten, schwere Rüstungen trugen, Kriegshämmer mit sich führten und für ihre Schnelligkeit und Mobilität bekannt waren.
troop_desc_116=Die Byzantinische Hopliten war eine Einheit, die für ihre solide Ausrüstung und ihre zuverlässigen Kampffähigkeiten bekannt war. Die Soldaten trugen schwere Rüstungen und verfügten über mächtige Waffen, in der Regel Speere, Streitäxte und schwere Schwerter.
troop_desc_516=Die Musketiere der Sultansgarde waren eine Einheit, die mit Schusswaffen umgehen konnte und raffinierte Musketen benutzte, mit denen sie auf große Entfernung tödlichen Schaden anrichten konnten. Sie trugen prächtige Kostüme und Turbane, die ihren adligen Status und ihre Treue zu ihrem Glauben zum Ausdruck brachten.
troop_desc_517=Die byzantinische Feuerabat war eine Einheit mit geheimnisvollen Waffen, die Flammenwerfer einsetzten, die aus nächster Nähe feurige Flammen spucken konnten, die den Feind in die Flucht schlugen. Sie trugen Schutzanzüge und Masken, um sich vor den Flammen zu schützen.

