battle_talk_3000201=Angriff! Besetzt den Hafen!
battle_talk_3000202=Feindliche Verstärkung wurde auf dem Meer gesichtet. 
battle_talk_3000203=Die gegnerischen Truppen auf dem Meer wurden vernichtet.
battle_talk_3000204=Nun gut... lasst uns gemeinsam die Insel stürmen!
battle_talk_3000301=Angriff! Vernichtet jeglichen gegnerischen Widerstand!
battle_talk_3000302=Der Feind flieht!
battle_talk_3000303=Hinterher! Gebt ihnen keine Zeit zur Erholung.
battle_talk_3000304=Vor uns liegen noch weitere erbitterte Schlachten. Wir sollten vorbereitet sein.
battle_talk_3000401=Überfallt die Städte und Burgen! Wir müssen den Widerstandswillen des Feindes zerbrechen!
battle_talk_3000402=Kein Feind kann unsere Vormacht stoppen!
battle_talk_3000403=Greift weiter an! Sobald wir Syrakus haben ist Sizilien unser!
battle_talk_3000404=Georgios Maniakes ist mit unserer Soldzahlung im Rückstand. Wir müssen wohl eine Lösung bei unserem Feind finden.
battle_talk_3000501=Syrakus ist nun seit einiger Zeit ständigen Angriffen ausgesetzt und die Moral der Truppen ist auf einem neuen Tief.
battle_talk_3000502=Die Belagerung ist wieder einmal fehlgeschlagen. Es bleibt uns nichts anderes übrig, als zum Lager zurückzukehren und uns zu kurieren.
battle_talk_3000503=Der Feind ist desorganisiert. Blast das Horn zum Gegenangriff!
battle_talk_3000504=Wie kann der Feind so schnell zum Gegenangriff übergehen?! Rückzug! Sofort!
battle_talk_3000505=All die Vorbereitung in den letzten Tagen war für diesen Moment! Die goldene Ära des Haus von Hauteville wird heute beginnen!
battle_talk_3000506=Oh Gott! Dieser Normane hat doch tatsächlich seinen Feind in zwei Hälften geschnitten!
battle_talk_3000507=Wilhelm präsentierte dem Oströmischen Reich Syrakus. Dank seiner berüchtigten Angewohnheit gegnerische Generäle in zwei Hälften zu teilen, erhielt er den Spitznamen "Wilhelm Eisenarm".
battle_talk_3000801=Ihr seid in der Unterzahl. Entweder ihr verzieht euch, oder ihr werdet euer Ende finden.
battle_talk_3000802=Normannen geben niemals auf!
battle_talk_3000803=Euer letzter Tropfen Blut wird hier vergossen sein.
battle_talk_3000804=Unsere Armee ist geschlagen! Rückzug!
battle_talk_3000901=Unsere Armee besteht aus zehntausenden Kriegern. Wir haben den klaren Vorteil.
battle_talk_3000902=Mir geht es nicht gut. Dennoch werde ich ein wachsames Auge auf das Schlachtfeld werfen.
battle_talk_3000903=Die erste Verteidigungslinie des Feindes ist durchbrochen!
battle_talk_3000904=Wow, was für eine Schlacht. Meine Krankheit wird mich nicht daran hindern selbst auf dem Schlachtfeld zu erscheinen.
battle_talk_3000905=Wilhelms stärke ermöglichte es ihm, der de-facto Anführer der Normannen im Süden zu werden.
battle_talk_3001001=Umzingelt Melfi! Wir stürmen diese Stadt!
battle_talk_3001002=Wir können die Chance ergreifen, ihr Feldlager bei Monte Peloso anzugreifen.
battle_talk_3001003=Der Feind verschanzt sich im inneren der Festung. Ein rücksichtsloser Angriff wäre verhängnisvoll. 
battle_talk_3001004=Wer können versuchen ihre Nachschubwege abzuschneiden. Dadurch sind sie gezwungen die Stadt zu verlassen und sich im Kampf zu stellen.
battle_talk_3001201=Angriff! Calabria wird endlich Land der Normannen!
battle_talk_3001202=Flankiert und manövriert den Feind aus.
battle_talk_3001203=Feindliche Truppen wurden hinter uns gesichtet. Wenn wir uns nicht sofort zurückziehen überlebt das wohl keiner von uns.
battle_talk_3001204=Die Schlacht endete in einer Niederlage. Doch schon nächstes Jahr sollte Wilhelm zurückkehren, um die Eroberung zu vollziehen...

