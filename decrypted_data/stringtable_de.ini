item_desc_3101=Scharf geschliffenes, aber fragiles ordinäres Schwert.
item_desc_3102=Ein fein gearbeitetes und gehärtetes Langschwert.
item_desc_3103=Stark und scharf, ein Traumschwert für einfache Soldaten.
item_desc_3104=Eine schwere und mächtige Waffe, die mit beiden Händen geführt werden muss.
item_desc_3110=Eine aus hochwertigen Materialien geschmiedete Waffe. Sie ist schwer, aber durchschlagend und scharf.
item_desc_3111=Eine Waffe, die speziell für Reiter entwickelt wurde. Eine ausgezeichnete Wahl für den Kampf zu Pferd.
item_desc_3112=Eine Waffe, die häufig von Soldaten der Steppe verwendet wird. Die Schärfe der Waffe ergänzt perfekt die Wucht des Aufpralls zu Pferd.
item_desc_3113= Pferde, die wegen ihrer hervorragenden Ausdauer und Sprungkraft sorgfältig gezüchtet werden.
item_desc_3120=Ein elastischer Bogen aus Bambus.
item_desc_3121=Eine praktische Armbrust, die leicht zu tragen ist, aber wenig Durchschlagskraft besitzt.
item_desc_3122=Ein gut gefertigter Kurzbogen, langlebig und kraftvoll.
item_desc_3123=Aus exzellenten Materialien gefertigte Armbrust. Sie ist zwar schwer, jedoch präzise und durchschlagend.
item_desc_3130=Eine Flagge, die die Moral der Soldaten auf dem Schlachtfeld stärkt.
item_desc_3131=Ein Horn, dessen Klang die Kampfmoral der Soldaten auf dem Schlachtfeld stark anhebt.
item_desc_3140=Eine Liste von zivilen und militärischen Beamten im Römischen Reich.
item_desc_3141=Das frühe Gesetzbuch der Angelsachsen.
item_desc_3150=Geschmiedetes Langschwert, mit dem ausschließlich Eliteeinheiten ausgerüstet werden.
item_desc_3151=Geschmiedetes Breitschwert, mit dem ausschließlich Eliteeinheiten ausgerüstet werden.
item_desc_3152=Eine Waffe, die nur von den erfahrensten Soldaten geführt werden kann.
item_desc_3153=Eine große und schwere Axt, die durch wiederholtes Schmieden hergestellt wurde.
item_desc_3160=Eine Standardwaffe für die Elite-Kavallerie des Imperiums.
item_desc_3161=Das Pferd der normannischen Ritter. Ein mächtiges Ross für einen fähigen Reiter.
item_desc_3162=Ein von Steppennomaden gezüchtetes Pferd mit ausgezeichneter Ausdauer und explosiver Kraft.
item_desc_3163=Eine Pferderasse aus Nizza, berühmt für ihren starken Körperbau.
item_desc_3170=Eine Waffe, die häufig von Nomaden benutzt wird.
item_desc_3171=Eine mächtige, aber schwer zu beherrschende Waffe.
item_desc_3172=Eine mächtige Fernkampfwaffe von hervorragender Qualität. Ihre Beherrschung erfordert langes Training.
item_desc_3173=Eine metallbeschichtete Armbrust mit stark verbesserter Haltbarkeit.
item_desc_3180=Ein lautes Geräusch aus dem Reich der Titanen, das die Menschen aufmuntert.
item_desc_3181=Das Brüllen eines Drachens, das Verbündete in Kampfeswallung und Feinde in Angst und Schrecken versetzt.
item_desc_3190= Ein Herrscher muss den Geist und die Haltung eines Monarchen haben.
item_desc_3191=Ein legendärer Schatz. Es heißt, er verleiht seinem Träger die Macht zu herrschen.
item_desc_3200=Ein von Mauricius I. verfasstes militärisches Werk, das die Militärtaktiken der römischen Armee aufzeichnet.
item_desc_3201=Ein vom byzantinischen Kaiser Leo VI. verfasstes Werk über die Militärtaktik des byzantinischen Reiches.
item_desc_3210=Standardausrüstung für leicht gepanzerte Elitesoldaten des Reiches.
item_desc_3220=Standardausrüstung für schwer gepanzerte Elitesoldaten des Reiches.
item_desc_3231=Eine Sammlung antiker und frühmittelalterlicher medizinischer Theorien und Praktiken.
item_desc_3232=Eine Schriftensammlung von Caesar, darunter der Berichte über den Gallischen Krieg und den Bürgerkrieg gegen Pompeius.
item_desc_3233=Giftrezepte unbekannter Herkunft, aufgezeichnet auf einer Pergamentrolle.
item_desc_3234=Ein flüssiges Brandmittel, das im Oströmischen Reich erfunden wurde und dessen Formel als streng geheim gilt.
item_desc_3235=Eine detaillierte Karte der Stadtgarnison und der verfügbaren Ausrüstung.
item_desc_3236=Ein mit Gift bestrichener Dolch, der für Attentate verwendet wird.
item_desc_3237=Kavalleriehelm für hervorragenden Schutz.
item_desc_3238=Eine Lederrüstung, die von Fernkämpfern getragen wird. Sie bietet gute Verteidigung, ohne Einbußen an Mobilität.
item_desc_3239=Hellebarde für Garnisonstruppen, tödlich gegen Kavallerie.
item_desc_3240=Ein einfacher Rundschild, der seinen Träger schützen kann.
item_desc_3241=Ein Helm, der von den Kriegern des Nordens getragen wird. Er symbolisiert den Mut, unaufhaltsam vorwärts zu schreiten.
item_desc_3242=Das scharfe Stechschwert für den Zweikampf, das mit seinem rücksichtslosen Stich eine gute Durchschlagskraft besitzt.
item_desc_3243=Gepolsterte Lederstiefel, welche lange und anstrengende Märsche durch unwegsames Gelände ermöglichen.
item_desc_3244=Die Ausrüstung wird häufig von der Präriekavallerie verwendet, die vielen europäischen Rittern großes Leid zufügt.
item_desc_3245=Eine schwere Armbrust, deren Kopf für eine höhere Durchschlagskraft auf Kosten der Mobilität modifiziert wurde.
item_desc_3246=Ein leichter Schild, der häufig von der Kavallerie verwendet wird und hauptsächlich dem Schutz des Rumpfes des Trägers dient.  
item_desc_3247=Die Schlachtrösser der Nomaden, die ihrem Reiter ihre gefürchtete Mobilität verleihen.
item_desc_3248=Eine lange Schriftrolle mit Sternbildern, die erfahrenen Seefahrern den Weg weist.
item_desc_3249=Der Krummsäbel der Wüsten-Kavallerie, dessen Schärfe gefürchtet ist.
item_desc_3250=Der schwere Schild, der dessen Träger großen Schutz verleiht, ist nach einem antiken griechischen Helden benannt.
item_desc_3251=Ein militärisches Buch, in dem die Belagerungskunst von Kriegen mehrerer Jahrhunderte analysiert wird.
item_desc_3252=Der Helm hat die Form einer Turmspitze, die auch das Symbol für die strenge militärische Disziplin des Reiches ist.
item_desc_3253=Ein langes, zweihändiges Großschwert, das meist von tapferen Rittern der Vorhut benutzt wird, um die feindlichen Linien zu durchbrechen.
item_desc_3254=Eine Karte mit hydrographischen Informationen über die Kontinente, die ein wichtiges Hilfsmittel für Navigatoren ist.
item_desc_3255=Der Helm eines siegreichen Legionskommandanten, der zur Ehrung den Titel des Imperators verliehen bekam.
item_desc_3256=Ein notwendiges Werkzeug zum Zeichnen von Karten, mit dem die Ingenieure unzählige unglaubliche Instrumente konstruierten.
item_desc_3257=Ein schwerer Kriegshammer, der nur für diejenigen mit unglaublicher Armkraft geeignet ist.
item_desc_3258=Das Langschwert des Kommandanten, das eher der Dekoration als dem Kampf dient.
item_desc_3259=Die schwere Streitaxt kann selbst schwer gepanzerten Gegnern erheblichen Schaden anrichten.
item_desc_3260=Ein Speer mit guter Durchschlagskraft, der aber auch eine große Armkraft des Benutzers erfordert.
