general_desc_Charles VII=Die Ernennung von Jeanne d'Arc im kritischsten Moment Frankreichs führte sie zum Sieg. Während seiner Regierungszeit führte Karl der Sieger eine Reihe von Reformen durch, errichtete ein stehendes Heer und beendete schließlich den Hundertjährigen Krieg.
general_desc_Jan Zizka=Nach Ausbruch des Hussitenkrieges schloss er sich der aufständischen Armee an und wurde ihr Anführer. Seine Taktik der "Wagenfestung" erschreckte den Feind und er wurde als "immer der Sieger auf dem Schlachtfeld" beschrieben.




