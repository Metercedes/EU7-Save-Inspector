general_desc_Jean de Dunois=Der uneheliche Sohn des Herzogs von Orléans, der tapfer kämpfte und Orléans solide hielt, obwohl er Jeanne d'Arc bei ihrem Feldzug folgte.
general_desc_Gilles de Rais=Gilles war ein französischer Marschall während des Hundertjährigen Krieges und einer der ersten Generäle, die Jeanne d’Arc folgten. Wurde als Nationalheld gefeiert, später aber wegen Kinderquälerei auf dem Scheiterhaufen gefoltert.
general_desc_La Hire=Lahaire war ein unbesiegbarer General, der Jeanne d'Arc folgte und einen herausragenden Beitrag zum endgültigen Sieg Frankreichs leistete.
general_desc_Henry V=Heinrich V. war ein brillanter Krieger, der seine herausragende Führung in der Schlacht von Agincourt und im Vertrag von Troyes von 1420 unter Beweis stellte, der das Recht dieses englischen Königs auf den Thron Frankreichs bestätigte.
general_desc_Olga2=Olga war die erste Herrscherin der Rus, die zum Christentum konvertierte und verbreitete das Christentum im Kiewer Rus. Nach ihrem Tod wurde sie vom Heiligen Stuhl postum als "Heilige Olga" anerkannt.
general_desc_Richard I2=Richard Löwenherz, einer der Anführer des Dritten Kreuzzugs, war so mächtig, dass sogar Saladin ihn mied.  Dank Richards Macht bestand das Königreich Jerusalem für ein weiteres Jahrhundert.

