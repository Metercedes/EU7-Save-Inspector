stage_group_desc_20008=Als im Jahr 1302 das expandierende Osmanische Reich an der Grenze mit dem Byzantinischen Reich zusammenstieß, führte der byzantinische Kaiser Michael IX. persönlich eine Armee an, wurde jedoch besiegt. Michaels Vater befahl George Mozarone, eine unterstützende Truppe anzuführen, und am 27. Juli traf die byzantinische Armee in der Ebene von Bapheus auf osmanische Kavallerie unter der Führung von Osman I.

