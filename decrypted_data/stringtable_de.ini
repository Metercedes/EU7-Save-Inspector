agreement_info=Wichtige Hinweise[br]Dieser Endbenutzer-Lizenzvertrag für das Spiel (im Folgenden als "Vertrag" bezeichnet) ist ein rechtsgültiger Vertrag zwischen dem Nutzer (Einzelperson oder Einzelunternehmen, im Folgenden als "Nutzer" bezeichnet) und Suzhou EasyTech Software Technology Co. (im Folgenden als "Spiel" bezeichnet).[br]Hauptbestimmungen[br]1. Lizenzierung von Rechten[br]1.1 Der Nutzer ist berechtigt, die Client-Software des Spiels auf einem vernetzten mobilen Gerät zu installieren, das vom Nutzer während der Dauer der Lizenz genutzt wird und eine Kopie des Spiels auf die in der Client-Software angegebene Weise auszuführen. Jede andere Form der unbefugten Installation, Nutzung, des Zugriffs, der Anzeige, des Betriebs und der Übertragung gilt als Vertragsverletzung. 2. Verbot von Verhaltensweisen[br]2.1 Den Nutzern ist es untersagt, Verhaltensweisen an den Tag zu legen, die die Fairness des Spiels verletzen, einschließlich, aber nicht beschränkt auf:[br]2.1.1 die Verwendung von Reverse-Engineering, Kompilierung oder Rückwärtskompilierung, Disassemblierung und anderen technischen Mitteln zur Erstellung von Software zur Analyse, Modifizierung und zum Angriff auf das Spiel mit dem letztendlichen Ziel des Betrugs. 2 Verwendung von Plug-in-Programmen oder Programmen zur Modifikation des Spiels (der Begriff "Plug-in-Programme" in dieser Vereinbarung bezieht sich auf alle Programme, die unabhängig von der Spielsoftware sind und den Betrieb des Spiels beeinflussen können, während das Spiel läuft, einschließlich, aber nicht beschränkt auf alle Arten von Programmen, die Tastatur- und Mausfunktionen simulieren, die Betriebsumgebung verändern, Daten modifizieren usw.). Falls es einen Konflikt zwischen der Definition von Plug-ins, die in den relevanten nationalen Gesetzen, Verordnungen und Vorschriften oder normativen Dokumenten der zuständigen Regierungsbehörden festgelegt ist und diesem Vertrag gibt, haben die Gesetze, Verordnungen, Vorschriften oder normativen Dokumente Vorrang), um die Spielsoftware wiederherzustellen, zu kompilieren, zu dekodieren oder zu modifizieren, einschließlich, aber nicht beschränkt auf das Modifizieren von proprietären Kommunikationsprotokollen, die von der Spielsoftware verwendet werden, das Modifizieren oder Sperren der Daten im dynamischen Arbeitsspeicher (RAM), das Vornehmen von Modifikationen oder das Sperren.[2.1.3 die Verwendung anormaler Methoden, um sich in das Spiel einzuloggen, die Verwendung externer Software wie Beschleuniger oder Bot-Programme usw., um die Serviceeinrichtungen böswillig zu beschädigen und den normalen Serviceablauf zu stören.4 die Herstellung, Verbreitung oder Verwendung von Plug-ins, Paketen, Beschleunigern und anderen Betrugsprogrammen jeglicher Art oder die Organisation oder Anstiftung anderer zur Verwendung solcher Softwareprogramme oder der Verkauf solcher Softwareprogramme zum finanziellen Vorteil von Privatpersonen oder Organisationen.[br]2.1.5 jeder Versuch, mit beliebigen Mitteln oder Methoden die Server, Router, Switches und andere Geräte, auf denen der Spieldienst bereitgestellt wird, anzugreifen, um unrechtmäßig Daten zu erlangen oder zu verändern, den normalen Spieldienst zu stören, sowie für jeden anderen schädlichen Zweck.[br]2.1.6 mögliche technische Fehler oder Lücken im Spielsystem auszunutzen, um für sich selbst und andere in irgendeiner Form Gewinn zu erzielen (einschließlich, aber nicht beschränkt auf das Kopieren von virtuellen Gegenständen im Spiel usw.).[br][br]Benutzerkodex[br]Bitte seien Sie versichert, dass es auch im Interesse der Allgemeinheit ist, dass der Spielcharakter eines Benutzers wegen eines Verstoßes gegen den folgenden Kodex eingeschränkt wird.[br]1. Verhalten: Das Ausnutzen von Fehlern und Schlupflöchern im System, um für sich und andere Profit zu machen. Strafen: Nach Entdeckung oder Überprüfung durch einen Nutzerbericht wird eine strenge Verwarnung ausgesprochen; wenn der Täter den Verstoß nach der Verwarnung wiederholt, werden die entsprechenden virtuellen Gegenstände gelöscht usw. und an die zuständigen staatlichen Stellen weitergeleitet.[br]2. Handlungen: Nutzung der vom Spiel bereitgestellten Funktionen zur Durchführung illegaler physischer Transaktionen und anderer Handlungen, die gegen nationale Gesetze und Vorschriften verstoßen. Sanktionsmaßnahmen: Die oben genannten Handlungen werden unverzüglich an die zuständigen staatlichen Behörden weitergeleitet, sobald sie entdeckt werden.[br]Suzhou EasyTech Software Technology Co.[br]1. Juni 2019[br]* Für den vollständigen Inhalt besuchen Sie bitte die offizielle Website von EasyTech.
