general_retreat_1=Wir müssen Kräfte für unseren Rückschlag bewahren. Der vorübergehende Rückzug bedeutet nicht das Scheitern.
general_retreat_2=Unser Vorstoß war zu riskant, jetzt bleibt uns keine andere Wahl als der Rückzug.
general_retreat_3=Ich habe bis zum letzten Widerstand gekämpft, konnte den Feind aber nicht schlagen.
general_retreat_4=Die Hartnäckigkeit des Feindes hat meine Erwartungen übertroffen. Ich muss eine neue Strategie anwenden.
general_retreat_5=Meine Truppe hat schwere Verluste erlitten. Warum wurde mein Angriff nicht gedeckt?
general_retreat_6=Meine Truppen sind für die aktuelle Schlacht nicht mehr tauglich und müssen sich nun zur Erholung zurückziehen.

general_job_desc={1} von {0}
general_desc_Khalid=Einer der bedeutendsten arabischen Generäle, der seine mutigen Krieger ohne Unterlass in Schlachten führte. Als Anerkennung für seine Tapferkeit verlieh ihm Mohammed den Titel "Schwert Allahs".
general_desc_Belisarius=Ein byzantinischer Feldherr unter Kaiser Justinian I., der Italien und Nordafrika eroberte. Er wird häufig als "Letzter der Römer" bezeichnet. Leider verlor er später in seiner militärischen Laufbahn das Vertrauen Justinians.
general_desc_Frederick I=Friedrich I., Barbarossa, war König des römischen Volkes und Kaiser des Heiligen Römischen Reiches, der zusammen mit Richard Löwenherz, König von England und Philipp II., König von Frankreich, den Dritten Kreuzzug anführte, bevor er auf dem Weg nach Osten ertrank.
general_desc_Constantine I=Römischer Kaiser und Gründer des byzantinischen Reiches. Er baute eine neue kaiserliche Residenz in Byzanz und nannte die Stadt "Neues Rom". Aus Respekt vor Konstantin nannte man sie Konstantinopel.
general_desc_Uthman=Er war der Schwiegersohn und Nachfolger des islamischen Propheten Mohammads. Er war der dritte der muslimischen Kalifen. Während seiner Herrschaft war die arabische Kavallerie unbesiegbar. In seinen späten Lebensjahren wurde er ermordet.
general_desc_Heraclius=Heraklius war der byzantinische Kaiser, der die Perser besiegte und die verlorenen Länder zurückeroberte. Doch die arabische Invasion ließ diese Erfolge nur von kurzer Dauer sein.
general_desc_Gilles de Rais=Gilles de Rais war ein Anführer der französischen Armee während des Hundertjährigen Krieges, wo er an der Seite von Jeanne d'Arc kämpfte und ein Nationalheld war. Er glaubte an Schwarzmagie und war selbst Alchemist. In späten Jahren wurden ihm weit über hundert Morde nachgewiesen und er deshalb zum Tode verurteilt, weshalb Gilles die Inspiration für "Blaubart" gewesen sein soll. 
general_desc_Sikelgaita=Sie war eine lombardische Prinzessin und die zweite Frau des Herzogs Robert Guiscard von Apulien. Sie befehligte mit ihrem Mann Truppen in den Kriegen gegen das Byzantinische Reich.
general_desc_Harald=König von Norwegen. Bevor er König wurde, war er Söldner und Heerführer in der Kiewer Rus und in der Varangischen Garde des Byzantinischen Reiches.
general_desc_Alp Arslan=Der zweite Sultan des Seldschukenreiches kämpfte und gewann während seiner Herrschaft viele Schlachten gegen die Fatimiden-Dynastie von Ägypten und das Byzantinische Reich. Er war als "Alp Arslan" bekannt, was "Tapferer Löwe" bedeutet.
general_desc_Alfred the Great=König der Westsachsen und der erste Mensch, der sich "König der Angelsachsen" nannte. Er verteidigte sein Königreich gegen die Eroberungsversuche der Wikinger und schaffte es, den Großteil Englands unter der Herrschaft der Angelsachsen zu vereinen. Daher wurde er auch "Alfred der Große" genannt.
general_desc_Alaric I=König der Westgoten und Gründer des westgotischen Königreichs. Nachdem er die Beziehungen zum Römischen Reich abgebrochen hatte, führte er die Westgoten zur Eroberung Roms und konnte die "Ewige Stadt" auch einnehmen.
general_desc_Aetius=Häufig wird er als "der letzte der Römer" bezeichnet, da er in der Schlacht auf den Katalaunischen Feldern ein großes römisches Heer aufstellte und damit die verheerende Invasion der Hunnen beendete, was "der letzte Sieg des Weströmischen Reiches" war. Der mächtige Feldherr war nun zu bedrohlich für Kaiser Valentinianus III. geworden. Er wurde deshalb der Verschwörung beschuldigt und ermordet.
general_desc_Athelstan=Er war der Sohn von König Edward dem Älteren und Begründer der sächsischen Dynastie. Er gilt als der erste König von England und als einer der "größten angelsächsischen Könige".
general_desc_Sophronius=Bevor er zum Führer von Jerusalem aufstieg, war er Mönch und Theologe.
general_desc_Michael the Stammerer=Michael II., war ein byzantinischer Kaiser, der den Spitznamen "Der Stotterer" trug. Während seiner Regierungszeit verbündete er sich mit den Bulgaren, um im Bürgerkrieg Thomas den Slawen niederzuschlagen, was jedoch das Reich schwächte und die islamische Expansion begünstigte.
general_desc_Fausta=Kaiserin des Römischen Reiches, zweite Frau von Konstantin dem Großen.
general_desc_Tostig=Bruder von König Harold Godwinson, der Harald Hardrada unterstützte und in der Schlacht von Stamford Bridge getötet wurde.
general_desc_Leopold V=Herzog von Österreich und der Steiermark. Er nahm am Dritten Kreuzzug teil und wurde dort angeblich von Richard Löwenherz beleidigt. Bei Löwenherz´ Rückreise nach England, durchquerte der König Österreich und wurde von Leopold gefangen genommen. Für Richards Freilassung wurden 23 Tonnen Silber bezahlt, womit bauliche Großprojekte im Herzogtum finanziert wurden.
general_desc_Theodoric I=König der Westgoten. Während seiner Herrschaft griff er die Franken und Vandalen an und verbündete sich mit dem Weströmischen Reich.
general_desc_Gytha=Sie war eine dänische Adlige, Mutter von König Harold Godwinson und Edith von Wessex.
general_desc_John Chandos=Ein englischer Ritter des Mittelalters, der als Drahtzieher der drei wichtigsten Siege Englands im Hundertjährigen Krieg gilt. Er starb in einem kleineren Konflikt.
general_desc_Gunderic=König der Vandalen und Alanen, der ein Heer anführte, um in das Weströmische Reich einzufallen.
general_desc_Saladin=Der erste Sultan der Ayyubiden-Dynastie von Ägypten, der erste Sultan von Syrien und ein ägyptischer Nationalheld. Er war berühmt für seine herausragende Führungsqualitäten, seine Ritterlichkeit und sein militärisches Talent während der Konfrontation der Araber mit den Kreuzrittern.
general_desc_Narses=Gleich Belisarius war er einer der großen Generäle im Dienste des byzantinischen Kaisers Justinian I. Er wird als "Hammer der Goten" bezeichnet, da er das ostgotische Königreich vollständig zerstörte.
general_desc_Charlemagne=Vater Europas, König der Langobarden, König der Franken und Kaiser der Römer. Seit dem Römischen Reich war Karl der Große der erste, der den größten Teil Westeuropas vereinigte. Der erweiterte fränkische Staat, den er gründete, ist als Karolingisches Reich bekannt.
general_desc_William the Conqueror=William der Eroberer war ein Nachkomme von Rollo und ab 1035 Herzog der Normandie. Im Jahr 1066 fiel William in England ein, was ihn zum ersten normannischen Monarchen von England machte.
general_desc_Attila=Einer der berüchtigtsten eurasischen Hunnenführer, der von den Historikern als "Geißel Gottes" bezeichnet wurde. Er unternahm mehrere Invasionen in das Byzantinische und das Weströmische Reich.
general_desc_Richard I=Er war der König von England, der aufgrund seines Rufs als großer militärischer Anführer als Richard Löwenherz bekannt war. Zusammen mit Friedrich I., Kaiser des Heiligen Römischen Reiches und Philipp II. von Frankreich führte er den Dritten Kreuzzug an.
general_desc_Edward the Black Prince=Er ist in der Geschichte als der Schwarze Prinz bekannt, der älteste Sohn von König Edward III. von England. Edward machte sich als einer der erfolgreichsten englischen Feldherren während des Hundertjährigen Krieges einen Namen und galt als Vorbild an Ritterlichkeit.
general_desc_Charles Martel=Auch bekannt als Karl der Hammer, ein militärischer Führer und Minister des fränkischen Königreichs. Der uneheliche Sohn von Pippin II. und Großvater von Karl dem Großen.
general_desc_William I of Sicily=Ehemals Guglielmo I., zweiter König des Königreichs Sizilien.
general_desc_Harold=Auch Harold II. genannt, Sohn von Godwin, Earl of Wessex, Schwager von König Edward dem Bekenner. Er war der letzte angelsächsische König von England.
general_desc_Matilda of Boulogne=Gräfin von Boulogne und seit der Thronbesteigung ihres Mannes Stephan, Königin von England.
general_desc_Eleanor of Provence=Königin und Ehefrau von Heinrich III., dem angevinischen König von England.
general_desc_Baldwin IV=König von Jerusalem. Obwohl er schwer an Lepra erkrankt war, führte er eine zahlenmäßig unterlegene Truppe an und schlug Saladins 30.000 Mann starke Armee bei Montgisard zurück.
general_desc_Khawlah=Eine legendäre Kriegerin und spätere militärische Anführerin. Sie wurde als eine der größten Kriegerinnen der Geschichte bezeichnet. Einst wurde sie von Gegnern auf dem Schlachtfeld mit Khalid Bin Walid verglichen.
general_desc_Sunicas=Ein Hunne in der byzantinischen Armee unter der frühen Herrschaft von Justinian I.
general_desc_Mehmed the Conqueror=Mehmed der Eroberer, der osmanische Sultan, der die osmanische Armee zur Plünderung Konstantinopels und zur Zerstörung des Byzantinischen Reiches führte und damit den Grundstein für die jahrhundertelange osmanische Vorherrschaft legte.
general_desc_Philip II=Er war der erste der großen Kapetingerkönige von Frankreich. Wegen seines strategischen und politischen Geschicks wird er Philipp der Würdige genannt.
general_desc_Henry II of England=König von England und Herzog der Normandie. Das von ihm geschaffene Anjou-Reich war eine der mächtigsten Feudaldynastien Englands im Mittelalter.
general_desc_Genghis Khan=Gründer und erster Großkhan des Mongolenreichs. Er leitete die mongolischen Invasionen ein, die zur Eroberung eines Großteil Eurasiens führten. Aufgrund seiner außergewöhnlichen militärischen Erfolge wird Dschingis Khan oft als einer der größten Eroberer aller Zeiten angesehen.
general_desc_Edward I=Er ist bekannt als "Edward der Langbeinige" und "der Hammer der Schotten", der für die Eroberung von Wales und eines Großteils von Schottland bekannt ist. Seine Mutter war Eleonore von der Provence.
general_desc_Justinian I=Byzantinischer Kaiser. Aufgrund seiner Leistungen wurde er auch Justinian der Große genannt. Justinian I. war einer der bedeutendsten Herrscher der Spätantike.
general_desc_Empress Matilda=Tochter von Heinrich I. und Mutter von Heinrich II. Nachdem sie von Stephan von Blois usurpiert worden war, sammelte sie ihre Kräfte und kämpfte um den Thron. Schließlich half sie ihrem Sohn, den Thron von England zu besteigen.
general_desc_Philip the Good=Philip der Gute war der dritte Herzog von Burgund. Er war maßgeblich am Hundertjährigen Krieg beteiligt und leistete einen wichtigen Beitrag zur Entwicklung der heutigen Niederlande.
general_desc_Eleanor of Aquitaine=Sie war die Frau von König Heinrich II., Herzogin von Aquitanien und Gräfin von Poitiers. Sie war zunächst mit König Ludwig VII. von Frankreich verheiratet. Nachdem die Ehe annulliert worden war, heiratete sie König Heinrich II. von England.
general_desc_Isabella=Die Tochter von Philipp IV. von Frankreich. Als Ehefrau von König Edward II. wurde sie zur Königin von England und Mutter von König Edward III. von England. Wegen ihrer entschlossenen und mutigen Persönlichkeit wurde sie die "Wölfin von Frankreich" genannt.
general_desc_Nikephoros I=Er war ein byzantinischer Kaiser. Vor seiner Thronbesteigung wurde er von der Kaiserin Irene zum Finanzminister ernannt. Er wurde in einer Schlacht gegen Krum, den Khan von Bulgarien, getötet.
general_desc_Malik Shah=War ein Sohn Alp Arslans und ab 1072 Großseldschuken-Sultan. Sein Name bedeutet "Herrscher der Könige".
general_desc_Timur=Der Gründer des timuridischen Khanats, der die anderen Staaten West-, Süd- und Zentralasiens besiegte.
general_desc_Lady Margaret Beaufort=Nachfahrin von Edward III, einer wichtigen Figur in den Rosenkriegen und Mutter von Henry VII, dem Gründer der Tudor-Dynastie.
general_desc_Elizabeth Woodville=Als Witwe niederen Adels und Mutter zweier Kinder, heiratete sie, durch ihre Schönheit bedingt, Edward IV. von England und löste damit einen Aufruhr aus. Aus dieser Beziehung gingen noch 10 weitere Kinder hervor.
general_desc_Fatimah=Sie war die jüngste Tochter des islamischen Religionsstifters Mohammads und dessen erster Ehefrau Chadidscha, eine der fünf großen Frauen des arabischen Reiches. Sie wurde auch "Herrin der Frauen der Welten" genannt.
general_desc_Antonina=Sie war die Frau des byzantinischen Generals Belisarius und "rechter Arm" Kaiserin Theodoras in ihrem Bemühen um Einfluss und Macht.
general_desc_Theodora=Ehefrau und Kaiserin des byzantinischen Kaisers Justinian I., die über große Weisheit verfügte und großen Einfluss auf Justinian während seiner Regierungszeit ausübte. Sie gab Justinian während der Unruhen in Nica neuen Mut.
general_desc_Robert Curthose=Er war Herzog der Normandie und der älteste Sohn von William dem Eroberer, dem ersten normannischen König von England. Er nahm am Ersten Kreuzzug teil.
general_desc_Suleiman Baltoghlu=Ein osmanischer Flottenadmiral, der an der Belagerung von Konstantinopel teilnahm, bei der er besiegt wurde. Er wurde von Mehmed II. zum Tode verurteilt. Obwohl sein Leben schließlich verschont wurde, wurden ihm Titel, Land und Vermögen entzogen. Er starb in Dunkelheit und Armut.
general_desc_Ambrosio Boccanegra=Er segelte 1341 mit seiner Flotte nach Kastilien, um Alfons XI. zu unterstützen und führte später das kastilisch-französische Heer an, um die Engländer in der Schlacht von La Rochelle zu besiegen.
general_desc_Aisha=Mutter der Gläubigen und dritte Frau Muhammads. Sie schloss sich der Rebellion gegen Ali an, nachdem dieser Kalif geworden war und zog gegen ihn in den Kampf.
general_desc_Hermeric=König des Suebenreiches und lebenslanger Feind des Römischen Reichs.
general_desc_Simeon I of Bulgaria=Bulgarischer Zar, der dritte Sohn von Boris I. Seine Regierungszeit war das goldene Zeitalter des Ersten Bulgarischen Reiches.
general_desc_Constantine XI=Der letzte Kaiser des Byzantinischen Reiches gab während der Belagerung der Stadt durch Mehmed II. den Thron auf. Nachdem die Mauern durchbrochen waren, zog er seine königlichen Gewänder aus und stürzte sich in die feindlichen Linien, inmitten welcher er verschwand.
general_desc_Samuel of Bulgaria=Zar des Ersten Bulgarischen Reiches. Während seiner Herrschaft kontrollierte Bulgarien den größten Teil des Balkans und reichte bis nach Südgriechenland.
general_desc_Aethelred I=Im Jahr 865 wurde er als Nachfolger seines älteren Bruders Ethelbert König von Wessex und König von Kent.
general_desc_Halfdan Ragnarsson=Er ein Kommandant der Wikingerinvasion in die angelsächsischen Königreiche Englands und der erste Wikingerkönig von Northumbria.
general_desc_Edward III=König von England. Er verwandelte das Königreich England in eine der stärksten Militärmächte Europas. Edward der Schwarze Prinz war sein ältester Sohn.
general_desc_Richard of York=Er war ein führender englischer Magnat, ein Urenkel von König Edward. Er versuchte schließlich, den Thron zu besteigen, wurde aber davon abgehalten.
general_desc_Alle=Der erste König der Südsachsen, der in einem Gebiet herrschte, das heute auch als Sussex bekannt ist.
general_desc_Robert the Bruce=Robert I. war ein wichtiger König in der schottischen Geschichte. Er führte das Königreich Schottland zum Sieg über die englische Armee und erlangte Schottlands Platz als unabhängiges Land zurück.
general_desc_Zubayr=Er war ein Gefährte des islamischen Propheten Mohammed und wurde nach dessen Tod ein militärischer Anführer. 
general_desc_Trithyrius=Ein berühmter General des Byzantinischen Reiches und ein wichtiger militärischer Befehlshaber während der Herrschaft von Heraklius.
general_desc_Edmund=König des Königreichs Ostanglien, der seine Truppen während der Wikingerinvasion gegen den Feind anführte und im Kampf fiel.
general_desc_Totila=König der Ostgoten. Er war ein fähiger militärischer und politischer Führer.
general_desc_Athelred=König des angelsächsischen Königreichs Mercia, auch bekannt als der Sheriff von Ethelred in Merica.
general_desc_Ivar=Der Anführer der Wikinger war der Sohn des berühmten Wikingers und dänischen Königs Ragnar Lodbrok. Er leitete mit seinen Brüdern die Invasion Irlands und Britanniens.
general_desc_Vortimer=Sohn von Vortigern, bekannt für seinen Widerstand gegen das Bündnis seines Vaters mit den Angelsachsen.
general_desc_Catigern=Vortimers Bruder, bekannt für den Kampf gegen die Angelsachsen.
general_desc_Alexios I=Byzantinischer Kaiser, Begründer der Komnenen-Dynastie, dessen Familie während seiner Herrschaft den Höhepunkt der Macht im Byzantinischen Reich erreichte. Gleichzeitig war sein Ersuchen an Papst Urban II. um Hilfe gegen die Seldschuken einer der Gründe für den Beginn der Kreuzzüge.
general_desc_Basil II=Der "Bulgarenschlächter" war fast 50 Jahre lang der dienstälteste byzantinische Kaiser. Er gilt als griechischer Nationalheld, wird aber von den Bulgaren verachtet.
general_desc_Roland=Ein fränkischer Heerführer unter Karl dem Großen und eine in vielen Werken mehrfach erwähnte Figur, die für das fränkische Königreich gegen die Mauren sowie Basken kämpfte. In der Überlieferungen wird Roland als der wichtigste Ritter Karls des Großen porträtiert.
general_desc_Bessas=Ein byzantinischer General und Adjutant von Belisarius, der an dessen Seite in den Kriegen gegen die Goten und die sassanidischen Perser kämpfte.
general_desc_Vitiges=König der Ostgoten. Er war ein fähiger militärischer und politischer Führer.
general_desc_Batu Khan=Er war ein Sohn Dschötschis, dem ältesten Sohn Dschingis Khans und der Begründer des Khanates der Goldenen Horde, auch Kyptschak-Khanat genannt. Wegen seiner Freundlichkeit gegenüber seinem Volk wird er auch Batu der Prächtige genannt.
general_desc_Jebe=Der Name Jebe bedeutet "Pfeil" und wurde ihm gegeben, nachdem er sich Dschingis Khan unterworfen hatte. Er war als der erste mongolische General bekannt und gehörte zu den "Vier Hunden".
general_desc_Godfrey=Herzog von Niederlothringen, Herzog von Bouillon und General im Ersten Kreuzzug. Sein Bruder war Balduin I. von Jerusalem.
general_desc_Leo VI the Wise=Kaiser des Byzantinischen Reiches, bekannt als "der Weise", der während seiner Herrschaft den Kodex der Basilika fertigstellte, der zum Kodex des Byzantinischen Reiches wurde.
general_desc_Pepin the Short=Sohn von Karl Martel und Gründer des Karolingerreiches. Im Jahr 751 stürzte Pippin den letzten König des Geschlechts der Merowinger und krönte sich selbst zum König der Franken.
general_desc_Valens=Ein oströmischer Kaiser. Er starb in der Schlacht von Adrianopel im Kampf gegen die terwingischen Goten.
general_desc_Nur Din=Ein Herrscher der Zengiden-Dynastie des Seldschukenreiches, eine wichtige Figur des Zweiten Kreuzzuges.
general_desc_Gelimer=Der letzte germanische König der Vandalen und Alanen. Er unterwarf sich dem Byzantinischen Reich, nachdem er von Belisarius besiegt worden war.
general_desc_Stilicho=Ein hochrangiger römischer General mit halb-barbarischer Herkunft. Er war ein Adliger und wurde zum Konsul des Weströmischen Reiches ernannt.
general_desc_El Cid=Ein kastilischer Adliger, Eroberer, Herrscher von Valencia und ein spanischer Nationalheld. Er war an der spanischen Reconquista beteiligt und besaß zwei berühmte Schwerter, Tizona und Colada, die bis heute erhalten sind.
general_desc_Arthur=König Arthur war der keltischen Legende nach ein britischer König und der Anführer der Ritter der Tafelrunde. Nach dem Zusammenbruch des Römischen Reiches und dem Abzug der römischen Truppen aus Britannien soll das Land unter seiner Führung vereint worden sein.
general_desc_Guinevere=Legendäre Königin und Ehefrau von König Arthur während seiner Herrschaft. Ihre Liebesaffäre mit Lancelot, einem der Ritter der Tafelrunde, verursachte den Untergang des Königreichs.
general_desc_Lancelot=Ein Mitglied der Ritter der Tafelrunde und einer der bedeutendsten und vertrauenswürdigsten Gefährten von König Arthur, der zu seinen vielen Siegen beitrug.
general_desc_Joan of Arc=Eine Heldin Frankreichs, die aus einer Bauernfamilie stammte. Sie führte die Franzosen im Widerstand gegen die englische Invasion während des Hundertjährigen Krieges an. Sie wurde schließlich auf dem Scheiterhaufen hingerichtet.
general_desc_William Wallace=Er war ein schottischer Adliger und Patriot, der den bewaffneten Widerstand im Ersten Schottischen Unabhängigkeitskrieg anführte.
general_desc_Olga=Olga von Kiew war eine weibliche Anführerin der Kiewer Rus und Ehefrau des Großfürsten Igor. Sie fungierte als Regentin der Kiewer Rus für ihren Sohn Swjatoslaw, als dieser noch minderjährig war.
general_desc_Caesar=Diktator und Konsul der Römischen Republik. Im Zuge der Nachfolgestreitigkeiten nach Caesars Ermordung entstand das Römische Kaiserreich.
general_desc_Robin Hood=Er ist ein legendärer Geächteter, der in der englischen Folklore dargestellt wird. Traditionell in Lincolngrün gekleidet, klug und geschickt agierend, soll er die Reichen bestohlen, den Armen gegeben und die Beamten und Priester gehasst haben.
general_desc_Beowulf=Eine legendäre Gestalt der nordischen Mythologie, die tapfer gegen Riesen, Seeungeheuer und Drachen kämpfte.
general_desc_Otto I=König der Ostfranken, Heiliger Römischer Kaiser und einer der ersten germanischen Monarchen, der ins Reich der Slawen einfiel und Herzog Boleslav I. von Böhmen zur Unterwerfung zwingen konnte.
general_desc_Knud=Er übernahm den dänischen Thron von Sweyn. Er herrschte infolge über England, Dänemark und einen Teil von Schweden. Sein Reich wurde oft als das Nordsee-Reich bezeichnet.
general_desc_Zengi=Er war der Gründer der Zengiden-Dynastie und ein turkmenischer Atabeg, der über Mosul, Aleppo, Hama und Edessa herrschte.
general_desc_Alexander Nevsky=Ehemals Alexander Jaroslawitsch, besiegt er die schwedischen Truppen in der Nähe der Newa während der schwedischen Invasion der Rus, was ihm den Titel "Newski" einbrachte.
general_desc_Subutai=Subutai war in seiner 50-jährigen Laufbahn an mehr Landeroberung beteiligt, als alle Militärführer der Weltgeschichte. Er diente unter drei Khanen als General und wurde als "Baatar" bezeichnet, was "Held" bedeutet.
general_desc_Su Dingfang=Er war ein berühmter General in den frühen Jahren der Tang-Dynastie. Er war gut darin, viele Schlachten mit wenigen Männern zu gewinnen und hatte eine stolze Bilanz von 80.000 gewonnenen Schlachten mit 1.000 Mann und Errungenschaften wie der Zerstörung der Türken, dem Sieg über die Tubo  oder dem Angriff auf die Goryeo.
general_desc_Li Jing=Er war der erste General der Tang-Dynastie und leistete während seiner Eroberung des Ostens und des Westens zu Lebzeiten einen äußerst wichtigen Beitrag zur Gründung, Konsolidierung und zum Wohlstand der Tang-Dynastie.
general_desc_Li Shimin=Kaiser Taizong von Tang, der zweite Kaiser der Tang-Dynastie und der erste Khan des Himmels, war einer der angesehensten Kaiser der Tang-Dynastie und der chinesischen Geschichte.
general_desc_Yelu Dashi=Auch bekannt als Dashi Linga oder Linga Dashi, war er in vielen Bereichen einschließlich des Militärs erfolgreich und Berichte seiner Taten waren in Europa weit verbreitet, sodass sein Name zum Synonym für das westliche Liao-Reich wurde.
general_desc_Suleiman I=Er war der am längsten regierende Sultan des Osmanischen Reiches und unter seiner Herrschaft erlebte das Osmanische Reich seine Blütezeit. Aufgrund der Verdienste von Suleiman I. ist er im Westen allgemein als Suleiman der Prächtige bekannt.
general_desc_John I Tzimiskes=Als römischer Kaiser mit großen militärischen Fähigkeiten besiegte er die Russen und Bulgaren im Norden und machte mehrere Eroberungen im Osten, wodurch er die militärische Macht des Ostroms stark ausbaute und dessen Grenzen erweiterte.
general_desc_Giovanni=Zwar konnte er die Einnahme Konstantinopels durch das Osmanische Reich nicht verhindern, aber sein unerschütterlicher Wille und seine Furchtlosigkeit blieben unvergessen!
general_desc_Gao Xianzhi=Gao Xianzhi war ein berühmter General während der Regierungszeit von Kaiser Xuanzong aus der Tang-Dynastie. Er bewachte Anxi und trug dazu bei, die Sicherheit der Westgrenze von Tang aufrechtzuerhalten und die Beziehungen zur westlichen Region zu stärken.

