general_desc_WuTianXinXuan=Ein herausragender Militärkommandant während Japans Zeit der Streitenden Reiche, der als einer der militärisch talentiertesten Anführer der Sengoku-Ära gilt. Die von ihm gehisste 'Fūrinkazan'-Kampfflagge, obwohl sie aus 'Die Kunst des Krieges von Sun Tzu' stammt, wurde zu einem Symbol der Takeda-Armee.
general_desc_WuTianXinXuan1=Ursprünglich Takeda Harunobu genannt, geehrt als 'Erster General der Zeit der Streitenden Reiche' und 'Erster Militärstratege der Zeit der Streitenden Reiche'. Als Herrscher der Provinz Kai wurde er 'Tiger von Kai' genannt. Seine Armee wurde auch durch die aus 'Die Kunst des Krieges' abgeleitete Strategie 'Furinkazan' berühmt und unbesiegbar.
general_desc_ShangShanQianXin=Ein Daimyo der japanischen Sengoku-Zeit, später geehrt als der Drache von Echigo und der Kriegsgott. Er kämpfte häufig gegen Takeda Shingen, Hojo Ujiyasu, Oda Nobunaga und andere. Später folgte er der Einladung des Ashikaga-Shogunats nach Kyoto, starb jedoch, bevor er seine Ambitionen erfüllen konnte.
general_desc_ShangShanQianXin1=Der junge Sohn von Nagao Tamekage aus der Provinz Echigo, der im Erwachsenenalter als Nagao Kagetora bekannt wurde. Da er den Nachnamen 'Uesugi' vom Kanto Kanrei erbte und sowohl vom Kanto Kanrei Uesugi Norikata als auch vom Shogun Ashikaga Yoshiteru Namen erhielt, war er auch als Uesugi Masatora und Uesugi Terutora bekannt. Er war ein Held der Sengoku-Zeit, der zusammen mit Takeda Shingen als 'Drache und Tiger' bezeichnet wurde.
general_desc_Scanderbeg=Albanischer Nationalheld, der in Form von Guerillakrieg gegen das mächtige Osmanische Reich kämpfte, um die Unabhängigkeit Albaniens zu schützen, und mehrmals osmanische Angriffe zurückschlug.
general_desc_Matthias Corvinus=Sohn von János Hunyadi, bestieg offiziell im Alter von 15 Jahren den Thron als König von Ungarn. Während seiner Regierungszeit unterdrückte er den Aufstand des Adels, gründete die Ungarische Schwarze Armee und besiegte mehrfach das Osmanische Reich, was Ungarn zu seiner Blütezeit führte.
general_desc_Ivan the Terrible=Großfürst von Moskau, der erste Zar von Russland. Während seiner Regierungszeit führte er viele Reformen durch und entwickelte die Militärmacht Russlands erheblich. In seinen späteren Jahren tötete er versehentlich seinen eigenen Sohn, was schließlich zum Niedergang der Rurik-Dynastie führte.
general_desc_Gonzalo de Cordoba=Berühmter General des spanischen Reiches, Schöpfer des spanischen Tercio. 1503 besiegte er in der Schlacht von Cerignola mit unterlegenen Kräften das französische Heer. Nach dieser Schlacht wurde die spanische Armee zur stärksten Landstreitkraft auf dem europäischen Kontinent.
general_desc_Stefan Dusan=König von Serbien, der während seiner Regierungszeit die byzantinischen Unruhen ausnutzte, um den Großteil Albaniens und Mazedoniens zu erobern, und den 'Dušan-Kodex' verfasste
general_desc_Bertrand du Guesclin=Französischer Nationalheld, bekannt als der 'Adler der Bretagne', von schlichtem Äußeren. Kämpfte tapfer in den frühen Phasen des Hundertjährigen Krieges, wurde schnell anerkannt und mit wichtigen Aufgaben betraut, diente dem französischen König sein Leben lang.
general_desc_Clovis I=Der Gründer des Fränkischen Reiches, der nach seiner Thronbesteigung die fränkischen Stämme erfolgreich vereinigte, das Gebiet Gallien eroberte und die Franken in die Ära der Monarchie führte.
general_desc_Casimir III the Great=König von Polen, der seine Ziele durch Diplomatie statt durch Krieg zu erreichen suchte, die nationale Einheit Polens stark stärkte und Polen zu einer Großmacht in Mitteleuropa im 14. Jahrhundert machte.
general_desc_Vytautas=Großfürst von Litauen, Mitglied des Drachenordens, erweiterte während seiner Regierungszeit ständig sein Territorium und erlangte schließlich den Titel des Königs von Litauen, konnte aber die Krönung nicht vollenden, da die Polen seine Krone abfingen.
general_desc_Afonso Henriques=Der erste König nach der Unabhängigkeit Portugals, der Portugal 1139 zu einem unabhängigen Königreich machte und danach ständig gegen die Mauren kämpfte, um das Territorium des Königreichs Portugal zu erweitern.
general_desc_John II of Byzantium=Der zweite Kaiser der byzantinischen Komnenen-Dynastie, bekannt als 'Johannes der Gute', berühmt für seine Frömmigkeit und Güte während seiner Regierungszeit.
general_desc_Barbarossa Hayreddin=Ein türkischer Pirat des 15. Jahrhunderts, der mit Unterstützung des osmanischen Sultans die Piraten im Mittelmeer vereinte, ständig Städte entlang der Mittelmeerküste überfiel und zeitlebens keine Niederlage auf See erlitt.
general_desc_YueFei=Berühmter General im Kampf gegen die Jin-Dynastie, der sein Leben der Rückgewinnung verlorener Gebiete widmete und mehrfach Truppen zum Sieg gegen überlegene Feinde führte. Seine 'Yue-Familienarmee' war bekannt für ihre strenge Disziplin mit dem Motto 'Lieber erfrieren als Häuser abreißen, lieber verhungern als plündern'.
general_desc_JinWuZhu=Ein berühmter General der Jin-Dynastie, dessen ursprünglicher Name Wanyan Zongbi war, der vierte Sohn von Jin Taizu Wanyan Aguda. Er besiegte nacheinander die Armeen der Liao- und Song-Dynastien, marschierte mit überwältigender Kraft nach Süden, bis er auf seinen Schicksalsgegner Yue Fei traf...

