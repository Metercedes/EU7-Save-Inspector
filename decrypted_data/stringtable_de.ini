;征服国家介绍
;__font_type[font_text_]
conquest_faction_desc_11=Ohne den Schutz des Römischen Reiches ist Britannien der Invasion grausamer germanischer Barbaren ausgesetzt, die das Land plündern und verwüsten. Die Briten sind unter der Führung des heldenhaften König Arthur vereint und entschlossen, diese Eindringlinge aus Britannien zu vertreiben.

conquest_faction_desc_101=Nach vier Jahrhunderten römischer Herrschaft über Britannien seit der Eroberung durch Julius Caesar ist die Stärke des Weströmischen Reiches geschwunden. Um dem Verfall entgegen zu wirken, mussten die Legionen Britanniens in ihre Heimat abgezogen werden. Ohne den Schutz des Weströmischen Reiches müssen die Briten zu den Waffen greifen und sich den Eindringlingen allein stellen.
conquest_faction_desc_102=Die Angelsachsen waren tapfere und tüchtige Krieger. Mit ihren Langbooten plünderten sie häufig die nördlichen Küstenprovinzen des Weströmischen Reiches. Während andere Barbarenstämme um Gallien kämpften, hatten die Angelsachsen ein Auge auf die Insel Britannien geworfen, die den Schutz des Weströmischen Reiches verloren hatte.
conquest_faction_desc_103=Die Westgoten verteidigten einst die Grenze zum Römischen Reich und standen an vorderster Front im Widerstand gegen die Hunnen. Allerdings waren sie mit der Art und Weise, wie die Römer sie behandelten, nicht zufrieden. Infolgedessen erhoben sich die Westgoten und errichteten das Westgotenreich in den weströmischen Gebieten, was unweigerlich zu einem umfassenden Konflikt mit dem Weströmischen Reich führte.
conquest_faction_desc_104=Das Weströmische Reich befindet sich in einer ständigen Krise. Aufgrund seiner schwindenden nationalen Stärke ist es nicht in der Lage, den durch die Barbarenwanderung verursachten Grenzunruhen wirksam zu begegnen. Das einst so glorreiche Reich ist im Begriff zu zerfallen. Doch mit der Krise kommen auch die Chancen und das römische Erbe ist noch immer vorhanden. Solange wir entschlossen sind, können wir das Römische Reich in seiner ganzen Pracht wieder auferstehen lassen.
conquest_faction_desc_105=Die Bretagne ist hauptsächlich von Kelten bevölkert, die einst von der Insel Britannien eingewandert sind. Die Bretagne wird manchmal auch als "Klein-Britannien" bezeichnet. Gegenwärtig herrscht in Gallien Chaos und die Zukunft des Landes ist unklar. Das britische Volk muss bedacht vorgehen, um den Frieden mit den mächtigen Ländern zu wahren und in Gallien zu überleben.
conquest_faction_desc_106=Die salischen Franken waren eine Untergruppe der Franken, die ein Barbarenbündnis mit dem Römischen Reich eingingen, das es ihnen ermöglichte, sich in den Grenzgebieten niederzulassen. Angesichts des Niedergangs des Weströmischen Reiches müssen sich die Salier entscheiden, ob sie weiterhin treu die kaiserliche Grenze bewachen oder die Macht des Weströmischen Reiches in Gallien erben wollen.
conquest_faction_desc_107=Seit langem sind die Franken bestrebt, in die reiche Region Gallien vorzudringen, doch wurden sie stets von den mächtigen Streitkräften des Römischen Reiches daran gehindert. Nun, da sich das Weströmische Reich inmitten eines inneren und äußeren Niedergangs befindet, bietet sich den Franken eine große Chance.
conquest_faction_desc_108=Einer der vielen germanischen Stämme, die aus Nordosteuropa eingewandert sind. Nachdem die Burgunder zum ersten Mal die Schwächung der militärischen Kräfte des Weströmischen Reiches bemerkten, überquerten sie entschlossen den Rhein und drangen in das Gebiet Westroms ein. Dies führte jedoch zu dem unvermeidlichen Ergebnis, dass sie von allen Seiten von weströmischen Streitkräften umzingelt waren.
conquest_faction_desc_109=Alemanni bedeutet "alle Menschen", was bedeutet, dass es sich bei diesem Volk um eine Konföderation unzähliger großer und kleiner germanischer Stämme handelt. Daher sehen sich die Alemannen als Anführer der Germanen und sind verpflichtet, die germanischen Völker gegen das mächtige Weströmische Reich anzuführen.
conquest_faction_desc_110=Als Nachfahren der Sarmaten waren die Alanen einst die mächtigsten Graslandnomaden. Nachdem sie jedoch von den schlagkräftigen Hunnen angegriffen wurden, waren die Alanen gezwungen zu fliehen. Wie andere wandernde Völker suchen die Alanen nun nach Möglichkeiten an der Grenze zum Weströmischen Reich.
conquest_faction_desc_111=Die Ostgoten, die einst an den Ufern des Schwarzen Meeres siedelten, waren das erste germanische Volk, das von den Hunnen überfallen wurde. Angesichts der Übermacht der schlagkräftigen Reiterhorden, hatten sie keine andere Wahl, als sich vorerst zu ergeben. Doch die Ostgoten finden sich nicht mit der Unterwerfung ab. Sie warten auf eine Gelegenheit, sich vollständig von der Unterdrückung durch die Hunnen zu befreien.

conquest_faction_desc_201=Das Volk der Bretagne glaubte an Freiheit und Unabhängigkeit. Selbst im Angesicht des aufstrebenden Königreichs der Westfranken gaben die Bretonen nicht auf. Angeführt von dem tapferen und kämpferischen Erispoe, der als "König der Bretagne" bekannt ist, sind sie entschlossen, die Westfranken bis zum Ende zu bekämpfen.
conquest_faction_desc_202=Nach der Dreiteilung des fränkischen Königreichs durch den Vertrag von Verdun schuf Karl II. das westfränkische Königreich auf der Grundlage der westlichen Territorien des ehemaligen Königreichs. Das westfränkische Königreich erbte den Kern des früheren fränkischen Königreichs, aber auch die verborgenen Probleme des früheren Königreichs: instabile Grenzen und eine mächtige Aristokratie.
conquest_faction_desc_203=Nach der Dreiteilung des fränkischen Königreichs durch den Vertrag von Verdun gründete Lothar I. das mittelfränkische Königreich auf der Grundlage des zentralen Teils des ehemaligen Königreichs. Das mittelfränkische Königreich war zwar kleiner als die beiden anderen Königreiche, verfügte aber über das reichste Gebiet Italiens und berechtigte zum Tragen des Titels "Kaiser der Römer".
conquest_faction_desc_204=Nachdem das fränkische Königreich durch den Vertrag von Verdun in drei Teile geteilt worden war, gründete Ludwig der Deutsche das Ostfränkische Königreich auf der Grundlage des östlichen Gebiets des ursprünglichen Königreichs. Das Ostfränkische Königreich besteht größtenteils aus relativ armen germanischem Gebiet, das erst vor kurzem erobert wurde. Es verfügt jedoch über eine starke Militärmacht und ein großes Entwicklungspotenzial.
conquest_faction_desc_205=Als eines der sieben angelsächsischen Königreiche hatte Wessex die Möglichkeit, ganz England unter der Herrschaft von König Egbert zu vereinen. Mit der Ankunft der Wikinger musste Wessex jedoch den Prozess der Wiedervereinigung aussetzen, um sich gegen die fremden Eindringlinge zu verteidigen.
conquest_faction_desc_206=Mercia, eines der sieben angelsächsischen Königreiche, war einst das mächtigste Königreich in Britannien, und seine Vorherrschaft lässt sich bis zur Herrschaft von Penda zurückverfolgen. Doch der vergangene Ruhm ist nicht mehr. Jetzt muss sich das Königreich Mercia nicht nur vor den Wikingern, sondern auch vor dem vorrückenden Königreich Wessex schützen.
conquest_faction_desc_207=Als eines der sieben angelsächsischen Königreiche war Ostanglien klein und bestand größtenteils aus Sümpfen, was sein Potenzial einschränkte. Daher war es in seiner Geschichte lange Zeit ein Vasallenstaat von Mercia. Doch jetzt hat das Königreich Mercia seine Aufmerksamkeit auf andere Länder gerichtet. Dies ist eine günstige Chance für Ostanglien, sich zu erheben.
conquest_faction_desc_208=Das Königreich Gwynedd ist ein Nachfolgestaat des von den Briten gegründeten Römischen Reiches. Seine Herrscher trugen gewöhnlich den Titel "König der Briten". Der derzeitige König von Gwynedd ist Rhodri der Große. Unter seiner Herrschaft blühte das Königreich Gwynedd auf, wurde stark und vereinigte fast das gesamte Gebiet von Wales.
conquest_faction_desc_209=Das Königreich Northumbria, eines der sieben Königreiche der Angelsachsen, entstand durch den Zusammenschluss zweier kleiner unabhängiger Königreiche, was zu einer langen Periode politischer Rivalität und Streitigkeiten im Land führte. Als die Wikinger in Britannien einfielen, gelang es dem Königreich Northumbria nicht, Einheit zu zeigen.
conquest_faction_desc_210=Das Königreich Alba wurde gemeinsam von den Gälen und den Pikten gegründet. Der derzeitige König, Kenneth I., ist der Gründer des Königreichs. Unter der Führung dieses fähigen Monarchen wehrte das Königreich Alba alle Arten von eindringenden Feinden ab und wurde zum Oberherrn von Nordbritannien.
conquest_faction_desc_211=Das Königreich Gael war ein vereinigtes Königreich, das sich aus vielen kleinen Königreichen in Irland zusammensetzte und dessen Anführer als Oberster König von Irland bezeichnet wurde. Obwohl Irland isoliert war, blieb es nicht von den Wikingern verschont. Die gälischen Königreiche mussten sich unter dem Obersten König vereinen, um die Eindringlinge aus Irland zu vertreiben.
conquest_faction_desc_212=Die Ausbreitung des slawischen Volkes lässt sich bis ins 5. Jahrhundert n. Chr. zurückverfolgen. Vielleicht war es zu dieser Zeit, als sich die Westslawen von den anderen slawischen Stämmen abspalteten und zu einer unabhängigen Nation wurden. Durch die bittere Kälte abgehärtet, sind die Westslawen unverwüstlich und hartnäckige Gegner auf dem Schlachtfeld.

conquest_faction_desc_301=Der byzantinische Kaiser Justinian I. ist entschlossen, das Römische Reich in eine neue Blüte zu führen und alle von den Barbaren überrannten Gebiete des Reiches zurückzugewinnen. Als vertrauenswürdigster General des Kaisers übernimmt Belisarius die Aufgabe der Rückeroberung. Er wird die besten Legionen des Reiches nach Nordafrika führen und sich auf den Weg machen, um den Ruhm des Römischen Reiches wiederherzustellen.
conquest_faction_desc_302=Die Vandalen waren einer der germanischen Barbarenstämme. Nach einer langen und beschwerlichen Wanderung drangen sie schließlich in die nordafrikanischen Provinzen des Römischen Reiches ein und gründeten das Königreich der Vandalen. Seit der Gründung des Königreichs haben die Vandalen viele Versuche des Byzantinischen Reichs vereitelt, ihr verlorenes Land in Nordafrika zurückzuerobern. Dieses Mal werden sie keine Ausnahme machen.
conquest_faction_desc_303=Nach dem Untergang des Weströmischen Reiches führte Theoderich der Große die Ostgoten in den Apennin und gründete auf dem Kernland des ehemaligen Reiches das Reich der Ostgoten. Heute, nach dem Tod Theoderichs des Großen, befindet sich das Reich der Ostgoten in einem Sumpf von Bürgerkriegen und ist der Bedrohung mächtiger Feinde ausgesetzt.
conquest_faction_desc_304=Nach dem Untergang des Weströmischen Reiches durch die Invasion der Barbaren erlebte auch das Byzantinische Reich, der östliche Nachfolger des ursprünglichen Römischen Reiches, eine ein halbes Jahrhundert währende Periode der Stille und des Niedergangs. Jetzt blüht das Byzantinische Reich unter der inspirierenden Herrschaft von Kaiser Justinian I. endlich wieder auf und ist auf dem Weg zu neuer Größe.
conquest_faction_desc_305=Das Westgotenreich, das erste germanische Königreich in Gallien, wurde vom aufstrebenden Frankenreich besiegt und so mussten die übrigen Westgoten über die Pyrenäen nach Süden ziehen. Nach Jahren des Winterschlafs erlangte das Westgotenreich seine Macht zurück und richtete seine Augen wieder auf Gallien, wo es sich erneut mit den Franken messen wollte.
conquest_faction_desc_306=Während viele germanische Wandervölker um die Aufteilung der Gebiete des Weströmischen Reiches kämpften, zogen die weisen Sueben nach Iberien und gründeten das Königreich der Sueben. Doch die guten Zeiten währten nicht lange. Denn als die Westgoten ebenfalls auf die iberische Halbinsel zogen, war der Konflikt zwischen dem Königreich der Sueben und dem der Westgoten unausweichlich geworden.
conquest_faction_desc_307=Als einheimisches Volk der Iberer haben die Vasconier schon immer gegen verschiedene Invasoren gekämpft, vom Römischen Reich bis hin zu verschiedenen germanischen Barbaren. Ganz gleich, wie mächtig und kriegerisch ihre Feinde sind, die Vasconier geben niemals ihre Entschlossenheit auf. Sie kämpfen und streben nach Unabhängigkeit. 
conquest_faction_desc_308=Das Fränkische Königreich war ein germanisches Königreich, das von Chlodwig I., dem Anführer der salischen Franken, gegründet wurde, der alle fränkischen Stämme vereinigte. Als ehemaliger barbarischer Verbündeter des Weströmischen Reiches übernahm das Fränkische Reich die Macht und stieg schnell zum Hegemon von Gallien auf.
conquest_faction_desc_309=Die Burgunder hatten einen steinigen Weg vor sich: Sie überquerten den Rhein und wurden von den Römern und Hunnen angegriffen, bevor sie schließlich das Königreich Burgund in Gallien gründeten. Doch die Burgunder fanden keine Ruhe, denn das benachbarte Fränkische Reich schien es auf ihr Gebiet abgesehen zu haben.
conquest_faction_desc_310=Die Bretonen setzen sich hauptsächlich aus Kelten zusammen, die von der Insel Britannien eingewandert sind. Ob es das Weströmische Reich damals oder das Fränkische Königreich heute ist, die Bretonen mussten sich immer mit einer Macht arrangieren, die weit über ihre eigene hinausgeht. Dennoch unterwarfen sich die Bretonen nie.
conquest_faction_desc_311=Eines der von germanischen Wandervölkern gegründeten Königreiche. Im Gegensatz zu den anderen germanischen Königreichen nahm das Königreich Thüringen nach dem Zusammenbruch des Hunnenreiches aktiv viele hunnische Sklaven auf. Daher verfügte das Königreich über eine herausragende militärische Macht, was es für Nachbarländer zu einem gefürchteten Gegner machte.
conquest_faction_desc_312=Die reichen Gebiete des Weströmischen Reiches waren bereits von anderen Wandervölkern aufgeteilt worden, als die Langobarden nach all den Entbehrungen endlich einen sicheren Platz fanden. Allerdings mussten sich die Langobarden an das Byzantinische Reich und die ostgotischen Königreiche wenden und versuchen, zwischen beiden Reichen zu vermitteln und mit ihnen zu koexistieren.
conquest_faction_desc_313=Die aus den ostgermanischen Goten hervorgegangenen Gepiden sind sehr tapfer und kampferprobt. Nach dem Tod von Attila waren die Gepiden die ersten, die sich gegen die Hunnen erhoben und schließlich deren Reich stürzten. Jetzt, da die Gepiden Nachbarn des Byzantinischen Reiches sind, müssen sie im Umgang mit diesem mächtigen und alten Reich vorsichtig sein.

conquest_faction_desc_401=Seit der Thronbesteigung von Alexius I. hat die Familie Komnenos das Byzantinische Reich mehr als ein Jahrhundert lang regiert. Dank der außerordentlichen Anstrengungen der früheren Kaiser aus der Familie Komnenos hat sich das Byzantinische Reich von der Dekadenz zur Blüte entwickelt und den Schatten der Turkinvasion überwunden. Es wird erwartet, dass es Anatolien zurückerobert und den Glanz des Römischen Reiches wiedererlangt.
conquest_faction_desc_402=Nach der Teilung des Seldschukenreichs trat Kilij Arslan I. die Nachfolge seines Regimes in Anatolien an. Das Sultanat Rum und das Byzantinische Reich kämpften viele Male um Anatolien. Obwohl die beiden Länder derzeit einen seltenen Frieden halten, sollte die Entschlossenheit des Byzantinischen Reiches zur Rückeroberung des Heimatlandes nie außer Acht gelassen werden.
conquest_faction_desc_403=Es wurde von den Armeniern gegründet, die aufgrund der Invasion des Seldschukenreiches nach Kilikien geflohen waren und war als "Armenisches Königreich von Kilikien" bekannt. Wenn dieses von mächtigen Feinden umgebene Königreich in Anatolien überleben will, muss es sich mit den Kreuzfahrerstaaten anfreunden und deren Macht ausnutzen.
conquest_faction_desc_404=Bey bezieht sich auf den "Führer" in Turki. Das Byzantinische Reich verlor die Kontrolle über Anatolien durch die Invasion des Seldschukenreiches. Zahlreiche  Turkstämme zogen in die Region und gründeten die anatolischen Beyliks, die von einer Koalition von Stammesführern regiert wurden.
conquest_faction_desc_405=Die Gründung des Königreichs Georgien beendete das Chaos, das lange Zeit in der georgischen Region geherrscht hatte und in dem viele rivalisierende und ungleiche Parteien existierten. Heute, unter der Herrschaft von Königin Tamar, ist das Königreich Georgien wohlhabend und stark. Es könnte es in der Lage sein, ein mächtiges transkaukasisches Reich zu errichten, wenn es diese Gelegenheit nützt und nach Süden expandiert.
conquest_faction_desc_406=Die Dynastie wurde von einem ehemaligen Gouverneur von Aserbaidschan im Seldschukenreich gegründet. Der Herrscher der Eldiguziden erbte den Titel "Atabeg", d. h. "Lehnsherr" und "Konsul des Sultans". Als das Seldschukenreich aufgrund von Unruhen geschwächt war, nutzten die Atabeg der Eldiguziden die Gelegenheit, den Sultan zu entmachten und übernahmen so die Kontrolle über das Reich.
conquest_faction_desc_407=Die Zengiden-Dynastie war die entschlossenste Nation im Kampf gegen die Kreuzzüge. Der letzte König Nur ad-Din besiegte die Kreuzfahrer mehrmals, wodurch das Vordringen der Kreuzfahrerstaaten in die westasiatische Region wirksam eingedämmt wurde. Da die Zengiden-Dynastie nun sowohl von den Kreuzfahrerstaaten als auch von der neu entstandenen Ayyubiden-Dynastie herausgefordert wird, muss sie in diplomatischen Fragen vorsichtiger sein und sollte keinen Krieg an allen Fronten riskieren.
conquest_faction_desc_408=Nach der Umayyaden-Dynastie ist die Abbasiden-Dynastie die zweite Erbdynastie des arabischen Reiches. Die einst blühende Dynastie ist nun im Niedergang begriffen und wurde sogar zu einer von den Türken kontrollierten Marionette. Wenn sie ihren früheren Ruhm wiedererlangen will, muss sie den Niedergang des Seldschukenreiches nutzen.
conquest_faction_desc_409=Ein Kreuzfahrerstaat, der von Bohemond von Tarent nach der Eroberung der Stadt Antiochia während des Ersten Kreuzzuges gegründet wurde. Als strategisch wichtige Stadt und wichtiges Bindeglied zwischen den Kreuzfahrern und dem byzantinischen Reich muss das Fürstentum Antiochia zunächst seine Stadtverteidigung verbessern.
conquest_faction_desc_410=Der von Bertrand von Toulouse gegründete Kreuzfahrerstaat wurde vom Königreich Jerusalem unterstützt, dessen Zentrum die Stadt Tripolis ist. Die Grafschaft Tripolis befindet sich zwischen dem Königreich Jerusalem und dem Fürstentum Antiochia. Nur wenn der Staat mit diesen beiden Ländern verhandelt und ein starkes Angriffs- und Verteidigungsbündnis eingeht, kann er dem Ansturm der Ayyubiden-Dynastie widerstehen.
conquest_faction_desc_411=Als Balduin IV. ist er in der Lage, politische Streitigkeiten und militärische Probleme mit seiner Gerissenheit zu lösen. Er kann nicht nur ein Gleichgewicht zwischen den verschiedenen Parteien im Königreich herstellen, um die politische Stabilität zu wahren, sondern auch den mächtigen Saladin militärisch zurückzuschlagen. Unter der Herrschaft von Baldwin IV. wird das Königreich Jerusalem von Tag zu Tag stärker und entwickelt sich zum Zentrum der Kreuzfahrerstaaten.
conquest_faction_desc_412=Das von Ägypten ausgehende Reich wurde nach dem Ende der Fatimiden-Dynastie gegründet und stand unter der Herrschaft des kurdischen Fürsten Saladins. Saladin stellte seine militärischen Fähigkeiten und seine Führungsqualitäten unter Beweis, als er die Armee gegen die Invasion der Kreuzfahrer anführte. Unter der Leitung dieses meisterhaften Herrschers expandiert das ägyptische Reich aggressiv und zeigt die Tendenz zur Einigung der islamischen Welt.
conquest_faction_desc_413=Richard, Herzog von Aquitanien, ist der zweite Sohn König Heinrichs II. von England und alleiniger Thronfolger. Er verfügt über große militärische Führungsqualitäten und ist ein tapferer Kämpfer. Der endlosen Bürgerkriege mit seinem Vater und seinen Brüdern überdrüssig, beschloss Richard, dem Ruf des Heiligen Stuhls zu folgen und eine Expeditionstruppe zur Unterstützung der Kreuzfahrerstaaten im Osten anzuführen.

conquest_faction_desc_501=Seit der Invasion der Wikinger in Britannien wurden die Gälen, die auf der Insel Irland leben, ständig von den Nordmännern heimgesucht. Jetzt sind die Gälen unter dem Hochkönig vereint und schwören, die Wikinger aus ihrer Heimat zu vertreiben und Irland zu vereinen.
conquest_faction_desc_502=Eine Gruppe von Wikingern, die von Skandinavien nach Britannien gekommen war, besetzte Nordengland und die Ostküste Irlands. Die Eroberung Britanniens durch die Nordmänner verlief sehr schwierig, da der Widerstand der Ureinwohner immer entschlossener wurde.
conquest_faction_desc_503=Das auch als angelsächsisches England bekannte Königreich wurde vom Königreich Wessex gegründet, nachdem es die Region England geeint hatte. Als der Thron dieses Königreichs übergeben wurde, fielen die Wikinger erneut in Northumbria ein. Edmund I. musste diese Eindringlinge vertreiben, um England erneut zu vereinen.
conquest_faction_desc_504=Als einer der von den Briten gegründeten Nachfolgestaaten des Römischen Reiches ist jeder König des Königreichs Gwyneth bestrebt, die Stärke des Königreichs auszubauen. Die Könige hegen die Hoffnung, eines Tages die Kontrolle über Britannien zurückzuerlangen, so dass der Titel "König von Britannien" seinem Namen gerecht wird.
conquest_faction_desc_505=Ein Königreich, das von König Kenneth I. von Dalriada nach der Annexion der Pikten gegründet wurde. Seit der Gründung des Königreichs Alba kämpfte es hartnäckig gegen verschiedene Invasoren. Doch weder die Wikinger noch die Engländer konnten das Königreich Alba in die Knie zwingen.
conquest_faction_desc_506=Der Nachfolger des Königreichs Asturien, eines christlichen Königreichs mit León als Hauptstadt. Als größtes Königreich auf der spanischen Halbinsel schulterte das Königreich León die Führung der anderen christlichen Nationen gegen die Expansion des Kalifats von Cordoba.
conquest_faction_desc_507=Die Basken gründeten ein unabhängiges Königreich mit Pamplona als Zentrum. Die Einwohner von Pamplona, die das Königreich seit seiner Gründung erfolgreich gegen das fränkische Königreich verteidigt hatten, wollten sich nicht von dem ebenso mächtigen Kalifat von Córdoba abwenden.
conquest_faction_desc_508=Das bretonische Königreich Barcelona war ursprünglich ein vom fränkischen Königreich gegründetes Grenzgrafentum mit Barcelona als Zentrum. Aber da im westfränkischen Königreich interne Unruhen tobten und das Königreich immer weniger in der Lage war, die Grafen von Barcelona zu unterstützen, wurden die Bindungen des bretonischen Königreichs an das fränkische Königreich von Tag zu Tag schwächer.
conquest_faction_desc_509=Die Nachfahren der Umayyaden-Dynastie errichteten auf der Iberischen Halbinsel ein islamisches Königreich, das als Kalifat von Cordoba bekannt wurde, nachdem Abd ar-Rahman III. sich zum Kalifen ernannt hatte. Gegenwärtig wird das Reich unter der Herrschaft dieses "ewigen Siegers" immer stärker und steht kurz davor, die gesamte Iberische Halbinsel zu vereinen.
conquest_faction_desc_510=Die Dynastie wurde von dem arabischen Edelmann Idris gegründet, nachdem er die lokalen Berberstämme integriert hatte. Nun, da das Königreich angesichts ziviler Unruhen und den neugierigen Augen des mächtigen Nachbarn im Norden im Niedergang begriffen ist, muss das Königreich seine Diplomatie sorgfältig handhaben, oder es riskiert seinen Untergang.
conquest_faction_desc_513=Nach dem Tod des großen Alan I. kehrten die Wikinger zurück und eroberten den größten Teil der Bretagne. Nachdem Alan II. fast 30 Jahre lang gegen die Wikinger gekämpft hatte, gelang es ihm, die nordischen Piraten zu vertreiben und das Herzogtum Bretagne wieder zu errichten.
conquest_faction_desc_514=Nachdem das fränkische Königreich durch den Vertrag von Verdun in drei Teile geteilt worden war, erbte das westfränkische Königreich die westlichen Territorien des ursprünglichen Königreichs. Nun, da die karolingische Dynastie nicht mehr an der Macht war, die Vasallen im Land mächtiger geworden waren und es sogar Rebellen wie Hugo gab, die es wagten, die königlichen Territorien an sich zu reißen, schien der Weg zur Wiederbelebung des westfränkischen Königreichs äußerst schwierig.
conquest_faction_desc_515=Lange Zeit wurde die untere Seine-Region häufig von den Wikingern angegriffen, so dass das westfränkische Königreich die Region dem Wikingerhäuptling Rollo als Gegenleistung für Frieden und die Loyalität dieses Wikingerstammes überließ. Rollo gründete hier das Herzogtum Normandie mit Rouen als Zentrum.
conquest_faction_desc_516=Obwohl der Herzog von Franken und Graf von Paris Ludwig IV. den Thron von Westfranken veerbte, wurde die Stärke seiner Familie von Ludwig IV. gefürchtet, der seinerseits entschlossen war, seine königliche Macht zu stärken.
conquest_faction_desc_517=Der Name Aquitanien geht auf die gallische Provinz Aquitanien zur Zeit des Römischen Reiches zurück. Die römische Kultur, die in Aquitanien vorherrschte, machte es unter den westfränkischen Königreichen unverwechselbar. So konnte sich das Fürstentum Aquitanien eine gewisse Unabhängigkeit bewahren.
conquest_faction_desc_518=Das Grafenreich wurde von der karolingischen Dynastie mit Toulouse als Zentrum gegründet. Nach dem Sturz der karolingischen Dynastie ist die Grafschaft Toulouse zwar nominell dem westfränkischen Königreich unterstellt, aber das westfränkische Königreich ist nicht mehr in der Lage, wirksam in die Grafschaft Toulouse einzugreifen.
conquest_faction_desc_519=Das Königreich entstand durch den Zusammenschluss der ober- und niederburgundischen Königreiche und wird daher auch das Königreich der beiden Burgunder genannt, benannt nach der Hauptstadt, die in Arles lag. Das Königreich Arles lag zwischen dem ost- und dem westfränkischen Königreich und musste sich gegenüber diesen beiden Großmächten in Acht nehmen.
conquest_faction_desc_520=Seit seiner Thronbesteigung war König Otto I. von Ostfranken bestrebt, die Macht des Königs zu stärken und auf seiner Autorität über die Vasallen zu bestehen, was zu vielen Konflikten zwischen dem Königreich und den Fürstentümern führte und sogar mehrere Rebellionen auslöste. Otto I. war jedoch der festen Überzeugung, dass er den Ruhm des fränkischen Königreichs nur dann wiederherstellen konnte, wenn er alle Kräfte des Königreichs unter seinem eigenen Kommando vereinte.
conquest_faction_desc_521=Der Vertrag von Verdun teilte das fränkische Reich in drei Königreiche auf: West-, Mittel- und Ostfranken. Aber nur 12 Jahre später wurde das mittelfränkische Königreich wieder in drei Teile geteilt und das Herzogtum Lotharingien entstand. Das Herzogtum war von den westlichen und östlichen Königreichen begehrt, weil es die Region Austrasia erbte, aus der die Franken hervorgegangen waren.
conquest_faction_desc_522=Es ist auch als Herzogtum Franken bekannt, eines der autonomen Herzogtümer des ostfränkischen Königreichs. Das Herzogtum Franken stand nach dem Aussterben der ostfränkischen Karolinger kurzzeitig unter der Kontrolle des Herzogs von Franken. Vielleicht war das Herzogtum Franken deshalb nur widerwillig bereit, sich Otto I. von Sachsen zu unterwerfen.
conquest_faction_desc_523=Als eines der autonomen Herzogtümer des ostfränkischen Königreichs geht der Name Bayern auf das Römische Reich zurück, als die lokalen Stämme als "Leute aus Böhmen" bezeichnet wurden. Nach dem Untergang der Karolinger-Dynastie musste ein neues Herzogtum Bayern geschaffen werden, um die Herrschaft der Dynastie in der Region fortzusetzen.
conquest_faction_desc_524=Im Jahr 774 n. Chr. eroberte Karl der Große das Königreich Lombardei und gliederte dessen nördlichen Teil direkt in das Königreich der Franken ein, aus dem später das Königreich Italien hervorging. Nachdem das fränkische Königreich nun schon lange zerfallen ist, hat das Königreich Italien endlich seine Unabhängigkeit erlangt und steht nicht mehr unter der Kontrolle eines anderen Landes.
conquest_faction_desc_526=Das Herzogtum Benevento entstand als Herzogtum mit Zentrum in Benevento in Süditalien, nachdem die Langobarden Italien erobert hatten. Nach der Annexion des langobardischen Königreichs durch das fränkische Königreich überlebte das Herzogtum Benevento aufgrund der Trennung des Kirchenstaates unabhängig.
conquest_faction_desc_527=Als das Weströmische Reich durch eine barbarische Invasion unterging, flohen die Bewohner der norditalienischen Küste an die Lagune und gründeten dort Siedlungen, aus denen sich die Republik Venedig entwickelte. Als Stadtstaat, der durch den Seehandel florierte, brauchte Venedig eine starke Flotte, um seine maritimen Vorteile zu verteidigen.
conquest_faction_desc_528=Seit dem Aufstieg von Justinian dem Großen schien dem Byzantinischen Reich die Luft auszugehen. Fast 400 Jahre lang wurde das Reich von inneren und äußeren Problemen geplagt und seine Länder gingen eines nach dem anderen verloren. Aber eine große Nation geht nicht für immer unter. Nach der Herrschaft der vorangegangenen makedonischen Kaiser erlangte das Byzantinische Reich seine Macht zurück und war bereit, seine verlorenen Gebiete wiederzuerlangen.
conquest_faction_desc_529=Im 7. Jahrhundert n. Chr. lud das Byzantinische Reich die Kroaten ein, gemeinsam gegen die marodierenden Awaren nach Dalmatien zu ziehen. Die Kroaten ließen sich in Dalmatien nieder und entwickelten sich allmählich zum Fürstentum Kroatien.
conquest_faction_desc_530=Das serbische Regime in Dalmatien, das junge serbische Fürstentum, sah sich mit der Gefahr einer bulgarischen Invasion konfrontiert. Vielleicht war eine Zusammenarbeit mit dem Byzantinischen Reich, das mit dem Kampf gegen die Bulgaren beschäftigt war, eine gute Option.
conquest_faction_desc_531=Das bulgarische Reich befindet sich seit seiner Gründung seit Jahren im Krieg mit dem byzantinischen Reich. Selbst eine alte Macht wie Byzanz musste sich der militärischen Stärke der Bulgaren unterwerfen. Doch der Wohlstand geht zwangsläufig zurück und nun leidet das bulgarische Reich unter einem Bürgerkrieg. Die ehemals Besiegten um es herum haben sich verschworen, um die Gelegenheit zum Gegenangriff zu nutzen.
conquest_faction_desc_532=Auch bekannt als die dänischen Deutschen, womit gewöhnlich die in Südskandinavien lebenden Wikingerstämme gemeint sind. Im Vergleich zu anderen Wikingerstämmen, die darauf erpicht waren, das Meer zu plündern, zog es diese Gruppe von Wikingern vor, ihre Heimat aktiv zu entwickeln und dort zu verweilen. Doch sie wurden gezwungen, sich direkt mit dem mächtigen ostfränkischen Königreich auseinandersetzen.
conquest_faction_desc_533=Der sächsische Adlige Giraud I. errichtete die Grenzmarkgrafschaft im östlichen Teil des ostfränkischen Königreichs. Als der vertrauenswürdigste Untergebene des ostfränkischen Königs Otto I. war Giraud I. dafür verantwortlich, die Stabilität der Ostgrenze des Königreichs zu bewahren und das Territorium des Königreichs so weit wie möglich nach Osten auszudehnen.
conquest_faction_desc_534=Auch bekannt als das böhmische Herzogtum, war es ein von den Tschechen des Großmährischen Herzogtums errichtetes Regime. Obwohl das Fürstentum Böhmen eng mit dem ostfränkischen Königreich zusammenarbeitete, um die Unabhängigkeit vom Großmährischen Herzogtum zu erlangen, blieb das Fürstentum Böhmen schließlich im Krieg mit dem ostfränkischen Königreich um die Unabhängigkeit.
conquest_faction_desc_535=Das Wort Polen leitet sich von dem alten slawischen Wort für "einfaches Volk" ab, was die Umgebung, in der die Polen leben, gut wiedergibt. Angesichts der Ausdehnung des ostfränkischen Königreichs nach Osten bestand die einzige Möglichkeit für die Polen darin, sich zusammenzuschließen, wenn sie ihre Heimat vor einer Invasion dieser Übermacht bewahren wollten.
conquest_faction_desc_536=Als die Magyaren im 9. Jahrhundert n. Chr. aus den Steppen Osteuropas in das Karpatenbecken zogen, verdienten die Neuankömmlinge in Mitteleuropa ihren Lebensunterhalt mit der Ausplünderung der umliegenden Länder. Nun, da die Länder immer wachsamer gegenüber ihren neuen Nachbarn wurden, mussten die Magyaren ihre Gewohnheiten, die sie aus den Steppen mitgebracht hatten, ändern.
conquest_faction_desc_538=Die Petschenegen stammten vom westtürkischen Stamm der Oguz ab und waren kurzzeitig dem Chasaren-Khanat unterstellt. Zu Beginn des 10. Jahrhunderts n. Chr. zogen die Petschenegen nach Westen in das Don-Tal und übernahmen die Autorität des Khasar-Khanats in der Region.
conquest_faction_desc_539=Das Königreich Iberien war einst ein Vasallenstaat des Byzantinischen Reiches, aber aufgrund des Aufstiegs und der Invasion des Arabischen Reiches war das Königreich Iberien gezwungen, dem Arabischen Reich die Treue zu schwören. Jetzt, da sich das arabische Reich mitten in einem Bürgerkrieg befindet und keine Zeit hat, sich um andere Belange zu kümmern, kann das Königreich Iberien die Gelegenheit ergreifen, sich mit seinen alten Herren anzufreunden und die arabische Kontrolle ein für alle Mal loszuwerden.
conquest_faction_desc_540=Als altes Königreich, das seit der Zeit vor Christus existiert, ist die Geschichte des armenischen Königreichs voller Schwierigkeiten, da sein Gebiet von den Persern, Römern und Arabern besetzt und beherrscht wurde. Dennoch ließen die Armenier keine Gelegenheit aus, ihr Königreich unabhängig zu machen.
conquest_faction_desc_541=Nachdem sie den Niedergang der Abbasiden-Dynastie erkannt hatten, ließ sich Abdullah, der ehemalige Gouverneur von Mossul, in der Stadt nieder und gründete das Emirat von Mossul. Fortan nannte er sich selbst Emir, wodurch die Hamdani-Dynastie entstand.
conquest_faction_desc_542=Eines der Königreiche, die sich vom arabischen Reich abspalteten, war die ägyptische Dynastie, die von Ikhshid gegründet wurde, einem türkischen General der Abbasiden-Dynastie. Die Ikhshid-Dynastie konkurriert derzeit mit der Hamdani-Dynastie um die Kontrolle über Syrien, dessen Besitz über die Autorität der beiden Königreiche in der arabischen Welt entscheiden wird.

