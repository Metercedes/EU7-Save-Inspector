campaign_desc_601=Das neue Millennium beginnt mit einem immer weiter expandierendem Islamischen Reich, welches auf bestem Wege zur Weltvorherrschaft ist. Das Oströmische Reich wird zu einer bedrohungsvollen Macht, während der Rest Europas unter den Konsequenzen der Pest leidet. Zur selben Zeit werden die Nachkommen der Wikinger zu einer Plage Westeuropas, welche über den Aufstieg oder Fall Nationen entscheiden. Einige von ihnen landen an den Küsten Britanniens, aber selbst das Mittelmeer sollte nicht verschont bleiben. Eine niedere Familie, das Haus von Hauteville,  begab sich auf eine Reihe von Sagen, die die Geschichte prägen sollte.
