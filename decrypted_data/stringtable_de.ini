stage_intro_2151=Im Jahr 376 n. Chr. suchten die Westgoten Zuflucht vor den einfallenden Hunnen im Römischen Reich. Nachdem sie die Donau überquert hatten, kam es jedoch zu zahlreichen Konflikten mit den Römern. Schließlich kämpften die beiden Seiten in Marcianopolis gegeneinander.
stage_intro_2152=Nach der Plünderung der Donauprovinzen bereiteten sich die aufständischen Goten 378 n. Chr. darauf vor, gemeinsam mit anderen Barbaren in den Balkan einzufallen. Der römische Kaiser Valens beschloss, den Kampf selbst in die Hand zu nehmen, um der Rebellion Herr zu werden. Doch mangelnder Zusammenhalt unter seinen Soldaten gefährdete die Niederschlagung erheblich.
stage_intro_2153=Im Jahr 402 n. Chr. drangen die Westgoten unter der Führung von König Alarich weiter in das Hinterland des Weströmischen Reiches ein. Bald darauf umzingelten sie die wichtige Stadt Mailand, in der Kaiser Honorius residierte. In großer Bedrängnis befahl Honorius seinem Feldherrn Stilicho, der sich zu dieser Zeit im Norden aufhielt, seine Truppen nach Süden zu führen und das Reich zu verteidigen.
stage_intro_2154=Im Jahr 410 n. Chr. wurde Alarich am zur Verhandlung mit Kaiser Honorius vereinbarten Treffpunkt von römischen Truppen angegriffen. Diese Tat veranlasste ihn, die Verhandlungen mit dem Weströmischen Reich abzubrechen und die Stadt Rom zu belagern, die nun kurz vor dem Zusammenbruch zu stehen schien.
stage_intro_2155=Im Jahr 419 n. Chr. geriet das Königreich der Sueben, das seit kurzem mit dem Weströmischen Reich verbündet war, häufig mit dem benachbarten Vandalenreich wegen territorialer Ansprüche an der Grenze aneinander. In seinem starken Eroberungsdrang beschloss König Hermeric von Sueben, die Initiative zu ergreifen und in das Gebiet der Vandalen einzudringen.
stage_intro_2156=Im Jahr 439 n. Chr. führte Gaiserich seine Armee über die Straße von Gibraltar und besetzte acht Jahre lang den größten Teil des Territoriums des Weströmischen Reiches in Nordafrika. Nach fast fünf Jahren des Friedens mit dem Weströmischen Reich nahm Gaiserich Karthago ins Visier, die drittgrößte Stadt des Römischen Reiches.
stage_intro_2157=Im Jahr 451 n. Chr. nutzte der ehrgeizige Hunnenkönig Attila einen Skandal am weströmischen Hof aus, um Truppen zur Invasion Galliens zu entsenden. Der römische Feldherr Aetius hielt sich zu dieser Zeit in Gallien auf und nutzte diese Gelegenheit zur Bildung einer Koalition mit den barbarischen Königreichen Galliens, um gegen Attila bestehen zu können.
stage_intro_2158=Im Jahr 455 n. Chr. usurpierte Maximus den Thron, indem er Kaiser Valentinian III. ermordete, wodurch das Bündnis zwischen Westrom und dem Vandalen-König Gaiserich zerbrach. Nachdem Gaiserich von Eudoxia, der Witwe Valentinians III., einen Hilferuf erhalten hatte, schickte der Vandalen-König Truppen zum Angriff gegen Italien.
stage_intro_2251=Im Laufe des 6. Jahrhunderts erkannten die europäischen Länder die Bedeutung der Kavallerie. Im Jahr 530 griffen die Perser das Byzantinische Reich an. Außerhalb der Stadt Dara zog die schwer gepanzerte Kavallerie der sassanidischen Armee ihre Schlachtreihen auf.
stage_intro_2252=Justinian I. versuchte, Roms früheren Ruhm wiederherzustellen. Nachdem Gelimer den Thron bestiegen und sich zum Herrscher des Vandalenreiches aufgeschwungen hatte, erklärte Justinian I. den Vandalen den Krieg. Im Jahr 533 n. Chr. führte Belisarius Truppen nach Nordafrika und marschierte in Richtung Karthago.
stage_intro_2253=Nach dem großen Sieg von Byzanz in der Schlacht von Ad Decimum besetzten Belisarius und sein Heer Karthago. König Gelimer, der sich westlich von Karthago aufhielt, suchte Hilfe bei seinem Bruder und sammelte sein Heer, um Karthago zurückzuerobern.
stage_intro_2254=Nach der Rückeroberung Nordafrikas wandte Justinian I. seine Aufmerksamkeit dem italienischen Raum zu. Im Jahr 535 n. Chr. führte Belisarius sein Heer zu einem weiteren Feldzug, um Rom einzunehmen und die italienische Region für seinen Kaiser zurückzuerobern.
stage_intro_2255=Nach der Eroberung Roms marschierte Belisarius mit seinen Truppen nach Ravenna. Die Hauptstadt des ostgotischen Königreichs würde bald einem massiven Angriff des byzantinischen Heeres ausgesetzt sein.
stage_intro_2256=Aufgrund der Expansion der Ostgoten unter ihrem König Totila, schickte Justinian I. Belisarius zurück nach Italien. Im Jahr 546 n. Chr. drangen die Truppen Totilas nach Rom vor und umzingelten die Stadt.
stage_intro_2257=Totilas fortgesetzte Aggression in Italien fügte Byzanz schwere Verluste zu. Außerdem plante er eine Seeblockade, um eine weitere Einflussnahme und Versorgung aus Byzanz zu verhindern. Dieses Vorgehen verärgerte Justinian I. zutiefst.
stage_intro_2258=Um die Kontrolle über Italien wiederzuerlangen, beschloss Justinian I., seinen Feldherren Narses nach Italien zu schicken. Obwohl Totila in der Unterzahl war, ergriff er die Initiative und griff Narses' Truppen an.
stage_intro_2259=Es erwies sich für die Goten als schwierig, den von Narses befehligten Truppen Widerstand zu leisten. Der Ostgotenkönig beschloss, die Franken und Alemannen um Hilfe zu bitten, in der Hoffnung, dass sie nach Italien eindringen und weitere Vorstöße der byzantinischen Armee verhindern könnten.
stage_intro_2260=Im Jahr 559 n. Chr. überschritt eine Gruppe von Hunnen die Grenze und verübte in den Außenbezirken von Konstantinopel mutwillig Gräueltaten, was für König Justinian I. eine große Demütigung darstellte. Er rief Belisarius noch einmal zu sich und gab ihm einen letzten Auftrag.
stage_intro_2351=Die Ankunft der Angelsachsen versetzte die Ureinwohner Britanniens in Panik, die sich gezwungen sahen, gegen einen gut bewaffneten und gut ausgebildeten Feind zu den Waffen zu greifen.
stage_intro_2352=El, der Anführer des südsächsischen Stammes, führte sein Volk erfolgreich an die Südküste der britischen Inseln, doch ihr Marsch ins Landesinnere verlief nicht reibungslos. Sie stießen auf den hartnäckigen Widerstand der Einheimischen, so dass es El bald an Truppen mangelte und er um Verstärkung von den Stämmen in der Heimat bat.
stage_intro_2353=Unter dem Einfluss des jahrelangen Konflikts begannen sich die verstreuten Stämme Britanniens zu vereinigen und ihre eigenen Königreiche zu gründen, was jedoch nicht zu Frieden und Stabilität führte. Die Zwietracht entwickelte sich allmählich zu einem großen und brutalen Krieg zwischen Königreichen, der vom Königreich Northumbria ausgelöst wurde.
stage_intro_2354=Im Jahr 633 n. Chr. war das Königreich Northumbria unter Edwin der mächtigste Staat in England. Dies beunruhigte dessen Nachbarn und veranlasste König Cadwallon von Gwyneth dazu, ein Bündnis mit dem Königreich Mercia einzugehen und in das Königreich Northumbria einzufallen.
stage_intro_2355=Auch wenn die Invasion der Königreiche Gwyneth und Mercia zunächst erfolgreich abgewehrt wurde, wurde das Königreich Northumbria verwüstet und eine Zeit lang geteilt. Im Jahr 634 n. Chr. fiel König Cadwallon von Gwyneth erneut in das Königreich Northumbria ein.
stage_intro_2356=Oswalds Rückkehr und seine Nachfolge ermöglichten es der nordhumbrischen Armee, das Königreich Gwynedd zu besiegen und Frieden und Stabilität in Northumbria wiederherzustellen. Im Jahr 644 n. Chr., nach einem Jahrzehnt der Erholung seiner Streitkräfte, ergriff Oswald die Initiative und griff das Königreich Mercia an.
stage_intro_2357=Oswalds Invasion in Mercia endete mit einer katastrophalen Niederlage. Penda beschloss, diese Gelegenheit zu nutzen und die Königreiche Ostanglien und Gwynedd zu vereinen, um Krieg gegen Northumbria zu führen. Im Jahr 655 n. Chr. gehörte nur noch Bernicia zum Königreich Northumbria, während das restliche Gebiet von den Koalitionsstreitkräften erobert wurde.
stage_intro_2358= Lange Zeit behauptete das Königreich Mercia seine Vorherrschaft, indem es viele Königreiche in Südengland gewaltsam kontrollierte. Um seine Macht zu festigen, führte Beornwulf von Mercia 825 n. Chr. persönlich ein Heer an, um in das Königreich Wessex einzumarschieren. Dies veranlasste König Egbert von Wessex zur Vergeltung.
stage_intro_2451=Die Araber planten, sich für die Ermordung ihres Abgesandten durch die Ghassaniden zu rächen. Ihr Plan wurde jedoch von Byzanz aufgedeckt, das sofort seine militärische Verteidigung aufbaute. Angesichts der mächtigen byzantinischen Armee schien der arabische Plan zum Scheitern verurteilt zu sein.
stage_intro_2452=Als Khalid seine Truppen nach Marj Rahit führte, sahen die Ghassaniden die muslimischen Araber nicht als Bedrohung an. Doch schon bald bewiesen die Araber, dass ihre Kampfkraft unübertroffen war.
stage_intro_2453=Nachdem Abu der erste arabische Kalif geworden war, versuchte er, seine Macht über die arabische Halbinsel hinaus auszudehnen. Seine Armee stieß bis in den Norden vor und griff schließlich Damaskus an.
stage_intro_2454=Um die Araber am Vormarsch zu hindern und das verlorene Gebiet zurückzuerobern, beschloss Heraklius, ein großes Heer in die Levante zu schicken. Als sich der Feind näherte, zogen sich die Araber aus Damaskus zurück und gruppierten ihre Kräfte in Yarmouk neu.
stage_intro_2455=Nach dem Kampf gegen das byzantinische Heer in der Ebene von Yarmouk beschlossen die Araber, weiter vorzurücken und weitere Städte einzunehmen. Ende 636 n. Chr. erreichten die arabischen Truppen Jerusalem und umzingelten die Stadt.
stage_intro_2456=Die arabische Eroberung auf der anatolischen Halbinsel ging weiter und ihre Truppen blieben unbesiegt. Die aufeinanderfolgenden Niederlagen und der Verlust mehrerer Städte versetzten das Byzantinische Reich in Panik. Es musste dringend eine Möglichkeit finden, diesen mächtigen Feind aufzuhalten.
stage_intro_2457=Nach dem Sieg über die Sassaniden beschloss Omar, seine arabischen Soldaten nach Afrika zu führen. Dort sollte Ägypten der Ausgangspunkt zur Eroberung weiterer afrikanischer Gebiete werden.
stage_intro_2458=Nachdem sie die Herrschaft der Sassaniden ausgelöscht hatten, sahen die Araber das Byzantinische Reich als ihr Hauptangriffsziel an. Aus diesem Grund gründeten sie eine mächtige Flotte, um ihre Angriffe gegen das Byzantinische Reich im Mittelmeer zu verstärken.
stage_intro_2551=Im Jahr 865 n. Chr. überquerte ein Heer von Wikingern das Meer, landete auf britischem Boden und verübte Überfälle auf Klöster und Siedlungen an der Küste.
stage_intro_2552=Nach dem Beginn ihrer Invasion besetzten die Wikinger in rascher Folge die beiden Königreiche East Anglia und Northumbria. Als Nächstes richteten die Wikinger ihre Aufmerksamkeit auf die Eroberung des Königreichs Wessex.
stage_intro_2553=Die Wikinger hatten in der Schlacht von Reading die Oberhand gewonnen und rückten weiter vor. In Ashdown kämpften sie erneut mit den Truppen von Wessex.
stage_intro_2554=Nach Jahrzehnten der Invasion und des Plünderns waren nur eine Handvoll Mächte in der Lage, den Wikingern weiterhin Widerstand zu leisten. Eines von diesen war das Königreich Wessex unter der Führung von Alfred.
stage_intro_2555=Im Jahr 893 n. Chr. gerieten die Wikinger, die wieder in Britannien gelandet waren, erneut mit den Angelsachsen aneinander. Aufgrund der gesammelten Erfahrungen und der dadurch veränderten Taktik waren die Invasionen der Wikinger nur noch selten erfolgreich.
stage_intro_2556=Im Jahr 937 n. Chr. schlossen die drei nördlichen Königreiche ein Bündnis, um die wachsende Macht Englands zu zerstören. Angesichts der feindlichen Invasion stellte König Athelstan ein Heer zusammen und marschierte nach Norden.
stage_intro_2557=Um sich um den englischen Thron zu bewerben, beschlossen König Harald Hardrada von Norwegen und seine Verbündeten, Truppen aufzustellen und nach Yorkshire zu marschieren.
stage_intro_2558=Nach dem Tod von König Edward dem Bekenner von England begannen diejenigen, die den Thron begehrten, ihre Ansprüche zu erheben. Einer von ihnen, Harald von Norwegen, führte seine Truppen nach England und machte so seinen Anspruch geltend.
stage_intro_2651=Das byzantinische Reich und das bulgarische Reich befanden sich viele Jahre lang im Krieg. Im Jahr 811 n. Chr. führte Nikephoros I. einen Angriff auf Bulgarien an und fasste nach mehreren Siegen den Entschluss, nach Pliska zu marschieren.
stage_intro_2652=Während der Schlacht von Pliska erlitten sowohl das byzantinische als auch das bulgarische Reich große Verluste, dennoch blieb das bulgarische Reich in der Offensive. Trotz der schweren Verluste weigerte sich das Byzantinische Reich, einen Friedensvertrag zu unterzeichnen.
stage_intro_2653=Nach der Thronbesteigung Michails II. beschloss ein Offizier namens Thomas, gegen seine Herrschaft zu rebellieren, was auf große Unterstützung stieß. Er verbündete sich mit den Arabern, um einen Angriff auf Konstantinopel zu starten.
stage_intro_2654= Als Vergeltung für die Vertreibung des byzantinischen Klerus beschloss Leo VI. die Ausweisung bulgarischer Kaufleute aus Konstantinopel. Dies gab Simeon I. einen Kriegsgrund, als die Hauptkräfte der byzantinischen Armee im Osten gegen die Araber kämpften.
stage_intro_2655=Nachdem Zoe Zaoutzaina Regentin geworden war, beschloss sie, dem bulgarischen Reich keine Zugeständnisse mehr zu machen. Dies veranlasste Simon I. zum Angriff auf das byzantinische Reich. Durch eine Reihe von Maßnahmen des bulgarischen Reiches waren die Byzantiner gezwungen, allein zu kämpfen.
stage_intro_2656=Im Jahr 922 kontrollierten die Bulgaren mehr als die Hälfte des Balkans, konnten aber aufgrund ihrer unzureichenden Seemacht keine Bedrohung für Konstantinopel darstellen. Daher beschlossen die Bulgaren, sich mit den Arabern zu verbünden und gemeinsam anzugreifen. Doch ihr Plan wurde durch die rechtzeitige Entsendung byzantinischer Truppen vereitelt.
stage_intro_2657=Nach der Beendigung des Krieges mit den Arabern erlangte das Byzantinische Reich bald wieder seine Stärke und besiegte das bulgarische Reich. Doch die Kiewer Rus nutzte dieses Machtvakuum, womit ein neuer mächtiger Feind auf dem Balkan erschien.
stage_intro_2658=Mit der Niederlage der Bulgaren im Jahr 971 besetzten die Byzantiner einen großen Teil des bulgarischen Territoriums. Um ihr Land zurückzuerobern, setzten die Bulgaren den Krieg viele Jahre lang fort.
stage_intro_2659=Nach der Schlacht am Trajanstor brach im Byzantinischen Reich ein Bürgerkrieg aus. Samuel beschloss, diese Gelegenheit zu nutzen und das byzantinische Reich anzugreifen. Im Jahr 996 besiegte Samuel die byzantinische Armee bei Thessaloniki und begann seinen Marsch nach Süden.
stage_intro_2660=Ab 1.000 n. Chr. begann der byzantinische Kaiser Basil II. Truppen nach Bulgarien zu schicken. Obwohl es auf beiden Seiten Siege und Niederlagen gab, bedrohte der Vormarsch der Byzantiner die Existenz Bulgariens. Ein erbitterter Kampf zwischen dem wiedererstarkten Byzantinischen Reich und dem untergehenden Bulgarien schien unausweichlich.
stage_intro_2751=Im Jahr 1066 führte der Herzog der Normandie seine Truppen über den Ärmelkanal und landete in England, um den englischen Thron zu beanspruchen. Als Harold II. davon erfuhr, rief er sofort sein Heer nach Süden, um die Invasoren bei Hastings abzufangen.
stage_intro_2752=Nach der Schlacht mit Harold II. bei Hastings führte William seine Truppen nach London. Um die Besetzung Londons zu sichern, schickte er einen Teil seiner Streitmacht nach Southwark, um den dortigen Widerstand zu brechen.
stage_intro_2753=Nach der erfolgreichen Eroberung Englands weigerte sich das Volk in Exeter, William die Treue zu halten. Um die Aufständischen unter seine Herrschaft zu bringen, führte William seine Truppen zur Belagerung der Stadt, stieß aber auf starken Widerstand.
stage_intro_2754=Trotz der Unterstützung durch die Mehrheit des Volkes gab es immer noch Kräfte des Widerstands gegen Williams Herrschaft, die sich vor allem auf den Norden konzentrierten. William beschloss, seine Truppen nach Norden zu führen, da er der Meinung war, dass er die Gefolgschaft dieser Menschen nicht mit friedlichen Mitteln gewinnen konnte.
stage_intro_2755=Im Jahr 1075 weigerte sich William, der in die Normandie zurückgekehrt war, die Ehe zwischen Emma de Breteuil und Ralph de Gael anzuerkennen. Dies führte zum Aufstand von drei Grafen. Sie beschlossen, sich aufzulehnen und die Herrschaft Williams zu stürzen, während er noch in der Normandie weilte.
stage_intro_2756=Im Jahr 1105 führte Heinrich I. eine Invasion in das Gebiet von Robert, dem Herzog der Normandie, an und eroberte Bayeux und Caen. Im folgenden Jahr kehrte Heinrich I. in die Normandie zurück. Graf Morten, einer der Robert treu ergebenen Adligen, wurde infolge sein Hauptrivale.
stage_intro_2757=Im Jahr 1119 führte König Ludwig VI. von Frankreich seine Truppen zum Angriff auf die Normandie. Um seinen Besitz und sein Territorium dort zu verteidigen, war Heinrich I. zum Kampf gegen Frankreich gezwungen.
stage_intro_2758=Im Jahr 1135 stürzte die plötzliche Krankheit und der Tod von Heinrich I. England in Anarchie und Chaos. Stephen und die Tochter Heinrichs I., Mathilde, führten ihre jeweiligen Streitkräfte im Kampf um den englischen Thron an.
stage_intro_2851=Im Jahr 1048 drang ein Heer unter der Führung eines seldschukischen Fürsten in das von Byzanz beherrschte Gebiet Armeniens ein. Die Byzantiner entschieden sich für eine konservative Strategie und warteten auf Verstärkung, da ihre eigenen Kräfte nicht ausreichten.
stage_intro_2852=Im Jahr 1071 nutzte das geschwächte Byzantinische Reich die Gelegenheit des Konflikts zwischen den Seldschuken und den ägyptischen Fatimiden und beschloss, die verlorenen Gebiete in Armenien zurückzugewinnen.
stage_intro_2853=Die Aktivitäten der Seldschuken in der Ägäis bedrohten das Byzantinische Reich weiterhin. Alexios beschloss, eine Flotte gegen die seldschukische Marine zu bilden und die Kontrolle über die Ägäis wiederzuerlangen.
stage_intro_2854= Da er den mächtigen Seldschuken keinen Widerstand leisten konnte, beschloss Kaiser Alexios, Hilfe aus dem Westen zu suchen. Mit Unterstützung des byzantinischen Reiches segelten die Kreuzfahrer über das Meer und nahmen als erstes Ziel Nicäa ein.
stage_intro_2855=Mit zusätzlicher Verstärkung durch die Byzantiner wurden die Kreuzfahrer zu einer schlagkräftigen Streitmacht. Das Kreuzfahrerheer marschierte auf Antiochia zu, eine Stadt auf halbem Weg zwischen Konstantinopel und Jerusalem.
stage_intro_2856=Alexios, der sich von seiner Krankheit erholt hatte, begab sich persönlich auf das Schlachtfeld, um die vorderste Verteidigungslinie in Anatolien zu verstärken. Seine Armee besiegte sie die Seldschuken mehrmals und griff nach Erhalt von Verstärkung den Feind erneut an.
stage_intro_2857=Im Jahr 1176 beschloss der byzantinische Kaiser Manuel I., sich auf das Sultanat Rum zu konzentrieren und die anatolische Steppe zurückzuerobern, nachdem er sich mit den Bedrohungen durch Ungarn und Serbien im Westen auseinandergesetzt hatte.
stage_intro_2858=Manuel I. verlor eine große Anzahl von Belagerungsgeräten und verpasste eine perfekte Gelegenheit, Anatolien zurückzuerobern. Eine Begegnung mit einer Brigade seldschukischer Truppen, die von einer Plünderung zurückkehrte, gab ihm die Hoffnung auf einen Sieg.
stage_intro_2951=Nach der Eroberung der seldschukischen Hauptstadt Nicaea wurde das Kreuzfahrerheer von einem heftigen Gegenangriff getroffen. Arslan I. führte eine große Anzahl von Truppen an und umzingelte die Truppen von Bohemond I.
stage_intro_2952=Nach der erfolgreichen Einnahme von Antiochia rückten die Kreuzfahrer weiter vor und bewegten sich auf Jerusalem zu. Dort war der arabische General al-Dawla fest entschlossen, die Stadt mit allen Mitteln zu verteidigen.
stage_intro_2953=Der Erfolg des ersten Kreuzzugs gab den europäischen Herrschern einen Vorgeschmack auf den Sieg und den Wunsch, eine weitere Expedition zu starten. Diesmal war ihr Hauptziel Damaskus.
stage_intro_2954=Akkon war eine sehr wichtige Stadt unter Saladins Herrschaft. Als Saladin erfuhr, dass Guy de Lusignan die Belagerung der Stadt vorbereitete, schickte er sofort Truppen, um diesem Unterfangen zuvorzukommen.
stage_intro_2955=Um Jerusalem von Saladin zurückzuerobern, starteten die westeuropäischen Herrscher erneut einen Kreuzzug. Als das Heer Anatolien erreichte, wurde es von den Seldschuken mit einem heftigen Angriff empfangen.
stage_intro_2956=Nach dem Rückzug Richards Löwenherz aus Jerusalem beschloss Saladin einen Angriff auf Jaffa, den er als Gelegenheit zur Rache ansah. Als Löwenherz davon erfuhr, sammelte er erneut sein Heer und griff Saladin an.
stage_intro_2957=Als sich die Kreuzfahrer auf den Vorstoß nach Jerusalem vorbereiteten, stimmten ihre Anführer der Bitte von Alexios IV. zu und beschlossen, nach Konstantinopel zu ziehen, um seinem Vater bei der Wiedererlangung des Throns zu helfen. Im Gegenzug würde das Byzantinische Reich ihnen wirtschaftliche und militärische Unterstützung gewähren.
stage_intro_2958=Nach vielen Kriegsjahren wurde den Kreuzfahrern klar, dass Ägypten ihr größtes Hindernis bei der Rückeroberung Jerusalems war. Also beschlossen sie, eine Expedition zu organisieren und das Mittelmeer zu überqueren und Ägypten anzugreifen.
stage_intro_3051=Aufgrund der offenen Revolten in Wales musste Heinrich II. aus der Normandie nach England zurückkehren. Um die Waliser zu bestrafen und den Auftstand niederzuschlagen, stellte Heinrich II. ein großes Heer zusammen und startete 1165 einen Angriff auf sie.
stage_intro_3052=Arthur und Johann Ohneland hatten lange um das Recht auf den englischen Thron gestritten. Nachdem Johann sich entschlossen hatte, Isabella zu heiraten, wurde dieses Gleichgewicht allmählich gestört. Durch die Einmischung von Hugo X. und Philipp II. wurde die Situation jedoch sehr chaotisch.
stage_intro_3053=Aufgrund der Weigerung Johanns zu kooperieren, kündigte Philipp II. die Rückeroberung der Normandie an und begann bald zu handeln. Im Jahr 1203 schickte Philipp II. Truppen nach Château Gaillard, das er für den Schlüssel zur Kontrolle der gesamten Normandie hielt.
stage_intro_3054=Im Jahr 1213 traf die englische Flotte unter der Führung von William Longespée auf eine französische Flotte, die bereits gelandet war und zu plündern begann. Angesichts der unbesetzten französischen Schiffe schien der englische Sieg unausweichlich zu sein.
stage_intro_3055=Im Jahr 1214 griff eine Koalitionsarmee, bestehend aus den Engländern, dem Heiligen Römischen Reich und Flandern, das Königreich Frankreich an. In aller Eile stellte Philipp II. ein großes Heer zusammen. Trotz der großen Mannstärke der Koalitionstruppen schien die gut ausgebildete französische Kavallerie nicht an Boden zu verlieren.
stage_intro_3056=Während der Regierungszeit Heinrichs III. wurde die Hungersnot in England immer schlimmer, was die Adligen immer unzufriedener mit der Herrschaft Heinrichs machte. Ein von Simon de Montfort geführter Feldzug gegen die Herrschaft Heinrichs III. stand kurz bevor.
stage_intro_3057=Unter der Aufsicht von Edward I. wählte Schottland einen neuen König. Edward I. war der Meinung, dass Schottland eine Markgrafschaft unter englischer Herrschaft werden sollte und forderte seine Hilfe im Kampf gegen Frankreich. Die Schotten lehnten diese Forderung ab und verbündeten sich mit Frankreich.
stage_intro_3058=Unter der Führung von William Wallace griff die schottische Armee England weiterhin an. Im Jahr 1298 beschloss Edward I. einen Waffenstillstand mit dem Königreich Frankreich und kehrte nach England zurück, um sich auf den Kampf gegen die Schotten zu konzentrieren.
stage_intro_3059=Nach der Schlacht von Falkirk wurde Schottland fast vollständig von England erobert. Im Jahr 1306 bestieg Robert the Bruce den schottischen Thron. Unter der wenig zufriedenstellenden Führung Edwards II. stand der Krieg kurz vor der Wende.
stage_intro_3060=Roger Mortimer lernte Isabella kennen, nachdem er 1323 aus dem Tower of London geflohen war. Beide waren mit Edward II. sehr unzufrieden und beschlossen, gegen seine Herrschaft zu rebellieren. Im Jahr 1326 kehrten Isabella und Mortimer heimlich nach England zurück und begannen ihren Widerstand.
stage_intro_3151=Nach dem Verlust Konstantinopels an die Kreuzfahrer wurden das Reich von Nicäa und das Despotat von Epirus zu den beiden größten Regimen im zersplitterten Byzantinischen Reich. Beide strebten danach, als erste das Reich wiederzubeleben, doch dieses gemeinsame Ziel wurde zur Quelle der Konflikte zwischen den beiden.
stage_intro_3152=Das Reich von Nicäa errang schließlich den endgültigen Sieg in seinem Wettstreit mit Epirus um die alleinige Herrschaft über das Reich. Unter der Führung des ehrgeizigen Michael VIII. wandte das Reich von Nicäa seine Aufmerksamkeit nun dem Lateinischen Reich zu, das Konstantinopel besetzt hielt.
stage_intro_3153=Im Jahr 1261 schloss das Reich von Nizäa ein Bündnis mit der Republik Genua und bereitete einen weiteren Angriff auf Konstantinopel vor. Als sie feststellten, dass die lateinische Garnison und die venezianische Flotte noch nicht von ihrer Expedition zurückgekehrt waren, beschlossen sie, diese einmalige Gelegenheit nicht zu verpassen.
stage_intro_3154=Nach der Wiedererrichtung des Byzantinischen Reiches versuchte Michael VIII. die verbliebenen Kräfte in den umliegenden Gebieten des Lateinischen Reiches zu vernichten. Im Jahr 1263 griff das byzantinische Heer das Fürstentum Achäa an, stieß aber bei der Einnahme der Hauptstadt auf erbitterten Widerstand.
stage_intro_3155=Durch die Niederlage in der Schlacht von Prinitza geriet das Byzantinische Reich im Krieg in Morea in die Defensive. Zudem desertierten immer mehr Söldner und die Zerstreuung der Truppen wurde immer gravierender. Im Jahr 1264 griff das lateinische kaiserliche Heer unter der Führung von William II. die versprengten byzantinischen Truppen an.
stage_intro_3156=Im Jahr 1274 griff das Byzantinische Reich Johannes Doukas von Thessalien an. Angesichts des massiven Truppenaufgebotes der byzantinischen Armee hatte Johannes keine andere Wahl, als um Hilfe zu bitten.
stage_intro_3157=Um die Kontrolle des Reiches über die Ägäis aufrechtzuerhalten, reorganisierte das Byzantinische Reich seine Flotte. Die Niederlagen in den Schlachten von Morea und Settepozzi versetzten den byzantinischen Streitkräften jedoch einen schweren Schlag. Die lateinischen Herrscher nutzten die Gelegenheit und griffen die byzantinische Flotte an, die im Hafen von Demetrias vor Anker lag.
stage_intro_3158=Für das angevinische Königreich Sizilien ist Berat eine Stadt von großer strategischer Bedeutung. Um dem Feind den Zugang zu den Kerngebieten des byzantinischen Reiches zu versperren, schickte der Kaiser 1280 Truppen zum Angriff auf die Stadt.
stage_intro_3251=Im Jahr 1302 wurde das Heer Michaels IX. aus Angst vor den Osmanen aufgelöst. Dies zwang Andronikos II. dazu, ein Heer über den Bosporus zu schicken, um die Notlage in Nikomedien zu unterstützen.
stage_intro_3252=Im Jahr 1321 war der junge Andronikos III. der Meinung, dass sein Großvater zu alt sei und er selbst den Thron besteigen sollte. Das Zerwürfnis in der Familie löste einen Bürgerkrieg aus. Die Osmanen nutzen die Gelegenheit, um die Stadt Prusa zu erobern.
stage_intro_3253=Nach der Rückeroberung Konstantinopels vom Lateinischen Reich konzentrierten sich die Byzantiner zu sehr auf die Wiedererlangung der Kontrolle über Griechenland und zogen ihre Truppen von der ostanatolischen Front zurück. Dieser Abzug ermöglichte erneute Angriffe durch die Osmanen.
stage_intro_3254=Im Jahr 1329 war das von den Byzantinern kontrollierte Gebiet in Anatolien erheblich geschrumpft. Um das umliegende Gebiet zu sichern, beschloss Andronikos III., Truppen nach Nikomedien zu schicken. Jedoch wurde seine Armee von den Osmanen in Pelekanon abgefangen und angegriffen.
stage_intro_3255=Die Unruhen in Byzanz brachten das Reich fast zum Einsturz. Johannes VI. wandte sich an das Osmanische Reich, um seinen Sohn zu retten, der sich den vereinten Kräften des serbischen und des zweiten bulgarischen Reiches gegenübersah.
stage_intro_3256=Im Jahr 1352 versank das Byzantinische Reich erneut im Bürgerkrieg und die Osmanen erkauften sich wichtige Gebiete in der Nähe von Gallipoli. Im Jahr 1354 veränderte ein Erdbeben die Lage in Gallipoli völlig.
stage_intro_3257=Als das Osmanische Reich nach der Eroberung seiner ersten Festung auf dem Balkan im Jahr 1352 seine rasche Expansion in Europa begann, beschloss der bulgarische Kaiser Ivan Alexander, den Vormarsch dieser Armee aufzuhalten.
stage_intro_3258=Nach dem Erwerb von Gallipoli expandierte das Osmanische Reich schneller auf dem südlichen Balkan. Nach einer Reihe von Umwälzungen und Renovierungsarbeiten nach dem Erdbeben beschloss das Osmanische Reich Adrian anzugreifen, die drittgrößte Stadt des Byzantinischen Reiches.
stage_intro_3351=Im Jahr 1337 beschloss das französische Parlament, das Herzogtum Aquitanien von England zurückzufordern und der Konflikt zwischen den beiden Seiten entbrannte. Um die Kontrolle über den Ärmelkanal zu erlangen, führte Edward III. selbst eine Flotte an und startete einen Angriff auf die französische Marine.
stage_intro_3352=Nachdem Edward III. die Kontrolle über das Meer erlangt hatte, führte er seine Truppen von Portsmouth aus und begann seinen Angriff, nachdem er die Nordküste Frankreichs erreicht hatte. Die mächtige französische Armee war zur Verteidigung bereit und die beiden Armeen standen kurz davor, sich bei Crécy zu treffen.
stage_intro_3353=Nach dem Sieg in der Schlacht von Crécy nutzte die britische Armee nutzte die Gelegenheit und beschloss Calais zu erobern, um einen wichtigen Brückenkopf auf dem europäischen Kontinent zu gewinnen, erwartete jedoch nicht, dass die Schlacht so schwierig werden würde.
stage_intro_3354=Im September 1346, als die englische Armee Calais belagerte, forderte Philipp VI. David II. hastig auf England anzugreifen, in der Hoffnung  Edward III. dazu zu zwingen, seine Streitkräfte aufzuteilen und einen Teil wieder nach England zu senden, um sein Heimatland zu retten. Angesichts eines langjährigen und alten Bündnisses mit Frankreich beschloss David, eine Armee zur Invasion Englands zu entsenden.
stage_intro_3355=Die Bretagne befand sich in einer sehr wichtigen geografischen Position und der Kampf um die Thronfolge der Bretagne umfasste sowohl Großbritannien als auch Frankreich, die wollten, dass die Bretagne ihnen einen Vorteil auf dem Schlachtfeld verschafft wird.
stage_intro_3356=Im Jahr 1356 wurde Edward der Schwarze Prinz zum Befehlshaber der britischen Kavallerie ernannt. Nachdem er sein Heer nach Frankreich geführt hatte, verfolgte er eine Politik der verbrannten Erde und erzielte beachtliche Erfolge. König Johann II. von Frankreich erhöhte sein Marschtempo, um die englische Armee einzuholen und am Schwarzen Prinzen Rache üben zu können.
stage_intro_3357=König Johann II. von Frankreich wurde in der Schlacht von Poitiers gefangen genommen und trat später ein großes Territorium an England ab. Da die Ambitionen von Edward III. hier nicht aufhörten, er beschloss, eine Expedition zu starten und wurde in Reims zum König von Frankreich gekrönt!
stage_intro_3358=Obwohl Frankreich bereits verwüstet war, konnte das Land nicht ohne einen König leben. Prinz Charles beschloss, nach Reims zu reisen, um zum König gekrönt zu werden und Edward III. beschloss, die Krönung zu stoppen, indem er die Straße zwischen Paris und Reims blockierte.
stage_intro_3359=Nach der Schlacht von Mauron gab es einen langen Waffenstillstand zwischen den bretonischen Nachfolgern, aber beide Seiten hatten seit langem mit der Unterstützung von Großbritannien und Frankreich ihre Stärke aufgebaut und waren beide bereit für eine entscheidende Schlacht.
stage_intro_3360=Im Oktober 1369 wurde Bertrand, der kein hochrangiger Adliger war, von Karl V. zum neuen Oberbefehlshaber der Armee ernannt, ein Bruch mit der Konvention der sich für den französischen König auszahlte! Als der Winter nahte, kam es innerhalb der britischen Armee zu einem erneuten Streit darüber, wie man den Winter am besten überstehen sollte. Die französische Armee nutzte diese Gelegenheit, um die britische Armee anzugreifen.
stage_intro_3361=Als Reaktion auf das 1368 geschlossene französisch-kastilische Bündnis schickte der kastilische König 1372 eine Flotte nach Aquitanien, um den Franzosen zu helfen. Die Flotte traf vor La Rochelle auf die englische Flotte, die auf dem Weg nach Frankreich war.
stage_intro_3362=Im hohen Alter war Edward III. nicht mehr an Krieg interessiert und der Tod von Edward dem Schwarzen Prinzen ließ ihn noch mehr Selbstvertrauen verlieren. Sein anderer Sohn, John of Gaunt, wurde Kommandant und überfiel viele Male Frankreich, was der französischen Bevölkerung überwältigende Verluste bescherte.
stage_intro_3451=Karl VI. war ein verrückter König geworden, der Kampf zwischen den Adligen wurde immer heftiger und die Instabilität der Macht in Frankreich gab dem jungen Heinrich V. die Gelegenheit und 1415 beschloss er, den Angriffskurs seines Urgroßvaters zu verfolgen um Frankreich zu erobern und König beider Länder zu werden.
stage_intro_3452=Die Siege Heinrichs V. in Frankreich brachten England nicht viel wirklichen Gewinn, und die Unterstützung durch das Parlament wurde immer geringer, und er beschloss, Rouen zu besetzen, um mehr französische Gebiete erobern zu können.
stage_intro_3453=Der Kampf zwischen den beiden Parteien ließ Frankreich völlig gespalten zurück, die Ermordung von Johannes dem Furchtlosen ließ das Herzogtum Burgund vollständig an England falle, und die Unterzeichnung des Vertrags von Troyes machte Heinrich V. zum nominellen Erben des französischen Throns. Zu dieser Zeit gewann Dauphin Charles die Unterstützung Schottlands, wodurch der Große Krieg versehentlich ausgelöst wurde.
stage_intro_3454=Der Sieg in der Schlacht von Beaugency gefiel Dauphin Charles und die französischen Adligen waren bereit, den Sieg zu nutzen, um weitere verlorene Gebiete zurückzuerobern. Und Heinrich V. plante zu dieser Zeit eine neue Angriffsrunde.
stage_intro_3455=Heinrich V. und Karl VI. waren seit 2 Jahren tot, Karl VII. war noch nicht gekrönt worden und Heinrich VI. stand in jungen Jahren unter der Regentschaft des Herzogs von Bedford. 2 Jahre Konflikt zwischen den beiden Seiten, wobei jede Seite gewinnt und verliert und jede beabsichtigt, die Hauptstreitmacht der anderen endgültig zu vernichten.
stage_intro_3456=Im krassen Gegensatz zur britischen Offensive stand die träge Reaktion der französischen Regierung: Der Mangel an Geldern für den Krieg, die Aristokratie auf sich allein gestellt, die Waage des Sieges neigte sich nie zugunsten Frankreichs. Diese aufeinanderfolgende Schläge machten Karl VII. fast verzweifelt.
stage_intro_3457=Wenn Orléans von den Briten erobert würde, wäre die letzte Barriere in Zentralfrankreich gebrochen. Es war ein dunkler Moment für Karl VII., aber Gott gab diesem prekären Land Licht, und ein junges Mädchen namens Jeanne d'Arc trat vor.
stage_intro_3458=Die Nachricht von Sieg bei Orléans hob die Moral in ganz Frankreich und die französische Armee, inspiriert von Jeanne d'Arc, bereitete sich darauf vor, alle britischen Stellungen im gesamten Loire-Tal einzuehmen.
stage_intro_3459=Jeanne d'Arc wollte, dass Karl VII. seine Pläne aufgibt, die Normandie anzugreifen und nach Reims zu gehen, um gekrönt zu werden. Dies schwächte die Moral der britischen Armee weiter. Die britische Armee mobilisierte die Elitetruppen, die zuvor den Huss-Krieg unterstützt hatten, um den Angriff zu blockieren.
stage_intro_3460=Aufgrund unzureichender Unterstützung wurde Jeanne d'Arc in der Schlacht von Compiègne gefangen genommen und starb zwei Jahre später, was ihre Kameraden zur Rache provozierte und sogar die französische Unterschicht zum Kampf bewegte.
stage_intro_3461=1435 ließ der Tod des Regenten Duke of Bedford England ohne Verbündeten im Herzogtum Burgund zurück und da die Gebiete der Normandie sich im Chaos befanden, beschloss Karl VII. diese Gelegenheit zu nutzen, um Paris zurückzuerobern.
stage_intro_3462=Trotz der enormen Kosten des Krieges gegen Frankreich zwischen 1435 und 1436 war England immer noch nicht bereit, mit Burgund Frieden zu schließen. Daraufhin beschloss der Herzog von Burgund sich gegen England zu stellen und Calais zu erobern.
stage_intro_3463=Frankreich hatte sich unter Karl VII. stark erholt, während die letzten englische Gebiete in Frankreich nur die Normandie und Giennes-Gascogne waren und England beschloss, sich mit einer großen Unterstützung von Truppen aus der Heimat zu wehren.
stage_intro_3551=Ugljesa erhielt die Nachricht, dass der Großteil der osmanischen Armee Europa verließ und nach Anatolien marschierte. Es war der perfekte Zeitpunkt, um die osmanische Macht auf dem Balkan zu beseitigen, und so starteten sie einen plötzlichen Überfall.
stage_intro_3552=Unzufrieden mit der Ausweitung des Territoriums von Balsa II. durch Heirat, lud Carlotopia aus dem Hause Thopia das Osmanische Reich zu einem Angriff auf das Fürstentum Zeta ein, dem Murad I. bereitwillig zustimmte.
stage_intro_3553=Murad I. verließ 1387 den Balkan, um sich um die Angelegenheiten Anatoliens zu kümmern, während die Vasallen des Balkans versuchten, sich von der osmanischen Vorherrschaft zu lösen und Bündnisse zu schließen, um deren Autorität herauszufordern.
stage_intro_3554=Murad I. kehrte 1388 aus Anatolien zurück und begann sofort einen Blitzkrieg gegen Bulgarien. Der bosnische Herrscher leistete Bulgarien auch sofort Hilfe.
stage_intro_3555=Das Kosovo verband zwei Regionen, Mazedonien und Serbien. Wenn die Osmanen es erobern würden, würden sie weiter in das große Gebiet Serbiens eindringen. Die von Fürst Lazar organisierten verbündeten Einheiten lieferten den Osmanen in der Kosovo-Region einen erbitterten Kampf.
stage_intro_3556=Nachdem Murad I. versehentlich ermordet worden war, folgte sein Sohn Bayezid I. auf den Thron. Gleichzeitig trat der Hundertjährige Krieg zwischen England und Frankreich in eine Phase des Waffenstillstands ein. Um das im Sterben liegende östliche Rom zu retten, schlossen sich die Ritter des Westens zusammen und begannen die Kreuzzüge.
stage_intro_3557=Als Bayezid I. bereit war, Byzanz den finalen Schlag zu versetzen, führte Timur aus dem Osten 150.000 Einheiten in die Stadt. Das Überleben des Osmanischen Reiches war nur noch eine Frage von Sekunden, die Byzanz Luft zum Atmen ließen.
stage_intro_3558=Auf die Schlacht von Ankara, in der Bayezid I. gefangen genommen wurde und an Depressionen starb, folgte ein Kampf innerhalb des Osmanischen Reiches, der schließlich einen neuen Sultan, Murad II, hervorbrachte. Die vorübergehende Schwäche des Reiches führte jedoch zu Aufständen in den untergeordneten Staaten!
stage_intro_3559=Die Venezianer gingen über eine Kriegserklärung an das Osmanische Reich hinaus, um die volle Autonomie über die Region Thessaloniki zu erlangen, was der Sultan nicht dulden konnte, und schickten daher ein großes Heer zur Belagerung!
stage_intro_3560=Papst Eugen IV. rief die Armeen mehrerer Länder, darunter Polen und Ungarn, zu einem neuen Kreuzzug auf. Murad II., der zu diesem Zeitpunkt bereits abgedankt hatte, musste sein Heer neu aufstellen, um den Ansturm der Kreuzfahrer abzuwehren.
stage_intro_3561=Der Regent Johannes Hunyadi hatte sich vier Jahre lang darauf vorbereitet, den im Kampf gefallenen König zu rächen. Er führte 1448 die verbündeten ungarischen und walachischen Armeen an und startete einen Angriff auf das Osmanische Reich.
stage_intro_3562=Als Mehmed II. 1451 den Thron bestieg, verbrachte er zwei Jahre mit den Vorbereitungen: Er ließ riesige Kanonen und Musketen anfertigen, baute Festungen an der Küste und sperrte die Meerengen. Konstantinopel, eine Stadt, die seit tausend Jahren Bestand hatte, empfing ihren mächtigsten Feind.
stage_intro_3651=Ein Jahr nach dem Wahnsinnanfall erlangte Heinrich VI. seine Vernunft zurück. Mit der Unterstützung von Königin Margarete von Anjou wurde der Herzog von Somerset wieder eingesetzt und Richard, Herzog von York, musste den Hof verlassen, nachdem er seine Position als Lordprotektor verloren hatte. 1455 schloss sich Richard, unzufrieden mit dem Herzog von Somerset, mit dem Neville-Haus zusammen und marschierte nach London mit der Absicht, den Herzog von Somerset abzusetzen.
stage_intro_3652=Mit dem Ende der Ersten Schlacht von St. Albans besiegte der Herzog von York die meisten seiner Rivalen am Hof ​​und kehrte zu seiner Position als Lordprotektor zurück. Leider hielt dies nicht lange an und Anfang 1456 musste der Herzog von York als Lordprotektor zurücktreten, als sein Gesetzentwurf zur Rückgewinnung seiner Ländereien für die Krone vom Parlament abgelehnt wurde. Zur gleichen Zeit organisierte Königin Margaret heimlich einen Versuch, die königliche Macht zurückzugewinnen und 1459 verschärfte sich der Konflikt zwischen den beiden Seiten, als der Yorkist Earl of Salisbury seine Truppen nach Süden schickte, um den Herzog von York zu treffen; Margaret schickte sofort ihre Truppen, um sie abzufangen, und bei Blore Heath kam es zu einer blutigen Begegnung.
stage_intro_3653=Der Herzog von York konnte nach seiner erfolgreichen Vereinigung mit dem Earl of Salisbury nicht mehr viel weiter vordringen, da sie von einer Armee unter dem Banner von König Heinrich VI. blockiert wurden, die etwa zwei- bis dreimal so zahlreich war wie ihre. Die Ungleichheit zwischen den beiden Seiten zwang den Herzog von York, seinen Truppen den Rückzug zu befehlen und Lager zu beziehen und dem König schriftlich seine Loyalität zum Ausdruck zu bringen. Doch die vorangegangene Schlacht bei Blore Heath hatte dazu geführt, dass er das Vertrauen des Königs verloren hatte und eine gewaltige Schlacht war unvermeidlich.
stage_intro_3654=Die Niederlage in der Schlacht an der Ludford Bridge hinterließ das Haus York am Hofe in Trümmern und das Haus Lancaster wuchs nach und nach an Macht und erwarb einige der ehemaligen York-Domänen. Obwohl der Herzog von Somerset nominell Calais erhielt, das Warwick dem Königsmacher gehört hatte, weigerte er sich, die Herrschaft des Herzogs von Somerset anzunehmen. Im Januar 1460 griff Warwick präventiv die in Sandwich stationierte lancastrische Armee an, die sich auf einen Angriff auf die Gegend von Calais vorbereitete und machte sich auf den Weg nach Westen nach London. Die lancastrische Armee wurde darüber informiert und errichtete schnell eine Verteidigungsposition bei Northampton, um die anstürmende yorkische Armee abzuwehren.
stage_intro_3655=Nach der Schlacht von Northampton erließ Richard, Herzog von York, ein Gesetz. Die Aufschrift „Richard und seine Erben können den Thron besteigen, wenn der König stirbt“ bedeutete, dass er nur noch einen Schritt vom Höhepunkt der Macht entfernt war. Doch vor diesem Schritt gab es noch ein letztes Hindernis: Königin Margaret forderte die Verbündeten des Hauses Lancaster auf, sich in Kingston-upon-Hull zu versammeln und zu versuchen, nach Süden nach London zu marschieren. Als Richard, Herzog von York, die Nachricht erhielt, stellte er schnell eine Streitmacht zusammen, um nach Norden zu ziehen, um ihnen zu begegnen. Aufgrund der Eile, mit der sie geschickt wurde, war diese Truppe nicht nur kleiner als ihre Gegner, sondern auch schlecht versorgt. Richard, Herzog von York, war in der ersten Begegnung unterlegen und musste sich auf Sandal Castle zurückziehen, um auf Unterstützung zu warten.
stage_intro_3656=Richard, Herzog von York, wurde nach seiner Niederlage bei Wakefield Plain getötet und sein Sohn, Edward IV., übernahm den Herzogstitel. Obwohl Eduard IV. zu diesem Zeitpunkt erst 18 Jahre alt war, zeigte er über sein Alter hinaus Führungsqualitäten und Befehlsgewalt. Nur einen Monat nach der Niederlage von Richard, Herzog von York, führte Edward IV. seine Armee in eine erbitterte Schlacht mit der lancastrischen Armee bei Mortimer's Cross.
stage_intro_3657=Nach der Schlacht von Mortimer's Cross, während Eduard IV. seine Streitkräfte bei Hereford neu gruppierte, befehligten Königin Margarets Verbündete schnell einen Angriff von Norden nach Süden. In nur einem halben Monat näherte sich diese zehntausend Mann starke Armee London und Warwick, der Königsmacher, führte seine Truppen ihnen entgegen. Zufälligerweise fand diese große Schlacht, wie das erste Treffen zwischen den Yorkers und den Lancasters sechs Jahre zuvor, in der Stadt St. Albans statt, doch dieses Mal endete die Konfrontation völlig anders als sechs Jahre zuvor.
stage_intro_3658=Trotz des Sieges von Margarets Armee bei St. Albans weigerten sich die Bürger Londons, sie in der Stadt willkommen zu heißen, da die Armee nach der Schlacht eine Reihe von Gräueltaten verübten. Margaret hatte keine andere Wahl, als sich nach Norden zurückzuziehen. Kurz darauf wurde Eduard IV., der die Herzen des Londoner Volkes erobert hatte, zum König gewählt und der ehemalige Heinrich VI. abgesetzt. Als die Nachricht Margaret erreichte, versammelte sie fast die gesamte Opposition gegen das Haus York im Norden Englands und versuchte, Eduard IV. zu eliminieren, was zu einer der brutalsten Schlachten auf englischem Boden führte.
stage_intro_3659=In der Schlacht von Towton besiegte Edward IV. die meisten Lancastrianer, die sich ihm widersetzten. In den folgenden Jahren versuchte Eduard IV. mit verschiedenen Mitteln, seine ehemaligen Feinde zu Freunden zu machen, darunter auch seinen ehemaligen Erzfeind Henry Beaufort, 3. Herzog von Somerset, der sich Ende 1463 heimlich mit dem abgesetzten Heinrich VI. traf und bald darauf eine neue Rebellion gründete. Ein wütender Edward IV. befahl John Neville, den Aufstand niederzuschlagen, diesmal um den Herzog von Somerset ein für alle Mal zu vernichten.
stage_intro_3660=Der bei Hedgeley Moor besiegte Herzog von Somerset zog sich an die Küste von Hexham zurück. Er teilte seine Armee in drei Teile und versuchte südlich von Hexham Befestigungen zu errichten, um seine Verfolger fernzuhalten. Aber John Nevilles Verfolgung war schnell und er hatte nicht vor, dem Herzog von Somerset eine Chance zu geben, zu Atem zu kommen.
stage_intro_3751=Im Jahr 1469 rebellierte ein Mann namens „Robin von Redesdale“ mehrmals im Norden Englands und Warwick, der Königsmacher, der seit langem einen Groll gegen Edward IV. hegte, nutzte die Rebellion aus. Er griff die königliche Armee an, die die Rebellion unterdrüvken sollte.
stage_intro_3752=Im Jahr 1470 versuchte Warwick, einen weiteren Aufstand auszulösen. Edward IV. kam ihm jedoch zuvor, indem er die Rebellen bei Hornfield in die Flucht schlug, was auch als Schlacht von Losecote Field bekannt ist, weil viele der Rebellen auf ihrer Flucht ihre markierten Kleider auszogen.
stage_intro_3753=Nach der Schlacht am Losecote floh Warwick der Königsmacher nach Übersee und verbündete sich mit Margarete von Anjou im Austausch für die Unterstützung des Hauses Lancaster. Im April 1471, an einem nebligen Morgen, trafen Edward IV. und Warwick, ehemalige Schlachtgefährten, in ihrem letzten Kampf aufeinader.
stage_intro_3754=Zur gleichen Zeit wie die Schlacht von Barnet landete Margarete von Anjou an der Spitze der Überseestreitkräfte des Hauses Lancaster auf der Insel England und begann, nach London zu marschieren. Eduard IV. erfuhr davon am Ende der Schlacht von Barnet und führte sie trotz der Tatsache, dass seine Armee sehr müde war, in ein Duell mit Margaret.
stage_intro_3755=Als Eduard IV. im April 1483 starb, wurde sein Bruder Richard zum Lordprotektor ernannt und im Juni, als Eduard V. verschwand, wurde Richard zum König gekrönt, bekannt als Richard III. Die alten Verbündeten Eduards IV. betrachteten dies als Machtübernahme und unterstützten Henry Tudor. Bald darauf brach in England erneut ein Aufstand aus.
stage_intro_3756=Am Weihnachtstag 1483 heiratete Henry Tudor aus dem Hause Lancaster die Tochter von Elizabeth Woodville aus dem Hause York, und die beiden Familien schlossen sich zum Haus Tudor zusammen, nur um gegen einen gemeinsamen Feind, Richard III., zu kämpfen. Am 22. August 1485 kämpften Henry Tudor und Richard III. in der Bosworth-Ebene in einem Duell.

