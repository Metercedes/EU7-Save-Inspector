campaign_desc_54=Seit dem 7. Jahrhundert bedrohen die Araber die umliegenden Staaten. Einer ihrer mächtigsten Feinde ist das Byzantinische Reich.
campaign_desc_55=Seit dem 8. Jahrhundert floriert Großbritannien und hat Reichtum in Hülle und Fülle angehäuft. Man schrieb dem Meer zu, dass es England vor seinen Feinden schützte. Doch die Briten wogen sich in falscher Sicherheit.
campaign_desc_56=Die Thronbesteigung von Basil I. leitete die makedonische Dynastie ein, die als Blütezeit des byzantinischen Reiches gilt.
campaign_desc_57=Im Jahr 1066 empfahl Edward der Evangelist Harold vor seinem Tod als König. Zur gleichen Zeit glaubte auch der Herzog der Normandie, dass er das Recht auf den Thron habe. Als die Nachricht von der Thronbesteigung Harolds II. die Normandie erreichte, war William wütend und kündigte sofort an, Truppen nach England zu schicken.
campaign_desc_58=Nach dem Ende der makedonischen Dynastie im Jahr 1057 erlebte das Byzantinische Reich Jahrzehnte der Depression und des Niedergangs, bis Alexius I. im Jahr 1081 den Thron bestieg. Unter der Herrschaft der Familie Komnenos erholte sich das byzantinische Reich allmählich.
campaign_desc_59=Dem Ruf des Papstes folgend, führten westeuropäische Fürsten und Ritter ihre Truppen an die Ostküste des Mittelmeeres. Ihr Ziel war die Rückeroberung der vom Feind besetzten heiligen Stadt Jerusalem.
campaign_desc_60=Nach dem Bürgerkrieg von 1135 beanspruchte Königin Mathilde erfolgreich den englischen Thron für ihren Sohn Heinrich II. Im Jahr 1154 wurde Heinrich II. in der Westminster Abbey gekrönt, womit die Ära der Anjou-Dynastie begann.
campaign_desc_61=Nach dem Vierten Kreuzzug wurde Konstantinopel von den Kreuzfahrern besetzt und aus dem ehemaligen byzantinischen Reich wurde das Reich von Nizäa gegründet. Das Lateinische Reich wurde zu einem verweilenden Schatten in den Herzen aller Byzantiner.
campaign_desc_62=Das Osmanische Reich wurde Ende des 13. Jahrhunderts nach dem Untergang des Seldschukenreichs gegründet. Die Gründung des Osmanischen Reiches führte zur Vereinigung der zuvor verstreuten anatolischen Vasallenstaaten, die sich den Osmanen in ihrem Kampf gegen das Byzantinische Reich anschlossen.
campaign_desc_63=England und Frankreich hatten seit Wilhelms Eroberung Englands viele Konflikte und Uneinigkeiten und die Ungewissheit über die Erbschaftsfolge nach dem Tod von König Philipp von Frankreich führte zu einer großen Krise in ganz Frankreich. 1337 erklärte sich Edward III. offiziell zum König von Frankreich, während Philip VI. die Rückgewinnung aller Ländereien von Edward III. in Frankreich ankündigte, was zu einem umfassenden Krieg zwischen England und Frankreich führte.
campaign_desc_64=Mit der allmählichen Stabilisierung der politischen Lage in England, der Krönung Heinrichs V. in der Westminster Abbey im Jahr 1413 und dem neu entfachte Ehrgeiz, den europäischen Kontinent zu erobern, wollte Heinrich V. den unerfüllten Wunsch seiner Vorfahren erfüllen und das „Anglo -Französisches Reich" vollenden.
campaign_desc_65=Während der Expansion des Osmanischen Reiches verbrachten Generationen von Sultanen ihr Leben damit, gegen die gesamte westliche Welt zu kämpfen. Ihr nächstes Ziel war eine Stadt, die Konstantinopel hieß, die letzte Bastion der Christenheit in dieser Weltregion.
campaign_desc_66=Nach dem Sturz von Richard II. kämpften zwei von Edward III. abstammenden Familien um den englischen Thron. Die Familie Lancaster und die Familie York.
campaign_desc_301=Die Nachricht von der legendären Grabstätte des Pharaos verbreitete sich in der Bevölkerung wie ein Lauffeuer. Unzählige Abenteurer brachen auf, um den Schatz zu finden, getrieben von Geschichten seltener und begehrter Schätze von großem Wert.
campaign_desc_302=Seit langer Zeit wird der Schatz von König Johann Ohneland von zahllosen Entdeckern gejagt, konnte bisher aber nicht gefunden werden.
campaign_desc_303=König Salomons Schatz im Tempel von Jerusalem war einst verloren und geriet allmählich in Vergessenheit. Jetzt ist die Nachricht vom Schatz wieder aufgetaucht und zahllose Menschen sind aufgebrochen, um ihn zu finden.
campaign_desc_304=Seit seiner Gründung hat der Templerorden auf unzähligen Schlachtfeldern gekämpft, immensen Einfluss erlangt und große Reichtümer angehäuft. Nach der Auflösung ihres Ordens versteckten sie diese Reichtümer, die bis heute nicht gefunden werden konnten.
stage_group_desc_20001=Die Schwächung des Römischen Reiches brachte die Barbaren in Bewegung. Attila, der Anführer der Hunnen, versammelte die Ostgoten, Gepiden und Franken und marschierte auf Gallien zu. Das Römische Reich erkannte die Gefahr und Aetius versammelte eine große Anzahl von Truppen für eine große Schlacht mit Attila in der Ebene.
stage_group_desc_20002=Die Expansion des Kalifats war unaufhaltsam und sie hatten bereits ganz Nordafrika und die Iberische Halbinsel besetzt. Wenn das fränkische Königreich die arabische Armeen nicht aufhalten kann, wird ganz Europa von Arabien erobert werden.
stage_group_desc_20003=Sowohl das arabische Reich als auch die Tang-Dynastie expandierten nach Zentralasien. Durch den Fall des persischen Reiches gab es keine Pufferzone mehr und ein Konflikt zwischen den beiden Reichen war unvermeidlich.
stage_group_desc_20004=Im Jahr 1066 führte der Herzog der Normandie seine Truppen über den Ärmelkanal und landete in England, um den englischen Thron zu beanspruchen. Als Harold II. davon erfuhr, rief er sofort sein Heer nach Süden, um die Invasoren bei Hastings abzufangen.
stage_group_desc_20005=Der Aufstieg der türkischen Seldschuken-Dynastie war von einer Ausdehnung des Einflussgebietes über das Mesopotamien-Tal und noch weiter nach Westen begleitet. Das arabische Reich vermied einen Konflikt wegen innerer Unruhen. Nach der Einnahme von Manzikert war der byzantinische Kaiser so wütend, dass er Truppen aus Griechenland abzog und beschloss, den Seldschuken einen tödlichen Schlag zu versetzen!
stage_group_desc_20006=Der Tod Balduins IV. stürzte das Königreich Jerusalem in eine größere Krise. Interne Uneinigkeit und Intrigen gaben Saladin die Gelegenheit, das Heilige Land zurückzuerobern. Ein Krieg zwischen Ost und West war nun unvermeidlich.

;战役章节结束
;__font_type[font_text_]
campaign_end_desc_1=Das Weströmische Reich zerfiel infolge ständiger fremder Invasionen und innerer Krisen. Der Untergang dieses antiken Reiches schien unausweichlich, aber er geschah sehr plötzlich und reduzierte die Größe des Reiches erheblich. In Konstantinopel, der Hauptstadt des Byzantinischen Reiches, sah es zu dieser Zeit noch ganz anders aus.
campaign_end_desc_2=Justinian I. und Belisarius werden oft als die größten und einflussreichsten Persönlichkeiten der byzantinischen Ära angesehen. Sie legten den Grundstein für den Aufstieg und die Entwicklung von Byzanz und trugen entscheidend zum Fortbestand des tausendjährigen Reiches bei.
campaign_end_desc_3=Die angelsächsische Invasion führte zur Konsolidierung der ursprünglich geteilten regionalen Mächte Großbritanniens und zur Bildung der sieben Königreiche, aus denen sich das Königreich England entwickelte.
campaign_end_desc_4=Das Byzantinische Reich hatte mit der mächtigen Offensive der Araber zu kämpfen. Währenddessen entbrannten auch auf dem Balkan neue Kriege. Das riesige Reich wurde an mehreren Fronten angegriffen und schien kurz vor dem Zusammenbruch zu stehen.
campaign_end_desc_5=Die Wikinger waren berühmte Seefahrer. Sie fielen nicht nur in verschiedene Länder Europas ein, sondern waren auch in Regionen wie Island und dem amerikanischen Kontinent aktiv. Die Periode der Expansion der Wikinger wird als "Wikingerzeitalter" bezeichnet.
campaign_end_desc_6=Die makedonische Dynastie schuf die zweitherrlichste Periode in der Geschichte des Byzantinischen Reiches. Während dieses jahrhundertelangen goldenen Zeitalters erreichte das Territorium Byzanz' eine seit Justinian I. nicht mehr dagewesene Größe. Sie endete aber schließlich durch den Verlust ihrer Erben.
campaign_end_desc_7=Die normannische Dynastie erlebte die Herrschaft von vier Königen und Heinrich I. sorgte für eine Periode lang anhaltenden Friedens in England. Das Ende der normannischen Dynastie bedeutete den Beginn einer neuen Ära in England.
campaign_end_desc_8=Unter der Führung von Alexius I. besiegten die Kreuzfahrer mächtige Feinde des byzantinischen Reiches, zerstörten aber auch fast dessen jahrhundertealte Grundlage. Die Besetzung Konstantinopels und der Aufstieg des lateinischen Reiches deuteten darauf hin, dass das byzantinische Reich dem Schicksal seines weströmischen Bruderreiches folgen würde.
campaign_end_desc_9=Der 3. Kreuzzug endete in einem Fehlschlag, da Jerusalem immer noch von Feinden besetzt war und Byzanz statt Unterstützung zu leisten mit Saladin Vereinbarungen traf. Folglich wurde zum 4. Kreuzzug gerufen, jedoch anstelle der geplanten Invasion Ägyptens, plünderten die Kreuzfahrer mit Unterstützung der Venezianer Konstantinopel und schufen damit das Lateinische Reich.
campaign_end_desc_10=Isabella und Rogers Aktionen zwangen Edward II. dazu, zugunsten seines Sohnes Edward III. auf den Thron zu verzichten. Die Thronbesteigung Edwards III. trug nicht nur zum Ausbruch des Zweiten Schottischen Unabhängigkeitskrieges bei, sondern war auch der Beginn eines jahrhundertelangen Krieges zwischen England und Frankreich.
campaign_end_desc_11=Der Fall und Wiederaufbau Konstantinopels machte den Byzantinern die große Bedrohung durch die lateinische Welt im Westen bewusst. Währenddessen entstand auf der anatolischen Halbinsel im Osten ein neues Reich, das sich gegen das byzantinische Reich wandte.
campaign_end_desc_12=Obwohl der Aufstieg des Osmanischen Reiches unaufhaltsam schien, wollte sich das Byzantinische Reich nicht beugen. Die westlichen christlichen Länder konnten dem Untergang von Byzanz nicht tatenlos zusehen. Während dieser Zeit erhebt sich im Osten allmählich ein türkischer Stamm - dem Osmanischen Reiches steht auf dem Weg zu seiner Blüte ein harter Kampf bevor.
campaign_end_desc_13=Eduard III. wurde zwar nicht zum König von Frankreich gekrönt, aber der Krieg zwischen den beiden Ländern stoppte. Der langwierige Krieg riss sowohl England als auch Frankreich in einen endlosen Abgrund, riesige Schulden und die grassierende Pest machten beide Länder vorübergehend kampfunfähig.
campaign_end_desc_14=Obwohl der Krieg schließlich von Frankreich gewonnen wurde, verursachte der jahrhundertlange Krieg sowohl dem englischen als auch dem französischen Volk großes Leid und England verlor nach dem Krieg die meisten seiner Gebiete auf dem europäischen Kontinent.
campaign_end_desc_15=Der Fall Konstantinopels bedeutete den Untergang des Byzantinischen Reiches. Der vergangene Ruhm des Reiches wurde unweigerlich zur Geschichte. Das Ende dieses Reiches markierte auch das Ende des Mittelalters und leitete die Entstehung eines neuen europäischen Hegemons ein.
campaign_end_desc_51=Das Weströmische Reich zerfiel infolge ständiger fremder Invasionen und innerer Krisen. Der Untergang dieses antiken Reiches schien unausweichlich, aber er geschah sehr plötzlich und reduzierte die Größe des Reiches erheblich. In Konstantinopel, der Hauptstadt des Byzantinischen Reiches, sah es zu dieser Zeit noch ganz anders aus.
campaign_end_desc_52=Justinian I. und Belisarius werden oft als die größten und einflussreichsten Persönlichkeiten der byzantinischen Ära angesehen. Sie legten den Grundstein für den Aufstieg und die Entwicklung von Byzanz und trugen entscheidend zum Fortbestand des tausendjährigen Reiches bei.
campaign_end_desc_53=Die angelsächsische Invasion führte zur Konsolidierung der ursprünglich geteilten regionalen Mächte Großbritanniens und zur Bildung der sieben Königreiche, aus denen sich das Königreich England entwickelte.
campaign_end_desc_54=Das Byzantinische Reich hatte mit der mächtigen Offensive der Araber zu kämpfen. Währenddessen entbrannten auch auf dem Balkan neue Kriege. Das riesige Reich wurde an mehreren Fronten angegriffen und schien kurz vor dem Zusammenbruch zu stehen.
campaign_end_desc_55=Die Wikinger waren berühmte Seefahrer. Sie fielen nicht nur in verschiedene Länder Europas ein, sondern waren auch in Regionen wie Island und dem amerikanischen Kontinent aktiv. Die Periode der Expansion der Wikinger wird als "Wikingerzeitalter" bezeichnet.
campaign_end_desc_56=Die makedonische Dynastie schuf die zweitherrlichste Periode in der Geschichte des Byzantinischen Reiches. Während dieses jahrhundertelangen goldenen Zeitalters erreichte das Territorium Byzanz' eine seit Justinian I. nicht mehr dagewesene Größe. Sie endete aber schließlich durch den Verlust ihrer Erben.
campaign_end_desc_57=Die normannische Dynastie erlebte die Herrschaft von vier Königen und Heinrich I. sorgte für eine Periode lang anhaltenden Friedens in England. Das Ende der normannischen Dynastie bedeutete den Beginn einer neuen Ära in England.
campaign_end_desc_58=Unter der Führung von Alexius I. besiegten die Kreuzfahrer mächtige Feinde des byzantinischen Reiches, zerstörten aber auch fast dessen jahrhundertealte Grundlage. Die Besetzung Konstantinopels und der Aufstieg des lateinischen Reiches deuteten darauf hin, dass das byzantinische Reich dem Schicksal seines weströmischen Bruderreiches folgen würde.
campaign_end_desc_59=Der 3. Kreuzzug endete in einem Fehlschlag, da Jerusalem immer noch von Feinden besetzt war und Byzanz statt Unterstützung zu leisten mit Saladin Vereinbarungen traf. Folglich wurde zum 4. Kreuzzug gerufen, jedoch anstelle der geplanten Invasion Ägyptens, plünderten die Kreuzfahrer mit Unterstützung der Venezianer Konstantinopel und schufen damit das Lateinische Reich.
campaign_end_desc_60=Isabella und Rogers Aktionen zwangen Edward II. dazu, zugunsten seines Sohnes Edward III. auf den Thron zu verzichten. Die Thronbesteigung Edwards III. trug nicht nur zum Ausbruch des Zweiten Schottischen Unabhängigkeitskrieges bei, sondern war auch der Beginn eines jahrhundertelangen Krieges zwischen England und Frankreich.
campaign_end_desc_61=Der Fall und Wiederaufbau Konstantinopels machte den Byzantinern die große Bedrohung durch die lateinische Welt im Westen bewusst. Währenddessen entstand auf der anatolischen Halbinsel im Osten ein neues Reich, das sich gegen das byzantinische Reich wandte.
campaign_end_desc_62=Obwohl der Aufstieg des Osmanischen Reiches unaufhaltsam schien, wollte sich das Byzantinische Reich nicht beugen. Die westlichen christlichen Länder konnten dem Untergang von Byzanz nicht tatenlos zusehen. Während dieser Zeit erhebt sich im Osten allmählich ein türkischer Stamm - dem Osmanischen Reiches steht auf dem Weg zu seiner Blüte ein harter Kampf bevor.
campaign_end_desc_63=Eduard III. wurde zwar nicht zum König von Frankreich gekrönt, aber der Krieg zwischen den beiden Ländern stoppte. Der langwierige Krieg riss sowohl England als auch Frankreich in einen endlosen Abgrund, riesige Schulden und die grassierende Pest machten beide Länder vorübergehend kampfunfähig.
campaign_end_desc_64=Obwohl der Krieg schließlich von Frankreich gewonnen wurde, verursachte der jahrhundertlange Krieg sowohl dem englischen als auch dem französischen Volk großes Leid und England verlor nach dem Krieg die meisten seiner Gebiete auf dem europäischen Kontinent.
campaign_end_desc_65=Der Fall Konstantinopels bedeutete den Untergang des Byzantinischen Reiches. Der vergangene Ruhm des Reiches wurde unweigerlich zur Geschichte. Das Ende dieses Reiches markierte auch das Ende des Mittelalters und leitete die Entstehung eines neuen europäischen Hegemons ein.
campaign_end_desc_66=Mit dem Krieg endete auch die Herrschaft der Anjou-Dynastie in England. Dies läutete die Ära der walisischen Tudor-Dynastie und das Ende des Mittelalters in England ein.

