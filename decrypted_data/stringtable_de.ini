stage_intro_30001=Die Normannen des Hauses Hauteville in Nordfrankreich standen kurz vor dem Bankrott. Tancred hatte zwölf Söhne und zwei Töchter und war nicht in der Lage, mehr von seinem Besitz zu verteilen. Sein ältester Sohn Wilhelm folgte anderen Normannen auf eine Pilgerreise nach Jerusalem, bevor er sein Glück auf der italienischen Halbinsel versuchte.
stage_intro_30002=Im Jahre 1025 starb der „Bulgarenschlächter“ Basil II. Obwohl seine Nachfolger schwach und inkompetent waren, blieb die von Basil II. geschaffene Armee schlagkräftig. Um mehr Nahrung, Baumwolle und Zucker zu erwerben, ernannte der Kaiser Georgios Maniaces zum General, der die wohlhabende Insel Sizilien erobern sollte. Wilhelm von Hauteville schloss sich dieser Truppe mit 300 Rittern als Söldner an.
stage_intro_30003=Obwohl die Sarazenen von Messina den starken griechischen und normannischen Söldnern praktisch machtlos gegenüberstanden, war die Moral der verbündeten Streitkräfte nicht hoch. Georgios Maniaces, der byzantinische General, war drei Meter groß und hatte ein extrem heftiges Temperament, ein Grund dafür, dass er seine Soldaten oft körperlich bestrafte.
stage_intro_30004=Wie Dominosteine fielen die Städte Siziliens in die Hände der Griechen. Der Geruch des Todes durchforstet die gesamte Insel.
stage_intro_30005=Innerhalb von zwei Jahren fielen zwölf Städte und Festungen an die Griechen, doch in Syrakus hatten sie nicht so viel Glück. Der dort stationierte Emir leistete erbitterten Widerstand und wehrte eine Reihe griechischer Angriffe ab.
stage_intro_30006=Die byzantinische Königsfamilie machte sich Sorgen über die Siege von Maniaces, weil sie befürchtete, er könnte zu mächtig werden und Konstantinopel bedrohen. Infolgedessen begannen sie, die Nachschubslieferungen zu reduzieren und die Zahlungen an die Söldner einzustellen. Nach einer weiteren öffentlichen Demütigung durch Maniaces beschlossen Wilhelm und die normannischen Söldner, die Expedition zu verlassen.
stage_intro_30007=Gefangen zwischen dem Heiligen Römischen Reich und dem Byzantinischen Reich, begannen die Langobarden einen Aufstand, da sie die Ausbeutung durch die zwei Großmächte nicht mehr ertragen konnten. Nach der Ermordung eines früheren lombardischen Anführers wählten die Normannen und Langobarden Arduin von Benevento zu ihrem Anführer.
stage_intro_30008=Die Byzantiner waren wutentbrannt über das Bündnis zwischen den Normannen und Langobarden. Nach gescheiterten Verhandlungen zwischen den Normannen und dem byzantinischen General Michael Dokeianos in Italien wurde ein Krieg unausweichlich.
stage_intro_30009=Die Stärke der Normannen in der italienischen Region erlangte nach und nach Anerkennung bei den Langobarden und lockte immer mehr normannische Ritter auf der Suche nach Ruhm in das Land. Dies stärkte nur Wilhelms Macht und Einfluss.
stage_intro_30010=Die byzantinische Armee ist immer weniger in der Lage, die Normannen auf dem Schlachtfeld zu besiegen. Sie greifen immer öfter auf Bestechung der Feinde zurück, darunter der lombardische Anführer Arduin. Die Normannen spürten, dass der Sieg immer unwahrscheinlicher wurde.
stage_intro_30011=Der lombardische Adlige Guaimar IV. von Salerno versprach den Normannen Land und verheiratete seine Nichte mit Wilhelm. Der Herzog ernannte Wilhelm offiziell zum "Herzog von Apulien" und übertrug die Region den zwölf mächtigsten normannischen Anführern.
stage_intro_30012=1044 schlug Guaimar Wilhelm vor, die süditalienische Region Kalabrien zu besetzen. All das besetzte Land sollte als Belohnung an die Normannen gehen. Ein weiteres mal stießen die Normannen nun in fremdes Land vor...
stage_intro_30013=1045, am Abend vor der nächsten Expedition mit Guaimar, erkrankte Wilhelm plötzlich an Fieber und starb im Alter von 36 Jahren.

family_letter=Aufzeichnung
family_letter_desc_101=Liebster Vater, ich bin nun fort von Jerusalem, mit meinem Onkel in den schönen Ländern von Italien. Nur durch deinen Segen hatten wir eine reibungslose Reise. Das Klima hier im Mittelmeer ist viel angenehmer, als oben in der Normandie. Hier... hier ist der Ort, der, an dem ich aufsteige zu Ruhm und Bekanntheit. Zuletzt bitte ich nur um eines - mögen meine Mutter und meine Brüder und Schwestern in Friede leben.
family_letter_desc_102=Lieber Vater, wir sind in einer blutigen Schlacht in Sizilien verwickelt. Noch schlimmer als die Sarazenen, ist dieser verfluchte Grieche Maniakos ein wahrer Teufel. Nicht den geringsten Respekt für Menschenleben hat er. Würden meine Brüder und ich nicht so tapfer Kämpfen, könnten nicht 10 Leben uns reichen diese Insel zu verlassen. 
family_letter_desc_103=Lieber Vater, seit 2 ganzen Jahren arbeiten wir mit den Griechen zusammen. Hunderte Schlachten haben wir bestritten, Narbe um Narbe mehr auf unseren Körpern. Dennoch werden unsere Aufträge immer kleiner und kleiner. Aber können wir uns noch von ihnen abwenden, oder ist es schon zu spät? Gottes Segen sei mit dir.
family_letter_desc_104=Liebster Vater, seit 3 Monaten haben wir nun keinen Sold mehr erhalten. Nichts als Wunden und Narben gab es als Belohnung. Ich denke, es ist höchste Zeit diesen Ort zu verlassen.
family_letter_desc_105=Lieber Vater, jetzt wo Maniakos endlich vom Griechischen Kaiser abberufen wurde, sind die Griechen in Italien keine ernstzunehmende Bedrohung mehr. Wie auch Karl der Furchtlose will ich gerne ein Pionier sein. Meine Normannischen Kameraden aber kämpfen weiterhin um kleinliche Gewinne. Ruhm und Ehre jedoch bedeuten ihnen nichts!  
family_letter_desc_106=Lieber Vater, ich befinde mich auf dem Weg nach Cannae, diesen verfluchten Ort, wo unsere Vorfahren vor 20 Jahren von den Griechen besiegt worden, und wo Hannibal die Römer demütigend in einer Schlacht besiegte. So möge Gott mich segnen...
family_letter_desc_107=Liebster Vater, auch wenn du schon lange im Himmel bist... ich möchte, dass du weißt, dass ich es endlich geschafft habe. Mir wurde ein Titel verliehen, und ich bin endliche Lehensherr. So mögen wir Normannen die neuen Herrscher Italiens werden. 

