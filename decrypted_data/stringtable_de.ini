;defeated_event_desc
battle_talk_thankgift0=Unterlasst diese sinnlosen Schmeicheleien!
battle_talk_thankgift1=Ich werde die Geschenke annehmen. Mögen unsere beiden Länder den Frieden wahren.
battle_talk_thankgift2=Danke für die Geschenke. Mögen unsere guten Beziehungen erhalten bleiben.
battle_talk_thankgift3=Vielen Dank für Ihre großzügigen Geschenke. Es wäre uns eine Ehre, Ihnen auf jede erdenkliche Weise zu helfen!
battle_talk_acceptagreement1=Zum Wohle unseres Volkes stimme ich einem Waffenstillstand zu!
battle_talk_acceptagreement2=Ich stimme einem Durchzugsabkommen zu. Fortan mögen unsere Waren und Armeen freies Geleit in unser beider Ländereien erhalten.
battle_talk_acceptagreement3=Von heute an sind wir Verbündete!
battle_talk_refuseagreement1=Nun wollt Ihr um Gnade betteln? Was für eine Schande!
battle_talk_refuseagreement2=Ich bedaure. Die Bindungen unserer Länder sind nicht stark genug, um ein Durchzugsabkommen zu unterzeichnen!
battle_talk_refuseagreement3=Mögen wir in der Zukunft ein Bündnis mit Eurem Land schließen, aber dies ist der falsche Zeitpunkt!
battle_talk_tearagreement2=Wir beenden das Durchzugsabkommen. Bitte verlasst sofort unser Territorium!
battle_talk_tearagreement3=Von nun an sind wir keine Verbündeten mehr!
battle_talk_declarewar=Ab sofort sind wir Feinde. Seid bereit, euch der Gerechtigkeit zu stellen!
battle_talk_acceptexhort=Ich kann es nicht glauben, aber ich habe keine andere Wahl, als mich zu ergeben!
battle_talk_refuseexhort=Wir würden lieber in der Hölle schmoren, als uns zu ergeben!
battle_talk_warninvade=Sie betreten unbefugt unser Hoheitsgebiet. Verlasst umgehend unsere Ländereien!
battle_talk_1=Krieger des Stammes, das reiche Gallien soll unseren Hunnen gehören! Schwingt euch in eure Sattel, folgt mir nach Gallien und vernichtet alle Feinde, die es wagen, uns aufzuhalten.
battle_talk_2=Die Engländer haben unseren Vater brutal getötet. Wir, die Söhne von Ragnar, werden uns vereinen und die Engländer mit ihrem Blut bezahlen lassen!
battle_talk_3=Wir haben endlich unser eigenes Königreich errichtet! Ich glaube, dass das mächtige Königreich Dänemark schon bald die gesamte Nordsee erobern wird!
battle_talk_4=Das Vandalenreich und das Byzantinische Reich befinden sich im Krieg. Das ist unsere Chance, die Vandalen und Römer aus Nordafrika zu vertreiben!
battle_talk_5=Welch ein reiches Land! Krieger aus der Steppe, wir haben unermessliche Reichtümer vor uns, die darauf warten, dass wir sie uns mit unseren Schlachtrössern, Bögen und Pfeilen holen!
battle_talk_6=Nachdem Belisarius das Reich der Vandalen vernichtet hatte, besiegte er die Armee des ostgotischen Königreichs in Italien und eroberte sogar die Stadt Ravenna zurück. Jetzt ist er in der Armee angesehener denn je, weshalb man sich mit ihm befassen muss.
tutorial_talk_101=Willkommen im Mittelalter! Hier werde ich einige Grundlagen und den Spielablauf des Eroberungsmodus vorstellen. Bitte wählen Sie ihre Fraktion.
battle_talk_8=In der oberen linken Bildschirmecke finden Sie das Politik-Symbol. Über einen Klick gelangt man in das Fenster für politische Entscheidungen.
battle_talk_9=Nur im Eroberungsmodus können Sie selbstständig politische Entscheidungen treffen. Diese Kosten zwar einige Ressourcen, sind aber dennoch wertvolle Hilfen für Ihre Feldzüge.
battle_talk_10=Die Konsuln besitzen gewisse Fähigkeiten, die unter ihrem Portrait angezeigt werden. Konsuln können auch ausgewechselt werden.
battle_talk_11=Durch ihre Fähigkeiten können Konsuln auch die Kosten politischer Entscheidungen reduzieren.
battle_talk_12=Allerdings kann ein Konsul nur einmal pro Runde ausgewechselt werden.
battle_talk_13=Jede Fraktion beginnt mit ihrer eigenen Auftragskette. Das Erfüllen des aktuellen Auftrags bringt entsprechende Belohnungen.
battle_talk_14=Im Eroberungsmodus hat jede Fraktion ihre eigenen Siegbedingungen. Erfüllen Sie alle Bedingungen, um den endgültigen Sieg zu erringen und die entsprechenden Belohnungen zu erhalten.
battle_talk_15=Wenn Sie die Bedingungen erfüllt haben, können Sie die Eroberung beenden oder mit der Eroberung aller restlichen Gebiete fortfahren.
battle_talk_16=Es gibt derzeit noch eine unerfüllte Siegesbedingung. Versuchen Sie, Winchester, die Hauptstadt der Sachsen, einzunehmen.
battle_talk_17=In der Taverne von Burgen können Sie Ihre vorkonfigurierten Einheiten rekrutieren.
battle_talk_18=Bitte beachten Sie, dass nur die erste Rekrutierung in den Tavernen kostenlos ist.
battle_talk_19=Im Eroberungsmodus können Sie diplomatisch mit anderen Mächten verhandeln.
battle_talk_20=Hier können Sie den Status Ihrer diplomatischen Beziehungen mit anderen Fraktionen sowie deren Entwicklung überprüfen.
battle_talk_21=Sie befinden sich aktuell im Krieg mit den Sachsen sowie den Angeln und im Frieden mit den Jüten.
battle_talk_22=Ihre Diplomatiepunkte bei den Sachsen zeigen einen Abwärtstrend, bei den Angeln einen Aufwärtstrend und bei den Jüten bleiben sie konstant.
battle_talk_23=Es ist nicht klug, auf zwei Fronten gleichzeitig zu kämpfen. Basierend auf Ihren aktuellen Diplomatiepunkten können Sie versuchen, einen Waffenstillstand mit den Angeln zu schließen.
battle_talk_24=In diesem Menü können Sie die aktuellen Konsuln, die verbliebenen Ressourcen und die diplomatischen Beziehungen zu anderen Fraktionen einsehen.
battle_talk_25=Diplomatische Beziehungen, Diplomatiepunkte und ihre Entwicklung werden hier ebenfalls angezeigt.
battle_talk_26=Wenn der Zeiger, der die aktuellen Diplomatiepunkte repräsentiert, zwischen "Krieg" und "Waffenstillstand" steht, können die beiden Fraktionen einen Waffenstillstand unterzeichnen.
battle_talk_27=Je näher sich der Zeiger an "Waffenstillstand" befindet, desto höher ist die Wahrscheinlichkeit, dass ein Waffenstillstand zustande kommt.
battle_talk_28=Um die Erfolgschance von Abkommen mit anderen Fraktionen zu erhöhen, kann man die Diplomatiepunkte durch Geschenke verbessern.
battle_talk_29=Je mehr Ressourcen in Geschenke investiert werden, desto mehr Diplomatiepunkte erhalten Sie dafür.
battle_talk_30=Ihre Diplomatiepunkte bei den Angeln reichen für einen Waffenstillstand aus. Bitte schließen Sie einen Waffenstillstand mit dieser Fraktion.
battle_talk_31=Die Schritte zur Unterzeichnung eines Durchzugsabkommens und eines Bündnisabkommens ähneln denen zur Unterzeichnung eines Waffenstillstandes.
battle_talk_32=Es ist zu beachten, dass für ein Bündnisabkommen zuerst ein Durchzugsabkommen benötigt wird. Für ein Durchzugsabkommen wird wiederum zuvor ein Waffenstillstand benötigt.
battle_talk_33=Wenn Sie die Hauptstadt eines Gegners einnehmen, können Sie die andere Fraktion zur Unterwerfung auffordern.
battle_talk_34=Nachdem Sie Winchester besetzt haben, können Sie versuchen, die Sachsen zur Unterwerfung zu bewegen.
battle_talk_35=Die Erfolgswahrscheinlichkeit der Unterwerfung wird von Ihrer aktuellen Stärke und der verbleibenden Stärke des Gegners beeinflusst.
battle_talk_36=Im Eroberungsmodus begrenzt das Zeitalter den Rang und die Art der rekrutierbaren Truppen.
battle_talk_37=Wenn die Bedingungen erfüllt sind, wird die Aufwertung der Ära automatisch in der nächsten Runde durchgeführt.
battle_talk_38=Die Briten benötigen also zwei Stufe 2 Städte, um in das Dunkle Zeitalter einzutreten.
battle_talk_39=Das Tutorial für den Eroberungsmodus ist nun beendet.
battle_talk_40=Die Kreuzfahrerstaaten im Osten haben einen Hilferuf gesendet. Sie haben unter feindlichen Angriffen zu leiden. Soldaten des Heiligen Römischen Reiches, folgt mir und marschiert in den Osten, um unsere Kreuzritterbrüder zu unterstützen!
battle_talk_41=Krieger des Königreichs Frankreich! Ich beschließe, dem Ruf des Heiligen Stuhls zu folgen, eine Armee zur Unterstützung der Kreuzfahrerstaaten in das Heilige Land zu führen, um Jerusalem zu retten und den höchsten Ruhm und Erlass aller Sünden zu erlangen!
battle_talk_42=Die islamische Welt wird von europäischen Kreuzfahrern überfallen! Das Seldschukenreich muss die wichtige Aufgabe übernehmen, die Völker Westasiens anzuführen und diese Ungläubigen aus unserem Land zu vertreiben, auf dass die Welt wieder Zeuge der Macht des Seldschukenreiches werden kann!
battle_talk_43=Krieg bietet einen Zufluchtsort für die Ehrgeizigen. Während diese Länder und Mächte im Nahen Osten hart gegeneinander kämpfen, ist es für unser Volk der Kiptschak an der Zeit, nach Süden zu ziehen.
battle_talk_44=Jerusalem ist von unserer Armee zurückerobert worden, der Ruhm gehört uns!
battle_talk_45=Krieger unserer Dynastie! Jetzt, da die Macht der Dynastie der Abbasiden von Fira schwindet, ist es an der Zeit, dass alle Araber erkennen, dass nur wir, die Dynastie der Fatimiden, den Ruhm des arabischen Reiches wiederherstellen können!
battle_talk_46=Das byzantinische Reich hat uns eingeladen, gemeinsam das bulgarische Reich anzugreifen. Doch diese klugscheißerischen Griechen wollen uns als ihr Schwert benutzen. Haha, denken Sie etwa, dass es uns an einem Vorwand fehlt, um selbst in die reiche Balkanregion einzudringen und uns ihr habhaft zu werden?
battle_talk_47=Die Ära der Abbasiden-Dynastie gehört nun der Vergangenheit an. Der nächste Schritt wird sein, dass wir, die Buyiden-Dynastie, die islamische Welt anführen!
battle_talk_48=Das ist Blasphemie und Verrat an Gott! Im Namen des Heiligen Vaters rufe ich alle, die an Christus glauben, auf, zu den Waffen zu greifen und diesen Verräter zu vernichten!
battle_talk_49=Soldaten, der Papst hat mich soeben zum "Kaiser des Heiligen Römischen Reiches" gekrönt. Wir sind nun die rechtmäßigen Erben des Weströmischen Reiches!
battle_talk_50=Wie kann ein germanischer Barbar es wagen, sich Kaiser der Römer zu nennen? Das ist eine Beleidigung für das Byzantinische Reich! Wenn wir keine Truppen schicken, um diesen Usurpator zu vernichten, wie können wir uns dann noch Römer nennen?
battle_talk_51=Generäle, Sigismund, der unser Ungarn verließ, als er Kaiser des Heiligen Römischen Reiches wurde und sogar sein Königreich verkaufte, um sein verstreutes Reich zu erhalten, verdient es nicht länger, König von Ungarn zu sein.
battle_talk_52=Ich weiß nicht, ob Gott zu den Engländern liebevoll oder böse ist. Ich weiß nur, dass alle Engländer außer den Toten aus Frankreich vertrieben werden.
battle_talk_53=Soldaten Frankreichs, marschiert mit mir nach Reims, wo der Dauphin zum König von Frankreich gekrönt wird und Gott ist mit uns.
battle_talk_54=Ich habe nichts zu befürchten als Verrat. Für Frankreich werde ich wie ein Mann sterben!
battle_talk_55=Ungarische Krieger, im Heiligen Römischen Imperium kommt es immer wieder zu Rebellionen. Wir müssen dem Imperium helfen, die Situation so schnell wie möglich zu stabilisieren, damit wir der Aggression aus dem Osten mit der Unterstützung des Imperiums widerstehen können.
battle_talk_101=Willkommen im Mittelalter! Hier werde ich Ihnen einige grundlegende Kenntnisse über den Kampf beibringen.
battle_talk_102=Wählen Sie die Einheit, auf die der Pfeil zeigt und wählen Sie dann das Ziel aus, zu dem Sie ziehen wollen.
battle_talk_103=Sie können auch mehrere Bereiche nacheinander auswählen, um mehrere kontinuierliche Bewegungen durchzuführen. Damit ist der gesamte Reisepfad festgelegt.
battle_talk_104=Wenn das gewählte Gebiet nicht das gewünschte Ziel ist, können Sie den Vorgang zurücksetzen und das Ziel neu wählen.
battle_talk_105=Wenn die Einheit nach dem Erreichen ihres Zielgebietes ihre gesamte Mobilität verbraucht hat, kann sie keinen Angriff starten.
battle_talk_106=Wählen Sie die Einheit. Wenn sie bei Erreichen des Ziels noch über Mobilität verfügt, kann sie einen Angriff starten.
battle_talk_107=Wenn genügend Mobilität vorhanden ist, kann die Einheit auch mehrere Angriffe in Folge durchführen.
battle_talk_108=Weisen Sie den Einheiten Generäle zu, um deren Kampfkraft erheblich zu verbessern.
battle_talk_109=Jeder General hat eine aktive Fähigkeit. Verschiedene Generäle haben unterschiedliche aktive Fähigkeiten.
battle_talk_110=Dies ist ein wichtiges Zielgebiet. Besetzen Sie dieses Gebiet und erreichen Sie die Ziele, um zu gewinnen.
battle_talk_111=Nun kennen Sie die Grundlagen des Kampfes und sind bereit für Ihre erste Schlacht!
battle_talk_112=In der Regel kostet jeder Angriff 6 Mobilität. Wenn die verbleibende Mobilität größer als 0 ist, kann ein weiterer Angriff gestartet werden.
battle_talk_201=In Städten können Sie alle regulären Truppen rekrutieren.
battle_talk_202=Unterschiedliche Arten von Truppen können in einer Einheit zusammengefasst werden.
battle_talk_203=Tippen Sie auf die Sanduhr in der unteren rechten Ecke, um die Runde zu beenden.
battle_talk_204=Falls noch Einheiten mit verfügbarer Mobilität vorhanden sind, erhalten Sie eine Warnung.
battle_talk_205=Eine Ihrer Einheiten wird angegriffen. Angeschlagene Truppen können aufgelöst werden, sodass die Einheit mit einer neuen Truppe aufgefüllt werden kann.
battle_talk_206=Wenn eine Einheit über weniger als drei Truppen verfügt, können wir sie wieder auffüllen.
battle_talk_207=Einheiten können aus Truppen aller Kategorien zusammengesetzt werden.
battle_talk_208=Jetzt müssen Sie den Sieg nur noch innerhalb der angegebenen Anzahl von Runden erringen.
battle_talk_209=Während Sie die Truppen zur Auffüllung der Einheit auswählen, können Sie die Position dieser Truppe innerhalb der Einheit prüfen. Zudem werden die Moral, die Mobilität und andere Eigenschaften der Einheit im Falle einer Auffüllung mit der gewählten Truppe angezeigt.
battle_talk_301=Als nächstes sollten Sie versuchen, etwas zu bauen.
battle_talk_302=Tippen Sie auf die Stadt, um die Einrichtungen der Stadt zu verbessern.
battle_talk_303=Die verschiedenen Einrichtungen haben unterschiedliche Effekte.
battle_talk_304=Dies ist ein Dorf. Ein Dorf kann zu einer Burg aufgewertet werden.
battle_talk_305=Mit einer Burg können Söldnereinheiten rekrutiert werden, die in Städten nicht verfügbar sind.
battle_talk_306=Burgen können aufgewertet werden. Verbessern Sie Burgen, um höherstufige Einheiten zu rekrutieren.
battle_talk_307=Die Moral dieser Einheit ist durch einen Angriff gesunken. Das Wiederauffüllen einer Einheit kann eine bestimmte Menge an Moral wiederherstellen.
battle_talk_308=Nun müssen wir die Schlüsselgebiete verteidigen. Natürlich können Sie sich auch dafür entscheiden, die Feinde zu eliminieren.
battle_talk_401=Die Gebäude sind über die ganze Karte verstreut.
battle_talk_402=Silberminen erhöhen die Silbereinnahmen, sofern sie von Ihnen kontrolliert werden.
battle_talk_403=Eisenminen erhöhen die Eiseneinnahmen, sofern sie von Ihnen kontrolliert werden.
battle_talk_404=Wunder haben besondere Auswirkungen auf Ihre Streitkräfte oder jene des Gegners. Jedes Wunder hat unterschiedliche Auswirkungen.
battle_talk_405=Einheiten können Gewässer nur betreten, wenn ihnen Schiffe zugewiesen sind.
battle_talk_406=Die Angriffsstärke von Transportschiffen und Kavallerieeinheiten wird in Seeschlachten stark reduziert.
battle_talk_407=Vermeiden Sie es daher, Schiffe mit Kavallerieeinheiten zu beladen.
battle_talk_408=Glückwunsch, Sie haben das gesamte Tutorial abgeschlossen!
battle_talk_501=Unterschiedliche Terrains führen zu unterschiedlichem Mobilitätsverbrauch. Zusammengesetzte Terrains verursachen einen höheren Mobilitätsverbrauch.
battle_talk_502=Hier können Sie sich einen Überblick über die politischen Entscheidungen Ihrer Fraktion verschaffen.
battle_talk_503=Nur im Eroberungsmodus können Sie selbstständig politische Entscheidungen treffen.
battle_talk_504=Hier können Sie das Truppenlimit, den Steuersatz und die Ressourcen sowie deren Produktion pro Runde überprüfen.
battle_talk_505=Achtung. Bei Überschreiten des maximalen Truppenlimits kommt es zu Steuereinbußen und damit zu verringerter Ressourcenproduktion.
battle_talk_506=Zu Beginn jeder Runde erhalten Sie einen Wissenschaftspunkt, den Sie für den Einsatz von Kriegsgeräten verwenden können.
battle_talk_507=Bitte verteilen Sie Ihre Wissenschaftspunkte achtsam.
battle_talk_10101=Die Goten haben endlich ihr gieriges Gesicht gezeigt! Sie versuchen, unsere reichen Ländereien zu erobern. Soldaten, vertreibt die Barbaren aus unserem Gebiet!
battle_talk_10102=Die Römer sind Heuchler! Sie wollen uns versklaven und gegen die Hunnen einsetzen. Zudem sind sie nicht bereit, uns Nahrung und wichtige Güter zu geben. Gotenkrieger, greift zu den Waffen und leistet Widerstand!
battle_talk_10201=Soeben hat General Sebastianus von der Front eine Siegesmeldung geschickt. Die gotische Vorhut ist zurückgeschlagen worden. Es ist an der Zeit, diese rebellischen Barbaren zu vernichten!
battle_talk_10202=Zaudert nicht! Die römischen Angriffe sind schwach. Wir müssen durchhalten, bis Alexis mit der Kavallerie zurückkehrt, dann werden wir zurückschlagen.
battle_talk_10203=Gut, die römischen Soldaten sind erschöpft. Wir greifen den linken Flügel ihrer Armee von hinten an. Lasst uns den Römern einen letzten Schlag versetzen und den römischen Kaiser lebend gefangen nehmen!
battle_talk_10301=Seine Majestät der Kaiser wird von den Westgoten belagert! Alle Einheiten müssen sich beeilen, unterstützt die Garnison von Mailand!
battle_talk_10302=Alarichs Hauptstreitmacht befindet sich direkt vor uns. Vernichtet die Westgoten!
battle_talk_10303=Als Kaiser des Römischen Reiches sollte er sich nicht an einem so gefährlichen Ort aufhalten.
battle_talk_10304=Soldaten, der römische Kaiser ist in Mailand. Wenn wir die Verteidigungsanlagen von Mailand durchbrechen und den römischen Kaiser gefangen nehmen, werden alle Reichtümer Italiens uns gehören!
battle_talk_10401=Rom wird nicht mehr lange durchhalten, die Stadt darf nicht fallen! Die Verstärkung aus den afrikanischen Provinzen ist im Anmarsch.
battle_talk_10402=Alarich hat Rom geplündert. Wir müssen ihn daran hindern, Ravenna anzugreifen!
battle_talk_10403=Alarich, dieses Mal werde ich dich besiegen und die Welt wird erfahren, wer der König der Westgoten sein soll!
battle_talk_10404=Diese hinterhältigen Römer haben uns überfallen. Es scheint, als wäre die Verhandlung nur ein Vorwand gewesen, um Zeit zu schinden. Wenn Honorius nicht bereit ist, das Lösegeld für den Frieden in Rom zu zahlen, dann werden wir es uns selbst holen!
battle_talk_10405=Sarus, du hast deine eigenes Volk verraten!
battle_talk_10406=Wir waren zu langsam, die römische Verstärkung ist angekommen!
battle_talk_10501=Hermerich, die Navigation in diesem Terrain erweist sich als schwierig. Vor unserem Eindringen sollten wir herausfinden, wo die Feinde stationiert sind.
battle_talk_10502=Diese feigen Vandalen verdienen es nicht, über dieses reiche Land Iberia zu herrschen. Ihr Gebiet sollte zu unserem Königreich Sueben gehören! Krieger von Sueben, greift an!
battle_talk_10503=Kämpft nicht frontal gegen die Sueben. Sie sind mit dem Terrain hier nicht vertraut. Lockt sie in unsere Hinterhalte!
battle_talk_10601=Wir können nicht darauf vertrauen, dass sich die Vandalen an den Vertrag halten. Soldaten, kaiserliche Verstärkung ist auf dem Weg!
battle_talk_10602=Krieger, wenn wir Karthago einnehmen, werden wir nicht nur riesige Mengen an Reichtum erlangen, sondern auch die Herrschaft über das reichste Land in Nordafrika!
battle_talk_10603=Die römische Verstärkung ist da. Haltet sie von der Landung ab!
battle_talk_10701=Die Grausamkeit der Hunnen ist uns allen bekannt. Wir müssen zusammenarbeiten, um sie zu besiegen!
battle_talk_10702=Seit dem Auftauchen der Hunnen wurden wir wiederholt angegriffen und von der Donau bis zum Rhein vertrieben. Wir können nicht weiter fliehen, wir müssen die Hunnen hier und jetzt besiegen!
battle_talk_10703=Die Römer haben die Armeen der Westgoten, Franken und Alanen vereinigt. Glauben sie, es mit meiner Armee aufnehmen können? Lächerlich!
battle_talk_10704=Verliert die Nerven nicht! Versammelt euch um mich und baut die Verteidigungslinie wieder auf!
battle_talk_10705=Den Wölfen ist es egal, wie viele Schafe es gibt.
battle_talk_10801=Die Vandalen begehren schon lange den Reichtum Roms. Gaiserichs Beweggründe für die Entsendung von Truppen sind diesmal nicht so ehrenhaft, wie er es vorgibt.
battle_talk_10802=Maximus ist ein Usurpator. Er hat es nicht verdient, römischer Kaiser zu sein!
battle_talk_10803=Als Verbündete Valentinians III. sollten wir der Königin helfen, den Usurpator Maximus aus Rom zu vertreiben.
battle_talk_10804=Die berühmte "ewige Stadt" ist in Sicht. Wenn wir Rom erobern, werden alle Schätze der Stadt den heldenhaften Vandalensoldaten gehören!
battle_talk_20101=Unser westlicher Nachbar besitzt eine Fülle von Reichtümern, aber bald werden sie alle uns gehören!
battle_talk_20102=Diese römischen Adligen wissen nur, wie sie sich mit Geld ihre persönliche Sicherheit erkaufen können. Greift sie an!
battle_talk_20103=Unsere Kavallerie mag den Persern nicht gewachsen sein, dennoch haben wir keine Angst vor ihnen!
battle_talk_20201=Der Kaiser kann die ständigen Aufstände in Afrika nicht dulden. Der Zustrom von Flüchtlingen sorgt in Konstantinopel für Chaos.
battle_talk_20202=Soldaten, eliminiert diese Rebellen. Ihre Anführer sind unser Hauptziel. Vermeiden Sie unnötige Kämpfe!
battle_talk_20203=Das Reich der Vandalen muss vollständig vom Joch der Herrschaft des Römischen Reiches befreit werden!
battle_talk_20204=Vernichtet die Feinde vom Meer aus!
battle_talk_20301=Halten Sie die Linie und lassen Sie sich nicht durch den Angriff der Kavallerie einschüchtern!
battle_talk_20302=Verschafft mir Zeit für meine Flucht. Solange ich entkomme, wird der Feind sein Ziel nicht erreichen!
battle_talk_20304=Ich habe die nächstgelegene Küstenstadt erreicht. Sobald ich in See steche, kann mich der Feind nicht mehr einholen!
battle_talk_20303=Der Feind verliert an Boden, verstärkt die Angriffe! Nichts kann den Vormarsch des Imperiums aufhalten!
battle_talk_20401=Italien muss wieder unter die Herrschaft des Imperiums gestellt werden. Vertreibt alle Eindringlinge!
battle_talk_20402=Der Feind greift direkt vom Meer her an. Das sind keine guten Nachrichten für uns.
battle_talk_20403=Mit Hilfe unserer Wehranlagen werden wir den Angriff des Feindes schnell zurückwerfen können!
battle_talk_20501=Der Feind hat eine große Anzahl von Truppen aufgestellt, um Ravenna anzugreifen. Ihr Hinterland muss demnach sehr schwach verteidigt sein.
battle_talk_20502=Jetzt, da Rom in unserer Hand ist, können wir unmöglich verlieren!
battle_talk_20601=Wir sind knapp an Lebensmitteln und können es uns nicht mehr leisten, Rom zu verteidigen. Der Rückzug ist jetzt unsere beste Option.
battle_talk_20602=Der Feind kommt immer näher. Ihre Verfolgung zu verlangsamen ist das Beste, was ich jetzt tun kann.
battle_talk_20603=Vertreibt den Feind aus Italien! Dieses Land gehört jetzt uns.
battle_talk_20701=Die Streitkräfte des Römischen Reiches in Italien wurden nicht vollständig vernichtet. Sie können immer noch Truppen über das Meer mobilisieren.
battle_talk_20702=Ataulf, bringen Sie Ihre Flotte nach Ancona und besetzen Sie es. Dies ist der wichtigste Stützpunkt der Römer in Italien!
battle_talk_20801=Rom ist unser einziges Ziel. Lasst nicht zu, dass der Feind unseren Vormarsch verlangsamt!
battle_talk_20802=Vernichtet rasch die Einheiten des Feindes und bringt Italien wieder unter die Herrschaft des Imperiums!
battle_talk_20803=Setzen Sie alle verfügbaren Truppen ein und löschen Sie die Feinde aus!
battle_talk_20901=Die Goten erhalten Verstärkung durch die Franken. Obwohl es sich größtenteils um Bauern handelt, gibt es doch einige fränkische Eliten in ihren Reihen.
battle_talk_20902=Kümmern Sie sich nicht um die Barbaren, sondern konzentrieren Sie sich auf die fränkische Infanterie!
battle_talk_21001=Die Hauptstreitkräfte der Römer sind mit den Kämpfen in Italien beschäftigt. Ihre Streitkräfte müssen hier ziemlich schwach sein.
battle_talk_21002=Brüder, folgt mir nach Konstantinope!
battle_talk_21003=Diese gierigen Barbaren! Wie können sie es wagen, wieder einen Fuß auf unser Land zu setzen!
battle_talk_21004=Belisarius, mobilisiere die Truppen und vernichte den Feind!
battle_talk_30101=Die Römer haben die Insel Britannien aufgegeben, wir dürfen diese Gelegenheit nicht verpassen!
battle_talk_30102=Auf der Insel Britannien gibt es genug Platz für uns Angelsachsen.
battle_talk_30103=Diesen Angelsachsen kann man nicht trauen. Krieger Britanniens, vertreibt die Eindringlinge aus unserem Land!
battle_talk_30201=Die Briten haben den Heimvorteil und sind zahlenmäßig überlegen. Es wäre schwierig, alle ihre Städte mit unseren derzeitigen Truppen einzunehmen.
battle_talk_30202=Ich habe Kontakt zu einer verbündeten Streitmacht in den nahen Küstengebieten aufgenommen. Zuerst übernehmen wir die Kontrolle über die Küste und führen unsere Truppen an Land. Dann vereinen wir unsere Kräfte und marschieren ins Landesinnere.
battle_talk_30203=Wir müssen die angelsächsische Armee auslöschen, bevor die feindliche Verstärkung eintrifft!
battle_talk_30301=Diesmal müssen wir diese feigen Briten besiegen und ihr Land für unser Königreich Northumbria einnehmen!
battle_talk_30302=Ich werde Euch für diesen Verrat bezahlen lassen!
battle_talk_30303=Die Armee von Northumbria ist stark. Aber solange wir Briten uns zusammenschließen, können wir diese Eindringlinge besiegen!
battle_talk_30304=Die Angelsachsen sind sich nicht einig und auch das Königreich Mercia hat Angst vor der Expansion Northumbrias. Sie werden nach Möglichkeiten suchen, Aethelfrith hart zu treffen.
battle_talk_30305=Wir können nicht tatenlos zusehen, wie das Königreich Northumbria wächst und immer mehr an Macht gewinnt!
battle_talk_30401=Soldaten von Gwynedd, das Bündnis mit dem Königreich Mercia ist unsere letzte Chance, Northumbria zu widerstehen. Wir müssen unser Allerbestes geben!
battle_talk_30402=Keine Panik, es handelt sich nur um einen verzweifelten Angriff eines Haufens armseliger Adliger. Solange wir diesem Angriff widerstehen, wird der Aufstieg Northumbrias unaufhaltsam sein!
battle_talk_30403=Wir und das Königreich Gwynedd haben in dieser Schlacht unser Bestes gegeben. Wenn Edwin nicht besiegt werden kann, dann wird das Königreich Northumbria Britannien beherrschen!
battle_talk_30404=Die vielen Siege haben Edwin zu selbstsicher werden lassen. Northumbrias Verteidigung ist voller Löcher!
battle_talk_30501=Meine lieben Landsleute, ich bin Oswald, Sohn des früheren Königs Aethelfrith. Dies ist ein entscheidender Moment für das Überleben unseres Königreichs. Ich bin zurückgekehrt, um euch in die Schlacht zu führen, die Eindringlinge zu besiegen und das große Königreich Northumbria wiederzubeleben!
battle_talk_30502=Oswiu, in meinem Traum erhielt ich eine Botschaft von den Heiligen, dass wir diese Schlacht gewinnen werden!
battle_talk_30503=Soldaten, ich habe Cadwallon besiegt. Lasst uns nun den Rest unseres Territoriums zurückerobern!
battle_talk_30504=Unsere Soldaten brauchen einen König! Wir sind uns alle einig, dass Ihr zum König von Northumbria gekrönt werden solltet.
battle_talk_30505=Wer hätte gedacht, dass es jemanden wie ihn unter den Adligen von Northumbria gibt. Dennoch wird sein Aufstieg hier enden!
battle_talk_30601=Mehrmals hat sich Mercia mit Gwynedd und Powys verbündet, um in unser Land einzufallen. Sie sind ein Hindernis für die zukünftige Entwicklung des Königreichs Northumbria und müssen vollständig beseitigt werden!
battle_talk_30602=Wie erwartet kam Penda, um Powys zu retten. Gemäß meiner Vereinbarung mit Aethelwald würde Penda nach dem Abmarsch aus Mercia seine Truppen zur Eroberung des Throns von Mercia einsetzen.
battle_talk_30603=Eine große Anzahl von Truppen aus Gwynedd ist an unseren Flanken erschienen. Wir sind in Gefahr, umzingelt zu werden!
battle_talk_30604=Northumbria hat gerade erst begonnen, sich zu entwickeln. Doch Oswald ist bereits begierig, den Krieg zu beginnen. Aethelwald, Ihr übernehmt die Bewachung der Nachhut! Ich werde mit meiner Armee das Königreich Powys unterstützen.
battle_talk_30605=Aethelwald, Euer Verrat überrascht mich nicht! Jetzt kann ich die Gelegenheit nutzen, alle Verräter zu beseitigen.
battle_talk_30606=Penda, ich werde mich dir nicht mehr unterwerfen. Ich sollte der rechtmäßige König von Mercia sein!
battle_talk_30701=Krieger, auch wenn der Feind zahlenmäßig stark ist, leidet er unter Nachschubproblemen. Solange wir unsere Position in der Nähe der Stadt verteidigen, wird sich der Feind sicher zurückziehen!
battle_talk_30702=Wenn wir Oswiu besiegen, wird es in Northumbria niemanden mehr geben, der uns herausfordert. Dann wird uns der ganze Reichtum des Königreichs zur Verfügung stehen!
battle_talk_30801=Ludeca, das Königreich Wessex hat sich gegen die Herrschaft unseres Königreichs Mercia aufgelehnt. Diesmal schicken wir Truppen aus, um Wessex zu erobern und die anderen Königreiche davon abzuhalten, denselben Fehler zu begehen.
battle_talk_30802=Ich werde den Feind wissen lassen, was mit denen geschieht, die das Königreich Mercia beleidigen!
battle_talk_30803=Krieger, wenn wir Mercias Angriff hier abwehren, werden sich die anderen Königreiche erheben und sich unserer Sache anschließen. Wessex ist nicht allein!
battle_talk_30804=Es ist Zeit, zurückzuschlagen! Die Vorherrschaft Mericas wird hier enden!
battle_talk_40101=Diese überheblichen Römer sind schwächer als sie aussehen! Lasst uns unsere Boten rächen!
battle_talk_40102=Lächerlich! Die Übeltäter müssen den Preis dafür bezahlen. Sie sollen eine Kostprobe der römischen Macht bekommen!
battle_talk_40103=Zu viele Tote. Rückzug! Wir werden wiederkommen, aber jetzt ist nicht der richtige Zeitpunkt.
battle_talk_40201=Der Feind ist uns zahlenmäßig massiv unterlegen. Lasst sie nicht zurückkehren!
battle_talk_40202=Diese Gefechte sind gut für die Ausbildung meiner Soldaten. Unter allen Umständen werde ich römisches Gebiet betreten!
battle_talk_40203=Zieht Euch zurück, Khalids Armee ist äußerst motiviert und schlagkräftig!
battle_talk_40301=Die Römer sind schon zu lange hier. Jetzt ist es an der Zeit, dass ihnen unsere Kamele und Pferde das Fürchten lehren.
battle_talk_40302=Damaskus ist eine gut befestigte Stadt, dennoch kommt es auf die Entschlossenheit der Verteidiger an.
battle_talk_40303=Der Feind ist zwar zahlenmäßig stark, aber nicht für lange Kämpfe gerüstet. Wenn wir die Verteidigung fortsetzen, werden sie sich schließlich zurückziehen müssen.
battle_talk_40304=Wir brauchen Verstärkung!
battle_talk_40401=Dies ist unsere letzte Festung. Mögen diese Befestigungen uns den Sieg bringen!
battle_talk_40402=Dies ist unsere beste Chance, unsere Herrschaft zu erweitern. Soldaten, kämpft mit Mut!
battle_talk_40403=Die Fähigkeiten der Römer beschränken sich heutzutage nur noch auf den Rückzug und ihre eigene Unterwerfung.
battle_talk_40501=Erobert Jerusalem zurück, die Stadt ist schon zu lange besetzt!
battle_talk_40502=Wir sind völlig umzingelt. So werden wir nicht mehr lange durchhalten!
battle_talk_40503=Ich bin bereit, diese Stadt zum Wohle der Menschen aufzugeben. Ich will nicht noch mehr Tote!
battle_talk_40504=Die heilige Stadt wurde eingenommen. Jetzt ist es an der Zeit, weitere Städte im Norden zu erobern!
battle_talk_40601=Es ist an der Zeit, die Römer aus der syrischen Region zu vertreiben. Dieses Reich ist nur noch der Schatten seiner selbst.
battle_talk_40602=Wir haben eine gewaltige Armee von noch nie dagewesener Stärke aufgestellt! Jetzt ist die Zeit unser größter Feind.
battle_talk_40603=Unsere Verstärkung ist eingetroffen. Ich bin froh, dass wir es rechtzeitig auf das Schlachtfeld geschafft haben!
battle_talk_40701=Die Römer konnten nicht ahnen, dass wir durch eine so große Wüste kommen würden!
battle_talk_40702=Die Araber haben Syrien erobert und jetzt wollen sie in Afrika einfallen. Das können wir nicht zulassen!
battle_talk_40801=Setzt die Segel, volle Fahrt voraus! Vernichtet den Feind, bevor er zurückschlagen kann!
battle_talk_40802=Der Feind kam so unerwartet. Unsere Kriegsschiffe sind unterbesetzt. Ich werde mein Bestes tun, um sie aufzuhalten!
battle_talk_40803=Der Feind leistet erbitterten Widerstand, wir müssen unsere Verstärkungstruppen in die Schlacht schicken!
battle_talk_40804=Die Verstärkungsflotte ist eingetroffen, wir haben das Meer zurückerobert!
battle_talk_50101=Die Städte hier sind sehr wohlhabend. Das ist genau das, was wir brauchen! Beeilt Euch und landet an der Küste! 
battle_talk_50102=Nehmt alles mit, was Ihr seht!
battle_talk_50103=Diese Räuber haben unsere Städte wieder angegriffen. Wir sind ihnen in keiner Weise gewachsen.
battle_talk_50201=Ihre Verteidigung ist brüchig. Besetzt diesen Ort und macht ihn zu unseren neuen Heimat!
battle_talk_50202=Wir können sie nicht frontal besiegen. Wir müssen unsere Kräfte schonen und auf eine Gelegenheit zum Gegenschlag warten!
battle_talk_50301=Schwärmt aus, findet den Feind, vernichtet ihn und erringt den Sieg!
battle_talk_50302=Unsere Späher berichten, dass sich die feindlichen Truppen zerstreut haben. Das könnte eine gute Gelegenheit sein, die Feinde einen nach dem anderen auszuschalten.
battle_talk_50303=Wir sind vom Feind umzingelt! Wenn die Verstärkung nicht rechtzeitig eintrifft, kann es sehr schlimm für uns werden!
battle_talk_50401=Die Wikinger sind sehr gut darin, die Stadt zu verteidigen. Es scheint fast unmöglich für uns, die Belagerung erfolgreich zu beenden.
battle_talk_50402=Lockt sie ins Freie! Ohne den Schutz der Mauern werden sie verwundbar sein.
battle_talk_50501=Wir belagern den Feind schon seit geraumer Zeit. Es ist nur eine Frage der Zeit, bis sie sich zurückziehen.
battle_talk_50502=Achtet auf den Gegenangriff des Feindes! Kämpft hart und eliminiert ihn, bevor er sich zurückziehen kann!
battle_talk_50601=Wir haben Unterstützung aus Dublin erhalten, sie werden mit uns kämpfen!
battle_talk_50602=Die heutige Schlacht wird über unser Schicksal und das Schicksal dieses Landes entscheiden. Soldaten, greift zu den Waffen und kämpft mit mir!
battle_talk_50603=Unsere Verbündeten werden angegriffen, geht und helft ihnen!
battle_talk_50701=Die feindlichen Streitkräfte sind weitaus weniger stark als unsere. Dies ist eine großartige Gelegenheit, sie zu vernichten!
battle_talk_50702=Soldaten, zum Angriff! Tötet sie alle!
battle_talk_50703=Die Verstärkung ist noch nicht eingetroffen. Findet einen Weg, den Angriffen des Feindes zu widerstehen!
battle_talk_50704=Wir brauchen eine Gelegenheit zum Gegenangriff!
battle_talk_50801=Eindringlinge, Eure Invasion wird heute enden!
battle_talk_50802=Obwohl der Feind seit der letzten Schlacht stark geschwächt ist, ist er immer noch sehr gefährlich!
battle_talk_50803=Vernichtet sie! Ich werde der König dieses Landes sein!
battle_talk_60101=Die Verteidigung dieser Stadt ist verwundbar, greift an! Der ganze Reichtum der Stadt wird unser sein.
battle_talk_60102=Wir sollten uns nach dem Sieg über diese Stadt schnellstens zurückziehen! Es tauchen bereits Feinde auf unserem Fluchtweg auf.
battle_talk_60103=Wir haben lange genug gewartet! Tötet sie alle!
battle_talk_60104=Wir sind in einen Hinterhalt geraten! Beeilt Euch, zieht Euch zurück!
battle_talk_60201=Die Zahl unserer Truppen übersteigt die des Feindes bei weitem! Unser Vorteil ist sehr offensichtlich.
battle_talk_60202=Kavallerie, greift mit mir an!
battle_talk_60203=Die Sonne ist verschwunden. Das ist ein ominöses Zeichen!
battle_talk_60204=Greift an, Soldaten! Die Moral des Feindes ist sehr niedrig, lasst diese Gelegenheit nicht verstreichen!
battle_talk_60301=Soldaten, unsere Sache ist gerecht! Die Herrschaft des Byzantinischen Reiches wird heute enden!
battle_talk_60302=Gebt Eure unrealistische Fantasie auf, die Mauern von Konstantinopel werden niemals fallen!
battle_talk_60303=Pterotos, du weißt du nicht, was du getan hast!
battle_talk_60304=Der Feind hat Verstärkung von den Bulgaren angefordert. Wir werden jetzt an zwei Fronten angegriffen!
battle_talk_60401=Die Magyaren stellen keine Bedrohung mehr für uns dar. Konzentriert Euch auf das Byzantinische Reich!
battle_talk_60402=Unsere Hauptstreitmacht steht weit entfernt an der Ostgrenze. Wir können uns nur auf unsere lokalen Truppen verlassen, um der feindlichen Invasion zu widerstehen.
battle_talk_60403=Die Lage ist sehr schlecht. Wir müssen einen Weg finden, Simeon I. zum Rückzug zu bewegen!
battle_talk_60404=Der Feind hat mit seinen Gegenangriffen begonnen! Wo sind unsere Verstärkungstruppen?
battle_talk_60501=Diese Schlacht wird über unser Schicksal entscheiden! Wir haben es mit einem Feind zu tun, der so stark ist wie nie zuvor.
battle_talk_60502=Lasst uns unseren Nachbarn eine kleine Überraschung bereiten! Soldaten, Angriff!
battle_talk_60503=Die Späher haben erfolgreich das Hinterland des Feindes erreicht, der Angriff wurde eingeleitet!
battle_talk_60504=Unsere Stadt wird angegriffen! Wie sind sie dorthin gekommen? Alle Einheiten, zurück zur Verteidigung der Stadt!
battle_talk_60505=Wo sind die Verstärkungseinheiten? Jetzt, wo wir die Oberhand haben, dürfen wir diese Chance nicht verpassen!
battle_talk_60601=Unser Plan, die Araber um Hilfe zu bitten, wurde von den Byzantinern zunichte gemacht. Jetzt haben wir keine andere Wahl, als sie selbst zu bekämpfen.
battle_talk_60602=Wir müssen schnell mit einem Teil der feindlichen Truppen fertig werden, bevor ihre Hauptstreitmacht eintrifft. Die Zeit läuft uns davon!
battle_talk_60603=Konstantinopel liegt direkt vor uns. Wenn wir sie einnehmen, wird dies ihren Untergang bedeuten!
battle_talk_60604=Wir sind vom Feind umzingelt! Dies ist unsere letzte Verstärkung, Ihr müsst Euch beeilen!
battle_talk_60605=Schicken Sie die hinteren Truppen an die Front! Wir werden bald die feindlichen Stellungen durchbrechen.
battle_talk_60701=Wir sind auf die russischen Truppen gestoßen. Nun, da sie über eine starke Armee verfügen, müssen wir uns vorübergehend zurückziehen!
battle_talk_60702=Rücken Sie vor und vernichten Sie alle Feinde, die Sie sehen!
battle_talk_60703=Baut unsere Verteidigungsanlagen hier auf! Ich denke, unsere Verstärkung wird bald hier sein.
battle_talk_60704=Die Byzantiner hätten nie gedacht, dass ich mit den Slawen angreifen würde!
battle_talk_60705=Unsere Truppen sind in eine noch nie dagewesene Krise geraten!
battle_talk_60801=Ich schwöre, wir werden das verlorene Gebiet zurückerobern! Soldaten, greift an!
battle_talk_60802=Sie sind nur ein unorganisierter Mob. Wir werden nicht einen einzigen Zentimeter Land verlieren!
battle_talk_60803=Unsere Stadt wird angegriffen, schickt sofort Unterstützung!
battle_talk_60804=Unsere Truppen sind nicht mehr in der Lage zu kämpfen, wir müssen uns vorübergehend zurückziehen!
battle_talk_60805=Der Pass wurde angegriffen, verstärken Sie die Verteidigung!
battle_talk_60901=Unsere Feinde lagern am Nordufer des Flusses und sind erschöpft von der langen Reise.
battle_talk_60902=Wir können diesen endlosen Kampf nicht fortführen. Wir brauchen eine verdeckte Operation, um ihren Anführer auszuschalten!
battle_talk_61001=Soldaten, Angriff! Die Bulgaren sind keine Bedrohung mehr für uns!
battle_talk_61002=Die Feinde sind grausam. Alles, was wir jetzt tun können, ist zu verteidigen.
battle_talk_61003=Schickt die Verstärkung herein, dies ist unser letzter Vorstoß!
battle_talk_61004=Wir haben die feindliche Grenzstadt erfolgreich eingenommen. Soldaten, folgt mir!
battle_talk_70101=Der Thron von England soll und wird mir gehören!
battle_talk_70102=Eine in so kurzer Zeit aufgestellte Truppe kann dem anrückenden Feind kaum Widerstand leisten!
battle_talk_70103=Sie werden London nicht betreten!
battle_talk_70104=Die Herrschaft über England ist nun mein!
battle_talk_70105=Sehr gut, macht weiter! Nichts wird sich meiner Armee in den Weg stellen!
battle_talk_70106=Wir sind in einen Hinterhalt geraten, ich muss mich sofort an einen sicheren Ort zurückziehen!
battle_talk_70201=Alle Gebiete Englands verdienen meinen Schutz. Jetzt, da die Sicherheit Londons bedroht ist, kann ich ihr nicht den Rücken kehren!
battle_talk_70202=Southwark hat sich mit einer großen Anzahl von Rebellen verschanzt. Sie müssen ausgeschaltet werden!
battle_talk_70203=Feinde tauchen in unserem Hinterland auf! Wie sind sie dorthin gekommen?
battle_talk_70204=Meine Truppen haben schwere Verluste erlitten, aber wir können uns nicht einfach so zurückziehen!
battle_talk_70205=Unsere Stadt wird angegriffen! Wo bleibt die Verstärkung?
battle_talk_70301=Es gibt immer noch eine große Anzahl von Rebellen in Exeter. Ich, der König der Nation, kann die Anwesenheit von Rebellen auf meinem Land nicht dulden!
battle_talk_70302=Ich werde keinen Banditen als König dieses Landes anerkennen!
battle_talk_70303=Mein Ziel ist es, die Stadt zu erobern. Ich erlaube Euch, Euch zu ergeben.
battle_talk_70304=Die Rebellen dürfen nicht unterschätzt werden, ich brauche Eure Hilfe!
battle_talk_70401=Marschiert vorwärts! Jeder, der sich meiner Herrschaft verweigert, wird als mein Feind betrachtet!
battle_talk_70402=Habt keine Angst, Soldaten! Unsere Verbündeten haben uns Hilfe versprochen.
battle_talk_70403=Unsere Verstärkung ist eingetroffen!
battle_talk_70501=Es gibt eine Rebellion auf dem Gebiet des Königreichs, die wir um jeden Preis niederschlagen müssen!
battle_talk_70502=Seine Majestät, der König, ist nicht im Lande. Wir können uns also nur auf uns selbst verlassen.
battle_talk_70503=Ich habe genug von diesem neuen König! Es gibt keinen besseren Zeitpunkt, um seine Herrschaft zu stürzen!
battle_talk_70504=Durch das Besiegen ihrer Speerspitze hatten wir genug Zeit.
battle_talk_70505=Wir werden angegriffen und brauchen Unterstützung!
battle_talk_70506=Die Situation ist jetzt günstig für uns!
battle_talk_70601=Meine Brüder, er ist von der Gier nach Macht korrumpiert worden. Er ist in unser Gebiet eingedrungen und hat unser Volk verfolgt. Wir müssen zurückschlagen!
battle_talk_70602=Als König von England bin ich der rechtmäßige Herrscher der Normandie! Alle, die sich widersetzen, werden als meine Feinde betrachtet!
battle_talk_70603=Der feindliche Angriff ist heftig, schickt die Reserveeinheiten!
battle_talk_70604=Graf Mortain hatte Erfolg! Soldaten, Angriff!
battle_talk_70605=Unsere Verstärkung ist eingetroffen. Wir müssen den feindlichen Angriff um jeden Preis aufhalten!
battle_talk_70606=Hoffentlich wird unsere Ankunft den Lauf der Schlacht ändern. Es ist noch nicht zu spät!
battle_talk_70701=Die Franzosen haben das Gebiet um das Fürstentum wiederholt angegriffen. Diese Übergriffe werden nun ein rasches Ende finden!
battle_talk_70702=Das Erbe der Normandie, ein Gebiet des Königreichs Frankreich, soll vom Königreich bestimmt werden.
battle_talk_70703=Mann ist zu meiner Herrschaft zurückgekehrt und die Zeit zum Gegenschlag ist gekommen!
battle_talk_70704=Um uns steht es nicht gut! Ich denke, ich sollte mich zurückziehen.
battle_talk_70705=Wo bleibt die Verstärkung? Nutzen wir unsere Übermacht und greifen wir an!
battle_talk_70801=Der Feind im Norden stellt keine Bedrohung mehr dar. Wenn wir die Rebellen um London vernichten, wird meine Herrschaft unerschütterlich sein!
battle_talk_70802=Ratte! Ihr habt keinen Anspruch auf Vaters Thron, ich werde ihn mir für meine Familie zurückholen!
battle_talk_70803=Ganz England ist bereits in der Hand des Feindes. Die Lage ist sehr ungünstig für uns!
battle_talk_70804=London ist unter Beschuss, die Stadt benötigt unbedingt Unterstützung!
battle_talk_80101=Krieger, das Imperium braucht uns, um mehr Land zu erobern und mehr Städte für sich einzunehmen!
battle_talk_80102=Das einst mächtige Byzantinische Reich steht am Rande des Zusammenbruchs. Dies ist der beste Zeitpunkt für einen Angriff!
battle_talk_80103=Ich kann keine Barbaren auf meinem Land dulden! Wir müssen sie vertreiben und das Gebiet zurückerobern!
battle_talk_80104=Der Feind versucht vergeblich, unsere Stadt einzunehmen. Krieger, rückt zur Unterstützung vor!
battle_talk_80201=Die Römer haben uns getäuscht! Sie wollen keinen wirklichen Frieden, sie wollen uns nur unser Land wegnehmen!
battle_talk_80202=Diese Barbaren hatten es eilig und sind wohl schlecht vorbereitet. Wir müssen unsere Stärke ausnutzen, um den Sieg zu erringen!
battle_talk_80203=Die Situation ist zwar festgefahren, aber das kann unsere Entschlossenheit zum Sieg nicht beeinträchtigen!
battle_talk_80204=Wo bleibt die Verstärkung? Ich brauche Unterstützung!
battle_talk_80205=Krieger, kämpft weiter!
battle_talk_80301=Wieder einmal sind die wilden Barbaren in unser Territorium eingedrungen, aber dieses Mal haben sie den Angriff vom Meer aus gestartet.
battle_talk_80302=Unsere eilig zusammengestellte Flotte ist dem Feind an Zahl unterlegen.
battle_talk_80303=Krieger, wir brauchen mehr Land und mehr Ressourcen! Diese können nur von uns selbst erobert werden.
battle_talk_80304=Unsere Truppen haben schwere Verluste erlitten. Zum Glück ist die Verstärkung eingetroffen.
battle_talk_80305=Wir müssen die Kontrolle über dieses Meer übernehmen und jeden Feind in Sichtweite vernichten!
battle_talk_80401=Seine Majestät, der Kaiser, hat uns eine starke Armee zur Unterstützung mitgebracht. Jetzt ist der beste Zeitpunkt, um unser verlorenes Gebiet zurückzuerobern!
battle_talk_80402=Mit den unendlichen Möglichkeiten und Reichtümern, die sich hier bieten, wird uns der Sieg alle Tore öffnen!
battle_talk_80403=Die Einnahme der Stadt vor uns wird der Beginn unseres Eroberungsplans sein!
battle_talk_80404=Haltet die Stadt, wir sind nicht alleine!
battle_talk_80405=Unsere Verstärkung ist eingetroffen und der feindliche Angriff wurde wirksam eingedämmt!
battle_talk_80406=Weitere Verstärkungen sind eingetroffen und der Plan des Feindes ist zum Scheitern verurteilt!
battle_talk_80501=Die Stadt ist leicht zu verteidigen und schwer anzugreifen, zudem sind unsere Vorräte bereits sehr knapp!
battle_talk_80502=Keine Sorge, die Verstärkung von Alexios hat sich bereits auf den Weg gemacht! (Allerdings kehrten die Truppen von Alexios I. nicht lange nach ihrem Aufbruch um und sagten die Unterstützungsaktion ab).
battle_talk_80503=Haltet die Stadt! Wir sind gut versorgt und unsere Verstärkung wird bald eintreffen.
battle_talk_80504=Unterstützen Sie Antiochia schnell, die Stadt ist sehr wichtig für uns!
battle_talk_80505=Wir müssen Antiochia zurückerobern und den Feind vertreiben!
battle_talk_80506=Es sieht so aus, als würden wir keine Verstärkung bekommen.
battle_talk_80601=Die Truppen, die uns zu Hilfe kamen, haben uns erfolgreich bei der Verteidigung geholfen. Nun ist es an der Zeit, dass wir das verlorene Gebiet selbst zurückgewinnen!
battle_talk_80602=Die gegnerischen Bogenschützen sind sehr stark, wir dürfen ihnen nicht unbedacht begegnen!
battle_talk_80603=Die feindlichen Streitkräfte sind angesichts unserer großen Stärke nicht der Rede wert, vernichtet sie!
battle_talk_80604=Die feindliche Verstärkung trifft ein. Achten Sie darauf, die Formation zu halten!
battle_talk_80701=Die Stärke des Feindes ist der unseren nicht gewachsen! Dies ist die perfekte Gelegenheit für uns, verlorenes Territorium zurückzugewinnen!
battle_talk_80702=Vertreibt die Barbaren ein für alle Mal aus Anatolien!
battle_talk_80703=Meine Truppen sind nicht so stark wie die des Feindes, also kann ich sie nur einzeln zerschlagen!
battle_talk_80704=Der Feind im Norden wurde besiegt und wir haben eine große Anzahl feindlicher Truppen gefangen genommen. Die Situation ist sehr zu unseren Gunsten.
battle_talk_80801=Die Barbaren sind wieder einmal in unser Land eingedrungen und haben es niedergebrannt und geplündert. Wir müssen sie aus unserem Gebiet vertreiben!
battle_talk_80802=Beeilt euch. Es warten noch viele Vorräte auf uns, die wir einsammeln müssen und ein großes Stück Land, das wir einnehmen können!
battle_talk_80803=Der Feind ist sehr flexibel und wir müssen uns klare Ziele setzen, wobei die Rückeroberung unseres Territoriums oberste Priorität hat!
battle_talk_80804=Wie können sie es wagen, einen Gegenangriff zu starten! Löscht sie alle aus!
battle_talk_90101=Wir sind umzingelt und versinken im Chaos! Wir müssen einen Weg finden, auszubrechen!
battle_talk_90102=Diese Reiter müssen die Anführer der Einheiten sein. Wir müssen sie zuerst ausschalten!
battle_talk_90103=Sie kommen also direkt auf uns zu, weil wir auf Pferden sitzen?
battle_talk_90104=Krieger, der Feind steht jetzt unter Belagerung! Wir müssen unseren Vorteil der großen Reichweite voll ausspielen und keine direkten Angriffe starten.
battle_talk_90105=Ich habe es endlich in den Kampfbereich geschafft. Ich hoffe, ich bin nicht zu spät dran!
battle_talk_90106=Dank unserer Verstärkung kämpft der Feind nun an zwei Frontlinien. Dies ist eine gute Gelegenheit, einen Gegenangriff zu starten!
battle_talk_90201=Die Stadt vor uns ist das Endziel unserer Reise!
battle_talk_90202=Wir sind jetzt vor Jerusalem, haben aber keine Vorräte mehr.
battle_talk_90203=Ihre Mauern sind unüberwindbar, solange die umliegende Garnison intakt ist. Vernichtet sie und brecht den Widerstand!
battle_talk_90204=Krieger, wir können hier nur ausharren und hoffen, dass unsere Verstärkung kommt!
battle_talk_90205=Unsere nördlichen Verteidigungsanlagen sind durchbrochen worden und Jerusalem ist dem Feind völlig ausgeliefert!
battle_talk_90206=Ihre Verteidigungsanlagen sind äußerst brüchig. Ich habe die Offenbarung erhalten, dass wir die Stadt einnehmen können!
battle_talk_90207=Es ist sinnlos, an der Stellung festzuhalten. Wir müssen einen letzten verzweifelten Versuch wagen!
battle_talk_90301=Unsere Truppen haben auf dem Marsch schwere Verluste erlitten und können keine weitere Belastung ertragen!
battle_talk_90302=Obwohl Damaskus unser Ziel geworden ist, halte ich es immer noch nicht für eine gute Wahl.
battle_talk_90303=Jerusalem kann nicht zu viel Nachschub liefern. Wir müssen uns beeilen!
battle_talk_90304=Die feindlichen Truppen stehen kurz vor dem Zusammenbruch. Wir müssen nur die Stadt halten, um den Sieg zu sichern!
battle_talk_90305=Unsere Verluste sind zu hoch! Wir können nicht weiterkämpfen, Rückzug!
battle_talk_90306=Der Feind wurde von uns zurückgedrängt. Krieger, setzt unsere siegreiche Verfolgung fort!
battle_talk_90307=Wir haben nur noch wenige Wachen, haltet durch!
battle_talk_90401=Die Stadt vor uns wird ein wichtiger Teil unseres weiteren Plans sein, sie muss erobert werden!
battle_talk_90402=Die Küstengebiete werden uns Nachschub ermöglichen, aber auch den Feind. Wir müssen die Schlacht so schnell wie möglich beenden!
battle_talk_90403=Wir können uns nicht einfach zurücklehnen und zusehen, wie die Stadt vor uns belagert wird! Wir müssen Hilfe leisten!
battle_talk_90404=Meine Truppen werden bald die Frontlinie erreichen.
battle_talk_90405=Wir haben einen starken und wichtigen Verbündeten verloren, was sich sehr nachteilig auf unsere Operationen auswirkt!
battle_talk_90406=Unsere verteidigenden Truppen haben schwere Verluste erlitten. Wir müssen die Umzingelung des Feindes durchbrechen!
battle_talk_90407=Beenden wir diesen Kampf und legen unsere Waffen nieder. Ihr seid die Sieger in dieser Schlacht!
battle_talk_90501=Der Feind ist im Anmarsch, wir können ihn nicht weiterziehen lassen!
battle_talk_90502=Vernichtet sie gleich hier. Iconium darf nicht angegriffen werden!
battle_talk_90503=Schlagt das Lager auf, versorgt die Truppen und zieht dann weiter!
battle_talk_90504=Wir sind in einen Hinterhalt geraten und müssen einen Weg finden, aus diesem auszubrechen!
battle_talk_90505=Lasst den Feind nicht zu nahe herankommen und nutzt den Vorteil unserer Mobilität!
battle_talk_90506=Die vordere Garnison wurde durchbrochen! Wir brauchen mehr Männer zur Unterstützung der Verteidigung!
battle_talk_90507=Iconium ist unter Beschuss! Wo bleibt die Verstärkung?
battle_talk_90508=Besetzt die Stadt vor Euch, für unsere Sache der Gerechtigkeit!
battle_talk_90601=Die Kreuzritter sind zweifellos stark, aber wir können nicht zulassen, dass Jaffa weiter von ihnen besetzt wird!
battle_talk_90602=Holen wir uns die Stadt zurück, das ist unsere Rache!
battle_talk_90603=Ich konnte den erbitterten Kampf in der Stadt vom Meer aus sehen. Beeilt Euch, wir müssen sie unterstützen!
battle_talk_90604=Diese Stadt gehört jetzt uns! Plünderungen sind strikt untersagt!
battle_talk_90605=Der Feind beginnt mit einem Gegenangriff, haltet die Mauern!
battle_talk_90606=Wir werden angegriffen! Wo bleibt die Verstärkung?
battle_talk_90607=Ziehen wir uns zurück und warten auf Verstärkung! Mit ihrer Unterstützung starten wir dann einen weiteren Angriff!
battle_talk_90701=Diese westlichen Barbaren haben endlich ihr wahres Gesicht gezeigt. Konstantinopel ist nun in Gefahr!
battle_talk_90702=Gebt jeden sinnlosen Widerstand gegen unsere Sache der Gerechtigkeit auf!
battle_talk_90703=Wir haben Unterstützung aus Venedig erhalten, dies ist eine enorme Hilfe für uns bei der Einnahme der Stadt!
battle_talk_90704=Die Vernichtung der Verteidiger entlang der Küste ist die einzige Möglichkeit, den Weg für unsere Verstärkung zu öffnen!
battle_talk_90705=Verstärken Sie die Kräfte an der Küste! Wir dürfen nicht zulassen, dass die Kriegsschiffe die Meerenge erreichen!
battle_talk_90706=Konstantinopel ist nicht mehr in der Lage, dem feindlichen Angriff standzuhalten! Wir müssen die Stadt evakuieren!
battle_talk_90707=Sammeln Sie den Rest der Truppen, hoffentlich wird dies den feindlichen Angriff verzögern!
battle_talk_90708=Meine Flotte ist auf dem Weg zum Zielgebiet. Die Verteidiger entlang der Küste hindern mich allerdings daran, mit voller Geschwindigkeit voranzukommen!
battle_talk_90709=Die feindliche Flotte nähert sich unserer Stadt!
battle_talk_90710=Ich kann bereits die Mauern Konstantinopels sehen!
battle_talk_90801=Wir sind erfolgreich gelandet und der Rückeroberung Jerusalems einen Schritt näher gekommen!
battle_talk_90802=Der Feind vor uns ist das größte Hindernis für unsere Rückeroberung Jerusalems, vernichtet ihn!
battle_talk_90803=Diese Truppen haben gerade Wellen und Seegang hinter sich und sind daher noch geschwächt. Lasst sie jetzt unsere Macht spüren!
battle_talk_90804=Unsere Stadt wird angegriffen! Wir können nicht zulassen, dass der Feind weiter vorrückt!
battle_talk_90805=Die letzte Verteidigungslinie ist durchbrochen worden und Kairo ist dem Feind ausgeliefert!
battle_talk_90806=Unsere Verstärkung ist eingetroffen. Dies ist eine gute Nachricht!
battle_talk_90807=Kairo ist unter Beschuss. Wir müssen die Verteidigung der Stadt rundum verstärken!
battle_talk_90808=Die Landungstruppe hat schwere Verluste erlitten! Die Stärke des Feindes übersteigt meine Vorstellungskraft!
battle_talk_100101=Wir hatten Frieden mit den Walisern, aber nun bereiten sie eine Rebellion vor, um meine Herrschaft zu stürzen! Das kann ich nicht dulden, es muss unterbunden werden!
battle_talk_100102=Sieh da, unser König ist mit seiner Armee eingetroffen. Sollte ich kapitulieren?
battle_talk_100103=Der Feindliche Angriff ist verheerend, aber wir haben zuverlässige Städte als Barrieren. Lasst Euch von ihrer Zahl nicht einschüchtern!
battle_talk_100104=Mit dem Königreich Powys als Barriere an der Front müssen wir uns entscheiden, ob wir direkte Angriffe starten oder das Königreich umgehen.
battle_talk_100105=Das Königreich Powys wird angegriffen. Wir müssen Truppen entsenden, um ihnen zu helfen!
battle_talk_100106=Wie lange wollt Ihr noch Widerstand leisten? Gebt auf und kapituliert!
battle_talk_100107=Meine Stadt wird angegriffen und der Feind versucht, uns einen nach dem anderen auszulöschen!
battle_talk_100108=Gebt den Widerstand auf und Euer König wird Gnade walten lassen!
battle_talk_100109=Schlagt alle Feinde zurück, die es wagen, uns anzugreifen! Wir kämpfen nicht alleine!
battle_talk_100110=Dieser Kampf ist völlig sinnlos!
battle_talk_100111=Das Königreich von Powys ist von uns besiegt worden. Es ist nur eine Frage der Zeit, bis wir diesen Krieg gewinnen werden.
battle_talk_100201=Diese hinterhältigen Bretonen. Wie können sie es wagen, mich mit der Sicherheit meiner Mutter zu bedrohen! Wir können diese Anmaßungen nicht hinnehmen!
battle_talk_100202=Wir müssen schnellstmöglich in den Süden ziehen und das Ziel schützen!
battle_talk_100203=Achten Sie auf die Bewegungen der Franzosen! Unnötige Angriffe sind zu vermeiden, da unsere Lage momentan recht ungünstig ist.
battle_talk_100204=Senden Sie ein Team aus, um die Briten abzufangen. Wir dürfen nicht zulassen, dass unsere Pläne durchkreuzt werden!
battle_talk_100205=Die Vorstoßtruppe hat schwere Verluste erlitten, wir brauchen mehr Truppen für Angriffe!
battle_talk_100206=Unsere Verbündeten sind in Schwierigkeiten, wir müssen ihnen helfen!
battle_talk_100207=Die Briten sind wegen Eleanor nicht in der Stimmung für den Krieg. Das ist die perfekte Gelegenheit für uns!
battle_talk_100208=Die Briten haben sich hier zahlreiche Feinde gemacht. Trotz der aktuellen Situation wagen sie es, uns anzugreifen. Soldaten, zeigt ihnen, wozu wir fähig sind!
battle_talk_100209=Nein! Was habt Ihr mit meiner Mutter gemacht!
battle_talk_100301=Die Franzosen versuchen, unser Gebiet in der Normandie zu besetzen. Das werden wir nicht dulden!
battle_talk_100302=Obwohl wir die Umzingelung der Burg Gaillard vorerst abgeschlossen haben, sind die Nachschublinien des Feindes noch nicht unterbrochen!
battle_talk_100303=Wir müssen den Nachschub zum Schloss Gaillard vollständig abschneiden. Dies ist für die Rückeroberung der Normandie unerlässlich!
battle_talk_100304=Gaillard ist leicht zu verteidigen, aber schwer anzugreifen. Erlauben Sie dem Feind nicht, die Belagerung zu stören!
battle_talk_100305=Erobern Sie die Städte und Festungen um die Burg Gaillard, um die Garnisonen in der Burg zur Aufgabe zu bewegen!
battle_talk_100306=Unser Gebiet wird vom Feind angegriffen, unterstützt die Front!  
battle_talk_100307=Die Situation ist sehr nachteilig für uns!
battle_talk_100308=Die Burg Gaillard wird vollständig vom Feind kontrolliert. Jetzt bleibt nur noch der Rückzug!
battle_talk_100309=Nun sind wir der Rückeroberung unseres Landes einen Schritt näher gekommen!
battle_talk_100310=Vertreibt die Franzosen aus meinem Gebiet!
battle_talk_100401=Soldaten, unser König ist im Begriff, einen Krieg gegen die Briten zu führen. Der Graf von Flandern hat sich jedoch dem Ruf des Königs widersetzt, was zweifellos ein Verrat ist!
battle_talk_100402=In diesem Fall können wir die "Hilfe" des Grafen von Flandern nur auf unsere eigene Weise erhalten!
battle_talk_100403=Vor uns wurden Boote gesichtet, aber es schien niemand an Bord zu sein. Ich werde mir diese Sache selbst ansehen!
battle_talk_100404=Es scheint, dass unsere Boote im Hafen angegriffen werden. Schickt jemanden, der nachsieht, was da los ist!
battle_talk_100405=Unser Feind ist eingetroffen. Beeilt Euch und sammelt den Reichtum, den wir brauchen!
battle_talk_100406=Wir haben eine große Anzahl von Vorräten erhalten. Der König wird sehr zufrieden sein.
battle_talk_100407=Beeilt Euch und baut die Verteidigung auf. Wir müssen etwas Zeit zur Plünderung gewinnen!
battle_talk_100408=Der Feind vor uns ist so gut wie ausgeschaltet. Die Vorräte hier stehen uns zur Verfügung!
battle_talk_100501=Soldaten der vereinten Streitkräfte! Zu lange schon haben die Franzosen unrechtmäßig Gebiet besetzt. Das kann ich nicht dulden!
battle_talk_100502=Breitet die Kampflinien aus, wir stehen einem mächtigen Feind gegenüber!
battle_talk_100503=Trotz der gewaltigen Stärke der verbündeten Streitkräfte des Feindes haben wir noch die Möglichkeit, den Sieg zu erringen! Der Feind wird mit Sicherheit ins Chaos stürzen, wenn wir die beiden Flanken dieser völlig unorganisierten Truppen ausschalten!
battle_talk_100504=Mein König hat sich darauf vorbereitet, Paris im Süden anzugreifen. Ich glaube, die Nachricht von seinem Sieg wird bald eintreffen!
battle_talk_100505=Die verbündeten Truppen haben auf beiden Flanken schwere Verluste erlitten. Soldaten, greift an! Wir dürfen nicht zulassen, dass der Feind unsere Stellungen an den Flanken durchbricht!
battle_talk_100506=Die Soldaten auf beiden Flanken sind besiegt worde, wir werden diesen Kampf verlieren!
battle_talk_100507=Soldaten, greift an! Die Verteidigung des Feindes ist sehr schwach!
battle_talk_100508=Wir haben die wichtige Stadt verloren!
battle_talk_100601=Die unvernünftigen Forderungen der Barone wurden von uns zurückgewiesen und sie haben aggressiv geantwortet.
battle_talk_100602=Diese Rebellion muss niedergeschlagen werden, wir werden keine Forderungen akzeptieren!
battle_talk_100603=Es geht nicht um Profit, wir kämpfen um unser Überleben!
battle_talk_100604=Die Herrschaft des Königs hat die normale Ordnung in unserem Gebiet massiv bedroht!
battle_talk_100605=Heinrich III. ist von uns gefangen genommen worden. London wird unserem Diktat folgen!
battle_talk_100606=Wir können nicht zulassen, dass diese Rebellen Unruhe stiften, vernichtet sie!
battle_talk_100607=Der König wurde erfolgreich gerettet und der Plan der Rebellen ist gescheitert!
battle_talk_100608=Soldaten, kämpft für euren König!
battle_talk_100609=Wir werden angegriffen! Versammelt die Soldaten und startet einen Gegenangriff!
battle_talk_100701=Die doppelzüngigen Schotten sind absolut unzuverlässig! Unser König sollte nicht so gnädig sein.
battle_talk_100702=Die Verteidigung dieser Stadt stellt kein Hindernis für unsere Armee dar. Ihre Reichtümer stehen euch zur Plünderung bereit!
battle_talk_100703=Unser Gebiet steht vor einer Invasion. Die feindliche Armee ist sehr stark und uns weitaus überlegen.
battle_talk_100704=Nun können wir uns nur noch auf andere Methoden verlassen, um den Angriff des Feindes abzuwehren. Wir glauben, dass es noch Chancen für Gegenangriffe gibt.
battle_talk_100705=Warum ist der Feind in unserem Hinterland aufgetaucht? Wie um alles in der Welt haben die gerissenen Schotten das geschafft?
battle_talk_100706=Die Armee befindet sich in einer sehr festgefahrenen Situation. Ich beginne zu bereuen, dass ich Euch mit einer so wichtigen Mission betraut habe!
battle_talk_100707=Volk von Schottland, greift zu den Waffen gegen die Eindringlinge!
battle_talk_100801=Die Franken haben eine Einigung mit uns erzielt. Jetzt können wir uns auf Schottland konzentrieren und diesen Aufstand so schnell wie möglich niederschlagen!
battle_talk_100802=Die Niederlage bei Stirling Bridge steht uns noch lebhaft vor Augen. Wir müssen diese Schande mit einem Sieg wegwaschen!
battle_talk_100803=Hütet Euch vor den schottischen Speeren, unsere Kavallerie ist nicht gut auf solche Waffen vorbereitet!
battle_talk_100804=In früheren Schlachten habe ich bewiesen, dass die Engländer unseren freien Willen nicht erschüttern können!
battle_talk_100805=Krieger, lasst nicht zu, dass die Angst eure Herzen beherrscht!
battle_talk_100806=Unsere Flanken werden angegriffen! Helft ihnen, wir können nicht zulassen, dass sie aufgerieben werden!
battle_talk_100807=Ansturm! Der Feind hat den Rückzug angetreten!
battle_talk_100808=Meine Truppen sind schwer getroffen worden und ich muss mich vorerst zurückziehen.
battle_talk_100809=Der feindliche Anführer wurde von uns geschlagen! Jetzt ist die Zeit zum Gegenangriff gekommen!
battle_talk_100901=Seit langem haben die Schotten ein großes Stück Land besetzt, das uns gehört. Jetzt wollen sie Stirling Castle für sich einnehmen, was wir nicht dulden können!
battle_talk_100902=Sammelt die Truppen! Robert Bruce soll sehen, was die englische Armee zu leisten vermag!
battle_talk_100903=Die Engländer haben eine große Armee aufgestellt, die eine ernsthafte Bedrohung für uns darstellt!
battle_talk_100904=Wir können die Belagerung von Stirling Castle nicht lockern! 
battle_talk_100905=Wenn diese Feinde erst einmal vernichtet sind, werden die Verteidiger der Burg die Hoffnung auf Rettung verlieren und sich uns ergeben!
battle_talk_100906=Meine Streitaxt ist mit dem Blut der Feinde befleckt. Soldaten, kämpft tapfer!
battle_talk_100907=Unsere Stellungen werden angegriffen, der feindliche Angriff muss gestoppt werden!
battle_talk_101001=Was Isabella getan hat, ist zweifelsohne ein Verrat. Sie hat England verraten und sie hat mich verraten!
battle_talk_101002=Nun will sie mir die Macht nehmen. Sie muss verrückt sein!
battle_talk_101003=Edward hat sich von Despenser und seinem Sohn täuschen lassen. England sollte nicht in ihren Händen begraben werden!
battle_talk_101004=Die dreckige Verräterin ist in England gelandet und hat Hilfe von den Franzosen bekommen!  
battle_talk_101005=Der Usurpator hat bereits viele Städte eingenommen, das Schicksal Englands ist in der Schwebe.
battle_talk_101006=Die Wölfin von Frankreich hat mehr militärische Unterstützung bekommen!
battle_talk_101007=Die strahlende Perle des Königreichs, ihre Majestät, die Königin, herrscht über das ihr treu ergebene England!
battle_talk_101008=Zieht Euch vorerst zurück, wir sind nicht stark genug, um sie zu bekämpfen!
battle_talk_101009=Der Thron von England lässt sich nicht einfach so stehlen!
battle_talk_101010=Wir haben noch Hoffnung auf einen Gegenangriff.
battle_talk_101011=Starten Sie den letzten Angriff auf den Verräter!
battle_talk_101012=Eure Majestät, ich hoffe, dass meine Ankunft Euch den Weg nach vorne ebnen wird.
battle_talk_101013=Ich freue mich, Euch zu dienen, Eure Majestät!
battle_talk_110101=Der Feind ist äußerst naiv, wenn er denkt, dass er mit uns konkurrieren kann, weil er vom Lateinischen Reich Zuflucht erhalten hat.
battle_talk_110102=Der Feind ist zwar in völliger Unordnung geflohen, aber die Verfolgung ist dennoch nicht auf die leichte Schulter zu nehmen.
battle_talk_110103=Michael ist bereits auf seine Verstärkung getroffen und es wird vermutet, dass noch mehr auf dem Weg sind.
battle_talk_110104=Beschützt mich! Solange wir aus dem Kampf herauskommen, gibt es noch Hoffnung für uns!
battle_talk_110105=Der Feind war mir dicht auf den Fersen und ich musste meinen Rückzug fortsetzen. Ich konnte hier nicht länger ausharren!
battle_talk_110106=Ein Schritt näher an meiner erfolgreichen Flucht aus dem Kriegsgebiet, doch wo bleiben die Verstärkungen?
battle_talk_110107=Unsere Verbündeten befinden sich im Chaos!
battle_talk_110108=Die Armee war desorganisiert und Gerüchte machten die Runde. Die Soldaten waren nicht mehr kampffähig und mir erging es nicht anders.
battle_talk_110109=Ich habe es geschafft, genug Zeit für meine Flucht zu gewinnen, sodass Ihr Sieg bedeutungslos ist!
battle_talk_110201=Konstantinopel lag vor meinen Augen, doch nun war die Stadt von gerissenen Barbaren besetzt.
battle_talk_110202=Wenn wir unsere Nation wiederbeleben wollen, müssen wir sie zurückerobern!
battle_talk_110203=Der ahnungslose Bursche ließ sich nicht davon abbringen, nach Konstantinopel zurückzukehren.
battle_talk_110204=Der Feind vor der Stadt war nicht stark genug, um die Mauern zu überwinden.
battle_talk_110205=Die Festung am Goldenen Horn ist verloren! Was zum Teufel machen die Verteidiger?
battle_talk_110206=Unsere äußeren Verteidigungsanlagen sind kurz davor, durchbrochen zu werden! Die Stadt darf nicht eingenommen werden!
battle_talk_110207=In mir keimte die Hoffnung, die Stadt zurückerobern zu können.
battle_talk_110208=Obwohl die Gelegenheit zur Rückeroberung der Stadt nahe war, musste ich mich jetzt zur Versorgung der Einheiten zurückziehen.
battle_talk_110209=Wir haben keine Truppen mehr! Die Verstärkung muss sich beeilen und dem Angriff folgen!
battle_talk_110301=Wieder einmal stehen wir vor dieser majestätischen Stadt.
battle_talk_110302=Um die Stadt zurückzuerobern, müssen wir zuerst die Wachbataillone auf beiden Seiten einnehmen.
battle_talk_110303=Nachdem ich mich um das Wachbataillon gekümmert habe, habe ich einen Weg gefunden, in die Stadt zu gelangen.
battle_talk_110304=Die Tore des Frühlings wurden geöffnet! Mit der Einnahme dieses Ortes wird die Hälfte der Stadt in unsere Hände fallen!
battle_talk_110305=Die Tore sind durchbrochen worden, wir stehen kurz vor dem Erfolg!
battle_talk_110306=Aber als nächstes müssen wir die Venezianer im Auge behalten, die unsere größte Bedrohung in diesem Feldzug sind.
battle_talk_110307=Was passiert außerhalb der Stadt?!
battle_talk_110308=Wir werden angegriffen! Wenn wir hier bleiben, wird uns das nur das Leben kosten, also müssen wir uns zurückziehen!
battle_talk_110401=Obwohl das Kaiserreich wieder zu seinem alten Glanz zurückgefunden hat, bleibt das Fürstentum Achaia eine Bedrohung.
battle_talk_110402=Um dies zu erreichen, muss das Reich die Kontrolle über Griechenland wiedererlangen.
battle_talk_110403=Die byzantinische Armee dachte, sie könne leicht gewinnen. Ihre Arroganz hatte sie jedoch gelähmt - dies war unsere beste Chance!
battle_talk_110404=Nachdem sie erfolgreich den Rücken des Feindes überfallen haben, müssen die hysterischen feindlichen Streitkräfte ihren Frontalangriff verstärkt haben.
battle_talk_110405=Es gibt keinen Aufschub mehr, startet den Großangriff!
battle_talk_110406=Der Feind hat vom Land und von der See aus angegriffen - verstärkt unser Hinterland!
battle_talk_110501=Als Ergebnis früherer Operationen sind unsere Truppen jetzt überall verstreut.
battle_talk_110502=Die Truppen von William II. waren bereit, eine für uns sehr ungünstige Belagerung einzuleiten.
battle_talk_110503=Das ist der beste Zeitpunkt für uns, den Feind zu vertreiben. Denn so isoliert wie er ist, gibt es keine Chance mehr für einen Gegenangriff.
battle_talk_110504=Unsere Armee hat eine große Anzahl von Söldnern abgeworben. Die Moral der Armee ist jetzt sehr niedrig und sie ist nicht mehr kampffähig!
battle_talk_110505=Der Sieg wird sicherlich unser sein. Bringen Sie all diese Gefangenen der Garnison zu Fall!
battle_talk_110506=Wir wurden von versprengten feindlichen Truppen angegriffen! Unser Fokus blieb dennoch beim Feind an der Front.
battle_talk_110601=Wir haben Unterstützung aus dem Herzogtum Athen erhalten. Jetzt ist die byzantinische Armee nicht mehr zu fürchten!
battle_talk_110602=Eine große Anzahl von Feinden kam auf uns zu, weshalb wir zum Rückzug gezwungen waren.
battle_talk_110603=Wenn Sie entlang der Küste marschieren, sollte es möglich sein, einer großen Anzahl von Feinden auszuweichen und den Rückzugsort sicher zu erreichen.
battle_talk_110604=Soldaten, halten Sie Ihre Positionen und lassen Sie sich von der Moral der abtrünnigen Truppen nicht beirren!
battle_talk_110605=Ich habe nicht bedacht, dass der Feind noch immer auf dem Meer präsent ist. Ich benötige dringend Unterstützung!
battle_talk_110606=Ein neuer Feind ist in unserem Hinterland aufgetaucht. Ich habe den Rückzugspunkt in Sicht, bleiben Sie dran!
battle_talk_110607=Ich frage mich, wie es jetzt um die zurückgebliebenen Truppen bestellt ist.
battle_talk_110608=Der Angriff ist unsere beste Chance, den Feind zu besiegen.
battle_talk_110609=Meine Truppen sind bereit zum Abmarsch.
battle_talk_110701=Der lateinische Adel hat sich mit Hilfe der Venezianer wieder aufgerappelt, was uns in eine ungünstige Lage versetzt.
battle_talk_110702=Die venezianische Flotte ist so stark, dass wir uns im Moment nur Verteidigungensiv verhalten und auf Unterstützung warten können.
battle_talk_110703=Ich muss meine Legion so schnell wie möglich wiederherstellen. Solange sie gut versorgt ist, kann ich sie dazu bringen, jeden Feind zu besiegen!
battle_talk_110704=Soldaten, stürmt mit mir zum Siege! Die Chance, das Imperium zu seinem früheren Ruhm zurückzuführen, ist nahe!
battle_talk_110705=Da die Verteidigung des Feindes eine deutliche Lücke aufweist, ist jetzt der richtige Zeitpunkt zum Angriff!
battle_talk_110706=Eine eilig zusammengestellte Flotte will nun Venedig herausfordern?
battle_talk_110801=Berat war für das Imperium von lebenswichtiger Bedeutung! Und nun dient die Stadt dem Feind als Brückenkopf, um das Imperium anzugreifen!
battle_talk_110802=Die Stadt ist leicht zu verteidigen und schwer anzugreifen. Daher müssen wir zuerst ihre Versorgung unterbrechen.
battle_talk_110803=Meine Freunde, die Zeit, das Imperium wiederzubeleben, ist gekommen! Also schließt euch mir in diesem Kampf an!
battle_talk_110804=Der Feind will die Stadt Berat belagern! Verteidigen Sie sie mit aller Kraft und sorgen Sie dafür, dass Sie Ihre Vorräte nicht verlieren!
battle_talk_110805=Die Truppen an der Südfront wurden schwer getroffen, sie benötigen dringend Unterstützung!
battle_talk_110806=Die Nordfront steht kurz vor dem Zusammenbruch, sind unsere Truppen so verwundbar?
battle_talk_110807=Der Nachschub für die Stadt Berat wurde erfolgreich abgeschnitten! Jetzt ist der richtige Zeitpunkt zum Angriff gekommen!
battle_talk_110808=Die Verteidigungsanlagen der Stadt sind durchbrochen worden und der Angriff ist in vollem Gange.
battle_talk_110809=Wir sind nur noch einen Schritt vom Sieg entfernt!
battle_talk_120101=Unsere Armee ist frontal auf die osmanische Armee gestoßen und sie ist so groß und schnell, dass ich befürchte, dass es schwierig sein wird die Osmanen zu besiegen.
battle_talk_120102=Die schwache byzantinische Armee stellt für uns keine Bedrohung dars. Soldaten, vernichtet den Feind vor euch.
battle_talk_120103=Der feindliche Angriff war heftig, aber wir mussten Stellung halten und einen passenden Zeitpunkt zum Rückzug finden.
battle_talk_120104=Ich kann mich nicht rumsitzen und zusehen, wie fremde Truppen in das Territorium des Imperiums eindringen!
battle_talk_120105=Wir erhielten Hilfe aber sie reichte nicht aus, um gegen den Feind anzukommen.
battle_talk_120106=Unsere Truppen stehen unter einem erbitterten feindlichen Gegenangriff, schicken Sie mehr Männer und intensivieren Sie die Offensive!
battle_talk_120107=Feinde tauchten auch an der Flanke auf und warum wurden die feindlichen Linien vor uns nicht dünner?
battle_talk_120108=Die Zeit des Rückzugs ist gekommen, jetzt ist die perfekte Gelegenheit, sich aus dem Kampf zurückzuziehen.
battle_talk_120109=Durch die Annahme das die byzantinische Armee nicht zu einem solchen Gegenangriff fähig war, wurde der Moral der Armee ein schwerer Schlag versetzt.
battle_talk_120201=Die leichtsinnigen Byzantiner sind in einen Bürgerkrieg verwickelt und dies ist die beste Zeit für uns, unser Territorium weiter zu vergößerm und unsere Macht zu sichern.
battle_talk_120202=Die Stadt Prusa ist zu wichtig für uns, um zuzulassen, dass der Feind unser Land verwüstet.
battle_talk_120203=Die Belagerung der Stadt hat uns bereits viel Zeit und Vorräte gekostet und die Verteidigung des Feindes muss so schnell wie möglich zerstört werden.
battle_talk_120204=Erobere und halte die Außenposten, die um die Stadt herum verstreut sind, um die Versorgungslinien des Feindes abzuschneiden und dadurch vorteilhafte Grundlagen für unseren Angriff zu schaffen.
battle_talk_120205=Die äußere Verteidigung von Prusa wurde vom Feind durchbrochen und die Stadt steht kurz davor, direkt dem Angriff des Feindes ausgestetzt zu sein.
battle_talk_120206=Gut, wir sind der erfolgreichen Eroberung der Stadt einen Schritt näher gekommen, aber feindliche Verstärkungen treffen ein.
battle_talk_120207=Sichern Sie die Verteidigungslinie, wir können den Feind nicht erlauben weiter vorzudringen!
battle_talk_120301=Anatoliens schwache Verteidigungsarmee machte den Feind schließlich auf sich aufmerksam.
battle_talk_120302=Der Feind versammelt eine große Armee für einen Angriff auf Nicäa. Wir müssen die Stadt halten, da sie ein wichtiges Bollwerk von Konstantinopel ist.
battle_talk_120303=Greifen Sie mit aller Kraft an, sorgen Sie sich nicht um Nachschub oder Verstärkungen, dieses Land wird bald uns gehören.
battle_talk_120304=Nicäa war verloren und Konstantinopel war in Gefahr.
battle_talk_120305=Wir haben den Kontakt mit einer kleinen Gruppe von Truppen hergestellt, hoffentlich das wird helfen.
battle_talk_120306=Unter solchen Umständen hatte der Feind den Mut, Enthauptungen anzuwenden, eine Entscheidung die als sehr kühn bezeichnet werden musste, aber sie konnte uns nicht am Vordringen hindern.
battle_talk_120307=Wir werden weiterhin mit Nachschub versorgt und drängen weiter nach vorne.
battle_talk_120308=Das Reich der Byzantiner wird immer kleiner und wir werden mit Sicherheit den endgültigen Sieg erringen.
battle_talk_120401=Anatolien entgleitet allmählich der Kontrolle des Imperiums und wir können es uns nicht länger leisten, den Feind vorrücken zu lassen.
battle_talk_120402=Wir können uns keine weitere Verluste erlauben, wenn wir Nicäa zurückerobern wollen.
battle_talk_120403=Die byzantinische Armee ist bis heute nicht in der Lage die Realität zu erkennen, also lasst uns ihnen durch unser Handeln zeigen, dass dieses Land den Osmanen gehört hat.
battle_talk_120404=Meine Truppen rücken allmählich vor, aber der Feind bereitet einen Gegenangriff vor.
battle_talk_120405=Unsere Städte werden angegriffen, entsendet mehr Truppen und vertreibt den Feind aus dem Land.
battle_talk_120406=Der Feind hatte uns eingekesselt, wir waren vollständig umzingelt.
battle_talk_120407=Wir haben deutlich weniger Truppen als der Feind und jeder weitere Verlust könnte zu unserer totalen Niederlage führen. Beschütze meine Truppen!
battle_talk_120501=Ein starke Erdbeben zerstörte die Mauern und Verteidigungsposten von Gallipoli und die osmanische Armee würde diese einmalige Gelegenheit niemals ungenutzt lassen.
battle_talk_120502=Jetzt, wo wir einen Mangel an Truppen und Nahrung haben, müssen wir einen Weg finden, genügend Geld zu sammeln, um die Stadt zu freizukaufen.
battle_talk_120503=Die Verteidigungsanlagen von Gallipoli wurde vollständig zerstört, die Einnahme der Stadt sollte eine leichte Aufgabe sein!
battle_talk_120504=Dummes Byzanz, da es ernsthaft glaubt, die Stadt mit Geld zurückkaufen zu können.
battle_talk_120505=Überraschenderweise ist ein unerwarteter Feind aufgetaucht. Achten Sie auf feindliche Truppen auf dem Meer.
battle_talk_120506=Es scheint, dass Byzanz nicht in der Lage ist, die Stadt mit Gewalt zurückzuerobern. Deshalb sollten wir die Initiative ergreifen.
battle_talk_120507=Die byzantinische Armee ist jetzt stark geschwächt, es ist Zeit, unser Territorium zu erweitern!
battle_talk_120508=Hmpf, ein gerissener Kerl. Unter dem Vorwand, Geld zu sammeln, hat er gewagt unsere Stadt anzugreifen.
battle_talk_120509=Wir werden angegriffen und der Feind will mehr als nur eine Stadt, Gallipoli!
battle_talk_120601=Adrianburg, die drittgrößte Stadt des Byzantinischen Reiches, würde unsere Stärke enorm erweitern, wenn wir sie einnehmen würden.
battle_talk_120602=Die Eroberung dieser Stadt wird eine konstante Versorgung für unseren zukünftigen Angriff auf Konstantinopel bieten.
battle_talk_120603=Bereiten Sie sich auf den Kampf vor. Die osmanische Armee wird sich nicht leicht zurückziehen, wir müssen die Stadt um jeden Preis verteidigen!
battle_talk_120604=Ich werde dir gnädig Zeit lassen, um zu kapitulatieren und verspreche dir, im Falle deiner Kapitualtion dir ein anständiges Leben zu gewähren!
battle_talk_120605=Meine Geduld ist begrenzt, Soldaten, macht euch bereit!
battle_talk_120606=Unsere Verstärkungen kommen, willst du immer noch Widerstand leisten?
battle_talk_120607=Bist du bereit zu scheitern?
battle_talk_120608=Meine Geduld ist erschöpft. Jetzt stürmt die Stadt für mich.
battle_talk_120609=Wir können uns nicht einfach nichts tun und zusehen, wie Fort Adrian in eine Chaos gestürtzt wird. Entsendet  Truppen zu ihrer Hilfe!
battle_talk_120610=Unsere Hinterreihen wurden angegriffen, aber warum war der Feind dort?
battle_talk_120701=Das Reich ist jetzt nicht mehr in der Lage, die Verteidigung aller Städte zu gewährlesiten und Thessaloniki den Venezianer zu überlassen, ist die beste Option.
battle_talk_120702=Die Stadt sollte den Osmanen gehören und jetzt gebe ich euch die Chance, euch zu ergeben.
battle_talk_120703=Da diese Stadt schon immer uns gehört hat, gibt es absolut keine Möglichkeit aufzugeben.
battle_talk_120704=Die Osmanen starteten einen Angriff auf Thessaloniki und obwohl dies den Druck auf Konstantinopel verringerte, blieb die Situation angespannt.
battle_talk_120705=Jetzt gehört die Stadt den Osmanen und die venezianische Flotte kann uns nicht aufhalten.
battle_talk_120706=Thessaloniki befindet sich in einer Krise, aber meine Flotte wurde von der osmanischen Marine blockiert. Es ist jetzt dringend erforderlich, die Blockade zu durchbrechen um Thessaloniki zu helfen.
battle_talk_120707=Der vergebliche Versuch der Byzantiner, eine Offensive zu starten, um die Venezianer zu entlasten, ergab keinen Sinn.
battle_talk_120708=Der Feind hat einen Gegenangriff gestartet, schicken Sie unsere Reserveeinheiten.
battle_talk_120709=Die osmanische Flotte, die das Meer blockiert hat, wurde besiegt und unsere Flotte rückt weiter vor!
battle_talk_120801=Es heißt, die Stadt vor uns soll die stärksten und majestätischsten Stadtmauern der Welt haben.
battle_talk_120802=Jetzt, da wir eine neue Belagerungswaffe besitzen, wird die Stadt sicherlich überrannt und dann Teil des Territoriums des Imperiums werden!
battle_talk_120803=Der Feind ist bereits in der Stadt und wir haben jetzt keine andere Wahl, als im Kampf bis zum letzten Moment unser Bestes zu geben.
battle_talk_120804=Der Feind sollte noch keine Zeit haben, eine Seeblockade einzurichten, deshalb sollte es noch nicht zu spät sein, um mit dem Boot zu fliehen.
battle_talk_120805=Die Mauern wurden durchbrochen, betritt die Stadt und bereite dich auf unseren Sieg vor!
battle_talk_120806=Die Außenverteidigungen sind vollständig außer Gefecht und wir haben keinen Ausweg mehr.
battle_talk_120807=Wie können wir Feinde in unserer Flanke haben? Zerstört und lasse nicht zu, dass die Belagerungsplan beeinträchtigt wird!
battle_talk_120808=Die feindliche Seeblockade wurde erfolgreich durchbrochen, evakuiert jetzt so schnell wie möglich, Sicherheit geht vor!
battle_talk_120809=Dummkopf, dein Versagen hat die Aktionen des Imperiums beeinflusst und du hast es dem Feind ermöglicht zu entkommen!
battle_talk_120810=Konstantinopel wird angegriffen, wir können uns nicht einfach zurücklehnen und nichts tun. Stechen Sie so schnell wie möglich mit der Flotte in See, hoffentlich ist es nicht zu spät.
battle_talk_120811=Ab heute gehört diese Stadt dem Osmanischen Reich!
battle_talk_120812=Konstantinopel wurde eingenommen und wir wurden vernichtend besiegt.
battle_talk_120901=Ich hatte nicht die Absicht, den Thron zu besteigen. Mir wurde befohlen, meine Tochter zur Zeit der Krise Roms mit Euch zu verheiraten und mit Euch die Welt zu regieren, warum also verbittert sein?
battle_talk_120902=Konstantinopel sollte mir gehören! Euer Thron wurde usurpiert, Rom sollte nicht zwei Kaiser haben!
battle_talk_120903=Rettet zuerst meinen Sohn, dann werde ich Geld für Euch auftreiben!
battle_talk_120904=Da ich den Auftrag erhalten habe, werde ich die Rebellion für Euch niederschlagen!
battle_talk_120905=Sie beschäftigen auch Türken und holen sich dadurch Wölfe ins Haus! In Zukunft wird es endlose Probleme geben.
battle_talk_120906=Ich werde nicht untätig herumsitzen und nichts tun! Beseitigt die Dissidenten!
battle_talk_120907=Nun gut, auch wir werden Unterstützung leisten!
battle_talk_120908=Es sieht so aus, als ob die Unterstützung aus Serbien und Bulgarien abgeschnitten werden muss. Paleoreg wird besiegt werden!
battle_talk_120909=Die Türken sind momentan zu stark, aber wir werden zurückkommen!
battle_talk_121001=Wir werden unser Territorium auf dem Balkan weiter konsolidieren! Plündert weiter die Dörfer, die vor euch liegen!
battle_talk_121002=Unsere Dörfer werden niedergebrannt! Unsere Leute werden getötet! Wir können es nicht mehr ertragen, verlassen wir diese Lande!
battle_talk_121003=Stürmt in ihre hinteren Reihen! Lasst sie nicht in ihr Lager zurückkehren!
battle_talk_121004=Verdammt, ich bin von einem Pfeil getroffen worden!
battle_talk_121005=Nein! Welche Zukunft hat mein Reich jetzt, nachdem mein Sohn in der Schlacht gefallen ist! Welche Hoffnung bleibt mir nun?
battle_talk_130101=Jetzt stehen wir  gegen die Strömung und werden geblendet. Unsere Position ist nicht für Seekämpfe geeigneten, es scheint, dass die Götter mir nicht geholfen haben!
battle_talk_130102=Wir sind im Luvbereich und die Eisenseile sind mit dem Schiff verbunden, ich sehe, wie die Briten uns schlagen können!
battle_talk_130103=Sollten wir nicht einige Schiffe aus dem Marinehafen schicken, um aus mehreren Richtungen anzugreifen?
battle_talk_130104=Es besteht keine Notwendigkeit, die Truppen zu verteilen und sehen wir uns an, wie die britische Armee vollständig vernichtet wurde!
battle_talk_130105=Hey, es gibt keinen Grund, mit den Idioten zu sterben, ich werde nur von hinten beobachten.
battle_talk_130106=Groß! Der Wasserfluss hat sich geändert! Segeln Sie den Strom hinunter! Verhindere das sie das Meer erreichen!
battle_talk_130107=Wir können unser Schiff nicht bewegen. Löst die Seile!
battle_talk_130108=Ah! Es ist alles vorbei!
battle_talk_130201=Wir waren den Briten drei zu eins überlegen und hatten die beste schwere Kavallerie und der Sieg war gegen die müde Gruppe fast ein Geschenk.
battle_talk_130202=Besetze und nutze das Gelände! Keine Panik! Pass auf deine rechte Flanke auf, Prinz, lass nicht zu, dass ihre Kavallerie deinen Hinterreihen angreift!
battle_talk_130203=Ja! Ich werde dafür sorgen, dass sie nicht zurückkommen!
battle_talk_130204=Die genuesischen Armbrustschützen scheinen überhaupt nicht in der Lage zu sein, auf die britischen Truppen zu schießen. Ritter, greift mit mir an!
battle_talk_130205=Es herrscht zu viel Chaos, wo sind meine Soldaten!
battle_talk_130206=Wehrt ihren letzten Angriff zurück! Es wird ein großer Sieg!
battle_talk_130301=Mir war nicht klar, dass wir die Stadt fast ein Jahr lang belagert hatten, aber ich hatte nicht erwartet, dass die Stadtmauer von Calais so stark sein würde!
battle_talk_130302=Verstärkung trifft aus den Niederlanden ein und wir müssen ihnen helfen!
battle_talk_130303=Schneide ihre Seeversorgungslinien ab!
battle_talk_130304=Schütze die Nachschubesschiffe, die den Verteidigern von Calais einen schweren Schlag versetzen werden.
battle_talk_130305=Haltet durch, unser Nachschub kommt!
battle_talk_130306=Wir können nicht zulassen, dass sie unsere Landversorgungslinien wieder abschneiden oder Calais wird wirklich ungeschützt sein.
battle_talk_130307=Die Blockierung der Landversorgungslinien der Franzosen war ihr letztes Gefecht.
battle_talk_130401=Die britischen Truppen sind auf dem Festland, ihr zuhause ungeschützt, diesmal werden wir in Zusammenarbeit mit den Franzosen in der Lage sein, ihnen einen schweren Schlag zu versetzen!
battle_talk_130402=Wie erwartet haben die Schotten doch rebelliert. Wir müssen so schnell wie möglich mehr Langbogenschützen rekrutieren!
battle_talk_130403=Wir haben mehrere Städte eingenommen, sollen wir für heute stoppen?
battle_talk_130404=Keine Sorge, die Briten haben keine Zeit für uns.
battle_talk_130405=Ich hatte nicht erwartet, dass es so schnell erobert wird, also lasst uns weiter nach Süden gehen!
battle_talk_130406=Führe den Feind durch die Schlucht um anzugreifen, und achte darauf, die Stellung zu halten! Sie sind dem Langbogen in unseren Händen nicht gewachsen!
battle_talk_130407=Erobere unser Territorium zurück! Jeder wird belohnt, wenn er David II lebend gefangen nimmt!
battle_talk_130408=Nein! Ich wurde von einem Pfeil getroffen. Rückzug!
battle_talk_130501=Greife ihre rechte Flanke an! Mache es ihren Langbogenschützen unmöglich, einen effektiven Angriff durchzuführen!
battle_talk_130502=Oh Gott, die rechte Flanke wurde durchbrochen, diesmal sind wir in Gefahr. Die Formation nicht verlassen!!! Wir werden angreifen, während wir evakuieren.
battle_talk_130503=Geh zurück auf die Anhöhe! Das ist unsere Chance zum Gegenangriff!
battle_talk_130504=Wir haben doch den besten Zeitpunkt zum Angriff verpasst! Rückzug!
battle_talk_130601=Es sieht so aus, als wird die Verstärkung aus dem Norden zu spät sein, hier werden wir uns wehren! Bewaffnet euch sich schnell, wir schlagen diese arroganten Franzosen hier!
battle_talk_130602=Wir haben sie hier blockiert, sie liegen uns auf dem Silbertablett! Nur ein Strumangriff und sie werden verstreut! Fangt den ältesten Sohn des Königs von England lebend! Alle werden belohnt!
battle_talk_130603=Hör nicht auf wegen einer vorübergehenden Niederlage! Ich werde zu dir stehen! Bis wir im Kampf sterben! Komm schon! Wir werden den Krieg am Ende gewinnen!
battle_talk_130604=Flankiert sie! Gib ihnen einen tödlichen Schlag!
battle_talk_130605=Könnte das ihre Verstärkung sein? Wir sind umzingelt!
battle_talk_130606=Meine Güte, wir wurden entdeckt!
battle_talk_130607=Übernimm die Führung! Eure Hoheit, der Feind ist zurückgefallen! Gott ist mit uns!
battle_talk_130701=Ich werde in Reims zum König von Frankreich gekrönt und damit der größte König von England!
battle_talk_130702=Ich werde nicht zulassen, dass die Briten siegen, und selbst wenn wir keinen König haben, werden wir uns nicht ergeben!
battle_talk_130703=Es scheint, dass es keine Möglichkeit gibt, Lance zu durchbrechen, wir müssen plündern, um mehr Vorräte zu bekommen!
battle_talk_130704=Die Briten sind wahrscheinlich nicht im Hauptquartier, wir werden Calais zurückerobern!
battle_talk_130801=Überprüfe unsere Informationen, es heißt, dass Prinz Charles in Reims gekrönt werden soll.
battle_talk_130802=Wir werden auf dem Weg vorsichtig sein, vielleicht werden uns britische Truppen auflauern.
battle_talk_130803=Stoppt sie!
battle_talk_130804=Ich wusste, dass es einen Hinterhalt gibt!
battle_talk_130805=Ihre Formation fällt auseinander! Kavallerie, Angriff!
battle_talk_130806=Hüten dich nach wie vor vor den Hinterhalten auf dem Weg und stelle meine Sicherheit bis zur Krönung in Lance sicher!
battle_talk_130901=Nachdem ich mich so lange darauf vorbereitet habe, kann mich heute niemand mehr davon abhalten, das Erbe anzutreten!
battle_talk_130902=Ich habe zu lange gewartet, es wird nie wieder eine Chance geben und dieser Kampf wird entscheiden, wer der Gewinner ist!
battle_talk_130903=Kämpfen wir bis zum Tod!
battle_talk_131001=Wir waren zwar müde von unserem ununterbrochenen Marsch, aber jetzt sind die Briten unvorbereitet, schlagt zu!
battle_talk_131002=Was? Woher kam die französische Armee? Bei diesem verdammt kalten Wetter herrscht immer noch Krieg! Haltet die Moral aufrecht! Oder wir werden nichts als den Tod erleben.
battle_talk_131003=Die Briten sind gut im Stellungskrieg, daher werden wir Angriffstaktiken und Guerillakrieg einsetzen, damit sie keinen effektiven Angriff organisieren können!
battle_talk_131004=Rückzug! Wenn wir uns ins Schloss zurückziehen können, können wir gewinnen!
battle_talk_131005=Gib ihnen keine Chance zu entkommen! Verfolge den Feind im Rückzug!
battle_talk_131101=Der französische Angriff wurde stärker und stärker, wenn es keine Verstärkung gab, würde die Burg fallen.
battle_talk_131102=Lasst die Briten wissen, wozu wir Spanier fähig sind, blockiere sie und lass sie nicht an Land kommen!
battle_talk_131103=Ihre Schiffe sind höher als unsere, bei geringerem Tiefgang. Wir haben keine Chance gegen sie! Jetzt zurückziehen!
battle_talk_131104=Zerstört die britische Schiffe ein für alle Mal! Wir sind unbesiegbar!
battle_talk_131201=Leg dich nicht mit den Franzosen an, unser Ziel ist es zu plündern und den Krieg durch Frankreich brennen zu lassen! Marschiere so schnell du kannst!
battle_talk_131202=Diese Banditen! Wir müssen eine Blockade organisieren! Wir können sie nicht den ganzen Weg plündern lassen!
battle_talk_131203=Wir müssen nur zurück nach Bordeaux und wir sind in Sicherheit. Schnell!
battle_talk_140101=Ich habe ein Drittel meiner Krieger in Afleur verloren, aber ich werde nicht klein beigeben. Wir müssen uns so schnell wie möglich mit Verstärkung aus Calais treffen!
battle_talk_140102=Der Feind wird immer zahlreicher, es sieht so aus, als wollten sie uns auf einen Schlag auslöschen! Errichtet eine Barriere! Verteidige dich!
battle_talk_140103=Greift an wie geplant! Wir sind weit in der Unterzahl! Achtet auf die Langbogenschützen, die auf beiden Seiten angegriffen werden.
battle_talk_140104=Nicht gut! Der Regen hat dazu geführt, dass der Boden zu matschig geworden ist. Wir können nicht einmal galoppieren!
battle_talk_140105=St. Georg! Wir wehren uns!
battle_talk_140201=Erobere Rouen und du hast die ganze Normandie! Die beiden Parteien kämpfen immer heftiger und es scheint, dass ihre Rettung nicht rechtzeitig sein wird und die Gelegenheit nicht verpasst wird.
battle_talk_140202=Lasst uns ihnen aus dem Weg gehen, ein Kampf mit den Briten verschafft den Burgundern nur einen Vorteil.
battle_talk_140203=In Rouen mangelt es an Nahrung und Kleidung, die Menschen in der Stadt verhungern. Ich weiß nicht, wann Hilfe kommt.
battle_talk_140204=Wir müssen so schnell wie möglich durch den Versorgungskanal kommen, sonst wird Rouen nicht geschützt, aber wenn ich alles gebe, kann es zu einem Gegenangriff der Armagnac-Gruppe kommen.
battle_talk_140205=Gebt ihnen nicht die Möglichkeit, Nachschub zu bekommen.
battle_talk_140301=Heute ist Ostern, die Schotten und Franzosen müssen in der Verteidigung nachlässig sein, also lasst uns direkt durchstürmen, wir werden sie definitiv überraschend töten!
battle_talk_140302=Die Briten kommen! Alle kampfbereit machen!
battle_talk_140303=Ihre Kavallerie ist schlecht unterstützt! Halte die Truppen in den Hinterreihen auf!
battle_talk_140304=Wir sind zu aggressiv! Ah!
battle_talk_140401=Der französische Angriff war stark und wir flankierten Motown, um die Versorgung von Paris abzuschneiden.
battle_talk_140402=Komm schon, ganz zu schweigen von 20.000 Menschen, 200.000 Menschen werden nicht in der Lage sein, zu der Stadt beizutragen, die ich verteidige!
battle_talk_140403=Erobere weitere Festungen zurück! Lassen Sie die Engländer wissen, wozu wir Schotten fähig sind!
battle_talk_140404=Es scheint, dass ich mich von meiner Krankheit nicht erholen kann und meine Reise möglicherweise aufhören muss und mein unerfüllter lang gehegter Wunsch nur von meinen Nachkommen erfüllt werden kann.
battle_talk_140501=Jahre der Verfolgungsjagd haben mich gelangweilt. Da der Hauptteil der französisch-schottischen Armee vorrückt, ist dies ein guter Zeitpunkt für uns, sie ein für alle Mal auszulöschen!
battle_talk_140502=Bleibt in Formation! Vorwärts mit der Flagge!
battle_talk_140503=St. Georg! Bedford!
battle_talk_140504=Saint-Denis! Montjoie!
battle_talk_140505=Zerstreue die Reihen nicht! Kavallerie im Rücken! Gebt ihnen einen schweren Schlag!
battle_talk_140506=Wir werden bis zum letzten Moment kämpfen! Auch wenn alle Truppen verloren sind!
battle_talk_140601=Wartet, der König hat Verstärkung geschickt!
battle_talk_140602=Stoppt Euren Größenwahn. Wir haben die Stadt von drei Seiten umzingelt, ergebt euch so schnell wie möglich!
battle_talk_140603=Obwohl unsere Armee belagert ist, aber der Feind ist auch belagert und ohne Moral. Deshalb stürmt sie alle!
battle_talk_140604=Die Flanke wurde durchbrochen, hüte dich vor den Leuten in der Stadt, die zurückkommen, um uns zu umzingeln!
battle_talk_140605=Erobere den Rest der Festungen im Sturm! Die Briten werden vertrieben!
battle_talk_140701=Lass uns die Soldaten und Menschen in der Stadt retten!
battle_talk_140702=Endlich ein reibungsloser Einzug in die Stadt, diesmal kann Orleans gerettet werden!
battle_talk_140703=Ich hoffe, die britischen Truppen werden sich von selbst zurückziehen. Ich erwarte oder mag das Töten nicht.
battle_talk_140704=Wenn du kämpfen willst, lass das Schwert in deiner Hand, um über das Schicksal der Stadt zu entscheiden!
battle_talk_140705=Lasst uns die Festungen rund um Orleans einnehmen und die Stadt ein für alle Mal befreien!
battle_talk_140801=Die Stimme in meinem Kopf sagt mir, ich solle weitermachen! Um mehr leidende Menschen in Frankreich zu retten!
battle_talk_140802=Wir werden dir bis in den Tod folgen!
battle_talk_140803=Eile zur Rettung unserer Truppen, die französische Armee weiß nicht, welche Art von Drogen sie genommen haben? Warum ist ihre Moral so hoch?
battle_talk_140804=Lasst euch nicht von den gut  befesteten Städten vor Ihnen einschüchtern, Gott hat sie uns zur Verfügung gestellt! Selbst wenn sie in den Wolken schweben, können wir sie besiegen!
battle_talk_140805=Nein! Wie können wir verlieren!
battle_talk_140901=Ertönen Sie die Trompete! Es ist an der Zeit, dem edlen König Karl zur Krönung nach Reims zu folgen!
battle_talk_140902=Zieht die besten Truppen zusammen, um sie zu umzingeln und lasse sie niemals Reims erreichen!
battle_talk_140903=Angriff! Zerschmettere alle Feinde, die sich uns in den Weg stellen!
battle_talk_140904=Ich wurde durch die Gnaden Gottes zum König gekrönt!
battle_talk_141001=Ich habe Jeanne d'Arc gefangen genommen!
battle_talk_141002=Hat Gott mich verlassen?
battle_talk_141003=Rache für Jeanne d’Arc! 
battle_talk_141004=Ich werde den Krieg auf sämtlichen britischen Boden bringen!
battle_talk_141005=Saint-Denis! Ich werde den Willen von Jeanne d'Arc in ganz Frankreich verbreiten!
battle_talk_141101=Säubern Sie die Festungen rund um Paris und erobern Sie die Hauptstadt zurück! Jeannes letzter Wunsch muss von mir erfüllt werden!
battle_talk_141102=Erobere Paris zurück! Lasset die Iris in Paris wieder blühen!
battle_talk_141103=Hilfe für Paris! Die französische Armee kommt mit aller Macht! Ich weiß nicht, ob der Herr der Stadt dieses Mal durchhalten kann.
battle_talk_141104=Sieht so aus, als wäre es unmöglich zu halten, also lauf weg.
battle_talk_141201=Erobere Calais! Als Geschenk an Karl VII.!
battle_talk_141202=Diese Stadt ist seit hundert Jahren in unseren Händen, wie können wir sie dir so einfach überlassen!
battle_talk_141203=Ich werde die Truppen auf See vernichten!
battle_talk_141301=Erobere die Normandie zurück und vertreibe die Briten über den Ärmelkanal!
battle_talk_141302=Wir werden uns aufteilen und die Normandie ein für alle Mal befreien!
battle_talk_141303=Ja! Das ist ein Moment, auf den ich lange gewartet habe.
battle_talk_141304=Hoffen wir, dass es nicht zu spät ist. Wir werden nicht verlieren!
battle_talk_141305=Es ist an der Zeit, die gleiche Last auf mich zu nehmen wie mein Vater! Diese Stadt gehört mir!
battle_talk_141306=Lasst den Ruhm nach Frankreich zurückkehren, lasst uns im Triumph zurückkehren! Es ist an der Zeit, die Briten aus Frankreich zu vertreiben!
battle_talk_141307=Es ist Zeit für uns, Frankreich zu verlassen.

;史诗战役对话
battle_talk_200001=Ich werde den Krieg bis nach Rom tragen. Die Einnahme Galliens ist nur der erste Schritt auf ihrem Weg zum Untergang!
battle_talk_200002=Wir werden diese Gelegenheit nutzen, um ihnen ihre Ländereien wegzunehmen. Franken wird von mir geeint werden!
battle_talk_200003=Kommt schon, lasst uns aufbrechen! Ich werde Sie alle in ihre Gräber schicken!
battle_talk_200004=Soldaten, um Eurer Familien und Eures Landes willen dürfen wir keinen Schritt mehr zurückweichen, Angriff!
battle_talk_200005=Los geht's! Lasst uns das Schaf zur Schlachtbank geleiten!
battle_talk_200006=Vernichtet sie!
battle_talk_200007=Wir holen endlich auf und uns nun alles zurück, was uns von den Hunnen genommen wurde!
battle_talk_200008=Verteidigt die Heimat bis zum Tod!
battle_talk_200009=Das Duell hat begonnen! Das Überleben des Reiches hängt von dieser Schlacht ab!
battle_talk_200010=Wir haben uns endlich erfolgreich gegen die Hunnen behaupten können! Es lebe Rom!
battle_talk_200011=Die Armeen Roms wurden von mir erbarmungslos vernichtet! Rom steht kurz vor dem Untergang.
battle_talk_200101=Krieger, schärft eure Klingen und versorgt eure Pferde. Lasst die Franken unter unseren eisernen Reitern erzittern!
battle_talk_200102=Allahu Akbar! Nachdem diese Schlacht gewonnen ist, werden wir die heiligen Lehren weiter verbreiten!
battle_talk_200103=Habt Ihr Eure Lektion vom letzten Mal nicht gelernt? Ihr werdet auch dieses Mal besiegt werden!
battle_talk_200104=Nein, Toulouse ist nicht sicher! Ich muss Charles jetzt um Hilfe bitten.
battle_talk_200105=Mein König, ich werde mich Euch mit der Bitte um Unterstützung unterwerfen.
battle_talk_200106=Ich akzeptiere Eure Unterwerfung und werde meine Truppen versammeln, um Euch so schnell wie möglich zu retten.
battle_talk_200107=Wenn diese Kamelreiter nicht aufgehalten werden können, wird nicht nur die Region Aquitanien, sondern das gesamte fränkische Königreich untergehen!
battle_talk_200108=Toulouse ist besetzt! Ziehen Sie schnell nach Norden, bevor der Winter einbricht!
battle_talk_200109=Versammelt die Kavallerie!
battle_talk_200110=Verteidigt Euch mit Defensivinfanterie und haltet sie mit Speeren vom weiteren Vormarsch ab!
battle_talk_200111=Nein! Ich kann nicht glauben, dass ich versagt habe. Ich bin so wütend!
battle_talk_200112=Lang lebe das Frankenreich!
battle_talk_200113=Allahu Akbar. Der Sieg ist immer noch unser! Wir werden ganz Europa mit unseren eisernen Pferden zertrampeln!
battle_talk_200114=Wir haben nicht genug Winterkleidung, die Kälte beginnt nun täglich tiefer in unser Mark und Bein zu dringen! Beeilt Euch!
battle_talk_700301=Gao Xianzhi hat meine Stadt besetzt und meine Eltern und die Prinzessin mitgenommen. Er hat uns zu sehr getäuscht, ich kann nun nicht anders als zu rebellieren.
battle_talk_700302=Der Prinz von Chach gibt immer noch nicht auf, aber es scheint, dass ich nur wenig Zeit damit verbringen kann, Chach von der Karte zu wischen.
battle_talk_700303=Obwohl unsere Armee gerade aus dem Krieg zurückgekehrt ist, hat sie einen großen Vorteil gegenüber der müden Tang-Armee, die von der Expedition gekommen ist. Mal sehen, wozu die Tang-Armee fähig ist.
battle_talk_700304=Ich hatte nicht erwartet, dass die Tang-Armee sich so heftig wehren würde, aber zum Glück hatte ich ein Ass im Ärmel.
battle_talk_700305=Ich mache das nur wegem Geld! Gao Xianzhi, verurteile mich nicht dafür!
battle_talk_700306=Das ist nicht gut, Qarluq wagt es gegen uns zu rebellieren. Wir sind umzingelt.
battle_talk_700307=Bei Allahs Segen, dieser große Sieg wird meinen Ruf sicherlich zum Blühen bringen.
battle_talk_700308=Die mächtigen Tang! Selbst wenn wir von zwei Seiten angegriffen werden, können wir dem Angriff meiner Kavallerie nicht widerstehen!
battle_talk_700309=Die Städte und mein Volk sind bereit, sich der Tang Dynastie zu unterwerfen.
battle_talk_700310=Nur die herausragenden Talente können aktuelle Trends erkennen.
battle_talk_700401=Der Thron von England gehört nur mir und da wir die mächtigen Norweger besiegen konnten, können wir auch die Normannen vertreiben!
battle_talk_700402=Sie haben erst kürzlich eine große Schlacht geschlagen und sind noch nicht wieder bei alter Stärke, unsere Kavallerie kann ihre Verteidigung leicht zerreißen!
battle_talk_700403=Nehmt die Anhöhe ein! Halte die Kavallerie mit Speeren auf!
battle_talk_700404=Wilhelm ist tot! Normannen, ergebt euch!
battle_talk_700405=Nicht zurückziehen! Ich lebe noch! Das Meer ist hinter uns, es gibt keinen Weg zurück, lasst uns neu gruppieren und angreifen!
battle_talk_700406=Harald ist tot! Der Thron von England gehört schließlich mir! Eine neue Ära ist angebrochen!
battle_talk_700407=Die Normannen sind endlich besiegt! Der Thron von England gehört keinem Außenseiter!

;引导对话
tutorial_talk_1001=Lasst mich Euch eine kurze Einführung geben.
tutorial_talk_1101=Als Nächstes führe ich Sie durch die Legende der Helden!
tutorial_talk_1102=Damit Generäle Legende der Helden betreten können, müssen sie eigene Einheiten befehligen. Gehen wir also zum [#F4d181#HAUPTQUARTIER] und rekrutieren persönliche Einheiten für Ihre Generäle!
tutorial_talk_1201=Sie haben das erste Kapitel bestanden. Unsere Generäle können nun Einheiten rekrutieren. Tippen Sie auf die [#F4d181#Rekrutierungszone neben dem Avatar des Generals]!
tutorial_talk_1301=Lassen Sie uns nun die [#F4d181#Truppen] rekrutieren. Wählen Sie sie aus und tippen Sie auf [#F4d181#Rekrutieren]!
tutorial_talk_1501=Tippen Sie als Nächstes auf [#F4d181#×] in der oberen linken Ecke, um das Hauptquartier zu verlassen!
tutorial_talk_1601=Die [#F4d181#Legende der Helden] ruft uns. Tippen Sie sie jetzt an!
tutorial_talk_1701=Tippen Sie nun auf [#F4d181#Betreten], um Legende der Helden zu starten!
tutorial_talk_2101=[#F4d181#Rekrutierungsaufträge] oder [#F4d181#Kriegsgerätefragmente] können mit [#F4d181#Söldneraufträgen] oder [#F4d181#Blaupausen] erworben werden. Entsprechende Truppen und Ausrüstungsgegenstände können zusammengestellt werden, wenn [#F4d181#Rekrutierungsaufträge] und [#F4d181#Kriegsgerätefragmente] eine bestimmte Anzahl erreichen.
tutorial_talk_2201=Klicken Sie auf die angezeigte Position, um verfügbare Rekrutierungen [#F4d181#Ausrüstungen], [#F4d181#Kriegsausrüstungsfragmente], gesperrte Rekrutierungen [#F4d181#Ausrüstungen] und [#F4d181#Kriegsausrüstungsfragmente] zu überprüfen.

speak_strong_attack_1=Meine Truppen sind unaufhaltsam, folgt mir!
speak_strong_attack_2=Die Situation ist unter meiner Kontrolle, die Feinde sind mir nicht gewachsen!
speak_weak_attack=Greift mit voller Wucht an und vernichtet alle Feinde!
speak_destroy_building_1=Die feindlichen Mauern wurden überwältigt und die Stadt war kurz davor, überrannt zu werden.
speak_destroy_building_2=Auch die stärksten Mauern können unseren Angriff nicht aufhalten!
speak_less_round_1=Wenn die Schlacht zu lange dauert, könnte die Situation außer Kontrolle geraten!
speak_less_round_2=Beschleunigt das Tempo des Angriffs, es bleibt uns nicht mehr viel Zeit!
speak_less_stength=Meine Truppen benötigen Unterstützung!
speak_need_hitback=Meine Truppen sind unter Beschuss!
speak_less_morale=Die Truppen leiden unter niedriger Moral und die Soldaten sind nicht in der Stimmung zu kämpfen!

speak_onwait_1=Wo sind die Feinde? Meine Klingen dürsten nach Blut!
speak_onwait_2=Ich beschließe, in meine Heimatstadt zurückzukehren, sobald der Krieg vorbei ist.
speak_onwait_3=Manchmal sind Einheiten mit Truppen verschiedener Waffengattungen im Kampf effektiver als solche aus Truppen derselben Waffengattung.
speak_onwait_4=Sind die Einheiten kampfesmüde? Warum nicht versuchen, die Truppen mit Kriegstrommeln zu motivieren?
speak_onwait_5=Ich habe genug von diesem Ort, ich benötige dringend einen Trunk in der nächsten Taverne!
speak_onwait_6=Die Feinde tauchen immer auf und verschwinden dann auf unerklärliche Weise.
speak_onwait_7=Ich sehne mich nach einem richtigen Kampf!

battle_won_midway=Glückwunsch! Sie haben gewonnen und eine Belohnung erhalten. Wollen Sie das Spiel jetzt beenden?

