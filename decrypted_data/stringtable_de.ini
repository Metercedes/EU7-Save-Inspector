general_desc_Elizabeth Woodville=Die Frau von Edward IV., bekannt als die „Weiße Königin“. Ihre Tochter heiratete den späteren Heinrich VII. und wurde eine der Gründungsfiguren des Hauses Tudor.
general_desc_Li Shimin=Der zweite Kaiser der Tang-Dynastie. Während seiner Herrschaft reformierte er mit großem Aufwand die inneren Angelegenheiten des Landes und legte eine solide Grundlage für den jahrhundertelangen Wohlstand der Tang-Dynastie; bei gleichzeitiger Öffnung der Grenzen, Erweiterung der Außengebiete und Beruhigung der Nachbarmächte. Er wurde als „Tian Kehan“ respektiert.
general_desc_Michael VIII=Als Gründer des byzantinischen Hauses Palaiologos war seine Regierungszeit von aktiver Diplomatie zur Bewältigung externer Bedrohungen für das Byzantinische Reich geprägt und ermöglichte dem Land, das in Gefahr gewesen war, noch zwei Jahrhunderte zu überdaueren.

