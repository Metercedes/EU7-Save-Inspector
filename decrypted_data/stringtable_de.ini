stage_intro_4741=Kurz nach seiner Thronbesteigung sah sich Suleiman I. einem Aufstand unter der Führung des Gouverneurs von Damaskus gegenüber. Suleiman I. schlug diesen Aufstand nieder, was auch den Beginn einer Reihe militärischer Eroberungen markierte.
stage_intro_4743=Im Jahr 1521 war Ungarn die einzige gewaltige Kraft, die der osmanischen Expansion nach Europa im Wege stand. Um sie zu besiegen, belagerte Suleiman I. mit einer großen Armee Belgrad und eroberte schließlich die Stadt.
stage_intro_4745=Nach der Eroberung Belgrads wandte Suleiman I. seine Aufmerksamkeit dem Johanniterorden auf der Insel Rhodos zu, doch die Schlacht erwies sich als äußerst schwierig.
stage_intro_4747=Ungarn suchte ein Bündnis mit der Habsburger-Dynastie und Suleiman I. war besorgt über die möglichen Auswirkungen auf das Osmanische Reich. Nachdem Ungarn den Vorschlag von Süleiman I. abgelehnt hatte, beschloss er, militärisch einzugreifen.
stage_intro_4749=Der Territorialstreit zwischen den Osmanen und der Safawiden-Dynastie verschärft sich allmählich. Während Bitlisbey in Persien Asyl beantragt, wird der Gouverneur von Bagdad ermordet. Suleiman beschloss, Krieg gegen Persien zu führen und begann den dreihundertjährigen Osmanisch-Persischen Krieg.
stage_intro_4751=Im Jahr 1553 begann Suleiman I. seine dritte und letzte Expedition nach Persien. Nach einem Austausch von Siegen und Niederlagen einigten sich beide Seiten schließlich auf den Frieden von Amasya, dem zwanzig Jahre Frieden und Ruhe folgten.

