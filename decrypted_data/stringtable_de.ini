troop_desc_118=Die im Mittelmeer kreuzenden Piraten waren der Alptraum der vorbeifahrenden Schiffe.
troop_desc_213=In der Formation sind die Soldaten in der ersten Reihe, die für die Abwehr von Angriffen verantwortlich sind, in der Lage, den Musketieren hinter ihnen sichere Schussbedingungen zu bieten.
troop_desc_214=Die von Yue Fei aufgestellten Truppen, die aus Infanterie und Kavallerie bestanden, erzielten in Kämpfen gegen die Jin-Kavallerie wiederholt bemerkenswerte militärische Erfolge.
troop_desc_317=Die persönliche Gardekavallerie des litauischen Großfürsten, hervorragend ausgerüstet, mit Kriegshämmern als Waffen. Sie konnten selbst gegen schwer gepanzerte Feinde beträchtlichen Schaden anrichten.
troop_desc_417=Eine Kavallerieeinheit, deren Rüstung, Fahnen und sogar Waffen rot lackiert sind. Sie tragen rote Eisenrüstungen, sind gut ausgebildet und sehen imposant aus. Auf dem Schlachtfeld sind sie eine Kraft, die nicht ignoriert werden kann.
troop_desc_418=Eine hauptsächlich aus der Samurai-Klasse bestehende Truppe, die loyal, tapfer, gut ausgerüstet und gut ausgebildet war und über ausgezeichnete Kampfkraft und Fähigkeiten zur koordinierten Kriegsführung verfügte.
troop_desc_419=Ein von Matthias Corvinus (Hunyadi Mátyás) organisiertes Elitesöldnerkorps, das in den Kriegen gegen das Osmanische Reich eine entscheidende Rolle spielte.
troop_desc_420=Mit Langäxten als Waffen ausgestattet, vereint das Design dieser Stangenwaffe sowohl Stich- als auch Hiebfähigkeiten, was die Streitaxt-Kavallerie zu einer relativ vielseitigen Art von Kavallerie macht.
troop_desc_421=Die elitäre schwere Kavallerie von Jin Wuzhu besaß eine furchterregende Angriffskraft, wenn ihre Moral hoch war.
troop_desc_520=Die von Iwan dem Schrecklichen aufgestellten Elitetruppen der Garnison, die häufig Hellebarden als Stütze beim Abfeuern ihrer Luntenschlossgewehre verwendeten.
troop_desc_612=Fernkampfkavallerie, die Wurfäxte als Angriffsmittel einsetzt und extrem starke Störeffekte gegen Nahkampfkavallerie verursachen kann.
troop_desc_613=Fernkampfkavallerie, die Armbrüste einsetzt, um Feinde zu verwunden, typischerweise verwendet, um feindliche Formationen zu stören und Lücken zu öffnen, wodurch Bedingungen für den Angriff der schweren Kavallerie geschaffen werden.

