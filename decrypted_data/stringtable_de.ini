stage_intro_1601=Ein Jahr nach dem Wahnsinnanfall erlangte Heinrich VI. seine Vernunft zurück. Mit der Unterstützung von Königin Margarete von Anjou wurde der Herzog von Somerset wieder eingesetzt und Richard, Herzog von York, musste den Hof verlassen, nachdem er seine Position als Lordprotektor verloren hatte. 1455 schloss sich Richard, unzufrieden mit dem Herzog von Somerset, mit dem Neville-Haus zusammen und marschierte nach London mit der Absicht, den Herzog von Somerset abzusetzen.
stage_intro_1602=Mit dem Ende der Ersten Schlacht von St. Albans besiegte der Herzog von York die meisten seiner Rivalen am Hof ​​und kehrte zu seiner Position als Lordprotektor zurück. Leider hielt dies nicht lange an und Anfang 1456 musste der Herzog von York als Lordprotektor zurücktreten, als sein Gesetzentwurf zur Rückgewinnung seiner Ländereien für die Krone vom Parlament abgelehnt wurde. Zur gleichen Zeit organisierte Königin Margaret heimlich einen Versuch, die königliche Macht zurückzugewinnen und 1459 verschärfte sich der Konflikt zwischen den beiden Seiten, als der Yorkist Earl of Salisbury seine Truppen nach Süden schickte, um den Herzog von York zu treffen; Margaret schickte sofort ihre Truppen, um sie abzufangen, und bei Blore Heath kam es zu einer blutigen Begegnung.
stage_intro_1603=Der Herzog von York konnte nach seiner erfolgreichen Vereinigung mit dem Earl of Salisbury nicht mehr viel weiter vordringen, da sie von einer Armee unter dem Banner von König Heinrich VI. blockiert wurden, die etwa zwei- bis dreimal so zahlreich war wie ihre. Die Ungleichheit zwischen den beiden Seiten zwang den Herzog von York, seinen Truppen den Rückzug zu befehlen und Lager zu beziehen und dem König schriftlich seine Loyalität zum Ausdruck zu bringen. Doch die vorangegangene Schlacht bei Blore Heath hatte dazu geführt, dass er das Vertrauen des Königs verloren hatte und eine gewaltige Schlacht war unvermeidlich.
stage_intro_1604=Die Niederlage in der Schlacht an der Ludford Bridge hinterließ das Haus York am Hofe in Trümmern und das Haus Lancaster wuchs nach und nach an Macht und erwarb einige der ehemaligen York-Domänen. Obwohl der Herzog von Somerset nominell Calais erhielt, das Warwick dem Königsmacher gehört hatte, weigerte er sich, die Herrschaft des Herzogs von Somerset anzunehmen. Im Januar 1460 griff Warwick präventiv die in Sandwich stationierte lancastrische Armee an, die sich auf einen Angriff auf die Gegend von Calais vorbereitete und machte sich auf den Weg nach Westen nach London. Die lancastrische Armee wurde darüber informiert und errichtete schnell eine Verteidigungsposition bei Northampton, um die anstürmende yorkische Armee abzuwehren.
stage_intro_1605=Nach der Schlacht von Northampton erließ Richard, Herzog von York, ein Gesetz. Die Aufschrift „Richard und seine Erben können den Thron besteigen, wenn der König stirbt“ bedeutete, dass er nur noch einen Schritt vom Höhepunkt der Macht entfernt war. Doch vor diesem Schritt gab es noch ein letztes Hindernis: Königin Margaret forderte die Verbündeten des Hauses Lancaster auf, sich in Kingston-upon-Hull zu versammeln und zu versuchen, nach Süden nach London zu marschieren. Als Richard, Herzog von York, die Nachricht erhielt, stellte er schnell eine Streitmacht zusammen, um nach Norden zu ziehen, um ihnen zu begegnen. Aufgrund der Eile, mit der sie geschickt wurde, war diese Truppe nicht nur kleiner als ihre Gegner, sondern auch schlecht versorgt. Richard, Herzog von York, war in der ersten Begegnung unterlegen und musste sich auf Sandal Castle zurückziehen, um auf Unterstützung zu warten.
stage_intro_1606=Richard, Herzog von York, wurde nach seiner Niederlage bei Wakefield Plain getötet und sein Sohn, Edward IV., übernahm den Herzogstitel. Obwohl Eduard IV. zu diesem Zeitpunkt erst 18 Jahre alt war, zeigte er über sein Alter hinaus Führungsqualitäten und Befehlsgewalt. Nur einen Monat nach der Niederlage von Richard, Herzog von York, führte Edward IV. seine Armee in eine erbitterte Schlacht mit der lancastrischen Armee bei Mortimer's Cross.
stage_intro_1607=Nach der Schlacht von Mortimer's Cross, während Eduard IV. seine Streitkräfte bei Hereford neu gruppierte, befehligten Königin Margarets Verbündete schnell einen Angriff von Norden nach Süden. In nur einem halben Monat näherte sich diese zehntausend Mann starke Armee London und Warwick, der Königsmacher, führte seine Truppen ihnen entgegen. Zufälligerweise fand diese große Schlacht, wie das erste Treffen zwischen den Yorkers und den Lancasters sechs Jahre zuvor, in der Stadt St. Albans statt, doch dieses Mal endete die Konfrontation völlig anders als sechs Jahre zuvor.
stage_intro_1608=Trotz des Sieges von Margarets Armee bei St. Albans weigerten sich die Bürger Londons, sie in der Stadt willkommen zu heißen, da die Armee nach der Schlacht eine Reihe von Gräueltaten verübten. Margaret hatte keine andere Wahl, als sich nach Norden zurückzuziehen. Kurz darauf wurde Eduard IV., der die Herzen des Londoner Volkes erobert hatte, zum König gewählt und der ehemalige Heinrich VI. abgesetzt. Als die Nachricht Margaret erreichte, versammelte sie fast die gesamte Opposition gegen das Haus York im Norden Englands und versuchte, Eduard IV. zu eliminieren, was zu einer der brutalsten Schlachten auf englischem Boden führte.
stage_intro_1609=In der Schlacht von Towton besiegte Edward IV. die meisten Lancastrianer, die sich ihm widersetzten. In den folgenden Jahren versuchte Eduard IV. mit verschiedenen Mitteln, seine ehemaligen Feinde zu Freunden zu machen, darunter auch seinen ehemaligen Erzfeind Henry Beaufort, 3. Herzog von Somerset, der sich Ende 1463 heimlich mit dem abgesetzten Heinrich VI. traf und bald darauf eine neue Rebellion gründete. Ein wütender Edward IV. befahl John Neville, den Aufstand niederzuschlagen, diesmal um den Herzog von Somerset ein für alle Mal zu vernichten.
stage_intro_1610=Der bei Hedgeley Moor besiegte Herzog von Somerset zog sich an die Küste von Hexham zurück. Er teilte seine Armee in drei Teile und versuchte südlich von Hexham Befestigungen zu errichten, um seine Verfolger fernzuhalten. Aber John Nevilles Verfolgung war schnell und er hatte nicht vor, dem Herzog von Somerset eine Chance zu geben, zu Atem zu kommen.

campaign_desc_16=Im Juli 1453 löste die Nachricht von der Niederlage bei Castillon bei König Heinrich VI. vor Schreck einen Wahnsinnsanfall aus und verlor seine Herrschaftsfähigkeit. Die beiden großen Häuser Lancaster und York in England kämpften um die Vorherrschaft, was zum Krieg führte. Der Krieg wurde auch „Rosenkrieg“ genannt, da die Wappen der beiden Häuser die Rote Rose bzw. die Weiße Rose waren.
campaign_desc_17=Als Eduard IV. König von England wurde versuchte er sich mit seinen ehemaligen Feinden zu versöhnen und brachte für kurze Zeit Frieden nach England. Doch die Versöhnungspolitik Eduards IV. führte zu einer Kluft zwischen ihm und seinen ehemaligen Verbündeten, was 1469 zur Rebellion Warwicks führte, der einst treueste Untergebene Eduards IV. gewesen war, was eine neue Welle der Unruhe nach England brachte.

campaign_end_desc_16=Nach der Schlacht von Hexham wurde die militärische Macht des Hauses Lancaster weitgehend ausgelöscht und das Haus York wurde Herrscher über England. Anders als zuvor übernahm Eduard IV. nicht selbst das Kommando über die Schlacht, da er Wichtigeres im Kopf hatte – die heimliche Vorbereitung seiner Hochzeit mit einer Frau. Der Name dieser Frau war Elizabeth Woodville, später allgemein als „Weiße Königin“ bekannt.
campaign_end_desc_17=Mit dem Krieg endete auch die Herrschaft der Anjou-Dynastie in England. Dies läutete die Ära der walisischen Tudor-Dynastie und das Ende des Mittelalters in England ein.

general_desc_Manuel I=Unter dem byzantinischen Kaiser im 12. Jahrhundert, während dessen Herrschaft die Komnenos-Dynastie ihre letzte Blüte erlebte, erlangte das Reich seine militärische und wirtschaftliche Stärke zurück und erlebte einen Aufschwung der Kultur.

