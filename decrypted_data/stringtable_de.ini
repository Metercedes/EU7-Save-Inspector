campaign_desc_305=Die Schätze der Seidenstraße sind das wesentliche Symbol des Handels zwischen Ost und West, wo reiche arabische Kaufleute hin und her handelten und viele kostbare Relikte und Schätze hinterließen, die von der Geschichte des kulturellen Austauschs zwischen Ost und West zeugen.
campaign_desc_306=Ein magischer Ring aus nordischen Sagen, der "Andvaranaut" genannt wird. Diesem Ring werden geheimnisvolle Kräfte nachgesagt, die es dem Träger ermöglichen, unendlichen Reichtum und Macht zu erlangen.

