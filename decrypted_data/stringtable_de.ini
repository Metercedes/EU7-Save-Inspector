general_desc_Edward the Black Prince1=Edward trug auf dem Schlachtfeld oft schwarze Rüstungen, um den feindlichen Truppen Angst einzujagen. Während des Hundertjährigen Krieges war dieses imposante schwarze Aussehen der Anblick, den französische Kommandeure am meisten fürchteten.
general_desc_Su Dingfang1=Su Dingfang verbrachte sein Leben zu Pferd im Kampf, schlug im Norden die Jieli, vernichtete Turkestan im Westen, befriedete Baekje im Osten und hielt den Tibetern im Süden stand. Selbst in seinen Siebzigern stand er immer noch an vorderster Front auf dem Schlachtfeld, ein echter Kriegsgeneral der Tang-Dynastie.

