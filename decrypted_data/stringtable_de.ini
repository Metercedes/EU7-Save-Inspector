skill_desc_50923=Wenn die Legion nicht voll ist, besteht eine Chance von {0}70 %{1}, pro Runde eine eine Gruppe Gendarm Ritter zu erhalten.
skill_desc_51251=Greife das ausgewählte Ziel und die umliegenden feindlichen Einheiten an und verursacht Teilschaden mit einer Abklingzeit von {0}2{1} Runden. (Der Fertigkeitsschaden wird von den Kavallerie-Fähigkeiten und den Fernkampffähigkeiten auf beiden Seiten beeinflusst.)
skill_desc_51252=Greife das ausgewählte Ziel und die umliegenden feindlichen Einheiten an und verursacht Teilschaden mit einer Abklingzeit von {0}1{1} Runden. (Der Fertigkeitsschaden wird von den Kavallerie-Fähigkeiten und den Fernkampffähigkeiten auf beiden Seiten beeinflusst.)
skill_desc_51261=Stellt für jeden zerstörten Feind {0}1{1} Moral und {0}1 %{1} Stärke wieder her.
skill_desc_51262=Stellt für jeden zerstörten Feind {0}2{1} Moral und {0}2 %{1} Stärke wieder her.
skill_desc_51272=Fertigkeits Phase 1: Wenn Ihre Legion nicht voll ist, rekrutieren Sie die Truppen des Feindes in der ersten Reihe mit Gewalt, um sie zu unseren Truppen zu machen, {0}1{1} Runden Abklingzeit;[br] Fertigkeits Phase 2: Schickt eine Ihrer Truppen in der ersten Reihe zu einer verbündeten Legion, die nicht voll ist (nur wirksam, wenn die Fertigkeit der Phase 1 nicht verfügbar ist, einmal pro Spielzug verfügbar).
skill_desc_51282=Fertigkeits Phase 1: Wenn Ihre Legion nicht voll ist, rekrutieren Sie die Truppen des Feindes in der ersten Reihe mit Gewalt, um sie zu unseren Truppen zu machen, {0}1{1} Runden Abklingzeit; [br]Fertigkeits Phase 2: Schickt eine Ihrer Truppen in der ersten Reihe zu einer verbündeten Legion, die nicht voll ist (nur wirksam, wenn die Fertigkeit der Phase 1 nicht verfügbar ist, einmal pro Spielzug verfügbar).
skill_desc_51291=Je höher die Verwaltungs-Fähigkeit ist, desto geringer ist der Schaden, den Ihre eigenen Truppen erleiden. Wirksam, wenn die Verwaltungs-Fähigkeit über 100 liegt.
skill_desc_51292=Je höher die Verwaltungs-Fähigkeit ist, desto geringer ist der Schaden, den Ihre eigenen Truppen erleiden. Wirksam, wenn die Verwaltungs-Fähigkeit über 100 liegt.
skill_desc_51301=Greife das ausgewählte Ziel und {0}2{1} zufällige feindliche Einheiten um es herum an, verursache Teilschaden und stelle den umgebenden verbündeten Truppen {0}10{1} Moralpunkte wieder her. Wenn die Fertigkeit den Feind tötet, stellt sie zusätzlich {0}10{1} Moralpunkte auf umliegende verbündete Truppen wieder her, mit einer Abklingzeit von {0}2{1} Runden. (Der Fertigkeitsschaden wird durch die Kavallerie-Fähigkeiten auf beiden Seiten beeinflusst.)
skill_desc_51302=Greife das ausgewählte Ziel und {0}2{1} zufällige feindliche Einheiten um es herum an, verursache Teilschaden und stelle den umgebenden verbündeten Truppen {0}20{1} Moralpunkte wieder her. Wenn die Fertigkeit den Feind tötet, stellt sie zusätzlich {0}20{1} Moralpunkte auf umliegende verbündete Truppen wieder her, mit einer Abklingzeit von {0}1{1} Runden. (Der Fertigkeitsschaden wird durch die Kavallerie-Fähigkeiten auf beiden Seiten beeinflusst.)

