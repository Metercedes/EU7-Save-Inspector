skill_desc_51781=Kann nur bei hoher Moral verwendet werden. Verbraucht {0}15{1} Moral, um {0}3{1} Mobilität wiederherzustellen, und Kriegstrommeln können keine Moral wiederherstellen, wenn du diese Fähigkeit hast.
skill_desc_51791=Wenn als Konsul ernannt, stellen alle unsere Städte pro Runde {0}4%{1} ihrer Haltbarkeit wieder her.
