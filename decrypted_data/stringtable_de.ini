battle_talk_700501=Lasst uns den Ruhm Roms wieder aufbauen und diese Türken vertreiben!
battle_talk_700502=Erobere die Festung zurück, 40.000 Soldaten füllen sollten reichen!
battle_talk_700503=Die Festung in unserem Rücken ist vom Feind besetz, und es sieht so aus, als wollten die Römer den Vertrag zerreißen!
battle_talk_700504=Der Feind hat 40.000 Leute, aber was solls? Diese Pöbel sind alle vorübergehende Söldner. Locke den Feind tief in unser Gebiet! Vernichten wir sie!
battle_talk_700505=Ihre Pfeile sind zu heftig. Ziehen wir uns ins Fort zurück!
battle_talk_700506=Wie unserer linken und rechten Flanke die Puste ausgeht! Nein, ich werde nicht scheitern!
battle_talk_700507=Obwohl wir diese türkischen Angriffe endlich abgewehrt haben, ist unsere Kontrolle in diesem Gebiet nicht mehr so ​​stark wie früher!
battle_talk_700508=Gepriesen sei Gott! Der römische Kaiser ist lebend gefangen genommen! Lang lebe das Seldschukenreich!

