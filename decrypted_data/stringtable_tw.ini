stage_intro_4741=繼位不久的蘇萊曼一世遇到了大馬士革總督領導的叛亂，蘇萊曼一世鎮壓了這場叛亂，這也代表著他一系列軍事征服的開始。
stage_intro_4743=在1521年，匈牙利人是阻止鄂圖曼向歐洲擴展的唯一難以對付的力量。為了擊敗匈牙利，蘇萊曼一世帶領大軍將貝爾格勒團團圍住，並佔領了這座城市。
stage_intro_4745=在攻克貝爾格勒之後，蘇萊曼一世將矛頭對準了羅德島上的醫院騎士團，但這場戰鬥將無比艱辛。
stage_intro_4747=匈牙利尋求與哈布斯堡王朝的同盟，蘇萊曼一世擔心這對鄂圖曼造成的影響，在匈牙利拒絕了蘇萊曼一世的提議後，蘇萊曼一世決定出兵幹預。
stage_intro_4749=鄂圖曼與薩菲王朝領土爭端逐漸升溫，隨著比特利斯貝伊尋求波斯庇護，巴格達總督遇刺。蘇萊曼決定向波斯開戰，開啟了三百年的鄂圖曼-波斯戰爭。
stage_intro_4751=1553年，蘇萊曼一世開啟了他對波斯的第三次也是最後一次遠征。雙方在互有勝負後，最終達成阿馬西亞合約，此後雙方在二十年間一直相安無事。

