stage_intro_4601=耶律大石1087年出生于遼國上京，年輕時曾考中進士進入翰林院，因此被稱為“大石林牙”。1125年遼國滅亡，耶律大石率200騎西行至可敦城自立為王，後於1132年稱帝，正式建立西遼國。
stage_intro_4603=為了增強西遼的實力，耶律大石決定向西擴張。1131年，耶律大石借道高昌回鶻，對東喀喇汗國發起了進攻。
stage_intro_4605=東喀喇汗國的阿赫馬德汗去世後，他的兒子易卜拉欣繼位，同時下轄的葛邏祿等勢力也趁機發起了叛亂。易蔔拉欣在鎮壓無果後不得不向耶律大石發出了求助。
stage_intro_4607=1137年，西遼再一次向西擴張，這次他們的目標是已經向塞爾柱帝國稱臣的西喀喇汗國。西遼軍隊在費爾幹納谷地和敵軍發生了遭遇戰。
stage_intro_4609=1141年，馬赫穆德汗向塞爾柱蘇丹桑賈爾求援，桑賈爾帶領十萬大軍東進，在卡特萬草原與耶律大石的軍隊相遇。
stage_intro_4611=在征服西喀喇汗國之後，耶律大石又派出大將額兒布思征服了花喇子模，自此西遼開始進入鼎盛時期。

