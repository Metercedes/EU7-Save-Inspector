battle_talk_130403=我們已經佔領多個城鎮，是否應該見好就收？
battle_talk_130404=不用擔心，英國人根本無暇顧及我們。
battle_talk_130405=沒想到這麼快就佔領了，讓我們再向南進發！
battle_talk_130406=把敵人吸引到峽谷後攻擊，注意不要被繞後！他們是敵不過我們手中的長弓！
battle_talk_130407=奪回我們的領地！活捉大衛二世，人人有賞！
battle_talk_130408=不好，我中箭了，速速撤退！
battle_talk_130501=衝擊他們右翼！讓他們的長弓兵無法形成有效攻勢！
battle_talk_130502=不好，右翼被擊穿，我們這次危險了。不要分散隊形！！我們邊撤離邊攻擊。
battle_talk_130503=繞後佔據高地！那裡是我們的反擊機會！
battle_talk_130504=我們終究錯失了最佳進攻時機！撤退！
battle_talk_130601=看來我們等不到北面的援軍了，這裡就是我們決戰的地方！迅速佈防，我們要在這裡擊敗這些傲慢的法國佬！
battle_talk_130602=我們已經將他們堵在這裡，他們只是刀板上的魚肉！只要一次衝鋒就可以讓他們潰散！活捉英國王長子！人人都有重賞！
battle_talk_130603=不要為暫時的挫敗後退！我將和你們站在一起！直至戰死！沖呀！我們會贏得戰爭的最終勝利！
battle_talk_130604=從側翼包抄！給他們致命一擊！
battle_talk_130605=難道他們的後援來了？我們被包圍了！
battle_talk_130606=不好被發現了！
battle_talk_130607=策馬衝鋒吧！殿下，敵人已經潰退！上帝與我們同在！
battle_talk_130701=我將在蘭斯加冕為法國國王，成為英格蘭最偉大的國王！
battle_talk_130702=我是不會讓英國人得逞的，即使我們沒有國王，我們也是不會屈服的！
