conquest_faction_desc_11=失去羅馬帝國庇護的不列顛正遭受蠻族的侵略，兇殘的日爾曼蠻族在不列顛島上四處肆虐。不列顛人團結在英勇善戰的亞瑟王麾下，誓要將這些入侵者趕出不列顛。

conquest_faction_desc_101=自凱撒征服不列顛以來，羅馬人對不列顛的統治長達4個世紀之久，如今的西羅馬帝國早已不復往日強盛，只能將不列顛的軍團撤回本土。失去西羅馬帝國庇護的不列顛人不得不拿起武器，獨自面對入侵者。
conquest_faction_desc_102=盎格魯-撒克遜人驍勇善戰，經常乘著戰船沿海岸線劫掠西羅馬帝國北部諸省。當其他蠻族部落正為爭奪高盧地區而打的頭破血流之時，盎格魯-撒克遜人卻把目光轉向了失去西羅馬帝國庇護的大不列顛島。
conquest_faction_desc_103=西哥特人曾為羅馬帝國戍邊，處於抵禦匈人的最前線，但卻得不到羅馬人的善待。忍無可忍的西哥特人奮起反抗，並在西羅馬境內建立了西哥特王國，這意味著其與西羅馬帝國的全面衝突已不可避免。
conquest_faction_desc_104=西羅馬帝國目前危機不斷，日漸衰落的國力使其無法有效應對蠻族遷徙帶來的邊境動盪，曾經輝煌的帝國如今搖搖欲墜。但危機通常伴隨著機遇，且帝國的底蘊猶存，只要矢志復興或許能重現羅馬帝國的榮光。
conquest_faction_desc_105=布列塔尼人主要由從大不列顛島遷徙過來的凱爾特人組成，“布列塔尼”的意思就是小不列顛。當前高盧地區陷入混亂、局勢不明，布列塔尼人需要更有智慧地與強國相處，才能在高盧存續下去。
conquest_faction_desc_106=薩利安法蘭克人是法蘭克人中的一支，被羅馬帝國允許以蠻盟的形式定居在邊境地區。面對逐漸沒落的西羅馬帝國，薩利安人需要做出決策，是繼續忠實地守衛帝國邊境，還是去繼承西羅馬帝國在高盧的權力。
conquest_faction_desc_107=長久以來，法蘭克人渴望進入富饒的高盧地區，但一直被羅馬帝國強大的軍事力量所阻止。如今西羅馬帝國正陷入內憂外患之中，這對法蘭克人來說是一個絕佳的機會。
conquest_faction_desc_108=眾多從東北歐遷徙來的日爾曼部落之一。勃艮第人首先察覺到西羅馬帝國的衰弱和軍備鬆弛之後，果斷跨越萊茵河進入西羅馬境內，但這勢必會遭到西羅馬帝國的瘋狂圍攻。
conquest_faction_desc_109=阿勒曼尼的意思是“全體人”，這表明了這個民族是由無數大大小小的日爾曼部落組成的，所以阿勒曼尼人視自己為日爾曼人的領導者，有義務帶領日爾曼各民族對抗強大的西羅馬帝國。
conquest_faction_desc_110=作為薩爾馬提亞人的後裔，阿蘭人曾是草原上最為強大的遊牧民族，然而在遭到更加兇殘的匈人襲擊後，阿蘭人只能落荒而逃。與其他遷徙民族一樣，阿蘭人如今也在西羅馬帝國邊境尋找機會。
conquest_faction_desc_111=東哥特人曾定居在黑海沿岸，是最早遭受匈人入侵的日爾曼人，面對這些強悍且陌生的匈人，他們只能選擇暫時屈服。但東哥特人不是甘居人下的民族，他們在等一個機會，一個可以徹底擺脫匈人壓迫的機會。

conquest_faction_desc_201=自由與獨立是布列塔尼人的信念，即便是面對如日中天的西法蘭克王國，布列塔尼人也沒有選擇屈服，他們擁護驍勇善戰的埃裡斯波為“布列塔尼之王”，決心與西法蘭克王國鬥爭到底。
conquest_faction_desc_202=在法蘭克王國被《凡爾登條約》一分為三之後，查理二世次以原王國的西部領土為基礎建立了西法蘭克王國。西法蘭克王國繼承了原法蘭克王國的核心地區，同樣也繼承了原王國的隱患：動盪不安的邊境與強勢的貴族階層。
conquest_faction_desc_203=在法蘭克王國被《凡爾登條約》一分為三之後，洛泰爾一世以原王國的中部領土為基礎建立了中法蘭克王國。相比較其他兩個王國，中法蘭克王國雖然面積較小，但擁有著最為富裕的義大利地區，以及“羅馬人的皇帝”的頭銜。
conquest_faction_desc_204=在法蘭克王國被《凡爾登條約》一分為三之後，日爾曼人路易以原王國的東部領土為基礎建立了東法蘭克王國。東法蘭克王國大部分領土為剛征服不久且比較貧窮的日爾曼地區，但這也意味著王國有著極強的武力和發展潛力。
conquest_faction_desc_205=盎格魯-撒克遜人的七王國之一，在先王埃格伯特的勵精圖治下，威塞克斯王國曾有機會統一全英格蘭，然而隨著維京人的到來，威塞克斯不得不暫緩統一的步伐，並把更多的精力放在防禦維京人的入侵上。
conquest_faction_desc_206=盎格魯-撒克遜人的七王國之一，麥西亞王國曾是不列顛最強盛的王國，其霸權可以追溯到彭達統治時期。但往日輝煌不再，現在的麥西亞王國不光要防備維京人，還要提防虎視眈眈的威塞克斯王國。
conquest_faction_desc_207=盎格魯-撒克遜人的七王國之一，東盎格利亞王國國土不大且多處於沼澤之中，這使其很難做強，歷史上長期淪為麥西亞的附庸國。如今麥西亞王國無暇他顧，這是東盎格利亞王國崛起的最後機會。
conquest_faction_desc_208=格溫內斯王國是不列顛人建立的羅馬帝國繼承國之一，其國王通常享有“不列顛之王”的稱號。格溫內斯現任國王為羅德里大帝，在這位明君的治理下，格溫內斯王國繁榮強盛，幾乎統一威爾士全境。
conquest_faction_desc_209=盎格魯-撒克遜人的七王國之一，諾森布裡亞王國是由兩個獨立的小王國合併而成的，這導致這個國家在政治上長期處於傾軋和爭吵之中。當此維京人在不列顛作亂之時，諾森布裡亞王國更加需要團結。
conquest_faction_desc_210=阿爾巴王國是由蓋爾人與皮克特人聯合組建的王國，現任國王正是王國的開創者，有著“征服者”之稱的肯尼士一世。在這位能徵善戰的國王帶領下，阿爾巴王國擊退了各種來犯之敵，成為不列顛北方的霸主。
conquest_faction_desc_211=蓋爾王國是由愛爾蘭諸多小王國組成的聯合王國，其領袖被稱為愛爾蘭至高王。雖然愛爾蘭偏居一隅，但仍然沒能免遭維京人的侵襲，蓋爾王國需要團結在至高王的麾下，才能將這些入侵者趕出愛爾蘭。
conquest_faction_desc_212=斯拉夫人的擴張最早可以追溯至西元5世紀，也許西斯拉夫人就是在那個時候從斯拉夫部落中分離出來，成為了一個獨立的民族。生活在苦寒之地的西斯拉夫人具有吃苦耐勞的品質，但也擁有頑強的戰鬥意志。

conquest_faction_desc_301=拜占庭帝國皇帝查士丁尼一世矢志復興羅馬帝國，意圖收復所有被蠻族染指的帝國故土。作為皇帝最為信任的大將，貝利撒留肩負複國重任，他將率領一支帝國最精銳的軍團遠赴北非，從那裡開啟恢復羅馬帝國榮光的征程。
conquest_faction_desc_302=汪達爾人曾是日爾曼蠻族部落之一，在經過漫長而又艱苦的遷徙之後，最後侵佔羅馬帝國的北非行省並以此建立了汪達爾王國。自王國建立以來，汪達爾人就多次挫敗拜占庭帝國收復北非故土的企圖，想必此次也不會例外。
conquest_faction_desc_303=西羅馬帝國衰亡後，狄奧多裡克大帝率領東哥特人遷入亞平寧半島，並在這原帝國的核心領土上建立了東哥特王國。如今東哥特王國正因狄奧多裡克大帝的逝世而陷入內亂的泥沼之中，外部又有強敵環伺，王國的處境已十分艱難。
conquest_faction_desc_304=在西羅馬帝國因蠻族入侵而滅亡後，作為原羅馬帝國東部繼承者的拜占庭帝國，也經歷了長達半個世紀的沉寂和衰落。如今拜占庭帝國在皇帝查士丁尼一世的勵精圖治下，終於再次強盛起來，並朝著復興羅馬帝國的方向前進。
conquest_faction_desc_305=西哥特王國作為最早在高盧建立的日爾曼人王國，卻被崛起的法蘭克王國擊敗，不得已放棄高盧，向南翻越比利牛斯山脈。經過多年的蟄伏，國力得到恢復的西哥特王國又將目光投向高盧，誓要再與法蘭克人一較高下。
conquest_faction_desc_306=當諸多日爾曼遷徙民族正為了瓜分西羅馬帝國的領土而打的頭破血流之際，明智的蘇維匯人選擇前往伊比利亞建立蘇維匯王國。但好景不長，隨著西哥特人也遷入伊比利亞半島，蘇維匯王國與西哥特王國的衝突已不可避免。
conquest_faction_desc_307=作為伊比利亞土著民族，瓦斯科人總是在奮力抵抗各樣的入侵者，從當年的羅馬帝國到如今的諸多日爾曼蠻族，不管面對的敵人如何強大、如何善戰，瓦斯科人從沒有放棄抗爭和獨立自主的決心。
conquest_faction_desc_308=法蘭克王國是由薩利安法蘭克人的首領克洛維一世統一所有法蘭克部落而建立的日爾曼人王國。作為西羅馬帝國曾經的蠻族盟友，法蘭克王國很順利地繼承了帝國在高盧地區的權力和遺產，快速崛起為高盧地區的霸主。
conquest_faction_desc_309=勃艮第人的遷徙之路充滿了坎坷，剛跨越萊茵河便先後遭到羅馬人和匈人的阻擊，在歷經千難萬險之後，終於在高盧建立了勃艮第王國。但勃艮第人依然不能掉以輕心，相鄰的法蘭克王國似乎對他們的領土有所企圖。
conquest_faction_desc_310=布列塔尼人主要由從大不列顛島遷徙過來的凱爾特人組成。不管是當年的西羅馬帝國，還是如今的法蘭克王國，布列塔尼人總是要和國力遠勝自己的強國相處，但布列塔尼人從來沒有屈服過。
conquest_faction_desc_311=日爾曼遷徙民族建立的王國之一，與其他日爾曼人王國不同的是，圖林根王國在匈人帝國崩潰後積極吸納了許多匈人奴隸，因此王國有著出眾的軍事實力，但這使得圖林根王國成為周邊其他國家忌憚的對象。
conquest_faction_desc_312=日爾曼遷徙民族之一，當倫巴第人歷經磨難終於找到一處安全之所時，西羅馬帝國富裕的領土早已被其他遷徙民族瓜分殆盡。倫巴第人只能把期望寄託在拜占庭帝國和東哥特王國上，儘管在兩個強國間周旋無異於火中取栗。
conquest_faction_desc_313=起源於東日爾曼哥特族的格皮德人十分驍勇善戰，在匈王阿提拉去世後，格皮德人率先起兵反抗匈人，並最終覆滅了匈人帝國。如今格皮德王國與拜占庭帝國相鄰，格皮德人需要小心應對這個極具智慧的古老帝國。

conquest_faction_desc_401=自阿萊克修斯一世皇帝登基以來，科穆寧家族已持續統治拜占庭帝國一個多世紀。經過前幾任科穆寧皇帝的勵精圖治，拜占庭帝國止衰轉盛，一掃突厥人入侵後的頹勢，並有望收復安納托利亞故土，重現羅馬帝國的輝煌。
conquest_faction_desc_402=塞爾柱帝國分裂後，基利傑阿爾斯蘭一世繼承其在安納托利亞的政權而建立的國家。羅姆蘇丹國與拜占庭帝國為了爭奪安納托利亞而多次交戰，雖然目前兩國保持著難得的和平，但絕不可忽視拜占庭帝國收復故土的決心。
conquest_faction_desc_403=由那些因塞爾柱帝國入侵而逃難到奇裡乞亞的亞美尼亞人建立的國家，全稱“奇裡乞亞亞美尼亞王國”。奇裡乞亞王國若想要在強敵環伺的安納托利亞生存下去，就需要交好十字軍國家並借助他們的力量。
conquest_faction_desc_404=“貝伊”突厥語中“首領”、“酋長”的意思，拜占庭帝國因塞爾柱帝國的入侵而失去了對安納托利亞的掌控，諸多突厥部落趁機遷入該地區，建立了由各部落首領聯合統治的安納托利亞貝伊國。
conquest_faction_desc_405=長久以來，格魯吉亞地區存在著許多相互敵對的割據勢力，格魯吉亞王國的建立終結了這一混亂的局面。如今在塔瑪爾女王的統治下，格魯吉亞王國繁榮強盛，若能趁此時機向南擴張，或許能建立一個強大的外高加索帝國。
conquest_faction_desc_406=塞爾柱帝國原亞塞拜然總督伊爾迪尼茲建立的王朝，埃爾迪古茲的統治者世襲“阿塔貝格”這一頭銜，即“藩王”和“蘇丹輔政大臣”。當塞爾柱帝國因內亂而衰弱時，埃爾迪古茲的阿塔貝格趁機控住了蘇丹，以此來掌控帝國的政權。
conquest_faction_desc_407=贊吉王朝是抗擊十字軍東征最為堅決的國家，先王努爾丁就曾多次率軍戰勝十字軍，有效遏制了十字軍國家對西亞地區的侵蝕。如今同時面對十字軍國家和新晉的阿尤布王朝的挑戰，王朝需要更加謹慎處理外交，切不可多面受敵。
conquest_faction_desc_408=繼倭馬亞王朝後，阿拉伯帝國的第二個世襲王朝。時過境遷，曾經繁榮昌盛的阿拔斯王朝如今國力衰微偏居一隅，甚至淪為突厥人操控的傀儡。阿拔斯王朝若想重現昔日榮光，必須趁塞爾柱帝國四分五裂之際，徹底擺脫突厥人控制。
conquest_faction_desc_409=十字軍國家之一，第一次十字軍東征時期塔蘭托的博希蒙德奪取安條克城後建立的公國。安條克城作為十字軍東征路線上的戰略重鎮，也是十字軍與拜占庭帝國聯繫的重要樞紐，因此完善城防是安條克公國的首要任務。
conquest_faction_desc_410=十字軍國家之一，由耶路撒冷王國扶持圖盧茲的貝特朗以的黎波里城為中心建立的伯國。的黎波里伯國地處耶路撒冷王國和安條克公國之間，只有處理好與這兩國的關係並結成牢固的攻守同盟，才能抵禦住阿尤布王朝的衝擊。
conquest_faction_desc_411=十字軍國家之一，當前耶路撒冷國王鮑德溫四世年雖然年輕且身患惡疾，但其治國和用兵頗具章法，既能平衡國內諸派紛爭使王國政局穩定，又能親自領兵擊退如日中天的薩拉丁。耶路撒冷王國在鮑德溫四世的治理下日益強盛，正成為十字軍諸國的中心。
conquest_faction_desc_412=庫爾德人薩拉丁解散法蒂瑪王朝後，以埃及為統治中心建立的帝國。薩拉丁在率軍反擊十字軍入侵時，就表現出卓越的軍事才能和領袖風範。如今在這位雄主統治下的埃及帝國正大舉擴張，大有一統整個伊斯蘭世界的趨勢。
conquest_faction_desc_413=阿基坦公爵理查是英格蘭國王亨利二世的次子，也是其王位的唯一繼承人，理查有著極高的軍事組織能力且驍勇善戰。在厭倦了與父兄們無休止的內戰之後，理查決定響應教廷的號召，率領遠征軍支援遠在東方的十字軍國家。

conquest_faction_desc_501=自維京人入侵不列顛以來，偏居於愛爾蘭島的蓋爾人也沒能免遭這些海盜的侵擾。如今蓋爾人正團結在至高王的麾下，誓要將維京人趕出家園，統一愛爾蘭。
conquest_faction_desc_502=從斯堪的納維亞遷入不列顛的維京人的一支，佔據了英格蘭北部和愛爾蘭東部沿海地區。隨著原住民的抵抗越來越堅決，這支維京人對不列顛的征服變得十分艱難。
conquest_faction_desc_503=又稱盎格魯-撒克遜英格蘭，是由威塞克斯王國統一英格蘭地區後建立的王國。當此王國王位交接之際，維京人再度侵入諾森布裡亞，艾德蒙一世需要驅逐這些入侵者來重新統一英格蘭。
conquest_faction_desc_504=不列顛人建立的羅馬帝國繼承國之一，格溫內斯王國的每一位國王都致力於發展國力，期望有朝一日能夠重新掌控不列顛，使“不列顛之王”的稱號名副其實。
conquest_faction_desc_505=由達爾裡阿達國王肯尼士一世兼併皮克特人後建立的王國。阿爾巴王國自建立起，就頑強抗擊著各路入侵者，無論是維京人還是英格蘭人，都沒能使阿爾巴王國屈服。
conquest_faction_desc_506=阿斯圖裡亞斯王國的繼承者，以萊昂為首都的基督教王國。作為西班牙半島上最大的王國，萊昂王國肩負著領導其他基督教國家一起抵抗科爾多瓦哈裡發國的擴張。
conquest_faction_desc_507=巴斯克人以潘普洛納為中心建立的獨立王國。潘普洛納王國建立之初便成功抵禦住法蘭克王國的侵擾，如今面對同樣強盛的科爾多瓦哈裡發國，王國的人民依然不會退縮。
conquest_faction_desc_508=巴賽隆納伯國最初是法蘭克王國以巴賽隆納為中心建立的邊境伯爵領，但隨著西法蘭克王國內部爭鬥不休，王國越來越無力支援巴賽隆納伯爵，伯國與法蘭克王國的聯繫日益衰弱。
conquest_faction_desc_509=倭馬亞王朝的後裔在伊比利亞半島建立的伊斯蘭教王國，阿卜杜拉赫曼三世自立為哈裡發後，遂被稱作科爾多瓦哈裡發國。目前帝國在這位“常勝者”的治理下日益強盛，大有一統整個伊比利亞半島的趨勢。
conquest_faction_desc_510=阿拉伯貴族伊德里斯整合當地的柏柏爾部落後建立的王朝。如今王國國力衰落、內亂不止，又遭北方強鄰窺視，王國需要謹慎處理外交，否則有亡國之險。
conquest_faction_desc_513=偉大的艾倫一世逝世後，維京人捲土重來，侵佔了布列塔尼大部分地區。在與維京人抗爭了近30年後，艾倫二世成功驅逐了這些北歐海盜，重新建立了布列塔尼公國。
conquest_faction_desc_514=法蘭克王國被《凡爾登條約》一分為三之後，西法蘭克王國繼承了原王國的西部領土。如今加洛林王朝王權旁落，國內的諸侯們紛紛做大，更有如於格那樣的逆賊，竟敢攻佔王室領地，西法蘭克王國的中興之路顯得極其艱難。
conquest_faction_desc_515=長久以來，塞納河下游地區經常遭到維京人的襲擊，西法蘭克王國於是將該地區封予維京人首領羅洛，換取和平及這支維京部落的效忠，羅洛便以盧昂為中心建立了諾曼第公國。
conquest_faction_desc_516=法蘭克公爵兼巴黎伯爵于格雖然曾擁立路易四世繼承西法蘭克王位，但其家族擁有的實力還是遭到一心加強王權的路易四世的猜忌和忌憚，經過多次交鋒和爭鬥，這對君臣最終反目成仇、兵戎相見。
conquest_faction_desc_517=阿基坦這一名稱可以追溯至羅馬帝國時期的阿基坦高盧行省，阿基坦地區盛行的羅馬文化使其在西法蘭克王國中顯得與眾不同，阿基坦公國因此保留有一定的獨立自主性。
conquest_faction_desc_518=加洛林王朝以圖盧茲為中心建立的伯爵領。如今加洛林王朝衰落，圖盧茲伯國雖然名義上臣屬於西法蘭克王國，但西法蘭克王國已無法對圖盧茲伯國進行有效的干預。
conquest_faction_desc_519=由上、下勃艮第王國合併而成的王國，所以又被稱作兩勃艮第王國，因首都設在阿爾勒而得名。阿爾勒王國地處東、西法蘭克王國之間，需要謹慎的與這兩個大國相處。
conquest_faction_desc_520=東法蘭克國王奧托一世自繼位起便致力於加強王權，堅持國王對諸侯們的權力，這導致王國與公國間矛盾重重，甚至多次引發叛亂。但奧托一世堅信，只有將王國所有的力量團結在自己的麾下，才能重現法蘭克王國的輝煌。
conquest_faction_desc_521=《凡爾登條約》將法蘭克王國分成了西、中、東三個王國，但僅隔12年後中法蘭克王國再被一分為三，洛塔林吉亞公國由此誕生。公國因繼承了法蘭克人興起之地奧斯特拉西亞地區而遭到西、東兩個王國的覬覦。
conquest_faction_desc_522=又稱法蘭克尼亞公國，是東法蘭克王國自治公國之一。東法蘭克的加洛林王室絕嗣後，弗蘭肯公爵曾短暫掌控過東法蘭克的王位，或許因此弗蘭肯公國不甘願臣服於來自薩克森的奧托一世。
conquest_faction_desc_523=東法蘭克王國自治公國之一，巴伐利亞這一名稱可以追溯至羅馬帝國時期對當地部落的稱呼，意為“來自波希米亞的人”。加洛林王朝衰落後，不得不設立一個新的巴伐利亞公國，以此延續王朝對當地的統治。
conquest_faction_desc_524=西元774年，查理曼征服倫巴第王國並將其北部地方直接併入法蘭克王國，後來這部分地區被設立為義大利王國。如今法蘭克王國早已分崩離析，義大利王國終於取得獨立，不在受制於他國。
conquest_faction_desc_526=貝內文托公國起源於倫巴第人征服義大利後，在義大利南部建立的以貝內文托為中心的公國。倫巴第王國被法蘭克王國吞併後，貝內文托公國則因教皇國的分隔而得以獨立存活。
conquest_faction_desc_527=當西羅馬帝國遭蠻族入侵而滅亡後，義大利北部沿海地區的居民紛紛逃往瀉湖並在此建立了定居點，威尼斯共和國便由此發展起來。作為因海上貿易而繁榮的城邦國家，威尼斯需要一支強大的海軍來維護自己的海上利益。
conquest_faction_desc_528=自查士丁尼大帝中興以來，拜占庭帝國仿佛用盡了氣運，之後的近400年裡，帝國內憂外患不斷，國土接連淪喪。但偉大的國家不會一直沉淪，經過前幾任馬其頓皇帝的治理，拜占庭帝國國力得到恢復，並準備收復失地。
conquest_faction_desc_529=西元7世紀，拜占庭帝國邀請克羅埃西亞人遷入達爾馬提亞地區，以此來共同對抗在當地肆掠的阿瓦爾人，於是克羅埃西亞人在達爾馬提亞建立了政權並逐步發展為克羅埃西亞公國。
conquest_faction_desc_530=塞爾維亞人在達爾馬提亞地區建立的政權，塞爾維亞公國這一新興政權正面臨保加利亞人入侵的威脅，也許與正和保加利亞人陷入苦戰的拜占庭帝國合作是個不錯的選項。
conquest_faction_desc_531=保加利亞帝國自立國以來，便與拜占庭帝國連年交戰，即使如拜占庭這樣的古老強國，也不得不屈服於帝國的兵鋒之下。但盛極必衰，如今保加利亞帝國正因內戰而元氣大傷，周邊的手下敗將們紛紛串聯，似乎要趁機反攻。
conquest_faction_desc_532=即丹麥日爾曼人，通常指居住在斯堪的那維亞南部的維京人部落。相比於其他維京人部落熱衷於出海劫掠，這群留守本土的維京人更願意積極發展故鄉，但這樣就得直面強大的東法蘭克王國。
conquest_faction_desc_533=薩克森貴族吉羅一世在東法蘭克王國東部設立的邊境侯爵領。作為東法蘭克國王奧托一世最信任的部下，吉羅一世負責守衛王國東部邊境的安穩，並盡可能的向東方擴展王國的疆域。
conquest_faction_desc_534=又稱捷克公國，是由大摩拉維亞公國的捷克人建立的政權。儘管波西米亞公國曾為了從大摩拉維亞公國獨立出來而與東法蘭克王國親密合作過，但最終波西米亞公國仍然為了獨立而與東法蘭克王國交惡。
conquest_faction_desc_535=波蘭一詞源自古斯拉夫語，意為平原人，很形象的表達了波蘭人所生存的環境。面對東法蘭克王國不斷的東擴，波蘭人若想要家園不被侵佔，唯有團結一致才能抵抗住這個龐然大物。
conquest_faction_desc_536=西元9世紀，馬紮爾人從東歐草原遷入喀爾巴阡盆地，剛進入中歐的馬紮爾人靠四處劫掠為生，周邊各國不堪其擾。如今隨著各國對這個新鄰居的防範越來越嚴密，馬紮爾人需要改變他們從草原帶來的生存習性。
conquest_faction_desc_538=佩切涅格人起源于西突厥烏古斯部落，曾短暫從屬於可薩汗國。西元10世紀初，佩切涅格人西遷至頓河流域，接管了可薩汗國在該地區的政權。
conquest_faction_desc_539=伊比利亞王國曾是拜占庭帝國的附屬國，後因阿拉伯帝國的興起和入侵，伊比利亞王國被迫向阿拉伯帝國效忠。如今阿拉伯帝國正因內亂而無暇他顧，伊比利亞王國若能抓住時機交好舊主，便能徹底擺脫阿拉伯人的控制。
conquest_faction_desc_540=作為一個西元前便存在的古老王國，亞美尼亞王國的歷史充滿了坎坷，其國土先後被波斯人、羅馬人和阿拉伯人侵佔和統治。但即便如此，亞美尼亞人依然不會放過任何可以使國家獨立的機會。
conquest_faction_desc_541=阿拉伯帝國分裂出來的王國之一，原阿拉伯帝國摩蘇爾總督阿卜杜拉在認清阿拔斯王朝的衰落後，便割據摩蘇爾自立，隨後建立摩蘇爾埃米爾國並自稱埃米爾，由此開創了哈姆達尼王朝。
conquest_faction_desc_542=阿拉伯帝國分裂出來的王國之一，由阿拔斯王朝的突厥將領伊赫什德建立的埃及王朝。目前伊赫什德王朝正與哈姆達尼王朝爭奪敘利亞的控制權，敘利亞的歸屬將決定兩個王國在阿拉伯世界的權威。

