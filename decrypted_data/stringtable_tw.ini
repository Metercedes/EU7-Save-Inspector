agreement_info=使用者協定[br]更新日期：2021年9月30日[br][br]第一部分重要提示[br]本《遊戲最終用戶使用授權合約》（以下簡稱“協議”）是使用者（個人或單一實體，以下簡稱“使用者”）與蘇州EasyTech軟體科技有限公司（以下簡稱“EasyTech”、“運營商”）之間有關EasyTech旗下遊戲（亦應包括該遊戲之任何修改、更新、全部前期版本及後續版本等，以下簡稱“遊戲”）適用的法律協議。[br][br]主要條款[br]1.權利的許可[br]1.1用戶可在許可生效的時間內將遊戲用戶端軟體安裝在自己使用的聯網移動設備上，並以用戶端軟體指定的方式運行本“遊戲”的一份副本。其他任何形式的未經許可的安裝、使用、訪問、顯示、運行以及轉讓，都將被視為對協議的違反。[br]2.行為的禁止[br]2.1禁止用戶進行以下侵害本遊戲公平性的行為，包括但不限於：[br]2.1.1利用反向工程、編譯或反向編譯、反彙編等技術手段製作軟體對遊戲進行分析、修改、攻擊，最終達到作弊的目的；[br]2.1.2使用任何外掛程式或遊戲修改程式（本協定所稱“外掛程式”是指獨立於遊戲軟體之外的，能夠在遊戲運行的同時影響遊戲操作的所有程式，包括但不限於類比鍵盤滑鼠操作、改變操作環境、修改資料等一切類型。如國家有關法律、法規及政府主管部門的規章或規範性檔規定的外掛定義與本協議有衝突，則以法律、法規、部門規章或規範性檔規定的為准），對本遊戲軟體進行還原工程、編譯、解碼或修改，包括但不限於修改本軟體所使用的任何專有通訊協定、對動態隨機存取記憶體（RAM）中資料進行修改或鎖定；[br]2.1.3使用異常的方法登錄遊戲、使用加速器等外掛軟體或機器人程式等惡意破壞服務設施、擾亂正常服務秩序的行為；[br]2.1.4製作、傳播或使用外掛、封包、加速軟體，及其它各種作弊程式，或組織、教唆他人使用此類軟體程式，或銷售此類軟體程式而為私人或組織謀取經濟利益；[br]2.1.5使用任何方式或方法，試圖攻擊提供遊戲服務的相關伺服器、路由器、交換機以及其他設備，以達到非法獲得或修改未經授權的資料資料、影響正常遊戲服務，以及其他危害性目的的任何行為；[br]2.1.6利用遊戲系統可能存在的技術缺陷或漏洞而以各種形式為自己及他人牟利（包括但不限於複製遊戲中的虛擬物品等）。[br][br]用戶守則[br]請相信，因為用戶違反下述守則而對用戶的遊戲角色採取限制措施，也是為了廣大用戶的最大利益。[br]1.行為：利用系統的BUG、漏洞為自己及他人牟利。處罰措施：一經發現或經用戶舉報查證屬實後，提出嚴厲警告；經警告後再犯者刪除其相關虛擬物品等，並交由國家有關機構處理。[br]2.行為：利用遊戲提供的功能進行非法實物交易等違反國家法律法規的行為。處罰措施：上述行為一經發現，立即交由國家有關機構處理。[br][br]蘇州EasyTech軟體科技有限公司[br]二零一九年六月一日[br]*請訪問EasyTech官方網站以閱讀全部使用者協定內容。
