general_desc_Edward the Black Prince1=愛德華常常在戰場上身穿黑色鎧甲以威懾敵軍。在百年戰爭期間，這一身黑甲是法軍指揮官最不願意見到的裝束。
general_desc_Su Dingfang1=蘇定方戎馬一生，北擊頡利，西滅突厥，東平百濟，南鎮吐蕃。七十多歲時仍鎮守在戰場一線，是當之無愧的大唐戰將。

