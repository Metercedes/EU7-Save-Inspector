stage_intro_4801=哈拉爾為了發展自己的地位和資歷，加入了拜占庭的瓦蘭吉衛隊。在接下來的十多年中，他將留下一段傳奇的歷史。
stage_intro_4803=1035年，哈拉爾成為瓦蘭吉衛隊的隊長。同年，哈拉爾帶領瓦蘭吉衛隊進攻並佔領了小亞細亞，迫使阿拉伯帝國與拜占庭帝國簽訂了和平條約。
stage_intro_4805=哈拉爾被命令去鎮壓保加利亞地區。在這場鎮壓中，哈拉爾沒有絲毫留情，因此他得到了“保加利亞焚燒者”的稱號。
stage_intro_4807=在東部戰事告一段落後，哈拉爾被派往了西西里島。這次他將用他的武力和智慧，為拜占庭重新光復西西里島。
stage_intro_4809=1047年哈拉爾在馬格努斯一世死後，成為了挪威的國王，隨後他對丹麥發起了進攻，試圖將丹麥完全佔領。
stage_intro_4811=1062年，哈拉爾與丹麥國王斯文二世約定在尼薩河河口用海戰決出勝負，儘管哈拉爾獲勝，但由於挪威國內發生動盪，雙方最終在兩年後達成了和平協定。

