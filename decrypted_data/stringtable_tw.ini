battle_talk_130704=英國人應該不在大本營，我們去收回加萊！
battle_talk_130801=探查一下情報，據說查理王子要去蘭斯加冕。
battle_talk_130802=我們一路小心，說不定會有英軍阻攔。
battle_talk_130803=攔擊住他們！
battle_talk_130804=果然有埋伏！
battle_talk_130805=他們陣型已亂！騎兵們沖呀！
battle_talk_130806=依舊要當心沿途的伏兵，保護我安全到蘭斯加冕！
battle_talk_130901=準備了如此之久，今天沒有人可以阻擋我獲得繼承權！
battle_talk_130902=我等得已經太久了，再也沒有下次機會了，這場戰鬥將決定鹿死誰手！
battle_talk_130903=決一死戰吧！
battle_talk_131001=雖然我們連續行軍非常疲憊，但此時的英軍毫無準備，衝擊他們！
battle_talk_131002=什麼？這些法國人從哪裡來的？這該死的大冷天還要打仗！都給我打起精神！否則你們面對的只是有死亡。
battle_talk_131003=英國人擅長打陣地戰，那我們就採用突擊戰術和遊走戰術，讓他們無法組織起有效攻擊！
battle_talk_131004=撤退！如果能撤退到城堡，我們就可以獲勝！
battle_talk_131005=別給他們機會逃跑！乘勝追擊！
battle_talk_131101=法軍的進攻越來越犀利，如果還沒有援軍，前方的城堡就要失守了。
battle_talk_131102=讓英國人知道我們西班牙人的厲害，阻擋他們，不能讓他們上岸！
battle_talk_131103=他們的船隻比我們高，吃水還比我們淺，我們真的無力抵抗！快逃吧！
battle_talk_131104=徹底摧毀英國的艦船！我們是無敵的！
battle_talk_131201=不要和法國人糾纏，我們的目的就是搶掠，讓戰火燒遍法國！用最快的速度行軍！
battle_talk_131202=這些強盜！我們必須組織起阻擊行動！不能讓他們一路劫掠！
battle_talk_131203=我們只要回到波爾多就可以安全了，速速行軍！
battle_talk_140101=在阿芙勒爾失去了三分之一的戰士，但我不會退縮的。我們需要儘快和加萊的援軍匯合！
battle_talk_140102=敵人的數量越來越多了，看來他們想要一舉殲滅我們！架好木柵！做好防禦！
battle_talk_140103=依照計畫衝鋒！我們的人數遠遠多於他們！注意兩側埋伏的長弓兵。
battle_talk_140104=不好！下雨導致地面太泥濘了。我們根本無法衝鋒！
battle_talk_140105=聖喬治！我們反擊！
battle_talk_140201=佔領盧昂就可以佔領整個諾曼第！他們兩個黨派爭鬥越發激烈，看來他們的救援也不會及時，機不可失時不再來。
battle_talk_140202=我們還是避其鋒芒吧，和英國人拼命只會給勃艮第人佔便宜。
battle_talk_140203=盧昂缺衣少食，城內的百姓已經快餓死了。不知道救援什麼時候才能到來。
battle_talk_140204=我們需要儘快打通補給通道，否則盧昂不保，不過如果我全力出動，可能會導致阿馬尼亞克黨的反撲。
battle_talk_140205=不要給他們獲得補給的機會。
battle_talk_140301=今日是復活節，蘇格蘭人和法國人肯定防守鬆懈，讓我們直接衝鋒過去，必然殺他們個措手不及！
battle_talk_140302=英國佬沖過來了！大家趕緊穿上衣服！
battle_talk_140303=他們的騎兵和後面嚴重脫節了！攔住後面的部隊！
battle_talk_140304=我們太突進了！啊！
battle_talk_140401=法國人的攻勢很強，我們從側面攻擊莫城，切斷援助巴黎的供給。
battle_talk_140402=儘管來吧，別說兩萬人，二十萬人也別想攻陷我守的城池！
battle_talk_140403=收復更多的據點！讓英國人知道我們蘇格蘭人的厲害！
battle_talk_140404=我的病似乎無法康復了，我的征途可能就要停止，我未盡之夙願只能後人幫我完成了。
battle_talk_140501=多年的追逐戰讓我厭煩。法蘇聯軍的主力在前方按兵不動，這是我們一次性消滅他們的好時機！
battle_talk_140502=保持隊形！旗幟前進！
battle_talk_140503=聖喬治！貝德福德！
battle_talk_140504=聖德尼！蒙茹瓦！
battle_talk_140505=隊伍不要分散！騎兵繞後！給他們沉重一擊！
battle_talk_140506=我們會戰鬥到最後一刻！即使全軍覆沒！
battle_talk_140601=堅持住，國王已經派援軍來了！
battle_talk_140602=別再妄想了。我們已經三面圍城，儘快投降！
battle_talk_140603=我軍雖然被圍困，但敵人已經圍困多日毫無士氣，大家和我一起沖呀！
battle_talk_140604=側翼已經被突破，當心城中的人反過來包圍我們！
battle_talk_140605=乘勝佔領其他據點！英國人潰退了！
battle_talk_140701=讓我們去拯救城內士兵和民眾！
battle_talk_140702=終於順利入城，這次奧爾良或許有救了！
battle_talk_140703=希望英軍能自行撤離，我並不希望也不喜歡殺戮。
battle_talk_140704=要戰便戰，讓手中的劍來決定這座城市的命運吧！
battle_talk_140705=讓我們拔取奧爾良周邊的據點，讓我們徹底解放這座城市！
battle_talk_140801=我腦海的聲音告訴我要前進！去解救更多法國苦難的民眾！
battle_talk_140802=我們將誓死追隨你的左右！
battle_talk_140803=快去救援我們的部隊，法軍不知道吃了什麼藥？怎麼士氣如此高昂！
battle_talk_140804=不要被面前的堅城嚇倒，上帝已經把他們交由我們處置！即使他們懸浮在雲中，我們也能擊敗他們！
battle_talk_140805=不！我們怎麼會輸！
battle_talk_140901=吹響號角！跟隨高貴的國王查理一起前往蘭斯加冕的時刻到來了！
battle_talk_140902=抽調精兵包圍他們，決不能讓他們達到蘭斯！
battle_talk_140903=出擊！粉碎一切擋在我們行徑道路上的敵人！
battle_talk_140904=我應上帝的啟示加冕為王！
battle_talk_141001=我俘虜了貞德！
battle_talk_141002=上帝拋棄我了麼？
battle_talk_141003=為貞德復仇！讓我們踏平這片土地！
battle_talk_141004=我要把戰火燒向整個英國國土！
battle_talk_141005=聖德尼！我會讓貞德的意志傳遍法國！
battle_talk_141101=清除巴黎周邊的據點，收復首都！貞德的遺願由我來完成！
battle_talk_141102=收復巴黎！讓鳶尾花重新綻放在巴黎！
battle_talk_141103=救援巴黎！法軍來勢兇猛！不知道這次城主能否守住。
battle_talk_141104=看來無法守住了，快逃吧。
battle_talk_141201=佔領加萊！算是送給查理七世的禮物！
battle_talk_141202=這座城市已經在我們手上經營了百年，怎麼能讓你如此輕易攻陷！
battle_talk_141203=海上的部隊由我來清理！
battle_talk_141301=奪回諾曼第，把英國人趕到海峽那邊去！
battle_talk_141302=我們分頭並進，勢必一次性解放諾曼第！
battle_talk_141303=好！這一刻我已經等待很久了。
battle_talk_141304=希望還來得及吧。我們不會敗的！
battle_talk_141305=是時候和我父親一樣擔起重任了！這座城由我來守護！
battle_talk_141306=讓榮耀回歸法國，讓我們凱旋而歸！是時候讓英國人離開法國了！
battle_talk_141307=我們是時候離開法國了。

;史诗战役对话
battle_talk_200001=我終將把戰火點燃到羅馬，佔領高盧只是我的第一步，這裡將是我餵養戰馬的所在。
battle_talk_200002=我們乘機奪走他們的土地，法蘭克將會被我統一！
battle_talk_200003=放馬過來吧！我會把你們都送入墳墓！
battle_talk_200004=戰士們，為了你們的家人為了你們的土地，我們不能再後退一步了，沖呀！
battle_talk_200005=沖呀！讓我們殺入羊群！
battle_talk_200006=殺呀！
battle_talk_200007=終於趕上了，我們要奪回被匈人奪走的一切！
battle_talk_200008=誓死保衛家園！
battle_talk_200009=決戰開始了！帝國存亡在此一戰！
battle_talk_200010=我們終於抵禦住了匈人的入侵！羅馬萬歲！
battle_talk_200011=羅馬的大軍已經被我消滅，羅馬終將被我征服！
battle_talk_200101=戰士們磨好你們的利刃，喂飽你們的馬匹。讓法蘭克人在我們的鐵騎之下顫抖吧！
battle_talk_200102=真主保佑！這場戰鬥勝利後，我們將把教義傳播得更廣！
battle_talk_200103=難道你們還沒吸取上次的教訓麼？這次你們依舊會大敗而歸的！
battle_talk_200104=不好，圖盧茲不保！我必須向查理求援了。
battle_talk_200105=我將向您臣服我的國王，請您務必前來救援。
battle_talk_200106=我接受你的臣服，我將儘快集結部隊前往救援。
battle_talk_200107=如果阻擋不住這些騎駱駝的人，不光是阿基坦地區，整個法蘭克王國都將滅亡！
battle_talk_200108=圖盧茲已經佔領！趁冬天還未到來迅速北上！
battle_talk_200109=集結騎兵！
battle_talk_200110=用防衛步兵防守，用長矛讓他們不能再前進一步！
battle_talk_200111=不！我竟然失敗了。好不甘心呀！
battle_talk_200112=法蘭克萬歲！
battle_talk_200113=真主保佑。勝利還是屬於我們！我們將把鐵騎踏遍整個歐洲！
battle_talk_200114=天冷下來了！我們沒有足夠的冬衣！速戰速決！
battle_talk_700301=高仙芝占我城池擄我父母和公主，欺人太甚，我只能反叛了。
battle_talk_700302=這石國王子竟然還不臣服，看來我只能耗費點時間將石國在地圖上抹殺了。
battle_talk_700303=雖說我軍剛剛打完仗回來，但比之遠征而來的疲憊唐軍卻有很大的優勢，讓我們看看唐軍到底有多大能耐。
battle_talk_700304=沒想到唐軍竟然如此兇猛，幸好我還有後手。
battle_talk_700305=收錢辦事！高仙芝，你可不要怪我！
battle_talk_700306=不好，葛邏祿竟然反叛，我們被包圍了。
battle_talk_700307=真主保佑，這次大勝，我的聲望必然大盛。
battle_talk_700308=大唐威武！就算兩面夾擊依舊無法抵擋我鐵騎的攻擊！
battle_talk_700309=我族城池與臣民願意歸降于大唐。
battle_talk_700310=識時務者為俊傑。
battle_talk_700401=英國的王位只屬於我，既然我們能戰勝強大的挪威人也一樣能趕走諾曼人！
battle_talk_700402=他們剛剛不久才打了一場大戰，還未修整，我們的騎兵可以輕易撕碎他們的防守！
battle_talk_700403=佔領高地！用長矛抵禦住騎兵的衝擊！
battle_talk_700404=威廉已死！諾曼人速速投降！
battle_talk_700405=不要撤退！我還活著！我們身後就是大海，無路可退，讓我們重新組織進攻！
battle_talk_700406=哈樂德已死！英格蘭王位終究屬於我！新的時代到來了！
battle_talk_700407=諾曼人終於敗退！英格蘭王位不屬於任何外來者！

;引导对话
tutorial_talk_1001=我認為我們需要進行一場新手教程。
tutorial_talk_1101=接下來，我將引導您進入英雄傳奇！
tutorial_talk_1102=要進入英雄傳奇的將領，必須要有自己的私人部隊。所以，我們要先進入[#F4d181#指揮部]，為將領招募私人部隊！
tutorial_talk_1201=由於通過了第一章，我們的將領已經可以招募私人部隊了，請點擊[#F4d181#將領頭像右側招募區]！
tutorial_talk_1301=這次，我們先招募[#F4d181#軍團大隊]，選中他，然後點擊[#F4d181#招募]按鈕！
tutorial_talk_1501=現在，我們可以點擊左上角的[#F4d181#×]離開指揮部！
tutorial_talk_1601=[#F4d181#英雄傳奇]正在召喚我們，請點擊它！
tutorial_talk_1701=最後，點擊[#F4d181#進入]按鈕，進入到英雄傳奇吧！
tutorial_talk_2101=消耗[#F4d181#傭兵令]或[#F4d181#圖紙]，可以得到[#F4d181#招募令]或[#F4d181#器械碎片]，當[#F4d181#招募令]或[#F4d181#器械碎片]達到一定數量，即可招募對應的部隊或合成對應的器械。
tutorial_talk_2201=點擊紅框處，可以查看目前能夠得到的[#F4d181#招募令]或[#F4d181#器械碎片]，以及暫未解鎖的[#F4d181#招募令]或[#F4d181#器械碎片]。

speak_strong_attack_1=我的部隊無人可擋，隨我進攻！
speak_strong_attack_2=敵人完全不是我的對手，局勢已在我的掌握之中。
speak_weak_attack=全力進攻，消滅所有敵人。
speak_destroy_building_1=敵人的城牆不堪一擊，這座城市即將被攻破。
speak_destroy_building_2=再堅固的城牆也無法阻擋我們的進攻。
speak_less_round_1=戰鬥時間拖得太長的話，局勢可能會脫離掌控。
speak_less_round_2=加快進攻的步伐，留給我們的時間已經不多了。
speak_less_stength=我的部隊需要支援。
speak_need_hitback=我的部隊遭到了攻擊。
speak_less_morale=部隊士氣低迷，士兵們已經無心作戰。

speak_onwait_1=敵人在哪裡，我的利刃渴望戰鬥。
speak_onwait_2=我決定打完這場仗，就回到我的家鄉。
speak_onwait_3=有時候，混編部隊比單一兵種的部隊更能發揮戰鬥力。
speak_onwait_4=陷入僵局了嗎？為什麼不試試使用戰鼓激勵部隊呢？
speak_onwait_5=真想好好喝上一杯，我受夠這地方了。
speak_onwait_6=敵人總是莫名其妙地出現，又莫名其妙地消失。
speak_onwait_7=我渴望一場真正的戰鬥。

