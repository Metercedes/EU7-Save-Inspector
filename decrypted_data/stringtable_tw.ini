conquest_faction_desc_801=西羅馬帝國是古羅馬帝國的繼承者之一，它曾經輝煌，但現在陷入危機和衰落。帝國面臨著蠻族遷徙帶來的邊境動盪，無法有效應對。然而，帝國仍保留著悠久的歷史底蘊。只要有矢志復興的決心，或許可以重塑羅馬帝國的榮光。
conquest_faction_desc_802=拜占庭帝國，又稱東羅馬帝國，是古羅馬帝國的繼承者之一，它的首都君士坦丁堡位於戰略要地，帝國不但繼承了古羅馬的政治、文化和傳統，也發展出了獨特的拜占庭藝術、建築和體系。當前帝國主要目標的就是收復羅馬的失地。
conquest_faction_desc_803=蓋爾人是古代歐洲的一個凱爾特部族，居住在現今的愛爾蘭、蘇格蘭和威爾士地區。蓋爾人信奉多神教，崇拜大自然和祖先。他們生性勇猛，極為好戰，是古代羅馬帝國的強大對手。
conquest_faction_desc_804=不列顛人是古代歐洲的一個凱爾特部族，居住在不列顛群島。他們具有凱爾特文化的特徵，信仰多神教。不列顛人與羅馬帝國進行過長期的接觸和衝突，隨著時間的推移，其文化逐漸融合了羅馬和其他外來文化。
conquest_faction_desc_805=薩克森人是德國北部的古日爾曼民族，在歐洲歷史上具有重要地位。作為日爾曼部落的一支，他們以勇敢和軍事實力著稱。薩克森人在中世紀時期經歷了諸多征服、定居和政治演變，對地區的政治和軍事格局產生了影響。
conquest_faction_desc_806=丹人作為北歐日爾曼民族的一支，具有豐富的歷史和文化傳統。他們在北歐的鐵器時代和維京時代存在並發展。丹人在歷史上扮演了重要角色，尤其是在維京時代，他們的船隊勇敢無畏，不斷向周邊海域發起征服。
conquest_faction_desc_807=波羅的人是居住在波羅的海周邊地區的古代人群。他們在歷史上受到斯拉夫、日爾曼等文化的影響。其中重要分支古普魯士人以勇敢和戰鬥力強而聞名，與周圍的斯拉夫人和日爾曼人展開了不斷的交流和衝突。
conquest_faction_desc_808=蘇維匯人是古代日爾曼人的一個支族，居住在萊茵河沿岸地區。他們是古羅馬時期勇猛的戰士和遠征者。蘇維匯人在部分時期建立了自己的王國，並參與了與羅馬帝國的衝突。
conquest_faction_desc_809=倫巴第人是日爾曼民族的一支，在西元6世紀初，他們遷移到義大利北部，並建立了倫巴第王國。倫巴第人也擁有著不錯的軍事實力。他們統治了義大利北部長達兩個世紀，深深地影響了當地的政治、社會和文化。
conquest_faction_desc_810=斯拉夫人是一個廣泛分佈在歐洲的民族群體，分為西斯拉夫人、東斯拉夫人和南斯拉夫人三個主要分支。他們擁有獨特的語言、文化和傳統，在歷史上形成了許多獨立的國家，也在展現出了不同程度的戰鬥能力。
conquest_faction_desc_811=法蘭克人是歷史上居住在法蘭西亞地區的原住民族，也是日爾曼人的一個重要分支。他們在5至8世紀期間建立了一個強大的王國，稱為法蘭克王國。法蘭克人有著勇猛的戰士和重于軍事擴張的決心，對歐洲歷史產生了深遠影響。
conquest_faction_desc_812=勃艮第人是古代日爾曼民族的一個分支，主要居住在法國東部的勃艮第地區。勃艮第人在歷史上建立了勃艮第王國，並與周邊的國家進行了政治和軍事的交鋒，是歐洲中世紀的重要勢力之一。
conquest_faction_desc_813=東哥特人是古代日爾曼民族的一個分支，面對外族的入侵，他們只能選擇遷徙至東歐和巴爾幹半島，並在此建立了自己的王國。東哥特人在羅馬帝國的邊境地區發展強大，並與羅馬帝國展開多次衝突。
conquest_faction_desc_814=起源于東日爾曼哥特族的格皮德人十分驍勇善戰。他們在歷史上與其他民族發生過多次戰爭，特別是與匈人和東哥特人之間的衝突較為著名。他們曾建立自己的王國，並在一段時間內對周圍地區施加影響力。
conquest_faction_desc_815=匈人是古代歐亞草原地區的遊牧民族，擅長騎射，由阿提拉領導的匈人帝國在5世紀末至6世紀初達到鼎盛。他們對羅馬帝國和其他民族構成了威脅，頻繁進行掠奪和征服。
conquest_faction_desc_816=馬紮爾人是匈牙利的主要民族。他們起源于亞洲的烏拉爾山脈地區，在9世紀初遷徙至現在的匈牙利地區，並建立了匈牙利王國。馬紮爾人在中世紀擴張勢力，並與周邊國家進行了多次戰爭和領土爭奪。
conquest_faction_desc_817=瓦斯科人是居住在西歐的一個民族群體，主要分佈在西班牙和法國的巴斯克地區。他們擁有獨特的語言和文化傳統，被認為是歐洲最古老的民族之一。瓦斯科人在歷史上一直以來都保持著獨立意識和文化特徵，並在西歐歷史上發揮了重要作用
conquest_faction_desc_818=西哥特人是古代日爾曼民族的一個分支，其起源可追溯到古代的哥特人部落。在5世紀中葉，他們遷移到西班牙和南法地區，並建立了西哥特王國，統治著今天的西班牙和葡萄牙大部分地區，成為西歐最重要的王國之一
conquest_faction_desc_819=保加利亞人是巴爾幹半島的原始居住族群。他們有著自己的語言、宗教和民俗傳統。保加利亞人在歷史上曾建立了強大的保加利亞第一帝國，其擁有強大的軍隊、發達的城市和繁榮的經濟，並對巴爾幹地區產生了深遠影響。
conquest_faction_desc_820=希臘人是居住在希臘地區的民族群體，他們是古希臘文明的創造者和傳承者。希臘人以其城邦制度和民主政治而聞名，其中最著名的是雅典。他們在中世紀時期面臨諸多外來征服和統治，不過這些並無法磨滅他們對獨立和自由的渴望。
conquest_faction_desc_821=土耳其人的歷史根源可以追溯到古代突厥人。他們在歷史上經歷了多次遷徙和擴張，並建立了強大的帝國。他們在軍事、文化和政治領域都有顯著的貢獻，在中世紀和近代時期征服了廣大領土。
conquest_faction_desc_822=亞美尼亞人是世界上最古老的民族之一，其宗教和文化遺產深深影響了地區的生活方式和價值觀。亞美尼亞人在歷史上曾建立過強大的亞美尼亞王國，並經歷了許多挑戰和困境。
conquest_faction_desc_823=蒙古人是源自蒙古草原的遊牧族群，有著卓越的騎射技巧和戰略謀略。他們善於利用草原的優勢進行迅速的襲擊和機動作戰。在成吉思汗的領導下，他們在歐亞大陸迅速擴張，並最終建立了龐大的蒙古帝國。
conquest_faction_desc_824=東方人是從遙遠的東方遷徙而來的民族。他們懷揣著和西方諸國溝通交流的目的，踏上了未知的征程。面對西方各種勢力可能帶來的挑戰和機遇，東方人展現出無畏和堅毅的精神，決心以勇敢和智謀開拓新的家園。
conquest_faction_desc_825=柏柏爾人是北非地區的一個民族群體。他們是北非原住民族，為了保衛自己的領土和文化，柏柏爾人曾經進行過多次抵抗外來入侵的戰鬥。柏柏爾人雖然時而獨立，時而受他族統治，但他們一直保留了許多傳統習俗和信仰。
conquest_faction_desc_826=汪達爾人是古代日爾曼部落之一，在經過漫長而又艱苦的遷徙之後，最後侵佔羅馬帝國的北非行省並以此建立了汪達爾王國。汪達爾人在海上有著不可小覷的軍事實力，對羅馬城的劫掠更是給羅馬帝國帶來了不可估量的破壞。
conquest_faction_desc_827=埃及人是古老文明的創造者，居住在非洲東北部的埃及地區，發展出了令人歎為觀止的文化和文明。他們有著偉大的建築工程、複雜的宗教體系和象形文字。固然經歷了外來征服者的統治，但他們的文化和傳統仍然得以保留。
conquest_faction_desc_828=阿拉伯人是一支主要分佈在阿拉伯半島和中東地區的民族。他們使用阿拉伯語，信仰伊斯蘭教，對於伊斯蘭教的傳播和發展起到了重要的作用。他們曾經建立過眾多偉大的帝國和王國，也在貿易、農業、工藝等領域取得了重要的成就。
conquest_faction_desc_829=波斯人是古代伊朗高原的民族，創立了偉大的波斯帝國。波斯帝國以阿契美尼德王朝最為著名，統一了伊朗高原各部族，極大的擴張了帝國領土。波斯帝國的文明和成就對後世產生了深遠的影響，是人類歷史上重要的帝國之一。
conquest_faction_desc_830=地中海海盜是活動在地中海地區的海盜團夥。他們在歷史上多個時期出現，如古代希臘和羅馬時期、中世紀時期等。他們以襲擊商船、劫掠財物為目標，給海上貿易和沿海居民帶來威脅。因此他們也成為許多國家打擊的對象。

