stage_group_desc_20008=1302年，不斷擴張的鄂圖曼帝國與拜占庭帝國發生了邊境衝突，拜占庭皇帝米海爾九世親自率軍前往卻兵敗而回。米海爾的父親命喬治·莫劄隆 率兵前往支援。7月27日，拜占庭軍隊在巴菲烏斯平原遭遇了鄂圖曼一世率領的鄂圖曼帝國騎兵。

