battle_talk_120705=現在，這座城市歸屬於鄂圖曼，威尼斯的艦隊也無法阻止我們。
battle_talk_120706=塞薩洛尼卡陷入了危機，但是我的艦隊遭到了鄂圖曼艦隊的封鎖，現在急需打破封鎖援助塞薩洛尼卡。
