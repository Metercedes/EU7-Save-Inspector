general_desc_Jean de Dunois=奧爾良公爵的私生子，作戰英勇，讓奧爾良一直固若金湯，之後跟隨聖女貞德征戰四方。
general_desc_Gilles de Rais=吉爾斯是百年戰爭時期的法國元帥，是追隨聖女貞德最早的將軍之一，曾被譽為民族英雄，但之後殘害兒童被施與火刑。
general_desc_La Hire=拉海爾是追隨聖女貞德的一名所向披靡的將領，為法國贏得最後的勝利做出了傑出的貢獻。
general_desc_Henry V=亨利五世是一位出色的戰士，他在阿金庫爾戰役中展現了他出色的領導能力，1420年的特魯瓦條約，確認這位英王對法國王位的權利。
general_desc_Olga2=奧爾加是第一個皈依基督教的羅斯統治者，她將基督教傳播到了基輔羅斯。她去世後，被教廷追認為“聖奧爾加”。
general_desc_Richard I2=獅心王理查是第三次十字軍東征的領導人之一，他強大的戰鬥力讓薩拉丁也避其鋒芒，憑藉理查的力挽狂瀾，耶路撒冷王國又延續了一個世紀。

Olga2=聖奧爾加
Richard I2=十字軍獅心王

