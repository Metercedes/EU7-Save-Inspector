item_desc_9001=這件斗篷曾伴隨羅傑二世走上王位，斗篷由拜占庭帝國進口的紅色絲綢製成，黃金以及華麗珠寶裝飾，展示著權力和王權，每一針一線都承載著諾曼人的驕傲與責任。
