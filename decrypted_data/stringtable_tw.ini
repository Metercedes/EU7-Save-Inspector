;defeated_event_desc
battle_talk_thankgift0=放下禮物，你可以走了！
battle_talk_thankgift1=禮物我收下了，願兩國保持和平！
battle_talk_thankgift2=感謝貴國的禮物，願兩國保持良好的關係！
battle_talk_thankgift3=十分感謝貴國的禮物，不論貴國有何請求，我們一定鼎力相助！
battle_talk_acceptagreement1=為了兩國的百姓，我同意休戰！
battle_talk_acceptagreement2=我同意簽署通行協議，與貴國互通有無！
battle_talk_acceptagreement3=從今天開始，我們就是盟友啦！
battle_talk_refuseagreement1=打不過想求饒，門都沒有！
battle_talk_refuseagreement2=對不起，我們的關係還沒到簽署通行協議的程度！
battle_talk_refuseagreement3=我國也希望與貴國結盟，可現在不是最好的時機！
battle_talk_tearagreement2=通行協議到此為止，請貴國軍隊儘快離開我國領土！
battle_talk_tearagreement3=從今往後，我們不再是盟友！
battle_talk_declarewar=以後相見就是敵人了，準備接受正義的制裁吧！
battle_talk_acceptexhort=真不甘心，但事到如今也只能投降了！
battle_talk_refuseexhort=我們寧可玉石俱焚，也決不投降！
battle_talk_warninvade=領土主權不容侵犯，請貴國軍隊立刻離開！
battle_talk_1=部落的勇士們，富饒的高盧應該由我們匈人擁有！騎上你們的戰馬，跟著我向高盧進軍，摧毀一切膽敢阻攔我們的敵人。
battle_talk_2=英格蘭人殘忍地殺害了我們的父親，我們拉格納之子要團結起來，讓英格蘭人血債血償。
battle_talk_3=我們終於建立了自己的王國！相信過不了多久，整個北海都將被強盛的丹麥王國征服！
battle_talk_4=汪達爾王國和拜占庭帝國正在交戰，這是我們將汪達爾人和羅馬人趕出北非的機會，這裡本就是我們毛裡人的領土。
battle_talk_5=真是一片富饒的土地，草原的勇士們，我們面前有著數不清的財富，就等著我們用戰馬和弓箭去獲取！
battle_talk_6=貝利撒留滅亡汪達爾王國之後，又在義大利連敗東哥特王國的軍隊，甚至收復了拉文納城。如今他在軍中的威望如日中天，需要小心提防。
tutorial_talk_101=歡迎來到中世紀，在這裡，我將為你展示一些征服模式的系統和玩法。現在，請選擇你所需要扮演的勢力。
battle_talk_8=點擊左上角的政策圖示，可以打開政策介面。
battle_talk_9=征服模式中，你需要花費資源研究政策，對應的政策才能生效。
battle_talk_10=你也可以在政策介面中更換執政官，執政官的內政技能會為你所在的勢力提供多種多樣的加成。
battle_talk_11=執政官的內政能力也能減少研究政策所需的資源。
battle_talk_12=請注意，每回合只能更換一次執政官。
battle_talk_13=每個勢力開局時都有自己的任務鏈，完成當前任務就會獲得對應的獎勵。
battle_talk_14=征服模式下，每個勢力都有各自的勝利條件，完成所有勝利條件即可獲勝，並得到對應的獎勵。
battle_talk_15=當達成既定條件後，你可以在勝利結算介面中，選擇退出征服，或者繼續征戰。
battle_talk_16=你目前還有一個勝利條件未達成，請嘗試佔領撒克遜人的首都：溫徹斯特。
battle_talk_17=你可以通過城堡的酒館招募自己在指揮部中預先配置好的部隊。
battle_talk_18=請注意，只有第一次招募是免費的。
battle_talk_19=征服模式下，你可以與其他勢力進行外交互動。
battle_talk_20=你現在可以查看與其他勢力間的外交關係、外交值以及外交值變化趨勢。
battle_talk_21=你目前正與撒克遜人、盎格魯人交戰，與朱特人保持和平。
battle_talk_22=你與撒克遜人的外交值呈現下降趨勢，與盎格魯人的呈現上升趨勢，與朱特人的則保持不變。
battle_talk_23=兩面作戰不是明智之舉，以你當前與盎格魯人的外交值，可以嘗試與其停戰。
battle_talk_24=在該外交介面中，你可以查看雙方當前的執政官，各自所剩的資源，以及與其他勢力的外交關係。
battle_talk_25=同樣也能看到雙方的外交關係、外交值以及外交值變化趨勢。
battle_talk_26=當代表當前外交值的游標處於“戰爭”和“停戰”之間時，雙方就可以簽訂停戰協議。
battle_talk_27=外交值游標越靠近“停戰”，成功簽訂停戰協議的概率就越高。
battle_talk_28=在與對方談判時，可以通過贈送禮物來提高雙方的外交值。
battle_talk_29=贈送禮物花費的資源越多，增加的外交值就越高。
battle_talk_30=你與盎格魯人的外交值已滿足簽訂停戰協定的需要，請與盎格魯人簽訂停戰協議。
battle_talk_31=簽訂通行協定、同盟協定的步驟與簽訂停戰協定類似。
battle_talk_32=需要注意的是，簽訂了停戰協定後才能簽訂通行協定，簽訂通行協定後才能簽訂同盟協定。
battle_talk_33=當佔領交戰方的首都時，可以要求對方投降。
battle_talk_34=你現在佔領了溫徹斯特，可以嘗試勸降撒克遜人。
battle_talk_35=勸降成功概率受到你當前實力和對方剩餘實力的影響。
battle_talk_36=在征服模式中，時代會限制招募部隊的品階。
battle_talk_37=當條件滿足時，下一回合便會自動進行時代升級。
battle_talk_38=根據條件所示，不列顛人到達黑暗時代需要2個二級城市。
battle_talk_39=征服模式的教程已全部結束。
battle_talk_40=東方的十字軍諸國發來了求援信，他們正在敵人襲擊中苦不堪言。神聖羅馬帝國的戰士們，跟著我向東方進軍，去支援我們的十字軍兄弟。
battle_talk_41=法蘭西王國的戰士們，我決意響應教廷組建軍隊支援十字軍諸國的號召，帶領你們前往東方支援耶路撒冷，去獲取無上的榮耀！
battle_talk_42=伊斯蘭世界正遭受歐洲十字軍的侵略，塞爾柱帝國應該擔負起領導西亞人民反擊並驅逐十字軍的重任，讓世人再次見識到塞爾柱帝國的強大。
battle_talk_43=戰亂是野心家的天堂，中東的這些國家和勢力打的不可開交之際，正是我們庫曼-欽察人南下的時機。
battle_talk_44=耶路撒冷已被我軍收復，榮耀屬於我們！
battle_talk_45=王朝的戰士們，如今阿拔斯王朝費拉不堪，是時候讓所有阿拉伯人認識到，只有我們法蒂瑪王朝才能重建阿拉伯帝國的輝煌！
battle_talk_46=拜占庭帝國邀請我們一同進攻保加利亞帝國，這群自作聰明的希臘人想把我們當刀用呢。哈哈，豈不知我們正缺藉口進入富饒的巴爾幹地區。
battle_talk_47=阿拔斯王朝的時代已經成為過去，接下來將由我們白益王朝來領導伊斯蘭世界。
battle_talk_48=這是對上帝的褻瀆和背叛！我以教宗的名義呼籲，所有信仰基督的人都應該拿起武器，討伐這個大逆不道的叛賊。
battle_talk_49=將士們，教宗剛剛加冕我為“神聖羅馬帝國的皇帝”，西羅馬帝國的法統將由我們繼承，從今日起，我們便是新的羅馬帝國！
battle_talk_50=區區日爾曼蠻夷也敢妄稱羅馬人的皇帝？這是對拜占庭帝國的羞辱，若不出兵討伐這個僭越者，我們有何臉面稱自己為羅馬人？
battle_talk_51=將士們，西吉斯蒙德當了神聖羅馬帝國皇帝後就棄我們匈牙利不顧，甚至出賣王國來維持他那一盤散沙的帝國，他已不配擔任匈牙利國王。
battle_talk_52=神對英格蘭人是愛是惡，本人一概不知。本人僅知除了死者外，所有英格蘭人將會被趕出法蘭西。
battle_talk_53=法蘭西的將士們，跟著我向蘭斯進軍，王太子將會在蘭斯加冕為法蘭西國王，神與我們同在。
battle_talk_54=除叛國之外,我無所畏懼。為了法蘭西，我視死如歸！
battle_talk_55=匈牙利的戰士們，如今神聖羅馬帝國境內叛亂不斷，我們需要幫助帝國儘快穩定局勢，如此才能在帝國的支援下抵禦住來自東方的侵略。
battle_talk_101=歡迎來到中世紀，在這裡，我會教導你一些基礎的作戰知識
battle_talk_102=選擇箭頭指示的部隊，選擇目的地區域，可以進行移動
battle_talk_103=你也可以連續選擇多個區域進行多次連續移動，但總的行徑路程是固定的
battle_talk_104=當你發現該區域不是你想到達的目標地點時，可以選擇撤回，來重新選擇想到抵達的區域
battle_talk_105=當部隊到達目的地區域並耗盡所有行動力時，部隊將無法再進行攻擊。
battle_talk_106=選擇你的部隊，到達目標單位附近後若還有剩餘行動力，即可發動攻擊
battle_talk_107=若行動力剩餘較多，則可以發動多次攻擊
battle_talk_108=你可以為你所需要的部隊部署將領，部署後能大大提高部隊的戰鬥力
battle_talk_109=將領擁有一個主動技能，不同將領的主動技能效果不盡相同
battle_talk_110=這是一個關鍵目的地區域，佔領這裡，符合勝利條件後，即可獲得勝利
battle_talk_111=現在你已經瞭解了基礎的戰鬥知識，戰爭也即將到來
battle_talk_112=一般情況下，每次攻擊會消耗6點行動力，若剩餘行動力大於0，則可連續攻擊，直至行動力為0。
battle_talk_201=你可以在城市中招募一些部隊來為你作戰
battle_talk_202=即使是不同種類的部隊，也能整合成一個小隊
battle_talk_203=點擊右下角的按鈕，進入下一回合
battle_talk_204=當場地中還有未行動完成的部隊時，你會收到提示
battle_talk_205=你有一支部隊遭受了攻擊，我們可遣散其中兵力較少的一隊
battle_talk_206=一支部隊的隊伍數量不足三隊時，我們可以為其進行補充
battle_talk_207=補充的部隊同樣不限制部隊種類
battle_talk_208=現在，你只需要在規定的回合內取勝即可
battle_talk_209=當你補充部隊時，可以查看該支部隊在軍團中的位置，以及混合後軍團的士氣、行動力和特性
battle_talk_301=下面我們來進行一些建設相關的操作
battle_talk_302=點擊城市按鈕，可以對城市內的一些設施進行升級
battle_talk_303=不同的設施擁有不同的效果
battle_talk_304=這裡是一個村莊，村莊可以升級為城堡
battle_talk_305=城堡可以招募一些城市中招募不到的部隊
battle_talk_306=城堡的等級可以進行提升，升級城堡可以讓你招募到更高等級的部隊
battle_talk_307=這支部隊的士氣在被攻擊後降低了，補充部隊可以回復一定量的士氣
battle_talk_308=現在，我們需要防守關鍵區域。當然，你也可以選擇消滅所有敵人
battle_talk_401=地圖上散落著一些建築
battle_talk_402=銀礦可以帶來銀幣的收入
battle_talk_403=鐵礦廠可以帶來鐵礦的收入
battle_talk_404=奇觀可以為你所在的勢力帶來一些特殊效果，不同國家的奇觀效果不同
battle_talk_405=部隊需要裝配船隻才能進入河流或者海洋
battle_talk_406=運輸船和騎兵在水面作戰時的戰鬥力會大打折扣
battle_talk_407=因此請儘量避免用騎兵作為裝備船隻的載體
battle_talk_408=基礎教程已教學完畢
battle_talk_501=不同的地形會有不同的行動力消耗，複合地形會有更高的行動力消耗
battle_talk_502=這裡可以查看你所在勢力的政策
battle_talk_503=但只有在征服模式下，才可以自行對政策進行研究
battle_talk_504=這裡可以查看你的人口、野心和經濟情況
battle_talk_505=注意，過高的人口負擔會增大你的野心，並對經濟造成影響
battle_talk_506=每回合開始時，都會預設獲得1點科技點數，科技點數可以用來裝配器械
battle_talk_507=請合理分配現有的科技點數
battle_talk_10101=哥特人終於露出貪婪的嘴臉，妄圖侵佔我們富饒的土地，將士們，把野蠻人從我們的領土上趕出去！
battle_talk_10102=羅馬人偽善至極，他們想要奴役驅使我們，讓我們去對付匈人，卻不願意多給一點食物。哥特的勇士們，拿起武器反抗吧！
battle_talk_10201=剛剛前線的塞巴斯蒂安納斯將軍傳回捷報，哥特人的先鋒部隊已經被擊退，是時候一鼓作氣消滅這些作亂的蠻族了！
battle_talk_10202=穩住！羅馬人的進攻軟弱無力，只要堅持到阿拉西斯率領騎兵返回，就是我們反擊的時刻。
battle_talk_10203=很好，羅馬士兵已經筋疲力盡，我們從背後衝擊他們軍陣的左翼，給羅馬人最後一擊，活捉羅馬皇帝！
battle_talk_10301=皇帝陛下正被西哥特人圍困，全軍加速前進，支援米蘭守軍。
battle_talk_10302=阿拉裡克的主力部隊就在前方，將西哥特人徹底殲滅在那！
battle_talk_10303=身為羅馬帝國的皇帝，不應該置身這麼危險的地方。
battle_talk_10304=戰士們，羅馬人的皇帝就在米蘭。只要攻破米蘭，俘虜羅馬皇帝，那麼整個富裕的義大利就是我們的囊中之物。
battle_talk_10401=羅馬城堅持不了多久，不能讓羅馬城被攻破，非洲行省的援軍就快到了。
battle_talk_10402=阿拉裡克洗劫了羅馬城，一定阻止他向拉文納發動攻擊。
battle_talk_10403=阿拉裡克，這次我一定會擊敗你，讓世人知道誰才應該是西哥特的王！
battle_talk_10404=卑鄙的羅馬人偷襲了我們，看來談判只是他們拖延時間的藉口，霍諾留不願意支付贖金來換取羅馬城的和平。既然如此，那麼我們就自己去取！
battle_talk_10405=薩魯斯，你背叛了自己的族人。
battle_talk_10406=不好，羅馬人的援軍到了。
battle_talk_10501=赫默里克，這裡地形複雜，需要探明敵軍部署後再進軍。
battle_talk_10502=懦弱的汪達爾人不配擁有伊比利亞富饒的土地，他們的領地該歸我們蘇維匯王國所有！沖啊，蘇維匯的勇士們。
battle_talk_10503=不要與蘇維匯人正面作戰，他們不熟悉這裡的地形，把他們誘進我們的伏擊圈中。
battle_talk_10601=我們不該相信汪達爾人會遵守條約，戰士們，帝國的援軍正在趕來的路上。
battle_talk_10602=勇士們，只要攻下迦太基城，不光能獲得巨量的財富，整個北非最富裕的土地都將是我們的！
battle_talk_10603=羅馬人的援軍到了，阻止他們登陸！
battle_talk_10701=各位國王、首領，匈人的殘暴各位有目共睹。我們必須同心協力，將敵人徹底擊敗。
battle_talk_10702=從匈人出現的那刻起，我們就被不斷地攻擊，從多瑙河被驅趕到萊茵河。阿蘭的勇士們，我們已無路可退，只有擊敗匈人。
battle_talk_10703=羅馬人聯合了西哥特人、法蘭克人和阿蘭人，以為這樣就能和我的軍隊對抗？真是不自量力。
battle_talk_10704=不要慌亂，所有人向我集結，重新組建防線。
battle_talk_10705=狼不在乎有多少只羊。
battle_talk_10801=汪達爾人長期覬覦著羅馬的財富，蓋薩里克此次出兵的目的絕不像他說的那樣冠冕堂皇。
battle_talk_10802=馬克西穆斯是個篡位的小人，他不配作為羅馬帝國的皇帝。
battle_talk_10803=作為瓦倫提尼安三世的盟友，我們應該幫助皇后把馬克西穆斯這個篡位者從羅馬城趕出去。
battle_talk_10804=大名鼎鼎的“永恆之城”就在眼前，只要攻下羅馬城，城內的寶藏任由英勇的汪達爾戰士獲取。
battle_talk_20101=我們西方的鄰居擁有著無盡的財富，但很快那這些財富就將是我們的了！
battle_talk_20102=進攻！那些羅馬貴族只會用錢財來購買自己的人身安全。
battle_talk_20103=我們的騎兵遠不是那些波斯人的對手，但不會懼怕它們。
battle_talk_20201=皇帝不能容忍非洲正在發生的叛亂，大量湧入的難民讓君士坦丁堡的秩序發生了混亂。
battle_talk_20202=士兵們，消滅那些叛軍，他們的首領是我們的主要目標，儘量避免不必要的戰鬥！
battle_talk_20203=汪達爾王國必須徹底擺脫羅馬帝國的統治。
battle_talk_20204=消滅那些海上來的敵人。
battle_talk_20301=守住陣線，不要被騎兵的衝鋒嚇倒。
battle_talk_20302=為我的撤退爭取時間，只要我及時撤退，敵人的目的就無法達成！
battle_talk_20304=我已經到達了最近的沿海城市，入海之後，敵人就再也追不上我了。
battle_talk_20303=進攻，敵人正在節節敗退，沒有什麼能阻擋帝國前進的腳步！
battle_talk_20401=義大利地區必須重新回歸帝國的統治，將入侵者全部趕出去。
battle_talk_20402=敵人直接從海上發起進攻，對我們來說不是一個好消息。
battle_talk_20403=借助城防器械堅守城池，他們的進攻堅持不了多久。
battle_talk_20501=敵人集結了大量的部隊向拉文納發起了進攻，他們的後方必然十分空虛。
battle_talk_20502=羅馬既然已經被佔領，就不會有丟失的可能！
battle_talk_20601=我們的糧食短缺，已經無法繼續堅守羅馬，撤退或許是更好的選擇。
battle_talk_20602=敵人源源不斷地出現，我只能儘量減緩他們追擊的步伐。
battle_talk_20603=把敵人趕出義大利，這片土地現在屬於我們。
battle_talk_20701=羅馬帝國在義大利的勢力並未被我們徹底清除，他們依舊可以通過海洋調動軍隊。
battle_talk_20702=英多爾夫，率領你集結的艦隊向安科納前進，佔領那裡，這是羅馬人在義大利最重要的基地！
battle_talk_20801=我們的目標只有羅馬，不能被路遇的敵人拖慢了前進的腳步。
battle_talk_20802=儘快消滅敵人，帝國的疆域將再次覆蓋義大利！
battle_talk_20803=全軍出擊，消滅看到的所有敵人！
battle_talk_20901=哥特人得到了來自法蘭克的援軍，雖然他們大多是烏合之眾，但是依然有法蘭克精銳在部隊之中。
battle_talk_20902=不用在意那些野蠻人，集中對抗法蘭克步兵！
battle_talk_21001=羅馬人的主力一直在義大利作戰，本土一定戰鬥力薄弱。
battle_talk_21002=兄弟們，隨我向君士坦丁堡進軍。
battle_talk_21003=這群貪得無厭的野蠻人，居然再次踏上了這片土地。
battle_talk_21004=貝利撒留，帶領部隊消滅他們！
battle_talk_30101=羅馬人可以輕易放棄如此富饒的不列顛島，但我們可不能錯過這次機會。
battle_talk_30102=不列顛島這麼大，容得下我們盎格魯-撒克遜人。
battle_talk_30103=早說過盎格魯-撒克遜人不可信，不列顛的勇士們，把敵人從我們的家鄉趕出去！
battle_talk_30201=不列顛人本土作戰，人多勢眾，僅憑我們目前的兵力是很難攻下敵人所有城鎮的。
battle_talk_30202=我已聯繫到一支在附近海域的友軍部隊，先控制沿海城市，引導友軍登陸，然後再集中兵力向內陸進軍。
battle_talk_30203=必須在敵人增援趕到之前，將這支盎格魯-撒克遜人的軍隊徹底殲滅。
battle_talk_30301=這次要徹底征服懦弱不堪的不列顛人，把他們的土地納入我們諾森布裡亞王國。
battle_talk_30302=我會讓你為這次背叛付出代價。
battle_talk_30303=諾森布裡亞的軍隊雖然來勢洶洶，但只要我們不列顛人團結一致就能打敗這些入侵者。
battle_talk_30304=盎格魯-撒克遜人並非團結一致，麥西亞王國也忌憚諾森布裡亞王國的擴張，他們會尋找機會給艾瑟爾弗裡斯狠狠一擊。
battle_talk_30305=不能繼續坐視諾森布裡亞王國的壯大，他們的野心永無止境。
battle_talk_30401=格溫內斯的戰士們，這次和麥西亞王國結盟是我們反抗諾森布裡亞王國最後的機會，一定要全力以赴。
battle_talk_30402=不要驚慌，一群手下敗將的反撲而已，只要抵抗住這次進攻，諾森布裡亞王國的崛起將無人可擋！
battle_talk_30403=此戰我們和格溫內斯王國都已傾盡全力，若還無法擊敗愛德溫，諾森布裡亞王國必將稱霸不列顛。
battle_talk_30404=連番的勝利已經讓愛德溫變得自大起來，諾森布裡亞的防線到處都是漏洞！
battle_talk_30501=諸位，我是先王艾瑟爾弗裡斯之子奧斯維德。國家已經到了生死存亡的時候，我選擇此時回來，就是要帶領大家戰勝入侵者，復興諾森布裡亞王國。
battle_talk_30502=奧斯威，剛剛聖人托夢於我，說此戰我軍必勝！
battle_talk_30503=戰士們，卡德瓦龍已經被我擊敗，一鼓作氣，收復剩下的領土。
battle_talk_30504=士兵們需要一位國王來率領，大家都支持你加冕為諾森布裡亞的國王。
battle_talk_30505=沒想到諾森布裡亞王室還有著這樣一位人物，但是他的事業必將在此結束！
battle_talk_30601=麥西亞王國屢次聯合格溫內斯王國、波伊斯王國侵犯我國，他們是諾森布裡亞王國發展的阻礙，必須將他們徹底清除。
battle_talk_30602=彭達果然來救波伊斯了，按照我和埃奧瓦的約定，一旦彭達率軍離開麥西亞，他就起兵爭奪麥西亞的王位。
battle_talk_30603=我軍側翼出現大量來自格溫內斯王國的軍隊，我們時刻有被包圍的危險。
battle_talk_30604=諾森布裡亞剛安穩發展幾年，奧斯維德就迫不及待地發起戰爭。埃奧瓦，你負責守衛後方，我率軍去支援波伊斯王國。
battle_talk_30605=埃奧瓦，你的背叛並沒有讓我感到意外，我正可以趁此機會除掉所有隱患。
battle_talk_30606=彭達，我不會再受你任意擺佈了，我才應該是麥西亞的國王。
battle_talk_30701=戰士們，敵軍雖然人多勢眾，但補給困難。我們只要依靠城市防守，敵軍必然會撤退。
battle_talk_30702=只要擊敗奧斯威，諾森布裡亞王國就沒有可以反抗我們的軍隊了，到時整個王國的財富都將由我們支配！
battle_talk_30801=盧達卡，威塞克斯王國一直不服從我們麥西亞王國的統治，這次出兵就是要徹底征服威塞克斯，也以此來震懾其它王國。
battle_talk_30802=我會讓敵人明白得罪麥西亞王國會有什麼樣的下場。
battle_talk_30803=戰士們，只要我們能挫敗麥西亞王國的進攻，其他對麥西亞不滿的王國一定會援助我們，威塞克斯並不是孤立無援。
battle_talk_30804=反擊的時刻到了，麥西亞王國的霸權將在此被終結。
battle_talk_40101=徒有其表的羅馬人不堪一擊！讓我們為使者報仇！
battle_talk_40102=可笑！冒犯者必須付出代價，讓他們知道羅馬的強大。
battle_talk_40103=死傷太嚴重了，撤退！我們必將重新回到這裡，但目前還不是時候。
battle_talk_40201=敵人的數量不到我們十分之一，我要讓他們有來無回！
battle_talk_40202=這些烏合之眾也就夠讓我練個兵，在踏入羅馬人領地前還無人可以阻擋我。
battle_talk_40203=撤往後方，哈立德的軍隊確實勇猛。
battle_talk_40301=羅馬人已經在這裡盤踞了太長時間了，現在是時候讓我們的馬匹和駱駝走到更遠的地方了。
battle_talk_40302=大馬士革是一座堅城，但要看守城的人有多大決心。
battle_talk_40303=對方人數確實很多，但是他們也只能速戰速決，只要我們堅守他們就必然會退兵。
battle_talk_40304=我們需要求援。
battle_talk_40401=這是我們最後的陣地，願堅固的城池能帶給我勝利的希望。
