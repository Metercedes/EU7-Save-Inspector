stage_intro_30301=如果沒有美麗的朱迪思出現，24歲的羅傑·博索或許會永遠留守在諾曼第那座空蕩的家中。他們一見鍾情，然而身份地位懸殊。朱迪思是征服者威廉的堂姐，而羅傑則一無所有，既無土地也無財產。為了追求愛情，羅傑決定前往義大利，投奔他的哥哥羅伯特·吉斯卡爾。
stage_intro_30302=羅伯特·吉斯卡爾繼承了已故兄弟韓弗理在義大利的土地和頭銜，他的做法與哥哥類似，但不同的是，他並不打算分給年幼16歲的弟弟任何土地。然而，羅伯特需要這個弟弟的幫助征服更多土地。在接下來的5年裡，羅傑協助哥哥征服了整個卡拉布裡亞地區。
stage_intro_30303=西西里島自9世紀起一直處於撒拉遜人的統治下，但他們並非鐵板一塊。伊本·提姆納殺死了前任長官並霸佔了遺孀。遺孀的哥哥——墨西拿的埃米爾下令通緝伊本·提姆納。為了逃避追捕，伊本·提姆納逃往義大利，最終尋求羅傑的幫助，這為羅傑進軍西西里提供了契機。
stage_intro_30304=羅傑決定比哥哥羅伯特先一步登陸西西里島，因為他對財富和土地的渴望遠超一切。
stage_intro_30305=在西西里島站穩腳跟後，羅傑的目標是攻佔恩納要塞，以給埃米爾致命一擊。然而，他們兵臨城下時才發現要塞防禦異常堅固。更糟糕的是，埃米爾召集了所有部隊準備反擊，意圖將孤立無援的諾曼人一網打盡。
stage_intro_30306=在大獲成功後，羅伯特與羅傑之間的關係日漸緊張。佔領特羅伊納後，顧全大局的羅傑撤回義大利，見到了他魂牽夢縈的朱迪思。原來，朱迪思的父親與諾曼第的威廉公爵發生了矛盾，舉家遷至義大利。羅傑向朱迪思求婚並獲得了她父親的同意，但吉斯卡爾依然拒絕為弟弟分封土地。
stage_intro_30307=羅傑已不再是那個稚嫩的少年，他與哥哥在卡拉布裡亞展開決戰。儘管狡猾的羅伯特最終被弟弟擊敗，羅傑仍與哥哥和解，隨後一同前往西西里島。
stage_intro_30308=羅傑與朱迪思夫人回到了西西里島，保護遭受撒拉遜人威脅的特羅伊納居民。然而，1062年底，當羅傑前往佔領尼古西亞時，伊本·哈瓦斯發動突襲，試圖抓住留守在特羅伊納的朱迪思夫人。羅傑心急如焚，立即回頭營救妻子。
stage_intro_30309=羅傑開始努力迎合當地人，不再區分信仰和種族。然而，北非的撒拉遜人重申了自己對西西里島的統治權，並命令其子阿尤布王子率領3.5萬大軍進攻西西里島。在塞拉米，羅傑帶領僅有130名騎士和300名步兵的部隊與龐大的敵軍正面交鋒。
stage_intro_30310=羅傑在1064年嘗試佔領巴勒莫時失敗，此時阿尤布王子再次集結軍隊挑戰諾曼人。在行軍過程中，羅傑與阿尤布王子再次相遇，雙方兵力差距依舊懸殊。
stage_intro_30311=當羅伯特·吉斯卡爾佔領巴里後，他將精力轉向西西里島。1071年，羅傑被授予西西里伯爵頭銜，羅伯特自己則保留了墨西拿和瓦爾德蒙。1072年，羅傑與哥哥聯合進攻巴勒莫。
stage_intro_30312=1077年，羅傑圍攻特拉帕尼，這是西西里島西部僅存的兩個撒拉遜據點之一。1079年，陶爾米納被圍困，1081年，羅傑征服了卡塔尼亞。唯一的遺憾是，他心愛的人朱迪思在1080年去世。
stage_intro_30313=吉斯卡爾去世時，諾曼人征服西西里島的事業尚未完成。他的兒子們為爭奪繼承權發動內戰，導致西西里的征服重任最終落到了羅傑的肩上。
stage_intro_30314=1091年，為了躲避北非撒拉遜人的襲擊，羅傑率領艦隊征服了馬爾他島。
stage_intro_30315=羅傑在西西里島的統治極為成功。他宣稱保持中立、精簡政府，推行寬鬆的宗教政策，成為當時唯一一個未參與十字軍東征的歐洲領主。在他的治理下，西西里島前所未有地穩定與繁榮，西西里人民親切地稱他為“偉大的伯爵”。

stage_intro_30401=老羅傑去世後，西西里島的政局十分穩定。大兒子西蒙年僅8歲，由母親阿德萊德攝政。然而，4年後12歲的西蒙意外去世，繼承權轉交給年僅10歲的羅傑二世。16歲時，阿德萊德正式讓位，自己則嫁給了耶路撒冷國王鮑德溫一世。
stage_intro_30402=羅傑二世繼承了父親帶來的繁榮，野心勃勃，開始打造一支強大的海軍用於防衛和擴張。他只等一個藉口。馬赫迪耶的埃米爾攻擊了尼科泰拉並摧毀了這座城市，羅傑二世找到了侵略的理由。
stage_intro_30403=在權力鬥爭中，耶路撒冷的牧首宣佈羅傑母親阿德萊德與鮑德溫一世的婚姻無效，阿德萊德被迫回到西西里。這讓羅傑二世深感羞辱。
stage_intro_30404=羅傑二世的父親曾入侵馬爾他，但未完全佔領該島。羅傑二世不能容忍西西里附近還有撒拉遜人的勢力，因此在1127年決定消除這一威脅。
stage_intro_30405=在義大利阿普利亞，威廉二世突然去世，按繼承權，羅傑二世繼承了卡拉布裡亞。然而，教皇並不希望一個諾曼人完全統治西西里和義大利西部。1127年底，教皇發動了一場針對羅傑二世的十字軍東征。德倫戈特家族的拉努夫二世趁機反叛。
stage_intro_30406=羅傑二世並非嗜殺之人，更像東羅馬皇帝一樣傾向于通過外交手段取勝。羅傑的部隊紀律嚴明、行動迅速，敵軍則鬆散且同盟脆弱。1128年，在羅傑二世軍隊的震懾下，聯軍撤退，教皇被迫在貝內文托城外封他為阿普利亞、卡拉布裡亞、西西里公爵。
stage_intro_30407=教皇去世後，羅馬出現了兩大對立陣營。為了獲得政治支持，改革者阿那克萊圖斯決定為羅傑二世加冕為王。1130年耶誕節那天，巴勒莫的市民第一次見到了這位新王。
stage_intro_30408=1132年7月24日，諾曼人的貪婪導致拉努夫與卡普阿的羅伯特二世以及那不勒斯的塞爾吉烏斯七世結盟，共同對抗羅傑二世。
stage_intro_30409=不論羅傑二世登上王位的手段如何華麗，他支持偽教皇的行為得罪了支持另一個教皇英諾森的基督徒，導致更多勢力加入英諾森的陣營。1133年，神聖羅馬帝國皇帝洛泰爾終於抵達義大利。
stage_intro_30410=洛泰爾加冕後，神聖羅馬帝國的內政局勢大為改善。他用一年的時間召集軍隊，再次越過阿爾卑斯山，進軍北義大利，當地幾乎沒有反抗。英諾森教皇率領教廷加入了洛泰爾的陣營，聯合拜占庭皇帝約翰二世以及威尼斯王國進攻西西里。
stage_intro_30411=1137年10月30日，新任命的普利亞公爵拉努夫率領一支從洛泰爾皇帝處借來的德國特遣隊對羅傑二世發起攻擊。羅傑的敵人不僅是拉努夫，還有他昔日的盟友塞爾吉烏斯。
stage_intro_30412=幾個月後，羅傑二世支持的教皇阿那克萊圖斯二世也去世。英諾森順理成章地成為合法教皇。羅傑二世試圖與新教皇媾和，然而英諾森教皇親自集結軍隊發起進攻。
stage_intro_30413=羅傑二世經過10年奮鬥，戰勝了兩個皇帝和一個教皇，最終沒有再遭遇嚴重的阻力。他開始統一律法，構建了一個強大的中央集權國家。
stage_intro_30414=神聖羅馬帝國和東羅馬帝國並未忘記曾經的恥辱，多次聯合出征西西里。然而，似乎神明並未偏袒他們，西西里島在羅傑二世的統治下愈加繁榮。1154年，羅傑二世在巴勒莫安詳去世，劍身上刻著：“阿普利亞、卡拉布裡亞、西西里和非洲都唯我是從。”

stage_intro_30501=西西里島的女王康斯坦斯與神聖羅馬帝國的皇帝亨利六世結婚九年後才懷孕。1194年，亨利六世前往西西里島進行加冕典禮時，腓特烈二世就在耶誕節第二天的旅程中誕生。這個在帳幔下出生的嬰兒，註定要改變歐洲的歷史。
stage_intro_30502=腓特烈二世直到兩歲才接受洗禮，這一幕成為他與父親亨利六世唯一的親密接觸。亨利六世在腓特烈出生後不久突然去世，腓特烈成為了唯一的繼承人。然而，父親的死引發了權力鬥爭，除了腓特烈之外，還有兩個競爭者：父親的兄弟菲力浦和教皇支持的薩克森公爵奧拓布倫瑞克。腓特烈的母親康斯坦斯選擇將兒子帶離德意志，暫時掌控西西里王國。1198年，康斯坦斯也去世，腓特烈的命運變得更加撲朔迷離。
stage_intro_30503=孤獨的少年腓特烈並未在一個安寧的環境中成長。西西里王國被各方勢力所控制，他只是政治棋盤上的一個棋子。14歲時，腓特烈被教皇安排了一場婚姻，這個年長他十歲的妻子帶來了500名騎士，成為他走向權力巔峰的關鍵。
stage_intro_30504=在腓特烈16歲時，德意志的叔父菲力浦被刺殺，教皇英諾森三世決定支持腓特烈成為德意志國王。腓特烈的王位之路並不平坦，奧拓試圖在義大利北部阻止他的加冕，然而腓特烈成功逃脫敵人的追擊，最終在美因茨大教堂接受加冕，成為神聖羅馬帝國的合法繼承人。
stage_intro_30505=教皇英諾森三世在腓特烈二世宣佈不接管西西里王國後終於松了一口氣，不久便去世。教皇去世後的幾個月，腓特烈二世迅速將自己的妻子和兒子接到身邊，加強了自己在德國的統治地位。
stage_intro_30506=英國的獅心王理查戰死後，法蘭西國王腓力二世趁機掃除英國勢力，邀請腓特烈二世參與解決香檳王位繼承戰爭。腓特烈二世欣然接受，為戰鬥的勝利奠定了基礎。
stage_intro_30507=1220年11月20日，腓特烈二世在羅馬舉行盛大的加冕典禮，成為神聖羅馬帝國的皇帝。他舉起皇冠，右手持劍，左手執笏，莊嚴宣誓要成為基督教會的守護者，進行十字軍東征，並消滅異端。康斯坦斯作為皇后在丈夫身後跪下，接受了加冕。
stage_intro_30508=腓特烈二世致力於改革與建設，巡視義大利南部和西西里島。他頒佈了《卡普亞憲章》，建設了福賈的皇宮，並復興了西西里海軍。腓特烈二世還創辦了歐洲第一個國立大學——那不勒斯大學，推動了文化與學術的復興。
stage_intro_30509=儘管腓特烈二世忙於鞏固自己的王權，教皇依舊責難他未參與第五次十字軍東征的戰鬥。腓特烈與伊斯蘭世界的統治者保持聯繫，最終與埃及蘇丹達成和談，成功收復耶路撒冷。腓特烈二世在1229年加冕為耶路撒冷國王，這一壯舉令教皇極為不滿。
stage_intro_30510=教皇格列高利九世因腓特烈二世與“無信仰之徒”達成和約而憤怒異常。教皇授意前耶路撒冷王入侵西西里，腓特烈二世不得不回國保衛家園。
stage_intro_30511=腓特烈二世在1231年頒佈了《梅爾菲憲章》，這部中世紀的憲章標誌著神聖羅馬帝國向君主制體制的轉變。教皇對此強烈反對，認為腓特烈的舉措是對教皇權威的挑戰。此舉也為腓特烈與教會之間的長期衝突埋下了伏筆。
stage_intro_30512=義大利北部的倫巴第同盟一直未能完全納入神聖羅馬帝國的統治，這一地區的自治城邦由米蘭領導，是西西里王國與德意志王國之間的障礙。教皇的支援使得倫巴第同盟再度與腓特烈二世對立。
stage_intro_30513=通過前一年的勝利，腓特烈二世成功使義大利北部的東部地區歸順於他。腓特烈的下一個目標是佔領曼托瓦，這一勝利將確保與德意志的聯繫，並為進攻義大利西北部的同盟根據地鋪平道路。
stage_intro_30514=佈雷西亞地處從維羅納到貝加莫大道的交通要道，腓特烈二世將其作為切斷倫巴第同盟補給線的關鍵目標。雖然攻城力量強大，但守軍的頑強抵抗和出乎意料的戰術讓腓特烈二世吃到了苦頭。
stage_intro_30515=1239年，腓特烈三度被開除教籍，而教皇格列高利九世聯合熱那亞和威尼斯從海上進攻西西里王國，腓特烈不得不面對這場與教皇的戰爭。最終腓特烈的軍隊贏得了勝利，並開始向羅馬進軍。
stage_intro_30516=1243年，新教皇英諾森四世上任，但他與腓特烈二世的矛盾並未緩解。英諾森四世不僅剝奪了腓特烈的帝位和西西里王位，還試圖擴展教會對德意志和倫巴第地區的控制。1246年，教皇甚至策劃了刺殺腓特烈及其兒子的陰謀。
stage_intro_30517=隨著腓特烈二世的新體制逐漸穩固，他決定再次出手，打壓義大利北部的倫巴第同盟。然而，腓特烈已年過五十，時間成為了他最大的敵人。1247年夏，教皇支持的帕爾馬政變爆發，腓特烈迅速行動，為了圍困帕爾馬，他在周邊地區建立了維多利亞基地，準備進行長期的軍事鬥爭。
stage_intro_30518=僅僅三個月後，腓特烈與其兒子恩佐重新控制了帕爾馬附近的地區。1248年夏，腓特烈決定採取行動，鞏固領土並掠奪俘虜。此時，皇帝軍在蘭齊亞指揮下與教皇軍發生了決定性的衝突。兩軍的命運將在這場戰鬥中決定。
stage_intro_30519=在1249年的福薩爾塔戰役中，腓特烈二世的兒子恩佐被博洛尼亞軍俘虜，北方戰線失去了其重要的指揮官。隨著關鍵戰役的接連失敗，佈雷西亞陷落，帕維亞投降，皮亞琴察也向敵人打開了城門，腓特烈面臨著前所未有的困境。1250年11月，腓特烈在一次鷹獵後身體突然病倒。經過一段時間的沉默，他于同年12月13日去世，標誌著他那傳奇的一生畫上了句號。

stage_group_name_30004=羅傑博索的日記
stage_group_name_30005=穆罕默德·伊德里西的日記
stage_group_name_30006=巴勒莫大主教貝拉爾德的日記

family_letter_desc_401=……朱迪思，我會回來的，我很快就會迎娶你，一切都會好起來的。……
family_letter_desc_402=……親愛的朱迪思，你還好嗎？我已經為哥哥征服了大片土地，儘管不知何時能回去，但上帝保佑你和我。……
family_letter_desc_403=朱迪思，我即將踏上西西里島的征途，這是我獲得封地的最佳時機。願一切順利。……
family_letter_desc_404=好運似乎不再眷顧我。若非你的信，我恐怕早已支撐不下去。我不知道是否還能再見到你，朱迪思。
family_letter_desc_405=仿佛一場夢，沒想到竟然能夠見到你——我日日思念的愛人。上帝真是安排了這一切。
family_letter_desc_406=家族的分裂讓我們更顯脆弱，但西西里才是我的歸宿，是我與愛人共度一生的家園。
family_letter_desc_407=朱迪思，如果你有任何不測，我將失去活下去的勇氣。
family_letter_desc_408=撒拉遜人以為人數多就能戰勝我？他們簡直小覷了諾曼人！我們可不是泥土捏成的。
family_letter_desc_409=終於，我得到了封地。除了哥哥的認可，這也實現了我對朱迪思的承諾。
family_letter_desc_410=朱迪思，我的愛人，是你成就了今天的我。我祈求你繼續在天堂保佑我和我的領土。
family_letter_desc_411=哥哥未能實現他成為羅馬皇帝的夢想，而我，只想腳踏實地，守護自己的王國。
family_letter_desc_412=願西西里的希臘人、撒拉遜人、諾曼人在此能和平共處，希望戰爭永遠不會靠近我的子嗣。

family_letter_desc_501=少年時期，我四處漂泊，曾在西班牙、葡萄牙、法國南部等地遊歷。每到一地，常遭受歧視與仇視，但我也目睹了百姓們在貧苦中艱難求生。
family_letter_desc_502=那時的種族仇恨彌漫四方。16歲的我已經學會了如何躲避法蘭克鐵騎的追擊。那一年，我回到了安達盧斯。
family_letter_desc_503=我聽說在地中海上有一個神奇的國度，那裡沒有戰爭，希臘人、阿拉伯人、法蘭克人和其他各族群都能和睦共處。我決定親自去看看。
family_letter_desc_504=最終，我抵達了西西里島，找到了這片理想中的土地。遇見了我的導師阿布·薩爾特，在他身邊我學習了藥理學、幾何學與天文學。
family_letter_desc_505=30歲那年，我見證了一個如夢似幻的日子。漫天玫瑰花瓣飄落，羅傑二世戴著高貴的王冠，披著華麗的披風，微笑著向我們揮手。
family_letter_desc_506=西西里島比我經歷過的任何地方都自由。這裡有來自世界各地的物品，阿拉伯香料、法蘭克羊毛，甚至有來自中國的絲綢。
family_letter_desc_507=西西里島的資訊流通異常便利。我們能夠搜集世界各地的學術著作——阿拉伯的醫典、東羅馬的數學、埃及的神話。我將這些翻譯成拉丁文和阿拉伯文。
family_letter_desc_508=我經常為羅傑二世的王子們講課。他們是名副其實的西西里人，始終對撒拉遜學者表現出尊敬與禮貌。
family_letter_desc_509=那一年是我最榮耀的一年。羅傑國王請我為他編寫一本書，繪製出我們所知的所有國度與土地，我們稱之為《羅傑之書》。
family_letter_desc_510=羅傑二世安葬在切法盧大教堂，這座教堂融合了東羅馬、穆斯林和諾曼風格。而國王的畫像，身著拜占庭皇帝禮服與阿拉伯禮服，端坐於其中，仿佛一位“受洗的蘇丹”。

family_letter_desc_601=我必須承認，當第一次見到這位少年時，我就深深被他吸引。他身上融合了霍亨施陶芬與歐特維爾家族的氣質，他擅長騎馬、獵鷹、下棋，掌握五國語言，讀書的數量甚至超越了許多學者。
family_letter_desc_602=腓特烈猶如黑夜中的烈火，吸引著所有人的目光。條頓騎士團團長赫爾曼見過他後，也將自己的餘生奉獻給了他。
family_letter_desc_603=康斯坦斯的離世令腓特烈心碎。她是那位始終幫助他掌握權力的公主，儘管腓特烈在外有許多情人，但康斯坦斯從未因此抱怨。
family_letter_desc_604=我們的隊伍行進在基督徒的質疑中。自第一次十字軍東征以來已經過了130年，我們沒有流血，沒有戰鬥，就收回了聖城。當我看到腓特烈與阿爾卡米勒用阿拉伯語在帳篷裡簽訂十年合約，當我看到腓特烈走進聖城，受到各信仰民眾的歡呼，我不再懷疑，和平真的是上帝的旨意。
family_letter_desc_605=腓特烈對新技術與新學科充滿好奇心。埃及蘇丹阿爾卡米勒雖然沒有贈送財寶與美女，卻送來許多新奇的東西——比如精巧的機械鐘。腓特烈還資助了數學家斐波那契，斐波那契的《算盤全書》及後續著作都獻給了他。
family_letter_desc_606=腓特烈剛正不阿，法治至上。即使是他的大兒子亨利叛亂，他也毫不手軟，將其終身囚禁。他將自己與教皇之間的信件公開發給全歐洲的王侯，表明自己始終保持清白。教皇“是太陽，皇帝是月亮”的信條開始在王侯們之間崩塌，他們漸漸接受了耶穌基督的教誨：“皇帝的歸皇帝，上帝的歸上帝。”
family_letter_desc_607=腓特烈被開除教籍的那天，他也收到了赫爾曼去世的消息。赫爾曼是條頓騎士團的團長，這位忠誠的戰士，為腓特烈和上帝盡忠二十載，終於離開了我們。
family_letter_desc_608=腓特烈在得知自己被判決的消息後勃然大怒。他大聲喊道：“我曾對他表示尊敬，但從今以後，我不再客氣！我要變成鐵錘！”
family_letter_desc_609=“對法治近乎執拗的熱情，徹底公正的言行，對知性不倦的探求心，多方面的豐富才能，與生俱來的真正高貴，如果這些不會隨肉體的死亡而消失，那麼腓特烈將繼續活在我們的心中。”——曼弗雷迪對父親的評價。

battle_talk_3030401=趁現在進攻墨西拿，勝利已經觸手可及！
battle_talk_3030402=進攻受阻，先撤回去再做打算
battle_talk_3030403=？？我們的船呢？被暴風雨吹走了嗎？
battle_talk_3030404=守住陣地，等新一批運輸船抵達
battle_talk_3030501=我們拿下了墨西拿，可以向西西里中部進軍
battle_talk_3030502=恩納要塞防守嚴密，我們恐怕有場硬仗要打
battle_talk_3030503=阿拉伯騎兵正在衝擊我們的陣線，諾曼騎士，亮出槍刃！
battle_talk_3030801=伊本·哈瓦斯發動了無恥的偷襲，我們必須儘快回援特羅伊納
battle_talk_3030802=加快進攻！我們要趁羅傑·博索回來之前拿下這座城市！
battle_talk_3030803=他們的援軍來了，準備迎擊！
battle_talk_3030901=敵軍人數眾多，我們可以先佔據地形優勢
battle_talk_3030902=我們兵力充足，分批衝鋒，消耗諾曼人的軍力！
battle_talk_3030903=敵人的士氣越來越低，是時候發起反擊了
battle_talk_3030904=穩住！不要後退！
battle_talk_3031001=上次進攻巴勒莫失敗，這次一定能成功
battle_talk_3031002=上次被諾曼人打敗，這次一定要雪恥
battle_talk_3031003=有敵人！我們的計畫被發現了嗎？
battle_talk_3031004=諾曼人！他們怎麼發現我的計畫的？
battle_talk_3031005=衝鋒！不要給敵人列陣的機會！
battle_talk_3031101=他們的援軍已經被我擊退
battle_talk_3031102=我的艦隊也準備好了，讓我們拿下這座城市吧
battle_talk_3031301=投降吧，你們已經沒有援軍了，我也不會虧待你的家人
battle_talk_3031302=我不是高尚的人，但我手下的將士都是善戰之輩
battle_talk_3031303=我明白了，我會精心設計一個陷阱
battle_talk_3031304=這是個圈套！我們走投無路了！
battle_talk_3031401=敵人總是依託馬爾他來襲擊我們
battle_talk_3031402=我們必須將這座島拿下以絕後患
battle_talk_3040301=風暴摧毀了我們的艦隊，雖然不知道現在在哪但必須就近找個落腳點。
battle_talk_3040302=重新集結艦隊保護我們的人撤回西西里。
battle_talk_3040303=年輕的羅傑第一次展示力量時卻遭遇了痛苦的回擊，威望受到了嚴重打擊。
battle_talk_3040401=瓦勒他的平坦海灘適合登陸但是有重兵防守，我們應該直接從西北部登陸。
battle_talk_3040402=或者繞道從南側登陸，穿過複雜的山地直取馬爾他城。
battle_talk_3040403=馬爾他城陷落了，敵軍隨時會出現在我們背後，我們該怎麼辦？
battle_talk_3040501=周圍的領主對我們爭奪阿普利亞的態度不一，但都不怎麼好。
battle_talk_3040502=所以我準備了禮物來與周邊的領主交好，但只能交好一家，可以預見我們會收穫各不相同的結果。
battle_talk_3040801=我軍敗了，在薩勒諾建立防線，我們的敢死隊可以破壞薩爾諾河上的橋樑阻擋北面襲來的敵軍。
battle_talk_3040802=蘭恰諾的駐防部隊可以為我們分擔火力，大部隊正在從巴里趕來，屆時發起反攻，消滅叛軍。
battle_talk_3040901=北義大利全部歸順了洛泰爾，神聖羅馬帝國的官員正在接管城市的路上，我們可以先發制人攻佔城市。
battle_talk_3040902=我們終究無法與帝國軍隊正面對抗，但可以洗劫城市獲得物資強化我們的防線，但最好不要嘗試攻擊已經被接管的城市。
battle_talk_3040903=同時叛軍領袖在與洛泰爾談判，我們應該儘快消滅叛軍的勢力，讓洛泰爾打消現在就協助他們發動進攻的心思。
battle_talk_3041001=敵人從四面八方襲來，護送後勤車隊前往防線，盡可能的拖延洛泰爾的主力部隊，至少要守住薩勒諾。
battle_talk_3041002=我親自去北非集結穆斯林軍隊，到時候就發動反攻。
battle_talk_3041101=我們投降。
battle_talk_3041102=衝鋒，消滅這些叛匪！
battle_talk_3041103=你差得遠，孩子。
battle_talk_3041104=不，羅傑，我的長子！
battle_talk_3041201=現在能坐下好好談談了，教皇陛下。
battle_talk_3041202=我承認你是南義大利唯一的統治者，快放我回去吧。
battle_talk_3050401=羅馬皇帝？那只是羅馬那個老頭的施捨，現在他居然想把它給一個毛頭小子？他根本不配！
battle_talk_3050402=把各個山口都守牢，讓那個老頭明白，他的決定是大錯特錯。
battle_talk_3050403=必須找到條隱蔽小路穿越阿爾卑斯山，絕不能讓奧托察覺。
battle_talk_3050601=艾拉德，你這個背信棄義的叛徒，手下敗將！今天在法王和眾位諸侯的幫助下，非取你首級不可！
battle_talk_3050602=少廢話！憑人多就想勝過我嗎？
battle_talk_3050603=防守住！絕不能再給叛軍增援的機會！
battle_talk_3051001=教皇站在我這邊，神也站在我這邊！而他？一個被教會逐出的人，憑什麼自稱皇帝！
battle_talk_3051002=奪回上帝的封地！攻陷異教徒的巢穴！為上帝伸張正義！
battle_talk_3051003=我們的故鄉正遭侵略，而侵略者竟是那個讓我們遠赴異國，與薩拉森人血戰的教皇。真是可笑！
battle_talk_3051004=在羅馬接近一場“重歸於好”的慶祝時，教皇與腓特烈的紛爭暫時得到平息，腓特烈被恢復了帝位。
battle_talk_3051201=我們倫巴第人從不懼怕什麼羅馬皇帝！無論是紅鬍子腓特烈，還是這位黃髮的腓特烈，倫巴第永不屈服！
battle_talk_3051202=赫爾曼大團長，有時我會想，這些倫巴第人是真的有獨立精神，還是一群沒腦子的逐利之徒？
battle_talk_3051203=倫巴第人屢次挑釁，休怪我們的刀劍無情！突襲他們的防線，佔領維琴察！
battle_talk_3051301=我絕不允許這些老鼠繼續竊取我的國土！散佈消息，我們撤退至克雷莫納過冬，吸引他們進入伏擊圈！
battle_talk_3051302=看來他們也不願在這冰冷的義大利沼澤中抗衡我們，那就回冬季營地吧。
battle_talk_3051303=糟了！中計了。
battle_talk_3051401=沒有盟友，沒有援軍！唯有自救！舉起你們的草叉，守護我們的孩子！
battle_talk_3051402=若兩個月內還未攻陷此地，冬天就會降臨，到時我們將陷入不利之境。但各城鎮相互支援我們似乎毫無辦法。
battle_talk_3051403=撤退，我們會回來的！
battle_talk_3051404=守軍堅定的意志和出乎意料的戰術，讓腓特烈二世最終未能獲得任何戰果。
battle_talk_3051501=腓特烈又攻佔了法恩紮！這讓我寢食難安啊。讓熱那亞人從海上發動攻擊！直取西西里島。
battle_talk_3051502=起帆！立刻馳援西西里！
battle_talk_3051503=戰爭勝利後，皇帝軍隊向羅馬進發。然而，離羅馬僅13公里時，8月22日，教廷公佈了羅馬教皇格列高利去世的消息。腓特烈命令撤退。
battle_talk_3051701=腓特烈的要塞正環繞我們增多，必須立刻突圍，否則只能坐以待斃！
battle_talk_3051702=就讓維多利亞成為他們的牢籠，我倒要看看教皇如何應對。
battle_talk_3051703=竟然連維多利亞的要塞也困不住這些暴民，我確實低估了他們。
battle_talk_3051704=腓特烈這位強大的皇帝最終卻被一個義大利北方的小城邦擊敗，且敗得毫無反擊之力，帕爾馬的維多利亞基地在敵人攻佔後化為灰燼。
battle_talk_3051801=貪婪的教皇一再攻掠，卻只讓百姓流血受苦，難道這些人不是他的子民？
battle_talk_3051802=也許明天我再難上戰馬，不知這場爭鬥還要延續多久？但今天，擊退敵軍！
battle_talk_3051803=他們襲擊了我們後方的營地！撤退！恩佐你指揮軍隊緩慢撤退！不能形成潰退！


