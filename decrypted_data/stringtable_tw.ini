stage_intro_1701=1469年，一位名叫“裡茲代爾的羅賓”的人在英格蘭北部多次掀起叛亂，此前與愛德華四世積怨已久的造王者沃里克也趁勢反叛，並在埃奇科特襲擊了前來平叛的軍隊。
stage_intro_1702=1470年，沃里克試圖再次煽動叛亂，愛德華四世先發制人，在霍恩菲爾德擊潰了叛軍，由於很多叛軍在逃散時脫去了帶標誌的衣服，因此也被稱為“丟衣戰役”。
stage_intro_1703=在丟衣戰役過後，造王者沃里克逃亡海外並與安茹的瑪格麗特結盟，以此換取蘭開斯特家族的支持。1471年4月，在一個濃霧彌漫的清晨，愛德華四世和造王者沃里克這對曾經的戰友走向了他們最後的戰場。
stage_intro_1704=在巴內特戰役發生的同時，安茹的瑪格麗特率領蘭開斯特家族的海外力量登陸了英格蘭島，並開始向倫敦進軍。愛德華四世在巴內特戰役結束後得知了這個消息，儘管軍隊已十分疲憊，但他依然率軍和瑪格麗特展開了決戰。
stage_intro_1705=1483年4月，愛德華四世因病去世，他的弟弟理查被任命為護國公。6月，愛德華五世失蹤，理查加冕為王，史稱“理查三世”。愛德華四世的舊盟友認為這是篡權，他們轉而支持亨利·都鐸登上王位。不久之後，英格蘭國內再次爆發了叛亂。
stage_intro_1706=1483年耶誕節，蘭開斯特家族的亨利·都鐸迎娶了約克家族伊莉莎白·伍德維爾的女兒，兩大家族聯合成為了都鐸家族，只為了對付一個共同的敵人——理查三世。1485年8月22日，亨利·都鐸和理查三世在博斯沃思平原展開了決戰。

