;战役章节开篇
;__font_type[font_text_]
campaign_desc_1=多方敵人的入侵讓本就虛弱不堪的羅馬帝國雪上加霜，二十年間皇位的不斷更迭更是加劇了帝國的動盪，羅馬帝國似乎正不可避免地走向滅亡。
campaign_desc_2=在外族的多番入侵之下，西羅馬帝國的滅亡已成定局，而身處東方的君士坦丁堡則迎來了兩位帶領拜占庭帝國走向輝煌的人物，查士丁尼一世和貝利撒留。
campaign_desc_3=隨著羅馬帝國國力的不斷衰弱，其對不列顛島的控制越來越顯得力不從心，來自日爾曼地區的盎格魯-撒克遜人趁機大舉向不列顛島遷徙，失去帝國庇護的島民不得不獨自面對這些入侵者。
campaign_desc_4=西元7世紀起，阿拉伯人四處征戰，而拜占庭帝國便是阿拉伯人最為強大的敵人之一。
campaign_desc_5=自西元8世紀起，蓬勃發展的不列顛積累了大量的財富，人們相信大海對於英格蘭是天然的屏障，但卻從來沒有想過，有一天襲擊居然會從海上發起。
campaign_desc_6=巴西爾一世稱帝掀開了拜占庭帝國馬其頓王朝的篇章，馬其頓王朝統治期間是拜占庭帝國的全盛時代。
campaign_desc_7=1066年，宣信者愛德華駕崩前舉薦了哈樂德成為國王，同時諾曼第公爵認為自己也擁有繼承權。當哈樂德二世即位的消息傳到諾曼第時，威廉大怒，並立即宣佈出兵英格蘭。
campaign_desc_8=馬其頓王朝於1057年結束後，拜占庭帝國經歷了數十年的蕭條與衰落，直到1081年阿萊克修斯一世登基後，這一局面最終才得以結束，拜占庭帝國在科穆寧家族的統治下，正在逐步復蘇。
campaign_desc_9=在教皇的准許下，西歐領主和騎士們帶領著軍隊，向著地中海東岸進發。他們以耶路撒冷為目標，希望能夠收復這座被敵人佔據的城市。
campaign_desc_10=1135年內戰後，瑪蒂爾達皇后成功為他的兒子亨利二世爭取到了英格蘭王位的繼承權。1154年，亨利二世於威斯敏斯特教堂加冕繼位，金雀花王朝的時代就此到來。
campaign_desc_11=第四次十字軍東征之後，君士坦丁堡被遠征軍所佔領，拜占庭帝國成為了流亡的尼西亞帝國，拉丁帝國的存在成為了所有拜占庭人心中揮之不去的陰影。
campaign_desc_12=十三世紀末，塞爾柱帝國滅亡後，鄂圖曼帝國隨之建立。鄂圖曼帝國的建立，使得原本分散的安納托利亞侯國聯合了起來，與鄂圖曼一同對抗拜占庭帝國。
campaign_desc_13=英法兩國自威廉征服英格蘭以來，就有著諸多矛盾和衝突，法王腓力逝世後國王繼承權的無法確定讓整個法國產生了巨大危機。1337年，愛德華三世正式自稱為法蘭西國王，同時腓力六世則宣佈收回愛德華三世在法國的所有土地，就此英法兩國全面開戰。
campaign_desc_14=英格蘭政局的逐漸穩定，1413年亨利五世在威斯敏斯特教堂加冕，這位偉大的戰士重新燃起了對歐洲大陸征服的野心，亨利五世想要完成祖輩未完成的願望，建立“英法帝國”。
campaign_desc_15=在鄂圖曼帝國的擴張的道路上，一代代蘇丹耗盡自己一生的精力對抗著整個西方世界，他們面前有一座堅城，它叫君士坦丁堡。
campaign_desc_16=隨著理查二世被推翻，為了爭奪英格蘭王位，愛德華三世的兩支後裔，蘭開斯特家族和約克家族展開了戰鬥。
campaign_desc_51=多方敵人的入侵讓本就虛弱不堪的羅馬帝國雪上加霜，二十年間皇位的不斷更迭更是加劇了帝國的動盪，羅馬帝國似乎正不可避免地走向滅亡。
