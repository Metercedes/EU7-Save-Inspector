battle_talk_2301=這是……哪裡？我明明死於本能寺，怎麼……我怎麼會在這片陌生的土地上？這片土地的語言我聽不懂，衣著風格也完全不同。是……異界？
battle_talk_2302=不可能，我的武士道與命運豈能如此輕易被顛覆？不管這是什麼地方，既然我已然來到此地，那便是征服的命運。
battle_talk_2303=士兵們！即使身處異鄉，戰場依舊是我們證明自己力量的地方。進入這座城市，打破他們的防線！我們要讓這片土地也感受到‘織田’的威名！

最后一次更新
