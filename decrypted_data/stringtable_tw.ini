stage_intro_4661=1410年，揚傑式卡以雇傭兵的身份參與了條頓戰爭，並在格林瓦爾德戰役中表現出色。
stage_intro_4663=1419年，胡斯戰爭爆發，揚傑式卡積極參與並領導了布拉格起義，成為了起義軍中的一名重要指揮官。
stage_intro_4665=1420年，在蘇多梅熱戰場上，胡斯戰車首次大放異彩，揚傑式卡指揮的數百起義軍在車陣的幫助下戰勝了上千名騎士。
stage_intro_4667=1420年，神聖羅馬帝國皇帝西吉斯蒙德發動了對捷克地區的第一次十字軍遠征，但在維特科夫山戰役中被揚傑式卡擊敗。
stage_intro_4669=1421年冬，西吉斯蒙德在庫特納霍拉包圍了起義軍。但在揚傑式卡靈活的戰術指揮下，起義軍不僅成功突圍，還在後續的纏鬥中擊潰了敵人。
stage_intro_4671=1422年1月，揚傑式卡率領部隊追上了在庫特納霍拉戰場上敗退的十字軍並發動了殲滅戰，將十字軍的第二次遠征徹底粉碎。

