campaign_desc_301=傳說中法老王寶藏埋藏地的消息在民間不脛而走，無數的稀世珍寶，價值連城，讓人垂涎不已。
campaign_desc_302=一直以來，無地王約翰的寶藏是無數探險家心馳神往的物件，但是想要找到這批寶藏卻一點也不容易。
campaign_desc_303=所羅門王藏於耶路撒冷的寶藏一度下落不明，並逐漸被人所遺忘。如今寶藏的消息再次出現，無數人為了得到寶藏做好了出發的準備。
campaign_desc_304=聖殿騎士團自成立開始，征戰沙場並積累了大量的財富。在其解散之後，為了防止被人覬覦，他們將這些財富埋藏了起來，至今沒有被人找到。
stage_group_desc_20001=羅馬帝國的衰弱讓蠻族們蠢蠢欲動。匈人首領阿提拉集結了東哥特人、格皮德人、法蘭克人向高盧進發，羅馬帝國意識到了危險，埃提烏斯也集結了大量部隊和阿提拉在平原進行大決戰。
stage_group_desc_20002=阿拉伯帝國的擴張勢不可擋，他們已經佔領了整個北非和伊比利亞半島，法蘭克王國如果阻擋不了這支阿拉伯軍隊，那麼整個歐洲都會被阿拉伯征服。
stage_group_desc_20003=阿拉伯帝國和大唐都擴展至中亞地區，因為波斯帝國的滅亡，中間緩衝地帶已經不復存在，兩大帝國之間不可避免的發生了衝突。
stage_group_desc_20004=諾曼第公爵為了取得英格蘭王位，帶領部隊跨過海峽，在英格蘭登陸。當哈樂德二世得知消息後，立刻召集軍隊南下，在赫斯廷斯附近，佈置守軍。
stage_group_desc_20005=突厥人塞爾柱王朝的崛起勢必向兩河流域以及更西邊擴張，阿拉伯帝國因為內亂避其鋒芒，曼齊刻爾特被佔領後，拜占庭皇帝震怒，他從希臘抽調兵力決定給塞爾柱人致命一擊！
stage_group_desc_20006=鮑德溫四世的去世讓耶路撒冷王國陷入更大的危機之中，內部的不團結以及主動的挑釁，讓薩拉丁獲得了收復聖地的機會。一場東西方的交戰已經不可避免。

;战役章节结束
;__font_type[font_text_]
campaign_end_desc_1=西羅馬帝國在外敵的不斷入侵下走向了滅亡，這一古老帝國的毀滅仿佛早已註定，但又十分突然，這使得羅馬帝國的疆域大幅縮水。而此時，作為拜占庭帝國首都的君士坦丁堡，則是另一番景象。
campaign_end_desc_2=查士丁尼一世和貝利撒留堪稱明君賢臣的典範，他們為拜占庭的崛起和發展打下了堅實的基礎，為千年帝國的延續，做出了不可磨滅的貢獻。
campaign_end_desc_3=盎格魯-撒克遜人的入侵使得不列顛原本分裂的地區勢力逐漸整合，最終形成了七大王國的格局，這也是後來的英格蘭王國的雛形。
campaign_end_desc_4=拜占庭帝國在強大的阿拉伯人的攻勢下苦苦支撐，與此同時，巴爾幹半島又發生了新的戰事。龐大的拜占庭帝國腹背受敵，仿佛隨時都會擊垮。
campaign_end_desc_5=維京人是著名的航海家，他們不僅入侵了歐洲各個國家，並且在美洲、冰島等多個地區都有他們活動的身影，而維京人擴張的這一時期，則被人們稱之為“維京時代”。
campaign_end_desc_6=馬其頓王朝開創了拜占庭帝國歷史上第二個最輝煌的時期，在這段被稱為“黃金時期”的幾個世紀裡，馬其頓王朝的疆域達到了查士丁尼一世之後從未有過的規模，但最終卻因為子嗣斷絕而終結。
campaign_end_desc_7=諾曼第王朝先後經歷了四位國王的統治，並且由亨利一世締造了英格蘭的長期和平時期，諾曼第王朝的結束也意味著英格蘭即將迎來一個全新的時代。
campaign_end_desc_8=阿萊克修斯一世帶來的軍隊為拜占庭帝國擊敗了強大的敵人，但也使得拜占庭帝國的百年基業近乎毀於一旦。君士坦丁堡被佔領，拉丁帝國的崛起，仿佛意味著拜占庭帝國即將成為歷史。
campaign_end_desc_9=長期的遠征最終以失敗而告終，耶路撒冷依舊被他們的敵人所佔領著。在耗費了大量的人力和財力後，遠征軍洗劫了君士坦丁堡，拉丁帝國就此誕生。
campaign_end_desc_10=伊莎貝拉和羅傑的行動迫使愛德華二世同意放棄王位，並讓他的兒子愛德華三世繼任。愛德華三世的繼位不僅促使了第二次蘇格蘭戰爭的爆發，也使英格蘭和法蘭西開始了長達百年的戰爭。
campaign_end_desc_11=君士坦丁堡的陷落和重建讓拜占庭人認識到了西方拉丁世界對他們的巨大威脅。與此同時，東方的安納托利亞半島之上，一個新生帝國正對拜占庭帝國蠢蠢欲動。
campaign_end_desc_12=雖然鄂圖曼帝國的崛起已經無法阻擋，但是拜占庭帝國不會甘心俯首稱臣，西方各基督教國家也不會坐視拜占庭的滅亡，而此時東方的一支突厥部落也在逐漸崛起，鄂圖曼帝國的擴張之路勢必不會一帆風順。
campaign_end_desc_13=愛德華三世終究沒有加冕成法國國王，但兩國的戰事還在繼續，這場曠日持久的戰爭把英法兩國都拖入了無盡的深淵，巨額的負債和肆虐的瘟疫讓兩國都暫時無力再戰。
campaign_end_desc_14=雖然戰爭最終由法蘭西獲勝，但長達百年的戰爭使英格蘭和法蘭西人民都遭受了巨大的磨難，戰後的英格蘭失去了他們在歐洲大陸上的大部分領土。
campaign_end_desc_15=君士坦丁堡的陷落標誌著拜占庭帝國的滅亡，千年帝國的輝煌終究還是離人們遠去。拜占庭帝國的滅亡標誌著中世紀的結束，也意味著新的歐洲霸主即將誕生。
campaign_end_desc_51=西羅馬帝國在外敵的不斷入侵下走向了滅亡，這一古老帝國的毀滅仿佛早已註定，但又十分突然，這使得羅馬帝國的疆域大幅縮水。而此時，作為拜占庭帝國首都的君士坦丁堡，則是另一番景象。
