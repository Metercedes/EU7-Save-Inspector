stage_group_desc_20007=1214年，神聖羅馬帝國皇帝奧托四世為遏制法蘭西國王腓力二世的擴張，與英格蘭國王約翰等反對腓力二世的勢力組成聯合軍隊，對法蘭西本土展開了進攻。得知消息的腓力二世迅速組織軍隊前往攔截。

general_skin_20442=戰鬥天使貞德
Joan of Arc2=戰鬥天使貞德
general_desc_Joan of Arc2=貞德雖然出身於農村，但是在戰場上卻是一名極具天賦的指揮官。在戰鬥中，她尤其擅長以身先士卒的方式鼓舞士氣，英勇作戰的身姿給戰士們留下了深刻的印象。
general_skin_20172=雄鷹崛起成吉思汗
Genghis Khan2=雄鷹崛起成吉思汗
general_desc_Genghis Khan2=成吉思汗在發跡前曾多次被逼入絕境甚至命懸一線，但是他堅韌不拔的性格支持他挺過了一個個的難關。現在，他已統一了蒙古各部，整個歐亞大陸都將面臨這位新興霸主的挑戰。
general_skin_20175=少女瑪蒂爾達
Empress Matilda2=少女瑪蒂爾達
general_desc_Empress Matilda2=瑪蒂爾達是英國國王亨利一世的女兒，由於兄長去世較早，她成為了王位的唯一合法繼承人。年輕的瑪蒂爾達此時尚未意識到前方會有怎樣的腥風血雨。

battle_talk_700701=是時候給腓力二世的貪婪畫上句號了。
battle_talk_700702=金焰旗將會指引我們！
battle_talk_700703=國王墜馬了！保護國王！
battle_talk_700704=奧托四世冒進了！這是我們突襲的絕佳機會！
battle_talk_700705=戰場太危險了，我需要暫時撤到後方。
battle_talk_700706=腓力二世將會為他的貪婪付出代價。
battle_talk_700707=金焰旗護佑著我們！
battle_talk_700708=腓力二世墜馬了！不要讓他逃走！
battle_talk_700709=國王陛下，不要過於冒進，小心敵人的伏擊
battle_talk_700710=敵人的伏擊企圖已被粉碎，繼續追擊，消滅所有敵人！

