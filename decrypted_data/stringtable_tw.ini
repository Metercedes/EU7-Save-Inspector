battle_talk_130108=啊！一切完了！
battle_talk_130201=我們人數三倍于英軍，還有最精銳的重騎兵，面對一群疲憊之師，勝利只在唾手可得。
battle_talk_130202=佔領優勢地形！不要慌！太子注意右翼，不要被他們的騎兵抄了後方！
battle_talk_130203=好的！我會讓他們有來無回！
battle_talk_130204=熱那亞弩兵看來根本射不到英軍，騎士們跟著我沖！
battle_talk_130205=太混亂了，我的士兵在哪裡！
battle_talk_130206=頂住他們最後的衝鋒！這將是一場偉大的勝利！
battle_talk_130301=不知不覺我們已經圍城快一年了，沒想到加萊的城池如此堅固！
battle_talk_130302=低地國家增援的士兵快來了，我們需要前去接應！
battle_talk_130303=切斷他們的海上補給線！
battle_talk_130304=保護好增援船隻，這會給加萊守軍沉重打擊。
battle_talk_130305=大家再咬咬牙堅持堅持，我們的補給即將到來！
