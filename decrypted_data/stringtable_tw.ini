general_desc_WuTianXinXuan=日本戰國時期的傑出武將，被譽為戰國時代最具軍事才華的統帥之一。所舉“風林火山”軍旗，雖然出自《孫子兵法》，但也成為了武田軍的一種象徵。
general_desc_WuTianXinXuan1=原名武田晴信，擁有“戰國第一名將”、“戰國第一兵法家”的美稱，且因任甲斐守，被稱為“甲斐之虎”。他的軍團也因源自《孫子兵法》的“風林火山”而無往不利、名聲大噪。
general_desc_ShangShanQianXin=日本戰國時代大名，後世譽為越後之龍、戰國軍神。頻頻與武田信玄、北條氏康、織田信長等人作戰，後應足利將軍家邀請而上洛，但最終壯志未酬而去世。
general_desc_ShangShanQianXin1=越後國長尾為景的幼子，成年後稱長尾景虎。由於繼承了關東管領“上杉”姓氏，並先後得到關東管領上杉憲政和將軍足利義輝的賜名，故又稱上杉政虎、上杉輝虎。是與武田信玄以“龍虎”並稱的戰國英豪。
general_desc_Scanderbeg=阿爾巴尼亞民族英雄，為了保障阿爾巴尼亞的獨立，以遊擊戰的形式與強大的奧斯曼帝國對抗，多次擊退奧斯曼帝國的進攻。
general_desc_Matthias Corvinus=匈雅提·亞諾什之子，15歲正式登基成為匈牙利國王，在位期間平定了貴族的叛亂，組建匈牙利黑軍，多次打敗奧斯曼帝國，使匈牙利走向鼎盛。
general_desc_Ivan the Terrible=莫斯科大公，俄羅斯第一任沙皇。在任期間進行了多項改革，極大的發展了俄國的軍事力量。晚年誤殺了自己的兒子，最終導致留裡克王朝走向沒落。
general_desc_Gonzalo de Cordoba=西班牙帝國名將，西班牙大方陣的創建者。1503年在切裡尼奧拉戰役中以劣勢兵力擊敗法軍，經此一役，西班牙陸軍成為了歐洲大陸的最強陸軍。
general_desc_Stefan Dusan=塞爾維亞國王，在位期間利用拜占庭內訌，征服了阿爾巴尼亞和馬其頓大部分地區，編制了《杜尚法典》
general_desc_Bertrand du Guesclin=法國民族英雄，被稱為“布列塔尼之鷹”，其貌不揚。在百年戰爭初期作戰英勇，很快得到賞識和重用，為法王效力終生。
general_desc_Clovis I=法蘭克王國奠基人，上任之後成功統一了法蘭克各部落，征服了高盧地區，使法蘭克人進入了君主制時代。
general_desc_Casimir III the Great=波蘭國王，力圖以外交手段而非戰爭來達成目標，大大增強了波蘭的民族團結，使波蘭成為了14世紀中歐地區的強國。
general_desc_Vytautas=立陶宛大公，龍騎士團成員，在任期間不斷擴張，最終獲得了立陶宛國王的頭銜，但因王冠波蘭人阻截而未能完成加冕。
general_desc_Afonso Henriques=葡萄牙獨立後的第一任國王，1139年使葡萄牙成為了獨立王國，此後他一直與摩爾人進行鬥爭，以此擴張葡萄牙王國的領土。
general_desc_John II of Byzantium=全名約翰二世·科穆寧，拜占庭科穆甯王朝的第二位皇帝，被稱為“好人約翰”，在位時以虔誠與和善而聞名。
general_desc_Barbarossa Hayreddin=15世紀土耳其海盜，在奧斯曼蘇丹的支持下整合了地中海的海盜，對地中海沿岸的城市不斷進行襲擾，在海上終其一生都未嘗一敗。
general_desc_YueFei=抗金名將，一生致力於光復故土，多次率領部隊以少勝多。其所率”岳家軍“以軍紀聞名，號稱”凍死不拆屋，餓死不擄掠“。
general_desc_JinWuZhu=金朝名將，本名完顏宗弼，金太祖完顏阿骨打的第四子。先後擊敗遼國和宋國軍隊，一路南下所向披靡，直至遇到宿命中的對手岳飛…

