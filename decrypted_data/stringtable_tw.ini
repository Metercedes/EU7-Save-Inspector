battle_talk_3010201=讓農民把麥田毀掉，一粒糧食都不要留給諾曼人
battle_talk_3010202=糧食不夠了，我們請求與教皇談判
battle_talk_3010203=讓他們過來吧，就這麼一小隊人不會有事的
battle_talk_3010204=教皇的部隊毫無防備，趁現在突襲他們！
battle_talk_3010205=我在此請求教皇的寬恕
battle_talk_3010206=雖然諾曼人對戰敗的教皇禮數有加，但教皇成為諾曼人階下囚的消息還是傳遍了歐洲。
battle_talk_3010301=阿普利亞真是好地方，物產豐富應有盡有
battle_talk_3010302=羅伯特！你為什麼一直在阿普利亞享樂，不肯返回自己的領地！
battle_talk_3010303=你是在指責我故意拖延？等著吧，我會把卡拉布裡亞收入囊中的！
battle_talk_3010304=我的時間不多了，諾曼人不能只靠征戰來生存
battle_talk_3010305=羅伯特近年來的表現證明他是一個優秀的政治家，諾曼人的未來就交給他吧！
battle_talk_3010401=進攻拜占庭的據點，把他們趕出卡拉布裡亞！
battle_talk_3010402=擊潰拜占庭帝國之後，我們就可以向西西里進軍了
battle_talk_3010403=這座城市十分堅固，但是我們可以用圍城來迫使它投降
battle_talk_3010404=拜占庭軍隊已被驅逐，是時候征服西西里了
battle_talk_3010405=是諾曼人！快，快集結部隊迎戰！
battle_talk_3010601=之前因為拜占庭軍隊的干擾而沒能佔領墨西拿，這次夜間突襲一定能成功
battle_talk_3010602=加固城防，這裡將是我們征服西西里的起點
battle_talk_3010603=諾曼人，如果你們需要盟友，那我們可以坐下來談談
battle_talk_3010604=非常感謝您的合作，我正需要像您這樣的盟友
battle_talk_3010701=巴里是拜占庭最後的據點，只要擊敗他們，南義大利就將完全屬於我們諾曼人!
battle_talk_3010702=堅持住，我已經派人去求援了，帝國的援軍很快就到！
battle_talk_3010703=如果能在您獲得城市之後給我足夠的回報，我願意幫助您
battle_talk_3010704=增援巴里城！
battle_talk_3010705=攔截他們的援軍！
battle_talk_3010801=巴里已經淪陷，吉斯卡爾下一個目標就會是我們
battle_talk_3010802=我們要團結起來抵抗他
battle_talk_3010803=烏合之眾！哪怕人再多也無法阻止我的腳步！
battle_talk_3010804=接下來就該讓拜占庭感受一下諾曼人的力量了
battle_talk_3010805=薩勒諾淪陷後不到2年，貝內文托也被吉斯卡爾征服。
battle_talk_3011001=威尼斯人襲擊了我們海上的艦隊，我們遭受了不小的損失
battle_talk_3011002=皇帝命令我們死守城市，他一定會帶兵來支援我們的！
battle_talk_3011003=英勇的瓦蘭吉衛隊擊潰了敵人！跟我沖！
battle_talk_3011004=皇帝的援軍到了！隨我出擊！
battle_talk_3011005=優先消滅瓦蘭吉衛隊，分割包圍敵人！
battle_talk_3011006=我需要重新集結部隊！撤退！撤退！
battle_talk_3011007=阿莱克修斯贿赂了教皇，发动突袭，烧毁了诺曼人的船只。而且他们遭遇了最强大的瓦兰吉卫队，这些都是1066年黑斯廷斯战役之后逃向君堡的昂撒人
battle_talk_3011101=教皇被亨利四世圍困在聖天使堡，需要救援
battle_talk_3011102=感謝您的救助，我的盟友
battle_talk_3011103=繼續進軍，把亨利四世趕出羅馬！

