general_desc_Tancred=他是一位諾曼小領主，關於他的資訊不多。但他的十二個兒子們在歐洲創造了許多傳奇故事。
general_desc_William Iron Arm=他是坦克雷德·德·歐特維爾和妻子穆里爾的長子，也是歐特維爾家族財富的創始人。在錫拉庫薩的圍城戰中，他單槍匹馬殺死了錫拉庫薩的埃米爾，因此獲得了“鐵臂”這一綽號。
general_desc_Drogo=他是坦克雷德·德·歐特維爾和妻子穆里爾的兒子，威廉的弟弟，一位諾曼領導人。他與威廉共同參與了西西里島的戰役，最終成為了一位領主。
general_desc_Humphrey=他是坦克雷德·德·歐特維爾和妻子穆里爾的兒子，威廉的弟弟。在威廉和德羅戈去世後，他將自己的兒子的監護權交給了吉斯卡爾。
general_desc_Roger Bosso=他是坦克雷德·德·歐特維爾和妻子弗雷森達的最小的兒子，他協助哥哥吉斯卡爾征服了南義大利和西西里島，是西西里島王國的奠基人。
general_desc_Emma of Hauteville=她是羅伯特·吉斯卡爾和阿爾貝拉達的女兒，她的兩個兒子都參加十字軍東征。
general_desc_Bohemond I=他是羅伯特·吉斯卡爾與阿爾貝拉達的兒子。是第一次十字軍東征的領袖，也是十字軍國家安條克公國的建立者。
general_desc_Roger Borsa=他是羅伯特·吉斯卡爾和西婕蓋塔的兒子。 他的雄心勃勃的母親安排他繼承父親的位置，他與哥哥博希蒙德為繼承權爭鬥了很久。
general_desc_Roger II=他是西西里王國的建立者，他在位期間抵禦了多個帝國的進攻，是一位傑出的君主。西西里王國存續了七個世紀。
general_desc_Tancred Prince of Galilee=他是歐特維爾的艾瑪和奧多的兒子，在博希蒙德不在期間擔任安條克公國的攝政王。
general_desc_William I the Bad=他是羅傑二世的第四個兒子，被稱為“惡人”或“邪惡者”。
general_desc_Constance I=她是羅傑二世的女兒，在歐特維爾最終佔領西西里島的過程中發揮了重要作用。她後來與神聖羅馬帝國皇帝亨利六世結婚，成為皇太后。
general_desc_William II the Good=他是惡人威廉的兒子，他的統治時期被譽為和平與正義的黃金時代。
general_desc_Frederick II=他是霍亨施陶芬王朝皇帝亨利六世和康斯坦斯王后的兒子。他統治的領土從西西里島延伸至德國，參與了十字軍東征並征服了耶路撒冷。

