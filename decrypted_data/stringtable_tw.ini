stage_intro_4641=從14歲第一次登基開始，穆罕默德二世心中就有一個宏圖壯志——攻陷君士坦丁堡，滅亡拜占庭帝國！1451年，當他他再次成為鄂圖曼帝國的蘇丹之時，他終於有機會將此計畫付諸實施。
stage_intro_4643=君士坦丁堡的陷落，並不是穆罕默德二世征服之路的終點，事實上隨著康斯坦丁尼耶的重建，這位年輕氣盛的蘇丹征服擴張的帷幕才剛剛拉開......1456年，士氣高昂的鄂圖曼大軍向著貝爾格勒進發。
stage_intro_4645=鑒於貝爾格勒之戰的失利，整個1457年穆罕默德二世都沒有發動大規模的戰爭，一直等到1458年穆罕默德二世覺得恢復元氣後，才繼續開始了他的征服之戰，而這一次周邊諸國將要面對的是更加成熟老練的穆罕默德二世。
stage_intro_4647=當鄂圖曼帝國正在全力西擴時，經常被東方亞洲的事務所打斷，特別是當白羊王朝的烏宗·哈桑在埃爾津詹集結大軍進犯帝國領土之後，穆罕默德二世不得不從巴爾幹抽身，好好教訓一下這個不安分的東方鄰居.......
stage_intro_4649=鄂圖曼帝國大敗白羊王朝後，穆罕默德二世完成了安納托利亞地區的統一，確立了帝國在該地區的支配地位，此時他終於能騰出手來全力征服巴爾幹，首當其衝的就是阻礙鄂圖曼帝國一統巴爾幹的最硬骨頭——阿爾巴尼亞！
stage_intro_4651=戰火逐漸蔓延到義大利半島，為了對抗鄂圖曼帝國的威脅，教皇向各方勢力求援，但實際上穆罕默德二世已經把他的注意力轉向了羅德島，只有拿下羅德島才能徹底控制東地中海的海面。而這位偉大的征服者也即將迎來自己的落幕。

