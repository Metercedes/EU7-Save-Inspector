stage_intro_4821=1249年，法王路易九世發動十字軍東征入侵埃及，阿尤布王朝的蘇丹薩利赫率兵前往曼蘇拉迎戰卻因急病去世。拜巴爾一世臨危受命，在曼蘇拉城大敗十字軍。
stage_intro_4823=十字軍在曼蘇拉城戰敗，補給即將耗盡。拜巴爾一世敏銳地抓住了機會，在法裡斯庫爾追上了撤退的十字軍並俘虜了路易九世。
stage_intro_4825=1260年，蒙古軍隊在大將怯的不花的率領下佔領了敘利亞並繼續向西進軍。拜巴爾一世率領埃及軍隊在艾因賈魯特與蒙古軍隊展開決戰。
stage_intro_4827=1266年，拜巴爾一世打敗了奇裡乞亞亞美尼亞，極大削弱了蒙古在中東地區的力量。
stage_intro_4829=1268年，拜巴爾一世消滅了十字軍在中東地區建立的最強大政權——安條克公國。自此十字軍勢力在中東地區的覆滅已成定局。
stage_intro_4831=1271年，英格蘭王子長腿愛德華（後來的愛德華一世）組織了第九次十字軍東征，拜巴爾一世成功將其擊退。

