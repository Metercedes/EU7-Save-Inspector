battle_talk_3020201=阿萊克修斯的精銳中軍幾乎不可撼動，但不斷擊破週邊部隊或許就能引發潰散。
battle_talk_3020202=敵人的瓦蘭吉衛隊過於深入了，擊潰他們的士氣！
battle_talk_3020203=哦，我應該離開這。
battle_talk_3020204=懦夫！
battle_talk_3020301=那些希臘人又來了。
battle_talk_3020302=有伏擊！
battle_talk_3020303=我們的物資給養都還留在那邊，不能讓他們佔領營地。
battle_talk_3020304=軍心在潰散，撤退。
battle_talk_3020305=博希蒙德在以為自己又一次獲勝之時，補給品和戰利品全部被阿萊克修斯搶走，這讓這支遠征軍迅速被瓦解，博希蒙德不得不回到義大利再做打算。
battle_talk_3020501=那不勒斯給我們進貢了不少錢，他們的要求只有置身事外。
battle_talk_3020502=雖然贏得了戰爭的勝利，但博希蒙德無力與教廷為敵，在多方妥協之後他為自己爭取到了塔蘭托伯爵的頭銜，但貪婪的博希蒙德不會滿足於此，他誓要建立屬於自己的王國。
battle_talk_3020801=我的人在建造一座攻城塔，大概3天后完工，直接強攻佔領兩側的城門也可以讓我們突破城牆。
battle_talk_3020802=我的坑道也準備好了，大概2天后就能挖到南面的城牆，或者你們先突破南邊，我的人會直接挖到內牆。
battle_talk_3020803=這些傢伙和上次那些烏合之眾不一樣，我得重新集結部隊。
battle_talk_3020804=我們無力繼續抵抗，告訴希臘人我們同意投降了。
battle_talk_3020805=塞爾柱突厥人秘密談判後，這座城市被阿萊克修斯的軍隊佔領。正因為如此，坦克雷德對拜占庭人非常不信任。
battle_talk_3020901=放箭，趁這些野蠻人立足未穩幹掉他們。
battle_talk_3020902=我們來了，堅持住。
battle_talk_3020903=掠奪這些村莊能讓我們獲得補充，同時可以抓一些當地人做嚮導，揭示一些隱藏的山路，必要時利用山路繞開敵軍。
battle_talk_3021001=我們對高牆束手無策，而敵人蠢蠢欲動，聖西蒙港的運輸隊是我們的唯一穩定的物資來源，守住他們。
battle_talk_3021002=不能讓凱爾波加繼續騎在我們這些小埃米爾頭上了，趁著他和那些外來者激戰幹掉他！
battle_talk_3021003=凱爾波加的突然離世讓塞爾柱人決定撤退，博希蒙德終於獲得了安條克。
battle_talk_3021201=有伏擊！
battle_talk_3021202=哦，天哪，博希蒙德被土庫曼人俘虜了！
battle_talk_3021203=博希蒙德因為他的魯莽而受到了懲罰，他被敵人俘虜。
battle_talk_3021301=敵人的援軍，附近肯定還有大部隊。
battle_talk_3021302=黎凡特人居然團結起來對付我們，我們沒有勝算，撤退。
battle_talk_3021303=非常遺憾的是這次戰役最終以失敗而告終，博希蒙德既沒有獲得領土擴展也沒有掠奪到資源。
battle_talk_3021501=再待在這我們的人都會餓死，沒必要陪著博希蒙德一起陪葬。
battle_talk_3021502=我聽說你收了阿萊克修斯的50萬枚金幣，現在看來是真的。
battle_talk_3021503=整個帝國的精銳幾乎都彙聚於此，還要先挑動他們內鬥，陛下對那個諾曼人如此上心。
battle_talk_3021504=你輸了，我的瓦蘭吉衛隊還沒有正式參戰，勸你不要有什麼想法。
battle_talk_3021505=如果我們當初沒幫助你對付那些突厥人！
battle_talk_3021506=戰場沒有如果，回家吧我的老對手，而我該去下一個戰場了。
battle_talk_3021507=或許阿萊克修斯太熟悉這位宿敵了，博希蒙德再一次被這位東羅馬皇帝擊敗。

