battle_talk_160101=薩默賽特公爵這種戰場敗逃的人竟敢染指軍政大權，為了國家，我必須消滅他！
battle_talk_160102=為國王而戰！
battle_talk_160103=前進！消滅這個叛徒！
battle_talk_160104=敵人的正面防線十分強大，我們可以嘗試從側面迂回！
battle_talk_160201=水流太急了，強行渡河會使部隊遭受巨大損失，要想辦法吸引敵人追擊。
battle_talk_160202=王后命令我支援奧德利男爵，但我不會下沒有把握的賭注。
battle_talk_160203=追上去，別讓他們跑了！
battle_talk_160204=他們中計了，弓箭手，放箭截擊渡河的敵人！
battle_talk_160205=戰局已然明瞭，動手吧！
battle_talk_160301=約克的士兵們，放下武器，國王將會寬恕你們！
battle_talk_160302=不要被他矇騙，國王已經死了！
battle_talk_160303=我願意向國王效力，我有約克軍的情報！
battle_talk_160304=軍隊的士氣已經崩潰，事已至此，只能分頭突圍了。
battle_talk_160401=大雨讓火炮無法使用，形式對我們不利！
battle_talk_160402=敵人拒絕與我們談判，那麼我們就在戰場上分勝負吧
battle_talk_160403=約克家族承諾給我足夠的利益，我將為他們提供幫助
battle_talk_160404=敵人正在潰逃！這是追擊的好機會！
battle_talk_160405=所有人都不准傷害國王和平民，我們的目標是貴族，騎士及其侍從！
battle_talk_160501=雖然我們現在被敵人圍困，但是只要等到援軍到來，一切都會好起來的
battle_talk_160502=我要讓約克公爵血債血償！
battle_talk_160503=他們竟敢攻擊我的運糧隊！隨我出擊！消滅他們！
battle_talk_160504=出擊！包圍約克公爵！
battle_talk_160505=把約克公爵的頭顱戴上紙王冠掛出去示眾！讓那些王位覬覦者知道自己的下場！
battle_talk_160601=加快行軍速度！我們要截住蘭開斯特軍隊！
battle_talk_160602=軍隊長途跋涉，已經十分疲憊，我們需要鼓舞他們的士氣！
battle_talk_160603=天哪！那是什麼？天上為什麼會有三個太陽？
battle_talk_160604=不要害怕戰士們！這意味著上帝與我們同在！我們必將獲得勝利！
battle_talk_160701=包圍城鎮！消滅他們的弓箭手！
battle_talk_160702=向西北迂回！包抄他們！
battle_talk_160703=該死！火藥被打濕了！我們需要支援！
battle_talk_160704=敵人越來越多，我們需要找機會撤出戰場！
battle_talk_160801=暴風雪使得弓箭手們睜不開眼睛，天氣對我們不利！
battle_talk_160802=我們正處於上風，弓箭手保持壓制！
battle_talk_160803=不能一直這樣被箭雨壓制下去，騎兵衝鋒！
battle_talk_160804=是蘭開斯特的伏兵！我們需要收縮陣型減少傷亡！
battle_talk_160805=謝天謝地！我沒有來晚！
battle_talk_160901=紐斯卡爾附近的山地有利於士兵們藏身，我們可以在那裡伏擊敵人
battle_talk_160902=盟友在等待我們，我認為應當從北方進軍
battle_talk_160903=左翼損失慘重，我得重新集結部隊。
battle_talk_161001=穩固陣地，修築工事擋住敵人。
battle_talk_161002=發起突襲！不要給他們準備的時間！
battle_talk_161003=穩住！不要後退！
battle_talk_161004=薩默賽特公爵已死！你們不要再做無謂的抵抗了！

