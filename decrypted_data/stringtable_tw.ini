stage_intro_2151=西元376年，西哥特人向羅馬帝國尋求庇護，希望以此躲避匈人的侵襲，但渡過多瑙河後卻與境內的羅馬人爆發了諸多衝突，最終雙方在瑪律恰諾波利斯展開了戰鬥。
stage_intro_2152=西元378年，反叛的哥特人在洗劫多瑙河各省後，準備聯合其他蠻族入侵巴爾幹半島。羅馬皇帝瓦倫斯決定親自出征，但其麾下士兵的戰力參差不齊，是這次鎮壓叛亂作戰的最大隱患。
stage_intro_2153=西元402年，西哥特人在國王阿拉裡克的帶領下，持續入侵西羅馬帝國腹地，不久之後更是包圍了重鎮米蘭，這讓皇帝霍諾留寢食難安，因此急令正在帝國北部的斯提裡科率兵南下。
stage_intro_2154=西元410年，阿拉裡克在與霍諾留約定的會面地點遭到了羅馬軍隊的襲擊，這次襲擊讓他決定放棄與西羅馬帝國談判，並再一次圍攻羅馬城，這座“永恆之城”在被多次圍攻之後顯得搖搖欲墜。
stage_intro_2155=西元419年，剛與西羅馬帝國簽訂盟約的蘇維匯王國便因邊境歸屬問題，頻頻與鄰國汪達爾王國爆發衝突，有著極強征服欲的蘇維匯國王赫默里克決定主動入侵汪達爾人的領地。
stage_intro_2156=西元439年，蓋薩里克率領軍隊橫穿直布羅陀海峽並佔據西羅馬帝國北非大半領地已經8年。在與西羅馬帝國保持近5年的和平後，蓋薩里克再次盯上了迦太基城——羅馬帝國的第三名城。
stage_intro_2157=西元451年，野心勃勃的匈王阿提拉決定借著西羅馬宮廷醜聞的機會出兵入侵高盧地區。身在高盧的羅馬將軍埃提烏斯也趁機聯絡高盧地區的蠻族王國組成聯軍，準備抗擊匈人的侵略。
stage_intro_2158=西元455年，馬克西穆斯通過謀害皇帝瓦倫提尼安三世篡位，這破壞了汪達爾國王蓋薩里克與後者的聯盟，在收到歐多西婭皇后的求援後，蓋薩里克決定出兵進攻義大利。
stage_intro_2251=西元6世紀，歐洲各國已經逐漸認識到騎兵的重要性。530年，波斯人向拜占庭帝國發動了攻擊，達拉城外，薩珊王朝的精銳騎兵已經全部就位。
stage_intro_2252=查士丁尼一世無時無刻不想重現羅馬昔日的輝煌，而蓋利摩的篡位奪權恰好給了他出兵北非的藉口。西元533年，貝利撒留帶領部隊登陸北非，向迦太基進軍。
stage_intro_2253=拜占庭在十裡會戰中取得巨大勝利後，貝利撒留和他的軍隊佔領了迦太基。身處迦太基以西的蓋利摩則向他的兄弟求援，準備重新集結軍隊，奪回迦太基。
stage_intro_2254=重新征服北非後，查士丁尼一世將目光投向了義大利地區。西元535年，貝利撒留帶領他的軍隊再一次出征，為他的皇帝佔領羅馬，奪回義大利地區。
stage_intro_2255=佔領羅馬後，通往拉文納的道路對拜占庭來說幾乎暢通無阻。貝利撒留帶領著他的部隊繼續進軍，東哥特王國的首都即將面對拜占庭軍隊的大舉進攻。
stage_intro_2256=由於東哥特國王托提拉的活躍，查士丁尼一世不得不將貝利撒留重新派往義大利地區。西元546年，托提拉的部隊來到羅馬，並包圍了這座城市。
stage_intro_2257=托提拉在義大利地區的持續侵略令帝國損失慘重，他還計畫利用艦隊封鎖海域，防止帝國軍隊輕易進入義大利地區，這些舉動讓查士丁尼一世十分不滿。
stage_intro_2258=為了奪回義大利的控制權，查士丁尼一世決定派遣納爾西斯前往義大利。與納爾西斯相遇後，儘管兵力處於劣勢，但作為傳統哥特人的托提拉依舊選擇主動發起進攻。
stage_intro_2259=納爾西斯的進攻讓哥特人難以抵擋，東哥特國王決定向法蘭克人和阿勒曼尼人求援，希望他們能進入義大利地區，阻止拜占庭軍隊的進攻。
stage_intro_2260=西元559年，一群匈人越過邊境，在君士坦丁堡城郊肆意作惡，這對查士丁尼一世來說簡直是奇恥大辱。他再一次將貝利撒留召到面前，賦予他最後一項使命。
stage_intro_2351=盎格魯-撒克遜人的到來讓不列顛的原住民恐慌不已，面對裝備精良且訓練有素的敵人，不列顛人不得不拿起武器抗擊盎格魯-撒克遜人的入侵。
stage_intro_2352=南撒克遜部落首領埃爾率領其部民在不列顛島南海岸成功登陸，但向內陸的進軍並不順利，他們遭到了當地人的頑強抵抗，這讓埃爾意識到自己兵力的不足，並向仍在本土的部落請求增援。
stage_intro_2353=連年戰亂的影響下，不列顛散亂的部族開始整合並建立起各自的王國，但這並未給不列顛帶來和平和穩定，部族間的戰鬥逐漸演變為以諾森布裡亞王國為首的王國間更大規模且殘酷的戰爭。
stage_intro_2354=西元633年，愛德溫治理下的諾森布裡亞王國是當時英格蘭地區最為強盛的國家，這引起了鄰國的忌憚，格溫內斯國王卡德瓦龍決定與麥西亞王國結盟，並組建聯軍入侵諾森布裡亞王國。
stage_intro_2355=雖然成功抵禦了格溫內斯王國與麥西亞王國聯軍的入侵，但諾森布裡亞王國也遭受了極其嚴重的破壞，王國更是一度分裂。西元634年，格溫內斯國王卡德瓦龍再次出兵進犯諾森布裡亞王國。
stage_intro_2356=奧斯維德的回歸與繼位，使諾森布裡亞軍隊得以戰勝格溫內斯王國，王國再次得到了和平與穩定。西元644年，隨著十年來國力逐漸恢復，奧斯維德決定主動進攻麥西亞王國。
stage_intro_2357=奧斯維德對麥西亞的入侵以慘敗告終，彭達決定趁此機會聯合東盎格利亞王國與格溫內斯王國將戰火引向諾森布裡亞本土。西元655年，諾森布裡亞王國只剩伯尼西亞還未被聯軍攻佔。
stage_intro_2358=長久以來，麥西亞王國通過強行控制英格蘭南部的諸多王國來維持其霸主地位。西元825年，貝恩沃夫為了鞏固自己的權威，親自率軍入侵威塞克斯王國，威塞克斯國王埃格伯特奮起反擊。
stage_intro_2451=由於使者被伽珊尼德所害，阿拉伯人決定發起報復行動，而這一行動的計畫卻被拜占庭得知，並立刻集結了要塞的駐軍。在強大的拜占庭軍隊面前，阿拉伯人的行動似乎註定會失敗。
stage_intro_2452=哈立德帶領部隊來到瑪姬·拉希特時，伽珊尼德人認為阿拉伯人無法對他們構成威脅，但阿拉伯人很快就用行動證明了他們的戰力是無與倫比的強大。
stage_intro_2453=阿布成為阿拉伯第一位哈裡發後，開始試圖將勢力擴展到阿拉伯半島以外。阿拉伯軍隊一路向北推進，並對大馬士革發起了進攻。
stage_intro_2454=為了阻止阿拉伯人前進，奪回失去的領土，希拉克略決定向黎凡特派遣一支大規模的軍隊。隨著敵人的逼近，阿拉伯人從大馬士革撤退，並在雅爾穆克重新集結了部隊。
stage_intro_2455=在雅爾穆克平原與拜占庭軍隊交戰後，阿拉伯人決定繼續推進，並佔領更多的城市。西元636年末，阿拉伯軍隊來到了耶路撒冷，並包圍了這座城市。
stage_intro_2456=阿拉伯人的征服依然在繼續，他們的部隊在安納托利亞半島上所向披靡。接連的戰敗和城市的丟失讓拜占庭帝國感到了恐慌，他們急需戰勝這一強敵的辦法。
stage_intro_2457=戰勝了薩珊王朝後，奧馬爾決定帶領他的阿拉伯戰士們向非洲進軍。阿拉伯人計畫以埃及為起點，佔領更多的非洲土地作為自己的領土。
stage_intro_2458=在徹底結束了薩珊王朝的統治後，阿拉伯人將拜占庭帝國列為了主要的敵對目標，為此，他們建立了一支強大的海軍，來支援他們在地中海地區對抗拜占庭帝國的行動。
stage_intro_2551=西元865年，一支維京人大軍跨過大海，在不列顛的土地上登陸，並對沿海的修道院等財富中心進行了突襲和劫掠。
stage_intro_2552=維京人入侵以來，東盎格利亞和諾森布裡亞兩大王國已經接連被佔領，而維京人的下一個目標，則是佔領威塞克斯王國。
stage_intro_2553=在雷丁戰役中獲得優勢的維京部隊繼續向前推進，並在阿什當地區再次與威塞克斯軍隊發生了戰鬥。
stage_intro_2554=經過長達數十年的入侵和劫掠，只有包括威塞克斯王國在內的為數不多的勢力依舊在阿爾弗雷德的帶領下抵抗著維京人的入侵。
stage_intro_2555=西元893年，重新登陸不列顛的維京人再一次與盎格魯-撒克遜人發生了衝突，而隨著戰術的改變，維京人的入侵已經鮮有成效。
stage_intro_2556=西元937年，北方三王國結成聯盟，希望摧毀英格蘭不斷增長的力量。面對敵人的入侵，艾瑟爾斯坦國王集結了一支軍隊並向北進軍。
stage_intro_2557=為了爭奪英格蘭的王位，挪威國王哈樂德·哈拉爾與他的盟友決定集結軍隊向約克郡進軍。
stage_intro_2558=由於英格蘭國王懺悔者愛德華的去世，覬覦王座的人開始躁動不安，其中來自挪威的哈拉爾便帶領自己的部隊，向英格蘭發動了進攻。
stage_intro_2651=拜占庭帝國和保加利亞帝國的戰事連年不斷。西元811年，尼基弗魯斯一世率軍攻打保加利亞，在連續取得勝利後，他決定向普利斯卡進軍。
stage_intro_2652=普利斯卡戰役之後，拜占庭帝國和保加利亞帝國雙方都遭受了重大的損失，但是保加利亞帝國依舊保持著激進的攻勢。儘管損失慘重，拜占庭帝國依舊拒絕簽署和平協定。
stage_intro_2653=米海爾二世繼位後，一位名叫湯瑪斯的軍官決定反抗他的統治，這一舉動贏得了很多人的支持，在眾人的支持下，他聯合阿拉伯人向君士坦丁堡發動了攻擊。
stage_intro_2654=為了報復拜占庭教士被驅逐的行為，利奧六世決定將保加利亞商人驅逐出君士坦丁堡。這給了西蒙一世發動戰爭的藉口，而此時拜占庭軍隊的主力正在東線抗擊阿拉伯人。
stage_intro_2655=成為攝政王後，佐伊決定不再對保加利亞帝國讓步，這一舉動再次讓西蒙一世向拜占庭帝國發動攻擊。由於西蒙一世的一系列舉措，拜占庭人被迫獨自作戰。
stage_intro_2656=西元922年，保加利亞人已經控制了大半個巴爾幹地區，但由於缺乏海軍，無法對君士坦丁堡造成威脅。保加利亞人決定聯合阿拉伯人，但卻被拜占庭人的及時出兵阻止了。
stage_intro_2657=在結束了與阿拉伯人的戰鬥後，拜占庭帝國在短時間內恢復了實力，並迅速擊敗了保加利亞帝國。但是這卻讓基輔羅斯趁虛而入，巴爾幹半島再次出現了一個新的強大的敵人。
stage_intro_2658=西元971年，保加利亞人的戰敗使得拜占庭人得以佔據了大片保加利亞土地，為了奪回自己的土地，多年以來保加利亞人持續發動著進攻。
stage_intro_2659=圖拉真之門戰役後，拜占庭帝國爆發了內戰。撒母耳決定利用這一局勢對拜占庭帝國發動攻擊。西元996年，撒母耳擊敗了塞薩洛尼卡的拜占庭軍隊，並開始向南進軍。
stage_intro_2660=從1000年開始，拜占庭皇帝巴西爾二世開始發兵保加利亞。儘管雙方互有勝負，但拜占庭還是打到了兩國邊界。一場中興的拜占庭帝國和衰落的保加利亞之間的惡戰不可避免。
stage_intro_2751=1066年，諾曼第公爵為了取得英格蘭王位，帶領部隊跨過海峽，在英格蘭登陸。當哈樂德二世得知消息後，立刻召集軍隊南下，在赫斯廷斯附近，佈置守軍。
stage_intro_2752=在赫斯廷斯戰勝哈樂德二世後，威廉帶領部隊來到了倫敦。為了保證倫敦的安全，他派遣一支隊伍來到了南華克，希望能夠消滅那裡的抵抗勢力。
stage_intro_2753=成功征服英格蘭後，身處埃克塞特的人們宣佈拒絕向威廉效忠。為了讓埃克塞特人服從他的統治，威廉帶領部隊包圍了這座城市，但卻遭到了強烈的抵抗。
stage_intro_2754=儘管得到了大多數人的支持，但依舊存在抵抗勢力，反抗著威廉的統治，他們大多集中在北方。威廉決定帶領部隊北上，他認為無法通過和平的方式取得這些人的效忠。
stage_intro_2755=1075年，回到諾曼第的威廉拒絕承認艾瑪和拉爾夫的婚姻，他的這一舉動引起了三位伯爵的反抗起義運動，他們決定趁威廉身處諾曼第，抵抗並推翻他的統治。
stage_intro_2756=1105年，亨利一世帶領部隊入侵諾曼第公爵羅貝爾的領地，並佔領了巴約和卡昂。次年，亨利一世返回諾曼第，莫爾坦伯爵作為效忠羅貝爾的貴族之一，成為了他的首要目標。
stage_intro_2757=1119年，法蘭西國王路易六世帶領部隊進攻諾曼第。為了捍衛自己在諾曼第的財產與領土，亨利一世被迫與法蘭西交戰。
stage_intro_2758=1135年，亨利一世的突然病亡讓英格蘭陷入了無政府的混亂狀態。斯蒂芬和亨利一世的女兒瑪蒂爾達帶領各自的勢力，為了爭奪英格蘭王位而展開了鬥爭。
stage_intro_2851=1048年，一支由塞爾柱王子帶領的軍隊進入了拜占庭帝國統治的亞美尼亞地區，由於自身兵力不足，拜占庭人決定採用保守的策略，並等待援軍的到來。
stage_intro_2852=1071年，逐漸弱勢的拜占庭帝國決定利用塞爾柱專心對抗埃及法蒂瑪軍隊的機會，讓拜占庭大軍突襲亞美尼亞，收付先前所失去的土地和要塞。
stage_intro_2853=塞爾柱帝國在愛琴海地區的活動持續威脅著拜占庭帝國，阿萊克修斯決定組建一支艦隊來對抗塞爾柱帝國的海軍，重新奪回愛琴海地區的控制權。
stage_intro_2854=強勢的塞爾柱人讓拜占庭帝國無法抵擋，皇帝阿萊克修斯決定向西方求援。在拜占庭軍隊的協助下，東征大軍跨過大海，將首戰的目標指向了尼西亞。
stage_intro_2855=隨著更多拜占庭援軍的加入，東征軍隊的戰鬥力愈發強大，此時的東征大軍正在趕往安條克，這座城市位於君士坦丁堡至耶路撒冷半程的位置上。
stage_intro_2856=為了加強安納托利亞前線的防禦，病情好轉的阿萊克修斯決定親自前往戰場。他的軍隊多次擊敗了塞爾柱人，並在獲得增援後，再次向敵人發起了進攻。
stage_intro_2857=1176年，拜占庭皇帝曼努埃爾一世在解除匈牙利和塞爾維亞的西方威脅之後，決定集中精力對付東方的羅姆蘇丹國，並希望能收復安納托裡亞草原。
stage_intro_2858=曼努埃爾一世失去了一個收復安納托利亞的絕佳機會，並失去了大批攻城器械。此時，一支劫掠後正在返程的塞爾柱人軍隊讓他看到了勝利的希望。
stage_intro_2951=在攻克了塞爾柱人的首都尼西亞後，遠征軍遭到了猛烈的反攻。阿爾斯蘭一世帶領大量的部隊，將博希蒙德一世的部隊團團包圍。
stage_intro_2952=在成功佔領了安條克後，東征大軍一路高歌猛進，繼續向著耶路撒冷前進。同時駐守耶路撒冷的阿拉伯將領道拉也早已做好了防守的準備。
stage_intro_2953=第一次十字軍東征的勝利讓西方領主們品嘗到了勝利的喜悅，並決定再次發起東征行動，這一次，他們的首要目標則是大馬士革。
stage_intro_2954=阿卡地理位置優越，是薩拉丁統治範圍內一座非常重要的城市，當薩拉丁得知居伊再次集結部隊來到阿卡城外時，他立刻集結了軍隊前往攔截。
stage_intro_2955=為了奪回被薩拉丁奪取的耶路撒冷，西歐領主們再一次組織起了東征軍隊，當大軍進入安納托利亞時，卻遭到了塞爾柱人的猛烈攻擊。
stage_intro_2956=獅心王理查從耶路撒冷撤軍後，薩拉丁決定向雅法發動攻擊，他認為這是一個復仇的機會。得知消息的獅心王再次集結了軍隊，向薩拉丁發起了進攻。
stage_intro_2957=當東征軍隊為前往耶路撒冷做準備時，他們的領導人答應了阿萊克修斯四世的請求，決定前往君士坦丁堡，幫助他的父親奪回皇位。作為報酬，拜占庭帝國將會為他們提供經濟和軍事上的援助。
stage_intro_2958=經過長期的戰鬥，東征軍開始認為埃及是阻礙他們重新奪回耶路撒冷的最大障礙。於是，他們決定組織軍隊，穿越地中海，向埃及發動攻擊。
stage_intro_3051=由於威爾士的公開叛亂行為，亨利二世不得不從諾曼第返回英格蘭。為了懲罰和阻止威爾士人，1165年，亨利二世集結了一支龐大的軍隊，向威爾士人發起了進攻。
stage_intro_3052=為了爭奪英格蘭王位的繼承權，亞瑟和約翰進行了長期的鬥爭。在約翰決定與伊莎貝拉結婚後，這一平衡被逐漸打破，休十世和腓力二世的加入使得局面變得混亂不堪。
stage_intro_3053=由於約翰的拒不配合，腓力二世表示要親手奪回諾曼第的土地，不久之後便開始了他的行動。1203年，腓力二世出兵蓋拉德城堡，他認為這是控制整個諾曼第的關鍵。
stage_intro_3054=1213年，由威廉·朗格斯佩率領的英格蘭艦隊在偶然之下發現了一支法蘭西艦隊，而法蘭西的船員們則早已登陸並開始了他們的劫掠。面對無人艦隊，英格蘭的勝利仿佛唾手可得。
stage_intro_3055=1214年，一支由英格蘭王國、神聖羅馬帝國、弗蘭德伯國所組成的聯軍向法蘭西王國發起了進攻，匆忙之下腓力二世迅速集結了大軍。儘管聯軍聲勢浩大，但訓練有素的法蘭西騎兵似乎並不落下風。
stage_intro_3056=亨利三世統治時期，英格蘭國內的饑荒日益加劇，這使得貴族們對亨利三世的不滿也日益加劇。一場由西蒙·德孟福爾所領導的反抗亨利三世統治的戰爭即將到來。
stage_intro_3057=在愛德華一世的監督之下，蘇格蘭選出了新的國王。愛德華一世認為蘇格蘭應成為英格蘭統治之下的侯國，並要求幫助英格蘭對抗法蘭西，而蘇格蘭人則反對了這一要求，並與法蘭西結盟。
stage_intro_3058=在威廉·華萊士的帶領下，蘇格蘭軍隊持續向英格蘭發動攻擊。1298年，愛德華一世決定與法蘭西王國休戰，並返回英格蘭專心對抗蘇格蘭軍隊。
stage_intro_3059=福爾柯克戰役獲得勝利之後，蘇格蘭幾乎被英格蘭所征服。1306年，羅伯特·布魯斯取得蘇格蘭王位，在愛德華一世病逝後，愛德華二世的領導能力並不如人意，這使得整個戰局發生了逆轉。
stage_intro_3060=1323年，羅傑·莫蒂默從倫敦塔逃離後與伊莎貝拉相識。雙方都對愛德華二世十分不滿，並決定反抗他的統治。1326年，伊莎貝拉與莫蒂默秘密返回英格蘭，並開始了他們的反抗行動。
stage_intro_3151=君士坦丁堡淪陷後，尼西亞帝國和伊庇魯斯專治國成為了最大的兩個拜占庭流亡政權，並且他們都希望能夠率先光復拜占庭帝國，但這一共同的目標卻成為了兩個政權衝突的根源。
stage_intro_3152=尼西亞帝國在與伊庇魯斯專治國的爭奪中獲得了最後的勝利，在雄心勃勃的米海爾八世的帶領下，尼西亞帝國將目光投向了盤踞在君士坦丁堡的拉丁帝國。
stage_intro_3153=1261年，尼西亞帝國與熱那亞共和國結為同盟，並準備再一次向君士坦丁堡發起進攻。當發現拉丁駐軍和威尼斯艦隊遠征未歸時，他們決定不能浪費如此千載難逢的機會。
stage_intro_3154=重新建立拜占庭帝國後，米海爾八世力求肅清周邊拉丁帝國的殘餘勢力。1263年，拜占庭軍隊向亞該亞侯國發動了進攻，在佔領其首都時，卻遭到了頑強的抵抗。
stage_intro_3155=普裡尼察戰役的失敗使得拜占庭帝國在摩裡亞的戰事愈發被動，雇傭軍叛逃、部隊分散的問題十分嚴重。1264年，在威廉二世帶領下，拉丁帝國軍隊對分散的拜占庭軍隊發起了進攻。
stage_intro_3156=1274年，拜占庭帝國對色薩利的約翰發起了進攻，面對龐大的拜占庭軍隊，約翰·杜卡斯只能選擇向外求援。
stage_intro_3157=為了維持帝國對愛琴海的控制權，拜占庭帝國重新組建了海軍。但摩裡亞和塞特波茲戰役的失敗讓軍隊遭到了沉重的打擊，這也使得拉丁貴族決定進攻德米特裡阿斯港口的拜占庭海軍。
stage_intro_3158=對安茹西西里王國來說，培拉特是一座極具戰略意義的要塞城市。1280年，為了防止敵人能夠輕易進入拜占庭帝國的重要地帶，拜占庭帝國派出軍隊對培拉特發起了進攻。
stage_intro_3251=1302年，米海爾九世的軍隊因畏懼鄂圖曼人而宣告解散，這迫使安德洛尼卡二世派遣一支軍隊渡過博斯普魯斯海峽，前去支援尼科米底亞正面臨的嚴峻局勢。
stage_intro_3252=1321年，年輕的安德洛尼卡三世認為祖父過於老邁，應該由自己來接掌皇帝的寶座，祖孫二人隨即展開內戰。鄂圖曼人決定趁此機會攻佔普魯薩城。
stage_intro_3253=從拉丁帝國手中奪回君士坦丁堡後，拜占庭人集中了太多精力用以恢復對希臘地區的控制，並為此召回了安納托利亞東部前線的部隊，這一舉動使得鄂圖曼帝國向其發動了新一輪的攻擊。
stage_intro_3254=1329年，拜占庭在安納托利亞的控制區域已經急劇縮水，為了穩定周邊區域，安德洛尼卡三世決定派遣軍隊前往尼科米底亞，但軍隊在佩萊卡農卻遭到了鄂圖曼軍隊的攔截和攻擊。
stage_intro_3255=拜占庭的內亂幾乎讓拜占庭土崩瓦解，約翰六世為了營救自己兒子向鄂圖曼帝國求助，而他們將要面對的是塞爾維亞帝國以及保加利亞第二帝國的聯軍。
stage_intro_3256=1352年，拜占庭再次陷入內戰，作為雇傭軍的鄂圖曼人獲得了加里波利附近的要塞控制權。1354年，一場地震徹底改變了加里波利的局面。
stage_intro_3257=鄂圖曼帝國在1352年在巴爾幹半島佔領了第一個堡壘後開始迅速擴張在歐洲的土地，保加利亞皇帝伊凡亞歷山大決定阻擊這支軍隊進攻的步伐。
stage_intro_3258=佔領加里波利後，鄂圖曼帝國在巴爾幹南部的擴張更為迅速。在經過了一系列動盪和修整後，鄂圖曼帝國決定向拜占庭帝國的第三大城市阿德里安堡發起進攻。
stage_intro_3351=1337年，法蘭西議會決定從英格蘭手中收回阿基坦公國，雙方的矛盾一觸即發。為了奪取英吉利海峽的制海權，愛德華三世親自率領艦隊，向法蘭西海軍的艦隊發動攻擊。
stage_intro_3352=在奪取制海權後，愛德華三世帶領部隊從朴茨茅斯出發，在到達法國北岸後開始進攻。強大的法軍已經做好了防守的準備，雙方軍隊即將在克雷西周邊遭遇。
stage_intro_3353=克雷西會戰的勝利讓愛德華三世欣喜不已，英軍乘勝追擊決定佔領加萊，攻下這裡就獲得了歐洲大陸的橋頭堡，但沒有想到戰事如此艱難。
stage_intro_3354=1346年9月，在英格蘭大軍圍攻加萊之時，腓力六世急請大衛二世出兵進攻英格蘭，希望能迫使愛德華三世分兵回救本土。大衛面對著與法國長期的老同盟關係，決定出兵侵略英格蘭。
stage_intro_3355=布列塔尼處於非常重要的地理位置，布列塔尼的繼承權之戰讓英法兩國都牽扯到了裡面，誰都想布列塔尼傾向自己，來獲得戰場上的優勢。
stage_intro_3356=1356年，黑太子愛德華成為了英軍的騎兵統帥，帶領英軍在法國的土地上施行焦土政策，並獲得了相當大的成功。約翰二世為了向黑太子報復，決定增加行軍速度，以追上英軍。
stage_intro_3357=法國國王約翰二世在普瓦捷戰役中被俘，之後割讓了大片領土給英格蘭，而愛德華三世的野心不止於此，他決定發動遠征，在蘭斯加冕為法國國王！
stage_intro_3358=雖然法國已經滿目瘡痍，但國不可一日無君，查理王子決定前往蘭斯加冕為王，愛德華三世決定切斷巴黎至蘭斯之間的道路，來阻止這次加冕之禮。
stage_intro_3359=莫龍戰役後，布列塔尼繼承者之間停戰了很久，但雙方在英法的支持下蓄力已久，他們都做好了決戰的準備。
stage_intro_3360=1369年10月非高級貴族的貝特朗被查理五世任命為新陸軍統帥，這個打破慣例的舉動讓法王獲得了回報！隨著冬季的到來，英軍內部就如何過冬的問題再度產生了爭執。法國軍隊趁此機會，向英軍發動了進攻。
stage_intro_3361=1372年，為了回應1368年建立的法蘭西-卡斯提利亞同盟，卡斯提利亞國王派遣艦隊前往阿基坦協助法軍。艦隊在拉羅歇爾外海遭遇了正在前往法蘭西的英格蘭艦隊。
stage_intro_3362=晚年的愛德華三世無心戰事，黑太子愛德華的去世更讓他失去了信心，他的另一個兒子岡特的約翰擔任了司令官，在法國進行了多次騎行燒掠，給法國民眾帶來了極大損失。
stage_intro_3451=查理六世已成瘋王，王室之間鬥爭也愈演愈烈，法國權力歸屬的不穩定，讓年輕的亨利五世獲得了機會，1415年他決定沿襲曾祖父進攻的路線征服法國，成為兩國國王。
stage_intro_3452=亨利五世在法國的勝利並沒有給英國帶來多少實際收益，國會給予的支持越來越少，他決定佔領盧昂獲得更多法國的領地。
stage_intro_3453=兩黨的鬥爭讓法國徹底分裂，無畏的約翰被刺殺，讓勃艮第公國徹底倒向了英國，《特魯瓦條約》的簽署也讓亨利五世成為名義上的法王繼承人。而此時查理王儲獲得了蘇格蘭的支援，大戰在不經意間觸發。
stage_intro_3454=博熱戰役的勝利，讓查理王儲欣喜，法國貴族們準備乘勝奪回更多失地。而亨利五世此時也計畫著新一輪的進攻。
stage_intro_3455=亨利五世和查理六世已經去世2年，查理七世還未加冕，而亨利六世因為年幼，由貝德福德公爵攝政。2年間雙方衝突不斷，各有勝負，都意圖將對方主力一次性消滅。
stage_intro_3456=與英軍淩厲攻勢形成鮮明對比的是法國政府的遲鈍反應，缺乏戰鬥資金，貴族各自為政，勝利的天平始終沒有傾向法國，連續的打擊幾乎讓查理七世絕望。
stage_intro_3457=奧爾良如果被英軍攻佔，那法國中部最後一道屏障將被打破，這是查理七世的至暗時刻，但上帝給予了這個岌岌可危的國家一束光，一位名叫貞德的少女站了出來。
stage_intro_3458=奧爾良成功解圍的消息振奮了整個法國，法軍在聖女貞德的激勵下厲兵秣馬準備清除整個盧瓦爾河谷的所有英軍據點。
stage_intro_3459=聖女貞德希望查理七世放棄進攻諾曼第的計畫，前往蘭斯加冕。從而進一步削弱英軍的士氣。英軍調集了原先援助胡斯戰爭的精兵前來阻擊。
stage_intro_3460=因為支援不足，聖女貞德在貢比涅之戰中被俘並在2年後犧牲，這激起了她戰友的復仇，就連法國底層民眾也參與到這場鬥爭之中。
stage_intro_3461=1435年，攝政王貝德福德公爵的去世讓英國失去了勃艮第公國這個盟友，諾曼第的領地處於混亂狀態，查理七世決定乘此機會收復巴黎。
stage_intro_3462=儘管1435-1436年間對法戰爭中付出了巨大的代價，英國依然不願意和勃艮第修好，勃艮第公爵決定站到了英國的對立面，攻佔加萊。
stage_intro_3463=法國在查理七世統治下獲得了極大的恢復，而英國人在法蘭西最後的領土只剩下諾曼第和吉耶訥-加斯科涅地區，英格蘭從本土支援了大量兵力決定背水一戰。
stage_intro_3551=烏格列沙得到消息，鄂圖曼帝國的大部分軍隊正在離開歐洲，向著安納托利亞進軍，這是清除鄂圖曼帝國在巴爾幹半島勢力的最佳時機，因此他們發動了一場突然的奇襲。
stage_intro_3552=托皮亞家族的卡洛托皮亞對巴爾沙二世通過聯姻擴大版圖的做法感到不滿，因此邀請鄂圖曼帝國對澤塔公國發動了攻擊，而穆拉德一世則欣然同意了這一邀請。
stage_intro_3553=穆拉德一世於1387年離開巴爾幹，以應對安那托利亞的事務，而巴爾幹的附庸勢力試圖擺脫鄂圖曼帝國的統治，並組建聯盟以挑戰其權威。
stage_intro_3554=穆拉德一世於1388年從安納托利亞返回，立即對保加利亞發動了一場閃電戰。波士尼亞統治者也立刻向保加利亞發動了援助。
stage_intro_3555=科索沃連接了馬其頓和塞爾維亞兩片區域，如果鄂圖曼人佔領這裡，將會進一步蠶食塞爾維亞大片領土，而拉紮爾大公組織的聯軍在科索沃地區與鄂圖曼人展開了一場激烈的交鋒。
stage_intro_3556=穆拉德一世在意外被刺殺後，他的兒子巴耶濟德一世繼位，而此時英法百年戰爭已經進入休戰時期，為了挽救瀕臨滅亡的東羅馬，西方的騎士們聯合起來發動了十字軍東征。
stage_intro_3557=當巴耶塞特一世準備給拜占庭最後一擊的時候，來自東方的帖木兒率領十五萬大軍兵臨城下，鄂圖曼帝國的生死存亡只在一瞬之間，這讓拜占庭得以喘息。
stage_intro_3558=安卡拉戰役巴耶塞特一世被俘並抑鬱而終，隨後鄂圖曼帝國內部經歷了一場鬥爭，最終迎來了新的蘇丹穆拉德二世，但由於帝國的暫時虛弱，仍然引發了從屬國的反叛！
stage_intro_3559=威尼斯人為了獲得塞薩洛尼基地區的完全自治權，不惜向鄂圖曼帝國宣戰，蘇丹對此無法容忍，於是派出大軍圍攻！
stage_intro_3560=教皇尤金四世召集了波蘭、匈牙利等多個國家的軍隊，發動了一場新一輪的十字軍東征，而當時已經退位的穆拉德二世不得不重新組織軍隊，以抗擊這一來勢洶洶的十字軍。
stage_intro_3561=攝政王約翰·匈雅提為戰死的國王而復仇準備了4年，1448年，他率領著匈牙利、瓦拉幾亞聯軍，向鄂圖曼帝國發動了突襲。
stage_intro_3562=1451年，穆罕默德二世繼位，他花費了兩年的時間準備，定制了巨炮、火槍；建立了海岸要塞；封鎖了海峽，君士坦丁堡這座矗立了千年的城市迎來了最強大的敵人。
stage_intro_3651=在瘋病發作一年後，亨利六世恢復了清醒。在王后安茹的瑪格麗特的支持下，薩默賽特公爵官復原職，而約克公爵理查則失去護國公之位被迫離開宮廷。1455年，對薩默賽特公爵不滿的約克公爵理查聯合內維爾家族集結軍隊向倫敦挺進，意圖將薩默賽特公爵一舉剷除。
stage_intro_3652=隨著第一次聖奧爾本斯戰役的落幕，約克公爵掃清了他在宮廷中的大部分對手，重新回到了護國公的位置上。與此同時，王后瑪格麗特也在暗中組織力量，試圖奪回王室的權力。1459年，雙方矛盾激化，約克派的索爾茲伯裡伯爵整兵南下，意圖與約克公爵會師；瑪格麗特當即派兵前往攔截，雙方在布洛希思爆發了遭遇戰。
stage_intro_3653=約克公爵在與索爾茲伯裡伯爵成功會師後並未能夠繼續向前推進多遠，一支打著國王亨利六世旗號的軍隊擋住了他們，這支軍隊的數量大約是他們的兩到三倍。儘管約克公爵試圖寫信給國王表示自己的忠誠，但此前在布洛希思發生的戰鬥使他已經失去了國王的信任，一場大戰在所難免。
stage_intro_3654=拉德福德橋戰役的失利使約克家族在宮廷中的地位一落千丈，蘭開斯特家族的勢力逐步擴大並獲得了部分原約克家族的領地。1460年1月，沃里克先發制人偷襲了駐紮于桑威治的蘭開斯特軍隊，並一路向西攻入倫敦。蘭開斯特家族的軍隊在得知此消息後，迅速在北安普頓建立了防禦陣地。
stage_intro_3655=北安普頓戰役之後，約克公爵理查通過法案確立了自己對王位的繼承權。得知消息的瑪格麗特集結了蘭開斯特家族的盟友，試圖南下進軍倫敦。約克公爵理查率兵北上迎擊。由於出兵倉促，這支部隊不僅人數少於對手，補給也十分匱乏。約克公爵理查在第一次交手時便落入了下風，不得不退守桑德爾城堡等待支援。
stage_intro_3656=約克公爵理查在韋克菲爾德平原戰敗後被殺，他的兒子愛德華四世繼承了他的爵位。儘管愛德華四世此時只有18歲，但是他卻展現出了超出年齡的領導與指揮能力。在約克公爵理查敗亡僅僅一個月後，愛德華四世便率領軍隊在莫蒂默十字與蘭開斯特家族的軍隊發生了激戰。
stage_intro_3657=莫蒂默十字戰役結束後，趁著愛德華四世在赫裡福德重整部隊的當口，瑪格麗特王后的盟友們迅速指揮部隊由北向南進攻。僅僅半個月的時間，這支數萬人的大軍便已逼近倫敦，造王者沃里克率兵前往迎戰。時隔六年，雙方在聖奧爾本斯再次爆發了激戰。
stage_intro_3658=儘管瑪格麗特的軍隊在聖奧爾本斯取得了勝利，但是由於軍隊在戰後的一系列暴行，倫敦的市民們拒絕迎接他們進城，不久推舉愛德華四世為新國王。憤怒的瑪格麗特召集了英格蘭北部地方幾乎所有反對約克家族的勢力，試圖將愛德華四世徹底消滅，一場英國本土最為殘酷的戰役即將打響。
stage_intro_3659=陶頓戰役中，愛德華四世擊敗了大多數反對他的蘭開斯特派。在接下來的數年中，愛德華四世通過多種手段試圖和以前的敵人化敵為友，其中包括他曾經的死敵，薩默賽特公爵亨利·博福特。1463年底，薩默賽特公爵再次掀起反叛。愛德華四世命令約翰·內維爾前往平叛，這一次，他要將薩默賽特公爵徹底消滅。
stage_intro_3660=在赫奇利沼澤戰敗的薩默賽特公爵撤退到了赫克瑟姆沿岸。他將軍隊分成了三處，試圖修築工事來將追兵擋在赫克瑟姆以南。但是約翰·內維爾的追擊速度非常快，他並不打算給薩默賽特公爵喘息的機會。
stage_intro_3751=1469年，一位名叫“裡茲代爾的羅賓”的人在英格蘭北部多次掀起叛亂，此前與愛德華四世積怨已久的造王者沃里克也趁勢反叛，並在埃奇科特襲擊了前來平叛的軍隊。
stage_intro_3752=1470年，沃里克試圖再次煽動叛亂，愛德華四世先發制人，在霍恩菲爾德擊潰了叛軍，由於很多叛軍在逃散時脫去了帶標誌的衣服，因此也被稱為“丟衣戰役”。
stage_intro_3753=在丟衣戰役過後，造王者沃里克逃亡海外並與安茹的瑪格麗特結盟，以此換取蘭開斯特家族的支持。1471年4月，在一個濃霧彌漫的清晨，愛德華四世和造王者沃里克這對曾經的戰友走向了他們最後的戰場。
stage_intro_3754=在巴內特戰役發生的同時，安茹的瑪格麗特率領蘭開斯特家族的海外力量登陸了英格蘭島，並開始向倫敦進軍。愛德華四世在巴內特戰役結束後得知了這個消息，儘管軍隊已十分疲憊，但他依然率軍和瑪格麗特展開了決戰。
stage_intro_3755=1483年4月，愛德華四世因病去世，他的弟弟理查被任命為護國公。6月，愛德華五世失蹤，理查加冕為王，史稱“理查三世”。愛德華四世的舊盟友認為這是篡權，他們轉而支持亨利·都鐸登上王位。不久之後，英格蘭國內再次爆發了叛亂。
stage_intro_3756=1483年耶誕節，蘭開斯特家族的亨利·都鐸迎娶了約克家族伊莉莎白·伍德維爾的女兒，兩大家族聯合成為了都鐸家族，只為了對付一個共同的敵人——理查三世。1485年8月22日，亨利·都鐸和理查三世在博斯沃思平原展開了決戰。

