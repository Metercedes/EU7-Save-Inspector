stage_intro_4721=1146年，對於突厥人屢次騷擾帝國邊境的行為，曼努埃爾一世決定集結軍隊，發動一場針對羅姆蘇丹國的遠征。
stage_intro_4723=1147年，十字軍第二次東征時需要穿過拜占庭帝國的領土，曼努埃爾一世擔憂拜占庭軍隊會與之爆發衝突，而他的擔心很快在君士坦丁堡城外變成了現實。
stage_intro_4725=1155年，為了重新收復帝國的領土，曼努埃爾一世派遣兩位將軍帶著軍隊和大量金幣前往義大利，發動了一場針對諾曼人的遠征。
stage_intro_4727=1159年，安條克親王沙蒂永的雷納德洗劫了拜占庭帝國的賽普勒斯島，憤怒的曼努埃爾一世率領軍隊出征，將安條克公國徹底變成了拜占庭的附庸。
stage_intro_4729=1167年，曼努埃爾一世在瑟烏姆戰役中戰勝了匈牙利人，將亞得裡亞海東岸的大片領土都歸入拜占庭帝國的版圖中。
stage_intro_4731=1171年，曼努埃爾一世與威尼斯斷交並沒收了帝國境內威尼斯商人的船隻與貨物，這引來了威尼斯報復性的劫掠。

