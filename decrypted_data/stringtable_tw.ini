battle_talk_120308=拜占庭人的生存空間越來越狹小，我們必將取得最終的勝利。
battle_talk_120401=安納托利亞正在逐步脫離帝國的控制，我們不能再讓敵人繼續前進了。
battle_talk_120402=如今我們保留下來的戰力已經容不得更多的損失，這對我們奪回尼西亞至關重要。
battle_talk_120403=拜占庭軍隊如今還是無法認清現實，讓我們用行動告訴他們，這片土地已經歸屬於鄂圖曼。
battle_talk_120404=我的軍隊正在逐步推進，但敵人的反撲也即將到來。
