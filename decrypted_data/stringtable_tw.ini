general_desc_Charles VII=在法國最危急的時刻任命了聖女貞德，從而走向了勝利。勝利者查理在位期間進行了一系列改革，建立了常備軍，最終結束了百年戰爭。
general_desc_Jan Zizka=胡斯戰爭爆發後他參加了起義軍並成為首領，他採取的“戰車堡壘”戰術讓敵人聞風喪膽，他的評價是“在戰場上，永遠是勝利者“。




