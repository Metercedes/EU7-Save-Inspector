troop_desc_416=巴爾幹重騎兵是一支強大的騎兵部隊，他們駕馭著強大的戰馬，身穿厚重的盔甲和長袍，在戰場上展現著無與倫比的力量和勇氣。
troop_desc_316=西帕希重騎兵是一支勇猛無比的精銳部隊，他們騎著高大的戰馬，身著重甲，手持戰錘，以快速機動著稱。
troop_desc_116=拜占庭重甲步兵是一支以堅實的裝備和可靠的戰鬥技能著稱的部隊。他們身穿厚重的盔甲，手持強力的武器，通常是長矛、戰斧和重劍等。
troop_desc_516=蘇丹近衛火槍兵是一支精通火器的部隊，他們使用精製的火槍，能夠在遠距離造成致命的傷害。他們身穿華麗的服飾和頭巾，表明了他們的高貴身份和忠誠信仰。
troop_desc_517=拜占庭噴火兵是一支擁有神秘武器的部隊，他們使用噴火器，能夠在近距離噴出熾熱的火焰，令敵人驚恐逃散。他們身穿防護服和面罩，以防止自身受到火焰的傷害。

