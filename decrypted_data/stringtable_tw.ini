battle_talk_110706=匆忙組建的海軍就想與威尼斯相抗衡？
battle_talk_110801=培拉特對帝國來說至關重要，現在這座城市儼然成為了敵人進攻帝國的橋頭堡。
battle_talk_110802=但是這座城市易守難攻，我們必須首先切斷這座城市的一切補給。
battle_talk_110803=諸位，復興帝國的時刻就在眼前，請與我一起放手一搏！
battle_talk_110804=敵人想要對培拉特城發動圍攻，全力防守，保證補給不容有失！
battle_talk_110805=南線的部隊遭受重創，快前去支援。
battle_talk_110806=北線就要失守，難道我們的部隊就如此脆弱嗎？
battle_talk_110807=培拉特城的補給已經成功切斷，現在正是進攻的好機會。
battle_talk_110808=這座城市的防禦已經被破壞，全力進攻。
battle_talk_110809=我們距離勝利只有一步之遙！
battle_talk_120101=我們的軍隊與鄂圖曼大軍正面遭遇了，敵人數量龐大且行動迅速，恐怕很難戰勝他們。
battle_talk_120102=孱弱的拜占庭軍隊無法對我們造成任何威脅，士兵們，消滅眼前的敵人。
battle_talk_120103=敵人的攻勢十分猛烈，但我們必須抵擋敵人的進攻，並且尋找撤退的時機。
battle_talk_120104=我無法坐視帝國的疆土遭到外敵的入侵！
battle_talk_120105=我們獲得了援助，但這不足以支撐我們戰勝眼前的敵人。
battle_talk_120106=我們的軍隊遭到了敵人猛烈地反擊，加派人手，加強攻勢！
battle_talk_120107=側面也出現了敵人，為何敵人源源不斷地出現在我們面前。
battle_talk_120108=撤退的時機已經到來，現在正是脫離戰鬥的最佳機會。
battle_talk_120109=沒有想到拜占庭軍隊還有這樣的反撲能力，軍隊的士氣遭到了沉重的打擊。
battle_talk_120201=愚蠢的拜占庭人正在進行內戰，這是我們繼續擴大領土，穩固權力的最好時機。
battle_talk_120202=普魯薩城對我們至關重要，不能任由敵人在我們的土地上肆虐。
battle_talk_120203=圍困這座城市花費了我們大量的時間和物資，必須儘快瓦解敵人的防禦。
battle_talk_120204=佔領並守住城市周圍散落的城堡，這樣可以切斷敵人的補給，為我們創造進攻的條件。
battle_talk_120205=普魯薩的週邊防線已經被敵人攻破，這座城市即將直面敵人的進攻。
battle_talk_120206=很好，我們距離攻陷這座城市又近了一步，但是敵人的援軍也在源源不斷地趕來。
battle_talk_120207=穩固防線，不能讓敵人繼續前進了！
battle_talk_120301=安納托利亞空虛的防禦力量終究還是讓敵人察覺到了。
battle_talk_120302=敵人正在集結大軍準備進攻尼西亞，我們必須堅守這裡，這座城市是君士坦丁堡的重要壁壘。
battle_talk_120303=全力進攻，不用擔心補給和後援力量，這片土地即將屬於我們。
