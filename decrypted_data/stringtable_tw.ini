battle_talk_150101=聽說他們的軍隊正在離開歐洲，這是我們最佳的機會！發動夜襲，讓我們趕走侵略者！
battle_talk_150102=好！我們要衝進他們的營地，讓他們措手不及！
battle_talk_150103=我們決不能讓營地失陷！即使兵力不足也要打回來！讓他們知道鄂圖曼帝國的強大。
battle_talk_150201=這真是可悲，你們為了打敗我，把鄂圖曼人引入國境內。你難道不知道，他們才是我們真正的敵人嗎？
battle_talk_150202=我寧願先消滅你們，我不想讓你們再侵蝕我們的領土！
battle_talk_150203=看來我們入侵整個巴爾幹已經只是時間問題了！
battle_talk_150204=敵人已經進入河谷，讓我們衝殺出去！
battle_talk_150205=不好有伏兵！
battle_talk_150301=我們必須團結起來，才能夠抵禦異教徒的擴張。否則，只需要幾年時間，我們在巴爾幹地區就將失去立足之地。
battle_talk_150302=為了自由！讓我們趕走侵略者！
battle_talk_150303=這些手下敗將怎麼敢再發起戰爭？這次，我們必須徹底消滅你們！
battle_talk_150304=讓我們與他們協同作戰！
battle_talk_150305=不要直接迎擊他們的攻勢，守住最後的防禦點，我們一定會回來反攻的！
battle_talk_150401=蘇丹即將歸來，我們必須發動反擊！讓這些反叛者為他們的行為付出代價！
battle_talk_150402=這些附屬國的挑釁行為讓我感到恥辱。我的怒火已經迫不及待地要踏遍他們的土地！
battle_talk_150403=鄂圖曼人進攻的速度太快了，如果我還想保住我的王位，也許只有投降了。
battle_talk_150404=如果我們再不去支援我們的兄弟國家，巴爾幹地區就可能會被奪走。讓我們趕快去解救他們！
battle_talk_150501=科索沃是我們民族的發源地，也是重要的戰略要地。如果我們失去它，就意味著我們將失去立足之本。
battle_talk_150502=我們必須組成聯盟，不能讓突厥人再向前進一步！
battle_talk_150503=沒有人可以阻擋我們的腳步！安拉保佑！
battle_talk_150504=我們要勇往直前，突破這片區域！我們可以把領土擴展到更西邊！
battle_talk_150505=即使付出生命代價，我也必須捍衛這片土地。
battle_talk_150506=我投降！請讓我向蘇丹投降！
battle_talk_150507=讓他靠近一點，我想看看他的模樣。
battle_talk_150508=為了國王！為了塞爾維亞！殺！
battle_talk_150509=不！
battle_talk_150601=讓上帝的榮光重新照耀著這片土地！在這裡，我只看到了黑暗與絕望！
battle_talk_150602=我們要拯救被壓迫的基督徒和羅馬帝國！沖啊！
battle_talk_150603=不要擔心！他們只是臨時集結的烏合之眾！
battle_talk_150604=但他們的重騎兵實力很強，我們必須堅決抵禦他們的第一波進攻！
battle_talk_150605=沒想到我們居然會失敗！我們太過自信了。
battle_talk_150701=我的帝國需要你的土地，我們的旗幟將飄揚到世界的邊緣！
battle_talk_150702=不好，安納托利亞的城市防禦空虛，我們必須趕緊前往救援！
battle_talk_150703=全軍壓上！安卡拉是我的！
battle_talk_150704=不，我的失誤將會導致帝國的滅亡！
battle_talk_150801=攻佔君士坦丁堡！我們將成為巴爾幹地區真正的主人！
battle_talk_150802=大軍壓境，我們必須堅守不移，才能保家衛國！
battle_talk_150803=鄂圖曼帝國迎來了他們的新領導者，根基不穩。這是我們反抗的最佳機會！出擊！
battle_talk_150804=看來我們只能暫時放棄攻打君士坦丁堡的計畫，讓我們先消滅這些反抗者！
battle_talk_150901=帝國如今已經無法維持其他城市的防禦，將塞薩洛尼基交由威尼斯人管理是最佳之選。
battle_talk_150902=這座城市應該屬於鄂圖曼，現在你們還有投降的機會。
battle_talk_150903=既然這座城市已經歸屬於我們，那就斷然沒有放棄的可能。
battle_talk_150904=鄂圖曼對塞薩洛尼基發動了攻擊，儘管這減輕了君士坦丁堡的壓力，但情況依舊不容樂觀。
battle_talk_150905=現在，這座城市歸屬於鄂圖曼，威尼斯的艦隊也無法阻止我們。
battle_talk_150906=塞薩洛尼基陷入了危機，但是我的艦隊遭到了鄂圖曼艦隊的封鎖，現在急需打破封鎖援助塞薩洛尼基。
battle_talk_150907=羅馬人妄圖發動進攻以緩解威尼斯人的壓力，這樣的行動毫無意義。
battle_talk_150908=封鎖海域的鄂圖曼艦隊被擊敗了，艦隊繼續前進！
battle_talk_150909=敵人發動了反擊，派出我們的後備力量。
battle_talk_151001=現在鄂圖曼是年幼的蘇丹在領導，他們的軍隊勢必會軍心渙散，我們應該趁機發動攻勢，以期取得勝利！
battle_talk_151002=可惡的基督徒，竟然阻礙了我的退位生活！進攻！
battle_talk_151003=展開防線！我們必須堅守住陣地，抵禦他們的進攻！身後只有大海，已無任何退路！
battle_talk_151004=國王已經犧牲了，撤退！但是我會為他復仇的！
battle_talk_151101=為了國王！為了匈牙利！我回來了，為國王報仇！復仇！復仇！
battle_talk_151102=他們的重騎兵雖然強大，但他們抵擋不了我們的利劍和火槍！鄂圖曼帝國的未來掌握在你的手中，你需要認真觀察今天的戰鬥過程。
battle_talk_151103=是的，父王！
battle_talk_151104=敵人已經被我們擊退！反擊！
battle_talk_151201=用火炮轟開羅馬的大門，佔領羅馬帝國的首都，這片土地應該是我們的！
battle_talk_151202=將士們，我們必須堅守這座城市。這裡是我們的家園，有我們的家人和信仰。我們將戰鬥到最後一刻！
battle_talk_151203=炮火只能埋葬我的血肉，但他們永遠不能埋葬我們的信仰和決心！
battle_talk_151204=終於，我完成了先祖的願望！真主必定保佑我們，我將讓您的教義在整個歐洲傳揚開來！

battle_talk_700601=我們的策略是先包圍太巴列，引誘這些法蘭克人前來救援。我們的優勢在於野戰，而不是攻城和守城。
battle_talk_700602=我們這樣前往救援是不是太危險，或許我似乎嗅到了陰謀的味道。
battle_talk_700603=無論如何，我們必須前往救援。出發吧！相信神會保佑我們！
battle_talk_700604=聖殿騎士團殿后，防止薩拉丁從後面包抄我們。
battle_talk_700605=我們必須儘快趕到加利利湖，以補充我們的水和物資。我們的隊伍缺水已經到了無法繼續的地步。
battle_talk_700606=也許我們應該考慮撤退了，因為我們無法突破前方薩拉丁的防線。
battle_talk_700607=只有突圍才有一線生機！天啊，我們都會死在這裡！整個王國也將被毀滅！
battle_talk_700608=阻止他們接近水源！法蘭克人已經疲憊不堪，沒有戰鬥力，我們可以趁機消滅他們。
battle_talk_700609=這支不團結的法蘭克軍隊註定會失敗，耶路撒冷似乎也應該換主人了。
battle_talk_700610=上帝呀，只有我逃了出來，也許這場戰役從一開始就是一個錯誤。

battle_talk_56=將士們，隨我衝鋒，勝利就在眼前，榮耀屬於我們。
battle_talk_57=穩住陣型，真主與我們同在！
battle_talk_58=鄂圖曼人不斷蠶食周邊土地，終有一日會來報昔日之仇，不可坐視他們繼續壯大實力，趁其深陷巴爾幹泥沼之時，我們主動出擊！
battle_talk_59=鄂圖曼的巨炮已架到城下，君士坦丁堡危在旦夕，請諸位隨我前去支援。
battle_talk_60=我們的城牆雖已倒塌，但我們的心仍然堅定，想要佔領這座城市，除非踏過我的屍體！
battle_talk_61=所有人都不可輕易相信，現如今既已拿回本屬於我的一切，那所有的仇恨就用鮮血來償還吧。
battle_talk_62=采佩什助我奪回大公之位，那就由我來助他一臂之力。
battle_talk_63=拜占庭帝國的輝煌將由我們繼承，從今日起，我們便是拜占庭帝國！
battle_talk_64=黑羊王朝已滅，西方世界的援軍也從海上出發，整頓兵力全力進攻鄂圖曼。

general_desc_Murad I=穆拉德一世是鄂圖曼帝國的蘇丹，他在位期間全力推行領土擴張政策，征服了東南歐和西亞的許多國家，為鄂圖曼土耳其帝國的崛起奠定了基礎，但他在科索沃戰役中遇刺身亡。
general_desc_Bayezid I=穆拉德一世之子，著名的軍事統帥，別稱“閃電”，他統治期間對土耳其的領土擴張做出了巨大貢獻，在尼科堡擊敗了數十萬的十字軍，然而在安哥拉之戰中被俘虜。
general_desc_Murad II=穆拉德二世在位期間振興國力，整頓軍備，挽救了即將分裂的鄂圖曼帝國，為之後的鄂圖曼帝國的輝煌打下了堅實基礎。
general_desc_John Hunyadi=匈牙利王國的民族英雄，綽號“白騎士”。雖然屢戰屢敗，但他不畏鄂圖曼帝國的強大，長期阻擋了鄂圖曼帝國擴張。
general_desc_Princess Sophia=君士坦丁十一世的姪女，她嫁給了莫斯科大公伊凡三世，並幫助伊凡三世帶領著俄羅斯人徹底擺脫了金帳汗國幾個世紀的統治。
general_desc_Stephen the Great=他在位期間維護國家生存，爭取民族獨立的精神，鼓舞了後世的羅馬尼亞人民。之後被教會追封為聖徒，稱“偉大而神聖的斯特凡”。
general_desc_Vlad III=瓦拉幾亞公國的大公，他勇猛無比，守衛羅馬尼亞的英雄，但他也因為對自己國家的貴族以及百姓施行穿刺之刑而被稱為“穿刺公”，他也是吸血鬼的原型人物。
general_desc_Charlemagne2=查理大帝是法蘭克王國最偉大的國王之一，也是中世紀歐洲最具有影響力的人物之一。他征服了大半個歐洲，被羅馬教皇加冕為“羅馬人的皇帝”。
general_desc_Arthur2=據說只有拔出石中劍的人才能成為英格蘭之王，亞瑟王成功拔出了石中劍後，成為了人們心中的“永恆之王”，他代表著英雄主義、騎士精神和正義！
general_desc_Mehmed the Conqueror2=因為他的勇氣、領導力和文化成就，穆罕默德二世被尊為“征服者蘇丹”和“歐洲征服者”。他成為後來蘇丹們的榜樣和靈感來源。
general_desc_Candarli Halil=哈利勒帕夏是鄂圖曼帝國的一位著名政治家和軍事將領，他曾經在15世紀中期擔任過大維齊爾和鄂圖曼帝國的總司令。他因為他的勇敢、智慧和領導能力而備受尊敬，被譽為“土耳其的智囊”和“哈利勒大師”。

