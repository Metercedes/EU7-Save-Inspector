stage_intro_4221=《特魯瓦條約》簽署之後，法蘭西陷入了最黑暗的時刻，大半的法蘭西領土被英格蘭人佔領，此時貞德猶如神跡一般出現在了法蘭西人民面前。
stage_intro_4223=英格蘭人在奧爾良之外修建城堡，意圖困死奧爾良的守軍。查理王子授予貞德“戰爭總指揮”的頭銜，貞德手持王子贈予的寶劍，統率數千名法軍，開始向奧爾良城逼進。
stage_intro_4225=貞德決定不再固守奧爾良，並率軍主動出擊，她揮舞著旗幟爬上了堡壘，貞德身先士卒的舉動極大地打擊了敵人的士氣，這讓法蘭西人成功解放了奧爾良。
stage_intro_4227=奧爾良解圍後，仍有一部分英格蘭軍隊駐守在奧爾良不遠處的雅爾若。法蘭西需要快速攻破雅爾若，以解除奧爾良東南方向的威脅，粉碎英格蘭捲土重來的可能。
stage_intro_4229=收復雅爾若後，貞德迅速將她的軍隊轉移到盧瓦爾河畔默恩。在那裡，她發動襲擊，這有效的阻礙了英格蘭軍隊在盧瓦爾河南部的行軍進程。
stage_intro_4231=奪取通往盧瓦爾河畔默恩的橋樑後，貞德並沒有直接攻擊默恩的城鎮或城堡。反而在隔日攻擊了附近的博讓西，迅捷之勢讓英格蘭軍隊放棄城鎮撤退到城堡中。
stage_intro_4233=博讓西的一日陷落讓英格蘭援軍士氣大降，幾經苦戰的英軍不得不撤往巴黎。貞德則拍板決定加快行軍速度，全力追擊，雙方最終在帕提相遇。
stage_intro_4235=帕提戰役的勝利終結了英格蘭一統法蘭西的野心，勝利一掃法蘭西軍隊百年來的頹勢，貞德率領騎兵開赴蘭斯為太子奪取加冕所需的教堂。
stage_intro_4237=在軍隊的強烈請求下，查理七世下令進攻巴黎，貞德率領法蘭西軍隊在巴黎與英格蘭主力展開了激烈的對戰，貞德仍舊身先士卒，即使受傷也堅持作戰。
stage_intro_4239=在法軍強攻巴黎的關鍵時刻，法蘭西王室卻命令軍隊撤出戰鬥。隨後貞德被派往圍攻拉沙裡泰，可是在深冬時節缺兵少糧的情況下，戰鬥異常艱難。
stage_intro_4255=貞德獲知貢比涅被勃艮第公國攻打，決定前去救援，但因為被敵軍包圍而被俘。之後，這位民族英雄被勃艮第人賣給了英格蘭人。
stage_intro_4257=英格蘭將貞德作為異教徒審判，貞德始終沒有屈服，並堅稱自己無罪。十五世紀法蘭西的歷史，因一位少女的意志而完全改寫。

