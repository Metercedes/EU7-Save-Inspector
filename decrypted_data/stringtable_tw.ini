battle_talk_3000201=進攻！佔領港口碼頭！
battle_talk_3000202=海上發現了敵人的援軍！
battle_talk_3000203=海上敵軍已被消滅！
battle_talk_3000204=很好！讓我們拿下這座島嶼！
battle_talk_3000301=進攻！消滅所有抵抗的敵人！
battle_talk_3000302=敵人正在潰逃！
battle_talk_3000303=追擊！別給他們修整的時間！
battle_talk_3000304=未來可能還有更激烈的戰鬥，應該早做準備
battle_talk_3000401=掃蕩沿途的城市和要塞，瓦解敵人的抵抗！
battle_talk_3000402=沒有敵人可以阻擋我們的鋒芒
battle_talk_3000403=繼續進攻，只要拿下錫拉庫薩，西西里島就是我們的了！
battle_talk_3000404=喬治曼尼亞克斯拖欠了我們的軍餉，只能從敵人身上想辦法了
battle_talk_3000501=錫拉庫薩久攻不下，部隊士氣低迷
battle_talk_3000502=這次攻城又失敗了，只能先撤回營地修整了
battle_talk_3000503=敵人軍心渙散，該吹響我們反擊的號角了！
battle_talk_3000504=敵人的反擊怎麼這麼快？快撤退！
battle_talk_3000505=前幾天的籌備就是為了此刻！歐特維爾家族的榮光將從此處開始！
battle_talk_3000506=天！這個諾曼人竟然把敵人砍成了兩半！
battle_talk_3000507=威廉將錫拉庫薩獻給了東羅馬帝國，而他因為把敵將一劈兩半而名聲大噪，獲得了“鐵臂威廉”的稱號。
battle_talk_3000801=我們人數占優，你們可以自行選擇是要血戰到底還是就此離去
battle_talk_3000802=諾曼人從不後退！
battle_talk_3000803=那你們就在這裡流盡最後一滴血吧！
battle_talk_3000804=我軍敗了！撤退！快撤退！
battle_talk_3000901=我們的軍隊有數萬之眾，優勢在我！
battle_talk_3000902=雖然身體不適，但是我依然會保持對戰場的關注
battle_talk_3000903=敵人的第一道防線已被擊破！
battle_talk_3000904=精彩的戰鬥！病痛也無法阻止我加入這榮耀的戰場！
battle_talk_3000905=威廉的強悍讓他逐漸成為南方諾曼人的實際領袖。
battle_talk_3001001=包圍梅爾菲！我們要拿下這座城市！
battle_talk_3001002=我們可以趁機攻擊他們在蒙特佩洛索的營地
battle_talk_3001003=敵人在要塞內堅守不出，強攻不是明智的選擇
battle_talk_3001004=可以嘗試截斷他們的補給線，逼他們出城作戰
battle_talk_3001201=進攻，進攻！卡拉布裡亞終將成為我們諾曼人的領土！
battle_talk_3001202=迂回包抄敵人
battle_talk_3001203=後方出現了敵軍，再不撤退可能就沒機會了
battle_talk_3001204=這場戰役最終以失敗而告終，威廉決定明年再來征服。

