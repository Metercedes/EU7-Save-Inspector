conquest_faction_desc_701=鄂圖曼帝國繼續向歐洲擴張。同時，帝國內部也在進行改革，推行新法令，加強了中央政府的控制力。雖然鄂圖曼帝國面臨來自國內外的挑戰，但它仍然是當時最強大的國家之一，擁有強大的軍事實力和文化影響力。
conquest_faction_desc_702=拜占庭帝國曾經的輝煌已經不再，領土縮小，內部政治腐敗嚴重，經濟萎靡不振。鄂圖曼帝國發動了一系列對拜占庭的攻擊，不斷侵蝕其領土，將其推向了滅亡的邊緣。
conquest_faction_desc_703=匈牙利王國自遷入巴爾幹半島以來，歷經戰火洗禮。經過國王瑟格德的治理，國家重新繁榮。但其在內部面臨著貴族與中央集權的矛盾。同時，鄂圖曼帝國威脅不斷，匈牙利王國亟需增強軍備，以維護國土完整和安全。
conquest_faction_desc_704=瓦拉幾亞公國面臨來自匈牙利王國和鄂圖曼帝國的雙重威脅。公國領袖弗拉德二世鬥志昂揚，採取強硬措施維護公國獨立，不惜以暴制暴。然而，面對匈牙利王國的進攻，他卻不幸失利，被迫接受屈辱的和平條約。
conquest_faction_desc_705=摩爾達維亞公國是一個相對年輕的公國，這個小國與匈牙利王國和瓦拉幾亞公國交界，國內充滿動盪和衝突。斯特凡勳爵在鞏固自己的統治地位方面付出了很大的努力，包括與鄰國的衝突和平解決，同時也積極尋求國際支持。
conquest_faction_desc_706=波士尼亞王國是一個多元文化、多民族的國家，境內居住著多個民族。在王國內部，貴族之間的爭鬥不斷，而外部則受到匈牙利和鄂圖曼帝國的威脅。
conquest_faction_desc_707=在這個時期，塞爾維亞專制國內外交困。儘管塞爾維亞擁有一個強大的統治者，但這些威脅使得該國的未來充滿不確定性。
conquest_faction_desc_708=威尼斯共和國在爭奪東地中海的貿易霸權上備受挑戰。他們與基督教的競爭者—熱那亞共和國爭奪黃金角的控制權。在這種緊張的局勢下，威尼斯人不得不採取強硬措施，包括對敵對船隻的襲擊和軍事干預，以確保其在地中海的利益和影響力。
conquest_faction_desc_709=阿爾巴尼亞被分割為多個領地。國內的阿爾巴尼亞貴族，為了共同抵禦鄂圖曼帝國的侵略，成立了阿爾巴尼亞聯盟。盟主斯卡雷公爵領導下的聯盟在一系列戰役中擊敗了鄂圖曼軍隊，成為鞏固阿爾巴尼亞獨立的關鍵力量。
conquest_faction_desc_710=伊庇魯斯專制國，是希臘地區的一個強大政權，由卡洛二世領導。儘管與拜占庭帝國存在領土糾紛，但伊庇魯斯專制國在戰爭中表現出了強大的軍事實力和領導能力，被視為希臘地區的一股重要勢力。
conquest_faction_desc_711=摩裡亞專制國是拜占庭帝國僅存的一個割據政權。該國領袖湯瑪斯·帕裡奧洛格斯正在努力鞏固自己的統治，以抵禦鄂圖曼帝國的威脅。
conquest_faction_desc_712=阿拉貢聯合王國控制了義大利南部的那不勒斯王國，並與教皇發生了衝突。該地區因政治不穩定、軍事衝突和疾病流行而受到影響，但阿拉貢的文化和經濟影響力仍在擴大。
conquest_faction_desc_713=卡拉曼貝伊國面臨著與鄰國鄂圖曼帝國的不斷衝突和壓迫，而尋求保持獨立和發展壯大的道路也越發困難。
conquest_faction_desc_714=醫院騎士團和賽普勒斯王國聯合起來，建立了賽普勒斯-醫院騎士團聯盟。對東地中海地區的海盜進行打擊。儘管聯盟面臨著來自鄂圖曼帝國的壓力，但他們通過強大的海上實力和戰術上的巧妙，仍保持著在該地區的影響力。
conquest_faction_desc_716=十字軍聯軍由波蘭和匈牙利國王瓦迪斯瓦夫三世領導，在瓦拉幾亞的米爾恰二世的幫助下攻佔了保加利亞的海港城市瓦爾納，並向著鄂圖曼帝國腹地進軍。

