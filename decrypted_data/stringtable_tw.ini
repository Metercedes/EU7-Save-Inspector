stage_intro_4681=匈雅提·亞諾什出生於匈牙利的一個貴族家庭，一生都致力於抵禦鄂圖曼帝國對歐洲的擴張與入侵，被稱為“白騎士”
stage_intro_4683=1442年，匈雅提在首戰不利的情況下堅持奮戰數日，最終于久拉費赫爾城消滅了前來進犯的鄂圖曼軍隊。
stage_intro_4685=1443年起，在教皇的支持下，匈雅提對塞爾維亞地區發起了遠征，數次以少勝多，幾乎將鄂圖曼在此地的勢力掃蕩一空。
stage_intro_4687=1444年，匈牙利國王瓦迪斯瓦夫三世親自率兵與鄂圖曼帝國軍隊在瓦爾納港附近展開會戰。但由於瓦迪斯瓦夫三世在戰鬥中過於激進，其本人在亂軍中被殺死，匈牙利軍隊也遭受了一場潰敗。
stage_intro_4689=1448年，匈雅提帶領一小股精銳部隊試圖進入科索沃地區與當地抵抗鄂圖曼軍隊的勢力會合，但由於計畫洩露，此次行動以失敗告終。
stage_intro_4691=1456年，鄂圖曼蘇丹穆罕默德二世集結重兵圍攻貝爾格勒。匈雅提臨危受命，率領部隊英勇作戰，最終戰勝了數倍于匈牙利守軍的鄂圖曼軍隊。

