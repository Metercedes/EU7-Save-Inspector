;兵种描述

troop_desc_101=手持劍盾的部隊，缺乏戰鬥技巧，無法和職業軍人相提並論。
troop_desc_102=手持劍盾的部隊，受過一定的軍事訓練，擁有基礎戰鬥力。
troop_desc_103=受過標準軍事訓練的人而組成的部隊，但依舊無法與職業士兵相比。
troop_desc_104=手持劍盾的部隊，堅固的盾牌是他們最大的特征。
troop_desc_105=裝備精良，軍事素養極高的作戰部隊，是軍隊中的精銳。
troop_desc_107=手持雙手大劍，擅長近戰的部隊，面對任何敵人都能發揮出極高的戰鬥力。
troop_desc_108=神聖羅馬帝國的武裝集團，擁有著強大戰鬥力的步兵部隊。
troop_desc_109=堅持傳統作戰方式，是生性好戰的猛士，在任何軍隊中都堪稱精銳。
troop_desc_110=巨大的斧頭是他們的象征，卓越的裝備表示他們無疑都是戰士中的精英。
troop_desc_111=進攻強勁的重步兵，裝甲厚重並且士氣高昂。
troop_desc_112=裝備極為精良的精銳部隊，裝備制式武器，擁有極高的戰鬥素養。
troop_desc_113=拜占庭帝國禁軍編制中最為顯赫的部隊，由各地最為精銳的戰士所組成。
troop_desc_114=重新鍛造後的盔甲在陽光下仿佛黃金一般，沉重的裝備只有最強大的戰士才能穿戴。
troop_desc_115=唐朝精銳部隊，他們攜帶的橫刀刀刃極長，刀身筆直，鋒銳無比，是破甲利器。
troop_desc_201=隨處可見的，通過徵召當地平民而組成的民兵部隊，主要負責城市防禦和支援。
troop_desc_202=手持長槍的部隊，對騎兵能造成可觀的傷害。
troop_desc_203=受過標準軍事訓練的人而組成的部隊，但依舊無法與職業士兵相比。
troop_desc_204=手持槍盾的部隊，堅固的盾牌是他們最大的特征。
troop_desc_205=精銳的戰士可以有效擊傷敵軍的騎兵，也可以作為主力步兵使用。
troop_desc_206=蘇格蘭長槍兵擁有著其他部隊無法比擬的紀律性。
troop_desc_207=擁有高度的警覺性，通常被賦予重要的任務。
troop_desc_208=繼承自羅馬帝國的作戰軍團，手持長槍，無懼敵人的衝鋒。
troop_desc_209=密集排列的陣型可以應對各種敵人的進攻。
troop_desc_210=面對敵人進攻時能展現強大的防禦能力，進攻時也極為驍勇善戰。
troop_desc_211=戰場上的多面手，是步兵軍團的重要組成部分，在戰爭中屢建戰功。
troop_desc_212=唐朝精銳部隊，他們攜帶的陌刀長約3米，威力極大，是騎兵部隊的噩夢。
troop_desc_301=靈動迅捷的騎兵斥候，是戰場上偵查敵方動向的能手。
troop_desc_302=攻守兼備的騎兵部隊，是騎兵作戰中的主力之一。
troop_desc_303=護衛貴族作戰的騎兵部隊，衝鋒時能對敵人造成巨大傷害。
troop_desc_304=裝備精良的重騎兵，是騎兵部隊中的精銳。
troop_desc_305=儘管已經適應了騎馬作戰，但依舊能看出步行作戰的影子。
troop_desc_306=擅長利用速度突擊敵方陣線的部隊，是衝鋒攻擊的好手。
troop_desc_307=精銳的沙漠騎兵部隊，在沙漠地區作戰擁有著極大的優勢。
troop_desc_308=身形龐大的野獸，戰場上能帶給敵人毀滅性的打擊。
troop_desc_309=三大騎士團之一，是戰法嫺熟實力強大的騎兵部隊。
troop_desc_310=三大騎士團之一，是擁有著強大戰鬥力的騎兵部隊。
troop_desc_311=聖墓的守護者，一支信仰堅定的騎士團組織。
troop_desc_312=蒙古騎兵是一支訓練有素、紀律嚴明令人生畏的部隊，建立了世界上規模空前的宏偉帝國。
troop_desc_313=作為唐朝皇帝李世民的一支親衛部隊，戰鬥力超群，他們身披黑甲紀律嚴明，從不畏死。
troop_desc_401=手持長槍的騎兵部隊，衝鋒時能對敵人造成巨大傷害。
troop_desc_402=封建體制下的中世紀歐洲，從小接受軍事訓練的騎士們令敵人聞風喪膽。
troop_desc_403=身披重甲的騎兵部隊，只有經過嚴格訓練才能承受裝備的重量。
troop_desc_404=出身貴族的精銳騎兵，人和戰馬都使用著最為精良的裝備。
troop_desc_405=身穿重甲但是在作戰時仍能保持靈活的部隊，幾乎沒有任何對手。
troop_desc_406=出身貴族的精銳騎兵，人和戰馬都使用著最為精良的裝備。
troop_desc_407=精通各種戰法的騎兵部隊，極為擅長衝鋒，是戰場上的王者。
troop_desc_408=勇猛而強大的騎兵部隊，身後巨大的羽翼是他們最大的特征。
troop_desc_409=身穿重甲的騎士能夠發起排山倒海一般的衝鋒，帶給敵人毀滅性的打擊。
troop_desc_410=三大騎士團之一，是作戰風格極為彪悍的騎兵部隊。
troop_desc_411=由貴族階層組織訓練而來的騎兵，擁有著精良的裝備，通常作為大公的親衛隊而活躍在戰場之上。
troop_desc_412=軍士作為騎士團的主力，儘管在職階上低於騎士，但是他們在戰場上的重要性毋庸置疑。
troop_desc_413=唐朝皇家部隊，他們連同馬匹身披黑甲臉戴面具，猶如烏雲一般壓向敵人。
troop_desc_414=東羅馬帝國的王牌部隊，他們代表著帝國的榮耀，身著重甲，刀槍不入，擁有極大的破壞力和衝擊力。
troop_desc_501=能熟練運用投擲武器的部隊，裝備簡陋但依舊擁有較為可觀的戰鬥力。
troop_desc_502=投擲標槍的部隊，儘管戰鬥力有限，但是擾亂敵陣的效果很好。
troop_desc_503=普通的輕裝部隊，只能進行遠程攻擊，無法與正規部隊近身作戰。
troop_desc_504=極易上手的遠程武器，能快速形成戰鬥力且提供密集的火力。
troop_desc_505=身穿盔甲，使用著強勁的複合弓的部隊。
troop_desc_506=裝備有火繩槍的部隊，射擊命中後能給敵人造成巨大傷害。
troop_desc_507=極難掌控的武器，只有從小接受專門訓練的人才能完成射擊。
troop_desc_508=通常由雇傭軍組成的部隊，裝備簡陋。
troop_desc_509=西班牙王國征服美洲大陸的部隊，貪婪無比但戰鬥力驚人。
troop_desc_510=裝備精良的火繩槍部隊，射擊時彌漫的硝煙和巨大的聲響令敵人聞風喪膽。
troop_desc_511=射術精湛的弩手在戰場上會無情地收割敵人的生命。
troop_desc_512=背負巨盾的弩兵部隊，在需要裝填時會背對敵人，形成有效的防護。
troop_desc_513=身體塗抹藍色顏料的戰士，是遊擊戰的專家，在樹林中的戰鬥力極高。
troop_desc_514=由長弓兵轉職而來，齊射而出的火焰箭矢能對敵人造成極大的威脅。
troop_desc_515=唐朝精銳部隊，他們攜帶諸葛連弩，射出弓箭的遮天蔽日讓人聞風喪膽。
troop_desc_601=騎術精湛的騎兵部隊，能在顛簸的馬背上精准地投擲標槍。
troop_desc_602=裝備強弓的騎兵部隊，擅長騎射且射術精湛，但不精通近身作戰。
troop_desc_603=封建體制下的中世紀歐洲，從小接受軍事訓練的騎士們令敵人聞風喪膽。
troop_desc_604=儘管啟動緩慢，但身穿重甲的騎士在衝鋒時投擲出的標槍威力十分巨大。
troop_desc_605=擅長騎射的騎兵部隊，在沙漠地區作戰擁有著極大的優勢。
troop_desc_606=戰象巨大的身軀在擊敗敵人的同時，也為射手提供了良好的保護。
troop_desc_607=草原上的戰士從小在馬背上長大，擅長各種突襲作戰。
troop_desc_608=極為精銳的職業騎兵部隊，從小便接受各種嚴格的訓練。
troop_desc_609=極具戰鬥素養的機動部隊，是帖木兒帝國戰鬥力的保證，他們在草原上的奔襲能讓敵人膽寒。
troop_desc_314=愛德華三世組建的騎士團，只有最尊貴的皇室成員才可以加入，他們是忠誠和榮譽的象徵。
troop_desc_315=西遼最強壯的戰士和最優良的草原馬組成的隊伍，他們驍勇善戰，久經沙場，無論到哪都所向披靡。
troop_desc_415=敕令騎士是法國的常備騎兵，這是一支裝備精良的隊伍，比貴族的封建騎士更有組織性和紀律性。

