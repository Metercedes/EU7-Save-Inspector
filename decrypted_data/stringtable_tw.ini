stage_intro_1601=在瘋病發作一年後，亨利六世恢復了清醒。在王后安茹的瑪格麗特的支持下，薩默賽特公爵官復原職，而約克公爵理查則失去護國公之位被迫離開宮廷。1455年，對薩默賽特公爵不滿的約克公爵理查聯合內維爾家族集結軍隊向倫敦挺進，意圖將薩默賽特公爵一舉剷除。
stage_intro_1602=隨著第一次聖奧爾本斯戰役的落幕，約克公爵掃清了他在宮廷中的大部分對手，重新回到了護國公的位置上。與此同時，王后瑪格麗特也在暗中組織力量，試圖奪回王室的權力。1459年，雙方矛盾激化，約克派的索爾茲伯裡伯爵整兵南下，意圖與約克公爵會師；瑪格麗特當即派兵前往攔截，雙方在布洛希思爆發了遭遇戰。
stage_intro_1603=約克公爵在與索爾茲伯裡伯爵成功會師後並未能夠繼續向前推進多遠，一支打著國王亨利六世旗號的軍隊擋住了他們，這支軍隊的數量大約是他們的兩到三倍。儘管約克公爵試圖寫信給國王表示自己的忠誠，但此前在布洛希思發生的戰鬥使他已經失去了國王的信任，一場大戰在所難免。
stage_intro_1604=拉德福德橋戰役的失利使約克家族在宮廷中的地位一落千丈，蘭開斯特家族的勢力逐步擴大並獲得了部分原約克家族的領地。1460年1月，沃里克先發制人偷襲了駐紮于桑威治的蘭開斯特軍隊，並一路向西攻入倫敦。蘭開斯特家族的軍隊在得知此消息後，迅速在北安普頓建立了防禦陣地。
stage_intro_1605=北安普頓戰役之後，約克公爵理查通過法案確立了自己對王位的繼承權。得知消息的瑪格麗特集結了蘭開斯特家族的盟友，試圖南下進軍倫敦。約克公爵理查率兵北上迎擊。由於出兵倉促，這支部隊不僅人數少於對手，補給也十分匱乏。約克公爵理查在第一次交手時便落入了下風，不得不退守桑德爾城堡等待支援。
stage_intro_1606=約克公爵理查在韋克菲爾德平原戰敗後被殺，他的兒子愛德華四世繼承了他的爵位。儘管愛德華四世此時只有18歲，但是他卻展現出了超出年齡的領導與指揮能力。在約克公爵理查敗亡僅僅一個月後，愛德華四世便率領軍隊在莫蒂默十字與蘭開斯特家族的軍隊發生了激戰。
stage_intro_1607=莫蒂默十字戰役結束後，趁著愛德華四世在赫裡福德重整部隊的當口，瑪格麗特王后的盟友們迅速指揮部隊由北向南進攻。僅僅半個月的時間，這支數萬人的大軍便已逼近倫敦，造王者沃里克率兵前往迎戰。時隔六年，雙方在聖奧爾本斯再次爆發了激戰。
stage_intro_1608=儘管瑪格麗特的軍隊在聖奧爾本斯取得了勝利，但是由於軍隊在戰後的一系列暴行，倫敦的市民們拒絕迎接他們進城，不久推舉愛德華四世為新國王。憤怒的瑪格麗特召集了英格蘭北部地方幾乎所有反對約克家族的勢力，試圖將愛德華四世徹底消滅，一場英國本土最為殘酷的戰役即將打響。
stage_intro_1609=陶頓戰役中，愛德華四世擊敗了大多數反對他的蘭開斯特派。在接下來的數年中，愛德華四世通過多種手段試圖和以前的敵人化敵為友，其中包括他曾經的死敵，薩默賽特公爵亨利·博福特。1463年底，薩默賽特公爵再次掀起反叛。愛德華四世命令約翰·內維爾前往平叛，這一次，他要將薩默賽特公爵徹底消滅。
stage_intro_1610=在赫奇利沼澤戰敗的薩默賽特公爵撤退到了赫克瑟姆沿岸。他將軍隊分成了三處，試圖修築工事來將追兵擋在赫克瑟姆以南。但是約翰·內維爾的追擊速度非常快，他並不打算給薩默賽特公爵喘息的機會。

campaign_desc_16=1453年7月，卡斯蒂永戰役失利的消息使英王亨利六世在震驚中瘋病發作，失去了治國能力。英格蘭國內的蘭開斯特和約克兩大家族為了爭奪最高權力發生衝突，進而演變為戰爭。由於兩大家族的徽章分別為紅玫瑰和白玫瑰，因此這場戰爭也被稱為“玫瑰戰爭”。
campaign_desc_17=愛德華四世成為英格蘭國王之後，努力與曾經的敵人們和解，為英格蘭帶來了短暫的和平。但是愛德華四世的和解政策使他和原來的盟友們的關係產生了裂痕。1469年，愛德華四世曾經最忠實的部下——造王者沃里克起兵反叛，給英格蘭帶來了新一輪的動盪。

campaign_end_desc_16=經赫克瑟姆一役，蘭開斯特家族的軍事力量基本被消滅殆盡，約克家族成為了英格蘭的統治者。與以往不同的是，愛德華四世並沒有親自上陣指揮這場戰鬥，因為此時的他還有更重要的事情——暗中籌備和一位女子的婚禮。這位女子的名字叫做伊莉莎白·伍德維爾，後來人們通常稱呼她為“白皇后”。
campaign_end_desc_17=戰爭結束的同時，也結束了金雀花王朝在英格蘭的統治，開啟了威爾士人的都鐸王朝。這也標誌著在英格蘭中世紀時期的結束，並走向新的文藝復興時代。

general_desc_Manuel I=十二世紀時的拜占庭帝國皇帝，在其統治期間，科穆寧王朝迎來了最後一次興盛，帝國的軍事和經濟實力得到恢復，文化也走向繁榮。

