stage_intro_4701=哈立德是西元7世紀時阿拉伯的優秀指揮官，在他追隨穆罕默德之後獲得了“安拉之劍”的稱號。
stage_intro_4703=633年，穆罕默德的繼任者拉西頓哈裡發與薩珊波斯王朝發生邊境衝突，哈立德受命出擊。由於戰役中波斯軍隊使用鎖鏈將騎兵相連，因此這場戰役也被稱為“鎖鏈之戰”。
stage_intro_4705=鎖鏈之戰的失利使薩珊王朝不再輕敵，他們派出了兩支大軍試圖將哈立德一舉殲滅。但是哈立德搶在兩支軍隊會合之前包圍了其中一部，獲得了戰場的主動權。
stage_intro_4707=634年，連戰連捷的哈立德受命回撤，轉而向西進軍。他的新對手是被稱為拜占庭帝國中興之主的希拉克略。
stage_intro_4709=636年，此前戰敗的希拉克略重新集結一支大軍逼近敘利亞，哈立德率兵前往迎戰。雙方在耶爾穆克河附近展開了長達6天的殘酷戰鬥。
stage_intro_4711=耶爾穆克戰役勝利後，哈立德乘勝追擊，成功包圍並佔領了軍事重鎮阿勒頗，這也意味著希拉克略遠征的徹底失敗。

