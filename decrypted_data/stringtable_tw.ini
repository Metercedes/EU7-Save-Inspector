;战役介绍
stage_intro_1=初級教程關卡，以入門操作為主，對移動、攻擊等基礎操作進行教學。
stage_intro_2=進階教程關卡，以進階操作為主，對招募、解散、補充和混編部隊等操作進行教學。
stage_intro_3=中級教程關卡，對城市、城堡的建設操作，雇傭軍的招募等操作進行教學。
stage_intro_4=高級教程關卡，以器械的裝載使用，輔助建築的功能介紹為主。
stage_intro_101=西元376年，西哥特人向羅馬帝國尋求庇護，希望以此躲避匈人的侵襲，但渡過多瑙河後卻與境內的羅馬人爆發了諸多衝突，最終雙方在瑪律恰諾波利斯展開了戰鬥。
stage_intro_102=西元378年，反叛的哥特人在洗劫多瑙河各省後，準備聯合其他蠻族入侵巴爾幹半島。羅馬皇帝瓦倫斯決定親自出征，但其麾下士兵的戰力參差不齊，是這次鎮壓叛亂作戰的最大隱患。
stage_intro_103=西元402年，西哥特人在國王阿拉裡克的帶領下，持續入侵西羅馬帝國腹地，不久之後更是包圍了重鎮米蘭，這讓皇帝霍諾留寢食難安，因此急令正在帝國北部的斯提裡科率兵南下。
stage_intro_104=西元410年，阿拉裡克在與霍諾留約定的會面地點遭到了羅馬軍隊的襲擊，這次襲擊讓他決定放棄與西羅馬帝國談判，並再一次圍攻羅馬城，這座“永恆之城”在被多次圍攻之後顯得搖搖欲墜。
stage_intro_105=西元419年，剛與西羅馬帝國簽訂盟約的蘇維匯王國便因邊境歸屬問題，頻頻與鄰國汪達爾王國爆發衝突，有著極強征服欲的蘇維匯國王赫默里克決定主動入侵汪達爾人的領地。
stage_intro_106=西元439年，蓋薩里克率領軍隊橫穿直布羅陀海峽並佔據西羅馬帝國北非大半領地已經8年。在與西羅馬帝國保持近5年的和平後，蓋薩里克再次盯上了迦太基城——羅馬帝國的第三名城。
stage_intro_107=西元451年，野心勃勃的匈王阿提拉決定借著西羅馬宮廷醜聞的機會出兵入侵高盧地區。身在高盧的羅馬將軍埃提烏斯也趁機聯絡高盧地區的蠻族王國組成聯軍，準備抗擊匈人的侵略。
stage_intro_108=西元455年，馬克西穆斯通過謀害皇帝瓦倫提尼安三世篡位，這破壞了汪達爾國王蓋薩里克與後者的聯盟，在收到歐多西婭皇后的求援後，蓋薩里克決定出兵進攻義大利。
stage_intro_201=西元6世紀，歐洲各國已經逐漸認識到騎兵的重要性。530年，波斯人向拜占庭帝國發動了攻擊，達拉城外，薩珊王朝的精銳騎兵已經全部就位。
stage_intro_202=查士丁尼一世無時無刻不想重現羅馬昔日的輝煌，而蓋利摩的篡位奪權恰好給了他出兵北非的藉口。西元533年，貝利撒留帶領部隊登陸北非，向迦太基進軍。
stage_intro_203=拜占庭在十裡會戰中取得巨大勝利後，貝利撒留和他的軍隊佔領了迦太基。身處迦太基以西的蓋利摩則向他的兄弟求援，準備重新集結軍隊，奪回迦太基。
stage_intro_204=重新征服北非後，查士丁尼一世將目光投向了義大利地區。西元535年，貝利撒留帶領他的軍隊再一次出征，為他的皇帝佔領羅馬，奪回義大利地區。
stage_intro_205=佔領羅馬後，通往拉文納的道路對拜占庭來說幾乎暢通無阻。貝利撒留帶領著他的部隊繼續進軍，東哥特王國的首都即將面對拜占庭軍隊的大舉進攻。
stage_intro_206=由於東哥特國王托提拉的活躍，查士丁尼一世不得不將貝利撒留重新派往義大利地區。西元546年，托提拉的部隊來到羅馬，並包圍了這座城市。
stage_intro_207=托提拉在義大利地區的持續侵略令帝國損失慘重，他還計畫利用艦隊封鎖海域，防止帝國軍隊輕易進入義大利地區，這些舉動讓查士丁尼一世十分不滿。
stage_intro_208=為了奪回義大利的控制權，查士丁尼一世決定派遣納爾西斯前往義大利。與納爾西斯相遇後，儘管兵力處於劣勢，但作為傳統哥特人的托提拉依舊選擇主動發起進攻。
stage_intro_209=納爾西斯的進攻讓哥特人難以抵擋，東哥特國王決定向法蘭克人和阿勒曼尼人求援，希望他們能進入義大利地區，阻止拜占庭軍隊的進攻。
stage_intro_210=西元559年，一群匈人越過邊境，在君士坦丁堡城郊肆意作惡，這對查士丁尼一世來說簡直是奇恥大辱。他再一次將貝利撒留召到面前，賦予他最後一項使命。
stage_intro_301=盎格魯-撒克遜人的到來讓不列顛的原住民恐慌不已，面對裝備精良且訓練有素的敵人，不列顛人不得不拿起武器抗擊盎格魯-撒克遜人的入侵。
stage_intro_302=南撒克遜部落首領埃爾率領其部民在不列顛島南海岸成功登陸，但向內陸的進軍並不順利，他們遭到了當地人的頑強抵抗，這讓埃爾意識到自己兵力的不足，並向仍在本土的部落請求增援。
stage_intro_303=連年戰亂的影響下，不列顛散亂的部族開始整合並建立起各自的王國，但這並未給不列顛帶來和平和穩定，部族間的戰鬥逐漸演變為以諾森布裡亞王國為首的王國間更大規模且殘酷的戰爭。
stage_intro_304=西元633年，愛德溫治理下的諾森布裡亞王國是當時英格蘭地區最為強盛的國家，這引起了鄰國的忌憚，格溫內斯國王卡德瓦龍決定與麥西亞王國結盟，並組建聯軍入侵諾森布裡亞王國。
stage_intro_305=雖然成功抵禦了格溫內斯王國與麥西亞王國聯軍的入侵，但諾森布裡亞王國也遭受了極其嚴重的破壞，王國更是一度分裂。西元634年，格溫內斯國王卡德瓦龍再次出兵進犯諾森布裡亞王國。
stage_intro_306=奧斯維德的回歸與繼位，使諾森布裡亞軍隊得以戰勝格溫內斯王國，王國再次得到了和平與穩定。西元644年，隨著十年來國力逐漸恢復，奧斯維德決定主動進攻麥西亞王國。
stage_intro_307=奧斯維德對麥西亞的入侵以慘敗告終，彭達決定趁此機會聯合東盎格利亞王國與格溫內斯王國將戰火引向諾森布裡亞本土。西元655年，諾森布裡亞王國只剩伯尼西亞還未被聯軍攻佔。
stage_intro_308=長久以來，麥西亞王國通過強行控制英格蘭南部的諸多王國來維持其霸主地位。西元825年，貝恩沃夫為了鞏固自己的權威，親自率軍入侵威塞克斯王國，威塞克斯國王埃格伯特奮起反擊。
stage_intro_401=由於使者被伽珊尼德所害，阿拉伯人決定發起報復行動，而這一行動的計畫卻被拜占庭得知，並立刻集結了要塞的駐軍。在強大的拜占庭軍隊面前，阿拉伯人的行動似乎註定會失敗。
stage_intro_402=哈立德帶領部隊來到瑪姬·拉希特時，伽珊尼德人認為阿拉伯人無法對他們構成威脅，但阿拉伯人很快就用行動證明了他們的戰力是無與倫比的強大。
stage_intro_403=阿布成為阿拉伯第一位哈裡發後，開始試圖將勢力擴展到阿拉伯半島以外。阿拉伯軍隊一路向北推進，並對大馬士革發起了進攻。
stage_intro_404=為了阻止阿拉伯人前進，奪回失去的領土，希拉克略決定向黎凡特派遣一支大規模的軍隊。隨著敵人的逼近，阿拉伯人從大馬士革撤退，並在雅爾穆克重新集結了部隊。
stage_intro_405=在雅爾穆克平原與拜占庭軍隊交戰後，阿拉伯人決定繼續推進，並佔領更多的城市。西元636年末，阿拉伯軍隊來到了耶路撒冷，並包圍了這座城市。
stage_intro_406=阿拉伯人的征服依然在繼續，他們的部隊在安納托利亞半島上所向披靡。接連的戰敗和城市的丟失讓拜占庭帝國感到了恐慌，他們急需戰勝這一強敵的辦法。
stage_intro_407=戰勝了薩珊王朝後，奧馬爾決定帶領他的阿拉伯戰士們向非洲進軍。阿拉伯人計畫以埃及為起點，佔領更多的非洲土地作為自己的領土。
stage_intro_408=在徹底結束了薩珊王朝的統治後，阿拉伯人將拜占庭帝國列為了主要的敵對目標，為此，他們建立了一支強大的海軍，來支援他們在地中海地區對抗拜占庭帝國的行動。
stage_intro_501=西元865年，一支維京人大軍跨過大海，在不列顛的土地上登陸，並對沿海的修道院等財富中心進行了突襲和劫掠。
stage_intro_502=維京人入侵以來，東盎格利亞和諾森布裡亞兩大王國已經接連被佔領，而維京人的下一個目標，則是佔領威塞克斯王國。
stage_intro_503=在雷丁戰役中獲得優勢的維京部隊繼續向前推進，並在阿什當地區再次與威塞克斯軍隊發生了戰鬥。
stage_intro_504=經過長達數十年的入侵和劫掠，只有包括威塞克斯王國在內的為數不多的勢力依舊在阿爾弗雷德的帶領下抵抗著維京人的入侵。
stage_intro_505=西元893年，重新登陸不列顛的維京人再一次與盎格魯-撒克遜人發生了衝突，而隨著戰術的改變，維京人的入侵已經鮮有成效。
stage_intro_506=西元937年，北方三王國結成聯盟，希望摧毀英格蘭不斷增長的力量。面對敵人的入侵，艾瑟爾斯坦國王集結了一支軍隊並向北進軍。
stage_intro_507=為了爭奪英格蘭的王位，挪威國王哈樂德·哈拉爾與他的盟友決定集結軍隊向約克郡進軍。
stage_intro_508=由於英格蘭國王懺悔者愛德華的去世，覬覦王座的人開始躁動不安，其中來自挪威的哈拉爾便帶領自己的部隊，向英格蘭發動了進攻。
stage_intro_601=拜占庭帝國和保加利亞帝國的戰事連年不斷。西元811年，尼基弗魯斯一世率軍攻打保加利亞，在連續取得勝利後，他決定向普利斯卡進軍。
stage_intro_602=普利斯卡戰役之後，拜占庭帝國和保加利亞帝國雙方都遭受了重大的損失，但是保加利亞帝國依舊保持著激進的攻勢。儘管損失慘重，拜占庭帝國依舊拒絕簽署和平協定。
stage_intro_603=米海爾二世繼位後，一位名叫湯瑪斯的軍官決定反抗他的統治，這一舉動贏得了很多人的支持，在眾人的支持下，他聯合阿拉伯人向君士坦丁堡發動了攻擊。
stage_intro_604=為了報復拜占庭教士被驅逐的行為，利奧六世決定將保加利亞商人驅逐出君士坦丁堡。這給了西蒙一世發動戰爭的藉口，而此時拜占庭軍隊的主力正在東線抗擊阿拉伯人。
stage_intro_605=成為攝政王後，佐伊決定不再對保加利亞帝國讓步，這一舉動再次讓西蒙一世向拜占庭帝國發動攻擊。由於西蒙一世的一系列舉措，拜占庭人被迫獨自作戰。
stage_intro_606=西元922年，保加利亞人已經控制了大半個巴爾幹地區，但由於缺乏海軍，無法對君士坦丁堡造成威脅。保加利亞人決定聯合阿拉伯人，但卻被拜占庭人的及時出兵阻止了。
stage_intro_607=在結束了與阿拉伯人的戰鬥後，拜占庭帝國在短時間內恢復了實力，並迅速擊敗了保加利亞帝國。但是這卻讓基輔羅斯趁虛而入，巴爾幹半島再次出現了一個新的強大的敵人。
stage_intro_608=西元971年，保加利亞人的戰敗使得拜占庭人得以佔據了大片保加利亞土地，為了奪回自己的土地，多年以來保加利亞人持續發動著進攻。
stage_intro_609=圖拉真之門戰役後，拜占庭帝國爆發了內戰。撒母耳決定利用這一局勢對拜占庭帝國發動攻擊。西元996年，撒母耳擊敗了塞薩洛尼卡的拜占庭軍隊，並開始向南進軍。
stage_intro_610=從1000年開始，拜占庭皇帝巴西爾二世開始發兵保加利亞。儘管雙方互有勝負，但拜占庭還是打到了兩國邊界。一場中興的拜占庭帝國和衰落的保加利亞之間的惡戰不可避免。
stage_intro_701=1066年，諾曼第公爵為了取得英格蘭王位，帶領部隊跨過海峽，在英格蘭登陸。當哈樂德二世得知消息後，立刻召集軍隊南下，在赫斯廷斯附近，佈置守軍。
stage_intro_702=在赫斯廷斯戰勝哈樂德二世後，威廉帶領部隊來到了倫敦。為了保證倫敦的安全，他派遣一支隊伍來到了南華克，希望能夠消滅那裡的抵抗勢力。
stage_intro_703=成功征服英格蘭後，身處埃克塞特的人們宣佈拒絕向威廉效忠。為了讓埃克塞特人服從他的統治，威廉帶領部隊包圍了這座城市，但卻遭到了強烈的抵抗。
stage_intro_704=儘管得到了大多數人的支持，但依舊存在抵抗勢力，反抗著威廉的統治，他們大多集中在北方。威廉決定帶領部隊北上，他認為無法通過和平的方式取得這些人的效忠。
stage_intro_705=1075年，回到諾曼第的威廉拒絕承認艾瑪和拉爾夫的婚姻，他的這一舉動引起了三位伯爵的反抗起義運動，他們決定趁威廉身處諾曼第，抵抗並推翻他的統治。
stage_intro_706=1105年，亨利一世帶領部隊入侵諾曼第公爵羅貝爾的領地，並佔領了巴約和卡昂。次年，亨利一世返回諾曼第，莫爾坦伯爵作為效忠羅貝爾的貴族之一，成為了他的首要目標。
stage_intro_707=1119年，法蘭西國王路易六世帶領部隊進攻諾曼第。為了捍衛自己在諾曼第的財產與領土，亨利一世被迫與法蘭西交戰。
stage_intro_708=1135年，亨利一世的突然病亡讓英格蘭陷入了無政府的混亂狀態。斯蒂芬和亨利一世的女兒瑪蒂爾達帶領各自的勢力，為了爭奪英格蘭王位而展開了鬥爭。
stage_intro_801=1048年，一支由塞爾柱王子帶領的軍隊進入了拜占庭帝國統治的亞美尼亞地區，由於自身兵力不足，拜占庭人決定採用保守的策略，並等待援軍的到來。
stage_intro_802=1071年，逐漸弱勢的拜占庭帝國決定利用塞爾柱專心對抗埃及法蒂瑪軍隊的機會，讓拜占庭大軍突襲亞美尼亞，收付先前所失去的土地和要塞。
stage_intro_803=塞爾柱帝國在愛琴海地區的活動持續威脅著拜占庭帝國，阿萊克修斯決定組建一支艦隊來對抗塞爾柱帝國的海軍，重新奪回愛琴海地區的控制權。
stage_intro_804=強勢的塞爾柱人讓拜占庭帝國無法抵擋，皇帝阿萊克修斯決定向西方求援。在拜占庭軍隊的協助下，東征大軍跨過大海，將首戰的目標指向了尼西亞。
stage_intro_805=隨著更多拜占庭援軍的加入，東征軍隊的戰鬥力愈發強大，此時的東征大軍正在趕往安條克，這座城市位於君士坦丁堡至耶路撒冷半程的位置上。
stage_intro_806=為了加強安納托利亞前線的防禦，病情好轉的阿萊克修斯決定親自前往戰場。他的軍隊多次擊敗了塞爾柱人，並在獲得增援後，再次向敵人發起了進攻。
stage_intro_807=1176年，拜占庭皇帝曼努埃爾一世在解除匈牙利和塞爾維亞的西方威脅之後，決定集中精力對付東方的羅姆蘇丹國，並希望能收復安納托裡亞草原。
stage_intro_808=曼努埃爾一世失去了一個收復安納托利亞的絕佳機會，並失去了大批攻城器械。此時，一支劫掠後正在返程的塞爾柱人軍隊讓他看到了勝利的希望。
stage_intro_901=在攻克了塞爾柱人的首都尼西亞後，遠征軍遭到了猛烈的反攻。阿爾斯蘭一世帶領大量的部隊，將博希蒙德一世的部隊團團包圍。
stage_intro_902=在成功佔領了安條克後，東征大軍一路高歌猛進，繼續向著耶路撒冷前進。同時駐守耶路撒冷的阿拉伯將領道拉也早已做好了防守的準備。
stage_intro_903=第一次十字軍東征的勝利讓西方領主們品嘗到了勝利的喜悅，並決定再次發起東征行動，這一次，他們的首要目標則是大馬士革。
stage_intro_904=阿卡地理位置優越，是薩拉丁統治範圍內一座非常重要的城市，當薩拉丁得知居伊再次集結部隊來到阿卡城外時，他立刻集結了軍隊前往攔截。
stage_intro_905=為了奪回被薩拉丁奪取的耶路撒冷，西歐領主們再一次組織起了東征軍隊，當大軍進入安納托利亞時，卻遭到了塞爾柱人的猛烈攻擊。
stage_intro_906=獅心王理查從耶路撒冷撤軍後，薩拉丁決定向雅法發動攻擊，他認為這是一個復仇的機會。得知消息的獅心王再次集結了軍隊，向薩拉丁發起了進攻。
stage_intro_907=當東征軍隊為前往耶路撒冷做準備時，他們的領導人答應了阿萊克修斯四世的請求，決定前往君士坦丁堡，幫助他的父親奪回皇位。作為報酬，拜占庭帝國將會為他們提供經濟和軍事上的援助。
stage_intro_908=經過長期的戰鬥，東征軍開始認為埃及是阻礙他們重新奪回耶路撒冷的最大障礙。於是，他們決定組織軍隊，穿越地中海，向埃及發動攻擊。
stage_intro_1001=由於威爾士的公開叛亂行為，亨利二世不得不從諾曼第返回英格蘭。為了懲罰和阻止威爾士人，1165年，亨利二世集結了一支龐大的軍隊，向威爾士人發起了進攻。
stage_intro_1002=為了爭奪英格蘭王位的繼承權，亞瑟和約翰進行了長期的鬥爭。在約翰決定與伊莎貝拉結婚後，這一平衡被逐漸打破，休十世和腓力二世的加入使得局面變得混亂不堪。
stage_intro_1003=由於約翰的拒不配合，腓力二世表示要親手奪回諾曼第的土地，不久之後便開始了他的行動。1203年，腓力二世出兵蓋拉德城堡，他認為這是控制整個諾曼第的關鍵。
stage_intro_1004=1213年，由威廉·朗格斯佩率領的英格蘭艦隊在偶然之下發現了一支法蘭西艦隊，而法蘭西的船員們則早已登陸並開始了他們的劫掠。面對無人艦隊，英格蘭的勝利仿佛唾手可得。
stage_intro_1005=1214年，一支由英格蘭王國、神聖羅馬帝國、弗蘭德伯國所組成的聯軍向法蘭西王國發起了進攻，匆忙之下腓力二世迅速集結了大軍。儘管聯軍聲勢浩大，但訓練有素的法蘭西騎兵似乎並不落下風。
stage_intro_1006=亨利三世統治時期，英格蘭國內的饑荒日益加劇，這使得貴族們對亨利三世的不滿也日益加劇。一場由西蒙·德孟福爾所領導的反抗亨利三世統治的戰爭即將到來。
stage_intro_1007=在愛德華一世的監督之下，蘇格蘭選出了新的國王。愛德華一世認為蘇格蘭應成為英格蘭統治之下的侯國，並要求幫助英格蘭對抗法蘭西，而蘇格蘭人則反對了這一要求，並與法蘭西結盟。
stage_intro_1008=在威廉·華萊士的帶領下，蘇格蘭軍隊持續向英格蘭發動攻擊。1298年，愛德華一世決定與法蘭西王國休戰，並返回英格蘭專心對抗蘇格蘭軍隊。
stage_intro_1009=福爾柯克戰役獲得勝利之後，蘇格蘭幾乎被英格蘭所征服。1306年，羅伯特·布魯斯取得蘇格蘭王位，在愛德華一世病逝後，愛德華二世的領導能力並不如人意，這使得整個戰局發生了逆轉。
stage_intro_1010=1323年，羅傑·莫蒂默從倫敦塔逃離後與伊莎貝拉相識。雙方都對愛德華二世十分不滿，並決定反抗他的統治。1326年，伊莎貝拉與莫蒂默秘密返回英格蘭，並開始了他們的反抗行動。
stage_intro_1101=君士坦丁堡淪陷後，尼西亞帝國和伊庇魯斯專治國成為了最大的兩個拜占庭流亡政權，並且他們都希望能夠率先光復拜占庭帝國，但這一共同的目標卻成為了兩個政權衝突的根源。
stage_intro_1102=尼西亞帝國在與伊庇魯斯專治國的爭奪中獲得了最後的勝利，在雄心勃勃的米海爾八世的帶領下，尼西亞帝國將目光投向了盤踞在君士坦丁堡的拉丁帝國。
stage_intro_1103=1261年，尼西亞帝國與熱那亞共和國結為同盟，並準備再一次向君士坦丁堡發起進攻。當發現拉丁駐軍和威尼斯艦隊遠征未歸時，他們決定不能浪費如此千載難逢的機會。
stage_intro_1104=重新建立拜占庭帝國後，米海爾八世力求肅清周邊拉丁帝國的殘餘勢力。1263年，拜占庭軍隊向亞該亞侯國發動了進攻，在佔領其首都時，卻遭到了頑強的抵抗。
stage_intro_1105=普裡尼察戰役的失敗使得拜占庭帝國在摩裡亞的戰事愈發被動，雇傭軍叛逃、部隊分散的問題十分嚴重。1264年，在威廉二世帶領下，拉丁帝國軍隊對分散的拜占庭軍隊發起了進攻。
stage_intro_1106=1274年，拜占庭帝國對色薩利的約翰發起了進攻，面對龐大的拜占庭軍隊，約翰·杜卡斯只能選擇向外求援。
stage_intro_1107=為了維持帝國對愛琴海的控制權，拜占庭帝國重新組建了海軍。但摩裡亞和塞特波茲戰役的失敗讓軍隊遭到了沉重的打擊，這也使得拉丁貴族決定進攻德米特裡阿斯港口的拜占庭海軍。
stage_intro_1108=對安茹西西里王國來說，培拉特是一座極具戰略意義的要塞城市。1280年，為了防止敵人能夠輕易進入拜占庭帝國的重要地帶，拜占庭帝國派出軍隊對培拉特發起了進攻。
stage_intro_1201=1302年，米海爾九世的軍隊因畏懼鄂圖曼人而宣告解散，這迫使安德洛尼卡二世派遣一支軍隊渡過博斯普魯斯海峽，前去支援尼科米底亞正面臨的嚴峻局勢。
stage_intro_1202=1321年，年輕的安德洛尼卡三世認為祖父過於老邁，應該由自己來接掌皇帝的寶座，祖孫二人隨即展開內戰。鄂圖曼人決定趁此機會攻佔普魯薩城。
stage_intro_1203=從拉丁帝國手中奪回君士坦丁堡後，拜占庭人集中了太多精力用以恢復對希臘地區的控制，並為此召回了安納托利亞東部前線的部隊，這一舉動使得鄂圖曼帝國向其發動了新一輪的攻擊。
stage_intro_1204=1329年，拜占庭在安納托利亞的控制區域已經急劇縮水，為了穩定周邊區域，安德洛尼卡三世決定派遣軍隊前往尼科米底亞，但軍隊在佩萊卡農卻遭到了鄂圖曼軍隊的攔截和攻擊。
stage_intro_1205=拜占庭的內亂幾乎讓拜占庭土崩瓦解，約翰六世為了營救自己兒子向鄂圖曼帝國求助，而他們將要面對的是塞爾維亞帝國以及保加利亞第二帝國的聯軍。
stage_intro_1206=1352年，拜占庭再次陷入內戰，作為雇傭軍的鄂圖曼人獲得了加里波利附近的要塞控制權。1354年，一場地震徹底改變了加里波利的局面。
stage_intro_1207=鄂圖曼帝國在1352年在巴爾幹半島佔領了第一個堡壘後開始迅速擴張在歐洲的土地，保加利亞皇帝伊凡亞歷山大決定阻擊這支軍隊進攻的步伐。
stage_intro_1208=佔領加里波利後，鄂圖曼帝國在巴爾幹南部的擴張更為迅速。在經過了一系列動盪和修整後，鄂圖曼帝國決定向拜占庭帝國的第三大城市阿德里安堡發起進攻。
stage_intro_1301=1337年，法蘭西議會決定從英格蘭手中收回阿基坦公國，雙方的矛盾一觸即發。為了奪取英吉利海峽的制海權，愛德華三世親自率領艦隊，向法蘭西海軍的艦隊發動攻擊。
stage_intro_1302=在奪取制海權後，愛德華三世帶領部隊從朴茨茅斯出發，在到達法國北岸後開始進攻。強大的法軍已經做好了防守的準備，雙方軍隊即將在克雷西周邊遭遇。
stage_intro_1303=克雷西會戰的勝利讓愛德華三世欣喜不已，英軍乘勝追擊決定佔領加萊，攻下這裡就獲得了歐洲大陸的橋頭堡，但沒有想到戰事如此艱難。
stage_intro_1304=1346年9月，在英格蘭大軍圍攻加萊之時，腓力六世急請大衛二世出兵進攻英格蘭，希望能迫使愛德華三世分兵回救本土。大衛面對著與法國長期的老同盟關係，決定出兵侵略英格蘭。
stage_intro_1305=布列塔尼處於非常重要的地理位置，布列塔尼的繼承權之戰讓英法兩國都牽扯到了裡面，誰都想布列塔尼傾向自己，來獲得戰場上的優勢。
stage_intro_1306=1356年，黑太子愛德華成為了英軍的騎兵統帥，帶領英軍在法國的土地上施行焦土政策，並獲得了相當大的成功。約翰二世為了向黑太子報復，決定增加行軍速度，以追上英軍。
stage_intro_1307=法國國王約翰二世在普瓦捷戰役中被俘，之後割讓了大片領土給英格蘭，而愛爾華三世的野心不止於此，他決定發動遠征，在蘭斯加冕為法國國王！
stage_intro_1308=雖然法國已經滿目瘡痍，但國不可一日無君，查理王子決定前往蘭斯加冕為王，愛德華三世決定切斷巴黎至蘭斯之間的道路，來阻止這次加冕之禮。
stage_intro_1309=莫龍戰役後，布列塔尼繼承者之間停戰了很久，但雙方在英法的支持下蓄力已久，他們都做好了決戰的準備。
stage_intro_1310=1369年10月非高級貴族的貝特朗被查理五世任命為新陸軍統帥，這個打破慣例的舉動讓法王獲得了回報！隨著冬季的到來，英軍內部就如何過冬的問題再度產生了爭執。法國軍隊趁此機會，向英軍發動了進攻。
stage_intro_1311=1372年，為了回應1368年建立的法蘭西-卡斯提利亞同盟，卡斯提利亞國王派遣艦隊前往阿基坦協助法軍。艦隊在拉羅歇爾外海遭遇了正在前往法蘭西的英格蘭艦隊。
stage_intro_1312=晚年的愛德華三世無心戰事，黑太子愛德華的去世更讓他失去了信心，他的另一個兒子岡特的約翰擔任了司令官，在法國進行了多次騎行燒掠，給法國民眾帶來了極大損失。
stage_intro_1401=查理六世已成瘋王，王室之間鬥爭也越來愈烈，法國權力歸屬的不穩定，讓年輕的亨利五世獲得了機會，1415年他決定沿襲曾祖父進攻的路線征服法國，成為兩國國王。
stage_intro_1402=亨利五世在法國的勝利並沒有給英國帶來多少實際收益，國會給予的支持越來越少，他決定佔領盧昂獲得更多法國的領地。
stage_intro_1403=兩黨的鬥爭讓法國徹底分裂，無畏的約翰被刺殺，讓勃艮第公國徹底倒向了英國，《特魯瓦條約》的簽署也讓亨利五世成為名義上的法王繼承人。而此時查理王儲獲得了蘇格蘭的支援，大戰在不經意間觸發。
stage_intro_1404=博熱戰役的勝利，讓查理王儲欣喜，法國貴族們準備乘勝奪回更多失地。而亨利五世此時也計畫著新一輪的進攻。
stage_intro_1405=亨利五世和查理六世已經去世2年，查理七世還未加冕，而亨利六世因為年幼，由貝德福德公爵攝政。2年間雙方衝突不斷，各有勝負，都意圖將對方主力一次性消滅。
stage_intro_1406=與英軍淩厲攻勢形成鮮明對比的是法國政府的遲鈍反應，缺乏戰鬥資金，貴族各自為政，勝利的天平始終沒有傾向法國，連續的打擊幾乎讓查理七世絕望。
stage_intro_1407=奧爾良如果被英軍攻佔，那法國中部最後一道屏障將被打破，這是查理七世的至暗時刻，但上帝給予了這個岌岌可危的國家一束光，一位名叫貞德的少女站了出來。
stage_intro_1408=奧爾良成功解圍的消息振奮了整個法國，法軍在聖女貞德的激勵下厲兵秣馬準備清除整個盧瓦爾河谷的所有英軍據點。
stage_intro_1409=聖女貞德希望查理七世放棄進攻諾曼第的計畫，前往蘭斯加冕。從而進一步削弱英軍的士氣。英軍調集了原先援助胡斯戰爭的精兵前來阻擊。
stage_intro_1410=因為支援不足，聖女貞德在貢比涅之戰中被俘並在2年後犧牲，這激起了她戰友的復仇，就連法國底層民眾也參與到這場鬥爭之中。
stage_intro_1411=1435年，攝政王貝德福德公爵的去世讓英國失去了勃艮第公國這個盟友，諾曼第的領地處於混亂狀態，查理七世決定乘此機會收復巴黎。
stage_intro_1412=儘管1435-1436年間對法戰爭中付出了巨大的代價，英國依然不願意和勃艮第修好，勃艮第公爵決定站到了英國的對立面，攻佔加萊。
stage_intro_1413=法國在查理七世統治下獲得了極大的恢復，而英國人在法蘭西最後的領土只剩下諾曼第和吉耶訥-加斯科涅地區，英格蘭從本土支援了大量兵力決定背水一戰。
stage_intro_4001=阿提拉被作為人質在羅馬受到過良好的教育，當他回到部族後，開始帶領他強悍的部族走向更曠闊的土地。
stage_intro_4003=拜占庭似乎打錯了算盤，想用納貢讓阿提拉停止進攻，但是狼是喂不飽的，胃口只會越來越大。阿提拉的大軍沿途燒殺搶掠，他被當時的人稱為“上帝之鞭”。
stage_intro_4005=匈人的鐵騎在橫掃巴爾幹半島後對君士坦丁堡進行了圍攻，但這兩層城牆似乎牢不可破。
stage_intro_4007=羅馬皇帝的妹妹竟然想要用帝國一半的疆域作為嫁妝嫁給阿提拉，雖未成功，但這讓阿提拉有了進攻羅馬的藉口。
stage_intro_4009=阿提拉帶著號稱50萬匈人大軍渡過萊茵河，面對他的是羅馬最強的將領埃提烏斯。他遭遇了他人生中最大的慘敗。
stage_intro_4011=阿提拉並未放棄，他翻越阿爾比斯山直接進攻了羅馬。阿提拉的大軍如何被教皇利奧一世勸退依舊是個謎團，但也讓阿提拉成為了一個傳奇。
stage_intro_4021=年紀不到24歲的貝利撒留已經擔任了地方總督一職，除了他的妻子和皇后交情甚厚以外，他的帶兵能力也極其出色。
stage_intro_4023=貝利撒留在尼卡起義中的舉動讓查士丁尼一世對他信任有加，為了給帝國帶來更高的榮譽，貝利撒留接受了皇帝的命令，向迦太基出發。
stage_intro_4025=汪達爾人被征服後，貝利撒留的目標只剩下羅馬城，讓這個淪陷了百年的城市重回帝國的懷抱。
stage_intro_4027=查士丁尼一世在皇后的攛掇下對貝利撒留愈發不信任，貝利撒留只能用少量的士兵和補給為帝國奪回曾經失去的土地。
stage_intro_4029=義大利回到拜占庭疆域後，皇帝對貝利撒留的戒心更加強烈。為了讓他遠離帝國的政治中心，查士丁尼一世再一次下令，命令他對薩珊帝國發動戰爭。
stage_intro_4031=東哥特人重新奪取了羅馬以及義大利大部分的土地，而貝利撒留在飽受皇帝猜忌的情況下，只能再一次帶領少量的部隊前去收復失地。而這位戰神最終淒涼的黯然病逝。
stage_intro_4041=羅馬的衰落讓他們再也無力保衛自己的領土，撒克遜人崛起後，入侵了不列顛，而亞瑟和他的騎士們是唯一一支救民於水火的部隊。
stage_intro_4043=亞瑟帶著他的騎士們開始拔除海岸線上撒克遜的據點，勢如破竹的攻勢讓人們覺得他們擁有魔法。
stage_intro_4045=亞瑟身強力壯但溫文爾雅，他和他手下的圓桌騎士驍勇善戰，為凱爾特人以及威爾士人帶來了希望，在人民的擁護下加冕為國王。
stage_intro_4047=蘭斯洛特、高文、傑蘭特等圓桌騎士追隨著亞瑟王一路征戰，但蘭斯洛特和王后桂妮維亞卻傳出了緋聞，亞瑟選擇相信桂妮維亞。
stage_intro_4049=撒克遜人決定集中兵力和亞瑟王決一死戰，亞瑟王也帶領他的150多名騎士和當地的反抗軍到達了戰場。
stage_intro_4051=騎士莫德雷德在亞瑟王前去法蘭西時篡位，亞瑟王趕回不列顛和莫德雷德展開了大戰。雙方兩敗俱傷，亞瑟王在留下了諸多傳說後悄然而去。
stage_intro_4061=倫巴第王國將部隊集結在羅馬城下，教皇急忙向查理曼請求救援，查理曼決定分兵多路，奇襲倫巴第王國。
stage_intro_4063=讓蠻族歸於王國的版圖，查理曼為了傳播教義決定對薩克森地區進行征服。這裡民族眾多民風彪悍，並不是那麼容易臣服的。
stage_intro_4065=除了北面，西面的安達盧斯王國也是查理曼希望征服的疆域，查理曼的軍隊在這裡遭遇了伏擊，他手下無畏的騎士羅蘭犧牲於此。
stage_intro_4067=查理曼建立了大量的教堂，強迫薩克森人信教。但薩克森地區的叛亂讓查理曼怒不可遏，為了一勞永逸，查理曼再次派遣了大批軍隊。
stage_intro_4069=帝國疆域在不斷擴大，除了向西對布列塔尼地區進行了懲罰性戰爭，查理曼對東面的巴伐利亞也進行了征服。
stage_intro_4071=800年耶誕節，查理曼在聖彼得大教堂加冕為“羅馬人的皇帝”。之後查理曼又對東面的拜占庭、波西米亞、斯拉夫以及丹麥進行了征服，帝國的疆域到達了頂峰。
stage_intro_4241=維京人如暴風一般席捲了不列顛，這股兇殘的暴風帶走了大量的財富和生命，不列顛急需一位英雄來力挽狂瀾。
stage_intro_4243=雷丁戰役的失利並未擊潰人們的鬥志，在吸取了之前戰敗的經驗後，阿爾弗雷德用盾牆戰術擊敗了兇狠的維京人。
stage_intro_4245=老謀深算的維京人新領袖古斯倫以奇襲的方式直搗黃龍，攻擊了阿爾弗雷德的宮廷，獲得了大量補給，這讓阿爾弗雷德陷入了絕境。
stage_intro_4247=數月後阿爾弗雷德重振旗鼓，並調集了多地的軍隊對維京人的主力進行了報復，十字架和戰錘的決戰在埃丁頓一觸即發。
stage_intro_4249=阿爾弗雷德借鑒了維京長船的優點製造了新型戰艦，並組建了英格蘭歷史上第一支正規海軍，至此英格蘭海岸獲得了絕對防禦。
stage_intro_4251=892年，維京大軍再次進攻了英格蘭，但這次他們面對的是堅固的城堡。阿爾弗雷德大帝執政期間頒佈了法典，創建了學校，為英格蘭的統一奠定了基礎。
stage_intro_4261=基輔羅斯大公伊戈爾率軍攻打君士坦丁堡，作為維京人，他們歷來都是從海上進攻這座巨大的城市，但噴火戰船讓他們有來無回。
stage_intro_4263=基輔羅斯的失敗讓歸順他們的部落蠢蠢欲動，德列夫利安人首領瑪律偷襲並殺死了麻痹大意的伊戈爾，這也給自己帶來了滅頂之災。
stage_intro_4265=伊戈爾的遺孀奧爾加假意願意嫁給瑪律，瑪律信以為真，立刻迎娶了奧爾加，在婚禮最熱鬧非凡之時，奧爾加下令血洗婚禮。
stage_intro_4267=奧爾加並未放過其他的德列夫利安人，她火燒了他們的住所，並率領大軍攻佔了伊柯洛斯城。
stage_intro_4269=奧爾加接受了洗禮皈依了東正教，並將東正教帶入了基輔羅斯，但信奉雷神托爾的維京人並不領情，她的兒子斯維亞托斯拉夫進攻了拜占庭。
stage_intro_4271=奧爾加將東正教的種子種在了基輔羅斯，她還用石頭建造了基輔、諾夫哥羅德等大城市，基輔羅斯也從部落漸變為了王國。多年後她被追封為：“女聖人”。
stage_intro_4361=法蘭克王國在查理曼去世後分裂成三個王國，936年位於東法蘭克王國的奧托加冕為薩克森公爵和德意志國王。但他必須平定叛亂才能統一德意志。
stage_intro_4363=同父異母的兄弟亨利在被巴伐利亞公爵蠱惑後反叛，寬厚的奧托一世在擊敗他們後並赦免了他們，但這群人並沒有吸取教訓。
stage_intro_4365=奧托在和新的妻子生下孩子後，剝奪了長子魯道夫的王位繼承權，這讓德意志王國再次陷入了內戰。魯道夫甚至邀請了瑪律紮人一起襲擊父親。
stage_intro_4367=匈牙利的瑪律紮人趁德意志內戰，954年對歐洲進行了大規模的入侵，奧托一世立刻停止了內戰勢必要阻止這群入侵者。
stage_intro_4369=955年，瑪律紮人的主力和德意志的主力在萊赫費爾德相遇，這是一場生死存亡的大戰，戰敗的一方將成為歷史的塵埃。
stage_intro_4371=961年，教皇向奧托一世求援，奧托用1000騎兵擊敗義大利王國大軍，之後在羅馬加冕為神聖羅馬帝國皇帝。
stage_intro_4281=藍牙王哈拉爾之孫，丹麥王斯威恩之子克努特帶領著10000人駕駛著200艘長船從斯堪的納維亞半島前往英國，在那裡他要建立自己的王國。
stage_intro_4283=英格蘭國王艾德蒙的妹夫“貪婪者”伊德里克背叛了英格蘭人，投靠了克努特，這讓艾德蒙一直避免正面戰爭，在你追我趕的交鋒中雙方互有勝負。
stage_intro_4285=克努特3次嘗試進攻倫敦，在來回的拉鋸戰之中，讓丹麥人消耗很大，而艾德蒙卻從威爾塞斯獲得了新軍，伊德里克於是重新回到了英格蘭陣營。
stage_intro_4287=克努特決定回到海上，但前路被艾德蒙攔住，丹麥人在兵力弱勢的情況下發揮出了強大的戰鬥力，而“貪婪者”伊德里克的再次背叛，讓克努特反敗為勝。
stage_intro_4289=“剛勇者”艾德蒙在不久後因傷去世，克努特獲得了英國王位，而他的兄弟哈拉爾二世在丹麥去世，於是他帶領著英格蘭人去爭奪本屬於他的丹麥王位。
stage_intro_4291=如日中天的克努特大帝又發動大軍前往挪威和瑞典，甚至連蘇格蘭和愛爾蘭王也臣服於他。自此克努特大帝建立了從波羅的海到愛爾蘭的北海帝國。
stage_intro_4301=國王費爾南德一世去世，將自己的領地分給了3個兒子和2個女兒。長子桑喬在羅德里戈的輔佐下發動了對其他兄弟的戰爭，羅德里戈驍勇善戰被摩爾人尊稱為：“熙德”。
stage_intro_4303=雖然迅速擊敗了眾兄弟，但桑喬意外身亡，他的弟弟加冕為阿方索六世，熙德只得效忠於他。但他功高震主的功績讓阿方索六世頗為忌憚。
stage_intro_4305=熙德因為過錯被阿方索六世流放，然而熙德的聲望獲得了不同宗教多支部隊的投靠，於是他帶著這支部隊，效力於薩拉戈薩君主穆塔命，並獲得了諸多勝利。
stage_intro_4307=阿方索六世意圖將國土擴張至整個伊比利亞半島，卻在薩拉卡大戰之中失敗。此時他想到了熙德，並赦免了他，熙德也重新回到了舊主身邊。
stage_intro_4309=熙德因為救援不及時被阿方索六世沒收了封地並囚禁了妻兒，這讓熙德決心奪取一塊自己的領地。熙德在瓦倫西亞達到了自己聲望的頂峰。
stage_intro_4311=穆拉比特王朝的統治者優素福希望奪回一統西班牙，卻在瓦倫西亞久攻不下，他的士兵畏懼於這位戰神，即使熙德中箭重傷，只要他騎在馬上，就無人可擋。
stage_intro_4381=瑪蒂爾達出生高貴，她身上有著蘇格蘭王族、諾曼貴族、威塞克斯貴族的血脈，在她很小的時候就被亨利一世嫁給了神聖羅馬帝國的國王亨利五世，從而加冕為羅馬皇后。
stage_intro_4383=瑪蒂爾達23歲的時候，丈夫去世，她不得不回到故土諾曼第。1120年白船災難後，英格蘭王位的繼承權變得撲朔迷離。1127年，瑪蒂爾達再婚，嫁給了安茹伯爵傑佛瑞。
stage_intro_4385=1135年亨利一世的去世讓英格蘭王位變成了空王座，擁有繼承權的長女瑪蒂爾達和她的丈夫傑佛瑞決定奪回諾曼第，並懲罰那些乘機反叛的諾曼貴族。
stage_intro_4387=瑪蒂爾達的堂兄斯蒂芬在英格蘭獲得諾曼貴族的支持登上了王位，而格羅斯特的羅伯特支持他的妹妹在蘇格蘭起義，一場內戰開始了。
stage_intro_4389=斯蒂芬圍攻了瑪蒂爾達皇后所在的城堡，而羅伯特的救援也迅速趕來，並俘虜了斯蒂芬。1141年復活節後，瑪蒂爾達皇后成為了英格蘭的實際掌權者。
stage_intro_4391=瑪蒂爾達的加冕典禮尚未舉行，卻遭到了斯蒂芬和其他貴族的反叛，瑪蒂爾達在溫徹斯特潰敗，之後回到諾曼第。而英格蘭王位最終由她的兒子亨利二世奪回。
stage_intro_4081=贊吉王朝在努爾丁父親的努力下已經初具規模，在贊吉遇刺後，安條克親王意圖在這個混亂的局勢下奪取阿勒頗。
stage_intro_4083=埃德薩伯國在獲知阿勒頗被安條克公國攻擊後，意圖奪回自己失去的領土，得到消息的努爾丁帶領部隊迅速前往埃德薩進行救援。
stage_intro_4085=贊吉王朝在努爾丁的努力下日益繁榮，努爾丁決定擴大他在敘利亞北部的領土，那麼切斷安條克和埃德薩之間的要道變得順理成章。
stage_intro_4087=大馬士革領主烏努爾病逝後，大馬士革變為眾人口中的一塊肉，無論是努爾丁還是耶路撒冷王國都想得到這塊土地。
stage_intro_4089=努爾丁在敘利亞的一系列活動再次震動了基督國家，這促使西方國家發起了第二次十字軍東征。而這次東征因為努爾丁的存在必然無法像第一次那樣順利。
stage_intro_4091=遠征軍前往佔領埃及，努爾丁毫不猶豫的派出自己的大將前去支援，同去的還有年輕的薩拉丁。聖王努爾丁在之後不久病逝，贊吉帝國也因此滅亡。
stage_intro_4101=羅馬爆發的起義使教皇尤金三世不得不向腓特烈一世求援，作為神聖羅馬帝國的皇帝自然是義不容辭。
stage_intro_4103=由於波蘭公爵列斯拉夫四世拒絕交納年金，這讓腓特烈一世忍無可忍，並決定發兵渡過奧德河進攻波蘭。
stage_intro_4105=腓特烈一世在義大利的血腥暴政激怒了義大利民眾，威尼斯、維羅納等城邦組成了“倫巴第同盟”，共同反抗皇帝的統治。
stage_intro_4107=腓特烈一世的封臣“獅子”亨利拒絕向義大利出兵，這讓腓特烈一世怒不可遏，並決定出兵征討亨利。
stage_intro_4109=“獅心王”理查、“狐狸”腓力二世和腓特烈一世發動了第三次十字軍東征分兵三路前往耶路撒冷，神聖羅馬的軍隊在經過拜占庭時和當地軍隊發生了衝突。
stage_intro_4111=在經過安納托利亞高原時，東征的軍隊受到了羅姆蘇丹國的攻擊，這支強敵是東征途中最大的障礙。腓特烈一世在獲勝後意外落水身亡，這支東征部隊黯然收場。
stage_intro_4121=努爾丁的病逝讓贊吉王朝處於分裂之中，而身處埃及的薩拉丁則逐漸站穩了腳跟，阿尤布王朝就此誕生。
stage_intro_4123=薩拉丁一路北上佔領了大馬士革，又佔領了霍姆斯和哈馬，將部隊稍加整頓之後，他決定前往並佔領贊吉王朝的首都阿勒頗。
stage_intro_4125=敘利亞的伊斯蘭世界得到了統一，這讓耶路撒冷王國的形勢岌岌可危，鮑德溫四世不得不率領數千士兵前往阿斯卡倫加強防禦。
stage_intro_4127=鮑德溫四世試圖切斷薩拉丁的補給路線，並在雅各渡口建造城堡。為了保證補給線，薩拉丁率領軍隊向城堡發動了進攻，以阻止城堡的建立。
stage_intro_4129=鮑德溫四世的去世讓耶路撒冷王國陷入了混亂，法蘭西的雷納爾德無視合約多次襲擊埃及的商隊，大戰無可避免地爆發了。
stage_intro_4131=耶路撒冷王國的大軍在哈丁全軍覆沒，擋在薩拉丁面前的僅剩下厚厚的城牆，這位仁慈之王在這裡獲得了雙方的尊重，被人們稱為：“阿拉伯騎士”。
stage_intro_4141=金雀花王室內部的爭權奪利不斷，並且有愈演愈烈的趨勢。同時，法蘭西的屬地也是叛亂不斷，這讓年僅16歲的理查不得不參與平叛。
stage_intro_4143=在法王“狐狸”腓力二世的煽風點火下，父子雙方再一次產生了衝突，並且在勒芒進行了大戰。
stage_intro_4145=理查一世加冕為英王后，決定應教皇的請求發動第三次十字軍東征，“紅鬍子”腓特烈一世和腓力二世將一同參與，分三路出發。
stage_intro_4147=腓特烈一世意外身亡，攻陷阿卡後的腓力二世決定率軍回國，並因為戰鬥中的芥蒂伺機對理查一世進行報復，現在只有理查一世仍在向耶路撒冷進發。
stage_intro_4149=“獅心王”理查一世雖然和薩拉丁是敵對關係，但兩人惺惺相惜，時常通信。“獅心王”是如此驍勇善戰，如果不是弟弟篡位的舉動，耶路撒冷極有可能易主。
stage_intro_4151=理查一世因為得罪法蘭西王國和神聖羅馬帝國，在回歸途中被囚禁，直到他母親用大筆贖金將他贖回。憤怒的“獅心王”對腓力二世發動了進攻。獅心王也因此中箭身亡。
stage_intro_4161=鐵木真的才幹讓他的部族逐漸嶄露頭角，這也讓昔日的夥伴變成了敵人。
stage_intro_4163=鐵木真勢力的日益壯大讓他的義父愈發忌憚，既然鐵木真無法臣服，那就只有決一死戰了。
stage_intro_4165=一個多世紀前差點被滅族的蒙古人如今已經無比強盛，而草原之中只能有一個霸主，鐵木真發動了對西遼、西夏和金的戰爭。
stage_intro_4167=一統草原後，鐵木真尊號“成吉思汗”，現在他的目光轉向了西方遼闊的土地，成吉思汗分兵4路率領20萬大軍進軍西域。
stage_intro_4169=1227年，一代天驕成吉思汗在攻城掠地的途中去世，但是他的精神還在延續，蒙古帝國的疆域還在擴大。
stage_intro_4171=遵照成吉思汗的遺願，蒙古帝國發動了第三次西征，他們將要面對的是阿拔斯王朝和阿尤布王朝的鐵騎。
stage_intro_4181=亨利三世的敗家和懦弱行為讓英格蘭陷入了內戰，金雀花王朝岌岌可危，愛德華王子決定力挽狂瀾。
stage_intro_4183=愛德華王子熱愛他的軍事生活並希望征戰四方，路易九世發動了新的十字軍東征，愛德華拋開了英格蘭的煩惱投身其中。
stage_intro_4185=1274年，愛德華一世加冕，醉心於亞瑟王傳說的他決定一統大不列顛王國，威爾士便是愛德華一世第一個目標。
stage_intro_4187=由於愛德華一世對威爾士的殘暴統治，在盧埃林的帶領下，威爾士爆發了大規模的叛亂。
stage_intro_4189=威爾士臣服後，愛德華一世把目光瞄向了更北的蘇格蘭，1296年，愛德華一世帶領著長弓兵和騎兵部隊前往蘇格蘭。
stage_intro_4191=蘇格蘭的貴族佔領了鄧巴堅固的城堡，意圖在這裡阻擋住愛德華一世的進攻。愛德華一世在這裡擊敗了他們並帶走了蘇格蘭國寶：加冕石。
stage_intro_4201=英格蘭人在蘇格蘭的血腥統治讓華萊士奮起抗爭，不僅僅出於對自由的信念，更有讓蘇格蘭獨立的決心。
stage_intro_4203=華萊士的反抗行為激發了飽受壓榨的蘇格蘭人民，於是華萊士身邊迅速聚集了大量志同道合之人。
stage_intro_4205=英格蘭終於開始正視威廉華萊士，決定派遣數千正規軍剿滅這支農民起義軍。
stage_intro_4207=在斯特林橋戰役勝利後，華萊士決定乘勝追擊，解放更多蘇格蘭土地和人民，他的遊擊戰術取得了極大的成功。
stage_intro_4209=威廉華萊士終於獲得了蘇格蘭貴族的認可，被任命為蘇格蘭護國公。愛德華一世對手下的無能感到憤怒，他決定親率大軍迎擊威廉華萊士。
stage_intro_4211=威廉華萊士重新組織軍隊發動了進攻，但卻因為夥伴的出賣而被俘虜。雖然華萊士被斬首於倫敦，但是他的血讓更多蘇格蘭人覺醒。
stage_intro_4321=蘇格蘭貴族們在鄧巴戰役失敗後，對愛德華一世俯首稱臣。1297年，威廉華萊士在蘇格蘭發動獨立運動，羅伯特布魯斯也順勢加入其中。
stage_intro_4323=作為蘇格蘭王位合法競爭者之一的羅伯特布魯斯在教堂殺死了另一個競爭者約翰康明後，在斯康加冕為王，被愛德華一世通緝懸賞，並派遣部隊追殺。
stage_intro_4325=羅伯特布魯斯的妻女被俘，自己則流落四方。第二年羅伯特布魯斯帶領他在愛爾蘭招募的新兵登陸不列顛進行反擊。
stage_intro_4327=羅伯特布魯斯充分吸取了在梅斯文戰役中失敗的教訓，充分利用自己熟知家鄉地形地貌，對英軍進行反擊。
stage_intro_4329=愛德華一世在獲知勞頓山戰役失利後不顧年邁的身軀御駕親征，結果病逝途中。不到3年時間，羅伯特布魯斯佔領了英格蘭北部大部分土地。
stage_intro_4331=雖然蘇格蘭人的數量不抵英格蘭的一半，而且沒有長弓兵和重騎兵，但是他們士氣高昂，戰略得當，大敗愛德華二世。從此英格蘭再也無法阻止蘇格蘭的獨立。
stage_intro_4341=布列塔尼公爵家族爆發了繼承人之爭，英格蘭和法蘭西都試圖扶持自己的候選人，雙方衝突愈演愈烈，最終在莫龍附近爆發了遭遇戰。
stage_intro_4343=1345年，愛德華三世三路並進，派出英軍在布列塔尼和加斯科涅兩地展開攻勢，同時自己率大軍向歐洲內陸進軍，兵鋒直指巴黎。
stage_intro_4345=在經過漫長的追擊之後，法蘭西同盟軍在克雷西附近追上了幾乎精疲力盡的英軍。英格蘭軍隊被迫展開陣型與其決一死戰。
stage_intro_4347=1355年，察覺到加斯科涅地區兵力不足，愛德華三世計畫對法蘭西南部進行一次突襲式掃蕩，這個任務的最佳人選就是在克雷西戰役中嶄露頭角的黑太子愛德華。
stage_intro_4349=1356年，法王約翰二世率領大軍意圖追剿在加斯科涅地區掃蕩的英軍，雙方在多次擦肩而過後終於在9月17日正式遭遇，百年戰爭第一階段的決戰就此拉開序幕。
stage_intro_4351=1367年，英法雙方介入了西班牙斯提爾王國的內戰，正式打響了百年戰爭第二階段的第一場大戰。
stage_intro_4401=聰穎的鮑德溫在很小就表現出了堅定和樂觀等優良品質，可惜卻得了絕症麻風病。9歲的他加冕為耶路撒冷王國國王，這讓這個國家處於岌岌可危之中。
stage_intro_4403=1176年剛成年並掌權的鮑德溫四世就發動了對埃及的全面進攻，在薩拉丁和刺客組織戰鬥時，鮑德溫四世突襲了薩拉丁。
stage_intro_4405=鮑德溫四世獲得了拜占庭帝國曼努埃爾皇帝的支援，從海上發動了對埃及的入侵，但由於耶路撒冷王國派系爭端導致了失敗。
stage_intro_4407=薩拉丁帶領著眾多部隊到達了阿斯卡隆，在發現兵力很少的鮑德溫四世軍隊後，決定突襲耶路撒冷。卻沒想到被這16歲的國王以少勝多差點丟了性命。
stage_intro_4409=兩年中，雙方的戰鬥不斷，薩拉丁再也無法輕視這年少的君主，而重病纏身的鮑德溫四世讓法蘭克人的軍隊陷入了隱患。
stage_intro_4411=疾病帶來的痛苦圍繞著國王，他不得不採取防守姿態，力求保住耶路撒冷的疆域。再一次次阻攔住薩拉丁的進攻後，鮑德溫四世也燃燒盡了他最後的生命。
stage_intro_4421=瑞典封建主乘蒙古入侵羅斯之機，意圖進軍諾夫哥羅德大公國以奪取其領土。亞歷山大率領精銳部隊在涅瓦河畔突襲並擊潰了來犯的敵人。因其在此戰中表現出統帥藝術和作戰精神，被譽為涅夫斯基。
stage_intro_4423=在涅瓦河戰役之後，涅夫斯基在諾夫哥羅德市民會議的請求下率軍抵抗來犯的十字軍騎士團。為保障羅斯西北邊境安全，收復普斯科夫公國便是當務之急。
stage_intro_4425=收復普什科夫只是計畫的第一步，想要一勞永逸地保障邊境安全，主動出擊是明智的選擇。涅夫斯基率軍主動進入了騎士團的領地以尋求擊潰敵人，他派出的偵查部隊在哈馬斯特與敵軍先頭部隊遭遇了。
stage_intro_4427=偵察部隊確認了騎士團的動向，涅夫斯基遂調集部隊轉向阻擊敵人。雙方在楚德湖遭遇，爆發了最終的決戰。這一場戰鬥為羅斯人的邊境帶來了短暫的和平。
stage_intro_4429=蒙古人的騎兵踏上了俄羅斯的土地，在他們勢不可擋的攻勢面前，涅夫斯基的父親雅羅斯拉夫大公被迫向蒙古人投降，但在回程途中身亡。涅夫斯基和弟弟安德列展開了爭奪大公寶座的鬥爭。
stage_intro_4431=涅夫斯基在執政後期多次平定了國內的騷亂，有力地維護了國家的統一和穩定。在他死後，俄羅斯迅速分裂為許多互相爭吵不休的公國。
stage_intro_4441=諾曼人的勢力在西西里逐漸崛起，對拜占庭帝國的威脅也與日俱增。終於，在1081年，雙方在巴爾幹西部展開了會戰。
stage_intro_4443=在經歷底拉西烏姆會戰的慘敗後，阿萊克修斯一世向神聖羅馬帝國尋求幫助，並在後者的幫助下成功使諾曼人的軍隊投降。
stage_intro_4445=一個自稱“君士坦丁·迪奧真尼斯”的人覬覦阿萊克修斯一世的拜占庭皇位，他聯合庫曼人對拜占庭北方邊境發起了進攻。
stage_intro_4447=為了從塞爾柱人手裡收復安納托利亞，阿萊克修斯一世向羅馬教皇求援，第一次十字軍東征就此在教皇的號召下開始了。
stage_intro_4449=阿萊克修斯一世的宿敵之子博希蒙德一世建立了安條克公國並向拜占庭帝國發起了進攻。經過兩年的戰爭，拜占庭帝國取得了勝利並將安條克公國收為附庸。
stage_intro_4451=1110年後，阿萊克修斯一世開始對塞爾柱人發起進攻，在經過數年的戰爭之後最終成功收復了小亞細亞沿海地區。
stage_intro_4461=蘇定方少年時便以驍勇善戰而聞名，但唐朝初年一直未被重用。直到630年唐太宗李世民下令清除帝國北方的邊防隱患--突厥，蘇定方跟隨李靖出師征討，善用奇兵的蘇定方在陰山一役大獲全勝，活捉突厥首領頡利可汗。
stage_intro_4463=655年援救新羅之後，唐高宗李治又讓蘇定方進軍西突厥，沙缽羅可汗親率十萬騎兵前來迎戰，在曳咥河邊被蘇定方帶領少許兵馬繞後突襲後大敗而逃。
stage_intro_4465=突降暴雪，西突厥殘部逃往自己駐地，沙缽羅可汗放鬆警惕認為唐軍不會再追擊，而蘇定方卻一直緊隨其後並發動了突襲，西突厥因此滅亡。絲綢之路從此開闢，唐朝走向巔峰。
stage_intro_4467=吐蕃國日趨強盛，且不斷騷擾邊境，逐漸成為唐朝西部的心腹大患，659年唐高宗讓蘇定方前往涼州全力負責對吐蕃的防禦。他以一千兵力擊潰吐蕃八萬大軍並擊殺大將達延莽布支，這讓吐蕃之後十多年再無東進之意。
stage_intro_4469=西突厥的殘餘部落思結俟斤首領都曼被吐蕃挑撥後聯合了其他三個國家一起反叛唐朝，剛剛平定吐蕃的蘇定方率領1萬多士兵一晝夜強行軍150公里翻越4000-7000米的高原迅速擊潰了都曼，這讓唐朝的領土達到了前所未有之遼闊。
stage_intro_4471=薩珊帝國被阿拉伯帝國滅國，流亡的波斯王子卑路斯向唐朝救援，唐高宗派使者去邊境迎接波斯王子，並和阿拉伯帝國發生了衝突。660年唐高宗又派老將蘇定方跨海東征先後滅了百濟和高句麗，這讓他成為了歐亞大陸當之無愧的最強將領。
stage_intro_4501=帖木兒年輕時憑藉自身過人的能力得到了東察合台大汗禿忽魯帖木兒的賞識，被任命為渴石城的統治者。
stage_intro_4503=帖木兒由於私自釋放了無辜的宗教首領被誣陷為反叛，被迫逃亡。他逃往了阿富汗南部去投奔姻親兄弟忽辛。
stage_intro_4505=在東察合台大汗禿忽魯帖木兒逝世後，帖木兒起兵擊敗了河中總督也裡牙思火者，重新獲得了渴石城的控制權。
stage_intro_4507=在勢力逐漸穩固後，帖木兒與忽辛之間產生了矛盾並逐漸惡化。忽辛多次試圖消滅帖木兒，帖木兒也多次予以回擊，在數年的拉鋸之後，帖木兒獲得了最終的勝利。
stage_intro_4509=擊敗忽辛之後，帖木兒總攬了西察合台的軍政大權並扶持了一個傀儡蘇丹，後世將之視為帖木兒汗國建立的標誌。
stage_intro_4511=東察合台汗國在經過數年的政變動盪後，由哈馬魯丁繼位，他在繼位後多次襲擊帖木兒汗國的邊境，最終帖木兒在22年的戰爭之後將其徹底消滅。
stage_intro_4513=欽察汗國的脫脫迷失和帖木兒對波斯地區都有著野心，雙方的摩擦衝突很快演變為兩國的戰爭，帖木兒用兩次遠征重創了欽察汗國。
stage_intro_4515=在建國十年後，帖木兒發動了西征，其中第一個目標便是在呼羅珊的卡爾提德王朝，由於其內部意見不和，帖木兒很快便將其擊潰。
stage_intro_4517=帖木兒西征的最後一個目標是格魯吉亞王國，但他在征服這裡之後，他保留了原有的政權，這為後來的多次反叛埋下了隱患。
stage_intro_4519=為了掠奪富庶的北印度地區，帖木兒以印度德里蘇丹國對異教徒太過寬容為藉口，發動大軍對印度進行了征伐。
stage_intro_4521=1399年，馬穆魯克新任蘇丹法拉吉拒絕承認帖木兒汗國為宗主國，並拒絕交出帖木兒的敵人，這招來了帖木兒的怒火。
stage_intro_4523=鄂圖曼帝國是與帖木兒汗國同時存在於中東地區的另一個強大帝國，雙方的不斷擴張導致了衝突，最終衝突演變為了大規模的戰爭。
stage_intro_4541=約翰一世·齊米斯基斯出生於亞美尼亞的一個軍事貴族家庭,他的舅舅是拜占庭名將尼基弗魯斯·福卡斯。他很早就跟隨舅舅一同征戰，二十多歲就在薩莫薩特戰役中嶄露頭角。
stage_intro_4543=963年，尼基弗魯斯·福卡斯趁皇帝病逝奪得帝位。969年，約翰一世與皇后塞奧法諾將尼基弗魯斯暗殺，自立為帝。尼基弗魯斯的侄子巴爾達斯·福卡斯試圖起兵為叔叔報仇，但很快便被約翰一世鎮壓。
stage_intro_4545=970年，羅斯大公斯維亞托斯拉夫率領軍隊開始進犯拜占庭帝國北部，此時的約翰一世正處於與福卡斯家族的內戰之中，無暇支援，負責保衛色雷斯地區的將領是他的心腹愛將巴達斯·斯科萊魯。
stage_intro_4547=971年，斯維亞托斯拉夫率三萬軍隊重新南下進犯拜占庭帝國邊境，約翰一世在解決國內內亂問題後，率領精銳部隊前往迎戰。經過多次激戰，約翰一世將斯維亞托斯拉夫圍困在多羅斯托隆城中。
stage_intro_4549=972年，在結束了與羅斯的戰爭之後，約翰一世將目光投向了東方。起初拜占庭方面取得了一定的東征成果，但在後來與摩蘇爾酋長國的戰鬥中，東部戰區將軍米利阿斯兵敗被俘，使得此次東征被迫結束。
stage_intro_4551=974年，約翰一世發動了第二、第三次東征，將摩蘇爾酋長國完全擊潰並迫使其稱臣。期間約翰一世一路東進，將整個幼發拉底河中游以西的地區全部納入了帝國版圖中，佔領了大馬士革，的黎波里等城市。


