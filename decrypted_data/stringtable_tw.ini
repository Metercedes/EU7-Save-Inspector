conquest_faction_desc_603=自蘭開斯特公爵亨利謀取英格蘭王位並重新開啟與法蘭西王國的戰爭後，這場戰爭已經持續了近10年，兩國百姓早已苦不堪言。面對國內不斷爆發的農民起義，英格蘭王國急需一個妥善解決與法蘭西王國爭端的方法。
conquest_faction_desc_602=英格蘭王國入侵愛爾蘭島後建立的附庸政權，每任愛爾蘭領地的總督需要由英格蘭國王冊封。時至今日，英格蘭王國政權不穩，愛爾蘭領地因而獲得了較大的自治權，領地的領主們越來越不願服從英格蘭王國的統治。
conquest_faction_desc_601=由不願被英格蘭王國統治的蓋爾人建立的王國。作為愛爾蘭島上碩果僅存的蓋爾人勢力，埃尓尤克王國絕不會屈服于英格蘭王國，將英格蘭人驅逐出愛爾蘭，收復愛爾蘭全境是每位埃爾尤克國王的心願。
conquest_faction_desc_604=蘇格蘭王國自建立起，便與他的南方鄰居-英格蘭王國爭鬥不休，雙方都渴望征服對方進而統一整個大不列顛。如今英格蘭王國在對法蘭西王國的戰爭中取得了巨大的優勢，蘇格蘭王國必須投入更多的力量來牽制英格蘭王國。
conquest_faction_desc_605=卡佩王朝解體後，英格蘭國王愛德華三世圖謀法蘭西王位而開啟了英法間近百年的戰爭。如今在英軍的攻勢下，法蘭西王國接連丟城失地，甚至連首都巴黎也已淪陷，瓦盧瓦王朝的統治似乎正不可避免地走向滅亡，除非發生奇跡。
conquest_faction_desc_606=布列塔尼公國地處法蘭西王國和英格蘭王國之間，往往因公爵爵位繼承問題而成為這兩個大國的角力場，從而使公國內部動盪不安。如今英法戰爭再起，布列塔尼公國需要更加小心以避免陷入大國爭端的泥潭。
conquest_faction_desc_607=勃艮第公國是法蘭西王國的附庸公國政權，最早可以追溯至蠻族大遷徙時勃艮第人建立的勃艮第王國。當英法兩國因法蘭西王位而陷入戰爭的泥淖時，勃艮第公國趁機擴張領土，逐步成為歐洲大陸上一支強大的勢力。
conquest_faction_desc_608=由斯堪的納維亞的丹麥王國、挪威王國和瑞典王國組成的共主邦聯，這三個王國共同擁戴一個君主。卡爾馬聯盟的建立使得斯堪的納維亞的維京後裔們能夠團結一致，對抗他們南方的強大鄰居-神聖羅馬帝國。
conquest_faction_desc_609=由東法蘭克王國國王奧托一世在羅馬加冕為羅馬人的皇帝後建立的帝國。雖然神聖羅馬帝國建立之初強盛無比，但經歷大空位時期的混亂後，帝國中央權力下降，帝國也逐漸演變為數百個諸侯國組成的鬆散聯盟。
conquest_faction_desc_610=神聖羅馬帝國的諸侯國之一，由曾今捷克人建立的波西米亞公國升格而來。由於神聖羅馬帝國支持天主教會而殘酷鎮壓支持或同情胡斯黨人的波西米亞民眾，波西米亞人民不得不起兵反抗神聖羅馬帝國的暴政。
conquest_faction_desc_611=神聖羅馬帝國的諸侯國之一，由巴伐利亞公國的藩屬國升格而成獨立的公國。奧地利公爵阿爾佈雷希特二世作為神聖羅馬帝國皇帝西吉斯蒙德的女婿而被他指定為繼承人，這也許是哈布斯堡家族染指帝國皇位的絕佳機遇。
conquest_faction_desc_612=神聖羅馬帝國的諸侯國之一，起源于東法蘭克王國建立的自治公國。統治巴伐利亞公國的維特爾斯巴赫家族曾多次獲得神聖羅馬帝國的皇位，如今帝國內部動盪不安，巴伐利亞公國正摩拳擦掌，試圖重新掌控帝國大權。
conquest_faction_desc_613=條頓騎士團征服普魯士地區後建立的基督教國家。條頓騎士團曾是受到波蘭王國的邀請才進入普魯士地區，但在條頓騎士團國建立後，雙方迅速反目成仇，如今更是兵戎相見，視彼此為心腹大患。
conquest_faction_desc_614=或稱波蘭王國王冠領地，指波蘭人掌控政權並實際控制的地區。自從條頓騎士團征服普魯士地區後，這群貪得無厭的豺狼便開始入侵波蘭王國，如果不能將這群日爾曼人趕出普魯士，波蘭王國將永無寧日。
conquest_faction_desc_615=阿爾勒王國崩潰後，薩伏依家族在義大利西北部和法國的東南部地區建立的獨立公國。薩伏依公國地處東、西法蘭克王國之間，需要謹慎的與這兩個大國相處。
conquest_faction_desc_616=米蘭公國位於義大利倫巴底地區，雖然名義上隸屬神聖羅馬帝國，但公國具有極高的獨立自主性。阿爾卑斯山脈為米蘭公國提供了天然北部屏障，公國可以積極向南方發展，優先統一義大利北部地方。
conquest_faction_desc_617=原是位於義大利西北海岸利古裡亞地區的商業城邦，藉由十字軍東征而繁榮，並逐漸發展成西地中海最強盛的海洋共和國。後在與威尼斯共和國爭奪利潤高昂的香料貿易時，熱那亞沒能擊敗威尼斯共和國，如今只能選擇暫時蟄伏。
conquest_faction_desc_618=當西羅馬帝國遭蠻族入侵而滅亡後，義大利北部沿海地區的居民紛紛逃往瀉湖並在此建立了定居點，威尼斯共和國便由此發展起來。經過多次威尼斯-熱那亞戰爭，威尼斯人徹底擊敗熱那亞共和國，宣示了自己海上霸主的地位。
conquest_faction_desc_619=西西里晚禱戰爭後，阿拉貢聯合王國將西西里島從原西西里王國分離，而原王國義大利部分的領土則被稱作那不勒斯王國。那不勒斯王國絕不承認西西里島的分裂，並矢志收復失地。
conquest_faction_desc_620=由原隸屬於卡斯蒂利亞王國的葡萄牙伯國獨立後建立的王國。葡萄牙王國位於歐洲大陸的最西端，雖然地處偏僻，但若葡萄牙王國選擇積極進取的擴張政策，獨特的地理位置也會使王國免於多面受敵的窘境。
conquest_faction_desc_621=卡斯蒂利亞王國吞併萊昂王國而建立的複合君主國，卡斯蒂利亞聯合王國是伊比利亞半島收復失地運動的主要推手。如今伊比利亞半島所剩的伊斯蘭勢力羸弱不堪，卡斯蒂利亞聯合王國或可嘗試統一整個伊比利亞半島。
conquest_faction_desc_622=由阿拉貢王國及巴賽隆納伯國合併而成的複合君主國，阿拉貢聯合王國牢牢控制著西地中海海域主要的島嶼，有著極強的制海權，這些廣泛分佈的島嶼是王國介入歐洲大陸事務極佳的跳板。
conquest_faction_desc_623=後倭馬亞王朝解體後的伊比利亞半島現存的最後一個伊斯蘭王國，面對重新佔據伊比利亞絕大部分領土的基督教勢力，格拉納達酋長國的處境顯得岌岌可危，所幸這些基督教國家並不是團結一致，王國仍有一線生機。

