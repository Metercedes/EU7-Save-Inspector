battle_talk_700501=讓我們重建羅馬的輝煌，趕走這些突厥人！
battle_talk_700502=奪回要塞，4萬兵馬填也要把這裡填滿！
battle_talk_700503=我們背面的要塞被敵人佔領了，看來羅馬人想撕毀合約！
battle_talk_700504=4萬人又如何，這些烏合之眾，都是臨時雇傭軍，誘敵深入！讓我們殲滅他們！
battle_talk_700505=他們的箭矢實在太猛烈了，我們撤回要塞！
battle_talk_700506=我們的左右翼怎麼奔潰了！不，我不會失敗的！
battle_talk_700507=雖然終於抵禦住了這些突厥人的進攻，但是我們在這片地域的控制力已經大不如前了！
battle_talk_700508=聖主保佑！活捉了羅馬皇帝！塞爾柱帝國萬歲！

