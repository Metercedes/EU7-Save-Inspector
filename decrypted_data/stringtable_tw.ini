stage_intro_30001=法國北邊的諾曼人歐特維爾家族已經在破產邊緣，坦克雷德生了十二個兒子兩個女兒，他實在無力分配更多的財產，長子威廉跟隨著其他諾曼人前往耶路撒冷朝聖，然後去義大利半島碰碰運氣。
stage_intro_30002=1025年“保加利亞屠夫”巴西爾二世去世，儘管繼位者軟弱無能，但巴西爾二世締造的軍隊依然強大，為了獲得更多的糧食、棉花和糖，皇帝選定了喬治曼尼亞科斯作為主將征服富裕的西西里島，而歐特維爾的威廉帶領300騎士以雇傭軍的身份加入了這支隊伍。
stage_intro_30003=雖然墨西拿的撒拉遜人根本無力抵抗強大希臘人和諾曼雇傭軍，但聯軍士氣並不高漲，東羅馬主將喬治曼尼亞科斯身高10英尺，脾氣極其暴躁，經常體罰士兵
stage_intro_30004=西西里島的一座一座城池被希臘人猶如摧枯拉朽一般佔領，死亡的氣息佔據了整個西西里島。
stage_intro_30005=2年來已經有12座城池和要塞被希臘人佔領，但在錫拉庫薩他們並沒有那麼走運，駐紮的埃米爾發動了強烈的抵抗，抵禦住了希臘人一輪又一輪的進攻。
stage_intro_30006=東羅馬皇室對於曼尼亞科斯的勝利心存擔憂，害怕他功高蓋主併入主君士但丁堡，於是開始減少補給並暫停了雇傭軍的酬金。又一次曼尼亞科斯公開羞辱了諾曼人，威廉和諾曼雇傭軍決定離開遠征軍。
stage_intro_30007=倫巴第人夾在神聖羅馬帝國以及東羅馬帝國的夾縫之中，他們不堪剝削發動了起義。在前一個倫巴第領袖被刺殺後，諾曼人和倫巴第人推舉了貝內文托的阿特努爾夫成為他們的領袖。
stage_intro_30008=東羅馬人對於諾曼人和倫巴第人的聯合感到憤怒，在諾曼人與東羅馬在義大利的將領邁克爾·多基亞諾斯談判失敗後，戰爭已經無可避免。
stage_intro_30009=諾曼人在義大利地區的強悍逐漸被倫巴第人的認可，越來越多的諾曼騎士來到這片土地，尋求一戰成名的機會，這也讓威廉的力量越來越強。
stage_intro_30010=東羅馬軍隊越來越無法在正面戰場戰勝諾曼人，他們收買了很多人，包括倫巴第人的首領阿特努爾夫，諾曼人愈發覺得勝利變得如此遙不可及。
stage_intro_30011=倫巴第貴族薩勒諾大公瓜伊瑪律四世答應給諾曼人封地，將自己的侄女嫁給了威廉。大公正式將威廉封為“阿普利亞公爵”，並將該地區分封給了12名最有權勢諾曼領袖。
stage_intro_30012=1044年，瓜伊瑪律邀請威廉征服義大利南部的卡拉布裡亞，並承諾征服下來的土地歸諾曼人所有，諾曼人再次踏上征途。
stage_intro_30013=1045年，威廉和瓜伊瑪律準備再次發動遠征的前夕，威廉突發高燒並去世，時年36歲。

family_letter=記載
family_letter_desc_101=親愛的父親，我已經從耶路撒冷離開，並和叔叔前往義大利，托您的福，我們一路十分順利，地中海的氣候比諾曼第好很多，我一定能在這裡闖出一番天地，榮譽勝過生命！……最後問母親和弟弟妹妹們安。……
family_letter_desc_102=……親愛的父親，我們在西西里島艱苦的戰爭中，比起撒拉遜人該死的希臘人曼尼亞科斯才是我們最大的敵人，他絲毫不在乎人命，要不是上帝保佑，要不是我和兄弟們勇猛，十條命都不夠填在西西里……
family_letter_desc_103=……親愛的父親，我們已經幫希臘人連續打工了2年，經歷了數百場戰鬥，身上的傷疤添了一道又一道，但傭金卻越來越少了，真不知道是否還有命回去？上帝保佑你安康。……
family_letter_desc_104=親愛的父親，我們已經3個月沒有拿到任何酬勞了。在這裡我們除了傷疤和傷痛，既獲得不到財富也獲得不到名譽，是時候離開了……
family_letter_desc_105=親愛的父親……曼尼亞科斯被希臘皇帝召回後，義大利地區的希臘人已經不足為懼，我願意成為像“無畏者”查理一樣的人，成為新的開拓者！可諾曼人還在為著一點點蠅頭小利爭鬥不已，榮耀和名譽對他們而言一文不值。……
family_letter_desc_106=親愛的父親……我正前往坎尼的路上，那個受到詛咒的地方，20年前我們的同胞在這裡被希臘人擊敗，但這裡同樣是希臘人的詛咒之地，漢尼拔在那裡讓羅馬人受到了最恥辱的戰敗。願上帝保佑我，……
family_letter_desc_107=親愛的父親……雖然你已經在天堂，但是我想讓你知道，我終於做到了，我獲得了封號和封地，我會讓諾曼人成為義大利新的主人。……

