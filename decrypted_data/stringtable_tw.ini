stage_intro_1501=烏格列沙得到消息，鄂圖曼帝國的大部分軍隊正在離開歐洲，向著安納托利亞進軍，這是清除鄂圖曼帝國在巴爾幹半島勢力的最佳時機，因此他們發動了一場突然的奇襲。
stage_intro_1502=托皮亞家族的卡洛托皮亞對巴爾沙二世通過聯姻擴大版圖的做法感到不滿，因此邀請鄂圖曼帝國對澤塔公國發動了攻擊，而穆拉德一世則欣然同意了這一邀請。
stage_intro_1503=穆拉德一世於1387年離開巴爾幹，以應對安那托利亞的事務，而巴爾幹的附庸勢力試圖擺脫鄂圖曼帝國的統治，並組建聯盟以挑戰其權威。
stage_intro_1504=穆拉德一世於1388年從安納托利亞返回，立即對保加利亞發動了一場閃電戰。波士尼亞統治者也立刻向保加利亞發動了援助。
stage_intro_1505=科索沃連接了馬其頓和塞爾維亞兩片區域，如果鄂圖曼人佔領這裡，將會進一步蠶食塞爾維亞大片領土，而拉紮爾大公組織的聯軍在科索沃地區與鄂圖曼人展開了一場激烈的交鋒。
stage_intro_1506=穆拉德一世在意外被刺殺後，他的兒子巴耶濟德一世繼位，而此時英法百年戰爭已經進入休戰時期，為了挽救瀕臨滅亡的東羅馬，西方的騎士們聯合起來發動了十字軍東征。
stage_intro_1507=當巴耶塞特一世準備給拜占庭最後一擊的時候，來自東方的帖木兒率領十五萬大軍兵臨城下，鄂圖曼帝國的生死存亡只在一瞬之間，這讓拜占庭得以喘息。
stage_intro_1508=安卡拉戰役巴耶塞特一世被俘並抑鬱而終，隨後鄂圖曼帝國內部經歷了一場鬥爭，最終迎來了新的蘇丹穆拉德二世，但由於帝國的暫時虛弱，仍然引發了從屬國的反叛！
stage_intro_1509=威尼斯人為了獲得塞薩洛尼基地區的完全自治權，不惜向鄂圖曼帝國宣戰，蘇丹對此無法容忍，於是派出大軍圍攻！
stage_intro_1510=教皇尤金四世召集了波蘭、匈牙利等多個國家的軍隊，發動了一場新一輪的十字軍東征，而當時已經退位的穆拉德二世不得不重新組織軍隊，以抗擊這一來勢洶洶的十字軍。
stage_intro_1511=攝政王約翰·匈雅提為戰死的國王而復仇準備了4年，1448年，他率領著匈牙利、瓦拉幾亞聯軍，向鄂圖曼帝國發動了突襲。
stage_intro_1512=1451年，穆罕默德二世繼位，他花費了兩年的時間準備，定制了巨炮、火槍；建立了海岸要塞；封鎖了海峽，君士坦丁堡這座矗立了千年的城市迎來了最強大的敵人。

campaign_name_129=君士坦丁堡征服者
