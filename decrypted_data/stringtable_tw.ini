campaign_name_601=歐特維爾家族
campaign_desc_601=新的千年開始了，不斷擴張的伊斯蘭帝國似乎將要統治世界，東羅馬帝國也在蠢蠢欲動，而歐洲各國在瘟疫的重創下走向崩潰。此時維京人的後裔令西歐四分五裂的同時，也將成為未來崛起的推手。他們中的一部分人登陸了不列顛海岸，而一個卑微家族將在地中海地區展開一系列傳奇的故事，這個家族叫做歐特維爾家族。
campaign_name_307=特洛伊的寶藏
campaign_desc_307=在特洛伊舊址的底下，他們發現無與倫比，精美絕倫的古希臘寶藏。但這裡同樣危險重重，似乎這批寶藏受到了復仇女神的詛咒。


