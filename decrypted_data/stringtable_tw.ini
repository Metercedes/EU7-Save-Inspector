campaign_name_306=安德瓦利寶藏

campaign_desc_305=絲路寶藏是貫穿東西方貿易的重要標誌，阿拉伯富商在此間來往貿易，留下了許多珍貴文物和寶藏，見證了東西方文化交流的歷史。
campaign_desc_306=北歐神話中一枚名為“安德瓦利戒指”的魔法戒指。這枚戒指相傳具有神秘的力量，能夠讓佩戴者獲得無窮無盡的財富和力量。

