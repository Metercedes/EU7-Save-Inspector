item_desc_9201=腓特烈二世視這件護手如珍寶，甚至勝過他的王冠和權杖。這副護手被他用來訓練獵鷹，堅韌的皮革上留存著無數次獵鷹振翅起飛的痕跡。每只獵鷹都曾在它的護佑下學會忠誠與銳利，而它也成為腓特烈智慧與掌控力的象徵。
