battle_talk_120901=我本無意皇位只是受命於羅馬危難之際，將女兒嫁給你還和你共治天下，你又何必苦苦相逼。
battle_talk_120902=君士坦丁堡本就應該是我的，你的皇位是篡奪而來，羅馬本不應該出現兩個皇帝。
battle_talk_120903=先救我的兒子，我會籌錢給你！
battle_talk_120904=既然已經收到傭金，我必為你清除叛亂！
battle_talk_120905=你還雇傭突厥人，這無疑是引狼入室！日後必定後患無窮。
battle_talk_120906=我不會坐視不理！清除異己！
battle_talk_120907=好的，我們也會提供支援！
battle_talk_120908=看來需要切斷塞爾維亞和保加利亞的支援，帕列奧列格自然會敗退！
battle_talk_120909=突厥人太強了！但是我們還會回來的！
battle_talk_121001=我們要繼續鞏固在巴爾幹半島的地盤！繼續掠奪前方的村莊！
battle_talk_121002=我們的村莊正在被燒毀！我們的人民正在被殺害！忍無可忍，我們沖呀！
battle_talk_121003=衝擊他們後方！別讓他們回到自己營地！
battle_talk_121004=不好，我中箭了！
battle_talk_121005=不！我的兒子戰死，我的帝國還有什麼前途！我還有什麼希望！
battle_talk_130101=現在我方處於逆流逆光，實在不適合海上作戰，看來天不助我！
battle_talk_130102=我們處於上風區，而且鐵索連船，我看英國人怎麼戰勝我們！
battle_talk_130103=我們是不是應該派一些船在海口外面，這樣形成鉗形攻勢？
battle_talk_130104=沒有必要分散兵力，且看英國人如何全軍覆沒！
battle_talk_130105=哎，沒必要和蠢貨們一起送死，我就在後方觀察吧。
battle_talk_130106=太好了！水流方向改變了！順水而下！把他們封鎖在海口裡面！
