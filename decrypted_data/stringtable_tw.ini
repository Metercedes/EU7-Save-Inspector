campaign_end_desc_56=馬其頓王朝開創了拜占庭帝國歷史上第二個最輝煌的時期，在這段被稱為“黃金時期”的幾個世紀裡，馬其頓王朝的疆域達到了查士丁尼一世之後從未有過的規模，但最終卻因為子嗣斷絕而終結。
campaign_end_desc_57=諾曼第王朝先後經歷了四位國王的統治，並且由亨利一世締造了英格蘭的長期和平時期，諾曼第王朝的結束也意味著英格蘭即將迎來一個全新的時代。
campaign_end_desc_58=阿萊克修斯一世帶來的軍隊為拜占庭帝國擊敗了強大的敵人，但也使得拜占庭帝國的百年基業近乎毀於一旦。君士坦丁堡被佔領，拉丁帝國的崛起，仿佛意味著拜占庭帝國即將成為歷史。
campaign_end_desc_59=長期的遠征最終以失敗而告終，耶路撒冷依舊被他們的敵人所佔領著。在耗費了大量的人力和財力後，遠征軍洗劫了君士坦丁堡，拉丁帝國就此誕生。
campaign_end_desc_60=伊莎貝拉和羅傑的行動迫使愛德華二世同意放棄王位，並讓他的兒子愛德華三世繼任。愛德華三世的繼位不僅促使了第二次蘇格蘭戰爭的爆發，也使英格蘭和法蘭西開始了長達百年的戰爭。
campaign_end_desc_61=君士坦丁堡的陷落和重建讓拜占庭人認識到了西方拉丁世界對他們的巨大威脅。與此同時，東方的安納托利亞半島之上，一個新生帝國正對拜占庭帝國蠢蠢欲動。
campaign_end_desc_62=雖然鄂圖曼帝國的崛起已經無法阻擋，但是拜占庭帝國不會甘心俯首稱臣，西方各基督教國家也不會坐視拜占庭的滅亡，而此時東方的一支突厥部落也在逐漸崛起，鄂圖曼帝國的擴張之路勢必不會一帆風順。
campaign_end_desc_63=愛德華三世終究沒有加冕成法國國王，但兩國的戰事還在繼續，這場曠日持久的戰爭把英法兩國都拖入了無盡的深淵，巨額的負債和肆虐的瘟疫讓兩國都暫時無力再戰。
campaign_end_desc_64=雖然戰爭最終由法蘭西獲勝，但長達百年的戰爭使英格蘭和法蘭西人民都遭受了巨大的磨難，戰後的英格蘭失去了他們在歐洲大陸上的大部分領土。
campaign_end_desc_65=君士坦丁堡的陷落標誌著拜占庭帝國的滅亡，千年帝國的輝煌終究還是離人們遠去。拜占庭帝國的滅亡標誌著中世紀的結束，也意味著新的歐洲霸主即將誕生。
campaign_end_desc_66=戰爭結束的同時，也結束了金雀花王朝在英格蘭的統治，開啟了威爾士人的都鐸王朝。這也標誌著在英格蘭中世紀時期的結束，並走向新的文藝復興時代。

