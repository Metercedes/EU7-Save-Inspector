job_9=帕夏

general_retreat_1=為了反擊，我們必須保存實力,暫時的撤退並不代表失敗。
general_retreat_2=也許是我突進的太快了，目前除了撤退沒有其他選擇。
general_retreat_3=我已經奮戰到了最後一刻，但是仍然無法擊退敵軍。
general_retreat_4=敵軍的頑強超出了我的預期，我需要重新制定戰術。
general_retreat_5=我的部隊損失慘重，在我進攻的時候為什麼沒有人為我掩護？
general_retreat_6=我的軍隊已經無法適應目前的戰局，現在必須到後方進行休整。

general_job_desc={0}{1}
general_desc_Khalid=阿拉伯最傑出的將領之一，帶領阿拉伯戰士勇猛作戰，從未失敗。穆罕默德為了表彰他的英勇，賜予他“安拉之劍”的稱號。
general_desc_Belisarius=拜占庭皇帝查士丁尼一世麾下名將，北非和義大利的征服者，軍旅生涯後期遭到皇帝的猜忌，被稱為“最後的羅馬人”之一。
general_desc_Frederick I=紅鬍子巴巴羅薩，羅馬人民的國王，神聖羅馬帝國皇帝，他與英國國王獅心王理查、法國國王腓力二世一起領導了第三次十字軍東征，後在東征途中因溺水而亡。
general_desc_Constantine I=羅馬帝國皇帝，拜占庭帝國的創立者，他在拜占庭建立新皇宮，並將之命名為新羅馬，但人民為尊君士坦丁之名，將此地稱作君士坦丁堡。
general_desc_Uthman=穆罕穆德的追隨者和女婿，是第三任正統哈裡發。在他執政期內，阿拉伯騎兵所向無敵，晚年被人刺殺。
general_desc_Heraclius=拜占庭帝國皇帝，希拉克略帶領帝國軍隊擊敗了波斯人，奪回了失去的領土。但在面對阿拉伯人的入侵時，拜占庭帝國一敗再敗，直到他去世。
general_desc_Gilles de Rais=本名為吉爾·德·蒙莫朗西·拉瓦爾，百年戰爭時期的法國元帥，也是著名的黑巫術師，藍鬍子的原型人物。他是貞德的戰友，曾被譽為民族英雄。
general_desc_Sikelgaita=倫巴第公主，羅伯特·吉斯卡爾的第二任妻子，與羅伯特一同參與並指揮了對抗拜占庭帝國的戰爭。
general_desc_Harald=挪威國王，在成為國王之前，他曾擔任基輔羅斯的雇傭兵，後在拜占庭帝國的瓦蘭吉衛隊中任職。
general_desc_Alp Arslan=塞爾柱帝國的第二任蘇丹，在任內屢次與埃及的法蒂瑪王朝、拜占庭帝國交戰並取勝。後世尊稱他為“阿爾普·阿爾斯蘭”，意為“英勇之獅”。
general_desc_Alfred the Great=威塞克斯王國國王，也是英國歷史上第一個以“盎格魯-撒克遜人的國王”自稱之人。他率眾抗擊維京人的侵略，使英格蘭大部分地區回歸盎格魯-撒克遜人的統治，故得享“大帝”尊稱。
general_desc_Alaric I=西哥特國王，也是西哥特王國的締造者。在斷絕了與羅馬帝國的關係後，他帶領西哥特人攻陷了羅馬，成為了第一批能夠攻克“永恆之城”的人。
general_desc_Aetius=“最後的羅馬人”，他曾帶領軍隊在沙隆戰役中擊敗匈人，這場勝利也被成為“西羅馬帝國的最後一次勝利”，後因被誣告謀反而被瓦倫蒂尼安三世刺殺。
general_desc_Athelstan=長者愛德華之子，威塞克斯王朝的建立者，他被認為是首任英格蘭國王以及一位最偉大的盎格魯-撒克遜人之王。
general_desc_Sophronius=耶路撒冷的領導者，在此之前，他是一位修道士和神學家。
general_desc_Michael the Stammerer=拜占庭帝國皇帝，綽號“結巴者”，在位期間，他聯合保加利亞人鎮壓了湯瑪斯的叛亂，但這也使得帝國的實力遭到削弱。
general_desc_Fausta=羅馬帝國皇后，君士坦丁大帝的第二任妻子。
general_desc_Tostig=哈樂德·戈德溫森的兄弟，無情者哈拉爾的支持者，後於斯坦福橋戰役中喪生。
general_desc_Leopold V=奧地利公爵和施蒂裡亞公爵，有著“賢者利奧波德”稱號，他參與了第三次十字軍東征。
general_desc_Theodoric I=西哥特國王，在位期間，對法蘭克人和汪達爾人用兵，並與西羅馬帝國結盟。
general_desc_Gytha=丹麥貴族，哈樂德·戈德溫森和伊蒂絲的母親。
general_desc_John Chandos=中世紀英國騎士，他被認為是百年戰爭時期，英格蘭最重要的三場戰爭勝利背後的策劃者，他最終在一場小規模衝突中死亡。
general_desc_Gunderic=汪達爾人和阿蘭人的國王，曾帶領軍隊入侵西羅馬帝國。
general_desc_Saladin=埃及阿尤布王朝的第一位蘇丹及敘利亞的第一位蘇丹，埃及歷史的民族英雄，他因在阿拉伯人對抗東征軍的過程中，表現出卓越的領袖作為、騎士風度和軍事才能而聞名於世。
general_desc_Narses=與貝利撒留一樣，是拜占庭帝國皇帝查士丁尼一世麾下的大將，他因曾經滅亡東哥特王國而被稱為“哥特人之槌”。
general_desc_Charlemagne=歐洲之父，法蘭克和倫巴第的國王，羅馬人的皇帝。自羅馬帝國以來，查理曼首度統一了西歐大部分地區，他所建立的大法蘭克被稱為加洛林帝國。
general_desc_William the Conqueror=征服者威廉，維京掠奪者羅洛的後裔。1035年成為諾曼第公爵，1066年征服並統治了英格蘭，成為了第一位諾曼英格蘭國王。
general_desc_Attila=古代歐亞大陸匈人最為人熟知的領袖，史學家稱之為“上帝之鞭”，曾多次率領大軍入侵拜占庭帝國和西羅馬帝國。
general_desc_Richard I=英格蘭王國的國王，因勇猛善戰而有“獅心王”的稱號。他與神聖羅馬帝國皇帝腓特烈一世、法蘭西國王腓力二世一起領導了第三次十字軍東征。
general_desc_Edward the Black Prince=英格蘭國王愛德華三世的長子，歷史上被稱作黑太子，英法百年戰爭中最成功的英國指揮官之一，同時也是當時最偉大的騎士之一。
general_desc_Charles Martel=又稱鐵錘查理，法蘭克王國宮相，軍事領導人。丕平二世的私生子，查理曼的祖父。
general_desc_William I of Sicily=原名古列爾莫一世，是西西里王國的第二任國王。
general_desc_Harold=又稱哈樂德二世。威塞克斯伯爵戈德溫之子，宣信者愛德華王后伊蒂絲的兄長，英國盎格魯-撒克遜時代最後一位無爭議的國王。
general_desc_Matilda of Boulogne=英格蘭王后，布洛涅女伯爵，她的丈夫是英格蘭國王斯蒂芬。
general_desc_Eleanor of Provence=英格蘭金雀花王朝國王亨利三世的王后。
general_desc_Baldwin IV=耶路撒冷王國國王，儘管身患麻風病，他依然率領部隊在蒙吉薩戰役中擊敗了薩拉丁的三萬大軍。
general_desc_Khawlah=穆罕默德時期的一位傳奇戰士，後來成為軍事領袖。她被描述為歷史上最偉大的女性軍事領導人之一，曾被對手與哈立德進行過比較。
general_desc_Sunicas=匈人，查士丁尼一世統治早期，在拜占庭軍隊中服役。
general_desc_Mehmed the Conqueror=“征服者”穆罕默德，鄂圖曼帝國蘇丹，帶領鄂圖曼大軍攻陷了君士坦丁堡，消滅了拜占庭帝國，為日後鄂圖曼帝國的百年霸業奠下了穩固的基石。
general_desc_Philip II=卡佩王朝國王，法蘭西名君之一，因為饒富謀略與政治手腕而有“尊嚴王”的美稱。
general_desc_Henry II of England=英格蘭國王，同時他也是諾曼第公爵。他所創立的金雀花王朝是英格蘭中世紀最強大的一個封建王朝。
general_desc_Genghis Khan=蒙古國可汗，蒙古帝國的奠基者。他發動了蒙古入侵並征服了歐洲大陸的大部分地區。由於其出色的軍事成就，成吉思汗經常被認為是有史以來最偉大的征服者。
general_desc_Edward I=俗稱“長腿愛德華”、又稱“蘇格蘭人之錘”，因征服威爾士和幾乎征服蘇格蘭而聞名，他的母親就是普羅旺斯的埃莉諾。
general_desc_Justinian I=拜占庭帝國皇帝，由於他功勳卓著，也被稱為查士丁尼大帝，查士丁尼一世是古羅馬時代末期最重要的一位統治者。
general_desc_Empress Matilda=亨利一世的女兒，亨利二世的母親。被斯蒂芬篡奪王位後，她積蓄力量對其發起挑戰，最後幫助她的兒子成功奪得了英格蘭王位的繼承權。
general_desc_Philip the Good=好人菲力浦，第三代勃艮第公爵，在百年戰爭末期也有著諸多表現，為低地國家的發展做出了重大貢獻。
general_desc_Eleanor of Aquitaine=亨利二世的妻子，阿基坦女公爵及普瓦捷女伯爵。先嫁給法國國王路易七世，婚姻被宣判無效後和英格蘭國王亨利二世結婚。
general_desc_Isabella=她是法蘭西的公主，法王腓力四世的女兒。英格蘭愛德華二世的王后，愛德華三世的母親。她因個性堅毅果敢，被稱為“法蘭西母狼”。
general_desc_Nikephoros I=拜占庭帝國皇帝，原為伊琳娜女皇任命的財政大臣，在與保加利亞首領克魯姆作戰中戰死。
general_desc_Malik Shah=羅姆蘇丹國的蘇丹，他的名字意為“王中之王”。
general_desc_Timur=帖木兒汗國的創始人，他擊敗了西亞、南亞和中亞的其他國家，是帖木兒帝國的奠基人。
general_desc_Lady Margaret Beaufort=愛德華三世的後裔，玫瑰戰爭中的重要人物，都鐸王朝開國之君亨利七世的母親。
general_desc_Elizabeth Woodville=英格蘭愛德華四世的王后，她憑藉美貌，以兩個孩子母親的寡婦身份，嫁給了愛德華四世，並引起軒然大波。
general_desc_Fatimah=穆罕默德與海迪徹之女，是阿拉伯帝國五大傑出女性之一。
general_desc_Antonina=拜占庭帝國將軍貝利撒留的妻子，狄奧朵拉皇后行使權力時的“右臂”，她對丈夫有著巨大的影響，同時也是一個頗具爭議的人物。
general_desc_Theodora=拜占庭帝國皇帝查士丁尼一世的妻子和皇后，擁有過人的智慧，在查士丁尼統治期間對他有著巨大的影響，曾在尼卡暴動中令查士丁尼恢復勇氣。
general_desc_Robert Curthose=諾曼第公爵，綽號“短襪羅貝爾”，他是第一位諾曼英格蘭國王征服者威廉的長子，也是第一次十字軍東征的參與者。
general_desc_Suleiman Baltoghlu=鄂圖曼帝國海軍司令，曾參與圍攻君士坦丁堡。但因攻城不力被穆罕默德二世下令處決，雖然倖免一死，但仍被剝奪軍銜、土地和財富，最終死於默默無聞和貧窮中。
general_desc_Ambrosio Boccanegra=1341年他隨艦隊前往卡斯蒂利亞支持阿方索十一世，後帶卡斯蒂利亞-法國軍隊在拉羅歇爾戰役中擊敗英國人。
general_desc_Aisha=“信士之母”，穆罕默德的第三任妻子，在阿裡成為哈裡發後，她加入了反叛阿裡的勢力，並與阿裡發生戰爭。
general_desc_Hermeric=蘇維匯王國的國王，終生與羅馬帝國為敵。
general_desc_Simeon I of Bulgaria=保加利亞沙皇，伯里斯一世的第三子。他在位時期是保加利亞第一帝國國勢最強盛的時期。
general_desc_Constantine XI=拜占庭帝國的最後一位皇帝，在穆罕默德二世圍城時，他放棄了投降，城牆被攻破後，他脫下皇袍沖入敵陣後失蹤。
general_desc_Samuel of Bulgaria=保加利亞第一帝國沙皇，在他的統治期間，保加利亞控制了大部分巴爾幹地區，最遠可到達希臘南部。
general_desc_Aethelred I=威塞克斯國王，865年，他接替他的三哥艾瑟爾伯特成為威塞克斯和肯特的國王。
general_desc_Halfdan Ragnarsson=諾桑比亞的首位維京籍國王，維京人的領袖，維京侵略盎格魯-撒克遜英格蘭王國的指揮官之一。
general_desc_Edward III=英格蘭國王，他在位期間將英格蘭打造成了當時歐洲最強大的軍事強國之一，黑太子愛德華是他的長子。
general_desc_Richard of York=英格蘭領銜貴族巨頭，愛德華三世的曾孫，曾試圖奪取王位，但最終被勸止。
general_desc_Alle=第一位南薩克遜人的國王，他所統治的地區現在也被稱為薩塞克斯。
general_desc_Robert the Bruce=蘇格蘭歷史中重要的國王，王號“羅伯特一世”。他領導蘇格蘭人打敗英格蘭軍隊，確保王國獨立。
general_desc_Zubayr=穆罕穆德的同伴，在穆罕穆德死後，成為了軍事領導人，並於駱駝之戰中陣亡。
general_desc_Trithyrius=拜占庭帝國著名將領，希拉克略統治時期的重要軍事指揮官。
general_desc_Edmund=東盎格利亞王國國王，在維京大軍入侵時，曾帶領部隊與敵人作戰，並於戰鬥中陣亡。
general_desc_Totila=東哥特王國國王，是一位相當有能力的軍事和政治領袖。
general_desc_Athelred=麥西亞人的領主，也被稱作麥西亞的艾瑟爾雷德郡長。
general_desc_Ivar=維京人的領袖，他是著名維京首領拉格納·洛德布羅克和亞絲拉琪的兒子，白衫哈夫丹的兄弟。
general_desc_Vortimer=沃蒂根的兒子，因反對父親與盎格魯-撒克遜人聯盟而被人所知。
general_desc_Catigern=沃蒂默的兄弟，他因與盎格魯-撒克遜人交戰而聞名。
general_desc_Alexios I=拜占庭皇帝，科穆寧王朝的開創者，他統治期間其家族真正達到了拜占庭帝國的權力巔峰。同時，他向西方求援的行為也成為了引發十字軍東征的緣由之一。
general_desc_Basil II=綽號保加利亞屠夫，拜占庭帝國的皇帝，統治帝國接近半個世紀。巴西爾二世是希臘民族英雄，但在保加利亞人中被鄙視。
general_desc_Roland=查理曼麾下的法蘭克軍事領導人，也是許多作品中多次登場的人物角色，曾替法蘭克王國抵抗布列塔尼人的進攻。最終羅蘭的形象變成了查理曼的首席騎士。
general_desc_Bessas=拜占庭帝國將領，曾與貝利撒留一同參與對抗哥特和薩珊波斯人的戰爭，是貝利撒留的副官。
general_desc_Vitiges=東哥特王國國王，是一位相當有能力的軍事和政治領袖。
general_desc_Batu Khan=鐵木真之孫，術赤的次子，蒙古欽察汗國的開創者，因他對部下的寬容，稱他撒因汗。
general_desc_Jebe=哲別是臣服於鐵木真後被賜予的名字，意為“箭頭”。有蒙古第一猛將的稱號，是四犬之一。
general_desc_Godfrey=下洛林公爵、布永伯爵，第一次十字軍東征將領。他的弟弟布洛涅的鮑德溫是耶路撒冷國王，即鮑德溫一世。
general_desc_Leo VI the Wise=拜占庭帝國皇帝，人稱“智者”，在位期間編纂完成了《巴西利卡法典》，成為拜占庭帝國的法典。
general_desc_Pepin the Short=查理·馬特之子，加洛林王朝的創建者，751年，他推翻了墨洛溫王朝，成為了法蘭克國王。
general_desc_Valens=羅馬帝國東部皇帝。
general_desc_Nur Din=塞爾柱帝國贊吉王朝的君主，是第二次十字軍東征過程中的主要人物之一。
general_desc_Gelimer=汪達爾-阿蘭王國最後一代日爾曼人國王，在被貝利撒留所擊敗後，向拜占庭帝國投降。
general_desc_Stilicho=擁有半蠻族血統的高級將領，貴族和西羅馬帝國執政官。
general_desc_El Cid=卡斯提爾貴族，瓦倫西亞的征服者和城主，西班牙民族英雄，他是提澤納和柯拉達這兩把的著名武器的擁有者。
general_desc_Arthur=不列顛傳說中的國王，也是凱爾特英雄譜中最受歡迎的圓桌騎士團的騎士首領。傳說他在羅馬帝國瓦解、羅馬軍隊撤出不列顛之後，率領圓桌騎士統一了不列顛群島。
general_desc_Guinevere=亞瑟王的妻子，亞瑟執政時期卡美洛王國的王后，傳說她與圓桌騎士蘭斯洛特之間的私情致使國家走向了滅亡。
general_desc_Lancelot=圓桌騎士團的成員之一，也是亞瑟王最偉大最受信任的騎士，為亞瑟王的諸多勝利做出了貢獻。
general_desc_Joan of Arc=出生於農村的少女，法國的民族英雄，在英法百年戰爭期間她帶領法蘭西王國對抗英格蘭王國的入侵，最後被捕並處以火刑。
general_desc_William Wallace=蘇格蘭的騎士、貴族、愛國人士，他在蘇格蘭獨立戰爭中領導了一支反抗武裝力量。
general_desc_Olga=基輔羅斯國女領導人，大公伊戈爾的夫人，斯維亞托斯拉夫的母親，並在其成年前參與攝政。
general_desc_Caesar=羅馬共和國獨裁者、執政官，是羅馬帝國的奠基人。
general_desc_Robin Hood=英國民間傳說中的俠盜，他武藝出眾、機智勇敢，仇視官吏和教士，是一位劫富濟貧、行俠仗義的綠林英雄。
general_desc_Beowulf=斯堪的納維亞半島上的傳說人物，他曾經與巨人、海怪和巨龍英勇戰鬥。
general_desc_Otto I=東法蘭克國王，神聖羅馬帝國皇帝，他是最早侵略斯拉夫人的條頓君主之一，並迫使波西米亞公爵波列斯拉夫一世稱臣。
general_desc_Knud=繼承了丹麥國王斯溫的王位，對英格蘭、丹麥、挪威及部分瑞典進行統治，其轄境享有北海帝國之稱。
general_desc_Zengi=贊吉王朝的創立者，他曾為摩蘇爾、阿勒頗、哈馬、埃德薩的總督。
general_desc_Alexander Nevsky=原名亞歷山大·雅羅斯拉維奇，在瑞典人入侵羅斯時，他帶領部隊於涅瓦河畔附近擊潰了瑞典軍隊，他因而得到稱號：“涅夫斯基”。
general_desc_Subutai=是上古至中古時代在世界征戰範圍最廣的將領，歐亞板塊大多數歷史中都有速不台的威名。他以驍勇善戰著稱，享有“把阿禿兒”的稱號。
general_desc_Su Dingfang=唐朝初年名將，他擅長以少勝多，曾有過千人勝八萬的驕人戰績，滅突厥，禦吐蕃、伐高麗，一生未有敗績。
general_desc_Li Jing=唐朝第一名將，一生東征西戰，為唐朝的建立、鞏固到繁榮都做出了極其重要的貢獻。
general_desc_Li Shimin=唐太宗，唐朝第二任皇帝、首位天可汗，他是唐代乃至中國歷史上最享負盛名的皇帝之一。
general_desc_Yelu Dashi=又稱大石林牙或林牙大石，他在軍事等諸多領域都有成就，他的事蹟在歐洲廣為流傳，他的名字也成為西遼帝國的代稱。
general_desc_Suleiman I=他是鄂圖曼帝國在位時間最長的蘇丹，在他的統治下，鄂圖曼帝國的發展進入全盛時期。因為蘇萊曼一世的功勳，他被西方普遍稱為蘇萊曼大帝。
general_desc_John I Tzimiskes=擁有極高軍事才能的羅馬皇帝，他在位時向北擊敗羅斯人和保加利亞人，向東進行了多次東征，極大的增強了東羅馬的軍事實力並擴展了它的疆域。
general_desc_Giovanni=熱那亞雇傭軍將領，“切不可使羅馬亡於我手！”雖然他未曾阻擋住鄂圖曼帝國佔領君士坦丁堡，但他堅毅的意志和無畏的精神被一同留在了那廢墟之下！
general_desc_Gao Xianzhi=高仙芝是唐玄宗時期的名將。他鎮守安西，為維護唐西陲的安全、加強與西域的聯繫作出了貢獻。

