troop_desc_518=拜占庭擲彈兵們將鐵蒺藜和希臘火封裝裝在陶罐裡擲向敵人。當陶罐破碎後，夾雜著鐵蒺藜和碎陶片的希臘火能對集群的敵人帶來可觀的殺傷。

