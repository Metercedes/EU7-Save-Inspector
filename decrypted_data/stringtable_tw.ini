general_desc_Warwick the Kingmaker=第十六代沃里克伯爵，原名理查·內維爾，在玫瑰戰爭中因扶持多位貴族登上王位而被稱為“造王者”
general_desc_Edmund Beaufort=第二代薩默賽特公爵，約克公爵理查的政敵
general_desc_Richard of York=第三代約克公爵，原名理查·金雀花。作為金雀花家族的後裔，他擁有王位的繼承權。
general_desc_Margaret of Anjou=亨利六世的妻子，蘭開斯特家族的核心人物。在軟弱的亨利六世執政期間，拉攏薩默賽特公爵作為政治盟友，成為了國家實際上的治理者。
general_desc_Henry VI=英格蘭國王，性格軟弱。對國家缺乏治理能力，且無力統治臣民。在位期間大臣相互爭奪權利，最終導致了玫瑰戰爭的爆發。
general_desc_Richard Neville=第五代索爾茲伯里伯爵，造王者沃里克的父親
general_desc_Henry Percy2=第二代諾森伯蘭伯爵
general_desc_Henry Percy3=第三代諾森伯蘭伯爵
general_desc_Henry Percy4=第四代諾森伯蘭伯爵
general_desc_Henry Beaufort1=第二代薩默賽特公爵之子
general_desc_Henry Beaufort2=第三代薩默賽特公爵，第二代薩默賽特公爵艾德蒙·博福特之子
general_desc_John Neville1=內維爾男爵
general_desc_Edward IV=約克公爵理查之子
general_desc_John Neville2=第一代蒙塔古勳爵
general_desc_John Grey of Groby=蘭開斯特家族的騎士，伊莉莎白·伍德維爾的丈夫。
general_desc_Elizabeth Woodville=愛德華四世的妻子，被稱為“白皇后”。她的女兒嫁給了後來的亨利七世，成為了都鐸王朝的開創者之一。
general_desc_Li Shimin=唐朝的第二位皇帝，在位期間大力改革內政，為唐朝數百年的繁榮奠定了堅實的基礎；同時對外開疆拓土，平定了周邊的勢力，被尊稱為“天可汗”。
general_desc_Michael VIII=拜占庭巴列奧略王朝的奠基人，在位期間積極採取外交手段解決拜占庭帝國的外部威脅，使原本岌岌可危的拜占庭帝國又延續了兩個世紀。

