troop_desc_118=在地中海上巡弋的海盜，是往來船隻的夢魘
troop_desc_213=在方陣中負責抵禦衝擊的前排戰士，能夠為後方的火槍手提供安全的射擊條件
troop_desc_214=嶽飛組建的部隊，由步兵和騎兵組成，在對抗金軍騎兵的戰鬥中屢建奇功
troop_desc_317=立陶宛大公的親衛騎兵，裝備精良，以戰錘作為武器，即使面對重甲敵人也能造成可觀的殺傷
troop_desc_417=一支盔甲、旗幟甚至武器都是紅色塗裝的騎兵部隊。他們身著紅色鐵甲，訓練有素，威風凜凜，在戰場上是一支不可忽視的力量。
troop_desc_418=以武士階層為核心組成的一支部隊，他們忠誠、勇敢，裝備精良且訓練有素，具有出色的戰鬥力和協同作戰能力。
troop_desc_419=由匈雅提·馬加什組建的精銳雇傭軍團，在與奧斯曼的戰爭中發揮了舉足輕重的作用
troop_desc_420=以長柄斧作為武器，斧槍的設計兼顧了刺擊與劈砍，是一種較為全能的騎兵
troop_desc_421=金兀術的精銳重裝騎兵，士氣高昂時有著恐怖的衝擊力
troop_desc_520=伊凡雷帝組建的精銳衛戍部隊，常使用月刃斧作為火槍射擊時的支撐
troop_desc_612=使用飛斧作為攻擊手段的遠端騎兵，能夠對近程騎兵造成極強的擾亂效果
troop_desc_613=使用弩箭殺傷敵人的遠端騎兵，通常用於襲擾打開方陣缺口，為重騎兵的衝擊創造條件

