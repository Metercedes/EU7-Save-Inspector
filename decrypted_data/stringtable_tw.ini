stage_intro_30101=鐵臂威廉去世後，德羅戈成為了阿普利亞公爵。坦克雷德和第二個妻子所生的兒子羅伯特來到了義大利。德羅戈並不喜歡這個弟弟，他將羅伯特派遣到卡拉布裡亞，這個貧瘠的地方不歡迎諾曼人，羅伯特憑藉狡猾伎倆壓榨著百姓們，這裡人都稱他為“吉斯卡爾”，即“狡猾者”。
stage_intro_30102=倫巴第人逐漸開始厭惡諾曼人的貪婪，暴亂四起。東羅馬人乘機派出了間諜和刺客。1051年德羅戈遇襲身亡，整個阿普利亞陷入混亂。與諾曼人有仇的羅馬教皇利奧九世立刻聯絡了東羅馬皇帝、神聖羅馬皇帝以及當地貴族形成了反諾曼聯盟。韓弗理不得不緊急召集了羅伯特。
stage_intro_30103=東西教廷走向了分裂，諾曼人的危機旋即消失。現在唯一的威脅反倒變成了手足之間的對立。韓弗理在飽受瘧疾和精神衰竭的折磨後，決定和羅伯特和解，確認了羅伯特的繼承權。羅伯特帶著他最年幼的弟弟羅傑開始了對卡拉布裡亞的征服。
stage_intro_30104=羅伯特和羅傑在卡拉布裡亞征戰了5年，這5年的戰爭使他們都成為了成熟的領袖。
stage_intro_30105=改革派教皇與神聖羅馬帝國皇帝和貴族們不和，為了確保自己在教廷的地位，教皇冒險承認諾曼人在義大利的地位並確保他們成為盟友。 1059 年 8 月 23 日的《梅爾菲條約》中，教皇尼古拉斯二世任命吉斯卡爾為阿普利亞、卡拉布裡亞和西西里島的公爵。
stage_intro_30106=自從鐵臂威廉的離開後，西西里島重新成為撒拉遜人的地盤，1060年，兄弟倆越過海峽登陸西西里，開始了新的征服之路。
stage_intro_30107=隨著勝利越來越多，兄弟倆為了戰利品和指揮權而反目，兩個人做了一個尷尬的決定-共同統治，之後羅伯特就很少待在西西里島，他的目標開始轉向東方，他決心奪取東羅馬在義大利半島最後的地盤。
stage_intro_30108=巴里淪陷後，羅伯特愈發貪婪，向倫巴第公國發動了進攻。阿馬爾菲、薩勒諾和那不勒斯相繼被吉斯卡爾攻擊。
stage_intro_30109=65歲的羅伯特絲毫沒有倦意，他熱愛戰場熱愛權力，他開始覬覦東羅馬帝國的土地，甚至穿上仿製的羅馬皇帝皇袍。塞爾柱東突厥進犯東羅馬，羅馬皇帝米海爾七世為了尋求盟友同意和羅伯特聯姻，迎娶了羅伯特的女兒海倫娜，只可惜還未抵達君士坦丁堡，皇帝就被他的將軍推翻了。
stage_intro_30110=西元1081年春，雖然新的皇帝阿萊克修斯答應了羅伯特的所有請求，但他又怎麼可能錯過發動戰爭的藉口，率領著早就準備好的150艘戰船和2萬名士兵進軍君士坦丁堡。
stage_intro_30111=當羅伯特的兒子博希蒙德在東羅馬高歌猛進之時，阿萊克修斯給了德皇亨利送去了一封信和幾袋黃金，讓他進軍防衛薄弱的羅馬。亨利四世和教皇的矛盾由來已久，又豈會錯過如此良機，教皇大驚失色向羅伯特呼救。
stage_intro_30112=羅伯特在平息了義大利叛亂後，終於將所有精力轉向東邊。70歲高齡的吉斯卡爾招募了一支大軍準備完成他羅馬皇帝的夙願。但在登陸凱法利尼亞島時，染上了瘟疫，並在1年後去世。他的墓碑上刻著：“這裡安息著吉斯卡爾，這個世界的恐慌……”

stage_intro_30201=吉斯卡爾擁有兩段婚姻，並育有十多個孩子，而最有能力的兒子卻是一個私生子。他繼承了維京先祖的金髮和高大的身材，和他父親一樣魯莽、勇敢且活力十足。
stage_intro_30202=博希蒙德成年之後就在父親吉斯卡爾的麾下戰鬥，在西西里島積累了很多戰鬥經驗，但直到父親開始進攻東羅馬，他才真正展現出自己真正的實力。1081年羅伯特吉斯卡爾帶領著150艘戰船和2萬名士兵前往君士坦丁堡，然而因為被教皇伏擊，諾曼人損失了大部分主力戰船。
stage_intro_30203=博希蒙德開始奪取東羅馬在馬其頓和色薩利地區的堡壘，但他被困在了拉里薩，因為東羅馬人的堅守以及威尼斯人的搗亂讓他的後勤補給一直無法順暢。
stage_intro_30204=1084年博希蒙德再次陪同父親前往東羅馬，雖然擊敗了威尼斯艦隊並佔領了科孚島，但一場瘟疫襲擊了諾曼人，吉斯卡爾和博希蒙德同時身患重病，不得不再次中斷征服東羅馬的計畫。
stage_intro_30205=羅伯特吉斯卡爾於1085年去世，同父異母的弟弟羅傑博爾薩在其母以及叔父西西里的羅傑的幫助下剝奪了博希蒙德的繼承權。爭奪繼承權和土地的內戰在義大利持續了10年。
stage_intro_30206=1096年烏爾班二世發動了十字軍東征，招募十字軍去收復聖地，博希蒙德決定不再理會繼承權，通過他的號召力，迅速獲得了一支強大的十字軍。
stage_intro_30207=昔日的對手阿萊克修斯用最盛大的典禮迎接了博希蒙德，但要求博希蒙德對他宣誓效忠，且承諾歸還諾曼人佔領的帝國領土。博希蒙德思考後答應，但他要求皇帝冊封他為：“東方統帥”，以便他可以獲得整個十字軍的領導權，但被狡猾的皇帝托詞婉拒。
stage_intro_30208=博希蒙德帶領著他的侄子坦克雷德橫渡博斯普魯斯海峽進軍尼西亞，圖盧茲的雷蒙德四世緊隨其後，作為十字軍的第一場戰鬥，誰都想一戰成名而成為真正的領袖。
stage_intro_30209=十字軍隊伍中只有法蘭克人雷蒙德四世能與博希蒙德一較高下，他們分兵兩路，都想著能在對手之前獲得更多戰果。
stage_intro_30210=前往耶路撒冷的道路上，安條克城的佔領成為了十字軍覆滅與否的關鍵，如果在卡布卡大軍壓境之前佔領下安條克那麼十字軍還有機會能在城內防守，否則只能在城外直面塞爾柱人的數萬大軍，而此時的十字軍已經如同強弩之末。
stage_intro_30211=安條克被十字軍攻陷後，博希蒙德和雷蒙德達成協議，博希蒙德獲得安條克的所有權，但承認雷蒙德為十字軍的最高統帥。博希蒙德獲得了他夢寐以求的領土和名譽，成為了一位名副其實的親王，但也因此得罪了羅馬皇帝阿萊克修斯。
stage_intro_30212=1100年夏，博希蒙德留下侄子坦克雷德駐守安條克，自己帶領著300名將士前往幼發拉底河擴展土地。
stage_intro_30213=博希蒙德被囚禁了3年，這3年間他的侄子坦克雷德為他擴展了公國的版圖，剛剛獲釋的博希蒙德為了名譽揮兵南下。
stage_intro_30214=安條克公國位於東羅馬帝國和塞爾柱之間，軍隊和金錢的損耗讓博希蒙德難以自持，更不用說擴張。博希蒙德不得不前往歐洲募集資金和傭兵。讓他意外的是無論他在義大利還是法國，都被視為十字軍東征的英雄，法王腓力將他召為女婿，人氣之高，甚至讓英王亨利阻止他前往英國。
stage_intro_30215=在巨大名望的加持下，博希蒙德再一次回想起父親的夙願，他募集了35000精兵良將決定再次進攻東羅馬。
stage_intro_30216=在瘟疫和圍攻之下，博希蒙德屈辱地簽下了停戰協議，儘管他還擁有安條克公國，但他似乎無法原諒自己的失敗，乘船前往西西里島，三年後他在絕望潦倒中去世，並被安葬在卡諾薩迪普利亞。安條克公國在坦克雷德的攝政下得以延續。

stage_group_name_30002=博希蒙德的日記
stage_group_name_30003=博希蒙德的日記

family_letter_desc_201=我父親靠放火和救火獲得了財富，這也讓他獲得了那個外號。但他也經常捐錢給教會，所以他在教會的人脈和名聲一直很好。---博希蒙德一世
family_letter_desc_202=父親年輕的時候被叔叔排擠了多年，所以他對羅傑也是一樣，但這並不是最好的辦法。
family_letter_desc_203=我的父親終於獲得了家族中最高地位-公爵，這是家族最榮耀的一天，也是他在教會經營多年的結果。
family_letter_desc_204=西西里島一直是我們家族的信念，那個富饒而美麗的島嶼，讓威廉叔叔之後的每一個人都會為這座島去戰鬥。
family_letter_desc_205=或許我父親並不想和羅傑叔叔在西西里島的領導權上做糾纏，他的夢想更為遙遠。
family_letter_desc_206=父親一直不服氣於征服者威廉，他說都沒有戰勝過希臘人怎麼能夠稱自己是征服者？
family_letter_desc_207=有一天我們家族只要有任何一個人坐上君士坦丁堡的皇座那就真的無愧於“最高領袖”這個稱謂，名譽勝過生命，生命不息戰鬥不止！
family_letter_desc_208=父親回到了義大利，但願他能迅速平定事端後再回來。狡猾多端的阿萊克修斯並不是那麼好對付。

family_letter_desc_301=我還記得那一天10月18日，父親在攻城，阿萊克修斯突然出現在附近，如果讓他突進到城市下，那麼我們必將戰敗，我沖了出去。
family_letter_desc_302=不是希臘人擊敗了我們，是瘟疫，是詛咒，或許是神站在了希臘人那一邊，從那一年起父親一病不起。
family_letter_desc_303=是誰陪伴在父親的左右，是誰打下如此多疆域，而他卻因為僅僅是擁有一個好母親和叔父就偷走了我的一切。這不公平！
family_letter_desc_304=既然這裡沒有容身之所，那就讓我走向東方！
family_letter_desc_305=虛偽的羅馬皇帝根本不想給我任何承諾，安娜公主雖然年紀很小待我卻很真誠。所謂的十字軍東征也不過是為了羅馬皇帝收復失地，看來希臘人越來越虛弱了。
family_letter_desc_306=我們沒有猜錯，阿萊克修斯根本沒有想過給予我們任何的幫助以及賞賜，這就怪不得我們不仁不義了，戰鬥獲取的就是我們的。
family_letter_desc_307=7個月了，我們的補給已經枯竭，只能相信奇跡了。願上帝保佑我們。
family_letter_desc_308=上帝保佑，父親，我終於成功了。安條克，這裡將是我們家族新的開始。
family_letter_desc_309=3年了，我已經都快忘記黃沙撲面的感覺，安條克還是猶如孤島一般，被多面夾擊，我需要擴張領土。
family_letter_desc_310=是的，沒有我的堅持，撒拉遜人、塞爾柱人早就佔領了君士坦丁堡，一切榮譽都是我應得的！
family_letter_desc_311=仇恨我從未忘記，父親，我必將用希臘皇帝的頭顱來祭奠你。戰鬥吧！名譽勝過生命！

