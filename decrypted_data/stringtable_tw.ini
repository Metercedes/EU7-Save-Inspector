Saladin2=崇高騎士薩拉丁
general_desc_Saladin2=薩拉丁不僅是一位優秀的軍事指揮官，還是一位品行出眾的騎士。他的寬容與仁慈使得許多人免於戰後的無情摧殘，即使是他的對手也會被他的高尚品格所打動。
general_skin_20169=征服者穆罕默德
Mehmed II 2=征服者穆罕默德
general_desc_Mehmed II 2=穆拉德二世逝世後，穆罕默德二世第二次繼位成為鄂圖曼蘇丹。在未來的三十年間，鄂圖曼周圍的勢力都將敗倒在他的手下。
Wu Zetian=武則天
general_desc_Wu Zetian=唐朝女帝，在位期間大力發展教育與文化事業，選拔了大量人才。在她的統治下，唐朝經濟愈加繁榮，社會也得到了長足的發展。




battle_talk_170101=消滅叛軍首領！
battle_talk_170102=我們陷入了夾擊，向威廉·赫伯特求援！
battle_talk_170103=截殺愛德華四世的援軍！不要放任何人過去！
battle_talk_170104=援軍已全部被擊潰，發起總攻！
battle_talk_170201=是時候讓他們知道背叛者的下場了
battle_talk_170202=愛德華四世殺害了我的父親！我要為父親報仇！
battle_talk_170203=敵人正在潰退，抓住他們的首領！
battle_talk_170204=羅伯特已死，放棄抵抗吧！
battle_talk_170301=霧太大了，我甚至無法看清友軍的標誌。
battle_talk_170302=我們取得了優勢！前進！擊潰敵軍！
battle_talk_170303=我想我應該回到戰場支援我的盟友
battle_talk_170304=是愛德華的軍隊！消滅他們！
battle_talk_170305=敗局已無法挽回，得想辦法撤退
battle_talk_170306=抓住沃里克！不要讓他跑了！
battle_talk_170401=雖然我們的軍隊很疲憊，但是敵軍也是遠道而來，他們未必有充足的準備
battle_talk_170402=抓緊時間修築工事，一定要趕在約克軍隊到來前做好準備
battle_talk_170403=左翼發現敵軍！擋住他們的突襲！
battle_talk_170404=清掃戰場！不要放過一個敵人！
battle_talk_170501=英格蘭王位不該屬於理查三世！亨利·都鐸才是最好的人選！
battle_talk_170502=無恥的背叛者！我必要讓你付出代價！
battle_talk_170503=理查三世的勢力太大了，我們需要設法削弱他的勢力範圍
battle_talk_170504=抓住白金漢公爵！我要把他斬首示眾！
battle_talk_170601=理查三世的殘暴統治將在今天畫上句號
battle_talk_170602=英格蘭王位只會屬於我！
battle_talk_170603=全軍衝鋒！目標：理查三世！
battle_talk_170604=理查三世已死，吾王萬歲！
battle_talk_700801=發現敵人！準備戰鬥！
battle_talk_700802=敵人的數量比我們多，全軍後撤，依託城鎮進行防守！
battle_talk_700803=我們的阿蘭人援軍士氣低下不願出戰，要想辦法鼓舞他們的士氣。
battle_talk_700804=有了阿蘭人的援助，我們一定能擊退敵人。
battle_talk_700805=戰場形式被逆轉了，我們落入了下風
battle_talk_700806=有敵人！展開戰鬥隊形！
battle_talk_700807=敵軍以步兵為主，我們應當發揮機動優勢包圍他們
battle_talk_700808=優先佔領城鎮，阻斷他們的退路！
battle_talk_700809=馬上派人向阿蘭人求援！
battle_talk_700810=有援軍又如何，我會把他們全部擊潰！

