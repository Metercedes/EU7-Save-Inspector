stage_intro_4761=985年，兩位安納托利亞將軍試圖架空剛登基的巴西爾二世，巴西爾二世需要擊敗他們才能真正掌控這個國家。
stage_intro_4765=拜占庭的長期內戰削弱了帝國對東部地區的掌控，為了應對法蒂瑪王朝的不斷襲擾，巴西爾二世親自率兵進軍敘利亞。
stage_intro_4767=998年，拜占庭帝國在與法蒂瑪王朝的邊境戰爭失利，巴西爾二世再次親自率兵坐鎮邊境，清掃了一系列敵軍的據點，捍衛了帝國的領土。
stage_intro_4763=西元986年，巴西爾二世皇帝親率軍隊進攻保加利亞，在撤退途中遭遇了保加利亞軍隊的伏擊。
stage_intro_4769=1014年，巴西爾二世在經過長期的作戰之後成功將保加利亞軍隊主力逼退至愛琴海北岸，雙方多年的衝突將再次畫下句號。
stage_intro_4771=1020年，亞美尼亞國王趁巴西爾二世對義大利用兵時聯合法蒂瑪王朝進攻拜占庭邊境，憤怒的巴西爾立即率兵返回，並在後續的戰役中佔領了亞美尼亞地區。

