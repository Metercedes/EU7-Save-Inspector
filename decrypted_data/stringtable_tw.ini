general_desc_Roger II1=西西里王國的奠基者，一位兼具智慧與雄心的偉大君主。他超越了宗教和文化的分歧，以開闊的胸懷與非凡的手段，將不同的民族與信仰融合在他的王國之下。
general_desc_Li Shimin1=唐王朝的戰神，憑藉無與倫比的軍事才能征戰四方、所向披靡。然而，正是這份耀眼的鋒芒，使他成為父親與兄弟眼中不可忽視的威脅。在權力的漩渦中，他成長為一位令人敬畏又難以揣測的雄才。
general_desc_Wu Zetian1=如同初綻的花朵，少女時期的武則天美麗而靈動，舉手投足間透著一抹青春的溫婉與純真。此時的她，尚未被權謀與野心侵染，內心仍懷抱著少女的天真與憧憬，宛若風華正茂的畫卷一角，令人駐足難忘。
general_desc_ZhiTianXinChang=日本戰國時期的傑出領袖，以聰明才智和軍事策略而著名。他統一了日本中部地區，建立了強大的勢力，與豐臣秀吉、德川家康兩人並稱為"戰國三傑"。
general_desc_ZhiTianXinChang1=本能寺之變後，包括明智光秀在內的眾人都認為織田信長已死。而逃出生天的織田信長卻在鮮血和烈焰之中獲得了新生，並以魔王之姿歸來！
general_desc_Pope Gregory IX=他是天主教會的領袖，也是教皇國的統治者。

