battle_talk_120406=敵人攻佔了我們的後方，我們被徹底包圍了。
battle_talk_120407=我們的兵力遠少於敵人，任何損失都有可能導致我們徹底失敗，保護好我的軍隊！
battle_talk_120501=強烈的地震摧毀了加里波利的城牆和守衛力量，鄂圖曼軍隊絕對不會放棄這個千載難逢的機會。
battle_talk_120502=如今我們缺兵少糧，必須想辦法籌措金錢贖回這座城市。
battle_talk_120503=加里波利的城防已經被徹底摧毀，現在奪取這座城市對我們來說輕而易舉！
battle_talk_120504=愚蠢的拜占庭，竟然想要用金錢來買回這座城市。
battle_talk_120505=竟然有意想不到的敵人出現了，注意海面上的敵軍。
battle_talk_120506=看來拜占庭沒有任何通過武力奪回城市的想法，既然如此那我們便主動出擊。
battle_talk_120507=拜占庭軍隊如今虛弱不堪，是時候擴大我們的疆土了！
