conquest_faction_desc_603=Since Henry, Duke of Lancaster seized the throne of England and reopened the war with the Kingdom of France, the war had lasted for nearly 10 years, and the people of both countries had long suffered. In the face of the continuous outbreak of peasant revolts in the country, the Kingdom of England urgently needs a proper solution to the dispute with the Kingdom of France.
conquest_faction_desc_602=As a vassal regime established by the Kingdom of England after its invasion of the island of Ireland, each governor of the Irish dominions had to be ennobled by the King of England. To this day, the unstable regime of the Kingdom of England has given the Irish territories greater autonomy, and the lords of the territories are increasingly reluctant to submit to the rule of the Kingdom of England.
conquest_faction_desc_601=The kingdom was founded by the Gaels who did not want to be ruled by the Kingdom of England. As the only remaining Gaelic power on the island of Ireland, the Kingdom of El Youk would never submit to the Kingdom of England.
conquest_faction_desc_604=Since its establishment, the Kingdom of Scotland has been at war with its southern neighbor, the Kingdom of England, and both sides aspire to conquer each other and unite the whole of Great Britain. Now that the Kingdom of England has gained a huge advantage in the war against the Kingdom of France, the Kingdom of Scotland must devote more forces to hold the Kingdom of England at bay.
conquest_faction_desc_605=After the disintegration of the Capetian Dynasty, King Edward III of England began nearly a century of war between England and France as he sought the throne of France. Now under the British offensive, the Kingdom of France has been losing cities and even the capital, Paris, has fallen, and the rule of the Valois Dynasty seems to be inevitably coming to an end, unless a miracle happens.
conquest_faction_desc_606=The Duchy of Brittany, located between the Kingdom of France and the Kingdom of England, has often become a battleground between these two powers over the succession of dukes, thus causing unrest within the duchy. Now that the war between France and England has resumed, the Duchy of Brittany needs to be more careful in order to avoid being caught in the quagmire of the dispute between the two powers.
conquest_faction_desc_607=The Duchy of Burgundy was a vassal duchy power of the Kingdom of France, dating back to the Burgundians' establishment of the Kingdom of Burgundy during the Great Barbarian Migration. When Britain and France were caught in the quagmire of war over the French throne, the Duchy of Burgundy took the opportunity to expand its territory and gradually became a powerful force on the European continent.
conquest_faction_desc_608=A syncretic confederation consisting of the Scandinavian kingdoms of Denmark, Norway, and Sweden, all three kingdoms shared a single monarch. The establishment of the Kalmar Union allowed the Viking descendants of Scandinavia to unite against their powerful neighbor to the south, the Holy Roman Empire.
conquest_faction_desc_609=An empire founded by King Otto I of the East Frankish Kingdom after his coronation as emperor of the Romans in Rome. Although the Holy Roman Empire was strong at the beginning, after the chaos of the Great Empty Throne, the central power of the Empire declined and the Empire gradually evolved into a loose confederation of hundreds of vassal states.
conquest_faction_desc_610=One of the vassal states of the Holy Roman Empire, the Bohemian Principality was raised from the once Czech-established Principality of Bohemia. The people of Bohemia had to rise up against the tyranny of the Holy Roman Empire because of its support for the Catholic Church and its brutal suppression of Bohemian people who supported or sympathized with the Hussites.
conquest_faction_desc_611=One of the vassal states of the Holy Roman Empire, the Duchy of Bavaria was elevated from a vassal state to an independent duchy. Duke Albrecht II of Austria, as the son-in-law of the Holy Roman Emperor Sigismund, was appointed as his successor, and this was perhaps the perfect opportunity for the Habsburgs to claim the imperial throne.
conquest_faction_desc_612=One of the vassal states of the Holy Roman Empire, the Duchy of Bavaria originated as an autonomous duchy established by the East Frankish Kingdom. The Wittelsbach family, which ruled the Duchy of Bavaria, had won the throne of the Holy Roman Empire several times, and now with the internal turmoil of the Empire, the Duchy of Bavaria was trying to regain control of the Empire.
conquest_faction_desc_613=The Teutonic Knights conquered the Prussian region and established a Christian state. The Teutonic Knights were invited by the Kingdom of Poland to enter Prussia, but after the establishment of the Teutonic State, the two sides quickly turned against each other, and now they are at war with each other and see each other as a major problem.
conquest_faction_desc_614=Or the Crown Lands of the Kingdom of Poland, which refers to the area where the Poles are in power and actually control. Since the Teutonic Knights conquered Prussia, these insatiable wolves began to invade the Kingdom of Poland, and if the Germans were not driven out of Prussia, there would be no peace in the Kingdom of Poland.
conquest_faction_desc_615=After the collapse of the Kingdom of Arles, the House of Savoy established an independent duchy in the northwestern part of Italy and the southeastern part of France. The Duchy of Savoy was located between the Eastern and Western Frankish kingdoms and needed to be careful with these two great powers.
conquest_faction_desc_616=The Duchy of Milan is located in the Lombardy region of Italy. Although nominally subordinate to the Holy Roman Empire, the Duchy has a high degree of independence and autonomy. The Alps provide a natural northern barrier to the Duchy of Milan, and the Principality can actively develop to the south, giving priority to the unification of the northern regions of Italy.
conquest_faction_desc_617=Originally a commercial city-state located in the Ligurian region on the northwest coast of Italy, it flourished through the Crusades and gradually developed into the most powerful maritime republic in the western Mediterranean. Later, when competing with the Venetian Republic for the lucrative spice trade, Genoa failed to defeat the Venetian Republic and now has no choice but to lie dormant for the time being.
conquest_faction_desc_618=When the Western Roman Empire fell to barbarian invasion, the inhabitants of the northern coast of Italy fled to the lagoon and established settlements there, and the Venetian Republic developed. After several Venetian-Genoese wars, the Venetians completely defeated the Genoese Republic and asserted their maritime supremacy.
conquest_faction_desc_619=After the Sicilian Vespers War, the United Kingdom of Aragon separated Sicily from the former Kingdom of Sicily, and the territory of the Italian part of the former kingdom was called the Kingdom of Naples. The Kingdom of Naples never recognized the division of Sicily and was determined to recover the lost territories.
conquest_faction_desc_620=The Kingdom of Portugal was established after the independence of the Portuguese Burgh, which was originally part of the Kingdom of Castile. The Kingdom of Portugal was located at the westernmost point of the European continent, and although it was isolated, its unique geographical position would have saved the Kingdom from the dilemma of multiple enemies if it had chosen an aggressive expansion policy.
conquest_faction_desc_621=The United Kingdom of Castile, a composite monarchy created by the annexation of the Kingdom of Leon, is the main driving force behind the movement to recover the lost territories in the Iberian Peninsula. Now that the remaining Islamic forces in the Iberian Peninsula are weak, the United Kingdom of Castile may try to unify the entire Iberian Peninsula.
conquest_faction_desc_622=A composite monarchy formed by the merger of the Kingdom of Aragon and the Kingdom of Barcelona, the United Kingdom of Aragon firmly controls the main islands in the western Mediterranean Sea and has strong control of the sea, these widely distributed islands are an excellent springboard for the Kingdom to intervene in the affairs of the European continent.
conquest_faction_desc_623=The last remaining Islamic kingdom in the Iberian Peninsula after the dissolution of the post-Omayyad dynasty, the emirate of Granada was in a precarious position in the face of Christian forces that had regained the vast majority of Iberian territory, but fortunately these Christian nations were not united and the kingdom still had a chance of survival.

