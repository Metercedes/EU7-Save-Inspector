stage_intro_4661=In 1410, Jan Žižka took part in the Polish–Lithuanian–Teutonic War as a mercenary and served with distinction at the Battle of Grunwald.
stage_intro_4663=In 1419, when the Hussite War broke out, Jan Žižka took an active part in and led the Prague uprising, becoming an important commander in the revolting army.
stage_intro_4665=In 1420, the Hussite chariot made its first splash on the battlefield of Sudoměř, where hundreds of revolting soldiers under the command of Jan Žižka defeated thousands of knights with the help of a chariot formation.
stage_intro_4667=In 1420, Holy Roman Emperor Sigismund launched the first crusade against the Czech region but was defeated by Jan Žižka at the Battle of Vitkov Hill.
stage_intro_4669=In the winter of 1421, Sigismund surrounded the revolting army at Kutná Hora. However, under the flexible tactical commands from Jan Žižka, the revolts managed to breach out and defeat the enemy in the subsequent entanglement.
stage_intro_4671=In January 1422, Jan Žižka led his troops to pursue the defeated Crusaders on the battlefield of Kutná Hora and launched a war of annihilation, crushing the Crusaders' second expedition.

