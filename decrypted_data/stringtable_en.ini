campaign_name_601=House of Hauteville
campaign_desc_601=The new millennium begins with an expanding Islamic Empire seemingly on the verge of world domination, the Eastern Roman Empire stirring, and the nations of Europe crumbling under the weight of the plague. At this time the descendants of the Vikings were tearing Western Europe apart and at the same time would be the driving force behind the rise of the future. Some of them landed on the shores of Britain, and a humble family would embark on a series of sagas across the Mediterranean, the family called the Hauteville.
campaign_name_307=Troy's Treasure
campaign_desc_307=They find unrivaled, exquisite ancient Greek treasure underneath the old site of Troy. But it's just as dangerous, and the Nemesis curses the treasure.


