battle_talk_150101=I hear their armies are leaving Europe, and this is our best chance! Launch a night attack so we can drive out the invaders!
battle_talk_150102=Good! We'll storm their camp and catch them off guard!
battle_talk_150103=We must not let the camp fall! We must fight back even if our troops are not strong enough! Let them know the power of the Ottoman Empire.
battle_talk_150201=This is so pathetic that you have introduced the Ottomans into the country to defeat me. Don't you know that they are our true enemies?
battle_talk_150202=I'd rather destroy you first. I don't want you to encroach on our territory again!
battle_talk_150203=It seems that it has become only a matter of time before we invade the entire Balkans!
battle_talk_150204=The enemy has entered the river valley. Let's charge out!
battle_talk_150205=Crap! There are ambushes!
battle_talk_150301=We must unite to be able to resist the expansion of the infidels. Otherwise, it will only take a few years before we lose our foothold in the Balkans.
battle_talk_150302=For freedom! Let's drive out the invaders!
battle_talk_150303=How dare these defeated men initiate another war? This time, we must destroy you!
battle_talk_150304=Let's synergize with them in combat!
battle_talk_150305=Do not meet their attack directly, and hold the last defensive point. We will come back to counterattack!
battle_talk_150401=The sultan is about to return. We must launch a counterattack! Make these rebels pay for what they have done!
battle_talk_150402=The provocative behaviors of these vassal states have brought shame to me. My anger cannot wait to trample all over their lands!
battle_talk_150403=The Ottomans are attacking so fast. If I still want to keep my throne, maybe the only way is to surrender.
battle_talk_150404=The Balkans may be taken away if we still do nothing to support our brother country. Let's hurry to rescue them!
battle_talk_150501=Kosovo is the birthplace of our nation and an important strategic location. If we lose it, it means we will lose our foothold.
battle_talk_150502=We must ally. The Turks must not be allowed to advance any further!
battle_talk_150503=No one can stand in our way! Inshallah!
battle_talk_150504=We need to move forward and breach this area! We can expand your territory western further!
battle_talk_150505=I must defend this land, even at the cost of my life.
battle_talk_150506=I surrender! Please allow me to surrender to the sultan!
battle_talk_150507=Let him come closer. I want to see what he looks like.
battle_talk_150508=For the king! For Serbia! Kill!
battle_talk_150509=No!
battle_talk_150601=Let the glory of God shine again on this land! Here, only darkness and despair can I see!
battle_talk_150602=We will save the oppressed Christians and the Roman Empire! Charge!
battle_talk_150603=Don't worry! They're just a temporary collection of rabble!
battle_talk_150604=But their heavy cavalry is strong. We must firmly defend against their first wave of attack!
battle_talk_150605=I never thought we would fail! We were too overconfident.
battle_talk_150701=My empire needs your land. Our flags will fly to the edge of the world!
battle_talk_150702=No! The city defenses of Anatolia are vulnerable. We must rush to the rescue!
battle_talk_150703=All troops march! Ankara is mine!
battle_talk_150704=No, my mistake will lead to the demise of the Empire!
battle_talk_150801=Seize Constantinople! We will become the true masters of the Balkans!
battle_talk_150802=The enemy's army is overwhelming. We must stand firm to protect our country!
battle_talk_150803=A new sovereign has come to the Ottoman Empire with a shaky foundation. This is our best chance to fight back! Strike!
battle_talk_150804=It seems that we will have to suspend the plan to attack Constantinople. Let's destroy these rebels first!
battle_talk_150901=The Empire is currently unable to afford the defense of other cities. It is best for Thessaloniki to be in the hands of the Venetians.
battle_talk_150902=This city should belong to the Ottomans. Now all of you still have a chance to surrender.
battle_talk_150903=Since this city has already belonged to us, there is definitely no possibility of giving up.
battle_talk_150904=The Ottomans launched an attack on Thessaloniki. Although this has alleviated the pressure on Constantinople, the situation is still not optimistic.
battle_talk_150905=Now the city belongs to the Ottomans. The Venetian fleet cannot stop us either.
battle_talk_150906=Thessaloniki is in crisis, but my fleet has been blockaded by the Ottoman fleet. It is urgent to break the blockade to help Thessaloniki.
battle_talk_150907=The Romans attempted to launch an offensive to relieve the pressure on the Venetians. Such an attempt made no sense.
battle_talk_150908=The Ottoman fleet that blocked the sea has been defeated. Our fleet keeps going!
battle_talk_150909=The enemy launched a counterattack. Send our backup forces.
battle_talk_151001=Now the Ottoman Empire is led by the very young Sultan. The spirit of its army is bound to be fragmented. We should take advantage of this opportunity and launch an offensive to achieve victory!
battle_talk_151002=Bloody Christians! Daring to stand in the way of my abdication life! Attack!
battle_talk_151003=Spread the defensive line! We must defend our ground against their attack! Only the sea is what we had behind us, and there's no way back!
battle_talk_151004=The king has been sacrificed. Retreat! But I will avenge him!
battle_talk_151101=For the king! For Hungary! I've come back to avenge the king! Revenge! Revenge!
battle_talk_151102=Their heavy cavalry may be strong, but they cannot withstand our sharp swords and muskets! The future of the Ottoman Empire is in your hands. I need you to have a good look at the course of today's battle.
battle_talk_151103=Yes, Father!
battle_talk_151104=The enemy has been repulsed by us! Counterattack!
battle_talk_151201=Blast open the gates of Rome with artillery and take the capital of the Roman Empire. This land should be ours!
battle_talk_151202=Soldiers, we must defend this city. This is our home, where our families and faith dwell. We will fight until the last minute!
battle_talk_151203=Cannon fire can only entomb my flesh and blood, but it can never bury our faith and determination!
battle_talk_151204=At last, I have fulfilled the wish of my ancestors! Allah will undoubtedly bless us. I will make Your teachings spread throughout Europe!

battle_talk_700601=Our strategy is to surround Tiberias first and lure those Franks to rescue. Our strength lies in field battles, not in sieges and defenses.
battle_talk_700602=Is it too dangerous for us to go to rescue like this? I feel like I smell a conspiracy, perhaps.
battle_talk_700603=In any case, we must go to the rescue. Let's go! May God bless us!
battle_talk_700604=Knights Templar goes behind, in case Saladin wraps us from behind.
battle_talk_700605=We must get to Lake Galilee as soon as possible to replenish our water and supplies. Our team is so short of water that we can't continue anymore.
battle_talk_700606=Perhaps we should consider retreating since we fail to break through Saladin's defensive line ahead.
battle_talk_700607=The only way to survive is to breach the siege! Oh God, we're all going to die here! And the whole kingdom will be destroyed!
battle_talk_700608=Stop them from approaching the water source! Frankish are exhausted and unable to fight. We can take advantage of the opportunity to kill them.
battle_talk_700609=This disunited Frankish army is doomed to failure. It seems to be the time for Jerusalem to change the lord.
battle_talk_700610=God, I am the only one who escaped. Maybe this battle was a mistake from the beginning.

battle_talk_56=Soldiers, charge with me! Victory is at hand. Glory belongs to us.
battle_talk_57=Stay in formation! Allah is with us!
battle_talk_58=Ottomans continue to encroach on the surrounding lands. One day they will come to avenge the past. We can not sit still and watch them growing strength. While they are mired deep in the Balkans, we should take the initiative to attack.
battle_talk_59=The Ottoman cannons have already mounted under the citadel. Constantinople is in danger, so I ask you all to go and support it with me.
battle_talk_60=Though our walls have fallen, our hearts remain firm. Those who wish to take this city will not succeed unless they step over my dead body!
battle_talk_61=No one can be trusted easily. Now that I have taken back everything that belonged to me,  all the hatred shall be repaid with blood.
battle_talk_62=Țepeș has helped me to reassume the throne. I will provide assistance to him then.
battle_talk_63=The glory of the Byzantine Empire will be succeeded by us. From this day on, we are the Byzantine Empire!
battle_talk_64=The dynasty of Qara Qoyunlu had been destroyed. The reinforcements from the Western world also departed from the sea, consolidating their forces to attack the Ottomans in full force.

general_desc_Murad I=Murad I was the sultan of the Ottoman Empire. During his reign, he pursued a policy of territorial expansion, conquered many countries in southeastern Europe and western Asia, and laid the foundation for the rise of the Ottoman Turkish Empire. However, he was assassinated during the Battle of Kosovo.
general_desc_Bayezid I=Son of Murad I, a famous military commander, also known as "Lightning", Bayezid I contributed greatly to the expansion of Turkish territory during his reign. He defeated hundreds of thousands of Crusaders at  Nicopolis but was later taken prisoner at the Battle of Ankara.
general_desc_Murad II=During his reign, Murad II revitalized the country, reorganized its armaments, saved the Ottoman Empire, which was about to be divided, and laid a solid foundation for the subsequent glory of the Ottoman Empire.
general_desc_John Hunyadi=A national hero of the Kingdom of Hungary, nicknamed the "White Knight". Despite repeated defeats, he defied the power of the Ottoman Empire and prevented its expansion for a long time.
general_desc_Princess Sophia=Niece of Constantine XI. She married Ivan III the Great of Moscow, and helped him lead the Russians to complete liberation from centuries of rule by the Golden Horde.
general_desc_Stephen the Great=During his reign, he maintained national stability and inspired the Romanian people for generations to follow his spirit of national independence. He was later posthumously canonized by the Church as "the Great and Holy Stephen".
general_desc_Vlad III=The voivode of Wallachia was a heroic defender of Romania, but he was also known as the "Vlad the Impaler" because of the impalement he inflicted on the nobles and people of his country, and he was also the prototype of the vampire.
general_desc_Charlemagne2=Charles the Great was one of the greatest kings of the Frankish kingdom and one of the most influential figures of medieval Europe. He conquered half of Europe and was crowned "Emperor of the Roman People" by the Roman Pope.
general_desc_Arthur2=It is said that only those who pull out the sword in the stone can become the king of England. King Arthur successfully pulled out the sword from the stone and became the “Eternal King" in people's hearts, he represents heroism, chivalry, and justice!
general_desc_Mehmed the Conqueror2=Because of his courage, leadership and cultural achievements, Mehmed II was revered as the "Sultan of Conquest" and the "Conqueror of Europe". He became a paragon for later sultans.
general_desc_Candarli Halil=Khalil Pasha was a prominent Ottoman statesman and military general who served as commander-in-chief of the Grand Vizier and the Ottoman Empire in the mid-15th century. He was highly respected for his bravery, wisdom, and leadership and was known as the "Wisdom of Turkey" and the "Master of Khalil".

