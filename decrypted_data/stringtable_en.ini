;defeated_event_desc
battle_talk_thankgift0=Leave the gifts, you may go!
battle_talk_thankgift1=I will accept the gifts. May our two countries remain at peace.
battle_talk_thankgift2=Thank you for the gifts. May our good relationship be maintained.
battle_talk_thankgift3=Thank you very much for your gracious gifts. We would be honored to assist you in any way we can!
battle_talk_acceptagreement1=For the sake of our people, I agree to a truce!
battle_talk_acceptagreement2=I agree to a passage agreement, our countries can exchange needed goods!
battle_talk_acceptagreement3=From today on, we are allies!
battle_talk_refuseagreement1=Now you want to beg for mercy? What a disgrace!
battle_talk_refuseagreement2=Sorry, our counties are not close enough to be signing a passage agreement!
battle_talk_refuseagreement3=We also hope to form an alliance with your country, but now is not the best time!
battle_talk_tearagreement2=This is the end of the passage agreement. Please leave our territory immediately!
battle_talk_tearagreement3=From now on, we are no longer allies!
battle_talk_declarewar=From now on, we are enemies. Be ready to face justice!
battle_talk_acceptexhort=I can't believe it, but I have no choice but to surrender!
battle_talk_refuseexhort=We would rather burn in hell than surrender!
battle_talk_warninvade=You are trespassing on our sovereign territory. Please leave with your troops immediately!
battle_talk_1=Warriors of the tribe, the rich Gaul should be owned by our Huns! Ride on your horse, follow me to Gaul and destroy all enemies who dare to stop us.
battle_talk_2=The English brutally killed our father. We, the sons of Ragnar shall unite and make the English pay with their blood.
battle_talk_3=We have finally established our own kingdom! I believe that before long, the entire North Sea will be conquered by the powerful Kingdom of Denmark!
battle_talk_4=The Vandal Kingdom and the Byzantine Empire are at war, and this is our chance to drive the Vandals and Romans out of North Africa, which belongs to us, the Maoris.
battle_talk_5=What a rich land! Warriors from the steppe, we have untold riches before us, waiting for us to get them with our war horses, bows and arrows!
battle_talk_6=After annihilating the Vandal Kingdom, Belisarius defeated the army of the Eastern Gothic Kingdom in Italy and even recovered the city of Ravenna. Now he is more prestigious than ever in the army and needs to be carefully dealt with.
tutorial_talk_101=Welcome to the Middle Ages. Here I will show you some systems and gameplay of the conquest mode.Now, please choose your force.
battle_talk_8=Click on the Policy icon at top left to open its interface.
battle_talk_9=In conquest mode, you need to spend resources to study policies so corresponding policies could come into effect.
battle_talk_10=You can change consuls Policy, and the internal affairs skills of the selected consul will provide a variety of bonuses for your power.
battle_talk_11=The capacity to deal with internal affairs of a consul can also reduce the resources needed to study policies.
battle_talk_12=Attention. A consul can only be changed once per turn.
battle_talk_13=Each force begins with its own task chain, and completing the current task will produce corresponding rewards.
battle_talk_14=In the conquest mode, each force has its own conditions for victory. Complete all the conditions to earn the final victory and get corresponding rewards.
battle_talk_15=Having met the established conditions, you can choose to quit the conquest or continue the campaign in the evaluation interface.
battle_talk_16=You currently have one unfinished condition for victory. Try to capture Winchester, the capital of the Saxons.
battle_talk_17=You can recruit your troops pre-configured in the CASTLE at the castle's tavern.
battle_talk_18=Please note that only the first recruitment is free of charge.
battle_talk_19=Conquest mode allows you to have diplomatical interaction with other forces.
battle_talk_20=Now you can check your diplomatic relations and points and their changing trends with other forces.
battle_talk_21=You are now at war with the Saxons and the Angles, and at peace with the Jutes.
battle_talk_22=Your diplomatic values with the Saxons show a downward trend, with the Angles an upward trend, and with the Jutes they stay the same.
battle_talk_23=It is not wise to fight on two sides. Based on your current diplomatic points with the Angles, you can try to make a truce with them.
battle_talk_24=In this diplomacy interface, you can view the current consuls, left resources, and diplomatic relations with other forces of the two sides.
battle_talk_25=Diplomatic relations, diplomatic points and their changing trends of both sides are shown at this interface as well.
battle_talk_26=When the cursor representing the current diplomatic points is between "War" and "Truce", the two sides can sign an armistice.
battle_talk_27=The closer the cursor is to "Truce", the higher the probability to reach a successful armistice.
battle_talk_28=When having a negotiation with another side, you can improve the diplomatic points by giving gifts.
battle_talk_29=The more resources you spend on a gift, the higher the diplomatic points you will gain.
battle_talk_30=Your diplomatic points with the Angles are enough for an armistice. Please sign an armistice with the Angles.
battle_talk_31=The steps of signing a passage agreement and alliance agreement are similar to those of signing an armistice.
battle_talk_32=It should be noted that a passage agreement can be signed only after an armistice has been signed, and an alliance agreement can only be signed later.
battle_talk_33=When capturing a belligerent's capital, you can ask the other side to surrender.
battle_talk_34=You can try to persuade the Saxons to surrender now that you have occupied Winchester.
battle_talk_35=The success probability of persuasion is affected by your current strength and the remaining strength of the opponent.
battle_talk_36=In conquest mode, the era will limit the rank of recruited troops.
battle_talk_37=When the conditions are satisfied, the era upgrade will automatically take place at the next turn.
battle_talk_38=According to the conditions shown, the Britons need 2 secondary cities to enter the Dark Age.
battle_talk_39=The tutorial of the conquest mode is over.
battle_talk_40=The Crusader States in the east has sent a plea for help. They are suffering from enemy attacks. Soldiers of the Holy Roman Empire, follow me and march to the East to support our Crusader brothers.
battle_talk_41=Warriors of the Kingdom of France, I decide to respond to the call of the Holy See to form an army to support the Crusader States, and lead you to the East to support Jerusalem to obtain the supreme glory!
battle_talk_42=The Islamic world is being invaded by European crusaders, and the Seljuk Empire should take up the important responsibility of leading the people of Western Asia to fight back and expel the crusaders, so that the world could once again witness the power of the Seljuk Empire.
battle_talk_43=War provides a haven for the ambitious ones. While these countries and forces in the Middle East are fighting hard against each other, it is the right time for us, the Kipchak people, to move south.
battle_talk_44=Jerusalem has been recovered by our army. The glory belongs to us!
battle_talk_45=Warriors of the dynasty, now that the Abbasid dynasty of Fira is unbearable, it is time for all Arabs to realize that only we, the Fatimid dynasty, can rebuild the glory of the Arabian Empire!
battle_talk_46=The Byzantine Empire invited us to attack the Bulgarian Empire together, and these smart-ass Greeks want to use us as a sword. Ha ha, don't think that we are lacking an excuse to enter the rich Balkan region.
battle_talk_47=The era of the Abbasid dynasty is now a thing of the past, and the next step will be for us, the Buyid dynasty, to lead the Islamic world.
battle_talk_48=This is a blasphemy and betrayal of God! In the name of the Holy Father, I call on all those who believe in Christ to take up arms and crush this treacherous traitor.
battle_talk_49=Soldiers, the Pope has just crowned me "Emperor of the Holy Roman Empire", and we will inherit the legal system of the Western Roman Empire, and from today we are the new Roman Empire!
battle_talk_50=How dare a mere Germanic barbarian call himself emperor of the Romans? This is an insult to the Byzantine Empire, and if we do not send troops to crush this usurper, how can we be ashamed to call ourselves Romans?
battle_talk_51=Generals, Sigismund, who abandoned our Hungary when he became Holy Roman Emperor, and even sold out his kingdom to maintain his scattered empire, no longer deserves to be King of Hungary.
battle_talk_52=I do not know whether God is loving or evil to the English. I only know that all Englishmen will be driven out of France except the dead.
battle_talk_53=Soldiers of France, march with me to Reims, where the Dauphin will be crowned King of France, and God is with us.
battle_talk_54=I have nothing to fear but treason. For the sake of France, I will die like a man!
battle_talk_55=Hungarian warriors, there are constant rebellions in the Holy Roman Empire. We need to help the empire to stabilize the situation as soon as possible, so that we can resist the aggression from the East with the support of the empire.
battle_talk_101=Welcome to the middle ages. Here, I will teach you some basic battle knowledge.
battle_talk_102=Select the unit the arrow is pointing to, then select the destination to move.
battle_talk_103=You can also select multiple areas consecutively for multiple continuous movements, but the overall travel path is fixed.
battle_talk_104=If the selected area is not the destination you want to reach, you can cancel and reselect the destination.
battle_talk_105=If the unit has used up all its Mobility when it reaches the target area, it won't be able to launch an attack.
battle_talk_106=Select your unit. If it still has Mobility left when it reaches the target, it can launch an attack.
battle_talk_107=If there is enough Mobility, you can launch multiple attacks.
battle_talk_108=Deploy Generals for your units. It can greatly improve the unit's fighting strength.
battle_talk_109=Each General has an active skill. Different Generals have different active skills.
battle_talk_110=This is a key target area. Occupy this area and achieve the objectives to win.
battle_talk_111=Now that you know the basics of fighting battles. Be prepared for war.
battle_talk_112=In general, each attack costs 6 Mobility, if remaining Mobility is greater than 0, you can launch continuous attack until it is reduced to 0.
battle_talk_201=You can recruit some units in the city to fight for you.
battle_talk_202=Different types of units can be integrated into a squad.
battle_talk_203=Tap the button in the lower right corner to go to the next round.
battle_talk_204=You will be prompted if there are units with mobility remaining.
battle_talk_205=One of your units is under attack. We can disband the unit with less Troops.
battle_talk_206=When a unit has less than three squadrons left, we can replenish it.
battle_talk_207=Unit replenishment is not limited by unit types.
battle_talk_208=Now, you just need to gain victory within the specified number of rounds.
battle_talk_209=While reinforcing your units, you can check the position of this unit in the corp, as well as the morale, mobility and other characteristics of the corp after integration.
battle_talk_301=Next, let's try building something.
battle_talk_302=Tap the City button to upgrade the facilities in the city.
battle_talk_303=Different facilities have different effects.
battle_talk_304=This is a village. A village can be upgraded to a castle.
battle_talk_305=With a castle, you can recruit units that are unavailable in cities.
battle_talk_306=Castles can be upgraded. Upgrade castles to recruit higher-level units.
battle_talk_307=The Morale of this unit has been reduced from being attacked. Replenishing a unit can restore a certain amount of Morale.
battle_talk_308=Now, we need to defend the key areas. Of course, you can choose to eliminate the enemies instead.
battle_talk_401=There are buildings scattered across the map.
battle_talk_402=Silver mines can provide a revenue of silver.
battle_talk_403=Iron mines can bring in iron.
battle_talk_404=Wonders have special effects on your forces. Wonders in different countries have different effects.
battle_talk_405=Units can only access rivers or seas when loaded onto ships.
battle_talk_406=The attack strength of transport ships and cavalry units are greatly reduced in naval battles.
battle_talk_407=So try to avoid loading ships with cavalry units.
battle_talk_408=You've finished all the tutorial.
battle_talk_501=Different terrains will lead to different mobility consumption, and compound terrains will cause higher mobility consumption.
battle_talk_502=Here you can have a view of the policies of your power.
battle_talk_503=Only in Conquest Model can you independently have research to the policies.
battle_talk_504=Here you can check the population, ambition and economic conditions.
battle_talk_505=Attention. Excessive population burden will increase your ambition and affect the economy.
battle_talk_506=At the beginning of each round you will gain a scientific point, which can be used to assemble war gears.
battle_talk_507=Please properly distribute your scientific points.
battle_talk_10101=The Goths finally showed their greedy faces! They are trying to take our rich lands. Soldiers, drive the barbarians out of our territory!
battle_talk_10102=The Romans are hypocrites! They want to enslave us and use us to deal with the Huns, but they are unwilling to give us food. Goth warriors, take up arms and resist!
battle_talk_10201=Just now, General Sebastianus on the front sent back a victory report. The Gothic vanguard has been repulsed. It's time to eliminate these rebellious barbarians!
battle_talk_10202=Do not falter! The Roman attacks are weak. We must persist until Alexis returns with the cavalry, that's when we will fight back.
battle_talk_10203=Good! the Roman soldiers are exhausted. We hit the left wing of their army from behind. Let's give the Romans a final strike and capture the Roman emperor alive!
battle_talk_10301=His Majesty the emperor is besieged by the Visigoths! All units make haste! Support the garrison of Milan.
battle_talk_10302=Alaric's main force is right ahead. Annihilate the Visigoths!
battle_talk_10303=As the emperor of the Roman Empire, he should not be in such a dangerous place.
battle_talk_10304=Soldiers, the Roman emperor is in Milan. As long as we break through the defenses of Milan and capture the Roman emperor, all the riches of Italy will belong to us.
battle_talk_10401=The city of Rome won't last long like this. Rome must not fall. The reinforcements from the African provinces are coming.
battle_talk_10402=Alaric ransacked Rome, we must stop him from attacking Ravenna.
battle_talk_10403=Alaric, I will defeat you this time, and the world will know who the king of the Visigoths should be!
battle_talk_10404=Those sneaky Romans ambushed us. It seems the negotiation was only just an excuse to stall time. If Honorius is unwilling to pay the ransom for the peace of Rome. Then we shall take it ourselves!
battle_talk_10405=Sarus, you betrayed your own kind!
battle_talk_10406=Oh no! The Roman reinforcements are here.
battle_talk_10501=Hermerick, the terrain here is difficult to navigate. We should find out where the enemies are deployed before entering.
battle_talk_10502=Those cowardly vandals do not deserve to rule this rich land of Iberia. Their territory should belong to our kingdom of Suebi! Warriors of Suebi, charge!
battle_talk_10503=Don't fight the Suebi head-on. They are not familiar with the terrain here. Lure them into our ambush.
battle_talk_10601=We cannot trust the vandals to abide by the treaty. Soldiers, imperial reinforcements are on their way.
battle_talk_10602=Warriors, if we capture Carthage, not only will we obtain huge amounts of wealth, but also the richest land in North Africa will belong to us!
battle_talk_10603=The Roman reinforcements are here. Stop them from landing!
battle_talk_10701=Fellow kings and leaders, the cruelty of the Huns is clear to us all. We must work together to defeat them.
battle_talk_10702=From the moment the Huns appeared, we have been repeatedly attacked and driven from the Danube to the Rhine. Alan warriors, we can run no further, we must defeat the Huns.
battle_talk_10703=The Romans united the Visigoths, the Franks, and the Alans. They think they could put up a fight against my army? What a joke.
battle_talk_10704=Do not panic, everyone gatheres around me and rebuilds the defense line.
battle_talk_10705=Wolves don't care how many sheep there are.
battle_talk_10801=The Vandals have long coveted the wealth of Rome. Gaiseric's motives for sending troops this time is not as honorable as he made it sound.
battle_talk_10802=Maximus is a usurper. He doesn't deserve to be the Roman emperor.
battle_talk_10803=As an ally of Valentinian III, we should help the queen drive Maximus, the usurper, out of Rome.
battle_talk_10804=The famous "eternal city" is in sight. If we capture Rome, all the treasures in the city will belong to the heroic vandal soldiers.
battle_talk_20101=Our neighbor to the west possesses an abundance of wealth, but soon they will all be ours!
battle_talk_20102=Attack! Those Roman nobles only know how to use money to buy their personal safety.
battle_talk_20103=Our cavalry may be no match to the Persians, but we are not afraid of them.
battle_talk_20201=The emperor cannot tolerate the continuous revolts in Africa. The influx of refugees is causing chaos in Constantinople.
battle_talk_20202=Soldiers, eliminate those rebels. Their leaders are our main objective. Avoid unnecessary fighting!
battle_talk_20203=The kingdom of Vandals must be completely free from the rule of the Roman Empire.
battle_talk_20204=Destroy the enemies from the sea.
battle_talk_20301=Hold the line and don't be intimidated by the cavalry charge.
battle_talk_20302=Buy time for my escape. As long as I get away, the enemy will fail their objective!
battle_talk_20304=I have reached the nearest coastal city. Once I set sail, the enemy can no longer catch up with me.
battle_talk_20303=Attack, the enemy is losing ground. Nothing can stop the empire's advance!
battle_talk_20401=The Italian region must be returned to the rule of the Empire. Drive out all invaders!
battle_talk_20402=The enemy is attacking directly from the sea. This is not good news for us.
battle_talk_20403=With the help of these siege weapons to defend the city, their attack will not last long.
battle_talk_20501=The enemy assembled a large number of troops to attack Ravenna. Their rear must be very weak.
battle_talk_20502=Now that Rome is in our hands, we cannot possibly lose!
battle_talk_20601=We are short of food and can no longer afford to defend Rome. Retreat is our best option now.
battle_talk_20602=The enemy kept coming. Slowing down their pursuit is the best I can do now.
battle_talk_20603=Drive the enemy out of Italy. This land belongs to us now.
battle_talk_20701=The Roman Empire's forces in Italy have not been completely eliminated. They can still mobilize troops through the sea.
battle_talk_20702=Ataulf, take your fleet to Ancona and occupy it. This is the most important base for the Romans in Italy!
battle_talk_20801=Rome is our only objective. Do not let the enemy slow down our advance.
battle_talk_20802=Destroy the enemy quickly! The empire will control Italy again!
battle_talk_20803=Dispatch all forces, annihilate all the enemies!
battle_talk_20901=The Goths are reinforced by the Franks. Although they are mostly peasants, there are still some Frankish elites within their ranks.
battle_talk_20902=Don't worry about the barbarians, concentrate on the Frank infantry!
battle_talk_21001=The Roman's main forces are busy fighting in Italy. Their forces here must be quite weak.
battle_talk_21002=Brothers, follow me to Constantinople.
battle_talk_21003=Those greedy barbarians! How dare they set foot on our land again!
battle_talk_21004=Belisarius, mobilize the troops and destroy them!
battle_talk_30101=The Romans have abandoned the island of Britain, we cannot miss this opportunity.
battle_talk_30102=There is plenty of space on the island of Britain to accommodate us Anglo- Saxons.
battle_talk_30103=Those Anglo- Saxons cannot be trusted. Warriors of Britain, drive the invaders out of our land!
battle_talk_30201=The British have the home advantage, and they are superior in numbers. It would be difficult to capture all their towns with our current troops.
battle_talk_30202=I have made contact with an ally force in the nearby coastal areas. First, we seize control of the coast, guide our ally forces to land. Then we combine our forces and march inland.
battle_talk_30203=We must wipe out the Anglo-Saxon army before the enemy reinforcements arrive.
battle_talk_30301=This time we must conquer those cowardly Britons and seize their land for our kingdom of Northumbria.
battle_talk_30302=I will make you pay for your betrayal.
battle_talk_30303=Northumbria's army is fierce, but as long as we Britons unite, we can defeat these invaders.
battle_talk_30304=The Anglo-Saxons are not united, and the kingdom of Mercia is also afraid of the expansion of Northumbria. They will look for opportunities to strike Aethelfrith hard.
battle_talk_30305=We cannot sit idly by while the kingdom of Northumbria grows. Their ambitions are endless.
battle_talk_30401=Soldiers of Gwynedd, this alliance with the kingdom of Mercia is our last chance to resist Northumbria. We must do our very best.
battle_talk_30402=Do not panic, it is just a desperate attack by a bunch of defeated nobles. As long as we resist this attack, the rise of Northumbria will be unstoppable!
battle_talk_30403=We and the kingdom of Gwynedd have done our best in this battle. If Edwin cannot be defeated, then the kingdom of Northumbria will dominate Britain.
battle_talk_30404=Successive victories have made Edwin arrogant. Northumbria's defense is full of holes!
battle_talk_30501=My fellow countrymen, I am Oswald, son of the former king Aethelfrith. This is a critical moment in the survival of our Kingdom. I have returned to lead you into battle, to defeat the invaders, and revive the great kingdom of Northumbria.
battle_talk_30502=Oswiu, in my dream, I received a message from the saints that we will win this battle!
battle_talk_30503=Soldiers, I have defeated Cadwallon. Attack! Let's recover the rest of our territory!
battle_talk_30504=Our soldiers need a king, and everyone agrees that you should be crowned as king of Northumbria.
battle_talk_30505=Who would have thought there is someone like him among the nobles of Northumbria, but his career will end here!
battle_talk_30601=Many times, Mercia has colluded with Gwynedd and Powys to invade our land. They are obstacles to the future development of the kingdom of Northumbria and must be eliminated completely.
battle_talk_30602=As expected, Penda came to rescue Powys. According to my agreement with Aethelwald, once Penda leads his army out of Mercia, he would take his troops to seize the throne of Mercia for himself.
battle_talk_30603=A large number of troops from Gwynedd appeared on our flanks. We are in danger of being surrounded.
battle_talk_30604=Northumbria has only just started developing, Oswald is already eager to start the war. Aethelwald, you take charge of guarding the rear. I'll take my army to support the kingdom of Powys.
battle_talk_30605=Aethelwald, I am not surprised by your betrayal. Now I can take this opportunity to remove all the traitors.
battle_talk_30606=Penda, I will not submit to you anymore. I should be the rightful king of Mercia.
battle_talk_30701=Warriors, although the enemy is large in numbers, it would be difficult for them to obtain supplies. As long as we defend our position near the town, the enemy will surely retreat.
battle_talk_30702=Once we defeat Oswiu, there will be no one left in Northumbria to challenge us. Then all the wealth of the kingdom will be at our disposal!
battle_talk_30801=Ludeca, the kingdom of Wessex has been rebelling against the rule of our kingdom of Mercia. This time, we send troops to conquer Wessex and deter the other kingdoms from making the same mistake.
battle_talk_30802=I will let the enemy know what happens to those who offend the kingdom of Mercia.
battle_talk_30803=Warriors, if we defeat Mercia's attack here, the other kingdoms will rise up to join our cause. Wessex is not alone.
battle_talk_30804=It is time to fight back! The Mercian supremacy will end here!
battle_talk_40101=Those pretentious Romans are weaker than they look! Let's avenge our messengers!
battle_talk_40102=Ridiculous! Offenders must pay the price. Let them get a taste of the power of Rome!
battle_talk_40103=Too many casualties. Retreat! We will be back, but this is not the time.
