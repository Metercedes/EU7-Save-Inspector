stage_intro_4221=After the signing of the Treaty of Troyes, France fell into its darkest period. Most of the French territory was occupied by the English. At this moment, Joan of Arc miraculously emerged in front of the French people.
stage_intro_4223=The English set up outworks outside Orleans in an attempt to trap the city's defenders. Instead of staying at Orleans, Joan decided to launch an assault on the enemies. She climbed up the fortress carrying her banner.
stage_intro_4225=Joan of Arc decided not to hold on to Orléans and led the army to take the initiative. She climbed the fortress waving her banner, and Joan of Arc's action of being the first to fight greatly demoralized the enemy, which allowed the French to successfully liberate Orléans.
stage_intro_4227=After Orléans was relieved, there was still a part of the English army stationed at Jareau, not far from Orléans. France needed to break Yarrow quickly in order to relieve the threat to the southeast of Orleans and crush the possibility of an English comeback.
stage_intro_4229=After recovering Jargeau, Joan of Arc quickly moved her army to Meune-sur-Loire. There, she launched an attack which effectively impeded the English army's march south of the Loire in close proximity.
stage_intro_4231=After capturing the bridge to Meune-sur-Loire, Jeanne d'Arc did not directly attack the town or castle of Meune-sur-Loire. Instead, she attacked the nearby Beaugency on the next day and swiftly made the English army abandon the town and retreat to the castle.
stage_intro_4233=The one-day fall of Beaugency demoralized the English reinforcements, and after several hard fights the English army had to retreat to Paris. Jeanne d'Arc, on the other hand, tapped the decision to speed up the march and give full pursuit, and the two sides eventually met at Parthie.
stage_intro_4235=The victory of the battle of Patay ended England's ambition to unify France and reversed the decline of the French army in the past century. Heavy cavalries were sent to Reims to capture the church for the prince's coronation.
stage_intro_4237=At the strong request of the army, Charles VII ordered an attack on Paris, where Joan of Arc led the French army in a fierce battle against the English main force, and Joan of Arc remained the first to fight, even though she was wounded.
stage_intro_4239=At the critical moment when the French army was forcing its way into Paris, the French crown ordered the army to withdraw from the battle. Joan of Arc was then sent to besiege La Charité, but the battle was extremely difficult in the dead of winter when there was a lack of troops and food.
stage_intro_4255=Joan learned that Compiègne was attacked by the Principality of Burgundy and decided to go to the rescue, but she was captured after being surrounded by the enemy. Later, the national hero was sold to the English by the Burgundians and killed in Rouen.
stage_intro_4257=England tried Joan of Arc as a heretic, who never yielded and maintained her innocence. The history of France in the fifteenth century was completely rewritten by the will of a young girl.

