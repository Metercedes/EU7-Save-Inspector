troop_desc_118=Pirates cruising in the Mediterranean were the nightmare of passing ships.
troop_desc_213=In the formation, the front-row soldiers responsible for withstanding charges provide safe firing conditions for the musketeers behind them.
troop_desc_214=The troops organized by Yue Fei, consisting of infantry and cavalry, achieved remarkable military feats repeatedly in battles against the Jin cavalry.
troop_desc_317=The Lithuanian Grand Duke's personal guard cavalry, excellently equipped, using war hammers as their weapons. They could inflict significant damage even against heavily armored enemies.
troop_desc_417=Cavalry troop adorned in red, from their armor and flags to their weapons. They are well-trained, and armored in red iron, exuding an intense presence on the battlefield. They are an unstoppable force that cannot be overlooked.
troop_desc_418=Comprised of the samurai rank as its core, they are loyal, brave, well-equipped, and highly trained. They possess outstanding combat prowess and excellent teamwork capabilities.
troop_desc_419=An elite mercenary corps organized by Matthias Corvinus, which played a crucial role in the wars against the Ottoman Empire.
troop_desc_420=Using long-handled axes as weapons, the design of the poleaxe combines both thrusting and chopping capabilities, making Poleaxe Cavalry a relatively versatile type of cavalry.
troop_desc_421=Jin Wuzhu's elite heavy cavalry had terrifying charging power when their morale was high.
troop_desc_520=The elite garrison troops established by Ivan the Terrible, who frequently used poleaxes as support when firing their matchlock guns.
troop_desc_612=Remote cavalry who use throwing axes as a means of attack, capable of causing extremely strong disruption effects against close-range cavalry.
troop_desc_613=Ranged cavalry using crossbows to inflict damage on enemies, typically employed to harass and create gaps in enemy formations, setting up conditions for heavy cavalry charges.

