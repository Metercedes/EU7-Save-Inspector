conquest_faction_desc_801=The Western Roman Empire, one of the successors of the ancient Roman Empire, was once glorious but is now in crisis and decline. The empire faced border upheavals brought about by barbarian migrations and was unable to respond effectively. However, the empire still retains a long historical heritage. With the determination to revive it, it may be possible to recreate the glory of the Roman Empire.
conquest_faction_desc_802=The Byzantine Empire, also known as the Eastern Roman Empire, was one of the successors of the ancient Roman Empire. Its capital, Constantinople, was strategically located, and the empire not only inherited the politics, culture, and traditions of the ancient Romans, but also developed a unique Byzantine art, architecture, and system. The main goal of the Empire at present is to conquer the lost territories of Rome.
conquest_faction_desc_803=The Gaelic people were a Celtic tribe of ancient Europe that inhabited the areas of present-day Ireland, Scotland, and Wales. The Gaelic people were polytheistic and worshipped nature and their ancestors. They were brave and extremely warlike by nature and were powerful opponents of the ancient Roman Empire.
conquest_faction_desc_804=The Britons were a Celtic tribe of ancient Europe that inhabited the British Isles. They were characterized by a Celtic culture and a polytheistic faith. The Britons had a long history of contact and conflict with the Roman Empire, and over time their culture gradually blended with Roman and other foreign cultures.
conquest_faction_desc_805=The Saxons were an ancient Germanic people of northern Germany who had an important place in European history. As a Germanic tribe, they were known for their bravery and military prowess. The Saxons underwent many conquests, settlements and political evolutions during the medieval period, which influenced the political and military landscape of the region.
conquest_faction_desc_806=The Danes have a copious history and cultural tradition as a  part of the Nordic Germanic people. They existed and developed during the Iron Age and Viking Age in Northern Europe. The Danes played an important role in history, especially during the Viking Age, when their fleets of brave and fearless ships continued to launch conquests into the surrounding seas.
conquest_faction_desc_807=The Baltics were an ancient group of people who inhabited the area around the Baltic Sea. They were historically influenced by Slavic and Germanic cultures. An important branch of them, the ancient Prussians, were known for their bravery and fighting prowess, and engaged in constant exchanges and conflicts with the surrounding Slavs and Germans.
conquest_faction_desc_808=The Suevi were a subgroup of the ancient Germanic peoples who inhabited the area along the Rhine River. They were valiant warriors and expeditionaries during the time of ancient Rome. The Suevi established their own kingdoms during part of the period and were involved in conflicts with the Roman Empire.
conquest_faction_desc_809=The Lombards were a Germanic people who migrated to northern Italy in the early 6th century A.D. and founded the Kingdom of Lombardy. The Lombards also possessed good military power. They ruled northern Italy for two centuries and deeply influenced local politics, society and culture.
conquest_faction_desc_810=The Slavs are a widely dispersed ethnic group in Europe, divided into three main branches: the Western Slavs, the Eastern Slavs and the Southern Slavs. They have unique languages, cultures and traditions, and have formed many independent states throughout history, as well as demonstrating varying degrees of fighting ability.
conquest_faction_desc_811=The Franks were an aboriginal people who historically inhabited the region of Francia and were an important branch of the Germanic peoples. They established a powerful kingdom known as the Frankish Kingdom between the 5th and 8th centuries. With their fierce warriors and heavy determination for military expansion, the Franks had a profound impact on European history.
conquest_faction_desc_812=The Burgundians were a branch of the ancient Germanic peoples who lived mainly in the Burgundy region of eastern France. The Burgundians established the Kingdom of Burgundy throughout history and engaged in political and military encounters with neighboring countries, making them one of the major forces in medieval Europe.
conquest_faction_desc_813=The Ostrogoths were a branch of the ancient Germanic peoples who, faced with foreign invasions, had no choice but to migrate to Eastern Europe and the Balkans, where they established their own kingdoms. The Ostrogoths grew strong in the border areas of the Roman Empire and engaged in many conflicts with the Roman Empire.
conquest_faction_desc_814=The Gepids, who originated from the East Germanic Goths, were very brave and warlike. They have fought many wars with other peoples throughout their history, and are particularly famous for their conflicts with the Huns and the Ostrogoths. They established their own kingdoms and exerted influence over the regions around in a period of time.
conquest_faction_desc_815=The Huns were a nomadic people of the ancient Eurasian steppe region, specializing in horseback riding and archery, and their empire, led by Attila, reached its peak in the late 5th and early 6th centuries. They posed a threat to the Roman Empire and other peoples, engaging in frequent plunder and conquest.
conquest_faction_desc_816=The Magyars are the main ethnic group in Hungary. Originating from the Ural Mountains region of Asia, they migrated to the area that is now Hungary at the beginning of the 9th century and founded the Kingdom of Hungary. The Magyars expanded their power during the Middle Ages and fought many wars and territorial disputes with neighboring countries.
conquest_faction_desc_817=The Vasco people are an ethnic group living in Western Europe, mainly in the Basque region of Spain and France. They have a unique language and cultural tradition and are considered one of the oldest peoples in Europe. The Vasco people have maintained a sense of independence and cultural identity throughout history and have played an important role in the history of Western Europe.
conquest_faction_desc_818=The Visigoths were a branch of the ancient Germanic peoples whose origins can be traced back to the ancient Gothic tribes. In the mid-5th century, they migrated to Spain and Southern France and established the Kingdom of Visigoths, which ruled much of present-day Spain and Portugal, becoming one of the most important kingdoms in Western Europe
conquest_faction_desc_819=The Bulgarians are the original inhabited community of the Balkans. They have their own language, religion and folk traditions. Historically, the Bulgarians founded the powerful First Bulgarian Empire, which had a strong army, developed cities and a prosperous economy, and had a profound impact on the Balkan region.
conquest_faction_desc_820=The Greeks are an ethnic group living in the region of Greece who are the creators and inheritors of the ancient Greek civilization. The Greeks are known for their city-state system and democratic politics, most notably Athens. They faced many foreign conquests and domination during the medieval period, but these did not quench their desire for independence and freedom.
conquest_faction_desc_821=The historical roots of the Turks can be traced back to the ancient Turkic peoples. They have undergone many migrations and expansions throughout their history and have built powerful empires. They have made notable contributions in the military, cultural and political spheres, conquering vast territories during the medieval and modern periods.
conquest_faction_desc_822=Armenians are one of the oldest peoples in the world, and their religious and cultural heritage has deeply influenced regional lifestyles and values. Throughout their history, Armenians have built powerful Armenian kingdoms and have experienced many challenges and hardships.
conquest_faction_desc_823=The Mongols were a nomadic group originating from the Mongolian steppe with excellent riding skills and strategic tactics. They were adept at taking advantage of the steppe to conduct swift raids and maneuvering operations. Under the leadership of Genghis Khan, they expanded rapidly across the Eurasian continent and eventually established the vast Mongol Empire.
conquest_faction_desc_824=The Orientals were a people who migrated from the far east. They embarked on an unknown journey with the aim of communicating with the Western nations. In the face of the challenges and opportunities that might be brought about by the various forces of the West, the Orientals showed fearlessness and perseverance, and were determined to open up a new homeland with bravery and resourcefulness.
conquest_faction_desc_825=The Berbers are an ethnic group in North Africa. They are the indigenous people of North Africa and have fought many battles in defense of their territory and culture against foreign invasion. The Berbers have retained many of their traditional customs and beliefs, although at times they have been independent and at times they have been ruled by others.
conquest_faction_desc_826=The Vandals were one of the ancient Germanic tribes that, after a long and arduous migration, finally invaded the North African provinces of the Roman Empire and established the Kingdom of the Vandals. The Vandals had unrivaled military power at sea, and their plundering of the city of Rome brought immeasurable damage to the Roman Empire.
conquest_faction_desc_827=The Egyptians, the creators of an ancient civilization, inhabiting the Egyptian region of northeastern Africa, developed a breathtaking culture and civilization. They had great architectural works, a complex religious system and hieroglyphic writing. While they certainly experienced the rule of foreign conquerors, their culture and traditions were still preserved.
conquest_faction_desc_828=The Arabs are an ethnic group found mainly in the Arabian Peninsula and the Middle East. They use the Arabic language and believe in Islam, and have played an important role in the spread and development of Islam. They have founded numerous great empires and kingdoms and have also made important achievements in the fields of trade, agriculture and crafts.
conquest_faction_desc_829=The Persians were an ancient people of the Iranian plateau who founded the great Persian Empire. The Persian Empire, best known for the Achaemenid dynasty, unified the tribes of the Iranian plateau and greatly expanded the empire's territory. The civilization and achievements of the Persian Empire had a profound impact on later generations and is one of the important empires in human history.
conquest_faction_desc_830=Mediterranean pirates are groups of pirates operating in the Mediterranean Sea. They have appeared in several periods in history, such as the ancient Greek and Roman periods and the medieval period. They targeted merchant ships and plundered property, posing a threat to maritime trade and coastal residents. As a result, they have been targeted by many countries.

