stage_intro_4741=Soon after his accession, Suleiman I encountered a rebellion led by the governor of Damascus. Suleiman I suppressed this rebellion, which also marked the beginning of a series of military conquests. 
stage_intro_4743=In 1521, the Hungarians were the only formidable force standing in the way of Ottoman expansion into Europe. In order to defeat them, Suleiman I led a large army to besiege Belgrade and ultimately captured the city. 
stage_intro_4745=After conquering Belgrade, Suleiman I turned his attention towards the Knights Hospitaller on the island of Rhodes, but the battle would prove to be extremely difficult.
stage_intro_4747=Hungary sought an alliance with the Habsburg Dynasty, and Suleiman I was concerned about the potential impact on the Ottoman Empire. After Hungary rejected Suleiman I's proposal, he decided to intervene militarily. 
stage_intro_4749=The territorial dispute between the Ottomans and the Safavid Dynasty gradually heats up. With Bitlisbey seeking asylum in Persia, the governor of Baghdad is assassinated. Suleiman decided to wage war against Persia, starting the three-hundred-year Ottoman-Persian War.
stage_intro_4751=In 1553, Suleiman I began his third and final expedition to Persia. After an exchange of victories and defeats, the two sides finally agreed on the Peace of Amasya, which was followed by twenty years of peace and quiet.

