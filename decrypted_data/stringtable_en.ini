general_desc_Roger II1=The founder of the Kingdom of Sicily, a great monarch with both wisdom and ambition. He transcended cultural and religious differences and integrated different ethnic groups and beliefs under his kingdom.
general_desc_Li Shimin1=The God of War of the Tang Dynasty, who relied on unparalleled military talent for his conquests in all directions and was invincible. However, it was this dazzling edge that made him a force that could not be ignored by his father and brothers. In the vortex of power, he is a formidable and unpredictable talent.
general_desc_Wu Zetian1=Like a blooming flower, Wu Zetian was beautiful and smart, with a touch of youthful gentleness and innocence in her gestures. At this time, she had not been infected with ideas of power and ambition, and held the innocence and longing in her heart of a girl. She is like a corner of a picture scroll, an unforgettable piece.
general_desc_ZhiTianXinChang=He was an outstanding leader of Japan during the Sengoku period, famous for his intelligence and military strategy. He unified central Japan and established a strong power, and is known as one of the "Three Greats during the Sengoku period", along with Toyotomi Hideyoshi and Tokugawa Ieyasu.
general_desc_ZhiTianXinChang1=After the Honno-ji Incident, everyone, including Akechi Mitsuhide, thought Oda Nobunaga was dead. Instead, Oda Nobunaga, who escaped with his life, was reborn amidst blood and flames and returned as a devil king!
general_desc_Pope Gregory IX=He is the head of the Catholic Church and ruler of the Papal States.

