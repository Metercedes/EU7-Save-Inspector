stage_intro_30301=If the beautiful Judith hadn't appeared, then the 24-year-old Roger Bosso might have stayed  his empty home in Normandy forever. They fell in love at first sight, but their social status was different. Judith was the first cousin of William the Conqueror while Roger Bosso had nothing. In pursuit of love, Roger Bosso decided to travel to Italy to join his brother Robert Guiscard.
stage_intro_30302=Robert Guiscard inherited the land and title of his late brother Humphrey in Italy. His approach was similar to Humphrey, but Guiscard did not intend to distribute to his younger brother, who was 16 years younger than him. However, Robert needed the help of his younger brother to conquer more land. For the next 5 years, Roger assisted his brother in conquering the entire Calabria region.
stage_intro_30303=Sicily was under the rule of the Saracens since the 9th century. However, their rule was not ironclad. Ibn al-Timnah killed the former governor and tooked possession of his widow. The widow's brother, the emir of Messina, placed a bounty on Ibn al-Timnah, and al-Timnah fled to Italy and sought Roger's help. This provided Roger an opportunity to march into Sicily.
stage_intro_30304=Roger decided to land in Sicily before his brother Robert, as his desire for land and wealth surpassed everything.
stage_intro_30305=After landing in Sicily, Roger's goal was to capture the fortress of Enna and deal a fatal blow to the Emir. However, when they came to the fortress, they found the fortress's defense was extremely strong. To make matters worse, the Emir summoned all his troops to prepare for a counterattack, intending to wipe out the isolated Normans.
stage_intro_30306=After their success, the relationship between Robert and Roger became tense. Roger, who took the overall control after occupying Troina, retreated to Italy and met Judith, whom he longed for. It turned out that Judith's father had a conflict with William, Duke of Normandy, and the family moved to Italy. Roger proposed to Judith and obtained her father's approval, but Guiscard still refused to divide the land for his younger brother.
stage_intro_30307=Roger was no longer the tender boy. He and his brother fought a decisive battle in Calabria. Although Robert finally defeated by his brother, Roger reconciled with his brother. Later, they traveled to Sicily together.
stage_intro_30308=Roger and Lady Judith returned to Sicily to protect the residents of Troina, who were threatened by the Saracens. However, at the end of 1062, when Roger went to capture Nicosia, Ibn al-Hawas launched a surprise attack in an attempt to capture Lady Judith, who was staying at Troina. Roger was so distraught that he immediately turned back to rescue his wife.
stage_intro_30309=Roger worked hard to cater to their locals, no longer caring about race or religion. However, the Saracens of North Africa reiterated their rule over Sicily and ordered their son, Prince Ayyub, to lead a 35,000 strong army to attack Sicily. In Cerami, Roger led a force of only 130 knights and 300 infantry to face off against a huge enemy force.
stage_intro_30310=Roger failed in his attempt to occupy Palermo in 1064, at which point Prince Ayyub raised his army once again to challenge the Normans. During the march, Roger and Prince Ayyub met again, but the strength gap between the two sides was still huge.
stage_intro_30311=When Robert Guiscard occupied Bari, he turned his energy to Sicily. In 1071, Roger was given the title "Earl of Sicily" while Robert himself retained Messina and Waldmont. In 1072, Roger and his brother attacked Messina together.
stage_intro_30312=In 1077, Roger besieged Trapani, one of the two remaining Saracen strongholds remaining on Sicily. In 1079, Saomarini was besieged, and in 1081, Roger conquered Catalina. His only regret was his beloved Judith died in 1080.
stage_intro_30313=When Guiscard died, the Norman conquest of Sicily was not yet complete. His sons fought for succession, resulting in a civil war, leaving the task of conquering Sicily on Roger's shoulders.
stage_intro_30314=In 1091, in order to avoid an attack from the Saracens in North Africa, Roger led a fleet to conquer the island of Malta.
stage_intro_30315=Roger's rule in Sicily was extremely successful. He created a policy of neutrality, streamlined the government and implemented a loose religious policy, becoming the only European lord who did not participate in the Crusades at the time. Under his rule, Sicily was stable and prosperous like never before, and the Sicilian people affectionately called him the "Great Earl"

stage_intro_30401=After Roger the Elder's death, the political situation in Sicily was very stable. The eldest son, Simon, was 8 years old and under his mother's regency, Adelaide. However, when Simon died unexpectedly at 12 four years later, the succession passed to Roger II at the age of 10. At Roger II's 16, Adelaide formally abdicated the throne and married herself to King Baldwin I of Jerusalem.
stage_intro_30402=Roger II inherited the prosperity brought by his father and was ambitious enough to begin building a strong navy for defense and expansion. He was only waiting for an excuse. When the Amir of Mahdia attacked Nicotera and destroyed the city, Roger II found a reason to invade.
stage_intro_30403=In the midst of a power struggle, the patriarch of Jerusalem annulled the marriage of Roger's mother, Adelaide, to Baldwin I. Adelaide was forced to return to Sicily. This deeply humiliated Roger II.
stage_intro_30404=Roger II's father had invaded Malta but did not fully occupy the island. Roger II could not tolerate the presence of Saracens in the vicinity of Sicily and decided in 1127 to eliminate the threat.
stage_intro_30405=In Apulia, Italy, William II died suddenly, and by right of succession, Roger II inherited Calabria. However, the Pope did not want a Norman to completely rule Sicily and western Italy. At the end of 1127, the Pope launched a crusade against Roger II. Ranulf II of the House of Drengot took advantage of this to rebel.
stage_intro_30406=Roger II was not murderous, but preferred to win through diplomacy, as how the Eastern Roman emperors did. Roger's troops were disciplined and swift, while the enemies were loose and their alliance fragile. In 1128, the allied forces retreated after being intimidated by Roger II's army, and the Pope was forced to make him Duke of Apulia, Calabria, and Sicily while outside of Benevento.
stage_intro_30407=After the death of the Pope, two opposing camps emerged in Rome. In order to gain political support, Reformer the Anacletus decided to crown Roger II as king, and on Christmas Day, 1130, the citizens of Palermo saw the new king for the first time.
stage_intro_30408=On July 24, 1132, the Norman's greed led Ranulf to ally with Robert II of Capua and Sergius VII of Naples against Roger II together.
stage_intro_30409=Regardless of the flamboyant means by which Roger II ascended the throne, his support of the pseudo-Pope offended the Christians who supported another Pope Innocent and led to more forces joining Innocent's camp. In 1133, the Holy Roman Emperor Lothair finally arrived in Italy.
stage_intro_30410=After Lothair's coronation, the internal situation of the Holy Roman Empire improved greatly. He took a year to gather an army and once again crossed the Alps and marched into Northern Italy, where there was little resistance. Pope Innocent led the Papacy to join Lothair's camp and united with the Byzantine Emperor John II and the Kingdom of Venice to attack Sicily.
stage_intro_30411=On October 30, 1137, the newly appointed Duke of Apulia, Ranulf, led a German contingents borrowed from Emperor Lothair in an attack on Roger II. Roger's enemies were not only Ranulf but also his former ally Sergius.
stage_intro_30412=A few months later, Pope Anacletus II, whom Roger II had supported, also died. Innocent logically became the legitimate pope. Roger II attempted to make peace with the new pope, however, Pope Innocent himself gathered an army and attacked.
stage_intro_30413=Roger II struggled for 10 years, overcoming two emperors and a pope, and eventually encountered no further serious resistance. He began to unify the laws and construct a strong centralized state.
stage_intro_30414=The Holy Roman Empire and the Eastern Roman Empire did not forget the shame of their past and jointly attacked Sicily many times. However, it seems that the god did not favor them, and Sicily prospered under the rule of Roger II, who died peacefully in Palermo in 1154, with a sword engraved with the words, “Apulia, Calabria, Sicily, and Africa are all mine.”

stage_intro_30501=Constance, Queen of Sicily, became pregnant nine years after her marriage to Henry VI, Emperor of the Holy Roman Empire, who traveled to Sicily for his coronation in 1194 when Frederick II was born on his journey the day after Christmas. This baby, born under a tent, was destined to change the history of Europe.
stage_intro_30502=Frederick II was not baptized until he was two years old, a scene that became his only close encounter with his father, Henry VI. Henry VI died suddenly shortly after Frederick's birth, leaving Frederick as the sole heir. However, his father's death triggered a power struggle in which, in addition to Frederick, there were two contenders: his father's brother Philip, and the Pope-supported Duke of Saxony, Otto Brunswick. Frederick's mother, Constance, chose to take her son away from Germany and take temporary control of the kingdom of Sicily. 1198 also saw the death of Constance, and Frederick's fate became even more uncertain.
stage_intro_30503=The lonely teenager Frederick did not grow up in a peaceful environment. The kingdom of Sicily was dominated by various powers, and he was just a pawn on the political chessboard. At the age of 14, Frederick was arranged marriage by the Pope, and the wife, who was ten years his senior, brought with her 500 knights, who became the key to his rise to the pinnacle of power.
stage_intro_30504=When Frederick was 16 years old, his German uncle Philip was assassinated and Pope Innocent III decided to support Frederick to become King of Germany. Frederick's path to the throne was not smooth, as Otto tried to prevent his coronation in northern Italy, however, Frederick managed to escape his enemies and eventually received his coronation in the Mainz Cathedral, becoming the rightful heir to the Holy Roman Empire.
stage_intro_30505=Pope Innocent III finally breathed a sigh of relief after Frederick II declared that he would not take over the Kingdom of Sicily, and he died soon after. A few months after the pope's death, Frederick II quickly took his wife and son into his care and strengthened his position of dominance in Germany.
stage_intro_30506=After Richard the Lionheart of England was killed in battle, King Philip II of France took the opportunity to sweep away the English power by inviting Frederick II to participate in the settlement of the War of Champagne Succession. Frederick II gladly accepted, setting the stage for victory in the battle.
stage_intro_30507=On November 20, 1220, Frederick II became Holy Roman Emperor in a grand coronation ceremony in Rome. Raising his crown and holding a sword in his right hand and a tablet in his left, he took a solemn oath to be the guardian of the Christian Church, to carry out crusades, and to destroy heretics. Constance, as Empress, knelt behind her husband and accepted the coronation.
stage_intro_30508=Frederick II devoted himself to reform and construction, touring southern Italy and Sicily. He promulgated the Capua Charter, built the palace at Foggia, and revitalized the Sicilian navy. Frederick II also founded the University of Naples, the first state university in Europe, which promoted a cultural and academic revival.
stage_intro_30509=Although Frederick II was busy consolidating his kingship, the Pope continued to chastise him for not participating in the battles of the Fifth Crusade. Frederick kept in touch with the rulers of the Islamic world and eventually concluded peace talks with the Sultan of Egypt and succeeded in recovering Jerusalem. Frederick II was crowned King of Jerusalem in 1229, a feat that greatly displeased the Pope.
stage_intro_30510=Pope Gregory IX was furious that Frederick II had made peace with “nonbelievers”. The Pope authorized the former King of Jerusalem to invade Sicily, and Frederick II had to return to defend his homeland.
stage_intro_30511=Frederick II issued the Charter of Melfi in 1231, a medieval charter that marked the transition of the Holy Roman Empire to a monarchical system. The Pope strongly opposed this, seeing Frederick's move as a challenge to papal authority. This move also set the stage for a long conflict between Frederick and the Church.
stage_intro_30512=The Lombard League in northern Italy had never been fully integrated into the Holy Roman Empire, and the autonomous city-states in this region being led by Milan, were a barrier between the Kingdom of Sicily and the Kingdom of Germany. Papal support pitted the Lombard League against Frederick II once again.
stage_intro_30513=Through the victories of the previous year, Frederick II had succeeded in bringing the eastern area of Northern Italy under his sway. Frederick's next goal was to capture Mantova, a victory that would secure the link with Germany and pave the way for an attack on the allied strongholds in northwestern Italy.
stage_intro_30514=Brescia was located on the main transportation route from Verona to the Via Bergamo, and Frederick II made it a key target to cut off the supply lines of the Lombard League. Although the attacking force was strong, Frederick II suffered from the stubborn resistance and unexpected tactics of the defenders.
stage_intro_30515=Frederick was excommunicated three times in 1239, and with Pope Gregory IX uniting Genoa and Venice to attack the Kingdom of Sicily from the sea, Frederick had to face this war with the Pope. Eventually, Frederick's army won and began to march on Rome.
stage_intro_30516=In 1243, a new pope, Innocent IV, took office, but his conflict with Frederick II did not ease. Innocent IV not only deprived Frederick of his empire and the Sicilian throne but also tried to extend the Church's control over Germany and the Lombardy area. In 1246, the Pope even hatched a plot to assassinate Frederick and his son.
stage_intro_30517=As Frederick II's new regime became firmly established, he decided to strike again to suppress the Lombard League in northern Italy. However, Frederick was already over fifty years old, and time became his worst enemy. 1247 saw the outbreak of the papal-backed coup d'état in Parma in the summer, and Frederick acted swiftly to lay siege to Parma, establishing Victorian bases in the surrounding area in preparation for a long military struggle.
stage_intro_30518=Just three months later, Frederick and his son Enzo regained control of the area around Parma, and in the summer of 1248, Frederick decided to move to consolidate the territory and plunder the captives. At this time, the Emperor's army, under the command of Lanzia, clashed decisively with the Papal army. The fate of both armies would be decided in this battle.
stage_intro_30519=At the Battle of Fossalta in 1249, Frederick II's son Enzo was captured by the Bolognese army and the northern front lost its key commander. With successive defeats in key battles, the fall of Brescia, the surrender of Pavia, and the opening of the gates of Piacenza to the enemy, Frederick was faced with an unprecedented dilemma. In November 1250, Frederick suffered a sudden illness of health after an eagle hunt. After a period of silence, he died on December 13 of the same year, marking the end of his legendary life.

stage_group_name_30004=Roger Bosso's Diary
stage_group_name_30005=Muhammad al-Idrisi's Diary
stage_group_name_30006=Berard of Catstagna's Diary

family_letter_desc_401=...Judith, I will come back to you. I will marry you soon, and everything will be alright...
family_letter_desc_402=...Dear Judith, are you alright? I have conquered vast lands for my brother. Though I do not know when I can return, may God bless you and me...
family_letter_desc_403=Judith, I am about to embark on a journey to Sicily. This is my best opportunity to gain more fiefs. May everything go smoothly...
family_letter_desc_404=Fortune seems to have forsaken me. If not for your letters, I might have given up long ago. I don't know if I will ever see you again, Judith.
family_letter_desc_405=It feels like a dream. I never imagined I could see you—the one I think of every day. God truly planned all this.
family_letter_desc_406=The division within our family makes us more vulnerable, but Sicily is my only destined home, the place where I will spend my life with my love.
family_letter_desc_407=Judith, if anything happens to you, I will lose the will to live.
family_letter_desc_408=Do the Saracens think they can defeat me with their strength in numbers? They have totally underestimated the Normans! We are not made of mere clay.
family_letter_desc_409=Finally, I have gained my fief. Besides my brother's approval, this fulfills my promise to Judith.
family_letter_desc_410=Judith, my love, you have made me who I am today. I pray that you continue to bless me and my lands from heaven.
family_letter_desc_411=My brother could not achieve his dream of becoming the Roman Emperor, but I only wish to guard my kingdom steadfastly.
family_letter_desc_412=May the Greeks, Saracens, and Normans in Sicily live in peace, and may war never approach my descendants.

family_letter_desc_501=During my youth, I wandered far and wide, traveling through Spain, Portugal, and southern France. In every place, I faced discrimination and hostility, but I also witnessed the common folk struggling to survive in poverty.
family_letter_desc_502=At that time, racial hatred was rampant. By the age of 16, I had learned how to evade the pursuit of Frankish knights. That year, I returned to Andalusia.
family_letter_desc_503=I heard of a magical land in the Mediterranean where there was no war, and Greeks, Arabs, Franks, and other peoples lived in harmony. I decided to see it for myself.
family_letter_desc_504=Finally, I arrived in Sicily and found this ideal land. I met my mentor, Abu al-Salt, and under his guidance, I studied pharmacology, geometry, and astronomy.
family_letter_desc_505=At the age of 30, I witnessed a dreamlike day. Rose petals rained down from the boundless sky as Roger II, wearing a noble crown and a magnificent cloak, smiled and waved at us.
family_letter_desc_506=Sicily was freer than any place I had ever been. It had goods from all over the world—Arabian spices, Frankish wool, and even silk from China.
family_letter_desc_507=The flow of information in Sicily was exceptionally convenient. We were able to collect scholarly works from around the world—Arab medical encyclopedia, Eastern Roman mathematics, and Egyptian myths. I translated these into Latin and Arabic.
family_letter_desc_508=I often taught the princes of Roger II. They were true Sicilians, always showing respect and courtesy to Saracen scholars.
family_letter_desc_509=That year was my most glorious year. King Roger asked me to compile a book for him, mapping all the lands and territories we knew. We called it "Tabula Rogeriana".
family_letter_desc_510=Roger II was buried in the Cathedral of Cefalù, a church that blended Eastern Roman, Muslim, and Norman styles. His portrait, wearing Byzantine imperial and Arab robes, sitting in the church dignifiedly, resembled a "Baptized Sultan."

family_letter_desc_601=I must admit, from the first moment I laid eyes on this youth, I was deeply captivated. He embodies the essence of both the Hohenstaufen and Hauteville families. He excelled in horseback riding, falconry, and chess. Fluent in five languages, his breadth of reading surpassed many scholars.
family_letter_desc_602=Frederick is like a blazing fire in the night, drawing everyone’s attention. After meeting him, Hermann, the Grand Master of the Teutonic Knights, devoted the rest of his life to him.
family_letter_desc_603=Constance's death broke Frederick's heart. She was the princess who always helped him grasp power. Although Frederick had many lovers, Constance never complained.
family_letter_desc_604=Our journey was fraught with doubts from the Christians. It's been 130 years since the First Crusade, yet without bloodshed or battle, we reclaimed the Holy City. Seeing Frederick and Al-Kamil sign a ten-year treaty in Arabic within the tent, and witnessing Frederick enter the Holy City to the cheers of people of all faiths, I no longer doubted—peace truly is God's will.
family_letter_desc_605=Frederick's curiosity about new technologies and disciplines is insatiable. Though Sultan Al-Kamil of Egypt did not send treasures or beauties, he gifted many ingenious items, such as an intricate mechanical clock. Frederick also funded the mathematician Fibonacci, whose "Liber Abaci" and subsequent works were dedicated to him.
family_letter_desc_606=Frederick was unwaveringly just and a staunch advocate of the rule of law. Even when his eldest son Henry rebelled, Frederick showed no mercy, imprisoning him for life. He made public his correspondence with the Pope to the royals in Europe, maintaining his integrity. The sun and moon allegory of "the Pope as the sun, and the Emperor as the moon" began to crumble among the royals, who gradually embraced the teachings of Jesus Christ: "Render unto Caesar the things that are Caesar's, and unto God the things that are God's."
family_letter_desc_607=On the day Frederick was excommunicated, he also received news of Hermann’s death. Hermann, the Grand Master of the Teutonic Knights, had loyally served Frederick and God for twenty years before passing away.
family_letter_desc_608=Upon learning of his excommunication, Frederick was furious. He shouted, "I once respected him, but from now on, I will show no mercy! I will become the hammer!"
family_letter_desc_609="A near-obsessive passion for the rule of law, absolute fairness in actions, an insatiable quest for knowledge, diverse talents, and inherent nobility—if these do not vanish with the death of the body, then Frederick will continue to live in our hearts." —Manfred's tribute to his father.

battle_talk_3030401=Let's take advantage of the moment and attack Messina. Victory is within our grasp!
battle_talk_3030402=The attack is stalled. Retreat and reassess the situation.
battle_talk_3030403=What? Where are our ships? Have they been blown away by the storm?
battle_talk_3030404=Hold the line until the new batch of transport ships arrives.
battle_talk_3030501=We've taken Messina. We can now advance towards central Sicily.
battle_talk_3030502=The Enna fortress is heavily fortified. We might be in for a tough battle.
battle_talk_3030503=Arab cavalry are charging our lines. Norman knights, draw your swords!
battle_talk_3030801=Ibn al-Hawas has launched a despicable surprise attack. We must hurry to Troina for reinforcements.
battle_talk_3030802=Speed up the assault! We need to capture the city before Roger Bosso returns.
battle_talk_3030803=Their reinforcements have arrived. Prepare to engage!
battle_talk_3030901=The enemies are overwhelming. We should first secure a strategic position.
battle_talk_3030902=We have ample troops. Charge in waves to deplete the Norman forces.
battle_talk_3030903=The enemy's morale is waning. It's time to counterattack.
battle_talk_3030904=Hold your ground! Do not retreat!
battle_talk_3031001=We failed to capture Palermo last time, but this time we will succeed.
battle_talk_3031002=We were defeated by the Normans before; this time, we will avenge that loss.
battle_talk_3031003=Enemies spotted! Has our plan been discovered?
battle_talk_3031004=Normans! How did they uncover my plan?
battle_talk_3031005=Charge! Do not give the enemy a chance to align in a formation!
battle_talk_3031101=Their reinforcements have been driven back.
battle_talk_3031102=My fleet is ready. Let's take this city.
battle_talk_3031301=Surrender. You have no reinforcements left, and I will ensure your family's safety.
battle_talk_3031302=I am not a virtuous man, but my soldiers are fierce warriors.
battle_talk_3031303=I understand. I will craft a meticulous trap.
battle_talk_3031304=This is a trap! We have no way out!
battle_talk_3031401=The enemy always uses Malta as a base to attack us.
battle_talk_3031402=We must seize this island to eliminate the threat once and for all.
battle_talk_3040301=The storm destroyed our fleet. We don't know where we are now, but we must find a landing spot nearby.
battle_talk_3040302=Regroup the fleet and protect our people as they retreat to Sicily.
battle_talk_3040303=Young Roger faced a painful setback the first time he displayed his power, significantly damaging his prestige.
battle_talk_3040401=The flat beaches of Valletta are suitable for landing but heavily defended. We should land directly from the northwest.
battle_talk_3040402=Or we could detour and land from the south, cutting through the complex mountains to seize Malta Castle directly.
battle_talk_3040403=Malta Castle has fallen. The enemy could appear behind us at any moment. What should we do?
battle_talk_3040501=The local lords have mixed, mostly negative attitudes towards our contest of Apulia.
battle_talk_3040502=Therefore, I have prepared gifts to win favor with them, though we can only form an alliance with one, leading to varying outcomes.
battle_talk_3040801=We have been defeated. Establish a defensive line at Salerno. Our shock troops can destroy the bridges over the Sarno River to block the northern enemy forces.
battle_talk_3040802=The garrison at Lanciano can share the brunt of the attack, and the main force is currently coming from Bari to launch a counteroffensive to eliminate the rebels. 
battle_talk_3040901=All of Northern Italy has pledged allegiance to Lothair. Officials of the Holy Roman Empire are on their way to take over the cities. We can preemptively strike and capture these cities.
battle_talk_3040902=We can't face the imperial army head-on, instead we can simply loot the cities to obtain supplies to strengthen our defenses. It's best not to attack cities that have already been taken over.
battle_talk_3040903=Meanwhile, the rebel leader is negotiating with Lothair. We should quickly destroy the rebel forces to discourage Lothair from assisting them in launching an immediate attack.
battle_talk_3041001=Enemies are coming from all directions. Escort the logistics convoy to the defensive line and delay Lothair's main force as long as possible. At least hold Salerno.
battle_talk_3041002=I will personally go to North Africa to gather Muslim troops and launch a counterattack.
battle_talk_3041101=We surrender.
battle_talk_3041102=Charge, eliminate these rebels!
battle_talk_3041103=You're not even close, child.
battle_talk_3041104=No, Roger, my eldest son!
battle_talk_3041201=Can we sit down and talk now, Your Holiness?
battle_talk_3041202=I acknowledge you as the sole ruler of Southern Italy, now please allow me to go back.
battle_talk_3050401=The Roman Emperor? That's just an alm from the old man in Rome, and now he wants to give it to a young brat? He doesn't deserve it!
battle_talk_3050402=Guard all the mountain passes and show that old man he was gravely mistaken.
battle_talk_3050403=We must find a hidden path through the Alps; we must not let Otto detect us.
battle_talk_3050601=Erard, you traitorous turncoat, defeated fool! Today, with the help of the King of France and the princes, I must sever your head today!
battle_talk_3050602=Enough talk! You think you can beat me with a superiority in numbers only?
battle_talk_3050603=Hold the line! Do not give the rebels any chance for reinforcements!
battle_talk_3051001=The Pope is on my side, God is on my side! And him? A man banished by the Church, calling himself Emperor—preposterous!
battle_talk_3051002=Reclaim God's fief! Storm the heretics' lair! Deliver justice in the name of the Lord!
battle_talk_3051003=Our homeland is under invasion, and the invader is the very Pope who sent us to foreign lands to battle the Saracens. How ridiculous!
battle_talk_3051004=As Rome approaches a celebration of "reconciliation," the conflict between the Pope and Frederick temporarily subsides, with Frederick being reinstated as Emperor.
battle_talk_3051201=We Lombards have never feared any Roman Emperor! Be it Frederick Barbarossa or this fair-haired Frederick, Lombardy will never submit!
battle_talk_3051202=Grand Master Hermann, sometimes I wonder, do these Lombards truly have an independent spirit, or are they just brainless profiteers?
battle_talk_3051203=The Lombards have provoked us time and again. Show no mercy with our swords! Raid their defenses and seize Vicenza!
battle_talk_3051301=I will not allow these rats to continue stealing my lands! Spread the word, we will retreat to Cremona for the winter. Lure them into our ambush!
battle_talk_3051302=It seems they too are unwilling to contend with us in the cold Italian marshes. Let's return to our winter camp.
battle_talk_3051303=Oh no! We've fallen into a trap.
battle_talk_3051401=No allies, no reinforcements! We must save ourselves! Raise your pitchforks and protect our children!
battle_talk_3051402=If we do not capture this place within two months, winter will descend, and we will be at a disadvantage. But the mutual support of the towns leaves us seemingly without a solution.
battle_talk_3051403=Retreat, we will be back!
battle_talk_3051404=The steadfast determination and unexpected tactics of the defenders ultimately prevented Frederick II from gaining any military achievement.
battle_talk_3051501=Frederick has taken the town of Faenza again! This makes me losing sleep and appetite. Have the Genoese launch an attack by sea! Head straight for Sicily.
battle_talk_3051502=Set sail! Immediately reinforce Sicily!
battle_talk_3051503=After the victory, the emperor's troops advanced towards Rome. However, just 13 kilometers from Rome, on August 22, the news of Pope Gregory's death was announced by the Vatican. Frederick ordered a retreat.
battle_talk_3051701=Frederick's fortresses are increasing around us. We must break through immediately, or we will be doomed!
battle_talk_3051702=Let Victoria be their prison. I want to see how the Pope will respond.
battle_talk_3051703=Even Victoria's fortress can't trap these rabble. I truly underestimated them.
battle_talk_3051704=Frederick, the mighty emperor, was ultimately defeated by a small northern Italian city-state, and defeated so thoroughly with no retaliation. Parma's Victoria base was reduced to ashes after the enemy captured it.
battle_talk_3051801=The greedy Pope continues to attack, yet only bringing only blood and suffering to the people. Aren't these people his subjects?
battle_talk_3051802=Perhaps tomorrow, I may find it difficult to mount my horse again. I don't know how long this struggle will continue, but today, repel the enemy!
battle_talk_3051803=They have attacked our rear camp! Retreat! Enzo, command the troops to retreat slowly! We cannot allow a rout!


