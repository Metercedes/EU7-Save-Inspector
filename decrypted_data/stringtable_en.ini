conquest_faction_desc_701=The Ottoman Empire continued its expansion into Europe. At the same time, reforms were underway within the empire. New decrees were introduced that strengthened the control of the central government. Although the Ottoman Empire faced challenges from within and without, it remained one of the most powerful states of its time, with great military power and cultural influence.
conquest_faction_desc_702=The Byzantine Empire was no longer in its former glory, with a shrinking territory, severe internal political corruption, and a sluggish economy. The Ottoman Empire launched a series of attacks on Byzantium, constantly encroaching on its territory and pushing it to the brink of destruction.
conquest_faction_desc_703=Since its moved to the Balkans, the Kingdom of Hungary had been battered by war. After the governance of King Szeged, the country prospered again. However, it faced internal conflicts between the nobility and the centralized power. At the same time, the Ottoman Empire was a constant threat, and the Kingdom of Hungary urgently needed to increase its armaments to maintain the integrity and security of its territory.
conquest_faction_desc_704=The Principality of Wallachia faced a double threat from the Kingdom of Hungary and the Ottoman Empire. The leader of the principality, Vlad II, was highly motivated and took strong measures to defend the principality's independence, not hesitating to fight violence with violence. However, he was unfortunately defeated in the face of an attack by the Kingdom of Hungary and was forced to accept a humiliating peace treaty.
conquest_faction_desc_705=The Principality of Moldavia was a relatively young principality, a small country bordering the Kingdom of Hungary and the Principality of Wallachia, fraught with internal turmoil and conflict. Stephen the Great made great efforts to consolidate his rule, including peaceful solutions to conflicts with neighboring countries, as well as pursuit of international support.
conquest_faction_desc_706=The Kingdom of Bosnia was a multicultural and multi-ethnic state with several ethnic groups settling within its borders. Within the kingdom, there was constant strife among the nobility, while it was externally  threatened by the Hungarian and Ottoman empires.
conquest_faction_desc_707=During this period, the Serbian Despotate was endangered by internal and external threats. Even though Serbia had a strong ruler, these threats made the country's future uncertain.
conquest_faction_desc_708=The Venetian Republic was challenged to compete for trade supremacy in the Eastern Mediterranean. They competed with their Christian rival, the Republic of Genoa, for the authority of the Golden Horn. In this tense situation, the Venetians had to take tough measures, including attacks on hostile ships and military intervention, to secure their interests and influence in the Mediterranean.
conquest_faction_desc_709=Albania was divided into several territories. In order to defend against the Ottoman invasion, the domestic Albanian nobles formed the Albanian League. The League, under the leadership of Duke Skare, the head of the alliance, defeated the Ottoman army in a series of battles and became an essential force in consolidating Albania's independence.
conquest_faction_desc_710=The Despotate of Epirus, a strong regime in the Greek region, was led by Carlo II. Despite territorial disputes with the Byzantine Empire, the Epirus Despotate showed great military power and leadership in the war and was regarded as an important force in the Greek region.
conquest_faction_desc_711=The Despotate of the Morea was the only remaining secessionist regime in the Byzantine Empire. The country's leader, Thomas Paliologos, was struggling to consolidate his rule against the threat of Ottoman Empire.
conquest_faction_desc_712=The Crown of Aragon conquered the Kingdom of Naples in southern Italy and conflicted with the Pope. The region suffered from political instability, military conflicts, and disease epidemics, but Aragon's cultural and economic influence kept growing.
conquest_faction_desc_713=The Karaman Bey State faced constant conflict and oppression with its neighboring Ottoman Empire, and the search for a way to remain independent and thrive became increasingly difficult.
conquest_faction_desc_714=The Knights of the Hospital and the Kingdom of Cyprus joined forces to create the Cyprus-Hospital Knights Alliance and initiated the fights against pirates in the Eastern Mediterranean. Despite the pressure alliance faced from the Ottoman Empire, they maintained their influence in the region through great naval strength and tactical ingenuity.
conquest_faction_desc_716=The Crusader coalition, led by King Władysław III of Poland and Hungary, with the help of Mircea II of Wallachia, captured the Bulgarian seaport city of Varna and marched towards the Ottoman hinterland.

