battle_talk_3000201=Attack! Occupy the harbor terminal!
battle_talk_3000202=Enemy reinforcements were spotted at sea!
battle_talk_3000203=The enemy forces at sea have been eliminated!
battle_talk_3000204=Very well! Let's take the island!
battle_talk_3000301=Attack! Destroy all resisting enemies!
battle_talk_3000302=The enemy is fleeing!
battle_talk_3000303=Chase! Don't give them time to recuperate!
battle_talk_3000304=There may be more fierce battles ahead. We should be prepared.
battle_talk_3000401=Raid the cities and fortresses along the way to break up enemy resistance!
battle_talk_3000402=No enemy can stop our shinning edge.
battle_talk_3000403=Continue the attack. Once we take Syracuse, Sicily is ours!
battle_talk_3000404=Georgios Maniaces is behind on our military pay. We'll just have to find a solution from our enemy.
battle_talk_3000501=Syracuse has been under attack for a long time and the troops are demoralized.
battle_talk_3000502=The siege has failed again, so we can only retreat to the camp to recuperate.
battle_talk_3000503=The enemy is disorganized. It's time to blow the horn for our counterattack!
battle_talk_3000504=How did the enemy counterattack so quickly? Retreat quickly!
battle_talk_3000505=The last few days of preparation have been for this moment! The glory of the House of Hauteville will begin here!
battle_talk_3000506=Geez! This Norman actually cut his enemy in half!
battle_talk_3000507=William presented Syracuse to the Eastern Roman Empire, and his reputation for splitting enemy generals in half earned him the title "William Iron Arm".
battle_talk_3000801=You're outnumbered. You can choose whether to fight to the end or leave.
battle_talk_3000802=Normans never back down!
battle_talk_3000803=Then you shall shed your last drop of blood here!
battle_talk_3000804=Our army is defeated! Retreat! Retreat!
battle_talk_3000901=Our army is tens of thousands, and the advantage is mine!
battle_talk_3000902=I'm not feeling well, but I'll still keep my eyes on the battlefield
battle_talk_3000903=The enemy's first line of defense has been broken!
battle_talk_3000904=Wonderful battle! Sickness won't stop me from joining this glorious battlefield!
battle_talk_3000905=William's toughness allowed him to gradually become the de facto leader of the Normans in the South.
battle_talk_3001001=Surround Melfi! We're taking the city!
battle_talk_3001002=We can take the opportunity to attack their camps at Monte Peloso.
battle_talk_3001003=The enemy is holding out inside the fortress. It's not wise to attack recklessly.
battle_talk_3001004=We can try to cut off their supply lines and force them to fight out of the city.
battle_talk_3001201=Attack, attack! Calabria will finally be our Norman territory!
battle_talk_3001202=Outflank and outmaneuver the enemy.
battle_talk_3001203=Enemy troops have appeared behind us. If we don't retreat, we may not have a chance.
battle_talk_3001204=The battle ended in defeat, and William decided to return the next year to conquer.

