campaign_end_desc_65=The fall of Constantinople marked the demise of the Byzantine Empire. The Empire's past glory inevitably became history. The fall of the Byzantine Empire marked the end of the Middle Ages and the birth of a new European hegemon.
campaign_end_desc_66=The end of the war marked the end of the Angevin Dynasty's rule in England and ushered in the era of the Welsh Tudor Dynasty. It also marked the end of the Middle Ages in England and the beginning of a new Renaissance era.

