battle_talk_3010201=Order the peasants to destroy the wheat fields. Don't leave a single grain for the Normans.
battle_talk_3010202=There's not enough food. We're asking to negotiate with the Pope.
battle_talk_3010203=Let them come. It's just a small group. They'll be fine.
battle_talk_3010204=The Pope's troops are defenseless, take advantage of this to raid them!
battle_talk_3010205=I, hereby, ask for the Pope's forgiveness.
battle_talk_3010206=Although the Normans were courteous to the defeated Pope, the news that the Pope had become a Norman prisoner spread throughout Europe.
battle_talk_3010301=Apulia's a great place. It's got everything you need.
battle_talk_3010302=Robert! Why have you been enjoying yourself in Apulia and refusing to return to your own domain?
battle_talk_3010303=Are you accusing me of deliberate delay? Just wait. I'll have Calabria in my pocket!
battle_talk_3010304=I'm running out of time. The Normans can't survive on conquest alone.
battle_talk_3010305=Robert's performance in recent years has proved him to be an excellent politician and the future of the Normans can be trusted in his hands!
battle_talk_3010401=Attack the Byzantine strongholds and drive them out of Calabria!
battle_talk_3010402=After we crush the Byzantine Empire, we can march on Sicily.
battle_talk_3010403=The city has a strong defense, but we can force it to surrender with a siege.
battle_talk_3010404=The Byzantine army has been expelled. It's time to conquer Sicily.
battle_talk_3010405=It's the Normans! Quickly, gather your troops to meet them!
battle_talk_3010601=The Byzantine army had failed to capture Messina before, but this night raid would be a success.
battle_talk_3010602=Fortify the city. This will be the starting point for our conquest of Sicily.
battle_talk_3010603=Normans, if you need allies, then we can sit down and talk.
battle_talk_3010604=Thank you very much for your cooperation. I need allies like you.
battle_talk_3010701=Bari is the last stronghold of Byzantium; by defeating them, Southern Italy will belong entirely to us Normans!
battle_talk_3010702=Hang in there. I've sent for help. Imperial reinforcements will be here soon!
battle_talk_3010703=I'm willing to help you if I can get enough in return after you get to the city.
battle_talk_3010704=Reinforce the city of Bari!
battle_talk_3010705=Intercept their reinforcements!
battle_talk_3010801=Bari has fallen and we will be Guiscard's next target.
battle_talk_3010802=We must unite against him.
battle_talk_3010803=Rabbles! Not even an army can stop me!
battle_talk_3010804=Next, it's time for Byzantium to feel the power of the Normans.
battle_talk_3010805=Less than 2 years after the fall of Salerno, Benevento was also conquered by Guiscard.
battle_talk_3011001=The Venetians attacked our fleet at sea. We suffered considerable losses.
battle_talk_3011002=The Emperor ordered us to defend the city to the death. He'll bring troops to support us!
battle_talk_3011003=The valiant Varangian Guards routed the enemy! Follow me!
battle_talk_3011004=The Emperor's reinforcements have arrived! Attack with me!
battle_talk_3011005=Prioritize the elimination of the Varangian Guard and divide and surround the enemy!
battle_talk_3011006=I need to regroup the troops! Retreat! Retreat!
battle_talk_3011007=Alexios bribed the Pope to launch a surprise attack that burned the Norman ships. And they encountered the most powerful Varangian Guards: these were the Anglo-Saxons who had fled to Constantinople after the Battle of Hastings in 1066.
battle_talk_3011101=The Pope is besieged by Henry IV at Castel Sant'Angelo, and he needs to be rescued.
battle_talk_3011102=Thank you for your aid, my ally.
battle_talk_3011103=Continue the march and drive Henry IV out of Rome!

