troop_desc_416=The Balkan Heavy Cavalry was a tremendous force of powerful cavalry, riding powerful war horses, wearing heavy armor and robes, and displaying unparalleled strength and courage on the battlefield.
troop_desc_316=The Sipahi Heavy Cavalry was an elite unit of soldiers with unparalleled bravery, riding tall war horses, wearing heavy armor, carrying war hammers, and known for its speed and mobility.
troop_desc_116=Byzantine Hoplites was a unit known for its solid equipment and reliable fighting skills. The soldiers wore heavy armor and wielded powerful weapons, usually spears, battle axes, and heavy swords.
troop_desc_516=Sultan Musketeer Guard was a unit proficient in firearms, using refined muskets capable of inflicting lethal damage at long range. They wore magnificent costumes and turbans, indicating their noble status and loyalty to their faith.
troop_desc_517=Byzantine Fireabat was a unit with mysterious weapons that used flamethrowers that could spew fiery flames at close range, causing enemies to flee in terror. They wore protective suits and masks to protect themselves from the flames.

