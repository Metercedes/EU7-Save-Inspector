stage_intro_4761=In 985, two Anatolian generals tried to overhead the newly crowned Basil II, who needed to defeat them to take actual control of the country.
stage_intro_4765=Prolonged civil wars in Byzantium weakened the empire's hold on the eastern part. In response to the constant raids of the Fatimid dynasty, Basil II personally led an army into Syria.
stage_intro_4767=When the Byzantine Empire lost a border war with the Fatimid dynasty in 998, Basil II once again led his own troops on the border, clearing a series of enemy strongholds and defending the empire's territory.
stage_intro_4763=In 986 AD, Emperor Basil II personally led an army to attack Bulgaria and was ambushed by the Bulgarian army during his retreat.
stage_intro_4769=In 1014, Basil II succeeded in pushing the main Bulgarian army back to the northern coast of the Aegean Sea after a long campaign, and the years of conflict between the two sides would once again come to an end.
stage_intro_4771=In 1020, the Armenian king took advantage of Basil II's use of his army against Italy to join the Fatimid dynasty in an attack on the Byzantine frontier, the enraged Basil immediately returned with his troops and conquered  the Armenian region in a subsequent campaign.

