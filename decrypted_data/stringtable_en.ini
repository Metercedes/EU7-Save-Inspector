general_desc_Jean de Dunois=The illegitimate son of the Duke of Orléans, who fought bravely and kept Orléans solid, although he followed Joan of Arc in her quest.
general_desc_Gilles de Rais=Gilles was a French marshal during the Hundred Years' War, one of the first generals to follow Joan of Arc, and was once hailed as a national hero, but was later tortured at the stake for child cruelty.
general_desc_La Hire=Lahaire was an invincible general who followed Joan of Arc and made an outstanding contribution to the final victory of France.
general_desc_Henry V=Henry V was a brilliant warrior who showed his outstanding leadership at the Battle of Agincourt, and the Treaty of Troyes of 1420, which confirmed this English king's right to the throne of France.
general_desc_Olga2=Olga was the first ruler of Rus' to convert to Christianity, and she spread Christianity to Kievan Rus'. After her death, she was posthumously recognized as "St. Olga" by the Holy See.
general_desc_Richard I2=Richard the Lionheart, one of the leaders of the Third Crusade, was so powerful that even Saladin avoided him, and the kingdom of Jerusalem continued for another century thanks to Richard's power to save the day.

