stage_intro_4701=Khalid was an outstanding Arabian commander in the 7th century AD, who earned the title "Sayf Allah" after he followed Muhammad.
stage_intro_4703=In 633, Mohammed's successor, the Rashidun Caliphate had border conflicts with the Sasanian Persian Empire, and Khalid was ordered to strike. The battle is also known as the 'Battle of Chains' because the Persian army used chains to link the cavalry together.
stage_intro_4705=The defeat at the Battle of Chains stopped the Sassanid Empire from taking the enemy lightly and they sent two large armies to try to destroy Khalid in one fell swoop. But Khalid surrounded one of the two armies before they could meet and gained the initiative on the battlefield.
stage_intro_4707=In 634, Khalid, who had won a series of battles, was ordered to retreat and turn his march westwards. His new opponent was Heraclius, who was known as the rising lord of the Byzantine Empire.
stage_intro_4709=In 636, the previously defeated Heraclius reassembled a large army and approached Syria, and Khalid led his troops to join the battle. The two sides fought a brutal six-day battle near the Yarmouk River.
stage_intro_4711=After the victory at Yarmouk, Khalid took advantage of the situation and succeeded in surrounding and occupying the military town of Aleppo, which meant the complete defeat of Heraclius' expedition.

