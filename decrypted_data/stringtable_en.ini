stage_intro_1701=In 1469, a man named "Robin of Redesdale" rebelled several times in the north of England, and Warwick, the kingmaker, who had a long-standing grudge against Edward IV, took advantage of the rebellion and attacked the army that came to put it down at Edgecote. 
stage_intro_1702=In 1470 Warwick attempted to foment another rebellion and Edward IV pre-empted it by routing the rebels at Hornfield, also known as the Battle of Losecote Field because many of the rebels stripped off their marked clothes as they fled.
stage_intro_1703=After the Battle of the Losecote, Warwick the Kingmaker fled overseas and allied himself with Margaret of Anjou in exchange for the support of the House of Lancaster, and in April 1471, on a foggy morning, Edward IV and Warwick the Kingmaker, former comrades in arms, went to their final battle.
stage_intro_1704=At the same time as the Battle of Barnet, Margaret of Anjou landed on the Isle of England at the head of the overseas forces of the House of Lancaster and began to march on London. Edward IV learned of this at the end of the Battle of Barnet, and despite the fact that his army was very tired, he led it into a duel with Margaret.
stage_intro_1705=When Edward IV died in April 1483, his brother Richard was appointed Lord Protector, and in June, when Edward V disappeared, Richard was crowned King, known as Richard III. Edward IV's old allies saw this as a usurpation of power and switched their support to Henry Tudor. Soon after, a rebellion broke out again in England.
stage_intro_1706=On Christmas Day 1483, Henry Tudor of the House of Lancaster married the daughter of Elizabeth Woodville of the House of York, and the two families united to become the House of Tudor, only to fight a common enemy, Richard III. On 22 August 1485, Henry Tudor and Richard III fought on Bosworth Plain in a Duel.

