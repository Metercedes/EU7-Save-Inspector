item_desc_9201=Frederick II regarded this gauntlet as a treasure, even more so than his crown and scepter. He used this gauntlet to train falcons, and the tough leather restains traces of countless times when the falcons took off. Every falcon possesses loyalty and sharpness, and it has become a symbol of Frederick's wisdom and control.
