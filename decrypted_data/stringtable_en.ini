;__font_type[font_text_]
campaign_desc_1=Invasions from multiple enemies have weakened the Roman Empire even further. The constant changes to the throne in the past two decades have exacerbated the turmoil even further. The Roman Empire would appear to be on its last legs.
campaign_desc_2=Under repeated invasions from foreign forces, the demise of the Western Roman Empire appeared inevitable. Meanwhile, Constantinople in the East welcomes two figures who shall lead the Byzantine Empire to glory, Justinian I and Belisarius.
campaign_desc_3=As the imperial power of the Roman Empire continued to weaken, its control over the British island began to slip. The Anglo-Saxons from the Germanic region seized this opportunity to migrate to the British Isles in large numbers. Now the islanders who lost the protection of the Empire have to face these invaders alone.
campaign_desc_4=Since the 7th century, the Arabs have been engaged in combat throughout the land. The Byzantine Empire is one of the most powerful enemies of the Arabs.
campaign_desc_5=Since the 8th century, Britain has flourished and accumulated wealth in abundance. The sea was credited for protecting England from its enemies, but no one expected that one day an attack would be launched from the sea.
campaign_desc_6=Basil I's accession to the throne ushered in the Byzantine Macedonian Dynasty, seen as the heyday of the Byzantine Empire.
campaign_desc_7=In 1066, Edward the Evangelist recommended Harold as king before his death. At the same time, the Duke of Normandy also believed he had the right to inherit the throne. When the news of Harold II's accession to the throne reached Normandy, William was furious and immediately announced that he would send troops to England.
campaign_desc_8=After the end of the Macedonian Dynasty in 1057, the Byzantine Empire experienced decades of depression and decline until Alexius I ascended the throne in 1081. The Byzantine Empire gradually recovered under the rule of the Komnenos family.
campaign_desc_9=With permission from the Pope, Western European lords and knights led their troops to the east coast of the Mediterranean. They targeted Jerusalem, hoping to recover the holy city occupied by the enemy.
campaign_desc_10=After the civil war in 1135, Queen Matilda successfully claimed the English throne for her son Henry II. In 1154, Henry II was crowned and succeeded to the throne at Westminster Abbey, ushering in the era of the Angevin Dynasty.
campaign_desc_11=After the Fourth Crusade, Constantinople was occupied by the Crusaders, and the Empire of Nicaea was established out of the former Byzantine Empire. The Latin Empire became a lingering shadow in the hearts of all Byzantines.
campaign_desc_12=At the end of the 13th century, after the fall of the Seljuk Empire, the Ottoman Empire was established. As a result, the previously scattered Anatolian territories united with the Ottomans against the Byzantine Empire.
campaign_desc_13=England and France had many conflicts and contradictions since William's conquest of England, and the uncertainty of the succession of kings after the death of King Philip of France created a great crisis throughout France.In 1337, Edward III formally declared himself King of France, while Philip VI announced the recovery of all Edward III's lands in France, which led to a full-scale war between England and France.
campaign_desc_14=With the gradual stabilization of the political situation in England, Henry V was crowned in Westminster Abbey in 1413, and the great warrior rekindled his ambition to conquer the European continent, Henry V wanted to fulfill the unfulfilled wish of his ancestors and establish the "Anglo-French Empire".
campaign_desc_15=In the path of the Ottoman Empire's expansion, generations of sultans spent their lives fighting against the entire Western world, and they had a city in front of them, which was called Constantinople.
campaign_desc_16=With Richard II overthrown, two families that descended from Edward III, the Lancaster family, and the York family, fought for the English throne.
campaign_desc_51=Invasions from multiple enemies have weakened the Roman Empire even further. The constant changes to the throne in the past two decades have exacerbated the turmoil even further. The Roman Empire would appear to be on its last legs.
campaign_desc_52=Under repeated invasions from foreign forces, the demise of the Western Roman Empire appeared inevitable. Meanwhile, Constantinople in the East welcomes two figures who shall lead the Byzantine Empire to glory, Justinian I and Belisarius.
campaign_desc_53=As the imperial power of the Roman Empire continued to weaken, its control over the British island began to slip. The Anglo-Saxons from the Germanic region seized this opportunity to migrate to the British Isles in large numbers. Now the islanders who lost the protection of the Empire have to face these invaders alone.
campaign_desc_54=Since the 7th century, the Arabs have been engaged in combat throughout the land. The Byzantine Empire is one of the most powerful enemies of the Arabs.
campaign_desc_55=Since the 8th century, Britain has flourished and accumulated wealth in abundance. The sea was credited for protecting England from its enemies, but no one expected that one day an attack would be launched from the sea.
campaign_desc_56=Basil I's accession to the throne ushered in the Byzantine Macedonian Dynasty, seen as the heyday of the Byzantine Empire.
campaign_desc_57=In 1066, Edward the Evangelist recommended Harold as king before his death. At the same time, the Duke of Normandy also believed he had the right to inherit the throne. When the news of Harold II's accession to the throne reached Normandy, William was furious and immediately announced that he would send troops to England.
campaign_desc_58=After the end of the Macedonian Dynasty in 1057, the Byzantine Empire experienced decades of depression and decline until Alexius I ascended the throne in 1081. The Byzantine Empire gradually recovered under the rule of the Komnenos family.
campaign_desc_59=With permission from the Pope, Western European lords and knights led their troops to the east coast of the Mediterranean. They targeted Jerusalem, hoping to recover the holy city occupied by the enemy.
campaign_desc_60=After the civil war in 1135, Queen Matilda successfully claimed the English throne for her son Henry II. In 1154, Henry II was crowned and succeeded to the throne at Westminster Abbey, ushering in the era of the Angevin Dynasty.
campaign_desc_61=After the Fourth Crusade, Constantinople was occupied by the Crusaders, and the Empire of Nicaea was established out of the former Byzantine Empire. The Latin Empire became a lingering shadow in the hearts of all Byzantines.
campaign_desc_62=At the end of the 13th century, after the fall of the Seljuk Empire, the Ottoman Empire was established. As a result, the previously scattered Anatolian territories united with the Ottomans against the Byzantine Empire.
campaign_desc_63=England and France had many conflicts and contradictions since William's conquest of England, and the uncertainty of the succession of kings after the death of King Philip of France created a great crisis throughout France.In 1337, Edward III formally declared himself King of France, while Philip VI announced the recovery of all Edward III's lands in France, which led to a full-scale war between England and France.
campaign_desc_64=With the gradual stabilization of the political situation in England, Henry V was crowned in Westminster Abbey in 1413, and the great warrior rekindled his ambition to conquer the European continent, Henry V wanted to fulfill the unfulfilled wish of his ancestors and establish the "Anglo-French Empire".
campaign_desc_65=In the path of the Ottoman Empire's expansion, generations of sultans spent their lives fighting against the entire Western world, and they had a city in front of them, which was called Constantinople.
campaign_desc_66=With Richard II overthrown, two families that descended from Edward III, the Lancaster family, and the York family, fought for the English throne.
campaign_desc_301=According to legend, word of the burial site of the French king's treasure spread like wildfire among the people. The rare and priceless treasure became the envy of the land.
campaign_desc_302=For a long time, the treasure of King John Lackland has been hunted by countless explorers, but its location has proven elusive.
campaign_desc_303=King Solomon's treasure in the temple in Jerusalem was once lost and gradually forgotten. Now, word of the treasure has resurfaced, and countless people are desperate to seek it out.
campaign_desc_304=Since its establishment, the Knights Templar has fought on the battlefields and accumulated a lot of wealth. After its dissolution, they buried these riches to prevent them from being coveted, and they have not yet been found.
stage_group_desc_20001=The weakening of the Roman Empire made the barbarians move. Attila, the leader of the Huns, gathered the Ostrogoths, Gepids and Franks and marched on Gaul. The Roman Empire realized the danger and Aetius gathered a large number of troops for a great battle with Attila on the plain.
stage_group_desc_20002=The expansion of the Caliphate was unstoppable, and they had already occupied the whole of North Africa and the Iberian Peninsula. If the Frankish kingdom could not stop this Arab army, then the whole of Europe would be conquered by Arabia.
stage_group_desc_20003=Both the Arabian Empire and the Tang Dynasty expanded into Central Asia, and because of the fall of the Persian Empire, the intermediate buffer zone no longer existed and conflict between the two empires was inevitable.
stage_group_desc_20004=In 1066, the Duke of Normandy led his troops across the channel and landed in England in order to claim the English throne. When Harold II heard the news, he immediately called his army south to intercept the invaders near Hastings.
stage_group_desc_20005=The rise of the Turkic Seljuk dynasty was bound to expand to the Mesopotamia Valley and even further west. The Arab Empire avoided conflict because of civil unrest, and after the capture of Manzikert, the Byzantine emperor was so enraged that he drew troops from Greece and decided to deal the Seljuks a fatal blow!
stage_group_desc_20006=The death of Baldwin IV plunged Kingdom of Jerusalem into a greater crisis, with internal disunity and unsolicited provocations giving Saladin the opportunity to reclaim the Holy Land. A war between the East and West was now inevitable.

;战役章节结束
;__font_type[font_text_]
campaign_end_desc_1=The Western Roman Empire fell as a result of constant foreign invasions. The destruction of this ancient empire may have seemed inevitable, but it happened very suddenly, greatly reducing the size of the Empire. At this time, Constantinople, as the capital of the Byzantine Empire, was a different story.
campaign_end_desc_2=Justinian I and Belisarius are often regarded as the greatest and most influential figures of the Byzantine era. They laid the foundation for the rise and development of Byzantium and made vital contributions to the continuation of the millennium-long empire.
campaign_end_desc_3=The Anglo-Saxon settlement gradually unified the divided regional forces of Britain, giving rise to the Heptarchy of the seven kingdoms and laying the foundation for the future Kingdom of England.
campaign_end_desc_4=The Byzantine Empire was struggling from the Arab's powerful offensive. Meanwhile, new wars also unfolded in the Balkans. The vast empire was under attack on multiple fronts and appeared to be on the verge of collapse.
campaign_end_desc_5=The Vikings were famous navigators. They not only invaded various countries around Europe, but were active in regions such as Iceland and the American continent. The period of Viking expansion is called the "Viking Age".
campaign_end_desc_6=The Macedonian dynasty created the second-most glorious period in the history of the Byzantine Empire. During this centuries-long golden age, the territory of the Macedonian Dynasty reached a scale unseen since Justinian I, but eventually ended due to the absence of an heir to the throne.
campaign_end_desc_7=The Norman Dynasty experienced the rule of four kings, and Henry I brought about a period of long-term peace in England. The end of the Norman Dynasty meant that England was about to usher in a new era.
campaign_end_desc_8=The Crusaders led by Alexius I defeated powerful enemies for the Byzantine Empire, but also nearly destroyed its century-old foundation. The occupation of Constantinople and the rise of the Latin Empire suggested that the Byzantine Empire was soon to become history.
campaign_end_desc_9=The lengthy expedition ended in failure, and Jerusalem remained under enemy occupation. After expending a lot of human and financial resources, the expeditionary army looted Constantinople, and the Latin Empire was born.
campaign_end_desc_10=Isabella and Roger's actions forced Edward II to agree to abdicate the throne in favor of his son Edward III. Edward III's accession to the throne not only contributed to the outbreak of the second Scottish war, but also started a century-long war between England and France.
campaign_end_desc_11=The fall and recovery of Constantinople made the Byzantines realize the great threat they face from the Western Latin world. At the same time, on the Anatolian Peninsula in the East, a new empire was ready to move against the Byzantines.
campaign_end_desc_12=Although the rise of the Ottoman Empire has been unstoppable, the Byzantine Empire still will not bow down. The Western Christian countries could not sit back and watch the demise of Byzantium. During this time, a Turkic tribe in the East is gradually rising, the Ottoman Empire's road to expansion is not going to be a smooth one.
campaign_end_desc_13=Edward III was not crowned King of France after all, but the war between the two countries continued, the protracted war dragged both England and France into an endless abyss, huge debts and rampant plague made both countries temporarily unable to fight again.
campaign_end_desc_14=Although the war was eventually won by France, the century-long war caused great suffering to both the English and French peoples, and England lost most of its territories on the European continent after the war.
campaign_end_desc_15=The fall of Constantinople marked the demise of the Byzantine Empire. The Empire's past glory inevitably became history. The fall of the Byzantine Empire marked the end of the Middle Ages and the birth of a new European hegemon.
campaign_end_desc_51=The Western Roman Empire fell as a result of constant foreign invasions. The destruction of this ancient empire may have seemed inevitable, but it happened very suddenly, greatly reducing the size of the Empire. At this time, Constantinople, as the capital of the Byzantine Empire, was a different story.
