general_desc_WuTianXinXuan=He was one of the most brilliant military generals during the Sengoku period in Japan and was regarded as one of the most talented military commanders during the Sengoku period. The "Furinkazan" banner, although taken from Sun Tzu's "The Art of War", had become a symbol of the Takeda army.
general_desc_WuTianXinXuan1=Originally named Takeda Harunobu, he was renowned as "the greatest general of the Sengoku period" and "the greatest tactician of the Sengoku period." As the governor of Kai Province, he was also known as the "Tiger of Kai." His army, inspired by The Art of War's "Fūrinkazan", became unstoppable in every endeavor and gained considerable fame.
general_desc_ShangShanQianXin=Daimyo of Japan during the Sengoku period, later known asthe Dragon of Echigo, and the God of the Sengoku Army. He frequently fought against Takeda Shingen, Hojo Ujiyasu, and Oda Nobunaga, and later went to Kyoto at the invitation of Ashikaga Shogun's clan, but eventually died before his ambition was fulfilled.
general_desc_ShangShanQianXin1=The youngest son of Nagao Tamekage of Echigo Province, he was later known as Nagao Kagetora. After inheriting the surname "Uesugi" from the Governor of Kanto, Uesugi Norimasa, and being bestowed names from Shogun Ashikaga Yoshiteru, he was also known as Uesugi Masatora and Uesugi Terutora. He was an outstanding figure of the Sengoku period, known alongside Takeda Shingen as the "Dragon and Tiger."
general_desc_Scanderbeg=Albanian national hero, who fought against the powerful Ottoman Empire in the form of guerrilla warfare to safeguard Albania's independence, repelling Ottoman attacks multiple times.
general_desc_Matthias Corvinus=Son of János Hunyadi, he officially ascended the throne as King of Hungary at the age of 15. During his reign, he suppressed the rebellion of nobles, established the Black Army of Hungary, and repeatedly defeated the Ottoman Empire, leading Hungary to its peak.
general_desc_Ivan the Terrible=Grand Duke of Moscow, the first Tsar of Russia. During his reign, he carried out many reforms and greatly developed Russia's military power. In his later years, he accidentally killed his own son, which eventually led to the decline of the Rurik dynasty.
general_desc_Gonzalo de Cordoba=Famous general of the Spanish Empire, creator of the Tercio. In 1503, at the Battle of Cerignola, he defeated the French army with inferior forces. After this battle, the Spanish army became the strongest land force on the European continent.
general_desc_Stefan Dusan=King of Serbia, who during his reign took advantage of the Byzantine infighting to conquer most of Albania and Macedonia, and compiled the 'Dušan's Code'
general_desc_Bertrand du Guesclin=French national hero, known as the 'Eagle of Brittany', plain in appearance. Fought bravely in the early stages of the Hundred Years' War, quickly gained recognition and important roles, serving the French king throughout his life.
general_desc_Clovis I=The founder of the Frankish Kingdom, who successfully unified the Frankish tribes after his accession, conquered the Gaul region, and led the Franks into the monarchical era.
general_desc_Casimir III the Great=King of Poland who sought to achieve his goals through diplomacy rather than war, greatly strengthened Polish national unity, and made Poland a powerful state in Central Europe in the 14th century.
general_desc_Vytautas=Grand Duke of Lithuania, member of the Order of the Dragon, continuously expanded during his reign, and eventually gained the title of King of Lithuania, but could not complete his coronation because the Poles intercepted his crown.
general_desc_Afonso Henriques=The first king after Portugal's independence, he made Portugal an independent kingdom in 1139, after which he continually fought against the Moors to expand the territory of the Kingdom of Portugal.
general_desc_John II of Byzantium=The second emperor of the Byzantine Komnenos dynasty, known as 'John the Good', famous for his piety and kindness during his reign.
general_desc_Barbarossa Hayreddin=15th century Turkish pirate who consolidated Mediterranean pirates with the support of the Ottoman Sultan, continuously raided cities along the Mediterranean coast, and never suffered a defeat at sea throughout his life.
general_desc_YueFei=Famous general who fought against the Jin Dynasty, devoted his life to recovering lost territory, and led troops to victory against superior numbers many times. His 'Yue Family Army' was renowned for its strict discipline, known for the motto 'Rather freeze to death than demolish houses, rather starve to death than plunder'.
general_desc_JinWuZhu=A famous general of the Jin Dynasty, whose original name was Wanyan Zongbi, the fourth son of Jin Taizu Wanyan Aguda. He successively defeated the armies of the Liao and Song Dynasties, marched south with overwhelming force, until he met his destined opponent, Yue Fei...

