stage_intro_30001=The Normans of the Hauteville family in northern France were on the verge of bankruptcy. Tancred had twelve sons and two daughters and was unable to distribute more of his property. His eldest son, William, followed other Normans on a pilgrimage to Jerusalem before trying his luck on the Italian Peninsula.
stage_intro_30002=In 1025, the "Bulgarian Slayer" Basil II died. Although his successors were weak and incompetent, the army created by Basil II remained strong. To acquire more food, cotton, and sugar, the Emperor appointed Georgios Maniaces as the general to conquer the wealthy island of Sicily. William of Hauteville joined this force with 300 knights as mercenaries.
stage_intro_30003=Despite the fact that the Saracens of Messina were virtually powerless against the strong Greek and Norman mercenaries, the morale of the allied forces was not high. Georgios Maniaces, the Byzantine general, was ten feet tall with an extremely violent temper, often physically punishing his soldiers.
stage_intro_30004=One by one, the cities of Sicily fell like dominoes to the Greeks, and the air of death pervaded the entire island.
stage_intro_30005=Over two years, 12 cities and fortresses fell to the Greeks, but they were not so lucky in Syracuse. The Emir stationed there launched a fierce resistance, withstanding round after round of Greek assaults.
stage_intro_30006=The Byzantine royal family grew anxious about the victories of Maniaces, fearing he might become too powerful and threaten Constantinople. Consequently, they started reducing supplies and suspended payments to the mercenaries. After another public humiliation by Maniaces, William and the Norman mercenaries decided to leave the expedition.
stage_intro_30007=Caught between the Holy Roman Empire and the Byzantine Empire, the Lombards, unable to bear the exploitation, started a rebellion. After the assassination of a previous Lombard leader, the Normans and Lombards elected Arduin of Benevento as their leader.
stage_intro_30008=The Byzantines were furious about the alliance between the Normans and Lombards. After failed negotiations between the Normans and the Byzantine general Michael Dokeianos in Italy, war became inevitable.
stage_intro_30009=The Normans' prowess in the Italian region gradually gained recognition from the Lombards, attracting more and more Norman knights to the land seeking fame. This only strengthened William's power.
stage_intro_30010=The Byzantine army are increasingly unable to defeat the Normans on the battlefield, resorting to bribing many, including the Lombard leader Arduin. The Normans felt victory becoming ever more elusive.
stage_intro_30011=The Lombard noble, Guaimar IV of Salerno, promised land to the Normans and married his niece to William. The duke formally titled William as the "Duke of Apulia" and granted the region to the twelve most powerful Norman leaders.
stage_intro_30012=In 1044, Guaimar invited William to conquer the southern Italian region of Calabria, promising that the conquered land would belong to the Normans. The Normans set off on their campaign once again.
stage_intro_30013=In 1045, on the eve of launching another expedition with Guaimar, William suddenly fell ill with a high fever and died at the age of 36.

family_letter=Record
family_letter_desc_101=Dear Father, I have departed from Jerusalem, and have gone with my uncle to Italy, and by your blessing, we have had a very smooth journey; the climate of the Mediterranean is much better than that of Normandy, and I shall be able to make my way here, glory over life! ...... Lastly, I ask my mother and my brothers and sisters to be at peace. ......
family_letter_desc_102=...... Dear Father, we are caught in a tough battle in Sicily. Compared to the Saracens, the damned Greek Maniakos is our greatest enemy, he does not care the slightest about human life, if it were not for the blessing of God, if it were not for the bravery of my brothers and I, even losing ten lives would not be enough to leave Sicily ......
family_letter_desc_103=...... Dear Father, we have been working for the Greeks for 2 years straight, we have been through hundreds of battles, and we have added scar after scar to our bodies, but our commissions are getting smaller and smaller, I really don't know if we have the life to go back? God bless you well. ......
family_letter_desc_104=Dear Father, we have not been paid anything for 3 months now. We have gained nothing but scars and wounds here either no wealth and no honor, it's time to leave ......
family_letter_desc_105=Dear Father ...... After Maniakos was recalled by the Greek Emperor, the Greeks in Italy were no longer to be feared, and I would like to be like Charles the Fearless, as a new pioneer! But the Normans were still fighting over petty gains, and glory and honor meant nothing to them. ......
family_letter_desc_106=Dear Father ...... I am on my way to Cannae, that accursed place where our countrymen were defeated by the Greeks twenty years ago, but which was equally accursed by the Greeks, and where Hannibal inflicted a most humiliating defeat on the Romans. May God bless me, ......
family_letter_desc_107=Dear Father ...... Although you are already in heaven, I want you to know that I have finally done it, I have been granted a title and a fiefdom, and I will the Normans to be the new masters of Italy. ......

