stage_intro_1501=Ugljesa got the news that the majority of the Ottoman army was leaving Europe and marching toward Anatolia. It was the perfect time to eliminate the Ottoman power in the Balkans, so they launched a sudden raid.
stage_intro_1502=Dissatisfied with Balsa II's expansion of his territory through marriage, Carlotopia of the House of Thopia invited the Ottoman Empire to launch an attack on the Principality of Zeta, to which Murad I readily agreed.
stage_intro_1503=Murad I left the Balkans in 1387 to deal with Anatolian affairs, while the vassal forces of the Balkans tried to break away from Ottoman dominance and form alliances to challenge their authority.
stage_intro_1504=Murad I returned from Anatolia in 1388 and immediately launched a blitzkrieg against Bulgaria. The Bosnian ruler also immediately provided aid to Bulgaria.
stage_intro_1505=Kosovo connected two regions, Macedonia and Serbia. If the Ottomans captured it, they would further encroach on the large territory of Serbia. And the allied forces organized by Prince Lazar fought a fierce battle against the Ottomans in the Kosovo region.
stage_intro_1506=After Murad I was accidentally assassinated, his son Bayezid I succeeded to the throne. Simultaneously, the Hundred Years' War between England and France entered a period of truce. In order to save the dying Eastern Rome, the knights of the West united to launch the Crusades.
stage_intro_1507=When Bayezid I was ready to deliver the final strike to Byzantium, Timur from the East led 150,000 troops to the city. The survival of the Ottoman Empire had become only a matter of second, which allowed Byzantium to breathe.
stage_intro_1508=The Battle of Ankara, where Bayezid I was captured and died of depression, was followed by a struggle within the Ottoman Empire that eventually ushered in a new Sultan, Murad II. However, the temporary weakness of the Empire still provoked rebellions from the subordinate states!
stage_intro_1509=The Venetians went beyond declaring war on the Ottoman Empire in order to gain full autonomy over the Thessaloniki region, which the sultan could not tolerate, and therefore sent a large army to besiege!
stage_intro_1510=Pope Eugene IV summoned the armies of several countries, including Poland and Hungary, to launch a new round of crusades. Murad II, who had already abdicated at that time, had to reorganize his army to fight the onslaught of Crusaders.
stage_intro_1511=The Regent John Hunyadi had prepared for four years to avenge the battle-dead king. He led the allied Hungarian and Wallachian armies in 1448 and launched an assault on the Ottoman Empire.
stage_intro_1512=In 1451, Mehmed II succeeded to the throne, and he spent two years in preparation, customizing giant cannons and muskets, building coastal fortresses, and blocking the straits. Constantinople, a city that had stood for a thousand years, has welcomed its most mighty enemy.

