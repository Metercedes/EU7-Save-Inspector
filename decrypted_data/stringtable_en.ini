troop_desc_107=Armed with two handed swords and good at short-ranged combat. Unmatched in combats.
troop_desc_108=One of the three Orders of Chivalry. Strong infantry unit.
troop_desc_109=Traditional fighter, born warrior. Outstanding fighters for all troops.
troop_desc_110=Undoubtedly elite soldiers with huge axes as their symbol and excellent equipment.
troop_desc_111=Heavy-armed infantry with strong attack power and high morale.
troop_desc_112=Elite unit with exquisite equipment, standardized weapons, and extremely high military prowess.
troop_desc_113=Byzantine's most prominent regiment, composed of elite soldiers with different origins.
troop_desc_114=The reforged armor looked like gold in the sunlight, heavy equipment that only the most powerful warriors could wear.
troop_desc_115=The elite troops of the Tang Dynasty, they carried Hengdaos with extremely long blades, straight and sharp, which were armor-breaking weapons.
troop_desc_201=Common unit. Militia forces were recruited mainly from local civilians, responsible for urban defense and support.
troop_desc_202=Armed with spears. May cause considerable damage to cavalry.
troop_desc_203=Received standard military training but still incomparable with professional soldiers.
troop_desc_204=A troop armed with pikes and shields. Carrying a strong shield is their greatest symbol.
troop_desc_205=Elite soldiers who can effectively hurt enemy's cavalries. Can also be used as the main force infantry.
troop_desc_206=Unrivaled disciplined Scottish long spearmen
troop_desc_207=With high degree of vigilance. Usually assigned with important tasks.
troop_desc_208=Legions from the Roman Empire, armed with lances. Have no fear for enemy's charge.
troop_desc_209=The dense formation can deal with all kinds of attacks.
troop_desc_210=Show strong defense ability when being attacked and fight skillfully and bravely when attack.
troop_desc_211=Versatile on the battlefield. An important part of the infantry who win many victories.
troop_desc_212=The elite troops of the Tang Dynasty, who carried strangling swords about 3 meters long, were extremely powerful and a nightmare for cavalry troops.
troop_desc_301=Agile and swift cavalry scout. An expert in detecting enemy movements on the battlefield.
troop_desc_302=Cavalry troops with offensive and defensive capabilities, one of the main forces in cavalry combat.
troop_desc_303=Cavalry unit that escorts the nobles. Can cause high damage to enemies when charging.
troop_desc_304=Elite cavalry unit, well-equipped and heavy-armed.
troop_desc_305=Although they've gotten used to fighting on horseback, their habit of fighting on foot is still evident.
troop_desc_306=Good at speedy assault at enemy's frontline and charge attack.
troop_desc_307=Elite desert cavalry unit with great advantages in fighting in the desert.
troop_desc_308=Huge animal that brings devastating damage to the enemy on the battlefield.
troop_desc_309=One of the three Orders of Chivalry, with good tactics and great strength.
troop_desc_310=One of the three Orders of Chivalry, with powerful fighting strength.
troop_desc_311=Guardians of the Holy Sepulchre, an organization of knights with strong faith.
troop_desc_312=The Mongolian cavalry is a well-trained, disciplined and intimidating force that built a magnificent empire of unprecedented size in the world.
troop_desc_313=As a personal guard unit of Emperor Li Shimin of the Tang Dynasty, the fighting force was superb, and they wore black armor with strict discipline and never feared death.
troop_desc_401=Cavalry equipped with lance. Can cause great damage to the enemies when charging.
troop_desc_402=In medieval feudal Europe, fearsome knights received military training since childhood.
troop_desc_403=Heavy-Armored cavalry unit. They can bear the weight of the armor only through strict training.
troop_desc_404=Elite noble cavalry unit. Both man and horse are equipped with the most exquisite gears.
troop_desc_405=Heavily armored unit that manages to remain agile in combat, almost invincible.
troop_desc_406=Elite noble cavalry unit. Both man and horse are equipped with the most exquisite gears.
troop_desc_407=Skilled cavalry unit for all battles. Good at charging. King of the battlefield.
troop_desc_408=Brave and powerful cavalry unit. The huge wings behind them are the greatest symbol.
troop_desc_409=Heavy-armored knight. Launch devastating charge attack that destroys the enemies.
troop_desc_410=One of the three Orders of Chivalry with an extremely fierce fighting style.
troop_desc_411=They were trained and equipped by the noble class and were usually active in the field as the personal guard of the Archduke.
troop_desc_412=The sergeant, as the main force of the Order, is lower than the knight in rank, but their importance on the battlefield is unquestionable.
troop_desc_413=The royal troops of the Tang Dynasty, together with their horses clad in black armor and masks on their faces, pressed against the enemy as if they were dark clouds.
troop_desc_414=The aces of the Eastern Roman Empire, they represented the glory of the empire, wearing heavy armor, invulnerable to swords and spears, and possessing great destructive and impact power.
troop_desc_501=Skilled sling unit with poor equipment but considerable fighting effectiveness.
troop_desc_502=Javelin unit with limited fighting strength but very effective in disturbing enemy array.
troop_desc_503=Ordinary light-armored unit. Can only launch ranged attacks but cannot fight close combat.
troop_desc_504=Ranged weapon, easy to use, can quickly form fighting strength and provide dense firepower.
troop_desc_505=Armored unit with strong composite bows.
troop_desc_506=Armed with muskets. Can cause great damage to the enemy.
troop_desc_507=A weapon extremely difficult to master. Only people who receive special training since childhood can shoot.
troop_desc_508=Unit usually composed of mercenaries. Poorly equipped.
troop_desc_509=King of Spain's unit who conquered the American continent. Extremely greedy but with amazing fighting strength.
troop_desc_510=Fearsome well-equipped musketeer. Massive gunpowder smoke and noise when he shoots.
troop_desc_511=A skilled crossbowman who takes enemy's life mercilessly on the battlefield.
troop_desc_512=Crossbow unit with huge shields. When recharged, they turn their backs to the enemy to form effective protection.
troop_desc_513=Soldier whose body is painted blue. Guerrilla expert with high fighting strength in the woods.
troop_desc_514=Transferred from the longbowmen, the flaming arrows fired in unison can pose a great threat to the enemy.
troop_desc_515=The elite troops of the Tang Dynasty, who carried Zhuge continuous crossbows, shot bows and arrows that covered the sky and made people scared.
troop_desc_601=Skilled cavalry unit with excellent horsemanship. Can shoot javelin precisely from the bumpy horseback.
troop_desc_602=Cavalry unit equipped with strong bows. Good at riding and shooting but bad at close combat.
troop_desc_603=In medieval feudal Europe, fearsome knights received military training since childhood.
troop_desc_604=Starts slow, but the lance projected by the Heavy-Armored cavalry in a charge is very powerful.
troop_desc_605=Cavalry unit that is good at riding and shooting, with great advantages when fighting in the desert.
troop_desc_606=The elephant's huge body can attack enemy and provide good protection for the shooter.
troop_desc_607=Grassland soldier that grew up on horseback. Good at raids.
troop_desc_608=An extremely elite professional cavalry unit who receives strict training since childhood.
troop_desc_609=Extremely battle-ready mobile troops were the guarantee of the Timurid Empire's combat power, and their runs across the steppe could chill the enemy.
troop_desc_314=The Order, formed by Edward III, could only be joined by the most honored members of the royal family, and they were a symbol of loyalty and honor.
troop_desc_315=The strongest warriors and the best grassland horses of Western Liao made up the team. They were brave and experienced in the battlefield, and were invincible wherever they went.
troop_desc_415=The Gendarme Knights were the standing cavalry of France, a well-equipped force that was more organized and disciplined than the feudal knights of the nobility.

