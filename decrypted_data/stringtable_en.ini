troop_prop_desc_4=Defense: Reduce DMG received.
troop_prop_desc_5=Charge: When attacking, the chance of dealing DMG to back-row enemies.
troop_prop_desc_6=Counter: When counterattacking, the chance of dealing DMG to back-row enemies.
troop_prop_desc_7=Dodge: The chance of dodge ranged attacks.
troop_prop_desc_8=Mobility: Can affect the unit ATK and movement.
troop_prop_desc_9=Detour: Probability of assault from behind the target when launching an attack.

