stage_intro_4821=In 1249 King Louis IX of France launched the Crusade and invaded Egypt. Sultan Salih of the Ayyubid Dynasty led his troops to Mansoura to meet the Crusaders, but died of acute illness. Baybars I was ordered to defeat the Crusaders and completely defeated them at Mansoura.
stage_intro_4823=The Crusaders were defeated at Mansoura city and were about to run out of supplies. Seizing the opportunity keenly, Baybars I caught up with the retreating Crusaders at Fariskur and captured Louis IX.
stage_intro_4825=In 1260, the Mongol army under the leadership of the great general Kitbuqa captured Syria and continued its march to the west. Baybars I led the Egyptian army to fight the Mongols at Ain Jalut.
stage_intro_4827=In 1266, Baybars I defeated the Armenian Kingdom of Cilicia, greatly weakening Mongol power in the Middle East.
stage_intro_4829=In 1268, Baybars I destroyed the Principality of Antioch, the most powerful regime established by the Crusaders in the Middle East. Since then, the destruction of Crusader power in the Middle East has been finalized.
stage_intro_4831=In 1271, Edward Longshanks (later Edward I), Prince of England, organized the Ninth Crusade, which Baybars I succeeded in repelling.

