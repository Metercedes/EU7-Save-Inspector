general_desc_Charles VII=The appointment of Joan of Arc in the most critical moment of France led them to victory. During his reign, Charles the victorious carried out a series of reforms, established a standing army, and finally put an end to the Hundred Years' War.
general_desc_Jan Zizka=After the outbreak of the Hussite War, he joined the insurgent army and became its leader. His "chariot fortress" tactics frightened the enemy and he was described as "always the victor on the battlefield".




