battle_talk_100801=The Franks have reached an agreement with me. Now we can keep our mind on dealing with Scotland and put down this riot as soon as possible.
battle_talk_100802=The defeat at Stirling Bridge still appears vividly before us. We have to wash away this shame with a victory!
battle_talk_100803=Beware of the Scottish spear. Our cavalry is not good at dealing with such weapons.
battle_talk_100804=In earlier battles, I have proven that the English cannot shake our free will!
battle_talk_100805=Warriors, don't let fear take over your hearts!
battle_talk_100806=Our flanks are under attack. Help them. We can't let them be routed.
battle_talk_100807=Charge! The enemy has begun to retreat!
battle_talk_100808=My troops have been hit hard and I need to retreat for now.
battle_talk_100809=The enemy leader has been repulsed by us, and now it's time to strike back!
battle_talk_100901=For a long time, the Scottish have encroached on a great deal of land belonging to us. Now they intend to take Stirling Castle for themselves, which is something we cannot tolerate.
battle_talk_100902=Bring on the troops! Let Robert Bruce see what the English army can do.
battle_talk_100903=The English have assembled a large army, which is a serious threat to us.
battle_talk_100904=Despite a large number of the enemy, we still cannot relax the siege of Stirling Castle.  
battle_talk_100905=Once these enemies are destroyed, the castle will lose hope of rescue and will naturally surrender to us.
battle_talk_100906=My battleaxe is stained with the blood of the enemy. Soldiers, fight bravely!
battle_talk_100907=Our positions are under attack and the enemy attack must be stopped!
battle_talk_101001=What Isabella has done is undoubtedly a betrayal. She has betrayed England and she has betrayed me!
battle_talk_101002=Now she wants to take away my power. She must be crazy!
battle_talk_101003=Edward has been deluded by Despenser and his son. England should not be buried in their hands!
battle_talk_101004=The filthy betrayer has landed in England, and she has gained help from the French!  
battle_talk_101005=The usurper has already captured many cities. The fate of England is in limbo.
battle_talk_101006=The She-Wolf of France has got more military support.
battle_talk_101007=The shining pearl of the kingdom, her Majesty, the Queen is about to rule over England loyal to her!
battle_talk_101008=Retreat for now. We are not strong enough to fight her.
battle_talk_101009=The throne of England will not be taken away just like that.
battle_talk_101010=We still have hope for a counterattack.
battle_talk_101011=Launch the final assault on the betrayer.
battle_talk_101012=Your Majesty, I hope my arrival will pave the way for you to move forward.
battle_talk_101013=Glad to serve you, Your Majesty.
battle_talk_110101=Naive enemies who think that because they have been given refuge by the Latin Empire they can compete with us.
battle_talk_110102=The enemy has fled in disarray, but the pursuit is still not to be taken lightly.
battle_talk_110103=Michael has already met up with his reinforcements and more are believed to be on the way.
battle_talk_110104=Protect me! As long as we can get out of the fight, there is still hope for everything.
battle_talk_110105=The enemy was in hot pursuit of me and I had to continue my retreat, I couldn't stay here any longer.
battle_talk_110106=One step closer to my successful escape from the war zone, where are the reinforcements?
battle_talk_110107=Our allies are hugging their heads in a real mess.
battle_talk_110108=The army was disorganised, rumours were rife, the soldiers were no longer able to fight, and I was.
battle_talk_110109=I have managed to buy enough time for my escape that your victory counts for nothing!
battle_talk_110201=Constantinople was before my eyes, but now the city was now occupied by cunning barbarians.
battle_talk_110202=In order to revive our nation, we must take it back.
battle_talk_110203=The unsuspecting fellow could never be dissuaded from returning to Constantinople.
battle_talk_110204=Stopping all the enemy outside the city, the enemy was not strong enough to cross the walls.
battle_talk_110205=The fortress at Golden Horn is lost! What the hell are the defenders doing!
battle_talk_110206=Our outer defences are about to be breached and the city cannot be taken by the enemy.
battle_talk_110207=It was as if I saw the hope of taking back the city.
battle_talk_110208=Although the opportunity to recapture the city was close at hand, I now had to retreat for repairs.
battle_talk_110209=We are running out of troops, reinforcements need to hurry up and follow the attack!
battle_talk_110301=Once again, we are in front of this majestic city.
battle_talk_110302=To retake the city, it is vital that we first capture the sentry battalions on both sides.
battle_talk_110303=After taking care of the sentry battalion, I hae a way to get into the city.
battle_talk_110304=Gates of the Spring has been opened, and with the capture of this place, half of the city will fall into our hands!
battle_talk_110305=The gates have been breached and we are on the verge of success!
battle_talk_110306=But next we have to keep a careful eye on the Venetians, who are our biggest threat in this campaign.
battle_talk_110307=What's happening outside of the city!
battle_talk_110308=We are under attack and staying here will only cost us our lives, now we have to retreat!
battle_talk_110401=Although the Empire has been restored to its former glory, the Principality of Achaea remains a threat.
battle_talk_110402=To do this, we must re-establish the Empire's control in Greece.
battle_talk_110403=The Byzantine army thought they could win easily and their arrogance had paralysed them; this was our best chance.
battle_talk_110404=Having successfully raided the enemy's rear, the hysterical enemy forces must have increased their frontal attack.
battle_talk_110405=There is no more delay, launch the general attack!
battle_talk_110406=The enemy has attacked from land and sea and our rear is very empty!
battle_talk_110501=As a result of earlier operations, our troops are now scattered all over the place.
battle_talk_110502=William II's forces were ready to launch a siege against us, which was very unfavourable to us.
battle_talk_110503=This is the best time for us to drive the enemy away, isolated as they are, there is no longer any chance of a counterattack.
battle_talk_110504=Our army has defected a large number of mercenaries and the army's morale is now very low and it is no longer able to fight.
battle_talk_110505=Victory will surely be ours. Take all these prisoners of the garrison down.
battle_talk_110506=We were attacked by scattered enemy troops, but paid no attention and focus on the enemy in front of us.
battle_talk_110601=We have received assistance from the Duchy of Athens and the Byzantine army is no longer to be feared.
battle_talk_110602=A large number of enemies were coming toward us and now the only option was to retreat.
battle_talk_110603=By proceeding along the coast, it should be possible to avoid a large number of enemies and then reach the retreat location.
battle_talk_110604=Soldiers, hold your positions and don't let the morale of the defecting troops get in the way!
battle_talk_110605=It didn't occur to me that there was still an enemy presence on the sea and I needed help!
battle_talk_110606=A new enemy is coming up behind us. I've got the retreat point in sight, hang on.
battle_talk_110607=I wonder what the situation is now for the troops left behind.
battle_talk_110608=Attack, this is our best chance to defeat the enemy.
battle_talk_110609=My troops are ready to depart.
battle_talk_110701=The Latin nobility has regained its footing with the help of the Venetians and the situation is now very much against us.
battle_talk_110702=The Venetian navy is so strong that we can only be passive and defensive at the moment and wait for support.
battle_talk_110703=I need to restore my legion as soon as possible, and as long as they are well supplied, I can lead them to defeat any enemy!
battle_talk_110704=Soldiers, charge with me, the chance to restore the Empire to its former glory is at hand!
battle_talk_110705=With a clear hole in the enemy's defence, now is the right time to attack.
battle_talk_110706=A hastily formed navy now wishes to challenge Venice?
battle_talk_110801=Berat was of vital importance to the Empire, and the city now served as a bridgehead for the enemy to attack the Empire.
battle_talk_110802=But the city is easy to defend and difficult to attack, and we must first cut off all supplies to the city.
battle_talk_110803=My fellows, the time to revive the empire is at hand, so join me in this fight!
battle_talk_110804=The enemy wants to launch a siege on the city of Berat, defend it with all your might and make sure you don't lose your supplies!
battle_talk_110805=The troops on the southern front have been badly hit, so go ahead and support them.
battle_talk_110806=The northern front is about to be lost, are our troops so vulnerable?
battle_talk_110807=The supply to the city of Berat has been successfully cut off and now is the right time to attack.
battle_talk_110808=The city's defences have been breached and the attack is in full force.
battle_talk_110809=We are one step away from victory!
battle_talk_120101=Our army has met head-on with the Ottoman army, and the enemy is so large and fast-moving that I fear it will be difficult to defeat them.
battle_talk_120102=The weak Byzantine army cannot pose any threat to us. Soldiers, destroy the enemy in front of you.
battle_talk_120103=The enemy attack was fierce, but we had to fend off the enemy and find a time to retreat.
battle_talk_120104=I cannot sit back and watch the territory of the Empire being invaded by foreign enemies!
battle_talk_120105=We received assistance, but it was not enough to sustain us against the enemy in front of us.
battle_talk_120106=Our troops are under fierce enemy counterattack, send more men and intensify the offensive!
battle_talk_120107=Enemies also appeared on the flank, and why the enemy appeared in front of us in a constant stream.
battle_talk_120108=The time to retreat has come, and now is the perfect opportunity to get out of the fight.
battle_talk_120109=Not expecting the Byzantine army to be capable of such a counterattack, the morale of the army was dealt a heavy blow.
battle_talk_120201=The foolish Byzantines are engaged in a civil war, and this is the best time for us to continue to expand our territory and secure our power.
battle_talk_120202=The city of Prusa is too vital to us to allow the enemy to wreak havoc on our land.
battle_talk_120203=The siege of the city cost us a great deal of time and supplies, and the enemy's defenses must be dismantled as soon as possible.
battle_talk_120204=Capture and hold the castles scattered around the city, which will cut off the enemy's supplies and create the conditions for us to attack.
battle_talk_120205=The outer defenses of Prusa have been breached by the enemy, and the city is about to face the enemy's attack directly.
battle_talk_120206=Good, we are one step closer to contributing to the city, but enemy reinforcements are coming in.
battle_talk_120207=Secure the defensive line, we can't let the enemy advance any further!
battle_talk_120301=Anatolia's empty defensive force finally made the enemy aware of it.
battle_talk_120302=The enemy is gathering a large army for an attack on Nicaea, and we must hold here, the city is an important bulwark of Constantinople.
battle_talk_120303=Attack with all your might, don't worry about supplies and back-up forces, this land will soon be ours.
battle_talk_120304=Nicaea was lost and Constantinople was in jeopardy.
battle_talk_120305=We made contact with a small group of troops, and hopefully that will help.
battle_talk_120306=Under such circumstances, the enemy had the audacity to use decapitation, which had to be said to be very bold, but it still could not stop us from advancing.
battle_talk_120307=We are continuing to be resupplied with supplies and continue to push forward.
battle_talk_120308=The Byzantines' space for survival is getting narrower and narrower, and we will surely achieve the ultimate victory.
battle_talk_120401=Anatolia is gradually slipping out of the Empire's control, and we can no longer afford to let the enemy move forward.
battle_talk_120402=Today we have no room for more losses in our retained war effort, which is vital for us to retake Nicaea.
battle_talk_120403=The Byzantine army is still unable to recognize the reality today, so let us show them by our actions that this land has belonged to the Ottomans.
battle_talk_120404=My troops are gradually advancing, but an enemy counterattack is coming.
battle_talk_120405=Our cities are under attack, send more troops and drive the enemy out of the land.
battle_talk_120406=The enemy had taken our rear and we were completely surrounded.
battle_talk_120407=We have far fewer troops than the enemy, and any loss could lead to our total defeat. Protect my troops!
battle_talk_120501=The strong earthquake destroyed the walls and defensive forces of Gallipoli, and the Ottoman army would never give up this once-in-a-lifetime opportunity.
battle_talk_120502=Now that we have a shortage of troops and food, we must find a way to raise money to redeem the city.
battle_talk_120503=Gallipoli's defenses have been completely destroyed and it is now easy for us to take the city!
battle_talk_120504=Foolish Byzantium, to try to buy back the city with money.
battle_talk_120505=Surprisingly, an unexpected enemy has appeared. Watch out for enemy troops on the sea.
battle_talk_120506=It seems that Byzantium does not have any idea of retaking the city by force, in that case, we should take the initiative.
battle_talk_120507=The Byzantine army is now weak, it's time to expand our territory!
battle_talk_120508=Hmph, a cunning fellow. Using the pretext of raising money to attack our city.
battle_talk_120509=We are under attack and the enemy is aiming at more than just one city, Gallipoli!
battle_talk_120601=Adrianburg, as the third largest city in the Byzantine Empire, to take it would greatly expand our power.
battle_talk_120602=The capture of this city will provide a constant supply for our future attack on Constantinople.
battle_talk_120603=Prepare for the battle. The Ottoman army won't retreat easily, we must hold on to the city!
battle_talk_120604=I will graciously leave you time to consider your surrender and if so, I promise to grant you a stable life!
battle_talk_120605=My patience is limited, soldiers, get ready!
battle_talk_120606=Our reinforcements are flowing in, do you still want to resist?
battle_talk_120607=Are you prepared to fail?
battle_talk_120608=My patience is exhausted. Now, break the city for me.
battle_talk_120609=We can't just sit back and watch Fort Adrian fall into crisis, send troops to their aid.
battle_talk_120610=Our rear was attacked, but why was the enemy there?
battle_talk_120701=The Empire is now unable to maintain the defense of other cities, and leaving Thessalonica in the hands of the Venetians is the best option.
battle_talk_120702=The city should belong to the Ottomans, and now you have a chance to surrender.
battle_talk_120703=Since this city has always belonged to us, there is absolutely no possibility of giving up.
battle_talk_120704=The Ottomans launched an attack on Thessalonica, and although this eased the pressure on Constantinople, the situation remained bleak.
battle_talk_120705=Now the city belongs to the Ottomans, and the Venetian fleet cannot stop us.
battle_talk_120706=Thessalonica is in crisis, but my fleet has been blockaded by the Ottoman fleet and it is now urgent to break the blockade to aid Thessalonica.
battle_talk_120707=The Byzantine's vain attempt to launch an offensive to relieve the Venetians made no sense.
battle_talk_120708=The enemy launched a counterattack, send our reserve forces.
battle_talk_120709=The Ottoman fleet that blocked the sea is routed and the fleet continues to advance!
battle_talk_120801=The city in front of you is claimed to have the strongest and most majestic city walls in the world today.
battle_talk_120802=Now that we have acquired a new siege weapon, the city will surely be overrun and then become part of the Empire's territory!
battle_talk_120803=The enemy is already at the city, we now have no choice but to do our best to fight until the last moment.
battle_talk_120804=The enemy should not yet have time to block the sea, it shouldn't be too late to leave by boat.
battle_talk_120805=The walls have been breached, enter the city and prepare for our victory!
battle_talk_120806=The external defenses have been completely dismantled and we have no way back.
battle_talk_120807=How can we have enemies in our rear, destroy them and not let the siege plan be compromised.
battle_talk_120808=Successfully broke through the enemy's sea blockade, now evacuate as soon as possible, safety first!
battle_talk_120809=Foolish fellow, your failure affected the Empire's actions, and you have allowed the enemy to escape successfully from the battlefield!
battle_talk_120810=Constantinople is under attack, we can't just sit back and do nothing. Get out to sea as soon as possible, hopefully it won't be too late.
battle_talk_120811=From today, this city will belong to the Ottoman Empire!
battle_talk_120812=Constantinople was taken, and we were utterly defeated.
battle_talk_120901=I had no intention of taking the throne, but I was ordered to marry my daughter to you at the time of Rome's crisis and to rule the world with you, so why do you need to be bitter?
battle_talk_120902=Constantinople was supposed to be mine, your throne was usurped, and Rome was not supposed to have two emperors.
battle_talk_120903=Save my son first, and I will raise money for you!
battle_talk_120904=Since I have received the commission, I will clear the rebellion for you!
battle_talk_120905=You also employ Turkic people, this is undoubtedly to attract wolves into the house! There will be endless problems in the future.
battle_talk_120906=I will not sit idly by and do nothing! Clear the dissidents!
battle_talk_120907=Okay, we'll provide support too!
battle_talk_120908=It seems that the support from Serbia and Bulgaria needs to be cut off and Paleoreg will naturally be defeated!
battle_talk_120909=The Turks are too strong! But we'll be back!
battle_talk_121001=We will continue to consolidate our territory in the Balkans! Continue to plunder the villages ahead!
