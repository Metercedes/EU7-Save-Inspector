general_desc_Warwick the Kingmaker=The 16th Earl of Warwick, formerly Richard Neville, was known as the "Kingmaker" for his instrumentality toward several nobles to the throne during the Wars of the Roses.
general_desc_Edmund Beaufort=The 2nd Duke of Somerset, the political rival of Richard, Duke of York.
general_desc_Richard of York=The 3rd Duke of York, formerly known as Richard Plantagenet. As a descendant of the Plantagenet family, he had the right of succession to the throne.
general_desc_Margaret of Anjou=Wife of Henry VI and the core of the Lancaster family. During the reign of the feeble Henry VI, the Duke of Somerset was drawn in as a political ally by her and later became the de facto governor of the country.
general_desc_Henry VI=King of England, weak in character. He lacked the ability to administer his country and failed to rule his subjects. During his reign, his ministers competed with each other for power, eventually leading to the Wars of the Roses outbreak.
general_desc_Richard Neville=5th Earl of Salisbury,the father of Warwick the Kingmaker
general_desc_Henry Percy2=2nd Earl of Northumberland
general_desc_Henry Percy3=3rd Earl of Northumberland
general_desc_Henry Percy4=4th Earl of Northumberland
general_desc_Henry Beaufort1=The son of Edmund Beaufort, 2nd Duke of Somerset
general_desc_Henry Beaufort2=3rd Duke of Somerset，the son of Edmund Beaufort, 2nd Duke of Somerset
general_desc_John Neville1=Baron Neville
general_desc_Edward IV=The son of Richard of York
general_desc_John Neville2=1st Marquess of Montagu
general_desc_John Grey of Groby=The husband of Elizabeth Woodville
general_desc_Elizabeth Woodville=Edward IV's wife, known as the 'White Queen'. Her daughter married the later Henry VII and became one of the founding figures of the House of Tudor.
general_desc_Li Shimin=The second emperor of the Tang dynasty. During his reign, he reformed the internal affairs of the country with great effort and laid a solid foundation for the prosperity of the Tang dynasty for hundreds of years; while at the same time opening up borders and expanding external territories, and pacifying the neighboring powers. He was respected as "Tian Kehan".
general_desc_Michael VIII=The founder of the Byzantine The House of Palaiologos, his reign was marked by active diplomacy in addressing external threats toward the Byzantine Empire, enabling the country which would have been in danger but lasted for another two centuries.

