;战役介绍
stage_intro_1=Beginner's tutorial, learn simple controls such as how to move and attack.
stage_intro_2=Basic tutorial, learn basic controls such as recruitment, disbandment, replenishment, and mixed units operation.
stage_intro_3=Intermediate tutorial, learn about city and castle construction and functions, and mercenary recruitment.
stage_intro_4=Advanced tutorial, learn about war gear assembly and use, and supportive buildings.
stage_intro_101=In 376 AD, the Visigoths sought refuge from the Roman Empire against the invading Huns. However, after crossing the Danube, many conflicts broke out with the Romans. Finally, the two sides battled in Marcianopolis.
stage_intro_102=In 378 AD, after looting the Danube provinces, the rebellious Goths prepared to join other barbarians in invading the Balkans. The Roman Emperor Valens led the troops into battle, but a lack of cohesion among his soldiers greatly endangered the suppression of the rebellion.
stage_intro_103=In 402 AD, under the leadership of King Alaric, the Visigoths continued to invade the hinterland of the Western Roman Empire. Soon after, they surrounded the important city of Milan, where Emperor Honorius resided. Under great distress, Honorius urgently ordered Stilicho, his military commander who was absent in the north at the time, to lead his troops south and defend the empire.
stage_intro_104=In 410 AD, Alaric was attacked by Roman troops at the meeting place agreed with Honorius. In response, Alaric decided to abandon negotiations with the Western Roman Empire and once again besieged Rome. The "eternal city" looked shaky after being besieged repeatedly. 
stage_intro_105=In 419 AD, the Kingdom of the Suebi, recently allied with the West Roman Empire, frequently clashed with the neighboring Vandal Kingdom over territorial claims at the border. With a strong desire to conquer, King Hermeric of Suebi decided to take the initiative and invade the territory of the Vandals. 
stage_intro_106=In 439 AD, Gaiseric led his army across the Strait of Gibraltar, occupying most of the Western Roman Empire's territory in North Africa for 8 years. After nearly five years of peace with the Western Roman Empire, Gaiseric set his sight on Carthage again, the third-largest city of the Roman Empire.
stage_intro_107=In 451 AD, the ambitious King Attila, ruler of the Huns, took advantage of a scandal involving the Western Roman court to send troops to invade Gaul. The Roman general Aetius, who was in Gaul, decided to form a coalition force with the barbarian kingdoms of Gaul in resistance of the Huns' invasion.
stage_intro_108=In 455 AD, Maximus usurped the throne by murdering emperor Valentinian III, which destroyed Western Rome's alliance with King Geiseric of the Vandals. After receiving assistance from Eudoxia, widow of Valentinian III, Geiseric decided to send troops to attack Italy.
stage_intro_201=During the 6th century, European countries came to realize the importance of cavalry. In 530, the Persians launched an attack on the Byzantine Empire. Outside the city of Dara, the heavily armored cavalry of the Sassanian Army drew up their battle lines.
stage_intro_202=Justinian I sought to recreate Rome's former glory. After Gelimer seized the throne to become the ruler of the Vandal Kingdom, Justinian I responded by declaring war on the Vandals. In 533 AD, Belisarius led troops to land in North Africa and marched towards Carthage.
stage_intro_203=After Byzantium's great victory in the Battle of Ad Decimum, Belisarius and his army occupied Carthage. King Gelimer, who was in the west of Carthage, sought assistance from his brother and regrouped his army to retake Carthage.
stage_intro_204=After re-conquering North Africa, Justinian I set his sights on the Italian region. In 535 AD, Belisarius led his army on another expedition to occupy Rome for his emperor and retake the Italian region.
stage_intro_205=After the occupation of Rome, the road to Ravenna was almost unimpeded for Byzantium. Belisarius marched his troops towards the capital of the Ostrogothic Kingdom, which would soon face a massive attack by the Byzantine army.
stage_intro_206=Due to the conquests of Totila, King of the Ostrogoths, Justinian I sent Belisarius back to Italy. In 546 AD, Totila's troops came to Rome and surrounded the city.
stage_intro_207=Totila's continued aggression in Italy caused heavy losses to the Empire. He also planned to use the fleet to block seas to prevent the Imperial army from easily entering the Italian region. These actions deeply displeased Justinian I.
stage_intro_208=In order to regain control of Italy, Justinian I decided to send Narses to Italy. Despite being at a disadvantage, Totila, as a traditional Goth, chose to take the initiative to attack Narses' forces.
stage_intro_209=It proved difficult for the Goths to resist the forces commanded by Narses. The Ostrogoth king decided to ask for help from the Franks and Alemanni, hoping that they could enter the Italian region and prevent the Byzantine army from attacking.
stage_intro_210=In 559 AD, a group of Huns crossed the border and wantonly committed evil on the outskirts of Constantinople, which was a great humiliation to King Justinian I. He once again summoned Belisarius to him and gave him one last mission.
stage_intro_301=The arrival of the Anglo-Saxons caused panic among the natives of Britain. In the face of well-equipped and well-trained enemies, the British had to take up arms to resist the Anglo-Saxon invasion.
stage_intro_302=El, the leader of the South Saxon tribe, successfully led his people to land on the south coast of the British Isles, but their march inland did not go smoothly. They encountered stubborn resistance from the locals, making El aware of his lack of troops, who asked for reinforcements from the tribes back home.
stage_intro_303=Influenced by years of conflict, Britain's scattered tribes began to unite and establish their own kingdoms, but this did not bring about peace and stability. The battle between tribes gradually evolved into a larger and more brutal war between kingdoms, initiated by the kingdom of Northumbria.
stage_intro_304=In 633 AD, the kingdom of Northumbria, reigned by Edwin, was the strongest kingdom of England. This aroused the fear of its neighboring kingdoms. Cadwallon, King of Gwynedd, decided to form a coalition with the kingdom of Mercia to invade Northumbria.
stage_intro_305=Although it successfully withstood the invasion of the allied forces of Gwynedd and Mercia, Northumbria suffered grave damage, and the kingdom was divided for a time. In 634 AD, Cadwallon of Gwynedd sent troops to invade the kingdom of Northumbria again.
stage_intro_306=Oswald's return and succession enabled the Northumbrian army to defeat the kingdom of Gwynedd, restoring peace and stability to Northumbria. In 644 AD, after a decade of recovery to his armed forces, Oswald took the initiative to attack the kingdom of Mercia.
stage_intro_307=Oswald's invasion of Mercia ended in a disastrous defeat. Penda decided to take this opportunity to unite the kingdoms of East Anglia and Gwynedd to lead the war against Northumbria. In 655 AD, only Bernicia remained in the kingdom of Northumbria, with the remaining territory captured by the coalition forces.
stage_intro_308=For a long time, the kingdom of Mercia maintained its hegemony by forcibly controlling many kingdoms in southern England. In 825 AD, in order to consolidate his authority, Beornwulf of Mercia personally led an army to invade the kingdom of Wessex, causing King Egbert of Wessex to retaliate.
stage_intro_401=The Arabs plotted to exact revenge for the killing of their emissary at the hands of the Ghassanids. However, their plan of action was learned by Byzantium, who immediately assembled their military fortress. In the face of the powerful Byzantine army, the Arab plan seemed doomed to fail.
stage_intro_402=When Khalid led his troops to Marj Rahit, the Ghassanids did not see the Arabs as a threat. However, the Arabs soon proved that their combat prowess was unparalleled.
stage_intro_403=After Abu became the first Arab caliph, he sought to expand his power beyond the Arabian Peninsula. The Arab army pushed all the way north and launched an attack on Damascus.
stage_intro_404=In order to prevent the Arabs from advancing and to recapture the lost territory, Heraclius decided to send a large-scale army to the Levant. As the enemy approached, the Arabs withdrew from Damascus and regrouped their forces in Yarmouk.
stage_intro_405=After fighting the Byzantine army on the Yarmouk plain, the Arabs decided to continue to advance and occupy more cities. At the end of 636 AD, Arab troops came to Jerusalem and surrounded the city.
stage_intro_406=The Arab conquest continued, and their troops were invincible on the Anatolian peninsula. Successive defeats and the loss of several cities made the Byzantine Empire panic. They urgently needed a way to defeat this powerful enemy.
stage_intro_407=After defeating the Sassanids, Omar decided to lead his Arab soldiers to Africa. The Arabs planned to take Egypt as a starting point and continue capturing more African land as their own territory.
stage_intro_408=After extinguishing the rule of the Sassanids, the Arabs identified the Byzantine Empire as their main hostile target. For this reason, they established a powerful navy to support their actions against the Byzantine Empire in the Mediterranean.
stage_intro_501=In 865 AD, an army of Vikings crossed the sea, landed on British soil, and carried out raids on coastal monasteries and other wealthy areas.
stage_intro_502=After initiating their invasion, the Vikings occupied the two kingdoms of East Anglia and Northumbria in quick succession. Next, the Vikings turned their attention to capturing the kingdom of Wessex.
stage_intro_503=The Vikings, who gained the upper hand in the battle of Reading, continued to advance and fought with Wessex troops again in Ashdown.
stage_intro_504=After decades of invasion and looting, only a handful of forces, including the Kingdom of Wessex under the leadership of Alfred, were able to continue resisting against the Viking invaders.
stage_intro_505=In 893, the Vikings who landed in Britain clashed with the Anglo-Saxons once again. However, with new tactical changes, the Viking's invasion seemed to have little effect.
stage_intro_506=In 937, the three northern kingdoms formed an alliance in the hope of destroying England's growing power. Facing the enemy's invasion, King Athelstan assembled an army and marched north.
stage_intro_507=In order to compete for the English throne, King Harald Hardrada of Norway and his allies decided to assemble troops and march towards Yorkshire.
stage_intro_508=Due to the death of King Edward the Confessor of England, those who coveted the throne began to make their claims. Harald of Norway led his troops to attack England.
stage_intro_601=The war between the Byzantine Empire and the Bulgarian Empire rages on. In 811, Nikephoros I led his army to attack Bulgaria. After successive victories, he decided to march on Pliska.
stage_intro_602=After the battle of Pliska, both the Byzantine Empire and the Bulgarian Empire suffered great losses, but the Bulgarian Empire still maintained the offensive. Despite heavy losses, the Byzantine Empire refused to sign a peace treaty.
stage_intro_603=After Mikhail II succeeded the throne, an officer named Thomas decided to rebel against his rule, which won a lot of support. He allied with the Arabs to launch an attack on Constantinople.
stage_intro_604=In retaliation for the expulsion of Byzantine priests, Leo VI decided to expel Bulgarian merchants from Constantinople. This gave Simeon I an excuse to wage war when the main forces of the Byzantine army were fighting against the Arabs in the East.
stage_intro_605=As the Queen Regent, Zoe Zaoutzaina decided not to give in to the Bulgarian Empire anymore, which once again led Simeon I to attack the Byzantine Empire. Due to a series of measures by Simeon I, the Byzantines were forced to fight alone.
stage_intro_606=In 922, the Bulgarians had controlled more than half of the Balkans, but due to their insufficient Naval power, they could not pose a threat to Constantinople. The Bulgarians decided to join forces with the Arabs, but their plan was prevented by the timely dispatchment of Byzantine troops.
stage_intro_607=After ending the battle with the Arabs, the Byzantine Empire soon recovered its strength and quickly defeated the Bulgarian Empire. However, the Kievan Rus took advantage of this vacuum, and a new powerful enemy appeared in the Balkans once again.
stage_intro_608=In 971, the defeat of the Bulgarians enabled the Byzantines to occupy a large area of Bulgarian territory. In order to regain their land, the Bulgarians continued the war for many years.
stage_intro_609=After the battle of Trajan's gate, the Byzantine Empire broke out in civil war. Samuel decided to seize this opportunity to attack the Byzantine Empire. In 996, Samuel defeated Thessaloniki's Byzantine army and began to March south.
stage_intro_610=From 1,000 CE, Byzantine emperor Basil II began to send troops to Bulgaria. Although there were victories and defeats on both sides, the Byzantine's advance threatens Bulgaria's very existence. A fierce battle between the resurgent Byzantine Empire and the declining Bulgaria seemed inevitable.
stage_intro_701=In 1066, the Duke of Normandy led his troops across the channel and landed in England in order to claim the English throne. When Harold II heard the news, he immediately called his army south to intercept the invaders near Hastings.
stage_intro_702=After the battle with Harold II at Hastings, William led his troops to London. In order to secure the occupation of London, he sent a team to Southwark, hoping to eliminate the resistance there.
stage_intro_703=After the successful conquest of England, the people of Exeter revolted against William. In order to make them obey his rule, William led his troops to besiege the city, but he encountered strong resistance.
stage_intro_704=Despite gaining most people's support, there are still forces rebelling against William's rule. Most of them are in the north. Thinking it impossible to obtain their loyalty through peaceful means, William decided to march his army north. 
stage_intro_705=In 1075, William, who had returned to Normandy, refused to recognize the marriage between Emma de Breteuil and Ralph de Gael. This led to the uprising of three earls. They decided to revolt and overthrow William's rule while he was still in Normandy.
stage_intro_706=In 1105, Henry I led his troops to invade the territory of Robert, Duke of Normandy, and occupied Bayeux and Caen. The following year, Henry I returned to Normandy. Count Morten, as one of the nobles loyal to Robert, became his chief rival.
stage_intro_707=In 1119, King Louis VI of France led his troops to attack Normandy. In order to defend his property and territory there, Henry I was forced to fight against France.
stage_intro_708=In 1135, the sudden death of Henry I plunged England into anarchy. Stephen and Matilda, the daughter of Henry I, led their respective forces to fight for the English throne.
stage_intro_801=In 1048, an army led by Prince Seljuk entered Armenia, which was under Byzantine rule. Due to their lack of troops, the Byzantines decided to adopt a conservative strategy and wait for the arrival of reinforcements.
stage_intro_802=In 1071, seizing the opportunity of the Seljuk's conflict with the Egyptian Fatimid forces, the weakened Byzantine Empire decided to attack Armenia to regain previously lost areas.
stage_intro_803=The activities of the Seljuk empire in the Aegean Sea continued to threaten the Byzantine Empire. Alexios decided to form a fleet against the Seljuk Navy and regain control of the Aegean Sea.
stage_intro_804=Unable to resist the powerful Seljuk, and the emperor Alexios decided to seek help from the west. Assisted by the Byzantine empire, the Crusaders sailed across the sea with Nicaea as their first target.
stage_intro_805=With additional reinforcements from the Byzantines, the Crusaders became a powerful force. The Crusader's army marched towards Antioch, a city halfway between Constantinople and Jerusalem.
stage_intro_806=Alexios, having recovered from his illness, went to the battlefield in person to bolster the front line defenses in Anatolia. His army defeated the Seljuk many times. Then after receiving, he once again moved onto the offensive.
stage_intro_807=In 1176, after dealing with the threats of Hungary and Serbia to the west, the Byzantine emperor Manuel I decided to focus on the Rum Sultanate and recover the Anatolian steppe.
stage_intro_808=Manuel I lost a large amount of siege weapons and a great opportunity to recover Anatolia. Then, an encounter with a brigade of Seljuk troops returning from loot presented him with a hope of victory.
stage_intro_901=After conquering the Seljuk capital of Nicaea, the Crusaders were violently counterattacked. Arslan I led a large number of troops to surround Bohemond I's troops.
stage_intro_902=After the successful capture of Antioch, the Crusaders advanced all the way and continued to move towards Jerusalem. At the same time, the Arab general al-Dawla, stationed in Jerusalem, has long been ready to defend the city.
stage_intro_903=The success of the first Crusade gave the European lords a taste of victory and the desire to launch another expedition. This time, their primary objective was Damascus.
stage_intro_904=Acre is a very important city under Saladin's rule. When Saladin learned that Guy de Lusignan had assembled troops again outside Acre, he immediately sent troops to intercept it.
stage_intro_905=In order to recapture Jerusalem from Saladin, the Western European lords once again launched a Crusade. When the army entered Anatolia, it was fiercely attacked by the Seljuk.
stage_intro_906=When Richard the Lionheart withdrew from Jerusalem, Saladin decided to attack Jaffa out of revenge. Richard, who learned of the news, gathered his army again and launched an attack on Saladin.
stage_intro_907=When the Crusaders prepared to advance on Jerusalem, their leaders agreed to Alexios IV's request and decided to go to Constantinople to help his father regain the throne. In return, the Byzantine Empire would provide them with economic and military assistance.
stage_intro_908=After many years of war, the Crusaders began to realize that Egypt was their biggest obstacle to recapturing Jerusalem. So they decided to organize an expedition to cross the Mediterranean and attack Egypt.
stage_intro_1001=Due to the open revolts in Wales, Henry II had to return to England from Normandy. In order to punish and stop the Welsh, Henry II assembled a large army and launched an attack on the Welsh in 1165.
stage_intro_1002=Arthur and John had long been contesting for the right to the English throne. After John decided to marry Isabella, this balance was gradually broken. However, the involvement of Hugh X and Philip II made the situation very chaotic.
stage_intro_1003=Due to John's refusal to cooperate, Philip II announced that he would take back the land of Normandy for himself, and soon began to take action. In 1203, Philip II sent troops to Château Gaillard, which he believed to be the key to controlling the whole of Normandy.
stage_intro_1004=In 1213, the English fleet led by William Longespée found a French fleet, which had already landed and started to plunder. Facing the unmanned fleet, English victory seemed to be inevitable.
stage_intro_1005=In 1214, a coalition army consisted of the English, the Holy Roman Empire and the Flanders launched an attack on the Kingdom of France. In a hurry, Philip II quickly gathered a large army. Despite the great strength of the coalition forces, the well-trained French cavalry did not seem to be losing ground.
stage_intro_1006=During the reign of Henry III, the famine in England became ever more serious, which made the nobles increasingly dissatisfied with Henry's rule. A war led by Simon de Montfort against the rule of Henry III is about to begin.
stage_intro_1007=Under the supervision of Edward I, Scotland elected a new king. Edward I believed that Scotland should become a marquis under English rule and demand its help in fighting against France. The Scots opposed this demand and allied with France.
stage_intro_1008=Under the leadership of William Wallace, the Scottish army continued to attack England. In 1298, Edward I decided to a truce with the kingdom of France and returned to England to concentrate on fighting against the Scots.
stage_intro_1009=After the battle of Falkirk, Scotland was almost completely conquered by England. In 1306, Robert the Bruce took the Scottish throne, and with Edward II's less than satisfactory leadership, the war was about to be reversed.
stage_intro_1010=Roger Mortimer met Isabella after escaping from the Tower of London in 1323. Both of them were very dissatisfied with Edward II and decided to rebel against his rule. In 1326, Isabella and Mortimer secretly returned to England and began their resistance.
stage_intro_1101=After losing Constantinople to the Crusaders, the Nicaea Empire and the Despotate of Epirus became the two largest regimes in the fragmented Byzantine Empire. They both aimed to be the first to revive the empire, but this common objective became the source of the conflicts between the two.
stage_intro_1102=The Nicaea Empire won the final victory in its competition with Epirus to be the exclusive ruler of the empire. Under the leadership of the ambitious Michael VIII, the Nicaea Empire turned its attention to the Latin Empire which has occupied Constantinople.
stage_intro_1103=In 1261, the Nicaea Empire formed an alliance with the Republic of Genoa and was ready to attack Constantinople again. When they found that the Latin garrison and the Venice fleet had not returned from their expedition, they decided not to waste this unique opportunity.
stage_intro_1104=After reestablishing the Byzantine Empire, Michael VIII tried to eliminate the residual forces in the surrounding Latin Empire territories. In 1263, the Byzantine army launched an attack on the Principality of Achaea, but encountered tenacious resistance in capturing its capital.
stage_intro_1105=The failure at the battle of Prinitza put the Byzantine Empire on the defensive in the war in Morea. The problems of mercenary defection and dispersion of troops were also becoming very serious. In 1264, under the leadership of William II, the Latin imperial army launched an attack on the scattered Byzantine forces.
stage_intro_1106=In 1274, the Byzantine Empire launched an attack on John of Thessaly. Facing the massive Byzantine army, John Doukas had no choice but to seek help.
stage_intro_1107=In order to maintain the Empire's control over the Aegean Sea, the Byzantine Empire reorganized its navy. However, the defeats in the battles of Morea and Settepozzi dealt a heavy blow to the Byzantine forces. The Latin lords seized this opportunity to attack the Byzantine navy, anchored at the port of Demetrias.
stage_intro_1108=For the Angevin kingdom of Sicily, Berat is a city of great strategic significance. In 1280, in order to block enemy access to the heartlands of the Byzantine Empire, the emperor sent troops to attack Berat.
stage_intro_1201=In 1302, Michael IX's army was dissolved out of fear for the Ottomans, forcing Andronikos II to send an army across the Bosphorus to support the dire situation in Nicomedia.
stage_intro_1202=In 1321, the young Andronikos III thought that his grandfather was too old and that he should take the throne for himself. The rift in the family prompted a civil war. The Ottomans decided to take this opportunity to capture the city of Bursa.
stage_intro_1203=After regaining Constantinople from the Latin Empire, the Byzantines concentrated too much energy on restoring control over Greece and recalled the troops on the eastern front of Anatolia, which led to a new round of attacks by the Ottoman Empire.
stage_intro_1204=In 1329, the area under the control of the Byzantines in Anatolia had shrunk considerably. In order to secure the surrounding area, Androniko III decided to send troops to Nicomedia, but his army was intercepted and attacked by the Ottoman army in Pelekanon.
stage_intro_1205=The civil strife in Byzantium almost made Byzantium collapse, and John VI turned to the Ottoman Empire for help in rescuing his son, who was facing the allied forces of the Serbian Empire and the Second Bulgarian Empire.
stage_intro_1206=In 1352, Byzantine Empire descended into civil war again, and the Ottomans, as mercenaries, acquired key territories near Gallipoli. In 1354, an earthquake completely changed the situation in Gallipoli.
stage_intro_1207=When the Ottoman Empire began its rapid expansion in Europe after capturing its first fortress in the Balkans in 1352, the Bulgarian emperor Ivan Alexander decided to halt the advance of this army.
stage_intro_1208=After the acquisition of Gallipoli, the Ottoman Empire expanded more rapidly in the southern Balkans. After a series of turbulence and renovation, the Ottoman Empire decided to attack Adrian fort, the third-largest city of the Byzantine Empire.
stage_intro_1301=In 1337, the French parliament decided to reclaim the Duchy of Aquitaine from England, causing immediate conflict between the two sides. In order to seize control of the English Channel, Edward III personally led his fleet to attack the fleet of the French navy.
stage_intro_1302=After seizing control of the sea, Edward III led his troops from Portsmouth and began his attack after reaching the northern coast of France. The powerful French army was ready to defend and the two armies were about to meet around Crécy.
stage_intro_1303=Edward III was delighted by the victory of the Battle of Crécy, and the British army took advantage of the victory and decided to capture Calais, which gained the bridgehead of the European continent, but did not expect the battle to be so difficult.
stage_intro_1304=In September 1346, while the English army was besieging Calais, Philip VI hastily asked David II to attack England in the hope of forcing Edward III to divide his forces and return to save his homeland. David, faced with a long-standing and old alliance with France, decided to send an army to invade England.
stage_intro_1305=Brittany was in a very important geographical position, and the battle for the succession of Brittany involved both Britain and France, who wanted Brittany to favor themselves to gain an advantage on the battlefield.
stage_intro_1306=In 1356, Prince Edward, known as the Black Prince, became the cavalry commander of the British army. He adopted a scorched earth policy after leading his army to France, achieving considerable success. To take revenge on the Black Prince, King John II of France rapidly marched his troops to catch up with the British army.
stage_intro_1307=King John II of France was captured at the Battle of Poitiers and later ceded a large territory to England, while Elwha III's ambitions did not stop there, he decided to launch an expedition and was crowned King of France at Reims!
stage_intro_1308=Although France was already devastated, the country could not live without a king. Prince Charles decided to go to Reims to be crowned king, and Edward III decided to stop the coronation by cutting the road between Paris and Reims.
stage_intro_1309=After the Battle of Mauron, there was a long truce between the Breton successors, but both sides had been building up their strength for a long time with the support of Britain and France, and they were both ready for a decisive battle.
stage_intro_1310=In October 1369 Bertrand, who was not a senior nobleman, was appointed by Charles V as the new commander-in-chief of the army, a break with convention that paid off for the French king! As winter approached, there was a renewed dispute within the British army over how to spend the winter. The French army took this opportunity to attack the British army.
stage_intro_1311=In 1372, in response to the Franco-Castilian alliance established in 1368, King Castile sent a fleet to Aquitaine to assist the French army. The fleet encountered an English fleet heading for France off La Rochelle.
stage_intro_1312=In his later years, Edward III was not interested in war, and the death of Edward the Black Prince made him lose confidence even more. His other son, John of Gaunt, became the commander and made Great Chevauchée many times in France, causing overwhelming losses to the French population.
stage_intro_1401=Charles VI had become a mad king, the struggle between the royals was getting more and more intense, and the instability of power in France gave the young Henry V the opportunity, and in 1415 he decided to follow the route of his great-grandfather's attack to conquer France and become king of both countries.
stage_intro_1402=Henry V's victories in France did not bring much real gain to England, and the support given by Parliament became less and less, and he decided to occupy Rouen to gain more French territories.
stage_intro_1403=The struggle between the two parties left France completely divided, the assassination of John the Fearless left the Duchy of Burgundy completely fallen to England, and the signing of the Treaty of Troyes made Henry V the nominal heir to the French throne. And at this time Dauphin Charles gained the support of Scotland, and the Great War was triggered inadvertently.
stage_intro_1404=The victory at the Battle of Beaugency pleased Dauphin Charles, and the French nobles were ready to take advantage of the victory to recapture more lost territories. And Henry V was planning a new round of attacks at this time.
stage_intro_1405=Henry V and Charles VI had been dead for 2 years, Charles VII had not yet been crowned, and Henry VI, being young, was under the regency of the Duke of Bedford. 2 years of conflict between the two sides, with each side winning and losing, each intending to destroy the other's main force once and for all.
stage_intro_1406=In stark contrast to the British offensive was the sluggish response of the French government, the lack of funds for the battle, the aristocracy on its own, the scales of victory never tipped in favor of France, successive blows almost made Charles VII desperate.
stage_intro_1407=If Orléans were captured by the British, the last barrier in central France would be broken. It was a dark moment for Charles VII, but God gave light to this precarious country, and a young girl named Jeanne d'Arc stepped forward.
stage_intro_1408=The news of Orléans' success lifted the whole of France, and the French army, inspired by Joan of Arc, prepared to clear all British positions throughout the Loire Valley.
stage_intro_1409=Joan of Arc wanted Charles VII to abandon his plans to attack Normandy and go to Reims to be crowned. This further weakened the morale of the British army. The British army mobilized the elite troops that had previously aided the Huss War to block the attack.
stage_intro_1410=Because of insufficient support, Joan of Arc was captured at the Battle of Compiègne and died 2 years later, which provoked her comrades to take revenge, and even the French underclass joined in the struggle.
stage_intro_1411=In 1435, the death of the regent Duke of Bedford left England without an ally in the Duchy of Burgundy, and with the territories of Normandy in disarray, Charles VII decided to take advantage of this opportunity to recover Paris.
stage_intro_1412=Despite the enormous cost of the war against France between 1435 and 1436, England was still unwilling to make peace with Burgundy, and the Duke of Burgundy decided to stand against England and seize Calais.
stage_intro_1413=France had recovered greatly under Charles VII, while the last English territories in France were only Normandy and Giennes-Gascogne, and England decided to fight back with a large support of troops from home.
stage_intro_4001=Attila was taken hostage and received a good education in Rome. When he returned to the tribe, he began to lead his strong tribe to further lands.
stage_intro_4003=Byzantium attempted to stop Attila's attack by offering tributes, a tactic which proved ineffective. The wolf's appetite only grew bigger and bigger. Attila's army burned, killed, and looted along the way. He was called the "Scourge of God" by people at that time.
stage_intro_4005=The Hungarian cavalry besieged Constantinople after sweeping the Balkans, but the two walls seemed unbreakable.
stage_intro_4007=The sister of the Roman emperor, Honoria, wanted to marry Attila, who demanded half of the Empire's territory as her dowry. Although the proposal failed, it gave Attila an excuse to attack Rome.
stage_intro_4009=Attila crossed the Rhine with an army of 500,000 Huns. Facing him was Aetius, the strongest general in Rome. He suffered the biggest defeat of his life.
stage_intro_4011=Attila did not give up. He crossed the Alps and attacked Rome directly. How Attila's army was dissuaded by Pope Leo Iremains a mystery, but it turned Attila into a legend.
stage_intro_4021=Belisarius, under the age of 24, previously served as a local governor. In addition to his wife's deep friendship with the Queen, he is an excellent military leader.
stage_intro_4023=Belisarius' actions during the Nika riots earned him the trust of Justinian I. In order to bring greater honor to the Empire, Belisarius accepted the emperor's order and set out for Carthage.
stage_intro_4025=After the Vandals were conquered, Belisarius' objective was to return the city, which had been occupied for a hundred years, to the rule of the Empire.
stage_intro_4027=Justinian I became more and more distrustful of Belisarius under the influence of the queen. Belisarius was only allowed a small amount of soldiers and supplies to recapture the lost land of the Empire.
stage_intro_4029=After Italy was returned to Byzantine control, the emperor became more wary of Belisarius. In order to keep him at a distance from the political center of the Empire, Justinian I once again ordered him to wage war against the Sasanian Empire.
stage_intro_4031=The Ostrogoths recaptured most of the land of Rome and Italy. Meanwhile, Belisarius, under the suspicion of the emperor, could only lead a small troop to recover the lost land. In the end, the God of War quietly died of illness.
stage_intro_4041=Rome, in decline, was unable to defend its territory. After the rise of the Saxons, they invaded Britain, and Arthur and his knights were the only troops to save the people from the disaster.
stage_intro_4043=Arthur and his knights began to uproot Saxon strongholds on the coastline. Their unstoppable offense made people believe they possessed magical abilities.
stage_intro_4045=Arthur was strong but cultured. He and his Knights of the Round Table were brave and accomplished fighters. They brought hope to the Celts and Welsh. Arthur was crowned King with the support of the people.
stage_intro_4047=Lancelot, Gawain, Geraint, and other Knights of the Round Table followed King Arthur all the way. However, Lancelot and Queen Guinevere were secretly engaged in a love affair, though King Arthur refused to believe it. 
stage_intro_4049=The Saxons decided to combine their forces to battle King Arthur, who led more than 150 of his knights and local rebels to the battlefield.
stage_intro_4051=The knight Mordred usurped the throne while King Arthur was fighting in France. Arthur rushed back to Britain and fought with Mordred. Both men perished in the battle, putting an end to King Arthur's legendary story.
stage_intro_4061=The Kingdom of the Lombards gathered its troops around the city of Rome. The Pope hurriedly asked Charlemagne for help. Charlemagne decided to divide his troops and raid the Kingdom of the Lombards.
stage_intro_4063=Charlemagne decided to conquer Saxony in order to spread his religion. People here were of many different backgrounds and they possessed a fierce spirit. They would not easily yield. 
stage_intro_4065=In addition to the north, Charlemagne hoped to conquer the Al-Andalus kingdom in the west. Charlemagne's army was ambushed here, leading to the death of his fearless paladin Roland.
stage_intro_4067=Charlemagne built a large number of churches and forced the Saxons to convert to Christianity. However, the rebellion in Saxony made Charlemagne furious. Charlemagne sent a large number of troops to stamp out the unrest once and for all.
stage_intro_4069=In addition to the punitive war against Brittany to the west, Charlemagne also conquered Bavaria to the East.
stage_intro_4071=On Christmas Day 800, Charlemagne was crowned Emperor of the Romans in St. Peter's cathedral. Charlemagne subsequently conquered Byzantium, Bohemia, Slavs, and Denmark in the East, as the Empire's territory reached its peak.
stage_intro_4241=The Vikings swept Britain like a storm. They ferociously robbed Britain of its wealth and drained it of its life. Britain urgently needs a hero to turn the tide.
stage_intro_4243=The defeat at Reading did not extinguish the fighting spirit of the people. After learning from the experience of this defeat, Alfred overcame the fierce Vikings with the use of the "shield wall" tactic.
stage_intro_4245=The wily new Viking leader Guthrum launched a surprise attack on Alfred's palace, acquiring a large amount of supplies, which put Alfred in a desperate situation.
stage_intro_4247=A few months later, Alfred rallied and mobilized troops from many places to retaliate against the main forces of the Vikings. The decisive battle between the cross and the hammer was imminent in Eddington.
stage_intro_4249=Alfred, drawing inspiration from the advantages of Viking longships, built a new type of warship and established the first proper navy in English history. For the first time, the English coast was defended.
stage_intro_4251=In 892, the Viking army attacked England again, but this time they faced a strong defense. Alfred the Great issued a code of law and established schools during his reign, laying the foundation for the unity of England.
stage_intro_4261=Igor, the ruler of the Kievan Rus, led his army to attack Constantinople. Before, the Vikings always attacked this massive city from the sea, but this time, they were thwarted by Greek Fire warships.
stage_intro_4263=The failure of the Kievan Rus tempted the tribes who had yielded to them to revolt. Mal, the leader of the Drevlians, attacked and killed the careless Igor, which ultimately brought disaster to the Drevlians.
stage_intro_4265=Igor's widow Olga pretended to agree to marry Mal. Believing her, Mal immediately married Olga. At the climax of their wedding, Olga ordered her men to kill everyone present.
stage_intro_4267=Olga did not let the other Drevlian people go. She set fire to their houses and led a large army to capture the city of Iskorosten.
stage_intro_4269=Olga was baptized and converted to the Orthodox Church. She introduced the Orthodox Church to Kievan Rus, but the Vikings who believed in Thor opposed it. Her son Svyatoslav attacked Byzantine.
stage_intro_4271=Olga planted the seed of the Orthodox Church in Kievan Rus. She also used stones to build big cities such as Kyiv and Novgorod. Kievan Rus changed from a tribe to a kingdom. Many years later, she was posthumously declared a saint.
stage_intro_4361=The Frankish kingdom was divided into three kingdoms after Charlemagne's death. In 936, Otto, who was in the East Franconian Kingdom, was crowned Duke of Saxony and King of Germany. He had to suppress the rebellion in order to unify Germany.
stage_intro_4363=Half-brother Henry rebelled after being enticed by the Duke of Bavaria. The generous Otto I spared their lives after defeating them. However, they did not learn their lesson.
stage_intro_4365=After his new wife gave birth to his child, Otto deprived his eldest son Rudolph of the right to inherit the throne, which plunged the German kingdom into civil war again. Rudolph even invited the Magyars to attack his father.
stage_intro_4367=The Magyars of Hungary took advantage of the German Civil War and launched a mass invasion of Europe in 954. Otto I immediately halted the civil war, determined to stop these invaders.
stage_intro_4369=In 955, the main forces of the Magyars and the Germans met at Lechfeld. This was a life-or-death battle, and the defeated side would be swept into the dustbin of history.
stage_intro_4371=In 961, the Pope asked Otto I for help. Otto defeated the army of the kingdom of Italy with 1,000 heavy cavalries, and was crowned Holy Roman Emperor in Rome.
stage_intro_4281=Cnut, the grandson of King Harald Bluetooth and the son of King Sweyn of Denmark, led 10,000 people with 200 longships from Scandinavia to Britain, where he would establish his own kingdom.
stage_intro_4283=Edmund's brother-in-law, "The Acquisitive" Eadric Streona, betrayed the English and joined forces with Cnut, which allowed Edmund to avoid a head-on war. There were several confrontations, with both sides coming out on top on different occasions.
stage_intro_4285=Cnut tried to attack London three times. However, the back-and-forth battles took their toll on the Danes. When Edmund received a new army from Wales, Eadric returned to the English.
stage_intro_4287=Cnut decided to return to the sea but he was blocked by Edmund. The Danes fought strongly in the battle despite the small size of their force. Eadric Streona betrayed the English again, allowing Cnut to secure the decisive victory.
stage_intro_4289=Soon after, Edmund Ironside died of injury. Cnut won the English throne while his brother Harald II died in Denmark. He led the English to reclaim his Danish throne.
stage_intro_4291=At the height of his glory, Cnut the Great dispatched an army to Norway and Sweden. Even the kings of Scotland and Ireland yielded to him. Then, Cnut the Great established the North Sea Empire which spanned from the Baltic Sea to Ireland.
stage_intro_4301=King Ferdinand I died and his territory was divided among his three sons and two daughters. With the help of Rodrigo, the eldest son Sancho launched a war against his brothers. Rodrigo was a brave and capable warrior. He was given the honorific title "El Cid" by the Moors.
stage_intro_4303=Although he quickly defeated his brothers, Sancho died unexpectedly. His younger brother was crowned Alfonso VI and El Cid was obliged to serve him. However, Alfonso VI feared the great achievements of El Cid.
stage_intro_4305=El Cid was exiled by Alfonso VI after angering the King. However, El Cid's reputation won the support of many troops of different religions. He took this army to join Yusuf al-Mutamin, the ruler of Zaragoza, and won many victories.
stage_intro_4307=Alfonso VI intended to expand his territory to the whole Iberian Peninsula but suffered a defeat in the battle of Sagrajas. At this time, he decided to pardon El Cid, who returned to his previous lord.
stage_intro_4309=El Cid's family were imprisoned and his land was confiscated by Alfonso VI. As a result, El Cid became determined to claim territory for his own. El Cid's popularity reached its peak in Valencia.
stage_intro_4311=Yusuf, the ruler of the Almoravid dynasty, wanted to recapture and reunite Spain. However, he failed in his repeated efforts to occupy Valencia. His soldiers were afraid of El Cid, the God of War. Even when El Cid was seriously injured by an arrow, as long as he was on horseback, no one could stop him.
stage_intro_4381=Matilda was born noble, with bloodlines of Scottish, Norman and Wessex nobility. She was crowned Empress of Rome at an early age when she was married by Henry I to Henry V, King of the Holy Roman Empire.
stage_intro_4383=At the age 23, her husband died and she had to return to her homeland Normandy. In the year of 1120, after the White Ship disaster, the succession to the throne of England became uncertain. In 1127, Matilda remarried to Geoffrey Plantagenet, Count of Anjou.
stage_intro_4385=The death of Henry I in 1135 left the throne of England empty. Matilda, the eldest daughter with the right of succession, and her husband Geoffrey decided to take back Normandy and punish the Norman nobles who had seized the opportunity to rebel.
stage_intro_4387=A civil war began when Matilda's cousin Stephen gained the support of the Norman nobility in England to ascend to the throne, while Robert from Gloucester supported the uprising of his sister in Scotland.
stage_intro_4389=Stephen laid siege to Queen Matilda's castle. Robert's rescue arrived quickly and captured Stephen. After Easter in 1141, Queen Matilda became the de facto ruler of England.
stage_intro_4391=Before the coronation, Matilda was met with rebellion by Stephen and other nobles. She was routed at Winchester and then returned to Normandy. The throne of England was eventually reclaimed by her son, Henry II.
stage_intro_4081=Thanks to the efforts of Nur ad-Din's father, the Zengid dynasty began to take shape. After Zengid was assassinated, the Prince of Antioch intended to take advantage of the chaos to seize Aleppo.
stage_intro_4083=After learning that Aleppo had been attacked by the Principality of Antioch, the County of Edessa intended to recapture its lost territory. Nur ad-Din, upon receiving word of the invasion, led his troops to Edessa to help.
stage_intro_4085=With Nur ad-Din's efforts, the Zengid Dynasty thrived. Nur ad-Din decided to expand his territory in northern Syria. It became necessary to cut off the main road between Antioch and Edessa.
stage_intro_4087=After the death of Unur, ruler of Damascus, the city became a free for all. Both Nur ad-Din and the kingdom of Jerusalem wanted to claim it as theirs.
stage_intro_4089=Nur ad-Din's activities in Syria once again shocked the Christian states, leading the countries of the West to launch the Second Crusade. Due to the presence of Nur ad-Din, the Second Crusade did not go as smoothly as the First.
stage_intro_4091=When the Crusaders invaded Egypt, Nur ad-Din sent his senior general to oppose them, along with the young Saladin. Emir Nur ad-Din died soon after and the Zengid Empire perished as well.
stage_intro_4101=The uprising in Rome forced Pope Eugene III to seek help from Frederick I. As the emperor of the Holy Roman Empire, he was duty-bound.
stage_intro_4103=As the Duke of Poland Boleslaw IV refused to pay tribute, Frederick I responded by sending troops across the Oder River to attack Poland.
stage_intro_4105=Frederick I's brutal and tyrannical rule in Italy angered the Italians. Cities such as Venice and Verona formed the "Lombard League" to jointly resist the rule of the emperor.
stage_intro_4107=Frederick I's vassal Henry the Lion refused to send troops to Italy. This infuriated Frederick I, who decided to launch a war against Henry.
stage_intro_4109=King Richard the Lionheart, Philip II, and Frederick I launched the Third Crusade, sending three hordes of troops to Jerusalem. The Holy Roman Army clashed with the local army when passing Byzantine.
stage_intro_4111=When crossing through the Anatolian plateau, the Crusaders were attacked by the Sultanate of Rum. This powerful enemy proved to be the biggest obstacle facing the Crusaders. Frederick I accidentally drowned after the victory, ending the Crusaders' expedition on a tragic note. 
stage_intro_4121=Nur ad-Din's death divided the Zengid Dynasty. Saladin gradually gained a foothold in Egypt, giving rise to the Ayyubid Dynasty.
stage_intro_4123=Saladin went all the way north to occupy Damascus, Homs, and Hamah. After a brief rest for his troops, he set off to capture Aleppo, the capital of the Zengid Dynasty.
stage_intro_4125=The unity of Muslim Syria put the fate of the kingdom of Jerusalem in jeopardy. Baldwin IV had to lead thousands of soldiers to Ascalon to strengthen their defense.
stage_intro_4127=Baldwin IV tried to cut off Saladin's supply route and build a fortress at Jacob's Ford. In order to ensure the supply line, Saladin led the army to attack the enemy and prevent the fortress from being built.
stage_intro_4129=Baldwin IV's death plunged the kingdom of Jerusalem into chaos. Raynald of France ignored the prior agreement and attacked Egyptian caravans many times, inevitably leading to war.
stage_intro_4131=The Kingdom of Jerusalem's army was completely destroyed in Hattin. The only thing that could stop Saladin was the thick wall. Here, the benevolent King won the respect of both sides and was called the "Arabian Knight".
stage_intro_4141=The competition for power and self-interest within the royal Angevin family was becoming more and more fierce. Meanwhile, the French territory was in a constant state of rebellion. Richard, at only 16 years of age, was obliged to help suppress the insurgency.
stage_intro_4143=With French King Philip II fanning the flames, a conflict broke out between the father and son, leading to a major war in Le Mans.
stage_intro_4145=Richard I was crowned King of England and decided to launch the Third Crusade at the behest of the Pope. Frederick I Barbarossa and Philip II would also take part, and the forces set out in three divisions.
stage_intro_4147=Frederick I was unexpectedly killed in an accident. After capturing Acre, Philip II decided to lead his army back home. Due to the conflicts which arose during the battles, he was looking for an opportunity to retaliate against Richard I. Now only Richard I was still heading towards Jerusalem.
stage_intro_4149=Despite the hostile relationship between Richard the Lionheart and Saladin, they often kept in touch and shared a mutual admiration for each other. Richard the Lionheart was a brave and skilled fighter. If it were not for his brother's usurpation of the throne, Jerusalem would likely have seen a change in leader.
stage_intro_4151=Richard I was imprisoned on his return because he had offended the French Kingdom and the Holy Roman Empire until his mother bought his freedom with a large ransom. Richard the Lionheart was so angry that he launched an attack against Philip II. Richard was mortally wounded after being struck by a crossbow bolt.
stage_intro_4161=Temujin's skill gradually brought his tribe to the fore, which also turned his former partners into enemies.
stage_intro_4163=Temujin's adoptive father was increasingly worried by Temujin's growing power. Since Temujin wouldn't yield to him, there was no option but to fight.
stage_intro_4165=The Mongols, who had almost been exterminated more than a century prior, had become extremely powerful. There could only be one ruler in the Steppe. Temujin launched a war against the Western Liao, Western Xia, and Jin.
stage_intro_4167=After unifying the Mongol Steppe, Temujin took the name "Genghis Khan". At that point, he shifted his focus to the vast land in the West. Genghis Khan divided his troop into four units, leading an army of 200,000 into the western regions.
stage_intro_4169=In 1227, Genghis Khan, the Son of Heaven, died on his way to battle. However, his spirit lived on and the territory of the Mongolian Empire kept expanding.
stage_intro_4171=According to Genghis Khan's last wish, the Mongolian Empire launched the third western expedition. They were going to face the iron cavalry of the Abbasid Caliphate and Ayyubid Dynasty.
stage_intro_4181=Henry III's cowardice and weakness led England into civil war. The Angevin Dynasty was in danger. Prince Edward decided to set things straight.
stage_intro_4183=Prince Edward greatly enjoyed military life and loved to fight. When Louis IX launched a new crusade, Edward put aside England's troubles in order to take part.
stage_intro_4185=In 1274, Edward I was crowned. Obsessed with the legend of King Arthur, he decided to unify the kingdom of Great Britain. He first turned his attention to Wales.
stage_intro_4187=Due to Edward I's brutal rule over Wales, a mass rebellion broke out in the country under the leadership of Llewellyn.
stage_intro_4189=After Wales surrendered, Edward I set his sights on Scotland further north. In 1296, Edward led his longbowmen and cavalry to Scotland.
stage_intro_4191=Scottish nobles occupied the stronghold of Dunbar with the intention of thwarting Edward I's attack. Edward I defeated them here and took away Scotland's national treasure: the Stone of Scone.
stage_intro_4201=The bloody rule of the English in Scotland drove Wallace to fight back, not only out of his belief in freedom, but also out of his determination to achieve Scottish independence.
stage_intro_4203=Wallace's resistance inspired the oppressed Scottish people, allowing Wallace to quickly gather a large number of like-minded people around him.
stage_intro_4205=England finally began to face up to William Wallace and decided to send thousands of regular troops to stamp out the peasant uprising.
stage_intro_4207=After triumphing in the Battle of Stirling Bridge, Wallace set out to liberate more Scottish land and people. His guerrilla tactics proved highly effective.
stage_intro_4209=William Wallace was finally recognized by the Scottish aristocracy and was appointed Guardian of Scotland. Angry at the incompetence of his subordinates, Edward I decided to lead an army against Wallace himself.
stage_intro_4211=William Wallace reorganized his army and launched an attack, but was betrayed by a Scottish knight and handed over to English forces. Although Wallace was beheaded in London, his blood awakened more Scots.
stage_intro_4321=After the defeat of Dunbar, the Scottish nobles bowed to Edward I. In 1297, William Wallace led a campaign to achieve Scottish independence, alongside Robert the Bruce.
stage_intro_4323=Robert the Bruce, one of the legitimate contenders for the Scottish throne, killed rival contender John Comyn inside a church and was crowned king at Scone. He was wanted by Edward I, who placed a bounty on his head and sent troops to hunt him down.
stage_intro_4325=Robert the Bruce's wife and daughter were captured and he was forced into exile. The next year, Robert Bruce landed in Britain with his recruits from Ireland to fight back.
stage_intro_4327=Robert the Bruce learned valuable lessons from his defeat in the Battle of Methven. He made full use of his familiarity with the Scottish countryside to help fight back against the English army.
stage_intro_4329=Edward I died of illness soon after learning that he had lost the Battle of Loudoun Hill. In less than three years, Robert the Bruce captured most of northern England.
stage_intro_4331=The Scottish army was less than half the size of the English army, and they lacked longbows and heavy cavalries. However, they possessed strong morale and a cunning strategy, enabling them to defeat Edward II. From then on, England could no longer stand in the way of Scottish independence.
stage_intro_4341=The Dukes of Brittany erupted in a dispute over the heir, with both England and France trying to support their candidates, and the conflict intensified, culminating in an encounter near Molay.
stage_intro_4343=In 1345, Edward III marched in three directions, sending English troops to attack in Brittany and Gascony, while he himself led a large army to the interior of Europe, with the front pointing to Paris.
stage_intro_4345=After a long chase, the French allies caught up with the almost exhausted English army near Crecy. The English army was forced into formation to fight to the death.
stage_intro_4347=In 1355, sensing the lack of troops in the Gascony region, Edward III planned a raid to sweep the south of France, and the best man for this task was Edward the Black Prince, who had made his mark at the Battle of Crécy.
stage_intro_4349=In 1356, King John II of France led a large army with the intention of pursuing the British army sweeping in the Gascony area, and the two sides finally met officially on September 17 after many brushes, and the first stage of the Hundred Years' War began.
stage_intro_4351=In 1367, England and France intervened in the civil war in the Spanish Kingdom of Steele, officially fighting the first major battle of the second phase of the Hundred Years' War.
stage_intro_4401=The bright Baldwin showed such fine qualities as determination and optimism at an early age. Sadly, he suffered from leprosy, an incurable disease. At the age of nine, he took the crown of the Kingdom of Jerusalem, which put the country in danger.
stage_intro_4403=Baldwin IV, who was just of age and came to power in 1176, launched a full-scale attack on Egypt. Baldwin raided Saladin while he was organizing a battle with the assassins.
stage_intro_4405=With the support from Emperor Manuel of the Byzantine Empire, Baldwin IV launched an invasion of Egypt by sea, but this operation failed due to factional disputes in the Kingdom of Jerusalem.
stage_intro_4407=Saladin arrived at Ascalon with a large number of troops and decided to raid Jerusalem after discovering Baldwin IV with few troops. To his surprise, he almost lost his life to this 16-year-old king with a small army.
stage_intro_4409=For two years the war continued on both sides. Saladin could no longer belittle the young monarch, while the serious illness of Baldwin IV put the Frankish army in jeopardy.
stage_intro_4411=The pain of disease haunted the king, who had to adopt a defensive posture in order to guard the boundaries of Jerusalem. After stopping Saladin's attacks once again , Baldwin IV burned out his last life.
stage_intro_4421=Taking advantage of the Mongol invasion of Rus, the Swedish feudal lords intended to march into the Grand Duchy of Novgorod to seize its territory. Alexander led his elite troops to raid and defeat the incoming enemy on the banks of the Neva River. He is known as Nevsky for his commanding talent and fighting spirit in this battle.
stage_intro_4423=After the Battle of the Neva, Nevsky led the army against the incoming Crusaders at the request of the Novgorod Public Meeting. In order to guard the northwestern border of Russia, the recovery of the Principality of Pskov became a top priority.
stage_intro_4425=The recovery of Pushkov only stands as the first step of the plan. To secure the border once and for all, it was wise to take the initiative. Nevsky led his army into the Crusaders' territory in order to crush the enemy. The reconnaissance troop he sent encountered the enemy's spearhead at Hammarst.
stage_intro_4427=The reconnaissance troops confirmed the movement of the Crusaders. Nevsky mobilized his troops to block the enemy. The two sides met at Lake Peipus and the final showdown broke out. This battle brought a brief peace to the border of Rus.
stage_intro_4429=The Mongol cavalry set foot on Russian soil. In the face of their overwhelming offensive, Nevsky's father, Grand Duke Yaroslav, was forced to surrender to the Mongols, but died on his way back. Nevsky and his brother Andrey started a fight for the throne of the Grand Duke.
stage_intro_4431=During the latter part of his reign, Nevsky put down many domestic disturbances and strongly maintained the unity and stability of the country. After his death, Russia was rapidly divided into a number of antagonistic principalities.
stage_intro_4441=The Norman power has been rising in Sicily, and the threat to the Byzantine Empire was growing by the day. Finally, in 1081, the two sides engaged in a battle in the western Balkans.
stage_intro_4443=After a disastrous defeat at the Battle of Dyrrhachium, Alexius I sought help from the Holy Roman Empire and with the latter's help managed to get the Norman army to surrender.
stage_intro_4445=A man who called himself "Constantine Diogenes" coveted the Byzantine throne of Alexius I. He joined forces with the Cumans to launch an attack on the northern Byzantine frontier.
stage_intro_4447=In order to recover Anatolia from the Seljuks, Alexius I asked the Pope for help, and the First Crusade began at the Pope's call.
stage_intro_4449=Bohemond I, son of Alexius I's arch-enemy, founded the Principality of Antioch and attacked the Byzantine Empire. After two years of war, the Byzantine Empire was victorious and took the Principality of Antioch as a vassal.
stage_intro_4451=After 1110, Alexius I began an offensive against the Seljuks and after several years of warfare eventually succeeded in recovering the coastal areas of Asia Minor.
stage_intro_4461=As a young boy, Su Dingfang was known for his bravery and battle prowess, but he was never used in the early years of the Tang Dynasty. In 630, Li Shimin, Emperor Taizong of the Tang Dynasty, ordered the removal of the Turkic Empire, a hidden danger in the north of the empire, and Su Dingfang followed Li Jing to conquer it.
stage_intro_4463=After rescuing Silla in 655, Emperor Gaozong Li Zhi of the Tang Dynasty sent Su Dingfang to march into the Western Turkic region, and Shasharo Khan led 100,000 cavalry to meet him, but he was defeated by Su Dingfang after he led a small number of troops in a surprise attack at the Hibao River.
stage_intro_4465=When a sudden snowstorm fell, the remnants of the Western Turkic army fled to their own quarters, and Shasharo Khan relaxed his vigilance thinking that the Tang army would not pursue them, but Su Dingfang kept following and launched a surprise attack, which led to the demise of the Western Turkic army. The Silk Road was thus opened and the Tang Dynasty was at its peak.
stage_intro_4467= In 659, Emperor Gaozong sent Su Dingfang to Liangzhou to take charge of the defense of Tibetan. He defeated 80,000 troops of Tibetan with 1,000 soldiers and killed the general Dayan Mangbuji, which prevented Tibetan from advancing eastward for more than a decade.
stage_intro_4469=The remnant of the Western Turkic tribe Sijieqiqin, the leader of Duman, was provoked by Tibetan and joined with three other countries to rebel against the Tang Dynasty.Su Dingfang, who had just pacified Tibetan, led more than 10,000 soldiers on a day and night march of 150 km over a plateau of 4,000-7,000 meters and quickly defeated Duman, which made the territory of the Tang Dynasty as vast as ever.
stage_intro_4471=When the Sassanid Empire was destroyed by the Arabian Empire, the exiled Persian prince Peirus came to the rescue of the Tang Dynasty.The Tang emperor sent an emissary to meet the Persian prince at the border and clashed with the Arabian empire. In 660, the Tang emperor also sent the veteran general Su Dingfang to conquer the Baekje and Goguryeo across the sea, which made him the most powerful general in Eurasia.
stage_intro_4501=Timur got the appreciation of the Eastern Chaghatai Khan Balukuru Timur by virtue of his excellent ability when he was young, and was appointed as the ruler of Shahrisabz.
stage_intro_4503=Timur was forced to flee after being falsely accused of rebellion for releasing an innocent religious leader. He fled to southern Afghanistan to join his brother-in-law Kusin.
stage_intro_4505=After the death of the Great Khan of the Eastern Chaghatai, Balukuru Timur, Timur rose up and defeated the governor of the river and regained control of the city of Shahrisabz.
stage_intro_4507=After the power was gradually established, the conflict between Timur and Kusin and gradually deteriorated. Kusin repeatedly tried to destroy Timur, Timur also repeatedly to fight back, after several years of tug-of-war, Timur won the final victory.
stage_intro_4509=After defeating Kusin, Timur took over the military and political power of Western Chaghatai and supported a puppet sultan, which was regarded as the symbol of the establishment of Timurid Khanate in later times.
stage_intro_4511=After several years of coup turmoil, the Eastern Chaghatai Khanate was succeeded by Hamaruddin who, after his succession, repeatedly attacked the borders of the Timurid Khanate, which Timur eventually wiped out after 22 years of war.
stage_intro_4513=Both the Tartarus of the Chincha Khanate and Timur had ambitions for the Persian region, and friction and conflict between the two sides soon turned into a war between the two countries, with Timur devastating the Chincha Khanate with two expeditions.
stage_intro_4515=Ten years after the founding of the state, Timur launched a western expedition, the first target was the Kartid dynasty in Khorasan, due to its internal disagreements, Timur quickly defeated it.
stage_intro_4517=The last target of Timur's western conquest was the Kingdom of Georgia, but after he conquered it, he retained his original regime, which laid the groundwork for many subsequent rebellions.
stage_intro_4519=In order to plunder the rich north Indian region, Timur launched a large army to conquer India on the pretext that the Delhi Sultanate of India was too tolerant to the pagans.
stage_intro_4521=In 1399, the new Mamluk sultan Faraj refused to recognize the Timurid Khanate as a suzerain state and refused to hand over Timur's enemies, which incurred the wrath of Timur.
stage_intro_4523=The Ottoman Empire was another powerful empire that existed in the Middle East at the same time as the Timurid Khanate, and the continued expansion of both sides led to conflict, which eventually turned into a large-scale war.
stage_intro_4541=John I Tsimiskis was born in Armenia into a noble military family, his uncle being the famous Byzantine general Nikephorous Phokas. He joined his uncle in war at an early age and became prominent in the Battle of Samosat in his twenties.
stage_intro_4543=In 963, Nikephoros Phokas took advantage of the Emperor's illness to seize the throne, and in 969, John I and his queen Theophano assassinated Nikephoros and made themselves emperor. The nephew of Nikephoros, Bardas Phokas, tried to avenge his uncle's death, but was soon suppressed by John I.
stage_intro_4545=In 970, Grand Duke Sviatoslav of Rus began his invasion of the northern part of the Byzantine Empire with his army. At that time, John I was in the middle of a civil war with the Phokas family and had no time to send support to his beloved general, Bardas Skleros who was defending the Thracian region.
stage_intro_4547=In 971, Sviatoslav resumed his southward invasion of the Byzantine Empire's borders with an army of 30,000 men, and John I, after settling his domestic civil unrest, led his elite troops to meet him. After many fierce battles, John I besieged Sviatoslav in the city of Dorostolon.
stage_intro_4549=In 972, after the end of the war with Rus, John I turned his attention to the East. Initially the Byzantine side achieved some success in the Eastern expedition, but the defeat and capture of the eastern war general Mleh in the later battle with the Emirate of Mosul forced the end of the expedition.
stage_intro_4551=In 974, John I launched his second and third campaigns to crush the Mosul Emirate and force it to submit. During this period, John I advanced eastward and included the entire area west of the Middle Euphrates River in his empire, capturing Damascus, Tripoli and other cities.


