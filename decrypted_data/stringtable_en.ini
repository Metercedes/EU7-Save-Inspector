stage_intro_4641=From his first accession to the throne at 14, Mehmed II had an ambition: to conquer Constantinople and destroy the Byzantine Empire! In 1451, when he became Sultan of the Ottoman Empire again, he finally had the opportunity to put this plan into practice.
stage_intro_4643=The fall of Constantinople was not the end of the road of conquest for Mehmed II. In fact, with the rebuilding of Constantinople, the curtain of the young and exuberant sultan's conquest and expansion had just opened…... In 1456, the high-moralized Ottoman army marched toward Belgrade.
stage_intro_4645=In light of the loss of the Battle of Belgrade, Mehmed II did not launch a large-scale war throughout 1457. Until 1458, Mehmed II felt rejuvenated to continue his war of conquest. This time the neighboring countries were about to face a more mature and sophisticated Mohammed II.
stage_intro_4647=When the Ottoman Empire was expanding westward in full force, it was often interrupted by the affairs of Eastern Asia, especially after Uzon Hassan of Aq Qoyunlu gathered a large army in Erzincan to invade the imperial territories. Mehmed II had to step back from the Balkans to teach this restless eastern neighbor a good lesson .......
stage_intro_4649=When defeated the Aries Dynasty by the Ottoman Empire, Mehmed II accomplished the unification of Anatolia, and the dominance of the Ottoman Empire was established in the region. At this time, he was finally able to free his hands to conquer the Balkans, the first of which was the stiffest bone preventing the Ottoman Empire from unifying the Balkans - Albania!
stage_intro_4651=The war gradually spread to the Italian peninsula. And in order to fight against the Ottoman threat, the Pope asked for help from various powers. But in fact, Mehmed II had already turned his attention to the island of Rhodes, which must be taken for complete control of the sea in the Eastern Mediterranean. And the great conqueror was about to perform his final act.

