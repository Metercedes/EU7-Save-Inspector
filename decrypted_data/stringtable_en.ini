stage_intro_2151=In 376 AD, the Visigoths sought refuge from the Roman Empire against the invading Huns. However, after crossing the Danube, many conflicts broke out with the Romans. Finally, the two sides battled in Marcianopolis.
stage_intro_2152=In 378 AD, after looting the Danube provinces, the rebellious Goths prepared to join other barbarians in invading the Balkans. The Roman Emperor Valens led the troops into battle, but a lack of cohesion among his soldiers greatly endangered the suppression of the rebellion.
stage_intro_2153=In 402 AD, under the leadership of King Alaric, the Visigoths continued to invade the hinterland of the Western Roman Empire. Soon after, they surrounded the important city of Milan, where Emperor Honorius resided. Under great distress, Honorius urgently ordered Stilicho, his military commander who was absent in the north at the time, to lead his troops south and defend the empire.
stage_intro_2154=In 410 AD, Alaric was attacked by Roman troops at the meeting place agreed with Honorius. In response, Alaric decided to abandon negotiations with the Western Roman Empire and once again besieged Rome. The "eternal city" looked shaky after being besieged repeatedly. 
stage_intro_2155=In 419 AD, the Kingdom of the Suebi, recently allied with the West Roman Empire, frequently clashed with the neighboring Vandal Kingdom over territorial claims at the border. With a strong desire to conquer, King Hermeric of Suebi decided to take the initiative and invade the territory of the Vandals. 
stage_intro_2156=In 439 AD, Gaiseric led his army across the Strait of Gibraltar, occupying most of the Western Roman Empire's territory in North Africa for 8 years. After nearly five years of peace with the Western Roman Empire, Gaiseric set his sight on Carthage again, the third-largest city of the Roman Empire.
stage_intro_2157=In 451 AD, the ambitious King Attila, ruler of the Huns, took advantage of a scandal involving the Western Roman court to send troops to invade Gaul. The Roman general Aetius, who was in Gaul, decided to form a coalition force with the barbarian kingdoms of Gaul in resistance of the Huns' invasion.
stage_intro_2158=In 455 AD, Maximus usurped the throne by murdering emperor Valentinian III, which destroyed Western Rome's alliance with King Geiseric of the Vandals. After receiving assistance from Eudoxia, widow of Valentinian III, Geiseric decided to send troops to attack Italy.
stage_intro_2251=During the 6th century, European countries came to realize the importance of cavalry. In 530, the Persians launched an attack on the Byzantine Empire. Outside the city of Dara, the heavily armored cavalry of the Sassanian Army drew up their battle lines.
stage_intro_2252=Justinian I sought to recreate Rome's former glory. After Gelimer seized the throne to become the ruler of the Vandal Kingdom, Justinian I responded by declaring war on the Vandals. In 533 AD, Belisarius led troops to land in North Africa and marched towards Carthage.
stage_intro_2253=After Byzantium's great victory in the Battle of Ad Decimum, Belisarius and his army occupied Carthage. King Gelimer, who was in the west of Carthage, sought assistance from his brother and regrouped his army to retake Carthage.
stage_intro_2254=After re-conquering North Africa, Justinian I set his sights on the Italian region. In 535 AD, Belisarius led his army on another expedition to occupy Rome for his emperor and retake the Italian region.
stage_intro_2255=After the occupation of Rome, the road to Ravenna was almost unimpeded for Byzantium. Belisarius marched his troops towards the capital of the Ostrogothic Kingdom, which would soon face a massive attack by the Byzantine army.
stage_intro_2256=Due to the conquests of Totila, King of the Ostrogoths, Justinian I sent Belisarius back to Italy. In 546 AD, Totila's troops came to Rome and surrounded the city.
stage_intro_2257=Totila's continued aggression in Italy caused heavy losses to the Empire. He also planned to use the fleet to block seas to prevent the Imperial army from easily entering the Italian region. These actions deeply displeased Justinian I.
stage_intro_2258=In order to regain control of Italy, Justinian I decided to send Narses to Italy. Despite being at a disadvantage, Totila, as a traditional Goth, chose to take the initiative to attack Narses' forces.
stage_intro_2259=It proved difficult for the Goths to resist the forces commanded by Narses. The Ostrogoth king decided to ask for help from the Franks and Alemanni, hoping that they could enter the Italian region and prevent the Byzantine army from attacking.
stage_intro_2260=In 559 AD, a group of Huns crossed the border and wantonly committed evil on the outskirts of Constantinople, which was a great humiliation to King Justinian I. He once again summoned Belisarius to him and gave him one last mission.
stage_intro_2351=The arrival of the Anglo-Saxons caused panic among the natives of Britain. In the face of well-equipped and well-trained enemies, the British had to take up arms to resist the Anglo-Saxon invasion.
stage_intro_2352=El, the leader of the South Saxon tribe, successfully led his people to land on the south coast of the British Isles, but their march inland did not go smoothly. They encountered stubborn resistance from the locals, making El aware of his lack of troops, who asked for reinforcements from the tribes back home.
stage_intro_2353=Influenced by years of conflict, Britain's scattered tribes began to unite and establish their own kingdoms, but this did not bring about peace and stability. The battle between tribes gradually evolved into a larger and more brutal war between kingdoms, initiated by the kingdom of Northumbria.
stage_intro_2354=In 633 AD, the kingdom of Northumbria, reigned by Edwin, was the strongest kingdom of England. This aroused the fear of its neighboring kingdoms. Cadwallon, King of Gwynedd, decided to form a coalition with the kingdom of Mercia to invade Northumbria.
stage_intro_2355=Although it successfully withstood the invasion of the allied forces of Gwynedd and Mercia, Northumbria suffered grave damage, and the kingdom was divided for a time. In 634 AD, Cadwallon of Gwynedd sent troops to invade the kingdom of Northumbria again.
stage_intro_2356=Oswald's return and succession enabled the Northumbrian army to defeat the kingdom of Gwynedd, restoring peace and stability to Northumbria. In 644 AD, after a decade of recovery to his armed forces, Oswald took the initiative to attack the kingdom of Mercia.
stage_intro_2357=Oswald's invasion of Mercia ended in a disastrous defeat. Penda decided to take this opportunity to unite the kingdoms of East Anglia and Gwynedd to lead the war against Northumbria. In 655 AD, only Bernicia remained in the kingdom of Northumbria, with the remaining territory captured by the coalition forces.
stage_intro_2358=For a long time, the kingdom of Mercia maintained its hegemony by forcibly controlling many kingdoms in southern England. In 825 AD, in order to consolidate his authority, Beornwulf of Mercia personally led an army to invade the kingdom of Wessex, causing King Egbert of Wessex to retaliate.
stage_intro_2451=The Arabs plotted to exact revenge for the killing of their emissary at the hands of the Ghassanids. However, their plan of action was learned by Byzantium, who immediately assembled their military fortress. In the face of the powerful Byzantine army, the Arab plan seemed doomed to fail.
stage_intro_2452=When Khalid led his troops to Marj Rahit, the Ghassanids did not see the Arabs as a threat. However, the Arabs soon proved that their combat prowess was unparalleled.
stage_intro_2453=After Abu became the first Arab caliph, he sought to expand his power beyond the Arabian Peninsula. The Arab army pushed all the way north and launched an attack on Damascus.
stage_intro_2454=In order to prevent the Arabs from advancing and to recapture the lost territory, Heraclius decided to send a large-scale army to the Levant. As the enemy approached, the Arabs withdrew from Damascus and regrouped their forces in Yarmouk.
stage_intro_2455=After fighting the Byzantine army on the Yarmouk plain, the Arabs decided to continue to advance and occupy more cities. At the end of 636 AD, Arab troops came to Jerusalem and surrounded the city.
stage_intro_2456=The Arab conquest continued, and their troops were invincible on the Anatolian peninsula. Successive defeats and the loss of several cities made the Byzantine Empire panic. They urgently needed a way to defeat this powerful enemy.
stage_intro_2457=After defeating the Sassanids, Omar decided to lead his Arab soldiers to Africa. The Arabs planned to take Egypt as a starting point and continue capturing more African land as their own territory.
stage_intro_2458=After extinguishing the rule of the Sassanids, the Arabs identified the Byzantine Empire as their main hostile target. For this reason, they established a powerful navy to support their actions against the Byzantine Empire in the Mediterranean.
stage_intro_2551=In 865 AD, an army of Vikings crossed the sea, landed on British soil, and carried out raids on coastal monasteries and other wealthy areas.
stage_intro_2552=After initiating their invasion, the Vikings occupied the two kingdoms of East Anglia and Northumbria in quick succession. Next, the Vikings turned their attention to capturing the kingdom of Wessex.
stage_intro_2553=The Vikings, who gained the upper hand in the battle of Reading, continued to advance and fought with Wessex troops again in Ashdown.
stage_intro_2554=After decades of invasion and looting, only a handful of forces, including the Kingdom of Wessex under the leadership of Alfred, were able to continue resisting against the Viking invaders.
stage_intro_2555=In 893, the Vikings who landed in Britain clashed with the Anglo-Saxons once again. However, with new tactical changes, the Viking's invasion seemed to have little effect.
stage_intro_2556=In 937, the three northern kingdoms formed an alliance in the hope of destroying England's growing power. Facing the enemy's invasion, King Athelstan assembled an army and marched north.
stage_intro_2557=In order to compete for the English throne, King Harald Hardrada of Norway and his allies decided to assemble troops and march towards Yorkshire.
stage_intro_2558=Due to the death of King Edward the Confessor of England, those who coveted the throne began to make their claims. Harald of Norway led his troops to attack England.
stage_intro_2651=The war between the Byzantine Empire and the Bulgarian Empire rages on. In 811, Nikephoros I led his army to attack Bulgaria. After successive victories, he decided to march on Pliska.
stage_intro_2652=After the battle of Pliska, both the Byzantine Empire and the Bulgarian Empire suffered great losses, but the Bulgarian Empire still maintained the offensive. Despite heavy losses, the Byzantine Empire refused to sign a peace treaty.
stage_intro_2653=After Mikhail II succeeded the throne, an officer named Thomas decided to rebel against his rule, which won a lot of support. He allied with the Arabs to launch an attack on Constantinople.
stage_intro_2654=In retaliation for the expulsion of Byzantine priests, Leo VI decided to expel Bulgarian merchants from Constantinople. This gave Simeon I an excuse to wage war when the main forces of the Byzantine army were fighting against the Arabs in the East.
stage_intro_2655=As the Queen Regent, Zoe Zaoutzaina decided not to give in to the Bulgarian Empire anymore, which once again led Simeon I to attack the Byzantine Empire. Due to a series of measures by Simeon I, the Byzantines were forced to fight alone.
stage_intro_2656=In 922, the Bulgarians had controlled more than half of the Balkans, but due to their insufficient Naval power, they could not pose a threat to Constantinople. The Bulgarians decided to join forces with the Arabs, but their plan was prevented by the timely dispatchment of Byzantine troops.
stage_intro_2657=After ending the battle with the Arabs, the Byzantine Empire soon recovered its strength and quickly defeated the Bulgarian Empire. However, the Kievan Rus took advantage of this vacuum, and a new powerful enemy appeared in the Balkans once again.
stage_intro_2658=In 971, the defeat of the Bulgarians enabled the Byzantines to occupy a large area of Bulgarian territory. In order to regain their land, the Bulgarians continued the war for many years.
stage_intro_2659=After the battle of Trajan's gate, the Byzantine Empire broke out in civil war. Samuel decided to seize this opportunity to attack the Byzantine Empire. In 996, Samuel defeated Thessaloniki's Byzantine army and began to March south.
stage_intro_2660=From 1,000 CE, Byzantine emperor Basil II began to send troops to Bulgaria. Although there were victories and defeats on both sides, the Byzantine's advance threatens Bulgaria's very existence. A fierce battle between the resurgent Byzantine Empire and the declining Bulgaria seemed inevitable.
stage_intro_2751=In 1066, the Duke of Normandy led his troops across the channel and landed in England in order to claim the English throne. When Harold II heard the news, he immediately called his army south to intercept the invaders near Hastings.
stage_intro_2752=After the battle with Harold II at Hastings, William led his troops to London. In order to secure the occupation of London, he sent a team to Southwark, hoping to eliminate the resistance there.
stage_intro_2753=After the successful conquest of England, the people of Exeter revolted against William. In order to make them obey his rule, William led his troops to besiege the city, but he encountered strong resistance.
stage_intro_2754=Despite gaining most people's support, there are still forces rebelling against William's rule. Most of them are in the north. Thinking it impossible to obtain their loyalty through peaceful means, William decided to march his army north. 
stage_intro_2755=In 1075, William, who had returned to Normandy, refused to recognize the marriage between Emma de Breteuil and Ralph de Gael. This led to the uprising of three earls. They decided to revolt and overthrow William's rule while he was still in Normandy.
stage_intro_2756=In 1105, Henry I led his troops to invade the territory of Robert, Duke of Normandy, and occupied Bayeux and Caen. The following year, Henry I returned to Normandy. Count Morten, as one of the nobles loyal to Robert, became his chief rival.
stage_intro_2757=In 1119, King Louis VI of France led his troops to attack Normandy. In order to defend his property and territory there, Henry I was forced to fight against France.
stage_intro_2758=In 1135, the sudden death of Henry I plunged England into anarchy. Stephen and Matilda, the daughter of Henry I, led their respective forces to fight for the English throne.
stage_intro_2851=In 1048, an army led by Prince Seljuk entered Armenia, which was under Byzantine rule. Due to their lack of troops, the Byzantines decided to adopt a conservative strategy and wait for the arrival of reinforcements.
stage_intro_2852=In 1071, seizing the opportunity of the Seljuk's conflict with the Egyptian Fatimid forces, the weakened Byzantine Empire decided to attack Armenia to regain previously lost areas.
stage_intro_2853=The activities of the Seljuk empire in the Aegean Sea continued to threaten the Byzantine Empire. Alexios decided to form a fleet against the Seljuk Navy and regain control of the Aegean Sea.
stage_intro_2854=Unable to resist the powerful Seljuk, and the emperor Alexios decided to seek help from the west. Assisted by the Byzantine empire, the Crusaders sailed across the sea with Nicaea as their first target.
stage_intro_2855=With additional reinforcements from the Byzantines, the Crusaders became a powerful force. The Crusader's army marched towards Antioch, a city halfway between Constantinople and Jerusalem.
stage_intro_2856=Alexios, having recovered from his illness, went to the battlefield in person to bolster the front line defenses in Anatolia. His army defeated the Seljuk many times. Then after receiving, he once again moved onto the offensive.
stage_intro_2857=In 1176, after dealing with the threats of Hungary and Serbia to the west, the Byzantine emperor Manuel I decided to focus on the Rum Sultanate and recover the Anatolian steppe.
stage_intro_2858=Manuel I lost a large amount of siege weapons and a great opportunity to recover Anatolia. Then, an encounter with a brigade of Seljuk troops returning from loot presented him with a hope of victory.
stage_intro_2951=After conquering the Seljuk capital of Nicaea, the Crusaders were violently counterattacked. Arslan I led a large number of troops to surround Bohemond I's troops.
stage_intro_2952=After the successful capture of Antioch, the Crusaders advanced all the way and continued to move towards Jerusalem. At the same time, the Arab general al-Dawla, stationed in Jerusalem, has long been ready to defend the city.
stage_intro_2953=The success of the first Crusade gave the European lords a taste of victory and the desire to launch another expedition. This time, their primary objective was Damascus.
stage_intro_2954=Acre is a very important city under Saladin's rule. When Saladin learned that Guy de Lusignan had assembled troops again outside Acre, he immediately sent troops to intercept it.
stage_intro_2955=In order to recapture Jerusalem from Saladin, the Western European lords once again launched a Crusade. When the army entered Anatolia, it was fiercely attacked by the Seljuk.
stage_intro_2956=When Richard the Lionheart withdrew from Jerusalem, Saladin decided to attack Jaffa out of revenge. Richard, who learned of the news, gathered his army again and launched an attack on Saladin.
stage_intro_2957=When the Crusaders prepared to advance on Jerusalem, their leaders agreed to Alexios IV's request and decided to go to Constantinople to help his father regain the throne. In return, the Byzantine Empire would provide them with economic and military assistance.
stage_intro_2958=After many years of war, the Crusaders began to realize that Egypt was their biggest obstacle to recapturing Jerusalem. So they decided to organize an expedition to cross the Mediterranean and attack Egypt.
stage_intro_3051=Due to the open revolts in Wales, Henry II had to return to England from Normandy. In order to punish and stop the Welsh, Henry II assembled a large army and launched an attack on the Welsh in 1165.
stage_intro_3052=Arthur and John had long been contesting for the right to the English throne. After John decided to marry Isabella, this balance was gradually broken. However, the involvement of Hugh X and Philip II made the situation very chaotic.
stage_intro_3053=Due to John's refusal to cooperate, Philip II announced that he would take back the land of Normandy for himself, and soon began to take action. In 1203, Philip II sent troops to Château Gaillard, which he believed to be the key to controlling the whole of Normandy.
stage_intro_3054=In 1213, the English fleet led by William Longespée found a French fleet, which had already landed and started to plunder. Facing the unmanned fleet, English victory seemed to be inevitable.
stage_intro_3055=In 1214, a coalition army consisted of the English, the Holy Roman Empire and the Flanders launched an attack on the Kingdom of France. In a hurry, Philip II quickly gathered a large army. Despite the great strength of the coalition forces, the well-trained French cavalry did not seem to be losing ground.
stage_intro_3056=During the reign of Henry III, the famine in England became ever more serious, which made the nobles increasingly dissatisfied with Henry's rule. A war led by Simon de Montfort against the rule of Henry III is about to begin.
stage_intro_3057=Under the supervision of Edward I, Scotland elected a new king. Edward I believed that Scotland should become a marquis under English rule and demand its help in fighting against France. The Scots opposed this demand and allied with France.
stage_intro_3058=Under the leadership of William Wallace, the Scottish army continued to attack England. In 1298, Edward I decided to a truce with the kingdom of France and returned to England to concentrate on fighting against the Scots.
stage_intro_3059=After the battle of Falkirk, Scotland was almost completely conquered by England. In 1306, Robert the Bruce took the Scottish throne, and with Edward II's less than satisfactory leadership, the war was about to be reversed.
stage_intro_3060=Roger Mortimer met Isabella after escaping from the Tower of London in 1323. Both of them were very dissatisfied with Edward II and decided to rebel against his rule. In 1326, Isabella and Mortimer secretly returned to England and began their resistance.
stage_intro_3151=After losing Constantinople to the Crusaders, the Nicaea Empire and the Despotate of Epirus became the two largest regimes in the fragmented Byzantine Empire. They both aimed to be the first to revive the empire, but this common objective became the source of the conflicts between the two.
stage_intro_3152=The Nicaea Empire won the final victory in its competition with Epirus to be the exclusive ruler of the empire. Under the leadership of the ambitious Michael VIII, the Nicaea Empire turned its attention to the Latin Empire which has occupied Constantinople.
stage_intro_3153=In 1261, the Nicaea Empire formed an alliance with the Republic of Genoa and was ready to attack Constantinople again. When they found that the Latin garrison and the Venice fleet had not returned from their expedition, they decided not to waste this unique opportunity.
stage_intro_3154=After reestablishing the Byzantine Empire, Michael VIII tried to eliminate the residual forces in the surrounding Latin Empire territories. In 1263, the Byzantine army launched an attack on the Principality of Achaea, but encountered tenacious resistance in capturing its capital.
stage_intro_3155=The failure at the battle of Prinitza put the Byzantine Empire on the defensive in the war in Morea. The problems of mercenary defection and dispersion of troops were also becoming very serious. In 1264, under the leadership of William II, the Latin imperial army launched an attack on the scattered Byzantine forces.
stage_intro_3156=In 1274, the Byzantine Empire launched an attack on John of Thessaly. Facing the massive Byzantine army, John Doukas had no choice but to seek help.
stage_intro_3157=In order to maintain the Empire's control over the Aegean Sea, the Byzantine Empire reorganized its navy. However, the defeats in the battles of Morea and Settepozzi dealt a heavy blow to the Byzantine forces. The Latin lords seized this opportunity to attack the Byzantine navy, anchored at the port of Demetrias.
stage_intro_3158=For the Angevin kingdom of Sicily, Berat is a city of great strategic significance. In 1280, in order to block enemy access to the heartlands of the Byzantine Empire, the emperor sent troops to attack Berat.
stage_intro_3251=In 1302, Michael IX's army was dissolved out of fear for the Ottomans, forcing Andronikos II to send an army across the Bosphorus to support the dire situation in Nicomedia.
stage_intro_3252=In 1321, the young Andronikos III thought that his grandfather was too old and that he should take the throne for himself. The rift in the family prompted a civil war. The Ottomans decided to take this opportunity to capture the city of Bursa.
stage_intro_3253=After regaining Constantinople from the Latin Empire, the Byzantines concentrated too much energy on restoring control over Greece and recalled the troops on the eastern front of Anatolia, which led to a new round of attacks by the Ottoman Empire.
stage_intro_3254=In 1329, the area under the control of the Byzantines in Anatolia had shrunk considerably. In order to secure the surrounding area, Androniko III decided to send troops to Nicomedia, but his army was intercepted and attacked by the Ottoman army in Pelekanon.
stage_intro_3255=The civil strife in Byzantium almost made Byzantium collapse, and John VI turned to the Ottoman Empire for help in rescuing his son, who was facing the allied forces of the Serbian Empire and the Second Bulgarian Empire.
stage_intro_3256=In 1352, Byzantine Empire descended into civil war again, and the Ottomans, as mercenaries, acquired key territories near Gallipoli. In 1354, an earthquake completely changed the situation in Gallipoli.
stage_intro_3257=When the Ottoman Empire began its rapid expansion in Europe after capturing its first fortress in the Balkans in 1352, the Bulgarian emperor Ivan Alexander decided to halt the advance of this army.
stage_intro_3258=After the acquisition of Gallipoli, the Ottoman Empire expanded more rapidly in the southern Balkans. After a series of turbulence and renovation, the Ottoman Empire decided to attack Adrian fort, the third-largest city of the Byzantine Empire.
stage_intro_3351=In 1337, the French parliament decided to reclaim the Duchy of Aquitaine from England, causing immediate conflict between the two sides. In order to seize control of the English Channel, Edward III personally led his fleet to attack the fleet of the French navy.
stage_intro_3352=After seizing control of the sea, Edward III led his troops from Portsmouth and began his attack after reaching the northern coast of France. The powerful French army was ready to defend and the two armies were about to meet around Crécy.
stage_intro_3353=Edward III was delighted by the victory of the Battle of Crécy, and the British army took advantage of the victory and decided to capture Calais, which gained the bridgehead of the European continent, but did not expect the battle to be so difficult.
stage_intro_3354=In September 1346, while the English army was besieging Calais, Philip VI hastily asked David II to attack England in the hope of forcing Edward III to divide his forces and return to save his homeland. David, faced with a long-standing and old alliance with France, decided to send an army to invade England.
stage_intro_3355=Brittany was in a very important geographical position, and the battle for the succession of Brittany involved both Britain and France, who wanted Brittany to favor themselves to gain an advantage on the battlefield.
stage_intro_3356=In 1356, Prince Edward, known as the Black Prince, became the cavalry commander of the British army. He adopted a scorched earth policy after leading his army to France, achieving considerable success. To take revenge on the Black Prince, King John II of France rapidly marched his troops to catch up with the British army.
stage_intro_3357=King John II of France was captured at the Battle of Poitiers and later ceded a large territory to England, while Elwha III's ambitions did not stop there, he decided to launch an expedition and was crowned King of France at Reims!
stage_intro_3358=Although France was already devastated, the country could not live without a king. Prince Charles decided to go to Reims to be crowned king, and Edward III decided to stop the coronation by cutting the road between Paris and Reims.
stage_intro_3359=After the Battle of Mauron, there was a long truce between the Breton successors, but both sides had been building up their strength for a long time with the support of Britain and France, and they were both ready for a decisive battle.
stage_intro_3360=In October 1369 Bertrand, who was not a senior nobleman, was appointed by Charles V as the new commander-in-chief of the army, a break with convention that paid off for the French king! As winter approached, there was a renewed dispute within the British army over how to spend the winter. The French army took this opportunity to attack the British army.
stage_intro_3361=In 1372, in response to the Franco-Castilian alliance established in 1368, King Castile sent a fleet to Aquitaine to assist the French army. The fleet encountered an English fleet heading for France off La Rochelle.
stage_intro_3362=In his later years, Edward III was not interested in war, and the death of Edward the Black Prince made him lose confidence even more. His other son, John of Gaunt, became the commander and made Great Chevauchée many times in France, causing overwhelming losses to the French population.
stage_intro_3451=Charles VI had become a mad king, the struggle between the royals was getting more and more intense, and the instability of power in France gave the young Henry V the opportunity, and in 1415 he decided to follow the route of his great-grandfather's attack to conquer France and become king of both countries.
stage_intro_3452=Henry V's victories in France did not bring much real gain to England, and the support given by Parliament became less and less, and he decided to occupy Rouen to gain more French territories.
stage_intro_3453=The struggle between the two parties left France completely divided, the assassination of John the Fearless left the Duchy of Burgundy completely fallen to England, and the signing of the Treaty of Troyes made Henry V the nominal heir to the French throne. And at this time Dauphin Charles gained the support of Scotland, and the Great War was triggered inadvertently.
stage_intro_3454=The victory at the Battle of Beaugency pleased Dauphin Charles, and the French nobles were ready to take advantage of the victory to recapture more lost territories. And Henry V was planning a new round of attacks at this time.
stage_intro_3455=Henry V and Charles VI had been dead for 2 years, Charles VII had not yet been crowned, and Henry VI, being young, was under the regency of the Duke of Bedford. 2 years of conflict between the two sides, with each side winning and losing, each intending to destroy the other's main force once and for all.
stage_intro_3456=In stark contrast to the British offensive was the sluggish response of the French government, the lack of funds for the battle, the aristocracy on its own, the scales of victory never tipped in favor of France, successive blows almost made Charles VII desperate.
stage_intro_3457=If Orléans were captured by the British, the last barrier in central France would be broken. It was a dark moment for Charles VII, but God gave light to this precarious country, and a young girl named Jeanne d'Arc stepped forward.
stage_intro_3458=The news of Orléans' success lifted the whole of France, and the French army, inspired by Joan of Arc, prepared to clear all British positions throughout the Loire Valley.
stage_intro_3459=Joan of Arc wanted Charles VII to abandon his plans to attack Normandy and go to Reims to be crowned. This further weakened the morale of the British army. The British army mobilized the elite troops that had previously aided the Huss War to block the attack.
stage_intro_3460=Because of insufficient support, Joan of Arc was captured at the Battle of Compiègne and died 2 years later, which provoked her comrades to take revenge, and even the French underclass joined in the struggle.
stage_intro_3461=In 1435, the death of the regent Duke of Bedford left England without an ally in the Duchy of Burgundy, and with the territories of Normandy in disarray, Charles VII decided to take advantage of this opportunity to recover Paris.
stage_intro_3462=Despite the enormous cost of the war against France between 1435 and 1436, England was still unwilling to make peace with Burgundy, and the Duke of Burgundy decided to stand against England and seize Calais.
stage_intro_3463=France had recovered greatly under Charles VII, while the last English territories in France were only Normandy and Giennes-Gascogne, and England decided to fight back with a large support of troops from home.
stage_intro_3551=Ugljesa got the news that the majority of the Ottoman army was leaving Europe and marching toward Anatolia. It was the perfect time to eliminate the Ottoman power in the Balkans, so they launched a sudden raid.
stage_intro_3552=Dissatisfied with Balsa II's expansion of his territory through marriage, Carlotopia of the House of Thopia invited the Ottoman Empire to launch an attack on the Principality of Zeta, to which Murad I readily agreed.
stage_intro_3553=Murad I left the Balkans in 1387 to deal with Anatolian affairs, while the vassal forces of the Balkans tried to break away from Ottoman dominance and form alliances to challenge their authority.
stage_intro_3554=Murad I returned from Anatolia in 1388 and immediately launched a blitzkrieg against Bulgaria. The Bosnian ruler also immediately provided aid to Bulgaria.
stage_intro_3555=Kosovo connected two regions, Macedonia and Serbia. If the Ottomans captured it, they would further encroach on the large territory of Serbia. And the allied forces organized by Prince Lazar fought a fierce battle against the Ottomans in the Kosovo region.
stage_intro_3556=After Murad I was accidentally assassinated, his son Bayezid I succeeded to the throne. Simultaneously, the Hundred Years' War between England and France entered a period of truce. In order to save the dying Eastern Rome, the knights of the West united to launch the Crusades.
stage_intro_3557=When Bayezid I was ready to deliver the final strike to Byzantium, Timur from the East led 150,000 troops to the city. The survival of the Ottoman Empire had become only a matter of second, which allowed Byzantium to breathe.
stage_intro_3558=The Battle of Ankara, where Bayezid I was captured and died of depression, was followed by a struggle within the Ottoman Empire that eventually ushered in a new Sultan, Murad II. However, the temporary weakness of the Empire still provoked rebellions from the subordinate states!
stage_intro_3559=The Venetians went beyond declaring war on the Ottoman Empire in order to gain full autonomy over the Thessaloniki region, which the sultan could not tolerate, and therefore sent a large army to besiege!
stage_intro_3560=Pope Eugene IV summoned the armies of several countries, including Poland and Hungary, to launch a new round of crusades. Murad II, who had already abdicated at that time, had to reorganize his army to fight the onslaught of Crusaders.
stage_intro_3561=The Regent John Hunyadi had prepared for four years to avenge the battle-dead king. He led the allied Hungarian and Wallachian armies in 1448 and launched an assault on the Ottoman Empire.
stage_intro_3562=In 1451, Mehmed II succeeded to the throne, and he spent two years in preparation, customizing giant cannons and muskets, building coastal fortresses, and blocking the straits. Constantinople, a city that had stood for a thousand years, has welcomed its most mighty enemy.
stage_intro_3651=One year after the attack of lunacy, Henry VI regained his sobriety. With the support of Queen Margaret of Anjou, the Duke of Somerset was reinstated and Richard, Duke of York, was forced to leave the court after losing his position as Lord Protector. 1455 saw Richard, Duke of York, disgruntled with the Duke of Somerset, join forces with the Neville House and march on London with the intention of eradicating the Duke of Somerset.
stage_intro_3652=With the end of the First Battle of St Albans, the Duke of York cleared out most of his rivals at court and returned to his position as Lord Protector. Sadly, this did not last long, and at the beginning of 1456, the Duke of York was forced to resign as Lord Protector when his bill to reclaim his lands for the Crown was rejected by Parliament. At the same time, Queen Margaret was secretly organizing an attempt to regain royal power, and in 1459 the conflict between the two sides intensified when the Yorkist Earl of Salisbury sent his troops south to meet the Duke of York; Margaret immediately sent her troops to intercept them and an encounter broke out at Blore Heath.
stage_intro_3653=The Duke of York was not able to advance much further after his successful union with the Earl of Salisbury, as they were blocked by an army under the banner of King Henry VI, which was about two to three times as numerous as theirs. The disparity between the two sides forced the Duke of York to order his troops to fall back and encamp, and to write to the King to express his loyalty. But the previous battle at Blore Heath had caused him to forfeit the king's trust, and a mighty battle was inevitable.
stage_intro_3654=The loss of the battle of Ludford Bridge left the House of York at court in shambles, and the House of Lancaster gradually grew in power and acquired some of the former Yorkish domains. Although the Duke of Somerset was nominally given Calais, which had belonged to Warwick the Kingmaker, he refused to accept the Duke of Somerset's dominion. In January 1460 Warwick pre-emptively attacked the Lancastrian army stationed at Sandwich, which was preparing to attack the Calais area, and made its way west into London. The Lancastrian army was informed of this and quickly set up a defensive position at Northampton to hold off the onrushing Yorkish army.
stage_intro_3655=After the Battle of Northampton, Richard, Duke of York, passed an Law. Which read "Richard and his heirs may succeed to the throne when the King dies", meant that he was only one step away from the zenith of power. But there was one last obstacle before this step: the Queen, Margaret, called on the allies of the House of Lancaster to rally in Kingston-upon-Hull and try to march south into London. On receiving the news, Richard, Duke of York, quickly assembled a force to move north to meet them. Due to the haste with which it was sent, this force was not only less numerous than its opponents but also poorly supplied. Richard, Duke of York, was outmatched in the first encounter and had to retreat to Sandal Castle to await support.
stage_intro_3656=Richard, Duke of York, was killed after his defeat at Wakefield Plain, and his son, Edward IV, succeeded him to the title of Duke. Although Edward IV was only 18 years old at the time, he showed leadership and command beyond his years. Only a month after the defeat of Richard, Duke of York, Edward IV led his army into a fierce battle with the Lancastrian army at Mortimer's Cross.
stage_intro_3657=After the Battle of Mortimer's Cross, while Edward IV was regrouping his forces at Hereford, Queen Margaret's allies quickly commanded an attack from north to south. In just half a month's time, this army of tens of thousands was approaching London, and Warwick the Kingmaker led his troops to meet them. Coincidentally, like the first meeting between the Yorkers and Lancasters six years earlier, this great battle took place in the town called St Albans, but this time the confrontation ended in a completely different way than it had six years earlier.
stage_intro_3658=Despite the victory of Margaret's army at St Albans, the citizens of London refused to welcome them into the city due to a series of atrocities committed by the army in the aftermath of the battle, and Margaret had no choice but to retreat north. Shortly afterward, Edward IV, who had won the hearts of the people in London, was elected king and the former Henry VI was deposed. When the news reached Margaret, she gathered almost all the opposition to the House of York in the north of England and tried to eliminate Edward IV, bringing about one of the most brutal battles on English soil.
stage_intro_3659=At the Battle of Towton, Edward IV defeated most of the Lancastrians who opposed him. In the years that followed, Edward IV tried to turn his former enemies into friends by various means, including his former nemesis, Henry Beaufort, 3rd Duke of Somerset, who met secretly with the deposed Henry VI at the end of 1463 and soon started another rebellion. An enraged Edward IV ordered John Neville to put down the rebellion, this time to destroy the Duke of Somerset once and for all.
stage_intro_3660=The Duke of Somerset defeated at Hedgeley Moor, retreated to the coast of Hexham. He split his army into three and tried to build fortifications to keep his pursuers away south of Hexham. But John Neville's pursuit was swift and he was not about to give the Duke of Somerset a chance to catch his breath.
stage_intro_3751=In 1469, a man named "Robin of Redesdale" rebelled several times in the north of England, and Warwick, the kingmaker, who had a long-standing grudge against Edward IV, took advantage of the rebellion and attacked the army that came to put it down at Edgecote. 
stage_intro_3752=In 1470 Warwick attempted to foment another rebellion and Edward IV pre-empted it by routing the rebels at Hornfield, also known as the Battle of Losecote Field because many of the rebels stripped off their marked clothes as they fled.
stage_intro_3753=After the Battle of the Losecote, Warwick the Kingmaker fled overseas and allied himself with Margaret of Anjou in exchange for the support of the House of Lancaster, and in April 1471, on a foggy morning, Edward IV and Warwick the Kingmaker, former comrades in arms, went to their final battle.
stage_intro_3754=At the same time as the Battle of Barnet, Margaret of Anjou landed on the Isle of England at the head of the overseas forces of the House of Lancaster and began to march on London. Edward IV learned of this at the end of the Battle of Barnet, and despite the fact that his army was very tired, he led it into a duel with Margaret.
stage_intro_3755=When Edward IV died in April 1483, his brother Richard was appointed Lord Protector, and in June, when Edward V disappeared, Richard was crowned King, known as Richard III. Edward IV's old allies saw this as a usurpation of power and switched their support to Henry Tudor. Soon after, a rebellion broke out again in England.
stage_intro_3756=On Christmas Day 1483, Henry Tudor of the House of Lancaster married the daughter of Elizabeth Woodville of the House of York, and the two families united to become the House of Tudor, only to fight a common enemy, Richard III. On 22 August 1485, Henry Tudor and Richard III fought on Bosworth Plain in a Duel.

