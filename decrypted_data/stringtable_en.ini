stage_intro_4601=Yelü Dashi was born in 1087 in Shangjing, Liao, and was called "Dashi Linya" because he was a successful candidate and entered the Hanlin Academy when he was young.
stage_intro_4603=In order to strengthen the strength of Western Liao, Yelu Dashi decided to expand westward. In 1131, Yelu Dashi launched an attack on the Eastern Khara Khanate by way of Gaochang Hui-falcon.
stage_intro_4605=After the death of Ahmad Khan of the Eastern Karakhanate, his son Ibrahim succeeded to the throne, while the forces under him, such as Georgi, also took the opportunity to start a rebellion. Ibrahim had to send a request for help to Yelu Dashi after he failed to suppress it.
stage_intro_4607=In 1137, Xiliao once again expanded westward, this time their target was the Western Khara Khanate which had already submitted to the Seljuk Empire. The Xiliao army had an encounter with the enemy in the Fergana Valley.
stage_intro_4609=In 1141, Mahmud Khan asked the Seljuk Sultan Sanjar for help, and Sanjar led an army of 100,000 men eastward to meet Yelu Dashi's army in the Katwan Steppe.
stage_intro_4611=After conquering the West Khara Khanate, Yelu Dashi sent his general Eirbusi to conquer Khwarezmia and from then on Western Liao began to enter its heyday.

