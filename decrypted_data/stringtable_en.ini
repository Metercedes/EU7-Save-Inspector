general_desc_Tancred=He was a minor Norman lord about whom not much is known. But his twelve sons created many legends in Europe.
general_desc_William Iron Arm=He was the eldest son of Tancred de Hauteville and his wife Muriella, and the founder of the Hauteville family fortune. During the Siege of Syracuse, he single-handedly killed the Emir of Syracuse, earning him the nickname "Iron Arm".
general_desc_Drogo=He was the son of Tancred de Hauteville and his wife Muriella, William's brother, a Norman leader. He fought with William in the Battle of Sicily and eventually became a lord.
general_desc_Humphrey=He was the son of Tancred de Hauteville and his wife Muriella, William's brother. After the deaths of William and Drogo, he gave custody of his son to Guiscard.
general_desc_Roger Bosso=The youngest son of Tancred de Hauteville and his wife Fressenda, he assisted his brother Guiscard in the conquest of Southern Italy and Sicily and was the founder of the Kingdom of Sicily.
general_desc_Emma of Hauteville=She was a daughter of Guiscard and Alberada. Both of her two sons joined the crusade.
general_desc_Bohemond I=He was a son of Robert Guiscard and Alberada. He was the leader of the First Crusade and the founder of the crusader state of the Principality of Antioch.
general_desc_Roger Borsa=He was the son of Robert Giscard and Sikelgaita. His ambitious mother arranged for him to succeed his father, and he and his brother Bohemond fought long and hard over the succession.
general_desc_Roger II=He was the founder of the Kingdom of Sicily and was an outstanding monarch who fought off several empires during his reign. The Kingdom of Sicily survived for seven centuries.
general_desc_Tancred Prince of Galilee=He was Tancred, son of Emma of Hauteville and Odo the Good Marquis, and served as Regent of the Duchy of Antioch during Bohemond's absence.
general_desc_William I the Bad=He was the fourth son of Roger II and was known as  "the Bad" or "the Wicked".
general_desc_Constance I=She was the daughter of Roger II and played an important role in the eventual occupation of Sicily by Hauteville. She later married the Holy Roman Emperor Henry VI and became Empress Dowager.
general_desc_William II the Good=He was the son of William the Bad, and his reign was hailed as a golden age of peace and justice.
general_desc_Frederick II=He was the son of Emperor Henry VI of the Hohenstaufen dynasty and Queen Constance. He ruled a territory extending from Sicily to Germany, participated in the Crusades, and conquered Jerusalem.

