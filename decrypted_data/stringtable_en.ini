battle_talk_130903=Let's fight till the death!
battle_talk_131001=Although we were tired from our non-stoping march, but now the British are unprepared, strike them!
battle_talk_131002=What? Where did these French army came from? There is still war ongoing in this damned cold weather! Keep up the spirit! Or you will face nothing but death.
