battle_talk_140605=Take the rest of the strongholds by storm! The British are routed!
battle_talk_140701=Let's go save the soldiers and people in the city!
battle_talk_140702=Finally a smooth entry into the city, this time Orleans may be saved!
battle_talk_140703=I hope the British troops will withdraw on their own, I do not expect or like the killing.
battle_talk_140704=If you want to fight, let the sword in your hand to decide the fate of the city!
battle_talk_140705=Let's pull out the strongholds around Orleans and let's liberate the city once and for all!
battle_talk_140801=The voice in my head tells me to go forward! To save more of the suffering people of France!
battle_talk_140802=We will follow you to the death!
battle_talk_140803=Go to the rescue of our troops, the French army does not know what kind of drugs they have taken? Why is their morale so high?
battle_talk_140804=Do not be intimidated by the solid cities before you, God has put them at our disposal! Even if they are suspended in the clouds, we can defeat them!
battle_talk_140805=No! How can we lose!
battle_talk_140901=Sound the trumpet! The time has come to follow the noble King Charles to Reims for his coronation!
battle_talk_140902=Draw out the best troops to surround them and never let them reach Reims!
battle_talk_140903=Strike! Crush all enemies that stand in our way!
battle_talk_140904=I was crowned king by the inspiration of God!
battle_talk_141001=I have captured Joan of Arc!
battle_talk_141002=Has God abandoned me?
battle_talk_141003=Revenge for Joan of Arc! Let's trample this land!
battle_talk_141004=I will bring the war to the whole of British soil!
battle_talk_141005=SaintDenis! I will spread the will of Jeanne d'Arc throughout France!
battle_talk_141101=Clear the strongholds around Paris and recapture the capital! Jeanne's last wish is mine to fulfill!
battle_talk_141102=Reclaim Paris! Let the iris bloom again in Paris!
battle_talk_141103=Help for Paris! The French army is coming with a vengeance! I don't know if the Lord of the City will be able to hold on this time.
battle_talk_141104=Looks like it's impossible to hold, so run away.
battle_talk_141201=Capture Calais! Sort of a gift to Charles VII!
battle_talk_141202=This city has been in our hands for a hundred years, how can we let you take it so easily!
battle_talk_141203=I will clean up the troops at sea!
battle_talk_141301=Take back Normandy and drive the British across the Channel!
battle_talk_141302=We will split up and we will liberate Normandy once and for all!
battle_talk_141303=Yes! This is a moment I've been waiting for for a long time.
battle_talk_141304=Let's hope it's not too late. We will not lose!
battle_talk_141305=It's time to take up the same burden as my father! This city is mine to guard!
battle_talk_141306=Let glory return to France, let us return in triumph! It's time to get the British out of France!
battle_talk_141307=It's time for us to leave France.

;史诗战役对话
battle_talk_200001=I will eventually light the war to Rome, the capture of Gaul is only my first step, this will be the place where I feed the war horses.
battle_talk_200002=We shall take this opportunity to take away their lands and Francia will be united by me!
battle_talk_200003=Come on, let's go! I'll send you all to your graves!
battle_talk_200004=Soldiers, for the sake of your families and your land, we can't take another step backward, charge!
battle_talk_200005=Let's go! Let's kill the sheep!
battle_talk_200006=Kill it!
battle_talk_200007=We're finally catching up, we're taking back everything that was taken from us by the Huns!
battle_talk_200008=Defend your home to the death!
battle_talk_200009=The duel has begun! The survival of the Empire depends on this battle!
battle_talk_200010=We have finally defended ourselves against the Huns! Viva Roma!
battle_talk_200011=The hordes of Rome have been destroyed by me, and Rome will finally be conquered by me!
battle_talk_200101=Warriors, sharpen your blades and feed your horses. Let the Franks tremble under our iron horses!
battle_talk_200102=Allahu Akbar! After the victory of this battle, we will spread the teachings more widely!
battle_talk_200103=Haven't you learned your lesson from last time? You'll still be defeated this time!
battle_talk_200104=No, Toulouse is not safe! I must ask Charlie for help now.
battle_talk_200105=I will submit to you my king, and ask you to come to my rescue.
battle_talk_200106=I accept your submission and I will gather my troops to rescue them as soon as possible.
battle_talk_200107=If these camel riders cannot be stopped, not only the Aquitaine region but the entire Frankish kingdom will perish!
battle_talk_200108=Toulouse is occupied! Move north quickly before winter arrives!
battle_talk_200109=Assemble the cavalry!
battle_talk_200110=Defend with defensive infantry and keep them from advancing any further with spears!
battle_talk_200111=No! I can't believe I failed. I'm so upset!
battle_talk_200112=Viva Frank!
battle_talk_200113=Allahu Akbar. The victory is still ours! We will trample all over Europe with our iron horses!
battle_talk_200114=It's getting cold down! We don't have enough winter clothes! Quickly!
battle_talk_700301=Gao Xianzhi occupied my city and took my parents and the princess, he deceiving us too much, I can only rebel.
battle_talk_700302=The Prince of Chach still does not surrender, it seems that I can only spend some time wiping the Chach from the map.
battle_talk_700303=Although our army has just returned from the war, but it has a great advantage over the tired Tang army that came from the expedition, let's see what the Tang army is capable of.
battle_talk_700304=I didn't expect the Tang army to be this fierce, but fortunately I had a backhand.
battle_talk_700305=I only do this for the money! Gao Xianzhi, don’t blame me for that!
battle_talk_700306=This is not good, Qarluq dare to rebel against us, we are surrounded.
battle_talk_700307=By Allah's blessing, this great victory will certainly make my reputation flourish.
battle_talk_700308=The mighty Tang! Even if we are attacked from two sides, we still can't resist the attack of my cavalries!
battle_talk_700309=The cities and my people are willing to surrender to the Great Tang.
battle_talk_700310=Only the outstanding talent can recognize current trends.
battle_talk_700401=The throne of England only belongs to me, and since we can defeat the mighty Norwegians we can also drive out the Normans!
battle_talk_700402=They have just recently fought a great battle and have not yet repaired, our cavalry can easily tear apart their defenses!
battle_talk_700403=Take the high ground! Hold off the cavalry with spears!
battle_talk_700404=William is dead! Normans surrender now!
battle_talk_700405=Don't retreat! I'm still alive! The sea is behind us, there's no way back, let's regroup and attack!
battle_talk_700406=Harold is dead! The throne of England belongs to me after all! A new era has arrived!
battle_talk_700407=The Normans are finally defeated! The throne of England does not belong to any outsider!

;引导对话
tutorial_talk_1001=I think you need a tutorial now.
tutorial_talk_1101=Next, I'll guide you through the Legend of Heroes!
tutorial_talk_1102=For Generals to enter Legend of Heroes, they must have their own units. So, let's go to the [#F4d181#HEADQUARTERS] and recruit personal units for your commanders!
tutorial_talk_1201=You've passed the first chapter. Our Generals can now recruit personal units. Tap the [#F4d181#Recruitment zone next to the General's avatar]!
tutorial_talk_1301=Now, let's recruit the [#F4d181#Legions]. Select it and tap [#F4d181#Recruit]!
tutorial_talk_1501=Next, tap [#F4d181#×] in the upper left corner to exit the Headquarters!
tutorial_talk_1601=The [#F4d181#Legend of Heroes] is calling us. Tap it now!
tutorial_talk_1701=Finally, tap [#F4d181#Enter] to start Legend of Heroes!
tutorial_talk_2101=[#F4d181#Enlistments] or [#F4d181#War Gear Fragments] can be acquired with [#F4d181#Mercenary Order] or [#F4d181#Blueprint]. Corresponding troops and equipment can be assembled as long as [#F4d181#Enlistments] and [#F4d181#War Gear Fragments] reach a certain number.
tutorial_talk_2201=Click the indicated position to check available Recruit [#F4d181#Enlistments] and [#F4d181#War Gear Fragments] and locked Recruit [#F4d181#Enlistments] and [#F4d181#War Gear Fragments].

speak_strong_attack_1=My troops are unstoppable. Follow me!
speak_strong_attack_2=The enemies are no match for me, and the situation is under my control.
speak_weak_attack=Attack with full force and destroy all enemies.
speak_destroy_building_1=The enemy's walls were overwhelmed and the city was about to be overrun.
speak_destroy_building_2=Even the strongest walls cannot hold our attack.
speak_less_round_1=If the battle lasts too long, the situation might get out of control.
speak_less_round_2=Accelerate the pace of the attack. There is not much time left for us.
speak_less_stength=My troops need support.
speak_need_hitback=My troops are under attack.
speak_less_morale=The troops are suffering from low morale and the soldiers are in no mood for fighting.

speak_onwait_1=Where are the enemies? My blades are eager to fight.
speak_onwait_2=I decide to return to my hometown as soon as the war is over.
speak_onwait_3=Sometimes, mixed forces are more effective in combat than those with a single arm.
speak_onwait_4=Stuck in a stalemate? Why not try using war drums to motivate the troops?
speak_onwait_5=I really want to have a drink. I've had enough of this place.
speak_onwait_6=The enemies always appear and then disappear inexplicably.
speak_onwait_7=I long for a real fight.

