stage_intro_1601=One year after the attack of lunacy, Henry VI regained his sobriety. With the support of Queen Margaret of Anjou, the Duke of Somerset was reinstated and Richard, Duke of York, was forced to leave the court after losing his position as Lord Protector. 1455 saw Richard, Duke of York, disgruntled with the Duke of Somerset, join forces with the Neville House and march on London with the intention of eradicating the Duke of Somerset.
stage_intro_1602=With the end of the First Battle of St Albans, the Duke of York cleared out most of his rivals at court and returned to his position as Lord Protector. Sadly, this did not last long, and at the beginning of 1456, the Duke of York was forced to resign as Lord Protector when his bill to reclaim his lands for the Crown was rejected by Parliament. At the same time, Queen Margaret was secretly organizing an attempt to regain royal power, and in 1459 the conflict between the two sides intensified when the Yorkist Earl of Salisbury sent his troops south to meet the Duke of York; Margaret immediately sent her troops to intercept them and an encounter broke out at Blore Heath.
stage_intro_1603=The Duke of York was not able to advance much further after his successful union with the Earl of Salisbury, as they were blocked by an army under the banner of King Henry VI, which was about two to three times as numerous as theirs. The disparity between the two sides forced the Duke of York to order his troops to fall back and encamp, and to write to the King to express his loyalty. But the previous battle at Blore Heath had caused him to forfeit the king's trust, and a mighty battle was inevitable.
stage_intro_1604=The loss of the battle of Ludford Bridge left the House of York at court in shambles, and the House of Lancaster gradually grew in power and acquired some of the former Yorkish domains. Although the Duke of Somerset was nominally given Calais, which had belonged to Warwick the Kingmaker, he refused to accept the Duke of Somerset's dominion. In January 1460 Warwick pre-emptively attacked the Lancastrian army stationed at Sandwich, which was preparing to attack the Calais area, and made its way west into London. The Lancastrian army was informed of this and quickly set up a defensive position at Northampton to hold off the onrushing Yorkish army.
stage_intro_1605=After the Battle of Northampton, Richard, Duke of York, passed an Law. Which read "Richard and his heirs may succeed to the throne when the King dies", meant that he was only one step away from the zenith of power. But there was one last obstacle before this step: the Queen, Margaret, called on the allies of the House of Lancaster to rally in Kingston-upon-Hull and try to march south into London. On receiving the news, Richard, Duke of York, quickly assembled a force to move north to meet them. Due to the haste with which it was sent, this force was not only less numerous than its opponents but also poorly supplied. Richard, Duke of York, was outmatched in the first encounter and had to retreat to Sandal Castle to await support.
stage_intro_1606=Richard, Duke of York, was killed after his defeat at Wakefield Plain, and his son, Edward IV, succeeded him to the title of Duke. Although Edward IV was only 18 years old at the time, he showed leadership and command beyond his years. Only a month after the defeat of Richard, Duke of York, Edward IV led his army into a fierce battle with the Lancastrian army at Mortimer's Cross.
stage_intro_1607=After the Battle of Mortimer's Cross, while Edward IV was regrouping his forces at Hereford, Queen Margaret's allies quickly commanded an attack from north to south. In just half a month's time, this army of tens of thousands was approaching London, and Warwick the Kingmaker led his troops to meet them. Coincidentally, like the first meeting between the Yorkers and Lancasters six years earlier, this great battle took place in the town called St Albans, but this time the confrontation ended in a completely different way than it had six years earlier.
stage_intro_1608=Despite the victory of Margaret's army at St Albans, the citizens of London refused to welcome them into the city due to a series of atrocities committed by the army in the aftermath of the battle, and Margaret had no choice but to retreat north. Shortly afterward, Edward IV, who had won the hearts of the people in London, was elected king and the former Henry VI was deposed. When the news reached Margaret, she gathered almost all the opposition to the House of York in the north of England and tried to eliminate Edward IV, bringing about one of the most brutal battles on English soil.
stage_intro_1609=At the Battle of Towton, Edward IV defeated most of the Lancastrians who opposed him. In the years that followed, Edward IV tried to turn his former enemies into friends by various means, including his former nemesis, Henry Beaufort, 3rd Duke of Somerset, who met secretly with the deposed Henry VI at the end of 1463 and soon started another rebellion. An enraged Edward IV ordered John Neville to put down the rebellion, this time to destroy the Duke of Somerset once and for all.
stage_intro_1610=The Duke of Somerset defeated at Hedgeley Moor, retreated to the coast of Hexham. He split his army into three and tried to build fortifications to keep his pursuers away south of Hexham. But John Neville's pursuit was swift and he was not about to give the Duke of Somerset a chance to catch his breath.

campaign_desc_16=In July 1453, the news of the defeat at Castillon caused King Henry VI to suffer a fit of madness in shock and lose his ability to rule. The two great houses of Lancaster and York in England clashed for supremacy, which turned into war. The war was also known as the 'War of the Roses', as the crests of the two houses were the Red Rose and the White Rose respectively.
campaign_desc_17=When Edward IV became King of England, he tried to reconcile with his former enemies and brought peace to England for a short time. But Edward IV's policy of reconciliation caused a rift between him and his former allies, and in 1469, Edward IV's once most loyal subordinate, Warwick the Kingmaker, rebelled, bringing a new wave of unrest to England.

campaign_end_desc_16=After the Battle of Hexham, the military power of the House of Lancaster was largely wiped out and the House of York became the ruler of England. Unlike before, Edward IV did not take command of the battle himself, as he had more important things on his mind - secretly preparing for his wedding to a woman. The name of this woman was Elizabeth Woodville, later commonly known as the 'White Queen'.
campaign_end_desc_17=The end of the war marked the end of the Angevin Dynasty's rule in England and ushered in the era of the Welsh Tudor Dynasty. It also marked the end of the Middle Ages in England and the beginning of a new Renaissance era.

general_desc_Manuel I=The Byzantine emperor in the 12th century, during whose reign the Komnenos dynasty saw its last flourish, the empire recovered its military and economic strength, with a flourish of culture.

