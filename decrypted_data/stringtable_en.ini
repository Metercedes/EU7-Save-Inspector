battle_talk_3020201=Alexios' elite center army is nearly undefeatable, but continually breaking down the peripheral units might trigger a rout.
battle_talk_3020202=The enemy Varangian Guards are too deep inside, we need to demoralize them!
battle_talk_3020203=Oh, I should get out of here.
battle_talk_3020204=Coward!
battle_talk_3020301=Those Greeks are here again.
battle_talk_3020302=There's an ambush!
battle_talk_3020303=All our supplies are still left over there. We can't let them take over the camp.
battle_talk_3020304=The spirit of the army is breaking down. Retreat.
battle_talk_3020305=While Bohemond thought he had won yet another victory, Alexios took supplies and loot, which dismantled the expedition, and Bohemond had to return to Italy to make further plans.
battle_talk_3020501=Naples pays us a lot of money in tribute, and they only ask us to leave them out of it.
battle_talk_3020502=Although he won the war, Bohemond was unable to fight against the Papacy, and after many compromises, he secured for himself the title of Count of Taranto, but the greedy Bohemond would not be satisfied with this, and he vowed to build his own kingdom.
battle_talk_3020801=My men are building a siege tower, which will be completed in about 3 days, and a direct forceful attack to capture the gates on either side will also allow us to break through the walls.
battle_talk_3020802=I have my tunnel ready as well and will be able to dig into the south wall in about 2 days, or if you break through the south side first, my men will dig right into the inner wall.
battle_talk_3020803=These guys aren't like the last rabble. I'll have to regroup my troops.
battle_talk_3020804=We are powerless to continue the resistance. Tell the Greeks we agree to surrender.
battle_talk_3020805=After secret negotiations between the Seljuk Turks, the city was occupied by Alexios' army. Because of this, Tancred was very distrustful of the Byzantines.
battle_talk_3020901=Let loose your arrows and finish off these barbarians before they get a foothold.
battle_talk_3020902=We're coming, hold on.
battle_talk_3020903=Looting these villages will allow us to get replenished, as well as grabbing some locals as guides to reveal some hidden mountain paths, which can be used to bypass the enemy if necessary.
battle_talk_3021001=We can't do anything about the high walls, and with the enemy on the move, the transports at Port St. Simon are our only steady source of supplies, hold them.
battle_talk_3021002=Can't let Kerbogha continue to ride over us little Emirs, take him out while he's in a heated battle with those outsiders!
battle_talk_3021003=The sudden death of Kerbogha caused the Seljuks to decide to retreat, and Bohemond finally gained Antioch.
battle_talk_3021201=There's an ambush!
battle_talk_3021202=Oh, my God. Bohemond has been captured by the Turks!
battle_talk_3021203=Bohemond was punished for his recklessness by being captured by the enemy.
battle_talk_3021301=Enemy reinforcements. There must be a large force nearby.
battle_talk_3021302=The Levantine united against us. We have no chance of winning. Retreat.
battle_talk_3021303=Very sadly the campaign failed, and Bohemond gained neither territorial expansion nor plundered resources.
battle_talk_3021501=Stay here any longer and our men will starve to death. There's no need to be buried with Bohemond.
battle_talk_3021502=I heard that you took 500,000 gold coins from Alexios, and now it seems to be true.
battle_talk_3021503=With almost the entire elite of the empire gathered here, and having to provoke them into infighting first, His Majesty is so attached to that Norman.
battle_talk_3021504=You lost, and my Varangian Guard has not officially entered the war, so I advise you not to get any ideas.
battle_talk_3021505=If we hadn't helped you against those Turks in the first place!
battle_talk_3021506=There are no ifs on the battlefield, go home my old rival, and it's time for me to move on to the next battlefield.
battle_talk_3021507=Perhaps Alexios was too familiar with the arch-enemy, and once again Bohemond was defeated by this Eastern Roman Emperor.

