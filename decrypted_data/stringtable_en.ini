battle_talk_160101=How dare a man like the Duke of Somerset, a deserter from the battlefield, get his hands on military and political power? I must destroy him for the sake of the country!
battle_talk_160102=Fight for the King!
battle_talk_160103=Forward! Destroy this traitor!
battle_talk_160104=The enemy's front line defense is formidable, and we can try to detour around the flanks!
battle_talk_160201=The current is so swift that forcing the river crossing would cause the troops to suffer heavy losses, and ways must be found to draw the enemy into pursuit.
battle_talk_160202=The Queen has ordered me to reinforce Baron Audley, but I will not wager on anything I am not sure of.
battle_talk_160203=After them, don't let them get away!
battle_talk_160204=They got fooled! Archers, release your arrows to intercept the enemy crossing the river!
battle_talk_160205=The tide of battle is clear, do it!
battle_talk_160301=Soldiers of York, lay down your weapons, the King will forgive you!
battle_talk_160302=Don't be fooled by him, our King is dead!
battle_talk_160303=I am willing to serve the King,  and I have intel on York's army!
battle_talk_160304=The morale of the army had collapsed and it had come to this, so we had to split up and break out.
battle_talk_160401=The heavy rain has rendered the artillery unusable and the situation is not in our favour!
battle_talk_160402=The enemy rejects to negotiate with us, so let's tell the winner on the battlefield.
battle_talk_160403=The House of York promised to give me sufficient benefits that I would offer them help.
battle_talk_160404=The enemy is fleeing! It's a great opportunity to pursue!
battle_talk_160405=No one is allowed to harm the King or the commoners, our targets are the nobles, the knights, and their retainers!
battle_talk_160501=Although we are now besieged by the enemy, everything will be fine as soon as reinforcements arrive.
battle_talk_160502=I will make the Duke of York pay back in blood!
battle_talk_160503=How dare they attack my grain convoy! Come with me! Destroy them!
battle_talk_160504=Attack! Round up the Duke of York!
battle_talk_160505=Hang the head of the Duke of York out in public with the paper crown on! Let those who covet the throne know what will happen to them!
battle_talk_160601=Speed up the march! We need to intercept the Lancasterian army!
battle_talk_160602=The army has been very tired from a long journey and we need to lift their morale!
battle_talk_160603=Oh my God! What's that? Why are there three suns in the sky?
battle_talk_160604=Warriors! Do not be afraid! This means that God is with us! We will surely achieve victory! 
battle_talk_160701=Surround the town! Destroy their archers!
battle_talk_160702=Meander northwest! Outflank them!
battle_talk_160703=Bloody hell! The gunpowder is wet! We need support!
battle_talk_160704=The enemy is growing in numbers and we need to find an opportunity to withdraw from the battlefield!
battle_talk_160801=The blizzard made it impossible for the archers to open their eyes, the weather is unfavorable for us! 
battle_talk_160802=We are gaining the upper hand and the archers keep the pressure on!
battle_talk_160803=We can't keep being suppressed like this by a rain of arrows. Cavalry, charge!
battle_talk_160804=It is Lancaster's ambush! We need to tighten our formation to reduce casualties!
battle_talk_160805=Thank goodness! I'm not late!
battle_talk_160901=The mountains near Newcastle are good for soldiers to hide in and we can ambush the enemy there.
battle_talk_160902=Our allies are waiting for us, and I think we should march from the north.
battle_talk_160903=The left flank had suffered heavy losses and I needed to regroup my troops.
battle_talk_161001=Consolidate your positions and build fortifications to keep the enemy at bay.
battle_talk_161002=Launch the raid! Don't give them time to prepare!
battle_talk_161003=Steady! Don't fall back!
battle_talk_161004=The Duke of Somerset is already dead! You shall make no more pointless resistance!

