agreement_info=Important Notes[br]This Game End User License Agreement (hereinafter referred to as "Agreement") is a legal agreement between the user (individual or single entity, hereinafter referred to as "User") and Suzhou EasyTech Software Technology Co. (hereinafter referred to as the "Game").[br]Main provisions[br]1. Licensing of rights[br]1.1 The User may install the Game Client Software on a networked mobile device used by the User for the duration of the Licence and run a copy of the Game in the manner specified in the Client Software. Any other form of unauthorised installation, use, access, display, operation and transfer shall be deemed to be a breach of the Agreement.[br]2. Prohibition of conduct[br]2.1 Users are prohibited from engaging in conduct that infringes on the fairness of the Game, including but not limited to.[br]2.1.1 the use of reverse engineering, compilation or reverse compilation, disassembly and other technical means to create software to analyse, modify and attack the game for the ultimate purpose of cheating.[br]2.1.2 Use any plug-in programs or game modification programs (the term "plug-in programs" in this Agreement refers to all programs that are independent of the game software and can affect the operation of the game while the game is running, including but not limited to all types of programs that simulate keyboard and mouse operations, change the operating environment, modify data, etc.). If there is any conflict between the definition of plug-ins stipulated in the relevant national laws, regulations and regulations or normative documents of the competent government departments and this Agreement, the laws, regulations, departmental regulations or normative documents shall prevail), to restore, compile, decode or modify the Game Software, including but not limited to modifying any proprietary communication protocols used by the Game Software, modifying or locking the data in the dynamic random access memory (RAM) making modifications or locking.[br]2.1.3 Using abnormal methods to log into the game, using external software such as accelerators or bot programs, etc. to maliciously damage the service facilities and disrupt the normal service order.[br]2.1.4 the production, dissemination or use of plug-ins, packages, accelerators, and other cheating programs of any kind, or the organization or instigation of others to use such software programs, or the sale of such software programs for the financial gain of private persons or organizations.[br]2.1.5 any attempt, by any means or method, to attack the servers, routers, switches and other equipment on which the game service is provided in order to unlawfully obtain or modify unauthorised data, to interfere with the normal game service, and for any other harmful purpose.[br]2.1.6 exploit possible technical flaws or loopholes in the game system to make profit for yourself and others in any form (including but not limited to copying virtual items in the game, etc.).[br][br]User Code[br]Please be assured that it is also in the best interests of the general public that restrictions are placed on a user's game character because of a breach of the following code.[br]1. Behaviour: Exploiting bugs and loopholes in the system to make profit for yourself and others. Penalties: Once discovered or verified by a user report, a severe warning will be issued; if the offender repeats the offence after the warning, the relevant virtual items will be deleted, etc. and referred to the relevant state agencies.[br]2. Acts: Using the functions provided by the game to conduct illegal physical transactions and other acts that violate national laws and regulations. Penalty measures: The above-mentioned acts will be immediately referred to the relevant state agencies once they are discovered.[br]Suzhou EasyTech Software Technology Co.[br]June 1, 2019[br]*For the full content, please visit EasyTech official website.
