stage_intro_4801=Harald joined the Byzantine Varangian Guard in order to develop his position and credentials. Over the next decade or so, he would leave a legacy of legend.
stage_intro_4803=In 1035, Harald became captain of the Varangian Guard. Harald led the Varangian Guard in attacking and occupying Asia Minor in the same year, forcing the Arab Empire to sign a peace treaty with the Byzantine Empire.
stage_intro_4805=Harald was ordered to suppress the Bulgarian region. Harald showed no mercy in this repression, earning him the title "Bulgar-burner".
stage_intro_4807=After the war in the east had ended, Harald was sent to Sicily. This time he would use his force and intelligence to regain Sicily for Byzantium.
stage_intro_4809=In 1047 Harald became king of Norway after the death of Magnus I. He then launched an attack on Denmark in an attempt to take it over completely.
stage_intro_4811=In 1062, Harald and King Sweyn II of Denmark agreed to a naval battle at the mouth of the River Nisa to determine the winner, and despite Harald's victory, the two sides eventually reached a peace agreement two years later due to the turmoil in Norway.

