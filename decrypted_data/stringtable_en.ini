stage_intro_4681=Born in Hungary to a noble family, John Hunyadi devoted his life to defending Europe from the Ottoman Empire's expansion and invasion and became known as the "The White Knight".
stage_intro_4683=In 1442, despite the first defeat, Hunyadi fought for several days and finally destroyed the advancing Ottoman army at Gyulafehérvár.
stage_intro_4685=From 1443 onwards, with the support of the Pope, Hunyadi launched an expedition against the Serbian region, winning several victories, using the few to defeat the many. The Ottoman power had almost been wiped out in the area.
stage_intro_4687=In 1444, King Vladislav III of Hungary personally led his troops in a battle against the Ottoman army near the port of Varna. But Vladislav III was too aggressive in the fight and had himself killed in the chaos, and therefore, the Hungarian troops suffered a rout.
stage_intro_4689=In 1448, Hunyadi led a small group of elite forces in an attempt to enter the Kosovo region to join the local force of resistance against the Ottoman army. But the operation was a failure due to the leak of the plan.
stage_intro_4691=In 1456, Mehmed the Conqueror, Sultan of Ottoman, assembled a heavy army to besiege Belgrade. Hunyadi was immediately ordered to defend. He led his troops to fight bravely and eventually defeated the Ottoman army, which was several times larger than the Hungarian defenders.

