campaign_desc_305=Treasures of the Silk Road are the essential symbol of trade between the East and the West, where wealthy Arab merchants traded back and forth, leaving behind many precious relics and treasures that witness the history of cultural exchanges between the East and the West.
campaign_desc_306=A magical ring from Norse tales called the "Andvaranaut". This ring is said to have mysterious powers, enabling the bearer to gain endless wealth and power.

