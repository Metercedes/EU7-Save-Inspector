Joan of Arc2=Battle Angel Joan of Arc
general_desc_Joan of Arc2=Despite her rural origins, Joan of Arc was a gifted commander on the battlefield. She was particularly good at boosting morale in battle by taking the lead to fight and impressing the soldiers with her heroic fighting style.
general_skin_20172=Rise of the Eagle Genghis Khan
Genghis Khan2=Rise of the Eagle Genghis Khan
general_desc_Genghis Khan2=Genghis Khan was pushed to the brink of death many times before his rise to power, but his resilience helped him to overcome one obstacle after another. Now that he had united the Mongolian kingdoms, the whole of Eurasia was about to be challenged by this emerging hegemon.
general_skin_20175=Maiden Matilda
Empress Matilda2=Maiden Matilda
general_desc_Empress Matilda2=Matilda was the daughter of King Henry I of England, and due to the early death of her older brother, she became the sole legitimate heir to the throne. The young Matilda had not yet realized the bloody storm that lay ahead.

