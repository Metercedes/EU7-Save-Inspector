battle_talk_700501=Let us rebuild the glory of Rome and drive out these Turks!
battle_talk_700502=Take back the fortress, 40,000 troops fill even here!
battle_talk_700503=The fortress on our back is occupied by the enemy, and it looks like the Romans want to tear up the contract!
battle_talk_700504=The enemy has 40,000 people, but so what? These rabbles are all temporary mercenaries. Lure the enemy deep! Let's annihilate them!
battle_talk_700505=Their arrows are too fierce. Let's withdraw to the fort!
battle_talk_700506=How our left and right flanks are running out of steam! No, I won't fail!
battle_talk_700507=Although we have finally fended off these Turkic attacks, our control in this territory is not as strong as it used to be!
battle_talk_700508=Blessed be God! The Roman Emperor is captured alive! Long live the Seljuk Empire!

