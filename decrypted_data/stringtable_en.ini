stage_group_desc_20007=In 1214, in order to curb the expansion of King Philip II of France, the Holy Roman Emperor Otto IV formed a united army with King John of England and other forces opposed to Philip II and launched an attack on French soil. Informed of this, Philip II quickly organized an army to intercept it.  

