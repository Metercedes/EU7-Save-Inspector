general_retreat_1=We must preserve the strength to fight back. The temporary withdrawal does not mean failure. 
general_retreat_2=Maybe I'm too rushing, now we have no choice but retreat.
general_retreat_3=I have fought to the last stand, but still cannot defeat the enemy. 
general_retreat_4=Tenacious enemy has exceeded my expectations. I need to re-enact tactics. 
general_retreat_5=My troop has suffered heavy loss. Why didn't anyone cover me in my attack? 
general_retreat_6=My army is already unable to adapt to current situation of the war, and must move to the rear to rest now.

general_job_desc={1} of {0}
general_desc_Khalid=One of the most outstanding Arab generals. He led the Arab soldiers bravely into battles, and never suffered a single defeat. The prophet Muhammad awarded him the title "Sword of Allah" in recognition of his bravery.
general_desc_Belisarius=He was a conqueror of North Africa and Italy and a Byzantine commander under the emperor Justinian I. He is frequently called "Last of the Romans". Sadly, he lost the trust of Justinian later in his military career.
general_desc_Frederick I=Frederick Barbarossa, king of the Romans and Holy Roman Emperor. With king Richard the lionheart of England and king Philip II of France they commanded the Third Crusade where he died from drowning.
general_desc_Constantine I=The Roman emperor and founder of the Byzantine Empire. He built a new imperial residence at Byzantium and renamed the city "New Rome." People called it Constantinople out of respect for Constantine.
general_desc_Uthman=He was the son-in-law and follower of the Islamic prophet Muhammad. He was the third of the Rightly Guided Caliphs. During his reign, Arab cavalry was invincible. He was assassinated in his later years.
general_desc_Heraclius=Heraclius was the Byzantine emperor who defeated the Persians and took back the lost lands. But the Arab invasion caused the Byzantine Empire to suffer numerous defeats until his death.
general_desc_Gilles de Rais=Originally named as Gilles de Rais, a leader in the French army during the Hundred Years' War. He was a famous black magician and is believed to be the inspiration for "Bluebeard." He fought alongside Joan of Arc and was once a national hero.
general_desc_Sikelgaita=She was a Lombard princess and second wife of Duke Robert Guiscard of Apulia. She commanded troops with Robert during the wars against the Byzantine Empire.
general_desc_Harald=King of Norway. Before becoming king, he was a mercenary and military commander in Kievan Rus and in the Varangian Guard of the Byzantine Empire.
general_desc_Alp Arslan=The second Sultan of the Seljuk Empire who won victories over the Fatimid Caliphate and the Byzantine Empire. He obtained the name Alp Arslan, which means "Heroic Lion."
general_desc_Alfred the Great=King of the West Saxons and the first person to call himself "king of the Anglo-Saxons." He defended his kingdom against the Vikings' attempt at conquest and managed to keep the majority of England united under the rule of the Anglo-Saxons. Therefore, he was called "Alfred the Great."
general_desc_Alaric I=King of the Visigoths and founder of the Visigoth Kingdom. After he left the Roman Empire, he led the Visigoths and captured Rome, making them the first foreigners to have conquered the "Eternal City."
general_desc_Aetius=Often called "the last of the Romans," he mustered a large Roman army in the Battle of Chalon, ending the Huns' devastating invasion, which was "Western Roman Empire's last victory." He was accused of conspiracy and was assassinated by Valentinianus III.
general_desc_Athelstan=He was the son of King Edward the Elder and founder of the Saxon Dynasty. He's regarded as the first king of England and one of the "greatest Anglo-Saxon kings."
general_desc_Sophronius=Before rising to become a leader of Jerusalem, he was a monk and theologian.
general_desc_Michael the Stammerer=Nicknamed the Stammerer, he ruled as Byzantine Emperor. During his reign, he joined forces with the Bulgarians to suppress the Thomas riots which led to the decline of the empire's power.
general_desc_Fausta=She was a Roman empress, the second wife of Constantine the Great.
general_desc_Tostig=Brother of King Harold Godwinson who supported Harald Hardrada and was killed at the Battle of Stamford Bridge.
general_desc_Leopold V=Duke of Austria and Duke of Styria. He is known as the "Virtuous" and he participated in the Third Crusade.
general_desc_Theodoric I=King of the Visigoths. During his reign, he attacked the Franks and Vandals and joined forces with the Western Roman Empire.
general_desc_Gytha=She was a Danish noblewoman, mother of King Harold Godwinson and Edith of Wessex.
general_desc_John Chandos=Medieval English knight, considered to be the mastermind behind the three most important victories for England during the Hundred Years' War. He died in a small-scale conflict.
general_desc_Gunderic=King of the Vandals and the Alans who led an army to invade the Western Roman Empire.
general_desc_Saladin=The first Sultan of the Ayyubid dynasty of Egypt, the first Sultan of Syria and an Egyptian national hero. He was famous for his outstanding leadership, chivalry and military talent during the Arabs' confrontation with the Crusaders.
general_desc_Narses=Just like Belisarius, he was one of the great generals in the service of the Byzantine emperor Justinian I. He is called the "Hammer of the Goths" by completely destroying the Ostrogothic Kingdom.
general_desc_Charlemagne="Father of Europe", King of the Lombards, King of the Franks, and Emperor of the Romans. Since the Roman Empire, Charlemagne was the first to unite the majority of western Europe. The expanded Frankish state that he founded is known as the Carolingian Empire.
general_desc_William the Conqueror=William the Conqueror was a descendant of Rollo and was Duke of Normandy from 1035 onwards. In 1066, William invaded England which made him the first Norman monarch of England.
general_desc_Attila=One of the most infamous Eurasian Huns leaders who was branded as “the Scourge of God” by the historians. He launched multiple invasions to Byzantine Empire and the Western Roman Empire.
general_desc_Richard I=He was the King of England, known as Richard the Lionheart because of his reputation as a great military leader. Together with Frederick I, Holy Roman Emperor, and Philip II of France, they led the Third Crusade.
general_desc_Edward the Black Prince=He is known to history as the Black Prince, the eldest son of King Edward III of England. Edward earned distinction as one of the most successful English commanders during the Hundred Years' War, being regarded as a model of chivalry.
general_desc_Charles Martel=Frankish statesman and military leader, also known as "The Hammer." He was the illegitimate son of Pepin II and the grandfather of Charlemagne the Great.
general_desc_William I of Sicily=His original name was Guglielmo, the second king of Sicily.
general_desc_Harold=Also called Harold II, son of Godwin, Earl of Wessex, brother-in-law of King Edward the Confessor. He was the last Anglo-Saxon king of England.
general_desc_Matilda of Boulogne=Countess of Boulogne and Queen of England from the accession of her husband Stephen, the King of England.
general_desc_Eleanor of Provence=Queen consort of England as the wife of Henry III, Angevin King of England.
general_desc_Baldwin IV=King of Jerusalem. Although seriously afflicted by leprosy, he still led an outnumbered force and repelled Saladin's 30,000 strong army at Montgisard.
general_desc_Khawlah=A legendary warrior and later a military leader. She has been described as one of the greatest female warriors in history. She was once compared to Khalid Bin Walid by opponents on the battlefield.
general_desc_Sunicas=A Hun in the Byzantine army under Justinian I's early rule.
general_desc_Mehmed the Conqueror=Known as Mehmed the Conqueror. He was an Ottoman sultan. He led the Ottoman army that captured Constantinople, which marked the end of the Byzantine Empire. This paved the way for the rise of the Ottomans empire in the centuries to come.
general_desc_Philip II=He was the first of the great Capetian kings of France. He is called Philip the Dignity for his strategic and political skills.
general_desc_Henry II of England=King of England and Duke of Normandy. The Angevin Empire that he created was one of the most powerful feudal dynasties in England in the medieval times.
general_desc_Genghis Khan=The founder and first Great Khan of the Mongol Empire. He launched the Mongol invasions that conquered most of Eurasia. Due to his exceptional military successes, Genghis Khan is often considered to be one of the greatest conquerors of all time.
general_desc_Edward I=He's known as "Edward Longshanks" and "the Hammer of the Scots", who's famous for conquering Wales and the majority of Scotland. His mother was Eleanor of Provence.
general_desc_Justinian I=Byzantine emperor. He was also known as Justinian the Great because of his achievements. Justinian I was one of the most important rulers in Late Antiquity.
general_desc_Empress Matilda=The daughter of King Henry I of England and mother of King Henry II of England. When Stephen took the throne, she tried to seize the kingdom by force. She eventually helped her son succeed the throne as Henry II.
general_desc_Philip the Good=Philip the Good was the third Duke of Burgundy. He participated greatly in the Hundred Years War and made important contributions to the development of the low countries.
general_desc_Eleanor of Aquitaine=She was the wife of King Henry II, Duchess of Aquitaine, and Countess of Poitiers. She was at first married to King Louis VII of France. After the marriage got annulled, she married King Henry II of England.
general_desc_Isabella=The daughter of Philip IV of France. She was Queen of England as the wife of King Edward II and mother to King Edward III of England. She was described as the She-Wolf of France due to her resolution.
general_desc_Nikephoros I=He was a Byzantine emperor. Prior to his accession, he was appointed finance minister by the Empress Irene. He was killed in a battle against Krum, the Khan of Bulgaria.
general_desc_Malik Shah=He was the sultan of the Sultanate of Rum. His name means "King of Kings."
general_desc_Timur=The founder of the Timurid Empire. He founded the Timurid dynasty and defeated countries across Western, South, and Central Asia.
general_desc_Lady Margaret Beaufort=A descendant of King Edward III, she was a major figure in the War of the Roses and mother of King Henry VII of England. 
general_desc_Elizabeth Woodville=She was Queen of England as the wife of King Edward IV. She's known for her beauty. She was married to Edward IV as a widowed mother of two sons, which became a controversy. 
general_desc_Fatimah=She was the daughter of the Muhammad and Khadijah, one of the five great women of the Arab empire. She was called Our Lady Fátima.
general_desc_Antonina=She was the wife of the Byzantine general Belisarius, the "right arm" of the empress Theodora in her exercise to obtain influence and power. Her influence over her husband was great. She's seen as a controversial figure.
general_desc_Theodora=She was a Byzantine empress by marriage to emperor Justinian I. She was intelligent and influential to Justinian I during his reign. She helped Justinian I regain his courage in the Nika riots.
general_desc_Robert Curthose=He was Duke of Normandy, nicknamed "Robert Curthose," the eldest son of William the Conqueror and a participant in the First Crusade.
general_desc_Suleiman Baltoghlu=An Ottoman naval admiral who participated in the siege of Constantinople in which he was defeated. He was ordered to be executed by Mehmed II. Although his life was spared, he was stripped of titles, land and wealth. He died in obscurity and poverty.
general_desc_Ambrosio Boccanegra=In 1341 he went to Castile with a fleet in support of King Alfonso XI of Castile. He commanded the Castilian-French forces in their defeat of the English at the Battle of La Rochelle.
general_desc_Aisha="Mother of the Believers," and Muhammad's third wife. She joined the opposition that grew against Ali and participated in a battle against Ali.
general_desc_Hermeric=King of the Suebi, enemy of the Roman Empire.
general_desc_Simeon I of Bulgaria=Bulgarian Tsar, the third son of Boris I. His reign was the golden age of the First Bulgarian Empire.
general_desc_Constantine XI=He was the last Byzantine emperor. During Mehmed II's siege, when the wall fell, he took off his royal gown, charged into the battle and disappeared.
general_desc_Samuel of Bulgaria=Tsar of the First Bulgarian Empire. During his reign, Bulgaria controlled the majority of the Balkan reaching as far as southern Greece.
general_desc_Aethelred I=King of Wessex. On 865, he succeeded his elder brother Æthelberht to become King of Wessex and King of Kent.
general_desc_Halfdan Ragnarsson=He was the first Viking King of Northumbria, a Viking leader, and a commander of the Viking invasion of the Anglo-Saxon kingdoms of England.
general_desc_Edward III=King of England. He transformed the Kingdom of England into one of the most formidable military powers in Europe. Edward the Black Prince was his eldest son.
general_desc_Richard of York=He was a leading English magnate, a great-grandson of King Edward. He eventually attempted to take the throne, but was dissuaded.
general_desc_Alle=He was the first king of the South Saxons, reigning in what is now called Sussex, England.
general_desc_Robert the Bruce=Robert I was an important King in Scottish history. He led the Kingdom of Scotland to defeat the English army and successfully regained Scotland's place as an independent country.
general_desc_Zubayr=He was a companion of the Islamic prophet Muhammad and became a military leader following the death of Muhammad. He was killed in the Battle of the Camel.
general_desc_Trithyrius=A famous Byzantine Empire general and an important military commander during Heraclius's reign.
general_desc_Edmund=King of East Anglia, who led his troops to fight against the enemy during the invasion of the Vikings and was killed in the battle.
general_desc_Totila=King of the Ostrogoths. He was a capable military and political leader.
general_desc_Athelred=Lord of the Mercians, or Ealdorman Æthelred of Mercia.
general_desc_Ivar=A Viking leader. He was the son of Ragnar Lodbrok and his wife Aslaug. He was Halfdan Ragnarsson's brother.
general_desc_Vortimer=Son of Vortigern, known for his opposition to his father's alliance with the Anglo-Saxon.
general_desc_Catigern=Vortigern's brother, known for the fight against the Anglo-Saxons.
general_desc_Alexios I=He was a Byzantine emperor and the founder of the Komnenian dynasty, it was during his reign that the Komnenos family came to full power. His appeals to Western Europe for help were also the catalyst that contributed to the start of the Crusades.
general_desc_Basil II=Nicknamed the Bulgar Slayer, he was the senior Byzantine Emperor for almost 50 years. He is seen as a Greek national hero but as a despised figure among the Bulgarians.
general_desc_Roland=He was a Frankish military leader under Charlemagne who became a popular figure in literature. He was responsible for defending Francia's frontier against the Bretons. Roland is poetically associated as Rolan the paladin.
general_desc_Bessas=A Byzantine general who participated in the Byzantine–Gothic War and Byzantine–Sasanian War with Belisarius. He was Belisarius's lieutenant.
general_desc_Vitiges=King of the Ostrogoths. He was a capable military and political leader.
general_desc_Batu Khan=He was a son of Jochi, thus a grandson of Genghis Khan. He was the founder of the Golden Horde. Due to his kindness to his people, he's also called Sain Khan.
general_desc_Jebe=Jebe is a name given when he was recruited by Genghis Khan, which means "arrow." He was the first of Temujin's “Four Dogs of War.”
general_desc_Godfrey=Duke of Lower Lorraine and Duke of Bouillon. A general in the First Crusade. His brother is Baldwin I of Jerusalem.
general_desc_Leo VI the Wise=Also called Leo the Wise, he was Byzantine Emperor. He completed work on the Basilika which became the Byzantine Empire's code of law.
general_desc_Pepin the Short=Son of Charles Martel and founder of the Carolingian Empire. In 751, he deposed the last king and crowned himself the King of Franks.
general_desc_Valens=An Eastern Roman Emperor
general_desc_Nur Din=A monarch of the Zengid Dynasty of the Seljuk Empire, an important figure of the Second Crusade.
general_desc_Gelimer=The last Germanic King of the Vandals and Alans. He surrendered to the Byzantine Empire after being defeated by Belisarius.
general_desc_Stilicho=A high-ranking Roman general with half barbarian origin. He was a nobleman and was appointed consul of the Western Roman Empire.
general_desc_El Cid=A Castilian nobleman, a conquistador, the ruler of Valencia, and a Spanish national hero. The owner of two famous weapons, Tizona and Colada.
general_desc_Arthur=King Arthur was a legendary British King and is also the leader of the Knights of the Round Table in the popular Celtic myth. He is said to have led the Knights of the Round Table to unify Britain after the collapse of the Roman Empire and the withdrawal of Roman Legion from Britain.
general_desc_Guinevere=Legendary queen and wife of King Arthur during his reign. Her love affair with Lancelot, one of the Knights of the Round Table, caused the downfall of the kingdom.
general_desc_Lancelot=One of the Knights of the Round Table and King Arthur's most trusted knight, who contributed to King Arthur's numerous victories.
general_desc_Joan of Arc=A heroine of France, born from a peasant family. She led the French in the resistance against the English invasion during the Hundred Years' War. She was eventually executed by burning.
general_desc_William Wallace=He was a Scottish knight, a nobleman, and a patriot who led an army in the First War of Scottish Independence.
general_desc_Olga=A female leader in Kievan Rus, wife of Grand Duchy, Igor. She acted as regent of Kievan Rus for her son Sviatoslav when he was a minor.
general_desc_Caesar=He governed the Roman Republic as a dictator who culminate in the formation of the Roman Empire.
general_desc_Robin Hood=He is a legendary outlaw depicted in English folklore. Traditionally depicted dressed in Lincoln green, he is said to be a clever and skilled fighter, who robbed from the rich, gave to the poor and hated the officials and the priests.
general_desc_Beowulf=A legendary figure in Norse mythology who fought bravely against giants, sea monsters, and giant dragons.
general_desc_Otto I=King of East Francian and Holy Roman Emperor. He was one of the earliest Teutonic emperors to invade the Slavs. He forced Boleslaus I, Duke of Bohemia to become his ally.
general_desc_Knud=He succeeded the Danish throne from Sweyn, king of Denmark. He ruled over England, Denmark, and part of Sweden. His realm was often referred to as the North Sea Empire.
general_desc_Zengi=He was the founder of the Zengid dynasty and a Turkam atabeg who ruled Mosul, Aleppo, Hama, and Edessa. 
general_desc_Alexander Nevsky=Formerly Alexander Yaroslavich, he led the defeat of Swedish troops near the Neva River during the Swedish invasion of Rus', earning him the title "Nevsky".
general_desc_Subutai=The general who fought battles across the most extensive geographical area, and was known as "Subedei" for most of the history of the Eurasian Plate. He was known for his bravery and was known as the "Batulu".
general_desc_Su Dingfang=He conquered the Eastern Turkic Khaganate, defeated the Tibetans and fought against Goryeo, never tasted a major defeat in his life.
general_desc_Li Jing=He was one of the most famous generals of the Tang Dynasty and made an extremely important contribution to the establishment, consolidation and prosperity of the Tang Dynasty during his lifetime of conquering the East and the West.
general_desc_Li Shimin=Emperor Taizong of Tang, the second emperor of the Tang Dynasty and the first Khan of Heaven, was one of the most prestigious emperors of the Tang Dynasty and of Chinese history.
general_desc_Yelu Dashi=Also known as Dashi Linga or Linga Dashi, he was accomplished in many fields including military, and his deeds were widely spread in Europe, and his name became a synonym for the Western Liao Empire.
general_desc_Suleiman I=He was the longest reigning sultan of the Ottoman Empire and under his reign the Ottoman Empire grew into its heyday. Because of Suleiman I's merits, he is commonly known in the West as Suleiman the Magnificent.
general_desc_John I Tzimiskes=A Roman emperor with great military prowess, he defeated the Russians and Bulgarians to the north and made several conquests to the east, greatly increasing the military power of Eastern Rome and expanding its boundaries.
general_desc_Giovanni=The Genoese mercenary general, "Never let Rome fall by my hand!" Although he did not prevent the Ottoman Empire from capturing Constantinople, his steadfast will and fearlessness were left together under the ruins!
general_desc_Gao Xianzhi=Gao Xianzhi was a famous general during the reign of Emperor Xuanzong of Tang Dynasty. He guarded Anxi and contributed to maintaining the security of the western frontier of Tang and strengthening the ties with the western region.

