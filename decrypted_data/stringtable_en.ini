stage_intro_4721=In 1146, in response to the repeated harassment of the empire's borders by the Turks, Manuel I decided to gather his troops and launch an expedition against the Sultanate of Rum.
stage_intro_4723=In 1147, when the Second Crusade involved crossing Byzantine Empire territory, Manuel I feared a clash between Byzantine troops and the Crusaders, and his fears soon became a reality outside Constantinople.
stage_intro_4725=In 1155, in order to regain the Empire's territory, Manuel I sent two generals to Italy with an army and a large number of gold coins to launch an expedition against the Normans.
stage_intro_4727=In 1159, when Renard of Châtillon, Prince of Antioch, sacked the Byzantine Empire's island of Cyprus, an enraged Manuel I led an expedition to turn the Principality of Antioch into a complete vassal of Byzantium.
stage_intro_4729=In 1167, Manuel I defeated the Hungarians at the Battle of Sirmium, bringing a large part of the eastern Adriatic coast under the Byzantine Empire.
stage_intro_4731=In 1171, Manuel I broke off diplomatic relations with Venice and confiscated the ships and goods of Venetian merchants in the Empire, which led to retaliatory plundering by Venice.

