battle_talk_140504=SaintDenis! Montjoie!
battle_talk_140505=Don't scatter the ranks! Cavalry around the back! Give them a heavy blow!
battle_talk_140506=We will fight to the last moment! Even if all the troops are lost!
battle_talk_140601=Hold on, the king has sent reinforcements!
battle_talk_140602=Stop your delusions of grandeur. We have surrounded the city on three sides, surrender as soon as possible!
battle_talk_140603=Although our army is besieged, but the enemy has been besieged for days without morale, everyone and I charge together!
