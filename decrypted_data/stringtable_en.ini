general_desc_Edward the Black Prince1=Edward often donned black armor on the battlefield to strike fear into the hearts of enemy troops. During the Hundred Years’ War, this imposing black attire was the sight French commanders dreaded the most.
general_desc_Su Dingfang1=Su Dingfang spent his life on horseback in battle, striking north against the Jieli, annihilating Turkestan in the west, pacifying Baekje in the east, and holding firm against the Tibetans in the south. Even in his seventies, he was still on the front lines of the battlefield, a true War General of the Tang Dynasty.

