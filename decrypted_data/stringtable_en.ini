campaign_end_desc_59=The lengthy expedition ended in failure, and Jerusalem remained under enemy occupation. After expending a lot of human and financial resources, the expeditionary army looted Constantinople, and the Latin Empire was born.
campaign_end_desc_60=Isabella and Roger's actions forced Edward II to agree to abdicate the throne in favor of his son Edward III. Edward III's accession to the throne not only contributed to the outbreak of the second Scottish war, but also started a century-long war between England and France.
campaign_end_desc_61=The fall and recovery of Constantinople made the Byzantines realize the great threat they face from the Western Latin world. At the same time, on the Anatolian Peninsula in the East, a new empire was ready to move against the Byzantines.
campaign_end_desc_62=Although the rise of the Ottoman Empire has been unstoppable, the Byzantine Empire still will not bow down. The Western Christian countries could not sit back and watch the demise of Byzantium. During this time, a Turkic tribe in the East is gradually rising, the Ottoman Empire's road to expansion is not going to be a smooth one.
