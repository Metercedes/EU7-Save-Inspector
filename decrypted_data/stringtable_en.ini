stage_intro_30101=After the death of William Iron Arm, Drogo became Duke of Apulia. Robert, Tancred's son by his second wife, came to Italy. Drogo did not like his brother and sent Robert to Calabria, a barren place where the Normans were not welcome, and where Robert oppressed the people with his cunning tricks and was known as "Guiscard", or "The Cunning One".
stage_intro_30102=The Lombards gradually became disgusted with the Normans' greed and riots broke out. The Eastern Romans took the opportunity to send spies and assassins, and when Drogo was killed in an attack in 1051, the whole of Apulia was thrown into chaos. Pope Leo IX, who had a grudge against the Normans, immediately contacted the Eastern Roman Emperors, the Holy Roman Emperors, and the local nobles to form an anti-Norman alliance. Humphrey had to summon Robert urgently.
stage_intro_30103=The East-West Curia went into schism, and the Norman crisis vanished in a whirlwind. The only threat now became the brothers' confrontation. Humphrey, suffering from malaria and mental exhaustion, decided to reconcile with Robert, confirming his inheritance. With his youngest brother, Roger, Robert began the conquest of Calabria.
stage_intro_30104=Robert and Roger campaigned in Calabria for five years, and those five years of war made them both mature leaders.
stage_intro_30105=The Reformed Pope was at odds with the Holy Roman Emperors and nobles, and in order to secure his position in the Curia, the Pope risked recognizing the Normans' status in Italy to secure them as allies. In the Treaty of Melfi of August 23, 1059, Pope Nicholas II appointed Guiscard as Duke of Apulia, Calabria, and Sicily.
stage_intro_30106=Since the departure of William Iron Arm, Sicily had reverted to Saracen territory, and in 1060 the brothers crossed the channel and landed in Sicily to begin a new conquest.
stage_intro_30107=As more and more victories were won, the brothers turned against each other over the spoils of war and the right to command. The two made the awkward decision to rule together, after which Robert spent very little time in Sicily, and his sights began to turn to the east, where he was determined to seize the last of the Eastern Roman underpinnings on the Italian peninsula.
stage_intro_30108=After the fall of Bari, Robert became more and more greedy and attacked the Duchy of Lombards. Amalfi, Salerno, and Naples were successively attacked by Guiscard.
stage_intro_30109=At the age of 65, Robert was not the least bit weary; he loved the battlefield and power, and he began to covet the lands of the Eastern Roman Empire, even wearing a replica of the Roman Emperor's imperial robes. The Seljuk Empire invaded Eastern Rome, Roman Emperor Michael VII agreed to marry Robert's daughter, Helena, for the alliance, only to have the Emperor overthrown by his generals before arriving in Constantinople.
stage_intro_30110=In the spring of 1081 A.D., although the new emperor, Alexios, agreed to all of Robert's requests, how could Robert miss the excuse to start a war?  He marched into Constantinople with 150 ships and 20,000 soldiers that had long been prepared.
stage_intro_30111=While Robert's son, Bohemond, was riding high in Eastern Rome, Alexios sent Heinrich IV a letter and several sacks of gold to march into a weakly defended Rome. Heinrich IV, who had a long history of conflict with the Pope, would not miss such a good opportunity, and the Pope, alarmed, called for help from Robert.
stage_intro_30112=Having quelled the rebellion in Italy, Robert finally turned all his energies to the east. At the age of 70, Guiscard recruited a large army to prepare for the fulfillment of his long-cherished dream of becoming Roman Emperor. But while landing on the island of Cephalonia, he contracted the plague and died 1 year later. His tombstone reads, "Here lies Guiscard, the terror of the world......"

stage_intro_30201=While Guiscard had two marriages and more than a dozen children, the most capable son was a bastard. He inherited the blond hair and tall stature of his Viking ancestors and was as reckless, brave, and energetic as his father.
stage_intro_30202=Having fought under his father Guiscard since he was an adult, Bohemond gained a lot of combat experience in Sicily, but it wasn't until his father began his attack on Eastern Rome that he really showed what he was really made of. In 1081 Robert Guiscard traveled to Constantinople with 150 warships and 20,000 men, however, because of an ambush by the Pope, the Normans lost most of their main warships.
stage_intro_30203=Bohemond set out to plunder the Eastern Roman forts in Macedonia and the region of Thessaly, but he was trapped in Larissa, as Eastern Roman's persistent holdouts and Venetian disruptions kept his logistical supplies running smoothly.
stage_intro_30204=In 1084 Bohemond again accompanied his father to Eastern Rome, and although he defeated the Venetian fleet and captured Corfu, a plague struck the Normans, and both Guiscard and Bohemond became seriously ill and had to interrupt the conquest of Eastern Rome again.
stage_intro_30205=Robert Guiscard died in 1085, and his half-brother Roger Bolsa disinherited Bohemond with the help of his mother and his uncle Roger I of Sicily. The civil war over inheritance and land lasted 10 years in Italy.
stage_intro_30206=When Pope Urban II launched a crusade in 1096, recruiting crusaders to recapture the Holy Land, Bohemond decided not to bother with the right of inheritance, and through his call to arms, quickly gained a powerful crusading army.
stage_intro_30207=His former rival Alexios greeted Bohemond with the greatest ceremony but demanded that Bohemond swear an oath of allegiance and promise to return the Norman-occupied territories of the empire. Bohemond thoughtfully agreed, but his request that the emperor make him "Commander in Chief of the East" so that he could gain leadership of the entire crusade was refused by the wily emperor.
stage_intro_30208=Bohemond led his nephew Tancred across the Bosphorus into Nicaea, followed by Raymond IV of Toulouse. Since it was the first battle of the Crusades, everyone wanted to become a true leader by making a famous fight for himself.
stage_intro_30209=Only the Frankish Raymond IV could match Bohemond in the Crusader ranks, and they split up into two groups, both thinking they could gain more ground on the battlefield before their opponents.
stage_intro_30210=On the way to Jerusalem, the occupation of Antioch became critical for the Crusaders. If they could occupy Antioch before Kerbogha's army pressed, then the Crusaders still had a chance to defend within the city, otherwise, they could only face the tens of thousands of Seljuks outside of the city, at which the Crusaders were already like the end of the strongest captives.
stage_intro_30211=After Antioch was captured by the Crusaders, Bohemond and Raymond reached an agreement in which Bohemond gained possession of Antioch, but recognized Raymond as supreme commander of the Crusaders. Bohemond gained the territory and honor he had dreamed of and became a true prince, but also offended the Roman Emperor Alexios for it.
stage_intro_30212=In the summer of 1100, Bohemond left his nephew Tancred to garrison Antioch, and himself led 300 soldiers to the Euphrates to expand his lands.
stage_intro_30213=Bohemond was imprisoned for three years, during which time his nephew Tancred extended the duchy for him, and Bohemond, who had just been released, swung south for honor.
stage_intro_30214=The Duchy of Antioch was located between the Eastern Roman Empire and Seljuk, and the cost of troops and money made it difficult for Bohemond to support himself, let alone expand. Bohemond had to travel to Europe to raise money and mercenaries. To his surprise both in Italy and France he was seen as a hero of the Crusades, and King Philip IV of France asked him to be his son-in-law, so popular that King Henry III of England prevented him from traveling to England.
stage_intro_30215=With great fame, Bohemond once again recalled his father's long-cherished dream, and he collected 35,000 elite soldiers and decided to attack Eastern Rome again.
stage_intro_30216=Under plague and siege, Bohemond signed a truce in humiliation, and although he still owned the Duchy of Antioch, he seemed unable to forgive himself for his defeat and sailed for Sicily, where he died three years later in despairing despondency and was buried in Canossa di Puglia. The Duchy of Antioch survived under the regency of Tancred.

stage_group_name_30002=Bohemond's Diary
stage_group_name_30003=Bohemond's Diary

family_letter_desc_201=My father gained his wealth by setting and fighting fires, which earned him that nickname. But he also gave money to the church regularly, so he was always well-connected and well-known in the church. --- Bohemond I
family_letter_desc_202=My father had been ostracized by his uncle for years when he was younger, so he'd done the same to Roger, but it hadn't been for the best.
family_letter_desc_203=My father finally attained the highest position in the family: Duke. It's the family's most glorious day and the result of his years of managing connections within the church.
family_letter_desc_204=Sicily has always been our family's belief, that rich and beautiful island, which every man after Uncle William would fight for.
family_letter_desc_205=Perhaps my father didn't want to tangle with Uncle Roger over the leadership of Sicily; his dreams were more profound.
family_letter_desc_206=Father had always defied William the Conqueror, saying how could he call himself a conqueror when he hadn't even defeated the Greeks?
family_letter_desc_207=The day any one of our family sits on the throne of Constantinople will be truly worthy of the title "Supreme Leader". Honor is more important than life, and fighting never stops till the end of life!
family_letter_desc_208=Father had returned to Italy, but hopefully, he would return after he had quickly calmed things down. The wily and cunning Alexios was not so easy to deal with.

family_letter_desc_301=I remember that day, October 18th, when my father was attacking the city, and Alexios suddenly appeared in the neighborhood. If we allowed him to break in under the city, then we were bound to lose the battle, so I rushed out.
family_letter_desc_302=It wasn't the Greeks who defeated us, it was the plague, it was the curse, maybe God was on the side of the Greeks, and from that year on my father was sick all the time.
family_letter_desc_303=Who was there for my father, who fought for so many frontiers? And who stole everything from me for that he simply had a good mother and uncle. It's not fair!
family_letter_desc_304=Since there's no stand for me here, let me head east!
family_letter_desc_305=The hypocritical Roman Emperor didn't want to give me any promises at all, but Princess Anna treated me sincerely even though she was very young. The so-called Crusades were only for the Roman Emperor to recover the lost land. It seems that the Greeks are getting weaker and weaker.
family_letter_desc_306=We were not wrong in guessing that Alexios did not even think of giving us any help as well as reward, and he cannot blame us were unkind. What the battle acquired was ours.
family_letter_desc_307=It's been seven months, our supplies have dried up, and we can only believe in miracles. May God bless us.
family_letter_desc_308=God bless, my father. I've finally made it. Antioch, this will be a new beginning for our family.
family_letter_desc_309=It's been 3 years and I've all but forgotten what it feels like to be pounded by yellow sand. Antioch is still as if it's an island, being attacked on multiple fronts, and I need to expand my territory.
family_letter_desc_310=Yes, without my insistence, the Saracens and Seljuks would have taken Constantinople long ago, and all honor is due me!
family_letter_desc_311=Hatred I have never forgotten. Father, I shall sacrifice the head of the Greek Emperor to you. Fight! Honor is everything above life!

