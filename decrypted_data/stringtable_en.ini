;征服国家介绍
;__font_type[font_text_]
conquest_faction_desc_11=Without the protection from the Roman Empire, Britain is under the invasion of barbarians. The ferocious Germanic barbarians are ravaging Britain. The Britons are united under the leadership of the heroic King Arthur and determined to drive these invaders out of Britain.

conquest_faction_desc_101=Since the conquest by Julius Caesar, the Romans ruled over Britain for four centuries. The strength of today's Western Roman Empire has diminished, and it has no choice but to withdraw the British Legion to the continent. The Britons who lost the protection of the Western Roman Empire have to take up arms and face the invaders alone.
conquest_faction_desc_102=The Anglo-Saxons were brave and proficient warriors. In their longboats, they often plundered the northern coastal provinces of the Western Roman Empire. While other barbarian tribes were fighting for Gaul, the Anglo-Saxons had their eyes on the island of Britain, which had lost the protection of the Western Roman Empire.
conquest_faction_desc_103=The Visigoths once defended the border for the Roman Empire and were at the forefront of the resistance against the Huns. However, they were not content with the way the Roman treated them. As a result, the Visigoths rose up and established the Visigothic Kingdom within West Roman territories, inevitably, this led to full-scale conflict with the Western Roman Empire.
conquest_faction_desc_104=The Western Roman Empire is in a state of constant crisis. Due to its declining national strength, it is unable to effectively deal with the border unrests caused by the barbarian migration. The once glorious empire is now crumbling. But with crisis also comes opportunities, and the Roman heritage still persists. As long as we are determined, we may still be able to revive the Roman Empire in all its glory.
conquest_faction_desc_105=Brittany is mainly populated by Celts who once migrated from the island of Britain. Brittany is sometimes referred to as "Little Britain". At present, Gaul is in a state of chaos and its future is unclear. The people of Britany need to exercise greater intelligence to keep the peace with the powerful countries and survive in Gaul.
conquest_faction_desc_106=The Salian Franks were a subgroup of the Franks who formed a barbarian alliance with the Roman Empire, allowing them to settle in border areas. Facing the decline of the Western Roman Empire, the Salians need to decide whether to continue to faithfully guard the imperial border, or to inherit the power of the Western Roman Empire in Gaul.
conquest_faction_desc_107=For a long time, the Franks have been eager to enter the rich region of Gaul, but they have always been thwarted by the powerful military forces of the Roman Empire. Now that the Western Roman Empire is in the midst of internal and external decline, a great opportunity has presented itself to the Franks.
conquest_faction_desc_108=One of many Germanic tribes that migrated from northeast Europe. After the Burgundians first noticed the weakening of the military forces of the Western Roman Empire, they resolutely crossed the Rhine River into the territory of Western Rome. This however led to the inevitable outcome of being surrounded on all sides by the West Roman forces.
conquest_faction_desc_109=Alemanni means "all people", signifying that this nation is a confederation of countless Germanic tribes, large and small. Therefore, the Alemanni regarded themselves as the leader of the Germanic people, and are obliged to lead the Germanic nations against the powerful Western Roman Empire.
conquest_faction_desc_110=As descendants of the Sarmatians, the Alans were once the most powerful grassland nomads. However, after being attacked by the more ferocious Huns, the Alans were forced to flee. Like other migrating peoples, the Alans are now seeking opportunities at the border of the Western Roman Empire.
conquest_faction_desc_111=The Ostrogoths, who once settled on the shores of the Black Sea, were the first Germanic people invaded by the Huns. In the face of the powerful and foreign Huns, they had no choice but to surrender for the time being. However, the Ostrogoths are not content with subjugation. They are waiting for an opportunity to completely rid themselves of the Huns' oppression.

conquest_faction_desc_201=The people of Britany believed in freedom and independence. Even in the face of the rising Kingdom of the West Franks, the Bretons did not give in. Led by the brave and fierce Erispoe, known as the "King of Brittany", they are determined to fight the West Franks to the end.
conquest_faction_desc_202=After the Frankish Kingdom was divided into three parts by the Treaty of Verdun, Charles the Bald established West Francia on the basis of the western territory of the original kingdom. West Francia inherited the core areas of the former Frankish Kingdom, as well its hidden dangers: turbulent borders and a powerful aristocracy.
conquest_faction_desc_203=After the Frankish kingdom was divided into three parts by the Treaty of Verdun, Lothair I established Middle Francia based on the central territory of the original kingdom. Middle Francia, although smaller than the other two kingdoms, retained the richest region of Italy and the title of "Roman Emperor".
conquest_faction_desc_204=After the Frankish kingdom was divided into three parts by the Treaty of Verdun, Louis the German established East Francia on the basis of the eastern territory of the original kingdom. East Francia is largely made up of the relatively poorer Germanic region, which was only recently conquered. However, it has a powerful military force and great potential for development.
conquest_faction_desc_205=One of the seven Anglo-Saxon kingdoms, Wessex had the opportunity to unify all England under the reign of King Egbert. However, with the arrival of the Vikings, Wessex had to suspend the process of reunification in order to defend against the foreign invaders.
conquest_faction_desc_206=One of the seven Anglo-Saxon kingdoms, Mercia was once the most powerful kingdom in Britain, and its hegemony can be traced back to the reign of Penda. However, its past glory is no longer. Now the kingdom of Mercia must guard against not only the Vikings, but also the ambitious kingdom of Wessex.
conquest_faction_desc_207=As one of the seven Anglo-Saxon kingdoms, East Anglia was small and largely consists of swamps, limiting its potential to grow stronger. It has been a vassal state of Mercia for a long time throughout its history. Now the kingdom of Mercia has turned its attention elsewhere. This is the last chance for the kingdom of East Anglia to rise.
conquest_faction_desc_208=The kingdom of Gwynedd is a successor state to the Roman Empire established by the Britons. Its rulers were usually given the title of "King of the Britons". Gwynedd's current king is Rhodri the Great. Under his reign, the kingdom of Gwynedd has prospered and grown strong, almost unifying all the territory of Wales.
conquest_faction_desc_209=Northumbria, one of the seven Anglo-Saxon kingdoms, was formed by the merger of two smaller independent kingdoms, which led to long-term political strife and quarrel. When the Vikings invaded Britain, the kingdom of Northumbria failed to display unity.
conquest_faction_desc_210=The Kingdom of Alba was jointly established by the Gaels and the Picts. The current king is the founder of the Kingdom, Kenneth I, known as the "Conqueror". Under the leadership of this capable monarch, the kingdom of Alba repelled all kinds of invading enemies and became the overlord of northern Britain.
conquest_faction_desc_211=The Gaelic Kingdom was composed of many small Irish kingdoms. Its leader is known as the High King of Ireland. Although Ireland is tucked away in a corner, it is still not safe from the raids of the Vikings. The Gaelic Kingdom needs to unite under the command of the High King to drive these invaders out of Ireland.
conquest_faction_desc_212=The expansion of the Slavic people's territory can be traced back to the 5th century A.D. Perhaps it was at that time that the West Slavs separated from the other Slavic tribes and became an independent nation. Hardened by the bitter cold, the West Slavs are resilient, and tenacious on the battlefield.

conquest_faction_desc_301=Justinian I, the emperor of Byzantine Empire, is determined to achieve the revitalization of the Roman Empire and to recover all the lost territories of the Empire encroached by Barbarians. As the emperor's most trusted general, Belisarius undertakes the task of restoring the Empire. He would lead the most elite legions of the Empire to North Africa and begin the journey to restore the glory of the Roman Empire.
conquest_faction_desc_302=The Vandals were one of the Germanic barbarian tribes. After a long and arduous migration, they finally invaded North African provinces of the Roman Empire and established the Kingdom of Vandals. Since the establishment of the kingdom, the Vandals have thwarted many attempts by the Byzantine Empire to regain their lost land of North Africa, and this time will be no exception.
conquest_faction_desc_303=After the fall of the Western Roman Empire, Theodoric the Great led the Ostrogoths to the Apennine Peninsula and founded the Ostrogothic Kingdom on the core of the former Empire. Today, the Eastern Gothic Kingdom is in the quagmire of civil strife due to the death of Theodoric the Great. Coupled with powerful enemies from the outside, the kingdom finds itself in a serious plight.
conquest_faction_desc_304=After the fall of the Western Roman Empire due to the invasion of the Barbarian, the Byzantine Empire, the eastern successor of the original Roman Empire, also experienced a half-century-long period of silence and decline. Now the Byzantine Empire, under the inspiring rule of Emperor Justinian I, finally thrives again and is heading towards the revitalization of the Roman Empire.
conquest_faction_desc_305=The Visigothic Kingdom, the first Germanic kingdom established in Gaul, was defeated by the rising Frankish kingdom and had to abandon Gaul and go south over the Pyrenees Mountains. After years of hibernation, the Visigothic kingdom recovered its power and set its eyes on Gaul again, vowing to compete with the Franks again.
conquest_faction_desc_306=While many Germanic migratory nations were fighting to divide up the territories of the Western Roman Empire, the wise Suebi chose to go to Iberia and establish the Kingdom of the Suebi. But the good times did not last long, as the Visigoths also moved into the Iberian Peninsula, the conflict between the Kingdom of the Suebi and the Visigothic Kingdom has become inevitable.
conquest_faction_desc_307=As an indigenous nation of Ibérian, the Vasconians have always fought against different invaders, from the Roman Empire to various Germanic barbarians of today. No matter how powerful and warlike their enemies are, the Vasconians never gives up their determination to fight and strive for independence.
conquest_faction_desc_308=The Frankish Kingdom was a Germanic kingdom founded by Clovis I, the leader of the Salian Franks, who unified all the Frankish tribes. As a former barbarian ally of the Western Roman Empire, the Frankish Kingdom inherited the power and legacy of the Empire in Gaul smoothly and quickly rose to become the hegemon of Gaul.
conquest_faction_desc_309=The Burgundians had a difficult journey. They encountered blocks of Romans and Huns one after another after crossing the Rhine. They finally established the Kingdom of Burgundy in Gaul after experiencing multiple hardships. However, the Burgundians could not let their guard down, as the neighboring Frankish Kingdom seems to have an axe to grind with their territory.
conquest_faction_desc_310=The Bretons are mainly made up by Celts who migrated from the island of Great Britain. Whether it is the Western Roman Empire back then or the Frankish Kingdom today, the Bretons always need to get along with a power far beyond their own, but the Bretons never succumbed.
conquest_faction_desc_311=Unlike other Germanic kingdoms, the Kingdom of Thuringia, one kingdom established by Germanic migratory nation, actively absorbed many Hun slaves after the collapse of the Hunnic Empire. Boasting outstanding military power, the Kingdom of Thuringia became an object of fear for neighboring countries.
conquest_faction_desc_312=When Langobardus, one of the Germanic migratory nations, finally found a safe place after all the hardships, the vast territory of the Western Roman Empire had already been divided up by other migratory peoples. The Langobardus could only placed their hopes on the Byzantine Empire and the Eastern Gothic Kingdoms, even though it is tantamount to a fool's errand to mediate between the two powers.
conquest_faction_desc_313=The Gepids originated from the Eastern Germanic Goths are very brave and battlewise. After the death of Attila, the Gepids were the first to rise up against the Huns and eventually overthrew their Empire. Now that the Gepids are neighbor of the Byzantine Empire, the they need to be careful in dealing with this very wise and ancient empire.

conquest_faction_desc_401=Since the accession of Alexius I, the Komnenos family has ruled the Byzantine Empire for more than a century. Thanks to the extraordinary efforts of former emperors from the Komnenos family, the Byzantine Empire has changed from decadence to flourishing, clearing the shadow of the Turks' invasion. It is expected to retake Anatolia and regain the splendor of the Roman Empire.
conquest_faction_desc_402=After the division of the Seljuk Empire, Kilij Arslan I succeeded the state of his regime in Anatolia. The Sultanate of Rum and the Byzantine Empire fought many times for Anatolia. Although the two countries are currently maintaining a rare peace, the Byzantine Empire's determination to recover its homeland should never be ignored.
conquest_faction_desc_403=It was founded by the Armenians who fled to Cilicia due to the invasion of the Seljuk Empire, and was known as the "Armenian Kingdom of Cilicia". If this Kingdom hopes to survive in Anatolia surrounded by strong enemies, it needs to make friends with the Crusader States and take advantage of their power.
conquest_faction_desc_404=“Bey” refers to the "leader" in Turki. The Byzantine Empire lost control of Anatolia due to the invasion of the Seljuk Empire. A large number of Turkic tribes moved into the region and established the Anatolian Beyliks, which was ruled by a coalition of tribal leaders.
conquest_faction_desc_405=The establishment of The Kingdom of Georgia put an end to the chaos that had long existed in the Georgian region, where existing many rival and disparate parties. Nowadays, under the rule of Queen Tamar, the Kingdom of Georgia is prosperous and strong. If it can take advantage of this opportunity to expand southward, it may be able to build a powerful Transcaucasian empire.
conquest_faction_desc_406=The dynasty was founded by a former governor of Azerbaijan in the Seljuk Empire. The ruler of Eldiguzids inherited the title of "Atabeg", i.e. "seignior" and "consul of Sultan". When the Seljuk Empire was weakened due to civil unrest, the Atabeg of Eldiguzids took advantage of the opportunity to seize the Sultan and thus took control of the Empire.
conquest_faction_desc_407=The Zengid Dynasty was the most resolute nation in fighting the Crusades. The late King Nur ad-Din led his troops and defeated the Crusaders several times, effectively curbing the encroachment of the Crusader States on the West Asia region. Now facing challenges from both the Crusader States and the newly-emerged Ayyubid Dynasty, Zengid Dynasty needs to be more careful with diplomatic issues and must not suffer from multiple enemies.
conquest_faction_desc_408=The second After the Umayyad Dynasty, the second hereditary dynasty of the Arab Empire. The once prosperous Abbasid Dynasty is now on the decline and even became a puppet controlled by the Turks. If the Abbasid Dynasty hopes to regain its former glory, it has to take advantage of the time when the Seljuk Empire is torn apart so as to completely get rid of the control of Turks.
conquest_faction_desc_409=One of the Crusader States, the principality established by Bohemond of Taranto after capturing the city of Antioch during the First Crusade. Standing as a town of strategic importance as well as an important link between the Crusaders and the Byzantine Empire, the Principality of Antioch has to improve its city defense first.
conquest_faction_desc_410=One of the Crusader States, the county established by Bertrand of Toulouse, was supported by the Kingdom of Jerusalem, with the city of Tripoli as its center. The County of Tripoli is located between the Kingdom of Jerusalem and the Principality of Antioch. Only by dealing with these two countries and forming a strong offensive and defensive alliance, could it resist the onslaught of the Ayyubid Dynasty.
conquest_faction_desc_411=Despite being Baldwin IV, is able to deal with political strife and military issues with his intelligence. He can not only strike a balance of various parties within the kingdom so as to maintain political stability but also lead the army to repel the powerful Saladin. Under the rule of Baldwin IV, the Kingdom of Jerusalem is growing stronger with each passing day and became the center of Crusader States.
conquest_faction_desc_412=The empire with Egypt as the center of rule, was established by Saladin, a Kurdish, after the end of the Fatimid Dynasty. Saladin demonstrated his military prowess and leadership while leading the army against the Crusader invasion. Under the rule of this masterful emperor, the Egyptian Empire is expanding aggressively and showed the trend to unify the Islamic world.
conquest_faction_desc_413=The second son of King Henry II of England and the sole heir to his throne, Richard, Duchy of Aquitane, boasts great military leadership skills and is a brave warrior. Tired of the endless civil wars with his father and brothers, Richard decided to answer the call of the Holy See and led an expeditionary force to support the Crusader States in the East.

conquest_faction_desc_501=Since the Viking invasion of Britain, the Gaels, who live on the island of Ireland, have not been spared from these pirates. Now the Gaels are united under the Supreme King, vowing to drive the Vikings from their homeland and unite Ireland.
conquest_faction_desc_502=A group of Vikings who had moved into Britain from Scandinavia occupied northern England and the eastern coast of Ireland. The conquest of Britain by this group of Vikings became very difficult as the resistance of the aborigines became more determined.
conquest_faction_desc_503=Also known as Anglo-Saxon England, it was a kingdom established by the Kingdom of Wessex after unifying the region of England. When the throne of this kingdom was handed over, the Vikings invaded Northumbria again and Edmund I needed to expel these invaders to reunite England.
conquest_faction_desc_504=Each king of the Kingdom of Gwyneth, one of the successor states to the Roman Empire founded by the British, was committed to developing his kingdom in the hope that one day he would regain control of Britain and make the title of "King of Britain" true.
conquest_faction_desc_505=A kingdom founded by King Kenneth I of Dalriada after annexing the Pictish people. Since its establishment, the Kingdom of Alba has stubbornly fought against various invaders, neither the Vikings nor the English have been able to bring the Kingdom of Alba to its knees.
conquest_faction_desc_506=The successor of the Kingdom of Asturias, a Christian kingdom with León as its capital. As the largest kingdom on the Spanish peninsula, the Kingdom of Leon was charged with leading other Christian nations together against the expansion of the Caliphate of Cordoba.
conquest_faction_desc_507=The Basques established an independent kingdom with Pamplona as its center. The people of Pamplona, who had successfully defended the kingdom against the Frankish kingdom at its inception, would not back down from the equally powerful Caliphate of Cordoba.
conquest_faction_desc_508=The Breton Kingdom of Barcelona was initially a frontier countdom established by the Frankish kingdom with Barcelona as its center, but as internal strife raged in the West Frankish kingdom and the kingdom became increasingly unable to support the Barcelona counts, the Breton Kingdom's ties with the Frankish kingdom grew weaker.
conquest_faction_desc_509=The Umayyad dynasty descendants established an Islamic kingdom in the Iberian Peninsula, which became known as the Caliphate of Kovador after Abdurrahman III made himself caliph. Currently, the empire is growing stronger under the rule of this "ever-victor" and is on the verge of unifying the entire Iberian Peninsula.
conquest_faction_desc_510=The dynasty was founded by the Arabian nobleman Idris after integrating the local Berber tribes. Now that the kingdom is in decline, with civil strife and the prying eyes of its powerful neighbor to the north, the kingdom needs to handle its diplomacy carefully, or risk its downfall.
conquest_faction_desc_513=After the death of the great Alan I, the Vikings came back and invaded most of Brittany. After fighting against the Vikings for nearly 30 years, Allen II succeeded in expelling these Norse pirates and re-establishing the Duchy of Brittany.
conquest_faction_desc_514=After the Frankish Kingdom was divided into three by the Treaty of Verdun, the West Frankish Kingdom inherited the western territories of the original kingdom. Now that the Gallorin dynasty had fallen from power, the vassals in the country had grown bigger, and there were even rebels like Yuge who dared to seize the royal territories, the road to the revival of the West Frankish kingdom seemed extremely difficult.
conquest_faction_desc_515=For a long time, the lower Seine region was frequently attacked by the Vikings, so the West Frankish kingdom granted the region to the Viking chief Rollo in exchange for peace and the allegiance of this Viking tribe, and Rollo established the Duchy of Normandy with Rouen as the center.
conquest_faction_desc_516=Although the Duke of Franconia and Count of Paris, who had installed Louis IV on the throne of West Franconia, his family's power was scorned and feared by Louis IV, who was determined to strengthen his royal power.
conquest_faction_desc_517=The name Aquitaine dates back to the Gallic province of Aquitaine during the Roman Empire. The Roman culture that prevailed in Aquitaine made it distinctive among the West Frankish kingdoms, and the Principality of Aquitaine thus retained a certain degree of independence.
conquest_faction_desc_518=The countdom was established by the Caroline Dynasty with Toulouse as the center. Now that the Garolin dynasty has fallen, the Toulouse burgh is nominally subordinate to the West Frankish kingdom, but the West Frankish kingdom is no longer able to intervene effectively in the Toulouse burgh.
conquest_faction_desc_519=The kingdom formed by the merger of the Upper and Lower Burgundian kingdoms, so it is also called the Kingdom of the Two Burgundies, named because the capital is located in Arles. The Kingdom of Arles was located between the Eastern and Western Frankish kingdoms and needed to be careful with these two great powers.
conquest_faction_desc_520=Since his succession to the throne, King Otto I of the East Franks was committed to strengthening the king's power and insisting on the king's authority over the vassals, which led to many conflicts between the kingdom and the principalities and even triggered several rebellions. However, Otto I firmly believed that only by uniting all the forces of the kingdom under his own command could the glory of the Frankish kingdom be restored.
conquest_faction_desc_521=The Treaty of Verdun divided the Frankish kingdom into three kingdoms: West, Middle and East, but only 12 years later the Middle Frankish kingdom was divided into three again and the Duchy of Lotharingia was born. The duchy was coveted by the western and eastern kingdoms because it inherited the region of Austrasia, where the Franks had emerged.
conquest_faction_desc_522=It is also known as the Duchy of Franconia, one of the autonomous duchies of the East Frankish Kingdom. The Duchy of Franconia was briefly under the control of the Duke of Franconia after the extinction of the Garolin family of East Franconia, perhaps because of which the Duchy of Franconia was reluctant to submit to Otto I from Saxony.
conquest_faction_desc_523=One of the autonomous duchies of the East Frankish Kingdom, the name Bavaria dates back to the Roman Empire when the local tribes were referred to as "people from Bohemia". After the fall of the Caroline Dynasty, a new Duchy of Bavaria had to be created to continue the dynasty's rule in the region.
conquest_faction_desc_524=In 774 A.D., Charlemagne conquered the Kingdom of Lombardy and incorporated its northern part directly into the Kingdom of the Franks, which was later established as the Kingdom of Italy. Now that the Frankish kingdom has long since fallen apart, the Kingdom of Italy has finally gained its independence and is no longer under the control of another country.
conquest_faction_desc_526=The Duchy of Benevento originated as a duchy centered on Benevento in southern Italy after the Lombards conquered Italy. After the annexation of the Lombard kingdom by the Frankish kingdom, the Duchy of Benevento survived independently due to the separation of the Papal States.
conquest_faction_desc_527=When the Western Roman Empire fell to barbarian invasion, the inhabitants of the northern Italian coast fled to the lagoon and established settlements there, and the Venetian Republic developed. As a city-state flourishing from maritime trade, Venice needed a strong navy to defend its maritime interests.
conquest_faction_desc_528=Since the rise of Justinian the Great, the Byzantine Empire seemed to have run out of steam, and for nearly 400 years afterwards, the empire was plagued by internal and external problems, and its lands were lost one after another. But a great nation does not sink forever. After the governance of the previous Macedonian emperors, the Byzantine Empire recovered its power and was ready to regain its lost territories.
conquest_faction_desc_529=In the 7th century AD, the Byzantine Empire invited the Croats to move into Dalmatia as a joint effort against the marauding Avars, and the Croats established themselves in Dalmatia and gradually developed into the Principality of Croatia.
conquest_faction_desc_530=The Serbian regime in Dalmatia, the fledgling Serbian principality, was facing the threat of Bulgarian invasion, and perhaps cooperation with the Byzantine Empire, which was locked in a bitter war with the Bulgarians, was a good option.
conquest_faction_desc_531=Since its foundation, the Bulgarian Empire has been at war with the Byzantine Empire for years, and even an ancient power like Byzantium had to submit to the Empire's military front. But prosperity is bound to decline, and now the Bulgarian Empire is suffering from a civil war, and the defeated men around it have conspired to seemingly take advantage of the opportunity to counterattack.
conquest_faction_desc_532=That is, the Danish Germans, which usually refers to the Viking tribes living in southern Scandinavia. Compared with other Viking tribes who were eager to plunder the sea, this group of Vikings who stayed in their homeland preferred to actively develop their homeland, but then they had to face the powerful East Frankish kingdom directly.
conquest_faction_desc_533=The Saxon nobleman Giro I established the border marquisate in the eastern part of the East Frankish Kingdom. As the most trusted subordinate of King Otto I of the East Franks, Giraud I was responsible for guarding the stability of the eastern border of the kingdom and expanding the kingdom's territory to the east as much as possible.
conquest_faction_desc_534=Also known as the Czech Duchy, it was a regime established by the Czechs of the Great Moravian Duchy. Although the Principality of Bohemia had a close cooperation with the East Frankish Kingdom for independence from the Great Moravian Duchy, the Principality of Bohemia eventually remained at war with the East Frankish Kingdom for independence.
conquest_faction_desc_535=The word Poland is derived from the ancient Slavic word meaning plain people, which is a good representation of the environment in which the Poles live. Faced with the eastward expansion of the East Frankish kingdom, the only way for the Poles to resist this giant was to unite together if they wanted to keep their homeland from being invaded.
conquest_faction_desc_536=When the Magyars moved from the steppes of Eastern Europe into the Carpathian Basin in the 9th century AD, the newcomers to Central Europe made their living by plundering the surrounding countries. Now, as the countries became more and more vigilant against their new neighbors, the Mazars needed to change the habits they had brought with them from the steppes.
conquest_faction_desc_538=The Pechenegs originated from the Western Turkic Ugus tribe and were briefly subordinate to the Khanate of Khoza. At the beginning of the 10th century A.D., the Pechenegs moved westward to the Don River Valley and took over the authority of the Khanate of Kosar in the region.
conquest_faction_desc_539=The Kingdom of Iberia was once a vassal state of the Byzantine Empire, but due to the rise and invasion of the Arab Empire, the Kingdom of Iberia was forced to pledge allegiance to the Arab Empire. Now that the Arab Empire is in the midst of civil strife and has no time to worry about others, the Kingdom of Iberia can seize the opportunity to befriend its old masters and get rid of the Arab control once and for all.
conquest_faction_desc_540=As an ancient kingdom that existed since B.C., the history of the Armenian kingdom is full of difficulties, as its territory was occupied and ruled by the Persians, Romans and Arabs. But even so, the Armenians did not miss any opportunity to make their country independent.
conquest_faction_desc_541=After recognizing the decline of the Abbasid dynasty, Abdullah, the former governor of Mosul in the Arab Empire, established himself in Mosul and then founded the Amirate of Mosul and called himself Amir, thus creating the Hamdani Dynasty.
conquest_faction_desc_542=One of the kingdoms that split from the Arabian Empire was the Egyptian dynasty founded by Ikhshid, a Turkic general of the Abbasid dynasty. The Ikhshid dynasty is currently competing with the Hamdani dynasty for control of Syria, the ownership of which will determine the authority of both kingdoms in the Arab world.

