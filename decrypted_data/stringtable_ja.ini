stage_intro_1701=1469年、「リデスデールのロビン」と呼ばれる人物がイングランド北部で数度にわたり反乱を起こした。かねてよりエドワード4世と対立していたウォリック伯もこの機に乗じて反乱を起こし、鎮圧のために送られた軍をエッジコートで襲った。
stage_intro_1702=1470年、ウォリック伯は再び反乱を起こそうとしたが、エドワード4世は先手を打ちホーンフィールドでウォリックの反乱軍を撃破した。多くの反乱軍の兵が逃亡の際に目印のついた服を脱いだため、「脱ぎ捨ての戦い」と呼ばれるようになった。
stage_intro_1703=ルーズコート・フィールドの戦いの後、ウォリック伯はイングランドから逃亡しマーガレット・オブ・アンジューと同盟を結ぶことでランカスター家の支持を得た。1471年4月、濃霧に包まれた朝、かつての戦友だったエドワード4世とウォリック伯は、最後の戦いへ赴いた。
stage_intro_1704=バーネットの戦いと時を同じくして、マーガレットはランカスター家の軍を率いてイングランドに上陸しロンドンへと兵を進めた。バーネットの戦いの後、この知らせを聞いたエドワード4世は軍の疲弊にも関わらず、マーガレットとの決戦に臨んだ。
stage_intro_1705=1483年4月、エドワード4世が病死すると弟のグロスター公リチャードがエドワード5世の後見役として護国卿に任命された。6月にエドワード5世が失踪したため、リチャードは戴冠し「リチャード3世」となった。エドワード4世のかつての政治上の同盟者たちはこれを簒奪と見做し、代わりにヘンリー・テューダーを王位につけることを支持した。その後、イングランドで再び反乱が勃発した。
stage_intro_1706=1483年のクリスマスにランカスター家のヘンリー・テューダーはヨーク家のエリザベス・ウッドヴィルの娘と結婚した。この２つの家はテューダー家として統合され、共通の敵であるリチャード3世に対抗した。1485年8月22日、ヘンリー・テューダーとリチャード3世はボズワースで決戦を繰り広げた。

