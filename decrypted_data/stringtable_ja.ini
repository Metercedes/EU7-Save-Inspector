;defeated_event_desc
battle_talk_thankgift0=プレゼントを置いたら、もう行ってくれ！
battle_talk_thankgift1=プレゼントは確かに受け取った。これから両国が平和であるように！
battle_talk_thankgift2=貴国のプレゼントに感謝する。両国が良好な関係を保つように！
battle_talk_thankgift3=貴国のプレゼントに非常に感謝します。どんなご要望であっても、必ず全力でお手伝いします！
battle_talk_acceptagreement1=両国の民のために、私は停戦に同意する！
battle_talk_acceptagreement2=私は通行協定を締結し、貴国と有無を通じ合うことに同意する！
battle_talk_acceptagreement3=今日から、我々は同盟国だ！
battle_talk_refuseagreement1=我らに勝てないので、命乞いをするなんてありえねー！
battle_talk_refuseagreement2=すまん。我々の関係は通行協定を締結するほど仲良くない！
battle_talk_refuseagreement3=わが国も貴国と同盟を結びたいが、今はその時ではない！
battle_talk_tearagreement2=通行協定はここまでだ。即刻、わが領土から立ち去るがいい！
battle_talk_tearagreement3=これからは、我々はもう同盟国ではない！
battle_talk_declarewar=次に会う時、我々は敵同士だ！正義の裁きを受けるがいい！
battle_talk_acceptexhort=すごく悔しいが、今は降伏するしかない！
battle_talk_refuseexhort=たとえ死んでも、我々は決して降伏しない！
battle_talk_warninvade=領土への侵犯は許されない。即刻、立ち去るがいい！
battle_talk_1=部族の勇士たち、豊かなガリアは我々に支配されるべきだ！軍馬に乗って、私に続いてガリアに進軍せよ。我らを阻止しようとする敵をすべて消滅する。
battle_talk_2=イングランド人は我々の父を惨殺した。わがラグナルの子たちよ、一致団結してイングランド人に一矢を報いるのだ！
battle_talk_3=我々はついに自分の王国を築き上げた！北海全体が強大なデンマーク王国に征服される日もそう遠くはないはずだ！
battle_talk_4=ヴァンダル王国とビザンティン帝国が戦っている今、ヴァンダル人とローマ人を北アフリカから追い払う絶好なチャンスだ。ここは元々我々モーリ人の領土だ。
battle_talk_5=なんて豊かな土地なんだろう。草原の戦士たちよ、我々の前には数え切れないほどの富がある。軍馬と弓矢でそれを手に入れよう！
battle_talk_6=ベリサリウスがヴァンダル王国を滅ぼした後、イタリアで東ゴート王国の軍を破り、ラヴェンナまで奪還した。軍隊で彼の声望が非常に高いので、気をつけなければならない。
tutorial_talk_101=ようこそ、中世紀へ！ここでは、征服モードについてのシステムやゲームプレイをご紹介します。では、プレイしたい勢力を選んでください。
battle_talk_8=左上の政策アイコンをタッチすると、政策画面を開けます。
battle_talk_9=服モードでは、資源を使って政策を研究すると、それなりの政策を使えるようになります。
battle_talk_10=政策画面で執政官を変更できます。執政官の内政スキルは色んな効果をもたらすことができます。
battle_talk_11=執政官の内政能力は研究に必要な資源を減少できます。
battle_talk_12=1ターンにつき、執政官を一回しか変更できないので、ご注意ください。
battle_talk_13=各勢力にはそれぞれの任務があり、その任務を果たすと、それに応じた報酬が得られます。
battle_talk_14=征服モードでは、各勢力に勝利条件が設定されており、すべての勝利条件をクリアすると勝利となり、それに応じた報酬が得られます。
battle_talk_15=設定された条件を満たすと、勝利の決済画面で征服をやめるか、続けるかを選べます。
battle_talk_16=現在、勝利条件はまだ1つ完成していないです。サクソン人の首都ウィンチェスターを占領してください。
battle_talk_17=城内の酒場を通じて、司令部にあらかじめ設定された部隊を募集することができます。
battle_talk_18=最初の募集だけが無料であることを忘れないでください。
battle_talk_19=征服モードでは、他勢力との外交が可能です。
battle_talk_20=現在、他の国との外交関係や外交値、またはその外交値の変化を確認することができます。
battle_talk_21=あなたは現在、サクソン人とアングル人とは戦争中で、ジュート人とは平和な状態になっています。
battle_talk_22=サクソン人との外交値は低下していて、アングル人とは上昇していて、ユート人とは変化なしということです。
battle_talk_23=二正面作戦は得策ではありません。現在、あなたとアングルとの外交値を考えると、休戦を試してみましょう。
battle_talk_24=この外交画面では、双方の執政官や資源、他の国との外交関係などを確認することができます。
battle_talk_25=双方の外交関係や外交値、外交値の変化も確認することができます。
battle_talk_26=現在の外交値を表すカーソルが「戦争」と「停戦」の間にある場合、双方は停戦を締結することができます。
battle_talk_27=外交値カーソルが「停戦」に近ければ近いほど、停戦を締結する確率は高くなる。
battle_talk_28=相手側と交渉する際、プレゼントを贈ることで双方の外交値を高めることができます。
battle_talk_29=贈り物に使う資源が多いほど、外交値が高くなります。
battle_talk_30=アングル人との外交値は停戦を締結するのに十分なので、アングル人と停戦を締結してください。
battle_talk_31=通行協定や同盟協定を締結する手順は、停戦協定を締結する手順と同じです。
battle_talk_32=停戦協定を締結した後、通行協定を締結でき、通行協定を締結した後、同盟協定を締結できるという流れにご注意ください。
battle_talk_33=相手の首都を占領すると、相手に降伏を求めることができます。
battle_talk_34=ウィンチェスターを占領した以上、サクソン人を説得してみましょう。
battle_talk_35=説得の成功確率は、自分と相手の現在の実力に影響されます。
battle_talk_36=征服モードでは、時代によって募集できる部隊のランクが制限されます。
battle_talk_37=条件を満たした場合、次のターンから時代は自動的にアップグレードします。
battle_talk_38=示された条件によると、ブリトン人が暗黒時代に到達するためには、二級都市が2つ必要とされます。
battle_talk_39=征服モードのチュトリアルはこれですべて終了しました。
battle_talk_40=敵の攻撃を受けて苦しんでいる東方の十字軍の国々から救援の手紙が来た。神聖ローマ帝国の兵士たちよ、私と共に十字軍の兄弟たちを支援するために東方へ進軍せよ。
battle_talk_41=フランス王国の兵士たちよ、私は教皇の呼びかけに応え、十字軍の国々を支援するために軍隊を率いてエルサレムを支援し、至高の栄光を手に入れようと決めた！
battle_talk_42=イスラム世界は、ヨーロッパの十字軍の侵略に苦しんでいる。大セルジューク朝は、西アジアの人々を率いて反撃し、十字軍を追い払って再び世界に大セルジューク朝の力を示さなければならない。
battle_talk_43=戦争は野心家の天国だ。中東の国々や勢力が互いに戦っているのは、我々クマン・キプチャク人にとって南下する好機である。
battle_talk_44=エルサレムは我が軍に奪還された。栄光は我々のものだ！
battle_talk_45=王朝の戦士たちよ、アッバース朝は今弱まっている。今はアラブ帝国の栄光を再建する時だ。我々ファーティミッド朝にしか、アラブ帝国の栄光を取り戻せないんだ！
battle_talk_46=ビザンティン帝国から、ブルガリア帝国を一緒に攻めようと誘われている。賢しらなギリシャ人め、我々を刃として使いたがっている。ただし、彼らは我々が豊かなバルカン地方に入るための口実に困っていることを知っていない。
battle_talk_47=アッバース朝の時代はもはや過去のものとなった。次は、我々ブイド王朝がイスラム世界をリードしていくことになるでしょう。
battle_talk_48=これは神への冒涜であり、裏切りである！ 教皇の名において呼びかける。キリストを信じるすべての人々は直ちに武器を取り、この裏切り者を討伐せよ！
battle_talk_49=将兵たちよ、教皇はさきほど私を「神聖ローマ帝国の皇帝」として認めてくれた。これから西ローマ帝国の栄光は私たちが受け継ぐことになる。今日から、我々は新しいローマ帝国だ！
battle_talk_50=たかがゲルマンの野蛮人がローマ帝国皇帝を名乗るとは。これはビザンティン帝国に対する侮辱である。もしこの簒奪者を倒さないと自分をローマ人として名乗ることができない。
battle_talk_51=将兵たち、ジギスムントが神聖ローマ皇帝になって以来、我々ハンガリー人を見捨てた。また、ボロボロになった帝国を維持するために王国さえ売り渡した。彼はもはやハンガリーの王としてふさわしくない。
battle_talk_52=イングランド人対する神の態度は私は知らない。私が知っているのは、死者を除いてすべてのイングランド人がフランスから追い出されることだけだ。
battle_talk_53=フランスの将兵たちよ、私と共にランスへ進行せよ。そこで王太子はフランス国王として戴冠する。そして神は我々と共におられる。
battle_talk_54=国を裏切ること以外、私が恐れるものは何もない。フランスのために、私はいつ死んでも構わない！
battle_talk_55=ハンガリーの戦士たち、神聖ローマ帝国国内で反乱が多発している。我々は帝国を助けて反乱を鎮めなければならない。東方からの侵略を退くには、帝国からの支援が必須不可欠だ。
battle_talk_101=中世の世界へようこそ。ここでは、戦闘の基本をお教えします。
battle_talk_102=矢印で示された部隊を選んで移動先を決めれば移動できる。
battle_talk_103=複数のエリアを選択して連続的に移動できますが、総移動距離は決まっています。
battle_talk_104=そのエリアが自分の到達したい目標地点ではないとわかった時には、撤回を選択して到達したいエリアを選び直すことができます。
battle_talk_105=部隊が目標地点に到達してすべての行動力を消費した場合、その部隊は攻撃できなくなります。
battle_talk_106=自分の部隊を選択して、ターゲットの隣に移動し、行動力がまだ残っている場合、攻撃を仕掛けることができます。
battle_talk_107=残りの行動力が多くある場合、複数回攻撃を仕掛けることができます。
battle_talk_108=自分の部隊に将軍を配置できます。将軍を配置すると部隊の戦闘力を大きく上げられます。
battle_talk_109=将軍はアクティブスキルを1つ持っています。アクティブスキルの効果は、将軍ごとに異なります。
battle_talk_110=これは重要な目標地点です。ここを占領して勝利条件を満たせば、勝利となります。
battle_talk_111=さて、戦闘の基本を学んだところで、戦争もまもなく始まります。
battle_talk_112=普通なら、攻撃毎に行動力を6点消耗するが、残った行動力がゼロより大きい場合、ゼロになるまで継続的に攻撃することができます。
battle_talk_201=都市で自分のために戦ってくれる部隊を募集できます。
battle_talk_202=異なる種類の部隊であっても、1つの分隊に統合することができます。
battle_talk_203=右下のボタンをタッチすると、次のターンに入ることできます。
battle_talk_204=まだ行動できる部隊が残っている場合、注意メッセージが表示されます。
battle_talk_205=攻撃を受けた部隊があります。その中の兵力の少ないチームを解散できます。
battle_talk_206=部隊のチーム数が3つ以下の場合、補充することができます。
battle_talk_207=補充する時に部隊の種類に制限はありません。
battle_talk_208=現在、規定のターン数で勝利すればいいです。
battle_talk_209=部隊を補充すると、軍団内においてその部隊の位置や士気、行動力、特性などを確認することができます。
battle_talk_301=これからは建設に関する操作をしてみましょう。
battle_talk_302=都市ボタンをタッチすると、都市の施設をレベルアップさせることができます。
battle_talk_303=各施設が持つ効果は異なります。
battle_talk_304=これは村です。村は城にレベルアップさせることができます。
battle_talk_305=城では都市で募集できない部隊を募集できます。
battle_talk_306=城のレベルを上げることができます。 城をレベルアップさせると、より高レベルの部隊を募集できます。
battle_talk_307=攻撃を受けた部隊の士気は低下します。部隊を補充すると、一定の士気を回復できます。
battle_talk_308=現在、我々は重要な地点を守る必要があります。もちろん、敵を全滅させることも可能です。
battle_talk_401=マップ上には建物が幾つか存在しています。
battle_talk_402=銀鉱は銀貨の収入をもたらしてくれます。
battle_talk_403=鉄鉱工場は鉄鉱の収入をもたらしてくれます。
battle_talk_404=奇観は幾つかの特別な効果をもたらしてくれます。国の奇観によって効果も違います。
battle_talk_405=川や海に入るために、部隊に船を配備させる必要があります。
battle_talk_406=輸送船と騎兵が水上で戦う時、戦闘力は大きく低下します。
battle_talk_407=したがって、騎兵に船を装備させるのはできるだけ避けてください。
battle_talk_408=戦闘の基本はこれですべて完了しました。
battle_talk_501=地形によって行動力の消耗が異なり、複雑な地形を通行するにはより多くの行動力が必要とされます。
battle_talk_502=ここで、自分の政策を確認することができます。
battle_talk_503=ただし、征服モードでしか、政策を研究できません。
battle_talk_504=ここで人口や野心、経済を確認することができます。
battle_talk_505=人口が多くなると、自分の野心も高まり、経済に影響を与えることに要注意です。
battle_talk_506=各ターンの開始時に、技術ポイントを1点獲得できます。機械の組み立てに技術ポイントを使うことができます。
battle_talk_507=利用可能な技術ポイントを合理的に使ってください。
battle_talk_10101=ゴート人はついに本音を出した。我々の豊かな土地を占領しようとしている。将兵たちよ、野蛮人を我々の領土から追い出せ！
battle_talk_10102=ローマ人は偽善極まりない。我々を奴隷として駆使し、匈奴人と戦わせようとしているが、食べ物をよく多く分けてくれない。ゴートの勇士たち、武器を持って抵抗しよう！
battle_talk_10201=さきほど、前線のセバスティアンナス将軍からゴート人の先兵部隊は撃退されたとの朗報が届いた。今は反乱を起こした蛮族たちを一気に消滅する時だ！
battle_talk_10202=しっかりしろ！ローマ人の攻撃は無力だ。アラシスが騎兵隊を率いて帰ってくるまで持ち堪えれば、反撃に転じるのだ。
battle_talk_10203=よくやった。ローマの兵士たちは疲れ果てしまった。我々は背後から敵陣地の左翼に突撃すれば、彼らにトドメを刺してローマ皇帝を生け捕ることができる！
battle_talk_10301=皇帝陛下は西ゴート人に包囲されている。全軍は速やかに進軍してミラノの守備軍を支援する。
battle_talk_10302=アラリックの本隊はこの先にある。西ゴート人を徹底的に殲滅するぞ！
battle_talk_10303=ローマ帝国の皇帝として、このような危険な場所に身を置くべきではない。
battle_talk_10304=戦士たち、ローマ人の皇帝はミラノにいる。ミラノを破り、ローマ皇帝を捉えれば、豊かなイタリアは我々のものとなる。
battle_talk_10401=ローマ城はもう長く持ちこたえられない。この城を敵の手に渡してはいけない。アフリカからの援軍はまもなく到着する。
battle_talk_10402=アラリックはローマ城を荒らした。彼がラヴェンナに攻撃するのを阻止しなければならない。
battle_talk_10403=アラリック、今度こそ貴様を倒し、ゴート人の王は誰なのか世に知らせてやる！
battle_talk_10404=卑劣なローマ人は我々を襲った。どうやら交渉は時間稼ぎの言い訳に過ぎないようだ。ホノレはローマの平和と引き換えに身代金を支払いたくないなら、我々は自分で取りに行こう！
battle_talk_10405=サルス、貴様は自分の民族を裏切った。
battle_talk_10406=いけない。ローマ軍の援軍が来た。
battle_talk_10501=ハーメリック、ここの地形は複雑だ。敵の情況を見極めなければ進軍できない。
battle_talk_10502=軟弱なヴァンダル人には、イベリアの豊かな土地を所有する資格はない。彼らの領土はわがスエビ王国が持つべきだ！スエビの勇士たち、かかれ！
battle_talk_10503=スエビ人と正面から戦うな。彼らはここの地形を詳しく分かっていないので、我々の待ち伏せに誘い込めばいい。
battle_talk_10601=ヴァンダル人が条約を守ることを信じるべきではなかった。戦士たち、帝国軍の増援はまもなく到達する。
battle_talk_10602=勇士たち、カルタゴ城を攻め落とせば、莫大な富を得るだけでなく、北アフリカの最も豊かな土地も我々の手に落ちる！
battle_talk_10603=ローマ人の援軍が来た。彼らの上陸を阻止しろ！
battle_talk_10701=王国様、首領様、匈奴人の残虐さはすでにご存知いただいていると思います。我々は力を合わせて、敵を徹底的に打ち破らなければなりません。
battle_talk_10702=匈奴人が現れた時から、私たちは攻撃され、ドナウ川からライン川までに追いやられた。アランの勇士たち、我々にはもう退く道はない。匈奴人を倒さなければならない。
battle_talk_10703=ローマ人は西ゴート人とフランク人とアラン人と連合した。これでわが軍隊に対抗できると思っているのか？本当に身の程を知らずだね。
battle_talk_10704=慌てるな。全員が私のところに集合し、防御線を構築せよ。
battle_talk_10705=狼は羊が何匹いるか気にはしない。
battle_talk_10801=ヴァンダル人は長い間ローマの富を狙っていた。今回、ゲサリックの出兵の目的は、彼の言ったように立派ではない。
battle_talk_10802=マクシムスは王位を簒奪した卑劣者。ローマ帝国の皇帝としてはふさわしくない。
battle_talk_10803=ウァレンティニアヌス3世の盟友として、皇后を助けるために簒奪者であるマクシムスをローマから追い出すべきだ。
battle_talk_10804=あの名高い「永遠の城」が目の前にある。ローマ城を陥落させれば、城内の宝物は勇敢なヴァンダル戦士のものとなる。
battle_talk_20101=我らの隣国は数えきれないほどの富を持っているが、その富はまもなく我々のものになる。
battle_talk_20102=攻撃開始！ローマの貴族たちは自分の安全のためにお金を使うだけだ。
battle_talk_20103=我らの騎兵はペルシャ人の相手ではないが、彼らを恐れない。
battle_talk_20201=皇帝はアフリカで起きた反乱を容認できない。難民の大量流入によって、コンスタンチノープルで混乱が発生している。
battle_talk_20202=兵士たち、反乱軍を殲滅せよ。彼らのリーダーは我らの主な目標だ。できるだけ無益な戦いを避けよう！
battle_talk_20203=ヴァンダル王国はローマ帝国の支配から完全に脱出しなければならない。
battle_talk_20204=海から来た敵を消滅する。
battle_talk_20301=陣地を守ろう。敵の騎兵に怯えるな！
battle_talk_20302=私の撤退に時間を稼いでくれ。私が撤退に成功すれば、敵の目的は達成できない！
battle_talk_20304=私はもう一番近いの沿岸都市に到着した。海に出れば敵はもう私に追いつけない。
battle_talk_20303=攻撃せよ。敵は敗退し続けている。帝国の前進を阻むことはできない！
battle_talk_20401=イタリア地域は帝国の支配に回帰しなければならない。侵入者をすべて追い払うのだ！
battle_talk_20402=敵は直接海上から攻撃を開始した。私たちにとってこれは決して良い情報ではない。
battle_talk_20403=機械を利用して城を守ろう。彼らの攻撃は長く続けない。
battle_talk_20501=敵は大量の部隊を集めてラベンナに攻撃を開始した。彼らの後方は手薄であるはずだ。
battle_talk_20502=ローマがすでに占領されたので、失われる可能性はない！
battle_talk_20601=我々の食料が不足しているので、ローマを守り切れない。撤退したほうがいいかもしれない。
battle_talk_20602=敵は次々と現れている。私は奴らの追撃を少し遅らせるしかできない。
battle_talk_20603=敵をイタリアから追い出せ！この土地は我々のものになった。
battle_talk_20701=イタリアでのローマ帝国の勢力はまだ完全に除去されていない。彼らは海を通じて軍隊を動員することができる。
battle_talk_20702=インドルフ、艦隊を率いてアンコナに向かって前進し、制圧する。そこはイタリアでローマ人の最も重要な基地である！
battle_talk_20801=我々の目標はローマだけだ。ほかの敵に足止めされてはいけない。
battle_talk_20802=早く敵を消滅しろ。帝国の国境は再びイタリアを覆うようにある！
battle_talk_20803=全軍出撃。目にある敵をすべて消滅する！
battle_talk_20901=ゴート人はフランクからの援軍を得た。彼らの多くは烏合の衆であったが、フランクの精鋭部隊が混在している。
battle_talk_20902=野蛮人たちを気にするな。フランクの歩兵に集中しろ！
battle_talk_21001=ローマ人の主力はイタリアで戦っているので、本土はきっと手薄であるはずだ。
battle_talk_21002=兄弟たち、私と一緒にコンスタンチノープルに進軍しよう。
battle_talk_21003=欲深い野蛮人め、よくも再びこの土地に足を踏み入れた。
battle_talk_21004=ベリサリウス、部隊を率いて奴らを消滅しろ！
battle_talk_30101=ローマ人は豊かなブリテン島を簡単に放棄することができるが、我々はこの機会を逃してはいけない。
battle_talk_30102=ブリテン島は大きいが、我々アングロ・サクソン人の居場所はない。
battle_talk_30103=私はアングロ・サクソン人が信用できないと言ったはずだ。ブリテンの勇士たち、我らの故郷から敵を追い払おう！
battle_talk_30201=ブリテン人は本土で戦っているため、人数は多い。我々兵力だけで奴らの町をすべて制圧することは難しい。
battle_talk_30202=私は近くの海域にいる友軍部隊と連絡を取った。我々はまず沿海都市を制圧し、友軍の上陸を導く。それから兵力を集中して内陸へ進軍する。
battle_talk_30203=敵の増援が来る前に、このアングロ・サクソン人の軍隊を殲滅しなければならない。
battle_talk_30301=今度は軟弱なブリテン人を徹底的に征服し、彼らの土地をわがノーサンブリア王国に版図に入れなければならない。
battle_talk_30302=今回の裏切りに代価を払ってもらう。
battle_talk_30303=ノーサンブリア軍隊の攻勢は猛烈だが、わがブリテン人が一致団結すれば、必ず奴らを倒すことができる。
battle_talk_30304=アングロ・サクソン人は一致団結しているわけではない。マーシア王国もノーサンブリア王国の拡張を心配している。彼らは機会を見てエセルフリースに強く一撃を与えるだろう。
battle_talk_30305=ノーサンブリア王国の拡大を黙って見過ごすわけにはいかない。彼らの野心にはきりがない。
battle_talk_30401=グウィネズの戦士たち、今回マーシア王国との同盟は我々にとってノーサンブリア王国に抵抗する最後の機会だ。全力を尽くしなければならない。
battle_talk_30402=うろたえるな！一度は負かした連中だ！敵の攻撃を防ぎ切れば、ノーサンブリア王国の台頭は誰にも阻止できない！
battle_talk_30403=この戦いで我々とグウィネズ王国は全力を出し切っている。もし、それでもエドウィンを倒せなければ、ブリテンはノーサンブリア王国の手に落ちる。
battle_talk_30404=勝利を収め続けることで、エドウィンは思い上がっている。ノーサンブリアの防御線は抜け穴だらけだ！
battle_talk_30501=諸君、私は先王エセルフリースの子オズワルドだ。わが国は存亡の危機に瀕している。侵入者に勝利し、ノーサンブリア王国を復興させるために、私はここに戻ってきたのだ。
battle_talk_30502=オズウェイ。さきほど、私は聖人の夢を見た。この戦いはわが軍は必勝だと言われた！
battle_talk_30503=戦士たち、カドバロンは私に敗れた。残りの領土を一気に奪還するぞ。
battle_talk_30504=兵士たちを率いられる王が必要だ。あなたがノーサンブリアの王として戴冠することをみんなが支持している。
battle_talk_30505=ノーサンブリア王室にはまだそんな人物がいるとは思わなかった。しかし、彼の人生はここで終わるのだ！
battle_talk_30601=マーシア王国は常にグウィネズ王国とポーランド王国と連合してわが国を侵犯した。彼らはノーサンブリア王国の発展を邪魔している。彼らを徹底的に消滅しなければならない。
battle_talk_30602=ペンダはやはりポーイス王国を助けに来た。私とエオワの約束によれば、ペンダ軍がマーシアを離れれば、彼は兵を挙げてマーシアの王位を奪取する。
battle_talk_30603=わが軍の側面にグウィネズ王国軍隊が大量に出現した。我々には包囲される危険がある。
battle_talk_30604=ノーサンブリアが数年を掛けて発展したとたん、オズワルドは待ちきれずに戦争を始めた。エオワ、後方は君に任せる。私は軍を率いてポーイス王国を支援する。
battle_talk_30605=エオワ、あなたの裏切りは意外ではない。私はこの機会に乗じてすべての危険を取り除くことができる。
battle_talk_30606=ペンダ、私はもう君の言いなりにはならない。私こそマーシアの王であるべきだ。
battle_talk_30701=兵士たち、敵の人数が多いが、補給は困難だ。我々が都市を利用して防御すれば、敵は必ず撤退する。
battle_talk_30702=オズウェイを撃破すれば、ノーサンブリア王国に我々と抵抗できる軍隊はない。その時、王国の富はすべて我々の手にある！
battle_talk_30801=ルダカ、今までウェセックス王国はわがマーシア王国の支配に従っていない。今度の出兵は、ウェセックスを徹底的に征服し、他の王国を威嚇する。
battle_talk_30802=私はマーシア王国の怒りを買えば、どんな結果があるか教えてやる。
battle_talk_30803=戦士たち、マーシア王国の攻撃を食い止めれば、他のマシアに不満な王国は必ず我々を助けてくれるだろう。ウェセックスは孤立無援ではない。
battle_talk_30804=反撃の時が来た。これでマーシア王国の覇権は終わる。
battle_talk_40101=見掛け倒しのローマ人は一撃にも耐えられない！使者の仇を討ちましょう！
battle_talk_40102=おかしい！侵入者は代価を払わなければならない。ローマの強さを見せてやる！
battle_talk_40103=死傷者が多すぎる。撤退しろ！我々はきっと戻ってくる。しかし、今はまだその時ではない。
battle_talk_40201=敵の人数は我々の10分の1にも満たない。返り討ちにしてやる！
battle_talk_40202=これらの烏合の衆は一撃にも耐えられない。ローマ人の領土に足を踏み入れる前に誰も私を止めることはできない。
battle_talk_40203=後方へ撤退しろ。ハーリドの軍隊は確かに強い。
battle_talk_40301=ローマ人は長い間ここに巣食っている。今は私たちの馬とラクダをもっと遠くまで行かせる時だ。
battle_talk_40302=ダマスカスは守りの堅固な城であるが、城主の決心次第で陥落できないわけではない。
battle_talk_40303=相手の人数は確かに多いが、彼らは速戦で決着しようとしている。我々が死守すれば、彼らは必ず撤退する。
battle_talk_40304=我々には救援が必要だ。
battle_talk_40401=これが我々の最後の陣地である。堅固な城が我々に勝利の希望を与えてくれることを願っている。
battle_talk_40402=これはわが勢力を外に拡張する最高の機会だ。兵士たち、勇敢に戦いなさい。
battle_talk_40403=今のローマ人は最も得意とすることは撤退と降伏だ！
battle_talk_40501=エルサレムを奪還しろ。この都市が敵の手にある時間は長すぎだ！
battle_talk_40502=我々は完全に包囲された。この状況では我々は長く持ち堪えられない。
battle_talk_40503=私は人々のためにこの都市を捧げたい。私はこれ以上の死亡を望んでいない。
battle_talk_40504=聖城は帰ってきた。今は北部に進軍し、もっと多くの都市を奪取する時だ！
battle_talk_40601=ローマ人をシリア地域から完全に追い払う時が来た。軟弱なローマ人はもうどうにもならない。
battle_talk_40602=我らは極めて強い部隊を率いて支援に来た。時間こそが我々の最大の敵だ！
battle_talk_40603=我々の援軍が来た！間に合ってよかった！
battle_talk_40701=ローマ人は我々がこのような大砂漠を越えて襲ってくるとは思わなかったはずだ！
battle_talk_40702=シリアを占領したアラブ人は今、アフリカに手を染めようとしていた。奴らの思う通りにさせてはいけない。
battle_talk_40801=帆を上げて全速前進！敵が反撃部隊を組織する前に彼らを倒す。
battle_talk_40802=敵の攻撃が突然すぎて、我が戦船には十分な乗組員がいない。私はできるだけ時間を稼ぐ。
battle_talk_40803=敵の反抗は非常に激しくなっている。後援部隊を戦闘に投入しなければならない。
battle_talk_40804=支援艦隊が到着した。我々の海を取り戻そう。
battle_talk_50101=すぐに上陸しろ！ここ沿岸都市には大量の富がある。これは我々が欲しがっているものだ。
battle_talk_50102=目にあるものをすべて奪え！
battle_talk_50103=強盗たちはまた我らの都市を襲ってきた。我らは彼らの相手ではない。
battle_talk_50201=彼らの防御は一撃に堪えない。ここの都市を占領して、我々の新しい家に変えよう。
battle_talk_50202=私たちは彼らを正面から倒すことはできない。戦力を温存して反撃のチャンスを待とう。
battle_talk_50301=部隊は分散してそれぞれ敵を捜し、追撃しよう！
battle_talk_50302=斥候より敵が兵力を分散したとの情報が届いた。これは敵を1個ずつ撃破できる好機である。
battle_talk_50303=わが部隊は敵に包囲された。もし救援を得られないなら、状況は非常に不利になるだろう。
battle_talk_50401=ヴァイキングは籠城を得意としている。これによって攻城戦で彼らにほとんど勝てないようになる。
battle_talk_50402=敵を荒野に誘い込もう。城壁の保護を失えば、敵は一撃に堪えない。
battle_talk_50501=我々は既に長い間敵を包囲していた。彼らが撤退するのは時間の問題に過ぎない。
battle_talk_50502=敵の反撃に気をつけ、全力で戦おう。敵が撤退を完了する前に彼らを消滅させる。
battle_talk_50601=我々はダブリンから援助を得た。彼らは我々と一緒に戦う。
battle_talk_50602=今日は我々とこの国の運命を決定する。兵士たち、武器を取って私と一緒に戦おう！
battle_talk_50603=我々の友軍は攻撃されている。早く彼らを援助する。
battle_talk_50701=敵の人数は我々よりはるかに少ない。これは彼らを消滅する絶好の機会だ。
battle_talk_50702=兵士たち、突撃せよ。敵をすべて消滅しろ！
battle_talk_50703=後続部隊はまだ到着していない。なんとか敵の攻撃を阻止しなければならない。
battle_talk_50704=私たちには反攻のチャンスが必要だ。
battle_talk_50801=侵入者め、貴様らの侵入行為はここまでだ。
battle_talk_50802=敵は前回の戦いを経て甚大なダメージを受けたが、依然として高い戦闘力を保っている。
battle_talk_50803=奴らを消滅すれば、私はこの土地の王になる！
battle_talk_60101=この都市の防御は一撃に堪えない。攻撃せよ。都市の富はすべて我々の戦利品になる。
battle_talk_60102=都市を破った後、我々は直ちに撤退しなければならない。現在、我々の撤退ルートにはすでに敵が現れている。
battle_talk_60103=私達はもう長く待っていました！奴らを殺せ！
battle_talk_60104=我々は待ち伏せに遭った。直ちに撤退しろ！
battle_talk_60201=わが部隊の数は敵をはるかに上回っている。優勢は明らかだ！
battle_talk_60202=騎士部隊、我と共に突撃せよ！
battle_talk_60203=太陽が消えた。これは不吉な徴候だ！
battle_talk_60204=攻撃せよ。敵の士気は非常に低下している。この絶好のチャンスを逃すわけにはいかない。
battle_talk_60301=兵士たち、私たちのやっていることは正義だ。ビザンティン帝国の支配は今日で終わる！
battle_talk_60302=非現実的な幻想を捨てろ。コンスタンティノープルの城壁は決して倒壊しない。
battle_talk_60303=プトロトス、自分のやったことをまだわかっていないのか？
battle_talk_60304=敵の援軍としてブルガリア人が来た。我々は今、挟撃されている。
battle_talk_60401=マジャル人はこれ以上我々に脅威を与えてくれないだろう。ビザンティン帝国に集中しろ！
battle_talk_60402=私達の主力部隊は遥かな東側の国境にいる。我々は今、自分の力で敵の侵入を防ぐしかない。
battle_talk_60403=状況は我々にとって非常に不利である。何とかしてサイモン1世を撤退させなければならない。
battle_talk_60404=敵の反撃が開始した。援軍はどこにいるか？
battle_talk_60501=これは我々の運命を決める戦いになる。我々の敵は非常に強い。
battle_talk_60502=我々の隣人にサプライズをあげよう。兵士たち、突撃開始！
battle_talk_60503=斥候部隊は既に敵の後方に到達した。攻撃を開始せよ。
battle_talk_60504=私達の都市は攻撃を受けている。奴らは一体どうやってあそこに行ったのか？全員で撤回しろ。
battle_talk_60505=増援部隊はどこにいるのか？すべて出せ！私は今、優勢を占めている。これで終わるわけがない。
battle_talk_60601=アラブ人の援助を要請した計画はビザンティン帝国に破壊された。今は私達だけで奴らに対抗するしかない。
battle_talk_60602=彼らの主力が到着する前に、敵部隊を迅速に解決しなければならない。
battle_talk_60603=コンスタンティノープルが目の前にある。ここを落とせば、この都市にもう前線陣地はない。
battle_talk_60604=我々は敵の包囲攻撃を受けた。これが我々の最後の援軍だ。あなたは急がなければならない。
battle_talk_60605=後続部隊を前線に派遣する。敵の防御はまもなく崩れる。
battle_talk_60701=我々はロス人の部隊に遭遇した。彼らの兵士が強くて、我々はしばらく撤退しなければならない。
battle_talk_60702=前進せよ！敵をすべて消滅する。
battle_talk_60703=その場で防御陣地を築こう。我らの援軍はまもなく来ると思う。
battle_talk_60704=ビザンティン人はどうしても私がスラブ人と一緒に攻撃してくるとは思わなかっただろう。
battle_talk_60705=我々の部隊はかつてない危機に遭遇した。
battle_talk_60801=私は失った領土を取り戻すことを誓った！兵士たち、攻撃せよ。
battle_talk_60802=ただの烏合の衆にすぎない。私達は一寸の土地さえ放棄しない。
battle_talk_60803=我らの都市は攻撃を受けている。すぐに救援に行こう。
battle_talk_60804=私の部隊は作戦を続けることができない。一時撤退するしかない。
battle_talk_60805=関所が攻撃を受けている。防御を強化しよう！
battle_talk_60901=敵は川の北岸に駐屯している。奴らは長い旅で疲れているに違いない。
battle_talk_60902=私達は密かに奴らの首領を倒す必要がある。いつもここで兵力を消費してはいけない。
battle_talk_61001=兵士たち、攻撃しろ！ブルガリアは我々の攻撃を正面から防ぐことができない。
battle_talk_61002=敵の攻勢がとても猛烈だ。我々は今、防御を固めるしかない。
battle_talk_61003=援軍を出せ。これは我々の最後の戦力だ。
battle_talk_61004=我々は敵の最前線にある都市を占領した。我と共に突撃せよ！
battle_talk_70101=イングランドの王座は私のものであり、私のものでなければならない！
battle_talk_70102=急遽編成された部隊では、迫り来る敵に対抗できないかもしれない！
battle_talk_70103=決してロントンに入れさせてはいけない。
battle_talk_70104=私は今、イングランドの土地を所有している！
battle_talk_70105=よし！続け！わが軍を阻むものは何もない！
battle_talk_70106=我々は奇襲を受けている。今すぐ安全な場所に撤退しなければならない！
battle_talk_70201=イングランドの全領土は私の庇護を受けるべきだ。ロンドンの安全が脅かされている今、私はそれを無視することはできない。
battle_talk_70202=サザークに巣くっている反乱軍を消滅しなければならない。
battle_talk_70203=後方に敵が出現した。彼らは一体どうやってあそこに行った！
battle_talk_70204=わが軍は甚大な被害を被った。しかし、このまま退却することはできない！
battle_talk_70205=我々の都市が攻撃を受けている。援軍はどこだ？
battle_talk_70301=エクセターには大量な反乱軍が巣くっている。王として、私の土地に反逆者がいることを容認できない。
battle_talk_70302=強盗がこの国の王になることを絶対に認めん！
battle_talk_70303=私の目的はあくまで都市の占領だ。降伏を許可する。
battle_talk_70304=反乱軍の実力は侮れない。私には救援が必要だ。
battle_talk_70401=進め！私の支配を受け入れない者は私の敵と見ます！
battle_talk_70402=兵士たちよ、恐れることはない。我々の同盟国は我々を救援すると約束してくれた。
battle_talk_70403=我々の援軍が来た！
battle_talk_70501=王国の領土で反乱が起きている。何としても反乱を鎮圧しなければならない。
battle_talk_70502=国王陛下が今、国内におられない。私たちは自分の力に頼らざるを得ない。
battle_talk_70503=この新しい国王にもう付き合えない。彼の統治を翻すには、今は絶好なチャンスだ。
battle_talk_70504=彼らの戦闘部隊を殲滅しよう。時間は十分にある。
battle_talk_70505=我々は攻撃を受けている。支援を請う！
battle_talk_70506=我々にとって状況は非常に有利になっている。
battle_talk_70601=私の兄弟は権力欲に堕ちている。彼は我々の領土を侵略し、人々を迫害している。我々は反撃しなければならない。
battle_talk_70602=イングランド王として、ノルマンディーは当然私の支配下に入るべきだ。抵抗する者はすべて敵と見ます。
battle_talk_70603=敵の攻撃は激しい。予備隊を出せ！
battle_talk_70604=モルタン伯爵は成功した。兵士たち、突撃！
battle_talk_70605=援軍が来たぞ！何としても敵を阻止しろ！
battle_talk_70606=我々の到着がまだ戦局を変えられるよう願っている。
battle_talk_70701=フランス人は何度も公国の周辺地域を攻撃していた。これ以上、私の領土で悪さをすることは許せない！
battle_talk_70702=ノルマンディーはフランス王国の領土だ。フランス王国が後継者を決定するのが当然だ。
battle_talk_70703=マンは私の支配下に入った。反撃の時が来たのだ。
battle_talk_70704=戦況は良くない。ひとまず退却しよう。
battle_talk_70705=援軍はどこだ！早く出せ！我々の兵力は敵を上回っている！
battle_talk_70801=北の敵はもはや我々の脅威にはならない。ロンドン周辺の反乱軍を消滅すれば、王座は私のものとなる。
battle_talk_70802=卑怯者！私の父はあなたに王位を譲っていない。家族のために王位を取り返す。
battle_talk_70803=イングランドはすでに敵の手中にあり、戦況は非常に不利である。
battle_talk_70804=ロンドンが攻撃を受けている！直ちに支援に回れ！
battle_talk_80101=戦士たちよ、帝国のために我々はもっと多くの土地を奪い、もっと多くの都市を占領しなければならない。
battle_talk_80102=かつて強大だったビザンティン帝国は今や脆弱になった。これは我々が攻撃する絶好のチャンスなのだ。
battle_talk_80103=わが領土が蛮族に荒らされるのを許せない。奴らを追い払って領土を取り戻さなければならない。
battle_talk_80104=敵はすでに我々のものとなった街を取り戻そうとしている。戦士たちよ、彼らを支援しに行こう。
battle_talk_80201=ローマ人は私たちを欺いた。彼らは真の平和を望んでいない。彼らは我々の土地を奪いたいだけだ。
battle_talk_80202=奴らは急いでやってきて、必然的に準備不足になっているはずだ。我々は速やかに出撃し、戦果を拡大しなければならない。
battle_talk_80203=受動的な立場に陥ったが、勝利への決意は揺らがない。
battle_talk_80204=援軍はどこだ。救援が必要だ。
battle_talk_80205=戦士たちよ、引き続き戦え！
battle_talk_80301=不従順な野蛮人たちがまたしても海から侵略してきた。
battle_talk_80302=急いで作ったわが海軍は、敵の膨大な数に対して優位に占めることはできない。
battle_talk_80303=戦士たちよ、我々はより多くの土地と資源を必要としている。
battle_talk_80304=わが軍は甚大な被害を被った。幸いに援軍が到着した。
battle_talk_80305=この海域を制圧し、敵をすべて殲滅しなければならない。
battle_talk_80401=我々を支援するために皇帝陛下が強力な軍隊を送ってくれた。今こそ失われた土地を取り戻す絶好のチャンスだ。
battle_talk_80402=ここには無限の富がある。この戦に勝つとすべてを手に入れることができるのだ。
battle_talk_80403=この都市の制圧は、我々の征服計画の始まりとなる。
battle_talk_80404=都市を死守しろ。我々の援軍はまもなく着くのだ。
battle_talk_80405=我々の援軍が来た。敵の攻撃を食い止めた。
battle_talk_80406=さらなる援軍が到着した。敵の作戦は失敗に終わる。
battle_talk_80501=この都市は守りやすく攻めづらい。しかも我々の補給は非常に不足している。
battle_talk_80502=大丈夫、アレクシオスの援軍はすでに出発していた（ただし、アレクシオス1世の軍は出発後、間もなく引き返し、支援作戦は中止となった）。
battle_talk_80503=都市を堅守しろ。我々の補給は十分にできているし、援軍もまもなく到着する！
battle_talk_80504=早くアンティオキアを支援しよう。この街は我々にとってとても大切だ。
battle_talk_80505=アンティオキアを奪還し、我が領土から敵を追い払わなければならない。
battle_talk_80506=援軍はもう来ないようだ。
battle_talk_80601=救援に来た部隊は敵を防ぐに成功した。今度は我々が失われた土地を奪還する番だ。
battle_talk_80602=敵の弓兵と弓騎兵は非常に強力であり、無謀な戦いはしてはいけない。
battle_talk_80603=我々の強大な力の前では敵の軍勢は物の数ではない。奴らを殲滅せよ！
battle_talk_80604=敵の増援が到着した。陣形を崩すな！
battle_talk_80701=敵の戦力は我々よりはるかに低い。今は失われた土地を奪還する絶好のチャンスだ。
battle_talk_80702=アナトリアから蛮族を追い払おう！
battle_talk_80703=兵力では我々は敵に及んでいない。敵を各個撃破しなければならない。
battle_talk_80704=北側の敵を撃破し、多くの捕虜を獲得した。状況は非常に有利になっている。
battle_talk_80801=蛮族が再びわが国を侵略し、沿道の街を略奪をしている。早く奴らを追い払わなければならない。
battle_talk_80802=早くしろ！物資をたくさん集めて、土地をたくさん制圧しなければならない！
battle_talk_80803=敵の行動は早い。我々は目標を集中し、領土の奪還を先に回さなければならない。
battle_talk_80804=よくも反撃してくれたな。奴らを全滅せよ！
battle_talk_90101=我々は包囲されている。状況は極めて混乱だ。なんとか包囲網を突破しなければならない。
battle_talk_90102=あの騎士はきっと奴らのリーダーだ。攻撃を奴に集中させろ。
battle_talk_90103=こちらが馬に乗っているから、敵に狙われているか？
battle_talk_90104=戦士たちよ、敵は我々の包囲網に入っている。敵と正面から交戦せず、遠距離攻撃を利用して戦おう。
battle_talk_90105=ようやく戦場に到達した。間に合ったでしょうか。
battle_talk_90106=新たな援軍が到着した。敵は挟撃を受けている。今は反撃に転じる好機だ。
battle_talk_90201=目の前に広がる街は、今回の旅の最大の目標である。
battle_talk_90202=エルサレムの城外に到着した。しかし、物資の補給もできなくなった。
battle_talk_90203=敵の頼りである守備隊を殲滅せよ。守備隊を消滅すれば、城壁を簡単に破壊できる。
battle_talk_90204=戦士たちよ、我々は今、防御を固めるしかない。援軍が早く来てほしい。
battle_talk_90205=北の防衛線は突破された。エルサレムは今、敵に直面している。
battle_talk_90206=彼らの防衛線はすぐ崩れる。私はこの街を奪えるという啓示を授かったのだ
battle_talk_90207=防御に徹するのはもう何の意味もない。最後の出撃にすべてを賭けるしかない。
battle_talk_90301=我が軍は行軍中に大損害を受けた。もはやこれ以上の消耗に耐えることはできない。
battle_talk_90302=ダマスカスをターゲットに決めたが、やはり良い選択とは思えない。
battle_talk_90303=エルサレムでは物資の供給があまりできないので、この戦いを早く終わらせなければならない。
battle_talk_90304=敵の陣形は隙だらけだ。街を固守すれば、勝利できるのだ。
battle_talk_90305=部隊の被害は限界に達した。これ以上戦うことはできない。撤退せよ！
battle_talk_90306=敵は撃退された。戦士たち、追撃だ！
battle_talk_90307=守備の力が足りない。持ち堪えろ！
battle_talk_90401=この街の制圧は我々の計画に重大な影響を与える。必ずここを制圧しなければならない。
battle_talk_90402=海沿いの地域で補給を得られる。これは敵にとっても同じだ。この戦いを早く終わらせなければならない。
battle_talk_90403=このまま街が敵に囲まれるのを見過ごしてはいけない。すぐに支援しなければならない。
battle_talk_90404=わが部隊はまもなく戦場に到達する。
battle_talk_90405=我々は強力で重要な盟友を失った。我々の作戦にとって非常に不利だ。
battle_talk_90406=我々の守備隊は大きな損害を受けた。敵の包囲網を突破しなければならない。
battle_talk_90407=武器を捨てれば、この街を与えよう。この戦いは君達の勝ちだ。
battle_talk_90501=これ以上、敵を先に進ませるわけにはいかない。
battle_talk_90502=ここで奴らを消滅しろ。街の安全を守らなければならない。
battle_talk_90503=ここでキャンプを張り、部隊の整備を行ってから、先に進もう！
battle_talk_90504=我々は奇襲を受けている。突破する方法を見つけなければならない！
battle_talk_90505=敵を近づかせてはいけない。機動力を生かせ。
battle_talk_90506=前線の守備隊は敵に突破された。防衛のためにより多くの人手が必要だ！
battle_talk_90507=街は攻撃を受けている。守備隊はどこにある。
battle_talk_90508=街を制圧せよ。我々は正義だ。
battle_talk_90601=十字軍は確かに強力だが、ヤッファが彼らに占領されるのを放っておくわけにはいかない。
battle_talk_90602=街を取り戻せ！これは我々の復讐だ！
battle_talk_90603=街を燃やし尽くそうとする戦火は遠い海上からでも見える。急げ、すぐ支援しなければならないんだ。
battle_talk_90604=この街は今、我々の手に落ちた。略奪行為は禁止となっている
battle_talk_90605=敵は反撃に出た。城壁を固守しろ。
battle_talk_90606=我々は攻撃を受けている。援軍はどこにある？
battle_talk_90607=とりあえず退却だ。力を温存してから攻撃を仕掛けよう！
battle_talk_90701=西方の蛮族はついに本性を表した。コンスタンティノープルは危ない。
battle_talk_90702=無駄な抵抗はあきらめろ。正義は我々にある。
battle_talk_90703=ベネチアから支援を得ている。それはこの街を攻め落とすための最大の助けになる。
battle_talk_90704=海岸沿いの守備隊を消滅せよ。援軍のために道を開かなければならない。
battle_talk_90705=海岸部隊は防御を固めてくれ。敵軍艦を海峡に近づかせてはいけない！
battle_talk_90706=コンスタンチノープルはもはや敵の攻撃に耐えることができない。ここを去るのは最も賢明な選択だ。
battle_talk_90707=残りの部隊を集めて、敵の侵攻を遅らせよう。
battle_talk_90708=わが艦隊は目標地点に向かっているが、海岸沿いの守備隊のせいで全力で移動することができない。
battle_talk_90709=敵の艦隊が徐々にこの街に近づいている！
battle_talk_90710=もう、コンスタンティノープルの城壁が見えてきた！
battle_talk_90801=我々は上陸に成功した。エルサレムの奪還に一歩近づいた。
battle_talk_90802=目の前の敵は、エルサレム奪還の最大の障害だ。彼らを殲滅せよ。
battle_talk_90803=我々は波やうねりを乗り越えてきた。今は彼らに我々の力を感じさせてあげよう。
battle_talk_90804=我々の街は攻撃を受けている。これ以上、敵の侵攻を許すわけにはいかない！
battle_talk_90805=最後の防衛線が突破された。敵はカイロの前に来ている。
battle_talk_90806=援軍が到着した。これは我々にとって朗報だ。
battle_talk_90807=カイロは攻撃を受けている。街の防御を全面強化しよう！
battle_talk_90808=上陸部隊は大きな損失を被っている。敵の戦闘力は私の想像を超えている。
battle_talk_100101=本来、我々はウェールズ人とは平和だったが、彼らは反乱を起こして私の統治を翻そうと企んでいる。これは絶対許せないことだ。彼らを止めなければならない。
battle_talk_100102=見よ、われらの王が軍を率いて来た。私はすぐに降伏すべきかな？
battle_talk_100103=敵の攻めが強いが、我々には都市という頑丈な壁がある。向こうの人数に怯むな！
battle_talk_100104=ポーイス王国は壁として我々の前に立ちはだかっている。直接攻撃するか、ポーイス王国を迂回して進むか、我々は選択しなければならない。
battle_talk_100105=ポーイス王国が攻撃を受けている。軍隊を派遣して彼らを支援する必要がある。
battle_talk_100106=いつまで抵抗するつもりか？直ちに抵抗を捨て、降伏するのが正しい選択だ。
battle_talk_100107=わが都市は攻撃を受けている。敵は我々を逐一撃破するつもりだ。
battle_talk_100108=抵抗を諦めろ。君らの王は慈悲深いのだ！
battle_talk_100109=我々を攻撃する者はすべて敵と見なす！我々は一人で戦っているわけではない。
battle_talk_100110=無駄な足掻きだな。
battle_talk_100111=ポーイス王国は我々に敗れた。この戦争に勝つのは時間の問題だ。
battle_talk_100201=卑劣なブルターニュ人め。母の身の安全を脅かすとは卑怯だ。我々は敵の脅しに屈してはいけない！
battle_talk_100202=全速で南下し、目標を保護せよ！
battle_talk_100203=フランス人の動きに注意せよ。彼らとの戦いをなるべく避けよう。現在、彼らの立場は非常に微妙になっている。
battle_talk_100204=部隊を派遣してイギリス人を迎え撃つ。こちらの計画を中断してはいけない。
battle_talk_100205=先遣隊は大きな損失を被ったので、より多くの部隊を攻撃に投入する必要がある。
battle_talk_100206=友軍は助けを求めている。彼らを助けなければならない。
battle_talk_100207=イギリス人はエレノアのせいで戦う気を失った。これは私たちにとって絶好のチャンスだ。
battle_talk_100208=イギリスはここで多くの敵を作った。にもかかわらず、彼らは私たちを攻撃しようとしていた。兵士たちよ、我々の力を見せてやれ！
battle_talk_100209=くそ！わが母に何をしたんだ！
battle_talk_100301=フランス人はノルマンディーで我々の領土を占領しようとしている。これは絶対に許されることではない！
battle_talk_100302=ガイヤール砦の包囲は完了したが、敵の補給線はまだ切断されていない。
battle_talk_100303=ガイヤール砦への補給を完全に切らないといけない。これはノルマンディーの奪還には非常に重要なんだ。
battle_talk_100304=ガイヤール砦は守りやすく攻めづらい。敵に簡単に包囲されないように注意しよう！
battle_talk_100305=ガイヤール砦周辺の都市や要塞を攻め落とせば、砦の中の敵はすぐに降伏するだろう！
battle_talk_100306=全力で前線を支えろ！わが領土は敵の攻撃を受けている。
battle_talk_100307=戦況は非常に不利になっている！
battle_talk_100308=ガイヤール砦は完全に敵に占領された。今は撤退するしかない。
battle_talk_100309=私たちは今、まもなく自分たちの土地を取り戻せるのだ！
battle_talk_100310=私の領土からフランス人を追い出せ！
battle_talk_100401=兵士たちよ、われらの王はイギリスに対して戦争を仕掛けようとしている。しかし、フランドル伯爵は王の召集を拒否した。これは紛れもなく王に対する裏切りだ。
battle_talk_100402=こうなったら、私たちは自分の方法でフランドル伯爵の「助け」を得るしかない！
battle_talk_100403=前方に船が見えるが、誰も乗っていないようだ。私に行かせて様子を確認しよう。
battle_talk_100404=港に停泊している船が攻撃を受けているようだ。誰か派遣して状況を確認しろ！
battle_talk_100405=早く我々の財宝を集めてくれ。敵はなもなく到着する。
battle_talk_100406=我々は物資を大量に獲得した。王様も大喜びでしょう。
battle_talk_100407=早く防御を固めて略奪に時間を稼ごう！
battle_talk_100408=目の前の敵はほぼ排除された。ここの物資は我々の物となる！
battle_talk_100501=連合軍の兵士たちよ、あまりにも長い間、フランス人はわれらの領土を狙っていた。これは決して許されることではない！
battle_talk_100502=戦線を広げると、強大な敵と戦わなければならない。
battle_talk_100503=敵の連合軍は強力だが、我々はまだ勝利への希望を持っている。連合軍の両翼は脆い。そこを奇襲すれば、敵は必ずや混乱に陥るだろう。
battle_talk_100504=わが王はパリを攻撃するため、南方で準備を進めている。近いうちに勝利のお知らせが届くだろう。
battle_talk_100505=両翼の連合軍は大きな損失を被った。兵士たちよ、攻撃せよ。 決して側面から我々の陣地を突破されてはいけない。
battle_talk_100506=両翼の兵士は倒された。我々の作戦はまもなく失敗する！
battle_talk_100507=兵士たち、攻撃せよ。敵の守りは非常に弱くなっている！
battle_talk_100508=我々は自分にとって必要不可欠な都市を失った！
battle_talk_100601=男爵たちの無理な要求はすべて断った。そして、彼らは非常に過激な方法で応えた。
battle_talk_100602=この反乱は鎮圧しなければならない。交渉は一切受け付けられない。
battle_talk_100603=これは利益とは関係ない。私たちは、自分らしく生きる権利のために戦っているのだ。
battle_talk_100604=王様の統治によってわが領土の正常な秩序は脅かされている。
battle_talk_100605=ヘンリー3世は私たちに捕らえられた。ロンドンの新しい秩序は、私たちが作るのだ。
battle_talk_100606=このまま反乱軍があちこちで破壊するのを放置してはいけない。彼らを消滅せよ。
battle_talk_100607=王様は無事救出した。反乱軍の計画は完全に失敗したのだ！
battle_talk_100608=兵士たちよ、国王のために戦え！
battle_talk_100609=私たちは攻撃を受けている。兵士を集めて反撃を開始せよ！
battle_talk_100701=我々を裏切ったスコットランド人はまったく信用できない。われらの王は彼らに情けを掛けるべきではない。
battle_talk_100702=この都市の防御は、我々にとって見せかけのものだ。街を壊してこの地の富を奪うことを許可する！
battle_talk_100703=我々の領地が侵略されている。敵の軍勢は非常に強く、私たちが戦える相手ではない。
battle_talk_100704=今は他の方法で敵の攻撃を食い止めるしかない。私たちにはまだ反撃の可能性があるのだ。
battle_talk_100705=なぜ、我々の後方に敵がいる！狡猾なスコットランド人は一体、どうやってこんなことを…
battle_talk_100706=わが軍は非常に受動的な立場に立たされている。君にこんな大事な任務を任せたことを後悔し始めたよ。
battle_talk_100707=スコットランドの人々よ、武器を取って侵略者に追い払え！
battle_talk_100801=フランク人は私と協議を結んだ。これで安心してスコットランドに対処し、この動乱を一刻も早く収束させることができる。
battle_talk_100802=スターリングブリッジでの敗北は、まだ記憶に残されている。勝利でこの屈辱を晴らさなければならない！
battle_talk_100803=スコットランド人の槍に気をつけろ。わが騎兵はその武器を相手するのは苦手だ。
battle_talk_100804=この前の戦いで、私はイングランド人が私たちの自由意志を揺るがすことはできないと証明した。
battle_talk_100805=戦士たちよ、恐怖に心を支配されてはならない。
battle_talk_100806=我々の側面が攻撃されている。すぐに彼らを援助しろ。側面を潰されてはいけない。
battle_talk_100807=かかれ！敵は後退を始めたぞ！
battle_talk_100808=私の部隊は甚大なダメージを被った。一時撤退するしかない。
battle_talk_100809=敵のリーダーは我々に撃退された。今こそ反撃の時だ！
battle_talk_100901=長い間、スコットランド人は私たちの所有する土地を大量に横取りしていた。そして今、彼らはスターリング城を自分のものにしようとしている。これは決して許せないことだ。
battle_talk_100902=前に進め！ロバート・ブルースにイングランド軍の実力を見せてやろう。
battle_talk_100903=イングランドは大軍を集めている。これは、私たちにとって重大な脅威となる。
battle_talk_100904=敵の数が多いとはいえ、スターリング城への包囲を緩めてはいけない。
battle_talk_100905=これらの敵を撃破し、城への援軍の見込みを消せば、彼らは我々に降伏するだろう。
battle_talk_100906=私の斧は敵の血を求めている。 兵士たちよ、勇敢に戦え！
battle_talk_100907=我々の陣地は攻撃されている。敵の攻撃を止めなければならない！
battle_talk_101001=イザベラのやったことは、間違いなく裏切りだ。彼女はイングランドを裏切り、そして私を裏切った！
battle_talk_101002=そして彼女は今度、私の権利を奪おうとしている。本当に狂っているのだ！
battle_talk_101003=エドワードはデスペンサー父子に騙されている。イングランドは、奴らの手に渡してはいけない。
battle_talk_101004=不純な裏切り者がイングランドに上陸した。彼女はフランス人の助けを得た！
battle_talk_101005=簒奪者は多くの都市を占領した。イングランドの運命は今や風前の灯火だ。
battle_talk_101006=フランスの女狐は多くの軍隊の支持を得ている。
battle_talk_101007=王国の輝かしい宝石、臣民の女王陛下はまもなく彼女に忠誠を誓ったイングランドを支配する！
battle_talk_101008=ひとまず退却だ。私たちは今、彼女に対抗できない。
battle_talk_101009=イングランドの王位は、そう簡単に奪われるものではない。
battle_talk_101010=我々にはまだ反撃の希望がある。
battle_talk_101011=裏切り者に最後の攻撃を仕掛けよう！
battle_talk_101012=皇后陛下、私は陛下ために道を開いてみせます。
battle_talk_101013=陛下のために尽力してまいります。
battle_talk_110101=甘いな。ラテン帝国に庇護を受ければ我々と張り合えると思っているか。
battle_talk_110102=敵は尻尾を巻いて逃げた。しかし、追撃際に油断してはいけない。
battle_talk_110103=ミハイルはすでに援軍と合流した。さらに多くの援軍が駆けつけてくると思う。
battle_talk_110104=私を守って！戦場から脱出できれば、まだ希望はある。
battle_talk_110105=敵は私を追いかけている。私は退却しなければならない。これ以上ここに留まるわけにはいかない。
battle_talk_110106=戦場からの脱出にもう一歩近づいた。援軍はどこだ？
battle_talk_110107=我らの友軍は逃げ回っている。本当にみっともない。
battle_talk_110108=士気は崩壊し、兵士たちはもはや戦いたくない。そして私もそうだ。
battle_talk_110109=私は脱出のために十分時間を稼いだ。あなたの勝利は何の意味もない！
battle_talk_110201=コンスタンチノープルは目の前にある。しかし、この都市は狡猾な蛮族に占拠されている。
battle_talk_110202=国を取り戻すために、まずここを取り戻さなければならない。
battle_talk_110203=身の程知らずめ。コンスタンティノープルの奪還を諦められないか。
battle_talk_110204=敵は城壁を越えるほど強くない。全ての敵を城壁の向こう側に食い止めろ。
battle_talk_110205=要塞が占拠された！守備軍は一体何をやっている！？
battle_talk_110206=外側の防衛線は間もなく突破される。しかし、この街を敵に渡してはいけない。
battle_talk_110207=この街を奪還できる気がする。
battle_talk_110208=あっと一歩で街を奪還するのに、今は撤退して整備しなければならない。。
battle_talk_110209=兵力が足りない。援軍は早く攻撃を開始してくれ！
battle_talk_110301=我々は再びこの雄大な城の前に来ている。
battle_talk_110302=この城を奪還するためには、まず両側にある兵営を占領しなければならない。
battle_talk_110303=兵営を占領すれば、城に入ることができる。
battle_talk_110304=泉の門が開かれた。ここを奪取すれば、城の半分は我々の手に落ちるのだ！
battle_talk_110305=城門は突破した。成功まであと一歩だ！
battle_talk_110306=しかし、次に注意しなければならないのは、この作戦で最大の脅威であるヴェネチア人の動向だ。
battle_talk_110307=城外で何が起きているのか！？
battle_talk_110308=我々は攻撃を受けている。ここにいては命を落とすだけだ。今は撤退するしかないんだ！
battle_talk_110401=帝国はかつての栄光を取り戻したが、アカイア侯国は依然として脅威である。
battle_talk_110402=そのために、ギリシャ地域への支配権を取り戻さなければならない。
battle_talk_110403=ビザンティン軍は簡単に勝てると思い込んでいる。彼らはその傲慢さによって麻痺されている。これが我々の最大のチャンスだ。
battle_talk_110404=我々は敵の後方を襲撃することに成功した。しかし、冷静さを失った敵軍は必ずや正面攻撃を強めてくるであろう。
battle_talk_110405=これ以上待つことはできない。総攻撃を開始せよ！
battle_talk_110406=敵軍は陸と海から攻撃を開始した。我々の後方は無防備すぎる。
battle_talk_110501=先の作戦でわが軍はあちこちに散らばっている。
battle_talk_110502=ウィリアム2世の部隊は我々を包囲しようとしている。これは我々にとって非常に不利である。
battle_talk_110503=今は敵を追い払う好機だ。彼らは孤立され、もはや反撃の力は残っていない。
battle_talk_110504=大量の傭兵がわが軍から逃げ出した。軍隊の士気は非常に低くなり、もはや戦えない状態に陥っている。
battle_talk_110505=勝利は必ず我々のものになる。捕虜たちを連れていけ。
battle_talk_110506=散り散りになった敵軍から攻撃を受けたが、気にする必要はない。目の前の敵に集中しよう。
battle_talk_110601=アテネ公国から援助を受けた我々には、ビザンティン軍はもう恐るるに足りない。
battle_talk_110602=大量の敵がこちらに向かって来ているので、今は退却するしかない。
battle_talk_110603=海路で進めば、敵の大軍を避け、退路を確保することができるはずだ。
battle_talk_110604=兵士たちよ、陣地を守れ。逃げ出した部隊に動揺されてはいけないのだ！
battle_talk_110605=まだ海上に敵がいるなんて知らなかった！助けてくれ！
battle_talk_110606=背後から新たな敵が迫ってきている。撤退場所が見えてきた。持ちこたえろ！
battle_talk_110607=守備隊は今、どんな状況なのだろう。
battle_talk_110608=攻撃せよ。今は敵を倒す最大のチャンスだ。
battle_talk_110609=我が部隊は出撃の準備を整えている。
battle_talk_110701=ラテン貴族はベネチア人の力を借りて再起した。今や状況は我々にとって非常に不利になっている。
battle_talk_110702=ベネチア海軍は非常に強力で、今は守りを固めて支援を待つしかない。
battle_talk_110703=一刻も早く兵力を回復させねばならない。十分な補給を得れば、私の部隊はあらゆる敵を打ち負かすことができるのだ。
battle_talk_110704=兵士たちよ、私と共に突撃せよ！今は帝国のかつての栄光を取り戻すチャンスだ。
battle_talk_110705=敵の守備に隙が生まれた。今こそ、攻撃を仕掛けるチャンスだ。
battle_talk_110706=急いで結成させた海軍でベネチアに対抗するつもりか？
battle_talk_110801=ペラットは帝国にとって極めて重要な都市である。今は敵が帝国を攻撃するための橋頭堡となった。
battle_talk_110802=しかし、守りやすく攻めづらい都市なので、まずは都市への補給をすべて断たなければならない。
battle_talk_110803=諸君、今こそ帝国を復活させる時だ。私と共に戦おう！
battle_talk_110804=敵はペラット城を包囲しようとしている。全力で防御し、補給をしっかりと確保しよう。
battle_talk_110805=南の戦線にある部隊は大きなダメージを受けている。直ちに支援に行ってくれ。
battle_talk_110806=北の戦線がまもなく敵に占領される。わが軍は本当にそんなに弱いのか？
battle_talk_110807=ペラット城への補給は断たれた。今こそ攻撃を仕掛けるチャンスだ。
battle_talk_110808=都市の防御は突破された。全力で攻撃せよ。
battle_talk_110809=勝利まであと一歩だ！
battle_talk_120101=わが軍はオスマンの大軍と遭遇した。敵は数が多く、動きも速いので、打ち勝つのは難しいかもしれない。
battle_talk_120102=貧弱なビザンティン軍は我々を脅かすことができない。兵士たちよ、敵を全滅せよ。
battle_talk_120103=敵の攻撃は激しいが、ここで敵を阻止し、撤退のタイミングを見計らわなければならない。
battle_talk_120104=帝国の国境が外敵に侵されるのを黙って見ていられない。
battle_talk_120105=援助を獲得したが、目の前の敵に対抗するには十分ではない。
battle_talk_120106=わが軍は敵の激しい反撃に遭っている。人数を増やして、攻勢を強めてくれ！
battle_talk_120107=側面にも敵が現れている。敵はなぜ次々と現れている？
battle_talk_120108=撤退の時が来た。今こそ戦闘から離脱する絶好の機会だ。
battle_talk_120109=ビザンティン軍にこれほどの反撃能力があるとは思わなかった。軍の士気は大打撃を受けた。
battle_talk_120201=愚かなビザンティン人は内戦を繰り広げている。これは領土を拡大し、権力を確保するための絶好の機会だ。
battle_talk_120202=プルサ城は我々にとって非常に重要であり、敵に荒らされてはいけない。
battle_talk_120203=この城を囲むために、我々は多大な時間と物資を費やした。一刻も早く敵の防御を突破しなければならない。
battle_talk_120204=都市周辺に位置する砦を押さえれば、敵の補給線を切断し、こちらが攻撃を仕掛けるよう助けてくれる。
battle_talk_120205=プルサ城の外郭防衛線は敵に突破された。この城は敵の攻撃にさらされようとしている。
battle_talk_120206=よし、これでまた城に一歩近づいた。しかし、敵の援軍も次々と到着している。
battle_talk_120207=戦線を固めろ。これ以上敵の侵入を許すわけにはいかない！
battle_talk_120301=アナトリアの防御が薄いとのことをとうとう敵に気づかれました。
battle_talk_120302=敵はニカイアへの攻撃に備え、大軍を集めている。ここを死守しなければならない。この都市はコンスタンチノープルの重要な砦だ。
battle_talk_120303=全力で攻撃せよ。物資や支援などの心配は要らん。この土地はまもなく我々のものになる。
battle_talk_120304=ニカイアは落ちた。コンスタンチノープルは危機的状況に陥っている。
battle_talk_120305=我々はほかの小隊とコンタクトを取った。彼らが助けになれるよう期待している。
battle_talk_120306=このような状況で、敵はこちらの大将を狙ってくるなんて、非常に大胆と言わざるを得ないが我々の前進を阻むことはできない。
battle_talk_120307=我々は物資の補給を受けている。引き続き前進せよ。
battle_talk_120308=ビザンティン人の領地がどんどん小さくなっている。我々は必ず最後の勝利を収めるだろう。
battle_talk_120401=アナトリアは徐々に帝国の支配から離脱している。これ以上敵の進撃を許すわけにはいかない。
battle_talk_120402=今まで温存した戦力を無駄に使ってはいけない。ニカイアを奪還するには、無駄な消耗を避けなければならない。
battle_talk_120403=ビザンティン軍はまだ現実を正しく認識できない。この土地はすでにオスマン帝国のものであることを、これから我々の行動で彼らに教えましょう。
battle_talk_120404=わが軍は徐々に前進しているが、敵の反撃は間近に迫っている。
battle_talk_120405=我々の都市が攻撃されている。もっと多くの軍隊を派遣して敵をこの地から追い払ってくれ。
battle_talk_120406=敵に背後を取られ、完全に包囲された。
battle_talk_120407=兵力では我々は敵よりはるかに少なっている。いかなる損失も我々の完全な敗北につながりかねない。わが軍隊をしっかり守ってくれ！
battle_talk_120501=強い地震により、ガリポリの城壁と防衛線が破壊された。オスマン軍はこの千載一遇のチャンスを見逃すはずはない。
battle_talk_120502=兵力も食糧も不足している今、街を救済するための資金を何とかせねばならない。
battle_talk_120503=ガリポリの防衛線は完全に破壊された。今ならこの街を簡単に奪取できる！
battle_talk_120504=金で街を買い戻そうとするとは、愚かなビザンティンだ。
battle_talk_120505=意外な敵が現れた。海上の敵軍に気をつけろ！
battle_talk_120506=ビザンティンはどうやら武力で街を奪還するつもりはないようだ。それなら、こちらから仕掛けるぞ。
battle_talk_120507=ビザンティン軍は今、弱体化している。我々の領土を拡大する時が来た！
battle_talk_120508=ふむ、小賢しい奴め。資金集めを口実に我々の街に攻撃を仕掛けてくるとはな。
battle_talk_120509=我々は攻撃を受けている。敵の狙いはガリポリ、この都市だけではない！
battle_talk_120601=ビザンティン帝国の第三都市アドリアノープルは、我々が勢力を拡大する際の重要なターゲットである。
battle_talk_120602=この都市を占領すれば、将来コンスタンチノープルを攻撃する際に安定した補給を得られる。
battle_talk_120603=応戦に備えろ。オスマン軍は決して簡単に退却しない。この都市を守り切らなければならない。！
battle_talk_120604=降伏を考える時間と安定した生活を与えることを約束する！
battle_talk_120605=私の我慢に限界がある。兵士たちよ、準備を整えよう！
battle_talk_120606=私の援軍はどんどん到着している。まだ抵抗する気か？
battle_talk_120607=失敗の覚悟はできているか？
battle_talk_120608=これ以上待てん。今すぐ街を制圧してくれ。
battle_talk_120609=ハドリアノポリスが危機に陥るのを黙って見ていられない。軍隊を派遣して救援に向かおう。
battle_talk_120610=我々の後方は攻撃されている。なぜ、そこに敵がいるのか？
battle_talk_120701=帝国は今、他の都市の防衛を維持することができなくなった。テサロニケをベネチア人の手に委ねることが、最善の選択であろう。
battle_talk_120702=この都市はオスマンの統治下に入るべきだ。今ならまだ降伏するチャンスがある。
battle_talk_120703=この都市は私たちのものとなった以上、手放すわけには行かない。
battle_talk_120704=オスマン帝国はテサロニケに攻撃を開始した。 これによってコンスタンティノープルへの圧力はある程度緩和されたが、状況は依然として厳しくなっている。
battle_talk_120705=今、この都市はオスマン帝国のものとなっている。ベネチアの艦隊も我々を止めることはできない。
battle_talk_120706=テサロニケは危機に瀕しているが、私の艦隊はオスマン艦隊に封鎖されている。テサロニケを援助するために封鎖を突破しなければならない。
battle_talk_120707=ビザンティンは、ベネチア軍を救援するために攻撃を仕掛けようとするが、これは無意味である。
battle_talk_120708=敵は反撃を開始した。すぐに予備隊を投入せよ。
battle_talk_120709=海を封鎖するオスマン艦隊は撃退された。艦隊は引き続き前進せよ！
battle_talk_120801=この城は世界で最も強固な城壁を持つと言われている。
battle_talk_120802=我々は今、新たな攻城兵器を手に入れた。この城は必ず破られ、帝国の領土となるのだ！
battle_talk_120803=敵はすでに城下に迫っている。我々は今、最後まで戦うしかない。
battle_talk_120804=敵はまだ海を封鎖していないはずだ。今なら、まだ船に乗って避難することができる。
battle_talk_120805=城壁が破られた。城に入り、我々の勝利を迎えよう！
battle_talk_120806=外部の防衛線は完全に崩壊しており、もう退路はない。
battle_talk_120807=何で後方に敵が現れたか？早く 彼らを排除し、攻城計画に支障を与えてはいけない。
battle_talk_120808=敵の海上封鎖を突破することに成功した。さあ、一刻も早く避難しよう！安全第一だ。
battle_talk_120809=愚かな奴だ。お前の失敗は帝国の作戦に支障をきたした。戦場から敵を逃したとはな！
battle_talk_120810=コンスタンチノープルは攻撃を受けている。黙って見ていられない。一刻も早く海に出よう。手遅れにならないよう願っている。
battle_talk_120811=今日から、この城はオスマン帝国のものになるのだ！
battle_talk_120812=コンスタンチノープルは奪われた。我々は完敗した。
battle_talk_120901=私は王位につく気はなかった。娘を君に渡すのも君と一緒に世界を支配したいからだ。なぜ私に刃を向けている？
battle_talk_120902=コンスタンティノープルはそもそも私のものはずだった。あなたの王座を簒奪した。ローマの皇帝は一人でいいんだ。
battle_talk_120903=まず私の息子を助けてくれ。金を集めてやるから！
battle_talk_120904=手数料をもらったからには、必ずこの反乱を鎮めてみせる！
battle_talk_120905=突厥人を雇っているなんて、今後必ず裏切られてしまう。
battle_talk_120906=私は黙って見ていられない！敵を一掃せよ!
battle_talk_120907=よし！こちらもサポートします！
battle_talk_120908=セルビアとブルガリアからの支援を断ち切れば、パレオリグはそのうち敗退するようだ。
battle_talk_120909=突厥人は強すぎる！ただし、我々はまた来るぞ！
battle_talk_121001=バルカン半島での領土を固守し続けるのだ！引き続き、前方の村を略奪しろ！
battle_talk_121002=私たちの村が焼かれている！私たちの仲間が殺されている！もう耐えられない。行くぞ！
battle_talk_121003=奴らの背後につけ！奴らを自分の陣地に逃してはいけない！
battle_talk_121004=いかん！矢に刺された！
battle_talk_121005=そ、そんな！息子が戦死してしまった。我が帝国にどんな未来があるのか！？私にどんな希望があるのか！
battle_talk_130101=我々は今、逆流と逆光という不利な状況に陥っているため、海上での戦いに向いていない。どうやら、勝利の女神はこちら側に付いていないようだ。
battle_talk_130102=我々は風上に立っているし、鉄の鎖で船を繋いでいる。イングランド人に勝ち目はない！
battle_talk_130103=海口の外に船を何隻か出して、挟み撃ちにした方がいいのでは？
battle_talk_130104=軍隊を分散させる必要はない。イングランド軍の全滅を見ればいい！
battle_talk_130105=おい、バカどもと一緒に死ぬ必要はない。私は後ろで観察すればいい。
battle_talk_130106=よかった！水の流れが変わった！水の流れに乗り、彼らを海口内に封鎖しよう！
battle_talk_130107=船が動かない。鉄の鎖を解け！
battle_talk_130108=ああ！すべてが終わった！
battle_talk_130201=こっちの人数はイングランド軍の3倍になる。しかも、最も優れた重騎兵も有する。疲れた敵を相手にするなら、すぐ勝利を手に入れるだろう。
battle_talk_130202=有利な地形を占拠せよ！慌てるな！王子、右翼に気をつけて、騎兵に背後を取らせないで！
battle_talk_130203=よし！誰が来ようと、この俺が叩き潰してくれる！
battle_talk_130204=ジェノヴァ弩兵の攻撃はイングランド軍に届かない。騎士たちは私と共に突撃せよ！
battle_talk_130205=混乱しすぎる！私の兵士はどこだ！？
battle_talk_130206=彼らの最終突撃を食い止めれば、我々の大勝利となるのだ！
battle_talk_130301=いつの間にか1年近く城を包囲していた。カレーがこれほど要塞化されているとは思わなかった。
battle_talk_130302=低地帯諸国からの増援は間もなくやってくる。彼らを迎えに行かなければならない！
battle_talk_130303=彼らの海上補給線を切断する！
battle_talk_130304=増援艦船を守れば、カレー守備軍に甚大なダメージを与えてくれる。
battle_talk_130305=もう少し持ち堪えよう。我々の補給は間もなく来るのだ！
battle_talk_130306=これ以上、補給線を切断されてはいけない。さもなければ、カレーは本当に危ない。
battle_talk_130307=フランスの陸上補給路を切断せよ。これは彼らの最後の抵抗だ。
battle_talk_130401=イングランド人の兵力はすべて大陸に派遣されたため、後方は空っぽだ。今度、フランス人と協力すれば、きっと彼らに大打撃を与えることができるでしょう！
battle_talk_130402=予想通り、スコットランド人はやはり反乱を起こした。我々は一刻も早く長弓兵を集めなければならない！
battle_talk_130403=我々はすでに多くの街を占領した。ここら辺で終わりにしようか？
battle_talk_130404=心配しないで。イングランド人は我々に構う余裕はない。
battle_talk_130405=こんなに早く制圧されたとは思わなかった。再び南に向かおう！
battle_talk_130406=敵を峡谷に引き込んだら攻撃すればいい。背後を取らせないように注意しよう！彼らは我らの長弓に勝てない！
battle_talk_130407=我々の領土を取り戻せ！デイヴィッド2世を捕えろ！全員賞金を貰えるんだ！
battle_talk_130408=いかん！矢に撃たれた！すぐ撤退しろ！
battle_talk_130501=彼らの右翼から攻めろ！敵の弓兵に有効な攻撃を仕掛けてくることは不可能だ！
battle_talk_130502=いかん、右翼は突破された。今度こそ危ない。隊形を崩すな！攻撃しながら撤退しよう。
battle_talk_130503=後ろに迂回し、高地を制圧する！そこには、反撃のチャンスがある！
battle_talk_130504=結局、攻撃のタイミングを逃してしまった！撤退だ！
battle_talk_130601=北からの援軍は間に合わないようだ。ここが勝負どころだ！陣を敷いて、傲慢なフランス人を倒すぞ！
battle_talk_130602=ここに追い詰めれば、彼らにもう為す術がない。あと1回突撃を仕掛けると彼らを蹴散らすことができる。イングランド国王の長男を生け捕りにしろ！みんなが賞金を貰える！
battle_talk_130603=一時の失敗で後退するな！私はいつも君たちとともにいる！死ぬまで突撃せよ！我々はこの戦争に勝つのだ！
battle_talk_130604=側面から包囲しよう！トドメを刺してやる！
battle_talk_130605=まさか彼らの援軍が来たのか？我々は包囲されている！
battle_talk_130606=いかん、バレた！
battle_talk_130607=突撃を仕掛ける！殿、敵は敗退している！神様は我々とともにいる！
battle_talk_130701=私はランスでフランス王の戴冠式を行い、最も偉大なるイングランド王となるのだ！
battle_talk_130702=イングランド人の思い通りにはさせない。たとえ王がいなくとも、我々は屈しない！
battle_talk_130703=ランスの防御を突破できないようだ。前方で略奪して物資を確保するしかない！
battle_talk_130704=イングランド人は本陣にいないはずだ。カレーの奪還に行こう！
battle_talk_130801=情報によると、シャルル王子は戴冠式を受けるためにランスに行くそうだ。
battle_talk_130802=道中お気をつけて。イングランド軍に待ち伏せされるかもしれない。
battle_talk_130803=彼らを食い止めろ！
battle_talk_130804=やはり、伏兵がいる！
battle_talk_130805=彼らの陣形は崩れた！騎兵たち、かかれ！
battle_talk_130806=引き続き伏兵に注意しろ。ランスの戴冠式まで、私の安全を守ってくれ！
battle_talk_130901=この日のために長い間準備してきた。いまさら私が継承権を手に入れることは誰にも止められない！
battle_talk_130902=私は待ちくたびれた。もう次のチャンスはない。この戦いで勝敗は決まる！
battle_talk_130903=決着の時が来た！
battle_talk_131001=連日の行軍でかなり疲れてはいたが、今のイングランド軍はまったく気づいていない。彼らを蹴散らせ！
battle_talk_131002=何？フランス人は一体どこから来たのか？こんな寒い日に戦うなんて！しっかりしろ！さもなくば、死あるのみだ。
battle_talk_131003=イングランド人は陣地戦に長けている。ならば、我々は奇襲戦術や遊撃戦術を駆使し、彼らに有効な攻撃を仕掛けさせないようにする。
battle_talk_131004=撤退だ！城まで撤退できれば勝てる！
battle_talk_131005=逃げるチャンスを与えるな！追撃するのだ！
battle_talk_131101=フランスの攻撃はどんどん激しくなってきた。もし援軍が来なければ、この先の砦は落ちてしまう。
battle_talk_131102=イングランド人に我らスペイン人の実力を知らせてやろう。彼らを阻止して上陸させるな！
battle_talk_131103=彼らの船は我々より高くて喫水も浅い。もうダメだ。太刀打ちできない！早く逃げよう！
battle_talk_131104=イギリスの艦船を撃沈せよ！我々は無敵だ！
battle_talk_131201=フランス人に構うな。我々の目的は略奪だ。フランス全土に戦火を巻き起こせ！全力で進め！
battle_talk_131202=この山賊どもめ！我々は反撃を仕掛けなければならない！このまま略奪させるわけにはいかない！
battle_talk_131203=ボルドーに戻れば安全だ。早く進め！
battle_talk_140101=アヴリルで兵力の三分の一を失ったが、私は撤退しない。今の我々に必要なのはできるだけ早くカレーからの援軍と合流することだ。
battle_talk_140102=敵の数はどんどん増えている。どうやら一気に我々を消滅する気だ！木の柵を設置して防御を固めろ！
battle_talk_140103=予定通り突撃を仕掛ける！我々の人数は上回っている！左右の弓兵に注意しろ。
battle_talk_140104=いかん！雨で地面がぬかるみすぎている。このままでは突撃できない！
battle_talk_140105=聖ゲオルギオス！反撃だ！
battle_talk_140201=ルーアンを占領すれば、ノルマンディー全土を手に入れることができる！奴らの争いはますます激しくなり、援軍も間に合わなさそうだ。この機会を逃すわけにはいかない。
battle_talk_140202=敵の猛攻を避けましょう。イングランドと戦えばブルゴーニュ人の思うツボだ！
battle_talk_140203=ルーアンでは食料と服が足りていない。街の人々は餓死寸前の状態にある。救援はいつ来るかわからない。
battle_talk_140204=一刻も早く補給ルートを開かないとルーアンは陥落するに違いない。しかし、私が全力を尽くせばアルマニャックの反撃に遭うかもしれない。
battle_talk_140205=彼らに物資補給のチャンスを与えるな！
battle_talk_140301=今日はイースターだ。スコットランド人とフランス人は油断しているに違いない。このまま突撃して、不意打ちを仕掛けよう！
battle_talk_140302=イングランド人が来たぞ！みんな着替えろ！
battle_talk_140303=騎兵隊は後方部隊と連携を取っていない！後ろの部隊を止めろ！
battle_talk_140304=深入りし過ぎた！ああ！
battle_talk_140401=フランス軍の攻撃は強力だ。我々は側面からモータウンを攻撃し、パリへの補給を切断しよう。
battle_talk_140402=かかってこい！2万どころか、たとえ20万の兵でも私の城を落とすことはできない！
battle_talk_140403=より多くの拠点を奪還せよ！イングランド人に我らスコットランド人の実力を見せつけてやれ！
battle_talk_140404=私の病は治らない。遠征はまもなく終わるかもしれない。私の果たせなかった野望は後世の人々に託す。
battle_talk_140501=長年の追いかけに飽きが出た。敵の主力部隊は前方で待機している。今は彼らを一気に消滅するチャンスだ！
battle_talk_140502=陣形を乱すな！旗を掲げて進め！
battle_talk_140503=聖ゲオルギオス！ベッドフォード！
battle_talk_140504=聖ディオニジオ！モンジュバ！
battle_talk_140505=分散するな！騎兵隊は彼らの後ろに回れ！強力な一撃を与えろ!
battle_talk_140506=我々は最後まで戦うぞ！たとえ、全員が死んでもな！
battle_talk_140601=持ちこたえろ！国王からの援軍はまもなく到着するぞ！
battle_talk_140602=観念しろ。君らはすでに包囲されている。早く降伏しろ！
battle_talk_140603=我々は包囲されているかもしれないが、敵の士気も下がっている。みんな、我と共にかかれ！
battle_talk_140604=側面は突破された。城から出てきた敵に包囲されないように気をつけろ！
battle_talk_140605=勝利に乗じて他の拠点を制圧しろ！イングランド人は敗れた！
battle_talk_140701=城内の兵士と人々を救いに行こう！
battle_talk_140702=ようやく城に入った。今度こそオルレアンは助かるかもしれない！
battle_talk_140703=イングランド人に自分で撤退してほしい。私はあまり殺戮を好んでいない。
battle_talk_140704=戦うなら戦え！我々の剣でこの街の運命を決めよう！
battle_talk_140705=オルレアン周辺の拠点を制圧する。一気にこの街を解放しよう！
battle_talk_140801=頭の中で声が聞こえる。「前に進め！苦しんでいるフランスの人々をもっと救え！」と言っている！
battle_talk_140802=私たちは死ぬまであなたについて行きます!
battle_talk_140803=行って、我々の軍隊を救助してください。 フランス軍は何を取ったのですか？ なぜ、彼らの士気が高いのか？
battle_talk_140804=城の堅固さに怯えてはいけない！神は彼らを自由に処置できると言っている。たとえ雲の中に隠れても、彼らを倒すことはできるんだ。
battle_talk_140805=ええい！負けてたまるか！
battle_talk_140901=トランペットを鳴らせ！高貴なシャルル王の戴冠式に参加するため、ランスに向かう時が来たのだ！
battle_talk_140902=精鋭部隊を派遣して彼らを包囲しろ。ランスに到達させてはいけない！
battle_talk_140903=出撃！立ちはだかる全ての敵を粉砕せよ！
battle_talk_140904=私は神の啓示によって戴冠して王位に即位する！
battle_talk_141001=私はジャンヌを捕らえたぞ！
battle_talk_141002=神は私を見放したのか？
battle_talk_141003=ジャンヌの仇を討て！この地を粉砕しろ！
battle_talk_141004=イングランドの全地域に戦火を広げてやる！
battle_talk_141005=聖ディオニジオ！ジャンヌの意志をフランス全土に広めるのだ！
battle_talk_141101=パリ周辺の拠点を制圧し、首都を奪還せよ！ジャンヌの願いは私が叶えてやる！
battle_talk_141102=パリを取り戻せ！パリで再びアイリスの花を咲かせましょう！
battle_talk_141103=パリを支援する！フランス人は猛攻撃を仕掛けてきた！今度、城主が持ちこたえるかどうか分からない。
battle_talk_141104=どうやら持ちこたえられないようだ。早く逃げよう。
battle_talk_141201=カレーを占領する！シャルル7世への贈り物だ。
battle_talk_141202=我々は100年ほどこの都市を支配している。そう簡単に奪わせてたまるか！
battle_talk_141203=海上からの部隊は私に任せろ！
battle_talk_141301=ノルマンディーを取り戻し、イングランド人を海峡に追い込もう！
battle_talk_141302=二手に分かれ、ノルマンディーを一気に解放するのだ！
battle_talk_141303=よし！この時をずっと待っていたんだ。
battle_talk_141304=まだ手遅れにならないよう祈る。我々は負けない！
battle_talk_141305=今こそ、父と同じ責任を果たす時だ！この街は私が守る！
battle_talk_141306=フランスに栄光を取り戻し、凱旋帰国しよう！フランスからイングランド人を追い払おう！
battle_talk_141307=フランスを離れる時が来た。

;史诗战役对话
battle_talk_200001=私は戦火をローマまで広げる。ガリア制圧私の第一歩に過ぎない。ここはわが軍馬に餌を与える場所となる。
battle_talk_200002=機に乗じて彼らの土地を奪取しよう。フランクは私の手によって統一される！
battle_talk_200003=かかってこい！ お前ら全員、墓場に送ってやる！
battle_talk_200004=戦士たち、家族と土地のために一歩も後退はできない。かかれ！
battle_talk_200005=突撃だ！奴らを羊のように殺しまくれ！
battle_talk_200006=奴らを殺せ！
battle_talk_200007=ようやく追いついた！匈奴人に奪われたものをすべて取り戻すのだ！
battle_talk_200008=故郷を守ろ！
battle_talk_200009=決戦は始まった！ 帝国の存亡はこの一戦にかかっている！
battle_talk_200010=やっと匈奴人の侵攻を食い止めた！ローマ万歳！
battle_talk_200011=ローマの大軍は私に滅ぼされた。ローマは私の手によって征服されるのだ！
battle_talk_200101=戦士たちよ、刃を研ぎ、馬に餌を与えよう。フランク人を我々の鉄騎の下で震え上がらせてやれ！
battle_talk_200102=アッラーフ・アクバル！この戦いに勝利した後、我々の教えをもっと広くを広めよう！
battle_talk_200103=前回の教訓を生かしてないのか？君らは今度も大敗を喫する！
battle_talk_200104=いけない。トゥールーズが危ない！今、チャーリーに助けを求めなければならない。
battle_talk_200105=私はあなたに服従するので、至急助けに来てください。
battle_talk_200106=あなたの臣従を受け入れよう。部隊を集結が完了次第、すぐ救援に参る。
battle_talk_200107=奴らを阻止できなければ、アキテーヌ地方だけでなく、フランク王国も滅びてしまうのだ！
battle_talk_200108=トゥールーズは制圧した！冬が来る前に早く北上しよう！
battle_talk_200109=騎兵を集結させるのだ！
battle_talk_200110=防御歩兵で守ろ！長槍で奴らの進撃を食い止めるのだ！
battle_talk_200111=ええい！私が失敗したなんて信じられない。悔しい！
battle_talk_200112=フランク万歳！
battle_talk_200113=アッラーフ・アクバル！勝利は我々のものとなる！わが鉄騎はヨーロッパを蹂躙するのだ！
battle_talk_200114=段々寒くなってきた！我々に冬服が足りない！早く決着を付けないと！
battle_talk_700301=高仙芝はわが城と両親、またはわが姫を奪った。ここでやられてたまるか！反乱を起こすしかない！
battle_talk_700302=石国の王子はまだ降伏したくない。どうやら少し時間をかけてマップから石国を抹殺するしかない。
battle_talk_700303=わが軍は戦争から帰ってきたばかりだが、遠征で疲れた唐軍に対して大きな優位を占めている。さて、唐軍の実力を見せてもらう。
battle_talk_700304=唐軍はここまで強力とは思わなかったが、幸いに私にはまだ方法があるんだ。
battle_talk_700305=金を貰ったら、その分働くのは当然だろ。高仙芝、私を悪く思わないでよ！
battle_talk_700306=まずい。カルルクが反乱を起こし、我々を包囲した。
battle_talk_700307=アッラーのご加護を。ここで勝てば私の英名は天下に轟くだろう。
battle_talk_700308=大唐に武威あれ！たとえ挟み撃ちされてもわが鉄騎は止められない！
battle_talk_700309=我々はこの城と共に大唐に降伏します。
battle_talk_700310=時務を識る者は俊傑に在り。
battle_talk_700401=イングランドの王位は私一人のものである。強大なノルウェー軍を打ち破ったように、ノルマン軍を追い払おう！
battle_talk_700402=彼らはつい最近、大きな戦いをしたばかりで、まだ回復できていない。わが騎兵隊はすぐ彼らの防御線を突破できる！
battle_talk_700403=高地を占領せよ！長槍で騎兵隊の衝撃を食い止めろ！
battle_talk_700404=ウィリアムはすでに死んでいる！ノルマン人、早く降参しろ！
battle_talk_700405=撤退するな！私はまだ生きている！後ろは海だ。もはや退路はない。改めて攻撃を仕掛けるぞ！
battle_talk_700406=ハロルドは死んだ！これでイングランドの王座は私のものとなった！新しい時代はやってきた！
battle_talk_700407=ノルマン人は遂に敗退した！イングランドの王位は外来者のものではない！

;引导对话
tutorial_talk_1001=チュートリアルを開始しますか？
tutorial_talk_1101=これから、英雄伝説に入るようにお導きします！
tutorial_talk_1102=英雄伝説に入るには、私兵を持つことが必要です。従って、まず[#F4d181#司令部]に入って、将軍に私兵を募集しましょう！
tutorial_talk_1201=第一章をクリアしたため、我々の将軍は私兵を募集できるようになりました。[#F4d181#将軍の似顔絵の右側にある募集エリア]をタッチしてください！
tutorial_talk_1301=今回はまず、[#F4d181#軍団大隊]を募集しましょう。選択して[#F4d181#募集]というボタンをタッチしてください！
tutorial_talk_1501=今、左上の[#F4d181#×]をタッチして司令部から退出できます。
tutorial_talk_1601=[#F4d181#英雄伝説]は我々を呼び掛けています。ここをタッチしてください！
tutorial_talk_1701=最後に、[#F4d181#開始]というボタンをタッチして、
tutorial_talk_2101=[#F4d181#傭兵令]や[#F4d181#絵図]を使うことで、[#F4d181#召集令]や[#F4d181#機械欠片]を獲得することができます。[#F4d181#傭兵令]や[#F4d181#絵図]を一定数まで集めると、それに対応する部隊や機械を合成できます。
tutorial_talk_2201=指定された場所をタッチすると、現在手に入れる[#F4d181#召集令]と[#F4d181#機械欠片]、またはまだ開放していない[#F4d181#召集令]と[#F4d181#機械欠片]を確認できます。

speak_strong_attack_1=私の部隊は止められない。われと共に攻撃せよ!
speak_strong_attack_2=たわいもない相手だ。勝利はすでに私の手中にある。
speak_weak_attack=全力で攻撃し、敵を全滅させる。
speak_destroy_building_1=敵の城壁は脆い。この街はまもなくわれの手に落ちる。
speak_destroy_building_2=どんなに強固な城壁でも、我々の攻撃を止めることはできない。
speak_less_round_1=戦いが長引くと、戦況が悪化する可能性がある。
speak_less_round_2=攻撃を急げ！我々に残された時間はもうないんだ。
speak_less_stength=私の部隊には救援が必要だ。
speak_need_hitback=わが軍は攻撃を受けている。
speak_less_morale=部隊の士気は低く、兵士たちはもはや戦闘意欲を失っている。

speak_onwait_1=敵はどこにいる？私の刃は戦うことを渇望している。
speak_onwait_2=この戦いが終わったら、私は故郷に帰ることを決意した。
speak_onwait_3=戦場では単一種類の部隊よりも混成部隊の方が効果的な場合もある。
speak_onwait_4=膠着状態に陥っているか？太鼓を使って部隊を激励しよう。
speak_onwait_5=いい酒が飲みたい。ここはもううんざりだ。
speak_onwait_6=敵はなぜか現れて消えてのを繰り返している。
speak_onwait_7=私は本当の戦いを望んでいる。

battle_won_midway=勝利を獲得し、ボーナスを手に入れました。今すぐゲームを終了しますか？

