stage_intro_2151=西暦376年、匈奴人の襲撃を避けるために、西ゴート人はローマ帝国に庇護を求めた。しかし、西ゴート人がドナウ川を渡った後、ローマ人と多くの衝突を起こし、最終的に双方はマルシアノープルで戦いを繰り広げた。
stage_intro_2152=西暦378年、反乱を起こしたゴート人はドナウ川の各省を略奪した後、他の蛮族と連合してバルカン半島に侵入しようとした。ローマ皇帝ヴァレンスは自ら出征することを決めたが、彼の麾下にいる兵士の戦力は高くない。それは今回の反乱鎮圧作戦の最大の危険である。
stage_intro_2153=西暦402年、西ゴート人の国王アラリックを中心に西ローマ帝国の奥地に侵入し続け、やがて重鎮ミラノを包囲した。これは皇帝ホノレにすごく不安を抱かせたため、帝国北部のステリコに兵を率いて南下するように命じた。
stage_intro_2154=西暦410年、アラリックはホノレと約束した待ち合わせ場所でローマ軍に襲われた。今回の襲撃で彼は西ローマ帝国との交渉を放棄し、再びローマ城を包囲した。それによって「永遠の城」は何度も包囲攻撃を受けた後、ボロボロになっていた。
stage_intro_2155=西暦419年、西ローマ帝国と盟約を締結したばかりのスエビ王国は、国境問題で隣国のヴァンダル王国と頻繁に衝突を起こした。征服欲の強いスエビの国王ハーメリックは、ヴァンダル王国の領地に侵入することを決定した。
stage_intro_2156=西暦439年、ゲサリックは軍隊を率いてジブラルタル海峡を横断し、北アフリカにおける西ローマ帝国の大半の領土を占領した。西ローマ帝国と五年近くの平和を保った後、ゲザリックは再びローマ帝国の第三の名城「カルタゴ城」に目をつけた。
stage_intro_2157=西暦451年、野心に満ちる匈奴人の王アッティラは、西ローマ宮廷の不祥事を言い訳にしてガリア地域に出兵することを決めた。ガリアにいるローマの将軍エティウスもこの機に乗じてガリア地域の蛮族王国と連合して匈奴人の侵略に対抗しようとしていた。
stage_intro_2158=西暦455年、マクシムスは皇帝ウァレンティニアヌス3世を殺害して王位を簒奪した。これによってヴァンダル王国との同盟は破られた。オルドシア皇后の救援要請を受けた後、ゲサリックはイタリアへの出兵を決めた。
stage_intro_2251=西暦6世紀、ヨーロッパ諸国は騎兵の重要性を認識しつつあった。530年、ペルシア人はビザンティン帝国に攻撃を開始した。ダラー城の外では、サーサーン朝の精鋭騎兵が準備を整えた。
stage_intro_2252=ユスティニアヌス1世はローマの昔の輝きを再現しようとしていた。ゲリモーの簒奪は、彼に北アフリカへの出兵の口実を与えていた。西暦533年、ベリサリウスは部隊を率いて北アフリカに上陸し、カルタゴへ進軍を開始した。
stage_intro_2253=ビザンティン帝国がアド・デキムムの戦いで大きな勝利を収めた後、ベリサリウスは軍隊を率いてカルタゴを占領した。カルタゴの西にいるゲリモーは、彼の兄弟に助けを求め、再び部隊を集め、ガタゴを奪還しようとした。
stage_intro_2254=北アフリカを再び征服した後、ユスティニアヌス1世はイタリア地方に目を向けた。西暦535年、ベリサリウスは軍隊を率いて再び出征した。彼の皇帝のためにローマを占領し、イタリア地方を奪還しようとした。
stage_intro_2255=ローマを占領した後、ラヴェンナへの道はビザンティン帝国の支配下に入った。ベリサリウスは軍隊を率いて進軍を続けている。東ゴート王国の首都はまもなくビザンティン軍隊の猛攻に直面することになる。
stage_intro_2256=東ゴート王トティラの活躍により、ユスティニアヌス1世はベリサリウスを再びイタリアに派遣せざるを得なかった。西暦546年、トティラの部隊はローマに到着してこの都市を包囲した。
stage_intro_2257=トティラがイタリア地方で侵略を続けることによって帝国は甚大な損失を被った。彼は艦隊を利用して海域を封鎖し、帝国軍がイタリア地域に入るのを防ごうとしていた。これによってユスティニアヌス1世は非常に不満を抱いていた。
stage_intro_2258=イタリアの支配権を取り戻すために、ユスティニアヌス1世はナルシスをイタリアに派遣することにした。ナルシスと遭遇した後、兵力は劣勢であったが、伝統的なゴート人であるトティラは積極的に攻撃を開始した。
stage_intro_2259=ナルシスの攻撃を阻止できないので、東ゴート人はフランク人とアレマン人に救援を要請することを決めた。彼らにイタリア地方に入り、ビザンティン軍の攻撃を阻止してほしかった。
stage_intro_2260=西暦559年、一部の匈奴人は辺境を越えてコンスタンティノープルの郊外で悪事を働いた。これはユスティニアヌス1世にとって恥辱であった。彼はもう一度ベリサリウスを呼び戻し、最後の使命を与えた。
stage_intro_2351=アングロ・サクソン人の到来によって、ブリテンの原住民はパニックに陥った。装備が優れてよく訓練された敵に対して、ブリテン人は武器を手にしてアングロ・サクソン人の侵入に抵抗せざるを得なかった。
stage_intro_2352=南サクソン部族の首領エルは民を率いてブリテン島の南海岸に上陸したが、内陸への進行はうまくいかず、現地人の強い抵抗を受けていた。エルは自分の兵力が不足していることを意識し、まだ本土にいる部族に増援を要請した。
stage_intro_2353=連年の戦乱で、ブリテンで散らばっている部族は合併し始め、それぞれの王国を築き始めた。しかしそれはブリテンに平和と安定をもたらしていない。部族間の戦いはノーサンブリア王国をはじめとする王国間のより大規模で残酷な戦争に発展していった。
stage_intro_2354=西暦633年、エドウィン統治下のノーサンブリア王国は当時イングランド地域で最も強大な国となった。隣国はそれを恐れているため、グウィネズの国王カドバロンはマーシア王国と同盟を結び、連合軍を結成してノーサンブリア王国に侵入することを決定した。
stage_intro_2355=グウィネズ王国とマーシア王国の連合軍の侵入を防ぐことに成功したが、ノーサンブリア王国も深刻な被害を被り、王国は一度分裂にも至った。西暦634年、グウィネズ国王カドバロンは再びノーサンブリア王国に出兵することを決めた。
stage_intro_2356=オズワルドの復帰と後継によってノーサンブリア軍はグウィネズ王国に勝った。王国は再び平和と安定を得た。西暦644年、十年間の国力の回復に伴い、オズワルドはマーシア王国を攻撃することを決定した。
stage_intro_2357=オズワルドによるマーシア王国への侵入は結局惨敗に終わった。ペンダはこの機会に乗じてにイースト・アングリア王国とグウィネズ王国を連合して戦火をノーサンブリア本土に導くことにした。西暦655年、ノーサンブリア王国はベルネシアだけが連合軍に攻略されていなかった。
stage_intro_2358=マーシア王国は長い間、イングランド南部の多くの王国を強引に支配することで覇者の地位を維持していた。西暦825年、ベエンウォフは自分の権威を固めるために、自ら軍を率いてウェセックス王国に侵入した。これによってウェセックス王エグバートは奮起して反撃を始めた。
stage_intro_2451=使者がガサンニードに殺されたため、アラブ人は報復を起こすことにしたが、その行動はビザンティンに知られた。その後、ビザンティンはすぐに要塞に軍隊を集結させた。強力なビザンティン軍の前で、アラブ人の復讐は失敗する運命にあるように見える。
stage_intro_2452=ハーリドが部隊を率いてマギー・ラシットに来た時、ガサンニード人はアラブ人が彼らの脅威にはならないと思っていた。しかしその後、アラブ人はすぐに彼らの極めて強い戦力でそれが大間違いと証明した。
stage_intro_2453=アブはアラブ初のカリフになった後、アラビア半島以外に勢力を広げようとし始めた。アラブ軍は北へと進み、ダマスカスに攻撃を開始した。
stage_intro_2454=アラブ人の進攻を阻止し、失った領土を取り戻すため、ヘラクレイオスはレバントに大規模な軍隊を派遣することを決めた。敵の接近に伴い、アラブ人はダマスカスから撤退し、ヤルムークに部隊を再集結した。
stage_intro_2455=ヤルムーク平原でビザンティン軍と戦った後、アラブ人は引き続き前進し、より多くの都市を占領することを決めた。西暦636年、アラブ軍はエルサレムに到着し、この都市を包囲した。
stage_intro_2456=アラブ人の征服は依然として続いていた。彼らの部隊はアナトリア半島で勝利を収め続けている。立て続けの敗戦と都市の陥落は、ビザンティン帝国に恐怖を感じさせた。彼らにはその強敵に打ち勝つ方法が必要であった。
stage_intro_2457=サーサーン朝に勝った後、オマルは彼のアラブ戦士を率いてアフリカに進出させることにした。アラブ人はエジプトを原点にして、より多くのアフリカの土地を自分の領土として占領することを計画している。
stage_intro_2458=サーサーン朝の支配を完全に終えた後、アラブ人はビザンティン帝国を主要な敵対目標とした。地中海地域でビザンティン帝国に対抗するために、彼らは強力な海軍を作り上げた。
stage_intro_2551=西暦865年、とあるヴァイキングの大軍が海を渡り、ブリテンの土地に上陸し、沿海の修道院などの施設に奇襲と略奪を行った。
stage_intro_2552=ヴァイキングが侵攻して以来、イースト・アングリア王国とノーサンブリア王国は次々と占領されていた。ヴァイキングの次の目標はウェセックス王国である。
stage_intro_2553=レディングの戦いで優勢を獲得したヴァイキングは前進を続け、アッシュダウンの地域で再びウェセックス軍と戦った。
stage_intro_2554=数十年にわたる侵入と略奪を経て、ウェセックス王国を含む数少ない勢力は依然としてアルフレッドの指揮下でヴァイキングの侵入に抵抗していた。
stage_intro_2555=西暦893年、再びブリテンに上陸したヴァイキングは再びアングロ・サクソン人と衝突した。戦術が変わったため、ヴァイキングの侵入はあまり効果がなかった。
stage_intro_2556=西暦937年、北方の三王国は連合を結成し、イングランドを占領しようとしていた。敵の侵入に直面して、アゼルスタン王は軍隊を集めて北へ進軍した。
stage_intro_2557=イングランドの王位を争奪するために、ノルウェー王ハロルド・ハラールは彼の盟友と共に軍隊を集めてヨークシャーに進軍することを決定した。
stage_intro_2558=イングランド国王「懺悔王エドワード」が死亡した後、王座を狙った者は蠢いている。ノルウェーから来たハーラルは自分の部隊を率いて、イングランドに攻撃を発動した。
stage_intro_2651=ビザンティン帝国とブルガリア帝国との戦いは長く続いていた。西暦811年、ニケフォロス1世は軍隊を率いてブルガリアを攻めた。連続的勝利を収めた後、プリスカへの進軍を決定した。
stage_intro_2652=プリスカの戦いの後、ビザンティン帝国とブルガリア帝国は大きな損失を受けたが、ブルガリア帝国は依然として過激な攻勢を維持していた。損失が甚大であったにもかかわらず、ビザンティン帝国は平和協定への署名を拒否した。
stage_intro_2653=ミハイル2世が戴冠した後、トーマスという将軍が彼の支配に反抗することを決定し、多くの人の支持を得た。彼は人々の支持を得てアラブ人と連合してコンスタンティノープルに攻撃を仕掛けた。
stage_intro_2654=ビザンティン教士が追放された行為に報復するため、レオーン6世はブルガリア商人をコンスタンティノープルから追放することにした。これはサイモン1世に戦争を起こす口実を与えたが、この時ビザンティン軍の主力は東線でアラブ人に抵抗していた。
stage_intro_2655=摂政王となった後、ゾーイはブルガリア帝国に譲歩しないことを決定した。サイモン1世はこれを機に再びビザンティン帝国に攻撃を仕掛けた。サイモン1世の独断によって、ビザンティン人は独自で戦うことを余儀なくされた。
stage_intro_2656=西暦922年、ブルガリア人はバルカン地域の大半を支配下に置いたが、海軍が不足しているため、コンスタンティノープルを脅かすことはできなかった。ブルガリア人はアラブ人と連合しようとするが、ビザンティン人に阻止された。
stage_intro_2657=アラブ人との戦いを終えた後、ビザンティン帝国は短時間で実力を回復し、ブルガリア帝国を急速に破った。しかしキエフ大公国は虚に乗じて侵入してきた。バルカン半島に再び新たな強大な敵が現れた。
stage_intro_2658=西暦971年、ブルガリア人の敗戦によりビザンティン人はブルガリアの土地を多く占領した。自分の土地を取り戻すために、長年に渡ってブルガリア人が攻撃を続けていた。
stage_intro_2659=トラヤヌスの門の戦いの後、ビザンティン帝国で内戦が勃発した。サミュエルはこの状況を利用してビザンティン帝国に攻撃を開始した。西暦996年、サミュエルはテサロニケのビザンティン軍を破り、南へ進軍し始めた。
stage_intro_2660=1000年から、ビザンティン皇帝バシレイオス2世はブルガリアへの出兵を決定した。双方に勝負があったにもかかわらず、戦争は両国の国境まで広げた。今、ビザンティン帝国と衰退したブルガリアの間の悪戦は避けられない。
stage_intro_2751=1066年、ノルマンディー公はイングランドの王位を取得するために、部隊を率いて海峡を渡り、イングランドに上陸した。ハロルド2世はこの情報を掌握したら、すぐ軍隊を集めて南下し、ヘイスティングズ付近に守備軍を配置した。
stage_intro_2752=ヘイスティングズの戦いでハロルド2世を破った後、ウィリアムは部隊を率いてロンドンに到着した。ロンドンの安全を確保するために、彼はサザークに部隊を派遣し、そこの抵抗勢力を消滅しようとしていた。
stage_intro_2753=イングランドを征服することに成功した後、エクセターにいる人々はウィリアムへの忠誠を拒否した。エクセター人を支配に従わせるために、ウィリアムは部隊を率いてこの都市を包囲したが、強い抵抗を受けた。
stage_intro_2754=大多数の支持を得たにもかかわらず、抵抗勢力が依然として存在し、ウィリアムの支配に抵抗している。彼らの多くは北に集中していた。ウィリアムは部隊を北上させることにしたが、平和的なやり方でこれらの人々の忠誠を得ることはできないと思っていた。
stage_intro_2755=1075年、ノルマンディーに戻ったウィリアムは、エマとラルフの結婚を拒んだ。その行為によって三人の伯爵が蜂起を引き起こし、ウィリアムがノルマンディーにいるうちに、彼の支配を抵抗し、打倒することを決定した。
stage_intro_2756=1105年、ヘンリー1世は部隊を率いてノルマンディー公ローベルの領地に侵入し、バヨとカーンを占領した。翌年、ヘンリー1世はノルマンディーに戻り、ローベルに忠誠を尽くした貴族の一人あるモルタン伯爵は、彼の第一の目標となった。
stage_intro_2757=1119年、フランス国王ルイ6世は部隊を率いてノルマンディーを攻撃した。ノルマンディーでの自分の財産と領土を守るために、ヘンリー1世はフランスと戦わせられた。
stage_intro_2758=1135年、ヘンリー1世の突然の病死によってイングランドは無政府状態の混乱に陥った。スティーヴンとヘンリー1世の娘マティルダは、それぞれの勢力を率いて、イングランドの王位を争うために戦いを始めた。
stage_intro_2851=1048年、セルジューク王子が軍隊を率いてビザンティン帝国の支配下にあるアルメニア地方に入った。自身の兵力が不足しているため、ビザンティン人は保守的な戦略を採用し、援軍の到来を待つことにした。
stage_intro_2852=1071年、弱くなってきたビザンティン帝国は、セルジュークがエジプトのファーティマ軍に専念することを利用し、アルメニアを急襲させ、失った土地と要塞を奪還しようとしていた。
stage_intro_2853=エーゲ海でのセルジューク帝国の活動はビザンティン帝国を脅かし続けている。セルジューク帝国の海軍に対抗するために、アレクシオスは艦隊を結成させ、エーゲ海の支配権を奪還すると決めた。
stage_intro_2854=強気なセルジュークはビザンティン帝国に抵抗できず、皇帝アレクシオスは西方に援助を求めることにした。ビザンティン軍の協力を得て、東征の大軍は海を越え、初戦の目標をニカイアに向けた。
stage_intro_2855=より多くのビザンティン援軍の加入に伴い、東征軍の戦闘力はますます強くなった。東征軍はアンティオキアへ向かっていたが、この都市はコンスタンティノープルからエルサレムまでの途中に位置している。
stage_intro_2856=アナトリア前線の防御を強化するために、病状が好転したアレクシオスは自ら戦場に行くことにした。彼の軍隊はセルジューク人を何度も破り、追加兵力を獲得した後、再び敵に攻撃を仕掛けた。
stage_intro_2857=1176年、ビザンティン皇帝マヌエル1世は、ハンガリーとセルビアからの脅威を解除した後、東にあるルーム・セルジューク朝に力を集中し、アナトリア草原を奪還すると望んでいる。
stage_intro_2858=マヌエル1世はアナトリアを奪還する絶好の機会を失い、大量の攻城機械を失った。その時、略奪を終えて帰ってきたセルジューク軍は、彼らに勝利の希望を見せた。
stage_intro_2951=セルジューク人の首都ニカイアを攻略した後、遠征軍は猛烈な反攻を受けた。アルスラーン1世は大量の部隊を率いて、ボエモン1世の部隊を包囲した。
stage_intro_2952=アンティオキアの占領に成功した後、東征軍は勢いよく進み、エルサレムに向かって前進し続けた。同時にエルサレムに駐屯していたアラブの将軍ドラも、すでに防御の準備を整えた。
stage_intro_2953=第一次東征で勝利を得た西方の領主たちは勝利の喜びを味わったため、再び東征を開始することにした。今回はダマスカスが彼らの初めての目標となった。
stage_intro_2954=アッコは地理的に優れており、サラーフッディーンの支配下にある非常に重要な都市である。サラーフッディーンが敵が再び部隊を結集してアッコ城まで侵入したことを知ったら、すぐ部隊を集めて迎撃に向かった。
stage_intro_2955=サラーフッディーンに奪取されたエルサレムを取り戻すために、西ヨーロッパの領主たちは再び東征軍を組織した。大軍がアナトリアに入った時、セルジューク人の猛烈な攻撃を受けた。
stage_intro_2956=獅子心王リチャードがエルサレムから撤退した後、サラーフッディーンはヤッファに攻撃を仕掛けると決めた。それを知った獅子心王は再び軍隊を集結させ、サラーフッディーンに攻撃をかけた。
stage_intro_2957=東征軍がエルサレムへの進行に準備をしていた時、彼らの指導者はアレクシオス4世の要請に応じて、彼の父が皇位を取り戻すのを助けるためにコンスタンティノープルに行くことを決めた。報酬として、ビザンティン帝国は彼らに経済的または軍事的な援助を提供してくれる。
stage_intro_2958=長い戦いを経て、東征軍はエジプトがエルサレムの奪還を阻害する最大の障害だと考え始めた。そこで彼らは軍隊を組織して地中海を越えてエジプトに攻撃することを決めた。
stage_intro_3051=ウェールズの反乱により、ヘンリー2世はノルマンディーからイングランドに戻らなければならなかった。1165年、ウェールズ人に罰を与えるために、ヘンリー2世は巨大な軍隊を集結させ、ウェールズ人に攻撃を開始した。
stage_intro_3052=イングランド王位の継承権を奪うために、アーサーとジョンは長期的な闘争を行った。ジョンがイザベラと結婚を決めた後、そのバランスは徐々に崩れ、ユーグ10世とフィリップ2世の加入は状況をより一層混乱させた。
stage_intro_3053=ジョンが協力しないことによって、フィリップ2世は自分の手でノルマンディーの土地を奪還すると決めた。1203年、フィリップ2世はガイヤール砦に出兵し、ここはノルマンディー全体を支配する鍵だと思っていた。
stage_intro_3054=1213年、ウィリアムが率いるイングランド艦隊は偶然にフランス艦隊を発見した。フランスの乗組員はすでに上陸して略奪を開始していた。無人艦隊に向かって、イングランド人はすでに勝利をに手に入れたように見える。
stage_intro_3055=1214年、イングランド王国や神聖ローマ帝国、フランドルより構成された連合軍はフランス王国に攻撃を開始した。フィリップ2世は迅速に大軍を集結させた。連合軍の勢いは大きいが、よく訓練されたフランスの騎兵は敵に遅れを取っていないように見える。
stage_intro_3056=ヘンリー3世が執政を務めた時に、イングランド国内の飢饉が激化し、ヘンリー3世に対する貴族たちの不満も高まっていた。シモン・ド・モンフォールが率いるヘンリー3世の支配に抵抗する戦争が近づいている。
stage_intro_3057=エドワード1世の監督の下で、スコットランド人は新しい王を選出した。エドワード1世はスコットランドがイングランドに統治された侯国になるべきだと考え、イングランドと共にフランスに対抗すると要求した。しかし、スコットランド人はそれに反対し、フランスと同盟を結んだ。
stage_intro_3058=ウィリアム・ウォレスの案内で、スコットランド軍はイングランドへの攻撃を続けている。1298年、エドワード1世はフランス王国と休戦し、イングランドに帰ってスコットランドの進攻に集中すると決めた。
stage_intro_3059=フォルカークの戦いで勝利を収めた後、スコットランドはイングランドにほぼ征服された。1306年、ロバート・ブルースがスコットランドの王位を獲得した。エドワード1世が病死した後、エドワード2世の統治は思わしくないため、戦局が逆転した。
stage_intro_3060=1323年、ロジャー・モーティマーはロンドン塔から脱出してイザベラと知り合った。双方ともエドワード2世に不満を抱き、彼の支配に抵抗すると決めた。1326年、イザベラとモーティマーは密かにイングランドに戻り、彼らへの抵抗行動を開始した。
stage_intro_3151=コンスタンティノープルが陥落した後、ニカイア帝国とエピロス専制侯国はビザンティンの亡命政権となった。両方とも先にビザンティン帝国を復活させることを望んでいたが、この目標によって両方の間で衝突が勃発した。
stage_intro_3152=ニカイア帝国はエピロス専制侯国との争いで最後の勝利を収めた。野心にあふれたミハイル8世の下で、ニカイア帝国はコンスタンティノープルに君臨したラテン帝国に目を向けた。
stage_intro_3153=1261年、ニカイア帝国はジェノヴァ共和国と同盟を結び、もう一度コンスタンティノープルに攻撃しようとした。ラテンの駐屯軍とヴェネツィア艦隊がまだ遠征から戻っていないことを発見した時、そんな千載一遇のチャンスを無駄にしてはいけないと決めた。
stage_intro_3154=ビザンティン帝国を再建した後、ミハイル8世は周辺のラテン帝国の残存勢力を粛清しようとした。1263年、ビザンティン軍はアカイア公国に攻撃を開始したが、向こうの首都を占領した時に頑強な抵抗を受けた。
stage_intro_3155=プリニッツァの戦いの失敗によって、ビザンティン帝国はモリアでますます受動的立場になり、雇用軍の逃走や部隊が分散した問題は非常に深刻になっていた。1264年、ウィリアム2世の下で、ラテン帝国は分散したビザンティン軍に対して攻撃を開始した。
stage_intro_3156=1274年、ビザンティン帝国はセサリのジョンに対して攻撃を開始した。ビザンティンの大軍に向かって、ジョンは他国に救援を要請するしかできない。
stage_intro_3157=帝国のエーゲ海に対する支配権を維持するために、ビザンティン帝国は海軍を再結成した。しかし、モリアとセタポツの戦いの失敗で軍隊は大きなダメージを被ったため、ラテン貴族はデミトリアス港にいるビザンティン海軍を攻撃すると決めた。
stage_intro_3158=アンジュー・シチリア王国にとって、ベラトは戦略的な要塞都市である。1280年、ビザンティン帝国の重要地帯が敵に侵入されることを防ぐために、ビザンティン帝国は軍隊を派遣してベラトを攻撃した。
stage_intro_3251=1302年、ミハイル9世の軍隊はオスマン人を恐れて解散を宣言したため、アンドロニコス2世は軍隊を派遣してボスポラス海峡を渡って、ニコメディアでの厳しい状況を解決することを余儀なくされた。
stage_intro_3252=1321年、若いアンドロニコス3世は、祖父が年老いすぎて、自分が皇帝の座に就くべきだと思ったため、祖孫二人はすぐに内戦を始めた。オスマン人はこの機会に乗じてブルサ城を制圧すると決めた。
stage_intro_3253=ラテン帝国からコンスタンティノープルを奪還した後、ビザンティン人はギリシャ地域を支配するために、アナトリア東部前線にいる部隊を呼び戻した。これを機に、オスマン帝国は新たな攻撃を開始した。
stage_intro_3254=1329年、アナトリアでビザンティンの支配した区域が急激に縮小した。周辺地域を安定させるためにアンドロニコス3世はニコメディアに軍隊を派遣すると決めた。しかし、ペレカノンでオスマン軍からの迎撃を受けた。
stage_intro_3255=ビザンティンは内乱で滅亡寸前に陥った。ジョン6世は、息子を救出するためにオスマン帝国に救援を頼んだ。これから彼らはセルビア帝国と第二次ブルガリア帝国の連合軍と対峙することになる。
stage_intro_3256=1352年、ビザンティンは再び内戦に陥り、雇用軍としてのオスマン人はガリポリ付近要塞の支配権を獲得した。1354年、とある地震によってガリポリの状況は一変した。
stage_intro_3257=オスマン帝国は1352年にバルカン半島で最初の砦を占領した後、ヨーロッパで急速に拡大し始めた。ブルガリア皇帝イワン・アレクサンドルは、彼らの侵攻を阻止しようと決めた。
stage_intro_3258=ガリポリを占領した後、バルカン南部でのオスマン帝国の拡張はより激しくなった。一連の激動と整備を経て、オスマン帝国はビザンティン帝国の第三大都市ハドリアノポリスに攻撃を仕掛けると決めた。
stage_intro_3351=1337年、フランス議会はイングランドからアキテーヌ公国を回収することを決定し、双方の矛盾は一気に噴出した。イギリス海峡の制海権を奪取するために、エドワード3世は自ら艦隊を率いてフランス海軍に攻撃をかけた。
stage_intro_3352=制海権を握ったエドワード3世は、ポーツマスから兵を率いてフランス北岸に到達した後、攻撃を開始した。強力なフランス軍は防衛の準備を整え、クレシー周辺で両軍の対決が始まろうとしていた。
stage_intro_3353=エドワード3世はクレシーの戦いで勝利を収めたことを喜び、イングランド軍はこの勝利に乗じて、ヨーロッパ大陸の橋頭堡であるカレーを制圧しようと決めた。しかし、これほど困難な戦いになるとは思ってもいなかった。
stage_intro_3354=1346年9月、イングランド軍がカレーを包囲しているとき、フィリップ6世は急遽、デイヴィッド2世にイングランドを攻撃し、エドワード3世を撤退させようと要請した。デイヴィッドは、フランスとの長年にわたる同盟関係を考慮し、イングランドに攻撃を仕掛けることを決意した。
stage_intro_3355=ブルターニュは地理的に非常に重要な位置にある。ブルターニュの後継者争いを巡ってイングランドとフランスは揉め始めていた。どちら側もブルターニュを自分の陣営に引き込み、戦場で有利を占めようと望んでいる。
stage_intro_3356=1356年、黒太子エドワードはイギリス軍の騎兵統帥となり、イギリス軍を率いてフランスの土地で焦土政策を施行し、かなりの成功を収めた。ジョン2世は黒太子に報復するために、イギリス軍に追いつくよう行軍速度を増やすことにした。
stage_intro_3357=ポワティエの戦いで捕虜となったフランス国王ジョン2世は、多くの領土をイングランドに割譲した。そして、エドワード3世の野望はそれだけにとどまらず、遠征を決行し、ランスでフランス国王として戴冠しようとしていた。
stage_intro_3358=フランスは甚大な被害を被ったが、一国の王が城を空けるなど一大事なので、シャルル王子はランスに行き、王として戴冠式を行おうとしていた。エドワード3世はその戴冠式を阻止するため、パリとランスの間の道路を切断すると決めた。
stage_intro_3359=モロンの戦いの後、ブルターニュの後継者たちの間で長い休戦が続いたが、イングランドとフランスの支援を受けた双方はやがて決戦に向けての準備を完了した。
stage_intro_3360=1369年10月、上級貴族ではないベルトランは、シャルル5世によって新しい陸軍の司令官に任命された。この挙動によってフランス王は大きな利益を手に入れた。冬の到来とともに、イングランド軍内で冬の過ごし方をめぐって再び論争が起こった。フランス軍はこの機会を利用してイングランド軍を攻撃した。
stage_intro_3361=1372年、1368年に樹立されたフランス・カスティーリャ同盟に応えるために、カスティーリャ王はフランス軍に協力するようアキテーヌに艦隊を派遣した。艦隊はラ・ロシェル外海でフランスに向かっているイングランド艦隊に遭遇した。
stage_intro_3362=晩年のエドワード3世は戦争に起こす気をなくしており、エドワード黒太子の死はさらに彼を落胆させた。彼のもう一人の息子であるジョン・オブ・ゴーントが指揮官となり、フランスで数々の略奪を行い、フランス人に大きな損害を与えた。
stage_intro_3451=シャルル6世は狂気の王となり、王族間の争いが激化し、フランスの政権も不安定になった。1415年、若きヘンリー5世が曽祖父の進攻ルートに沿ってフランス征服を決意し、両国の国王となろうとしていた。
stage_intro_3452=ヘンリー5世はフランスで収めた勝利はイングランドに大きな利益をもたらさず、議会による支援も少なくなっていたため、彼はルーアンを占領してより多くのフランス領土を得ようと決意した。
stage_intro_3453=国内の争いはフランスを完全に分裂させた。その後、ジョンは暗殺され、ブルゴーニュ公国は完全にイングランドに寝返った。トロワ条約の締結により、名義上でヘンリー5世はフランス王位の継承者になった。 しかしこの時、シャルルはスコットランドの支持を得たため、大戦は勃発した。
stage_intro_3454=ボーゲンシーの戦いでの勝利は王太子シャルルを喜ばせ、フランス貴族はこの勝利に乗じて失われた領土を取り戻そうとしていた。そして、ヘンリー5世はこの時、新たな攻勢を計画していた。
stage_intro_3455=ヘンリー5世とシャルル6世が亡くなってから2年が経っていた。シャルル7世はまだ戴冠しておらず、ヘンリー6世はまだ若いため、ベッドフォード公爵の摂政下にあった。この2年間、双方は衝突を繰り返し、相手の主力を徹底的に消滅しようとしていた。
stage_intro_3456=イングランドの猛攻と対照的にフランス政府の対応は鈍かった。戦費の不足、貴族の分裂、勝利の天秤はずっとフランスに傾いていない。相次ぐ打撃によってシャルル7世は絶望に追い込まれようとしていた。
stage_intro_3457=オルレアンが英国に奪われれば、フランス中央部への最後の関門が破られる。シャルル7世にとっては暗黒の時代であるが、神はこの不安定な国に光を与え、ジャンヌ・ダルクという少女が名乗りを上げたのである。
stage_intro_3458=オルレアンへの包囲が解除された知らせはフランス全土に伝わり、士気が上がったフランス軍は、ロワール渓谷一帯でイングランド軍の陣地を排除しようと準備を進めている。
stage_intro_3459=聖女ジャンヌはシャルル7世にノルマンディーへの攻撃計画を放棄し、ランスに行って戴冠式に臨むことを望んでいた。これによって、イングランド軍の士気はさらに低下した。イングランド軍は、フス戦争に協力していた精鋭部隊を動員して彼らを止めに来た。
stage_intro_3460=支援は不十分なため、聖女ジャンヌはコンピエーニュの戦いで捕らえられ、2年後に死亡した。これによって彼女の仲間たちの復讐心を刺激され、フランスの一般民衆までも闘争に参加するようになった。
stage_intro_3461=1435年、摂政王ベッドフォード公爵の死により、イングランドはブルゴーニュ公国という同盟国を失い、ノルマンディーが混乱に陥った。シャルル7世はこの機会を利用し、パリを奪回することを決意した。
stage_intro_3462=1435年から1436年にかけてのフランスとの戦争で莫大な犠牲を払ったにもかかわらず、イングランドはブルゴーニュとの和平を望まないため、ブルゴーニュ公爵はカレーの奪取を決意した。
stage_intro_3463=シャルル7世の統治でフランスが大きく復興し、フランスにおけるイングランド人の最後の領土としてノルマンディーとギエンヌ・ガスコーニュしか残っていない。本国から大量の兵力を得たイングランドはフランスと決戦することを決意した。
stage_intro_3551=ウグリェシャはオスマン帝国の大部分の軍隊がヨーロッパを離れ、アナトリアに向かって進軍しているという情報を得た。これはバルカン半島でのオスマン帝国の勢力を排除する最高の機会であるため、彼らは奇襲を仕掛けていた。
stage_intro_3552=トピア家族のカロ・トピアはバルシャ2世が婚姻を通じて領土を拡大する方法に不満を持ち、オスマン帝国にゼタ公国への攻撃を発動するように招待状を送った。そして、ムラト1世はこの誘いを喜んで受け入れた。
stage_intro_3553=ムラト1世は1387年、アナトリアの事務を処理するためにバルカンを離れた。一方、バルカンの従属勢力はオスマン帝国の支配から脱却しようとし、その権威に挑戦するための同盟を結成した。
stage_intro_3554=ムラト1世は1388年、アナトリアから帰国した後、すぐブルガリアに対して戦を始めた。ボスニアの統治者も直ちにブルガリアに援助を開始した。
stage_intro_3555=コソボはマケドニアとセルビアという2つの地域をつないでいる。オスマン人がここを占領したら、セルビアの領土はさらに侵食される。一方、ラザル大公が組織した連合軍はコソボ地域でオスマン人と激しい交戦を開始した。
stage_intro_3556=ムラト1世が意外に暗殺された後、彼の息子バヤズィト1世が即位した。その時、英仏の百年戦争は休戦期に入り、東ローマ帝国を救うため、西洋の騎士たちは十字軍東征を発動した。
stage_intro_3557=バヤズィト1世がビザンティンにトドメを刺そうとする時、東方のティムールが15万の大軍を率いて城下に迫りてきた。オスマン帝国の存立は風前の灯火のようになり、ビザンティンは一時息抜きができるようになった。
stage_intro_3558=アンカラの戦いでバヤズィト1世は捕らえられ、鬱々として病気になりつつ世を去った。その後、オスマン帝国内部で闘争が起こり、最終的に新しいスルタンであるムラト2世が混乱を収めた。しかし、帝国が弱体化になったため、従属国が反乱を引き起こした！
stage_intro_3559=ヴェネツィア人はテッサロニキ地域の完全な自治権を得るため、オスマン帝国に宣戦布告した。スルタンはこれを容認できず、大軍を派遣して包囲攻撃を始めた！
stage_intro_3560=教皇エウゲニウス4世はポーランドとハンガリーなどの軍隊を召集し、新たな十字軍東征を発動した。その時、既に退位したムラト2世は軍隊を再編成して迫り来る十字軍に対抗しなければならなかった。
stage_intro_3561=摂政王ジョン・フニャディは戦死した国王の仇を打つために4年間準備した。1448年、彼はハンガリー・ワラキア連合軍を率いてオスマン帝国に対して奇襲を仕掛けた。
stage_intro_3562=1451年、ムハンマド2世が即位した。その後の2年間、彼は火銃と巨砲を製作し、海岸要塞を建設して海峡を封鎖した。千年にわたってそびえ立つコンスタンティノープルは最強の敵を迎えようとしていた。
stage_intro_3651=狂気発作から1年後、ヘンリー6世は正気を取り戻した。王妃アンジューのマーガレットの支援を受けてサマセット公爵は復職した。ヨーク公爵リチャードは護国卿の地位を失い、宮廷から追われた。1455年、不満を抱いたヨーク公爵リチャードは、ネヴィル家族と共に軍隊を集めてロンドンに進軍し、サマセット公爵を一掃することを企んでいた。
stage_intro_3652=第1回セント・オールバンズの戦いが終わった後、ヨーク公爵は宮廷での敵を排除し、護国卿の地位に復帰した。しかし、1456年初めに、ヨーク公爵は王室のために土地を回収する法案を提出したが、議会に否決され、自ら護国卿の地位を辞任することになった。同時に、王妃マーガレットも密かに力を結集し、王室の権力を奪回しようとしていた。1459年、両者の対立が激化し、ヨーク派のソールズベリー伯爵が南下してヨーク公爵と合流することを企んだため、マーガレットは兵士を派遣して阻止しようとしていた。双方はブロックスワースで遭遇戦を起こした。
stage_intro_3653=ヨーク公爵はソールズベリー伯爵と合流した後、前進を続けることができなかった。彼らの前に現れたのはヘンリー6世の旗印を掲げた軍隊だった。そしてその数はおおよそ彼らの2倍から3倍程度。両軍の兵力差により、ヨーク公爵は一時的に部隊を後退させて野営すると命じた。そして自分の忠誠心を国王に伝えるために手紙を書いた。しかし、その前にブロックスワースで起こった戦闘により彼はすでに国王の信頼を失っており、大きな戦いが避けられなくなっていた。
stage_intro_3654=ラドフォード橋の戦いでの敗北により、ヨーク家の地位は急落し、ランカスター家の勢力は徐々に拡大してヨーク家の一部領地を獲得した。名目上、サマセット公爵は、かつてウォリック伯が所有していたカレーを領地として獲得したが、カレーはサマセット公爵の支配を拒否した。1460年1月、ウォリックは先制攻撃を仕掛けてカレー地方に攻め込もうとしていたランカスター軍を襲撃し、ロンドンに向かって進軍を開始した。ランカスター家の軍隊はこの情報を知った後、迅速に北のアンプトンで防御陣地を築いて、迫り来るヨーク家の軍隊を阻止しようとしていた。
stage_intro_3655=ノーサンプトンの戦いの後、ヨーク公リチャードはとある法案を通過させた。「国王が死亡した場合、リチャードとその子孫は王位を継承することができる」という内容の法案であった。これは彼が権力の頂点に達するために必要とされる最後の一歩を踏み出すことを意味している。しかし、この一歩を踏み出す前に、最後の障害が残っていた。元王妃マーガレットはランカスター家の同盟者に向けてヘル川沿いのキングストンに兵を集結し、ロンドンへの南下を試みた。リチャード公爵は、この情報を知った後、すぐに軍隊を組織して北上した。急いで出兵したため、兵力は敵より少ないし、補給も非常に不足していた。リチャード公爵は最初の戦闘で敗北したため、サンダーランド城に退却して援軍を待つことになった。
stage_intro_3656=ヨーク公リチャードは、ウェイクフィールド平原で敗北した後、殺され、彼の息子エドワード4世が彼の爵位を継承しました。エドワード4世はわずか18歳でしたが、年齢を超えたリーダーシップと指揮能力を発揮しました。ヨーク公リチャードが敗北してからわずか1か月後、エドワード4世は軍隊を率いてモーティマー十字でランカスター家の軍隊と激戦を繰り広げました。
stage_intro_3657=モーティマーズ・クロスの戦いが終わった後、エドワード4世が軍隊を再編成している間に、王妃マーガレットの盟友たちはすぐに南から北に向かうよう軍隊に命じた。わずか半月の間に、この何万もの大軍はロンドンに迫り、ウォリックが軍隊を率いて出撃した。偶然にも、6年前のヨーク家とランカスター家の最初の戦いと同じように、この大戦争の発生地は聖オールバンズという小さな町だったが、今回の対戦の結末は完全に異なった。
stage_intro_3658=マーガレットの軍隊がセント・オールバンズで勝利を収めたにもかかわらず、戦後の一連の暴行のため、ロンドン市民は彼らを迎え入れることを拒否した。無念ながら、マーガレットはやむ得ずに北部に撤退した。その後、ロンドンで高い人気を有するエドワード四世が王位に推挙され、元国王ヘンリー六世は廃位された。この情報を知ったマーガレットは、ヨーク家に反対する北部の勢力を集め、エドワード四世を打ち負かそうとしていた。これにより、イギリス本土で最も残酷な戦闘の1つが始まろうとしていた。
stage_intro_3659=トートンの戦いで、エドワード4世は彼に反対するランカスター派の大部分を打ち負かした。その後の数年間、エドワード4世は、様々な手段を使って以前の敵を友人に変えようと試みた。その中には、彼の大敵である第3代サマセット公ヘンリー・ボーフォートも含まれている。1463年末、サマセット公爵は秘密裏に廃位されたヘンリー六世と会い、再び反乱を起こした。怒りを感じたエドワード4世はジョン・ネヴィルを召集して反乱を鎮圧せよと命じた。今回、彼はサマセット公爵を完全に消滅しようとしていた。
stage_intro_3660=ヘッチリー沼で敗れたサマセット公は、ヘクサムの海岸に退却した。彼は軍隊を三つに分け、防御工事を築き、ヘクサムの南側で追手を防ごうとしていた。しかし、ジョン・ネヴィルの追撃は非常に速くてサマセット公に休む時間を与えるつもりはない。
stage_intro_3751=1469年、「リデスデールのロビン」と呼ばれる人物がイングランド北部で数度にわたり反乱を起こした。かねてよりエドワード4世と対立していたウォリック伯もこの機に乗じて反乱を起こし、鎮圧のために送られた軍をエッジコートで襲った。
stage_intro_3752=1470年、ウォリック伯は再び反乱を起こそうとしたが、エドワード4世は先手を打ちホーンフィールドでウォリックの反乱軍を撃破した。多くの反乱軍の兵が逃亡の際に目印のついた服を脱いだため、「脱ぎ捨ての戦い」と呼ばれるようになった。
stage_intro_3753=ルーズコート・フィールドの戦いの後、ウォリック伯はイングランドから逃亡しマーガレット・オブ・アンジューと同盟を結ぶことでランカスター家の支持を得た。1471年4月、濃霧に包まれた朝、かつての戦友だったエドワード4世とウォリック伯は、最後の戦いへ赴いた。
stage_intro_3754=バーネットの戦いと時を同じくして、マーガレットはランカスター家の軍を率いてイングランドに上陸しロンドンへと兵を進めた。バーネットの戦いの後、この知らせを聞いたエドワード4世は軍の疲弊にも関わらず、マーガレットとの決戦に臨んだ。
stage_intro_3755=1483年4月、エドワード4世が病死すると弟のグロスター公リチャードがエドワード5世の後見役として護国卿に任命された。6月にエドワード5世が失踪したため、リチャードは戴冠し「リチャード3世」となった。エドワード4世のかつての政治上の同盟者たちはこれを簒奪と見做し、代わりにヘンリー・テューダーを王位につけることを支持した。その後、イングランドで再び反乱が勃発した。
stage_intro_3756=1483年のクリスマスにランカスター家のヘンリー・テューダーはヨーク家のエリザベス・ウッドヴィルの娘と結婚した。この２つの家はテューダー家として統合され、共通の敵であるリチャード3世に対抗した。1485年8月22日、ヘンリー・テューダーとリチャード3世はボズワースで決戦を繰り広げた。

