troop_desc_416=バルカン重騎兵は巨大な力を持つ騎兵部隊。彼らは強力な戦馬を操り、厚い鎧と長いローブを身に着け、戦場で比類のない力と勇気を発揮する。
troop_desc_316=スィパーヒー重騎兵は勇敢で非常に優れた精鋭部隊。彼らは体の大きい戦馬に乗り、重装甲を身に付け、ハンマーを手に持ち、迅速な機動力を活かして敵を圧倒する。
troop_desc_116=ビザンティン重装歩兵は、頑丈な装備と高い戦闘技能で知られる部隊。彼らは厚い鎧を着て、強力な武器を手に持っている。通常は長槍や戦斧、大剣などを使用する。
troop_desc_516=スーダン近衛火銃兵は、火器を使いこなす部隊。彼らは精製された火銃を使用し、遠距離で致命的なダメージを与えることができる。華麗な衣装とターバンを身に着けることで高貴な身分と忠実な信仰を示している。
troop_desc_517=ビザンティン火炎放射兵は、神秘的な武器を持つ部隊。彼らは火炎放射器を使用し、近距離で熱い炎を噴出してくる。防護服とマスクを着用するのは、炎から自分を守ると言われている。

