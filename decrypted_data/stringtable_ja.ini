general_desc_Jean de Dunois=オルレアン公爵の隠し子。彼は勇敢に戦い、オルレアンを守り抜いた。その後、聖女ジャンヌと共にあちこち征戦した。
general_desc_Gilles de Rais=ジルは、百年戦争時のフランスの元帥である。聖女ジャンヌに従った最初の将軍の一人。一時は国民的英雄と称されたが、後に児童虐待の罪で火あぶりの刑に処された。
general_desc_La Hire=ラ・イルは、聖女ジャンヌに従った無敵の将軍である。フランスに最終的な勝利をもたらすために多大な貢献をした。
general_desc_Henry V=ヘンリー5世は優秀な戦士だった。アジャンクールの戦いで優れた指揮才能を発揮した。1420年のトロワ条約でフランス王位の継承権が確認された。
general_desc_Olga2=オリガは初めてキリスト教に改宗したロスの統治者。彼女はキエフにキリスト教を広めた。彼女が亡くなった後、法王庁から「聖オリガ」として認定された。
general_desc_Richard I2=獅子心王リチャードは、第3回十字軍の指導者の一人である。戦場ではサラディンも避けるほどの強さを持っていた。リチャードの力によって、エルサレム王国はさらに1世紀ほど続いた。

Olga2=聖オリガ
Richard I2=十字軍の獅子心王

