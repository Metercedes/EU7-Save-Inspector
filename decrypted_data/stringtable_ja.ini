campaign_desc_66=リチャード2世が倒された後、イングランドの王位をめぐってエドワード3世の子孫であるランカスター家とヨーク家が戦争を起こした。
campaign_desc_301=ファラオの財宝が埋まっているという伝説は人々の間に広がっている。数え切れないほどの希少な宝物が人々の欲望を掻き立てている。
campaign_desc_302=欠地王の宝物はいつも人々の好奇心を掻き立てている。しかし、宝物を見つけるのはそう簡単ではない。
campaign_desc_303=エルサレムの神殿に隠されたソロモン王の財宝は、一度は行方不明になり、人々に忘れられていた。しかし、財宝に関する情報が今、再び現れた。人々はその財宝を手に入れようとするために、出発の準備を整えた。
campaign_desc_304=聖殿騎士団は成立してから、幾度の戦を経て大量の富を蓄えてきた。解散後に他人に狙われるのを防ぐために、彼らはこれらの富をとある場所に埋めて今まで誰にも見つかっていない。
stage_group_desc_20001=ローマ帝国の衰弱に気づいた蛮族は蠢こうとしていた。匈奴人の首領であるアッティラは東ゴート人やゲピド人、フランク人と組んでガリアに進軍した。ローマ帝国は危険を察知し、アエティウスは大軍を集めて平原でアッティラと大決戦を繰り広げた。
stage_group_desc_20002=アラブ帝国の拡大を止めることは誰にもできない。彼らはすでに北アフリカ全域とイベリア半島を占領しました。フランク王国がアラブ軍を止められなければ、ヨーロッパ全土がアラブに征服されることになる。
stage_group_desc_20003=アラブ帝国と大唐は両方とも中央アジアに進出した。ペルシャ帝国の滅亡により、中間にある緩衝地帯はもはや存在せず、2つの帝国の衝突はもう避けられなかった。
stage_group_desc_20004=1066年、ノルマンディー公はイングランドの王位を取得するために、部隊を率いて海峡を渡り、イングランドに上陸した。ハロルド2世はこの情報を掌握したら、すぐ軍隊を集めて南下し、ヘイスティングズ付近に守備軍を配置した。
stage_group_desc_20005=大セルジューク朝が台頭すると、必ず両川流域またはさらに西へと拡大していくに違いない。アラブ帝国は内乱に陥ったため、大セルジューク朝との衝突を避けようとしていた。マラズギルトは制圧された後、ビザンティン皇帝は激怒し、ギリシャから兵力を引き抜いて大セルジューク朝に致命的な打撃を与えることを決意した。
stage_group_desc_20006=ボルドウィン4世の死去によってエルサレム王国はさらに大きな危機に陥った。内部の不和と挑発がサラディンに聖地奪還の機会を与えた。東西両方の戦争はもう避けられなくなった。

;战役章节结束
;__font_type[font_text_]
campaign_end_desc_1=西ローマ帝国は外敵の絶え間ない侵入の下で滅亡に向かった。この古い帝国の滅亡は、すでに定められていたかのようであったが、突然であった。それによってローマ帝国の国境が大幅に縮小させられた。その時、ビザンティン帝国の首都であるコンスタンティノープルはまるで別世界の光景であった。
campaign_end_desc_2=ユスティニアヌス1世とベリサリウスは賢明な君主の模範と言える。彼らはビザンティン帝国の台頭と発展のために堅固な基礎を築いた。千年帝国の継続のために、不滅の貢献をした。
campaign_end_desc_3=アングロ・サクソン人の侵入によって、ブリテンの各勢力は徐々に統合され、七つの王国を形成した。これは後のイングランド王国の雛形でもある。
campaign_end_desc_4=強力なアラブ人の攻勢の下でビザンティン帝国は苦境に強いられている。その同時にバルカン半島でまた新しい戦争が発生した。巨大なビザンティン帝国は腹背を敵に受けるようになり、いつでも倒れるように見えている。
campaign_end_desc_5=ヴァイキングは有名な船乗りである。彼らはヨーロッパ各国だけでなく、アメリカやアイスランドなどの様々な地域に侵入していた。このヴァイキングの拡大期は「ヴァイキング時代」と呼ばれている。
campaign_end_desc_6=マケドニア王朝はビザンティン帝国において史上2番目の輝かしい時期であった。この「黄金の時期」と呼ばれた数世紀の間、マケドニア王朝の領土はとてつもない規模に到達していたが、結局は子孫の断絶で終わりを告げた。
campaign_end_desc_7=ノルマン朝は四人の王が相次いで支配して、かつヘンリー1世によって長期的な平和の時期を迎えていた。ノルマン朝の終わりは、イングランドが新しい時代を迎えることを意味する。
campaign_end_desc_8=アレクシオス1世がもたらした十字軍はビザンティン帝国のために強力な敵を破った。しかし、ビザンティン帝国に甚大なダメージを負わせた。コンスタンティノープルが占領され、ラテン帝国が台頭したことによって、ビザンティン帝国がまもなく消えていくように見える。
campaign_end_desc_9=長い遠征は失敗に終わり、エルサレムは未だに敵に占領されている。膨大な人力と資金を費やした後、遠征軍はコンスタンティノープルを荒らした。その後、ラテン帝国が誕生した。
campaign_end_desc_10=イザベラとロジャーはエドワード2世に王位を放棄させ、息子エドワード3世に後を継がせた。エドワード3世の跡継ぎは、第二次スコットランド戦争の勃発を促しただけでなく、イングランドとフランスの百年戦争を開始させた。
campaign_end_desc_11=コンスタンティノープルの陥落と再建は、ビザンティン人に西側のラテン世界が彼らに対する大きな脅威を認識させた。その同時に、東方のアナトリア半島では、とある新生帝国がビザンティン帝国に対して蠢いている。
campaign_end_desc_12=オスマン帝国の台頭はもう止められないが、ビザンティン帝国も彼らに屈することはない。また、西欧のキリスト教国もビザンティンの滅亡を黙って見ていられない。一方、東方ではとある突厥の部落が段々台頭し始まっていて、オスマン帝国の拡大は順風満帆ではない。
campaign_end_desc_13=結局、エドワード3世はフランス王になることはなかったが、両国間の戦争は続いていた。 長引く戦争は、イギリスとフランスを果てしない深淵に引きずり込み、莫大な借金と蔓延る疫病により、両国は一時的に再戦不可能な状態に陥った。
campaign_end_desc_14=最終的にはフランスが勝利したが、この100年にわたる戦争は英仏両国民に大きな苦しみを与えた。戦後、イングランドは大陸の領土のほとんどを失った。
campaign_end_desc_15=コンスタンティノープルの陥落はビザンチン帝国の終焉を意味する。帝国の栄光はついに過ぎ去った。ビザンティン帝国の崩壊は中世の終わりを告げたと同時に、ヨーロッパの新たな覇者の誕生を意味している。
campaign_end_desc_51=西ローマ帝国は外敵の絶え間ない侵入の下で滅亡に向かった。この古い帝国の滅亡は、すでに定められていたかのようであったが、突然であった。それによってローマ帝国の国境が大幅に縮小させられた。その時、ビザンティン帝国の首都であるコンスタンティノープルはまるで別世界の光景であった。
