stage_intro_1501=ウグリェシャはオスマン帝国の大部分の軍隊がヨーロッパを離れ、アナトリアに向かって進軍しているという情報を得た。これはバルカン半島でのオスマン帝国の勢力を排除する最高の機会であるため、彼らは奇襲を仕掛けていた。
stage_intro_1502=トピア家族のカロ・トピアはバルシャ2世が婚姻を通じて領土を拡大する方法に不満を持ち、オスマン帝国にゼタ公国への攻撃を発動するように招待状を送った。そして、ムラト1世はこの誘いを喜んで受け入れた。
stage_intro_1503=ムラト1世は1387年、アナトリアの事務を処理するためにバルカンを離れた。一方、バルカンの従属勢力はオスマン帝国の支配から脱却しようとし、その権威に挑戦するための同盟を結成した。
stage_intro_1504=ムラト1世は1388年、アナトリアから帰国した後、すぐブルガリアに対して戦を始めた。ボスニアの統治者も直ちにブルガリアに援助を開始した。
stage_intro_1505=コソボはマケドニアとセルビアという2つの地域をつないでいる。オスマン人がここを占領したら、セルビアの領土はさらに侵食される。一方、ラザル大公が組織した連合軍はコソボ地域でオスマン人と激しい交戦を開始した。
stage_intro_1506=ムラト1世が意外に暗殺された後、彼の息子バヤズィト1世が即位した。その時、英仏の百年戦争は休戦期に入り、東ローマ帝国を救うため、西洋の騎士たちは十字軍東征を発動した。
stage_intro_1507=バヤズィト1世がビザンティンにトドメを刺そうとする時、東方のティムールが15万の大軍を率いて城下に迫りてきた。オスマン帝国の存立は風前の灯火のようになり、ビザンティンは一時息抜きができるようになった。
stage_intro_1508=アンカラの戦いでバヤズィト1世は捕らえられ、鬱々として病気になりつつ世を去った。その後、オスマン帝国内部で闘争が起こり、最終的に新しいスルタンであるムラト2世が混乱を収めた。しかし、帝国が弱体化になったため、従属国が反乱を引き起こした！
stage_intro_1509=ヴェネツィア人はテッサロニキ地域の完全な自治権を得るため、オスマン帝国に宣戦布告した。スルタンはこれを容認できず、大軍を派遣して包囲攻撃を始めた！
stage_intro_1510=教皇エウゲニウス4世はポーランドとハンガリーなどの軍隊を召集し、新たな十字軍東征を発動した。その時、既に退位したムラト2世は軍隊を再編成して迫り来る十字軍に対抗しなければならなかった。
stage_intro_1511=摂政王ジョン・フニャディは戦死した国王の仇を打つために4年間準備した。1448年、彼はハンガリー・ワラキア連合軍を率いてオスマン帝国に対して奇襲を仕掛けた。
stage_intro_1512=1451年、ムハンマド2世が即位した。その後の2年間、彼は火銃と巨砲を製作し、海岸要塞を建設して海峡を封鎖した。千年にわたってそびえ立つコンスタンティノープルは最強の敵を迎えようとしていた。

