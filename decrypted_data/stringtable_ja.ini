troop_desc_118=地中海を巡航する海賊は、行き交う船の悪夢でした。
troop_desc_213=方陣において、突撃を受け止める役割を担う前列の兵士たちは、後方の銃士たちに安全な射撃条件を提供することができます。
troop_desc_214=岳飛が組織した軍隊は、歩兵と騎兵で構成され、金軍の騎兵との戦いにおいて幾度も偉大な功績を上げた。
troop_desc_317=リトアニア大公の親衛騎兵。装備が精鋭で、戦槌を武器として使用し、重装甲の敵に対しても相当な殺傷力を発揮することができた。
troop_desc_417=鎧や旗、さらに武器まで赤く塗り上げた騎兵部隊。赤い鉄の鎧を身に纏い、訓練を受け、その姿は凛々しい。戦場では無視できない存在となっている。
troop_desc_418=武士を中心とした部隊。忠誠心と勇気を持ち、装備はよく整えられている。訓練が施され、優れた戦闘力と連携能力を持っている。
troop_desc_419=フニャディ・マーチャーシュによって組織された精鋭傭兵団であり、オスマン帝国との戦争において重要な役割を果たした。
troop_desc_420=長柄の斧を武器とし、斧槍の設計は突きと斬りの両方に対応しており、ポールアックス騎兵は比較的万能な騎兵である。
troop_desc_421=金兀術の精鋭重装騎兵は、士気が高い時に恐ろしい突撃力を持っていた。
troop_desc_520=イヴァン雷帝が編成した精鋭守備隊は、火縄銃を発射する際の支えとして鉞（まさかり）をよく使用していた。
troop_desc_612=投擲斧を攻撃手段として使用する遠距離騎兵。近距離騎兵に対して非常に強力な攪乱効果をもたらすことができる。
troop_desc_613=弓弩を使用して敵に打撃を与える遠距離騎兵。通常、敵の陣形を攪乱して隙間を作り、重騎兵の突撃のための条件を整えるために使用される。

