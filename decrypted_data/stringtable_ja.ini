skill_desc_51302=選択したターゲットとその周囲にいる{0}2{1}体の敵ユニットを攻撃し、一部のダメージを与え、周囲の味方の士気を{0}20{1}回復する。このスキルで敵を倒すと、さらに周囲の味方の士気を{0}20{1}回復する。クールタイム：{0}1{1}ターン（スキルダメージは両方の指揮官の騎兵能力に影響される）。

