stage_intro_30301=もし美しいジュディアンが現れなかったなら、24歳のルッジェーロ・ボッソはノルマンディーのあの空っぽの家にずっと留まっていたかもしれない。一目惚れした二人には、身分と地位に大きな差があった。ジュディアンは征服王ウィリアムの従姉であり、一方のルッジェーロは土地も財産も持たない何もない身だった。愛を追い求めるため、ルッジェーロはイタリアへ向かい、兄のロベルト・グイスカルドを頼る決意をした。
stage_intro_30302=ロベルト・グイスカルドは、亡くなった兄ウンフレードがイタリアで所有していた土地と称号を引き継いだ。その行動は兄たちと似ていたが、一つだけ違っていた点がある。ロベルトは16歳の弟に土地を分け与えるつもりが全くなかったのだ。しかし、ロベルトはさらなる土地を征服するために、この弟の助けが必要だった。その後の5年間、ルッジェーロは兄ロベルトを助け、カラブリア全域を征服することに貢献した。
stage_intro_30303=9世紀以来、シチリア島はサラセン人の支配下にあったが、彼らの内部は決して一枚岩ではなかった。イブン・ティムナは前任の総督を殺害し、その未亡人を我が物にしていた。この未亡人の兄であるメッシーナのアミールは、イブン・ティムナの逮捕を命じた。追捕を逃れるため、イブン・ティムナはイタリアへ逃亡し、最終的にルッジェーロの助けを求めた。これが、ルッジェーロがシチリアへ進軍するきっかけとなった。
stage_intro_30304=ルッジェーロは兄ロベルトより一足先にシチリア島への上陸を決意した。それは、彼が富と土地への渇望を何よりも優先していたからである。
stage_intro_30305=シチリア島で足場を固めた後、ルッジェーロの目標はエンナ要塞を攻略し、アミールに致命的な打撃を与えることだった。しかし、彼らが要塞の目前に迫った時、その防御が異常に強固であることに気づいた。さらに悪いことに、アミールは全軍を集結させ、孤立無援のノルマン人を一網打尽にする反撃を準備していた。
stage_intro_30306=大成功を収めた後、ロベルトとルッジェーロの関係は次第に緊張していった。トロイーナを占領した後、全体の利益を考えたルッジェーロはイタリアに撤退し、彼の心をとらえて離さなかったジュディアンと再会した。実は、ジュディアンの父はノルマンディーのウィリアム公爵と対立し、一家でイタリアへ移住していたのだ。ルッジェーロはジュディアンに求婚し、彼女の父の同意を得ることに成功したが、グイスカルドは弟に土地を分け与えることを依然として拒んだ。
stage_intro_30307=ルッジェーロはもはや未熟な少年ではなく、兄ロベルトとの間でカラブリアにおいて決戦を繰り広げた。狡猾なロバートは最終的には弟に敗れましたが、ルッジェーロは兄と和解し、その後共にシチリア島へ向かった。
stage_intro_30308=ルッジェーロは妻のジュディアン夫人と共にシチリア島へ戻り、サラセン人の脅威に晒されていたトロイーナの住民を守った。しかし、1062年末、ルッジェーロがニコシアを占領しに向かっていた間に、イブン・ハワスが奇襲を仕掛け、トロイーナに残っていたジュディアン夫人を捕らえようとした。焦りと不安で胸を締めつけられたルッジェーロは、急ぎ妻を救うために引き返した。
stage_intro_30309=ルッジェーロは次第に現地の人々に歩み寄り、宗教や人種の区別をしない方針を取るようになった。しかし、北アフリカのサラセン人たちは再びシチリア島への支配権を主張し、アイユーブ王子に3万5千の大軍を率いてシチリア島を攻撃するよう命じた。セラミの地で、ルッジェーロはわずか130人の騎士と300人の歩兵を率い、この圧倒的な敵軍と真正面から激突した。
stage_intro_30310=1064年、ルッジェーロはパレルモの占領を試みたが失敗した。その後、アイユーブ王子が再び軍を集結し、ノルマン人に挑戦を仕掛けた。行軍中、ルッジェーロとアイユーブ王子は再び遭遇し、両軍の兵力差は依然として大きな開きがあった。
stage_intro_30311=ロベルト・グイスカルドがバーリを占領した後、彼はシチリア島に目を向けるようになった。1071年、ルッジェーロはシチリア伯の称号を授与され、一方ロベルト自身はメッシーナとヴァルデモンを保持した。1072年、ルッジェーロは兄ロベルトと協力してパレルモへの攻撃を開始した。
stage_intro_30312=1077年、ルッジェーロはトラパニを包囲した。この地はシチリア島西部に残る数少ないサラセン人の拠点の一つであった。1079年にはタオルミナが包囲され、1081年にはカターニアを征服した。しかし、ルッジェーロにとって唯一の心残りは、最愛のジュディアンが1080年に亡くなったことであった。
stage_intro_30313=グイスカルドが亡くなった時、ノルマン人によるシチリア島征服の事業はまだ完了していなかった。彼の息子たちは継承権を巡って内戦を繰り広げ、その結果、シチリア征服の重責は最終的にルッジェーロの肩にのしかかった。
stage_intro_30314=1091年、北アフリカのサラセン人の襲撃を避けるため、ルッジェーロは艦隊を率いてマルタ島を征服した。
stage_intro_30315=ルッジェーロのシチリア島統治は非常に成功を収めた。彼は中立を掲げ、政府を簡素化し、寛容な宗教政策を推進した。また、当時のヨーロッパの領主の中で唯一十字軍遠征に参加しなかった人物でもあった。その結果、彼の治世下でシチリア島はかつてないほどの安定と繁栄を享受し、島の人々は親しみを込めて彼を「偉大なる伯爵」と呼んだ。

stage_intro_30401=老ルッジェーロの死後、シチリア島の政局は非常に安定していた。長男のシモーネはわずか8歳でシチリア伯の地位を継ぎ、母親のアデライデが摂政を務めた。しかし、4年後、12歳になったシモーネが突然亡くなり、継承権は当時10歳のルッジェーロ2世に引き継がれた。16歳になると、アデライデは正式に政権を息子に譲り、自身はエルサレム王ボードゥアン1世と結婚した。
stage_intro_30402=ルッジェーロ2世は父が築いた繁栄を受け継ぎ、野心的に強力な海軍を構築し始めた。それは防衛だけでなく領土拡張を目指したもので、彼はただ口実を待っていた。そしてその機会は訪れる。マフディーヤのアミールがニコーテラを攻撃し、この都市を破壊したことで、ルッジェーロ2世は侵略の正当な理由を手に入れた。
stage_intro_30403=権力闘争の中で、エルサレムの総主教がルッジェーロの母アデライデとボードゥアン1世の結婚を無効と宣言する。その結果、アデライデはシチリアに戻らざるを得なくなり、この出来事はルッジェーロ2世に深い屈辱を与えた。
stage_intro_30404=ルッジェーロ2世の父はかつてマルタを侵略したが、完全に島を支配することはできなかった。ルッジェーロ2世はシチリア近辺にサラセン人の勢力が残っていることを容認できず、1127年にこの脅威を排除することを決意する。
stage_intro_30405=イタリアのプーリアでウィリアム2世が急死し、継承権に基づきルッジェーロ2世がカラブリアを継承することになった。しかし、教皇はノルマン人がシチリアとイタリア西部を完全に支配することを望んでいなかった。1127年末、教皇はルッジェーロ2世に対抗するため十字軍を発動した。この混乱に乗じて、ドレンゴット家のラヌルフ2世が反乱を起こした。
stage_intro_30406=ルッジェーロ2世は決して血に飢えた人物ではなく、むしろ東ローマ皇帝のように外交手段で勝利を収めることを好んでいた。彼の軍隊は規律が厳格で行動が迅速だった一方、敵軍は散漫で同盟関係も脆弱だった。1128年、ルッジェーロ2世の軍勢の威圧により、連合軍は撤退を余儀なくされ、教皇はベネヴェント城外で彼をプーリア、カラブリア、シチリアの公爵として認めることを余儀なくされた。
stage_intro_30407=教皇の死後、ローマでは二つの対立する陣営が生まれた。政治的支持を得るため、改革派のアナクレトゥスはルッジェーロ2世を王として戴冠させることを決断。1130年のクリスマスの日、パレルモの市民は初めてこの新しい王の姿を目にした。
stage_intro_30408=1132年7月24日、ノルマン人の貪欲さにより、ラヌルフはカプアのロベルト2世、そしてナポリのセルギウス7世と同盟を結び、共にルッジェーロ2世に対抗した。
stage_intro_30409=ルッジェーロ2世がどれほど華麗な手段で王位に就こうとも、偽教皇を支持した行為は、もう一方の教皇インノケンティウスを支持するキリスト教徒たちの怒りを買った。その結果、より多くの勢力がインノケンティウスの陣営に加わった。1133年、神聖ローマ帝国皇帝ロタールがついにイタリアに到着した。
stage_intro_30410=ロタールが戴冠した後、神聖ローマ帝国の内政は大きく改善された。彼は1年をかけて軍隊を召集し、再びアルプス山脈を越えて北イタリアに進軍、ほとんど抵抗に遭わなかった。教皇インノケンティウスは教廷を率いてロタールの陣営に加わり、さらに東ローマ皇帝ヨハネス2世やヴェネツィア王国と連携してシチリアを攻撃することを決定した。
stage_intro_30411=1137年10月30日、新たに任命されたプーリア公爵ラヌルフが、ロタール皇帝から借り受けたドイツの特遣隊を率いてルッジェーロ2世に攻撃を仕掛けた。この時、ルッジェーロの敵はラヌルフだけでなく、かつての盟友セルギウスも含まれていた。
stage_intro_30412=数か月後、ルッジェーロ2世が支持していた教皇アナクレトゥス2世が亡くなった。これにより、インノケンティウス教皇が正統な教皇として認められることになった。ルッジェーロ2世は新たな教皇との和解を試みたが、インノケンティウス教皇は自ら軍を集結し、攻撃を開始した。
stage_intro_30413=ルッジェーロ2世は10年にわたる戦いの末、2人の皇帝と1人の教皇に勝利し、その後大きな抵抗に直面することはなかった。彼は法を統一し、強力な中央集権国家の構築に着手した。
stage_intro_30414=神聖ローマ帝国と東ローマ帝国は、かつての屈辱を忘れず、何度もシチリア島に対して連合軍を出征させた。しかし、神の加護は彼らには及ばず、シチリア島はルッジェーロ2世の統治下でますます繁栄していった。1154年、ルッジェーロ2世はパレルモで安らかに息を引き取り、その剣にはこう刻まれていた。「プーリア、カラブリア、シチリア、そしてアフリカは、皆わが手中にある」。

stage_intro_30501=シチリアの女王コスタンツァは、神聖ローマ帝国皇帝ハインリヒ6世と結婚してから9年後にようやく懐妊した。1194年、ハインリヒ6世がシチリア島での戴冠式のために訪れた際、フリードリヒ2世がクリスマスの翌日、旅の途中の天幕の中で誕生した。この天幕の下で生まれた赤子は、後にヨーロッパの歴史を変える運命にあった。
stage_intro_30502=フリードリヒ2世が洗礼を受けたのは2歳の時であり、この場面が父ハインリヒ6世との唯一の親密な接触となった。フリードリヒの誕生から間もなくハインリヒ6世が急死し、フリードリヒは唯一の継承者となった。しかし、父の死は権力闘争を引き起こし、フリードリヒ以外にも2人の競争者が現れた。それは父の弟フィリップと、教皇が支持するザクセン公オットー・フォン・ブラウンシュヴァイクであった。母コスタンツァはフリードリヒをドイツから遠ざけ、シチリア王国を一時的に掌握する道を選んだ。1198年、コスタンツァも死去し、フリードリヒの運命はさらに不確かなものとなった。
stage_intro_30503=孤独な少年フリードリヒは、決して平穏な環境で育ったわけではなかった。シチリア王国は各勢力に支配され、彼自身は政治の盤上に置かれた一駒に過ぎなかった。14歳の時、フリードリヒは教皇によって婚姻を取り決められる。この10歳年上の妻は500人の騎士を伴い、フリードリヒが権力の頂点へと進むための鍵となった。
stage_intro_30504=16歳の時、フリードリヒの叔父であるドイツのフィリップが暗殺された。この事態を受けて、教皇インノケンティウス3世はフリードリヒをドイツ王として支持することを決定した。しかし、フリードリヒの王位への道は平坦ではなかった。オットーは北イタリアで彼の戴冠を阻止しようとしたが、フリードリヒは敵の追撃を巧みに逃れた。最終的に、フリードリヒはマインツ大聖堂で戴冠し、神聖ローマ帝国の正統な継承者となった。
stage_intro_30505=教皇インノケンティウス3世は、フリードリヒ2世がシチリア王国を引き継がないと宣言したことで、ようやく安堵の息をついた。しかし、その直後に彼は亡くなった。教皇の死から数か月後、フリードリヒ2世は妻と息子を自分のもとに呼び寄せ、ドイツでの統治基盤をさらに強化した。
stage_intro_30506=イングランドの獅心王リチャードが戦死した後、フランス王フィリップ2世はこの機を逃すまいとイングランドの勢力を一掃し、フリードリヒ2世を招いてシャンパーニュ王位継承戦争の解決に協力させた。フリードリヒ2世はこの提案を快諾し、戦いの勝利への基盤を築いた。
stage_intro_30507=1220年11月20日、フリードリヒ2世はローマで盛大な戴冠式を行い、神聖ローマ帝国の皇帝となった。彼は王冠を掲げ、右手に剣、左手に笏を持ち、キリスト教会の守護者となること、十字軍を遂行すること、そして異端を根絶することを厳かに誓った。皇后コスタンツァは夫の後ろに跪き、共に戴冠を受けた。
stage_intro_30508=フリードリヒ2世は改革と建設に尽力し、イタリア南部とシチリア島を巡視した。彼は「カプア憲章」を公布し、フォッジャに皇宮を建設するとともに、シチリア海軍を復興させた。また、ヨーロッパ初の国立大学であるナポリ大学を創設し、文化と学術の復興を推進した。
stage_intro_30509=フリードリヒ2世が王権の強化に忙しくしている間も、教皇は彼が第5回十字軍に参加しなかったことを非難し続けた。一方で、フリードリヒはイスラム世界の統治者たちと連絡を取り合い、最終的にエジプトのスルターンとの和平交渉に成功した。その結果、エルサレムを無血で奪還することができた。1229年、フリードリヒ2世はエルサレム国王として戴冠したが、この快挙は教皇の激しい不満を引き起こした。
stage_intro_30510=教皇グレゴリウス9世は、フリードリヒ2世が「異教徒」と和平を結んだことに激怒した。教皇は前エルサレム王にシチリアへの侵攻を命じ、フリードリヒ2世は故郷を守るために帰国せざるを得なくなった。
stage_intro_30511=1231年、フリードリヒ2世は「メルフィ憲章」を公布。この中世の憲章は、神聖ローマ帝国が君主制体制へと移行することを象徴する画期的なものであった。しかし、教皇はこれを強く非難し、フリードリヒの措置を教皇権威への挑戦とみなした。この決定は、フリードリヒと教会との長期的な対立の火種となった。
stage_intro_30512=イタリア北部のロンバルディア同盟は、神聖ローマ帝国の統治下に完全に組み込まれることはなく、この地域の自治都市国家はミラノを中心にまとまっていた。この状況は、シチリア王国とドイツ王国の間に障害をもたらしていた。さらに、教皇の支援を受けたロンバルディア同盟は、再びフリードリヒ2世と対立することとなった。
stage_intro_30513=前年の勝利によって、フリードリヒ2世はイタリア北部の東部地域を自身の支配下に収めることに成功した。次なる目標はマントヴァの占領であり、この勝利によりドイツとの連絡を確保し、さらにイタリア北西部にある同盟の拠点への進攻の道を切り開くことができると考えられていた。
stage_intro_30514=ブレシアは、ベローナからベルガモへと続く主要道路の交通要衝に位置し、フリードリヒ2世はこれをロンバルディア同盟の補給線を断つための重要な目標とした。攻城軍は強力だったが、守備軍の頑強な抵抗と予想外の戦術により、フリードリヒ2世は苦戦を強いられることとなった。
stage_intro_30515=1239年、フリードリヒ2世は三度目の破門を受けた。これを受け、教皇グレゴリウス9世はジェノヴァやヴェネツィアと連携し、海上からシチリア王国への攻撃を開始した。フリードリヒはこの教皇との戦争に直面せざるを得なかったが、最終的に彼の軍隊が勝利を収めた。そして、勢いに乗ったフリードリヒはローマへの進軍を開始した。
stage_intro_30516=1243年、新たに教皇に就任したインノケンティウス4世であったが、彼とフリードリヒ2世の対立は解消されることはなかった。インノケンティウス4世はフリードリヒの皇帝位とシチリア王位を剥奪しただけでなく、教会の権力をドイツやロンバルディア地域にまで拡大しようと試みた。1246年には、教皇はフリードリヒとその息子を暗殺する陰謀さえ企てた。
stage_intro_30517=フリードリヒ2世の新たな体制が次第に安定してくると、彼は再びイタリア北部のロンバルディア同盟を抑え込むことを決意した。しかし、すでに50歳を超えていたフリードリヒにとって、時間が最大の敵となりつつあった。1247年の夏、教皇が支援するパルマで政変が勃発。これに対し、フリードリヒは迅速に行動を起こし、パルマを包囲するため周辺地域にヴィクトリア基地を建設し、長期的な軍事闘争の準備を進めた。
stage_intro_30518=わずか3か月後、フリードリヒとその息子エンツォは再びパルマ近郊の地域を掌握。1248年の夏、フリードリヒは領土をさらに強化し、捕虜を得るために行動を起こすことを決定した。その時、皇帝軍はランツィアの指揮の下、教皇軍と決定的な戦闘を繰り広げることとなった。この戦いが両軍の運命を左右することになる。
stage_intro_30519=1249年のフォッサルタの戦いで、フリードリヒ2世の息子エンツォがボローニャ軍に捕らえられ、北部戦線は重要な指揮官を失うこととなった。その後も重要な戦闘での敗北が相次ぎ、ブレシアが陥落、パヴィーアが降伏し、ピアチェンツァも敵に門戸を開いたことで、フリードリヒはかつてない苦境に追い込まれた。1250年11月、フリードリヒは鷹狩りの後に突然体調を崩した。沈黙の時を経た後、同年12月13日に息を引き取り、その伝説的な生涯に幕を下ろした。

stage_group_name_30004=ルッジェーロ・ボッソの日記
stage_group_name_30005=ムハンマド・イドリースィーの日記
stage_group_name_30006=パレルモ大司教ベルナルドの日記

family_letter_desc_401=……ジュディアン、必ず戻るよ。すぐに君を迎えに行く。すべてがきっとうまくいくから……
family_letter_desc_402=……愛するジュディアン、元気にしているかい？私は兄のために広大な土地を征服したが、いつ帰れるかは分からない。それでも、神が君と僕を守ってくれるよう祈っている……
family_letter_desc_403=ジュディアン、私はこれからシチリア島への遠征に向かう。これは封地を手に入れる絶好の機会だ。どうかすべてが順調にいきますように……
family_letter_desc_404=幸運は私を見放したのかもしれない。君の手紙がなければ、私はきっともう耐えられなかっただろう。君に再び会える日が来るのか分からない、ジュディアン……
family_letter_desc_405=まるで夢のようだ。まさか君に会えるなんて——毎日思い焦がれていた愛しい人に。すべては神が用意してくれたに違いない。
family_letter_desc_406=家族の分裂は私たちを一層脆弱にした。しかし、シチリアこそが私の帰るべき場所であり、愛する人と共に人生を歩む家なのだ。
family_letter_desc_407=ジュディアン、もし君に何かあったら、私は生きていく勇気を失ってしまうだろう。
family_letter_desc_408=サラセン人は数の多さで私を打ち負かせると思っているのか？ノルマン人を侮るな！我々は土くれでできた存在ではないのだ！
family_letter_desc_409=ついに、私は封地を手に入れた。兄の承認を得ただけでなく、これでジュディアンへの約束も果たせる。
family_letter_desc_410=ジュディアン、愛する人よ。今日の私があるのは、すべて君のおかげだ。どうか天国から私と私の領土を見守っていてほしい。
family_letter_desc_411=兄はローマ皇帝になるという夢を果たせなかったが、私には地に足をつけ、自分の王国を守るという願いだけがある。
family_letter_desc_412=シチリアではギリシャ人、サラセン人、ノルマン人が平和に共存し、戦争が私の子孫に近づくことのないよう祈っている。

family_letter_desc_501=少年の頃、私は四方を漂い、スペイン、ポルトガル、フランス南部などを旅した。行く先々で差別や敵意に直面したが、一方で、人々が貧しさの中で必死に生き抜こうとしている姿を目の当たりにした。
family_letter_desc_502=あの頃、民族間の憎悪が四方に渦巻いていた。16歳の私はすでにフランク騎士団の追撃をかわす術を身につけていた。その年、私はアンダルスに戻った。
family_letter_desc_503=地中海には、戦争のない神秘的な国があると耳にした。そこではギリシャ人、アラブ人、フランク人、そしてその他の民族が平和に共存しているという話だった。その地を自分の目で確かめたいと思い、旅に出る決心をした。
family_letter_desc_504=最終的に私はシチリア島にたどり着き、理想郷と思えるこの地を見つけた。そして、そこで出会ったのが私の師匠であるアブ・サルトだった。彼のもとで私は薬理学、幾何学、そして天文学を学んだ。
family_letter_desc_505=30歳の時、私は夢のような日を目の当たりにした。空には無数のバラの花びらが舞い散り、ルッジェーロ2世が高貴な王冠を戴き、豪華なマントを身にまとって私たちに微笑みながら手を振っていた。
family_letter_desc_506=シチリア島は、私が訪れたどの土地よりも自由だった。ここには世界中から集められた品々があふれている。アラブの香辛料、フランクの羊毛、さらには中国から運ばれた絹まで揃っていた。
family_letter_desc_507=シチリア島は情報の流通が驚くほど便利な場所だった。私たちは世界各地の学術書を集めることができた——アラブの医学書、東ローマの数学、エジプトの神話書など。それらをラテン語とアラビア語に翻訳するのが私の仕事だった。
family_letter_desc_508=私はよくルッジェーロ2世の王子たちに講義をした。彼らはまさにシチリアの精神を体現する者たちで、常にサラセン人の学者に敬意と礼節を示してくれた。
family_letter_desc_509=その年は、私の人生で最も栄誉ある一年だった。ルッジェーロ国王が私に一冊の本を編纂するよう依頼してきたのだ。私たちが知るすべての国と土地を描き出したこの本は、「ルッジェーロの書」と呼ばれることになった。
family_letter_desc_510=ルッジェーロ2世はチェファル大聖堂に埋葬された。この大聖堂は東ローマ、イスラム、そしてノルマンの建築様式を融合したものだ。大聖堂の中には国王の肖像画があり、彼はビザンティン皇帝の礼服とアラビアの衣装を身にまとい、堂々と座している。その姿はまるで「洗礼を受けたスルターン」のようだった。

family_letter_desc_601=認めざるを得ない。初めてこの若者に出会った時、私は深く彼に惹きつけられた。彼の中にはホーエンシュタウフェン家とオートヴィル家の気品が見事に融合していた。彼は馬術、鷹狩り、チェスに秀で、五つの言語を操り、その読書量は多くの学者をも凌駕していた。
family_letter_desc_602=フリードリヒは、夜闇の中の烈火のように、誰の目も引きつけた。チュートン騎士団の団長ヘルマンでさえ、彼に会った後は生涯を彼に捧げる決意をした。
family_letter_desc_603=しかし、コスタンツァの死はフリードリヒの心を深く引き裂いた。彼女は、彼が権力を掌握するために常に支えてくれた公女だった。フリードリヒには多くの愛人がいたが、コスタンツァはそれを決して責めることなく、彼のそばにあり続けた。
family_letter_desc_604=我々の隊列はキリスト教徒たちの疑念に包まれながら進軍していた。第1回十字軍遠征から130年が経過したが、今回は血を流さず、戦闘もせずに聖都を奪還したのだ。フリードリヒがアラビア語でアル＝カーミルと帳幕の中で10年の合意に署名するのを目撃した時、また彼が聖都に入城し、あらゆる信仰を持つ人々から歓呼で迎えられるのを見た時、私はもう疑念を抱かなかった。平和こそが神の御心だと信じられた。
family_letter_desc_605=フリードリヒは新技術や新学問に対する好奇心に溢れていた。エジプトのスルターン、アル＝カーミルは財宝や美女を贈るのではなく、精巧な機械式時計のような新奇な品々を彼に贈った。フリードリヒはまた、数学者フィボナッチを支援し、『算盤の書』やその後の著作を捧げさせた。
family_letter_desc_606=フリードリヒは剛直で法治主義を何より重んじた。たとえそれが彼の長男ヘンリーの反乱であっても、容赦なく彼を終身投獄した。彼は教皇との書簡をヨーロッパ中の諸侯に公開し、自身の潔白を証明した。「教皇は太陽、皇帝は月」という教えは、諸侯たちの間で崩れ始め、「皇帝のものは皇帝に、神のものは神に返せ」というイエス・キリストの教えが次第に受け入れられていった。
family_letter_desc_607=フリードリヒが破門を宣告されたその日、彼はヘルマンの死の知らせも受け取った。ヘルマンはチュートン騎士団の団長であり、20年間、フリードリヒと神に忠誠を尽くした戦士だったが、ついに私たちのもとを去った。
family_letter_desc_608=破門の判決を知らされた時、フリードリヒは激昂し、大声で叫んだ。「敬意を払ってきたが、これからは容赦しない！鉄槌を下す！」
family_letter_desc_609=「法治への執拗なまでの情熱、徹底的な公正さ、知性への飽くなき探求、多方面にわたる豊かな才能、生まれながらに備わった真の高貴さ——もしこれらが肉体の死を越えて消えないのなら、フリードリヒは私たちの心の中で生き続けるだろう。」——マンフレーディ、父フリードリヒに寄せる評。

battle_talk_3030401=今こそメッシーナ攻撃の時だ！勝利は目前にある！
battle_talk_3030402=攻撃が阻まれた、一旦撤退して再び策を練ろう。
battle_talk_3030403=？？船はどこだ？暴風雨で流されたのか？
battle_talk_3030404=陣地を守り抜け、新たな輸送船の到着を待つのだ。
battle_talk_3030501=メッシーナを制圧した！これでシチリア中部への進軍が可能になる。
battle_talk_3030502=エンナ要塞は防御が堅固だ、激しい戦いを覚悟しなければならない。
battle_talk_3030503=アラブの騎兵が我々の陣形に突撃してきた！ノルマンの騎士たちよ、槍と剣を構えろ！
battle_talk_3030801=イブン・ハワスが卑劣な奇襲を仕掛けてきた。急いでトロイーナに救援に向かわねばならない。
battle_talk_3030802=攻撃を急げ！ルッジェーロ・ボッソが戻る前にこの都市を陥落させるのだ！
battle_talk_3030803=敵の援軍が到着した、迎撃の準備を整えろ！
battle_talk_3030901=敵軍の数が多い、まずは地形の利を占めるべきだ。
battle_talk_3030902=我々の兵力は十分だ、分散して突撃し、ノルマン人の戦力を消耗させる！
battle_talk_3030903=敵の士気が低下してきている、反撃の時が来た。
battle_talk_3030904=耐えろ！後退するな！
battle_talk_3031001=前回のパレルモ攻撃は失敗したが、今回は必ず成功させる！
battle_talk_3031002=前回ノルマン人に敗北したが、今回は必ず雪辱を果たす！
battle_talk_3031003=敵発券！我々の計画がバレたか？
battle_talk_3031004=ノルマン人だ！どうやって我々の計画を察知したんだ？
battle_talk_3031005=突撃せよ！敵に陣形を整える隙を与えるな！
battle_talk_3031101=敵の援軍は私が撃退した。
battle_talk_3031102=我が艦隊の準備は整った。この都市を陥落させるぞ！
battle_talk_3031301=降伏しろ。もう援軍はない。お前の家族に害を加えるつもりはない。
battle_talk_3031302=私は高潔な人間ではないが、私の部下たちは皆、戦いの名手だ。
battle_talk_3031303=承知。精巧な罠を仕掛けてみせましょう。
battle_talk_3031304=罠だ！我々は完全に追い詰められてしまった！
battle_talk_3031401=敵はいつもマルタを拠点に我々を攻撃してくる。
battle_talk_3031402=この島を制圧し、敵の拠点を根絶やしにするのだ。
battle_talk_3040301=嵐が艦隊を破壊した。今どこにいるのか分からないが、まずは近くで拠点を探さなければならない。
battle_talk_3040302=艦隊を再編成し、我々の人員をシチリアに撤退させるのだ。
battle_talk_3040303=若きルッジェーロが初めて力を見せようとした際、痛烈な反撃を受け、その威信に大きな打撃を受けた。
battle_talk_3040401=バレッタの平坦な海岸は上陸に適しているが、重兵が守っている。西北部から直接上陸すべきだ。
battle_talk_3040402=あるいは南側を迂回し、複雑な山岳地帯を突破してマルタの都市を目指す手もある。
battle_talk_3040403=マルタの都市は陥落したが、敵軍は背後から現れる可能性がある。どうすべきか？
battle_talk_3040501=周囲の領主たちは我々のプーリア争奪に対して一様ではないが、いずれも好意的な態度ではない。
battle_talk_3040502=周辺の領主たちと友好関係を築くために贈り物を用意したが、同盟を結べるのは一つの家のみだ。それぞれ異なる結果を迎えることになるだろう。
battle_talk_3040801=我が軍は敗北した。サレルノに防衛線を築き、敢死隊にサルノ川の橋を破壊させて北から迫る敵を食い止めるべきだ。
battle_talk_3040802=ランチャーノの駐屯部隊が火力を分散してくれるだろう。主力部隊はバリから到着する途中だ。それまで反撃の準備を整え、反乱軍を殲滅する。
battle_talk_3040901=北イタリアはすべてロタールに服従している。神聖ローマ帝国の官吏が都市を掌握しつつある中、先手を打って都市を占領しよう。
battle_talk_3040902=帝国軍と正面から戦うことは不可能だが、都市を略奪して物資を得て防衛線を強化することはできる。ただし、すでに掌握された都市への攻撃は避けるべきだ。
battle_talk_3040903=反乱軍の指導者がロタールと交渉を進めている今、迅速に反乱勢力を壊滅させるべきだ。そうすればロタールは即時の援軍派遣を躊躇するだろう。
battle_talk_3041001=敵は四方八方から攻めてきている。補給車両を防衛線へ護送し、できる限りロタールの主力軍を足止めするのだ。少なくともサレルノを守り抜かなければならない。
battle_talk_3041002=私自ら北アフリカに向かい、ムスリム軍を結集させる。そして反攻を開始する時を待つ。
battle_talk_3041101=我々は降伏する。
battle_talk_3041102=突撃せよ！この反乱者どもを殲滅せよ！
battle_talk_3041103=お前ではまだ及ばないぞ、坊や。
battle_talk_3041104=やめろ、ルッジェーロ、我が長子よ！
battle_talk_3041201=さて、今こそ腰を据えて話し合いましょう、教皇陛下。
battle_talk_3041202=あなたが南イタリア唯一の統治者であることを認めます。だから、早く私を帰らせてください。
battle_talk_3050401=ローマ皇帝？それはあのローマの老人が与える施しにすぎない。今度はその地位を若造に与えるつもりだと？そんな奴にその資格があるものか！
battle_talk_3050402=各峠を厳重に守れ。その老人に彼の決定がいかに間違っているか思い知らせてやるのだ。
battle_talk_3050403=アルプス山脈を隠密に越える小道を見つけるのだ。オットーに気づかれてはならない。
battle_talk_3050601=エラード、この裏切り者め！かつて私に敗れた者が今度は反旗を翻すとは。今日こそフランス王と諸侯の力を借りてお前の首を取る！
battle_talk_3050602=無駄口を叩くな！人数が多ければ勝てると思っているのか？
battle_talk_3050603=守り抜け！反乱軍にこれ以上増援を許すな！
battle_talk_3051001=教皇は私の側にいる。神も私の側にいる！奴はどうだ？教会に追放された身でありながら、皇帝を名乗るとは！
battle_talk_3051002=神の封土を取り戻せ！異教徒の巣窟を陥落させ、神の正義を示せ！
battle_talk_3051003=我々の故郷が侵略されている。その侵略者が、我々を異国に送り出し、サラセン人と血戦を強いた教皇自身だなんて、なんと滑稽なことか！
battle_talk_3051004=ローマで「和解」を祝う時が近づく中、教皇とフリードリヒの争いは一時的に収束し、フリードリヒは帝位を回復した。
battle_talk_3051201=私たちロンバルディア人はどんなローマ皇帝も恐れない！赤髭のフリードリヒであろうと、この金髪のフリードリヒであろうと、ロンバルディアは決して屈しない！
battle_talk_3051202=ヘルマン大団長、時々思うのだ。このロンバルディア人たちは本当に独立の精神を持っているのか？それともただの金に目が眩んだ愚か者たちなのか？
battle_talk_3051203=ロンバルディア人が度重なる挑発を仕掛けるのであれば、こちらも剣を抜くとしよう！防線を急襲し、ヴィチェンツァを占領せよ！
battle_talk_3051301=鼠どもが私の領土を盗み続けることは許さん！撤退してクレモナで冬営すると吹聴し、奴らを伏撃に誘い込め！
battle_talk_3051302=奴らもこの凍てつくイタリアの沼地で我々と戦いたくないようだ。ならば冬営地に戻るとしよう。
battle_talk_3051303=しまった！罠にかかった！
battle_talk_3051401=盟友も援軍もない！頼れるのは自分たちだけだ！草刈り鎌を掲げ、子供たちを守れ！
battle_talk_3051402=もしこの地を2か月以内に攻略できなければ、冬が訪れ、我々は不利な状況に陥るだろう。しかし各都市が互いに支援し合う限り、我々には打つ手がない。
battle_talk_3051403=撤退せよ。だが必ず戻ってくる！
battle_talk_3051404=守備軍の揺るぎない意志と予想外の戦術により、フリードリヒ2世はついに何の成果も得られなかった。
battle_talk_3051501=フリードリヒがファエンツァをまたも占領した！これでは夜も眠れない！ジェノヴァに海から攻撃させ、西シチリア島を直接奪取するのだ！
battle_talk_3051502=帆を上げろ！シチリア島へ急行せよ！
battle_talk_3051503=戦争に勝利した後、皇帝軍はローマへ進軍した。しかし、ローマまで13キロの地点で、8月22日、教皇グレゴリウスの死去が公表された。これを受けてフリードリヒは撤退を命じた。
battle_talk_3051701=フリードリヒの要塞が周囲を取り囲んでいる。我々は今すぐ突破しなければ、待つのは死のみだ！
battle_talk_3051702=ヴィクトリアを奴らの牢獄にしてやる。教皇がこれをどう切り抜けるか見てやろう。
battle_talk_3051703=まさかヴィクトリア要塞でもこれらの暴徒を閉じ込められないとは。奴らを甘く見ていた。
battle_talk_3051704=偉大な皇帝フリードリヒも、最終的には北イタリアの小都市国家に敗れた。しかも、全く反撃の余地がない敗北だった。敵がパルマのヴィクトリア基地を占拠した後、その基地は灰燼に帰した。
battle_talk_3051801=貪欲な教皇は次々と侵略を繰り返し、ただ民を血で染めるだけだ。これらの人々は彼の民ではないというのか？
battle_talk_3051802=明日には馬に乗ることもできなくなるかもしれない。この争いがいつまで続くのか分からない。しかし、今日だけは敵軍を撃退する！
battle_talk_3051803=奴らが我々の後方の陣地を襲撃してきた！撤退だ！エンツォ、軍を指揮してゆっくり撤退せよ！崩壊を招いてはならない！


