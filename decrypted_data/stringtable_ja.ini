Saladin2=高貴な騎士サラーフッディーン
general_desc_Saladin2=サラーフッディーンは優れた軍事指揮官であり、品行方正な騎士でもある。彼の寛容さと慈悲深さによって、多くの人々が戦による無情な破壊から免れた。彼の敵であっても、彼の高潔さに心を打たれずにはいられない。
general_skin_20169=征服王メフメト
Mehmed II 2=征服王メフメト
general_desc_Mehmed II 2=ムラト2世の死後、メフメト2世は再びオスマン帝国のスルタンに即位した。その後30年の間に帝国に仇をなす者は一掃され彼の眼前から消えていった。
Wu Zetian=武則天
general_desc_Wu Zetian=唐の女帝。その治世において教育と文化を大いに発展させ、多くの優れた人材を登用した。彼女の統治下で唐の経済はさらに繁栄し社会も大きく発展した。




battle_talk_170101=反乱軍の首領を始末しろ!
battle_talk_170102=我々は挟み撃ちに遭った。ペンブルック伯に助けを求めよう!
battle_talk_170103=エドワードの援軍を迎え撃て! 誰も通すな!
battle_talk_170104=援軍は全滅した。総攻撃の始まりだ!
battle_talk_170201=奴らに反逆者の末路というものを教えてやろう。
battle_talk_170202=エドワードは我が父を殺した! 父の仇をとらねばならない!
battle_talk_170203=敵は潰走している。首領を捕えろ!
battle_talk_170204=ロバートは死んだ。無駄な抵抗はよせ!
battle_talk_170301=霧があまりにも濃い。友軍の合図すら確認できない。
battle_talk_170302=我らは優勢を占めている。前進せよ!敵を打ち破れ!
battle_talk_170303=戦場に戻り、友軍に助力すべきだ。
battle_talk_170304=エドワードの軍隊だ! 奴らを撃滅しろ!
battle_talk_170305=もはや敗北は避けられまい。退路を考えよう。
battle_talk_170306=ウォリックを捕まえろ!彼を逃がすな!
battle_talk_170401=我が軍は疲弊しているが、長い遠征を経てやって来た奴らは準備不足に陥っているはずだ。
battle_talk_170402=陣地の完成を急げ。ヨーク公の軍が来る前に準備せねば。
battle_talk_170403=左翼に敵を発見！突撃を阻止せよ!
battle_talk_170404=戦場から敵を一掃せよ！一人も逃すな！
battle_talk_170501=リチャードは王にあらず。ヘンリー・テューダーこそ真の王なり!
battle_talk_170502=卑劣な裏切り者め! 代償を払わせてやる!
battle_talk_170503=リチャード3世の軍は強大だ。兵力を削ぐ方法を考えよう。
battle_talk_170504=バッキンガム公を捕えろ! 必ずやその首を晒す!
battle_talk_170601=リチャード3世の暴政も、今日このときで終わりだ!
battle_talk_170602=イングランド王位はただ一人私だけのものだ!
battle_talk_170603=全軍突撃! 目標はリチャード3世だ!
battle_talk_170604=リチャード3世は死んだ。我らが王万歳!
battle_talk_700801=敵を発見! 戦闘準備を!
battle_talk_700802=敵の兵力は我々を上回っている。全軍後退し、都市の城壁を活かして防戦するのだ!
battle_talk_700803=アラン人の援軍は士気が低下し戦意を失っている。何とかして彼らの士気を鼓舞せねばならない。
battle_talk_700804=アラン人の援助があれば、必ず敵を撃退できる。
battle_talk_700805=戦況は逆転した。我々は不利な状況に陥っている。
battle_talk_700806=敵が現れた! 陣形を展開せよ!
battle_talk_700807=敵の主力は歩兵だ。機動力を生かして包囲しよう。
battle_talk_700808=まずは都市を制圧しろ、奴らの退路を断ち切るのだ!
battle_talk_700809=直ちにアラン人に救援を求めるのだ!
battle_talk_700810=援軍の到来がいったいなんだというのか? まとめて撃破するだけだ!

