general_retreat_1=反撃のために我々は実力を温存しなければならない。一時の撤退は失敗を意味していない。
general_retreat_2=私が深入りしすぎたかもしれない。今、撤退以外に道はない。
general_retreat_3=私は最後まで戦っていたが、敵を退けられなかった。
general_retreat_4=敵の頑強さは私の予想を超えた。戦術を立て直す必要がある。
general_retreat_5=わが部隊は甚大な損害を受けた。なぜ誰も援護してくれなかった？
general_retreat_6=わが軍は現在の戦況に適応できない。一旦後方に戻って整備する必要がある。

general_job_desc={0}{1}
general_desc_Khalid=アラブで最も優れた将軍の一人。アラブ戦士を率いて勇猛に戦って敗北したことがない。ムハンマドは彼の勇敢さを表彰するために、「アラーの剣」との称号を与えた。
general_desc_Belisarius=ビザンティン皇帝ユスティニアヌス1世の名将。北アフリカとイタリアの征服者。軍事生涯の後期に皇帝に疑われ、「最後のローマ人」の一人と呼ばれていた。
general_desc_Frederick I=赤いひげのバルバロッサ。ローマ人民の王。神聖ローマ帝国の皇帝。彼はイギリス国王の獅子心王リチャード、フランス国王フィリップ2世とともに第3回十字軍を率いた。その後、彼は東征の途中で溺死した。
general_desc_Constantine I=ローマ帝国の皇帝。ビザンティン帝国の創始者。彼はビザンティンに新皇宮を建設し、新ローマと命名した。しかし、人民はコンスタンティーヌという名に憧れ、ここをコンスタンティノープルと呼んでいる。
general_desc_Uthman=ムハンマドの信奉者と婿。三代目の正統カリフ。彼の執政期にアラブ騎兵は無敵だが、晩年に暗殺された。
general_desc_Heraclius=ビザンティン帝国の皇帝。ヘラクレイオスは帝国軍を率いてペルシャ人を破り、失われた領土を奪還した。しかし、アラブ人の侵入に直面した時、ビザンティン帝国は彼が死ぬまで敗北し続けていた。
general_desc_Gilles de Rais=本名ジル・ド・モンモランシー＝ラヴァルである。百年戦争時代のフランス元帥。有名な黒呪術師でもある。青ひげのモデルとなった人物。彼はジャンヌ・ダルクの戦友で、かつて民族の英雄と呼ばれていた。
general_desc_Sikelgaita=ランゴバルドの王女。ロベルト・イル・グイスカルドの2番目の妻。ロベルトとともにビザンティン帝国に対抗する戦争に参加した。
general_desc_Harald=ノルウェーの国王。王になる前にキエフ大公国の傭兵を務め、その後ビザンティン帝国のヴァラング親衛隊に参加した。
general_desc_Alp Arslan=大セルジューク朝の第2代スルタン。執政期にエジプトのファーティマ朝とビザンティン帝国と戦って勝利した。後世は彼のことを「勇敢なライオン」を意味する「アルプ・アルスラーン」と尊称した。
general_desc_Alfred the Great=ウェセックス王国の王。イギリス史上で初めての「アングロ・サクソン人の国王」と自称した人でもある。彼は人民を率いてヴァイキングの侵略に抵抗し、イングランドの大部分の土地をアングロ・サクソン人の支配下に回帰させたため、「大帝」との尊称を得た。
general_desc_Alaric I=西ゴートの国王。西ゴート王国の創造者でもある。ローマ帝国との関係を絶った後、彼は西ゴート人を率いてローマを陥落させ、「永遠の城」を陥落させた最初の人となった。
general_desc_Aetius=最後のローマ人。彼は軍隊を率いてカタラウヌムの戦いで匈奴人を破ったことがある。この勝利は「西ローマ帝国の最後の勝利」とも呼ばれた。その後中傷されてウァレンティニアヌス3世に暗殺された。
general_desc_Athelstan=年長者エドワードの子。イングランド王国ウェセックス朝の創始者。彼は初代イングランド王と、最も偉大なアングロ・サクソン人の王と言われていた。
general_desc_Sophronius=エルサレムの指導者。その前に彼は修道士で神学者だった。
general_desc_Michael the Stammerer=ビザンティン帝国の皇帝。「吃音者」を意味するあだ名を持つ。執政期に彼はブルガリア人と一緒にトーマスの反乱を鎮圧した。しかし、これによって帝国の実力も弱まった。
general_desc_Fausta=ローマ帝国の皇后。コンスタンティヌス1世の二番目の妻。
general_desc_Tostig=ハロルド2世の異父弟。ハーラル3世の支持者。スタンフォード・ブリッジの戦いで亡くなった。
general_desc_Leopold V=オーストリア公爵とシュタイアーマルク公爵。「賢者レオポルト」の称号を持っている。彼は第3回十字軍に参加した。
general_desc_Theodoric I=西ゴートの国王。彼は執政期にフランク人とヴァンダル人を攻撃し、西ローマ帝国と同盟を結んだ。
general_desc_Gytha=デンマークの貴族。 ハロルド2世とイーディスの母。
general_desc_John Chandos=中世イギリスの騎士。彼は百年戦争時代におけるイングランドでの最も重要な3つの勝利の計画者とされている。彼は最終的にとある小規模な紛争で死亡した。
general_desc_Gunderic=ヴァンダル人とアラン人の国王。軍隊を率いて西ローマ帝国に侵入したことがる。
general_desc_Saladin=エジプトのアイユーブ朝の最初のスルタン。シリアの最初のスルタン。エジプトの民族英雄。彼はアラブ人が東征軍に対抗するうちに、卓越した指導力や騎士道精神、軍事力を示したことで知られている。
general_desc_Narses=ベリサリウスと同じように、ビザンティン皇帝ユスティニアヌス1世の大将であった。彼はかつて東ゴート王国を滅ぼしたことで「ゴート人の槌」と呼ばれていた。
general_desc_Charlemagne=ヨーロッパの父。フランクとランゴバルドの国王。ローマ人の皇帝。ローマ帝国以来、カール大帝は西ヨーロッパの大部分の地域を初めて統一した。彼が設立した王国はカロリング帝国と呼ばれている。
general_desc_William the Conqueror=征服者ウィリアム。ヴァイキング略奪者ロロの末裔。1035年にノルマンディー公となった。1066年にイングランドを征服し、最初のノルマンイングランド王となった。
general_desc_Attila=古代ユーラシア大陸で最もよく知られていた首領。歴史学者は彼のことを「神の鞭」と呼んでいる。何度も大軍を率いてビザンティン帝国と西ローマ帝国に侵入した。
general_desc_Richard I=イングランド王国の国王。勇猛果敢で「獅子心王」という称号を得た。神聖ローマ帝国の皇帝フリードリヒ1世とフランス国王フィリップ2世とともに第3回十字軍を率いた。
general_desc_Edward the Black Prince=イングランド国王エドワード3世の長男。歴史上で黒太子と呼ばれている。英仏百年戦争で最も成功したイギリスの指揮官の一人。最も偉大な騎士の一人でもあった。
general_desc_Charles Martel=メロヴィング朝フランク王国の宮宰。カロリング家出身で、トゥール・ポワティエ間の戦いでウマイヤ朝の進撃を食い止め、西ヨーロッパへのイスラム教徒の侵入をイベリア半島でとどめたことで名高い。
general_desc_William I of Sicily=本名はグリエルモ1世。シチリア王国の第2代国王。
general_desc_Harold=ハロルド2世とも呼ばれる。ウェセックス伯ゴドウィンの次男で、トスティ・ゴドウィンソンとエドワード懺悔王の妃エディスの兄。イギリスのアングロ・サクソン時代の最後の国王であった。
general_desc_Matilda of Boulogne=ブローニュ女伯。イングランド王スティーヴンの妃。
general_desc_Eleanor of Provence=プランタジネット朝のイングランド王ヘンリー3世の王妃。
general_desc_Baldwin IV=エルサレム王国の国王。ハンセン病を患っているが、部隊を率いてモンジザールの戦いでサラーフッディーンの三万の大軍を破った。
general_desc_Khawlah=ムハンマド時代の伝説的な戦士。その後、彼女は軍事指導者になり、歴史上で最も偉大な女性軍事指導者の一人として描写されている。相手にハーリドと比較されたことがある。
general_desc_Sunicas=匈奴人。ビザンティン軍に従軍したことがある。
general_desc_Mehmed the Conqueror=「征服者」ムハンマド。オスマン帝国のスルタン。オスマンの大軍を率いてコンスタンティノープルを陥落させ、ビザンティン帝国を消滅させた。その後、オスマン帝国の百年の覇業のために強固な礎を築いた。
general_desc_Philip II=カペー朝の国王。フランスの有名な君主の一人。謀略と政治的手腕に優れたことで「尊厳王」と呼ばれている。
general_desc_Henry II of England=イングランドの国王。同時にノルマンディー公でもある。彼が創立したプランタジネット朝はイングランド中世で最も強力な封建王朝であった。
general_desc_Genghis Khan=モンゴル帝国のカガンと創始者。彼はモンゴルの大軍を率いてヨーロッパ大陸の大部分を征服した。その優れた軍事成果により、チンギス・カンは歴史上で最も偉大な征服者とされることが多い。
general_desc_Edward I=通称「長い足のエドワード」。「スコットランド人への鉄槌」とも呼ばれている。ウェールズの征服とスコットランドをほぼ征服したことで有名となった。彼の母親はエリナー・オブ・プロヴァンスである。
general_desc_Justinian I=ビザンティン帝国の皇帝。卓越した功績を挙げたため、ユスティニアヌス大帝とも呼ばれている。ユスティニアヌス1世は古代ローマ時代末期の最も重要な支配者であった。
general_desc_Empress Matilda=ヘンリー1世の娘。ヘンリー2世の母。スティーブンに王位を簒奪された後、彼女は力を蓄えて挑戦を発動し、最後に息子を助けてイングランド王位の継承権を獲得することに成功した。
general_desc_Philip the Good=お人よしのフィリップ。三代目のブルゴーニュ公。百年戦争の末期に活躍して低地の国々の発展に重大な貢献をした。
general_desc_Eleanor of Aquitaine=ヘンリー2世の妻。アキテーヌの女公爵とポワチエの女伯爵。まずはフランス国王ルイ7世と結婚した。婚姻が無効と宣告された後、イングランド国王ヘンリー2世と結婚した。
general_desc_Isabella=彼女はフランスの王女。フランス国王フィリップ4世の娘。イングランドエドワード2世の王妃。エドワード3世の母。彼女は勇ましくて果敢な性格を持っているので、「フランスの母狼」と呼ばれている。
general_desc_Nikephoros I=ビザンティン帝国の皇帝。元々はエイレーネー女帝が任命した財政大臣だった。ブルガリアのリーダークルムとの戦いで戦死した。
general_desc_Malik Shah=ルーム・セルジューク朝のスルタン。彼の名前は「王の中の王」という意味を持つ。
general_desc_Timur=テムル・カガン国の創始者。彼は西アジア、南アジア、中央アジアの他の国を破った。
general_desc_Lady Margaret Beaufort=エドワード3世の末裔。薔薇戦争の重要人物。テューダー朝の創始者ヘンリー7世の母。
general_desc_Elizabeth Woodville=イングランドエドワード4世の王妃。彼女は自分の美貌で、二人の子供の母親としてエドワード4世と結婚し、世間を騒がせた。
general_desc_Fatimah=ムハンマドとハディージャの娘。アラブ帝国の五大傑出した女性の一人。「聖母」とも呼ばれている。
general_desc_Antonina=ビザンティン帝国の将軍ベリサリウスの妻。テオドラ女帝が権力を行使した時の「右腕」。彼女は夫に大きな影響を与えるとともに、物議を醸した人物でもある。
general_desc_Theodora=ビザンティン帝国の皇帝ユスティニアヌス1世の妻。優れた知恵を持ち、ユスティニアヌス1世の統治中に彼に大きな影響を与えた。ニカの乱でユスティニアヌス1世に勇気を与えた。
general_desc_Robert Curthose=ノルマンディー公。その身長から「短袴公」と呼ばれる。イングランド王兼ノルマンディー公ウィリアム1世と妃でフランドル伯ボードゥアン5世の娘マティルドの長男。
general_desc_Suleiman Baltoghlu=オスマン帝国の海軍司令官。コンスタンティノープルの包囲戦に参加したことがある。しかし、城攻めがうまくいかなったため、メフメト2世に処刑を命じられた。その後、死を免れたが、階級、土地、富を奪われ、最終的に無名になって貧困で死んだ。
general_desc_Ambrosio Boccanegra=1341年、彼はアルフォンソ11世を支持するために、艦隊とともにカスティーリャに向かった。その後、ラ・ロシェルの戦いでイギリス人を破った。
general_desc_Aisha=「教徒の母」。イスラーム教の開祖ムハンマドの3番目の妻。アリがカリフになった後、彼女はアリに反対する勢力に参加し、アリと戦争を起こした。
general_desc_Hermeric=スエビ王国の国王。生涯をかけてローマ帝国を戦っていた。
general_desc_Simeon I of Bulgaria=ブルガリアのツァーリ。ボリス1世の三番目の息子。彼の執政期は第一次ブルガリア帝国が最も強かった時期であった。
general_desc_Constantine XI=ビザンティン帝国の最後の皇帝。メフメト2世が城を包囲した時、彼は降伏を放棄した。城壁が破られた後、彼はローブを脱いで敵陣に突入して行方不明になった。
general_desc_Samuel of Bulgaria=第一次ブルガリア帝国のツァーリ。彼の執政期にブルガリアはバルカン地域の大部分を支配し、領土がギリシャ南部までに広がった。
general_desc_Aethelred I=ウェセックスの国王。865年、彼は彼の3番目の兄エセルバートの後を継いでウェセックスとケントの国王になった。
general_desc_Halfdan Ragnarsson=ノーザンブリアの初めてのヴァイキング国王。ヴァイキングのリーダー。ヴァイキングはアングロ・サクソンイングランド王国を侵略した時の指揮官の一人である。
general_desc_Edward III=イングランドの国王。彼は執政期にイングランドを当時ヨーロッパで最も強力な軍事強国の一つにした。黒太子エドワードは彼の長男である。
general_desc_Richard of York=イングランドの貴族。エドワード3世の曾孫。王位を奪おうとしたが、最後は止められた。
general_desc_Alle=最初の南サクソン人の王。彼が支配した地域は今はサセックスとも呼ばれている。
general_desc_Robert the Bruce=スコットランドの歴史の中で重要な王である。「ロバート1世」と呼ばれた。彼はスコットランド人を率いてイングランド軍を打ち負かし、王国の独立を確保した。
general_desc_Zubayr=ムハンマドの仲間。ムハンマドの死後、軍事指導者となり、ラクダの戦いで戦死した。
general_desc_Trithyrius=ビザンティン帝国の名将軍。シラクが執政する時の重要な軍事指揮官である。
general_desc_Edmund=イースト・アングリア王国の国王。ヴァイキングの大軍が侵入した時、部隊を率いて敵と戦い、戦闘中に戦死した。
general_desc_Totila=東ゴート王国の国王。軍事的にも政治的にもかなり有能な指導者である。
general_desc_Athelred=マーシア人の領主。エゼルレッドの太守とも呼ばれている。
general_desc_Ivar=ヴァイキングの首領。彼は有名なヴァイキングの首領ラグナル・ロズブロークとアスラウグの息子。ハールヴダン・ラグナルスソンの兄である。
general_desc_Vortimer=ウォティガンの息子。父とアングロ・サクソン人との同盟に反対することで知られている。
general_desc_Catigern=ウォーティマーの兄弟。彼はアングロ・サクソン人と戦ったことで知られている。
general_desc_Alexios I=ビザンティン帝国の皇帝。コムネノス王朝の創始者。執政時に彼の家族はビザンティン帝国の権力の最高峰に到達した。同時に、彼が西方に援助を求めた行為も東征を引き起こした理由の一つとなった。
general_desc_Basil II=「ブルガリア人殺し」という渾名を持つ。ビザンティン帝国の皇帝。半世紀近く帝国を支配している。バシレイオス2世はギリシャの民族英雄だが、ブルガリア人の中で軽蔑されている。
general_desc_Roland=カール大帝麾下のフランク軍事指導者。多くの作品に何度も登場するキャラクターでもあり、フランク王国のためにブルトン人の進攻を防いだことがある。最終的にローランはカール大帝の首席聖騎士になった。
general_desc_Bessas=ビザンティン帝国の将軍。ベリサリウスとともにゴートとサーサーン朝ペルシア人との戦争に参加していた。ベリサリウスの副官でもあった。
general_desc_Vitiges=東ゴート王国の国王。軍事的にも政治的にもかなり有能な指導者である。
general_desc_Batu Khan=チンギス・カンの孫。ジョチの次男。モンゴルジョチ・ウルスの創始者。部下への寛容さから、彼はバトゥと呼ばれている。
general_desc_Jebe=ジェベはチンギス・カンに従った後に与えられた名前。「矢先」を意味する。モンゴル第一猛将という称号を持っている。四狗の一人でもある。
general_desc_Godfrey=下ロレーヌ公。ブイヨンの伯爵。第1回十字軍の将軍。彼の弟ボードゥアンはエルサレムの国王、ボードゥアン1世であった。
general_desc_Leo VI the Wise=ビザンティン帝国の皇帝。「知者」と呼ばれた。執政時に編集を終えた「バシリカ法典」はその後、ビザンティン帝国の法典となった。
general_desc_Pepin the Short=カール・マルテルの子。カロリング朝の創始者。751年、彼はメロヴィング朝を倒し、フランクの国王となった。
general_desc_Valens=ローマ帝国東部の皇帝。
general_desc_Nur Din=ザンギー朝の君主。第2回十字軍の主要人物の一人である。
general_desc_Gelimer=ヴァンダル王国の最後のゲルマン人の国王。ベリサリウスに敗れた後、ビザンティン帝国に降伏した。
general_desc_Stilicho=半分の蛮族の血を引いている高級将軍。貴族であり、西ローマ帝国の執政官でもある。
general_desc_El Cid=カスティーリャの貴族。バレンシアの征服者と城主。スペインの民族英雄。彼はティゾナとコラダという二本の有名な武器の所有者である。
general_desc_Arthur=ブリテン伝説の王。ケルト英雄の中で最も人気のある円卓騎士団の騎士リーダーでもある。彼はローマ帝国が崩壊し、ローマ軍がブリテンから撤退した後、円卓騎士を率いてブリテン諸島を統一した。
general_desc_Guinevere=アーサー王の妻。アーサーの執政時にキャメロット王国の王妃である。彼女と円卓の騎士ランスロットとの私情が、国を滅亡させたと言われている。
general_desc_Lancelot=円卓騎士団の一人。アーサー王に信頼された騎士でもある。アーサー王の数々の勝利に多く貢献した。
general_desc_Joan of Arc=田舎生まれの少女。フランスの民族英雄。英仏百年戦争の間、彼女はフランス王国を率いてイングランド王国の侵入に対抗した。最後に逮捕されて火刑に処せられた。
general_desc_William Wallace=スコットランドの騎士、貴族、愛国者。彼はスコットランドの独立戦争で反攻勢力を率いた。
general_desc_Olga=キエフ大公国の女性指導者。大公イーゴリの夫人。スヴャトスラフ・リヒテルの母。彼が成人するまでに摂政をしていた。
general_desc_Caesar=ローマ共和国の独裁者。執政官。ローマ帝国の創始者である。
general_desc_Robin Hood=イギリス民間伝説での義賊。彼は武芸に優れていて聡明で機知に富んだ。役人や布教師を敵視しており、金持ちから富を奪って貧乏人に分け与えた英雄であった。
general_desc_Beowulf=スカンディナヴィア半島上の伝説的な人物。彼は巨人や海の怪物、巨竜と勇敢に戦ったことがある。
general_desc_Otto I=東フランクの国王。神聖ローマ帝国の皇帝。彼は初めてスラブ人を侵略したテウトネスの君主の一人。ボヘミア公であるヴァーツラフ1世に臣従を誓わせた。
general_desc_Knud=デンマークの国王スヴェンの王位を継いだ。イングランド、デンマーク、ノルウェー、そしてスウェーデンの一部を支配していた。彼の管区は北海帝国と呼ばれている。
general_desc_Zengi=ザンギー朝の創始者。モースルやアレッポ、ハマ、エドザの総督であった。
general_desc_Alexander Nevsky=元の名前はアレキサンダー・ヤロスラビッチ。スウェーデン人がロシアに侵入した際に、彼は部隊を率いてネヴァ川付近でスウェーデン軍を撃破したため、ネフスキーと呼ばれるようになった。
general_desc_Subutai=古代から中世まで、世界で征戦範囲が最も広い将軍である。スベエデイという威名はヨーロッパとアジアのほとんどの歴史で見られる。勇猛果敢な性格で知られ、「バルドル」の称号を持っている。
general_desc_Su Dingfang=唐朝の初期に活躍した名将。少数で多数を倒すことを得意とし、千人で8万人を殲滅した戦績がある。突厥を倒し、吐蕃を臣従させ、高句麗を征服して生涯一度も負けたことがない。
general_desc_Li Jing=唐朝の第一名将。生涯を通じて戦いを続け、唐朝の成立と繁栄に極めて重要な貢献をした。
general_desc_Li Shimin=唐朝の太宗皇帝。唐朝の第2代皇帝。初めての天可汗。唐朝、そして中国の歴史上、最も有名な皇帝の一人である。
general_desc_Yelu Dashi=大石林牙または林牙大石とも呼ばれる。軍事をはじめ、さまざまな分野で実績を残した人物。彼の功績はヨーロッパで広く知られ、彼の名は西遼帝国の代名詞にもなっている。
general_desc_Suleiman I=オスマン帝国で最も在位が長かったスルタンである。彼の支配下で、オスマン帝国は全盛期を迎えるまでに成長した。その功績から、西洋では一般的に「スレイマン大帝」と呼ばれている。
general_desc_John I Tzimiskes=極めて高い軍事才能を持つローマ皇帝。彼は執政時に北のロス人とブルガリア人を破り、東にも多くの東征を行って東ローマの軍事力を大いに高め、その国土を拡大した。
general_desc_Giovanni=ジェノバの傭兵将軍。「私の手でローマを滅ぼしてはいけない！」という叫んだ彼はオスマン帝国によるコンスタンティノープルの占領を阻止できなかったが、彼の確固たる意志と大胆不敵さは、その廃墟の下に残されていた！
general_desc_Gao Xianzhi=高仙芝は唐の皇帝玄宗の時代の名将である。彼は安西を守り、唐の西域辺境の治安維持と西域との交流に多大な貢献をした。

