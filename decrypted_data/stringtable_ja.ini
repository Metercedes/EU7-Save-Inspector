stage_group_desc_20007=1214年、神聖ローマ帝国皇帝オットー4世は、フランス国王フィリップ2世の拡大を抑えるために、イングランド王ジョンなどのフィリップ2世に反対する勢力と手を組んで連合軍を結成し、フランス本土に攻撃を開始した。この情報を知ったフィリップ2世は、すぐに軍隊を集めて連合軍を迎え撃とうとしていた。

general_skin_20442=戦闘天使ジャンヌ・ダルク
Joan of Arc2=戦闘天使ジャンヌ・ダルク
general_desc_Joan of Arc2=ジャンヌ・ダルクは農村出身だが、戦場で非常に才能のある指揮官である。戦闘では、ジャンヌは前線に立ち続け、兵士を励まし続けた。彼女の勇敢に戦う姿が兵士たちに深い印象を与えた。
general_skin_20172=鷲のように羽ばたくチンギス・カン
Genghis Khan2=鷲のように羽ばたくチンギス・カン
general_desc_Genghis Khan2=チンギス・カンは台頭する前に何度も絶体絶命の状況に追い込まれたことがある。しかし、彼は不屈の根性でいくつもの困難を乗り越えた。今では、彼はモンゴルの各部族を統一し、ユーラシア大陸をすべて手に入れようとしていた。
general_skin_20175=少女マティルダ
Empress Matilda2=少女マティルダ
general_desc_Empress Matilda2=マティルダは、イングランド王ヘンリー1世の娘である。兄が早く亡くなったため、彼女は王位の唯一の合法的な継承者となった。若いマティルダは、これからどんな血みどろの戦いが待っているかまだ気づいていない。

battle_talk_700701=フィリップ2世の貪欲に終止符を打つ時が来た。
battle_talk_700702= オリフラムは私たちを導くでしょう！
battle_talk_700703=王様が落馬した！王様を守れ！
battle_talk_700704=オットー4世が突進してきた！これは私たちの奇襲の絶好のチャンスだ！
battle_talk_700705=戦場が危険すぎる。わたしは一時的に後方に退く。
battle_talk_700706=フィリップ2世は自分の貪欲に代償を払うでしょう。
battle_talk_700707= オリフラムは私たちを守っている！
battle_talk_700708=フィリップ2世が落馬した！彼を逃すな！
battle_talk_700709=陛下、無茶をしないで。敵の待ち伏せに気をつけてください。
battle_talk_700710=敵の待ち伏せを打ち破った。追撃を続け、すべての敵を消滅せよ！

