conquest_faction_desc_11=ローマ帝国の庇護を失ったブリテンは、凶暴なゲルマン蛮族の侵略を受けている。ブリテン人は勇敢で善戦するアーサー王のもとで団結し、侵略者をブリテンから追い出すと誓った。

conquest_faction_desc_101=カエサルがブリテンを征服して以来、4世紀にわたってローマ人がイギリスを支配していました。現在、西ローマ帝国はかつてのような強さを失っており、ブリテンの軍団を本土に撤退させなければならなかった。西ローマ帝国の庇護がなければ、ブリテン人は武器を持ち、自分で侵略者に立ち向かわなければならなかった。
conquest_faction_desc_102=アングロ・サクソン人は勇猛果敢で、常に海岸線に沿って西ローマ帝国の北部を略奪した。他の蛮族がガリア地域を巡って争っている間に、アングロ・サクソン人は西ローマ帝国の庇護を失ったグレートブリテン島に目を向けた。
conquest_faction_desc_103=西ゴート族は、ローマ帝国の国境を守って匈奴人の侵入を防いでいたが、ローマ人から理不尽な扱いを受けている。もう我慢できない西ゴート族は立ち上がり、西ローマ帝国領内に西ゴート王国を建国した。これで、西ローマ帝国と本格的な紛争はもう避けられないようになった。
conquest_faction_desc_104=西ローマ帝国は今、危機に瀕していた。 勢力が弱まっていたため、蛮族の移住による混乱にうまく対処できなかった。かつての栄光なる帝国は今、揺らいでいる。しかし、危機にはチャンスがつきものであり、帝国の強さはまだまだ衰えていない。復興を決意すればローマ帝国の栄光を取り戻すことができるかもしれない。
conquest_faction_desc_105=ブルトン人は、グレートブリテン島から移住してきたケルト人を中心に構成されている。「ブルトン」は「リトルブリテン」を意味する。現在、ガリア地域が混乱に陥り、状況が不明なっている。ガリアで生き残るためには、強国とうまく付き合わなければならない。
conquest_faction_desc_106=サリアン・フランク人はフランク人の一派である。 彼らは同盟という形でローマ帝国から国境地帯に定住することを許された。衰弱した西ローマ帝国を前に、サリアン人は決断を迫られている。それは帝国の国境を忠実に守り続けるのか、それともガリアで西ローマ帝国の権力を受け継ぐのか。
conquest_faction_desc_107=フランク人は長い間、豊かな地域であるガリア地域への移住を切に渇望していた。 しかし、彼らはローマ帝国の強力な軍事力に阻まれていた。西ローマ帝国が内憂外患の危機に陥っている今、フランク人にとっては絶好のチャンスであった。
conquest_faction_desc_108=ヨーロッパ北東部から移住してきた多くのゲルマン民族の一つ。西ローマ帝国の衰弱に気づき、果敢にライン川を渡り、西ローマ帝国の領土に入った。しかし、これによって西ローマ帝国からの猛烈な反撃を食らうことに違いない。
conquest_faction_desc_109=アレマン語は「すべて」という意味です。 つまり、この国は大小多数のゲルマン族で構成されていたのです。 そのため、アレマンニ家は自らをゲルマン民族のリーダーとみなし、ゲルマン民族を率いて強大な西ローマ帝国に対抗する義務を負っていた。
conquest_faction_desc_110=サルマタイ人の子孫であるアラン人は、かつて草原で最も強力な遊牧民族だった。 しかし、より凶暴な匈奴人に襲われ、アラン族は逃亡を余儀なくされた。 他の移住民族と同様に、アラン人も今、西ローマ帝国の国境でチャンスを求めている。
conquest_faction_desc_111=東ゴート人はかつて黒海の沿岸に定住していた。その後、匈奴人に襲われ、仕方なく降伏した。しかし東ゴート人はいつでも従属するつもりはない。彼らは匈奴人の圧迫から徹底的に抜け出すチャンスを待っている。

conquest_faction_desc_201=自由と独立はブルトン人の信念だ。たとえ強力なシフランク王国に直面しても、ブルトン人は屈服していない。彼らは勇猛果敢なエリスポを「ブルトン人の王」として擁護し、フランク王国と戦うことを決意した。
conquest_faction_desc_202=ヴェルダン条約によってフランク王国が3つの王国に分かれた。シャルル2世は旧王国の西部の領土を元に西フランク王国を創設した。西フランク王国は、旧フランク王国の重要地域を継承した。しかし、国境問題や強力な貴族など、かつての王国が抱えていた問題も引き継いでしまった。
conquest_faction_desc_203=ヴェルダン条約によってフランク王国が3つの王国に分かれた。ロタール1世は旧王国の中部の領土を元に中フランク王国を創設した。中フランク王国は面積は小さいが、最も豊かなイタリア地域と、「ローマ人の皇帝」という肩書きを持っている。
conquest_faction_desc_204=ヴェルダン条約によってフランク王国が3つの王国に分かれた。ルートヴィヒ2世は旧王国の東部の領土を元に東フランク王国を創設した。東フランク王国の大部分の領土は征服されたばかりの比較的貧しいゲルマン地域であるが、極めて強い武力と発展の潜在力を持っている。
conquest_faction_desc_205=アングロ・サクソン人の七つの王国の一つ。先王エグバートが精励して国をよく治めようとすることで、ウェセックス王国にはイングランドを統一する機会があった。しかし、ヴァイキングの到来に伴い、ウェセックスは統一を見合わせて、より多くの精力をヴァイキングの侵入を防御することに集中せざるを得なかった。
conquest_faction_desc_206=アングロ・サクソン人の七つの王国の一つ。マーシア王国はイギリスで最も強大な王国だった。その統治はペンダ時代に遡ることができる。しかし、昔の栄光はもうない。今のマーシア王国はヴァイキングだけでなく、虎視眈々と狙っているウェセックス王国も注意しなければならないアングロ・サクソン人の七つの王国の一つ。
conquest_faction_desc_207=アングロ・サクソン人の七つの王国の一つ。イースト・アングリア王国は領土が小さくて、そのほとんどが沼地であるため、強くなるには難しかった。長期的にマーシア王国の属国であった。しかし、マーシア王国は今、自分に構う余裕がない。これはイースト・アングリア王国にとって台頭する最後のチャンスである。
conquest_faction_desc_208=グウィネズ王国はブリテン人が建国したローマ帝国の後継国の一つである。その国王は常に「ブリテンの王」と呼ばれた。現在のグウィネスの王はロドリ大帝。彼の統治下でグウィネズ王国は繁栄し、ウェールズ全域をほぼ統一した。
conquest_faction_desc_209=アングロ・サクソン人の七つの王国の一つ。ノーサンブリア王国は独立した2つの小さな王国が合併したことによってできた国である。そのため、長い間、政治的な対立や争いが続いていた。ヴァイキングがイギリスで暴れていた頃、ノーサンブリア王国はより団結しなければならない。
conquest_faction_desc_210=オールバニ王国はゲール人とピクト人が連合して作り上げた王国である。現在の国王は「征服者」として知られたケネス1世。この戦いを得意とする国王の指導で、オールバニ王国はあらゆる敵を撃退し、ブリテン北部の覇者となった。
conquest_faction_desc_211=ゲール王国はアイルランドの多くの小王国から構成された連合王国である。そのリーダーは、アイルランドの上級王と呼ばれた。 アイルランドは辺境の地にあるが、ヴァイキングの侵入を免れていない。侵入者をアイルランドから追い出すには、ゲール王国は上級王の指導で団結しなければならない。
conquest_faction_desc_212=スラブ人の拡張は西暦5世紀に遡ることができる。西スラヴ人はその時、スラブ部族から分離され、独立した民族となった。苦寒の地に住む西スラヴ人は苦労に耐える品質を持っているが、頑強に戦う意志も持っている。

conquest_faction_desc_301=ビザンティン皇帝ユスティニアヌス1世は、ローマ帝国を復興し、蛮族に奪われた領土を奪還しようと決意した。皇帝が最も信頼する将軍として帝国再建の任務を負ったベリサリウスは、帝国の最精鋭軍団を率いて北アフリカに渡り、そこからローマ帝国の栄光を取り戻すための征服を始めることになった。
conquest_faction_desc_302=ヴァンダル人はかつてゲルマン蛮族の一つであり、長く苦難に満ちた移住を経た後、ローマ帝国の北アフリカ行省に侵入し、ヴァンダル王国を建国した。ヴァンダルは王国を設立して以来、北アフリカを奪還するというビザンティン帝国の企みを何度も挫いていた。今回も例外ではないだろう。
conquest_faction_desc_303=西ローマ帝国が滅亡した後、テオドリック大帝は東ゴート人を率いてアペニン半島に移住し、旧帝国の中心部で東ゴート王国を建国した。現在、テオドリック大帝の死によって、東ゴート王国は内紛の泥沼に陥って、かつ強大な敵に囲まれて非常に危険な状況に立たされている。
conquest_faction_desc_304=蛮族の侵入により西ローマ帝国が滅亡した後、元のローマ帝国の東部の後継者であるビザンティン帝国も半世紀にわたる衰退を経ていた。 今、皇帝ユスティニアヌス1世の統治により、ビザンティン帝国はようやく再び強く盛んになって、ローマ帝国の復興という方向に向かっている。
conquest_faction_desc_305=ガリアで最初に成立したゲルマン人の王国である西ゴート王国は、台頭したばかりのフランク王国に敗れ、ガリアを捨ててピレネー山脈を越えて南下せざるを得なくなった。数年の時を経て国力を回復した西ゴート王国は、ガリアに目を付けて、再びフランク族に挑むことを誓った。
conquest_faction_desc_306=多くのゲルマン民族が西ローマ帝国の領土を分割するために戦っている一方、賢明なスエビ人はイベリアに行って建国することを選んだ。しかし、西ゴート人がイベリア半島に進出したため、スエビ王国と西ゴート王国の衝突が避けられなくなった。
conquest_faction_desc_307=イベリア半島の原住民としてヴァスコニア人は当時のローマ帝国から現在のゲルマン蛮族まで、常にあらゆる侵略者と戦っていた。どんなに強い敵に直面しても、ヴァスコニア人は一度も戦う意思と独立の決心を捨てたことはない。
conquest_faction_desc_308=フランク王国は、サリアン・フランク人の指導者であるクローヴィス1世がフランクの諸部族を統一して建国したゲルマン王国である。西ローマ帝国のかつての蛮族盟友として、フランク王国はガリア地域における帝国の権力と遺産を順調に継承し、ガリア地域の覇者となるまで急成長を遂げた。
conquest_faction_desc_309=ブルグント人の移住という旅路には苦難が満ちていた。彼らがライン川を渡った直後に、ローマ人や匈奴人に襲われた。幾多の困難を超えた彼はついに、ガリアでブルグント王国を建国した。しかし、ブルグント人はまだ油断できない。隣接するフランク王国が彼らも領土を狙っているようだ。
conquest_faction_desc_310=ブルターニュ人は主にグレートブリテン島から移住してきたケルト人によって結成された。当時の西ローマ帝国であれ、今日のフランク王国であれ、ブルターニュ人は常に自分よりはるかに強い国家と付き合わなければならなかったが、決して屈服することはない。
conquest_faction_desc_311=ゲルマン人が移住して建国した国である。ほかのゲルマン人と違って、テューリンゲン王国はフン帝国の崩壊後に匈奴人の奴隷を多く受け入れた。そのために優れた軍事力を持つテューリンゲン王国は周辺の諸国から恐れられていた。
conquest_faction_desc_312=ゲルマン移住民族の一つである。ランゴバルド人が幾多の苦難を超えてようやく安全な地を見つけた時、西ローマ帝国の豊かな領土はすでに他の移住民によって分割されていた。ランゴバルド人は仕方なく自らの期待をビザンティン帝国と東ゴート王国に託した。しかし、2つの強国に挟まれたランゴバルド人は危険な綱を渡るようだった。
conquest_faction_desc_313=東ゲルマンのゴート族を起源とするゲピド人はは非常に勇猛果敢である。匈奴人の王アッティラが亡くなった後、ゲピド人は匈奴人に対して最初に反抗を開始し、最後に匈奴帝国を倒した。現在、ビザンティン帝国と隣接するピド人はこの非常に賢い古代帝国と慎重に付き合わなければならない。

conquest_faction_desc_401=皇帝アレクシウス1世の即位以来、コムネノス家は1世紀以上にわたってビザンティン帝国を支配していた。歴代のコムネノス皇帝の統治によってビザンツ帝国は衰退から繁栄に転じ、故郷アナトリアを取り戻すことで、ローマ帝国の栄光を取り戻そうとしていた。
conquest_faction_desc_402=大セルジューク朝は分裂した後、クルチ・アルスラーン1世はアナトリアでの政権を継続して国を設立した。ルーム・セルジューク朝とビザンティン帝国はアナトリアを巡って何度も戦争を繰り返していた。現在、両国の間にはせっかくの平和が訪れているが、ビザンティン帝国が故郷を取り戻す覚悟を無視できない。
conquest_faction_desc_403=大セルジューク朝の侵攻によりキリキアに逃げたアルメニア人が作った国である。キリキア王国は敵に囲まれたアナトリアで生き残るためには、十字軍国家と友好関係を結び、その力を借りる必要がある。
conquest_faction_desc_404=「ベイリック」はテュルク語で「長」、「酋長」を意味する。大セルジューク朝の侵攻によりビザンティン帝国がアナトリアの支配権を失った。これを機に多くの突厥部族がアナトリア地域に移動し、部族長連合によるアナトリアのベイリックという国家を成立させた。
conquest_faction_desc_405=長い間、グルジア地方には、お互いに対抗する勢力が多く存在していた。その後、グルジア王国がこの混乱に終止符を打った。今日、タマル女王の支配下にあるグルジア王国は、繁栄と強さを誇っている。これを機に南下すれば、強力なトランスコーカサス帝国を築くことができるかもしれない。
conquest_faction_desc_406=大セルジューク朝の元アゼルバイジャン総督、ユルディニズによって創設された王朝。エルディグズの支配者は「アタベグ」、すなわち「藩王」、「スルタンの補政大臣」の称号を世襲していた。大セルジューク朝が内乱で弱体化になった後、エルジグズのアタベグがスルタンを掌握し、帝国の政権を手に入れた。
conquest_faction_desc_407=ザンギー朝は、断固として十字軍と対抗する王朝の一つである。先王ヌールッディーンは十字軍に何度も勝利し、十字軍国家の西アジアへの侵攻を事実上食い止めた。現在、十字軍国家と新興のアイユーブ朝の挑戦に直面するザンギー朝は、外交をより慎重に行う必要があり、敵に囲まれることを避けなければならない。
conquest_faction_desc_408=ウマイヤ朝に続いて、アラブ帝国における2番目の世襲制度を持つ王朝。かつて栄華を誇ったアッバース朝は、今や衰退し、突厥人に操られていた。アッバース朝がかつての栄光を取り戻すには、大セルジューク朝の分裂を利用し、突厥人の支配を打破しなければならない。
conquest_faction_desc_409=十字軍国家の一つ。第一回十字軍遠征でターラントのボエモン1世がアンティオキア城を占領した後に創設した公国。十字軍の東征における重鎮であり、十字軍とビザンティン帝国を繋ぐ中枢のため、城の防御を固めるのが主要な任務である。
conquest_faction_desc_410=十字軍国家の一つ。エルサレム王国が支持するトゥールーズのベルトランが、トリポリ城を中心に設立した伯国である。トリポリはエルサレム王国とアンティオキア公国の間に位置しており、この二国と強力な同盟を結べばアイユーブ朝の猛攻に耐えることができる。
conquest_faction_desc_411=十字軍国家の一つ。 現在のエルサレム王、バルドウィン4世はまだ若いのに、悪い病を患っている。ただし、彼は王国をよく治めているし、内部のバランスをよく維持して王国を安定させている。バルドウィン4世の支配下でエルサレム王国は力をつけ、十字軍国家の中心になりつつあった。
conquest_faction_desc_412=ファーティマ朝崩壊後、クルド人のサラディンがエジプトを中心として築いた帝国。サラディンは、十字軍の侵攻に対抗して軍を率い、優れた軍事的手腕とリーダーシップを発揮した。今日、この偉大な指導者の下、エジプト帝国は拡大し、全イスラム世界を統一しようとしている。
conquest_faction_desc_413=アキテーヌ公爵リチャードは、イングランド王ヘンリー2世の次男であり、唯一の王位継承者でもあった。リチャードは、優れた軍事能力と見事な武勇を持っている。父や兄弟との果てしない内戦に疲れたリチャードは、教皇庁の呼びかけに応じ、東方の十字軍国家を支援するために、遠征軍を率いることを決意した。

conquest_faction_desc_501=ヴァイキングがブリテンを侵略して以来、アイルランド島に住むゲール人もそれら海賊の侵略を免れなかった。今、ゲール人は至高王の下に集え、ヴァイキングを故郷から追い出すと誓った。
conquest_faction_desc_502=スカンジナビアからブリテンに渡ってきたヴァイキングの一団は、イングランド北部とアイルランドの東岸を占領していた。原住民の抵抗が段々激しくなったため、ヴァイキングによるブリテン征服は非常に困難なものとなった。
conquest_faction_desc_503=アングロ・サクソン・イングランドとも呼ばれ、ウェセックス王国がイングランド地方を統一して作った王国である。王国の王位が交代された時、ヴァイキングが再びノーザンブリアに侵入した。エドマンド1世はこれら侵略者を追い払って再びイングランドを統一しなければならない。
conquest_faction_desc_504=ブリテン人が建国したローマ帝国の後継国の一つ。グウィネード王国の各国王はいつの日かブリテンの支配権を握り、「ブリテンの王」という称号にふさわしくなるよう国の発展に力を注いでいた。
conquest_faction_desc_505=ダルリアダ王国のケネス1世がピクトを併合し、建国した王国である。アルバ王国は建国以来、四方八方から来た侵略者と勇敢に戦っていた。ヴァイキングもイングランド人も、アルバ王国を屈服させることはできなかった。
conquest_faction_desc_506=アストゥリアス王国の後継で、レオンを首都とするキリスト教王国。スペイン半島最大の王国であるレオン王国は、コルドバ・カリフの拡大に対して他のキリスト教諸国をまとめる役割を担っていた。
conquest_faction_desc_507=バスク人はパンプローナを中心として作った独立王国。パンプローナ王国は設立されて以来、フランク王国の侵攻を食い止めた。今日、同じく強力なコルドバ・カリフに対して、王国の人々は相変わらず一歩も引かないだろう。
conquest_faction_desc_508=バルセロナ伯国はもともとフランク王国がバルセロナを中心に設立した辺境にある伯爵の領地だった。しかし、西フランク王国の内乱につれ、王国はバルセロナ伯爵を支援できなくなり、伯国とフランク王国の結びつきはますます弱くなった。
conquest_faction_desc_509=ウマイヤ朝の末裔がイベリア半島に設立したイスラム教王国。アッラフマーン3世がカリフになった後、コルドバ・カリフとして呼ばれるようになった。帝国はこの「常勝者」の支配下でますます強大になり、イベリア半島全域を統一しようとしている。
conquest_faction_desc_510=アラブの貴族イドリスが地元のベベル族を統合して建てた王朝である。その王国は今、衰退し、内乱状態に陥って北部にある強力な隣人の脅威に晒されている。王国は慎重に外交を行う必要があり、そうでなければ滅亡の危機に瀕することになる。
conquest_faction_desc_513=偉大なるアラン1世がなくなった後、ヴァイキングがまた襲いに来ていて、ブルターニュの大部分を奪い取った。30年近くにヴァイキングと戦った後、アラン2世はこれら北欧の海賊を駆逐し、ブルターニュ公国を再び設立した。
conquest_faction_desc_514=ヴェルダン条約によりフランク王国が3つに分割された後、西フランク王国が旧王国の西部にある領土を継承した。ガロリン王朝の王権がなくなった今、国内の領主たちは次々と勢力を伸ばしていた。その中にはユルクのように王家の領地を奪おうとする反乱軍もいた。西フランク王国が昔の繁栄を取り戻すための道のりは険しいものであった。
conquest_faction_desc_515=セーヌ川の下流域は長い間、ヴァイキングの襲撃を受けていた。従って西フランク王国は、平和とヴァイキングの忠誠と引き換えにこの地域をヴァイキングの首領であるロロに与えた。その後、ロロはルーアンを中心としてノルマンディー公国を設立した。
conquest_faction_desc_516=フランク公爵兼パリ伯爵のユーグは一度にルイ4世を西フランクの王として擁立したが、その一族の実力があまり強大なため、やがて王権強化に専念するルイ4世に警戒され、忌み嫌われるようになった。幾多の対立と戦いの末、やがて2人は互いに敵対し、刃を交わすようになった。
conquest_faction_desc_517=アキテーヌの名は、ローマ帝国時代のアキテーヌガリア行省に遡ることができる。アキテーヌ地方ではローマ文化が盛んでいるため、西フランク王国の中で特異な存在となった。従ってアキテーヌ公国は一定の独立性を保っていた。
conquest_faction_desc_518=カロリング朝はトゥールーズを中心に設立した伯爵領である。カロリング朝が衰退した今、トゥールーズ伯国は名義上、西フランク王国に従属するものの、西フランク王国はトゥールーズ伯国をコントロールできなくなった。
conquest_faction_desc_519=上下にあるブルゴーニュ王国が合併してできた王国である。首都がアルレにあることから「アルレ王国」と名づけられた。アルレ王国は東フランク王国と西フランク王国の間に位置し、この2つの大国の付き合いに注意を払う必要がある。
conquest_faction_desc_520=東フランク王国のオットー1世は即位して以来、王権を強化し領主に対する権威を主張しようとしていた。そのため、王国と諸侯国の間に多くの対立が生じ、何度か反乱も起こった。 しかし、オットー1世は、フランク王国の栄光を取り戻すには、王国のすべての力を自分の下に結集させなければと確信している。
conquest_faction_desc_521=ヴェルダン条約により、フランク王国は西、中、東の3つの王国に分かれた。しかし、そのわずか12年後、中フランク王国はまた3つに分かれた。そのため、ロータリンギア公国が誕生した。公国はフランク人が台頭したアウストラシア地方を継承したため、西と東の王国に狙われている。
conquest_faction_desc_522=フランケン公国とも呼ばれる。東フランク王国での自治公国の一つである。ガロリン家の後継者が絶えた後、フランケン公は一時的に東フランクの王位を掌握していた。そのためか、フランケン公国はザクセン家のオットー1世に服従することを嫌がっている。
conquest_faction_desc_523=東フランク王国の自治公国の一つ。バイエルンの名はローマ帝国時代で地元の部族に対する呼び方に遡ることができる。「ボヘミアから来た人々」との意味合いを持っている。ガロリン朝が衰退した後、王朝の支配を継続するにはバイエルン公国を新たに設立しなければならなかった。
conquest_faction_desc_524=西暦774年、カール大帝はロンバルディア王国を征服し、その北部を直接フランク王国に併合した。その後、この部分はイタリア王国として設立された。フランク王国が崩壊した後、イタリア王国はようやく独立を果たし、他国の支配から離脱した。
conquest_faction_desc_526=ベネヴェント公国は、ロンバルディア人がイタリアを征服した後、南イタリアでベネヴェントを中心として設立した国家である。ロンバルディア王国がフランク王国に併合された後、ベネヴェント公国は教皇国の介入によって独立を保てるようになった。
conquest_faction_desc_527=西ローマ帝国が蛮族の侵略によって滅亡した後、北イタリア沿岸の住民はラグーン付近に逃れ、そこに集落を作った。こうしてヴェネツィア共和国は発展を遂げていた。海上貿易で栄えた都市国家として、海洋権益を守るために強力な海軍を必要としていた。
conquest_faction_desc_528=ユスティニアヌス大帝が執政を開始して以来、ビザンティン帝国は気運を使い果たしたように見えた。その後400年近く、帝国は国内の反乱と外国の侵略に悩まされ、次々と国土を失っていた。しかし、偉大な国はこのまま衰退していくわけではない。マケドニア皇帝の統治によってビザンティン帝国は力を取り戻し、失った領土を取り戻そうとしていた。
conquest_faction_desc_529=西暦7世紀、ビザンティン帝国はダルマチアで略奪を行っているアヴァール人に対抗するためにクロアチア人をダルマチアに移住させた。その後、クロアチア人はダルマチア地方に進出し、次第にクロアチア公国までに発展していった。
conquest_faction_desc_530=セルビア人がダルマチアで設立した政権。新しく設立されたセルビア公国は、ブルガリアからの侵略に脅かされている。ブルガリアと戦争をしているビザンティン帝国と協力するのはいい選択かもしれない。
conquest_faction_desc_531=ブルガリア帝国は建国して以来、長年にわたってビザンティン帝国と戦争をしていた。ビザンティンのような古代大国でさえ、帝国の強大な軍事力に服従せざるを得なかった。しかし、繁栄もつかの間、ブルガリア帝国は内乱に陥った後、周囲の敗者たちは機に乗じて反撃に出ようと企んでいる。
conquest_faction_desc_532=デンマークのゲルマン人。これは通常、スカンジナビア南部に住んでいたヴァイキングを指している。海に出て略奪に熱心する他のヴァイキングと比べて彼らは故郷に残り、積極的に故郷を発展させることを好んでいる。しかし、そうなると強大な東フランク王国と正面から対峙しなければならなくなる。
conquest_faction_desc_533=サクソン人貴族ジロー1世が東フランク王国の東部に設立した侯爵領。東フランク王国のオットー1世の最も信頼する部下として、ジロー1は王国の東部辺境の安全を守り、王国の版図を可能な限り東に拡張させる役割を担っていた。
conquest_faction_desc_534=チェコ公国とも呼ばれる。大モラヴィア公国のチェコ人により設立された政権。ボヘミア公国は大モラヴィア公国から独立するために東フランク王国と緊密に連携していたが、結局、独立のために東フランク王国と戦争を始めていた。
conquest_faction_desc_535=ポーランドという言葉は古スラブ語の「平原人」に由来しており、ポーランド人が暮らす環境を非常に生々しく表現している。東に拡大しようとする東フランク王国を前に、ポーランド人がこの巨大な怪物に対抗するために一致団結しなければならない。
conquest_faction_desc_536=西暦9世紀、マジャール人は東欧の草原からカルパチア盆地に移住してきた。ヨーロッパの中部地域に入ったマジャール人は略奪で生活し、周辺諸国を荒らしていた。しかし、周辺諸国の警戒が段々強まったため、マジャール人が大草原から持ち込んだ習慣を変えなければならない。
conquest_faction_desc_538=ペチェネグ人は西突厥のウグス部落を起源とし、一時はハザール・カガン国に従属したことがある。西暦10世紀初頭、ペチェネグ人はドン川流域に西進し、この地域でのハザール・カガン国の政権を引き継いだ。
conquest_faction_desc_539=イベリア王国は、かつてビザンティン帝国の属国であった。アラブ帝国の台頭と侵略により、イベリア王国はアラブ帝国に忠誠を誓うことを余儀なくされた。アラブ帝国が混乱に陥った今、イベリア王国はビザンティン帝国と仲良くすれば、アラブの支配から離脱できるかもしれない。
conquest_faction_desc_540=紀元前から存在する古代王国アルメニアの歴史は、浮き沈みの激しいものである。その土地はペルシャ人やローマ人、アラブ人に占領され、支配された。しかし、それでもアルメニア人は独立する機会を逃がそうとしない。
conquest_faction_desc_541=アラブ帝国から分裂した王国の一つ。アラブ帝国のモスル総督アブドラは、アッバース朝の衰退を認め、モスルを割拠し自立した。その後、モスルアミール国を設立し、自らをアミールと名乗り、ハムダニ王朝を創設した。
conquest_faction_desc_542=アラブ帝国から分裂した王国の一つ。アッバース朝時代の突厥将軍イフシードが設立したエジプト王朝。イクシュッド朝は現在、ハムダニ王朝とシリアの支配権を争っている。この支配権を手に入れればアラブ世界における両王国の権威を左右することができる。

