battle_talk_3010201=農民に麦畑を破壊させろ、一粒の食糧もノルマン人に残すな。
battle_talk_3010202=食糧が不足しています、教皇と交渉をさせてください。
battle_talk_3010203=連れて来るがよい、この程度の小隊では問題ないだろう。
battle_talk_3010204=教皇の部隊は無防備だ、今こそ急襲せよ！
battle_talk_3010205=教皇の許しを乞います。
battle_talk_3010206=ノルマン人は敗れた教皇に礼儀正しく接したが、教皇がノルマン人の捕虜になったというニュースはヨーロッパ中に広まった。
battle_talk_3010301=プーリアは本当に素晴らしい土地だ、豊富な物産が揃っている。
battle_talk_3010302=ロベルト！なぜプーリアで快楽に溺れ、自分の領地に戻ろうとしないのだ！
battle_talk_3010303=わざと遅らせたとでも言うのか？ 待っていろ、カラブリアを手に入れてみせる！
battle_talk_3010304=私の時間は多くない、ノルマン人は戦争だけでは生き残れないぞ。
battle_talk_3010305=ロベルトは近年の実績で自身が優れた政治家であることを証明した。ノルマン人の未来は彼に託そう！
battle_talk_3010401=ビュザンティオンの拠点を攻撃し、彼らをカラブリアから追い出せ！
battle_talk_3010402=ビュザンティオン帝国を打破すれば、シチリアへの進軍が可能になる。
battle_talk_3010403=この都市は非常に堅固だが、包囲戦で降伏させることができるだろう。
battle_talk_3010404=ビュザンティオン軍は追放された、今こそシチリアを征服する時だ。
battle_talk_3010405=ノルマン人だ！ただちに部隊を集結して迎撃せよ！
battle_talk_3010601=以前、ビュザンティオン軍の妨害でメッシーナを占領できなかったが、今回は夜襲できっと成功するだろう。
battle_talk_3010602=城防を強化せよ、ここがシチリア征服の起点となる。
battle_talk_3010603=ノルマン人よ、もし同盟者が必要なら、座って話そう。
battle_talk_3010604=協力いただき、ありがたい限りです。ちょうどあなたのような同盟者が必要でした。
battle_talk_3010701=バーリはビュザンティオンの最後の拠点だ。奴らを打破すれば、南イタリアは完全にノルマン人のものとなる！
battle_talk_3010702=持ちこたえろ、援軍を求める使者を派遣した。帝国の援軍はすぐに到着する！
battle_talk_3010703=貴殿がこの街を手に入れたときに十分な見返りが得られるのなら、喜んで協力しましょう。
battle_talk_3010704=バーリ城に増援を送れ！
battle_talk_3010705=敵の援軍を阻止せよ！
battle_talk_3010801=バーリは陥落した、グイスカルドの次の標的は私たちになるだろう。
battle_talk_3010802=団結し、抵抗するのだ。
battle_talk_3010803=烏合の衆よ！いくら兵を集めても、私の足を止めることはできないぞ！
battle_talk_3010804=次はビュザンティオンにノルマン人の力を思い知らせる時だ。
battle_talk_3010805=サレルノが陥落してから2年も経たないうちに、ベネヴェントもグイスカルドによって征服された。
battle_talk_3011001=ヴェネツィアが我々の海上艦隊を襲撃し、大きな損失を被った。
battle_talk_3011002=陛下は我々に都市を死守するよう命じた。必ず兵を率いて支援に来てくださる！
battle_talk_3011003=勇敢なヴァラング親衛隊が敵を撃破した！私について来い！
battle_talk_3011004=陛下の援軍が到着した！私について攻撃せよ！
battle_talk_3011005=ヴァラング親衛隊を優先的に排除し、敵を分割して包囲せよ！
battle_talk_3011006=部隊を再編成する必要がある！撤退せよ！撤退！
battle_talk_3011007=アレクシオスは教皇を贈賄し、奇襲をかけてノルマン人の船を焼き払った。さらに、彼らは最も強力なヴァラング親衛隊と遭遇した。これらの親衛隊は1066年のヘイスティングズの戦い後にコンスタンティノープルへ逃れたアングロ・サクソン人たちである。
battle_talk_3011101=教皇はヘンリー4世にサンタンジェロ城に包囲されており、救援が必要だ。
battle_talk_3011102=支援いただき、感謝する。盟友よ。
battle_talk_3011103=進軍を続け、ヘンリー4世をローマから追い出せ！

