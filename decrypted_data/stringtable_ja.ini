conquest_faction_desc_801=西ローマ帝国はローマ帝国の後継を名乗る国の一つであった。かつては栄光を誇っていたが今は危機と衰退に陥っている。異民族の移動にともなう国境における動乱に対処できておらず、帝国は困難な状況に置かれている。しかし、帝国は長い歴史を持っており、再興への決意があればローマの栄光を取り戻せるかもしれない。
conquest_faction_desc_802=ビザンツ帝国は東ローマ帝国とも呼ばれ、ローマ帝国の後継を名乗る国の一つであった。帝国はコンスタンティノープルを首都とし、戦略的に重要な位置にあった。帝国は古代ローマの政治や文化、伝統を継承するとともに独自の芸術や建築、制度を発展させた。今、帝国の一番の目的はローマの失地を取り戻すことである。
conquest_faction_desc_803=ゲール人はアイルランドやスコットランド、ウェールズに居住していたケルト民族の1つである。多神教を信仰し自然と先祖を崇拝していた。勇猛かつ好戦的で、ローマ帝国にとって強力な敵であった。
conquest_faction_desc_804=ブリトン人はブリテン島に居住していたケルト民族の1つである。彼らはケルト文化の特徴を有し多神教を信じていた。ローマとは長期にわたる接触と対立を繰り返し、その過程でローマをはじめとする外来の文化と融合していった。
conquest_faction_desc_805=サクソン人はドイツ北部に居住していたゲルマン諸部族の一つで、ヨーロッパ史において重要な位置を占める。ゲルマン諸部族のなかでも、勇敢さと軍事力で知られた。中世においてサクソン人は征服や移住、政変を経験し地域の政治・軍事情勢に影響を与えた。
conquest_faction_desc_806=デーン人は北欧のゲルマン諸部族の1つで、鉄器時代やヴァイキング時代に興隆した。特にヴァイキング時代には彼らは大船隊を用いて周辺への侵入と征服を繰り返し、歴史上で重要な役割を果たした。
conquest_faction_desc_807=バルト人はバルト海周辺地域に居住していた人々である。スラヴ人やゲルマン人から文化的影響を受けた。勇敢で戦闘に秀でたプロイセン人がその重要な一派である。周辺のスラヴ人やゲルマン人と、交流と対立を繰り返した。
conquest_faction_desc_808=スエビ族はゲルマン諸部族の一つでライン川流域に居住していた。古代ローマ時代には勇猛な戦士や冒険者として知られ、ある時期には独自の王国を建てローマと対立した。
conquest_faction_desc_809=ランゴバルド人は6世紀初頭にイタリア北部に移住したゲルマン諸部族の一つでありランゴバルド王国を建てた。軍事力に優れた彼らは2世紀にわたりイタリア北部を支配し政治や社会、文化に大きな影響を与えた。
conquest_faction_desc_810=スラヴ人はヨーロッパに広く分布する民族集団で西スラヴ、東スラヴ、南スラヴの3つの主要な支族に分けられている。独自の言語や文化、伝統を持っており、歴史上多くの国を形成し各々の戦闘能力を発揮した。
conquest_faction_desc_811=フランク人はフランキア地方の先住民族でゲルマン諸部族の一つである。5世紀から8世紀に強大なフランク王国を建設し、勇敢な戦士と軍事的拡張の意思を持ちヨーロッパ史に大きな影響を与えた。
conquest_faction_desc_812=ブルグント人はゲルマン諸部族の一派で、フランス東部のブルグント地方を拠点とした。ブルグント王国を建て周辺国との政治的・軍事的対立を繰り返し、中世ヨーロッパの重要な勢力の一つであった。
conquest_faction_desc_813=東ゴート族はゲルマン諸部族の1つで、外敵の侵攻を避けるために東ヨーロッパやバルカンに移住し独自の王国を建設した。ローマ帝国の国境地帯で力をつけ、ローマと激しく争った。
conquest_faction_desc_814=東ゴート族出身のゲピド族は勇猛で戦闘民族として知られた。他民族との戦争を繰り返し、特にフン族や東ゴート族との対立が知られる。一時期には独自の王国を建て周辺に影響力を及ぼした。
conquest_faction_desc_815=フン族はユーラシア大陸の遊牧民族であり騎射に秀でていた。5世紀末から6世紀初頭にアッティラの下でフン帝国が隆盛し、ローマや他民族に脅威を与え略奪と征服を繰り返した。
conquest_faction_desc_816=マジャール人はハンガリーの主要民族である。9世紀初頭にウラル山脈地域から現在のハンガリーに移住し、ハンガリー王国を建てた。中世には勢力を拡大し、周辺諸国との戦争や領土争いを繰り返した。
conquest_faction_desc_817=バスク人は主にバスク地域に居住する西ヨーロッパの民族。独自の言語と文化的伝統を持ち、ヨーロッパ最古の民族の一つとされる。歴史上一貫して独立心と文化的特徴を保持し、西ヨーロッパ史で重要な役割を果たした。
conquest_faction_desc_818=西ゴート族はゲルマン諸部族の1つで、その起源はゴート族に遡ることができる。5世紀半ばにイベリア半島に移住し西ゴート王国を建国した。現在のスペインとポルトガルの大部分を支配し、西ヨーロッパで有数の王国となった。
conquest_faction_desc_819=ブルガール人はバルカン地域の先住民族で独自の言語や宗教、習俗を持っている。中世初期に強大な第一次ブルガリア帝国を建て、バルカンに大きな影響を与えた。
conquest_faction_desc_820=ギリシャ人はギリシャ地域に居住する民族で、古代ギリシャ文明の創造者と継承者である。都市国家と民主政治で知られる。中世には外国からの支配を受けたが、独立と自由への願いを失わなかった。
conquest_faction_desc_821=トルコ人の起源は古代テュルク諸族に遡る。移住と領土拡大を繰り返し、後には強大な帝国を建設した。軍事や文化、政治に大きく貢献し、中世から近世にかけて広大な地域を征服した。
conquest_faction_desc_822=アルメニア人は世界最古の民族の一つで、その宗教と文化は地域の生活と価値観に大きな影響を与えた。アルメニア王国を建て強大な勢力であった頃もあるが、多くの困難に遭遇した。
conquest_faction_desc_823=モンゴル人はモンゴル高原出身の遊牧民族で、騎射の技術と戦略に秀でる。草原での戦いに優れ、迅速な襲撃や機動戦を得意とした。チンギス・ハンの下でユーラシア大陸のなかで急速に勢力を拡大し大帝国を樹立した。
conquest_faction_desc_824=東方人は遥か東方からの移住民である。西欧諸国との交流を目指し未知の域に足を踏み入れた。西欧勢力からの挑戦と機会に恐れずそして積極的に挑み、新天地を開拓しようとした。
conquest_faction_desc_825=ベルベル人は北アフリカの先住民族である。領土と文化を守るため、外来者との戦いを繰り返した。独立と被支配を繰り返しつつも伝統的な習慣と信仰を保持した。
conquest_faction_desc_826=ヴァンダル族はゲルマン諸部族の一つで、ローマ帝国北アフリカ属州に侵入しヴァンダル王国を成立させた。海軍力を生かしてローマの沿岸部を襲撃し、略奪を繰り返した。
conquest_faction_desc_827=エジプト人は古代文明の創造者で、ナイル川流域に居住している。壮大な建築や宗教、象形文字で知られる。外来の支配を受けつつも、独自の文化と伝統を保持した。
conquest_faction_desc_828=アラブ人は主にアラビア半島と中東地域に居住する民族。アラビア語を使用し、イスラム教を信仰している。イスラム教の伝播に大きく貢献した。歴史上、多くの偉大な帝国や王国を樹立した。
conquest_faction_desc_829=ペルシャ人はイラン高原の民族で、偉大なペルシャ帝国を建国した。最盛期のアケメネス朝時代に諸部族を統一しその領土は大きく拡大した。その文明と業績は後世に大きな影響を与えた。
conquest_faction_desc_830=地中海の海賊は様々な時期に活動していた。彼らは商船を襲撃し財物を奪うことを目的とし、海上貿易や沿岸の住民に脅威を与えた。そのため、彼らは多くの国から討伐を受けた。

