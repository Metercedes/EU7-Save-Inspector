battle_talk_700501=ローマの栄光を再現するために、奴らを追い払おう！
battle_talk_700502=要塞を取り戻せ！こちらに4万人の兵士がある。敵を一掃せよ！
battle_talk_700503=背後の要塞は敵に占拠された。どうやらローマ人は契約を破った！
battle_talk_700504=4万人の兵士がどうした。傭兵ばかりで烏合の衆にすぎない。敵を深くおびき寄せて全滅しろ！
battle_talk_700505=敵の矢に気をつけろ。城塞に撤退しよう！
battle_talk_700506=我らの側面は崩壊しただと！ いいえ、私は失敗しないんだ！
battle_talk_700507=奴らの攻撃を食い止めたが、この地域での支配力は以前より弱まっている。
battle_talk_700508=神のご加護を！ローマ皇帝を生け捕りにした！大セルジューク帝国万歳！

