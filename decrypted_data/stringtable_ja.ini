skill_desc_51851=軍団内のチュートン騎士およびチュートン騎士団の基本行動力が{0}13{1}に変更され、基本回避率が{0}15%{1}になり、突撃の発動率が{0}20%{1}増加。
skill_desc_51861=ターン開始時、士気高揚状態の場合、アクティブスキルのクールダウンが{0}-2{1}、攻撃ダメージが{0}15%{1}上昇する。士気高揚状態でない場合、士気が{0}+8{1}され、受けるダメージが{0}15%{1}減少。
skill_desc_51881=執政官に任命された場合、人口上限{0}+100{1}、都市のアップグレード費用が{0}30%{1}減少。
skill_desc_51891=執政官に任命された場合、贈り物の費用が+30%増加。いかなる勢力とも戦争状態でない場合、経済収入が{0}30%{1}増加。
skill_desc_51901=執政官に任命された場合、自ら宣戦布告を行うことができなくなるが、脅迫された際の資源消耗が{0}50%{1}減少。さらに、脅迫を受け入れて資源を支払った場合、外交値が追加で{0}30{1}点増加。
skill_desc_51911=攻撃後、{0}3{1}点の行動力を回復。効果は{0}3{1}回分の攻撃で継続、クールダウン{0}3{1}ターン。
skill_desc_51921=選択した敵軍およびその周囲{0}2{1}体の敵軍の士気を減少させ、敵軍のいる地域を燃焼させる。命中するたびに攻撃の行動力消費{0}-1{1}、他の消費軽減スキルとの重複不可。クールダウン{0}3{1}ターン。
