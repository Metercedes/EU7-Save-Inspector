stage_intro_4701=ハリドは7世紀のアラブの優れた指揮官。ムハンマドに従った後、「アッラーの剣」という称号を得た。
stage_intro_4703=633年、ムハンマドの後継者であるラシド・ハリファとサーサーン朝が国境紛争を起こし、ハリドは出撃するよう命じられた。この戦いでペルシャ軍が騎兵を鎖でつないでいたため、「鎖の戦い」とも呼ばれている。
stage_intro_4705=鎖の戦いでの敗北により、サーサーン朝はもはや軽視できなくなっていた。彼らはハリドを一掃するために２つの大軍を派遣した。しかし、ハリドは2つの軍隊が合流する前に1つを包囲し、戦場の主導権を握った。
stage_intro_4707=634年、連勝したハリドは撤退するよう命じられ、西側に進軍を開始した。彼の新しい相手は、ビザンティン帝国の復興主と呼ばれるヘラクレイオスだった。
stage_intro_4709=636年、敗北を喫したヘラクレイオスは再び軍を集め、シリアに迫った。ハリドは軍を率いて迎撃に向かった。双方はエルムク川の近くで6日間にわたる激しい戦闘を展開した。
stage_intro_4711=エルムクの戦いで勝利した後、ハリドは勝ち進んで、軍事重鎮アレッポを包囲して占領した。これにより、ヘラクレイオスの遠征は完全に失敗した。

