skill_desc_50923=軍団が満員になっていない場合、ターンごとに{0}70%{1}の確率で敕令重騎兵を一隊補充する。
skill_desc_51251=選択したターゲットとその周囲にいる敵ユニットを攻撃し、一部のダメージを与える。クールタイム：{0}2{1}ターン（スキルダメージは両方の指揮官の騎兵および遠隔能力に影響される）
skill_desc_51252=選択したターゲットとその周囲にいる敵ユニットを攻撃し、一部のダメージを与える。クールタイム：{0}1{1}ターン（スキルダメージは両方の指揮官の騎兵および遠隔能力に影響される）
skill_desc_51261=敵を消滅するたびに、士気を{0}1{1}、兵力を{0}1%{1}回復する。
skill_desc_51262=敵を消滅するたびに、士気を{0}2{1}、兵力を{0}2%{1}回復する。
skill_desc_51272=一段目のスキル：味方部隊が未満になった場合、最前列の敵部隊を強制的に募集して自分の部隊に加える。クールタイム：{0}1{1}ターン。[br]二段目のスキル：自分の最前列部隊を味方の未満軍団に送る。（一段目のスキルが使用できない場合に有効。毎ターン1回のみ）
skill_desc_51282=一段目のスキル：味方部隊が未満になった場合、最前列の敵部隊を強制的に募集して自分の部隊に加える。クールタイム：{0}1{1}ターン。[br]二段目のスキル：自分の最前列部隊を味方の未満軍団に送る。（一段目のスキルが使用できない場合に有効。毎ターン1回のみ）
skill_desc_51291=内政能力が高いほど、自分の部隊は被ダメージが少なくなる。内政能力が100以上の場合に有効になる。
skill_desc_51292=内政能力が高いほど、自分の部隊は被ダメージが少なくなる。内政能力が100以上の場合に有効になる。
