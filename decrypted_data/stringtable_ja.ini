stage_intro_4721=1146年の間、突厥人が帝国の国境を何度も襲撃したため、マヌエル1世は軍隊を集め、ルーム・スルタン国に対する遠征を開始することを決定した。
stage_intro_4723=1147年、第2回十字軍東征が行われ、その途中でビザンティン帝国の領土を通過する必要があった。マヌエル1世はビザンティン帝国軍と衝突することを心配していた。そして、彼の心配はすぐにコンスタンティノープルの城壁外で現実となった。
stage_intro_4725=1155年、マヌエル1世は帝国の領土を取り戻すために2人の将軍をイタリアに派遣し、ノルマン人に対する遠征を開始した。
stage_intro_4727=1159年、アンティオキア公レーナルドがビザンティン帝国のキプロス島を略奪した。怒りを感じたマヌエル1世は軍隊を率いて出撃し、アンティオキア公国を完全にビザンティン帝国の属国に変えさせた。
stage_intro_4729=1167年、マヌエル1世はセウムの戦いでハンガリー人に勝利し、アドリア海の東岸における広大な領土をビザンティン帝国の版図に組み込んだ。
stage_intro_4731=1171年、マヌエル1世はヴェネツィアと断交し、帝国内のヴェネツィア商人の船と貨物を没収した。これにより、ヴェネツィアによる報復的な略奪行為が引き起こされた。

