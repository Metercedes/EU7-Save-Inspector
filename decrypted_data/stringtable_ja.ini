stage_intro_4741=スレイマン1世は、即位後間もなく、ダマスカス総督の指導する反乱に遭遇した。その後、スレイマン1世はこの反乱を鎮圧した。これは彼の一連の軍事征服の始まりを表していた。
stage_intro_4743=1521年、ハンガリー人はオスマン帝国によるヨーロッパへの拡大を阻止できる唯一の壁であった。ハンガリーを打ち負かすために、スレイマン1世は大軍を率いてベオグラードを包囲し、この都市を占領した。
stage_intro_4745=ベオグラードを攻略した後、スレイマン1世はロドス島の聖ヨハネ騎士団に矛先を向けたが、この戦いは非常に困難だった。
stage_intro_4747=ハンガリーはハプスブルク王朝と同盟を結んだ。スレイマン1世はオスマン帝国に影響を与えることを懸念し、ハンガリーがスレイマン1世の提案を拒否した後、軍事で介入することに決めた。
stage_intro_4749=オスマンとサファヴィー朝の領土紛争が激化していた。ビテリス・ベイがペルシャの保護を求めた後、バグダード総督も暗殺された。スレイマン1世はペルシャに宣戦布告し、300年にわたるオスマン・ペルシャ戦争が幕を開けた。
stage_intro_4751=1553年、スレイマン1世はペルシャに対して、3回目で最後の遠征を開始した。双方は互角に戦った後、最終的にアマシア条約に合意し、その後20年間の平和が訪れた。

