general_desc_Tancred=彼はノルマンディーの小領主であり、彼自身に関する情報は少ない。しかし、彼の12人の息子たちはヨーロッパに多くの伝説を残した。
general_desc_William Iron Arm=タンクレード・ド・オートヴィルとミュリエルの長男。オートヴィル家の財産の創始者である。 シラクサの包囲戦で、彼は一人でエミールを倒し、「鉄腕」の異名をとった。
general_desc_Drogo=タンクレード・ド・オートヴィルとミュリエルの息子、ウィリアムの弟。ノルマンディーの指導者である。彼はウィリアムと共にシチリア島の戦いに参加し、最終的に領主となった。
general_desc_Humphrey=タンクレード・ド・オートヴィルとミュリエルの息子、ウィリアムの弟。ウィリアムとドロゴンの死後、彼は息子の親権をジスカールに譲った。
general_desc_Roger Bosso=タンクレード・ド・オートヴィルと妻フレデゼンドの末子であり、兄ジスカールとともに南イタリアとシチリア島の征服に協力し、シチリア王国の創始者となった。
general_desc_Emma of Hauteville=ジスカールとアルベラダの娘。彼女の2人の息子は十字軍東征に参加した。
general_desc_Bohemond I=ロベール・ギスカールとアルベラダの息子。第一次十字軍東征の指導者であり、アンティオキア公国の建設者でもある。
general_desc_Roger Borsa=ロベール・ギスカールとシケルガイタの息子。野心家の母が父の後を継ぐように仕組んだため、兄のボヘモンドと後継者をめぐって長い間激しく争った
general_desc_Roger II=シチリア王国の創始者であり、在位中にいくつもの帝国を撃退した傑出した君主である。シチリア王国は7世紀にわたって存続した。
general_desc_Tancred Prince of Galilee=タンクレード・ド・オートヴィルとエマの息子。ボヘモンドの不在中にアンティオキア公国の摂政を務めた。
general_desc_William I the Bad=ロジェ2世の四男。「悪人」あるいは「邪悪な者」として知られていた。
general_desc_Constance I=ロジェ2世の娘。オートヴィル家が最終的にシチリア島を征服する過程で重要な役割を果たした。後に神聖ローマ皇帝ハインリヒ6世と結婚し、皇太后となった。
general_desc_William II the Good=悪人ウィリアムの息子。その治世は平和と正義の黄金時代と称えられた。
general_desc_Frederick II=ホーエンシュタウフェン朝の皇帝ハインリヒ6世とコンスタンツェ王后の息子。彼の統治領土はシチリア島からドイツに及び、十字軍東征に参加し、エルサレムを征服した。

