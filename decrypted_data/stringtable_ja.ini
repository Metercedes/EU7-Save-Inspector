general_desc_Charles VII=フランスが壊滅的危機に瀕した際にジャンヌを起用し、段々勝利を収めるようになった。勝利者シャルルが政権を握っている間、彼女は一連の改革を行い、常備軍の創設して最終的に百年戦争を終結させた。
general_desc_Jan Zizka=フス戦争が勃発した後、彼は反乱軍に加わり、その指導者となった。「戦車の要塞」と呼ばれる戦術を使って敵を恐怖に陥れた。「戦場では常に勝者である」と評されていた。




