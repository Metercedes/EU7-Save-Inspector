stage_intro_4801=ハーラルは自身の地位と経歴を高めるためにビザンツのヴァラング親衛隊に参加した。その後の10年余りで彼は伝説を残した。
stage_intro_4803=1035年、ハーラルはヴァラング親衛隊の隊長になった。同年、ハーラルはその隊を率いて小アジアを攻撃して占領、アラブ人をビザンツ帝国との和平条約に締結させた。
stage_intro_4805=ハーラルはブルガリア地域の鎮圧を任された。鎮圧の際、ハーラルは敵に全く容赦しなかったため、「ブルガリアの焼却者」と呼ばれるようになった。
stage_intro_4807=東部における戦いが一段落した後にハーラルはシチリア島へ派遣された。帝国のために、彼は自身の武力と知恵を以てシチリアを再び征服するだろう。
stage_intro_4809=1047年、マグヌス1世亡き後にハーラルはノルウェー王に即位した。彼はデンマークへの侵攻に着手し完全な制圧を目論んでいた。
stage_intro_4811=1062年、ハーラルはデンマーク王スヴェン2世とニーソ川で勝敗を決する約束を交わした。その後、ハーラルは勝利を収めたが国内で動乱が生じたため、2年後にデンマーク王と和平を結んだ。

