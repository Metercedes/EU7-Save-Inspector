general_desc_Roger II1=シチリア王国の礎を築いた偉大な君主。彼は知恵と野心を兼ね備える。宗教や文化の隔たりを超越し、広い胸襟と卓越した手腕で、多様な民族と信仰を彼の王国の下に融合させた。
general_desc_Li Shimin1=唐王朝の戦神。その比類なき軍事才能によって四方を征服し、無敵を誇った。しかしその眩いばかりの輝きが、父や兄弟にとって無視できない脅威となってしまう。権力の渦中で、彼は畏敬の対象であり、計り知れない雄才だった。
general_desc_Wu Zetian1=まるで咲き始めた花のように、少女時代の武則天は美しく生き生きとしていた。その仕草や立ち居振る舞いには、若さの持つ優雅さと純真さが漂う。この時期の彼女は、まだ権謀術数や野心に染まることなく、心には少女の無邪気さと憧れを抱いていた。その姿は、まるで美しい絵巻の一角のように人々を惹きつけてやまなかった。
general_desc_ZhiTianXinChang=戦国時代の優れた指導者。その卓越した知恵と軍事戦略で知られる。信長は中部地方を統一し、強力な勢力を築いた。豊臣秀吉、徳川家康と共に「戦国三英傑」と称されている。
general_desc_ZhiTianXinChang1=本能寺の変の後、明智光秀をはじめ誰もが織田信長は亡くなったと思っていた。一方で命からがら逃げ延びた織田信長は血と炎の中で生まれ変わり、魔王となって帰還した！
general_desc_Pope Gregory IX=カトリック教会の指導者であり、同時に教皇領の統治者でもある。

