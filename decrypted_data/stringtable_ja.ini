attr_desc_27501=周囲の敵軍の士気がターン毎に{0}-5{1}される。
attr_desc_27601=自分と周囲の味方部隊への遠距離ダメージを{0}10%{1}軽減させる。
attr_desc_27701=敵を1体撃破する毎に、軍団の士気が{0}+5{1}される。
attr_desc_27801=敵軍は常に最小限のダメージしか与えられない。（狙撃は無効になる）
attr_desc_27901=反撃時、敵軍がそのターンで受けるダメージを{0}10%{1}上昇させる。
attr_desc_28001=攻撃時、敵軍がそのターンで与えるダメージを{0}10%{1}減少させる。
attr_desc_90101=遠距離からの被ダメージを{0}15%{1}軽減させ、回避率を{0}5%{1}上昇させる。士気高揚となった場合、遠距離からの被ダメージを{0}20%{1}軽減させ、回避率を{0}10%{1}に上昇させる。
attr_desc_90201=都市に留まる時、1ターン毎に城壁の耐久度を{0}5%{1}回復する。周囲に敵軍がいない場合、回復量は{0}10%{1}に上がる。
attr_desc_90301=ターン開始時、軍団が士気高揚の状態となった場合、行動力は{0}+1{1}される。
attr_desc_90401=森林地形で行動する場合、森林による行動力の消耗を無視する。ターン開始時、軍団が森林地形にいる場合、行動力が{0}+1{1}される。
attr_desc_90501=毎ターン最初の攻撃のダメージが{0}25%{1}上昇し、士気高揚となった場合、毎ターン最初の攻撃のダメージが{0}35%{1}上昇する。
attr_desc_90601=迂回に成功すると、士気が{0}+5{1}される。
attr_desc_90701=士気が50以下になった場合、ターン毎に士気が{0}+10{1}される。士気が25以下になった場合、ターン毎に士気が{0}+15{1}される。
attr_desc_90801=兵力が不足している時、与ダメージが{0}15%{1}上昇する。
attr_desc_90901=城壁へのダメージが{0}25%{1}上昇する。
attr_desc_91001=自らの攻撃は敵とその周囲いる敵部隊の士気をさらに{0}3{1}減少させることができる。
attr_desc_91101=ターン開始時に自分の周囲に友軍がいる場合、自分の士気は{0}+5{1}され、味方の士気は{0}+3{1}される。
attr_desc_91201=兵数が減っても部隊の与ダメージは変化しない。
attr_desc_91301=士気高揚となった場合、毎ターン最大兵力の{0}15%{1}を回復する。
attr_desc_91401=遠距離からの被ダメージが{0}20%{1}軽減され、回避率を{0}10%{1}上昇させる。士気高揚となった場合、回避率を{0}20%{1}に上昇させる。
attr_desc_91501=騎兵攻撃によるダメージは{0}15%{1}軽減され、騎兵突撃によるダメージは{0}15%{1}軽減される。
attr_desc_91601=軍団では防御歩兵1人ごとに、軍団の被ダメージは{0}5%{1}軽減される。
attr_desc_91701=罠によるダメージは受けなくなる。罠を1つ取り除くごとに兵力を{0}10%{1}回復する。
attr_desc_91801=山地地形で行動する場合、山地よる行動力の消耗を無視する。ターン開始時、軍団が山地地形にいる場合、行動力が{0}+1{1}される。
attr_desc_91901=軍団内の防御力のないすべての歩兵ユニットの受けるダメージが{0}10%{1}減少する。
attr_desc_92001=自分の士気を上昇する。ターン毎に士気が{0}+3{1}される。攻撃による士気の減少は{0}-1{1}される。
attr_desc_92101=ターン毎に最初の反撃のダメージは{0}15%{1}上昇する。
attr_desc_92201=ターン開始時に軍団が士気高揚になっていない場合、士気は{0}+5{1}される。
attr_desc_92301={0}18%{1}の確率で反撃ダメージが2倍になる。
attr_desc_92401=被ダメージが{0}12%{1}軽減される。
attr_desc_92501=迂回に成功すると、敵の士気を{0}5{1}減少させる。兵員が満員になった場合、迂回攻撃を行うとダメージが{0}10%{1}軽減するバフを獲得する。{0}1{1}ターン続く。
attr_desc_92601=軍団が満員になった場合、迂回率が{0}10%{1}上昇する。
attr_desc_92701=突撃に成功すると、敵の士気を{0}10{1}減少させる。砂漠地形や暑い天候の影響を受けなくなる。満員になった場合、遠隔騎兵からのダメージを{0}15%{1}軽減させる。
attr_desc_92801=騎兵への与ダメージは{0}15%{1}上昇する。満員になった場合、騎兵からの被ダメージを{0}10%{1}軽減させる。
attr_desc_92901=周囲に味方がいない時、ダメージが{0}10%{1}上昇する。
attr_desc_93001=突撃に成功すると、敵の士気を{0}15{1}減少させる。湿っぽい天気や暑い天候の影響を受けなくなる。満員になった場合、被ダメージを{0}10%{1}軽減させる。
attr_desc_93101=迂回率が{0}10%{1}上昇し、迂回のダメージが{0}20%{1}上昇する。攻撃によって迂回を発動したら、次の攻撃のダメージは{0}10%{1}上昇する。
attr_desc_93201=攻撃後に与ダメージが{0}10%{1}上昇する。1ターン有効。効果を{0}3{1}回重ねることができる。敵軍団を1つ消滅すると、与ダメージを最大まで上昇させることができる。
attr_desc_93301=蹂躙とラクダによる追加の士気低下効果を無効にする
attr_desc_93401=周囲にいる軍団の数が{0}2{1}以上の場合、与ダメージは{0}10%{1}上昇する。満員になった場合、突撃の確率が{0}10%{1}上昇する。
attr_desc_93501=隣接するユニットは毎ターン、兵力を{0}5%{1}回復する。満員になった場合、光輪の効果は2倍になり、軍団自身もさらに{0}5%{1}の回復効果を得られる。
attr_desc_93601=隣接するユニットの被ダメージを{0}5%{1}軽減させる。満員になった場合、光輪の効果は2倍になり、軍団自身もさらに{0}5%{1}のダメージ軽減効果を得られる。
attr_desc_93701=ターン開始時に軍団が平原地形にいる場合、行動力は{0}+3{1}される
attr_desc_93801=行動力が高いほど、被ダメージが低くなる。（行動力が{0}0{1}でない時のみ有効）
attr_desc_93901=残り行動力が{0}3{1}より大きい場合、与ダメージが{0}10%{1}上昇する。
attr_desc_94001=最初の攻撃を行う時、突撃率は{0}10%{1}上昇する。
attr_desc_94101=近接歩兵から攻撃された時、被ダメージは{0}15%{1}軽減される。最初の攻撃を行う時に消耗する行動力は{0}-1{1}される。
attr_desc_94201=複数のユニットを攻撃する時、与ダメージが{0}5%{1}上昇する。満員である敵部隊への与ダメージは{0}10%{1}上昇する。
attr_desc_94301=軍団ではノルマン騎士を除いて突撃騎兵が1人ごとに、突撃率が{0}10%{1}上昇する。
attr_desc_94401=突撃率が{0}20%{1}上昇し、突撃ダメージが{0}10%{1}上昇する。突撃後に受ける反撃ダメージが{0}10%{1}軽減される。
attr_desc_94501=攻撃ごとに士気が{0}+3{1}され、突撃時に効果は2倍になる。
attr_desc_94601=周囲の敵部隊は毎ターン、士気が{0}-5{1}される。周囲の敵が2体以上いる場合、効果は2倍になる。
attr_desc_94701=隣接するユニットの与ダメージが{0}5%{1}上昇する。満員になった場合、光輪の効果は2倍になり、軍団自身もさらに{0}5%{1}のダメージ上昇効果を得られる。
attr_desc_94801=軍団の行動力上限は{0}+1{1}される。満員になった場合、軍団の行動力上限は{0}+2{1}される。
attr_desc_94901=軍団のすべての突撃騎兵の被ダメージが{0}15%{1}軽減される。
attr_desc_95001=軍団が3つの突撃騎兵で構成された場合、敵を消滅すると行動力が{0}+2{1}される（1ターンに1回有効）。
attr_desc_95101=常に軍団の後方に居る。遠距離からの被ダメージが{0}10%{1}軽減される。迂回による被ダメージが{0}30%{1}軽減される。
attr_desc_95201=周囲の敵ユニットの一部の属性を低下させる。士気高揚となった場合、さらに効果を{0}50%{1}上昇させる。
attr_desc_95301=自身と周囲の味方部隊が受ける遠距離ダメージを{0}10%{1}軽減させる。遠距離ダメージを受けた際に敵の士気を{0}-3{1}させる。
attr_desc_95401=戦闘時に優先的にグループ攻撃を仕掛け、目標を反撃させない。毎ターン、初回攻撃のダメージが{0}10%{1}上昇する。
attr_desc_95501=軍団内に防御歩兵や近接歩兵がいる場合、軍団内の遠隔歩兵の被ダメージが{0}10%{1}軽減される。
attr_desc_95601=攻撃時に敵の迂回ダメージと突撃ダメージを{0}5%{1}軽減させる。この効果は{0}3{1}回まで重ねることができる。
attr_desc_95701=騎兵による被ダメージが{0}10%{1}軽減される。敵の迂回率を{0}15%{1}無視する。
attr_desc_95801=攻撃する度に敵の防御力を{0}12{1}減少させる。{0}2{1}回まで重ねることができる。
attr_desc_95901=攻撃が当たった敵ユニットは、そのターンで行動力の消耗は{0}+1{1}される。攻撃する度に敵の行動力を{0}1{1}減少させる。
attr_desc_96001=毎ターン、最初の攻撃で燃焼効果を発動し、燃焼状態に陥っている敵に効果は2倍になる。
attr_desc_96101=遠距離の被ダメージが{0}50%{1}軽減され、防御力が{0}50{1}増加する。
attr_desc_96201=3回攻撃後、行動力が{0}+2{1}される。（1ターンに1回有効）
attr_desc_96301=毎ターン、最初の攻撃によって消耗される行動力は{0}-3{1}される。
attr_desc_96401=毎ターン、最初の攻撃による与ダメージは{0}20%{1}上昇し、必ず命中する。
attr_desc_96501=敵を1体撃破するごとに、軍団の士気が{0}+5{1}される。近くにいる味方の士気が{0}+3{1}される。
attr_desc_96601=戦闘時に優先的にグループ攻撃を仕掛け、目標を反撃させない。回避を発動すると、与ダメージが{0}10%{1}上昇する。
attr_desc_96701=士気高揚となった場合、敵の回避を{0}15%{1}を無視する。
attr_desc_96801=士気高揚となった場合、回避率が{0}10%{1}上昇する。
attr_desc_96901=騎兵攻撃によるダメージは{0}10%{1}軽減され、迂回によるダメージは{0}15%{1}軽減される。
attr_desc_97001=突撃に成功すると、敵の士気を{0}10{1}減少させる。砂漠地形や暑い天候の影響を受けなくなる。近接歩兵からのダメージを{0}10%{1}軽減させる。
attr_desc_97101=突撃に成功すると、敵の士気を{0}15{1}減少させる。湿っぽい天気や暑い天候の影響を受けなくなる。城壁へのダメージを{0}15%{1}上昇させる。
attr_desc_97201=回避が発動した場合、行動力は{0}+2{1}される。（1ターンに1回有効）
attr_desc_97301=攻撃後に行動力が残っている場合、すぐに行動力を{0}1{1}回復する。回避が発動した後、被ダメージが{0}10%{1}軽減される。
