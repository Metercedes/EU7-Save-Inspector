stage_intro_4681=フニャディ・ヤーノシュは、ハンガリー貴族の家庭に生まれた。彼はその一生を通じてオスマン帝国によるヨーロッパへの拡大と侵略に抵抗し、「白騎士」と呼ばれた。
stage_intro_4683=1442年、フニャディは初戦から不利な状況にもかかわらず、数日間奮闘し続け、最終的にクラフェヘル城で侵略してきたオスマン軍を殲滅した。
stage_intro_4685=1443年から、教皇の支援を受けたフニャディはセルビア地域に遠征を開始した。よく少数で多数に勝ったことで、この地域でのオスマン帝国の勢力をほぼ一掃した。
stage_intro_4687=1444年、ハンガリー国王ヴワディスワフ3世は自ら軍隊を率いてヴァルナ港近くでオスマン帝国軍と戦った。しかし、ヴワディスワフ3世が戦闘中に前に出過ぎたため、乱闘で敵軍に殺され、ハンガリー軍も大敗を喫した。
stage_intro_4689=1448年、フニャディは一小隊の精鋭部隊を率いてコソボ地域に入り、現地でオスマン軍に抵抗する勢力と合流しようとしていた。しかし、計画が漏れたため、この行動は失敗に終わった。
stage_intro_4691=1456年、オスマン帝国のスルタンであるムハンマド2世は重兵を集めてベオグラードを包囲した。フニャディは危機に際して命を受け、部隊を率いて勇敢に戦った。最終的にはハンガリー守備隊の数倍のオスマン軍を打ち負かすことに成功した。

