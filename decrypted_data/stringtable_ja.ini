item_desc_9201=フリードリヒ2世はこのガントレットを宝物として大切にし、王冠や笏よりも重んじていた。このガントレットは、彼が鷹狩りの訓練に使用したものであり、堅牢な革には無数の鷹が羽ばたき飛び立った跡が刻まれている。すべての鷹は、このガントレットの守護の下で忠誠と鋭さを学び、それと同時に、このガントレット自体がフリードリヒの智慧と支配力の象徴となっていった。
