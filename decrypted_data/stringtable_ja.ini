battle_talk_160101=サマセット公爵という戦場で敗走した男が軍政権に手を染めるなんて、国のために彼を消し去らなければならない！ 
battle_talk_160102=王のために戦おう！
battle_talk_160103=前進！この反逆者を消滅せよ！ 
battle_talk_160104=敵の正面防衛線は非常に強力だ。我々は側面から迂回するほうがいい！ 
battle_talk_160201=水流が速すぎて、無理をして渡河しようとすると大きな損害を被る。敵の注意を引きつける方法を考えなければならない。 
battle_talk_160202=女王陛下から、オードリー男爵を支援するよう命令されたが、自信のない賭けには出ない。 
battle_talk_160203=追いかけろ。彼らを逃がすな！
battle_talk_160204=彼らは罠にはまった。弓兵、渡河する敵を射止めろ！ 
battle_talk_160205=戦況が明らかになった。攻撃を開始せよ！ 
battle_talk_160301=ヨークの兵士たちよ、武器を捨てろ。国王様は君たちをを許すだろう！ 
battle_talk_160302=彼に騙されるな。国王はもう死んでいる！
battle_talk_160303=私は国王に仕えたい。ヨーク軍の情報を持っている！
battle_talk_160304=軍の士気はすでに崩壊している。こうなった以上は分散して突破するしかない。
battle_talk_160401=大雨で火砲が使えなくなっている。状況は不利だ！
battle_talk_160402=敵は交渉を拒んでいる。それならば戦場で勝負をしよう。
battle_talk_160403=ヨーク家は私に十分な利益を約束してくれた。私は彼らに助けを提供する。 
battle_talk_160404=敵が敗走している！今は追撃する好機だ！ 
battle_talk_160405=国王と平民を傷つけるな。私たちの目標は貴族、騎士およびその従者だ！
battle_talk_160501=敵に包囲されているが、援軍が到着するまで持ちこたえれば、状況は一変する。
battle_talk_160502=血には血だ。ヨーク公爵に一矢を報いてやる！ 
battle_talk_160503=よくも私の物資輸送隊を攻撃してくれた！私と共に出撃し、彼らを消滅せよ！
battle_talk_160504=出撃だ！ヨーク公爵を包囲せよ！ 
battle_talk_160505=ヨーク公爵の首を切り落とし、紙の王冠をかぶらせてみせろ！王位を狙う者に自分たちの最期を知らしめよう！ 
battle_talk_160601=行軍を加速せよ！ランカスター軍を迎え撃つぞ！
battle_talk_160602=長い行軍で兵士は疲れ果てている。士気を鼓舞する必要がある！
battle_talk_160603=まさか！あれは何だ？なぜ空に三つの太陽があるのだろう？
battle_talk_160604=恐るな、戦士たち！それは神が私たちと共にあることを意味している！私たちは必ず勝利を手に入れるだろう！
battle_talk_160701=街を包囲し、彼らの弓兵を消滅せよ！
battle_talk_160702=北西に迂回し、彼らを包囲せよ！
battle_talk_160703=くそっ！火薬が濡れてしまった！救援を乞う！
battle_talk_160704=敵がどんどん増えている。撤退する機会を見つけなければならない！
battle_talk_160801=吹雪で弓兵たちは目を開けられず、天候は私たちに不利だ！
battle_talk_160802=私たちは風上に立っている。弓兵は攻撃し続けろ！
battle_talk_160803=矢の雨に押されっぱなしではいられん！騎兵隊、突撃せよ！ 
battle_talk_160804=ランカスターの伏兵だ！被害を最小限に抑えるために陣形を縮小しなければならない！
battle_talk_160805=やっと間に合った！よかった！
battle_talk_160901=ニューカッスル近辺の山岳地帯は兵士たちが隠れるのに適しており、そこで敵を待ち伏せできる。 
battle_talk_160902=友軍が私たちを待っている。私は北から進軍するべきだと思う。
battle_talk_160903=左翼の損失が甚大で、私は再び部隊を集結しなければならない。
battle_talk_161001=陣地を固め、工事を築いて敵を阻止しよう。
battle_talk_161002=突撃を開始せよ！彼らに準備する時間を与えてけいけない！
battle_talk_161003=落ち着け！後退するな！
battle_talk_161004=サマセット公爵は死んでいる！もう無駄な抵抗はやめろ！

