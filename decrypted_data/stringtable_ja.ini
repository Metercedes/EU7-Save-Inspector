general_desc_WuTianXinXuan=戦国時代の名将の1人。戦国時代で最も戦上手な武将の1人として称賛されている。彼が掲げた軍旗、「風林火山」は『孫子兵法』に由来し、武田軍の象徴ともなった。
general_desc_WuTianXinXuan1=本名は武田晴信。「戦国最強の名将」「戦国一の兵法家」と称され、甲斐守を務めたことから「甲斐の虎」とも呼ばれる。彼の軍団は『孫子の兵法』に由来する「風林火山」を掲げ、その戦術で無敵の名声を得た。
general_desc_ShangShanQianXin=戦国時代の大名。後世には「越後の龍」、「戦国の軍神」と称された。彼は武田信玄や北条氏康、織田信長などと度々戦い、後に足利将軍家の求めに応じて上洛したが、最終的に志半ばにしてこの世を去った。
general_desc_ShangShanQianXin1=越後国の長尾為景の末子で、成人後は長尾景虎と名乗る。関東管領の上杉氏の家督を継ぎ、上杉憲政や将軍足利義輝からそれぞれ名前を賜り、「上杉政虎」「上杉輝虎」とも称された。武田信玄と「龍虎」と並び称される戦国の英雄。
general_desc_Scanderbeg=アルバニアの民族的英雄で、アルバニアの独立を守るために、ゲリラ戦の形でオスマン帝国と戦い、オスマン帝国の攻撃を何度も撃退した。
general_desc_Matthias Corvinus=ヤーノシュ・フニャディの息子で、15歳でハンガリー王に正式に即位した。在位中に貴族の反乱を鎮圧し、ハンガリー黒軍を組織し、オスマン帝国を何度も打ち破り、ハンガリーを最盛期へと導いた。
general_desc_Ivan the Terrible=モスクワ大公、ロシア初代ツァーリ。在位中に多くの改革を行い、ロシアの軍事力を大いに発展させた。晩年に自分の息子を誤って殺し、最終的にリューリク朝の衰退を招いた。
general_desc_Gonzalo de Cordoba=スペイン帝国の名将、テルシオの創設者。1503年のチェリニョーラの戦いで劣勢な兵力でフランス軍を打ち破り、この戦いの後、スペイン陸軍はヨーロッパ大陸最強の陸軍となった。
general_desc_Stefan Dusan=セルビア王、在位中にビザンチン帝国の内紛を利用してアルバニアとマケドニアの大部分を征服し、「ドゥシャン法典」を編纂した
general_desc_Bertrand du Guesclin=フランスの国民的英雄で、「ブルターニュの鷲」として知られ、容姿は平凡。百年戦争の初期に勇敢に戦い、すぐに認められて重用され、生涯フランス王に仕えた。
general_desc_Clovis I=フランク王国の創設者で、即位後にフランク族の各部族を統一し、ガリア地方を征服し、フランク人を君主制時代へと導いた。
general_desc_Casimir III the Great=外交的手段を用いて戦争ではなく目標を達成しようとしたポーランド王で、ポーランドの国民的団結を大いに強化し、14世紀の中央ヨーロッパ地域で強国となるようにした。
general_desc_Vytautas=リトアニア大公、ドラゴン騎士団のメンバー、在任中に領土を拡大し続け、最終的にリトアニア王の称号を獲得したが、ポーランド人が王冠を阻止したため戴冠式を完了できなかった。
general_desc_Afonso Henriques=ポルトガル独立後の初代国王で、1139年にポルトガルを独立王国とし、その後ムーア人との戦いを続け、ポルトガル王国の領土を拡大した。
general_desc_John II of Byzantium=ビザンティン帝国コムネノス王朝の第二代皇帝で、「善良なヨハネス」として知られ、在位中は敬虔さと優しさで有名だった。
general_desc_Barbarossa Hayreddin=15世紀のトルコ人海賊で、オスマン帝国のスルタンの支援を受けて地中海の海賊を統合し、地中海沿岸の都市を絶えず襲撃し、生涯にわたって海上での敗北を知らなかった。
general_desc_YueFei=金に抗した名将、生涯を故土の回復に捧げ、幾度となく少数の兵で多数の敵に勝利した。彼が率いた「岳家軍」は軍紀で知られ、「凍死しても家を壊さず、餓死しても略奪せず」という言葉で称えられた。
general_desc_JinWuZhu=金朝の名将、本名は完顔宗弼、金太祖完顔阿骨打の第四子。遼国と宋国の軍隊を次々と打ち破り、南下する途中で敵を圧倒していたが、運命の相手である岳飛に遭遇するまで...

