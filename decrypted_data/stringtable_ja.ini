battle_talk_2301=ここは...どこだ？ 本能寺で命を落としたはずだ。 どうして…どうして私はこんな見知らぬ土地にいるんだ？ 言葉も通じない、服装もまったく違う。 まさか……異界？
battle_talk_2302=いや、そんなことがあろうはずがない。 私の武士道と運命が、こんな簡単に覆されるはずがない。 だが……いいだろう。ここが何処であれ、既にこの地に降り立ったのなら、これもまた征服の運命ということだ。
battle_talk_2303=兵たちよ！たとえ異郷にあろうとも 、戦場は我らの力を示す場だ。都市に攻め込め、彼らの防備を打ち破れ！ 我々は、この地にも「織田」の威名を轟かせる！

