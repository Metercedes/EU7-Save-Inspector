skill_desc_51061=部隊が平原と山地で戦うとき、与ダメージが{0}5%{1}上昇する。
skill_desc_51062=部隊が平原と山地で戦うとき、与ダメージが{0}5%{1}上昇する。山地にいるとき、味方部隊の突撃率が{0}10%{1}上昇し、平原にいるとき、味方部隊の迂回率が{0}10%{1}上昇する。
skill_desc_51071=敵ユニットを1つマークし、そのユニットの被ダメージが{0}15%{1}上昇する。マークは{0}1{1}ターン続く。一旦マークされたユニットが倒されると、倒した者と味方はランダムで増強バフを獲得し、（現在のターンで有効または再取得可能）、「征服者」のクールタイムを即座にリセットする。クールタイムは{0}10{1}ターン。
skill_desc_51072=敵ユニットを1つマークし、そのユニットの被ダメージが{0}30%{1}上昇する。マークは{0}2{1}ターン続く。一旦マークされたユニットが倒されると、倒した者と味方はランダムで増強バフを獲得し、（現在のターンで有効または再取得可能）、「征服者」のクールタイムを即座にリセットする。クールタイムは{0}10{1}ターン。
skill_desc_51081=攻撃時に味方周りにいる敵軍に現在HPの{0}5%{1}のダメージを与える。士気高揚となった場合、与ダメージが2倍になる。
skill_desc_51082=攻撃時に味方周りにいる敵軍に現在HPの{0}10%{1}のダメージを与える。士気高揚となった場合、与ダメージが2倍になる。
skill_desc_51091=周囲1マス内の敵攻城器械が無効になる。{0}2{1}ターン続く。クールタイムは{0}5{1}ターン。
skill_desc_51092=周囲1マス内の敵攻城器械が無効になる。{0}3{1}ターン続く。クールタイムは{0}5{1}ターン。
skill_desc_51101=反撃時に味方周りにいる敵軍に現在HPの{0}5%{1}のダメージを与える。周りの敵軍の数が2以上の場合、与ダメージが2倍になる。
skill_desc_51102=反撃時に味方周りにいる敵軍に現在HPの{0}10%{1}のダメージを与える。周りの敵軍の数が2以上の場合、与ダメージが2倍になる。
skill_desc_51111=目標とその周辺の{0}2{1}つの敵ユニットが現在のターンで反撃できなくなる。クールタイムは{0}5{1}ターン。
skill_desc_51112=目標とその周辺の{0}2{1}つの敵ユニットが現在のターンで反撃できなくなる。クールタイムは{0}3{1}ターン。
skill_desc_51121=攻撃後に兵力を{0}10%{1}回復する。
skill_desc_51122=攻撃後に兵力を{0}10%{1}回復する。敵を倒すと回復効果は2倍になる。
skill_desc_51131=周りの敵の士気が下がりやすくなる。{0}1{1}ターン続く。クールタイムは{0}5{1}ターン。
skill_desc_51132=周りの敵の士気が下がりやすくなる。{0}2{1}ターン続く。クールタイムは{0}5{1}ターン。
skill_desc_51141=毎ターン、初回攻撃の迂回率が{0}25%{1}上昇し、迂回ダメージが{0}25%{1}増加する。
skill_desc_51142=毎ターン、初回攻撃の迂回率が{0}50%{1}上昇し、迂回ダメージが{0}50%{1}増加する。
skill_desc_51151=直ちに目標兵力を{0}10%{1}減らし、士気低下の軍団により効果が出る。（士気が50より低い場合{0}15%{1}，士気が25より低い場合{0}25%{1}）相手を消滅するとクールダウンをリセットし、周りの敵の士気{0}-5{1}。クールタイム：{0}8{1}ターン
skill_desc_51152=直ちに目標兵力を{0}15%{1}減らし、士気低下の軍団により効果が出る。（士気が50より低い場合{0}25%{1}，士気が25より低い場合{0}40%{1}）相手を消滅するとクールダウンをリセットし、周りの敵の士気{0}-10{1}。クールタイム：{0}8{1}ターン
skill_desc_51161=ターン開始時、周りに敵がいない場合、兵力を{0}15%{1}回復し、士気が{0}+8{1}される。
skill_desc_51171=敵の持続型バフを解除する。クールタイムは{0}5{1}ターン。
skill_desc_51172=敵の持続型バフを解除する。解除できるバフがない場合、脆弱効果を付与する。クールタイムは{0}3{1}ターン。
skill_desc_51181=フス戦車を使用するとき、戦車がもたらす負の効果を無視でき、同時に周りの味方は戦車の保護効果を{0}10%{1}得ることができる。
skill_desc_51182=フス戦車を使用するとき、戦車がもたらす負の効果を無視でき、同時に周りの味方は戦車の保護効果を{0}20%{1}得ることができる。
skill_desc_51191=自身と周りの味方の被ダメージが{0}10%{1}軽減され、ターン毎に兵力を{0}10%{1}回復する。{0}2{1}ターン続く。クールタイムは{0}5{1}ターン。
skill_desc_51192=自身と周りの味方の被ダメージが{0}15%{1}軽減され、ターン毎に兵力を{0}15%{1}回復する。{0}3{1}ターン続く。クールタイムは{0}5{1}ターン。
skill_desc_51201=軍団の行動力がなくなった時、行動力を{0}1{1}回復する。毎ターン1回、{0}2{1}ターン続く。クールタイムは{0}5{1}ターン。
skill_desc_51202=軍団の行動力がなくなった時、行動力を{0}2{1}回復する。毎ターン1回、{0}3{1}ターン続く。クールタイムは{0}5{1}ターン。
skill_desc_51211=行動力を{0}4{1}消耗して味方軍団の突撃ダメージを{0}15%{1}、迂回ダメージを{0}20%{1}上昇させる。
skill_desc_51212=行動力を{0}3{1}消耗して味方軍団の突撃ダメージを{0}15%{1}、迂回ダメージを{0}20%{1}上昇させる。
skill_desc_51221=軍団が同じ兵種で構成された場合、与ダメージが{0}4%{1}上昇する。軍団が異なる兵種で構成された場合、被ダメージが{0}4%{1}軽減される。
skill_desc_51222=軍団が同じ兵種で構成された場合、与ダメージが{0}8%{1}上昇する。軍団が異なる兵種で構成された場合、被ダメージが{0}8%{1}軽減される。
skill_desc_51223=軍団が同じ兵種で構成された場合、与ダメージが{0}12%{1}上昇する。軍団が異なる兵種で構成された場合、被ダメージが{0}12%{1}軽減される。
skill_desc_51224=軍団が同じ兵種で構成された場合、与ダメージが{0}16%{1}上昇する。軍団が異なる兵種で構成された場合、被ダメージが{0}16%{1}軽減される。
skill_desc_51231=剣盾や斧と盾、槍盾を使用する部隊を率いる際、被ダメージが{0}5%{1}軽減される。
skill_desc_51232=剣盾や斧と盾、槍盾を使用する部隊を率いる際、被ダメージが{0}7%{1}軽減される。
skill_desc_51233=剣盾や斧と盾、槍盾を使用する部隊を率いる際、被ダメージが{0}10%{1}軽減される。
skill_desc_51234=剣盾や斧と盾、槍盾を使用する部隊を率いる際、被ダメージが{0}15%{1}軽減される。

