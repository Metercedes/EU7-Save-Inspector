stage_intro_30001=フランス北部のノルマン人オートヴィル家は破産危機に瀕していた。12人の息子と2人の娘を持つタンクレッドの財産はこれ以上分配する余裕はなく、長男のウィリアムは他のノルマン人に従ってエルサレムへ巡礼し、その後イタリア半島で機会をうかがっていた。
stage_intro_30002=1025年、「ブルガリア人殺し」バシレイオス2世が死去した。後継者が弱体だったにもかかわらず、バシレイオス2世が創設した軍隊は依然として強力で、より多くの穀物、綿花、砂糖を手に入れるために、皇帝は豊かなシチリア島を征服する主将としてゲオルギオス・マニアケスを選び、オートヴィルのウィリアムも300人の騎士とともに傭兵としてこの軍隊に加わった。
stage_intro_30003=メッシーナのサラセン人は、強大なギリシア人とノルマン人の傭兵に対抗する力を全く持っていなかったが、連合軍の士気は高くなかった。東ローマの主将、ゲオルギオス・マニアケスは身長10フィートで、非常に荒々しく、兵士をしばしば体罰していた。
stage_intro_30004=ギリシャ人によって西シチリア島の城塞は次々と占拠され、その攻撃はまるで枯れ木を折るように容易であった。死の気配が西シチリア島全体に広がった。
stage_intro_30005=年間で12の城塞と要塞がギリシャ人によって占領されたが、シラクサにおいての彼はそこまで幸運に恵まれなかった。駐留していたエミールが強力な抵抗を展開し、ギリシャ人の攻撃を何度も退ける。
stage_intro_30006=東ローマ皇室はマニアケスの勝利を心配し、彼が支配者となってコンスタンティノープルに入城することを恐れていた。そのため、補給を削減し、傭兵たちの給与を停止する。マニアケスは再びノルマン人を公然と侮辱し、ウィリアムとノルマン傭兵は遠征軍を離れることを決意した。
stage_intro_30007=神聖ローマ帝国と東ローマ帝国の圧力の間に挟まれたランバルディア人は、彼らの剥奪に耐えかねて反乱を起こした。前任のランバルディア指導者が暗殺された後、ノルマン人とランバルディア人はベネヴェントのアティヌルフを彼らの指導者に選出した。
stage_intro_30008=東ローマ人はノルマン人とランバルディア人の連携に怒りを感じ、イタリアにおける東ローマの将軍ミカエル・ドゥーカスとの交渉が失敗した後、戦争は避けられなくなった。
stage_intro_30009=ノルマン人のイタリアでの強さは徐々にランバルディア人に認められ、ますます多くのノルマン騎士がこの地にやって来ては、名声を得る機会を求めた。これはウィリアムの勢力拡大にもつながった。
stage_intro_30010=東ローマ軍はますます正面でノルマン人に勝てなくなり、多くの人々を買収した。これにはランバルディアの首領アティヌルフも含まれている。ノルマン人たちは勝利が遠のきつつあることを感じていた。
stage_intro_30011=ランバルディア貴族、サレルノ大公ガイマール4世はノルマン人に土地を約束し、自身の姪をウィリアムに嫁がせた。大公はウィリアムを正式に「アプリア公爵」として封じ、この地域をノルマン人の有力者12人に分割した。
stage_intro_30012=1044年、ガイマールはウィリアムを招き、南イタリアのカラブリア地方征服を提案し、征服後の土地をノルマン人に約束した。これにより、ノルマン人は再び遠征の旅に出ることとなった。
stage_intro_30013=1045年、ウィリアムとガイマールが再び遠征の準備を始める前夜、ウィリアムは熱病にかかり、36歳で亡くなった。

family_letter=記載
family_letter_desc_101=親愛なる父よ、私はすでにエルサレムを離れ、叔父と共にイタリアに向かいました。幸運にも私たちは道中順調でした。地中海の気候はノルマンディーのそれよりもずっと良いです。ここで自分の道を切り開き、この命に代えても、名誉を手に入れます！......最後に、母と兄弟姉妹の平安を祈ります。 ......
family_letter_desc_102=......親愛なる父よ、我々はシチリアで苦戦を強いられています。サラセン人よりも、あの忌々しいギリシャ人マニアケスこそが私たちの最大の敵なのです。彼は人命を顧みません。神の加護がなければ、我が兄弟が勇敢でなければ、十の命をもってもシチリアでの生涯を賄い切れなかったでしょう......
family_letter_desc_103=......親愛なる父よ、私たちは2年間ギリシャ人のために働き続けてきました。何百回もの戦いを経験し、体に次々と傷を増やしてきたが、報酬はどんどん少なくなっています。生きて帰ることができるか、果たして分かりません。神のご加護があらんことを。......
family_letter_desc_104=親愛なる父よ、私たちはもう3カ月も報酬を得ておりません。 ここで得るのは傷跡や苦痛のみ、富も名誉も手に入りません。ここを離れる時が来たのでしょう......
family_letter_desc_105=親愛なる父よ……マニアケスが東ローマ皇帝に呼び戻された後、イタリアでのギリシャ人はもはや恐れるに値しない存在となりました。私はチャールズ大帝のような無畏の人物になりたいと願っています。新たな開拓者に！しかし、ノルマン人たちはわずかな利益のために争い続けている。栄光も名誉も彼らにとっては何の意味もないのです。 ......
family_letter_desc_106=親愛なる父よ……私はカンネーに向かう途中です。あの呪われた場所で、20年前に私たちの同胞がギリシャ人に敗れました。しかし、ここは同様にギリシャ人の呪われた場所でもあります。ハンニバルはここでローマ人に最も恥辱的な敗北を与えたのです。神のご加護があらんことを......
family_letter_desc_107=親愛なる父よ……父上は今や天国におられますが、私はあなたに知らせたい。ついに目標を達成した。私は爵位と領地を与えられ、ノルマン人をイタリアの新たな支配者となるのです。 ......

