campaign_end_desc_60=イザベラとロジャーはエドワード2世に王位を放棄させ、息子エドワード3世に後を継がせた。エドワード3世の跡継ぎは、第二次スコットランド戦争の勃発を促しただけでなく、イングランドとフランスの百年戦争を開始させた。
campaign_end_desc_61=コンスタンティノープルの陥落と再建は、ビザンティン人に西側のラテン世界が彼らに対する大きな脅威を認識させた。その同時に、東方のアナトリア半島では、とある新生帝国がビザンティン帝国に対して蠢いている。
campaign_end_desc_62=オスマン帝国の台頭はもう止められないが、ビザンティン帝国も彼らに屈することはない。また、西欧のキリスト教国もビザンティンの滅亡を黙って見ていられない。一方、東方ではとある突厥の部落が段々台頭し始まっていて、オスマン帝国の拡大は順風満帆ではない。
campaign_end_desc_63=結局、エドワード3世はフランス王になることはなかったが、両国間の戦争は続いていた。 長引く戦争は、イギリスとフランスを果てしない深淵に引きずり込み、莫大な借金と蔓延る疫病により、両国は一時的に再戦不可能な状態に陥った。
campaign_end_desc_64=最終的にはフランスが勝利したが、この100年にわたる戦争は英仏両国民に大きな苦しみを与えた。戦後、イングランドは大陸の領土のほとんどを失った。
campaign_end_desc_65=コンスタンティノープルの陥落はビザンチン帝国の終焉を意味する。帝国の栄光はついに過ぎ去った。ビザンティン帝国の崩壊は中世の終わりを告げたと同時に、ヨーロッパの新たな覇者の誕生を意味している。
campaign_end_desc_66=戦争の終結により、イングランドにおけるプランタジネット朝の支配が終わり、ウェールズ人のテューダー朝が始まった。また、イギリス中世が終了し、新しいルネッサンスの時代が始まったことを意味している。

