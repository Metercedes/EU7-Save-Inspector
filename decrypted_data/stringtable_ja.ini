;兵种描述

troop_desc_101=剣と盾を持つ部隊。戦闘技術に乏しいので、プロの軍人とは比較にならない。
troop_desc_102=剣と盾を持つ部隊。ある程度の軍事訓練を受けたので、基本的な戦闘技術を持っている
troop_desc_103=標準的な軍事訓練を受けた人によって構成された部隊。 ただし、それでもプロの兵士にはかなわない。
troop_desc_104=剣と盾を持つ部隊。頑丈な盾は最大の特徴となる。
troop_desc_105=装備は優れていて、軍事素養が極めて高い戦闘部隊。軍隊中の精鋭部隊である。
troop_desc_107=両手に持った大剣を操り、近接戦闘を得意とする部隊。どんな敵にも負けない圧倒的な戦闘力を発揮できる。
troop_desc_108=三大騎士団の一つ。高い戦闘力を持つ歩兵部隊である。
troop_desc_109=伝統的な戦法を操り、好戦的な猛士。どんな軍隊でもエリートと言われる存在である。
troop_desc_110=その巨大な斧は彼らの優秀さの象徴である。その卓越した装備は彼らが間違いなく戦士のエリートであることを示している。
troop_desc_111=厚い装甲と高い士気を持ち、高い攻撃力を誇る重装歩兵である。
troop_desc_112=極めて品質の高い装備を持つ精鋭部隊。非常に高い戦闘能力を持っている。
troop_desc_113=ビザンティン帝国の親衛隊で最も輝かしい部隊。各地の精鋭戦士によって構成されている。
troop_desc_114=鍛え直された鎧は、太陽の光を浴びて黄金のように輝いている。最強の戦士だけが身に付けられる重装備である。
troop_desc_115=唐朝の精鋭部隊。彼らが持つ横刀は非常に長く、真っ直ぐで鋭く、鎧を破るための強力武器であった。
troop_desc_201=現地の民間人によって構成された民兵部隊。主に都市の防衛と支援に当たる。
troop_desc_202=長槍を持つ部隊。騎兵にかなりのダメージを与えることができる。
troop_desc_203=標準的な軍事訓練を受けた人によって構成された部隊。ただし、プロの兵士にはかなわない。
troop_desc_204=剣と盾を持つ部隊。頑丈な盾は最大の特徴となる。
troop_desc_205=精鋭戦士によって構成された部隊。騎士にかなりのダメージを与えるし、主力歩兵として使える。
troop_desc_206=スコットランド長槍兵は、他の部隊とは比べ物にならない規律を持っている。
troop_desc_207=高い警戒心を持ち、通常は重要な仕事を任される。
troop_desc_208=ローマ帝国から受け継いだ戦闘軍団。槍を手にした彼らは、敵の攻撃を恐れない。
troop_desc_209=密集陣形を使い、あらゆる敵の攻撃に対応することができる。
troop_desc_210=敵の攻撃に対して強力な防御力を発揮する。攻撃時には非常に勇敢で獅子奮迅の働きを見せる。
troop_desc_211=戦場での万能選手であり、歩兵軍団で重要な役割を担っている。戦争ではよく武勲をあげる。
troop_desc_212=唐朝の精鋭部隊。彼らが持つ陌刀は長さ約3メートルで、威力も絶大で、騎兵隊にとっては悪夢のような存在であった。
troop_desc_301=迅速で俊敏な動きを持つ斥候騎兵。戦場で敵の動きを察知することができる。
troop_desc_302=攻撃と防御を兼ね備えた騎兵部隊。騎馬戦の主力である。
troop_desc_303=貴族を護衛して戦う騎兵部隊。突撃時に敵に大きなダメージを与えることができる。
troop_desc_304=装備の整った重装騎兵。騎兵部隊の精鋭である。
troop_desc_305=馬上での戦いに慣れたが、徒歩での戦いぶりを見せる時もある。
troop_desc_306=スピードを活かして敵陣に突撃することを得意とする部隊。突撃には最適な部隊である。
troop_desc_307=砂漠の精鋭騎兵部隊。砂漠地帯での戦闘では大きな優勢を持っている。
troop_desc_308=巨大な体格を持つ獣。戦場で敵に壊滅的な打撃を与えることができる。
troop_desc_309=三大騎士団の一つ。戦術に長けた強力な騎兵部隊である。
troop_desc_310=三大騎士団の一つ。高い戦闘力を持つ騎兵部隊である。
troop_desc_311=聖墓の守護者。強い信仰心を持つ騎士団。
troop_desc_312=モンゴルの騎兵隊はよく訓練され、規律正しく、威圧を持つ軍隊である。世界で前例のない壮大な帝国を築き上げた。
troop_desc_313=唐の皇帝李世民の親衛部隊。戦闘力抜群で黒い鎧に身を包み、規律を守っている。死を恐れることはない。
troop_desc_401=長槍を持つ騎兵部隊。突撃時に敵に大きなダメージを与えることができる。
troop_desc_402=封建制度のあった中世ヨーロッパでは、子供の頃から軍事訓練を受けた騎士は敵を怖がらせる存在である。
troop_desc_403=厚い装甲をまとった騎兵部隊。厳しい訓練を積んでこそ、装備の重さに耐えられるという。
troop_desc_404=貴族出身の精鋭騎兵。人も馬も最高級の装備を使っている。
troop_desc_405=厚い装甲を身にまといながらも、柔軟な動きを取れる部隊。どんな相手にも負けはしない。
troop_desc_406=貴族出身の精鋭騎兵。人も馬も最高級の装備を使っている。
troop_desc_407=様々な戦法に長けた騎兵部隊。非常に優れた突撃能力を持ち、戦場の王者と呼ばれている。
troop_desc_408=勇猛かつ強力な騎兵部隊。背後にある巨大な翼は最大の特徴である。
troop_desc_409=重装甲をまとった騎士が発動した突撃は、敵に壊滅的な打撃を与えることができる。
troop_desc_410=三大騎士団の一つ。非常にタフな戦い方をする騎兵部隊である。
troop_desc_411=貴族階級に鍛えられた騎兵隊。装備も充実しており、普段は大公の親衛隊として活躍している。
troop_desc_412=軍士は騎士団の主力であり、騎士より階級は低いが、戦場での重要性は否定できない。
troop_desc_413=唐朝の王族部隊。馬と共に黒い鎧を身にまとい、顔に仮面をつけている。暗雲のように敵に迫っていく。
troop_desc_414=東ローマ帝国の精鋭部隊。帝国の栄光を表している。重厚な鎧を身にまとい、剣や槍を恐れない彼らは大きな破壊力と衝撃力を持っている。
troop_desc_501=投擲武器の使用に長けた部隊。装備は貧弱だが、それでもかなりの戦闘力を持っている。
troop_desc_502=ジャベリンを投げる部隊。戦闘力は高くないが、敵の陣形を崩すには非常に有効である。
troop_desc_503=普通の軽装部隊。遠距離攻撃しかできず、通常部隊との接近戦はできない。
troop_desc_504=極めて扱いやすい長距離武器。密集射撃でダメージを与えることができる。
troop_desc_505=鎧を身にまとい、強力な複合弓を使う部隊である。
troop_desc_506=火縄銃を装備した部隊。射撃が命中すると敵に大きなダメージを与えることができる。
troop_desc_507=非常に扱いにくい武器。子供の頃から特別な訓練を受けた人にしか使えない。
troop_desc_508=傭兵で構成された部隊。装備は乏しい。
troop_desc_509=アメリカ大陸を制覇したスペイン王国の部隊。信じられないほど貪欲だが、非常に高い戦闘力を持っている。
troop_desc_510=装備の整った火縄銃部隊。射撃時の煙と大きな発射音は敵を怖がらせてしまう。
troop_desc_511=優れた射撃の腕を持つ弩兵。戦場では敵の命を容赦なく刈り取っていく。
troop_desc_512=背中に巨大な盾を背負う弩兵部隊。必要な場合、敵に背を向けて身を守る。
troop_desc_513=体を青く塗った戦士はゲリラ戦のエキスパート。 森の中で非常に高い戦闘力を持っている。
troop_desc_514=長弓兵の上級職。一斉に放たれた炎の矢は、敵に大きな脅威を与えることができる。
troop_desc_515=唐朝の精鋭部隊。彼らは諸葛の連弩を携え、天を遮るような矢の雨で敵に恐れられている。
troop_desc_601=優れた馬術を持つ騎兵部隊。揺れている馬上で槍を正確に投げることができる。
troop_desc_602=強力な弓を装備した騎兵部隊。乗馬や射撃には長けているが、近距離戦闘は苦手になる。
troop_desc_603=封建制度のあった中世ヨーロッパでは、子供の頃から軍事訓練を受けた騎士は敵を怖がらせる存在である。
troop_desc_604=動きが遅いが、重装甲をまとった騎士が突撃の際に投げたジャベリンはとても強力である。
troop_desc_605=騎乗と射撃を得意とする騎兵部隊。砂漠地帯での戦闘では大きな優勢を持っている。
troop_desc_606=戦象の巨大な体は、敵を倒す際に射手をしっかりと守ってくれる。
troop_desc_607=草原の戦士は子供の頃から馬に乗っているので、あらゆる奇襲作戦に長けている。
troop_desc_608=プロによって構成された騎兵部隊。幼い頃からさまざまな厳しい訓練を受けていた。
troop_desc_609=極めて戦闘力の高い機動部隊。ティムール帝国の戦闘力の象徴である。草原を駆け巡る能力で敵に恐れられている。
troop_desc_314=エドワード3世によって結成された騎士団。王家の中で最も高貴な者だけが加入することができ、忠誠と名誉の象徴である。
troop_desc_315=西遼の最強の武士と最良の馬によって結成された部隊。武勇に優れ、幾多の戦場を渡り歩いてきた彼らはどんな相手にも負けない。
troop_desc_415=勅令騎士はフランスの常備騎兵である。封建貴族の騎士より規律が正しく、装備の整った部隊である。

