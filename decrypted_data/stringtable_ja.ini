item_desc_3101=普通のサーベル。切れ味が良いが、非常に壊れやすい。
item_desc_3102=鍛造を繰り返してこそ、長い刃を支えることができる。
item_desc_3103=頑丈さと鋭さの両方を兼ね備えている。 一般の兵士が心の底から求めている武器。
item_desc_3104=両手を使って振り回す武器。 重くて切れ味が良い。
item_desc_3110=高品質な材料を使用した鍛造品。重いが、頑丈さと鋭さの両方を兼ね備えている。
item_desc_3111=騎兵のために作られた武器。騎馬戦に最も向いている。
item_desc_3112=草原の戦士たちがよく使う武器。彼らは武器の鋭さと馬の衝撃を完璧に組み合わせている。
item_desc_3113=丁寧に育てられた馬。優れた持久力と瞬発力を持っている。
item_desc_3120=竹で作った弓。強い靭性を持っている
item_desc_3121=軽くて速い十字弓。持ち運びには便利だが、威力はやや劣る。
item_desc_3122=作りが精巧で頑丈さと威力の両方を兼ね備えている短弓。
item_desc_3123=非常に良い材料で作られている。非常に重いが、威力と精度が大きく向上している。
item_desc_3130=勇気を示す戦旗。戦場で兵士の士気を高めることができる。
item_desc_3131=角笛の音は兵士の士気を大いに高めることができる。
item_desc_3140=ローマ帝国の文武と武官の官職表。
item_desc_3141=アングロ・サクソン人の初期の法律。
item_desc_3150=丁寧に作られた軍制式ローグソード。精鋭部隊しか装備できない。
item_desc_3151=丁寧に作られた軍制式ブロードソード。精鋭部隊しか装備できない。
item_desc_3152=最も老練な戦士しか使えない武器。
item_desc_3153=鍛造を繰り返して鍛えられた戦斧。重くて巨大である。
item_desc_3160=帝国の精鋭騎兵に支給された軍制式武器。
item_desc_3161=ノルマン騎士を乗せて勇猛に突撃できる馬。騎士たちに強力な戦力保障を提供している。
item_desc_3162=草原の牧民が丹精込めて育てた馬。優れた持久力と瞬発力を持っている。
item_desc_3163=ニサーン地方で生産された軍馬。頑丈な体が最も顕著な特徴である。
item_desc_3170=遊牧民族がよく使う武器。
item_desc_3171=威力が大きい武器。使いこなすのは非常に難しい。
item_desc_3172=品質が極めて高い武器。強力で射程は長いが、使いこなすには長期的な訓練を経なければならない。
item_desc_3173=金属で包み込んだ石弓。武器の耐久性は大幅に上がっている。
item_desc_3180=タイタンからの大きな音。人の心を奮い立たせることができる。
item_desc_3181=巨竜の咆哮は敵を震え上がらせるだけでなく、自分を激励することもできる。
item_desc_3190=王国を支配する王はそれなりの気概と姿勢を持たなければならない。
item_desc_3191=この世には存在していない重宝。君主の支配に大きな力を与えると言われている。
item_desc_3200=モーリス一世の軍事著作。ローマ軍の戦い方を載せている。
item_desc_3201=ビザンティン皇帝レオーン6世が書いた書物。ビザンティン帝国の軍事戦術の著作である。
item_desc_3210=帝国の精鋭戦士に支給された軍制式武器。
item_desc_3220=帝国の精鋭戦士に支給された軍制式武器。
item_desc_3231=歴代の著者が書いた医学書。幅広い医学理論を網羅している。
item_desc_3232=カエサルの著作集。「ガリア戦争」と「内戦記」を収録している。
item_desc_3233=出所不明の羊皮紙の巻物に記録された毒薬のレシピ。
item_desc_3234=東ローマ帝国が発明した液体焼夷弾。そのレシピは極秘として扱われている。
item_desc_3235=街の守備隊と装備の配備地図。ただし、持ち主は街の守備隊ではない。
item_desc_3236=毒を塗ったナイフ。暗殺に使われることが多い。
item_desc_3237=騎兵が使用するヘルメット。保護性能に優れている。
item_desc_3238=弓騎兵が着用する革製の鎧。柔軟性を損なわずにある程度の防御力を発揮できる。
item_desc_3239=守備隊が使用するハルバード。騎兵にかなりのダメージを与えることができる。
item_desc_3240=小型でシンプルな丸い盾。ある程度の防御力を備えている。
item_desc_3241=北方の戦士が使うヘルメット。不屈の勇気を象徴している。
item_desc_3242=決闘用の鋭い剣。容赦のない突きには優れた貫通力がある。
item_desc_3243=すり減った革靴。持ち主は長距離を歩いたに違いない。
item_desc_3244=草原の騎兵がよく使う装備。かつてヨーロッパの多くの騎士を苦しめていた。
item_desc_3245=矢を改良した重型クロスボウ。発射速度を犠牲にして貫通力を高めた。
item_desc_3246=騎兵がよく使う軽い盾。主に胴体を守るために使われる。
item_desc_3247=遊牧民が使う軍馬。風のように行ったり来たりできる。
item_desc_3248=星座が描かれた長い巻物。熟練した船乗りが迷わないように、星座が道しるべになっている。
item_desc_3249=砂漠の騎兵隊が使用する曲刀。抜群の切れ味を持っている。
item_desc_3250=古代ギリシャの英雄の名を冠した重厚なシールド。その重量によって防御力を総合的に向上させた。
item_desc_3251=古今東西の戦争における攻城戦の分析が載っている兵法書。
item_desc_3252=尖った形を持つ兜。帝国の厳しい軍規を象徴するものでもある。
item_desc_3253=細長い両手剣。勇敢な先鋒騎士が敵陣を突破するために使用すると言われている。
item_desc_3254=大陸周辺の水路情報を記録した海図。航海士にとって航海の拠り所となる重要なものである。
item_desc_3255=前任の指揮官が着用した兜。当時の戦いを象徴している。
item_desc_3256=図面を書くのに必要な道具。技術者はこれを使って数え切れないほどの素晴らしい機器を設計した。
item_desc_3257=重厚なウォーハンマー。腕力に優れた者のみが使用できる。
item_desc_3258=武将が身につける長刀。実用性よりも装飾性が重視されている。
item_desc_3259=騎兵がよく使う重い斧。重装甲の敵にもかなりのダメージを与えることができる。
item_desc_3260=優れた貫通力を持っている。使用するにはかなりの腕力も必要とされる。
