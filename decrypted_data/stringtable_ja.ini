battle_talk_3020201=アレクシオスの精鋭中央軍は強固だが、周囲の部隊を次々と破れば崩壊を引き起こせるかもしれない。
battle_talk_3020202=敵のヴァラング親衛隊が深く入り込みすぎている、奴らの士気を打ち砕け！
battle_talk_3020203=おや、ここを離れるべきか。
battle_talk_3020204=臆病者！
battle_talk_3020301=あのギリシャ人たちがまた来たぞ。
battle_talk_3020302=待ち伏せだ！
battle_talk_3020303=我々の物資補給がまだそこに残っている、敵にキャンプを占領させてはならない。
battle_talk_3020304=軍の士気が崩壊している、撤退しろ。
battle_talk_3020305=ボエモンが再び勝利したと思ったその時、補給品と戦利品はすべてアレクシオスに奪われ、遠征軍は急速に崩壊した。これにより、ボエモンはイタリアに戻って再計画を立てなければならなかった。
battle_talk_3020501=ナポリは私たちへ少なからず貢物を送り、唯一中立でいることを要求した。
battle_talk_3020502=戦争に勝利したものの、ボエモンは教皇と敵対することができず、妥協の末にターラント伯爵の称号を獲得した。しかし貪欲なボエモンはそれに満足せず、自分の王国を築くことを誓った。
battle_talk_3020801=我が部下が攻城塔を建設し、約3日後に完成する。両側の城門を直接強攻して占領すれば、城壁を突破できるだろう。
battle_talk_3020802=塹壕の準備は整っている。約2日後には南側の城壁に到達できるが、そちらが先に南側を突破すれば、我が軍は直接内壁に到達することも可能だろう。
battle_talk_3020803=こいつらは前回の烏合の衆とは違う。軍を再編成しなければならない。
battle_talk_3020804=これ以上抵抗する力はない、ギリシャ人に降伏に同意すると伝えてくれ。
battle_talk_3020805=セルジューク・テュルク人との秘密交渉の後、この都市はアレクシオスの軍隊に占領された。このため、タンクレードはビュザンティオン人に対して強い不信感を抱いた。
battle_talk_3020901=矢を放て、この野蛮人どもが足を固める前に始末しろ。
battle_talk_3020902=助けに来た、持ちこたえてくれ。
battle_talk_3020903=これらの村を略奪すれば、補給を得ることができるうえ、地元の人々をガイドとしてつかまえれば、隠された山道を発見することもできる。必要に応じて敵を迂回するのに使おう。
battle_talk_3021001=高い城壁には手も足も出せず、敵は動き始めている。サン・シモン港の輸送隊が唯一安定した物資供給源だ、必ずや彼らを守るのだ。
battle_talk_3021002=これ以上ケルボガに我々エミアを支配させるわけにはいかない。奴があの外来者たちと激戦している間に倒せ！
battle_talk_3021003=ケルボガの突然の死により、セルジューク朝は撤退を決め、ボエモンはついにアンジュクを手に入れた。
battle_talk_3021201=待ち伏せだ！
battle_talk_3021202=ああ、なんてことだ、ボエモンがトルクメン人に捕らわれてしまった！
battle_talk_3021203=ボエモンはその無謀さのために罰を受け、敵に捕らえられた。
battle_talk_3021301=敵の援軍だ、近くに大部隊がいるに違いない。
battle_talk_3021302=レバント人が団結して我々に立ち向かっている。勝ち目はない、撤退だ。
battle_talk_3021303=残念なことに、この戦役は最終的に失敗に終わり、ボエモンは領土を拡大することも資源を略奪することもできなかった。
battle_talk_3021501=これ以上ここにとどまれば我々は皆飢え死にする。ボエモンと共倒れになる必要はない。
battle_talk_3021502=アレクシオスから50万枚の金貨を受け取ったと聞いたが、どうやら本当のようだな。
battle_talk_3021503=帝国の精鋭がほとんどここに集結している、まず奴らを挑発し内戦を起こすのだ。陛下はあのノルマン人を大層気にされているようだ。
battle_talk_3021504=お前の負けだ。私のヴァラング親衛隊はまだ正式に参戦すらしていない。余計な考えは持たないほうがいい。
battle_talk_3021505=もしあの時我々がテュルク人と戦うお前を助けていなかったら、どうなっていたか考えてみろ！
battle_talk_3021506=戦場に「もしも」はない。家に帰れ、我が旧敵よ。私は次の戦場へ向かう。
battle_talk_3021507=アレクシオスはこの宿敵をあまりにもよく知りすぎていたのかもしれない。ボエモンは再び東ローマ皇帝に敗北した。

