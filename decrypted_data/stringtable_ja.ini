;战役介绍
stage_intro_1=ここは初級チュートリアルのステージである。基本操作を中心に移動や攻撃などの操作方法についてご紹介します。
stage_intro_2=ここは進級チュートリアルのステージである。高度な操作を中心に募集や解散、補給、部隊の混在などの操作方法についてご紹介します。
stage_intro_3=ここは中級チュートリアルのステージである。都市や城の建設、雇用軍の募集などの操作方法についてご紹介します。
stage_intro_4=ここは高級チュートリアルのステージである。主に機械の装備や使用、建物の機能についてご紹介します。
stage_intro_101=西暦376年、匈奴人の襲撃を避けるために、西ゴート人はローマ帝国に庇護を求めた。しかし、西ゴート人がドナウ川を渡った後、ローマ人と多くの衝突を起こし、最終的に双方はマルシアノープルで戦いを繰り広げた。
stage_intro_102=西暦378年、反乱を起こしたゴート人はドナウ川の各省を略奪した後、他の蛮族と連合してバルカン半島に侵入しようとした。ローマ皇帝ヴァレンスは自ら出征することを決めたが、彼の麾下にいる兵士の戦力は高くない。それは今回の反乱鎮圧作戦の最大の危険である。
stage_intro_103=西暦402年、西ゴート人の国王アラリックを中心に西ローマ帝国の奥地に侵入し続け、やがて重鎮ミラノを包囲した。これは皇帝ホノレにすごく不安を抱かせたため、帝国北部のステリコに兵を率いて南下するように命じた。
stage_intro_104=西暦410年、アラリックはホノレと約束した待ち合わせ場所でローマ軍に襲われた。今回の襲撃で彼は西ローマ帝国との交渉を放棄し、再びローマ城を包囲した。それによって「永遠の城」は何度も包囲攻撃を受けた後、ボロボロになっていた。
stage_intro_105=西暦419年、西ローマ帝国と盟約を締結したばかりのスエビ王国は、国境問題で隣国のヴァンダル王国と頻繁に衝突を起こした。征服欲の強いスエビの国王ハーメリックは、ヴァンダル王国の領地に侵入することを決定した。
stage_intro_106=西暦439年、ゲサリックは軍隊を率いてジブラルタル海峡を横断し、北アフリカにおける西ローマ帝国の大半の領土を占領した。西ローマ帝国と五年近くの平和を保った後、ゲザリックは再びローマ帝国の第三の名城「カルタゴ城」に目をつけた。
stage_intro_107=西暦451年、野心に満ちる匈奴人の王アッティラは、西ローマ宮廷の不祥事を言い訳にしてガリア地域に出兵することを決めた。ガリアにいるローマの将軍エティウスもこの機に乗じてガリア地域の蛮族王国と連合して匈奴人の侵略に対抗しようとしていた。
stage_intro_108=西暦455年、マクシムスは皇帝ウァレンティニアヌス3世を殺害して王位を簒奪した。これによってヴァンダル王国との同盟は破られた。オルドシア皇后の救援要請を受けた後、ゲサリックはイタリアへの出兵を決めた。
stage_intro_201=西暦6世紀、ヨーロッパ諸国は騎兵の重要性を認識しつつあった。530年、ペルシア人はビザンティン帝国に攻撃を開始した。ダラー城の外では、サーサーン朝の精鋭騎兵が準備を整えた。
stage_intro_202=ユスティニアヌス1世はローマの昔の輝きを再現しようとしていた。ゲリモーの簒奪は、彼に北アフリカへの出兵の口実を与えていた。西暦533年、ベリサリウスは部隊を率いて北アフリカに上陸し、カルタゴへ進軍を開始した。
stage_intro_203=ビザンティン帝国がアド・デキムムの戦いで大きな勝利を収めた後、ベリサリウスは軍隊を率いてカルタゴを占領した。カルタゴの西にいるゲリモーは、彼の兄弟に助けを求め、再び部隊を集め、ガタゴを奪還しようとした。
stage_intro_204=北アフリカを再び征服した後、ユスティニアヌス1世はイタリア地方に目を向けた。西暦535年、ベリサリウスは軍隊を率いて再び出征した。彼の皇帝のためにローマを占領し、イタリア地方を奪還しようとした。
stage_intro_205=ローマを占領した後、ラヴェンナへの道はビザンティン帝国の支配下に入った。ベリサリウスは軍隊を率いて進軍を続けている。東ゴート王国の首都はまもなくビザンティン軍隊の猛攻に直面することになる。
stage_intro_206=東ゴート王トティラの活躍により、ユスティニアヌス1世はベリサリウスを再びイタリアに派遣せざるを得なかった。西暦546年、トティラの部隊はローマに到着してこの都市を包囲した。
stage_intro_207=トティラがイタリア地方で侵略を続けることによって帝国は甚大な損失を被った。彼は艦隊を利用して海域を封鎖し、帝国軍がイタリア地域に入るのを防ごうとしていた。これによってユスティニアヌス1世は非常に不満を抱いていた。
stage_intro_208=イタリアの支配権を取り戻すために、ユスティニアヌス1世はナルシスをイタリアに派遣することにした。ナルシスと遭遇した後、兵力は劣勢であったが、伝統的なゴート人であるトティラは積極的に攻撃を開始した。
stage_intro_209=ナルシスの攻撃を阻止できないので、東ゴート人はフランク人とアレマン人に救援を要請することを決めた。彼らにイタリア地方に入り、ビザンティン軍の攻撃を阻止してほしかった。
stage_intro_210=西暦559年、一部の匈奴人は辺境を越えてコンスタンティノープルの郊外で悪事を働いた。これはユスティニアヌス1世にとって恥辱であった。彼はもう一度ベリサリウスを呼び戻し、最後の使命を与えた。
stage_intro_301=アングロ・サクソン人の到来によって、ブリテンの原住民はパニックに陥った。装備が優れてよく訓練された敵に対して、ブリテン人は武器を手にしてアングロ・サクソン人の侵入に抵抗せざるを得なかった。
stage_intro_302=南サクソン部族の首領エルは民を率いてブリテン島の南海岸に上陸したが、内陸への進行はうまくいかず、現地人の強い抵抗を受けていた。エルは自分の兵力が不足していることを意識し、まだ本土にいる部族に増援を要請した。
stage_intro_303=連年の戦乱で、ブリテンで散らばっている部族は合併し始め、それぞれの王国を築き始めた。しかしそれはブリテンに平和と安定をもたらしていない。部族間の戦いはノーサンブリア王国をはじめとする王国間のより大規模で残酷な戦争に発展していった。
stage_intro_304=西暦633年、エドウィン統治下のノーサンブリア王国は当時イングランド地域で最も強大な国となった。隣国はそれを恐れているため、グウィネズの国王カドバロンはマーシア王国と同盟を結び、連合軍を結成してノーサンブリア王国に侵入することを決定した。
stage_intro_305=グウィネズ王国とマーシア王国の連合軍の侵入を防ぐことに成功したが、ノーサンブリア王国も深刻な被害を被り、王国は一度分裂にも至った。西暦634年、グウィネズ国王カドバロンは再びノーサンブリア王国に出兵することを決めた。
stage_intro_306=オズワルドの復帰と後継によってノーサンブリア軍はグウィネズ王国に勝った。王国は再び平和と安定を得た。西暦644年、十年間の国力の回復に伴い、オズワルドはマーシア王国を攻撃することを決定した。
stage_intro_307=オズワルドによるマーシア王国への侵入は結局惨敗に終わった。ペンダはこの機会に乗じてにイースト・アングリア王国とグウィネズ王国を連合して戦火をノーサンブリア本土に導くことにした。西暦655年、ノーサンブリア王国はベルネシアだけが連合軍に攻略されていなかった。
stage_intro_308=マーシア王国は長い間、イングランド南部の多くの王国を強引に支配することで覇者の地位を維持していた。西暦825年、ベエンウォフは自分の権威を固めるために、自ら軍を率いてウェセックス王国に侵入した。これによってウェセックス王エグバートは奮起して反撃を始めた。
stage_intro_401=使者がガサンニードに殺されたため、アラブ人は報復を起こすことにしたが、その行動はビザンティンに知られた。その後、ビザンティンはすぐに要塞に軍隊を集結させた。強力なビザンティン軍の前で、アラブ人の復讐は失敗する運命にあるように見える。
stage_intro_402=ハーリドが部隊を率いてマギー・ラシットに来た時、ガサンニード人はアラブ人が彼らの脅威にはならないと思っていた。しかしその後、アラブ人はすぐに彼らの極めて強い戦力でそれが大間違いと証明した。
stage_intro_403=アブはアラブ初のカリフになった後、アラビア半島以外に勢力を広げようとし始めた。アラブ軍は北へと進み、ダマスカスに攻撃を開始した。
stage_intro_404=アラブ人の進攻を阻止し、失った領土を取り戻すため、ヘラクレイオスはレバントに大規模な軍隊を派遣することを決めた。敵の接近に伴い、アラブ人はダマスカスから撤退し、ヤルムークに部隊を再集結した。
stage_intro_405=ヤルムーク平原でビザンティン軍と戦った後、アラブ人は引き続き前進し、より多くの都市を占領することを決めた。西暦636年、アラブ軍はエルサレムに到着し、この都市を包囲した。
stage_intro_406=アラブ人の征服は依然として続いていた。彼らの部隊はアナトリア半島で勝利を収め続けている。立て続けの敗戦と都市の陥落は、ビザンティン帝国に恐怖を感じさせた。彼らにはその強敵に打ち勝つ方法が必要であった。
stage_intro_407=サーサーン朝に勝った後、オマルは彼のアラブ戦士を率いてアフリカに進出させることにした。アラブ人はエジプトを原点にして、より多くのアフリカの土地を自分の領土として占領することを計画している。
stage_intro_408=サーサーン朝の支配を完全に終えた後、アラブ人はビザンティン帝国を主要な敵対目標とした。地中海地域でビザンティン帝国に対抗するために、彼らは強力な海軍を作り上げた。
stage_intro_501=西暦865年、とあるヴァイキングの大軍が海を渡り、ブリテンの土地に上陸し、沿海の修道院などの施設に奇襲と略奪を行った。
stage_intro_502=ヴァイキングが侵攻して以来、イースト・アングリア王国とノーサンブリア王国は次々と占領されていた。ヴァイキングの次の目標はウェセックス王国である。
stage_intro_503=レディングの戦いで優勢を獲得したヴァイキングは前進を続け、アッシュダウンの地域で再びウェセックス軍と戦った。
stage_intro_504=数十年にわたる侵入と略奪を経て、ウェセックス王国を含む数少ない勢力は依然としてアルフレッドの指揮下でヴァイキングの侵入に抵抗していた。
stage_intro_505=西暦893年、再びブリテンに上陸したヴァイキングは再びアングロ・サクソン人と衝突した。戦術が変わったため、ヴァイキングの侵入はあまり効果がなかった。
stage_intro_506=西暦937年、北方の三王国は連合を結成し、イングランドを占領しようとしていた。敵の侵入に直面して、アゼルスタン王は軍隊を集めて北へ進軍した。
stage_intro_507=イングランドの王位を争奪するために、ノルウェー王ハロルド・ハラールは彼の盟友と共に軍隊を集めてヨークシャーに進軍することを決定した。
stage_intro_508=イングランド国王「懺悔王エドワード」が死亡した後、王座を狙った者は蠢いている。ノルウェーから来たハーラルは自分の部隊を率いて、イングランドに攻撃を発動した。
stage_intro_601=ビザンティン帝国とブルガリア帝国との戦いは長く続いていた。西暦811年、ニケフォロス1世は軍隊を率いてブルガリアを攻めた。連続的勝利を収めた後、プリスカへの進軍を決定した。
stage_intro_602=プリスカの戦いの後、ビザンティン帝国とブルガリア帝国は大きな損失を受けたが、ブルガリア帝国は依然として過激な攻勢を維持していた。損失が甚大であったにもかかわらず、ビザンティン帝国は平和協定への署名を拒否した。
stage_intro_603=ミハイル2世が戴冠した後、トーマスという将軍が彼の支配に反抗することを決定し、多くの人の支持を得た。彼は人々の支持を得てアラブ人と連合してコンスタンティノープルに攻撃を仕掛けた。
stage_intro_604=ビザンティン教士が追放された行為に報復するため、レオーン6世はブルガリア商人をコンスタンティノープルから追放することにした。これはサイモン1世に戦争を起こす口実を与えたが、この時ビザンティン軍の主力は東線でアラブ人に抵抗していた。
stage_intro_605=摂政王となった後、ゾーイはブルガリア帝国に譲歩しないことを決定した。サイモン1世はこれを機に再びビザンティン帝国に攻撃を仕掛けた。サイモン1世の独断によって、ビザンティン人は独自で戦うことを余儀なくされた。
stage_intro_606=西暦922年、ブルガリア人はバルカン地域の大半を支配下に置いたが、海軍が不足しているため、コンスタンティノープルを脅かすことはできなかった。ブルガリア人はアラブ人と連合しようとするが、ビザンティン人に阻止された。
stage_intro_607=アラブ人との戦いを終えた後、ビザンティン帝国は短時間で実力を回復し、ブルガリア帝国を急速に破った。しかしキエフ大公国は虚に乗じて侵入してきた。バルカン半島に再び新たな強大な敵が現れた。
stage_intro_608=西暦971年、ブルガリア人の敗戦によりビザンティン人はブルガリアの土地を多く占領した。自分の土地を取り戻すために、長年に渡ってブルガリア人が攻撃を続けていた。
stage_intro_609=トラヤヌスの門の戦いの後、ビザンティン帝国で内戦が勃発した。サミュエルはこの状況を利用してビザンティン帝国に攻撃を開始した。西暦996年、サミュエルはテサロニケのビザンティン軍を破り、南へ進軍し始めた。
stage_intro_610=1000年から、ビザンティン皇帝バシレイオス2世はブルガリアへの出兵を決定した。双方に勝負があったにもかかわらず、戦争は両国の国境まで広げた。今、ビザンティン帝国と衰退したブルガリアの間の悪戦は避けられない。
stage_intro_701=1066年、ノルマンディー公はイングランドの王位を取得するために、部隊を率いて海峡を渡り、イングランドに上陸した。ハロルド2世はこの情報を掌握したら、すぐ軍隊を集めて南下し、ヘイスティングズ付近に守備軍を配置した。
stage_intro_702=ヘイスティングズの戦いでハロルド2世を破った後、ウィリアムは部隊を率いてロンドンに到着した。ロンドンの安全を確保するために、彼はサザークに部隊を派遣し、そこの抵抗勢力を消滅しようとしていた。
stage_intro_703=イングランドを征服することに成功した後、エクセターにいる人々はウィリアムへの忠誠を拒否した。エクセター人を支配に従わせるために、ウィリアムは部隊を率いてこの都市を包囲したが、強い抵抗を受けた。
stage_intro_704=大多数の支持を得たにもかかわらず、抵抗勢力が依然として存在し、ウィリアムの支配に抵抗している。彼らの多くは北に集中していた。ウィリアムは部隊を北上させることにしたが、平和的なやり方でこれらの人々の忠誠を得ることはできないと思っていた。
stage_intro_705=1075年、ノルマンディーに戻ったウィリアムは、エマとラルフの結婚を拒んだ。その行為によって三人の伯爵が蜂起を引き起こし、ウィリアムがノルマンディーにいるうちに、彼の支配を抵抗し、打倒することを決定した。
stage_intro_706=1105年、ヘンリー1世は部隊を率いてノルマンディー公ローベルの領地に侵入し、バヨとカーンを占領した。翌年、ヘンリー1世はノルマンディーに戻り、ローベルに忠誠を尽くした貴族の一人あるモルタン伯爵は、彼の第一の目標となった。
stage_intro_707=1119年、フランス国王ルイ6世は部隊を率いてノルマンディーを攻撃した。ノルマンディーでの自分の財産と領土を守るために、ヘンリー1世はフランスと戦わせられた。
stage_intro_708=1135年、ヘンリー1世の突然の病死によってイングランドは無政府状態の混乱に陥った。スティーヴンとヘンリー1世の娘マティルダは、それぞれの勢力を率いて、イングランドの王位を争うために戦いを始めた。
stage_intro_801=1048年、セルジューク王子が軍隊を率いてビザンティン帝国の支配下にあるアルメニア地方に入った。自身の兵力が不足しているため、ビザンティン人は保守的な戦略を採用し、援軍の到来を待つことにした。
stage_intro_802=1071年、弱くなってきたビザンティン帝国は、セルジュークがエジプトのファーティマ軍に専念することを利用し、アルメニアを急襲させ、失った土地と要塞を奪還しようとしていた。
stage_intro_803=エーゲ海でのセルジューク帝国の活動はビザンティン帝国を脅かし続けている。セルジューク帝国の海軍に対抗するために、アレクシオスは艦隊を結成させ、エーゲ海の支配権を奪還すると決めた。
stage_intro_804=強気なセルジュークはビザンティン帝国に抵抗できず、皇帝アレクシオスは西方に援助を求めることにした。ビザンティン軍の協力を得て、東征の大軍は海を越え、初戦の目標をニカイアに向けた。
stage_intro_805=より多くのビザンティン援軍の加入に伴い、東征軍の戦闘力はますます強くなった。東征軍はアンティオキアへ向かっていたが、この都市はコンスタンティノープルからエルサレムまでの途中に位置している。
stage_intro_806=アナトリア前線の防御を強化するために、病状が好転したアレクシオスは自ら戦場に行くことにした。彼の軍隊はセルジューク人を何度も破り、追加兵力を獲得した後、再び敵に攻撃を仕掛けた。
stage_intro_807=1176年、ビザンティン皇帝マヌエル1世は、ハンガリーとセルビアからの脅威を解除した後、東にあるルーム・セルジューク朝に力を集中し、アナトリア草原を奪還すると望んでいる。
stage_intro_808=マヌエル1世はアナトリアを奪還する絶好の機会を失い、大量の攻城機械を失った。その時、略奪を終えて帰ってきたセルジューク軍は、彼らに勝利の希望を見せた。
stage_intro_901=セルジューク人の首都ニカイアを攻略した後、遠征軍は猛烈な反攻を受けた。アルスラーン1世は大量の部隊を率いて、ボエモン1世の部隊を包囲した。
stage_intro_902=アンティオキアの占領に成功した後、東征軍は勢いよく進み、エルサレムに向かって前進し続けた。同時にエルサレムに駐屯していたアラブの将軍ドラも、すでに防御の準備を整えた。
stage_intro_903=第一次東征で勝利を得た西方の領主たちは勝利の喜びを味わったため、再び東征を開始することにした。今回はダマスカスが彼らの初めての目標となった。
stage_intro_904=アッコは地理的に優れており、サラーフッディーンの支配下にある非常に重要な都市である。サラーフッディーンが敵が再び部隊を結集してアッコ城まで侵入したことを知ったら、すぐ部隊を集めて迎撃に向かった。
stage_intro_905=サラーフッディーンに奪取されたエルサレムを取り戻すために、西ヨーロッパの領主たちは再び東征軍を組織した。大軍がアナトリアに入った時、セルジューク人の猛烈な攻撃を受けた。
stage_intro_906=獅子心王リチャードがエルサレムから撤退した後、サラーフッディーンはヤッファに攻撃を仕掛けると決めた。それを知った獅子心王は再び軍隊を集結させ、サラーフッディーンに攻撃をかけた。
stage_intro_907=東征軍がエルサレムへの進行に準備をしていた時、彼らの指導者はアレクシオス4世の要請に応じて、彼の父が皇位を取り戻すのを助けるためにコンスタンティノープルに行くことを決めた。報酬として、ビザンティン帝国は彼らに経済的または軍事的な援助を提供してくれる。
stage_intro_908=長い戦いを経て、東征軍はエジプトがエルサレムの奪還を阻害する最大の障害だと考え始めた。そこで彼らは軍隊を組織して地中海を越えてエジプトに攻撃することを決めた。
stage_intro_1001=ウェールズの反乱により、ヘンリー2世はノルマンディーからイングランドに戻らなければならなかった。1165年、ウェールズ人に罰を与えるために、ヘンリー2世は巨大な軍隊を集結させ、ウェールズ人に攻撃を開始した。
stage_intro_1002=イングランド王位の継承権を奪うために、アーサーとジョンは長期的な闘争を行った。ジョンがイザベラと結婚を決めた後、そのバランスは徐々に崩れ、ユーグ10世とフィリップ2世の加入は状況をより一層混乱させた。
stage_intro_1003=ジョンが協力しないことによって、フィリップ2世は自分の手でノルマンディーの土地を奪還すると決めた。1203年、フィリップ2世はガイヤール砦に出兵し、ここはノルマンディー全体を支配する鍵だと思っていた。
stage_intro_1004=1213年、ウィリアムが率いるイングランド艦隊は偶然にフランス艦隊を発見した。フランスの乗組員はすでに上陸して略奪を開始していた。無人艦隊に向かって、イングランド人はすでに勝利をに手に入れたように見える。
stage_intro_1005=1214年、イングランド王国や神聖ローマ帝国、フランドルより構成された連合軍はフランス王国に攻撃を開始した。フィリップ2世は迅速に大軍を集結させた。連合軍の勢いは大きいが、よく訓練されたフランスの騎兵は敵に遅れを取っていないように見える。
stage_intro_1006=ヘンリー3世が執政を務めた時に、イングランド国内の飢饉が激化し、ヘンリー3世に対する貴族たちの不満も高まっていた。シモン・ド・モンフォールが率いるヘンリー3世の支配に抵抗する戦争が近づいている。
stage_intro_1007=エドワード1世の監督の下で、スコットランド人は新しい王を選出した。エドワード1世はスコットランドがイングランドに統治された侯国になるべきだと考え、イングランドと共にフランスに対抗すると要求した。しかし、スコットランド人はそれに反対し、フランスと同盟を結んだ。
stage_intro_1008=ウィリアム・ウォレスの案内で、スコットランド軍はイングランドへの攻撃を続けている。1298年、エドワード1世はフランス王国と休戦し、イングランドに帰ってスコットランドの進攻に集中すると決めた。
stage_intro_1009=フォルカークの戦いで勝利を収めた後、スコットランドはイングランドにほぼ征服された。1306年、ロバート・ブルースがスコットランドの王位を獲得した。エドワード1世が病死した後、エドワード2世の統治は思わしくないため、戦局が逆転した。
stage_intro_1010=1323年、ロジャー・モーティマーはロンドン塔から脱出してイザベラと知り合った。双方ともエドワード2世に不満を抱き、彼の支配に抵抗すると決めた。1326年、イザベラとモーティマーは密かにイングランドに戻り、彼らへの抵抗行動を開始した。
stage_intro_1101=コンスタンティノープルが陥落した後、ニカイア帝国とエピロス専制侯国はビザンティンの亡命政権となった。両方とも先にビザンティン帝国を復活させることを望んでいたが、この目標によって両方の間で衝突が勃発した。
stage_intro_1102=ニカイア帝国はエピロス専制侯国との争いで最後の勝利を収めた。野心にあふれたミハイル8世の下で、ニカイア帝国はコンスタンティノープルに君臨したラテン帝国に目を向けた。
stage_intro_1103=1261年、ニカイア帝国はジェノヴァ共和国と同盟を結び、もう一度コンスタンティノープルに攻撃しようとした。ラテンの駐屯軍とヴェネツィア艦隊がまだ遠征から戻っていないことを発見した時、そんな千載一遇のチャンスを無駄にしてはいけないと決めた。
stage_intro_1104=ビザンティン帝国を再建した後、ミハイル8世は周辺のラテン帝国の残存勢力を粛清しようとした。1263年、ビザンティン軍はアカイア公国に攻撃を開始したが、向こうの首都を占領した時に頑強な抵抗を受けた。
stage_intro_1105=プリニッツァの戦いの失敗によって、ビザンティン帝国はモリアでますます受動的立場になり、雇用軍の逃走や部隊が分散した問題は非常に深刻になっていた。1264年、ウィリアム2世の下で、ラテン帝国は分散したビザンティン軍に対して攻撃を開始した。
stage_intro_1106=1274年、ビザンティン帝国はセサリのジョンに対して攻撃を開始した。ビザンティンの大軍に向かって、ジョンは他国に救援を要請するしかできない。
stage_intro_1107=帝国のエーゲ海に対する支配権を維持するために、ビザンティン帝国は海軍を再結成した。しかし、モリアとセタポツの戦いの失敗で軍隊は大きなダメージを被ったため、ラテン貴族はデミトリアス港にいるビザンティン海軍を攻撃すると決めた。
stage_intro_1108=アンジュー・シチリア王国にとって、ベラトは戦略的な要塞都市である。1280年、ビザンティン帝国の重要地帯が敵に侵入されることを防ぐために、ビザンティン帝国は軍隊を派遣してベラトを攻撃した。
stage_intro_1201=1302年、ミハイル9世の軍隊はオスマン人を恐れて解散を宣言したため、アンドロニコス2世は軍隊を派遣してボスポラス海峡を渡って、ニコメディアでの厳しい状況を解決することを余儀なくされた。
stage_intro_1202=1321年、若いアンドロニコス3世は、祖父が年老いすぎて、自分が皇帝の座に就くべきだと思ったため、祖孫二人はすぐに内戦を始めた。オスマン人はこの機会に乗じてブルサ城を制圧すると決めた。
stage_intro_1203=ラテン帝国からコンスタンティノープルを奪還した後、ビザンティン人はギリシャ地域を支配するために、アナトリア東部前線にいる部隊を呼び戻した。これを機に、オスマン帝国は新たな攻撃を開始した。
stage_intro_1204=1329年、アナトリアでビザンティンの支配した区域が急激に縮小した。周辺地域を安定させるためにアンドロニコス3世はニコメディアに軍隊を派遣すると決めた。しかし、ペレカノンでオスマン軍からの迎撃を受けた。
stage_intro_1205=ビザンティンは内乱で滅亡寸前に陥った。ジョン6世は、息子を救出するためにオスマン帝国に救援を頼んだ。これから彼らはセルビア帝国と第二次ブルガリア帝国の連合軍と対峙することになる。
stage_intro_1206=1352年、ビザンティンは再び内戦に陥り、雇用軍としてのオスマン人はガリポリ付近要塞の支配権を獲得した。1354年、とある地震によってガリポリの状況は一変した。
stage_intro_1207=オスマン帝国は1352年にバルカン半島で最初の砦を占領した後、ヨーロッパで急速に拡大し始めた。ブルガリア皇帝イワン・アレクサンドルは、彼らの侵攻を阻止しようと決めた。
stage_intro_1208=ガリポリを占領した後、バルカン南部でのオスマン帝国の拡張はより激しくなった。一連の激動と整備を経て、オスマン帝国はビザンティン帝国の第三大都市ハドリアノポリスに攻撃を仕掛けると決めた。
stage_intro_1301=1337年、フランス議会はイングランドからアキテーヌ公国を回収することを決定し、双方の矛盾は一気に噴出した。イギリス海峡の制海権を奪取するために、エドワード3世は自ら艦隊を率いてフランス海軍に攻撃をかけた。
stage_intro_1302=制海権を握ったエドワード3世は、ポーツマスから兵を率いてフランス北岸に到達した後、攻撃を開始した。強力なフランス軍は防衛の準備を整え、クレシー周辺で両軍の対決が始まろうとしていた。
stage_intro_1303=エドワード3世はクレシーの戦いで勝利を収めたことを喜び、イングランド軍はこの勝利に乗じて、ヨーロッパ大陸の橋頭堡であるカレーを制圧しようと決めた。しかし、これほど困難な戦いになるとは思ってもいなかった。
stage_intro_1304=1346年9月、イングランド軍がカレーを包囲しているとき、フィリップ6世は急遽、デイヴィッド2世にイングランドを攻撃し、エドワード3世を撤退させようと要請した。デイヴィッドは、フランスとの長年にわたる同盟関係を考慮し、イングランドに攻撃を仕掛けることを決意した。
stage_intro_1305=ブルターニュは地理的に非常に重要な位置にある。ブルターニュの後継者争いを巡ってイングランドとフランスは揉め始めていた。どちら側もブルターニュを自分の陣営に引き込み、戦場で有利を占めようと望んでいる。
stage_intro_1306=1356年、黒太子エドワードはイギリス軍の騎兵統帥となり、イギリス軍を率いてフランスの土地で焦土政策を施行し、かなりの成功を収めた。ジョン2世は黒太子に報復するために、イギリス軍に追いつくよう行軍速度を増やすことにした。
stage_intro_1307=ポワティエの戦いで捕虜となったフランス国王ジョン2世は、多くの領土をイングランドに割譲した。そして、エドワード3世の野望はそれだけにとどまらず、遠征を決行し、ランスでフランス国王として戴冠しようとしていた。
stage_intro_1308=フランスは甚大な被害を被ったが、一国の王が城を空けるなど一大事なので、シャルル王子はランスに行き、王として戴冠式を行おうとしていた。エドワード3世はその戴冠式を阻止するため、パリとランスの間の道路を切断すると決めた。
stage_intro_1309=モロンの戦いの後、ブルターニュの後継者たちの間で長い休戦が続いたが、イングランドとフランスの支援を受けた双方はやがて決戦に向けての準備を完了した。
stage_intro_1310=1369年10月、上級貴族ではないベルトランは、シャルル5世によって新しい陸軍の司令官に任命された。この挙動によってフランス王は大きな利益を手に入れた。冬の到来とともに、イングランド軍内で冬の過ごし方をめぐって再び論争が起こった。フランス軍はこの機会を利用してイングランド軍を攻撃した。
stage_intro_1311=1372年、1368年に樹立されたフランス・カスティーリャ同盟に応えるために、カスティーリャ王はフランス軍に協力するようアキテーヌに艦隊を派遣した。艦隊はラ・ロシェル外海でフランスに向かっているイングランド艦隊に遭遇した。
stage_intro_1312=晩年のエドワード3世は戦争に起こす気をなくしており、エドワード黒太子の死はさらに彼を落胆させた。彼のもう一人の息子であるジョン・オブ・ゴーントが指揮官となり、フランスで数々の略奪を行い、フランス人に大きな損害を与えた。
stage_intro_1401=シャルル6世は狂気の王となり、王族間の争いが激化し、フランスの政権も不安定になった。1415年、若きヘンリー5世が曽祖父の進攻ルートに沿ってフランス征服を決意し、両国の国王となろうとしていた。
stage_intro_1402=ヘンリー5世はフランスで収めた勝利はイングランドに大きな利益をもたらさず、議会による支援も少なくなっていたため、彼はルーアンを占領してより多くのフランス領土を得ようと決意した。
stage_intro_1403=国内の争いはフランスを完全に分裂させた。その後、ジョンは暗殺され、ブルゴーニュ公国は完全にイングランドに寝返った。トロワ条約の締結により、名義上でヘンリー5世はフランス王位の継承者になった。 しかしこの時、シャルルはスコットランドの支持を得たため、大戦は勃発した。
stage_intro_1404=ボーゲンシーの戦いでの勝利は王太子シャルルを喜ばせ、フランス貴族はこの勝利に乗じて失われた領土を取り戻そうとしていた。そして、ヘンリー5世はこの時、新たな攻勢を計画していた。
stage_intro_1405=ヘンリー5世とシャルル6世が亡くなってから2年が経っていた。シャルル7世はまだ戴冠しておらず、ヘンリー6世はまだ若いため、ベッドフォード公爵の摂政下にあった。この2年間、双方は衝突を繰り返し、相手の主力を徹底的に消滅しようとしていた。
stage_intro_1406=イングランドの猛攻と対照的にフランス政府の対応は鈍かった。戦費の不足、貴族の分裂、勝利の天秤はずっとフランスに傾いていない。相次ぐ打撃によってシャルル7世は絶望に追い込まれようとしていた。
stage_intro_1407=オルレアンが英国に奪われれば、フランス中央部への最後の関門が破られる。シャルル7世にとっては暗黒の時代であるが、神はこの不安定な国に光を与え、ジャンヌ・ダルクという少女が名乗りを上げたのである。
stage_intro_1408=オルレアンへの包囲が解除された知らせはフランス全土に伝わり、士気が上がったフランス軍は、ロワール渓谷一帯でイングランド軍の陣地を排除しようと準備を進めている。
stage_intro_1409=聖女ジャンヌはシャルル7世にノルマンディーへの攻撃計画を放棄し、ランスに行って戴冠式に臨むことを望んでいた。これによって、イングランド軍の士気はさらに低下した。イングランド軍は、フス戦争に協力していた精鋭部隊を動員して彼らを止めに来た。
stage_intro_1410=支援は不十分なため、聖女ジャンヌはコンピエーニュの戦いで捕らえられ、2年後に死亡した。これによって彼女の仲間たちの復讐心を刺激され、フランスの一般民衆までも闘争に参加するようになった。
stage_intro_1411=1435年、摂政王ベッドフォード公爵の死により、イングランドはブルゴーニュ公国という同盟国を失い、ノルマンディーが混乱に陥った。シャルル7世はこの機会を利用し、パリを奪回することを決意した。
stage_intro_1412=1435年から1436年にかけてのフランスとの戦争で莫大な犠牲を払ったにもかかわらず、イングランドはブルゴーニュとの和平を望まないため、ブルゴーニュ公爵はカレーの奪取を決意した。
stage_intro_1413=シャルル7世の統治でフランスが大きく復興し、フランスにおけるイングランド人の最後の領土としてノルマンディーとギエンヌ・ガスコーニュしか残っていない。本国から大量の兵力を得たイングランドはフランスと決戦することを決意した。
stage_intro_4001=アッティラは人質としてローマで良い教育を受けた。部族に戻った彼は部族をより広い土地に連れて行った。
stage_intro_4003=ビザンティンは計算を間違えていたようだ。アッティラに貢ぐことで攻撃を止めさせようとする方法が、彼らの欲を膨張させるだけだ。アッティラの大軍は沿道で略奪し、彼は当時の人々に「神の鞭」と呼ばれた。
stage_intro_4005=匈奴人の鉄騎は、バルカン半島を一掃してコンスタンティノープルを包囲した。しかし、2層構造の城壁はそう簡単に破れそうにない。
stage_intro_4007=ローマ皇帝の妹が、帝国の半分の領土を嫁入り道具としてアッティラにあげようとしていたが、成功はしなかった。それで、アッティラにローマに攻撃する口実を与えた。
stage_intro_4009=アッティラは50万人の匈奴人大軍を率いてライン川を渡った。彼を待っていたのはローマ最強の将軍エティウスである。彼は彼の人生で最大の惨敗を喫した。
stage_intro_4011=アッティラは諦めず、アルビスの山を越えてローマに直接攻撃した。その後、アッティラの大軍はどうやって教皇レオ1世に説得されたのかはまだ解明されていないが、これによってアッティラは伝説的人物となった。
stage_intro_4021=ベリサリウスは24歳未満ですでに地方の総督を務めていた。妻と皇后の親交が深いにも関わらず、彼の指揮能力もきわめて優れている。
stage_intro_4023=ニカの乱でベリサリウスはユスティニアヌス1世の信頼を買った。帝国により高い栄誉をもたらすために、ベリサリウスは皇帝の命令を受けて、カルタゴへ出発した。
stage_intro_4025=ヴァンダル人が征服された後、ベリサリウスは最後の目標であるローマに目を向けた。百年に近く陥落した都市を再び奪還しようとしていた。
stage_intro_4027=ユスティニアヌス1世は皇后に唆され、ベリサリウスへの不信がますます高まっていた。ベリサリウスはわずかな兵士と補給で失われた土地を取り戻すしかなかった。
stage_intro_4029=イタリアがビザンティン支配下に戻った後、皇帝からベリサリウスへの警戒心はさらに強まった。帝国の政治の中心から彼を遠ざけるために、ユスティニアヌス1世は彼にもう一度、サーサーン帝国に攻撃すると命じた。
stage_intro_4031=東ゴート人は再びローマとイタリアの大部分の土地を奪還した。ベリサリウスは皇帝の不信を抱いたまま、再び少数の部隊を率いて失われた土地を奪還するよう出発した。その後、この戦神を待っていたのは物寂しい病死でした。
stage_intro_4041=ローマの衰退により、彼らは自分の領土を守ることができなくなった。サクソン人が台頭した後、ブリテンに侵入した。そして、アーサーと彼の騎士たちは水火の苦しみから民を救う唯一の部隊である。
stage_intro_4043=アーサーは彼の騎士たちを連れて海岸線にあるサクソン人の拠点を次々と攻略している。破竹の勢いで彼らは魔法を使えるように見えた。
stage_intro_4045=アーサーは屈強で穏やかである。彼は彼の部下である円卓の騎士と共に勇猛に戦い、ケルト人とウェールズ人に希望をもたらした。その後、民の支持を得て王として戴冠した。
stage_intro_4047=ランスロット、ガウェイン、パーシヴァルなどの円卓の騎士はアーサー王に付いて戦っていたが、ランスロットと王妃グィネヴィアのスキャンダルが出ていた。それに対して、アーサーはグィネヴィアを信じると決めた。
stage_intro_4049=サクソン人は兵力を集中させてアーサー王と死戦することに対して、アーサー王は150人以上の騎士と現地の抵抗軍を率いて戦場に到着した。
stage_intro_4051=アーサー王がフランスに行った時に、騎士モルドレッドは王位を簒奪した。アーサー王は急いでブリテンに戻り、モルドレッドと大戦を起こした。双方が共倒れになり、アーサー王は多くの伝説を残して静かに去っていった。
stage_intro_4061=ロンバルディア王国は部隊をローマの城下に集結させたため、教皇は急いでカールに救援を求めた。カールは兵力を分けてロンバルディア王国を奇襲すると決めた。
stage_intro_4063=教義を広めるために、カールはザクセン地方を征服すると決めた。ここの民族の多くは強くて好戦的で、そう簡単に臣従するわけがない。
stage_intro_4065=北方以外にも、西のアンダルス王国も、カールが征服しようとした国である。カールの軍隊はここで待ち伏せ攻撃に遭った。彼の部下である恐れなしの聖騎士ローランはここで犠牲になった。
stage_intro_4067=カールは大量の教会を設立し、ザクセン人に信仰を強要した。しかし，ザクセン地方の反乱でカールは怒りに身を任せた。ここの問題を徹底的に解決するため、カールは再び大量の軍隊を派遣した。
stage_intro_4069=帝国の国境は拡大し続いている。西側のブルトン地方を討伐したほか、カールは東のバイエルンを征服した。
stage_intro_4071=800年のクリスマスにて、カールはサン・ピエール大聖堂で「ローマ人の皇帝」として即位した。その後、カールは東のビザンティンやボヘミア、スラブ、デンマークを征服し、帝国の国境を最大限まで広げた。
stage_intro_4241=ヴァイキングは嵐のようにブリテンを席巻し、大量の富と命を奪った。今のブリテンには英雄が必要である。
stage_intro_4243=レディングの戦いの敗北は人々の闘志を潰さなかった。これまでの敗戦の経験を吸収した後、アルフレッドは盾の壁という戦術で凶暴なヴァイキングを撃破した。
stage_intro_4245=策略家であるヴァイキングの新指導者グスレンは奇襲を仕掛けてアルフレッドの宮廷を直接攻撃し、大量の補給を獲得した。これによってアルフレッドは窮地に陥った。
stage_intro_4247=数ヶ月後、アルフレッドは勢いを立て直し、多数のの部隊を集めてヴァイキングの主力に報復した。十字架とハンマーの決戦はエディントンで一触即発になった。
stage_intro_4249=アルフレッドはヴァイキングのロングシップを参考にして新型戦艦を製造し、イングランド史上初の正式な海軍を作り上げた。その後、イングランドは自分の海岸に対して絶対的な防御を得た。
stage_intro_4251=892年、ヴァイキングの大軍は再びイングランドを攻撃したが、今回彼らが直面したのは堅固な城であった。アルフレッド大帝は執政中に法典を発布し、学校を創設してイングランドの統一の基礎を築いた。
stage_intro_4261=キエフ大公国のイゴールは軍隊を率いてコンスタンティノープルを襲撃した。ヴァイキングとして、これまで海から攻撃を発動したが、今回は噴火戦船に返り討ちされた。
stage_intro_4263=キエフ大公国の失敗によって彼らに帰順した部族は蠢き始めた。ドレヴリャーネ人の首領マールが油断したイーゴリを襲って殺したが、自分に破滅をもたらした。
stage_intro_4265=イーゴリの未亡人オリガは、マールと結婚すると装っている。マールはそれを信じて、すぐにオリガを嫁として迎えたが、結婚式の最中にオリガは婚礼をぶっ壊すと命じた。
stage_intro_4267=オリガは他のドレヴリャーネ人を見逃さず、彼らの住居を焼き払って大軍を率いてイコロス城を制圧した。
stage_intro_4269=オリガは洗礼を受けて正教に帰依し、正教をキエフ大公国に持ち込ん。しかし、雷神トールを信奉するヴァイキングはそれを納得できない。彼女の息子スヴャトスラフ・リヒテルがビザンティンを攻撃した。
stage_intro_4271=オリガは正教の種をキエフ大公国に撒き、石でキエフやノヴゴロドなどの大都市を建設した。キエフ大公国はその後、部族から王国に変わった。数年後に彼女は「聖人」の称号を与えられた
stage_intro_4361=フランク王国はカール大帝の死後に三つの王国に分裂した。936年に東フランク王国にあるオソンがザクセン公爵とドイツの王として即位した。しかし彼は反乱を平定しなければ、ドイツを統一できない。
stage_intro_4363=異母兄弟のヘンリーはバイエルン公爵に唆され、反乱を起こした。その後、寛大なオソン1世は彼らを赦免したが、彼らはそれを教訓にしていなかった。
stage_intro_4365=オソンの新しい妻が子供を産んだ後、長男ルドルフの王位継承権が奪われ、ドイツ王国は再び内戦に陥った。ルドルフはマジャル人と連合して父親を襲った。
stage_intro_4367=ハンガリーのマジャル人はドイツ内戦に乗じて、954年にヨーロッパに大規模な侵入を行った。オソン1世はすぐに内戦を止め、侵入者たちを阻止しようとした。
stage_intro_4369=955年、マジャル人の主力とドイツの主力がレヒフェルトで遭遇し、生死存亡の戦いが始まった。負けた側は歴史の塵となる。
stage_intro_4371=961年、教皇はオソン1世に援助を求めた。オソンは一千の騎兵でイタリア王国の大軍を破り、その後ローマで神聖ローマ帝国の皇帝として即位した。
stage_intro_4281=青歯王ハラールの孫であり、デンマーク王スヴェンの子クヌートは一万人を率いて二百隻のロングシップを運転してスカンディナヴィア半島からイギリスへ行き、そこで自分の王国を築こうとしている。
stage_intro_4283=イングランド国王エドマンドの義弟「貪欲者」イドリックはイングランド人を裏切り、クヌートに身を寄せた。エドマンドは正面決戦を避け、戦況は膠着していた。
stage_intro_4285=クヌートはロンドンへの攻撃を3回試みたので、兵力の消耗は多くなった。エドマンドはウィルセスから新たな部隊を獲得し、イドリックは再びイングランド陣営に戻った。
stage_intro_4287=クヌートは海上に戻ると決めたが、エドマンド行く手を阻まれた。デンマーク人は兵力が弱い状況で高い戦闘力を発揮したが、「貪欲者」イドリックは再び裏切ったため、クヌートに逆転された。
stage_intro_4289=エドマンドは傷で亡くなり、クヌートはイギリスの王位を獲得した。彼の兄弟であるハーラル2世はデンマークで亡くなったため、彼はイングランド人を率いてデンマークの王位を奪還しようとしていた。
stage_intro_4291=真っ盛りを迎えているクヌート大帝はまたノルウェーとスウェーデンに大軍を派遣した。スコットランドとアイルランドでさえ彼に臣従した。その後、クヌート大帝はバルト海からアイルランドまでの北海帝国を設立した。
stage_intro_4301=国王フェルナンド1世が亡くなり、自分の領地を3人の息子と2人の娘に分け与えた。長男のサンジョはロドリゴの補佐の下で他の兄弟との戦争を起こした。ロドリゴの勇猛な戦いは、ムーア人から「シッド」と尊称された。
stage_intro_4303=兄弟たちを急速に破ったが、サンジョは事故で死んだ。弟はアルフォンソ6世として戴冠し、シッドは彼に忠誠を誓った。しかし、彼の功績が高すぎるので、アルフォンソ6世に警戒されていた。
stage_intro_4305=シッドは過ちを犯したことでアルフォンソ6世に追放された。しかし、高い人気を持った彼は異なる宗教に属する部隊からの支持を得た。その後、彼は部隊を連れてサラゴサの君主ムタメに仕え、多くの勝利を収めた。
stage_intro_4307=アルフォンソ6世はイベリア半島までに国土を拡張しようとしたが、サグラハスの戦いで敗北した。その時、シッドのことを思い出して彼を赦免した。シッドもまた旧主のもとに帰ってきた。
stage_intro_4309=シッドは救援に間に合わなかったため、アルフォンソ6世に封地を没収され、妻子を監禁された。その後、シッドは自分の領地を奪取しようと決心した。バレンシアでシッドの声望は頂点に達した。
stage_intro_4311=ムラービト朝の支配者ユスフは、スペインを統一しようとしていたが、バレンシアで苦戦を強いられていた。彼の兵士は、戦神シッドに恐れている。彼が矢に当たって重傷を負っても、馬に乗れば誰も防ぐことができない。
stage_intro_4381=マチルダはスコットランドの王族やノルマン貴族、ウェセックス貴族の血を引いている。幼いからヘンリー1世によって神聖ローマ帝国の国王ヘンリー5世に嫁がれた。その後、ローマ帝国の皇后となった。
stage_intro_4383=マチルダは23歳の時に夫を亡くしたため、故郷のノルマンディーに帰らざるを得なかった。1120年の白船騒動の後、イングランド王位の継承者は不確定になった。1127年、マチルダはアンジューの伯爵ジェフリーと再婚した。
stage_intro_4385=1135年にヘンリー1世の死亡によって、イングランドの王座は空位となった。継承権を持つ長女マチルダとその夫ジェフリーは、ノルマンディーを奪還し、反乱を起こしたノルマン貴族を処罰すると決意した。
stage_intro_4387=マチルダの従兄弟スティーヴンは、イングランドのノルマン貴族の支持を得て王位についた。ただし、グロスター家のロバートは、スコットランドで反乱を起こした妹を支援したため、内戦が始まった。
stage_intro_4389=スティーブンはマチルダ女王のいる城を包囲した。ロバートの援軍はその後駆けつけて、スティーブンを捕らえた。1141年の復活祭の後、マチルダ女王は事実上のイングランドの支配者となった。
stage_intro_4391=戴冠式をまだ行われていないマチルダは、スティーブンをはじめとする貴族たちの反乱に遭った。マチルダはウィンチェスターで敗走し、その後ノルマンディーに帰還した。その後、イングランドの王位は、彼女の息子であるヘンリー2世によって取り戻された。
stage_intro_4081=ザンギー朝はヌールッディーンの父の努力のおかげですでにある程度発展していた。ザンギーが暗殺された後、アンティオキア公はこの混乱の情勢を利用してアレッポを奪取しようとしていた。
stage_intro_4083=エデッサ伯国は、アンティオキア公国に攻撃されたことを知った後、自分の失った領土を奪還しようとしていた。情報を得たヌールッディーンは部隊を率いて迅速にエデッサに駆けつけた。
stage_intro_4085=ザンギー朝はヌールッディーンの努力のおかげでますます繁栄している。ヌールッディーンはシリア北部での領土を拡大し、アンティオキア公国とエデッサの間の要路を断ち切ると決めた。
stage_intro_4087=ダマスカスの領主ウヌールが病死した後、ダマスカスは他人のターゲットとなった。ヌールッディーンもエルサレム王国もこの土地を手に入れようとした。
stage_intro_4089=ヌールッディーンはシリアで行った一連の活動は再びキリスト国家を震撼させ、西洋諸国に第二次十字軍東征を開始させた。今回の東征は、ヌールッディーンの存在で初めてのようにうまくいかないだろう。
stage_intro_4091=十字軍はエジプトに向かった。ヌールッディーンは迷わず自分の大将を支援に派遣し、一緒に行った同行者には、当時まだ若者であるサラーフッディーンもいる。その後、聖王ヌールッディーンは間もなく病死し、ザンギー帝国も滅亡した。
stage_intro_4101=ローマで勃発した蜂起で教皇ユージン3世はフリードリヒ1世に救援を求めざるを得なかった。神聖ローマ帝国の皇帝として当然断るわけがない。
stage_intro_4103=ポーランド公爵レスラヴ4世が年金の納入を拒否したため、フリードリヒ1世は我慢できず、オルド川を渡ってポーランドを攻撃すると決めた。
stage_intro_4105=フリードリヒ1世はイタリアで実施した暴政はイタリアの民衆を怒らせた。ベネチア、ヴェローナなどの都市は「ロンバルディア同盟」を結成し、共に皇帝の支配に反抗した。
stage_intro_4107=フリードリヒ1世の臣下「獅子」ヘンリーは、イタリアへの出兵を拒否した。フリードリヒ1世は怒りを抑えきれず、ヘンリーを討伐すると決めた。
stage_intro_4109=「獅子心王」リチャードと「キツネ」フィリップ2世とフリードリヒ1世は第3回十字軍を発動し、3つ方向からエルサレムに進攻した。神聖ローマの軍隊はビザンティンを通過した時に現地軍と衝突した。
stage_intro_4111=アナトリア高原を通過した時、東征軍はルーム・セルジューク朝の攻撃を受けた。彼らは今回の東征において最大の障害である。フリードリヒ1世が勝利を収めた後、意外に水に落ちて死亡したため、東征軍は瓦解した。
stage_intro_4121=ヌールッディーンの病死でザンギー朝は分裂の危機に陥っていた。エジプトにいるサラーフッディーンは徐々に足場を固め、アイユーブ朝が誕生した。
stage_intro_4123=サラーフッディーンは北上してダマスカスを占領した。その後、ホムスとハマを占領し、部隊を少し整備した後、ザンギー朝の首都アレッポへ行くと決めた。
stage_intro_4125=シリアのイスラム世界が統一されたため、エルサレム王国の状況は崩壊の淵に立たされていた。ボードゥアン4世は数千人の兵士を率いてアスカレンに行って防御を強化せざるを得なかった。
stage_intro_4127=ボードゥアン4世はサラーフッディーンの補給線を断ち切り、ヤコブの浅瀬で城を築こうとしていた。補給線を確保するために、サラーフッディーンは軍を率いて城に攻撃を発動した。
stage_intro_4129=ボードゥアン4世の死亡によってエルサレム王国は混乱に陥った。フランスのレナルドは契約を無視して何度もエジプトの商隊を襲撃し、大戦は避けられずに勃発した。
stage_intro_4131=エルサレム王国の大軍はヒッティーンで全滅し、サラディンの前に立ちはだかるのは厚い城壁だけが残っていた。この慈悲深い王はここで双方の尊重を得て、「アラブの騎士」と呼ばれた。
stage_intro_4141=プランタジネット王室内では権力争いが絶えず、ますます激しくなる傾向にある。同時に、フランスの属地で反乱が続いており、わずか16歳のリチャードは反乱を平定せざるを得なかった。
stage_intro_4143=フランス王「キツネ」フィリップ2世に唆されたため、親子は再び衝突し、ルマンで大戦を行った。
stage_intro_4145=リチャード1世はイギリス王として戴冠した後、教皇の要請に応じて第3回十字軍を発動すると決定した。「赤いひげ」のフリードリヒ1世とフィリップ2世は一緒に参加し、3軍に分かれて出発した。
stage_intro_4147=フリードリヒ1世は事故で死亡したため、アッコを陥落させたフィリップ2世は、軍を率いて帰国すると決定し、戦闘中の揉め事でリチャード1世に報復しようとした。現在、まだエルサレムへ向かっているのはリチャード1世だけだった。
stage_intro_4149=「獅子心王」リチャード1世とサラーフッディーンは敵対関係であるが、お互いが良きライバルであり、時々連絡を取り合っていた。「獅子心王」は勇猛果敢で、弟が皇位を簒奪しなければ、エルサレムはすでに彼の手に落ちたかもしれない。
stage_intro_4151=リチャード1世はフランス王国と神聖ローマ帝国の恨みを買ったため、帰国の途中で監禁された。その後、彼の母親は多額の身代金を支払った。怒った「獅子心王」はフィリップ2世に攻撃を発動したが、矢に当たって死亡した。
stage_intro_4161=チンギス・カンは自分の才能で徐々に頭角をあらわしてきた。しかし、それによって昔の仲間は今の敵に変わった。
stage_intro_4163=チンギス・カンの勢力がますます強まった。一方、彼の義父は彼のことをますます警戒している。チンギス・カンが臣従しないなら、雌雄を決するしかない。
stage_intro_4165=一世紀以上前に滅ぼされそうになったモンゴル人は今は極めて強大になっている。しかし、草原の覇者は一人しかおらず、チンギス・カンは西遼や西夏、金への戦争を発動した。
stage_intro_4167=草原を統一した後、チンギス・カンは西の広い土地に目を向け、部隊を4つに分かれて20万の大軍を率いて西域に進出した。
stage_intro_4169=1227年、チンギス・カンは城を攻略する途中で亡くなった。しかし、彼の精神はまだ続き、モンゴル帝国の版図はまだ拡大している。
stage_intro_4171=チンギス・カンの遺志に従って、モンゴル帝国は三回目の西征を発動した。今回、彼らが直面するのはアッバース朝とアイユーブ朝の鉄騎であった。
stage_intro_4181=ヘンリー3世の気弱な行為によってイングランドは内戦に陥り、プランタジネット朝は壊滅な危機に瀕している。エドワード王子はこの危機から国を救おうとしていた。
stage_intro_4183=エドワード王子は軍事生活を愛し、あちこちに征戦しようとしていた。その時、ルイ9世は新たな東征を発動し、エドワードはイングランドでの悩みを捨て東征に身を投じた。
stage_intro_4185=1274年、エドワード1世が戴冠し、アーサー王伝説に心酔した彼は、大ブリテン王国を統一することを決定した。ウェールズがエドワード1世の最初の目標となった。
stage_intro_4187=エドワード1世のウェールズに対する残虐な支配により、ルエリンの指導の下でウェールズで大規模な反乱が勃発した。
stage_intro_4189=ウェールズが臣従した後、エドワード1世はもっと北のスコットランドに目を向けた。1296年、エドワード1世は長弓兵と騎兵部隊を率いてスコットランドに向けって進攻を開始した。
stage_intro_4191=スコットランドの貴族はダンバーの堅固な城を占領し、ここでエドワード1世の攻撃を阻止しようとした。エドワード1世はここで彼らを破ってスコットランドの国宝「戴冠石」を持って行った。
stage_intro_4201=スコットランドにおけるイングランドの残虐な支配に向けて、ウォレスは立ち上がった。自由への信念だけでなく、スコットランドを独立させようという決意を持っている。
stage_intro_4203=ウォレスの反抗行為は搾取されたスコットランド人を奮い立たせた。ウォレスの所には多くの人々が集まっていた。
stage_intro_4205=イングランドはついにウィリアム・ウォレスを直視し始め、数千の正規軍を派遣してこの農民蜂起軍を殲滅しようと決めた。
stage_intro_4207=スターリング・ブリッジの戦いで勝利した後、ウォレスは勝利に乗じて追撃し、より多くのスコットランドの土地と人民を解放した。彼は遊撃戦術で大きな成功を収めた。
stage_intro_4209=ウィリアム・ウォレスはついにスコットランド貴族の認可を得て、スコットランドの護国公に任命された。エドワード1世は部下の無能さに怒りを感じ、彼は大軍を率いてウィリアム・ウォレスを迎え撃つと決めた。
stage_intro_4211=ウィリアム・ウォレスは軍隊を再編成して攻撃を開始したが、仲間の裏切りで捕虜になった。ウォレスはロンドンで斬首されたが、彼の犠牲はより多くのスコットランド人を覚醒させた。
stage_intro_4321=スコットランドの貴族たちは、ダンバーの戦いに失敗した後、エドワード1世に頭を下げた。1297年、ウィリアム・ウォレスはスコットランドで独立運動を起こし、ロバート・ブルースもその運動に参加した。
stage_intro_4323=スコットランド王位の合法的な競争者の一人であるロバート・ブルースは、教会でもう一人の競争者ジョン・カミングを殺した後、スカングで王として戴冠した。その後、エドワード1世に懸賞金をかけられた。
stage_intro_4325=ロバート・ブルースの妻と娘は捕虜になり、自分は亡命した。翌年、ロバート・ブルースはアイルランドで募集した新兵を率いてイギリスに上陸して反撃を開始した。
stage_intro_4327=ロバート・ブルースはマービンスの戦いで失敗した教訓を十分に学び、自分が故郷の地形をよく知っていることをうまく利用して、イギリス軍に反撃した。
stage_intro_4329=エドワード1世は、ロートン・ヒルの戦いの敗北を知った後、年老いた体を顧みず、自ら出征したため、途中で病死した。3年も経たないうちに、ロバート・ブルースはイングランド北部の大部分の土地を占領した。
stage_intro_4331=スコットランド人の人数はイングランドの半分にも及んでいないし、長弓兵と重騎兵も持っていない。しかし、彼らは士気が高く、適切な戦術を運用しているので、エドワード2世を大敗させた。その後、イングランドはもうスコットランドの独立を止めることができなかった。
stage_intro_4341=ブルターニュ公爵家で後継者争いが勃発した。英仏両国は自国の候補者を支援しようとしたため、対立は激化し、モルレ付近で遭遇戦が勃発することになった。
stage_intro_4343=1345年、エドワード3世は3つの方向に同時進軍をを開始した。ブルターニュとガスコーニュにイングランド軍を送り込み、自身は大軍を率いてヨーロッパ内陸方面に向かい、パリへ目指そうとしていた。
stage_intro_4345=長い追撃の末、フランス同盟軍はクレシー付近で疲弊したイングランド軍に追いついた。イングランド軍は死闘を強いられてるため、やむを得ず陣形を展開した。
stage_intro_4347=1355年、ガスコーニュ地方の戦力不足を察知したエドワード3世は、フランス南部に対して掃討襲撃を計画した。この任務に最適なのは、クレシーの戦いで功績を挙げたエドワード黒太子であった。
stage_intro_4349=1356年、フランス国王ジョン2世が軍を率いて、ガスコーニュ地方で略奪するイングランド軍を消滅しようとしていた。両軍は何回もすれ違ったが、9月17日に両軍はついに遭遇し、百年戦争の第一段階は正式に始まった。
stage_intro_4351=1367年、イングランドとフランスはスペインのスティール王国の内戦に介入し、正式に百年戦争の第二段階の初戦が始まった。
stage_intro_4401=聡明なボードゥアンは、幼い頃から強い信念と前向きな性格を持っているが、癩病という死病に冒された。9歳でエルサレム王国の国王に即位し、壊滅な危機に瀕していた。
stage_intro_4403=1176年に成人して権力を握ったばかりのボードゥアン4世は、エジプトに対して全面攻撃を開始した。ボードゥアン4世は、刺客と戦っているサラディンを急襲した。
stage_intro_4405=ボードゥアン4世は、ビザンティン帝国の皇帝マヌエルの支援を受け、海路でエジプトへの侵攻を開始したが、エルサレム王国の派閥争いに巻き込まれて失敗した。
stage_intro_4407=サラディンは多くの兵を率いてアスカロンに到着した。兵力が少ないボードゥアン4世の軍隊を発見した彼は、エルサレムへの襲撃を決意した。しかし、この傲慢が仇となり、危うく16歳の王に返り討ちにされるところだった。
stage_intro_4409=2年間、双方の戦闘は絶えなく続いていた。サラディンはもはや若い君主を侮ることができなくなった。しかし、重病を患っているボードゥアン4世はフランク軍を危機に陥れた。
stage_intro_4411=病気で苦しんでいる国王はエルサレムの辺境を守るために、防御姿勢を取らざるを得なくなった。サラディンの攻撃を再び食い止めたボードゥアン4世は、最期をむかえようとしていた。
stage_intro_4421=スウェーデンの封建領主たちは、モンゴルがロシアに侵攻することに乗じてノヴゴロド大公国に進軍し、その領土を奪おうとしていた。 アレキサンダーは精鋭部隊を率いて、ネヴァ川で敵を急襲し、撃退した。この戦いで見せた指揮能力と闘志からネフスキーと呼ばれるようになった。
stage_intro_4423=ネヴァ川の戦いの後、ネフスキーはノヴゴロド市民会議の要請を受けて、来襲した十字軍騎士団に対抗することになった。ロシア北西部の国境を確保するために、まずプシュコフ公国を先に奪還しなければならない。
stage_intro_4425=プシュコフの奪還は計画の最初の一歩に過ぎない。国境を守るためには、先手を打たねばならない。ネフスキーは敵を鎮圧するために、自ら軍を率いて騎士団の領地に入った。彼が送り出した偵察隊はハマルストで敵の先頭部隊と遭遇した。
stage_intro_4427=偵察部隊が騎士団の動きを把握したため、ネフスキーは部隊を率いて敵に攻撃を仕掛けた。双方はチュド湖で遭遇し、決戦を開始した。この戦いの後、ロシアの国境に束の間の平和が訪れた。
stage_intro_4429=モンゴル軍の騎兵隊はロシアの土地に足を踏み入れた。モンゴル軍の圧倒的な猛攻を前に、ネフスキーの父であるヤロスラフ大公は、仕方なく降伏したが、帰国の途中で死亡した。ネフスキーと弟のアンドレイは、大公の座をめぐって争いを始めた。
stage_intro_4431=ネフスキーは執政後期で国内の数々の動乱を鎮圧し、国の統一と安定を保っていた。彼の死後、ロシアは急速にいくつかの公国に分裂し、絶えずに争いを始めた。
stage_intro_4441=シチリアではノルマン人の勢力が台頭し、ビザンティン帝国への脅威は日々増していた。そして1081年、双方はついにバルカン半島西部で戦いを開始した。
stage_intro_4443=ティラシオンの戦いで惨敗を喫したアレクシウス1世は、神聖ローマ帝国に助けを求め、神聖ローマ帝国の協力でノルマン軍を降伏させることに成功した。
stage_intro_4445=「コンスタンティン・ディオゲネス」と名乗る男がアレクシウス1世の王位を狙い、クマン人と手を組んでビザンティンの北方辺境に攻撃を開始した。
stage_intro_4447=セルジューク人からアナトリアを取り戻すために、アレクシウス1世はローマ教皇に助けを求めた。こうして、ローマ教皇の呼びかけによる第1回十字軍の東征は始まった。
stage_intro_4449=アレクシウス1世の宿敵の息子ボヘモンド1世がアンティオキア公国を建国し、ビザンティン帝国に攻撃を開始した。2年間の戦争の末、ビザンティン帝国は勝利を収め、アンティオキア公国を従属させた。
stage_intro_4451=1110年以降、アレクシウス1世はセルジューク人に対して攻撃を開始した。数年にわたる戦いの後、彼はついに小アジアの沿岸地域を奪還することに成功した。
stage_intro_4461=若い頃の蘇定方は勇猛果敢で知られていたが、唐の時代初期に重用されたことはなかった。この状況は630年、唐の太宗皇帝である李世民が帝国北部の突厥人を排除するように命じたまでに続いた。蘇定方は李靖に従って遠征し、蔭山の戦いで奇襲を仕掛け、突厥の首領である頡利を生け捕りにして勝利を収めた。
stage_intro_4463=655年に新羅を救援した唐高宗李治は、蘇定方を派遣して西突厥に進軍させた。砂鉢羅可汗は10万人の騎兵隊を率いて戦いに臨んだが、曳咥川で蘇定方に背後を取られて敗北し、逃亡した。
stage_intro_4465=西突厥の残党は突然の吹雪に遭い、自軍の本拠地に逃げ込んだ。砂鉢羅可汗は唐軍はもう追撃してこないと思い込んで警戒を緩めた。しかし、蘇定方は追撃して奇襲をかけ、西突厥を滅亡させた。その後、シルクロードが開通され、唐朝も最盛期を迎えていた。
stage_intro_4467=吐蕃は日に日に強くなり、唐朝の辺境を荒らし続け、唐王朝の西部にとって次第に深刻な問題となった。659年、唐高宗は蘇定方に涼州に行かせ、吐蕃への防御をすべて任せた。彼は千人の兵力で吐蕃の八万人の軍隊を打ち負かし、敵の大将「達延莽布支」まで討ち取った。その後、間、吐蕃は10年以上東進することはなかった。
stage_intro_4469=西突厥の残党の首領である都曼は、吐蕃の挑発に乗り、他の3カ国と手を組んで唐朝に反旗を翻した。吐蕃を平定したばかりの蘇定方は一昼夜で150kmの行軍を行い、4000m以上の高原を越えて速やかに都曼を倒した。そこ後、唐朝の領土はかつてないほど広くなった。
stage_intro_4471=サーサーン帝国はアラビア帝国に滅ぼされた。亡命したペルシャ王子ペイルスが唐朝に助けを乞い、唐高宗は国境に使者を送ってペルシャ王子を迎えようとしたが、アラビア帝国と衝突した。660年、唐高宗は老将蘇定方を派遣し、海を渡って百済と高句麗を征服させた。これによって蘇定方はユーラシア大陸で最も強力な将軍となった。
stage_intro_4501=若い頃のティムールはその能力を買われ、東チャガタイの大ハーンであるトゥグルク・ティムールに渇石城の支配者として任命された。
stage_intro_4503=ティムールは、罪のない宗教指導者を解放したことで謀反の疑いをかけられ、逃亡を余儀なくされた。彼は、義兄のクシンのもとに行くため、アフガニスタン南部に逃れた。
stage_intro_4505=東チャガタイの大ハンであるトゥグルク・ティムールが死んだ後、ティムールは立ち上がり、川中の総督を倒し、渇石城の支配権を取り戻した。
stage_intro_4507=情勢が落ちついた後、ティムールとクシンの間に険悪が生まれ、2人の対立も段々酷くなった。クシンは何度もティムールを滅ぼそうとし、ティムールも何度も反撃したが、数年にわたる対峙の末にティムールが最終的に勝利を収めた。
stage_intro_4509=クシンを破ったティムールは西チャガタイの軍事政権を掌握し、自分の操り人形であるスルタンを作った。後世の人間からティムール朝の成立として見なされている。
stage_intro_4511=東チャガタイ・ハン国は、数年にわたるクーデターと混乱の末、ハマルディンに継承された。継承後は何度かティムール朝の国境を攻撃したが、22年間の戦争の末、最終的にティムール国に滅ぼされた。
stage_intro_4513=チンチャ・ハン国のタルタロスとティムールは何方もペルシャ地方に野心を抱いているため、小競合いの末に両国の戦争に発展した。その後、ティムールは二度の遠征でチンチャ・ハン国に大きな損害を与えた。
stage_intro_4515=建国から10年後、ティムールは西征を開始した。最初に狙われたのは、ホラーサーン地方のカーティード朝である。向こうの王朝内の不和を乗じてティムールはすぐに相手を倒した。
stage_intro_4517=ティムール西征の最後の目標はグルジア王国であった。しかし、征服した後、元の政権を変えてないため、その後多くの反乱が起こった。
stage_intro_4519=ティムールは豊かな北インド地域を略奪するため、デリーのスルタンが異教徒に寛容すぎるのを口実にインドへの大遠征を開始した。
stage_intro_4521=1399年、マムルーク朝の新スルタン、ファラジはティムール汗国を宗主国として認めず、ティムールの敵を引き渡さないため、ティムールの怒りを買った。
stage_intro_4523=ティムール汗国と同時期に中東に存在したもう一つの強力な帝国がオスマン帝国である。両方は拡大を続け、小競合いを始めた。その後、やがて大規模な戦争へと発展していた。
stage_intro_4541=ジョン1世ツィミスキスは、アルメニアの軍事貴族の家に生まれ、叔父はビザンティン帝国の名将ニケフォルス・フォカスである。幼い頃から叔父と共に征戦を始め、20代前半にサモサットの戦いで頭角を現した。
stage_intro_4543=963年、ニケフォルス・フォカスが皇帝病没に乗じて王位を奪った。969年、ジョン1世と皇后シーファノがニケフォルスを暗殺し、自ら皇帝の地位に付いた。ニケフォロスの甥であるバルデュス・フォカスは叔父の仇を討とうとしたが、すぐにジョン1世に鎮圧された。
stage_intro_4545=970年、ルス大公スヴャトスラフが軍を率いてビザンティン帝国の北部に侵攻を開始した。この時、ジョン1世はフォカス家との内戦の真っ最中で支援を送ることはできなかった。トラキア地方の防衛を担当したのは、彼の愛弟子バルダス・スコレル将軍である。
stage_intro_4547=971年、スヴャトスラフは3万の軍隊を率いてビザンティン帝国の国境を犯そうとしていた。ジョン1世は、国内の内乱を収めた後、精鋭部隊を率いて出陣した。数々の激戦の末、ジョン1世はスヴャトスラフをドロストロン城に包囲した。
stage_intro_4549=972年、ルスとの戦争が終了すると、ジョン1世は東方へ目を向けた。当初、ビザンティン方面は一定の戦果を上げたが、その後モスル首長国との戦いで東部戦区の将軍ミリアスが敗れ捕らえられたため、余儀なく東征を中止させた。
stage_intro_4551=974年、ジョン1世は第一次、第二次東征を発動し、モスル首長国を負かして臣従させた。 その後、ジョン1世はさらに東に進め、ユーフラテス川の西側にある地域をすべて帝国に組み入れ、ダマスカスやトリポリなどの都市を次々と制圧した。


