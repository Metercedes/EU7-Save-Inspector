stage_intro_4761=985年、二人のアナトリアの将軍が新帝バシレイオス2世を自らの意のままにしようと試みた。帝国を自らの手で支配するには彼らを打ち倒さなければならない。
stage_intro_4765=ビザンツ領内の長期的な内戦によって東部における帝国の統治は弱まった。ファーティマ朝の侵略に対抗すべくバシレイオス2世は自ら軍を率いてシリアへ向かった。
stage_intro_4767=998年、ビザンツ帝国はファーティマ朝との国境紛争で敗北し、バシレイオス2世は再び親征した。敵の拠点を一掃し帝国の領土を防衛した。
stage_intro_4763=986年、皇帝バシレイオス2世は自ら軍を率いてブルガリアを攻撃した。しかし、撤退中にブルガリア軍の奇襲を受けた。
stage_intro_4769=1014年、バシレイオス2世は長きにわたる戦いの末、ブルガリア軍主力をエーゲ海北岸に追い詰め両国の対立に終止符を打った。
stage_intro_4771=1020年、アルメニアの王はバシレイオス2世がイタリアに軍を派遣している隙にファーティマ朝と連携してビザンツの国境地帯を攻撃した。怒りに燃えるバシレイオスはすぐに軍を率いて帰国し、その後の戦闘でアルメニア地域を占領した。

