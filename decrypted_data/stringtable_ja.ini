general_desc_Warwick the Kingmaker=第十六代ウォリック伯爵。本名はリチャード・ネヴィル。バラ戦争で多くの貴族を支援して王位に上がったため、「王造りのリチャード」と呼ばれている。
general_desc_Edmund Beaufort=第2代サマセット公爵。ヨーク公爵リチャードの政敵。
general_desc_Richard of York=第3代ヨーク公爵。本名リチャード・プランタジネット。プランタジネット家の末裔として王位継承権を持っていた。
general_desc_Margaret of Anjou=ヘンリー6世の妻。ランカスター家の中心人物。弱いヘンリー6世の治世中、サマセット公爵を引き入れて政治的同盟者とし、実質的な統治者となった。
general_desc_Henry VI=イングランド王。性格は弱い。国家を統治する能力に欠け、臣民を統治することができなかった。在位中、大臣たちは権力を争い、最終的にバラ戦争を引き起こした。
general_desc_Richard Neville=第5代ソールズベリー伯、ウォリック伯の父
general_desc_Henry Percy2=第2代ノーサンバランド伯
general_desc_Henry Percy3=第3代ノーサンバランド伯
general_desc_Henry Percy4=第4代ノーサンバランド伯
general_desc_Henry Beaufort1=第2代サマセット公の息子
general_desc_Henry Beaufort2=第3代サマセット公，第2代サマセット公の息子
general_desc_John Neville1=初代ネヴィル・ドゥ・レビィ男爵
general_desc_Edward IV=ヨーク公リチャードの息子
general_desc_John Neville2=初代モンターギュ侯
general_desc_John Grey of Groby=エリザベス・ウッドヴィルの夫
general_desc_Elizabeth Woodville=エドワード4世の妻。『白い女王』と呼ばれる。彼女の娘は後のヘンリー7世に嫁ぎ、テューダー朝の創始者の一人となった。
general_desc_Li Shimin=唐の第2代皇帝。在位中、内政改革に力を入れ、数百年にわたる唐の繁栄の基盤を築いた。同時に領土を拡大し、周辺勢力を平定し、「天可汗」と尊称された。
general_desc_Michael VIII=パレオロゴス朝の創始者。在位中、外交的手段を積極的に活用し、東ローマ帝国の外部脅威を解決したことで、本来危うくなっていた東ローマ帝国を2世紀にわたって継続させた。

