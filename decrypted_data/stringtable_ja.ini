stage_intro_4661=1410年、ヤン・ジシュカは傭兵としてポーランド・リトアニア・ドイツ騎士団戦争に参加し、タンネンベルクの戦いで大活躍した。
stage_intro_4663=1419年、フス戦争が勃発し、ヤン・ジシュカは積極的に戦争に参加した。その後、プラハ蜂起を指導し、反乱軍の重要な指揮官の一人となった。
stage_intro_4665=1420年、スドメジュの戦場でフス戦車が初めて大活躍した。ヤン・ジシュカが指揮する数百人の反乱軍は、戦車隊の助けを借りて数千人の騎士を打ち負かした。
stage_intro_4667=1420年、神聖ローマ皇帝ジギスムントはチェコ地域に対する最初の十字軍遠征を発動した。しかし、ソコロフ山の戦いでヤン・ジシュカに敗れた。
stage_intro_4669=1421年の冬、ジギスムントはクトナー・ホラで反乱軍を包囲した。しかし、ヤン・ジシュカが巧妙な戦術を駆使したおかげで、反乱軍は包囲網を突破し、その後の戦闘で敵を打ち破った。
stage_intro_4671=1422年1月、ヤン・ジシュカは部隊を率いてクトナー・ホラの戦場で敗走した十字軍を追いつき、殲滅戦を仕掛けて十字軍の第二次遠征を完全に粉砕した。

