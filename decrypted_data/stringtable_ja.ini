general_desc_Edward the Black Prince1=エドワードは敵軍を威嚇するため、戦場でしばしば黒い鎧を身につけた。 百年戦争の間、この黒い鎧はフランスの指揮官たちが最も恐れた服装だった。
general_desc_Su Dingfang1=生涯を戦場で過ごした蘇定芳は、北方で契丹に打ち勝ち、西で突厥を滅ぼし、東で百済を平定、南で吐蕃を鎮圧した。七十歳を超えてもなお、戦場の最前線で指揮を執った彼は、紛れもなく大唐の名将だ。

