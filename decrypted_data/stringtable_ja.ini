skill_desc_51041=一段目のスキル：現在のターンで移動に必要な行動力が{0}1{1}減少する。{0}3{1}ターン続き、クールタイムは{0}5{1}ターン。[br]二段目のスキル：行動力が{0}1{1}回復する。（一段目のスキルが使用できない場合に有効。毎ターン1回のみ）
skill_desc_51042=一段目のスキル：現在のターンで移動に必要な行動力が{0}1{1}減少する。{0}4{1}ターン続き、クールタイムは{0}5{1}ターン。[br]二段目のスキル：行動力が{0}2{1}回復する。（一段目のスキルが使用できない場合に有効。毎ターン1回のみ）
