stage_intro_4601=耶律大石は1087年、遼国の上京に生まれ、若い頃に進士に受かって翰林院に入ったため、「大石林牙」と呼ばれるようになった。1125年、遼国が滅亡した後、耶律大石は200人の騎兵を率いて西に向かい、敦城で王となり、1132年に皇帝となって正式に西遼国を建国した。
stage_intro_4603=西遼国を強化するために耶律大石は西方への進出を決意した。1131年、耶律大石は高昌を通って東カラハン朝への攻撃を開始した。
stage_intro_4605=東カラハン朝のアクマドがなくなった後、息子のイブラヒムが王位を継承したが、配下であるカルルクなどの勢力はこの機に乗じて反乱を起こした。イブラヒムは反乱の鎮圧に失敗した後、やむを得なく耶律大石に助けを求めるようになった。
stage_intro_4607=1137年、西遼国は再び西方に進出し、今度はすでにセルジューク帝国に服従した西カラハン朝をターゲットとした。西遼軍はフェルガナ谷で敵に遭遇した。
stage_intro_4609=1141年、アクマドはセルジューク朝のスルタン「サンジャール」に助けを求めた。サンジャールは10万の兵を率いて東進し、カトワン草原で耶律大石の軍と遭遇した。
stage_intro_4611=西カラハン朝を征服した後、耶律大石は将軍エイルブシを派遣してホラズムを征服した。その後、西遼国は全盛期を迎えることとなった。

