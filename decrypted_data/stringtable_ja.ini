battle_talk_3000201=攻撃だ！港の埠頭を占領せよ！
battle_talk_3000202=海上で敵の増援を発見した！
battle_talk_3000203=海上の敵軍は壊滅した！
battle_talk_3000204=よくやった！ この島を攻略するぞ！
battle_talk_3000301=攻撃！ 抵抗する敵をすべて倒せ！
battle_talk_3000302=敵が逃げている！
battle_talk_3000303=追撃だ！休息の時間を与えるな！
battle_talk_3000304=この先も激しい戦いが続くかもしれない。早めの準備が必要だ。
battle_talk_3000401=途中の都市や要塞を掃討し、敵の抵抗を断ち切れ！
battle_talk_3000402=どんな敵も私たちを止めることはできない。
battle_talk_3000403=攻撃を続け、シラクサを制圧すれば、シチリア島は我々のものだ！
battle_talk_3000404=ゲオルギオス・マニアケスが私たちの軍給を滞納している。敵から資金を調達するしかない。
battle_talk_3000501=シラクサは長期間攻略できず、軍隊は士気を失っていた。
battle_talk_3000502=今回の攻城作戦も失敗した。一旦撤退して、キャンプに戻って整備するほかない。
battle_talk_3000503=敵は混乱している。反撃の狼煙を上げる時だ！
battle_talk_3000504=敵の反撃がここまで早いとは。すぐに撤退しろ！
battle_talk_3000505=数日間の準備は、この瞬間のためにあった！オートヴィル家の栄光がここから始まる！
battle_talk_3000506=なんてこった！このノルマン人が敵を二つに斬っただと！
battle_talk_3000507=ウィリアムはシラクサを東ローマ帝国に捧げた。そして敵将を一刀両断したことで名を揚げ、「鉄腕ウィリアム」の称号を得た。
battle_talk_3000801=わが軍は数で優勢だ。最後まで戦うか、去るかはお前たちに選ばせてやろう。
battle_talk_3000802=ノルマン人は決して後退しない！
battle_talk_3000803=そうなったら、ここで最後の血の一滴を流すことになろう！
battle_talk_3000804=我が軍は敗北した！退却だ！ 速やかに撤退せよ！
battle_talk_3000901=我々には何万もの軍隊がある。有利なのは私の方だ！
battle_talk_3000902=体調は良くないが、それでも戦場から目を離さない
battle_talk_3000903=敵の第一防衛線は破られた！
battle_talk_3000904=素晴らしい戦いだ！たとえ病を患っていようが、私はこの栄光の戦場に参加する！
battle_talk_3000905=ウィリアムはその強靭さによって、次第に南部ノルマン人の実質的なリーダーとなった。
battle_talk_3001001=メルフィを囲め！我々はこの都市を手に入れるぞ！
battle_talk_3001002=この機会にモンテペローゾのキャンプを攻撃することができる。
battle_talk_3001003=敵は要塞内に堅守している、強攻は賢明な選択ではない。
battle_talk_3001004=彼らの補給線を断つことを試み、街から出て戦わせよう。
battle_talk_3001201=攻撃だ、攻撃！カラブリアは我々ノルマン人の領土となるのだ！
battle_talk_3001202=迂回して敵を包囲せよ。
battle_talk_3001203=後方に敵軍が現れた。ここで退却しなければ、次の機会はないかもしれない。
battle_talk_3001204=この戦いは敗北に終わる。ウィリアムは翌年、征服のために再び戻ってくることを決意。

