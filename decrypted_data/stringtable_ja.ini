battle_talk_150101=情報によると、彼らの軍隊はヨーロッパを離れようとしている。これは最高の機会だ！夜襲を仕掛けて侵略者を追い払おう！
battle_talk_150102=よし！このままキャンプに突入せよ。奇襲を仕掛けるぞ！
battle_talk_150103=キャンプを失陥させてはいけない。たとえ兵力が足りなくても！オスマン帝国の力を見せてやろう。
battle_talk_150201=悲しいもんだ。私を倒すためにオスマン人を招き入れたとは。彼らこそ私たちの真の敵だと知らないか？
battle_talk_150202=先にどちらを消滅すべきかっていうと、私は貴様らのほうを選ぶ。これ以上私たちの領土を侵食させたくないのだ！
battle_talk_150203=どうやらバルカン全域を手に入れるのは時間の問題だ！
battle_talk_150204=敵は河谷に入った。突撃を仕掛けるぞ！
battle_talk_150205=うわっ！待ち伏せがある！
battle_talk_150301=異教徒の拡張に対抗するためには、我々は一致団結しなければならない。そうでなければ、わずか数年後に我々はバルカン地域を失う羽目になる。
battle_talk_150302=自由のために！侵略者を追い払おう！
battle_talk_150303=一度は倒した相手だろう！なぜまた戦争を仕掛けてくるのか？今回こそ、貴様らを完全に消滅する！
battle_talk_150304=彼らと協力して戦おう！
battle_talk_150305=彼らの猛撃を避けよう。最後の拠点を死守し、必ず反撃して戻ってきます！
battle_talk_150401=スルタンがまもなく戻ってくる。我々は反撃しなければならない！反逆者どもには代償を払ってもらおう！
battle_talk_150402=属国の挑発行為には恥ずかしさを感じる。彼らを蹂躙しないと私の怒りは収まらない！
battle_talk_150403=オスマン人の攻撃は速すぎだ。王位を守りたいのであれば、降伏するしかないかもしれない。
battle_talk_150404=もしこのまま援助を送らなければ、バルカン地域は奪われる可能性がある。早く彼らを救いに行こう！
battle_talk_150501=コソボはわが民族の発祥地であり、重要な戦略的要地でもある。ここを失えばは足元をすくわれることになる。
battle_talk_150502=我々は同盟を結成し、トルコ人に一歩たりとも進めさせてはいけない！
battle_talk_150503=こちらの進軍を阻むものはない！アッラーの祝福のあらんことを！
battle_talk_150504=前に進め！この地域を突破すればより西側に領土を拡大することができる！
battle_talk_150505=命を犠牲にしてもこの土地を守らなければならない！
battle_talk_150506=私は降伏する！スルタンに降伏させてください！
battle_talk_150507=こっちに連れて来い。彼の様子を見たい。
battle_talk_150508=王とセルビアのために！殺れ！
battle_talk_150509=やめて！
battle_talk_150601=今ここで暗闇と絶望しかない！神の栄光は再びこの土地を照らすのだ！
battle_talk_150602=突撃せよ！我々は抑圧されたキリスト教徒とローマ帝国を救う！
battle_talk_150603=心配するな！彼らは集まったばかりの烏合の衆にすぎない！
battle_talk_150604=奴らの重騎兵は強い。最初の攻勢はなんとしても食い止めなければならない！
battle_talk_150605=私たちが失敗するとは思わなかった。自分たちの力を過信してしまったようだ。
battle_talk_150701=わが敵国は君の土地を必要とする。我々の旗は世界の果てまで揺らめく！
battle_talk_150702=いかん。アナトリアの守備は薄くなっている。急いで救助に向かわなければならない！
battle_talk_150703=全軍突撃！アンカラは私のもんだ！
battle_talk_150704=いや、私の失敗は帝国に滅亡をもたらす！
battle_talk_150801=コンスタンティノープルを占領せよ！私たちはバルカン地域の真の主になるのだ！
battle_talk_150802=敵の大軍が迫っている。家族と国を守るために、我々は防御を固めなければならない！
battle_talk_150803=オスマン帝国は新しい指導者を迎えたが、国内の状態はまだ安定していない。今こそ、私たちが反抗する最高の機会！出撃せよ！
battle_talk_150804=どうやら一時的にコンスタンティノープルへの攻略を諦めるしかない。まずはこれらの反抗者を消滅しよう！
battle_talk_150901=帝国は今や他の都市の防衛を構うことはできないため、テッサロニキの管理をヴェネツィア人に渡すのは最善の選択だ。 
battle_talk_150902=この都市はオスマン帝国に属するべきだ。今ならまだ降伏するチャンスがある。 
battle_talk_150903=この都市は私たちのものになった以上、断固として放棄することはない。
battle_talk_150904=オスマン帝国はテッサロニキに攻撃を仕掛けた。これでコンスタンティノープルへの圧力は軽減されたが、状況は依然として芳しくない。
battle_talk_150905=この都市は今、オスマン帝国に所属している。ヴェネツィアの艦隊も私たちを阻止することはできない。
battle_talk_150906=テッサロニキは危機に陥っている。しかし、私の艦隊はオスマン帝国の艦隊によって封鎖されており、現在その封鎖を破り、テッサロニキを援助しなければならない。
battle_talk_150907= ローマ人は攻撃を仕掛けてヴェネツィア人の圧力を緩和しようとしていますが、そのような行動は無意味です。
battle_talk_150908=海域を封鎖するオスマン帝国の艦隊が撃破された。艦隊は引き続き前進せよ！
battle_talk_150909=敵が反撃を仕掛けてきた。予備隊を出せ！
battle_talk_151001=今、オスマンの指導者は若い、軍隊の団結力はそれほど高くないはずだ。私たちはこの機会を利用して攻勢を仕掛けるへきだ！
battle_talk_151002=忌まわしきキリスト教徒め、よくも私の人生を邪魔してくれたな！攻撃を開始だ！
battle_talk_151003=防衛線を展開！陣地を固守し、奴らの攻撃を食い止めなければならない。後ろには海しかなく、もう退路はないんだ！
battle_talk_151004=王様はもう死んだ！撤退だ！王の無念は私が晴らしてやる！
battle_talk_151101=王様のために！ハンガリーのために！私は帰ってきた。王様の無念を晴らしてやるぞ！復讐、復讐開始だ！
battle_talk_151102=奴らの重騎兵は強いが、我々の剣と火銃に敵わない！オスマン帝国の未来は君の手にある。今日の戦いをしっかり見ればいい。
battle_talk_151103= はい、父上！
battle_talk_151104=敵は撃退された！反撃開始だ！
battle_talk_151201=大砲でローマの大門を打ち破り、ローマ帝国の首都を占領しよう。この土地は私たちのものなんだ！
battle_talk_151202=将兵たち、我々はこの街を守り抜かなければならない。ここは我々の故郷だ。そしてここには我々の家族や信仰がある。最後まで戦おう！
battle_talk_151203=砲火は我々の体を葬ることができるが、我々の信念と決意を葬ることは決してできない！
battle_talk_151204=ついに、先祖の願いを果たした！アラーは我々を守ってくださるでしょう。必ずあなたの教えをヨーロッパ全土に広めてみせる！

battle_talk_700601=私たちの戦略はまずタバリヤを包囲し、フランク人を救助に来るよう誘い出すこと。私たちの強みは野戦にあり、攻城や守城ではない。
battle_talk_700602=このまま救助に向かうのは危険すぎるのではないか？何か嫌な予感がするが…
battle_talk_700603=とにかく、私たちは救助に向かわなければならない。出発しよう！神が私たちを守ってくださることを信じよう！ 
battle_talk_700604=聖堂騎士団はしんがりを努め、サラディンが後ろから包囲するのを防いでくれる。
battle_talk_700605=水と物資を補充するために、早くガリラヤ湖に行かなければならない。水不足が限界に達している。 
battle_talk_700606=撤退を考えるべきかもしれない。サラディンの防衛線を突破できないからだ。
battle_talk_700607=突破することが唯一の生き残る道だ！でなければ、ここで死ぬことになる！王国も滅びてしまう！
battle_talk_700608=奴らが水源に近づくのを阻止しろ！フランク人は疲れ果てており、まともに戦えない。この機に乗じて奴らを消滅する。
battle_talk_700609=団結しないフランク軍は失敗するに決まっている。エルサレムには新しいご主人が来るかもしれない。
battle_talk_700610=神よ、私だけが逃げ出した。この戦いは最初から間違っていたかもしれない。

battle_talk_56=将兵たち、私と共に突撃せよ。勝利は目の前にあり、栄光は私たちのものとなる。
battle_talk_57=陣形を固めろ。アラーは私たちと共にいる！
battle_talk_58=オスマン人は周辺の土地を次々と侵食しており、いつか昔の仇を報いるためにやってくるでしょう。彼らが力をつけ続けるのを見過ごすわけにはいかない。彼らがバルカンの泥沼に深くはまっている間に、こちらから攻勢を仕掛けるべきだ！
battle_talk_59=オスマンの巨砲が城下に到着した。コンスタンティノープルは危機に瀕している。皆さん、私と一緒に支援に行こう。
battle_talk_60=城壁は崩れたが、私たちの心はまだ倒れていない。この街を占領したいなら、私の死体を踏み越えて行くがいい！
battle_talk_61=誰も簡単に信じることはできない。すべての憎しみは血で償ってもらう。 
battle_talk_62=チャイペシュが私のために大公の位を取り戻してくれた。なら今は私が彼を助ける番だ。
battle_talk_63=ビザンティン帝国の栄光は私たちが引き継ごう。今日から、私たちはビザンティン帝国そのものだ！
battle_talk_64=黒羊王朝は滅び、西方からの援軍も海上海から出発した。軍隊を整え次第、オスマン帝国に進軍せよ。

general_desc_Murad I=ムラト1世はオスマン帝国のスルタン。彼は在位中に領土拡張政策を全力で推進し、東南ヨーロッパと西アジアの多くの国を征服し、オスマン・トルコ帝国の台頭の基盤を築いた。しかしその後、彼はコソボの戦いで暗殺された。
general_desc_Bayezid I=ムラト1世の息子。著名な軍事指揮官で「稲妻」とも呼ばれる。彼は統治期間中にトルコの領土拡大に大きな貢献をした。ニコポリスで数十万の十字軍を打ち負かしたが、アンカラの戦いで捕虜となった。
general_desc_Murad II=ムラト2世は在位中、国力を振興して軍備を整え、分裂寸前のオスマン帝国を救った。その後、オスマン帝国のための確固たる基盤を築いた。
general_desc_John Hunyadi=ハンガリー王国の国民的英雄。「白騎士」というあだ名を持っている。彼は戦で何度も敗北したが、オスマン帝国の強さを恐れず、長期にわたってオスマン帝国の拡大を阻止し続けていた。
general_desc_Princess Sophia=コンスタンティン11世の姪。モスクワ大公イヴァン3世と結婚し、イヴァン3世がロシア人を完全にジョチ・ウルスの数世紀にわたる支配から解放するのを助けた。
general_desc_Stephen the Great=彼は在位中、国家の存続のために民族の独立を求め、後世のルーマニア人を鼓舞した。その後、教会に聖人として追封され、「偉大で神聖なステファン」と呼ばれた。
general_desc_Vlad III=ワラキア公国の大公。彼は勇敢であり、ルーマニアを守った英雄である。しかし、彼は自国の貴族や民衆に対して串刺し刑を行ったことから、「串刺し公」と呼ばれ、吸血鬼の原型とされる人物でもある。
general_desc_Charlemagne2=シャルル大帝はフランク王国の最も偉大な王の一人であり、中世ヨーロッパで最も影響力のある人物の一人である。彼はヨーロッパの大半を征服し、ローマ教皇によって「ローマ人の皇帝」として王冠を授けられた。
general_desc_Arthur2=石の剣を抜いた人のみイングランドの王になれると言われている。アーサー王は石から剣を引き抜いたことで、人々の心の中で「永遠の王」となった。彼は英雄主義や騎士道精神、正義などを表している！
general_desc_Mehmed the Conqueror2=彼の勇気やリーダーシップ、文化的業績により、ムハンマド2世は「征服者スルタン」と「ヨーロッパの征服者」として尊敬され、今後のスルタンたちの模範とインスピレーションの源となった。
general_desc_Candarli Halil=チャンダルル・ハリル・パシャはオスマン帝国の著名な政治家であり、軍の将校でもある。15世紀の中頃に大宰相とオスマン帝国の総司令官を務めたことがある。彼はその勇気や知恵、リーダーシップ能力で尊敬され、「トルコのブレーン」や「ハリルマスター」と称された。

