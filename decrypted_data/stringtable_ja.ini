;战役章节开篇
;__font_type[font_text_]
campaign_desc_1=多くの敵の侵入により、すでに弱体化していたローマ帝国は雪の上に霜を加えるようになった。20年の間に王位が更迭し続いたことで、帝国に大混乱を招いたあげく、ローマ帝国の終焉はもう避けられないようだ。
campaign_desc_2=異民族の侵入によって西ローマ帝国が滅亡はもう避けられないように見える。東方のコンスタンティノープルには、ビザンティン帝国を栄光に導いた2人の人物、ユスティニアヌス1とベリサリウスが来ている。
campaign_desc_3=ローマ帝国が弱体化していく中で、イギリス諸島に対する支配力はますます弱まっている。ゲルマン地域から来たアングロ・サクソン人はこれを利用してイギリス諸島に大量に移住した。帝国の保護を失った島民は、自力で侵略者に立ち向かわなければならなかった。
campaign_desc_4=西暦7世紀以来、アラブ人はあちこちで戦争を起こしていた。そしてビザンティン帝国は彼らの強敵である。
campaign_desc_5=西暦8世紀以降、繁栄したイギリスは莫大な富を手に入れ、人々は海がイングランドの自然の障壁だと信じていた。しかし、今回の攻撃は海から来たものとは思わなかった。
campaign_desc_6=バシレイオス1世が皇帝の座に就くことでビザンティン帝国のマケドニア王朝は新たな章を迎えることになった。マケドニア王朝はビザンチン帝国の最盛期だった。
campaign_desc_7=1066年、エドワード懺悔王は臨終の床でハロルドを後継者に指名した。同時に、ノルマンディー公は自分も後継者の権利を持っていると考えていた。ハロルド2世が即位したニュースがノルマンディーに伝わった時、ウィリアムは激怒し、直ちにイングランドへの出兵を宣言した。
campaign_desc_8=1057年にマケドニア王朝が終焉を迎えた後、ビザンチン帝国は数十年にわたる不況と衰退を迎えた。1081年にアレクシオス1世が即位したことによって、このような状況に終止符が打たれた。コムネノス家族の支配下で、ビザンチン帝国は徐々に回復している。
campaign_desc_9=教皇の許可を得て、西ヨーロッパの諸侯や騎士たちは、軍を率いて地中海の東岸に向かった。敵に占領された聖地エルサレムを取り戻そうとしていた。
campaign_desc_10=1135年の内戦を経て、マティルダ皇后は息子のヘンリー2世にイングランドの王位継承権を確保することに成功した。1154年にヘンリー2世はウェストミンスター寺院で戴冠したことで、プランタジネット朝が正式に幕を開けることとなった。
campaign_desc_11=第4回十字軍の後、コンスタンティノープルは十字軍に占領された。ビザンティン帝国は亡命してニカイア帝国となった。ラテン帝国はすべてのビザンティン人に恐れられている存在となった。
campaign_desc_12=13世紀末、大セルジューク朝が滅亡した後、オスマン帝国が成立した。オスマン帝国の成立により、元々分散していたベイリク君侯国が連合してオスマン帝国とともにビザンティン帝国に対抗することになった。
campaign_desc_13=イングランドとフランスは、ウィリアムのイングランド征服以来、多くの対立と衝突を繰り返していた。フランス王フィリップの死後、王位の継承者が決まらないため、フランス全土に大きな危機が訪れた。1337年、エドワード3世は正式に自分のことをフランス王として自称し、一方フィリップ6世はフランスにおいてエドワード3世の領土をすべて回収すると宣言したため、両国は戦争に突入した。
campaign_desc_14=イングランドの政治情勢は徐々に安定し、1413年にウェストミンスター寺院でヘンリー5世が戴冠した。この偉大な戦士には大陸征服という野望が新たに芽生えた。ヘンリー5世は、先祖の果たせていない願いを叶えるため、「英仏帝国」の設立を目論んでいる。
campaign_desc_15=オスマン帝国が拡大すると共に、代々のスルタンが西の世界との戦いに生涯を捧げた。しかし、彼らの目の前には難攻不落の都市、コンスタンティノープルと呼ばれる都市がある。
campaign_desc_16=リチャード2世が倒された後、イングランドの王位をめぐってエドワード3世の子孫であるランカスター家とヨーク家が戦争を起こした。
campaign_desc_51=多くの敵の侵入により、すでに弱体化していたローマ帝国は雪の上に霜を加えるようになった。20年の間に王位が更迭し続いたことで、帝国に大混乱を招いたあげく、ローマ帝国の終焉はもう避けられないようだ。
