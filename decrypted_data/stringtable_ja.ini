stage_group_desc_20008=1302年、拡大し続けるオスマン帝国はビザンツ帝国を相手に国境紛争を起こした。皇帝ミカエル9世は親征したもののオスマン帝国に敗北し、ミカエルの父はゲオルギオス・ムザロンに軍を率いさせ支援すると決めた。7月27日、ビザンツ軍はバフェウスでオスマン1世麾下の騎兵隊と遭遇した。

