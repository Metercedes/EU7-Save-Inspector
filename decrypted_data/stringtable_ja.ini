stage_intro_4221=トロワ条約が締結された後、フランスは最も暗い時に陥り、フランスの大半の領土がイングランド人に占領された。その時、ジャンヌ・ダルクはまるで神の奇跡のようにフランス人の前に現れた。
stage_intro_4223=イングランド人はオルレアンの外で城を建て、オルレアンの守備軍を囲もうとしていた。ジャンヌ・ダルクはオルレアンを固守せず、自ら出撃すると決め、旗を振って砦に登った。
stage_intro_4225=ジャンヌはオルレアンを固守するのをやめ、率先して出撃すると決めた。彼女は旗を振って城に登った行動は敵の士気を大きく下げ、フランス軍はオルレアンの解放に成功した。
stage_intro_4227=オルレアンが解放された後も、イングランド軍の一部はオルレアンの近くにあるジャルジョーに駐留していた。フランスはオルレアン南東部の脅威を解除し、イングランドの反撃の可能性をつぶすために、ジャルジョーを早く制圧する必要がある。
stage_intro_4229=ジャルジョーを取り戻したジャンヌは、すぐに軍隊をロワール川辺に移動させた。そこで、彼女は奇襲を仕掛けてロワール川の南側で進軍するイングランド軍を足止めした。
stage_intro_4231=ロワール川辺への橋を奪取したジャンヌは、ムーヌの町や城を直接攻撃しなかった。しかし、彼女は翌日、近くのボージョンシーを攻撃し、イングランド軍はやむを得ず町を捨てて城に撤退した。
stage_intro_4233=一日でボージョンシーは陥落したことによって、イングランド援軍の士気は大幅に下がり、いくつかの激戦の末にイングランドはパリに退却せざるを得なくなった。ジャンヌは進軍速度を上げて全力で追撃すると決め、やがて双方はパルティエで遭遇した。
stage_intro_4235=パテーの戦いでの勝利はイングランドがフランスを占領する野心を終わらせ、フランス軍の退勢を一掃した。その後、重装騎兵がランスに赴き、太子の戴冠のために必要な教会を奪取しようとした。
stage_intro_4237=軍隊の強い要請により、シャルル7世はパリへの攻撃を命じた。ジャンヌはフランス軍を率いてイングランド軍の主力部隊と激戦を繰り広げた。彼女は負傷しても先頭を切って戦い続けていた。
stage_intro_4239=フランス軍がパリに猛攻撃を仕掛ける正念場で、フランス王室は軍に撤退を命じた。その後、ジャンヌはラ・シャリテを包囲すると命じられたが、兵力も食料もない真冬の戦いは極めて困難なものであった。
stage_intro_4255=ジャンヌはコンピエーニュがブルゴーニュ公国の攻撃を受けていることを知らされ、救援に向かうと決意した。 しかし、敵軍に囲まれて捕らえられてしまった。 その後、この国民的英雄は、ブルゴーニュ人によってイギリス人に売られ、ルーアンで処刑された。
stage_intro_4257=イングランドはジャンヌを異教徒として裁いたが、彼女は決して屈せず、無実を主張した。15世紀のフランスの歴史は、一人の少女の意志によって完全に変わった。

