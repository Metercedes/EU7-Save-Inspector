stage_intro_4641=14歳で初めて即位した時から、ムハンマド2世の心には壮大な野望があった。それはコンスタンティノープルを攻略し、ビザンティン帝国を滅ぼすとのことだった！1451年、彼が再びオスマン帝国のスルタンになった時、ついにこの計画を実行する機会を得た。
stage_intro_4643=コンスタンティノープルの陥落はムハンマド2世の征服の道のりの終わりではなかった。実際、コンスタンティノープルの再建に伴い、この若くて元気なスルタンの征服が幕を開けたばかりだった。1456年、士気の高ぶるオスマン軍はベオグラードに向けて進軍を始めた。
stage_intro_4645=ベオグラードの戦いの失敗を受けてムハンマド2世は1457年、この一年中に大規模な戦争を始めていなかった。1458年に実力を回復したムハンマド2世が彼の征服の戦いを再開した。そして、今回周辺諸国が直面するのは豊富な経験でより成熟したムハンマド2世である。
stage_intro_4647=オスマン帝国が西に拡大する際、しょっちゅう東アジアの事情に邪魔された。特に白羊朝のウズン・ハサンがエルズィンジャンで軍隊を集めて帝国に侵入した後、ムハンマド2世はバルカンから離れ、この不安定な東方の隣人をしっかりと教育しなければならない。
stage_intro_4649=オスマン帝国が白羊朝を大敗した後、ムハンマド2世はアナトリア地域の統一を成し遂げ、帝国がその地域での支配的地位を確立した。その時、彼はついにバルカン征服を目にすることができた。最初に直面するのはバルカン統一を妨げる最も頑固な国「アルバニア」である！
stage_intro_4651=戦火は徐々にイタリア半島に広がった。オスマン帝国の脅威に対抗するために教皇は各勢力に援助を求めた。しかし、ムハンマド2世は当時、彼の注意をロドス島に向けており、ロドス島を占領することで東地中海を完全に制御しようとしていた。ただし、この偉大な征服者も自分の終わりを迎えることになる。

