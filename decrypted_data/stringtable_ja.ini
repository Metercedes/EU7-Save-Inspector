stage_intro_1601=狂気発作から1年後、ヘンリー6世は正気を取り戻した。王妃アンジューのマーガレットの支援を受けてサマセット公爵は復職した。ヨーク公爵リチャードは護国卿の地位を失い、宮廷から追われた。1455年、不満を抱いたヨーク公爵リチャードは、ネヴィル家族と共に軍隊を集めてロンドンに進軍し、サマセット公爵を一掃することを企んでいた。
stage_intro_1602=第1回セント・オールバンズの戦いが終わった後、ヨーク公爵は宮廷での敵を排除し、護国卿の地位に復帰した。しかし、1456年初めに、ヨーク公爵は王室のために土地を回収する法案を提出したが、議会に否決され、自ら護国卿の地位を辞任することになった。同時に、王妃マーガレットも密かに力を結集し、王室の権力を奪回しようとしていた。1459年、両者の対立が激化し、ヨーク派のソールズベリー伯爵が南下してヨーク公爵と合流することを企んだため、マーガレットは兵士を派遣して阻止しようとしていた。双方はブロックスワースで遭遇戦を起こした。
stage_intro_1603=ヨーク公爵はソールズベリー伯爵と合流した後、前進を続けることができなかった。彼らの前に現れたのはヘンリー6世の旗印を掲げた軍隊だった。そしてその数はおおよそ彼らの2倍から3倍程度。両軍の兵力差により、ヨーク公爵は一時的に部隊を後退させて野営すると命じた。そして自分の忠誠心を国王に伝えるために手紙を書いた。しかし、その前にブロックスワースで起こった戦闘により彼はすでに国王の信頼を失っており、大きな戦いが避けられなくなっていた。
stage_intro_1604=ラドフォード橋の戦いでの敗北により、ヨーク家の地位は急落し、ランカスター家の勢力は徐々に拡大してヨーク家の一部領地を獲得した。名目上、サマセット公爵は、かつてウォリック伯が所有していたカレーを領地として獲得したが、カレーはサマセット公爵の支配を拒否した。1460年1月、ウォリックは先制攻撃を仕掛けてカレー地方に攻め込もうとしていたランカスター軍を襲撃し、ロンドンに向かって進軍を開始した。ランカスター家の軍隊はこの情報を知った後、迅速に北のアンプトンで防御陣地を築いて、迫り来るヨーク家の軍隊を阻止しようとしていた。
stage_intro_1605=ノーサンプトンの戦いの後、ヨーク公リチャードはとある法案を通過させた。「国王が死亡した場合、リチャードとその子孫は王位を継承することができる」という内容の法案であった。これは彼が権力の頂点に達するために必要とされる最後の一歩を踏み出すことを意味している。しかし、この一歩を踏み出す前に、最後の障害が残っていた。元王妃マーガレットはランカスター家の同盟者に向けてヘル川沿いのキングストンに兵を集結し、ロンドンへの南下を試みた。リチャード公爵は、この情報を知った後、すぐに軍隊を組織して北上した。急いで出兵したため、兵力は敵より少ないし、補給も非常に不足していた。リチャード公爵は最初の戦闘で敗北したため、サンダーランド城に退却して援軍を待つことになった。
stage_intro_1606=ヨーク公リチャードは、ウェイクフィールド平原で敗北した後、殺され、彼の息子エドワード4世が彼の爵位を継承しました。エドワード4世はわずか18歳でしたが、年齢を超えたリーダーシップと指揮能力を発揮しました。ヨーク公リチャードが敗北してからわずか1か月後、エドワード4世は軍隊を率いてモーティマー十字でランカスター家の軍隊と激戦を繰り広げました。
stage_intro_1607=モーティマーズ・クロスの戦いが終わった後、エドワード4世が軍隊を再編成している間に、王妃マーガレットの盟友たちはすぐに南から北に向かうよう軍隊に命じた。わずか半月の間に、この何万もの大軍はロンドンに迫り、ウォリックが軍隊を率いて出撃した。偶然にも、6年前のヨーク家とランカスター家の最初の戦いと同じように、この大戦争の発生地は聖オールバンズという小さな町だったが、今回の対戦の結末は完全に異なった。
stage_intro_1608=マーガレットの軍隊がセント・オールバンズで勝利を収めたにもかかわらず、戦後の一連の暴行のため、ロンドン市民は彼らを迎え入れることを拒否した。無念ながら、マーガレットはやむ得ずに北部に撤退した。その後、ロンドンで高い人気を有するエドワード四世が王位に推挙され、元国王ヘンリー六世は廃位された。この情報を知ったマーガレットは、ヨーク家に反対する北部の勢力を集め、エドワード四世を打ち負かそうとしていた。これにより、イギリス本土で最も残酷な戦闘の1つが始まろうとしていた。
stage_intro_1609=トートンの戦いで、エドワード4世は彼に反対するランカスター派の大部分を打ち負かした。その後の数年間、エドワード4世は、様々な手段を使って以前の敵を友人に変えようと試みた。その中には、彼の大敵である第3代サマセット公ヘンリー・ボーフォートも含まれている。1463年末、サマセット公爵は秘密裏に廃位されたヘンリー六世と会い、再び反乱を起こした。怒りを感じたエドワード4世はジョン・ネヴィルを召集して反乱を鎮圧せよと命じた。今回、彼はサマセット公爵を完全に消滅しようとしていた。
stage_intro_1610=ヘッチリー沼で敗れたサマセット公は、ヘクサムの海岸に退却した。彼は軍隊を三つに分け、防御工事を築き、ヘクサムの南側で追手を防ごうとしていた。しかし、ジョン・ネヴィルの追撃は非常に速くてサマセット公に休む時間を与えるつもりはない。

campaign_desc_16=1453年7月、カスティヨンの戦いでの敗北の報せが届くと、イングランド王ヘンリー6世はショックを受けて発狂し、統治能力を失った。イングランド国内のランカスター家とヨーク家が最高権力を争うために対立し、それが戦争に発展した。2つの家族の紋章がそれぞれ赤いバラと白いバラであるため、この戦争は「バラ戦争」とも呼ばれる。
campaign_desc_17=エドワード4世がイングランド王に即位した後、彼はかつての敵と和解する努力をし、イングランドに一時的な平和をもたらした。しかし、エドワード4世の和解政策は彼と彼の元盟友との関係に亀裂を生じさせた。1469年、エドワード4世の最も忠実な部下であったウォリック造王者が反乱を起こし、イングランドに新たな動乱をもたらした。

campaign_end_desc_16=ヘクセムの戦いで、ランカスター家の軍事力はほぼ壊滅し、ヨーク家がイングランドの支配者となった。違った点は、エドワード4世がこの戦いを指揮するために自ら出陣しなかったことである。彼はこの時期により重要なこと——女性との結婚式の準備——に忙殺されていたからだ。この女性の名前はエリザベス・ウッドビルであり、後に人々は彼女を「白王妃」と呼んだ。
campaign_end_desc_17=戦争の終結により、イングランドにおけるプランタジネット朝の支配が終わり、ウェールズ人のテューダー朝が始まった。また、イギリス中世が終了し、新しいルネッサンスの時代が始まったことを意味している。

general_desc_Manuel I=12世紀のビザンティン帝国皇帝は、彼の統治期間中にコムニノス王朝が最後の栄華を迎え、帝国の軍事的・経済的実力が回復し、文化も繁栄に向かった。

