conquest_faction_desc_701=オスマン帝国はヨーロッパへの拡張を続けていた。同時に、帝国内部でも改革が行われ、新しい法令が制定されたため、中央政府の統制力が強化された。オスマン帝国は国内外からの挑戦に臨んでいるが、当時最も強大な国家の一つであり、強力な軍事力と文化的影響力を持っている。
conquest_faction_desc_702=かつてのビザンティン帝国の栄光はもうなくなった。領土が縮小し、内部の政治的腐敗が深刻する一方、経済が停滞している。オスマン帝国はビザンティンに対して一連の攻撃を仕掛け、その領土を侵食し、滅亡の瀬戸際に追い込んだ。
conquest_faction_desc_703=ハンガリー王国は、バルカン半島に移住して以来、戦火の洗礼を受けていた。セルゲド王の治世により、国家は再び繁栄した。しかし、内部では貴族と中央集権の対立が存在している。同時に、オスマン帝国の脅威に備えてハンガリー王国は軍備を強化し、国土の完全性と安全を保たなければならない。
conquest_faction_desc_704=ワラキア公国は、ハンガリー王国とオスマン帝国からの二重の脅威にさらされている。公国の指導者たる人物「ヴラド2世」は闘志満々で、強硬な措置を取って公国の独立を維持しようとし、時には暴力を振るっても構わないと思っていた。しかし、ハンガリー王国の攻撃に対して、彼は不幸に敗北し、やむを得ず屈辱的な平和条約を受け入れることになった。
conquest_faction_desc_705=モルダヴィア公国は比較的若い公国である。この小国はハンガリー王国とワラキア公国と接しており、国内で動乱と紛争が絶えず続いていた。シュテファン卿は自身の統治地位を固めるために多大な努力を払い、隣国との紛争を平和的に解決した。同時に積極的に国際的な支援を求めようとしていた。
conquest_faction_desc_706=ボスニア王国は、多文化、多民族の国家であり、多くの民族が居住している。王国内部では、貴族同士の争いが絶えず、外部ではハンガリーとオスマン帝国からの脅威にさらされている。
conquest_faction_desc_707=この時期、セルビア専制国は内外共に困難に見舞われていた。セルビアには強力な支配者がいたが、これらの脅威により、その国の未来は不確実性に満ちている。
conquest_faction_desc_708=ヴェネツィア共和国は、東地中海の貿易覇権を巡る争いで挑戦に直面していた。彼らはキリスト教の競争相手であるジェノバ共和国と海域の支配権を争っていた。このような緊張した状況下で、ヴェネツィア人は強硬な措置を取ることを余儀なくされた。彼らは地中海における利益と影響力を確保するために、敵勢力の艦船を襲撃し、軍事介入を開始した。
conquest_faction_desc_709=アルバニアは複数の領土に分割されていた。国内のアルバニア貴族は、オスマン帝国の侵略に対抗するため、アルバニア連合を設立した。スカレ公爵を盟主とする連合は、一連の戦いでオスマン軍を打ち破り、アルバニアの独立を確固たるものにする重要な力となった。
conquest_faction_desc_710=エピロス専制侯国は、ギリシャ地域の強力な政権であり、カロ2世によって支配されていた。ビザンティン帝国との領土紛争があるにもかかわらず、エピロス専制侯国は戦争で強力な軍事力と指導力を発揮し、ギリシャ地域の重要な勢力と見なされていた。
conquest_faction_desc_711=モリア専制公領は、ビザンチン帝国が残した唯一の割拠政権である。その国の指導者「トマス・パレオロゴス」は、自身の統治を固めるために努力し、オスマン帝国の脅威に対抗しようとしていた。
conquest_faction_desc_712=アラゴン連合王国は、イタリア南部のナポリ王国を支配し、教皇と衝突した。この地域は、政治的不安定さや軍事的衝突、疾病の流行により影響を受けたが、アラゴンの文化的および経済的影響力はまだ拡大し続けている。
conquest_faction_desc_713=カラマンベイ国は、隣国のオスマン帝国との絶え間ない衝突と圧迫に直面しているため、独立を維持しながら発展を図る道がますます困難になっていた。
conquest_faction_desc_714=病院騎士団とキプロス王国が力を合わせてキプロス・病院騎士団連合を設立した。その後、東地中海地域の海賊に打撃を与えた。連合はオスマン帝国からの圧力に直面しているが、強力な海軍と巧妙な戦術でその地域での影響力を維持している。
conquest_faction_desc_716=十字軍連合軍はポーランドとハンガリーの王、ヴワディスワフ3世に率いられ、ワラキアのミルチャ2世の軍勢と共にブルガリアの港湾都市ヴァルナを占領し、オスマン帝国の内陸に進軍した。

