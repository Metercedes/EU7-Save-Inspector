conquest_faction_desc_603=ランカスター公ヘンリーがイングランド王位を奪おうとし、フランス王国との戦争を再開した。この戦争は10年近く経ち、両国の国民は苦境に立たされていた。国内で勃発した農民一揆に対して、イングランド王国はフランス王国との紛争をきちんと解決できる方法を見つけなければならない。
conquest_faction_desc_602=イングランド王国がアイルランド島を侵略した後に設立した従属政権のため、アイルランド領の各総督はイングランド国王に冊封されなければならない。そして今、イングランド王国の政権が不安定になり、アイルランド領はより大きな自治権を獲得したため、領主たちはイングランド王国の支配に服従することをますます嫌がるようになった。
conquest_faction_desc_601=イングランド王国の支配を嫌うゲール人が建国した王国。アイルランド島に残る唯一のゲール人勢力として、エルユーク王国は決してイングランド王国に服従することはなく、アイルランドからイングランドを追放してアイルランド全土を取り戻そうとしていた。
conquest_faction_desc_604=スコットランド王国は建国以来、南側のイングランド王国と戦争状態にあり、どちらも相手を征服し、グレートブリテン全体を統一することを望んでいた。イングランド王国がフランス王国との戦争で大きな優位に立った今、スコットランド王国はイングランド王国を抑えるために、より大きな力を投入しなければならない。
conquest_faction_desc_605=カペー朝が崩壊した後、イングランド王エドワード3世がフランスの王位を手に入れようとするため、フランスとイングランドの間で1世紀近くに及ぶ戦争が始まった。 フランス王国がイングランドの攻勢で多くの都市を失い首都パリまで制圧された。今、奇跡が起きない限り、ヴァロワ家の統治が終わるのは必然だった。
conquest_faction_desc_606=フランス王国とイングランド王国の間に位置するブルターニュ公国は、公爵の継承をめぐってしばしば両国の顔色を伺わなければならない。英仏戦争が再開された今、ブルターニュ公国は大国間の争いという泥沼に巻き込まれないよう、より慎重に行動する必要がある。
conquest_faction_desc_607=ブルゴーニュ公国はフランス王国の属国であり、その歴史は蛮族の大移動でブルゴーニュ王国を建国したブルゴーニュ人に遡れる。フランスの王位をめぐってイングランドとフランスが戦争という泥沼に陥った今、ブルゴーニュ公国はこれを機に領土を拡大し、次第にヨーロッパ大陸の有力な勢力となった。
conquest_faction_desc_608=デンマーク・ノルウェー・スウェーデンの3王国間で締結された同盟。この三つの国は同じ君主を奉戴している。カルマル同盟の創設により、スカンジナビアのヴァイキングの子孫たちは、南の強力な隣人である神聖ローマ帝国に抵抗できるようになった。
conquest_faction_desc_609=東フランク王国のオットー1世がローマ皇帝としてローマで戴冠した後、建国した帝国である。建国当初の神聖ローマ帝国は強力だったが、大空位時代という混乱を経て、帝国の中央権力は衰退し、数百の属国で結成された緩やかな連合体へと発展していった。
conquest_faction_desc_610=神聖ローマ帝国の属国の一つであるボヘミア公国は、チェコ人によって作られた。 神聖ローマ帝国は、カトリック教会を支持し、フス派を支持あるいは同情するボヘミア人を残酷に鎮圧したため、ボヘミア人はやむを得ずその暴政に立ち向かわなければならなかった。
conquest_faction_desc_611=神聖ローマ帝国の属国の一つで、バイエルン公国の属国から昇格して独立した公国である。オーストリア公アルブレヒト2世は神聖ローマ皇帝ジギスムントの女婿で継続者として指名された。ハプスブルク家にとって、これは帝位を継承する絶好の機会かもしれない。
conquest_faction_desc_612=神聖ローマ帝国の属国の一つで、東フランク王国が作り上げた自治公国から来たと言われている。バイエルン公国を支配しているヴィテルスバッハ家は、神聖ローマ帝国の王位を何度も獲得したことがある。現在、帝国内の混乱に伴い、バイエルン公国が帝国の支配権を取り戻そうとしていた。
conquest_faction_desc_613=プロイセンを征服したチュートン騎士団が建国したキリスト教国家。かつてポーランド王国に招かれてプロイセンに入ったチュートン騎士団は国を設立した後、急にポーランド王国と反目し、今では互いに敵視している。
conquest_faction_desc_614=ポーランド王国王冠領とも呼ばれ、ポーランド人が権力を持ち、実際に支配している地域である。チュートン騎士団がプロイセンを征服して以来、欲深いゲルマン人はポーランド王国を侵入し始めた。ゲルマン人をプロイセンから追い出さない限り、ポーランド王国に平和は訪れないだろう。
conquest_faction_desc_615=アルル王国の崩壊後、サヴォワ家はイタリア北西部とフランス南東部で設立した独立公国である。サヴォワ公国は東フランク王国と西フランク王国の間に位置し、この二大勢力に気を配る必要がある。
conquest_faction_desc_616=ミラノ公国はイタリアのロンバルディア州に位置する。公国は名義上で神聖ローマ帝国の一部であるが、高度な独立性と自治権を持っている。ミラノ公国はアルプスを天然の防壁とし、南へ積極的に発展して北イタリアの統一を目論んでいた。
conquest_faction_desc_617=イタリア北西部のリグーリア地方に位置する商業都市国家である。十字軍の東征によって繁栄し、西地中海で最も強力な海洋共和国に成長した。その後、ジェノヴァは香辛料貿易の競争でヴェネツィア共和国に勝つことができず、しばらく隠れ潜むことを選んだ。
conquest_faction_desc_618=西ローマ帝国が蛮族の侵略によって滅亡した後、イタリア北部沿岸の住民はラグーンに逃れ、そこに集落を作り上げた。その後、ヴェネツィア共和国が発展を成し遂げ、ヴェネチアとの戦争を経て、ジェノバ共和国を倒して海洋の覇権を手に入れた。
conquest_faction_desc_619=シチリアのヴェスパー戦争の後、アラゴン連合王国がシチリアからシチリア島を分離させた。旧王国のイタリア部分の領土はナポリ王国と呼ばれるようになった。ナポリ王国はシチリアの分裂を認めず、失われた領土を取り戻すと決意した。
conquest_faction_desc_620=かつてカスティーリャ王国の一部であったポルトガル・ブルグが独立し、成立した王国である。ポルトガル王国はヨーロッパ大陸の最西端に位置し、へんぴな土地しか有していないが、積極的に国土の拡大を求めている。そのユニークな地理的位置によって複数の敵に攻められる心配はない。
conquest_faction_desc_621=カスティーリャ王国がレオン王国を併合してできた君主制国家。カスティーリャ連合王国が後ろでイベリア半島の再征服活動を支援している。イベリア半島に残るイスラム勢力が弱体化した今、カスティーリャ連合王国はイベリア半島全体を統一できるかもしれない。
conquest_faction_desc_622=アラゴン王国とバルセロナ王国が合併してできた君主制国家。西地中海の主な島々を支配し、非常に強い制海権を握っている。これらの島はヨーロッパ大陸の事情に介入するための踏み台である。
conquest_faction_desc_623=後ウマイヤ朝が崩壊した後、イベリア半島に残った最後のイスラム王国。イベリア半島の大半の領土を取り戻したキリスト教に対して、グラナダ王国の立場は危うくなっている。幸いにこれらのキリスト教諸国は一枚岩ではなく、王国にはまだ生き残る可能性がある。

