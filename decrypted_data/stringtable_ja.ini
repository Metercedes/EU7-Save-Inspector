campaign_name_601=オートヴィル家
campaign_desc_601=新千年紀は、拡大するイスラム帝国が世界を支配する勢いの中、東ローマ帝国が蠢き、ヨーロッパ諸国が疫病の重みで崩壊しそうな状況で始まる。この頃、ヴァイキングの末裔たちが西ヨーロッパを引き裂き、同時に未来の台頭の原動力となっていた。彼らの一部はイギリスの海岸に上陸し、地中海地域で一つの卑しい家族が伝説的な物語を繰り広げた。その家族の名はオートヴィル家である。
campaign_name_307=トロイの宝物
campaign_desc_307=トロイの旧跡の地下で、彼らは比類のない精巧な古代ギリシャの財宝を発見する。しかしそれは危険なもので、復讐の女神の呪いを受けているようだった。


