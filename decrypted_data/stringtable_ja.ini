stage_intro_30101=グリエルモ1世の死後、ドロゴンはプーリア公爵となった。タンクレードと第二夫人との間に生まれた息子ロベルトがイタリアに到着した。ドロゴンはこの弟を好んでおらず、ロベルトをカラブリアに派遣した。この不毛な地ではノルマン人が歓迎されておらず、ロベルトは狡猾な手段を用いて住民たちを搾取し、「グイスカルド」、すなわち「狡猾者」と呼ばれるようになった。
stage_intro_30102=ランゴバルド人は次第にノルマン人の貪欲さを嫌うようになり、暴動が勃発した。これを機に東ローマ帝国はスパイや刺客を送り込み、1051年にドロゴが襲撃で殺されると、プーリア全土が混乱に陥った。ノルマン人に恨みを抱いていたローマ教皇レオ9世は、直ちに東ローマ皇帝、神聖ローマ皇帝、地元貴族と連絡を取り、反ノルマン同盟を結んだ。 ハンフリーは緊急にロベルトを召集しなければならなかった。
stage_intro_30103=東西教皇庁は分裂し、ノルマンの危機は渦中に消えた。 今や唯一の脅威は、兄弟間の対立となった。ハンフリーはマラリアと精神的疲労に苦しんだ後、ロベルトとの和解を決意し、ロベルトの相続を承認した。ロベルトは最年少の弟ルッジェーロと共にカラブリアの征服を開始した。
stage_intro_30104=ロベルトとルッジェーロはカラブリアで5年間戦い続け、この5年間の戦争によって彼らは成熟した指導者となった。
stage_intro_30105=改革派の教皇たちは神聖ローマ皇帝や貴族たちと対立しており、教皇庁の地位を確保するために、教皇は危険を冒してイタリアにおけるノルマン人を承認し、彼らを同盟国として確保した。1059年8月23日のメルフィ憲法で、教皇ニコラウス2世はグイスカルドをプーリア、カラブリア、そしてシチリア島の公爵に任命した。
stage_intro_30106=グリエルモ1世の死後、西シチリアは再びサラセン人の領土となり、1060年に兄弟は海峡を越えてシチリアに上陸し、新たな征服の道を歩み始めた。
stage_intro_30107=勝利を重ねるにつれ、戦利品や指揮権をめぐって兄弟は反目し合い、2人は共に統治するという気まずい決断を下した。その後、ロベルトはシチリアで過ごす時間はほとんどなく、彼の目的は東方へと向かい始め、イタリア半島にあった東ローマ帝国の最後の砦を奪うことを決意した。
stage_intro_30108=バーリ陥落後、ロベルトはますます強欲になり、ランゴバルド公国を攻撃した。 アマルフィ、サレルノ、ナポリが次々とグイスカルドによって攻撃された。
stage_intro_30109=ロベルトは65歳になっても少しも疲れを見せず、戦場と権力を愛し、東ローマ帝国の土地を欲しがるようになり、さらには模造のローマ皇帝のローブを着用するようになった。セルジューク・テュルクがビュザンティオン帝国に侵攻し、ローマ皇帝ミカエル7世は同盟者を求めてロベルトと婚姻を結ぶことを同意、ロベルトの娘ヘレナと結婚したが、ヘレナがコンスタンティノープルに到着する前に皇帝は将軍により打倒された。
stage_intro_30110=1081年春、新しい皇帝アレクシオスはロベルトの全ての要求に応じたものの、ロベルトは開戦の口実を見逃すはずもなく、かねてから準備していた150隻の船と2万の兵士を率いてコンスタンティノープルに進軍した。
stage_intro_30111=ロベルトの息子ボエモンドがビュザンティオン帝国で勢いを増している間、アレクシオスはドイツ皇帝ヘンリーに手紙と数袋の黄金を送り、防御の薄いローマを守るように依頼した。ヘンリー4世と教皇の対立は長年続いており、彼はこの絶好の機会を見逃すはずもなく、教皇は驚愕し、ロベルトに助けを求めた。
stage_intro_30112=ロベルトはイタリアでの反乱を鎮圧した後、ついに全ての精力を東方に向けた。70歳になったグイスカルドは、大軍を募りローマ皇帝としての野望を果たす準備をした。しかし、ケファロニア島に上陸した際に疫病にかかり、1年後に亡くなった。彼の墓碑には、「ここに、世界の恐慌となったグイスカルドが眠る......」と刻まれている。

stage_intro_30201=グイスカルドは二度の結婚歴があり、十数人の子供をもうけたが、最も有能な息子は私生児だった。彼はバイキングの祖先から受け継いだ金髪と高身長を持ち、父親と同じように無謀で勇敢で、活力に満ちていたという。
stage_intro_30202=ボエモンドは成人すると、父グイスカルドの指揮下で戦い、西シチリア島で多くの戦闘経験を積んだ。しかし、父がビュザンティオン帝国に攻撃を開始するまでは、彼の本当の実力は発揮されなかった。1081年、ロベルト・グイスカルドは150隻の戦船と2万人の兵士を率いてコンスタンティノープルに向かったが、教皇の伏兵に遭い、ノルマン人は主力戦船の大部分を失った。
stage_intro_30203=ボエモンドはビュザンティオン帝国のマケドニアとテッサリア地域の要塞を奪取し始めたが、ラリサで窮地に陥った。ビュザンティオン人の頑強な防御とヴェネツィア人の妨害により、彼の補給線は常に困難な状態にあった。
stage_intro_30204=1084年、ボエモンドは再び父に同行して東ローマに赴き、ヴェネツィア艦隊を撃退し、コルフ島を占領した。しかし疫病がノルマン人を襲い、グイスカルドとボエモンドは重病にかかってしまう。そのため、ビュザンティオン帝国征服の計画は再び中断せざるを得なくなった。
stage_intro_30205=ロベルト・グイスカルドは1085年に亡くなり、異母弟ルッジェーロ・ボルサは母と叔父であるシチリアのルッジェーロの助けを借りてボエモンドから継承権を剥奪した。継承権と領土を巡る内戦はイタリアで10年の間続いた。
stage_intro_30206=1096年、ウルバヌス2世が十字軍遠征を呼びかけ、聖地を奪還するために十字軍を募集した。ボエモンドは継承権を無視する決意をし、彼のカリスマ性によって迅速に強力な十字軍を集めた。
stage_intro_30207=かつての敵アレクシオスは、ボエモンドを最も盛大な式典で迎えたが、ボエモンドに対して忠誠を誓い、ノルマン人が占拠している帝国領土を返還することを要求した。ボエモンドは熟慮の末に同意したが、皇帝に「東方の指揮官」に任命され、十字軍全体の指導権を得るようにとの要求は、狡猾な皇帝によって拒否された。
stage_intro_30208=ボエモンドは甥のタンクレードと共にボスポラス海峡を渡りニカイアに進軍した。トゥールーズのレーモン4世が十字軍の初陣として続き、名を上げて真の指導者になりたいと願う者は少なくなかった。
stage_intro_30209=十字軍の中で、フランク人のレーモン4世だけがボエモンドと渡り合える存在であった。彼らは二手に分かれ、お互いに先に成果を上げようとした。
stage_intro_30210=エルサレムに向かう途中、アンティオキアの占領は十字軍の運命を左右する重要なポイントとなった。カラブカ軍が押し寄せる前にアンティオキアを占領できれば、十字軍には城内で防御する機会がある。さもなければ、城外でセルジュークの数万の大軍に直面するしかない。この時点での十字軍は、すでに絶体絶命だった。
stage_intro_30211=アンティオキアが十字軍に占領された後、ボエモンドとレーモンの協議は合意に達し、ボエモンドがアンティオキアのすべての権利を得る一方で、レーモンを十字軍の最高指導者として認めた。ボエモンドは長年の夢であった領土と名声を得て、実質的な公爵となったが、その結果、ローマ皇帝アレクシオスと対立することになった。
stage_intro_30212=1100年の夏、ボエモンドは甥のタンクレードにアンティオキアを守らせ、自らは300人の兵士と共にユーフラテス川へ進軍し、領土拡大を図った。
stage_intro_30213=ボエモンドは3年間囚われの身となり、その間に甥のタンクレードが公国の版図を拡張した。解放されたばかりのボエモンドは、名誉のために南へ進軍した。
stage_intro_30214=アンティオキア公国はビュザンティオン帝国とセルジュークの間に位置し、軍隊と資金の消耗がボエモンドにとって大きな負担となり、拡張も難しくなった。ボエモンドはヨーロッパへ資金と傭兵を募りに行く必要に迫られた。意外なことに、イタリアでもフランスでも彼は十字軍の英雄と見なされ、フランス王フィリップは彼を婿として迎え入れ、イギリス王ヘンリーがイギリス行きを阻止するほどの人気を博した。
stage_intro_30215=大きな名声を得たボエモンドは再び父の願望を思い出し、3万5千人の精鋭を募って再度ビュザンティオン帝国に攻撃を仕掛けることを決意した。
stage_intro_30216=疫病と包囲の中で、ボエモンドは屈辱的に停戦協定に調印した。アンティオキア公国は依然として保持していたものの、自らの失敗を許せず、シチリア島に向かった三年後に絶望の中で亡くなり、カノーザ・ディ・プーリアに埋葬された。アンティオキア公国はタンクレードの摂政の下で存続した。

stage_group_name_30002=ボエモンの日記
stage_group_name_30003=ボエモンの日記

family_letter_desc_201=父は火事を起こしたり消したりすることで富を得たので、そのあだ名がついた。しかし、よく教会に寄付もしていたので、教会では良い人脈と名声を持っていた。--- ボエモンド1世
family_letter_desc_202=彼は若い頃、叔父に長年排斥されていたので、ルッジェーロに対しても同様の態度をとっていたが、それが最良の方法ではなかった。
family_letter_desc_203=父はついに家族内で最高の地位である公爵に就任した。これは家族にとって最も名誉な日であり、彼が教会で多年にわたって努力した結果だ。
family_letter_desc_204=シチリア島は私たち家族の信念の象徴だ。豊かで美しいその島のために、ウィレルムス叔父さんの後の誰もが戦い続けるだろう。
family_letter_desc_205=おそらく父はルッジェーロ叔父さんとシチリア島の指導権について争うつもりはなかったのだろう。彼の夢はもっと遠いものだ。
family_letter_desc_206=父はかねてより征服者ウィレルムスに対して不満を抱いている。ギリシャ人にすら勝利していないのに、どうして自分を征服者と呼べるのか？と言っている。
family_letter_desc_207=我が一族の誰かがコンスタンティノープルの皇座に座る日が来たとき、真に 「最高指導者 」の称号にふさわしい者となるだろう。名誉は生命を超え、生命が続く限り戦い続ける。
family_letter_desc_208=父はイタリアに戻ったが、すぐに事態を落ち着かせてお戻りになるだろう。狡猾なアレクシオスは簡単に対処できる相手ではない。

family_letter_desc_301=今でも覚えている、10月18日のあの日、父が攻城していた時、アレクシオスが突然近くに現れた。彼が都市に突入すれば、私たちは戦いに敗れるに違いないと思い、慌てて外に飛び出したのだ。
family_letter_desc_302=私たちを負かしたのはギリシャ人ではなく、疫病であり、呪いである。あるいは、神はギリシャ人の側に立っていたのかもしれない。その年から父は病を患い続けた。
family_letter_desc_303=父のそばに付き添っていたのは誰か、こんなに多くの領土を獲得したのは誰か。それに比べて奴はただ良い母親と叔父を持っていたために、私のすべてを奪っていったのだ。あまりにも不公平だ！
family_letter_desc_304=ここに居場所がないのなら、東に向かわせてくれ！
family_letter_desc_305=偽善者ローマ皇帝は私に何の約束もしてくれなかった。アンナ姫は非常に若いにもかかわらず、とても誠実に接してくださる。十字軍東征と呼ばれるものは結局ローマ皇帝が失地を取り戻すためのもので、どうやらギリシャ人はますます弱体化しているようだ。
family_letter_desc_306=我々は間違っていなかった。アレクシオスは私たちに何の援助も賞賛も与えるつもりがない。そうとなれば、私たちが無慈悲であることも仕方ない、戦いで得られるのは私たちのものだ。
family_letter_desc_307=7ヶ月が経った今、補給は底をつき、もはや奇跡を信じるしかない。 神の祝福があらんことを。
family_letter_desc_308=神のご加護を、父よ、私はついに成功しました。アンティオキア、ここが私たち家族の新しい始まりになるでしょう。
family_letter_desc_309=3年が経ち、砂嵐の感覚さえも忘れてしまった。アンティオキアは依然として孤立しており、多方面から包囲されている。私は領土を拡張する必要がある。
family_letter_desc_310=そうだ、私の頑張りがなければ、サラセン人やセルジューク人はとっくにコンスタンティノープルを占領しただろう。すべての栄誉は私のものだ！
family_letter_desc_311=憎しみは決して忘れていない。父よ、私は必ずやギリシャ皇帝の首をあなたに捧げます。戦え！ 名誉は命に勝る！

