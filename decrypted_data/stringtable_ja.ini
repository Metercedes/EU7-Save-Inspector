campaign_desc_305=シルクロードの宝物は東西貿易を貫く重要な象徴である。アラブの富豪たちはこのロードを通じて貿易を行い、多くの貴重な文物や宝物を残して東西文化交流の歴史を証明した。
campaign_desc_306=北欧神話には「アントワープの指輪」と呼ばれる魔法の指輪がある。この指輪は神秘的な力を持っていると伝えられており、着用者に無限の富と力を与えることができるという。

