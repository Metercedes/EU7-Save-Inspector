item_desc_3105=普段は薪割りに使われる小さな斧だが、必要時には人を斬ることもできる。
item_desc_3106=甲冑を破るための短い武器で、重心が前にあるため、使用時に手から離れやすい。
item_desc_3154=熟練の職人が作ったサーベルで、切れ味が非常に優れている。
item_desc_3155=プレートアーマーにもかなりのダメージを与えることができる武器だが、使用者には一定のスキルが求められる。
item_desc_3164=インド原産の戦馬で、寒さにも暑さにも耐え、適応力が非常に高い。
item_desc_3199=複雑な模様が施された重い盾で、神の祝福を受けたと言われている。
item_desc_3202=牛革で作られたブーツで、耐摩耗性があり軽い。
item_desc_3203=貴族が狩りの際に履くブーツで、美しさと実用性を兼ね備えている。
item_desc_3204=騎士が戦場で履くブーツで、製作工程は複雑だが、柔軟性と防御力が非常に優れている。
item_desc_3205=コストの低い木製の盾だが、非常に使い勝手が良い。
item_desc_3206=製作が簡単なヘルメットで、必要な時には他の用途にも使える…
item_desc_3207=古代ギリシャのスタイルを基に改良されたヘルメットで、鎖帷子と組み合わせてよく使われる。
item_desc_3208=防御力に優れているヘルメットだが、視野がやや狭い…
item_desc_3209=鉄のワイヤーで作られた鎧で、主に切断武器から身を守るために使われる。
item_desc_3230=非常に威圧感のある破甲武器で、当たれば命を落とすか重傷を負う。
item_desc_3264=切断も突刺もできる武器で、様々な状況に適応できる。

