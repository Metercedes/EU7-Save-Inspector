stage_intro_4821=1249年、フランス国王ルイ9世は十字軍を発令し、エジプトに侵攻した。 アユービード朝のスルタン・サレハは軍隊を率いてマンスーラに侵攻したが、急病で死亡した。バイバルスは危険にさらされ、マンスーラの街で十字軍を撃破した。
stage_intro_4823=十字軍はマンスーラで敗北し、物資が尽きかけていた。バイバルス1世はこの機会を鋭くとらえ、ファリスコートで撤退する十字軍に追いつき、ルイ9世を捕虜にした。
stage_intro_4825=1260年、キト・ブカ将軍率いるモンゴル軍はシリアを占領し、西への進軍を続けた。バイバルス1世はエジプト軍を率いてアイン・ジャールートの戦いでモンゴル軍と決闘した。
stage_intro_4827=1266年、バイバルス1世はキリキア・アルメニアを破り、中東におけるモンゴルの力を大きく弱めた。
stage_intro_4829=1268年、バイバルス1世は、十字軍が中東に築いた最も強力な体制であったアンティオキア公国を滅ぼした。それは中東における十字軍勢力の壊滅を確実とさせた。
stage_intro_4831=1271年、イングランド公ロングシャンクス（後のエドワード1世）は第九回十字軍を組織するが、バイバルス1世はそれを撃退した。

